body:
  text: 少室山房集巻八十二明胡應麟撰序六首黃說仲詩草序越山川瓌麗甲天下錢塘富春四明三竺南北二雁幽奇靚峭薄海外内罕與倫迺天台尤以靈蹟著石梁亘空瀑流畍道赤城之標高揭萬尋曩讀晉孫綽先生賦輙豪興勃勃如神遊金庭玉壺與二仙姝目成霞外者亟思拉同好偕往庶幾晨肇之一遇而難其人丙戌計偕晤李大將軍劇談天台黃君說仲不容口心翩翩慕嚮之明季扁舟淮汭謁世叔通侯則說仲儼然在焉把余臂懽劇欲狂中夜造膝𣢾言縷覼洞肝腹已袖出是編進余曰不佞寤寐吾子三十年于此矣惟是不腆敝帚不敢有所隠也敢悉索以累下執事余受讀卒業而三嘆赤城之郊磅礴鬱葱之氣至說仲而彬彬盡洩也說仲故天台世家蚤歳才情蔚起與蔡儀制稚含王黃門永叔結詞盟東海上而厥先宗伯公綰實從世叔王父文成公游世叔以勲胄仗鉞登壇龍門嵳峩一代景附說仲首居戎幕為上賓操觚授簡而外元戎喜怒一切置若罔聞也者獨􅚃丈室坐蒲團如苦行頭陀浹旬足不履户閾童子鑽穴聚窺第聞㗋吻間隠隠囁嚅聲兩手伸縮往來㨿棐几作推敲狀時而掀髯時而拄頰得句踉蹡起探赫蹏掌許録之句累成篇篇累成巻巻累成帙帙成則世叔趣為剞劂行諸世說仲用是愈益自信發舒瀝思覃精亡虚日亡論魯連卻秦馮驩振薛毛遂激楚古岩處畸流往往有以殊勛奮記室者而說仲規圖大業迴睨諸人漠如也今緫萃其生平詩歌為什亡慮千數計為巻亡慮十數計左提右掣大都得之世叔為多選體之夷曠雍容長短句之輕新婉達合作置鹿門輞川嘉州集夐不易辨五七言律絶亭亭獨上百尺無枝朗抱沖襟汛洗塵俗清者大厯㫖者元和淳者咸通質者長慶司空皇甫姚鄭復生說仲無忝孟季鄕先達載式之輩宋渡南號巨擘較說仲才或少贏以格藐乎卑瞠乎後矣始說仲名籍郡諸生中棄去佔俾弗習習詩歌詩歌成而佔俾廢迺余􅋂﨑濩落放情宇宙胥國能家武失之今頭顱業俱種種而邂逅合并窮途得微赤城之靈果有意吾兩人者之為兹山主耶吾鄉黄初平煉藥處去天台僅僅數百里旦夕曳敝青鞋入飛流懸瀑中覓晨肇曩時遺蹟胡麻之粒庶幾一載遇焉即身後不朽名付諸蝸沫區區人間世雞肋其何足以攖之說仲亟從余歸矣二仙姝振衣霞外遲余與說仲乆矣王生四遊草序余識王山人在癸酉甲戌間始山人在瀫上從諸年少飲狹斜一日邂逅余當壚酒家問姓名踉蹡前揖曰象不敏蓬遊江湖習聞胡先生稔矣迺何幸於此獲一當先生亟罷飲持刺候余門余與語移日壯之以千秋大業朂焉山人悦盡謝諸年少而從余學詩俄挾䇿辭余走秣陵謁李惟寅太保聞問中絶三十載丁酉夏余羇卧武林忽閽者以山人報余聞倒屣出覩山人乘高軒擁上駟從蒼頭五六翩翩來其風度亡少頽于昔而意氣神貌油然睟然盎然殆非復吳下蒙也余甚怪且慰趣呼酒坐山人語之曰自子之去吾溪上一時過從朋舊聚散浮沈不知凡幾變遷矣而吾與子若魯靈光迄無恙兹復合延津謂造物者無意乎胡以巧為吾兩人地若是也子别吾三十載矣中間蹤迹何方交游何人佔俾何狀其悉有以語我來山人遽從囊中出一編避席長跽曰㣲先生問之象固且從容請之始象辭先生走秣陵已遂由秣陵入燕悲歌黃金故臺覓慶卿漸離不可得則復南邁而之楚浮洞庭汎雲夢吊二妃九疑藂竹間則復西折而之蜀挽舟巫峽瞿塘白帝躡草屫三峨􅖭洋洋乎震旦第一觀矣則復益西南折而入滇窮竟碧雞金馬昆明㸃蒼聲迹幾達于緬甸富良而後以吾興盡而返吾初服大都五岳之勝得於吾之杖者亡慮十之九九州之内得于吾之目者亡慮十之六六合之外得于吾之耳者亡慮十之三生平感遇忻戚紛糾萬端一于吾詩歌發之是編固曩昔先生餘敎也不揣徼惠一言附異日青雲之末先生幸卒寵施之余讀之喟然擊節曰有是哉子之遊也今㝢内名能詞賦不啻數十百曹大都矜幅尺樹門庭高者自托于狂恠怒張而卑者纎阿浮狡優童市娼角容澤甚且折輩行捐泉布博游揚之口于曹丘而韋布之鮮修者酗酒踞坐藉口灌夫禰衡致廟堂之上吏議主逐客而山林之下明詔忘求賢葢詩道與游道迄于今胥病矣卒之聲稱隨冺于月旦而行履蔑能逾尋常固也山人發軔海東攜一劒自南而北復自北而南至接壤南交西竺而後返覩其人五尺恂恂匪有乘蹻履風之術而周歴四表若步武於宫中此庸詎可以聲音笑貌兾耶余讀山人詩一再過清而婉秀而宕新而弗刻高者毋為亢卑者弗納于衰葢粹乎一規于風雅之正而絶出于晚近儕流習尚畛畦之外者固宜愈逺而游亡弗得狎魋結偶雕題而坦然户國無碍也余别山人溪上且易世卽詩歌屣倍兹編而足迹自燕吳齊魯外無能越一境余固甚愧山人者而胡以敘山人詩以山人沾沾余言甚力也姑援筆紀其歲月且以徵余之知山人三十年猶旦暮云林貞耀觀察覆瓿草序國初稱才之盛者無若吳下四傑嶺南五子咸彬彬合軌一時云而閩中以才著稱者凡十較二方不啻倍之而林員外子羽又翹然為十人者之冠鄭繼之王道思崛興𢎞德嘉靖間迨今日而闤闠詞章幾于家靈蛇户罔象矣而閩之尤稱極盛者亡若晉安之林榮名奕葉焜耀于一門三世之中父子弟兄更倡迭和而山林枯槁之言望之自失若今觀察貞耀先生覆瓿草其一斑已先生王父文安公尊人文僖伯氏文恪皆以良史之才擅藻木天聯翩八座其鴻裁巨軸紬之金匱石室而播之通邑大都者固已人人講習之而先生特以蚤歲成進士􅏡歴中外已而養高岩穴十餘年所而以其生平全力萃於詩歌吟咏故尤為精詣亡前其體自河梁以迄輞川無所不懸解其世自黃初以迄大厯無所不馳驟其人自蘇李以迄錢劉無所不取裁兹所傳覆瓿一編不佞麟受而伏讀未嘗不三擊節也五言選體温裕和平薄太康而上之而五言律為尤勝如茂林豐草幽谷長松味之亡窮索之逾逺七言近體清融婉亮兼天寶而有之而七言古為尤超如流水行雲迴風急雪排蕩莫測操縱自由他如大篇長句鬯麗而舂容莊嚴而富縟短章孤絶優柔而閒曠逸發而穠纎卽鼎中一胾全牛固己目中大都先生之治詩才高而絜之以法氣厚而標之以韻骨澹而永之以思情與景適象與境鎔比興彌深而觔節靡減葢卓然自名一家而侈大三世之傳籍第令陸氏兩生見之君苗焚研之弗暇而敢以三都覆土瓿也嗟夫古今所炫稱簪紳閥閱極於漢之袁楊顧其人菁華不少槩見唐之竇宋之蘇蟬連競爽而率壈坎宦途求其膴于仕者一不可得又僅僅一載傳而驟止以今先生較之通塞乆近其果孰與仲多故不佞竊以先生一門殆造物者陰縱完畀詎惟昭代亡兩亘古今罕覩其倫非虚語也而不啻已也先生從子計部郎天迪方以文辭雄藝苑不佞嘗序其詩謂閩有兩林員外行且嗣先生之業而益傳之無窮而林之獨盛於當代也行且不可以世數計敬因先生命序而陳說私所艷慕如右俟尚論者執余言為左券云李臨淮青蓮貝葉二藁序夫絳灌無文隋陸無武才之難兼葢自古嘆之云迺仲尼稱有文事必有武備詩歌吉甫為憲萬邦而春秋美晉郤縠敦詩書而說禮樂此其人寧亡一二槩見也豈歴數盛衰固人材所繇高下而瑰偉殊絶命世之英挺生間出則造物者亦有時而獨縱其全與漢李少卿首創五言河梁諸篇上繼三百惜也没身塞外摧敗之功靡足自贖藥師以雄畧佐文皇混一縣㝢而輓近世所傳兵法龎猥錯襍薦紳先生罕言之兩君子皆曠代人豪奮迹行伍揆諸二者猶戛乎難兼若此矧世胄勲華身際豐亨豫大之朝而坐極膏梁都冶之奉卽父祖箕裘置為長物而詞章瑣瑣奚足以云此余上下數千百年而不能無心折于余友李惟寅氏也惟寅故歧陽冢嫡髫鬌從尊大人楚游白雪山房一編海内喁喁亟稱寡和旣用才諝受知當路宿衛羽林慨然遐思迹古作者與余輩結社華陽當代大家名流瑯琊歴下武昌新蔡長興南海之倫朝分廷而暮造膝而尤喜折節寒賤士士挾一長操一曲靡不躡屫而走臨淮嘉隆慶厯之間風雅大𢎞詞塲四闢上自王公下訖韋布洋洋纚纚同聲合轍咸惟寅作新振起之卽古鉅匠宗工身關世運隆汚者曷尚焉迺惟寅迄未嘗以文事詘武備自居督府守陪京極而位元戎列師保百萬之衆操縱掌握登壇忼慨宇宙肅清當西夏㺯兵東境竊發中原士庶岌岌皇皇惟寅坐鎮廟堂聲色不動而長鯨折角羸豕獻俘窮髮頑酋匍匐請命卽古重臣元老身係社稷安危者曷尚焉迺惟寅迄未嘗以武備輟文事功名日起閥閱日崇九域之人望焉而震而吐哺結襪念弗少衰花晨雪郊大集名勝據胡床而揮彩筆一篇一咏甫出而人争誦之以及羽書紛沓尺素淋漓頃刻百函交授並發今其製作大都裒成巨集若青蓮貝葉二藁可較覩已其格也典鬯和平而盡削巉崖詭峻之狀其調也清融亮節而一掃尖纎浮曼之風其神情之來飈如翼如如登九成之臺招閬風而飡沆瀣其色澤之傳溫如燁如如入萬花之谷濯春月而坐氷壺讀之而泠然大雅之音翫之而雍然泰和之象明一代詩求絶去宋人唇吻而一稟于大厯開元者舍惟寅將疇歸耶葢語文事則篇章接軌隴西而勲勞逺邁語武備則韜鈐比蹤衛國而藻繪彌光非所謂瑰偉殊絶文武兼資崛起于珥貂橫玉之中而併包乎垂紳貫札之業若春秋雅頌所稱述三軍司命萬邦為憲者否耶然耶余與惟寅交緫角迨今逾三十載人謂知惟寅者世莫余若而余亦謬自謂能知惟寅輙因二集之成而備述其生平梗槩如右後世子雲者作庶㡬哉以不佞為知言雖然余之知惟寅與世之艷耀惟寅特功與言二者其篤而論之謂深知惟寅未也惟寅宿根天植少卽棲心𤣥寂皈依太上之初故所居齋閣一以青蓮貝葉名之其意㫖較然可覩異日者屣脫浮榮出函關而化西域卽山河大地彼且一切空之而奚有于二者噫嘻淺之乎余之所以知惟寅矣淺之乎余之所以知惟寅矣瑞雲樓藁序自昔名世偉人肩將相文武之業者葢莫如漢之諸葛武鄉迺唐宋以還胡寥寥弗遺見也逮明而吾越兩文成後先並起括蒼劉公伯溫以雄略翊真主而以其餘事偕高楊輩振一代風雅于明初㑹稽王公伯安以雄略戡大艱而以其餘事偕李何輩振一代風雅于明盛余嘗慨慕兩公兾一為之執鞭弭而阨于世代之弗相及而猶幸得交王公之後若今通侯世叔君者余讀其瑞雪樓藁未嘗不三嘆息云世叔為伯安先生冢孫髫鬐卽以清標令望照映蟬冕嘗邂逅不佞李惟寅第中恍然天際真人令人俯仰自失稍長輙以弓裘自奮居恒有馳伊吾絶大漢之想凡所為挽强執鋭披堅躍駿介胄之士見謂縮朒難勝者率道之談笑間旣身襲龍陽公封以列侯督樞筦董江防其雄才大略若龍泉太阿陸試犀兕水試蛟鼉投之所向砉然理解天子亟心異之未幾遂有總理漕鎮之拜國家西北九邊數十百萬之衆朝夕待命世叔建朱節震華鼔舳艫載道芻輓如雲廷中翕然擬之長城大樹迺世叔不惟韜鈐冠世而間推其餘力于文事尤矯矯絶出一時每臨江而橫槊出塞而據鞍分閫而運籌登壇而仗鉞以至留賓西第乘興南樓坐嘯霜空輕裘雪夜興㑹所觸一發之於詩歌若今黃君說仲所校輯瑞雲樓藁特其鼎中一胾已余嘗受讀卒業竊以世叔之詩揮洒性靈淘浣風骨思深以逺緒密以清于情靡弗達而禦之以格于景靡弗㑹而諧之以調于境靡弗探而裁之以法于體靡弗備而標之以神莊嚴而清廟明堂華重而大弓寶玉婉暢而行雲流水奇峭而白鶴朱霞纎穠而芳草落花間澹而長林藂薄葢世叔於詩歌絶去彫鎪刻削浮曼兒女之態又槪不為牢慅憤鬱無病呻吟之詞而一稟于三百篇十九首優柔平中之餘韻真渢渢乎大國風哉無論諸徹侯中邈焉寡儔藉以韋布苦吟之客挾其一技以與王公大人争千秋萬世于身後者其能德色所長以自侈于世叔否耶異時近述遠宗屹然為東南赤幟俾吾越兩文成故武有所恃以永永弗墜匪世叔而疇其人耶雖然伯溫氏啓運國初高楊諸子大都因襲元政伯安先生崛起𢎞正間李何甫洽業己游精太上駢拇藝文故嘗竊謂兩文成勲伐品流誠超百世而詩歌猶若弗能無待焉者今六合為家八荒重譯卽世叔雄才大略嫓媺兩公亦將局於時之亡所試獨聲律自嘉隆再造㡬奄黃初寶厯而有之當此時氣運之隆較前人不翅倍屣而世叔夙以鴻篇鉅藻驚弇州之座且春秋鼎盛中嘗欿然自下若溟渤之受萬流彼其稅駕之所余惡得而窺諸日新富有挈斯道之上乘主風雅于一代視兩文成之世奕奕乎有光焉世叔所躬自期待意在兹乎將相文武之業行且于其身卜之而胡以云唐宋以還寥寥也西湖百咏序武林山川勝絶錢塘天目等區為東南遊賞甲而西湖之韶靚穠麗尤震旦國第一觀澄波鏡空萬頃如席外環三竺傍峙兩高𤣥宫梵刹四百八十金銀丹雘照耀其中恍惚窈㝠殆匪人世始余讀穆天子東方生書輙謂寓言亡當比周歴湖上迺知方壺員嶠聚窟閬風諸書所談境界卽此而世人弗詧類馳想于大瀛窮髮之墟致足哂也自秦并六合祖龍車轍幾遍域中迺燕楚晉梁往蹟眇覩而吾越遺事簡册班班藉人口吻得微以神仙藪穴靈藥易求故耶古今題咏香山睂山兩刺史而下充棟汗牛田氏志餘葢嘗備載顧前人所賦或總挈大凡或標舉尤最湖中景物軼漏滋多迨今黃刺史禹鈞百咏出而毫髮無遺憾矣禹鈞故富才情饒纂述筮仕一州意有弗欲翻然拂衣邁徃大業樂武林風土妍美遂定居焉紫陽之麓咫尺大堤闕少室山房集巻八十二
