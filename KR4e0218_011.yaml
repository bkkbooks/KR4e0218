body:
  text: 少室山房集卷十一明胡應麟撰五言古詩五十四首擬古十九首有序不佞垂髫談藝即耽嗜東西二京憶操翰之初賦詩送人之白下起句云悲風號枯桑吹墮林上月客子將逺行驅車中夜發一時名流驟加賞嘆以厯塊期之弱冠從家大人入長安社中酬倡大都五七言律亡暇古風比嵗巗居始克以占畢餘工稍稍從事嘗擬作古十九首束裝北上染指輒休乍過婁江請益王長公長公拳拳進余努力兹道適長夏閉關因檢拾舊草㸃綴聯絡竟成此章并士衡所擬蘭若生春陽為二十首古詩絶唱世以為白雪陽春不當擬議乃昔人每云取法乎上僅得其中則自三百篇而下當法孰先國朝仲默于鱗咸有斯作兩家得失集中具見余之擬此聊為異時印證之自若曰優孟抵掌非余所能知矣嚴霜結重隂嵗序忽已暮念子當逺遊抗手即行路路行常苦逺客歸嘗苦晚浮雲蔽關塞白日不可挽昔為婚與姻今為越與秦落葉隨飄風飛鴻辭故羣君心豈難保妾顔匪長好登髙望平原四顧盡衰草相思無朝夕沈憂令人老願為雙車輪隨君萬里道鬱鬱城東門盈盈桃與李抽條仲春月穠艷若羅綺軒車競采掇日暮未言止如何秋風生搖落自兹始寄語青樓倡盛顔難久恃清晨䇿駑馬整轡南山隅遙望長安城飛觀百尺餘峩峩青雲端甲第羅長衢華鑣若流水軒蓋何威紆各騁要路津盈盈道中趨人生若飛藿奄忽隨丘墟盛衰各有極貴賤同斯須何如命我友斗酒鳴笙竽逍遙放情志卒嵗聊自娛令節懷嘉賔親友四面會軒車若雲屯髙談盡冠蓋㫖酒羅長筵新聲動環珮秦筝響未畢楚袖盈庭內同心競酬酢羽觴互更代各言行樂殊少壯不相待勞生徇榮華日月忽已邁千秋萬世盡賢聖亦焉在綺樓亘中天窈窕百餘尺飛甍架復道藻井縱橫出上有雙蛾眉容華世無匹臨風發皓齒當户理瑶瑟新聲入雲漢四座咸動色行人競傾聽日暮不遑息但覩來者歡誰明居者臆盛年處空閨中夜起悽惻采采叢蘭花美人隔江沚褰裳涉其波舟楫誰為理回風動羅裳日暮聊徒倚安得雙鴛鴦銜致篋中綺客遊異鄉縣終嵗懷苦辛憂思起長夜展轉不得晨舉頭望河漢悵彼參與辰疇昔同盟友金石偕交親飛飛振六翮棄我若途人我欲東歸洛日暮河無津徘徊入房中涕淚沾衣巾彼美東鄰子習禮明書詩十五登君堂新婚諧結褵願為雙飛鴻百嵗不相離風波起中路忽去天一涯不惜去日逺但恐歡愛移黃塵蔽關塞會合無前期願君䇿髙足努力趨明時生當聚華堂死當長别離灼灼芳樹枝敷榮一何早緑條被繁英初日何杲杲感此芳春時采掇寄逺道馨香不終夕零落隨百草盛年處空閨顔色為誰好嚴霜瘁百草節序忽復易噭噭雙飛雁雲中各自適念我同衾人索處異南北披衣望天宇衆星何厯厯牽牛隔河梁織女限東壁倣徨間一水欲往步難即同心復異地何異不相識清晨出大梁遙瞻北邙道野火燒平田白楊半枯槁人生寄宇宙忽若原上草去日常苦多來日常苦少少者日以壯壯者日趨老幻軀無百年富貴何足保思為魯中聖萬世同夀考髙城跨東南大道夷且直青樓間綺疏曈曈照初日五陵俠少年結束事遊昵白馬飾銀鞍連翩度阡陌美人遙目成相對理瑶瑟十千輕一笑百萬當一擲為樂願及晨為歡願及夕紅顔匪百嵗何由保金石回車灞原上白日忽將暮石門髙崔嵬悲風起長路借問何人阡無乃前朝墓人生寄一世奄忽迅朝露荒哉秦漢主尋仙起遐慕弱水不可援三山竟焉度玉碗出人間徒為赤松誤傷彼泉下人喟焉䇿蹇步吹竽宴華堂娛樂從所務飄飄極心志千載為旦暮驅車越長道還歸故里閭少小客咸陽今來草載餘親知半凋落冢墓留村墟松柏儼成行狐兔交路衢門巷寂無人誰為問鄰居停車再嘆息日暮長欷吁客行盡九州不如守敝廬浮生若飛蓬寄迹宇宙間萬物皆有盡胡為長苦顔㫖酒列髙臺嘉賔共盤桓夜闌當秉燭日晏當沈酣人生無百年譬彼東逝川生者不暫歡死者寧復還昭昭三五夕皎月流素光徘徊入髙樓照我羅衣裳攬衣坐嘆息起步仍倣徨良人懷逺遊九載客他鄉空閨知嵗暮獨處知夜長嗷嗷雲中雁隨風忽南翔安能假羽翼萬里來君傍凜凜北風至霜雪零前除惜哉征人婦嵗宴恆寡娛夙昔奉衾裯矢志誓不渝如何棄我去悠悠長路隅思君隔天末邈如秦與越歡愛寧復論鉛華為君絶君懷如明月妾心如氷雪君懷有圓缺妾心徒皎潔清晨啓重關有客千里至手攜尺一書言我故人寄長跪問故人客亦無所言開緘讀素書宛若覩所歡上有金錯刀下有白玉環明月三五滿故人會當返仲秋凉氣肅嚦嚦雁南度北斗倚闌干氣運凄以暮悲來撫長劍浩歌起庭戶一為逺方客永别親與故頻夜夢室家展轉忽已寤念欲還故鄉按轡遵廣路悠悠大河水一葦安可渡亭亭孤桐樹託根嶧山岑良工琢其枝為我匣中琴膠漆相交結珍重逾南金被以朱絲絃彈以白雪吟清音順風揚四坐疇同心佳人隔天末日暮涕沾襟王長公云十九首最難言離之則虞落節前輩俱所不免合之則虞捧心于麟亦微用為纍足下加之矣唯在更刓鋒巧露其本質而已又擬古八首冉冉嵗云暮念君逺别離浮雲蔽原野四顧白日馳夙昔幸同衾歡愛誓不移如何百年好去我忽若遺嚴風起天末霜雪盈路歧晨起踐關山薄暮長抱饑音徽日夜隔會合當何時恨無晨風翼並起東南飛髙樓有思婦被服姣且妍橫琴理清曲渌水被幽蘭一彈浮雲暮再鼓流風旋哀音振林木聽者為忘餐借問何人婦感嘆停朱絃征夫越萬里一别嵗載遷鉛華坐銷歇太息空嬋娟灼灼園中花盈盈道傍栁敷榮艷陽月攀折佳人手秋風一朝至容耀詎能久人生寄天地聚散何不有俯仰百嵗間倏忽成老醜身名匪金石富貴欲誰守怡我平生親獨有盈尊酒肅肅金風至大火時西流遊子異鄉縣中夜懷百憂驅車駕言邁奄忽嵗已秋登髙望故里江漢何悠悠佳人在逺道欲濟無輕舟同心日夜隔涕淚縱橫流願為南飛翼萬里行相求朝登北邙山徘徊望陵谷荒墳何纍纍狐兔自相觸白楊夾修途黃泉蔽層曲傷彼潛寐人年命一何速生存宇宙間行樂苦不足驅車暮歸來鳴筝燕華屋北里揚清音南鄰薦新曲親知從我游被御紈與縠相對各盡觴良夜更秉燭榮名耀百代轉盼同初旭亮無喬松夀誰能傷局促青鳥從南來翩翩隨風翔口銜尺書至乃自大海傍美人三嵗别沈憂熱中腸織成機中錦拂拭爛生光下為連理枝上為雙鳳凰致之萬里道聊以充君床願言勗斯義旦夕毋相忘回風吹轉蓬倏忽行萬里遊子懷山川驅車暮不止荒郊四無人日入斷行旅熊羆向我啼僮僕為我侣南望見故鄉失路空徙倚眷彼平生親氣結不能語東鄰有美質雜珮何繽紛明眸輝朝日絶代少其倫結褵為君婦婉孌日偕親風波起閨闥中道成荆榛君為東流水妾若西路塵東西各相背信誓何由聞紅顔會當歇豈不懷苦辛願君企髙節賤妾寧復云古離别二首戚戚逺行子駕言還舊疆脂車望關塞願逐晨風翔主人卜清夜置酒臨髙堂妙伎出閨闥纎腰移曲房當筵發皓齒四坐流芬芳回飈襲綺户飛霜飄長廊良宵一何促瑶瑟無輝光征夫念明發握手起倣徨仰視雲中雁三五各成行胡為雙飛龍羽翼多參商丈夫志萬里會晤安可常勗哉就長路皓首期相望驅車出郭門徘徊望都邑念我平生親聚散何倉卒白露塗中逵清霜被原隰驚飈動地起黃葉無寧夕羇禽懷故林疲馬倦行役羣雁西南翔哀音正嘹嚦豈無盈尊酒執手歧路側飛觴屬華筵行子相向立别離在須臾沈憂萬端集去去勿復論紅顔中道擲雜詩四首明河沒天宇白露晨為霜眷彼同心人忽去天一方倉皇挈尊酒送子河之梁登髙望四野川陸浩縱橫豈無瑶華音道逺不得將攬衣入房户馳念忽如傷曜靈薄崦嵫光景忽已夕圓魄猶未升明星爛然出寒蛩號我前蟋蟀鳴我側凉風起庭户樹木何蕭瑟佳人期不來延佇空歎息寧知三嵗心為子長惻惻冉冉西馳日悠悠東逝川征夫怨長路志士惜盛年長路行當歸盛年不再還寒暑互推移隂陽浩無端凄風起簾幕白露中夜漙美人坐髙堂投袂起長嘆窮隂亘晦朔山谷多寒風悲哉客遊子旋足如轉蓬昔行屆長夏今來值𤣥冬悠悠十年內車轍窮寰中人生貴適意遙役何憧憧逝將歌考槃岩穴安微躬寓懷十二首端居意不適䇿杖起行遊仙人八公侣攜我升蓬丘泠泠隨風舉衣袂若雲浮放歌崑崙頂下視弱水流天都信寥廓絳節聊淹留黃金被髙館白玉開層樓樂哉瑶池上一飲為千秋崇蘭處深谷緑葉凌朝陽回風一披拂百里傳芬芳惜哉叢林下無人知國香燁燁桃李樹託根歧路傍飛花落閨闥㺯影臨華堂詎以盛衰故易此貞素常不見西山老食薇終首陽飄飄穆天子八駿乘風馳日行三萬里逺道何不之西遊見王母宴飲登蓬池千秋蟠桃實萬仞扶桑枝寄言謝塵世百代同須斯夷羿射九日共工觸不周龍伯連巨鰲伯鯀湮洪流貪嗔起一念乃與造化仇力窮固難繼身滅將誰尤巍巍軒轅帝問道崆峒丘唐虞守無為四靈畢來遊亭亭孤松樹託根徂徠顛髙枝翳白日曲幹臨回川女蘿蔚䝉籠風雷岌相纒豈無明堂用物性貴自然一為匠石顧斤斧成災患何如鄧林下寂寞全天年壺丘與天遊列子乘風行飄飄漆園吏九萬凌髙冥胡為末世士多歧日屏營蹻跖死財利夷齊徇空名寧知大道觀不異蝸與螟華胥有逸民去去行相親弱齡負奇尚雅志誦墳史訪嶽懷尚生浮湘慕遷史杖䇿遊中原邂逅二三子裘馬何翩翩招要共生死經過漸離輩感激昭王士黃金空崔嵬所願非尺組長揖辭諸侯歸耕汶陽涘彼美傾城子艷色明朝霞寶叉耀金雀充耳珮瓊珈相如既西席宋玉仍東家春風起羅袂琴瑟相交加但知良時樂安覩白璧瑕託身一失所百嵗徒咨嗟昔有夸娥子猛氣雄千兵褰裳逞逸足思欲追曜靈逡巡暘谷傍道渴不任行投身死岩穴骨肉盈林坰過澆篡夏室莽卓乘炎精人謀豈不殫天命俄已傾寄言雄圖者割據徒營營曰余負奇好夙尚在髫齡禮樂觀百王詩書窮六經言乘休明會將致海宇平如何嵗年邁依依卧柴荆亮乖四方志永希千載名文章亦大業富貴寧重輕勉哉事著述三代追遺英丹霞蔽岩谷素雪霏林皋悠悠避世士嵗晏守蓬蒿箕山既紆鬱首陽何岧嶤時偕沮溺侣耦耕向南郊大厦匪安居千駟為禍招悲哉路傍子磬折方勞勞有鳥從東來游戲青雲中朝翔閬風館夕息瑶池宫言欲覽德輝來下雙梧桐搖搖荆棘枝鴟梟宅其叢所嗜惟腐鼠焉知彼所從竦身奮六合將返崑崙東咏史八首清時厭藜藿挾䇿干承明肅肅中天宇列宿懸神京衣冠萃閶闔謁帝羅羣英如何攀龍客相棄若浮萍長嘯出宛洛驅車返柴荆升髙望八荒濯足臨四溟商山豈不貴畏壘豈不榮大哉魯尼父著作垂千齡鯤魚産溟渤鬐鬛如山丘朝行發碣石暮宿崑崙陬竦身激巨浪噴沫飛洪流倏忽化大鵬九萬乘風游翼若垂天雲衆羽不敢侔一飛絶五嶽再舉凌十州翩翩鷽鳩侣榆枋自相求翺翔但咫尺曷覩大化遒飄飄潁中客黃屋若浮雲矯矯嚴陵叟垂竿卧江濆脫屣九州長長揖萬乘君棄瓢入深谷舉足動星文英風振薄俗徑節凌髙旻樊公信獨往周生亦離羣一朝徇微祿遺纍流千春世途日紆局達士隨所遭侯生隱抱關朱亥匿鼓刀鼓刀實賤役抱關非崇寮煌煌魏公子車騎來招要虛左大梁席執轡夷門郊堂中衆賔客錯愕起相嘲寧知救趙日叱咤風雲髙竊符出中禁奮椎奪前矛偉哉却秦績百代稱雄豪虞卿本說客著書自窮愁馬遷下蠶室史筆垂千秋楚澤放靈均漆圓餓莊周伊人一何否舉足罹愆尤文章實大業寧與富貴謀峩峩金張第七葉開王侯一朝隨物化榮耀同蜉蝣伯夷餓空谷務光沈清泠湯武首征誅白公徇其名嗟哉古賢達舉足罹天刑茫茫大造間遺跡若蟭螟升髙望宇宙攝衣御雲軿追隨廣成子乘化入瑶京九州一壞土何以勞我精五嶽一拳石聊以棲吾形荆卿卧燕邸屠狗相過從朝為太子客暮出遼城東酣歌和漸離壯士髮盡衝前登咸陽殿意氣何其雄左操督亢圖右揕秦王胸劍術豈云疏天運良已窮寥寥易水上萬古悲寒風田巴辨稷下緩頰摧千人鄒生館碣石五德何繽紛夸夫樂驚世小人恆共羣誰明白馬喻徒擅雕龍勤豈若魯連子笑談却秦軍成功不受賞萬乘如浮雲少室山房集卷十一
