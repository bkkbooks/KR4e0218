body:
  text: 少室山房集卷八明胡應麟撰樂府六十一首企喻歌四首雙鞬鐵裲襠誰家大健兒蛇矛丈八盤上馬捷若飛腰間大羽箭豎指百夫力突如飛天鷂萬鳥戢羽翼落日平原西射雕控飛騎九種黑山戎各各相引避天生健男子何須多結伴獨身取月支降卒三十萬巨鹿公主歌油壁香車向何許玉勒花驄汗紅雨呵殿縱橫灞陵渚夾岸行人目相語新封大國巨鹿主巨鹿為誰大家女七夕夜女兒歌四首儂家白揄樹一年一開花郎如牽牛星一年一來家不恨歡意薄但願歡情長牽牛與織女一年一成雙一年但一會一夜一年周猶勝儂兒郎十載客巴州都將一年意一夜申繾綣橋畔烏鵲聲天河漸清淺碧玉歌二首莫嫌小家女青春正十六新嫁琅琊王嬌愛比碧玉恨無傾城色不敢邀王憐相歡那在貌動體生春妍桃葉歌二首可憐王家郎不解事桃葉清晨渡江去日暮忘迎接桃花作羅袖桃葉為羅裙何似阿兄騃終日憐此君懊憹歌二首翩團黃犢車載歡出城東看看白日墮那能不懊憹誰家嬌女兒三三復五五結伴邀歡行今夜大辛苦白團扇二首白團扇含情待郎來不使路傍見白團扇懊恨負情儂手持不令見華山畿華山畿不願生同棲但願死同止上有雙比翼下有雙連理安東平嚴冬凛烈北風雨霜河大水氷斷絶車航客子逺遊敻敻秦越囊無資糧帶斷裘結我有綈袍以遺故人物薄意厚貴稱君身微物在機是儂手織千縷一丈三丈一襲東平劉生逺持遺郎願得邀郎早還故鄉女兒子木蘭歌聲起兩岸江陵一夜腸欲斷估客年年下黃牛巫山十二猿鳴愁子夜四時歌大堤三月中垂楊千萬樹郎騎白馬來堤上遙相遇右春期歡大堤口遲我采蓮回向暮南風急蘭橈不敢開右夏人言秋日短儂愛秋月光邀郎解衣坐肌膚如雪霜右秋圍爐然獸炭為郎理瑶瑟不知重簷外雪花厚三尺右冬子夜變歌期歡半夜來忽復月光曉九月芙蓉花顔色詎長好青驄白馬青驄白馬嬌成羣往來蹀躞如浮雲繫馬高樓石城下三百青銅莫論價七香炯炯並馬行盧家少婦車相迎鬱金堂前雙紫燕白馬青驄暮相見壽陽樂粧樓百餘尺壽陽開白馬從東來石城樂四首歡居石城西儂住石城東何愁不相見一夜秦淮風秦淮便風起布帆疾如矢恨殺巴陵秋洞庭八百里洞庭八百里一夜南風回送郎到長干泊舟鳯凰臺攜手登高臺臺荒半野草殷勤傳語郎莫忘石城好莫愁樂二首莫愁在何處石城西南弄手攜盧家郎吹簫跨雙鳯昔為石城鄉今作莫愁里開門見所歡容色豔桃李襄陽曲襄陽輕薄兒挾彈出大堤嬉遊向日暮高唱白銅鞮大堤女大堤羣女郎各各自言好愁殺襄陽兒白日情顛倒長干行二首爺娘錯嫁女嫁與長干商今年發灩澦明年發潯陽爺娘錯嫁女嫁與江陵賈八月下瀟湘九月下揚子估客樂二首樂哉估客樂黃金作銅使大艑乘長風峩岢發揚子樂哉估客樂魚蝦賤如泥愁殺閨中婦玉筯鎮長啼新估客樂二首不從估客遊不知估客樂百萬揚州鹺持籌勝騎鶴不乘估客舟不知估客樂十萬荆州娘紅粧照羅幕大道曲翠袖紫羅襦胡牀坐明玉相逢謝鎮西邀作大道曲前溪歌春蠶挂門口抱絲向牀前鏡昏不見面施朱紅可憐自君之出矣自君之出矣鸞鏡黯無光不嫌紅粉汚持底試新粧嬌女詩莫愁年少女十五嫁盧家雕梁雙紫燕白日坐飛花江陵女女郎大堤遊顧影各言好相逢平樂兒班荆坐芳草黃鵠歌二首黃鵠參天飛高高上寥廓遊戲青雲中那能顧燕雀黃鵠參天飛九萬忽如馳當時戢羽翼燕雀那得知石城曲二首踏青無限好江頭二三月恨殺潯陽風吹郎下三峽迎歡不下堂送歡不出户生憎揚子潮隨郎過瓜步清溪小姑小姑青溪曲大姑赤山磯獨處誰相依白石郎儂居清溪郎居白石途中相遇宛若舊識采蓮曲四首采蓮復采蓮搖蕩木蘭船日暮湖頭雨羅裙色倍鮮儂棹湖心舟郎來湖北岸笑指雙鴛鴦戲擲黃金彈荷葉如儂衣荷花似儂面艤棹向中流歡來倩誰辨昨夜芙蓉花緣堤一時發清波照玉腕下有雙羅襪出塞曲五首大獵漁陽罷椎牛上谷營酒闌飛騎去夜奪受降城日暮寒風起長城雪夜飛一軍齊逐北二鼓過金微拔劍追強敵黃塵際碧天固原風雨黑前隊縛呼延漢壁風煙靜霜天帳幕低雙雕何處落大磧五原西畫角霜天下轅門徹夜開梅花飛不盡月色滿輪臺少室山房集卷八
