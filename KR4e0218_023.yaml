body:
  text: 少室山房集卷二十三明胡應麟撰七言古詩一十一首嵩山歌有序去余家五十里而近有山曰嵩穹窿崒嵂峭蒨幽邃視洛之嵩高不知孰為伯仲也旁一峰千仞秀出􅏭嵲雲際若軒轅浮丘所嘗居者余因以嵩之少室名之且為作長歌以紀其勝異日者採三花攜玉女歸將結茅於兹老焉君不見嵩高之山高高出天半萬古扶輿結葱舊孤標突兀回日星秀出蒼茫界河漢恍疑帝遣夸娥負中嶽擲向東南鎮磅礴又疑巨靈一夜排風雷空中掣此青崔嵬仰觀宇宙豁俯瞰滄溟開天傾錦繡壁地湧金銀臺飛鳥不敢度猿猱為之摧層巒疊崿何竒哉倒影下墜扶桑隈㑹稽秦望相去但咫尺赤城天目左右羅列如浮埃絶壑迤邐飛梁縈洄空青水碧劃然蓬萊天仙跨鸞鵠時時下九垓遙峯插天更竒絶天柱嵳峩象緯列云是嵩高列峯三十六其一飛來墮吳越參差太華十丈蓮重疊娥睂萬年雪雲中之君紛紛拾瑤草散髮長歌弄明月朝來忽見黃帝車方明前導昌㝢趨七聖盡迷襄城轍却望天壇尋故廬頃刻笙歌起岩際白鶴凌空舞瑤砌乃是緱山王子喬金支翠旗朝玉帝真人一去不復還玉書靈笈埋空山俗流往往輕飛仙不見此后三千年少室山人結廬長嘯卧其巔峰頭一室但盈丈大易黃庭坐相傍紫芝空谷紛葳蕤真氣關門浩排蕩朝飱玉池露夜濯金屑泉明霞翼我體白雲怡我顔山靈候余户跂息不得眠一行卧此三十載上元夫人時往還俯視城郭真囂煩縞衣素氅何翩翩乘風幾欲凌蒼烟胡為羽駕尚躑躅惆悵孤峯夕陽落仰天大笑寒風生徙倚青藜望名嶽無乃未踐三花諾寄言廣成子浮丘公吾將跨白鹿騎蒼龍訪爾三十六峯中橫絶具茨凌空同歸來却卧此峯上千年一視輕鴻濛金華山三洞歌三洞曰朝真氷壺雙龍是黃初平升仙處薄遊金華山信足支短笻長嘯黃初平蹴踏金芙蓉芙蓉峰頭白雲起天風習習兩腋舉相傳古來洞天三十六乃是赤松真人之所理千岩拔崔嵬萬壑亘迤邐高欲凌空同側若摧鳥鼠括蒼與台雁瑣細不足擬帝鴻既長逝雨師邈難招回看昔日講堂洞却憶當時劉孝標九龍蜿蜒讀書處穹岩怪石摩蒼霄荒墳突兀葬彩筆至今詞客何寥寥講堂信鬱紆朝真益𢎞敞天門劃然開石洞豁榛莽恍然坐我金銀臺崑丘𤣥圃恣來往青虬赤鯉盡羅列三仙七聖時俯仰幽懷轉軼蕩勝槩杳莫窮飛梁百尺下窈窕舉足却墮氷壺中氷壺跨山腹氣勢何其雄何年虎豹穴置此蛟龍宫水簾參差直下五千尺銀河宛轉倒㵼雙白虹天孫雲錦織璀璨鮫人珠箔垂玲瓏飛流濺沫日夜不得息驚濤湧雪六月迷長空聳身出氷壺倚杖息餘峭舉頭萬松巔隱隱落斜照石羊紛紛望不窮突見雙龍挂寒嶠恍惚初平兄弟騎蛻骨遺此青天貌俯窺曲澗僅容膝解衣燃燭渡深黑行行不盡一線明萬乳熒煌噴蒼壁玉樹羅青葱芝田爛金碧誰持巨靈斧鑿此靈仙窟真人渺何許瑤草紛可拾枰間數子勢飛動細看尚記當年奕人言此穴穿四明天窗萬疊開蓬瀛摩挲仰視衆仙籙隱見若有胡生名吁嗟我今胡為在下土青鞋布襪濩落如流萍乃思昔日玉皇側看花醉卧芙蓉城木公徘徊向我怒授簡謫余離太清一落人間五千載滄溟浩劫㑹巳盈顧瞻靈境但咫尺奮身欲飛還不能倚杖還悲歌壯心浩難遏却憶雲門期瓢笠候明發回望金華山兹遊信竒絶餘霞映袍袖嵐翠尚明滅何當躡蒼虬長揖衆仙列提攜兩赤松永與塵世别寄三衢易使君惟效約秋深為爛柯之遊并懷蔡景明蘇以修易侯意氣天下無蚤年宦籍通皇都豸冠繡服天咫尺風裁落落長安途一朝使酒忤權貴憑陵太白歌嗚嗚埋輪有疏不得上拂衣大笑遊江湖瀟湘雲夢長在目却來東海談乘桴五花暫輟御史馬百里仍躡仙郎鳬江郎峨峨三片石屹立千仞東南孤題詩灑墨登絶頂白眼瞋視天糢糊桑田滄海倐變易九重特詔還金鋪梅花遍咏水曹雪清源皂蓋停菰蒲憶昔扁舟駐東郭驀然見我心神孚鹵簿江州却羣從胡床明月邀呼盧蘇别駕蔡大夫十日九日黃公壚夜擊青萍唾壺碎晝拈緑玉楸枰枯清源明粧十萬隊紅裙翠袖驕相扶淹留卒歲不忍别春風拂面吹屠蘇雲萍忽爾摧浪迹平原河朔成虛無踟蹰蘇蔡各分手閩山蜀道難追呼君侯政績何煒燁立驅千騎來東吳窮交念我宛如乍飛書往往尋屠沽一丘獨卧子真谷入門三徑嗟荒蕪雕蟲小技何足論眼空六合成狂夫青霞之君日候我斧柯欲爛三蓬壺玉局縱橫衆仙列雲漿一吸三千觚使君倘許岸幘過秋風八月來高艫章生持所業遊余門詩朂之火雲崢嶸照林薄赤日團空坐如灼高堂褦襶者誰子云是香溪少年章敏學少年十九能作詩沾沾欲問揚雲竒先生四十髮種種抗顔肯受庸人嗤新詩讀女吾動色東野窮愁浪仙僻電光雷鋏雙芙蓉爛漫苔痕土花碧君不見神物不遇張司空萬古豐城白虹泣小園杏花爛漫與客攜酒酌其下至醉牆頭昨夜春風顛醉著接䍦花下眠東方欲曙忘晨飱應門何客來翩翩城東郭君履欲穿手持三百青銅錢要我為客開瓊筵水晶之壺白玉盤銀箏翠管張哀絃吳姬度曲越女彈相將載酒臨西園西園萬樹紅照天杏花朵朵含春烟隨風故落蒼苔前恍如紅雪堆青錢摘花浸酒酬清酣主人勸客客不言人生豈得長朱顔眼前有酒不盡歡參差白髮來相纒君不見相如卧病歸文園笑殺長安羣少年又不見子雲寂寞耽草𤣥日暮何人回酒船何如醉挾雙嬋娟玉山酩酊長花前秋日泛舟錢塘觀潮放歌黑風夜簸滄溟水馮夷却走海若靡素車白馬來何方璇室瓊樓遍空起玉龍垂地五千丈銀河駕天一百里三軍巨鹿戰始酣萬甲長平潰難止胡生此時歸適越醉挾扁舟離江渚鼓柁初疑月窟中旋身已入氷壺裡雪山恍見釋迦坐一葦聊將達摩擬波翻魍魎泣浪跋天吳語長鯨鼓鬛如峻山電掣雲愁墮飛雨舟人漁子袖手不敢出篷底倉皇掩其耳是日胡生氣無比輕橈在手疾于矢白眼茫茫向天際欲乘長風破萬里回瞻圓嶠若咫尺東望扶桑聊徙倚即如魯連蹈豈得便逐靈均興難已君不見越王宫吳王宇寂寞空崖半頺圯日夜寒濤浸荒址滿眼豪華遽如許人生齷齪胡為爾乘槎八月差快意擊楫中流竟何以天寒日暮風轉疾倣佛鴟夷共相語朝來更泛若耶棹㑹挾西施從范蠡釣臺謁嚴祠作高臺倚空雙突兀釣絲下墜桐江石客星慘淡呼不應片片飛雲向人立憶昔真龍起新野百萬昆陽碎如瓦朝端但訪赤伏符澤中那問羊裘者逍遙建武垂裳初乃有物色來菰蘆新銜乍可授諫議故態寧肯回狂奴長嘯還歸富春瀨采藥桐君坐相待石上明霞照秋水峯頭雪瀑飛寒籟箕山潁陽杳莫覩太息斯人遂千古方干謝翺兩小子廢宅荒墳強為伍胡生抗志五嶽前中歲偶落風塵緣釣竿倘拂紫薇坐歸來與爾共拄東南天夜飲芙蓉館大醉放歌寄黎惟敬康裕卿李惟寅朱汝修初平騎羊去不返沈侯八詠空嶙峋劉生老死駱生竄誰令大壑回陽春君不見蘭州胡元瑞九齡學仙已成癖欲乘長風遊八極大鵬扶搖不肯騎幾度鞭羊復成石十五更作咸陽遊五花笑脫青貂裘酒闌大叫呼李白雪花飛墮長安樓是時真龍御皇極雙闕嵯峨象緯闢作賦寧論狗監知曳裾自許龍門客人前白眼雙飛揚誰其握手黎惟康李侯曉散禁廬直停車數過朱生堂相看意氣誰肯下握塵含毫破深夜萬象淋漓碣石宫千人辟易華陽社五陵軒車春不開狂歌獨上黃金臺拔劍起舞長虹摧睥睨燕昭王豎子非仙才荒碑零落翳榛莽其人白骨隨塵埃劇辛郭隗豈壯士汝曹自為千金來當時乃公用齊國臨淄豈得同蒿萊前瞻涿鹿野左瞰盧龍隈浮雲萬疊飛不盡但見太行山色青崔嵬入洛聲名晚差著掉頭忽出新豐市拂袖初辭上苑花持竿欲挂滄溟樹吕梁震澤天茫茫扁舟一葉飛錢塘鏡湖剡溪咫尺不得渡十月寒濤如雪霜孤峯指㸃嚴陵宅古木槎牙向人立羊裘客子雙眼青分我桐廬半江碧高臺祗合長垂綸誰知物色來衡門天閽突兀帝星遠十年五上空沉淪蘿薜歸來手還葺一笑文君壁空立生計猶餘二頃田謀身豈必千頭橘五侯七貴俱浮雲鄴侯萬卷堪橫陳男兒大業在金石那令七尺隨風塵醉墨蒼茫浩歌發紫氣東來照吳越文章得失心自知肯向朱門傍先達唾壺擊碎歌轉長美人天外空倣徨眼前齷齪誰相望大兒劉孝標小兒駱賓王後生不死亦前輩九原可作同翺翔遙遙八詠樓樓空竟何有樓中之人今在否袛今誰是東陽守㑹叱羣羊起太空卧看扶桑日西走賦得赤松宫為東陽盧祠部君不見赤松宫前赤松色夭矯輪囷際天碧霜皮不減三萬株鐵幹寧論二千尺初平騎羊去不回藥爐丹竈空崔嵬山中白石亂無數何人叱咤飛風雷君不見東陽盧君大竒絶前身曾受長生訣往來三洞躡明霞嘯傲雙溪弄明月朅來欲作人間游蒼生六合攢睂頭帝傍玉女不敢留飛行獨下崑崙丘挾書却走明光殿躍馬天街誰不羡栁色隂濃彭澤車桃花錦簇河陽縣一朝鳴珮趨南宫爐香畫省追夔龍退食羞為素餐士願將直筆回宸聰五夜排雲叩閶闔凜凜孤誠照丹闕丘埴寧增泰山峻微絲願補衮衣缺九關䆗窱環蒼龍燕臺白晝飛長虹曳裾止輦亦臣職拂衣神武來秋風衡門却返東陽舊落落松隂浮遠岫已見聲名重斗山更欲棲遲終宇宙名山咫尺黃初平石羊成陳來相迎天王明聖臣願足富貴浮雲何足論盧君盧君真丈夫直節祗今天下無從我且酌黃公壚漫學三閭賦沅水肯令董相淹江都一朝當寧思良弼飛詔東山起安石㑹教霖雨遍遐荒取次天門生八翼赤松之宫君暫居高吟抱膝聊吾廬三洞寧為長往客九重行問治安書題嶽陽樓圖危樓倚空欲千尺闌干下瞰洞庭色狂風盡捲蒼梧雲萬頃瀟湘照空碧江花冥冥日欲冷岸芷紛紛翠猶濕參差忽覩馮夷舞縹眇疑聞帝妃泣七澤縱橫渺難數九疑如黛尊前出舟人漁子棹空曠薄暮波濤歸不得樓中騎鶴誰者流此事恍惚曾同遊憑闌試誦杜陵句日夜乾坤相對愁歲杪送鄭茂才北上北風動地捲行色鄭子辭家赴京邑蹇驢欲踏東華塵手挈空囊行不得親知遍謁乞斗水往往白眼誰相識男兒意氣輕王侯有身七尺那用憂溪頭握手拚一醉驌驦且付黃公留君不見來歲長安百花發銀鞍擁簇歌姬樓少室山房集卷二十三
