body:
  text: 少室山房集巻十九明胡應麟撰五言古詩五首四知篇有序四知者歙汪司馬汝張中丞濠李通侯閩蘇參伯皆不佞生平知已之最也始余年十六遊長安遘萬安朱公賞識則惟寅業已上座延之中國士兩瑯琊而伯玉司馬助父中丞咸以傾蓋定千秋之契暮途却掃則君禹以督學踵建安滕公至却鹵簿踐蓬蒿卑卑執問字之禮焉即余匪其人而四君子之知余允謂平生之最矣余既沒林莽為一蠧羣書間方憑藉諸先輩寵靈以自見異代而十載以還二王滕朱相率殞逝越三載而四君子又相率而繼之蓋不佞生平知已於是垂盡而老泪臨風有不知其慟絶者卧病岩居永晝如嵗詳述顛末為四知之篇於戲伯牙之絃自兹永絶而君苖筆研亡所用其焚如已矣粤惟漢元封司馬兩當軸宇宙皆文章千載被芬馥明徳洪唐虞朝舉十六族婁江洎新都一網盡推轂弇州既龍奮太函亦虎伏白晝臨髙臺狂歌擊燕筑是時西曹彦年少四五六詩篇甚張皇文事稍局促丈夫志萬古不朽寧案牘經天緯地業九代喪空谷英雄倏相遇羣起赴秦鹿上駟誰先登遺編在斑竹丘墳並典索乙夜朗披讀列莊孟荀韓檀左吕公穀先秦數作者鞭弭恣馳逐當其神理輳罔顧毫穎秃穹碑峙山陵巨碣控河瀆餘事拈風騷不脛走遐隩烟濤漲渤澥英聲振獯鬻騰身上将壇號令鬼神哭追奔極窮島蛟蜃碎屠戮華銘勒居胥京觀自天築八翼摩丹閽上謁九州牧帝命總六師長城倏如矗大纛巡邊疆軍吏道匍匐安危係中外閩楚遍尸祝功成戒盛滿洞霄乞微禄戲彩娛髙堂孫枝競蹙鞠仙人鳳與麟園居各洗沐居公季孟間嵗寒訂松菊製作頻賡酬緘裁遞往復交親劇杵臼調洽迥敔柷沾沾問蘭隂笑我甘韞匵相逢武林道傾蓋洞肝腹宛若平生懽坐久屢更僕床頭出雙劍光焰凜霜鏃感公思纏綿囊底叩餘蓄花生七百字草墜三十幅公時奮蒼髯誇我才萬斛眇論開醍醐清言佐饘粥乗興過弇山諸峰插平陸仙翁絶頂下執手道寒燠黄池挾日飲代興話濠濮巧匠無旁觀良工有預卜三人坐丙夜相親互以目曾參唯曷疑季路諾庸宿含悽别英風衣袂盡滲漉迴瞻縹緲雲廣厦遽傾覆輕舟發嚴灘白榆訊孤獨兒童若走卒競指司馬屋公也聞余來傾筐倒庋簏将余入後堂明粧照羅縠椎牛擘黄熊輿儓厭梁肉吳生歌落梅謝生辨幽菽憑陵屋如椽東歸記草木五噫序窮愁孤憤志幽鞠鴻章過十餘晨夕驟登録睊睊噉名子藝苑對顰蹙余也百八章呻吟亦成軸河梁迄揮手泪眼暮簌簌寥天僅一柱靈光鎮大麓将偕石羊君吾里永辟穀胡然跨飛鯨倏爾殘妖鵩空觀疑地文神遊恍天禄當年讀書臺闌干長苜蓿名已擅八荒聲猶借四服良哉副墨子百代稱郁郁惟公晩遇余盟契匪碌碌乾坤失遺老病骨祇盈掬舉頭拘翼宫鈞天醉秦穆山香舞未竟飛花墮如蹴知公究浄業不受轉輪福追隨無量夀永刼住西竺右新都汪司馬伯玉七十三韻明維嘉隆世率土皆琳瑯前茅奮厯郡大樹標婁江東南並虎視河洛誰鷹揚張公起汝鄧九尺鬚眉蒼追風躍兹白掣電飛乗黄腰懸兩龍劍絶代俱干将燕臺際天起黄金矗華陽公年十八九掉臂排楓閶都人詫玉潤夾道觀河陽含香入建禮待漏趨明光明時甫釋褐吏部聊為郎青藜校中壘畫㦸持東方一官等泡幻千劫寧存亡維時西曹雋六七争騰驤分麾軼兩漢授甲陵三唐張公奮臂入操翰如長江流星控繁弱貫月浮餘皇金膏麗若木火齊明扶桑維揚怯旗鼓下雉靡旌􅓚髙牙矗梁苑巨纛懸徐方睊睊絳灌目謗牘如螟蝗羣雄一網盡竄削盈遐方鹿冠挂𤣥武一笑騎天狼天風拂兩袖被髮還山岡渌波帶瀍澗翠黛縈嵩邙蘇門扣真諦王屋求仙方蒼生半眼熱薦辟交岩廊丹青遍畏壘無地潛庚桑驅車入函谷紫氣流咸陽瑯琊遇次美櫜鞬劃相當曹劉倡鄴下蘇李酬河梁英詞錯金石逸調劘風霜庚辰計羣吏摳趨亦明堂伊余黑貂敝青衫卧篷窻長安一傾蓋大叫呼元長名流本第一國士元無雙潦倒南皮社分攜劇黄粱寥寥二十載復此聆篇章嘉隆數六子吾汝成髙陽矯矯瑯琊鉢授衣命如螿平原十日飲異味窮膏粱燕姬及趙女寒鼈庖嘉魴雄譚走蠻觸劇論驚蜩螗山川墮秀色宇宙迴精光帝心雅推轂大府開平凉飛書走北塞諭檄平西羌峨峨受降壁三城夾銀潢殊勳勒銅柱萬仞臨要荒華名既海岱鉅蹟仍疆場寧知息壤誓不救中山創功成合身退鳥盡知弓藏人生貴適志嵗月如滄桑築宫近河渚丹青儼成行金釵七十二如花簇銀缸赤松永辟穀大隗遥舂糧途逢廣成子餽藥盈筐箱時時發緘鯉詢我騎羣羊庸知兩孽豎作劇蟠膏肓寥天逝雙舄玉樓路茫茫丹臺易遷少要秩居文昌中原二三子振袂俱飛揚迴眸盼塵世鼯䑕跑空倉神州逐麟鳳阿閣馳鸞凰通都洎名岳百代留青緗濬沖復少達英風嗣王楊新聲播琬琰舊業呈圭璋雞羣覩野鶴意氣時昂昂佇看汝南族奕奕傳芬芳右汝南張中丞助父六十八韻於戲戰國後永絶原嘗風五侯洎七貴紈袴矜豪雄岐陽本懿戚帶礪盟元功惟寅奮甲胄巨筆如長虹英英楚遊集弱冠推文通明霞傳兩頰皎日流雙瞳亭亭古玉樹百尺懸蒼空騰身起宿衛帝夢來飛熊晨趨景陽漏夕儤承明鐘餘晷輒賦詩髙吟月朣朧前鑣逐濟上後乗馳江東丰姿寄朗潤句格諧纎穠憐才實天性下士惟謙沖門庭盛交際軒車沓雲鴻傾心放崇伯握髮模姬公八荒並九域踴躍歸樊籠涓流赴溟渤尺土依衡崧逡巡抱一藝疇不懐登龍尤欣禮寒素率土皆吾宗華名譟逺近帝眷彌優崇陪京借管鑰𤓰步羅艨艟江流照横槊徹底瑩青銅長驅白門道夾路停花驄車前八騶列一笑卑王融夜登鳳凰臺謔浪青蓮翁糟丘亘阡陌雲車盍相從朱旗閃碣石七萃提兵鋒貔貅八十萬操戈候元戎月支奉舊朔日本祈新封狼烟絶張掖獵犬迴居庸胡床挾僚幕羽扇揺清風當筵盡珠履金釵錯簾櫳時邀四方客大集華陽宫纎腰舞静婉艷曲歌玲瓏慈恩結永夏景福逃殘冬西山四百寺寺寺懸詩筒賢勞動當宁寵渥流宸衷勛階埒師保晉接何從容三朝憲吉甫文武攀宗工登壇兩突兀推轂雙穹窿安危係中國絶徼傳精忠有如汾陽令華夏叨帡幪虵分匣寶劍鳥盡弢良弓參差薏苡謗一夕流丹彤欣然釋重負長嘯還隆中青門種𤓰地五色開䝉茸閉關却人累習静眠髙舂食經減何𦙍飲量增盧仝交遊遍宇内若箇娛幽悰維余二三子旦夕攜孤笻伊余夙邂逅丱角遊新豐當塗一傾蓋拍手呼終童名篇誦池草繡句繙江楓君能汰禮法余亦忘疎慵深盟三十禩膠漆盤心胸河梁劇酬倡流水鳴絲桐将因畢婚嫁把袂尋韓終云胡玉棺下冉冉移空同死生竟長訣去住殊匆匆河山夐猶昨九原邈難逢虚堂翳圖籍别牖扄笙鏞天池涸大澤日觀頽孤峰千秋信陵誼百代臨淮蹤吞聲遍韋布飲泣環章縫佳城甃白石馬鬛浮蒼松靈虬逝天末泪目懸孤蓬雋聲逮嗣服蘭桂逾芊葱君看白雪調奕世標芙蓉右盱眙李大保惟寅六十八韻七臺髙刺天九漈逈浮日真氣蟠山川逢時異人出矯矯蘇君禹天才實飛逸名宗自峨眉源委繼洵軾一目餘十行填胸半緗帙弱冠升賢書閩士歸第一講業嗤京房窮經誚王弼雋聲洽㝢内光焰難具悉三呈大禮賦彤庭授清秩西曹擅文衡前輩曾六七居然躡其後功欲收蚌鷸督學來吾方神明朗無匹紛紜簿書藪推案風雨疾吾鄉萬青衿手自標甲乙絳帷細雌黄百中副名實衰風遂一變彬彬有文質曰余抱沈冥廿載廢羸疾塵埃蔽行逕塞馬忘得失推誠却鹵簿逕草踏蒭苾逡巡越三顧甕牖忍長窒衣裳劇顛倒面貌恍親暱雄心貫今古風雅恣評隲揚馬枚曹流一一研學術燭花爛長筵丙夜互前膝千秋覈本支八代綜作述調合饒笙鏞情投鋭膠漆君誠左太沖余愧皇甫謐河梁一倡和乾坤對蕭瑟翩翩臨海丞仗義討兇泆邦人昧逆順背叛擬佛肸義激胡先生昌言鄭莊驛維君企英風罔待齒牙畢移文下州郡意氣逈逾溢祀典貽明神幽光播泉窟遂令談藝士赤幟樹髙密燁如開𤣥黄儼爾脱梏桎君行五嶺遥余戀一丘佚美人隔蒹葭志士掩蓬蓽濠梁析莊惠疇為吐奇崛三秦豪傑徒强半坐捫虱去年聞子歸長齋事繡佛鑿度推盈虚元苞洞凶吉晨興得雙鯉渾身欲翀翐舉頭望赤松羊羣政堪叱言尋十六天幔亭訪芝术輕紅劈霞茘重翠剖霜橘甌寧拜滕師龍門莽崪嵂凄凉國士泪亂洒向溝洫古墓辭松楸新居問秔秫登君讀書堂卧君𤣥草室淋漓金叵羅燦爛銀不律斫地偕飛揚談天鬭真率三千大千界微塵罔漏軼九十六聖君賢愚任陟黜落落雙干将星河翳䝉密舂糧十日期此會豈難必造物真小兒文章引􅎱嫉白雲乗帝鄉一老竟疇䘏慟哭西州路風雷鼓寒栗屠龍絶朱泙窮鳥困趙壹玉樹摧庭階神理殊慘慄惟應咸池奏萬古破蟋蟀右温陵蘇學使君禹六十二韻孤憤篇挽王山人叔承八百字有序始余讀山人吳越諸遊草異之顧其人未識面也庚辰秋息駕杜門忽閽者以曹生書來稱山人往攜一刺入長安城亡所詣閉篋中廿載矣今特持以詣足下辛毋訝其漶滅也余亟倒屣出迓山人十日齋頭縱談風雅本支流别殿最雌黄莫逆於心相視而笑人皆以山人不言備四時之氣余知其滑稽玩世大於東方也既與余訂盟江上明年余入弇泊舟垂虹問所謂十八橋者而太湖三萬頃浩渺亡際范張雞黍竟爽成言又明年余復入弇適山人躡草屩貿貿來迺長公病卒不起慟哭弇山之堂再信别去俄寄余手札千言情致委篤而五言一律云千秋詞苑劇萬態筆鋒新以余綴詩藪初成帙也後十載聞問中絶邇遣役詢諸吳門則山人墓木拱矣余不勝悼怛爰麤述爾時邂逅顛末倣青蓮送魏萬體為五言古八百言而輟其三韻韻亡旁出者故也詩成致二子焚之几筵以告山人山人靈爽奕奕且擊節浩歌于大羅之上矣千秋布衣才往往專一壑窮年覔五字埳穽觀海若唐維襄陽孟間代推製作嵬峨洞庭句元氣攝林薄五季宋及元餘音噪烏鵲非無二三子天授慙磊落有明盧柟氏騷些首恢拓途遵長卿轍步躡左徒躅幽鞠及擬招囹圄盛刪削詩歌遂非長風雅久寂寞茫茫鹿門緒一綫綴寥廓王生起菰蘆名姓早飛躍弱冠遊燕齊强齡走京索長懐濟時念雅抱經世畧無媒恥白玉草莽甘落魄禹穴繙圖書堯天㺯畊鑿傲誕偕東方曼衍類南郭敢為蘭陵論偏究漆園學神來把觚翰六藝盡糟粕竦身出闤闠攘臂脱籬落四唐入經營六代佐伸縮大篇競飛揚短什互沈著星河晝璀璨雷雨夕噴薄混沌迷雕鏤震旦困籠絡鏗鏘鸞鵠鳴突矯虎兕攫名姓聚倡樓老将鎮戎幕張公兩神物所向失盤錯太華三芙蓉秀色照廣莫懐中但一刺塵冠翳竹籜時無孔文舉竟爾徒入洛維時嵗申酉芒鞋試行脚訪我蘭隂陌孤航載停泊披襟發長嘯搏帽吐清謔易水雙湛淪夷門兩嚄唶結交詎同裴登仙儼偕郭平原十日餘緑尊間翠杓微誠洩中夜萬古對斟酌明時遘何李天心寄鳴鐸人豪瑯琊公乾坤縱揮霍繼起維奉常詞林創新薙斯文幸未喪大雅竟誰托吾意甘沈冥君才實磅礴無雙國士韓常勝冠軍霍鹿失餘中原龍騰絶大漠厯下窮髙華成都侈宏博勉哉曹溪鉢毋令一士諤沈吟感子意踟躕復前却明燈徹曉漏撩亂燭花落倉皇嵇阮契竟爽范張約垂虹亭下浪浩淼阻越舶一别俄十霜邂逅弇山閣爾衰背欲鮐余瘦膝乗鶴吞聲話故舊喪逝捷飛藿起舞中自疑放歌久仍愕眷言懐故棲荏苒理歸槖河梁白日墮一葦迅鵰鶚伊余骨伶俜念汝神矍鑠相期保玉體赤松問靈藥胡為兩豎子膏肓恣燔灼虚傳段璋句竟坐杜陵瘧生平褐衣貴不受帝王爵大鳥來滄溟神虯去碧落百身定奚贖九原亮難作嗟彼志與蜍牖下飽狐貉維汝賦頌聲􅏭嵲表衡霍居然布衣雄八面控繁弱修文亦地下玉樓富丘索遮須奉新盟眭邃赴前諾緬余昔遇汝臭味恍荃葯𤣥宗各諷詠妙理遞酬酢濠上迴周施江東析昉約朱絃斷流水陽春咽冥漠荒阡月三尺破冢雲半槨參差迹已陳宛轉夢如昨夜臺覔青蓮攜手共杯勺老柏鳴鵂鶹枯松照熠爝談天悵鄒衍擲地愴孫綽生芻愧晚暮永閉石門鑰白楊號悲風萬疊鬭蕭索崑崙眇何處南面醉王樂少室山房集巻十九
