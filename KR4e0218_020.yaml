body:
  text: 少室山房集卷二十明胡應麟撰五言古詩四首庚辰夏五月念之二日余三旬初度也碌碌塵土加以幽憂之疾靡克自樹俯仰今昔不勝感慨信筆抒懷六百字浮生寄天地瞬息如風霆回首塵埃中倏已三十齡家人慶初度漿酒羅前庭寧知志士懷百憂中坐并粵惟肅皇世婺女流星精休禎兆前夢抱送錫嘉名三冬學頗足抽翰預時英才非正平敵賦奪文考聲垂髫謁帝里弱冠棲神京散髮昭王臺萬象愁憑凌悲歌問屠狗擊築偕荆卿郭隗豈佳士樂生徒老兵登髙望幽薊長嘯盧龍營風吹大漠雪亂灑寥天青盛時方罷戰絶塞無王庭徒令終童策默默不得鳴蕭條對裋褐激烈投長纓飛書入詞社授簡羅簪纓羣公競識面大匠遙尋盟清談墮玉塵劇飲呼長鯨華陽莽空濶碣石髙峥嶸千言照白日隻字懸青冥風塵一朝異聚散如流萍衣冠競祖道却出長安城含凄問歧路息駕還林坰袖中兩龍劍錯落埋寒星窮年卧深巷白眼橫柴荆時人不解識往往呼狂生咄嗟大運謬采藥尋仙靈翛然負瓢笠獨往事遐征絶壁聳天姥飛梁橫赤城千花鏡湖緑萬樹錢塘明金華最咫尺蘭隂窮絶陘道逢牧羊子恍忽黃初平將隨赤松去永與塵世冥寧知浣紗地物色來娉婷飛揚靦前事占畢起浮名低頭拂殘蠧眯目囊流螢雖勤伯樂顧豈投國士情匪乏鍾期知流水難為音遲回十年內強半居敧傾雌黃逐兒輩粉黛隨優伶南宫籍初上東山意彌醒橫金亦何有拖王非吾誠逡巡計偕嵗屏迹留家庭為園寄莽蒼鑿沼浮清泠含菽奉髙堂釀秫邀同盟芳春愴庭樹雪夜懷原鴒寧乖四方志實恐壯節零遘兹懸弧始涕泪摧生平戀舊迹已往感來念逾嬰昔居少年坐今為強者形容顔漸凋落齒髮非神明千秋竟何以百嵗詎足營煢煢六尺軀皇皇五鼎榮豈無箕山穴亦有谷口扃逝將守初服畢世窮遺經鴻裁列琬琰大業垂丹青藏書遍五嶽濯足凌滄溟却招兩黃鵠萬里還瑶京憶在京洛遇鳴臯遊契甚洽一别五載鳴臯既赴召玉京余亦轗軻家難偶祝生如華攜所業印正門下詩以勗之昔余寓京華紅顔髮垂腰翩然遇祝生里閈同遊遨矯如長空鶴清唳聞九皋呻吟落珠貝咳唾飛璚瑶奇情兩突兀衣被長飄飄青箱破萬卷白眼持雙螯調笑謫仙人騎鯨墮煙霄悲傷杜陵叟二頃荒衡茅馬遷下蠶室相如困中消東方枉設難子雲徒解嘲造物真小兒役我隨塵囂黃土摶下愚茫茫若蟭蟯南陽貴賔客什九橫金貂盜跖葬東陵髙墳鬱嶕嶢伯夷餓西山腐骨湮蓬蒿陶朱竊西子黃金壓波濤屈原有何罪委身飼魚蛟為善福安厝為惡刑安逃長當畢吾願痛飲歌離騷狂思捧北斗醉欲呼天瓢玉女令鼓瑟仙童使餔糟窮年誶司命真宰為嗷嗷以兹訴上帝帝怒馳神飈雷公擊天鼓屏翳噓風潮青天拆龍劍易水寒蕭蕭吞聲出京洛灑泣沾河橋一與此生别三年隔東郊煌煌白玉樓倏已升岧嶤山陽愴鄰笛玉洞聞鸞簫歸來瀫川上一室藏鷦鷯俗子遍闤闠可人費招邀塵埃閉窮巷草色盈疏寮科頭誦四部赤腳翻緗縹蟭螟鑒止足偃鼠明逍遙皇天未悔禍家門日煎熬慈親悴霜露稚子埋山椒晨牝噪髙堂孽狐瞰林巢戚戚類馮衍皇皇逾孝標人生亦何樂七尺徒煩勞逝將棄家室六合窮荒要翩然挾大鵬九萬騰扶搖嗟咨念良友宿草迷荒坳陽春慨永絶白雪空長謡歡言遘之子興文自垂髫飛揚慕古昔跌宕扳賢豪沾沾問奇字片語為神交斯文久淪謝玄閣長寥寥爾志亮金石遺風未全凋抽毫述往事贈汝為虔刀勗哉丈夫子努力追前茅將入金華諸山述遊五十韻昔我遊崑崙長嘯望玄圃手拍浮丘肩濩落還下土帝閽不可扣頻為世人侮蒼茫五龍蹻旦夕無所伍飄風從東來吹我向齊魯徘徊岱宗側萬象劃爭吐遙空勢崔嵬大塊色消沮幽燕各羅列梁宋但仰俯龜蒙與鳬繹培塿不得數昏黑留天門海日正可覩白雲封中出片片墮梁父晨窺金銀闕玉珮遍廊廡警蹕懷祖龍鑾輿憶漢武調笑七十君空名竟何補荒碑亦磨滅遺迹半塵土回首徂徠松亭亭尚堪撫恍惚秦時官蒼然大夫五何來安期生相對形貌古攜我登雲車縱橫擘麟脯掀髯但一笑東瀛復斥鹵却下丈人峰行行至南楚鼓棹潯陽流吹簫洞庭浦三湘亘七澤茫茫散樓櫓放歌答魚龍懷才弔鸚鵡初聞黃鶴遊忽覩馮夷舞九疑何芊綿離立向平楚宛轉雙蛾眉慟哭摧肺腑萬古蒼梧雲不散黃陵滸緬思向衡嶽改轍望岩户裏足捫嶔岑決䇿窮齟齬絶壁棲鸞鳳層巒攖虬虎石留媧皇煉崖豁巨靈斧嵯峨大禹碣窈窕祝融府千峰既騰擲衆壑亦旁午舉頭觸支機側身見河鼓海月明冠簪天星拂綦組朅來歸東皋屏迹偕溺沮薜荔交岩房蓬蒿翳環堵灌園事於陵飯牛狎五羖短褐嵗載隂長鑱日卓午感激何時平形骸亦良苦咫尺金華山洞天列吾婺霞氣連赤城霜華拂天姥石室函金書丹臺祕鴻譜瑶草紛可飱青精賸堪咀壯哉神秀區逖矣靈仙塢翩然羽翼生白晝還紫府李生歸東陽益肆力千載手札寄余幾數十返推挹過甚彌非所安報贈六百字曰余抱遐尚念載卧玄閣逍遙榆枋下矢志遊廣莫一室羅青緗萬卷恣棲託門無問奇客與世久枘鑿匡牀起亭午髮散仍赤腳空齋垂藤蘿兀坐數花落苔痕閉重關何自來剝啄有美東陽生意氣本卓犖夙昔瑚璉姿弱齡自追琢上下三千年珠璣吐錯落雅志親典謨玄悰攬墳索莊騷逮左馬一一窮槖籥逺甘杜陵豪邇嚮弇州博矯首金華顛誰其嗣述作後起凌宋王先驅併劉駱片刺懷十年名姓漸凋落願言申末契一過傾伯樂維日大火流空簷噪鳥雀清風惠然來瀟灑動林薄感汝纏綿意褦襶亦何惡倒屣迎嘉賔衣裳不遑著呼童割菘韭班荆坐籬落滌釜燔枯魚提壺勸清酌殷勤效明璫繾綣斟翠杓舄履何繽紛觥籌亦交錯把臂遊鴻濛懸心契冥漠歡來不知疲軟語間清謔淋漓契肝膽鄭重吐然諾雄文詫鸚鵡麗句誦鳷鵲狂歌發清商中夜互踴躍嗷嗷曼倩齒泯泯五鹿角典衣困鷫鸘掩袂嘆龍蠖十載豐城劍漶漫斗文剝一朝遇張公紫氣貫碧落努力追前修遺編在先覺吾衰亦已久豪舉徒嶽嶽頭顱遽如許精爽漸銷鑠緬思少年日挾䇿走京洛荆山並韶潤姑射方綽約人驚士龍筆世許袁豹學昔苞鸞鳳文今愧犬羊鞹薜荔懷佳人菰蘆憶髙躅登門遘國士况乃同一壑萬斛吞餘皇千鈞控繁弱邂逅蓋己傾縱橫思仍拓望望琅琊雲瑶池斷笙鶴乾坤泣大老海岱遇韶簫典刑四部存巍巍見遺矱中原失秦鹿上國誰宋鵲舊社紛摧頽新知乍欣樂照乘隋侯珠連城卞和璞平生實憐才見汝難落落酌汝青玻璃珮汝錦芍藥贈汝五色翰如虹跨寥廓汝實河宿精吾寧北海若小道未足觀大方詎難作瀫江一杯水倣佛共濠濮翩翩李公子毌爽代興約少室山房集卷二十
