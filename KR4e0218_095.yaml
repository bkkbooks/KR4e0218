body:
  text: 少室山房集卷九十五眀胡應麟撰奠文十首奠王太夫人代直指蕭公維坤元之肇育兮挺茂德于姬薑降輜軿于巨閥兮佐鼎鉉于眀堂鑠天孫之雲錦兮衷月媛之霓裳御東陵之玉舄兮捧南嶽之金璫夕西華而侍宴兮朝北極而偕翔輔臯夔于密勿兮翼旦奭于眀光劑梅鹽于閫閾兮紓內顧于巖廊昭肅雍于寢廟兮篤婉娩于家邦肆大廷之簡命兮蜚紫誥于長楊茂賢聲于綸綍兮永哲譽于縹緗峩翟冠之璀璨兮被象服之煒煌既柔嘉之爾式兮聿聖善之彌彰胎上真于紫極兮誕殊質于閨房授靈圖于廣莫兮閲人代之滄桑朝太真于丹闕兮職女史于軒皇挈琅琊之二輔兮吏香案于文昌洎鵷雛之並育兮矯汗血之飛黃騁空羣之絶步兮儼特逹之圭璋和陽春于郢國兮肩赤幟于調場猗婦儀與母訓兮隻今古而疇雙極生人之竒遘兮軼眀盛之嘉祥謂遐齡其川至兮萃百順之繁昌起東山于捉鼻兮符渭水之琮璜斡璇璣于帝座兮繅黼黻于天閶耀千秋之彤管兮標令淑于旗常胡溘捐于一夕兮回鶴馭于窮蒼超閻浮之混濁兮遡兜率之微茫慟萱庭之萎蕚兮咽蘭砌之摧芳錫珠𥜗于絳陛兮瘞閣樹之琳琅跂音容之聳絶兮杳河漢之湯湯望易遷于霞外兮渺去路之悠長某辱師門之鑄造兮尾驥足于康莊拜緇帷于堂下兮竊懿範于羮墻驟訃音之耳屬兮詠白馬而悲傷紓惠文于鄰境兮愕夢寐之倣徨束生芻以寄奠兮絮濁酒于椒觴惟鳳簫之鑒陟兮歆薄酹于微腸尚饗祭胡太夫人維姬薑之窈窕兮育靈爽于坤維降輜軿于南嶽兮雜霞珮之離離繄惠心之婉娩兮昭四德之咸宜羌女紅之馴習兮聿婦訓之修持爰作嬪于巨閥兮蓁桃葉之維時肅􅔱滫于中饋兮薦蘋藻于先祗相夫君于帷幄兮暢威武于邊垂佐嫖姚于朔塞兮煜飛將之搴旗騰令聲于帝座兮躬象服之紓徐雛九苞于丹穴兮翩五色之長離肆丸熊之煢瘁兮俾典籍之如飴規詞盟于壇坫兮濯文采于漣漪腰斗牛之雙鍔兮組雲漢以為綦既肅雍于蘭壼兮亦聖善于萱墀謂百齡之爾錫兮偕白首于娥眉覿侯封于燕領兮辨汗血于黃驪胡溘捐于一疾兮載天末之鸞旗升大羅于廣莫兮滿謫籍于仙期覲上元于髙闕兮武蕚緑而逶迤目飛瓊而一粲兮訝㺯玉之來遲悲秦簫之獨奏兮析連理之仳離痛象賢之遐慕兮泪雞骨之淋漓某等竊通家于載世兮欽淑媛之芳儀挹餘休于令哲兮祝純嘏之維祺聞訃音而躑躅兮麾白馬而狐疑傷昊穹之弗弔兮紛扼腕而淒其陳束芻于枯絮兮冀肹蠁之如馳維素軒之來格兮下青鳥于瑶池尚饗祭內兄舒允升繄蘭隂之崷崒兮峙瀫水之淪漣肇人文其蔚起兮育靈爽于東南誕神眀之華胄兮遡家學之淵源振襟珮于芹黌兮欽髫鬌而譽延羌下帷而發憤兮絶步履于窺園驅盧王于后乘兮揖楊馬而周旋美室家之窈窕兮協麗藻于蘋蘩遞和鳴于閫閾兮鼓琴瑟于朱絃維槐隂之鬱茂兮茁世澤于藝蘭儼三珠之林立兮森玉樹于詞垣肆棘闈之飛步兮奪標錦于青錢矯垂天之大翼兮兆水擊于三千既龍門之屢上兮亦陳賦于甘泉期彤庭之獨對兮躍飛兔于天間排雲霓于閶闔兮暢鴻碩于奎躔軼經綸于董賈兮邁術業于歐韓胡溘捐于一疾兮仆逺志于盛年渺太清之獨遊兮蛻凡骨于塵寰載靈輀于道路兮歌薤露于新阡咽寒風于丹旐兮杳騎氣之翩翩嚴親白髮而閭倚兮痛長夜之漫漫繐帷愴以獨處兮望隴樹而哀嘆式諸昆之聳肖兮肻堂構于象賢洎孫枝之觸目兮紛振後而承前雖永逝而猶生兮卑輕舉于大還都髙門之突兀兮欣結駟之軿蕃恫余心之震栗兮悼白馬之遲延渺生芻之一束兮奠泂酌于穹泉維雲軿之來格兮下笙鶴于瑶天尚饗祭陳太翁代巡臺李公維嶽降神是生甫申孰為之先積功纍仁於赫封翁淳慤天授中州孕靈大河育秀樂志丘樊鷟翥鴻騫矯矯亭亭羽儀八埏仲舉髙標太丘偉度日揭星懸海涵地負躬修至道畏壘之陽俗里薰蒸比屋善良靡畜弗通靡隱弗耀翳翳堂槐蔽芾清廟佑啓我師名世儒宗六翮雄飛昌辰奮庸釋褐軒墀鳴弦井邑桃李盈阡桑麻被域乃膺簡命徑蒞淮漕芻粟千倉雲屯田郊貪墨劇心豪強攝氣南逮吳淞北訖燕薊十祀霜臺白簡豸冠為社稷臣貽四海安天子曰俞撫我京國爰開大府百吏受職何教非翁師鋭于承何澤非翁師沛于行駟馬髙車翁門既闢鳳誥霞章翁既報食芝蘭繞膝戲彩含飴五福萃躬若固有之拭目經綸霖雨一代遹觀厥成兆姓允賴云胡二豎奄勿膏肓躡霧乘颷遊于混茫仙馭翩翩瑶臺鸞鶴白雲在天帝所甚樂煢煢我師純孝夙鍾罔極劬勞哀感昊穹翁卧一丘翁德萬姓舄奕融昌全歸奚恨某濫竽堂廡厠列門墻沿遡淵源嘆慨望洋聞訃震驚匍匐奔走白馬皇皇羈馽官守生芻一束逺致微誠方寸飛馳搖搖斾旌有醴在筵有牲在俎徙倚青虬降格下土尚饗祭劉封翁代督學洪公於戲碣石之靈醫閭之精挺生人豪太阿發硎燁若孤霞炯如列星百尺無枝矯矯亭亭懾暴鋤強掖懦扶傾族黨比閭恃公輯寧武略鷹揚文鋒蝟興材捷數竒脫銜浮名遁迹窮山修持姹嬰布襪芒鞋棲神練形草拾金光芝粲玉英丹霄跨鳬赤岸騎鯨榖貽冡嗣翀騰一經掣電西池摶風北溟試宰百里繽紛頌聲帝曰循良首鐫御屏作朕耳目天垣驟升有赫鸞章飛馳大廷鬱鬱堂槐邦家幹楨偉哉維公遹觀厥成移孝疇先勿欺是徴苟利宗社毋恤生平黃門矢操維白維精請劒尚方朝陽鳳鳴封事萬言海隅艷稱檻折輪埋飛霜晝零公食為甘公飲為頳詎曰投荒天王聖眀嶽嶽髙風人倫重輕大賔鄉舉允協輿情紫氣青牛回翔漢京謂越期頥千億斯齡云胡一疾奄忽遐征擁霧乘颷十樓五城廣陌哀恫窮鄉悼驚國逝黃耉朝嗟老成某等夙叨世講邁融若膺筆研追隨通家過庭企祝嘉祥五福備登溘焉聞訃躑躅屏營白馬生芻倣徨斾旌既束官守彌傷典刑泂酌陳詞涕集如傾維公鑒格聿來雲軿尚饗祭劉太孺人代觀察林公靈光孕育兮維婺之躔順德凝承兮繄坤之元肄籍龜臺兮雲裳霧鬟握手二娃兮降于江潭名門作嬪兮令聞廣延舜華燁敷兮有渥其顔夫君式好兮婉嫟靜嫺髙堂視膳兮肅雍毖虔申椒雜芳兮陸離蕙蘭禋祀克共兮拮據蘋蘩妯娌繽紛兮閫無擇言臧獲優遊兮強力自前操臼若光兮提甕若桓彼蒼胡奪兮一蹶弗旋哲胤垂髫兮泣血汍瀾支床雞骨兮抱經熊丸紫氣燭穹兮太阿龍泉賜履尚方兮花栽鄴樊八翼雄飛兮集于禁垣正笏垂紳兮驅除佞讒直聲振代兮於維象賢綸綍輝煌兮聖善廣傳躑躅黃門兮板輿夢懸飲恨終天兮莫贖九原亂曰乘罡風兮鳴珮環左赤豹兮右文鸞厯瑶池兮餐大還靈昭昭兮樂蜿蜒從夫君兮日遊槃閲東海兮成桑田産渥窪兮遊天間駕屬車兮鏘和鸞曠祿養兮渝斑斕憶劬勞兮衷愴煩嗟罔極兮慟潺湲美孝思兮劇纒綿和楚些兮垂千季祭俞太封翁文代張眀府維公洞庭育秀陽羡儲精懷琳抱璞履素含貞隱迹丘園長嘯雲岫氣軋虹霓胸蟠河宿七尺之軀萬夫之雄龍泉太阿孰嬰其鋒施弗近名善弗期報大德弗彰髙門迭耀桓桓吏部玉質金相南宫奮迹天署翺翔矯矯令君人龍文虎擢桂禮闈掄魁天府於惟眀公遹觀厥成生人至樂宇宙孰榮居貴日虛處盈愈下閭巷青雲鄉邦大厦納汙含垢排難撫災太丘之度義方之懷僉謂燕貽維公足法僉謂顯揚維公為烈龍章燦爛鳳誥熒煌朱紱方來于彼廟堂矢畢百齡維祺夀考為世靈光為時大老云胡一疾奄忽夜臺乘風騎氣返駕蓬萊月犯少微峰摧岱嶽薤露興歌松關冥漠皇皇哲嗣煢煢賢孫當官聞訃摧裂心魂某等沗竊同袍因緣年誼骨肉通家情均靡二方憑耆宿示我周行典刑澌沒五內如崩敬束生芻將此泂酌來格惟公遙天笙鶴尚饗祭陸黃門猗歟陸公矯矯人龍豫章驊騮寶玉大弓奮翮摶霄剖符百里單父絃歌河陽桃李循良比迹豪獷革心仁孚赤子教洽青襟天子曰都汝來禁闥紏繆繩愆拾遺補闕猗歟陸公進思盡忠正笏垂紳百僚斂容直道難容一麾海嶠息駕投簪徜徉嘯傲裴公緑野謝傅東山六合蒼生延頸賜環帝念老成朝訪耆舊鳳誥頻飛蒲輪逺就謂公復起握樞秉衡大廷耳目當寧股肱詎意雲軿溘焉長逝九列興悲萬夫殞涕某髫齡沐教庇藉恩私提攜卵翼慈父仁師泂酌載陳生芻載束佇望瑶笙聿來空谷尚饗祭葉叔眀文奕葉華宗兮越海之隅誕降精靈兮婺女之墟南金貢闕兮漢維相如六館肄名兮翩躚長裾水竹會心兮人境是廬平原河朔兮聿來髙車緗縑四部兮鄴架廣儲八代神交兮三唐拮據瑰詞藻發兮秋江芙蕖令譽光融兮木難瓊琚捧檄金門兮趨蹡石渠枳棘卑棲兮鸞凰乍紓武夷九曲兮洞天踟蹰霞色幔亭兮羣仙授書夜郎萬里兮一麾扶餘昆眀點蒼兮九夷是居濁世詎諧兮戚施籧篨回首苾芻兮白雲卷舒拂衣三徑兮蓴羮鱸魚騎鶴吹笙兮言旋太虛絮酒在筵兮生芻在除蒼虬帝閽兮極目欷歔尚饗祭太傳趙文懿公家君命代猗歟我眀光嶽鍾靈盛于世皇乃生名世誕應昌期維瀫之陽三策天人纚纚萬言大廷對揚天子曰俞五色雲英輪囷廟堂執戟彤墀如彼髙梧晨棲鳳凰直道匪躬正色昌言狐狸遁藏一夫橫行毁滅天彛百僚倣徨公髮指冠面折權憸以植大防貝錦齦齦馬首遂東馳驅夜郎爰集朱眀歷探洞天耀真良常夜登羅浮絶頂題詩淋漓石床今古賢豪始興昌黎後先若望度嶺遄歸滿折梅花以充宦囊焚彼銀魚棲我碧山岩阿芰房湧雪紫霞玉露水簾回環畫廊緑野逍遙問道容成遊心上皇神聖嗣興地闢天開顯忠遂良首御蒲輪少宰成均清華厯敡詔下老臣汝作雨霖大川餘皇元首股肱喜起賡歌謨謀頡頏統萬逋逃負固窮城主帥是戕公怒赫斯立命元戎剪鋤亂蝗蠢兹有苖躪藉藩市凶威陸梁公運神機魄禠羣凶欵封乞降中州易子西播㺯兵海隅沸湯公坐闕庭默奪濳消四空彗芒慨念皇儲國本攸關夜寐弗遑力疾上書洞格宸衷老成慮長一十二年身係安危化徴越裳相業維公岌嶪嵬峩超蹤漢唐帝眷彌殷天庥洊加百福煒煌麟趾振振奕葉芝蘭芬敷棣棠言念赤松纍疏乞骸歸侶二皇天子曰都莘野渭濵期頥帝傍公戢上知回首白雲欷歔太行煢煢昊穹一老弗遺傾頽棟梁大星墜垣五位震驚九列悼惶賻贈褒崇日月昭回賜車轀輬維公與余束髮同嬉翺翔棘場晚締姻㜕兔絲喬松永矢弗忘屈指晝遊太白望舒生平願償遐訃倐聞五內痌瘝崩摧若狂於戲維公位極人臣師兼帝王於戲維公子姓孫枝雲仍發祥公德九原公望三朝公勳太常既尊既榮既夀既康公逝弗亡蘭隂蒼蒼蘭澤湯湯公騎石羊羽蓋霞軿聿來故鄉鑒此薄觴尚饗少室山房集卷九十五
