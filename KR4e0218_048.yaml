body:
  text: 少室山房集卷四十八明胡應麟撰五言排律一首挽王元美先生二百四十韻有序嗚呼此余哭元美先生之作也庚寅秋聞先生病則馳小艇過婁江比至先生病已革起榻上執余手曰吾日望子來而瞑吾續集甫成編子為我校而序之吾即瞑弗憾矣余欷歔唯命留來玉閣六旬雪涕與先生别卒嵗抵家則報先生逝矣嗚呼山頽木壞世將誰託吾將疇依記曩嵗病瓜步先生為余作傳因以傳下屬余弗敢當顧有片長可以自效者爰掎托先生生平履歷閉户一月勒成此篇凡二百有四十韻二千有四百言古排律至多不過百韻至先生哭于鱗百二十韻而極奈余之才不能半古人則先生履歷非藉此固亡以徵萬一而冗濫之誚誠無諉于大方矣泰岱崩頽日乾坤混闔年共驚梁木壞誰擁劫灰然北極悲遺老東吳泣大賢八荒情慘怛九域涕淪漣訃達雞林外神逰鹿苑前青牛應獨跨赤鯉詎同還憶昔嘉隆運重看間氣聫星移嚴子瀨嶽降洞庭巔花甲庚寅兆蓬弧戊子懸貞元逢五百盛美冠三千奕葉龍為種苞苻鳳集肩修睂揚八彩異骨聳雙顴毁齒驚閭族垂髫詫里㕓應聲題寶鋏唾手拾青錢玉陛晨宣唱瓊林晝錫筵蘢蔥韋曲霧搖曳杜陵煙栁岸青絲盒桃堤赤玉鞭墨花浮太液囊草動甘泉東壁呈輝耀西曹得靜便鋭情三古上矢志百王先盡却區中纍全收物外權詞林勤斫削藝苑恣騰騫正始追遺躅開元繼絶綖摶空孤翼上歷塊衆蹄竣避也歷下論心最新都託分堅宗吳偕駿發余李並蟬連南海攜公實西堂對惠連謂次公也張公江海契徐子廟堂緣社自簮紳合門仍韋布延伶俜噓謝叟羈縶脫盧楩結侣摐金石同心叶管縣樂名虹光搖海嶽雪色被幽燕入穴雛探虎登壇耳握犍遐蹤恢孝武陋習起成宣以上敘交逰事嶓冢千江派崑崙萬谷泉五經憑發笥六藝浩忘筌大筆籠檀左雄章軋孟遷漆園饒採掇鄭圃縱漁畋頌發商周藴詩紬漢魏詮中郎同麗爾都尉共超然八斗虛髙第鍾嶸第子建為上品三閭實冗員審言呼屈宋為衙官興深陶栗里情逸謝臨川敘述卑平子鋪張狹孟堅靈光霞映桷景福霧盈櫋隻字摩穹壤單辭耀幅􅊷喑嗚人自廢踔厲世無前以上敘著作事楮墨時隨溷緗縑半矗椽蘭膏經嵗竭藜火徹明然閣上讐中壘亭中閲太玄多聞留偃賜好學嗣顏騫急就章章疏凡將字字箋蟲魚評叔夜科斗辨僧虔鼮鼠竒毛列商羊獨足拳浮遊無宿疾二負有遺骭獄底知神物雷煥河邊識女媊流觴徴仲冶威斗驗承天待詔今方朔司空舊茂先編成羅豔異志就薄夷堅腹貯須彌外胸藏宛委還諸劉慚博核二沈謝覃研以上敘問學事絶代難酬價傾城易遘譞桓文名藉藉絳灌目睊睊道直元如矢躬行更若弦當門寧植蕙曲徑詎容荃蕭艾紛投隙椒蘭競搆愆一麾辭豹尾雙珮拭龍淵易水悲歌歇潢池武略宣緑林韜劒戟青土靜弓弮以上敘外補事屏翰風猷著家門歷數邅髙牙淪瀚海大纛仆居延池水先波及崑岡驟火延乘時交鬼蜮濟惡剩蝗蝝刻木傷縲絏肩輿詢竹箯千機同織貝百足漫扶蚿魚服恫誰訴牛衣困自綆形骸迷骯髒手足竭胝胼痛切腸攢蝟熹微命綴蜒痬薰肌徹骨癭決項流咽斷絶張儀舌轟豗石勒拳韜鈐明主惜法網柄臣牽霹靂髙空下雷霆大地燀炎也魂飛巢壓卵膽奪棟頽枅進退身維谷縱橫泪若沺刳心聞唳鶴灑血和啼鵑以上敘家難事星散華陽市天回震澤瀍善權捫紫翠陽羡卜蒼矸大澤偏容卧長林不厭穿扶笻升險絶躡屐犯危顛謝客西州墓為農北海堧楸梧存越嶠禾黍種吳田茂苑繁花麗婁江秀麥䅌開園鄰緑野築室傍藍田畫棟金銀列雕楹繪堊填竒峰俱嶽麓怪石盡平泉曲榭遙通竹飛樓逈架梴殘山疑墜碣剩水似浮滇橘柚連村樹芙蓉隔港沿萍颸吹襲襲葵露滴涓涓隴首珍禽戲黔南語鳥儇逰人懷鞠􅀈冶女話鞦韆以上敘賔客事揖客長停哺迎賔屢握鬈交逰太丘廣車騎孟嘗闐急難時捐囷逢迎嵗竭廯廩也朱衣驚坐衆珠履入門駢别墅矜馳騎行庖試擊鮮紛紜操膾脯蹀躞驟連錢粣效虞悰製茶呼陸羽煎沈酣桑落會潦倒竹林眠較罰逾金谷移封隘酒泉糟醨憑寄迹麴米笑流涎鸚鵡玻璃杓鸕鷀玳瑁棬鴟夷浮菌蠢象鼻吸連卷笠澤槎頭鱠淞陵縮項鯿連螯烹紫蟹帶甲供黃鱣鱣即黃魚諸解並同水芡房房坼山櫻顆顆圓兒拳呈紫蕨佛手薦香櫞饌敵郇厨美羮嘲黨帳羶嵯峨薪代蠟嗟咄豆成饘桂樹時停楫沙棠日扣舷綸竿張氏舸簫鼓孟家船登善文皇册元常季直箋玄圭銘大夏蒼珮琢于闐孟德臺端瓦烏曹槨上磚月輸求志費日損賣文錢以上敘燕會事勝負天人定升沈氣運遷辭家悲李密伏闕慟王延浩蕩新恩下熒煌宿垢湔勒銘同峴首封冢象祈連綸綍飛朝寧冠紳會陌阡霜蹄仍剪拂彩翮驟翩躚突兀煙霄上嶒嶸日月邊三關勞控馭兩越寄旬宣太僕分司重中丞節制全空羣留騄駬異隊别駰驙將轂頻推楚兵符半攝鄢秋霜凝斧鉞晴旭照戈鋋嵾上攀名嶽沅湘涉大川雲低神女駕月冷帝妃鈿京兆鮮于敏廷評定國虔先驅馴猰貐密網化鷹鸇以上敘宦逰事倐忽人情異悲涼世態悁青蠅從抵隙白鳥任遺諓勇退羞羅雀幽棲避跕鳶世驚鵬偃息自喜蠖蜿蜒展卷欣長日懸書得大年三蒼勤剞劂五緯罄雕鐫巨碣新羅購穹碑日本傳褒誅崇衮鉞晃朗切璣璇黼黻垂鐘鼎絲綸飾豆籩江河馳藻繪象緯錯丹鉛氣色龍成彩聲華蟻集羶家藏三郡集童習二鳴編寶籙窺靈祕真機握大還入關遺世事閉户息塵緣紺殿羣囂絶清都百慮蠲遺經翻損益大道識坤乾真誥裁𢎞景隂符注李筌瑤函王母授金榜木公嬗傳也厭次東方朔羅浮郭稚川黃庭神煜煜紫府息綿綿白石攙霞煮丹珠滴露研虛無逰大洞沖漠憩重淵取次蒲團熟縱橫木榻穿低回遲鷟羽隱約下鸞軿太上留函谷先生叩竺乾謂古先生普陀談五藴臨濟核三玄作偈呈希運題書謁大顛孤峰凝獨峙古月證重圜砌上祗園果池中法界蓮菩提垂寶地香積布金田靈祐軍持踏丹霞佛像㸐直窺無始奧真徹上乘禪以上敘焚修事隱豹藏林密鳴騶入谷遄玄纁何奕奕束帛匪戔戔禮數三台接恩光八座偏長干邀鹵簿白下注旌旃東土明無二南宗集大千雨花臺上句桃業渡頭篇元禮門如海文通筆勝椽世俱榮白傅疇不慕青蓮南中日接千賔帝命勞疏廣臣心戀偓佺歸尋霞外侣逝作地行仙以上敘再出事放浪君平卜逍遙善卷佃陶朱頻易蠡博望幾浮騫小閣披芳素層軒搆碧漣公歸重搆芳素媚清二軒鳴琴娛蒨峭吹笛和潺湲大白凌周顗深杯角鄭虔公自南都歸每賔友過從必極酣暢優遊寬禮法爽朗越拘攣擁髻回通德修蛾却麗娟閨房間窈窕枕簟絶便嬛長公暮年聲色都絶玉樹前階盛金莖後裔綿虹霓爛芝桂雨露蔭楠楩尺璧名髙楚千金骨市涓流沙陳騕裊汗血聚騝駽公諸郎君名率從馬福履人生備期頥衆望顓以上敘乞歸事飱苓逾薊訓辟穀度彭籛兜率仙宫麗遮須梵宇妍龍蛇占起陸雞犬候離田耎共詫三彭伏那期二豎蹎跋也肺愁司馬渴腰惜隱侯朘杜瘧原難起曹風不易痊蘭金辭管鮑藥石謝和扁驟解形骸縛初離眷屬纒金棺來燁燁玉舄去翩翩化鵠徒為爾騎鯨固有焉尚疑元放脫翻憶令威翾烈魄摶箕尾精魂落斗躔夜臺風淅淅朝隴月娟娟震悼聞雙闕吞聲屆八埏榮封符馬鬛異兆協牛眠大樹英靈在生芻涕泗濺倉皇捫草屫躑躅負寒氊片刺交文舉孤城託仲宣風塵饒盼睞湖海竭陶甄宗廟裳衣列門牆裋褐褰敢云千里足突覩九方歅磊落孫陽御馳驅祖逖鞭虛懷懸藻鏡側目任衡銓翠黛雙彎嫵朱唇一笑嫣無媒甘老大不嫁抱嬋娟異代瞻提挈中途恨棄捐佳人寧獨立國士詎同憐骨相成虛負音容記勉旃文漪空嘯咏碧浪罷延緣苦思啼莊舄深悰泣鄭玄良工亡偃翟巧匠失輪扁太室三花瘁曹溪六葉跧虛聞南嶽讓濫擬石頭遷迦葉神徒懵維摩病豈然城佳松鬱鬱墓宿草芊芊郢國陽春絶邯鄲步驟􅂒荒丘盤狡兔髙嶺咽寒蟬堂後聽絲竹壚頭漬酒綿滂沱臨大壑嗚邑問重泉宇宙遺空笈乾坤入斷絃惟應四部稿萬古誦鈞天凡字同義異或名姓字同例得重押其字義並同者唐人雖或重押此不復沿少室山房集卷四十八
