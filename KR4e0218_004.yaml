body:
  text: 少室山房集卷四明胡應麟撰樂府二十五首王子喬王子喬玉笙霞珮長飄䬙王子喬玉笙霞珮長飄䬙下遊來王子喬緱山萬桃花白日行逍遥倐忽上浮雲騰身還九霄足躡一雙鳬虛空以遊遨顧視世間人勿復勞相招蓬萊之水清且淺金銀樓殿一何岧嶤三神之山連巨鰲仙聖億萬計驂鸞跨鳯紛紛而來朝蒼龍為我車烏鵲為我橋道逢王方平拍手彈雲璈麻姑十八九紅顔髪垂腰要我擘麟脯進藥長生瓢顧視世間人勿復勞相招今上神聖海晏河清曷不跨雙鳬來覲漢家朝凝圖奉籙壽與天迢遥下游來王子喬桂之樹桂之樹桂之樹輪囷偃蹇寂寞山之阿山阿者誰被薜茘帶女蘿淹留桂樹枝以婆娑以婆娑嵗月冉冉而蹉跎攀援桂樹枝行且歌瞻彼桐栢之山桂樹叢生其上高嵯峨高嵯峨吾欲采其實蔭其葉憩其柯白日將暮熊羆虎狼夾路當奈何白日將暮熊羆虎狼夾路當柰何猛虎行南山有猛虎白額斑斕而錦文南山有猛虎白額斑斕而錦文目睛鑠雷電齒牙決浮雲出入乗風飈威加百獸熊羆豺狼狐兔惕息莫敢與共羣一解山頭絶樵采山底無四鄰終朝攫取行旅食黎氓婦女小兒骨骸若丘山腥穢不忍聞二解謂虎汝胡不仁胡不學彼騶虞鳯與麟百獸有恒食胡汝好食人汝胡太不仁吾將上訴汝訴汝司命君三解唶司命君不汝罪傅汝角張汝翼礪汝爪距鋒以鋭俾汝飛而食食人萬里外四解食人以足天道好還忽遇洛陽三河少年賁戎發機卞莊奮拳佽飛鼔刃裴旻控弦擊鼔鳴鉦張網樹旗有角曷抵有翼曷飛割裂其肉寢處其皮以首承溺為百獸嗤永戒後人為惡勿長為善勿疑彼不余信請視此詩烏生八九子峩峩秦氏高樓桂樹輪囷出雲間上有一雙頭白烏毛羽何摧殘唶彼頭白烏生八九子養雛坐樹端八九子乳哺亦誠難朝不得食夜不得餐八九子羽翼以長成各各飛去忘來還唶彼頭白烏空腹坐樹端饑餓頓欲死淚下如流泉唶彼秦氏少年子怒激壯士肝白玉為琱弓黄金為彈丸一發中羣雛魂魄飛上天八九子魂魄飛上天唶彼烏不反哺誰當憐西門行綦隆世化日舒玉尊肴醴羅前除東隣子燕趙姝清歌妙舞揚羅襦賢豪過駟馬車良辰日吉心相娛人命無百年日月同斯須胡為自約束悵悵常獨居豈無仙人王子喬駕六飛龍遊太虛豈無仙人王子喬駕六飛龍遊太虛天地會有終千秋萬嵗後仙聖同凡愚不如命我友撞鐘攂鼓鳴笙竽東門行出東門步且吁時世混濁難共居我欲乗長風東遊扶桑西瑶池揮首向容成億萬不相疑歸來告妻子牽衣蹬足長歔欷長歔欷上有垂白親下有黄口兒孔雀東南飛十步五步不相離君今獨行安所之君今獨行安所之不如守窮巷雞鳴狗吠相因依不見伯夷叔齊采西山蕨薇榮名被百世難等夷順東西門行嵗行暮時既昏設我肴醴開玉尊樂親故延嘉賓軒車雜沓徒在門列五鼎羅八珍甘嘉溢口呈芳新飲麻姑招洛神擘紅虬脯羞黄麟琴瑟和鐘鼓陳樗蒱六博何繽紛長袂掩羞蛾顰纎歌隨風飄青雲良夜半星河傾主人未醉客尚醒二難具五福并億千萬嵗延遐齡燕歌行嚴霜蕭蕭白露漙三星在房月在天空閨思婦愁城南起㸔北斗何闌干樓頭旅鴈鳴飛翰口銜尺書下雲端同心為結緘瑶函下有相憶上加餐何以寄情雙玉環念欲報之青琅玕山高水長浩漫漫我欲從之途路難羅帷倚燈曙不眠秋風颯颯吹重關安得送我置汝前平陵東平陵東氣鬱葱大雷電天以風啓金縢告元功誰其輔者安漢公安漢公坐明堂發天兵下咸陽討賊盜捕亂亡賊盜亂亡疇則使東郡太守翟氏子不量其力罔畏死天兵桓桓孰敢當所擊者破禦者殃烟塵掃蕩清一方頸係諸纍俘未央君不見翟義公今日繫安漢公明日帝彼已之子甘若薺天鳯改元易漢制白水真人從東來昆陽百萬成沙灰坐倚斗柄臨高臺胡不再開金縢諭九垓胡不再開金縢諭九垓鞠歌行攜玉女邀僊童天門詄蕩開九重揖金母拜木公蹻躡鹿盧乗罡風飛廉導屏翳從周遊八極騎茆龍乗元化入無終千秋萬億齊喬松上留田用本調噫嘻人世大難上留田貴賤貧富相懸上㽞田富貴阡陌綿延上留田貧賤家無一廛上留田四體衣襦不完上留田毛翮凋疎摧殘上留田氣息懨懨自憐上留田赴訴司命君前上留田我獨胡為蹇連上留田夙生期運致然上留田飲泣吞聲何言上留田董逃行用本事東京城郭煌煌董逃冠蓋羅列成行董逃天禍漢國彷徨董逃白晝兵戈奪攘董逃刼制天子侯王董逃千乗萬騎北邙董逃焚燒廪庾餱糧董逃郿塢黄金作牆董逃天道好還有常董逃司徒祓除不祥董逃首惡刳胸裂腸董逃膏血燃燈道傍董逃百代箴規莫忘董逃永戒貪饕陸梁董逃悲歌巫山之高淮水湯湯我欲東歸洛大河無梁船道阻絶登高以望故鄉故鄉不可見熊羆虎狼夾路而成行狐兔失羣我與為侣日暮途逺傍無旅舍悒鬱誰語悲風動地陰雲四起仰天悲歌泪墮不能止前緩聲歌緣木求魚譬彼入山采珠意氣雖勤奈此道路殊總角相親同室共居君心有他如隔里閭身非草木根株他人有心忖度在余欲見子都乃值狂且嗟他心之人蟲鳥之弗如蛺蝶行飛來雙蛺蝶羽翅一何翩翩掠春風而遊東園彼姝者子朱為顔年十四五被髮齊兩肩忽來覩此雙蛺蝶心中以慘然春風浩浩嵗月行蹉跎我欲捉蝶以婆娑蝶以雙飛奈蝶何滿歌行感事作用本調嗟人世㷀㷀若過隙駒百憂填中當復誰與娛憶我年少時慈親大憫惜中遭荼毒展轉愁悶嵗以為日家室荆榛牝雞奪晨罹此悍虐伶俜莫可告人彼婦之惡為鬼為蜮潛行昏黑無從方物彼婦之惡為虺為蛇造作語言鼓吻揺牙慈親積戾奄忽棄背黄口嗷嗷轝埋山椒箠笞炮烙兇威灼鑠姬妾徬徨進退錯愕猶復蚤夜思維圖覆厥宗仰面叩天無地自容宻計深謀獰不可近風波起咫尺白晝為陷穽而家弗殃彼念弗忘而家弗禍彼業弗墮吞聲飲泣以訴司命君彼司命之君杳若弗聞悍婦持門戸胡以事嚴親嚴親七十餘風燭暮逡廵安能舍之逺去去適滄海濱憂來起中夜攬衣不及晨皇靈會動變沴氣干天閽大雷電風雨永戒後世人兩頭纎纎詩二首兩頭纎纎少媍眉半白半黑枰中棋逼逼膊膊倉鼠馳磊磊落落道傍梨兩頭纎纎麋鹿角半白半黑檐前鵲逼逼膊膊林鴉啄磊磊落落荆山璞五雜組詩二首五雜組中天霞往復還貫月查不獲已遇龍蛇古云嵗在龍蛇賢人嗟五雜組芝為蓋往復還咸陽塞不獲已見褦襶公無渡河三首公無渡河大河揚波長鯨如山鬐鬛嵳峩公無渡河一葦奈何河水萬丈出没蛟鼉公無渡河讒言孔多不見申屠負石投河枯魚過河泣二首枯魚過河泣宛轉沙泥側神龍處九淵螻蟻安能測枯魚過河泣定作盤中腊願覓斗升水為君赴溟渤少室山房集卷四
