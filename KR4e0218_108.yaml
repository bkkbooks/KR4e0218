body:
  text: 少室山房集巻一百八明胡應麟撰題䟦二十首墨蹟下䟦家藏宋搨蘭亭趙文敏臨真蹟三則右蘭亭諸鑒家咸以為定武本苐首行缺下一字與吳興十三䟦本微不類其後復有子昻臨本亦缺首行一字而雄逸遒潤天真爛然自蘭亭神詣八法唐人歐虞褚薛所臨今無論真蹟即墨本混淆靡定獨吳興臨本存世余目覩不下十餘此猶其合作者也豐人翁最迂持論獨謂趙去右軍不逺紬繹此臨不惟得其體貌殆兼風骨性情而有之視昔人豔稱雙鵰並運各極摩天者加一等矣若墨本定武是非固難懸㫁而楮素膩宻烟煤濃瀋灼然宋搨無疑也因䟦而藏之一展閲間忽忽身在茂林修竹間雜坐東晉諸賢矣又謂文章闗氣運下士聞道大笑之右軍素不以著作鳴而蘭亭褉序俯仰感慨實際之語千載若新加書法入神遂以盈尺之箋同弊塵刦晉人謂右軍自録數十過終無褉日所書余謂令右軍閉户窮年更草一叙能前作抗衡乎盖書契以來應有兹帖一時氣運助以發之即右軍莫測所以然也孫綽興公文名振代而後序寥寥殊無省發彼赤城霞起瀑布飛流非異時天台賦語乎至羣賢賦詩不可解者甚衆且無一佳而大令罰觥寧其不能事此也古人意興弗極不强搆思正髙出今人數倍處矧坐中雖觸目名流才出大令下者衆矣彼以罰觥為非耶總之山川間氣一時並攝右軍筆端故令六宫粉黛無復顔色耳又夏侯太初謂樂毅伐齊之兵庶幾湯武晉人迂蕩不情迺爾直可壓巻啓顔顧右軍屡為傳録豈好異㧞新名士例不免也大令意氣鑑鑑欲淩阿父計㑹中羣賢在其目睫者不過數輩而十數脞辭甘出諸人下哉固爾時情興弗屬大都翫世罰觥反以為適耳太初以樂生不㧞二城意未可量余亦以大令不屬隻字旨未易窺也顧千載未有發其微者聊為拈出配太初當啓顔一則也䟦吳德基行草余所藏吳德基行草大書四軸皆錄李青蓮絶句盖吳生平好書太白五七言絶余所見亾慮百數邑故家往往有之而傳流他處靡一蹟並自元及明詩書家絶不及其名姓士之傳真有幸有不幸耶此四絶用筆遒勁特甚而結體圜密精工殊得晉唐遺意王次公過余齋頭覩其一矍然問何人以吳對曰鮮于困學不過也惜不使長公見之得其片言可無遺憾地下矣䟦家藏吳德基陶詩此德基行草靖節停雲詩也字大僅若錢結法遒婉而筆意峭勁與柴桑品格良足相當下作靖節扶笻像韻度翩翩非俗工所辦疑亦出德基手也故老傳髙皇帝聞吳書名嘗詔令進御並浮屠月鑑芙蕖以吳筆太剛鑑畫太媚皆不録苐此余邑傳流語他野記逸史無可互證者今吳書存邑尚衆鑑芙蕖遂絶不聞并識于此吳嘗及景濂太史游為其室傳傳見集中䟦王元琳真蹟右王珣伯逺帖真蹟珣江左有盛名即桓宣武幕中所稱髯參短簿者其書流落人代宣和譜有伯逺三月二帖此伯逺帖真蹟也書凡五行六十九字古澹蕭疎真趣流溢如飛天僊人遊歴下界頫視凡俗悉同塵埃望而知其晉人筆也典午真蹟存宣和書譜者尚不下數百今惟右軍大令一二靈光自餘翰墨永絶而此帖獨巍然宇宙之間昔人評晉人一帖當二王五帖得元琳不啻羲獻矣䟦顔魯公祭姪帖二則念載前閲停雲館刻魯公祭姪季明帖天真爛熳從心不踰以為古今神化之筆元二陳及文太史鑒定詳矣王長公䟦真蹟在永豐聶氏意公見未易得忽燕中邂逅此巻裝潢漶滅幾不可觸手而文草首尾尚完驚喜浹日輟飲食恣閲之迺知此書全用退筆鋒穎摧衂淡墨微茫而氣韻飄動遒逸字字欲飛真間代竒物也唐三百年間臨池滿世而追逐二王迺魯公以無意得之又停雲館刻余始閲之大詫以魯公此筆不似從人間來者及真蹟縱觀迺知墨本相去尚懸隔三十里非神化所至而何苐稍有可疑者停雲二陳文太史䟦此本並無之則長公所云聶氏藏本屬太史鑒定無疑而此巻尾元人數䟦皆名士鮮于伯機輩序購求源歴甚詳決匪後人偽撰而其書則皆贋作計必有真蹟系顔帖終太史胡以弗及見而止録二陳䟦耶又䟦稱天水小印今巻首亦不復存以為摹本則筆勢放縱墨瀋濃淡相承決匪雙鈎廓填所辦以為臨本則行款字數較石刻不爽纎毫即魯公自書百過㫁不能盡仍其舊而何論後人也或聶氏所藏䟦尾二陳真蹟而魯公書贋則徵仲太史目睫所經鬚眉洞鑒而胡以曲筆于此豈此書太史䟦後後人割奠文真蹟以摹本傅二陳文氏而售之聶又贋放鮮于等䟦傅真蹟以他售之人而鮮于等真跡又别傅摹本為三耶此其顛末故未易一二懸㫁異時當特過江右假聶氏所藏觀之䟦米南宫誤恩帖二則老顛書僅六行而筆勢翩翩其䟦扈飛揚之氣不可馴狎致足賞也鑒者多以為摹本屬中一二字剝蝕少有廓填耳末三行則真蹟無疑矣唐之旭宋之芾皆顛名一代今覩芾筆踪狂態淋漓尚在旭書傳世雖寡苐摩挲秃素諸帖亦自想見其人惟六代張融之顛不減二子而書絶不傳近王長公以知汝殊愁為融書亦以顛態億之耳苐六代人書傳者不過數行而殊愁至百餘語故當是唐人筆也又米老以顛名一代而大罵旭書以變亂古法驚諸凡夫彼不惡傷其類耶令二顛相遇中原各騁尋丈之勢差足以快旁觀苐未知鹿死誰手耳䟦蘇長公帖坡公黄柑帖骨法凝重而肌肉豐妍非貴嬪妃子如楊太真不足喻苐無奈身材大匾濶何黄長睿謂書縱易横難古今惟鍾太傅一人效之者非濁則俗蜀中一人是矣盖指坡言也䟦吳履書栁詩二則右吳履德基書栁子厚真源了無取古詩似退筆不經意細閲之晉人風骨種種具存迺知勝國臨池苦工逺出宋世上盖趙宋諸公往往好入已意故翰墨雖各名一家而典午範型都盡元自趙鄧鮮于究心古學頓還舊觀今師趙者衆後生厭同喜異山谷海岳時復主盟大都習尚所趨非大力者起而挽之故未易口舌爭也又子厚古詩沖淡峭峻在唐齊名蘇州蘇長公至品諸韋上然韋詩蕭散自然去柴桑格致不逺子厚雖骨力稍勁其不及韋政坐此故由子瞻勘捉未破耳道人庭宇静苔色連深竹宋人謂逺勝竹逕通幽處禪房花木深亦憒憒之見常詩警絶處在山光悦鳥性十字初不係頷聯也䟦楊廉夫論詩巻老鐵此巻評詩頗得源委而詞太冗蔓當是一時信筆苐其書亦瘦勁不俗聊復存之吳中四名家真蹟䟦此巻祝京兆楷書一字大若錢書邢麗文上祖戸帖甚端飭其後小楷十通皆與外父李貞伯者初以京兆遺落世事甚讀諸札迺知其周旋家庭閫閾間尚有余輩所不及者在也苐書多信筆起草不經意者半之又行草蘂珠宫三詩又行草四文待詔小簡二精工之極當是刻意書吳興碑記草其一面即陸子傳札訊太史者盖案頭偶乏取以代箋也子傳書是小楷清麗覺微弱耳尚隱可讀王履吉行草絶句一又長札三而一短啓三行者字字欲飛又襍柬十餘大都非烟火食人筆也陳道復二一送扇一借牛即鄙事數言以楮墨映帶之翻令作雅觀書不可不學如此吳下名流襍帖䟦右巻皆吳下名流書吳原博葑溪詩逼大蘇彭孔嘉一作顔平原體王履約二長箋翩翩有致而知者絶寡以難弟故也王禄之二一楷一行文休承二周公瑕一唐伯虎一呼張夢晉春遊古詩無復作栁隂丐者耶鄧徴父西山八詩神采奕奕即公瑕用意未必過也其人晩出寥落舉世鮮推之可嘆又三紙學米未成末有岱字當岳子餘也張伯起一張仲立一皆與余酬往札伯起不出無恙迄今仲立纔博一州守中道奄逝矣人生出處窮達信自有命苐仲立枉作三年折腰耳䟦吳下名流江南春詩巻首王禄之江左名流四大篆江南春畫意一帖題文太史而行書三詩于後王次公過江右訪余齋頭偶閲此巻謂文太史書及吏部篆皆真蹟畫則贋本也文壽承小草二文休承小楷二甚工王禄之行草二彭孔嘉行楷二周公瑕行草二精極盖初年得意書也袁魯望行草二袁為兩瑯琊婣家覩此知臨池非長存之如見次公耳諸詩大類宋人長短句然則謂江南春詞可也詩不可也文太史倣山谷書䟦右巻文太史倣涪老大書山寺五言四律遒逸蒼勁清思照人眉睫間詩亦蕭散有餘讀之令人意外作一適又長幅大書早朝七言四律字縱横三寸餘沈雄偉麗雅與題合盖八詩皆徵仲得意而境地不同故俱作黄體而能各致其工如此信前輩未易材也王履吉伯仲雜柬䟦履吉書蕭散縱横天真爛漫近代書家恍忽晉人丰度僅覩此君而豐人翁以為邪氣溢紙何邪履約履吉之兄書法翩翩真足魯衛而世以難弟掩之履吉詩髙華朗秀儼若朝霞吳中一時才彦自昌穀外惟此君可追逐亦以夭折未成俱可憾也䟦何仲黙詩巻嘗于何啓圖太史處覩仲黙銅雀瓦詩邇得一巻真蹟也樊少南志仲黙墓言與李獻吉並學顔栁今觀之誠非漫然信筆者嘗見李石刻數處皆然苐二君詩文皆學秦漢而書不能越唐人何邪聊書此發一笑少室山房集巻一百八
