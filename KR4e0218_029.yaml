body:
  text: 少室山房集卷二十九明胡應麟撰七言古詩五首雙劒篇有序少保定遠戚公得精鐵百鍊為二劒一贈少司馬汪公一以自珮每相遇則專設一榻陳之示延津之合焉是秋應麟謁汪公於武林適戚公自燕來㑹于是二劒復合司馬公出示坐中精彩射人毛髮洞鑒真神物也公命作歌輒成一章以紀其事君不見新都司馬公手提三尺驅羣雄文章落筆掩左馬出將入相稱人龍又不見山東戚少保結髮從軍事征討高牙大纛海岱間南北王庭淨如掃兩公文武真竒才中原相遇神徘徊片言握手肝膽合白日莽蒼青冥開帝遣將軍獲精鐵鑄作純鉤兩竒絶一攜自珮一贈公繞夜虹光對明滅相逢則合離則分雄飛雌逐流風霆合如雙龍挂宇宙離如獨鶚橫秋冥何來胡生客武林躡兩芒屫登龍門長揖將軍拜司馬瞥然覩此驚心魂蜃飾蛟裝逈竒麗土花半蝕芙蓉膩三秋太白橫亘天萬丈銀河寒壓地飛霜噴雪魍魎愁掣電揚飈神鬼避武林八月天茫茫白波兩岸飛錢塘天目東西八萬仞勢壓大海摩青蒼此時雙劍坐中合神鋒咫尺相低昻縱橫壯氣攝五嶽浩蕩精魄回三光將軍百戰挺竒節司馬百代留餘芳丈夫樹立固當爾那令異物長濳藏君不見䝉莊周平生說劒干諸侯窮來斗水不自覓咄嗟文士真蜉蝣又不見淮隂侯仗劒從戎追沐猴武士知幾古來少未央落日風颼飀豈若公遭明盛世文武雄才更相濟壯烈同標天地間淳風直挽周秦際東海胡生不自量蚤年俠氣飄魚腸長纓欲係玉門敵寸管擬軼開元章只今三十尚碌碌爾髮胡短心胡長嗚呼兩巨公絶代真罕有干將與莫邪世世長共守靈物由來異人得青萍詎落凡夫手笑殺狂生一蒯緱歌罷無魚厭奔走謂生且飲勿復言天生七尺寧徒然劇孟曾傾亞父坐侯芭亦受揚雄𤣥名山石室豈遼絶㑹令大業流青編胡不為公一掃五千字珠光照耀雙龍泉渴病年來廢書久茂苑西風重搔首寂寞公孫劒器行一代雄才我何有覩公神物心飛揚醉墨淋漓忘妍醜篇成一笑還自歌錯落寒空墮牛斗倘勒豐城雙玉函萬古雷張同不朽蚤春苦雨邦相明府見過留飲齊中竟夕走筆放歌為今雨行并懷燕社諸子曩嘗與惟敬惟寅子大裕卿文父汝修集思伯館有中秋雨集卷白龍夜挂錢塘渚兩岸嵯峨雪山起狂風忽捲大海流散作東南萬家雨蘭隂一雨俄經旬茅齊獨卧愁晨昏剝啄何人駐髙蓋傳呼喻侯來扣門喻侯意氣天下無結交平生盡酒徒五載空淹茂陵秩一官再問長安途憶乍停車瀫江涘邂逅逢余誓生死片語平將白雪投雄心真向青冥吐汝自分符出建章余亦攜書上帝鄉掉頭不入金華殿却憶山中尋石羊風塵道路巧相值宛轉蘭隂舊相識把臂寧論白璧雙酬知頓擲黃金百人間彩筆何紛紜相看吾汝真忘形乍可經年對叔度那能一飲無公榮蚤春人日差可賞塵尾𤣥言豁塵坱輕雲忽妬上元節窮隂驟入花朝想衡門獨掩空莓苔白眼四望青天摧飛鳬忽報故人至拂衣大笑愁顔開曲徑回軒逈幽寂面面雕闌護竒石珠簾十二清晝垂一塵不到胡生宅博山爐中沉水香蘭陵之酒雙玉缸蒲團對酌春茫茫居然一息破萬古那知雨色來虛堂漆園無人左遷沒屈宋曹劉俱寂寂千言欲起杜陵歌四部重翻弇州集人生瞬息同埃塵碌碌誰憐身後名日月空懸古今照宇宙不補東南傾何如雄飲呼大白百川一吸飛長鯨匕首縱橫雪花亂唾壺錯落浮雲驚酒間起舞真態出元氣淋漓袖雙濕輕薄何由嗔禰衡磊塊政須澆阮籍髙山流水盡知已授簡含毫仍促席沉冥不辭真宰怒跌蕩猶堪鬼神泣紫氣豐城暝不流寒芒婺女紛相射回首華陽夙昔交十年俠氣摩蒼霄黎子歸耕大庾側梁生草沒羅浮坳劉侯李侯差振翮朱生但乞夷門食康胡咫尺招不得眼底何人寄肝膈吁嗟吾汝自一時越吟楚調俱稱竒飛揚總讓少年貴嚄唶從教行路疑鄴侯滿架差足樂長孺淮陽豈云薄種秫聊耕彭澤田草𤣥絶勝揚雄閣喻明府歌莫悲汝是豫章一男子余亦豈俯首低睂世間士浮榮一代安所希大業千秋竟誰俟丈夫㑹合自有神肯將鸞翮隨雞羣孫陽造父一朝值騄駬驊騮雙絶塵歌莫悲喻明府我欲乘雲歸太清汝但為霖佐真主異日中原共鞭弭肝腸一寸久相許漏盡銀虬雨聲歇蕭颯如聞二龍語為君作歌聊爾女無論筆落驚風雨折檻行送沈純父北上有序余以孟冬過檇李訪純父適純父將應召北上謂余賦一長歌為贈援筆慷慨得六百字為折檻行純父謫戍四載直聲動天下故自千秋丈夫而余與純父誼托久要志存大業即世俗期望非所宜道故歌辭莽莽直吐胸臆知純父不鄙余言兼柬同時趙吳艾鄒四君子北風動地捲霜雪沈子嚴裝候明發白馬銀鞍走燕市天子召見黃金闕憶昔丁丑年中事嗚呼已往難陳說綱常萬古忽如線沈子旁觀眥雙裂三年忍蔑父母愛七尺自與妻兒訣飛書一夜上明主百辟蒼皇膽俱懾宫闈動色問忠悃乞得殘軀傍南粵茫茫大海天欲盡野魅山魈共生活銅柱頻更伏波戍鐵衣亂灑羈臣血桄榔葉底托餘䕃豆蔲枝前賦鶗鴂鬢毛五載凋欲盡意氣千鈞莽難折離騷熟讀引斗酒怒擊青萍唾壺缺雲霧朝披博羅頂星斗夜摸空同峽歸來笑擁緑衣女盧橘楊梅照紅頰朝雲已去學士還瘴雨蠻烟護荒碣精忠大節豈重覩文藻風流頗頏頡乾綱一振壬午歲地闢天開走狐孽徴書九道發燕邸盡起龍干布朝列是時沈郎奉明詔長嘯扁舟返西浙逡巡故國拜丘壠問寢髙堂痛離濶縣官日夜戒行李驛使交馳訊車轍男兒肯作里中老直臣更樹臺端節同時吳趙艾與鄒騄駬飛黃並騰踏沈郎詎得終岩穴天上仙查遡河漢腰下刀環耀明月揚鞭再過五陵豪擊筑重招薊門俠薊門樓殿花三千尚記公車抱長鋏對策明光亦草草敝履短衣行䠥􅍷中原邂逅吾共爾白眼紅顔寸衷合誦余連璧心已醉示我郊居思橫發蒼茫大雪華陽街拂袖徐生館中别風塵傾蓋古則有宇宙論心近誰洽即今汝燕余復越抗手胡能不悲咽沈伯子酌汝蒲萄之美酒繫汝珊瑚之寶玦一言贈汝中自知此去中外望掀揭兒童走卒盡道汝凜凜剛腸石與鐵腰金拖玉寧汝事義膽忠肝豈虛設三公九列貴易保萬姓千秋口難輟重華尚納大禹戒仲甫亦補周王闕朝多善政祿可飱事有當言檻仍折風雲况遇大行日努力群龍樹勳業竹帛旗常兩光絶一旦抽身蚤林樾丈夫出處須偉烈嗚呼丈夫出處須偉烈異日儒生秉鈇鉞長歌行送方翁恬遊武夷有序方生翁恬祖太古以隱操著稱為詩歌不規規繩墨而天趣自得吳歙間名士多與之游生少即世其家業時時挾策及余門所為寄贈推挹者甚至今秋得余白榆集讀之狂叫擊楫立為跋數千言余彌愧其奬飾顧自生昌芰之嗜發之余未嘗請也爰報以詩方生堯治太古孫丘壑流風今尚存敝衣掣襟動見肘負氣不肯干豪門自言知交遍海宇輸肝伏膽惟三人新都汪伯玉興國吳明卿里中胡元瑞三子者令我寤寐勞心魂丈夫壯志在不朽要今竹帛垂乾坤升堂入室即先達眼底窮通安足論憶汝前年走興國雲夢瀟湘眼雙碧吳郎跳梁空一世贈汝篇章朗奎璧憶汝去年入新都司馬文名天下無如椽立草處士傳坐令氣色髙菰蒲兩公聲譽冠天下汝得璠璵重增價先生齷齪類楚囚汝何所見何所求方生大笑笑余懶惟我與公交不淺柴門相去十里强溪上時時達雞犬自君總角才已聞我向何人不道君大蘇小陸長在口王後盧前詎足云曹劉李杜亦男子見君敢謂秦無人君或未知我我實深知君君也歌詩遍林樾恍揭大吕懸雲門珠璣萬斛落謦咳世人疇不攀青雲胡為靳我無一字如挾九鼎持千鈞即今便欲武夷去寸心耿耿當誰陳秋風布袍寒徹骨願得片語回陽春我聞生言亦大笑過誠在我不在君不見杜陵贈端復文章有道交有神家雞野鶩種種好大鵬斥鷃何疏親醉中狂筆歌贈汝朱絃白日飛梁塵憶生年少氣橫發世世綸竿受家業學書學劍三十年學得新詩動吳越青鞋半踏天竺雨白紵全驕武林月我謂汝詩勝汝祖汝得余言欲起舞先生片諾豈偶然立榜余名在今古髙堂颯沓來寒風繞夜芙蓉電光吐干將莫邪自有靈誰其拂拭華隂土嗚呼窮鬼實伺人五畝經營生計阻連年旱魃滿山谷赤日橫天跨平陸十家九家鬻嬰孺生也寧免妻兒哭晝捫甑釡多游塵曉摸瓶罌絶餘粟床頭魍魎時揶揄屋上鵂鶹多刺促任使喉端喙三尺不博車前薪一束以兹欲作閩中遊幔亭峨峨天盡頭雲璈玉佩紛上界鐵船丹竈懸中流一遇靈仙蛻凡骨脫棄妻子如蜉蝣先生較汝窮更甚蹉跎四十談封侯老親稚子倐拋擲一身宇宙如懸疣浮名雞肋果何用百年强半居窮愁作歌贈汝慰汝意仰天長嘯風颼飅三山九曲㑹尋汝竹枝桂棹行夷猶武夷君兮倘相值挾汝爛醉金銀樓病餘絶不作長歌生兩以書來堯治垂槖而遊閩惟藉子大篇以重即子有辭於堯治其曷辭於武夷君噫余懶慢自廢若青霞赤城兩地主步武間不聞問久矣况武夷君庸暇以苛禮責余惟是生十載之勤缺焉久未報也故歌以慰之并寄詢武夷君焉二酉山房歌有序弇州王公既為余記二酉山房矣新都汪公復為余作山房書目叙敬賦長歌奉酬凡千字君不見崑崙高高閬風出其上下視扶桑弱水相去幾千丈傍開四百四十門日月東西互相望傳聞大酉小酉雙名山乃在崑崙閬風二嶽之中間帝遣藏書號羣玉金庭石室森鈎連白虹璀粲映緗帙朱霞錯落垂琅函自從軒轅來窅絶殊人寰靈威丈人過縮足不敢前成周穆滿驅八駿躡電乘風到靈境嵐深谷峭黯莫留却攜王母升蓬丘祖龍炎威掃六合秦人留書閉空峽至今玉洞開桃花仙源可望不可涉坑灰未冷漢社興大兒中壘小子雲藜然天祿下真宰爛漫七略羅天人阮家居士重搜録蠧簡縱橫委胸腹湘東再火一不留七萬瑤華燼荒簏聚書崛起開皇朝縹囊璚笈摩丹霄纍纍三十七萬卷嘉則之殿髙岧嶤諸儒讐校汰冗雜正本亦止三萬饒開元八萬最竒絶往往𤣥珠出岩穴宋時羣主競好文一日三詔何繽紛後來馬鄭諸子出摩娑論列亦已勤好武遍中華馬上為生涯詩書匪故習文具徒矜誇鴻荒重剖大明域九曜含輝聚東壁天開地闢恢雄風霧湧潢流映朝日吾鄉文憲達最先髙文大册揮如椽青蘿讀書四十載鑽研法藏窺重𤣥雲間子淵嗜綴輯斷簡殘螢映墻壁成都用修雅好竒索摸科斗成嗔癡南陽陳卿負綜博一生惟折五鹿角北海馮君推殫精歌謠委屑煩經營突兀琅琊起文苑力挽頺風究墳典爾雅樓中四萬軸金石齊頭五千卷須彌磅礴宛委深吐納宇宙橫古今張王陸沉驅左席何因物色來蘭隂蘭隂胡生負書癖早逐劉郎卧岩石髫年已絶軒冕好壯歲偏耽窮鬼力北走燕臺東走吳金陵閩越窮江湖僦居寄廡録餘燼負薪織履償追逋陸則惠施水米芾昏黑忘眠晝忘食乍可休糧餓途路詎肯空囊返鄉國二十四庋羅山房二千四萬堆琳琅黔婁妻子困欲死君山篋笥富可量上距羲農下昭代觸手牙籖宛相待聖神賢哲窮訏謨帝伯皇王罄元㑹一榻一几橫疏寮一琴一研祛煩囂焚香獨擁四部坐南面王樂寧堪驕黎生八分稱好手夜宿山齊笑如斗縱觀丘索盈前除大叫狂呼題二酉琅琊作記當代傳姓名已覩琬琰懸觸目傷心故交盡却尋司馬來新安司馬心胸曠千古夙昔圖書探天府三墳二雅勤雕鎪一笈五車勞綴補太函峨峨雲際開恍入東觀窺蘭臺衆中誇我好𤣥者撐腸拄腹談天才寂寞螢窗守殘雪攬鏡蒼茫見華髮聲華豈必專窮愁著述總知成滅裂側身六合中自疑異代乾坤未堪說感公國士知肝腸為公竭幔亭十日飲驅車復成别回看二酉山崚嶒渺天末崑崙閬風定何處弱水扶桑杳難越底似從公居太函副墨煌煌恣翻閲君不見太函五城十二樓金銀城闕天盡頭陶公八翼不得上梯仙豈合凡人留孤帆且返越江涘俯仰竹素聊優游異時四部讀已盡𤣥關或許停蒼虬君不見蘭隂下瀫水流輪囷古木枝相繆甕牖繩樞閉荒徑蓽門蓬巷懸清秋夜夜紅光燭星斗兀兀陳編栁生肘短鋏長檠竟何有醯雞甕裡真自笑蠧魚架上安足友竺乾本來一物無柱下青牛亦西走函中領取五千言赤腳流沙尋二酉少室山房集卷二十九
