body:
  text: 少室山房集巻一百二十明胡應麟撰書牘十首與李惟寅君侯之結社長安也義薄雲天聲鬯海㝢四方才雋影合嚮從葢平原信陵梁孝陳思合而一焉維時不佞齒最少技最劣而名最卑而君侯一見拔之珠履數千之中置之國士無雙之右以上賔厠下走以大將呼小兒渥解衣之惠𢎞結襪之風崇㫁金之交竊聨璧之譽即君侯鋭情吐握靡擇芻蕘乃不佞沐浴殊恩卵翼洪庇鏤丹擢赤自矢以毛遂荆卿冀一當狗盜狗屠於門下者詎旦夕忘哉何期游從欵洽造物見猜唱和繁興真宰積怒風波倐起羽翼中乖足下留都不佞還越躑躅薊門之野徬徨易水之章飛霜擊於青𡨕長虹貫於白日壯夫之髪竪而指天烈士之肝墮而墳地當是之時僕與君侯面孔相向黯然魂銷嗒爾神去窮愁孤抱逆旅萬端口欲訴而一詞莫陳膓已㫁而九迴靡歇誠生人之荼毒而知己之極悲也自别足下言返故廬肺病侵凌雄心滅沒分已息交軒冕絶迹市朝雕蟲是師蠧魚為友經史子集環蔽蓬蒿典索丘墳唔吚草莽以立言為盛節以不朽為殊勲覽太𤣥則大子雲之準易紬中説則韙仲淹之續書讀史記則榮司馬之褒誅咏離騷則髙左徒之比興紛華盛麗弗存乎中隱約沉淪無慕乎外跋扈飛揚取諸懐抱優游泮渙遂其平生日晡而眠日旰而起科頭跣足不履不冠抱膝微吟曲肱長嘯清琴數弄名香一炷頽然丈室耳目盡忘霽景良朝荷鍤小車携壺蹇衛興集神王無問所之招南鄰之叟尋北寺之僧耦東郊之農挈西園之幼時而濯和風㺯佳月翫晴雪眺晩霞時而厯層巘升髙岡浮清川浴淺瀨時而撫長松倚修竹坐茂樹掇幽芳時而釣浮鯉弋飛鴻聽鳴禽友黄犢得意則涉旬長往耽竒則彌月忘歸黜陟不知理亂不聞寵辱不驚利害不入汎汎然若大尊浮於江湖虚舟泳於川澤一切人間世不復繫寸衷久矣惟是空谷之中足音曠絶二三兄弟耿耿余懐若吾惟寅尤所眷注追惟夙昔授簡操觚把臂崇壇論心廣座自謂黄河如帶泰山若礪金鐵可泐盟好弗渝寜意渙散暌乖至有今日此黄鳥之歌所以興悲於逺别碧雲之怨所以極望於長空也嗟嗟惟寅華陽未毁碣石猶存屈指故交無恙有幾祕書長夜於羅浮内史先秋於大庾康子棲神於雁宕童生委骨於龍丘謙之草宿於瀟湘鳴臯木拱於京洛仲修汝修楨伯持伯𢡟功孟弢在明諸子或投簮海㟁或解珮江臯或挾䇿都門或懸壺市肆莫不雲萍蕩析風葉紛披後㑹無期前懽蔑續桓大司馬云樹猶如此人何以堪嗟嗟惟寅追思往事能弗痛哉周視吾曹僅一足下嵬然靈光樹燕趙之長城撐呉楚之半壁坐朝堂則方虎之重出沙漠則韓白之英際遇隆矣建樹偉矣榮名顯矣志願躋矣亦念鄙人之瓠落乎已乎惟寅君侯進而清廟垂不世之勛不佞退而名山希来世之業固知鵬鷃異翔龍蠖殊軌然而屈伸逍遙大小一也合浦之珠復還有日延津之劍重合何時臨楮吞聲泪目枯竭與黎惟敬祕書始不佞之遊長安一丱角童子耳公以三十年名家覩其隻語而拔之庸衆之中躋之國士之右略其黄驪期以神駿即中郎倒屣於仲宣元禮通家於文舉較之今日不足異也六載都門聫鑣並轡西山四百八十寺題名其上嵗輙一周每令節芳辰名園勝墅若河朔盛夏蘭亭暮春梁臺冬初赤壁秋望靡不折柬追呼窮極興會華堂邃閣飛塵不侵繡户珠簾珍玩羅列圖書四壁彛鼎兩序清談甫洽能事競興公與壽承以翰墨思伯以丹青惟寅以鳴琴鳴臯以擊劍謙之子鳴仲修汝修以壺矢六博僕與裕卿在明顔生岑生以奕棋董生何生以篆刻又武人李生箜篌琵琶藝絶當代前無等倫自餘諸子有抱膝而吟有曲肱而卧有胡床瀹茗有棐几焚香人自為偶形骸盡忘禮法無拘機械不設羣賢既至少長既集披襟酬錯撫景留連或惠風暢於庭際或素月皎於簷端或密雪布於長空或曽氷啓於幽壑重以名花十畞喬木干章深菊萬叢疎梅千樹四時景物觸目彌佳至於改席懸燈淫宵徹漏左龍陽右安陵前緑珠後静婉魯衛新聲宫商迭出滇閩異味水陸遝陳飲則踰平原之日而不歸醉則届中山之期而不醒一咏成而句己傳於碣石一賦出而楮輙貴於洛陽誠人代之賞心而帝京之盛集也自門下引髙岩穴僕亦羇卧林坰一時同社雨析星飛十禩以還喪頽略盡思伯圽粤仲修圽燕鳴臯圽齊謙之圽楚壽承圽呉子鳴裕卿圽越兩朱生落魄昻藏一則罷瑟王門逍遙簮紱之外一則鼓刀屠市宛轉縲絏之中僅惟寅燕頷樹都邑長城洎門下鴻𡨕垂藝林碩果追憶曩時樂事如彼軫念兹辰離索乃爾何能不扼腕徘徊撫膺躑躅望美人於天末思公子於雲端也緬惟門下俯同此懐寄我新篇誦之踴躍僕常抗論古今文人年迨晚暮非才力之變衰則志意之横放較之壯齒往往不侔獨吾惟敬楨伯二君並起一方咸汰斯患比聞卜築朱明閉闗勾漏羅浮萬仭競秀争竒而公方吐納雲嵐超忽霞霧固宜青蓮歌曲倚醉彌工拾遺詩律投老逾細也君華翼翼騰踔九逵何物黎君生此寜馨豈所謂丹穴之鷟騄耳之駒非耶僕下駟程材黔驢較技二毛滋見一善靡聞微長康之黠而類其痴匪嗣宗之狂而慕其達﨑嶇大於馮衍厯落甚於桓倫加以牝雞在室無晨不鳴獰狗當門有時而噬雄圖幾於盡擲壯志尚爾未灰爰倒檢舊殖垂且百弓馳上大方慮規三益興文道故神往形留徙倚足音惠予窮谷報蘇君禹督學語云白頭如新傾葢如故不佞每三復斯言未甞不拊髀嘆也何者不佞東海之鄙人耳束髪修詞則雅嚮慕兩漢三唐之業既從家大人浪遊京洛一時名勝不鄙謭陋引以過從年弱氣盈妄意舉足掉臂可升作者之堂入風人之閾而志大才疎心長技短世務嬰其懐抱疾病中其膏肓將遂負笈名山脱屣塵外而當路一二鉅公憐其泛駕拔以空羣復爾逐隊簮紳靦顔佔俾古今殊尚妍醜異觀屢上公車輙復報罷兹者三戰皆北被褐東歸却掃閉闗自同麋鹿不願一㸃迹郡縣之門厠足旌旄之末即以命世賢豪登壇鉅匠輶軒咫尺徒有神飛詎意執事聖不自聖念及蒭蕘才以憐才采兹葑菲車徒雜沓相對屠沽軒冕熒煌下交岩穴即不肖知同斥鷃藝劣黔驢能不一披肝􅅹膽吐露於大方之側哉樓船豪飲懽極平生握手欵言誼成千古桐江入望嚴瀨分襟夕陽在山黯爾魂佚即不肖於門下未敢謂國士無雙迺執事於胡生允可謂知己莫二矣夫士有生同里巷迹締姻㜕而蒿艾異芬參辰沒齒者明公獨不階片刺無事先容結駟班荆頓成金石則古人所謂白頭如新傾葢如故豈欺我哉載讀參知公下頒手札大義勤惓鴻篇尡耀輟問字傳經之冗尋分題授簡之盟非慧業宿根庸暇及此謹用掲之坐右誦以終身即下問撝謙拳拳無已譬則瓠巴鼔瑟慶梓削輪諦聽旁觀惟有心醉而已卧病以来向疎筆研清風披拂舊習復萌綴七言律六章不揣碔砆上酬珙璧將因布鼓竊叩雷門伏惟惠以同聲痛加繩削尚胥後命神爽飛馳再報君禹夜来篝燈疾讀諸大篇古風已登漢氏之堂入阮公之室當今獨步靡可比肩五言律清融朗秀接軌開元七言律流暢和平比蹤大厯時而屬比少疎音節過亮猶之商彛小蝕趙璧微瑕固無損其連城苐益彰其至寶伏惟明公虚受之懐獨隆千古下交之誼夐絶一時草茒曲士濫荷深知稍有隱情便為大慝故忘其聾瞽冒布腹心非敢説劍公孫之門賛詞尼父之筆實欲反求大匠加削朽株上冀隋珠借光魚目耳占對卒卒不既願言報王大參應麟牛馬下走瞻企清光夐若霄漢兼以幽憂之疾株伏枕衾素不敢冐昧晉謁大人君子即郡城之中足迹疎曠十年所以春初驟承車駕左顧衡茒國士之知踴躍肝肺强顔持刺一再公庭辱明公忘分推誠屈威損重寵施異數冠絶後先以王侯而友匹夫以方岳而遵窮巷閭閈目以生輝道路詫為殊特擬諸信陵之轡則上焉者齒徳俱尊揆諸僕射之旌則下焉者技能彌劣誠當今之創覩而古昔所難遭也間者復辱雲箋下詢岩穴腆儀盛貺飽徳醉衷九頓拜嘉罔知報塞頂髙履厚奉以終身使旋卒卒肅狀布私媿小子之不恭惟長者之崇照謝張大參知睿父谿谷波臣林丘牧豎管窺蠡測無異醯雞辱長者采擇蒭蕘過存藜藿屈上公之威重問下士之沈㝠發金紫之謙光忘草野之侮倨征西車從闐咽道旁鎮北干旌徘徊閭右固己榮逾衮鼐寵溢衡茅迺至彌生之刺甫入於公庭崇伯之饋遽吐於私室中郎之屣旋倒於賔席孺子之榻長懸於郡齋爾其握手披襟論心造膝深宵坐月永晝談天縮四部於齒牙羅三車於指掌懸八荒於匕筯酌萬象於尊罍洪荒混沌之前元會運世之後兠率須彌之外僬僥蠻觸之中無不綜核精研旁通曲暢張華束晳耳目未該劉杳陸澄記誦徒侈奪何憲五花之簟窮王勃七曜之文元氣淋漓真宰幾於上訴靈光焜耀太乙為之下巡藝苑大觀詞塲豪舉斯其極己又何加焉盛集希逢令辰難再布衷陳謝莫罄願言報張中丞助父自北地信陽兩君子龍躍鳳鳴奔走一代子業以清聲古色接軫聨鑣河岳之靈幾於盡洩嗣是中原文獻一綫寥寥明公崛起方今雄飛直上較之三氏於湯有光不佞雖未迓後塵得諸瑯琊伯仲恒以為湛盧太阿鋒不可犯宗梁徐謝咸避前茒於時私心嚮往饑渴靡加而霄壤途岐聞問稀值間者敝車羸馬蹩躠長安邂逅壚頭周旋大雅辱明公略去形骸剖露肝腹扢揚文藝上下古今莫逆於衷相視而笑至枉駕衡茒停騶閭巷上公之貴置之若遺豈不佞夙生縁業當御李君天作之合靡由人力耶不然而間濶於平生者胡其遭逢於漏刻也得書慰諭拳拳以不佞從事嘉隆五子並驅孰知先後令人愧忸罔知所承明公瑰材麗藻横統亡前逸調雄詞髙華莫並俯眎鄙人殆大鵬之於尺鷃而靦焉希有見目狂迂有胷無心能弗沾背所冀登壇大匠終始玉成毋使知人之哲翳累千秋知己之明局蹐五夜至所望也至所蘄也鴻旋勒謝未竟願言報葉鹺臺應麟之乞米長安也敝裾羸蹇蹩躠塵埃十口纍纍故鄉天末重以老親門閭弱弟襁褓俯仰宇宙躑躅河山欲歸則羽翼摧頽奮飛無路欲留則形影㷀獨語告曷從天幸明公政成報命闕下皇情首注簡蒞越邦應麟方以貴賤途岐尊卑禮絶摳趨謁舍投足次且迺明公軫念舊交不遺遐逖形骸罔間勢分盡忘寵以華筵賔之上座披肝洞膈挾日傾宵於時應麟固以飽徳醉衷刻深五内矣至詢及羇旅靡依長途病涉慨然垂慈不報侈惠難名飛檄自天單符動地遂使六翮生於白晝四牡附於皇華門無垤澤之呼野絶雈苻之警俾呻吟餓蜀之夫憔悴遊梁之客安車而遵大路髙枕而達故棲迄今松檜猶存蓬蒿旋掃白頭無恙黄口同驩疇之賜也疇之力也應麟之頂戴鴻恩䘖結大造此生此世何日忘之古人艶稱知己埒於生成麟也不肖昻藏七尺已為明公有區區妻子脱屣何論哉舴艋度淮亟思上謁側聞台旌蒞止改吉秋初敬因家嚴賀使狀布腹心髙牙大纛巍峩九霄馬首威嚴未敢以韋布短衣匍匐道左軒輶少暇圖候顔色不宣報謝直指葉公易水羇棲渥承睐盻臨安留滯更辱提攜大造洪恩怙恃為一而且誠推肝膈分絶形骸以草莽下臣據上公之左席以荆榛窮巷駐長者之軒車古昔僅聞今兹曠覩藐焉一介其奚以堪自大斾出闗樓船抗手臨岐黯慘神爽飛馳洎扺故廬將圖北首而賤荆奄逝井臼靡供嚴父衰遲晨昏莫寄踟蹰里閈寤寐風流極意徳星還照東國迺聞太夫人仙遊之耗痛惙不勝亟擬生芻絮酒匍匐𤣥堂恐盛暑酷炎復勞苫次側身東望悵惘難言伏惟至性夙根哀慕罔極迺玉體方勤劬王事㷀瘁百端尤冀勉思大孝損節深思以上副聖天子九重之望下慰太夫人九地之靈詎惟愚父子旦夕懸懸葢東南萬姓同以為祝者也家君使候敢布腹心鄙律六章少抒悼臆惟執事頫亮之載報直指葉公應麟山鹿野麋自放人外長林豐草抹摋世縁惟是明公下車敝邑首辱拳拳捐百里之煩勤三接之遇略州民之分申國士之交即窮年掃迹不敢一投足公庭迺明公諒其迂疎貰其狂簡吹嘘盻睐無已有加應麟於是時業已醉心飽徳自矢豫生久矣自明公飛翔天路不肖亦䠥􅍷風埃旅食江湖萍蓬靡定而邇嵗滯留燕土羇寓武林困瘁伶俜不可名狀乃長者停騶土窟賜席霜垣夐絶恒情一掃世法即古之樂道忘勢推誠下賢未有如執事之光絶後先者也顧麟也何人以最下之朽株當無上之𢎞造劘肝鏤腹愧切難名嵗杪病痬迄今兩載伏枕岑岑辱金玉之章下頒窮谷霍然起誦恍接風儀伏惟明公鳴琴之政迥出千秋攬轡之風髙舉一代即今輿梁溱洧廟貌錢塘萬姓瞻依八表傳播國朝名臣倍屣唐漢至絜功較半未有居下位而立譚之頃成百年之永賴處外臺而垂紳正笏措天下於泰山者也仰惟玉體頽然不勝苫塊矧太夫人有子明公足垂不朽而大廷之簡注環堵之謳吟不可失也讀禮之餘間進苓术節哀撙泣以成異日者震古無前之大孝愚父子旦暮望之旦暮祝之使旋草勒報謝未罄願言啓劄七首賀申學士生辰啓壽域啓黄扉八表覲三台之象祥光流絳闕萬年懸五岳之圖昌期恊而名世生治運隆而真宰出轉洪鈞於北極海晏河清騰紫氣於西華虹飛電繞恭惟某一代真儒累朝宿徳閎深䆳密接孔孟之淵源廣大髙明負伊周之局量蚤年射䇿彩雲垂耀於楓宸午夜然藜太乙下窺於祕閣文章蔚為宗匠朝野視以儀刑紬金匱石室之藏兼總乎丘明大史之所未備校天禄石渠之籍博綜乎揚雄劉向之所未通萬方翹首以望其雨霖五位虚心而倚為柱石惟兹大徳克當天心爰及熈朝時升台座經邦論道尊同帝者之師翊化調元望重王朝之佐掌絲綸於禁闥贊黼黻於明庭陋唐漢之䂓模功百於蕭曹房杜起勲華之禮樂任兼乎稷契䕫龍越裳重譯以来賔西域懐琛而入貢恩加九錫普天同祝其修齡化被四方率土並占其遐筭惟中元之詰旦為初度之良辰欣玉露之方溥值金風之乍起兎宫蟾闕呈五彩之竒輝鳳閣鸞臺備千秋之盛典禎祥協應日朗天開淑氣氤氲嵩迴華拱姓字逺符周伯知間氣之生申聲名近邁潞公適嵗支之逢午兩宫眷問交馳中使於掖庭三殿傳宣盡出大官之庖饌降而百辟莫不同懽爰及羣黎咸知共慶環珮趨鏘於瑣闥衣冠輻輳於通衢金醴熒煌並列安期之赤舄玉桃芳馥雙飛王母之瑶緘誠哉海甸竒逢允矣天人交慶彼函闗之西駕奚裨王靈而洛社之中興空傳逸事孰有榮膺百禄歌太平宰相於明時澤遍重溟頌中國聖人如往代者也某樗櫟庸流草茅下品龍門顧盻濫空冀北之羣雞樹瞻依彌切周南之想届兹華誕曷任飛馳敢竭愚衷少申毫未伏愿介富夀康寜之景福奠靈長鞏固之丕基奉天子者億萬年大業與乾坤而並久相成周者八百載太和亘宇宙而長新某不勝翹企祝望懇切屏營之至賀大宗伯王公啓代伏以八座尊嚴當代重斗山之仰九重咫尺敷天切霖雨之思興禮樂於太平䕫龍再遘復文章於元古左馬同聲凡叨函丈之末光曷任門牆之私慶瞻依莫喻踴躍難言恭惟某海嶽儲精貞元毓秀巍巍名世應五百年間出之期赫赫儒宗際億兆載方亨之運雋譽流聞於襁褓英稱藉甚於簮裾瓊島風清獨占羅浮之桂樹玉堂天近先攜大庾之梅花雄飛雁塔之前髙步螭頭之上讀書中祕羣公讓彩筆之鶱騰獻賦西清列辟覩宸旒之悦豫視東觀蘭臺之草紬石室金匱之編天顔肅穆以親承日角從容而坐對堂中刻漏蓮燈合藜火以交輝閣下絲綸槐色與薇花而互映望極乎清華之選恩隆乎密勿之司鼎鉉時升佇聽宣麻於北極軒輶蹔借猶煩典禮於南宫治神人和上下非伯夷何以任其官審經曲觀㑹通必商容乃能舉其職郊天祀地之典一振宏綱朝日夕月之儀咸撮機要萃衣冠於朱雀兩都瞻黼黻之光馳劍履於蒼龍四海播儀文之盛玉樹鳳凰之句金波鳷鵲之章振六代之靡風一歸大雅攬三山之秀色盡掃陳言中夏外夷拭目冀希文之大拜兒童走卒傾心頌君實之明揚誠哉不世竒逢允矣當今快覩明良喜起之氣象將益信而有徴聖賢豪傑之經綸行且立而可待某白屋經生寒氊末品衡茅佔俾濫膺桃李於公門草莽摳承幸接芝蘭于下席夙奉鳴絃之教冒干製錦之榮葉縣飛鳬有惆王喬之異術冀羣識駿敢忘伯樂之殊恩用竭愚衷肅陳短狀少紓蟻悃上祝鴻猷伏冀珍玉道躬膺承簡命彤庭晉接効鹽梅舟楫之誠綘殿敷陳荷柱石台衡之寄與周召閎散而相望並伊臯稷契以為徒某不任翹企瞻望之至賀御史大夫趙公啓代栢府崇遷九域佇澄清之化蘭臺獨坐千官迴振肅之風廟堂動色於周昌朝野歸心於汲黯太微髙揭清光徹帝座以昭回執法中懸紫氣合皇都而照耀恭惟某命世儒宗昌辰碩彥為時而出膺五百年豪傑之期協運以生際億萬載明良之㑹爰自立朝之始常存正直忠讜之心洎乎入仕以来茂著渾厚精明之業大行首試聲名逺播於邉陬給舍旋超奏疏交馳於瑣闥敭厯乎東藩西省惠愛旁流飛騰乎北寺南臺丰裁益峻昌言正色屹立於波靡瀾倒之時大烈精忠聳動於地闢天開之日駐襜帷於蜀郡三峨飄象緯之光行鹵簿於江州五嶺借山川之色四海之傾心日衆九重之注念彌殷大纛髙牙不踰年而内徙穹階峻秩甫閲月而重遷威行百辟之先位列羣公之右鷹揚虎視巍然柱下之元僚鳳翥鸞騫赫矣臺端之碩輔蒼珮逶迤於廣殿綘騶馳騖於中逵姦人遙望以潜踪善類因之而作氣垂紳正笏雍容而鎮定乾坤載筆峨冠指顧而動搖山嶽稷契臯䕫之事業復見於今漢唐晉宋之功名𦕈乎其下倬哉盛世斯民之遇偉矣得時行道之秋某樗櫟冗材疆塲未吏沉浮列署濫叨白簡之餘光奔走外藩竊庇皁囊之休烈恭聞大拜曷任瞻依敬竭衷誠少攄忭躍啓汪明府代同人玉舄乗雲漢殿重雙鳬之賜銅符耀日燕城分五鳯之華春光將遍於河陽爽氣式瞻於秋浦某南宫與計叨陪奏對公車上國覃恩幸獲樞承仙駕敢託花封之未僣申芹曝之思伏惟惠降華鑣照臨廣座琴飛白雪幘㟁清風一奏驪歌並折渭城之栁色少紆鸞馭先流瀫水之蘭芬云云賀睿父亷訪擢江右崇遷大國峻陟元僚象軋三垣班聫八座香爐瀑布候旌旄於匡俗之廬畫棟珠簾瞻鹵簿於滕王之閣紫氣極西江而照耀蒼生合東郡以攀援應麟猥以衡茒濫竽溲渤興言芝桂託好蘭蓀懸上榻於髙齋敢云孺子據胡床於廣榭數奉元規顯擢躬逢榮光快覩薄言申賀未罄悃誠神劍雄飛佇躍司空之珮僊機咫尺頻占博望之槎離合互并懽虞並集仰惟崇鑒曷任飛馳賀參知洪公得雄啓棠服延芳户牖協三槐之慶薇垣炫采階除徴五桂之祥雙珠兆而合浦霞飛尺璧現而崑岡電繞懽騰海嶠喜溢江藩伏惟某某髙門日掲巨閥雲礽司文苑於中台是生玉樹宅武夷於上界爰擢金莖八翼垂天預識九苞之鳳五花墮地争竒千里之駒懸弧矢以射中華紹弓裘而傳大業應麟叨光世誼竊庇州民忻逢岳降之辰樂遂華封之祝薄陳牙頰敢布腹心曝欵未申塵悰幸炤舉唐臨海縣丞駱賔王祠鄉賢劄子竊見故唐臨海縣丞義烏駱賔王大節髙風瑰材卓行詞華冠代學業超羣挺生景龍垂拱之辰驟掲天寶開元之幟雕章繪句則霧捲霞舒授簡揮毫則星流電掃楊盧遜其渾博沈宋範以馳驅逃榮上裴聞喜之書陸沉靡悔潔己拒員平原之請壁立難攀至孝篤於平生孤忠竭於始仕㣲官奉母任武功簿而不辭直道匡王謫臨海丞而愈奮屬牝晨之簒國𤣥樞撼而八極搖仗雄略以登壇赤羽呼而萬衆集慟一抔於故主問六尺於元兇厯數屠兄殺子之姦鯨鯢褫魄亟發酖母弑君之惡䝟貐寒心既首建義旗將裂渠魁於七廟旋身膏逆刃尚飛靈爽於千秋偉哉器識無雙詎曰文章寡貳迺史氏因仍弗昌言於紀述而州民謭陋迄罷享於蒸甞誠亘古不白之沈寃實闔郡當先之鉅典伏惟闡發幽光播揚茂烈亟修廢墜廣勵風猷俾乾坤壯氣恢𢎞於崇正之朝海甸英魂振迅於右文之日某不任激切祈懇之至少室山房集巻一百二十
