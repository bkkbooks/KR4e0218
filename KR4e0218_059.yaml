body:
  text: 少室山房集巻五十九明胡應麟撰七言律詩八十首大司馬東明石公過訪奉贈二首百萬良家白羽中驅除南北羨雄風坐收貔虎無雙策誰擅麒麟第一功帶礪河山新氣象旂常社稷舊精忠遥憐抗疏黃門日折檻長留玉陛楓三朝詞筆大如椽琬琰勛勞柱石前七尺安危懸宇宙䨥鈎離合動星躔陳兵鉅鹿登壇夜破敵盧龍出塞年堪笑班生頭漸白欲將銘頌勒燕然送羅浮陳山人揮手元龍客思遐十年豪氣共天涯愁深白下三秋月夢入朱明萬樹霞卧榻經年聞帝座支機何處問仙槎樂遊原上飛霜色惆悵離心折暮笳同胡孟弢張仲立過集李惟寅宋忠父作欲綰相如賦倦遊歸心頻折大刀頭桃花一樹空含笑栁葉千絲盡喚愁狂逐春風眠北里醉呼明月上南樓應門莫怪齊竽拙挾瑟時能過五侯雨中同行父元兆集惟寅第作皁帽攲斜白苧袍尊前華髮漸蕭蕭西堂殘暑驅紈扇南陌新涼上彩毫風度蛩聲油幕逺月分螢影畫牆高從知隻字千秋在底事平原説四豪夏日集大學士趙公齋中時羣從諸孫咸集畫檻雕楹煥陸離雪桃氷李坐含巵天迴廣厦流雲入地擁長廊夕照移繞砌蘭孫誇奕葉當筵花萼鬭連枝朝來霖雨商岩足好奏南薰上赤墀夜同謝友可集曽人倩新居分得臺字客罷復對奕丙夜深居贏得近蓬萊路轉黃金百尺臺入座風流垂拱客登壇名譽建安才雙扉積翠西山墮四壁新涼上苑來清簟畫簾爭奕罷坐攜明月向蒼苔寄贈李參知駐婺中出示呉下名流詩帖甚都突兀龍門重漢都誰從長揖望司徒天邊紫霧飄熊軾日下紅雲抱轆轤種就甘裳連百粤攜來𤣥草半三呉胡床見説風流甚試問南樓月有無為行父贈西曲薛生誰挈名花到上林居然一笑謝千金江天桃葉凌風渡水國蒹葭抱月吟朱鳯半翹縁比翼翠蛾微斂為同心白家長恨殊堪誦早拂東床侍玉琴薛生以七夕初度故小字巧巧又清齋學佛復有素素之稱行父拉余過曲中薛持箋索題走筆賦此名花移植近金鑾一朶能傾十二欄巧思正鍾天女夕素肌長抱月娥寒清商管協河東鳯薛于坐吹玉簫汪明生作白眼和之絶類燕中瞽目彈琵琶者衆為之大嘯云赤錦箋裁蜀郡鸞可但校書推學士龍門飛將舊登壇薛濤稱女校書仁貴以白袍顯素素于騎射甚精皆薛氏云李本建招集薛館薛於弧矢最精挾彈尤稱絶技是日縱觀許為李作長歌贈薛先賦此篇曽伴天孫侍玉宸偷從太白下峨岷驚看絶代無雙質解道登壇第一人薛一見余即以此語相贈翠袖彎弧長貫月青絲馳轡不飛塵亦知八斗才華絶能復抽毫賦洛神同謝友可集王行父館中一尊長夜把蒲萄邂逅燕城貰錦袍彩翰舊飛三楚雪青萍初濯九江濤銷沈徃事迷雞肋歴落雄心擅蟹螯驚座莫言狂態甚風流王謝總人豪王行父入都以鵞飵糟鰣葛簟等物見餉賦此𤣥經曽授楚三閭賦就河東出草廬餽我正思衡岳雁為君重食武昌魚蒼筠巻雪真無價素葛含風玉不如漫向美人論識面十年䰟夢倚璠璵唐從事邀集酒樓觀女樂即席賦此送唐之歙中錦纜黃河憶共來輝煌袍笏下蓬萊風流蹔借蓮花幕意氣頻呼竹葉杯海上晝遊還越郡天涯春色遍秦臺雙騶倘憩齊雲石為掃題名舊緑苔同王行父集惟寅齋頭得來字曲几疎櫺照緑苔髙陽狂興逐人來即看談虎當今事何減雕龍異日才座上彩毫仍楚澤門前珠履半燕臺蛟螭剥落司空字猶記岣嶁絶頂裁時出大禹承帝碑楊博士招飲館中博士成都人舊為長洲縣尹白板雙扉䕶碧苔何人攜酒問竒來𤣥亭暫寄成都客宣室初還洛下才座裏盃盤仍苜蓿宫前袍笏漸蓬萊無論麋鹿姑蘇畔蚤逐飛黃上薊臺仲夏初度惟寅為余舉觴話舊感懐賦謝此什年少相逢結客塲翩翩裘馬賦河梁風期肻逐朱顔盡意氣偏偕白髮長閣上麒麟雲縹緲宫前鳷鵲月微茫桑弧莫話男兒事縱目天山大樹傍蔡穉含招同王恒叔永叔雨集繞架琳瑯四壁前翛然門巷似神仙風驅殘熱先開徑雨送新涼驟入筵三俊聨翩飛宛洛一經憔悴卧幽燕毋嗟老眼風塵下賭墅猶能壓謝𤣥同王太僕蔡祠部集永叔黃門館中十日平原燕未空千秋河朔思偏雄雙攜綵筆邀王粲一抱朱絃和蔡邕太液輕陰迴驟雨甘泉殘照挾飛虹淋漓大白休辭醉何限蘭心玉署中周窽六招飲齋中苜蓿空齋坐典墳居然野鶴在雞羣前身宋玉偏能賦早嵗陳思善属文絶頂匡廬捫墜雪深秋滕閣卧飛雲何須更作如椽夢粲爛朱華鄴水濆窽六臨川人贈王吏部江左高門舊不羣埀紳端笏氣凌雲千秋藻鑑山公疏一代菁華吏部文漏待明光天咫尺香含長樂霧絪緼干將此夕堪延佇何限飛虹易水濆惟寅治第于甃石中得大禹岣嶁碑因函置壁間賦此紀事是日同觀者王行父汪明生十丈穹窿照海湄𤣥圭猶憶告成時不縁竒字中郎識那得靈文大夏遺霧擁蛟鼉晴挂壁星攢科斗夜臨池他年手勒燕然碣萬古銀鈎對陸離贈京兆尹錢公宦迹三朝舊建章風流習習滿維揚髙門奕葉推王謝大府聨翩接趙張謁帝競傳京兆尹入官曽記禮曹郎燕臺百尺衙齋近燦爛黃金出尚方贈答郭太史美命縹緲蓬壺十二樓鏘金鳴玉扈宸旒客傳江夏無雙譽人擬汾陽第一流紫闥霞明螭陛底青宫雲繞鳳池頭遥憐後夜藜燈色曳杖頻攜太乙遊太史江夏人與君禹蘇丈别且六載入都後忽聞以大計至余喜極策蹇訪邸中君禹方病齒謝客躍起擁褐對談丙夜各賦一章金銀宫闕駕蓬萊入覲歡聲漢使來一自驪駒傳象郡那知龍劒合燕臺新書碧荔枝頭寄麗賦紅蕉葉下裁秉燭對談拚永夜參差梁月墮莓苔張中丞助父兩以書寄余余亦兩書寄助父而皆不達郎君後之都下再得手札賦此奉酬廿載梁園望目勤西風林葉轉紛紜浮沈殷羨書中字明滅荆卿劒上文地盡中原惟片雪天長南國有飛雲悲歌屠狗燕臺事寂寞年來未易聞壽柳封君紫氣東溟日夜懸瓊樓春色照華筵簪纓世襲河東後綸綍新傳渭水前桂樹一株偏倚月桃花千度不知年誰論五馬人生貴屈指青鸞絳闕傳區太史用孺招同屠田叔胡孟弢曽人倩崔子玉謝天章高正甫張孟竒夜集得霞字青熒藜火隔窓紗咫尺瀛州路未遐執㦸共誇中秘館飛觴頻入近臣家毫端麗賦燕臺雪座上雄談碣石霞不道羅浮天萬里玉堂清夜看梅花秋日汝元招集城西李氏髙嘯臺即席賦百尺䦨千掛斗牛千家簾幙浄髙秋慈恩花竹深藏寺太液芙蕖逺入樓檻外飛雲盤野鶴尊前斜日墮沙鷗脫巾洗足俱成趣莫負平原十日游惟寅偶中人言不佞復將南發去住之懐凄然岐路漫成此章虎將親提十萬師功成頻奏乞歸詞寧知巧貝生文錦不信明珠溷素絲上將且開黃菊宴遊人先到赤松祠飛霜夜發河橋舫愁絶乖龍入夢思時值暮秋别沈司空純父二首津亭黃葉正紛紛不斷秋聲馬上聞客子衣裝鴻雁隊元戎旗幟鸛鵞軍攜歸海嶠猶春雪望入河梁幾暮雲萬里孤舟三刹畔不堪重泊過宵分何限飛霜易水頭木蘭舟楫蹔夷猶四愁是處羈平子八詠當年擅隠侯羽扇論兵朝北塞胡床攜客夜南樓誰言片月關山逺夜夜雙龍合斗牛别李太保惟寅一騎西風問故山淮南樷桂正堪攀華筵首列三千坐大厦長依十萬間出塞功成遼海戍攜家秋盡洞庭灣高牙突兀雲霄上清夢頻飛玉筍班别郭太史美命午夜西風興式微并門黃葉背人飛孤雲萬里還丹壑列宿中天覲紫微異代漢庭談結襪他年周鼎佐埀衣莫愁楚越音書斷何限陽春落海圻别王文學行父並所知薛生長嘯都門話草萊驪駒猶傍夕陽裁新詩絶代王摩詰妙舞傾城薛夜來尺璧故應還楚嶠雙珠何日問秦臺紗窓繡幙論心地飛夢時能到緑苔次潞河少保趙公太保李公各遣人以綾錦追遺賦謝煥爛雙緘襲彩毫春風如拂潞河濤寒銷學士青綾被艶借元戎赤錦袍范叔豈忘歸魏思蘇卿寧憚入秦勞江干好伴羊裘客埀釣三山問六鼇與行父别都門意殊戀戀抵潞水則象先尚未發舟把臂驚訝雄飲浹日言念行父再贈此章興盡西風策蹇驢河梁酬唱未全虚那知流水思君日徐幹詩思君如流水正值陽關送客餘是日辰别行父夕遇象先陽關王維詩也中斷雁行仍比翼雙緘魚腹互傳書行父象先彼此致書問訊互以不佞為言由來象緯占離合遮莫寒光射玉除潞河南發永叔黃門虚所乘舟以見待賦謝二章北上青㝠問紫宸東歸滄海話埀綸那知錦纜登仙客猶戀綈袍謁帝人萬里長風吹浪日千山晴雪渡江晨豪遊是處堪河朔底事平原話浹旬攜手雙星散玉函故人憔悴百花潭多情落日停絲笮無恙西風入布帆大澤魚龍天上下清溪鳬雁地東南聨艫且角新題句何限江楓逐夜談永叔舟中同王山人石父較奕作天末歸心墮釣綸青鞋能復戀紅塵仙槎此夜偕王質旅店何年卧積薪滿座星辰寒照客半窓風雨夜留人無論甲子須臾事筆底桃花萬樹春奕經有半軒風雨集次夕飲酣永叔得句云柝聲頻入夜霜寒余為足成一律時仲子弼侍坐而余于司空為年家柝聲頻入亂霜寒燈燼交飛片月殘詞賦千秋攜玉樹風期三世見金蘭寧親海甸驅馳急送客河橋去住難迴首爛柯吾舊宅石門天際候青鸞林計部天迪招飲達曙作時舟次清源關下華館邀賔駐玉驄當筵霞色照新豐西園公子留明月東海詞人擅大風十道帆檣飛輓外千門絃管嘯吟中匆匆把袂南州去膓斷清源驛路楓天迪宗伯公子也是夕伶人奏劇客有以救蛇獲報者戲于席上賦此呈林君千帆晴色下高舂錦席華鑣夜過從塵榻久懸徐孺子角巾長墊郭林宗青雲是處披文豹紫霧何年化白龍愁絶呉楓江路逺飛霜寒徹曙天鐘天迪以新詩屬序未及脫稿賦此報之青藜遥夜並過從白帢聊將對曼容一遇仙郎慚倚馬從知詞客擅雕龍丹霞恍忽閩山駐紫氣蒼茫岱岳重遍讀新詩三百首江天何處覓芙蓉雪中再作此呈永叔疊鼓嚴鉦報曙雞關河寒色望凄凄飄揺落絮縈高􅜌綽約飛花罩大堤鶴氅乘風天上下漁竿橫霧月東西蘭芽暮茁休相咲玉樹王家遍舊蹊舟次清河逢王世叔通侯先是惟寅以尺素貽世叔至是遇于途中二律奉贈大纛髙牙鎮海濆山河帶礪漢元勛旌旗汴泗千艘合簫鼔淮徐萬舶聞開府世傳嚴僕射輕裘人識杜將軍翩翩白馬平原外時見雙雕落彩雲征西勛烈冠雲臺奕世威名被草萊十道軍儲橫海節三朝人望伏波才摶風白鵲飛旌度噴雪黃龍巨艦來後夜南樓豪興發新詩何限月中裁永叔舟中遇稚升水部再柬二首聲名藉藉動皇畿錦纜牙檣出海圻萬鷁連雲金翅擁雙龍橫霧玉鱗飛淹留彩筆歌叢桂濩落青衫問采薇同學廿年年少友幾人袍笏到丹扉雙旌寒拂大河東舸艦如雲節制雄十載詩名傳水部一時才望重山公風清䢴浦梅花句月朗淮堤桂樹叢咫尺牙璋龍闕畔金緋懸錫大司空贈王中叔别駕二首中叔為永叔伯兄次圭叔與余同鄉薦三君並掄魁移官何啻入蓬瀛矯矯朱霞麗赤城荀氏一龍誇首占薛家三鳯羨偕鳴江天樓閣金陵壯海㟁帆檣鐵甕明聞道畫簾清興劇欲將藜火較楸枰名家曽識晉司空佐郡重看借大馮㟁幘光隂詩巻外褰帷名勝畫圖中西江楚蜀帆交下鐵甕金焦寺對雄屈指中朝優詔下肻令神足限追風入武林寓沈材叔園亭作行李蕭蕭倦客嚢衣襟憔悴北來霜花隂忽睹揚雄宅草色重開杜甫堂刹逺盡流青嶂色簾疎長浸碧湖光亦知八咏才情富曽許風期在末行曽方伯過訪寓中奉贈婺水分符接畫橈聲名八咏共岧嶢縱橫彩筆留三洞燦爛雙旌駐六橋擁霧薇花燕闕近參天棠樹越城遥酬知未和休文曲獨把干將劒色揺再柬陸履素使君矯首湖天望目長畫船簫鼓出錢塘東京驟貴桓寛論南越都忘陸賈裝幕下清霜流彩筆樓頭明月據胡床芙蓉萬朶沈酣夜曽憶當年共酒狂陸使君過訪作門巷蕭蕭閉緑苔高牙俄報使君來驚心雨雪違燕市把臂星辰聚越臺寂寞𤣥經沈草莽飛揚丹詔出蓬萊春花四百湖頭寺彩筆將因次第裁少室山房集巻五十九
