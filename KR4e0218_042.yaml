body:
  text: 少室山房集卷四十二明胡應麟撰五言排律一十四首汪仲淹病足三年未瘳余先有此疾半載始愈戲作十六韻嘲之并期起色焉底事羈神足將因斷俗緣悠然疑入定嗒爾類逃禪箕踞蒼松下跏趺給樹前但妨義手立偏稱曲肱眠筏舍清江上杯留碧海瀍按圖遊五嶽隱几問諸天步學邯鄲客行嘲鹿苑仙漫愁雙屐折何忝一壺懸蹇拙存吾道驂驔記昔年盜驪元泛駕飛兔舊忘筌玉笈看長往金針待大還吾將倩磨勒負汝出蒼煙贈董使君十六韻紫氣黃山外青雲白嶽傍五花元蹀躞千騎暫徜徉曙日懸官舍春風拂郡堂科徭間巷陌獄訟臥桁楊異績東方最遐心北海長琳宫遊問政飛閣駐文昌鼓吹傳清練謳謡接大鄣園桃紅照郭隴麥翠登場地主新知洽天人舊䇿良片言逾琬琰隻字並琳琅司馬邦人重元龍座客狂朱旗晨赫奕華燭夜輝煌意氣回飛動形骸釋混茫徵歌慚下里感事憶髙陽漫擬扶風借行看渤海翔峩峩柏梁殿第一待明揚寄陳玉叔十韻尚憶燕臺别長歌蜀道行元龍原俠氣仲舉最髙名露冕千岩秀褰帷萬岫明地鄰巴婦穴天近夜郎城灌口花相待峨嵋樹若迎海棠開四座杜宇逐雙旌望闕依星象登樓試晚晴朱衣羣吏謁彩筆衆僚驚賦屬揚雄和詩從杜甫評支機有片石一為問君平題柏萱圖八韻紫岫元君宅丹丘阿母家簷前交綺樹庭際長瑶葩翠色凝霜秀孤芳伴日斜筠篁堪並古蕭艾豈同嗟密葉低垂露疏枝上拂霞亭亭驕晚節冉冉駐春華餐實心長苦忘憂思轉遐清氷元獨瑩純璞本無瑕片諾當年許三遷異代誇願言仙圃外長御五雲車賦得十五盧家女十五盧家女歌喉繞畫梁西鄰窺宋玉東壁住王昌畫態真真似詩才盼盼長玲瓏聲窈窕靜婉質輕揚月下紅粧麗風前翠袖狂玉巵含國色金盒貯天漿解珮逢交甫更衣逐李郎終須募摩勒致汝鬱金堂讀何氏集三十韻何太史以先公仲默集見貽展誦興懷敬題三十韻末簡寥落黃初後詞壇更幾人齊梁紛藻繪元宋轉荆榛盛世占龍馬明時起鳳麟黃河懸日月嵩嶽降星辰屈宋休前代盧王祇後塵才髙梁苑客賦擬洛川神意氣橫今古馳驅邁等倫垂髫遊上國聳翮戾髙旻天詔頒黃屋星槎下紫宸通滇窮越巂諭蜀近峨岷弔古多停騎違時蚤乞身攜尊漳水夜飛蓋鄴園春嵗序堪藜杖鶯花暫釣緡九重思麗藻雙闕召詞臣邂逅邊徐合賡酬李薛頻雞林傳制作鳳沼降絲綸帝命軒輶出人看斧鉞巡橫經非寂莫執憲豈沈淪絳帳絃歌日青襟問字晨嶽蓮垂二華宫栁暗三秦仙掌金莖舊咸關紫氣真夔龍方步武鵩鳥遽酸辛消渴相如伍修文子夏鄰調髙原寡和道喪孰知津彩筆精靈逺瑶編絶藝陳千秋垂燦爛一代仰嶙峋鸞掖名長在龍門迹未湮凄涼玄閣草重覩玉堂賔貌識鄱陽烈詩傳水部親轉教山斗望悵絶潁溪濵投贈督學滕公三十八韻雲霧南溟外星辰北斗傍九霄回氣色千里見飛翔大雅今誰屬明公早擅場應圖看騕裊絶代起鸞凰出入平津底超遷吏部郎攀花遊太液視草厯明光珮染金莖露衣含玉座香直躬行殿陛踏翼守遐荒瘴癘開盤水川原接夜郎停車蠻壘肅駐節海山蒼名姓傳閶闔絲綸下廟廊雙旌辭漢苑匹馬渡錢塘斧鉞江城樹樓船水國霜海隅興禮樂河宿斂文章時雨行連郭春風坐滿堂真才呈琬琰異品得圭璋沂水琴堪奏豐城劍有芒絃歌聞曲阜桃李遍河陽吾道乾坤闢斯文日月光六橋供艤棹三竺引飛觴黃閣聲華逺青冥道路長鸞書飛建禮鳳藻出長楊師範真遼絶生徒轉激昂陸機曾入洛司馬舊遊梁九嵗題鸚武三冬解鷫霜上書思漢主作序擬滕王綵筆空凌厲丹梯尚渺茫塞翁悲失馬牧子嘆亡羊寂莫松蘿契蕭條薜荔裳一區原憲宅萬卷子雲床避世嗟秦士酣歌學楚狂煙嵐尋白石雲水狎滄浪厯塊憑誰試連城祇自傷幾年懷卞氏此日遇孫陽軹里心猶在夷門念不忘惟餘星斗色夜夜繞干將奉贈督學喬公四十韻大雅開元際髙風正始前幾人操白雪四海和朱絃磊落陳王調凄涼杜甫編餘波空綺麗哲匠幾雕鐫盛世稱才子明公實妙年姓名懸寶籙文采燭奎躔已詫龍為種曾聞鳳集肩兩朝司馬學一代子雲玄漢苑昆明外秦城太白顛看花韋曲雨攜酒杜陵煙賦以凌雲貴才因命世傳勝遊飛彩筆麗藻擲青錢斗畔雙龍氣人間五色箋沖騰隨八表取次上鈞天粉閣青綾被璚樓赤玉鞭鳴珂趨建禮視草向甘泉鯤化風雷繞鵬飛宇宙旋一麾辭殿陛萬里問山川講道嗤王弼窮經答鄭玄絳帷朝入越清夢晚臨燕代北看名士關西仰大賢選才空萬馬罷講得三鱣竺國煙霄裡吳峰霧雨邊校文多暇日登眺儼神仙栁外林逋宅波心白傅船潮聲吟際落寺影望中連隻字霜飈動千章錦繡懸宫商間自繞金石巧相宣氣壓珊瑚樹光生玳瑁筵赤城霞並起滄海月孤圓桃李三春合台垣計日旋碧霄看紫綬白屋有寒氊上䇿懷終孺遊齊憶馬遷屠龍空故業落蠧守殘篇學豈三冬富詞非子夜妍世途甘寂莫雲路阻飛騫已辱鹽車顧能忘國士憐鷫鸘愁泛駕魚兔有真筌萬仞終南色千秋太華蓮願言開覺路瀟灑出塵緣夀大司空雷公四十韻宇宙鍾名世山川誕哲人祥光回八極紫氣動三辰晚節憂時念當年報主身飛騰隨白日指顧上青旻劍倚雙龍合橋過駟馬馴孤悰盟檜柏雅操勵松筠環珮燕臺上旌旗越水濵文章傳董賈名理陋莊荀桃杏千門色絃歌萬户春驅馳違梓里簡渥近楓宸稷契堪誰伍夔繇早見親九霄垂氣象四海荷經綸瑣闥傳宣夜璇臺草創辰憂勤回聖主撙節為生民制作傾流輩恩榮邁等倫丹青圖駿馬名位掩麒麟前席長頒幣臨軒或賜銀明良時有待魚水契無鄰一夕金縢啓千秋玉几陳烏號空灑泪龍馭永朝真遺命乾坤闢謳歌海嶠臻大廷看正笏清廟仰垂紳社稷關心久林泉入夢頻留侯元辟穀張翰幾思蓴勇退占賢達隨時悟屈伸挂冠辭殿陛解組出風塵舄履間無棣詩書問有莘蒼生徒想像黃閣已逡巡雪瀑延清賞星潭理釣緡匡廬晴對客滕閣晚攜賔鶴引登山屐猿窺漉酒巾虹霓流甲子河宿繞庚寅網祝新投鴿袍餘舊挂麟玳筵羅窈窕華館列芳新縹渺三株樹崔嵬五嶽神金章垂素頷綵服照朱茵朗月燕山桂明霞漆圃椿方壺聊寄迹南斗待持鈞版築徴前事樞衡憶老臣遙看紫泥詔早晚下江津集趙汝申望衢亭大雪分賦同郭翌之趙汝元郢里徴歌日梁臺奏賦年飛霜流翠幕密雪擁華筵浩蕩龍鱗布飄颻鶴馭旋春隂濃四野瑞靄覆三躔海凍鯨鯢蟄林昏燕雀懸灞橋初䇿騎剡曲乍移船葉落千林瘦花飛萬象妍亂飄鸞掖外斜灑鳳城前綽約翻多態輕盈自可憐珮疑湘女授璫擬洛神傳素魄瑶池近寒光玉座連清音回白紵麗曲奏朱絃漫學瞿曇座誰參慧可禪輸他袁僕射擁被日髙眠不佞自燕中歸後却掃閉關一時藝苑諸名公以吏事來越者雖聞問間通而逢迎都絶乃君禹蘇丈獨下詢芻蕘窮搜草莽停騶傾蓋把臂忘形至貽贈諸篇金石鏗訇風霜錯落揄揚蔑副愧汗彌深敬題排律五十韻奉酬大雅宇宙開鴻運東南育駿才華名懸八斗秀色動三台磊落賢豪契縱橫哲匠來青袍多士避赤幟萬人摧內翰詞誰匹中郎句獨裁王維元擢雋杜牧載掄魁片玉咸陽市千金碣石臺稱臣離草莽謁帝上蓬萊太液春風近長楊霽雪回朱衣蘭署入絳帳棘闈開並列中朝彥同搜大厦材門庭饒董賈廊廡半鄒枚執憲皇情注傳經衆望推髙空摶鳳羽大澤市龍媒伏夏牆逾峻毛韓席乍回連山翻彖象分野别臺駘桃李參差發蓀荃次第培生徒紛負笈士伍競銜枚藻鑑明逾郭包涵德過裴剪裁俱繡綺追琢盡瓊瑰紫貝窮鮫室明璫擷蚌胎星辰諧奠麗河漢並昭回七十摳衣侍三千曳履陪風標崇泰華氣象薄岨崍彩筆扶桑畔朱絃若木隈書藏神禹穴賦就越王臺攜客觀江漲逢僧話劫灰嵐光停竺寺霞色候天台指顧登槐棘從容問草萊干旄晴掩映鹵簿晝徘徊少日題孤憤頻時和七哀卜居鄰木石隱迹混塵埃鴻鵠長矜志鯨鯢慣曝腮清湘晨葺芰孤嶼嵗尋梅漫詫形如鶴真成背欲鮐紅顔勞想像白眼任疑猜總道三鱣隔能堪駟馬來逃榮知石户守分識淡臺把臂行紅藥論心坐緑苔金蘭投管鮑膠漆誓陳雷厚義黃河溢深衷赤日摧長鑱猶雨雪短鋏驟風雷浮海懷偏壯藏山興未頽枯株慚匠斧鈍質快神鎚拒户非干木逃家異老萊蘭隂花爛漫瀫水樹瀠洄且自探玄草何妨醉緑醅天長窮鳥逝地曠大鵬回浩思凌三極元神攝九垓會令千古色閩越共崔嵬賀易使君父母偕夀三十六韻玄圃崑崙外蓬丘日月邊殊方傳勝迹人代幾真仙藉甚文章客棲遲少壯年叔孫元學禮揚子舊談玄夜雪宫牆外春風壁水前杏園虛彩筆棘院墮青錢匡阜晨攜屐潯陽晚扣舷拂雲穿蒨峭臨水弄漪漣勇退聞先哲雄蜚識後賢挾書遊建禮視草向甘泉太液池頭樹慈恩寺裡筵鶯花辭漢闕禾黍問吳田五袴謳歌起雙鳬舄履旋戴星離禹服瞻日上堯天冕拂金莖露香分玉座煙龍鱗看咫尺貝錦乍流傳帝謂淮陽近民稱潁水便之官同白傅奉使屬張騫擁節霜威靜褰帷雨澤綿香爐吟際出瀑布望中連觸目親闈阻馳情綵服偏西江移鼓吹南浦繫樓船燦爛緋桃實熒煌赤錦箋中庭羅窕窈别墅進芳鮮片玉輝藍井雙星耿婺躔蒼虬臨几席騄駬候輜軿跨鳳來王母騎麟下偓佺白雲空入夢青瑣待鳴鞭鼎鼐調元氣舟航涉大川八荒偕忭躍四海荷陶甄瑞靄時時發祥光夜夜懸萬年觴咏地長奏碧霞篇夀大學士趙公二十四韻夀域黃扉啓祥光絳闕懸謳歌來六合氣色動三躔玉醴東華外金莖北極前八千逢景運五百降名賢瀫水生申日南陽臥葛年公郡望本南陽詩書王佐業禮樂帝臣傳錦向龍門奪藜當鳳閣燃探花晨太液視草夕甘泉虛受心如谷違時道若弦一麾俄去國雙屐乍歸田白社便髙枕清溪樂扣舷直聲喧海岱正氣鬱閭㕓密勿皇情注徴求使命遄商岩圖酷肖漢殿席頻前挾日潛鱗起凌風大翼翾新恩移國學舊德重經筵燮理衷元赤登庸鬢尚玄窮邊收羽檄絶島靜戈鋋宰割羣方正調和衆味妍皋夔重步武稷契互周旋蓬矢春華遘椿齡暮節延安期分履舄王母駐輜軿社稷扶元老乾坤入大還願為天一柱萬古鎮璣璇送李山人入洛弔灌父王孫夏五淹淮曲秋成問洛陽關河停别棹驛路促歸裝積雨連中嶽飛雲斷太行芰荷孤旅盡蘿薜故廬荒滿目平原客何人弔白楊少室山房集卷四十二
