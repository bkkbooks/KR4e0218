body:
  text: 少室山房集卷六明胡應麟撰樂府十八首逺别離七夕感事作用李白體逺别離古有之不見牽牛星熒熒河漢湄黃姑弄杼軸錦石為支機招要自成匹永永不相疑終朝卧閶闔折花事遊嬉逡巡怒上帝立遣東西馳天孫尚爾爾世人了可知酌君一杯酒聽我歌别離君不見重瞳墮地氣食牛掃除六合朝諸侯美人嬌愛置金屋彭城著繡誇遨遊時危勢屈走垓下楚歌四面興仇讐蛾眉倐忽化黃土拔山力盡烏江頭君不見隆凖布衣奮三尺蹙項誅秦四海一淮陰菹醢百慮空掌上嬌兒夜啼泣回身楚舞涕泗橫黃鵠摩天招不得未央美人居厠中地下誰呼寵姬戚古來豪傑流住往稱二子裂眥摧天關五嶽任驅使徘徊一婦人竟作别離死何況蚩蚩輩疇能不罹此房帷僅咫尺陷穽如丘山不信别離苦焉知行路難荆榛莽閨闥對面生尤愆逝將舍之去去去適荆蠻荆蠻非我鄉念欲還長安載歌别離曲使人嘆息摧朱顔逺别離何匆匆浮世狹難為容胡不醉我美酒三千鍾蒲萄之釀紫花潑緑尊翠杓春溶溶兩手持蟹螯拍浮玉缸中落葉有時合明珠有時逢人生把酒當盡醉回頭萬事成虛空項劉兩豎子齷齪非莫雄天孫與河鼓兒女徒忡忡二妃從遊已百嵗湘水底事流啼紅屈原李白俱謾語謔浪分明欺乃公大人虎變挾宇宙傍日月駕雙飛龍黃童姹女永相逐周遊八極乘罡風安能低眉折腰局促相若轅下駒守樊籠逺别離何匆匆安能低眉折腰局促相若轅下駒守樊籠沈存中云二妃從遊之時齒近百嵗詞人率以女子待之非實事也飲馬長城窟飲馬長城窟長城多白骨白骨縱橫如雪山風吹飛沙馬不前借問何人骸暴露置其間云是當時秦王築城卒被驅什九亡黃泉膏血飼螻蛄肌肉餧烏鳶惟有白骨存安能復持還歇馬上長城覩此重辛酸令我中氣咽徘徊不能言男兒立功名介胄辭上官橫行萬里外勒勳赴燕然黃金絡馬頭白玉飾馬鞭胡不奮長劍平沙漠欵服諸部落勒石燕然入長安生封定逺侯冢墓象祁連胡為老死長城下白骨支撑玉門關黃榆翳衰草一望徒漫漫子孫不復知悲鳴裂腸肝腸肝痛欲裂子孫無奈何至今長城下白骨年年多存亡信有命壯士悲蹉跎閔彼長城卒聊作長城歌長城歌歌莫哀秣余馬登輪臺輪臺浮雲極天開我馬玄黃以豗尵當時班定逺鬢髮焦黃埃皓首博侯封慈親溘蒿萊其人至今亦白骨定逺之榮安在哉何異長城卒埋胔長城隈不如驅我馬舍之歸去來五花一擲換美酒竹林痛飲忘疑猜雙眼瞢騰向天白飛行八極騎龍媒登高丘而望逺海和李白登高丘望逺海海水何茫茫齊州九點渺空闊東西日月懸扶桑扶桑宫闕連蓬萊白虹照耀中天臺六鰲贔屭負圓嶠羣帝百千億萬紛紛跨鶴遊崔嵬峩岢大舶走徐市安期一去無時回我笑秦王乏靈骨人言漢武非仙才登高丘望逺海海水茫茫接天回使我極目心悠哉心悠哉以倣徨何來龍伯人濯足臨扶桑一釣連六鰲攬之不盈筐煮鰲為臛充余糧鰲骨如山今已霜我醉欲卧黃金牀呼吸靈和挾三光睥聣漢武嗤秦皇周行八極還大荒白紵四時詞四首東園桃李爭春陽美人如花簇華堂彎弓舞袖搴羅裳沈香亭北春茫茫東風吹歌繞畫梁回眸一盼神飛揚我醉欲眠黃金牀南原日長蝴蝶飛朱樓畫閣臨芳池美人含嬌拂羅衣歌喉宛轉浮雲馳流商刻羽知音稀纎腰起舞光陸離我醉欲罷黃金巵西堂雨霜胡鴈來中天皎月璚雲開纎歌遏雲夜徘徊美人擊築秋風哀華陽碣石俱蒿萊荆卿漸離安在哉我醉欲上黃金臺北風蕭蕭撼陵谷白雪飄花滿平陸何處陽春鬭歌曲雲錦纏頭舞鸜鵒美人修蛾無疹粟素手垂垂照寒玉我醉欲買黃金屋虎穴行送曹秀才從軍男兒墮地氣壓鰲俯拾將相如鴻毛時來擁篲掃六合雲霞五色飛宫袍君不見蘇秦微時皂貂泣一朝金印都六國位高金多歸故鄉妻嫂匍匐趨道傍一家骨肉尚如此陌上行人誰家子丈夫恥作兒女悲世路滔滔競青紫酒酣憤歌歌激烈雙眼橫天日星裂便從東海批龍鱗更向南山搏虎穴寧能寂寂雞鶩羣燕雀螻蟻爭紛紛金盤六博飲美酒匣底芙蓉電光吼來朝揮戈大漠北辟易咸陽萬夫走悲歌行滔滔百川逝還流夸父逐日不回頭秋風鴻雁春風燕河東織女西牽牛牽牛織女不相見一似秋鴻與春燕人生有錢付酒家何用殷憂涕如霰君不見黃河奔流下太行魯陽難返九日光黃金可成腦可補試問秦皇與漢武長相思長相思久離别單于臺上秋草歇玉帳寒朱旗折三年灞陵夢萬古陰山雪邊笳日暮起塞門流水無聲隴雲咽長相思久離别長相思路行難玉關鴻雁何時還張霧幄捲雲鬟青燈夜未滅翠被曉猶寒荏苒紅顔鏡中老空閨日日望刀環長相思路行難楊白花楊白花隨風漂泊天之涯深閨無人白日暮金輿玉輦空咨嗟惟有舊時楊栁樹月明夜夜啼棲鴉白鼻騧逢歡白鼻騧駐妾青絲騎羅帶結同心留連合歡被君作干將珮儂作莫邪鈎雄雌兩物巧相遇安眠玉匣三千秋擬李白蜀道難作梁父吟抱膝南陽廬明時甘陸沈唐堯倦六合飛書入深林潁川之水咄嗟不足洗余耳拂衣長嘯直上岱宗之嶔岑岱宗高高不得上卧龍之叟來相尋邀余憩梁父重作梁父吟我吟梁父君莫猜仰天叱吒浮雲開晏嬰侏儒忌賢哲二三力士庸堪哀古來封禪之君七十二其人一一俱塵埃請為梁父吟我吟君莫猜梁父中天十萬八千有餘丈一柱亭亭迥出泰山上􅚱砑巃嵸獨立標乾坤恍若元氣浮崑崙龜蒙鳬繹以東諸阜盡培塿紛紜拜伏羅兒孫決眥斷虹入蕩胸明霞屯手接飛鳥度步學猿猱蹲竦身十八盤象緯漸可捫黃河一線繞山麓徂徠矯首勢欲吞鹿盧之蹻摶旋撇捩不遑息神人絶頂為我開天門開天門閲仙籍其間似有胡生名謫向金華煮白石朝從天門卧夜坐日觀峰峰頭望海色灝灝連長空五城十二樓嵳峩駕天風天雞亂鳴不知夕回飈忽卷大海立海水橫飛十洲溢灩灩扶桑吐朝日紅輪轣轆碾太虛我欲乘之走八極金銀臺殿咫尺間玉女攜余掉臂入掉臂入謁元君呵赤霓導黃麟右拍浮丘肩左顧招廣成神農以還九千九百九十有餘帝揚雷掣電紛紛跨鶴而來迎鳥篆鴻章閟靈迹仲尼捫崖怪難識管子云古封禪文字萬家仲尼觀之不能盡識蛟螭缺落狐兔跑對此撫膺重嘆息翠華茫茫杳何處四顧中原日無色君不見秦祖龍云亭柴望擁列辟衣冠劒舄如雲虹至今淪沒盡荒草故物但有當時松君不見漢孝武馳驅欒大延文成鹵簿干旄照東魯東方小兒弄乃公寂寞荆榛翳壞土吁嗟乎秦皇漢武真蜉蝣我今胡為此滯留拂袖行歌下梁父下山竟作齊東遊齊東道上逢李白飛揚跋扈心神投鷫鸘之裘五花馬一醉五月眠高樓吳鈎如霜雪花落縱橫眼底無全牛我歌梁父屬爾和遙空立降雙青虬世人拍手笑輕薄我嗤人世真纍囚渭濱老叟太多事行年八十圖封侯鄙哉齊國三豎子沾沾一果同獼猴力排南山軀九尺殺身反墮侏儒儔隆中釋耒大星殞人間事事當回頭頭上青絲一朝倐爾變白髮九州之伯四嶽之長如懸疣梁父吟歌莫愁男兒有身睥睨六合追巢由不然淋漓大白掃椽筆陽春百代鳴天球猶勝古來封禪之君七十二伐功詡德誇蚩尤君不見七十二家文字總頑石漢碣秦碑半頽泐惟有青蓮居士梁父吟萬古長懸岱宗日惟有青蓮居士梁父吟萬古長懸岱宗日將進酒將進酒乘飛龍滿引大白噓長虹舜百石堯千鍾北斗奉杓南斗從天瓢出沆瀣大樂鳴笙鏞綃衣萬玉女緑髮雙仙童左拍浮丘肩側睨容成公百年三萬六千日一日不醉令我行步如龍鍾君不見泗上亭長隆凖公斬蛇逐鹿驅羣雄鴻門高會割巴蜀肝腸鬱鬱長思東結約五諸侯伐楚彭城宫一朝項氏自東至五十六萬如飄風滎陽匍匐作降虜何如飲酒來新豐信陵賓客但墟墓古木荒榛穴狐兔平原毛遂骨已灰黃金之館生塵埃何如一笑飲美酒白眼橫吞三百杯長安桑落名最古山東秋露清且苦麯米雲安逺難得若下吳興近堪數世人每病金華甘此酒名高𢎞正間只今天下貴三白積薪後者常居前盛衰好惡若反掌時來不得論媸妍太白三閭豈庸俗一醉一醒操行獨醉者騎鯨上九天醒者反葬蛟鼉腹劉伶阮籍雙酒狂竹林牛飲稱高陽當時頗遭俗子罵至今百代垂文章今晨何晨夕何夕炮鱉烹熊衆賓集觴行瑟作不暫停玉碗銀缸興逾劇三星在簷河漢入扶桑茫茫日東出安得八駿摶長風爛醉瑶池三萬日行路難二首君不見東家叟昔日容華今老醜君不見西家翁昔時豪富今貧窮盛衰美惡反覆掌造化小兒劇罔兩敝車羸馬聊自儲蕩意平心恣歡賞人心險厄如山川行路之難君所諳有酒盈尊肉盈几明日咸陽過趙李君不見原上草一夜霜飛淨於掃君不見園中花一朝風蕩隨泥沙男兒快意在行樂何用營營逐飛藿白日苦短秉燭遊玉碗淋漓恣斟酌人心對面隔九疑行路之難君所知速來就我飲斗酒倐忽華顚壯夫醜東飛伯勞歌西飛者燕東伯勞華堂錦帳生蓬蒿少年兒郎輕薄子棄捐比翼如鴻毛咫尺天孫與河鼓嵗嵗年年隔銀浦一朝烏鵲來填橋猶得相逢話辛苦脂車秣馬夜不停漂流南北如浮萍當時離别勿復道悲風冉冉來長檠機上雙鸞手中線宛轉流黃涕沾面鉛華落盡君不見東飛伯勞西飛燕少室山房集卷六
