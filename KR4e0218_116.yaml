body:
  text: 少室山房集巻一百十六明胡應麟撰書牘二十七首報王承父山人虎頭公大艦中邂逅足下不數語别去真若崔家摩勒持匕首瞥然飛翔太空了無蹤迹可問此時僕恨不得為千牛後身以紅綃累足下嵗杪鄉人迴忽將至手教縷縷數百言怪渠何從值足下訊之乃知其人業醫走呉㑹間得無足下賣藥青城後還訪崔家郎君驀與相遇耶僕自别足下歸杜門塞兌人間事一無所問實有如足下所謂三萬巻中老蠧魚不復出世者亦以邇来大老相繼䘮頽兼之儕輩往往傾逝所可揚眉吐氣僅吾承父一人舉足出門鮮可控告無論生乎吾前後起之士如吾鄉李能茂楊承鯤英英上足僕素以大業期之一嵗奄然同殯狐貉憶僕曩在京師與諸子倡酬齒最稚末三十年来存者遂如晨星今開眼乾坤殆無故物僕雖甫越四旬頭顱種種浸假作靈光殿遺瓦矣足下眎僕十年以長樷林耆宿屈指能幾僕於足下惡能一日忘也别来游道何似飲興何似痴憨何似少病少惱少魔障否妻孥不訕詈否男女不啼號否故交厚禄時時問遺不大落莫否鄉里小兒着緋騎馬揚揚巷陌間自雄亦知震旦國有王先生不舉兩白眼相向否長日坐蟭螟寄讀浮屠氏書老和尚舊公案頗有所窺將来臨大事不至鶻突否幸一一明以諗我足下别諭僕詩藪於前古甚覈廼國朝諸公不無阿私掩䕶當别為快筆紀之僕宿根介戅不解逐影吠聲至於随人悲咲彌所不耐所為詩藪一書悉是肝腹剖露隻字毋敢襲前人前人藻鑑有當於衷必標著本書使之自見其有不合即名世鉅公不復雷同汪司馬作序謂僕于于鱗元美抗論醇疵時有出入無偏聽無成心數言真知僕者居甞恐訐直獲戾信如足下云云人人能如足下者讀此書迺生平大幸夫復何言且僕之談詩大都蒐獵往代罕及本朝偶諸大家有相聨類間一染指不數數然也足下目無往古顧每降心折節于僕此書至欲盡舉本朝名流俾之揚扢此自足下盛意見推可耳當今之世元美所云闤闠詩書人人大將僕雖有喙三尺何敢與也頃為易使君所要選輯明近體詩凡二十餘巻起髙太史季迪訖吾鄉東陽李生自餘存世諸公慮采掇未周槩不敢録若已逝同盟黎祕監康山人之類僕俱纎悉料理不使遺憾九京獨足下名篇傑句浩如烟海而局於欵列無從措手王長公戯余仲蔚若幸健匕箸特吾書太寥寥得無今日謂耶嗟嗟承父同心同調如足下海内無多方與足下為太白殘月相望耿耿寜當以速朽冀足下驟發斯言要令足下洞知胡元瑞方寸中惓惓耳頃閲足下呉越游某子甲夢足下非常足下欣然引滿賦長句以自快僕常嘆羨足下真達人計今聞吾言當復舉大白百餘觥不爾不足為王承父倘天帝白玉樓首詔胡先生或遮須界地主急缺須代後事便當責足下足下幸毋忘吾言詩藪中闊略足下亦坐是故也歐楨伯比一書所論詩藪諸篇與足下見推意大合昔楊子雲草太𤣥俗物揶揄滿路逮百年之後桓君山賞識則子雲者人與骨已久腐矣僕書未殺青王次公從篋中胠得輙狂呌擊節稱善後書成小有異同而長公遂以為竒絶無兩所奬誘咸出過情兹承父楨伯諸君又遞相印可所遭視子雲奚翅什倍愧淺陋不足當或致貽賞音之憾於来世耳足下别我十載間著述更復幾種剞劂更復幾編僕甞謂足下崛起孤島自當為一代布衣之雄唐之二孟非不矯矯然鹿門才偏東野才僻並似非足下伍至近時孫謝之流𦕈無足論若八面受敵一瀉千里成佛受記不傍他人竟當屬之足下苐古今辭章軌筏具在屈騷馬史非必其才夐絶大要天地間有此杼軸其人適當運㑹假以發之杼軸既彰猶䂓矩既設後之欲為方圓即公輸墨翟安能外此故以少陵太白之雄不免憲章魏晉者寜其材視曹劉鮑謝弗如也下至近世秦栁之詞闗鄭之曲卑卑小技不可不曰自開堂奥其才顧賢於李杜耶足下倔强自負顧生平製作脱離今人可耳何甞能躍出古人若才力錚錚破的飲羽則古人復興亦無能多難足下政不必拘拘所見也僕月旦足下身後大略如斯足下其以僕為阿私耶掩䕶耶瑯琊既歿㝢内寥寥英雄逐鹿之際亷將軍善飯猶昔須叩囊底一決之果爾者僕請悉索敝賦巻甲以從與足下掎角中原快哉萬世一時也足下勉旃努力毋令老態逗漏為童孺子所窺宗子相云大丈夫處世上之不能為飛仙周遊八極次之便當為詞客横行千秋僕每咲此君失言疇昔道家者流羽化尸解不知凡幾後皆展轉澌滅肹蠁無聞求其姓名邈不可得與草木腐何異中間稚川𢎞景一二有聞自以依附辭章故匪曰神仙庸詎若原遷甫白數公頌聲燁燁塞人口耳讀其遺集如兩儀七曜光彩常鮮玩其成言則風氣性情恍忽生動此乃吾所謂長生不老非服食煉養蟬蜕鳥伸之謂也藉令宗生而在而聞吾言定當俛首輸伏足下以為何如承春初北游齊代徴長歌於僕以壯行色僕請為足下賦千二百言俾足下登岱宗絶頂奮袂歌之海日夜出天雞亂號雲中之君紛紜来下俯視齊州為九彈丸秦皇漢武胡足豪耶僕將於秋首赴婁江為長公竟集事比時却過溪上載宿足下焦𡨕寄究竟堅白之譚随挾足下卧朱在明江蘺館縱觀女樂罄平原十日驩足下於時多乞烏程若下或隣翁社茒柴數斛以醉我萬勿扁舟他適茫茫烟水問津無從使烏有先生無是公更入長卿子虚賦也與康裕卿八雁山諸詩伸紙疾讀一再過恍然與吾裕卿扶笻振袂涉四十九盤之嶺東望巨海滉瀁淼漫金支翠旗仙聖出沒以億兆計已而宴坐龍湫俯窺瀑布銀河萬丈白練千匹飛流倒挂於空青石壁之間信兹遊之奇絶也觀察公亭亭物表足下又矯矯霞外兩賢相得為山靈成此盛觀良足今古獨僕於二君最善而又所居與二雁甚隣迺不獲把臂同之得無復貽康樂之憾於来世耶夜来睡寐中忽得百餘語遂用昔人夢遊天姥例作二長謠寄足下俾觀察公於東南雁宕絶顛各鐫其一異時足下結茒其上却躡兩青鞋過訪呼李孝光輩擊節歌之勿虞兹山石裂也報康子省啓知定居珠浦三面面山一面面野谷中竟日不聞人聲清溪百畞飛流鏡玉恍忽浣花茅堂數十椽當山谿之勝最㑹心處柴闗僅設八窻洞開白雲英英時墮儿席屋後長松古檜髙矗霞表左右隙地雜蒔修篁杞菊四時取其苗榦花實以療饑籬根繫小蜻蜓艇興至出遊老妻稚子盡室同載得魚沽酒則叩舷擊楫歌滄浪之章一醉篷底不復知東方吐白視曩昔曵長裾彈敝鋏碌碌長安塵土中豈但羅刹之與梵天而已報胡孟弢中秋瀫上握手論心登髙賦别暢劇一時致足樂也榜人還得足下諸作悲壯雄爽飄飄有躡叢霄凌倒景意僕病餘向戒作詩是日讀蘭隂四章酒酣耳熱不自抑按援筆步武數亦如之雖玉樹蒹葭不堪照映以施山靈不妨作苐一重公案也次公秋杪過蘭偶邦相不在邑復值令先公忌僅作刹那㑹遽行僕賦六詩祖筵并似足下解裝以来更有妙製不惜寄將恐邦相旦夕量移音問遂難數得耳弇州公已入闗不復與塵世事英雄逐鹿之際千秋大業方與足下勉之足下努力人生不百毋更作良知見解耽悞嵗時也新秋與邦相山遊甚適得詩若干草寓貞吉所能發興倚和乎裕卿近一書至惓惓致囑足下故交離索念之令人慨嘆深不多及報喻邦相出武林即擬作雲間十日客而疾入腠理矣輕橈抵京口之明日問醫服散而後知呉閶之夜過也意恨恨不可言呻吟枕席間不覺竟成四絶然無繇寄足下緘之奚囊渡江抵淮疾迺大作一卧五旬粒食俱絶奄奄待盡及春始蘇想像足下兹時挾二三同調雕龍碣石躍馬華陽飛觚振袂一日而屈千人甚適也不佞病後如惠施五石瓠濩落亡所之視往與足下唱和時意氣什耗八九矣方且慮以為大尊浮沉江湖恨不獲逍遙生把臂濠梁商其棲泊耳得北来耗有天津之命殊為足下神王髙牙大纛居東方千騎上頭建朱節震華皷循行九河故道思禹功而咏明徳丈夫生平意氣差足一吐蓬莱閣去轅門咫尺間鄉者與裕卿孟弢同登其上飄飄有馭風遺世想三人信筆留題一時傳誦以為殊作恨少足下和之今宦遊此中政可了此公案并前六詩榜之楣間亦盛事也濵海白鹽肌理如玉以并刀削之粲如雪霜太白所謂盤中水晶宜無越此紫蟹惟一売外郛黄膏滿中遂無復肉二物美而且豐僕往留天津朝暮食之聞足下是遷幾於指動然幽越路殊未能浮一葦逕造足下俟秋風起覔錢塘枯枿散髪偃卧其中厯四明呉松登莱至足下所轄而止今之天津又何異織女津耶兹人生一大壯遊非足下不能啓余興苐燕趙古所稱佳人如玉近寥寥不一覩而成都垂簾賣卜者世杳弗聞恐支機石了不可得即得之無復能推筭不若得足下詩耳在明餽米以足下驟遷無復將至僕已往蒸豚與相易令渠更餉足下渠遂并掩僕他寄詩藪奪之一笑與易使君惟效僕之以蒯􅚆留滯清口也蕭然短褐鬱傺無聊若觸藩之羊涸轍之鮒圉圉焉臲臲焉困亦甚矣賴天之靈邂逅執事者軒輶實蒞兹土不佞以舊好提攜追随蘇蔡兩君於玳筵之末操觚雪夜舉白花朝飛葢西園巾車南郭遂令快心之事頓出於窮途極意之懽飜成於逆境較諸平原之期而過之十倍擬諸河朔之飲而益以千秋誠耳目所曠逢而古今之盛集也别来放身江海日從赤松子牧羊窮谷中想像襜帷邈如天上身無六翮奮飛莫能乍覩除目驟聞假重三衢中夜雀躍明公以經國上材干城偉器而久淹侍從心厭承明兹剖符名邦綰章劇地牛刀盤錯游刃有餘矧以江郎舊治棠䕃蓊然過化之區何難速肖哉僕頃益自廢人外百念灰冷萬縁氷消棄禮簡賢世所擯嫉即以公照臨隣壤亦無能挾一刺以俟閽人惟是山川之勝方寸未忘俟衢澗春深桃花彌望支笻躡屐覔青霞洞主較九枰石室之中公於其時倘能却鹵簿減騶從憑軾而来一寓目焉當勿虞斧柯之爛也報易使君公之照臨鄉國也亦越三禩矣婺去衢僅百里而遙而辱知如鄙人曾不能浮舴艋叩軒輶一接温如於宴寢之暇大懼不恭之罪分無所逃迺長者不惟不以為罪也而寵命以先之腆貺以副之懇懇焉懃懃焉布衣之懽金石之契儼猶之乎十載之前定交之始也夫鄙人胡以得此於公惟是雌伏衡廬閉闗却掃足不履郡城之中目不識賢大夫之面為日久矣豈長者過知其戅而大降其疎耶伏惟蒞政以来仁風四訖敝邦密邇尤切見聞厯稽古為守者龔黄召杜惠聲廣布而風雅未嫺元白栁劉潤色多方而膏澤未洽若我惟效使君兼之無媿矣自清源别公離羣索處異時雄飲之態邈如河山實以久在菰蘆不見偉人故也杪嵗桃花之約復爾寒盟兹酷暑如焚未能覔爛柯之客俟秋風起當騎石羊入青霞洞天三衢道中木奴萬個不減巴卭橘鄉樹端有實大如斗剖之而四仙子對奕於中者其一頎然而少擘龍肝於座旁即蘭隂胡生訪易使君而至也報李景穎司理嵗杪持樵斧入爛柯方與負局翁決賭九枰於青霞石上不意使君之過聽易使君也而屈威重以先之極禮意以下之使人綢繆固結而莫能自解即以嵗事峥嶸扁舟瀕發猶心旌飛動於太末之墟昔人亟稱與公瑾交如飲醇醪得無明公謂乎抵舍後圖籍塵埃蓬蒿滿目即欲如張仲蔚中開一逕且病未能迺車駕方賢勞四逺日馳驅東西二越間而僕又索居離羣無從候闗門紫氣計明公具悉於形骸之外也秋首為家嚴諭督勉爾挾書二十載老明經䇿蹇驢冒風雪千里而入長安固已委頓頽落而况以皮骨殘軀强顔塗抹與東家年少子角麗昭陽殿下寜待識者然後胡盧苐有大不得已迫之昔張子房駕言辟榖以歸今胡元瑞駕言干禄以出歸與出則不同寓㫖一也縱筆繆談至此明公得無大咲其狂耶郡志辱明公下委寢瘵以来素業久廢僅舉正大綱及刋定紕誤數則行迫草草致上煩記室檢入之以明公如椽大手即帝命修五鳳樓猶將成之不日而况乎州里之乗何游夏能賛一詞也報童子鳴得足下藏書目閲之所臚列經史子集皆犁然㑹心令人手舞足蹈古今書目條例惟隋志最詳明馬氏經籍考會萃晁陳諸家折以已意幾於豪髪無憾迨今得見古人著述大都往往藉此至故家文獻若張茂先任彦昇輩代逺無論即趙宋盛時宋公垂葉夢得家藏劇稱宏富迺書目蕩亡一存鄭漁仲羣書會記三十六巻見馬氏通考葢亦端臨會萃入已書矣今原書行世可見僅尤氏遂初堂目一巻以説郛鈔録始末具存第其間銓次蕪紊蒐輯濶疎如晁陳馬鄭所載羣籍南渡當悉存世而尤氏所收十缺三四或漏軼過半有之又不分四部而信手錯陳僕每疑非文簡之舊然陶氏當勝國末年去南渡纔百餘禩且説郛特記全鈔於此目之下不應偽撰明矣國初宋文憲博極羣書子集之流似非經意近時馮汝言李伯華諸氏亦名藏書數萬其目考見無從計巻帙或多足下若分門别類部伍井然當無復踰此者足下久客三呉近日藏書更何氏稱最信還具示不宣與朱在明魯有大俠朱家氏甞手挈季將軍於虓炎之網而出之今足下豈其苗裔耶胡興之暴也自足下起島上而士争憑軾而趨風遂令馬䭾之沙與春申之阜岳岳相望古今人顧豈誠弗相及也俾足下而當楚漢無論三千珠履旦夕致之即竒計縱横於脱季將軍何有迺令俯同羣卒日與抱闗擊柝者嚄唶夷門屠市中一念之令人英雄氣槩都盡惟是荆卿漸離二三酒人輩如昔庶幾少泥吾在明歸思邇聞當路竟以王官趣足下彼其以足下難拂衣耶以拂衣難足下耶嗟嗟在明雪廊無恙雲樓屹然盍歸乎来髙卧江蘺館日飲醇酎一斗和離騷一章猶足稱夜郎自王菰蘆中安能俛首折腰作賈太傳長沙面孔也又雜柬七通跨蹇驢晨入春明門風塵簌簌滿面一青衫何物能造爾許大惡業昨乗興擲付酒家卧聽呉姬歌楊叛兒劇飲漏盡不復知城栁之啼烏也二足下買麗姝平康里當復費十斛青琅玕耶江雲樓貯此尤益泠然作真人天際想然何可不一致胡先生也三足下過廣陵璚花觀謁后土夫人樂否腰纒十萬騎鶴揚州無足論要當攬取二十四橋月色滿載而南期足下垂虹亭上耳四婁江含桃大者徑可半寸許色殷紅如靺鞨光爛爛照一室中百蓏之甘殆無復居其右吾里中楊家果差足當然時時作措大風味也五足下所餉藤衣桂餅悉至陳心叔名疑是夕遂篝燈遍讀之此君博洽可念當與晦伯並驅嘉隆間至於絶倫逸羣故當歸弇州氏六徴父西山八章奕奕神令其人已歿遺集當可致不七足下今遂五男兒耶憶足下舉子長安中僕與諸公畢赴湯餅㑹黎生以阿瑶字冡君恍然政類昨日不謂琳琅珠玉盈庭頓爾僕三紀尚無復萌孽念之慨然與祝鳴臯文學今年夏溽暑蒸人頭岑岑若五石甕恨不與足下解衣散髪牛飲河朔之間憶爾時長安中伏天偕足下過某勲戚貴人家惟敬仲修思伯子鳴裕卿少承謙之輩咸集髙堂十仭八窻洞開層氷嵯峨如雪山離立左右前後客坐其中儼入洞庭㸃蒼間大甆盤盈六尺一貯甘泉浮碧桃朱李一滿貯青門𤓰五色鮮華瑩徹不啻瑪瑙水晶平頭奴運七輪扇涼颸滿庭令人心骨俱冽酒酣興發龍陽君振袂起歌髙氏小梁州詞妖姬年十五吹紫玉簫相逐清音泠泠上屬雲漢俄洗醆更席俯臨大渠樓臺倒影金碧洸漾芙蕖菡蓞矜妍競笑應接不遑既則明月出於花間飛星流於木末琴瑟笙敔交搆遞作恍忽遊廣寒聆鈞天迄今追思此樂懵然殆如隔世事矣戲與鳴臯論手談書快甚髙軒出郭輙拂拭楸枰傾遲於白玉壺中而柴闗亭午了無剥啄聲也豈畏心過甚有託而逃耶殘雪疎梅㸃綴籬落明窻棐几不受纎塵擁博山爇沉水憑斑絲隱囊獨坐此時得一碁品卑卑王茂𢎞者㺯之掌股之上追奔逐北千里無留行棄甲曵兵而不止即南面王樂吾豈易哉公在扶餘國中當無復敵手沾沾一方作草頭天子故自雄然何若佐命文皇䇿勲百世也呵呵燕中與祝生雜柬八通安石榴二樹可盆栽着北窻俟五月盛開胡先生戴砑光㡌舞山香一曲其下何但絳英㸃頭當令阿平絶倒不已二金水橋偏見寫本北堂書鈔與購未獲賈人索值四十千購得即馳送足下適煮羊胛已復爛足下食指動者速跨東華門衛子来三太平廣記近迺有刻本出晉陵談氏讐校頗精今六代唐人小説雜記存者悉賴此書苐中間數巻全缺僅目存首帙吾暇當與足下參互訂補俾此書復稱完璧亦異代子雲也四陳晦伯正楊援証頗精至詩文引用或㫁章取義或反覆抑揚此自詞人所解而陳苐據紙上陳言格之恐用修有靈將復稱屈地下五蚤入燈市中購得陶氏曾氏兩雜説知足下雅欲觀以累東郭君使者此二書鈔本僕所覩十餘無一善足下讀之疑誤輙止乙其處六乍過酒樓擁少姬彈琵琶樂甚甚思與足下共之一同人趣赴朝貴約興遂颯然不可留豎儒敗阿公事迺爾書報足下為掀髯一大噱也七聞邢直指為足下買田濟上當去厯下生故居不逺新秋煩足下攜彘肩斗酒以大白往酹其墓曰蘭隂胡元瑞寄聲聞谷中有響答者以報我八足下齊東生計想益就秋成在目異時學稼吾子雖尼父自謂弗如何可以老農少也少室山房集巻一百十六
