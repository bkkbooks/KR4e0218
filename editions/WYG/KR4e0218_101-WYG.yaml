body:
  text: 少室山房集巻一百一明胡應麟撰讀二十一首讀後漢書余嘗竊第古史筆為三等尚書春秋上左國司馬中班范二漢下而三國五代諸史弗與焉或以進范􅋫退陳壽為疑不知遷固而後文質兼該贍而不穢詳而有體者僅􅋫庶幾雖剜精鏟采竭力字句獻吉所短迺盛極難繼遷固居前更有馬班能為史漢乎昔人謂孟堅死而史職亡余亦謂蔚宗圽而史才絶後生晩出挾天子令諸侯即孟堅且恣齒牙矧復餘子試舉後漢一編歴南北二唐五代宋遼金元衆籍較之李獻吉云逺不及􅋫孟浪難觀者左馬復生斯言不易矣讀三國志陳壽有餘于質而不足于文范􅋫有餘于文而不足于質品格政自相當迺壽書失之太簡而東京一代故蹟讀范籍粲然足徵洎辭亦豐藻奕奕二史之優劣判矣讀三國蜀志王仲淹稱陳壽三國依大義而削異端朱紫陽亦謂近是乃今讀陳書者無裴注參考其顛末則魏蜀吳事幾若春秋以前若存若亡矣他無備論如闗忠義水淹七軍雖天時偶合當時攻圍排決寧無方略謨謀矧曹氏戰將可當一面者惟于禁與張遼徐晃數人老瞞之克大敵類為軍鋒非許褚龎德一勇夫輩比也而傳苐言忠義乗大船攻之禁等窮促悉降僅同兒戲於乎使老瞞任使繆悠皆若此類則二袁呂布之世雖百操無存而能併吞海内十之六七耶讀晉書晉書成于開元之世謂文皇掠羣下之美以市名非也其贊有制曰者數處皆出自貞觀意見要以衆史官雜沓輯成難于偏屬總而歸之文皇耳李獻吉極論晉書蕪雜當修而王元美以為稗官小説之倫皆得之矣苐惜自竹林而後風流崇尚芬溢齒牙而此書備載話言履歴故清聲雅致往往有使人絶倒者猶勝于宋元之塵陋也讀晉書司馬宣王本紀晉書司馬宣王本紀云諸葛亮冦天水圍將軍賈嗣魏平于祁山天子曰西方有事非君莫可付者使帝統車騎將軍張郃後將軍費曜征蜀䕶軍戴凌雍州刺史郭淮等討亮張郃勸帝分軍住雍郿為後鎮帝曰料前軍獨能當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布禽也遂進軍隃麋亮聞大軍且至乃自帥衆將芟上邽之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是捲甲晨夜赴之亮望塵而遁帝曰吾倍道疲勞此曉兵者之所貪也亮不敢據渭水此易與耳進次漢陽與亮相遇帝列陣以待之使將金牛輕騎餌之兵才接而亮退追至祁山亮屯鹵城據南北二山㫁水為重圍帝攻㧞其圍亮宵遁追擊破之俘斬萬計天子使使者勞軍増封邑諸將賞擢有差右事實本漢晉春秋前半大同獨後百數言誣甚漢晉春秋明言歛兵依險軍不得交而云與亮相遇列陣待之兵才接而亮退又尋亮至鹵城登山掘營不肯戰諸將咸謂公畏蜀如虎奈人笑何懿病之乃自案兵向亮亮使吳懿魏延等逆戰魏兵大敗漢人獲甲首三千懿還保營通鑑綱目皆同而此云亮據鹵城南北二山㫁水為重圍懿攻㧞其圍亮宵遁追擊破之俘斬萬計何矛盾之極也陳壽亮傳于街亭之役直書不諱而此但言糧盡退軍與魏將張郃交戰射殺郃絶無損軍失律之文郭沖五事亦言祁山之戰殺張郃却宣王諸軍大克壽之不書為晉室諱耳自餘孫盛鑿齒皆身為晉臣直筆其事懿之子孫亦不加罪要以張郃之亡事勢彰灼無可飾言也晉史之修乃在唐世其于典午時代遼邈一時諸臣何所遵據竄易舊文顛倒故實以愚觀者即元兇褫魄棄甲潜奔悍將輿尸隻輪不返而索隱語怪代有其徒或藉以為口實使孔明震古一建之勛壞于瞽説此余不得不詳為辯也善乎文皇之贊懿云秦蜀之人勇懦非敵夷險之路勞逸不同以此爭功其利可見而返軍固壘莫敢與爭生怯實而未前死疑虛而猶遁云云即贊詞以觀傳語其前後枘鑿自相背違無事詳覈他書誣罔立判矣是役也張郃先請分兵住雍郿懿曰此楚之三軍所以為黥布禽也及相遇祁山郃固請分兵為竒以擊亮懿又不聽蜀兵既退復遣郃追亮以致陣亡自胡三省注通鑑皆以郃拒亮街亭威名夙著懿忌其能言計沮格以致殞身此似是而非者郃街亭之勝由馬謖非才違亮節度出于天幸且主客勢殊郃嘗以十萬之衆喪師清川棄馬緣山鼠竄歸國其才固出益德之下而足當諸葛之前茆耶夫郃既再拒武鄉蜀人所畏則魏明宜委郃隴西以永杜蜀患可也胡武鄉載出王雙授首郭淮曳兵郃于斯時無能建一矢之效耶觀魏平之圍明帝靣命宣王以西方事重非公莫可固明知郃輩偏裨之才不足當兹大任允矣使郃前遇武鄉奮其螳臂則萬弩之射豈待木門之追而後決哉矧鹵城之戰宣王自案中道向亮而令郃攻何平干南圍非不任以兵事迺郃統數倍之師攻蜀之一校而不能克彼街亭之勝由亮不用魏延吳懿輩二將一出即宣王大奔郃于何有也讀三國志裴注裴世期之注三國志劉孝標之注世説傍引博據宏洽淹通而考究精嚴辨駁明審信兩君之深于史學也迄今三國六代小説逸事往往覆賴二注以存而二書無注亦大有茫然不可讀者故余謂著書誠難而注書尤難能注若二君可也讀宋書二則沈隱侯裴松之傳稱後人無聞而裴子野更為宋略書戮沈氏之先以報之約聞徒跣詣裴謝遂兩易其文今裴略不傳大槩當是荀袁漢紀之屬以編年為體文存簡要故纂輯易成且義取春秋以字為褒貶也迄今觀之沈之忠邪自有定論而裴之文學亦無事系籍世家而後傳徒令人窺見私臆資笑藝林耳又隱侯子野皆宋世博洽之尤者然沈視裴先達隱侯作傳子野未必知名是沈故出于無意也而裴至取一代褒誅之大典以隱然自快其私可乎沈之徒跣固已卑卑苐為厥先不容已而裴之淺中狹識即其書義例可徵其泯絶不傳于後非著述之不幸也讀北齊後周書古今行陣之間兩雄相抗而不相下如兩虎並搏勢必一傷幸而不傷則天命在焉若漢髙帝之阨睢水困滎陽是已迺袁紹之于曹操則一敗而亡劉曜之于石勒則一蹶而縛夷考古今兩雄相抗衂而隨振殆而輒安未有如賀六宇文二霸主者也歡以一旅滅爾朱兵强國富割據中原泰崛起歡後知衆寡非儔而委任賢能優禮智勇兩國之志于吞併數矣戰之最苦伐之最大者蒲坂河橋邙山沙苑四役東西魏之勝各二歡與泰各失馬濱危幸而獲免而泰為彭樂所窘歡為賀㧞勝所追幾禽于敵而俱脱于險一何其巧也葢兩人者才略大都等埒謀臣戰將又略相當而又皆偏霸之主天命在焉故行陣之間符巧若此然歡晩再舉兵以挑西師而泰竟不出葢宇文之氣索矣考當時促歡受禪者甚衆歡皆力折之而泰酖其君而竟簒之國則歡之賢泰不啻倍蓰而後世東魏並稱何也讀魏書魏収北士之小有才耳其人之鄙屑庸猥不可更僕道也而齊人以一代之史付之髙氏之政事㫁可識矣是時北士之堪史筆者良鮮而邢子才最為宿學可參用也胡獨以収流古今穢史之誚耶讀隋書鄭漁仲劇重隋書謂古今史籍苐詳于紀傳而略于表志史自馬班外范􅋫陳壽皆徒具紀傳而已于表志不敢窺也其論迂謬不情迺爾余謂陳范不作表志咸有他故范蓋書成未久旋即被刑而陳書分志三國與史漢體製懸殊且史之所重紀傳而表志若其閏餘故耳若以表志有無為史才優劣則沈約魏収之史宋魏固皆有之而李延壽南北史之無表志者一出而沈魏咸廢何耶且唐而後宋遼金元表志咸備而其文益下又何耶惟隋志一編古今卓絶唐室諸臣分任備極研摩又承隋世嘉則殿三十七萬之後物力全盛海宇綦隆而魏徵諸公得以肆意于此故自班氏藝文後獨賴是編之存得以考究古今載籍離合盛衰其闗涉非淺尠也劉子𤣥迺驟譏之是豈知史學者哉讀南北史司馬君實以李延壽書為近代佳史余讀之信然所云禨祥謔浪璅屑備載余考典午以還清談鼎沸臨川世説晉書掇拾幾無孑遺沈約魏収等史巻動盈百延壽芟除蕪蔓薈萃此編筆削之功固以勤矣小説諧辭種種備載要以原書紀述不忍槩刪亦以其人多好且習尚所趨未能驟變也總之唐三百年史筆可覩僅兹二籍耳昌黎碑淮西傳毛穎而不能史順宗豈人禍天刑果以拙避乎讀新舊唐書崆峒氏云歐陽人雖名世唐書新靡加故今之識者購故而廢新此責備廬陵語也楊用修遂劇罵新書以逺出舊唐下余不敏未敢謂然新書雖耽尚竒僻其氣法勁悍猶足成一家言苐律之史筆當行不無三舍耳舊唐叙事委縟間有足稱而猥俚之詞冗薾之調旁午簡編果出新唐上否耶故余嘗謂史畏繁而繁若後漢可也舊唐不可也史貴簡而簡若三國可也新唐不可也二書者兩存之備考可也舉一而廢一不可也讀宋遼金三史及宋史新編宋遼金三史皆元托克托修實歐陽𤣥輩筆也遼金二史雖叙述庸庸猶粗足省覽迺宋史則叢脞極矣葢𤣥總其事非一人所成故諸傳志中有極冗者有極猥者亦間有整比可備刪削者總之李獻吉所謂晉宋元三史必修之書而宋其甚也本朝柯維騏宋史新編稍去蕪蔓而筆力痿弱無發明殆若節抄耳王長公謂宋史之繁寧為遼史之簡金史繁簡在宋遼之間亦差為彼善于此也讀宋史李全傳李全始末頗見周公謹襍説宋史全傳間采之至盈兩巨軸其繁猥野俚亡論史筆幾與市井小説宣和遺事水滸等傳埒亦可徵元世文運否極也全起羣盜包藏禍心蹂躪淮泗青齊間幾二十載金宋元三國五遭其患非新塘支解禍亂未已金謂之紅襖賊全至死尚衣緋袍全傳盧鼓槌即金將赫舍哩約赫徳以好用鼓槌擊人故又綉旗女將楊用修以配錦繖夫人者劉制使女也張惠號賽張飛後降全復歸金三峰之潰步持大槍奮鬪死之三人皆僻而不易考聊并識此讀通鑑綱目三則綱目之繼統春秋也聖人復起斯言弗易矣迺至正閏之間名義之際槩之始終時有一二未甚懸合者今人窺見一班便執為竒貨毛舉坌出以難紫陽而不知皆紫陽胸臆之餘剰也古今宇宙事變萬殊誅意原情勸戒百出即如後人之説一隅得矣反之三隅則其變態異同當益甚焉故紫陽寧偏徇其長而不暇盡圖其合要之足以寄褒誅存筆削而已若夫一人之力而上下千秋數禩之工而整齊百代耳目漏遺編摩譌舛當必有之苐平心易氣各尊所聞即紫陽復生無嫌諒直而猥以螢爝微明横生詆訕人雖自絶日月何傷於乎春秋而後歴世史書苐存紀述素王遺業永廢人間獨是編體大思公詞嚴義正真足繼往聖開羣䝉何不知量者之比比哉又莽大夫揚雄死紫陽特筆也其意則偏惡子雲其義則責備賢者也後人求之而過有謂因貶見褒者而紫陽之序反騷邊笳皆深斥子雲貶而褒非其㫖也有謂罪之使弗與于道者而雄之于道醇疵之間有亡之際非若曽孟之繼體宣尼也且罪雄而苟董王韓輩又胡可以一一罪也夫紫陽之有功聖門過周程邵張逺而皆極口推轂之非䕶前者也雄身為漢臣莽簒而不死可也而猶仕何也紫陽特而筆之假雄以明春秋之義也而非雄則紫陽固未暇筆也總之責備賢者也求之而過者皆非也又盧格荷亭辯論難紫陽以不死書狄梁國也是徒知文公之有綱目而弗知其有語類也語類明言書梁國死矣而竟弗果也其潜授五龍挾日虞淵也非周旋孽后而得其聽從弗能也故梁公之仕為唐也匪為周也其死死唐也匪死周也夫責賢者備春秋也為賢者諱亦春秋也然則胡以弗責梁國而諱子雲也子雲昧大義而梁國振大艱其迹同其心異也於乎文公之諄諄於語類也亦既慮夫埳井之夫必呶呶于一得矣而卒弗果也則吾所謂不得已而徇其長者也夫彼所自詡國能皆邯鄲之餘步也觀語類可以愧死矣讀通鑑胡氏注自裴松之三國志注成史學中無可繼者獨胡三省之注通鑑宏蒐博引備録諸説而斟酌事勢懸斷是非皆昭昭目睫于千載之上俾温公未發之㫖開巻瞭然真司馬之忠臣洓水之素相也當温公之成通鑑自謂得劉道原范祖禹諸人各任其事以奏其功而不知三省之注其功尤有大者世或日用而弗知也讀世史正綱二則通鑑之後有朱氏之綱目綱目之後有丘氏之正綱三書皆宇宙不可缺者而綱目之異于通鑑正綱之異于綱目皆所以究于同而不足為異也又西京而後史之所謂褒闕如矣司馬氏之纂通鑑也體主編年意闕所先務非褒貶也紫陽始折以春秋裁闕華衮鈇鉞隻字凜然矣而其創于嚴也闕為刻也故法有所不必盡行而意有所不闕盡究也蓋丘氏之正綱出而充類盡義無闕矣亂臣賊子明以後其少瘳乎少室山房集巻一百一
