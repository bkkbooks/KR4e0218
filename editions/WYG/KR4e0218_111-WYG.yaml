body:
  text: 少室山房集巻一百十一明胡應麟撰書牘十首與王長公第一書應麟海濱之下走也倥侗顓蒙於人間世百無一解獨自燥髪以還即知慕好古文詞每攬觀典墳丘索虞夏商周而上倚相之所誦讀尼父之所刪修渾渾噩噩蔑以尚已至先秦盛漢黄初開元諸大家遺言若孟荘若屈宋若左丘兩司馬陳思李杜十數公輒廢書太息曰偉哉六經而後文不在兹乎俾今之世也而有十數公其人終吾身執鞭其側何憾哉弱冠従家大人宦㳺長安業聞執事以文詞起海上靡然羣一代而奔走之中山之毫横騖于千秋雒陽之楮騰踊于四境雞林之金絡繹于上國昆丘之璧飛照于大荒承雲之樂髙張于洞庭春雪之音絶和于郢里而且天函地苞河茹海納士無賤而弗下才無下而弗憐即崇伯子據饋什起姬文公沐髪三握武鄉侯集思廣益昌黎氏濟溺振頽弗云過也于時應麟方齒髪盛强沾沾自憙天幸一當大君子于吾世庶㡬者其以臭味之末卵翼青雲乎迺執事甫以克壯之猷為聖朝所嚮注建髙牙擁大纛鎮撫一方紆朱拖墨之吏辟易前茒韋布賤儒欲以長揖為大將軍重而無其自頃者伏聞執事拂衣東歸逍遙海上既切憤叔孫桓魋臧倉郄慮皇甫鏄魏泰李定楊畏之属無世無之又竊沾沾自憙執事之謝人言也天將以為木鐸乎懸慧曰以徧照羣迷澍法雨以普施来學大千微塵悉属𢎞濟豈其余小子而獨靳焉則復以嚴君匍匐于炎徼慈母委頓于髙堂竄身藥物削足庭户側身東望奮飛莫能嗟嗟執事語不云乎百世一賢接踵而興千里一士比肩而立今者不肖之于執事嘉隆相迹匪有古初輓近之殊也吴越為鄰匪有闗塞胡秦之隔也道術仝方聲氣傅合匪有儒墨楊秉之辨薰蕕涇渭之差也然而懐中之刺漶滅澌盡迄今念載而竟弗獲贄姓名達謦欬于龍門之下河清難俟人夀㡬何彼訪道崆峒問途大隗立雪少林傳衣嶺表獨何人斯哉若髙文鉅册奉以周旋藉之卧起則受執事之教世固未有如不佞之最深者嘗試論之古今製作仝委異流體既旁分幟亦各樹故或嫻于辭令而聲音之妙未諳或邃彼風謠而著述之功罕奏或兼資謨雅而學問之閾㒺窺或綜洽簡編而占綴之能彌劣厯㕘載籍専門匠哲代不乏賢惟是總挈之才胡寥寥希覯也明興慶陽李氏崛起八代之衰希蹤三古之上經秦緯漢出宋入唐亶謂不賞之鴻勲無前之傑思而運属蓁蕪功繇草創擬議之則滯焉弗鎔采蓄之程隘焉弗廣兩都而外誦法靡徵六季以還見聞旋廢以致緣情者病其剽敚多識者陋其拘攣嗟嗟執事豈大統之集天意固有待於今日耶鄉者徧窺四部全草浩瀚洸洋莫知底止錯綜神化無所成名左逸諸篇則魯史雍容之度也短長諸䇿則横人倜儻之風也記傳碑志則太史孟堅之雄也賦頌箴銘則中郎文考之蔚也序論之閎深奥衍則韓蘇四子競出其長書牘之俊逸詼竒則晉宋九朝互標其勝而四言斟酌風雅雜些馳驟離騷樂府比節三曹郊祀聨鑣二京古風枚蔡雁行歌行李杜遐軌近體拾遺之造極絶句龍標之軼塵自昔名流有従事弱齡望洋白首者執事率談笑道之間用其一以與孟莊屈宋十數公方駕長驅曽未既其疇捷而况乎總統百家鎔鑄萬品條理始終一以貫之而各臻其極哉且也巵言筆記宛委諸編鉅而須彌細而芥子𤣥言奥㫖迥獵窮蒐璅説稗官旁引曲暢粤若丘明太史曹杜諸君咸以文詞取稱博極未聞有兼攻爾雅别擅凡將與東方中壘角異拔新茂先廣微拈深競僻如執事所撰述戛乎毫髪無遺憾者也然則奚論明興即穹古以来六經而降文章大統匪執事集之而誰耶猗與執事是豈人力實曰天授令後世言材越漢唐而推明代㫁可識矣今㝢内詞人駢首北面眎獻吉成𢎞之際倍屣什百孰使然哉不佞跧伏窮鄉㣲吟土窟雖甕天蠡海無異醯雞實于詞壇鮮所降伏惟一當執事則心醉神馳魂悸精奪猶李邢國見唐文皇英雄氣概都盡然又不屑為延陀之倔强扶餘之攘據敢徼恵次公世及之雅馳獻五言十章七言百韻皈正大方伏願因縁鈍根廣説妙法屈金色臂指授菩提不佞幸甚天下幸甚千百世幸甚第二書吴中使以人日来持賜大教藉以雄章應麟方卧病床蓐亟躍起盥沐展誦之尺牘千言洋洋纚纚恍然如陟崑崙泛溟渤耳眩目易精攝魂搖宇宙大觀斯其極已二律之神竒四絶之杳眇陽春白雪洞庭雲門乎一唱三嘆有遺音矣嗟夫應麟曷以得此于執事哉今㝢内操觚之士于詩文尺寸有窺莫不憑軾而東上者驤首雄鳴冀一當造父之馭次亦呈溲渤于和扁薦樗櫟于班倕迺應麟于門下則有大不然者生長嘉隆與執事輩行崇卑遼絶其涉世也既晩僻處海邦倥䝉孤陋其聞道也又晩遭逢次公因縁紹介其納交執事也又最晩執事誠俯念通家不麾而置之固已大幸乃猶拳拳然奨以代興埒之國士應麟曷以得此于執事哉今世所盛行執事四部全草不肖亦既徧讀之矣中所謂國士其人不二三見也所謂代興其語不一再見也而一旦舉以畀之後進之中最晩合之士豈執事我欺乎不肖始而懼中而疑終而勃然興渙然釋怡然悟曰執事片語即千古在焉舉海内賢豪冀一當之而不可得而一旦以畀之後進之中最晩合之士執事者固必有以重教之而不輕棄之也此應麟所為奮迅激昂中夜徘徊而不能無厚望于執事者也應麟自髫鬌従事詞場迄今荏苒十載矣私竊以為三代而降立言之徒一盛于東周載盛于西漢三盛于李唐而總之莫盛于今代而今代所以盛者莫盛于今日而尤莫盛于明公夫文之鹿失于永元北地濟南始再逐之然而臨摹之習未融也刻畫之痕未汰也孰與執事之闔闢縦横錯綜滅沒弗蘄合而無乎弗合也夫詩之幟頽于大厯齊東洛下始狎樹之然而混一之功未奏也神化之域未探也孰與執事之廣大悉備莽宕沈深弗蘄超而無乎弗超也故愚嘗竊取執事巵言前説而廣之曰先秦兩都之則闢于北地劌于濟南脗于新都至瑯琊而輳其極建安天寳之業暢于仲黙髙于于鱗大于獻吉至元美而集其成此非愚一人言也即以俟百世談藝者可也而未足以既執事也夫杜甫韓愈博識矣其蔽也學術囿于詩文而莫能自見郭璞張華洽聞矣其蔽也詩文掩于學術而莫能自拔子建子安二少俊兼之矣而子安詩文子建學術稍非其至上下數千載間誠未有詩而文文而詩詩文而學術兼際其盛如我弇州者不肖所亟稱莫盛今代而尤莫盛明公盖實有徵焉非苟為佞也夫上下數千載間瑰流哲匠若彼其多而卒無能逾越執事不肖沒齒皈依舍執事何適矣舍執事何適矣追惟舞象之嵗拈弄筆墨鋭意成一家言自樹不朽而鈍質孱軀用力愈深望道愈渺僅騷人軌域恍忽有窺于樂府得其原于古風得其質于歌行得其氣于五七言絶得其韻近體排律一章半簡無大踰人至數百韻以還數十篇而外淋漓浩蕩㸃綴不窮竊窺藝林靡敢多讓而尤嗜讀書身所購蔵㡬等鄴架經史子集網羅漁獵時有發明不敢以鴻碩自居不致以空疎自廢慨自𢎞正以来作者如林學者如綫楊用修一木耳風迴瀾倒故未易支匪執事崛起盛時奮臂大呼為六合倡豈直取輕唐漢將遂姍笑宋元人才汚隆邦國榮瘁詎弗信哉顧此意非執事莫能知非執事亦莫敢告也今漫上不肖所存詩歌十巻文賦一巻雜撰述三十巻才格上下聞見廣狭知識有無概無遯于左右伏惟痛加繩削指示迷途昔人所云莫為之前莫為之後其説良可念也嗟嗟執事與當今海内賢豪冀一當之者執事既以命之矣迺不肖所厚望門下執事終無意乎清如孤竹仁如子淵猶庇藉青雲以施来世而矧乎閭巷之士也龍門未登寤寐饑渴俟髙堂藥物稍稍奏功便當負笈摳衣伏謁函丈爾雅之樓文漪之館願假片席以待胡生為平原十日也惟執事毋訝其狂焉第三書春首北還金閶遇張太學武林遇栁水曹載附短牘起居計後先入記室矣清和伏惟尊候萬福抵舍後適友人攜酒過存座中獲聞冡君文戰之捷不覺狂呼絶倒相與浮大白百餘華陽碣石間自嘉隆一振雅道寥寥兹文悼代興詎非天意恨不獲周旋鞭弭竊望下風耳杜門谿谷宿疢漸平學步邯鄲近亦稍稍二親堂上兩孩膝前三萬軸縦横案頭不腆敝帚十數巻零落筐笥戲采弄雛之暇拂拭遺編刋定故業與蠧魚醯雞争雄長鼠穴中聊復自快五畝之隙旁搆小園蓬蒿蔽虧闢行逕僅容雙屐飛流千頃環帶其前喬木數株掩芾其右蒲團竹几了無人聲散髪赤脚坐送餘日籬根繫小舴艋興至出逰于篷底瀹佳茗焚妙香沿洄落花信其獨往當景物㑹心劃然長嘯二奚童歌鷓鴣舞鸜鵒以佐之行道聚觀咸謂襄陽米顛復覩今代晴天爽月雪晨風朝時或岸髙幘扶短笻憩平疇躡幽徑尋僧逺寺振衣髙岡麋鹿為羣猿鳥相狎無次公之慟哭有林慮之忘憂庶南華之達生㡬右軍之樂死回憶客冬𤓰步恍若隔世非執事存䘏撫摩胡以今日惟是吴越千里美人一方鱗羽浮沈起居離索此曹生所以長嘆于轉蓬杜子所以馳懐于春樹者也嬰疾以来人間世事無復縈繫惟著述一念耿耿方寸未能遽灰昔人所謂生年不百奈何仰面看屋梁著書寧闗身事又謂使我有身後名不如生前一杯酒快哉二言足稱名喻不幸宿生障業纒糾膏肓雖司命末如之何且忝竊國士之知荏苒廿載萬一無狀為門牆羞用是竭其疲猥不敢自畫惟執事始終教督之冬杪以藥物屏除人事呻吟嵗月紀述道途復得韻語垂二百篇通計舊稿五七言律不下千首自餘諸體合聚數亦相當第不肖于兩漢樂府古詩意有獨㑹日坐應酬不遑操筆今欲盡棄唐風専精斯業務得其恍忽備明一家行有餘力旁及魏晉下沿六朝戸擷其華家饜其粒不僅作昔人擬古一臠數胾而已二氏歌行氣骨可逮至于變幻恍忽俟之神情若陳隋盧駱蹊逕具存綴属之工匪所患也期以十年削迹庭户庶㡬此懐而才弱志强心長技短盧蒲蹩足髪已種種復奚能為所恃執事青雲之上不吝手援俾蒼蠅絶羣駑馬增值耳詩藪小復益之外編巻帙略與内等漫應徴索大為側理氏災尚數板剞劂未完尋當貢上大序聞已脱稿幸即發舍親雲天渺茫臨楮馳溯不盡奉報中丞王公客嵗子念過蘭應麟方以賤恙謝客枕席間獲聞執事起居慰藉無任且知執事手書原貺見貽而子念以不肖計偕中途璧上矣洎得子念吴中啓復云翁以来教轉擲都下嗣於喻明府處兩閲翰教復兩下詢不肖諄諄也末學鄙生即執事一念之知一言之及且懼無以當辱迺明公垂神懇篤再三不厭如此古所稱國士遇者曷以過哉鏤刻鏤刻新春伏惟杖履萬福弇園水竹日佳日勝而翁以葛巾野服嘯咏其間意興所寄萬象欲新真㝢内獨樂視列仙傳所載絳宫瓊樓貯安期偓佺輩旦夕啖食赤松丹棗竟無一事可託不朽此徒天地間一蠧雖千載何益若翁身居福庭神逰八極咳唾笑嬉與造物爭雄長者何如也應麟滿意去秋計偕之便移舟海上一登龍門用慰十餘年寤寐之想坐老母疾憊方寸皇皇遂爾中輟深惟年齒日加佔􅖶無狀惟翁恵賜大教終始曲成不勝生平至願喻使来便敬布謝私倘髙堂藥物稍酬挾笈吴中伏謁有日次公計已旋車或得取道錢塘嗣聞動履尤所願也子念不及通詢并祈晤間叱致餘寒尚峭伏惟若時為萬世自玉臨楮馳戀不宣再報廷尉王公喻使旋獲奉大教嗣以鴻乏失候起居深春子念又至伏詢道履安和慰藉無量載讀曇陽大師傳知執事姓名夙登仙籙而復接遇上真翀舉旦夕盖不惟開闢以来文人創見即列僊羣聖如執事身名烜赫獨冠古今而復脱屣塵凡終始宇宙者曷嘗有二妄意仙師金母大士元君一時咸為執事而出非虚言也東方小兒久以口舌陸梁上界異時一與執事遇便當作小巫神氣索然矣一笑一笑子念入閩計其歸途當在秋杪爾時西風涼適病骨少蘇決策相與同舟而下伏謁弇中以攄豁生平宿抱第恐登假期近乗風帝鄉瑤池大羅萬里杳隔鸞軿鶴馭攀跽無従徒增悵結耳喻使行便敬附八行沉水一斤博山一座奉供清燕惟左右者麾入之與王元美先生觸暑婁江明公不以褦襶見拒祇園澹圃載辰周旋宿生塵垢頓欲消盡奉别後兼程還越六月之杪始抵故山息翼榆枋尋盟泉石弄雛二親之側頗用自娱子念過蘭僅一交臂舟人促行不獲附狀左右新涼伏惟道履萬福每憶嚮者北上上謁辱翁投轄閉闗為十日飲弇山之堂文漪萬頃峭碧千文芙蓉菡萏飛香逗空􅅤艷撲目自謂人間世無復此樂兹秋清木落正值其時景物之勝定當逾昔而賤子薄福株卧一丘不獲負長生瓢操九節杖日従逰于玉壺金闕中悵恨何可言何可言曩不自量徼恵次公世講之雅洎明公國士厚知冒求家傳輒辱俞允命以仲秋脱稿兹特専力候領大篇俾家君姓名永藉不朽即人子萬鍾五鼎蔑容此矣詩藪六巻附上記室蠡測管窺略盡于此計不足當一噱惟慧眼諦觀概加塗抹俾無誚于大方白露蒹葭美人千里臨楮馳溯不宣報元美廷尉扁舟海上載溷名園授簡飛觴傾筐倒庋無夕弗燕無晝弗逰無逰弗懽無燕弗洽兩瑯琊既震旦盟主兩司馬亦宇宙人豪四美二難一朝畢集而應麟以草莽鄙生曳青鞋欹皁帽飛揚跋扈于其間迴想金谷蘭亭豈直座中無此髙賢又何嘗有此狂客也呵呵執事遭逢南岳印證大還嵗月既深熏修彌邃弇州園金銀樓閣宛爾玉京梵天而太湖三萬頃洞庭七十峰即弱水𤣥洲方壺圓嶠奚啻乃執事時時挾賓㳺聚名勝一觴一咏汗漫逍遙坐鵬背閲青天擘龍肝飽白日真廣成浮丘蹔謫人世世人往往于世外覓梯仙國都胡左也曹子建舉九州之八讓五官中郎展轉臨菑東阿侯服生平戚戚無一好懐晩得遷陳竟以憂死死復作遮須主人眎昌黎生従軍眭邃差神王第恐其間苦惱政自不少即上帝憐才不令飄轉要是地下夜郎扶餘何渠若執事身居福庭名貫仙籍耶異日飛昇時至拔宅大羅不佞願逐丹房中一雞一犬並翔青雲執事肯假之羽翼否次公役旋卒卒附笑諒之與長公清和肅狀起居嗣乏便鱗弗獲申候惟是狗馬下悰即一寤寐一步趨未嘗不奮飛函丈之側也執事千秋鉅望特簡上心蒲輪帛書軫接道路明揚盛際曠代眇聞而鳳翥鴻鶱彌不可即亡論淵源長源二子文靖東山展也慚徳矣麟猥淑大教門牆末光實竊輝暎私衷慰藉曷可勝言霜寒伏惟道候萬福自客冬返舍益知世途榛棘鑿枘難諧科頭杜門謝絶一切軒盖浮榮雅非夙願筆研狂習漸亦掃除方且遁跡大山窮谷中友麋鹿食蕨薇遣送餘曰所未能決然長往者逺則執事近則二親耳豫章来生過訪云大集就梓以較前刻巻帙過之方寸怦怦寤寐瞻切幸毋金玉慰我渴饑秋初傳執事蹔赴留都輒綴小詩奉詢兹来鴻迅發謹錄吴箑上博軒渠小稿剞劂適完并奏記室樂府歌行百八十篇得之結夏縁曩奉尊教抹摋應酬因漫擬鐃歌諸題浸淫郊祀下逮西洲而長篇瀾汎極于供奉惟少陵創格稍别前規當俟異時直書耳目備一家言執事樂府前無古人希明箴得失指鏡然疑此不惟麟一人之幸也不宣報長公不肖自總丱逰燕微吟短述薦紳先達互締忘年盛欲引掖門牆賓諸國士迺不肖瓣香一炷未敢遽有所属也稍長益蒐讐載籍綜攬賢豪知宇宙文章咸萃執事側身東望實始繫心既因縁次公紹介壇坫青雲之附竊幸庶㡬誠不自意執事過相期拔暴之萬衆授以千秋感激厚恩踴躍中夜妄意斯文正朔如日中天䕶法持教所當自力以故遇有謗佛之調達孽孔之桓魋無弗昌言疾論面折其非而怒螳盈道桀犬成羣埳井之蛙告海則驚醯甕之雞語天則笑招尤啓釁實係于兹又以古今才傑或參商異代或枘鑿當年而不肖草莽鄙生馬牛下走其于明公分懸位絶顧以尺簡受知寸朽䝉拾神情標舉興㑹飛動即不能如迦葉之破顔少林之得髓亦豈敢為請息之端木顧後之南榮而人微力寡地卑望末爭名者惡其少達浮慕者害其精研娥眉之妬劇于専房駿足之摧萌于驂乗莠言日至浸潤潛投職此二端更無他道客秋上謁僅得聴聞退自深惟既駭且愕所幸曽參之罪未至殺人執事之明逺軼慈母遂使蚊雷肅清貝錦㫁裂䜛人失足自投有北媢嫉反走如放四夷然而古道凌遲世途榛棘亦大可畏矣至于弇園雅集狂客嗣興尤為可笑藉令不肖材至駑劣藉令不肖不遇明公猶將躑躅中原披倡小島秋蛩春蚓不竅自鳴寧至與此輩較量身手挈競短長蘇長公云周伯仁腹中所容迺王茂𢎞等輩彼哉彼哉鄶以下何譏也不肖久已忽忘執事拳拳聊復緩頰盖此之不虞抑又甚矣奉大教歸業已杜門息交抹殺塵世柱史𤣥同莊生齊物是非臧否一切置之㒺聞倘天假餘年沈疴退聴尚當奮勵六經摩研四始模二炎之矩轍窮七閏之波流擘調于開元鎔裁于大厯馳驅于𢎞正歸宿于明公婆娑一氏之言仰答非常之遇且以三餘隙日綴葺蕪詞羽翼巵言俟諸身後彼呶呶者惡能恣衷臆于九京鬭唇吻于百代哉信筆狂譚縷覼及此執事者亮之秘之霜寒强飯自玉萬萬薦李能茂書東陽李能茂者燥髪殫精古文辭今年垂三十尚碌碌困諸生乍盛暑叩門出一刺袖中慷慨曰不佞茂為足下懐此五載矣實以無因至足下非若禰正平之入洛初無所欲詣而漶滅無所投也已又出一編袖中曰凡不佞茂所為五載懐一刺于足下者以此夫千里一士誼猶比肩矧不佞茂去足下僅僅贏二百里豈足下無意乎某聞其言竊異之亟受讀卒業見其所為諸詩歌類能脱棄凡陋五七言律體大思超時離時合七言古頡頏未熟氣骨稜稜自雄五言古尤所偏長髙者可升魏晉之堂平處亦不失王岑前躅他傳記酷放東西京雜文錯韓蘇諸子往往矜局寡暢至啓事書尺縦横跌宕贍縟淋漓肆筆所投多而益辦即嚇蹏掌許而花艷爛發應接弗遑度其人才耳目儕流罕踰過者其持論陷缺一世獨服膺執事亘賢刦不再覩奈何躬邂逅失之輒以姓名紹介某于左右某嘗伏窺執事大集記執事曩在燕于鱗子與六七公倡和時私相誓吾黨従㝢内得一瑰奇士無論吴越必展轉遞報以為懽如某者雖未獲追隨六七公後迺執事業以命之矣庸詎知執事不遂以所望六七公厚望于某也以執事之厚望某而某幸得斯士尚庶㡬一當其人且咫尺里閈中沾沾嚮慕執事而某閼扼不聞是某不惟下有負此生并上有負執事也夫知而弗舉而上負明公匪報塞之義知而弗舉而下負李子匪𢎞逮之仁匪仁罪也匪義亦罪也失一士而抱兹二不韙以行于天下是則某之所大懼而蚤夜弗敢以寧者也伏惟執事據饋握沐之風流于海外倘不以某言為迂為僭慨然接引其人覽觀其業有萬一可與進授之銜轡䇿以馳驅使得夷于泛駕之列某誠劣無似異日者且將緣是受上賞于藝林焉某不任悚息待命少室山房集巻一百十一
