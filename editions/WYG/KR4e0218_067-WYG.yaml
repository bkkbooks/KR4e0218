body:
  text: 少室山房集巻六十七明胡應麟撰七言排律一十四首俠客行六十四韻朝端新拜大長秋賜第東方最上頭曲榭華甍蔵燕雀畫堂飛棟列貔貅論功肻就平陽列相骨争誇定逺儔太宰均裀容接席中丞停節讓鳴騶前茒鼔角陳清吹後隊旌􅓚樹碧油幾為髙名羅蒯徹時從長揖見曹丘雄心黯淡操戈發竒䇿縱横借箸籌博浪誤驚嬴主中白登長抱沛王羞長驅欲踐天驕血轉戰思椿日逐喉然諾季心輕海岱風聲劇孟重山丘朱家緩頰共排難郭解捐軀代報仇八百家奴懐蜀鏹三千門客佩吳鈎登壇辟易漁陽帥分道憑陵博陸侯向晩章臺嘶叱撥深春韋曲叫鈎輈麒麟閣聳飛身上鳷鵲宫扄掉臂逰入幕嘉賓窺喜怒當塲摩詰效俳優微行漢帝令衷甲清暇唐宗待蹴毬絶代妖童顔比鄭傾城小史貌逾周頻呼第五嬉金埓屢竊無雙下玉樓貴介原嘗元並峙奢靡王石定誰優雙珠跳脱迎無畏百寳流蘇障莫愁雲母屏開紅日耀水晶簾捲碧天幽燈籠錦織流黄被火浣衫裼集翠裘五彩同心饒綰結七珍如意競雕鎪盈拳韎韐商胡贈徑尺瑯玕貴主求象齒穹窿来絶域蛟精瑩膩出靈湫齊璜楚玦相輝映魯璧秦碑互校讐彝鼎蚩尤存大夏尊罍饕餮騐成周華箋溢案鍾王聚妙墨盈箱顧衛留緑埜遺踪看載闢藍田名蹟羨重修為園直跨新豐市鑿沼斜穿太液流曲島廻汀浮灧澦孤峰層巘矗瀛洲岧嶢睥睨通河漢􅏭嶫罘罳礙斗牛泉美乍分揚子渡石竒先載鬱林州偏箱絡繹馳山荔巨舶聨翻餉海榴選匠荆揚喬木盡營工川洛衆材鳩瓜田灞滻聨郊隧柳陌咸陽夾置郵十院名花行索笑八窻文杏坐銷憂松風晝起娛貞白竹露晴翻媚子猷芳草夢時連驟覩蟠桃栽處朔勤偷相思樹底閒情劇連理枝旁逸興遒菡蓞飄香縈桂闥芙蓉輸艷撲蘭舟青萍瑞實浮江上緑蕚寒英寄隴頭俊鵲東方勞逺致神鷹南國費窮蒐爰居受享翻成福吉了能言不解愁子母𤣥猿攜上峽雌雄丹鶴貯浮丘當階檜柏龍鱗勁側徑梧桐鳯羽稠把釣文魚時撥剌開籠細鳥日啁啾玻瓈盞浄屠蒼鹿瑪瑙盤殷膾赤虬食進萬錢忘下筯羮調千鎰未盈甌牛心探胾熊蹯脆蟹足熬膏􅆩髓柔李尉庖中贏寳屑郇公㕑内足珍羞從容握䴤延諸謝慷慨呼盧軋二劉侯白抗顔陳戲劇秦青揚袂動歌謳數聲子夜明星落一部陽春霽月流别館笙簫雲共咽廻廊燈燭霧難收杯傳鸚鵡長酣醉杓滿鸕鷀逓勸酬五斗椰漿嘗異核百壺桑落薦芳篘生來梁孝豪㳺擅蚤嵗燕丹俠氣投日杳虞淵猶角逐天傾杞國漫咨諏無論蕭相居帷幄謾説孫郎近冕旒倐忽韶光侔閃電須臾滄海變浮漚霜華爛熳催紅頰石火紛紜照白頭好是太𤣥揚子業書成名字在千秋青樓曲三十六韻紫陌青樓接上林香車油壁鳯池隂珊瑚繞砌縈丹嶂瑪瑙當窗甃碧岑絶代秪看雙白璧傾城何啻萬黄金鮫鮹帳煖勻蘇合玳瑁筵芬􅅡水沉樹樹相思巢比翼枝枝連理結同心風鬟墜馬嬌堪畫霧髻盤龍力未任淡掃春山重閣曙斜拖秋水曲房深床頭琥珀鐫文貝几上琅玕琢翠禽沙浄鴛鴦翹綺褥泥融鸂鶒睡羅衾葱籠石竹縁衣繡馥郁溪蘭並帶絍理棹湖堤春漠漠乗槎河漢夜隂隂波填烏鵲虹千丈水戲魚龍獸百尋鼔瑟湘妃傳麗句吹簫嬴女發清音褊褼舞燕甘泉畔宛轉驚鴻洛水潯天女大羅邀把袂仙姝少室戀披襟三三楚岫朝相似六六巫峰暮半沈玉洞𤣥漿霞共汎瑤池丹醴月同斟青鸞慣向前除下赤鳯偏宜後掖尋日隠未央頻望蹕霜飛長樂驟聞砧銀屏照膽悲華落鐵鎖傳心怨陸沉織錦素娥情慘淡題紈班氏興蕭森崔徽謝客容顔瘁薛媛懐人涕泪霪竇太主驕長臥疾息夫人憾但如瘖生來陳后情元妬老去徐娘思尚淫㟁隔楊花愁嵗暮江迎桃葉畏寒寝虬髯邂逅縁持拂犢鼻逶迤為聴琴破鑑徳言憐濩落投梭益夀笑􅏟嶔霓裳殿逈唐宗入銅雀臺髙魏帝臨東壁王昌懐易暢西隣宋玉賦難禁時憑劎術祛凌暴屢握刀頭盼滯淫落盡紫薇重倚架開殘紅杏獨停針成隂結子須臾事腸斷春風杜牧吟事多出漢唐雜史小説楊花即楊白華劍術如聶隠荆娘之類輓朱廷尉可大十六韻先可大以建言論斬恩詔釋歸尋疾終冠玉凌雲美少年峥嶸人代擷青錢批鱗日慘雙龍闕折角風吹五鹿筵勁氣千秋横碣石餘生萬死出甘泉無論廷尉張羅事政憶司􅆰解綬年石匣蒼茫南斗下鹽車淪落太行前吹嘘土壤人誰測物色塵霾爾並賢赫􅂱蘭隂廻鹵簿殷勤瀫水繫樓船騰空騄駬庸多讓貫日虹霓豈偶然去住未妨鴻羽隔升沉俄析雁行聨飛揚大業河山並突兀雄詞海岱懸共擬隋珠還漢闕那知和璧瘞藍田藜空向閣殘新序草没雄亭掩太𤣥强直自知文季遂貞孤誰並伯喈傳闗心雨露酬前席極目乾坤倚斷絃函谷青牛沉紫氣匡廬白鹿弔黄泉生芻一寄遙天外萬壑松湫冷暮蟬朱暉字文季强直自遂蔡邕稱朱穆貞孤羔羊之節可大生平行誼大類二朱朱十六在明訂余過訪沙上念載矣嵗杪得手書猶故情皧皧也新春忽聞長逝感愴不勝挽以長律十六韻慷慨朱家結俠年金罇何日不花前仙源洞府三千闢帝苑池臺八百懸夜夜更衣逰太液朝朝聨袂入甘泉臨淮桂樹通侯第大庾梅花上客筵突兀雄心摧海岱飛揚豪氣挾星躔建安遺瓦酬雙璧宣徳新磁破萬錢彩翰如椽仍自貴黄鬚張㦸定誰憐官微恥抱齊門瑟宦拙寧廻越水舡海月亭中邀月坐江雲樓上抱雲眠明眸皓齒羅閨閣妙曲新聲被管絃舞罷柘枝頻笑傲歌餘桃葉乍留連孤松爾自陶元亮芳草余慚謝惠連幾夜梁園期作賦經時揚閣候談𤣥生年忽報龍蛇值哀訃俄驚鵩鳥傳地僻髙陵盤狡兔天垂荒隴咽寒蟬酬知未遂延陵諾愁絶生芻寄墓田在明家有園池聲伎江雲樓最軒爽每訂余海上為十日飲余亦欲卜居其傍竟參商未如愿憇清源舊逰禪寺懐蘇别駕以修二十四韻有序憶曩在清源日易使君座中邂逅以修别駕握手定交淹留累月窮極平原之興一别十年聞問杳絶扁舟再過不勝今昔之感云十月繁霜正滿籬孤城凝望碧雲馳青衫落魄還舟夜緑綺傳聲命駕時玉勒亂嘶章氏苑銅鞮髙宴習家池龍蛇四壁毫飛動牛斗雙函劎陸離妙曲西園陳翠管清歌北里近彤墀豪逰南郭朝朝共勝槩東山日日期綺陌朱樓情浩渺紗忩紅燭夢逶迤何人作賦非同調若个談詩不解頤一代平原懐競爽千秋河朔興難疲從知意氣闗寥廓詎謂形骸判别離驛路論心愁汎梗河梁揮手惜臨岐窮来海曲甘垂釣泪盡山隂獨解維揺落慚余同塞栁漂零聞汝逐江蘺茫茫白水迷三峽厯厯青山礙九疑無客乗風來灌口與誰尋雪上峨嵋雕闌繡柱孤懸榻清簟疎簾静覆棋漫詫王嬙留鳯輦徒聞薛女畫蛾眉君平易肆虚談卦揚子𤣥亭失問奇㟁拆黄牛廻舸艦城深白帝罷旌旗遙天灧澦雙魚絶僻地臨邛駟馬遲秫貫十千時潦倒柑題三百尚淋漓清風明月覉𤣥度流水髙山咽子期越國啼魂無翠鳥蜀天翹首但黄鸝亦知聚散人間世極目長空雁影移後再過聞以修歿矣夀吳封公七秩遙遙紫氣度滄溟翹首文園見徳星三世龍章偏鳯躍四朝鵷羽獨鴻㝠才髙曼倩飛千牘道直劉蕡困一經骯髒田方驕富貴蹉跎杜甫惜娉婷傳家夙擅瑶華譽報國争傳玉樹馨赫爾盛時新閥閱依然名士舊門庭姑蘇麋鹿逰春墅震澤魚蝦臥晩汀閶闔廟前閒倚仗滄浪亭下戲揚舲髙陽藹藹睂先白大耋垂垂髩尚青東望瀛洲鸞馭出西来𤣥圃鶴書停花枝燦爛供談笑竹色葱芊伴醉醒神棗安期遺履舄氷桃王母降輜軿前除冠盖如虹集後苑笙歌帶月聴綸綍幾看廻結駟緗縑猶自憶囊螢天河路近槎堪汎海屋籌多户未扄蚤識大椿千萬禩南山無事祝脩齡封公文端公孫純叔少㕘子而文仲使君父也后先膴仕以潜徳弗耀于時挽周徴君公瑕二十韻藝苑靈光四十春翩翩竒氣上青旻飛翔鸞鶴三千界慘淡龍蛇百六辰北嶺彦倫非異族東吳公瑾是前身宗雷綺嵗躭𤣥寂禽尚生來習隠淪虎阜池頭尋紫劍鱸鄉亭上㟁烏巾雄章甓社珠同耀麗藻昆丘璧共陳玉筯縱横三李合銀鈎揺曳二王親􅒖嶁絶頂文摹夏梁父中天篆勒秦巨榜華夷懸突兀穹碑河岳鬭嶙峋西泠倚棹吹黄葉南浦垂竿弄白蘋好士孟公膓磊落無兒伯道思艱辛羣仙閬苑招同列上帝叢霄憶戲臣太傅遺踪沈草樹中郎餘業散荆榛家殘甫里悲羅雀冢翳皋橋嘆獲麟是處霜飇摧大厦當年湖海問前薪浮名早借逰燕客秀句偏攜入洛人劇飲平原寧計日髙談河朔動經旬踟蹰舊雨舟蔵壑痛哭酸風笛滿隣瘞鶴銘存徒自惜籠鵞帖杳定誰真惟應彩筆星河畔元氣淋漓照玉宸送萬伯脩中丞經略朝鮮二十四韻突兀熊車控九邊熒煌鵲印下甘泉元戎夜仗黄金鉞壯士晨驅白玉鞭驟擁全師過碣石徐分小隊出祁連驊騮五色羣連代鵞鸛雙飛陣拂燕赤羽登壇環甲胄青油張幕䕶樓船雲銷上谷旄竿駐霧湧丸都箭鏃穿伐鼓吹笳行塞日飛槎浮筏度遼年詩書總屬中軍好文武咸推吉父専曲逆竒謀神鬼運嫖姚雄略帝王傳轅門妙算聞三策樂府豪吟擅百篇西第徴歌霞照席南樓舒嘯月窺筵椎牛有客俱長孺倚馬何人不仲宣潦倒鸕鷀盃似杓淋漓鸚鵡筆如椽千言草綴陳侯牘一傳花生杜氏箋横槊澄江天破浪拔刀窮谷地生泉摧牙怪鱷鱗堆阜授首封狐血漲川道左纍纍迎吐谷管中厯厯拜呼延寧知報捷憑公異㑹見題銘壓孟堅後乘長驅母寡入前茆生縛郅支旋扶桑日上清妖氣細栁虹飛息燧烟定逺威名元獨步平陽勲烈舊無前銅標直建三韓外鐵券遥頒萬户先虎豹崇闗茆土闢麒麟髙閣畫圗懸縠城佇待功成後一舸陶朱釣巨鯿蚤春寄懐大學士趙公三十韻金扉銀鑰散爐薰玉座琳居架斗文日為唐堯懸北極風因虞帝動南薰花明建禮宫前雪樹拂含元殿裏雲長樂烟光晨浩蕩未央霞色晝繽紛衣冠肅肅甘泉聚環珮鏘鏘太乙聞左邑亭臺行未厭西清城郭望難分九苞鸑鷟俱呈瑞五色鴛鴻並作羣求友黄鸝啼廣陌将雛白鶴卧斜曛昭容户外垂羅袖采女車前曳繡裙十様蛾眉桃李艷千盤鸞髻麝檀芬熒煌甲煎中庭燎縹緲都梁别院焚水汎昆明寧習戰山逰興慶詎成醺明堂禹益攄謨誥清廟䕫陶繹典墳獻賦班揚馳彩筆陳詩枚馬擅風斤傅巖板築真符夢莘野鉏犂合罷耘優詔異時仍白璧辟書何處更𤣥纁趨朝政喜羣公洽報國應憐太老勤絳闕頻年勞上相丹扉無䇿對明君羊裘數問嚴江外雁序長瞻瀫水濆瑣闥交章神轉王平臺傳論思偏殷三千魚鳥張旗幟百萬貔貅礪劍紋龍武盡收榆塞卒鷹揚全護棘門軍材官甲胄先浮渭大将樓舡欲濟汾舉鼎威名雄夏説揚鞭豪氣邁髙賁倉皇跛足知狼顧躑躅獰牙見豕獖海匝雞林傳帝力江寒鴨緑淨妖氛耆英紫綬堪圗洛狂客黄冠㑹入鄞講易庭前饒管輅傳書門下半羊欣淇園荏苒齡齊竹鄴架㕘差帙散芸翹首越裳重譯至赤松岩畔候元勛㕘知張公睿父觀察吳公文仲過訪吳公舊宰金華訂盟莫逆張公神交十載近始識荆迺並辱提攜收之方外髙軒枉問讌洽連宵國士之知敬酬此什繡服緋袍試晩晴荒途曲巷謝逢迎州民禮數容長揖地主風騷接大名幄裏雙虹交映日輿前千騎並干城人倫張仲推忠孝吏績吳公擅治平白雪中原馳錦翰青霞太末射楸枰三都浩瀚裁新註七子峥嶸締舊盟志續齊諧羅艷異書傳博物洞幽明朱旗蹔借臺端曳玉珮行趨闕下鳴躡蹻久虚陳榻夢飛觴何限庾樓情茆檐豈為看花入草徑聊同問竹行業綜緗縑元自得篇攜綺繪定誰評從知國士深留盼愁絶文通賦未成送周大㕘之楚中當年文價重連城蚤向詞壇識姓名玉署鳴珂朝建禮金門持㦸扈承明中天正屬飛龍起南國遥看結駟行侍從清朝臣不厭驅馳赤社帝闗情㕘差原勒含毫待次第英皇抱瑟迎衡岳雁廻雙節迥武昌魚躍片帆輕登臺風雨三湘暗按部雲霞七澤明方岳大藩形勝地甘棠寧譲召公評送㕘知洪公入賀聖節十六韻暖日暄風上栁條樓船晨遡越江潮腰懸玉珮趨辰極手捧金函入聖朝魯國生徒圍講座燕臺豪俠避行軺棠隂婺里闗情切荔子閩鄉送目遙藉草定過平樂市看花頻宿灞陵橋天浮太液明霞麗地接甘泉湛露饒彩筆何方留鼔吹朱絃隨處叶簫韶南皮舊事猶飛動北海新盟未寂寥駿骨千羣隨顧盼雄心八極任逰遨空囊厯嵗蔵孤刺陋巷經時挂一瓢洞裏秦人捫峭蒨山阿楚客寄嶕嶢觀禾乍許親田父伐木偏能問野樵敢謂龍蛇同奮蟄深知鵬鷃異逍搖移床實奉元規宴下榻虚煩仲舉招荏苒三卿廻獨坐逡巡九列譲元僚從知岳牧明堂近蚤伴臯䕫翊帝堯懐王恒叔十四韻恒叔以擢任還天台尋赴白下中途病臥京口卒南遷新命下蓬萊紫氣函闗日夜開霞色乍眠方廣寺月華頻坐妙髙臺三山興盡思三竺九曲吟成夢九垓瑤圃勒銘推哲匠玉樓題記仗雄才熒煌賦草傳中國燦爛文芒接上台軹里晨霜流檜柏茂陵秋雨滴莓苔窮交此夕攄孤憤故友當年和七哀授簡甘泉誇駿骨飛觚碣石羨鴻裁峥嶸汲鄭交難續嚄唶荆髙世尚猜咫尺遮須尋子建龍門曾識仲宣來哭蘇學使君禹十八韻皁盖朱旛辟衆僚青鞋白帢問山椒猶思藉草過三洞尚記看花就六橋剗地雕戈紅日駐倚天長劍白虹飄論心北海尊偏洽握手西園盖未遥一水驟縈桐柏夢萬峰俄矗桂林標君之擢嶺右參知也先銓曹兩擬中州命皆不下桄榔樹色浮公座荳蔲花香撲使軺玉管暮揮盈洞壑金函晨捧接烟霄長門鬬賦驚先達宣室紆談誤早朝十日河梁懐並鬱經時濠濮興難消将因索處尋公叔詎意飛昇逐子喬齋老白楊情漠漠閣殘𤣥草意蕭蕭中郎典籍悲零亂太史篇章恨寂寥蹻躡五龍飛帝闕旌懸雙鶴度神飇胡床瀔水迷秋月畫舸錢塘咽暮潮國士中原時自惜名流東域定誰驕遺書百代鳴孤憤大樂千年閟九韶潦倒酬知腸寸折不禁寒雨墮深宵君禹過余必却鹵簿掩蓬茆留連浹日余病或不冠對談亹亹形骸盡忘少室山房集巻六十七
