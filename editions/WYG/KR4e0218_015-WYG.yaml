body:
  text: 少室山房集巻十五明胡應麟撰五言古詩二十首古意贈雲間唐子四章飄飄雲中鴻口銜尺素書有美雲間客宛在天一隅蘭臺振髙躅青驄曳華裾初承百里命栽花爛長衢鳴琴訟堂上素幙垂清虛泠然念同調發篋貽雙魚贈我金錯刀投我琅玕珠感子繾綣懐殷勤繫羅襦豈無傾城色貴此無鹽姝林風冉冉暮嵗晏羌何如哲人代淪謝大雅諒難作世路日凌夷詞場巧枘鑿睊睊郢都匠戾目陵陽璞何彼金閨彦髙誼振頑薄尺書寄逺道論交慰離索風霜粲華緘颯爽動林薄神劍貽雷張仙舟佇李郭寥寥九成奏孰振鈞天樂千人失酬和片語謝雕琢泠泠金石聲三嘆起韶濩神交豈在面片諾為生平緬彼古聖賢立談蓋自傾伊人瑚璉器光輝耀連城跫然窮谷中晤言托同聲朱絃久摧絶為子繞夜鳴傷哉白日暮俟彼黄河清金石有時泐浮華安足營所希大業崇努力追炎京百世猶比肩千載垂令名區區九州内胡懼不合并大江際天流将子一葦航飛濤如雪山日夜奔錢塘同心苦離索泪目馳河梁豈無盈觴醪我友不共嘗蒹葭被白露林葉何萎黄朱絃感人懐怨彼離别長翩翩兩龍劍各逐晨風翔雄雌一朝合紫氣騰岩廊許身貴許心片諾為肝腸寄謝久要客形骸良可忘贈吳生充二首季重方七才子華侈八面承家得苗裔甘守蓬藿賤世途尚豪侈裘馬互矜炫伊誰振大業往往讐筆研翛然韋布中嗒爾罷歆艷遁迹吳山陽索居嚴陵岸千秋豈不勞樂此琴書翫一丘伴麋鹿抱膝良堪多何來念同好負笈攀藤蘿先生久避世白眼横庭柯乾坤莽寥廓故交邈山河𤣥亭不盈丈愧汝常經過矯矯侯芭生抱饑習吟哦英詞爛金石激楚停陽阿黄鵠飛摩天壯齡日蹉跎豈無朱絃瑟為子迴沈痾才人例百六坎壈終如何贈黄氏二仲詩二首括蒼一抔土遂安萬山腹大澤生龍虵連城孕雙玉俱操七寸管並騖千里足邂逅錢塘涘翩􅝆紫陽麓折齒師仲淹和歌到窮谷眷言申末契悠然味伐木孟陽誠哲昆季方亦難弟矯矯江夏黄聯飛盛明世談詩各起予琳瑯逺公社雙鳳鳴雲中二龍語天際回首華陽宫故交日殞逝晚合蓋自傾居然洞肝肺隋珠豈不耀愧此荷裳繫歸與葺衡杜白首期勿替清華館為程生元魯題大鄣擅幽奇名園負東郭衡茅數十椽軒敞帶長薄林木何翳然空庭散鳥雀清漣媚藻荇緑波映蘅若夾岸芙蓉披中流芰荷灼翩飜白羽下撥剌紫鱗躍之子吟逍遥飲泌自斟酌沾沾御元禮亹亹獻康樂問字開揚亭校書閉劉閣丈人習名理夙諳卧遊樂觀魚失濠梁騎馬涉京索緇塵染衣袂行行悔入洛何當築土室行坐此丘壑千秋三逕中求羊未寂寞汪生惟徳工奕而温然長者行持巻乞言為賦汪生歙都彦家世本閥閲總角遊巴邛邂逅四仙列龍肝竊餘剰隨風墮天末攜書客武林精心究圖牒休仁迨仲甫遺譜恣繙閲藏機玉局中妙思鬼神協一㕓據湖山所當幟必拔九枰欲較王半道祇輸滑紗帽挈隠囊翹然布衣俠髙車長者聚短巷俗流絶半軒風雨聲廣武戰初合奇謀騁六出廟算窮七伐斜照委緑苔殘星蔽黄葉逡巡斧柯爛慘淡燭花滅誰云奕小道先生早䟤跋嵗月贏二毛悠悠茂𢎞業當今號國手方吕蔡頏頡一匡方擅齊方寓清源偏霸汪表越吕蔡季孟間吾評匪僭躐黄王及朱范少俊互騰踏猗哉盛一時輓近諒難越就中孰恂恂生也最馴洽澄清叔度侣謹畏伯髙埒争先戒貪競殿後冺驕伐遇我吳峰巔屢結丈人襪願言丏隻字千秋耀眉睫年來謝筆研推敲廢頰舌參差宿習萌把袂若中熱為汝聊囁嚅毫端縱塗抹久矣忘成虧誰云較優劣枯棋三百六廿載閉空篋冉冉負局翁騎雲去閶闔送林貞耀藩㕘之嶺南晨餐悵不御飛龍在河梁駕言奉王命千騎巡東方材官負旌節組練紛路傍還州震華鼓里閈爛生光偉哉圖南鵬八翼順風翔把袂即修途行行涉炎荒豈無臨歧戚執手互徬徨與子異形骸去住安得雙丈夫志萬里六合如帷房勉哉䇿髙足銅柱流芬芳大荒極東南山川莽迴互四百羅浮峰參差矗雲霧關河信紆鬱人文亦横騖闤闠連城壁吹嘘競相慕興言適逺塞甘棠夾廣路猗與振大雅始興並風度落帆炎海陬捨筏曹溪渡勾漏饒丹砂行歌白日暮絶域寧久淹金莖湛仙露萬仞飛雲巔帝閽會平步讀林氏三世集寄貞燿參知天迪員外峩峩晉安里王謝惟髙門三朝四八座玉立輝乾坤木天何寥廓金閨信沈淪雲烟爛東序河漢流西崑賡酬亦遞唱文采如雲屯突兀黄金臺咫尺限帝閽川容卧輞水山火歌陸渾花晨競彩筆雪夜攜芳尊歡言頌遺藻典刑儼生存良哉汗青業奕葉垂雲孫乙未秋邂逅梅生泰符把臂甚暱同觀濤江上别去未幾則聞生病且殆俄聞生竟不起矣余再入武林檢敝篋得生手書屢紙不勝山陽鄰笛之愴爰賦二言投宛溪之上以吊之梅生宛陵秀負笈來錢塘嘯咏湖山間咳唾馳琳瑯一朝玉樹亭覩我神飛揚十載胡先生姓名狎詞場慕子如渴飢戚戚縈中腸龍門屹造天怨彼一水長班荆倏成故願得升君堂嗟余蹇且拙厯落如桓郎将汝繾綣懐永夕連匡床觀濤大江涘海若為徬徨眷眷執手言晨風發河梁将無綺語累念子毛髮黄願言保玉體百嵗遥相望流光不相待倏忽三嵗久鬱鬱上東門春風五楊栁端居感離索念子成老醜何圖羽翼乖喪我同心友玉樹埋地中垂楊幾生肘發函見君書洒泪濕蓬牖天運阻百六詞人厄陽九勁風掃飛藿弱質復何有傷哉大國賦黙黙如澠酒遺篇爛金石為汝藏二酉千秋宛溪上不愧朗陵叟玉樓篇題李能茂遺墨後有序東陽李生能茂抱絶人之姿年未四旬而夭折中道且遺文漫軼有長吉錦囊之憾焉大塊於才胡亟栽之而亟覆之若是豈上清白玉樓重搆非隴西氏子例不使操觚帝傍耶余視生忝一日長生謬以匠石見推余亦以得生里閈快愉甚迺生竟落落死矣昔長吉就徵杜紫薇至為奴僕命騷之説生幸獲長年即亡論驅馳屈宋其力追兩都三唐而不為王孫之誕漫可前箸㳏也生于當世所尸祝弇州氏外意以信陽吳亳三數公悉易與而頗時時輓轂厯下生此其持論稍與不佞左者自餘上下千載大都若合塤箎居常盛氣欲見所論著垂一家言而疾病未逮今所存歌詩僅僅數巻則余業序行諸世矣他傳記雜文既散失而書牘數十百首獨巍然余巾笥中暇日因為裝潢成軸時展閲之以舒憤懣秋清木落宴坐齋頭一二友人過從談藝偶取生遺墨縱觀不覺哀涕淫淫横集衣袖河山宇宙纔一俯仰便作陳人悲嘆之懐庸可復喻輒走筆三十六韻塗抹巻終生誠有知得無太息於穹壤也香山兠率宫譙郡遮須國笙飛蜕子晉樓成召長吉造物誠小兒大塊黯無色傷哉一抔土瘞此連城壁矯矯東陽生雕龍擅疇昔雄心萬古挫猛氣千夫失踔厲無前修精進寡儔匹雙眸狹宇宙今古照瞬息彈丸婆娑界十指肯浪屈猥余一日長閭閻復咫尺負笈來藤蘿披襟坐蓬蓽長嘯金華顛大呼石羊窟操觚問真宰慘淡白虹泣晩叩瑯琊門中郎倒屣出通家孔融後下榻陳蕃側如澠卜興代生花贈彩筆頻闚慈氏閣屢面初祖壁善才拜未終慧可髓幾得嗚呼大雄逝金棺拉摩詰一真返桑扈三號吊秦失白日愁西南浮雲悵東北伯道無遺孩梁鴻有陋室弱女涕泗横孤嫠形影隻蟪蛄集荒榛狐兔入樷棘殯宫對棠梨織烏伴於邑何人奠麥飯有客嘆陳迹髙文汲冢殉麗句紫薇緝粲爛流江河縱横走都邑隻字迴彭殤寸心炯得失榮華劇臭腐眼底復何惜嗟余少濩落狂名世争詘青衫二十載窮愁仗汝釋一朝斷交臂疇與豁胸臆聞笛時悲酸横琴重悽惻粲粲白玉京修文拜新職惟應大鵬輩八表獨揮斥寄蘇君禹二首有序與君禹别都門倏復二載是秋余寓武林忽聞君禹仍有燕中之役亟躡屩錢塘握手則先以黎明出關外矣一水盈盈坐失良晤悵憾不可言轉蓬亦有根飄颻隨長風遊子豈無家卒嵗歌途窮宛宛同心人咫尺錢塘東眷言贈芳草軒車若遊龍朝馳武林驛夕止禦兒宫八翼排金門雙鈎氣如虹而我獨何為一室長忡忡傷彼四愁咏目送寥天鴻桂林實奇秀千峰矗雲霄丈夫桑弧志驅馬萬里遥曲江浣塵􅅽愚溪滌煩囂伐鼔震五嶺舞干洽三苗昔人讀書臺突兀迴霞標黄鵠一再舉宇宙參遊遨鴻篇勒琬琰姓字留荒要皇皇四門闢柱石毘清朝幔亭篇答黄文學堯衢有序莆中黄堯衢以干牘見投亹亹數百言陳義甚髙而過情推挹鄙人幾於昌歜之嗜比讀其所為諸序傳樂府雜詩奔詣兩都六代間令人應接靡暇聞生年僅僅逾冠胡以一蹴至斯堯衢雅欲得予言為序適病中憒憒且茂漪始睹逸少筆蹤神氣頓爾疲薾爰賦五言古體二十韻稍致區區僕生平寤寐閩遊三事拜甌寧滕先生墓及握手武夷君飽啖側生而返今且並黄生四矣他日扁舟東下振衣長嘯于幔亭之顛堯衢得無踴躍和我也黄生起南服摛藻自弱冠蟬噪薄隋梁龍躍躪秦漢大言或元封小咏亦貞觀宛宛樂府詞珠璣􅂱璀璨畸遊閩海上獨抱延平劍九曲浮清泠九漈吟泮渙飛揚大江楫躑躅廣武戰何哉九合勛桓文謬推贊前茅受旗鼓中權屬壇坫穆穆清風頌寄我劇三嘆嗚呼哲人頽往事涕如霰瑯琊𤣥草絶豐社白榆散陽春悵誰和長夜邈難旦灼灼傾城姝昭陽擅飛燕凌雲羽翮就澤霧文彩變大鵬遇希有八極眇一盼将無笑鷽鳩會有嘲斥鷃俗士迷前籌達人炳遐算奇峰三十六一一造天半為報武夷君廣張幔亭燕夜燈同永叔話舊仲子弼年十四於座中戲咏白石榴有霜寒秋色浄明月挂枝頭之句余嘉其風格朗朗賦此勗之石梁駕丹壑赤城横紫霄天台八萬丈的皪懸霞標司空毓靈秀龍躍隨神堯華名走絶域茂實騰中朝鬱鬱庭階樹三珠粲同胞青錢捷唾手俯拾如承蜩髙陽失才彦潁上慙時髦文章聚花萼薄海誇賢豪緬余識季公把臂成久要古心出墳索逸韻馳風騷矯矯八尺軀恥偕兒女曹胷吞夢澤水氣折洪河濤雄飛邈廣漢雌伏懐窮交皇皇潞河涘十口勤維梢空同倚長鋏函谷遺綈袍吹嘘及朽榦攬挈當前茅狂歌復痛飲浩蕩窮深宵呼盧墮明月角奕流神飈情投儼膠漆契合鈞咸韶酒酣見仲子􅂱若英瓊瑶翩翻慕周孔卓犖譚伊皋孤芳滌塵膩五字驅炎囂靈光詫授簡鸚鵡憐揮毫揚收劣加嵗子安正垂髫伊余越四十蘭玉殊凋蕭對此重嘆息中腸熱如焦于門一何盛咄咄鍾靈苗丹山詎凡翮渥水真奇毛勉哉事大業嵗月如風飄無窮有令聞不朽寧金貂下幃第發憤惜隂競蓬茅六經鼓元氣百氏羅秋毫餘皇破巨浪繁弱聨雙鵰祖孫及子父奕葉馳華鑣回首天台色東南正寥寥惟應太原望世世争岧嶤少室山房集巻十五
