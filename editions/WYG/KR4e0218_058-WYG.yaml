body:
  text: 少室山房集巻五十八明胡應麟撰七言律詩八十首七月望抵武林陸履素使君招集湖上樂人周生瑾者年少善歌酒酣持扇索題即席塗抹四韻華星明月遍西園皁蓋追隨識大藩南國風流周小史東呉才望陸平原朱絃度曲飛霜麗玉局觀棋墜露繁夾㟁芙蕖千萬朶歸來何異宿桃源秋夜集程仲凱玉樹亭同梅太符羅高君作珠簾十二鎖蘭苕一樹亭亭碎月揺貝葉恍疑天竺寺瓊花如覩廣陵橋堦前秀色呈諸謝庭后新聲度六朝最是縞衣明夕夢相思愁絶彩雲遥霅錢太學懋穀過訪奉贈余懋榖年家子也奕葉風流大雅堂飛揚才藻敵文房青鞋遍踏呉山下皁帽頻攲越水傍賦就長楊迷國艶栽成叢桂發天香東南彩筆錢郎舊名士今誰列雁行寄贈龍君御校文南都便道入楚省覲湖頭晴色罷參禪又覩風流白下年六館才人爭射策三呉詞客候譚𤣥雲拖彩服椿庭外霧擁朱衣棘院前莫戀長干風景麗西泠何限木蘭船寄贈長洲江明府明府楚之桃源人十載風期夢寐賒相逢何意驟天涯栽成林屋花千畝恍入桃源樹萬家畫鷁秋分呉苑月飛鳬晴蹴漢宫霞青旗夾㟁休迴首滿目河梁散曙鴉舟過廣陵訪陸無從夜集託以買宅橋東因寄贈此作橋上相攜不厭頻鈿車油壁半香塵貧將玉樹誇詞客老向瓊花作主人䢴浦月華秋似練曲江濤色夜如銀青樓肯著狂夫卧傳語吹簫為卜鄰閏九月望後抵淮上包穉升水部邀集署中二首有序衙齋之傍雕欄曲池特擅華勝入夜登西臺長空無雲皓魄如晝酒酣樂作小奚歌紅線行巨觴豪飲劇談遂至申旦蓋余自癸酉之嵗以大中丞滕公命入武林與穉升及元采立夫輩同學萬松精舍屈指二十四秋浮沈異趣穉升故人之誼戀戀猶昔云白面揚亭話草𤣥升沈迴首一潸然飛揚六傳浮淮日潦倒單車入洛年劒合青萍明月底杯分黃菊暮雲前投醪􅂸吸長河盡可奈平原是别筵雕欄十二淨無塵緑酒銀燈勸客頻持節汝為都水使乘槎余是問津人風生錦樹鳴霜葉露洗瑶臺上月輪莫訝秋宵談易徹廿年朋輩各參辰泊天津遇陳孝亷仁夫為十日飲賦贈把袂飛揚易水頭當年馳疏識名流從軍自結三千客破敵頻呼十萬侯劒拂秋霜臨虎穴毫揮春雪上龍樓期君一在新豐市爛漫桃花撲錦裘陳雅喜談兵欲以三十六人横行日本如班定逺故事初入都與惟寅話舊白雪齋作聚散升沈二十年一尊攜手暮雲懸觀魚尚憶濠梁下市駿重逢碣石前意氣乾坤誰並許頭顱霜雪競相憐從知奕葉麒麟貴彩筆何人載世傳仲冬長至大學士趙公汝邁大將軍李惟寅同日先後招飲賦謝二章飛葭六琯動芳晨玳瑁筵開並帝臣長揖將軍元有客掃門丞相詎無人黃雲絶塞閑金甲紫霧中天䕶玉宸不為上公雙吐哺荷衣容易到風塵旅館陽迴雪乍晴梅花吹角暮雲平羮調上相長楊殿酒出元戎細柳營鵷鷺三千隨玉陛熊羆十萬衛金城酬知何限干將色夜夜雙龍匣底鳴至日同俞孟武顧朗生朱汝修集李太保惟寅白雪齋即席得來字朱門遥喜一陽迴曉逐春光上薊臺隴右英豪元世業淮南賔客盡時才驅車豈為千秋出擊筑重將萬感來􅂸取深杯酬令節參差銀漏滴蓬萊次日再同俞劉朱三子集李汝藩齋中分得花字華堂燒燭散林鴉坐擁紅爐片月斜漸喜春光迴白苧尚餘秋色對黄花孤蓬游子衝殘雪大筆才人照綺霞莫訝金閨年少甚岐陽詞賦舊名家夜同孟弢諸子集白雪山房得雲字畫㦸清香上紫雲西園明月坐絪緼三年桂樹尊前别一夜梅花笛裏聞白雪齋中人漸老黃金臺上客成羣朝來太史占星聚燦爛干將易水濆上元雪後過宋忠父入直不遇寄懷縹緲天花散鶴羣瑶臺十二迥難分光揺火樹甘泉月焰吐金蓮太液雲殿上攀龍文苑客壇前飛騎羽林軍知君此夕高堂夢一賦晨看帝座聞過王思延齋頭讀所撰新草并鈔本夷堅支志十􅗡主人索七言一律及詩藪三編為報即以見歸走筆賦此萬軸琳瑯照五車天涯何意復吾廬登堂盡讀潛夫論入幕先攜仲任書赤水頻年迴象罔此書余向求未獲丹鉛遥夜校蟲魚以鈔本多訛脱從知錦被參軍業挾策重過大酉居王時為京營參戎題帷幄元勛冊八首為相國趙公賦寧夏獻俘十萬材官奏凱旋天威如電掃祈連窮追冒頓蕭關外盡縛中行漢殿前宿霧三河沈劒㦸新霜六郡洗戈鋋金門咫尺瑶編就何限殊勛太史傳五載干城急上材傳呼中令出蓬萊長纓北繫名王去大纛南俘叛將來淨掃烽烟張掖郡平銷雲霧赫連臺誰論淮蔡功成易為說元戎是姓裴朝鮮復境飛騎紛紜易水傍羽書題處筆如杠月支故主仍修貢日本殘兵盡乞降鼙鼓漁陽空大磧戈船鴨緑靜長江經綸黃閣真誰並一代凌烟照畫􅓚清秋遼左陣雲寒伐鼔吹笳上將壇乍見嫖姚屯細栁俄傳都䕶奪皋蘭千檣觸浪長鯨碎萬弩乘潮巨鱷殘一望越裳天似洗大標銅柱報金鑾闗西告捷一鼓居延萬甲馳風雷揺曳助搴旗天驕膽落犁庭夜日逐魂銷度漠時朔雪頓隨騕褭淨隂風旋挾虎狼移金城却問諸年少可解營平授策竒露布風馳入紫宸何人第一畫麒麟雙旌出塞元飛將一柱擎天自老臣突兀燕山銘處石縱橫遼海戰時塵槖駝千隊南驅夜不數周家白雉馴時邊將獲槖駝千頭日本祈封巨筏連雲盡度遼紛紛乞命候封軺單于􅋇面思歸國贊普輸心願入朝九塞軍容銷戰伐八方民力謝征徭安危華夏看今日一騎何煩出渭橋平明閶闔露華晞六服懷琛候紫薇島虜行成祈北面蕃臣重譯到西飛清風絶塞塵沙淨赤日扶桑燧火微從此禦戎傳廟略上公橫玉贊垂衣日本使名小西飛雪中同胡孟弢諸君集宋忠父第分得歌字朱樓百尺帝城阿策蹇東來問叵羅獻賦客當梁苑聚尋詩人自灞橋過千門落絮銀為殿萬井飛花玉作河寂寞郢中高唱後重將白雪擅新歌薄暮雪霽改席小西園步縹緲臺玩月入清華洞觀梅花復張樂堂中華燈火樹絲竹間作丙夜擁爐小齋聽韓生琴與周生較奕達曙再用韻賦之春光遥逐片鴻過有酒寧論夜若何東市張燈雲氣早西園飛蓋月明多孤亭草色叢青桂古洞花香翳緑蘿十二金釵屏後滿競翻瑶瑟奏呉歌雪中同王明府蔡儀曹集恒叔冏卿宅縹緲關河凍欲含灞橋吟興正驂驔千門雪照梁園賦萬古天空碣石談栁絮樓臺迷塞北梅花籬落認江南相逢盡是朱絃客一奏陽春意未慙翌日再同恒叔冏卿集穉含儀部第攜手高齋散鶴羣帝城春色漸絪緼金庭日月三都賦恒叔有五岳游草玉洞雲霞二酉文稚含自號二酉山人雪霽爐烟縈樹起風清碁響隔花聞朝來共策黎眉去折盡寒梅易水濆奉壽大學士洪都張公四首律轉洪鈞萬象移金莖承露出瑶池蓬弧已卜三千外花甲才周六十期霧擁青牛來絳闕雲飄黃鵠下彤墀憑高一望台垣色南斗中天正陸離海屋籌増玳瑁筵東皇靈氣夜周旋三台拱極星辰上八柱擎天日月前左馬文章鸞掖貴䕫龍勲業鳯池傳桃花漫憶西華外玉洞明霞萬樹懸二百年鍾命世才垂紳端笏住蓬萊三神山外青鸞下五老峰頭白鹿來中貴傳觴臨玉陛大官行饌出瑶臺無論吉甫清風頌煥爛宸章屬上裁赤舄雙瞻傍紫宸華夷誰不羨經綸安危一代徴王佐侍從三朝識帝臣異日才名金騕褭當年形貌石麒麟閒雲極目匡廬畔能憶𤣥亭問字人公在南成均日余出門下命賦閒雲館詩雪中陸使君過訪時大計初解嚴千山飛雪灞陵橋策馬長安路未遥豈為魚鹽來上國爭傳牛酒錫中朝綈袍碣石交情古使君徃與余邂逅長安彈指遂三十載彩筆甘泉氣象饒八百璚樓春苑外新詩隨處勒岧嶢贈呉翁升握手新知更酒徒由來竒偉擅菰蘆星河靜日飄雄劒風雨殘宵擊唾壺白玉堂中人在否翁升買一姬甚麗而早死集感懷之作為山黛閣編黃金臺上客來無異時苕霅家能泛何用扁舟狎五湖夜同胡孟弢龍君超楊世叔三孝亷周陳二山人集宋忠父第觀梅花繁英盛開芬郁殊絶適侯萬二都尉在坐琳瑯珠玉與花艶相映發同集諸君應接不遑余傾賞丙夜幾欲醉卧閣中作趙師雄羅浮夢矣歸賦一律似忠父并博笑侯萬二君姑射雙仙玉不如一尊花底鬭璠璵夢迴大庾繁霜外吟斷孤山片月餘寂歴寒香飛枕簟玲瓏疎影出庭除東風何處吹長笛極目江南舊草廬區太史用孺過訪小飲濁酒翻歌意氣長金門環珮蹔徜徉詞臣煖借青綾被倦客寒消白苧裳賦雪何人還郢里談天吾輩尚華陽相看伏櫪同盟在未遣雄心阨太行夜同子玉過用孺出荔枝酒轟飲至酣即席賦爛漫名花壓酒巵主人留客鳯凰池何煩大白呼桑落宛似輕紅擘荔枝把臂浮雲春盡日持螯明月夜䦨時莫教一騎華清笑膓斷當年杜牧之送趙鹽鐵之維揚燕山晴雪照宫袍車騎東方意氣豪臺上千金騏驥骨池頭五色鳯凰毛深花揚子迷春渡逺樹蕪城落夜濤二十四橋人似玉畫筵何處伴揮毫送孟弢之沅中東風帆色潞河瀍無賴楊花舞别筵龍劒未收豐獄底鮫珠猶泣洞庭前千人漫擬酬春雪一士何妨守太𤣥庠士僅二十人此去長沙應計日受釐明主在甘泉贈李大將軍二首誰奪天山蓋世勲登壇長鋏動星文隴西猿臂傳飛將薊北麟臺屬冠軍十萬琱戈營似雪三千珠履座如雲猶憐射獵平原后彩筆拈詩過夜分金鎖花深醉玉壺緑沈苔卧伴雕弧爭傳都尉晨風曲自寫將軍落照圖轉戰頻年屯涿鹿禽生遥夜出飛狐長纓不道終郎懦躍馬蕭關日未晡李善丹青同賀伯闇集蘇叔大聽謝孫兩孺子歌曲作是夕賀遂以獲雋歸曲巷濃春到竹扉羊求相過並忘機尊前月似羅浮出座上雲偏碣石飛花院管絃流翠幄棘垣燈火動朱衣慈恩百尺青霄外姓氏晨看徹帝畿曽人倩春日移居招同諸君夜集余偶以他燕不赴賦謝此章韋曲西南大隠留卜居春日近龍樓金門詔許東方待玉殿書將太乙讎栁色甘泉移砌上花香平樂過床頭羣公正引揮毫興愁絶青絲絆紫騮奉贈大學士馮公當年曽謁大馮君皁蓋飛揚瀫水濆華國更傳中秘草名家誰嗣太𤣥文香浮赤舄唐宫霧燭引緋袍漢殿雲解道鳯池霞色滿餘波長借白鷗羣夜遇蔡𢎞父館中呼盧戲贈時蔡將買妾長安屈指新豐散酒徒長燈明月蹔呼盧關東意氣慙吳質洛下風流羨蔡謨翠縷同心金是屋青絲垂手玉為壺曲江花事輸年少一載嬋娟向五湖王文學以忠八十餘徒步入燕訪大學士趙公而神明茂甚詩以壯之五字新詩一釣綸攜將帝座問星辰聊行雪裏山隂道肯逐風前洛下塵大厦萬間依梓里危樓百尺近楓宸無嫌掃葉王生耄結襪猶能重相臣送屠田叔之七閩抗手春明話别離為君重賦七閩詩官曹鹽鐵酬文學佛寺金銀卧武夷目斷紫騮紅杏苑歌殘黃鳥緑楊枝側生飽啖楓亭下可忘京華識面時應揮使招集坐中北樂侑觴賦謝燕寢清香散鶴羣玳筵霞色坐絪緼蹁躚舞袖花間出嘹喨歌喉竹下聞旅夢乍迴燕邸月鄉心猶共越谿雲憑高試望東南氣燦爛明星拂劒文錢參戎移任北平二首飛將新移右北平度遼橫海舊知名珠弓射日千鵰避玉帳連雲萬騎鳴羽檄晝馳平樂館鐃歌春滿受降城曽聞異日東征績半夜天山已結營一劒凌空舞雪花雙旌揺日動龍蛇從來驃騎能憂國未滅匈奴肯顧家苜蓿城邊吹篳篥燕支山下奏琵琶大標銅柱祈連外第一凌烟摠浪誇王通侯世叔以新刻詩草見貽卒業賦二首奕葉金貂大海濆風流王謝舊無羣清標突兀麒麟畫彩翰飛翔鸑鷟文勑勒歌成才冠世燕然銘就氣凌雲寧知逸少將軍貴搦管千花拂練裙年少登壇笑伏波飛章雲錦粲明河大揮隴右屯田疏重製伊州出塞歌謁帝華筵聞杕杜懷人清興入藤蘿翩翩白馬燕臺暮頻許荆高挾筑過寄李逸人李好談長生别余入咸陽自云將煉藥終南與人世絶黃河遥望盡飛沙一别難尋漢水槎白苧閒過韋曲栁青萍狂狎杜陵花長生籙在顔終駐太乙丹成髩未華寄問旗亭耕種叟荒原曽熟邵平𤓰送鍾太學天毓歸越省其尊人觀察公驪歌不斷夕陽樓又折黃花賦逺遊六館諸生驚翰墨三河羣少羨風流朱衣上國誰青眼彩袖高堂正白頭歸去若耶西子近絲韁煩為片雲留奉贈大司徒蒲坂楊公二首當年袍笏借南宫片刺曽勞答孔融世德摠傳䨥八座家聲遥羨四三公芻飛絶塞軍儲盛粟輓長淮帝眷雄自媿銜知年少日蒲梢憔悴太行東三朝出入珮雙龍四岳諏諮近九重社稷勛勞周太宰川原籌畫漢司農朱旗代北邊烽静絳帳關西世澤濃廿載長安聊再入不禁風雨敝芙蓉中秋夜大學士趙公招集待月賦謝長廊秋色轉斜曛握手平津上客羣酒出天厨容並醉羮調帝座許平分黃金城闕籠香霧白玉樓臺挂彩雲酣醉莫辭過丙夜清輝蘿薜已紛紛中秋先一夕同呉允兆周元父集宋西寧園亭翫月申旦即席分賦得郊字秋半園林易水郊郇厨頻出大官殽茒堂一葉霜華下桂殿千花月色交極目蟾蜍初展鏡驚心烏鵲未安巢清光儻為侯門駐後夜重攜上客敲秋日王太學行父招同顧朗哉顧靜父李叔操李本建袁微之魏穎超汪明生王資敬集長安西曲碧瓦朱甍大道傍招邀臺館尚華陽壚頭擊劒多燕俠澤畔抽毫是楚狂露黯翠梧頻換色風酣紅芰亂飛香疎簾清簟人間世賭墅憑誰敵謝郎中秋後一夕蘇叔大招同汪公幹胡昌世區德符攜尊步月西長安遇趙汝元兄弟痛飲達曙一尊星斗挂長空良夜招攜桂樹叢玉鏡尚圓千里外瑶臺同望九霄中高林墜露驚棲鳥逺塞飛霜落斷鴻廿載素娥成逺别天香零落廣寒宫蔡立夫素不事麯蘖入都下忽以酒人名每一舉觴輒酣暢累日夜乃醒醒則復呼酒酒已復醉或至經月始復常自名連環飲得歌者苗鳯時置屏障間相酬酢余甚高其風格戲贈此章擊筑燕臺興轉狂離騷讀罷思飛揚經時曲阜邀從事盡日糟丘卧太常帳裏玉簫傳鳯吹筵前珠履集龍陽竹林風致看垂盡儻許頻過白面郎何長卿至自南都技益精絶賦贈此章一擲千金散彩雲愀然長嘯大江濆生花驟入銀鈎夢倒薤俄成玉筯文帝命靈篇傳七緯人誰竒字話三墳𤣥亭十載清吟斷為汝重題白練裙汪象先伯仲招遊城東阮姬館即席索詩題壁間落魄長安思轉豪新聲同聽鬱輪袍看花悞入林中竹姬阮姓故採藥迷行洞口桃亦劉阮事小玉橫釵頻擁髻阿環持硯伺揮毫妓名􅌦瓊酣歌剩發青蓮興莫遣汪郎笑二毛汪象先復邀集阮氏明月樓羸馬東郊不厭狂坐攜豪興入平康觀風上國來呉季坐中呉生善歌待月前溪遇阮郎石上桃花迷對奕壚頭竹葉照飛觴青衫漫濕潯陽泪一曲琵琶萬恨忘長安秋暮萬户西風急暮砧錢塘秋色夢中尋毫端漫詫相如璧槖裏誰操郭隗金長信宫寒雲漠漠華陽社逺日沈沈登高且逐黃花醉遮莫霜華入髩心陳太史孟常過訪環珮翩翩洛下逢越溪猶記舊芙蓉琱弧百中長懸虱寳劒雙飛欲化龍載筆西清霞縹緲讎書東觀日從容高樓肯作陳登卧大闢翹材傍九重壽李惟寅五秩初度八首紫氣清秋駐玉宸蒼生華夏頌經綸三千刼外懸弧客五十年中仗鉞人文彩聲名符鸑鷟丹青圖像照麒麟崧高突兀生申後誰復成周話降神樓臺十二靜飛沙帶礪山河柱國家映日堦蓂呈五葉公以暮秋五日初度越三日乃為重九先霜籬菊綻三花紛紜瑞鶴遊蓬島蹀躞名駒聚渥洼虎帳麟袍天北極人生何處覓丹砂黃菊初開玳瑁筵羣仙齊降大羅天登龍預報重陽日躍馬才過半百年北府聲歌傳出塞西堂名勝鬭凌烟貂蟬肯挾元侯重五夜花生巨筆前十萬材官大將旗安危南北髩毛知青萍錯落談兵夜白羽飛揚誓衆時雁塞爭傳都尉曲雞林頻誦拾遺詩李白亦拜左拾遺惟寅新集名青蓮閣草故云烽烟淨濯榆關外贏取天河作酒池廿載隂山懾大名天驕消息斷龍城長驅蜃鱷扶桑界盡宿貔貅細栁營疎勒勛勞班定逺先零籌策趙營平由來文武中朝憲一頌聊煩吉甫評登壇才氣冠時髦橫槊風流擅彩毫喬梓家聲雙鳯躍孫枝門望八龍豪公諸孫正得八人青油幕䕶淮山桂赤玉盤行閬苑桃尚記少年裘馬事西園旬日醉葡萄北海筵中醉未停南皮社裏嘆飄零青衫白璧聨燕市余與惟寅嘗合所作詩為聨璧編紫綬黃金壓漢庭宇宙同盟三十載江河齊算八千齡赤松少俟功成候把袂驅羊入翠屏海岳風期聚草萊江山文藻半莓苔獨看魯國靈光殿長峙燕關碣石臺射虎縱橫當世略雕龍淪落異時才朱絃久絶雲門調一為鍾期次第裁送汪象先還歙中余將卜居秣陵象先訂余買宅杏花村同以明嵗秋晩青萍長夜舞離筵緑綺猶將别路彈㟁夾丹楓雲外寺江鳴黃葉雨中船鄉心半咽驪駒外客夢孤飛雁陣前攜手杏花原上約鳯凰臺月幾迴圓同王行父呉允兆沈孺休李本建魏穎超汪明生李叔操集惟寅宫保第得飛字玳瑁筵開半褐衣侯門猶憶故山薇當尊紫氣函關落繞座青霞碣石飛客醉南樓秋浩渺兵談北府夜霏微中天試望長庚色燦爛晴光徹帝畿趙相國齋中芍藥盛開即席賦春色長安尚未䦨平津西第近金鑾瓊林種就三珠樹玉砌粧成七寶欄露浥朱唇霞競吐風迴粉面月初團調羮況值台垣暇百遍休辭大白殘同王水部蔡祠部袁儀部集高比部正父邸中同賦兼送正父南還時正父以恤刑暫歸南海一騎遥衝雨色來金門曽念舊蒿萊含杯四座俱仙吏授簡三曹各賦才紫氣豐城看射獄丹砂勾漏待登臺春光倘憶成都客人日詩篇海上裁再用前韻送正父斜日蒼涼轉翠苔一樽秋色指蓬萊西山林葉儀曹興柳子厚有秋日遊西山詩蔡袁兩君皆嘗為儀部郎東閣梅花水部才王君水曹璧睨秦庭仍舊邸金殘碣石豈空臺南征何限登臨句四百峰頭取次裁少室山房集巻五十八
