body:
  text: 少室山房集巻五十五明胡應麟撰七言律詩八十二首冬日同喻水部趙觀察趙徐章葉郭鄭六孝廉趙唐童范四文學遊靈洞山房十首初扺碧霞宫集趙眀府汝申别墅宫汝申新創祀碧霞元君有昇仙岩禮斗臺諸迹出郭青鞋不憚勞草堂新築萬峰高天容二子探竒入地引羣公發興豪蓬島秋聲猶鶴馭武陵春色漸漁舠天氣燠甚桃杏已有開者東方自識前身是少别元君又碧桃午過青芝舘小憇汝申丈墅中煉藥之所歸來散髮臥青山丈室峰頭自閉闗大藥欲成丹竈底靈芽先湧白雲間餐來四皓鴻堪住采罷三茅鶴並閒一笑風塵吾漸老㑹尋瑶草上仙班薄暮遊湧雪洞洞山之麓乳泉流漫蜿蜒如雪中甚竒䆳炬盡輒返未有窮其穴者石竇中開雪乳懸迎人百折自蜿蜒瑶池忽覩三山下玉井平分二華前素練生風揺大壑白波吹雨漲平川由來郢客才堪並一借陽春洞口傳邦相先有日對寒泉自詠詩之句夜投紫霞洞童范二文學攜具小酌洞突出山腰高明宏敞羽流宅焉宋隱士于介翁以古詩有輕舉乗紫霞之句故名即其詩所云洞門相對是吾家者也捫蘿昏黒度崔嵬萬炬山腰石扇開巨壑逈排丹嶠出飛橋横跨赤城來桃舒錦障猿初下草長金光鹿未迴莫鬪謝家成綺句朝攜五色上蓬萊同邦相集趙太史山荘作地故白雲寺址四山圍合中忽平敞清泉竒石為一方最太史公選勝得焉迴合千峰望未真平開十畆坐嶙峋雙鳬忽駐神明宰一鶴曽閒侍從臣清獻事阮籍嘯歌聊玩世尚平婚嫁故留人山靈咫尺堪攜手白石長松對結隣山行觀飛來石山堂之後巨石千尺峭立平地峰巒秀出勢欲飛動靈隱之具體而微者午夜松風襲錦袍起看孤嶼矗林臯初疑片石飛靈鷲忽似三峰駕巨鰲仙掌捫時應拆漢神鞭驅處欲驚濤何當一棹西湖上臥對寒雲萬尺高登洞山絶頂至白雲洞邑東南最高處雲氣出入其中岩壑宏朗徑路窈窕遊人至者徃徃忘返踏盡青山興未還帝鄉仍到白雲間瓊樓特起三千界綘闕遥封百二闗自擬探遊窮地脉誰論呼吸近天顔亦知怡悦幽人事持贈聊當茂宰閒自白雲返由故道抵新洞久蔽榛莽近樵婦堕其中居氓踵入得之洞類白雲而深窅峻絶遊人魚貫纍纍而下秉炬千盤始抵石室路中復斷用梯乃得達平敞處躡屫褰裳列炬從投身捷下最高峰壺中地欲窮千尺杖底天猶隔九重跂足青泥捫虎兕盪胸蒼乳攫虬龍梯仙是處吾家在莫遣流泉世上逢新洞或以飛龍名之余謂弗善與邦相謀更他名洞中最勝者蒼壁陡立飛泉數十道迴旋直下邦相擊節目余曰水簾哉余因為更賦二首洞雖晚出故不謂不遇也絶磴千盤下翠微遥驚瀑色挂丹扉淋漓恍墮鮫人窟燦爛全窺織女機天逺玉繩浮帝座地寒珠箔䕶仙衣廬山谷畔尋常見得似靈源洞底飛廬山康王谷有水簾洞其二洞中先有避秦來此處何必問桃源之句雪浪盤空望漸低清湘一幅似堪攜瀫紋細綰千絲潤練色平鋪萬杼齊丹闕夜懸銀是檻絳宫晴捲玉為梯重來莫障劉郎步咫尺桃源記舊題暮春遊白岳十二首同遊者謝少廉汪士能吳肇成方羽仲余有題文草中齊雲岩中天城闕吐蓬萊萬仞芙蓉壓翠苔紫霧晝連三竺起青霞晨傍九華來龜蛇隱見靈仙窟龍象騫騰上帝臺竒絶東南誰並此祗應人世有雄才小天門重叠崖巒䕶翠屏何人持斧鑿青㝠千尋峭壁移夸父一線寒空透巨靈錬石誰當搘玉竈丸泥吾欲閉金庭不縁混沌頻年斵千岫桃花隔釣舲太素宫綘節宸居北斗懸金銀臺觀屹相連朱甍宿霧千峰外碧瓦籠雲萬岫前粲爛靈旂朝帝日飛揚神劔伏魔年何因屫躡罡風去一叩𤣥闗意惘然香爐峰斗絶穹窿四望竒削成員嶠置坤維孤峰宛自廬山得一柱真從太乙移青燎夜升雲黯淡紫烟晨合霧淋漓漫思香案曽叨秩少住塵寰八百期紫霄岩萬峰晴色暮登臨望入山腰翠欲沉霧擁樓臺横碧落雲拖􅓚葢出青岑雄文勒岱知司馬秀句題匡憶翰林三絶祇應留異代蓮花千丈撲狂吟汪司馬李太史各有詩紫玉屏崢嶸香案帝庭留萬仞高懸翠欲流九叠似張廬岳頂三峰如削華山頭長舒霧色黄金界半掩霞光白玉樓椽筆大揮飛瀑底凌雲何似仲將愁司馬碑十丈穹窿峙翠屏如椽真慰北山靈蟲書半蝕先秦字龍畫傍分大夏銘虛擬相如論泰岱漫勞太史序云亭何人解摸邯鄲碣祗是中郎讀未停飛雨樓懸泉百尺亂侵衣珠箔銀屏䕶翠微霧裊重崕渾欲墮風逥羣岫盡如飛山樓夜榻眠蒼蘚石室春盤饌紫薇一宿已知塵累斷竹西猶夢舊漁磯無量閣熒皇金碧挂檐楹蘭若翛然出化城十里亂雲雙屐到萬山斜照一鐘鳴岐崖北繞飛梁現黟水南拖匹練明自是圭峰飛錫地何須塵外問蓬瀛樃梅菴移根何代植崔嵬結搆名猶借樃梅千里漫勞孤驛寄一株元自太和來花翹鶴膝時沾霧榦坼龍鱗乍起雷嫩蕋疎枝渾欲折凌風無處問瑶臺今梅毁于火五老峰蒼然離立盡彭聃底事乗風下欝藍四皓衣冠猶減一八公環珮僅餘三移來不借匡廬頂飛去重尋雁宕南潦倒青蓮頭漸白乍因竒絶駐征驂雁宕南山亦有五老峰見志三娥石參差霞珮出蓬萊次第雲鬟立翠苔石上同心朝帝罷山頭聨臂望夫來從游宛入黄陵廟舜冇三妃見大戴禮爭艶如登白玉臺古樂府題有三婦艶詩見玉臺集六朝多為之漫説桃源雙占盡尚留傾國候仙才是遊也伯玉司馬有送余東還記叙諸厯覽甚詳西湖十詠有序余自九齡從家大人客武林迄今三十餘載湖山面目狎習久矣廼篇咏未嘗數數也今秋再過社中諸同志固以為請酒酣援筆得七言律十章王司宼元美嘗謂錢塘越佳麗地不應例以闗洛之調寫之兹作數篇頗竊其意第老翁塗抹作態兒子終于本色不倫以供來者之捧腹庶幾云爾雪消塵淨見層空山色湖光面面同巘崿遍圍雲母障波濤長浸水晶宫青天遊葢飄香霧白晝飛梁墮彩虹隔㟁近移蘇小宅畫舩齊泊藕花東一鑑空明暮靄收短簫長笛亂雲流天浮殿閣連三島風引帆檣到十洲峰際欲呼巫女下波心如抱洛神遊翩翩蘇白留題滿得似才情瀫水頭繽紛桃李盡成蹊夾㟁晴沙送馬蹄逺水落霞蕭寺外孤峰殘雪斷橋西䦨干半倚青林出睥睨遥看碧樹齊小扇輕羅歌未闋樓舩已到百花堤元人西湖樂府有小扇輕羅曲今尚傳徙倚危䦨醉目醒淡粧濃抹望難停波揺西子睂端緑山叠文君髻上青楊栁千絲圍别墅芙蓉萬朶簇南屏迴橈欲到錢塘㟁一派絃歌月下聽錦䌫牙旗夾畫橈雙高晴色望岧嶤諸天龍象圍三竺大地黿鼉架六橋丹壁旛􅓚時隱見白雲鐃吹互飄揺斜陽一抹人歸處多少紅粧落翠翹油壁香車夾路馳目成何處兩蛾睂荷風錦席參禪夜梅雨紗窓入夢時湘浦珮環無别恨曲江亭院有佳期菱歌唱徹黄昏後對對文鴛浴水􅎠千山臺殿列金銀草色湖頭緑漸匀白傅堤前題栁客陸矦祠畔賣花人連峰黛簇嬋娟髻滿路香飛叱撥塵四百旗亭遊未半遥看斜日墮紅輪一望平湖翠幙懸湖心亭上劇堪憐凌波舴艋雙雙度掠水鴛鴦隊隊眠靈隱僧歸雲色裡淨慈人醉月明前吳􅁎十六俱年少競結同心玳瑁筵碧空如水淨無氛雁子鳬雛蕩濲紋繫䌫半依秦帝石攜尊齊酹岳王墳荷花色照千門月桂子香飄萬壑雲向暮西泠風轉急淥波横濺石榴裙玉勒金鞍照綺羅游人成隊出清波門名丹青屏障穿蘿竹紫翠樓臺夾芰荷絲笮似携盧女到畫橋曽約泰娘過千篇未少風雲氣柰此湖山􅆺客何後西湖十咏有序十咏成湖中景物大都具矣自餘峰巒臺榭諸名勝未盡窮也座中諸子更有乞余分賦者漫爾占綴數亦如之為西湖後十咏焉湖心亭萬頃寒波蕩瀫紋朱簾十二挂絪緼䦨干盡壓魚龍窟簫皷長驚鴈鶩羣山色四圍晴擁霧湖光八面夜飛雲中流好是西施宅早晚鴟夷挈畫裙靈隱寺畫栱雕甍勢欲翔居然臺殿到清凉三天竺色全窺户九里松隂半入廊絶頂竿􅓚紅日近中峰鐃磬白雲長異時禪榻驚人後彩筆猶傳婺女傍用駱氏事駱婺人飛來峰突兀空明架紫苔紛然龍象鑿瑶臺崑崙一柱從天下灔澦孤根㧞地來飛到豈縁夸氏力夸娥移山事見列子削成庸假巨靈材他年挾汝乘風去不羨如拳寄草萊武穆祠十尺嵬峩岳降神當年横槊狥邊塵中原萬姓遮留日絶徼全師慟哭晨隂雨旌旗朝上帝春風笳皷酹遊人凄凉大樹英靈在盡拱南枝向北辰三天竺百尺金身峭壁前三峰雲氣屹相連渾疑竺國諸天墜絶勝秦城太華懸以三峰言隨處法身分翠竹禪家冇青翠竹盡是法身之語無窮妙相示青蓮瑶軿咫尺西方在一叩如來結梵縁觀世音為功徳山王如來九里松鷲嶺西來梵刹重長松落落倚芙蓉千林夜湧濤聲出九陌晴飛露氣濃翠葢中天巢鸛鶴蒼髯匝地舞虬龍餐霞亦是華陽客遮莫秦娥樹底逢孤山宅兀立中流四望竒誰開丈室枕漣漪雲埋洞口呼猿日雪擁湖頭放鶴時藂桂作花猶滿砌踈梅横萼逈當籬凌風却月慿誰和一樹寒香入夢遲寳所塔絶頂浮圖出化城捫蘿如躡太空行孤標突兀神光現七級玲瓏妙相呈大海雲霞頻幻色平湖日月逓生明亦知多寳元無相何暇當年阿育成六橋堤千尺晴虹架彩斿䦨干三百大堤頭繽紛冶女迷花到雜沓王孫戲草留玉管競催明月上金丸時遂暮雲流春風一路堪圖畫萬樹桃花簇紫騮湧金門皷吹喧闐一望遐湖頭雲日亂蒹葭三千舩舫家家月四百樓臺寺寺霞桂影荷香迷越客竹枝桃咏醉吳娃天容乞與西泠地獨擁寒濤臥釣槎武林徐明府招集西園時風雨驟至剪燭劇談幾達曙矣賦謝二章并以為别時明府將入覲余徃吳中握手新知興欲狂熒煌燈火夾華堂荆州意氣歸元直明府楚人鄴郡聲名擅偉長白苧生風揺彩袖青萍飛雨落胡床為知政績書前殿不遣雙鳬出上陽痛飲狂歌意未平坐聽寒漏滴高城裝因北海經旬滯燭向西堂盡夜明是處湖山重借色他時風雨各闗情含毫漫詫雙龍合拂曙河橋問去程少岷山房為曾大㕘題冇序少岷山在蜀之合江鄭繼之楊用修各為曾計部作歌大㕘曾公以世澤索題諸末簡積翠遥天挂玉臺少岷山色峙崔嵬雙溪雲霧尊前合六洞烟嵐杖底迴閣上𤣥經中散臥堂中詩句拾遺裁從知勝槩堪遊目躡屫何時萬里來汪茂才獻于以先隱君像千里函致乞詩大隱風流世未孤少㣲星色臥江湖園荒漢上甘攜甕室僦於陵但辟纑廿載避人呼漫叟一書遺子號潜夫天池鳯羽行看近日聽鸞章下帝都遊爛柯山題青霞洞天石室中布襪芒鞋興未䦨天風吹客上層巒仙山七日柯初朽人世千秋局未殘塔影半揺蒼靄暮鐘聲㣲度白雲寒龍肝食罷知難老咲揖羣真跨紫鸞過嘉定集張伯隅閣上同房仲孺穀諸君緑埜堂開碧水頭平原河朔讓風流雕䦨百折捫霄漢畫棟雙飛挾斗牛麗賦總輸鸚鵡捷清歌如跨鳯皇遊莫將十日淹行斾極目華陽待紫騮時伯隅先得雋將上春官即席再賦得臺字百轉長廊入翠臺不知身世近蓬萊當門淥水流金谷繞座青山挂玉臺舊主人非吳下客新郎君是洛陽才戲用張解元事瓊筵咫尺春光到深夜狂歌落早梅别趙張兩生還越張以氣俠聞青樓趙雅歌吳閶稱最浹日同飲舟中甚樂也白舫青蓮任意遊好天良月大堤頭金衣驟擲張公子玉笛頻吹趙倚樓奏罷陽春無和客酣來河朔盡名流那堪後夜驪駒起千葉吳閶競送愁别房仲洎冏伯逸季尊酒淋漓醉復歌紫簫紅燭夜如何猶嫌十日平原少未信千秋碣石多狼藉杯盤沾重露縱横舟楫漾明河惟應伯季吳閶逺悵絶河橋一斾過再為房仲贈侍􅁎時獨居一室以禪恱為事禪闗趺坐寂無塵水月長餘自在身行雨盡忘三峽事餐霞時伴四天人天桃􅆺栁寜同色忍草靈花别占春莫向維摩論侍疾由來捨宅是王珣幼于留寓曲水園張九卿周懋修錢功父黄仲華趙凡夫吾君先後過訪賦贈此章屐齒紛紛破綠苔爭攜流水入平臺清風驟擁三高至明月仍將二妙來西第琴書慚浪客南皮觴咏盡詞才春晴定卜滄浪墅不厭相過暮百迴陳長洲楊吳縣訪曲水園幼于攜尊夜集以河陽花作縣秋浦玉為人拈韻余得花字時二明府皆將入覲并以贈行茆堂燒燭散林鴉車騎聨翩夕放衙越嶠移來閩海荔吳天栽遍蜀城花朱絃和處雙凌雪玉舄翔時並帶霞翹首黄金天闕近盡將離思入蒹葭陳君閩人新自永嘉移任楊君蜀人過晉陵訪安茂卿洎乃兄緒卿光禄時長至前一日也握手渾疑夢寐餘故人杯酒蹔躊躇尊前重碧香仍艶席上輕紅態未除菜甲初傳春早信桃花不鎖夜來漁西陵咫尺元方在片石何妨共結廬輕紅茂卿童子嘗入余詩寄朱在明五載幽懷尺素傳北風猶滯木蘭舩横江欲度偏愁浪下澤堪居未買田桂樹飛揚招楚日桃花零落避秦年沙頭定艤春來楫共結揚亭話太𤣥夜同徐茂吳宋化卿集許才父聽歌作把袂重過白板扉一尊嵐靄坐霏霏雲因洛水先春現雨為陽臺徹夜飛時大雨連日夕爛漫歌喉縈錦瑟輕盈舞態拂羅衣當筵授簡俱詞客唱徹梁州露未晞中丞滕師入越賦賀十萬貔貅候羽旗登壇横槊賦成時頻年漢闕絲綸下此日轅門號令馳大海潮生强弩合平湖波煖畫船移丹青第一麒麟上肯數班矦骨相竒送遷客之嶺南離心何處一登樓折檻嶙峋漢闕留曉霧乍將龍豹臥朝陽行覩鳯皇遊梅花醉折羅浮頂桂樹閑吟庾嶺頭為問蓬萊朝上帝如何砥柱在中流千秋閣四首為司馬汪公賦閣在千秋里中偉閣嵳峩北斗前千秋誰擅筆如椽窓中𤣥草雲霞入座上青藜日月懸中令才華慚緑埜右丞名理讓藍田惟應太史書成日突兀龍門四海傳縹緲飛樓大谷傍雕題遥接海雲長中原雪色高黄阜太乙星精下紫陽五栁荘前蓬作户百花潭上草為堂却思香案紬書日十二樓頭侍玉皇紫氣青都屬望來熒皇飛搆入崔嵬𤣥龜左右圖書出翠鷲東西法象迴草就滕王千客避藜然天禄萬靈陪莫誇名姓麒麟上别擅乾坤在草萊公所居太函二峰環抱昻首相向宛類龜形湖海飄然一敝裘縱横豪氣未全酬閑慿司馬千秋閣絶勝元龍百尺樓座裡風雲逥客傲壺中天地縱神遊寜知文舉雙眸白大有忘年在黒頭夏日三衢水亭作有序易使君李司理招同屠儀部夜集城南水亭使君新創屹立水心四面環菡萏數百夾堤散植桃栁芙蓉青油畫舫一繫亭下容十人尊罍簫管錯列其中每公暇燕集臨亭放舟微風自來平波如掌銀鱗鮮鯽近人可數雜花芳樹應接不遑真姑篾一勝境也先是衢苦無游觀處自使君實始營此而司理佐之人以方蘇白兩公云促席張燈喚叵羅習池心賞未蹉跎半依城郭栽桃栁小著亭臺伴芰荷露洗長空沉皓魄風揺殘夜落明河相逢倐盡東南美不飲其如浩興何徐明府仁卿招集墅中有序時孫生國梁金生石聲在坐酒酣命小奚歌紅線侑巵入夜别明府過劉總戎兩生拂衣從余潦倒幾申旦復發興攜兩生入徐納言宅觀梨園適演雜劇黄四娘乞人有借名杜拾遺者傍觀爭目兩生余為撫掌一大噱而出面面朱簾霽色流主人攜榻自南州三年潁水傳新績一夕臨安話舊遊舞罷青萍霜照匣歌迴紅線月如鈎銜杯未劇高陽興笑殺君卿事五侯徐納言汝材過訪邀集賦謝并東其諸郎君時二尊人皆睂夀無恙舞罷斑衣玳瑁筵瓊林玉樹半堦前縱横冀北三千隊聚散蘭隂二十年亭倚惠風臨曲水徑穿竒石到平泉莫將貝錦紆行樂宣室行看太傅旋李司理招集署中玉署燒燈共歳殘胡床攜手不知寒微言總為千秋合縱飲何妨乙夜䦨竹送清霜流藻井梅飛殘月下雕䦨傳家剰有河梁句莫詫雙龍唱和難送劉傒如吏部入都早擅昆丘片玉塲仙曹司法蹔徜徉深宵藜大懸書閣白日蒲鞭臥訟堂去曳朱衣朝漢帝歸攜彩筆賦滕王雄飛不獨銓衡借八翼天門次第翔雨中董使君招同汪司馬集諸天閣樹樹桃花㸃緑苔萬山金碧挂崔嵬筵開五馬春風駐座合雙龍暮雨來漢殿才名饒賈董梁園詞筆愧鄒枚無論借寇當年事突兀黄金擁薊臺夜過汪士能家看燈同肇元太學奕戲贈并呈司馬公萬炬烟銷夜色潜一尊明月吐朱檐遊同太傅偏能奕貌學參軍未有髯畫閣盛開雲母帳琱盤時薦水晶鹽揚州肯挾劉晨去十萬紅粧盡巻簾叅軍肇元父也王長公嘗贈以聞道叅軍頗有髯之句憇嘯園有感時汪公在小普陀油壁香車在處逢嵬然飛閣架巃嵸爭傳西竺留司馬誰向南陽識臥龍古磴千盤藏檜柏芳池十畆漾芙蓉亦知杖錫三天上布帽何因曳屫從十九日為大士誕辰司馬公施像菴中適余為友人邀遊别墅奉寄四章方丈莊嚴闢草萊天龍八部儼徘徊函闗是日真人過竺國當年大士來千室笙鐃臨寳地十方瓔珞施瑶臺騎羊莫咲初平拙恍忽前身是善財蒼茫雲氣百花潭總為靈光下鬱藍般若向來傳自在圓通渾欲問瞿曇須彌界似移金竺兠率天疑近太函漫向彌陀論法嗣只今龍象在江南司馬所居山名金竺在肇林西閻浮提界蹔徜徉海上曽聞一葦航紺殿乍傳金粟影紅樓初放白毫光慈雲迥結三天外慧日高懸八水傍千億化身何日遇漫將詞筆問空王玉樹金襴百寳陳低睂睊目坐陽春蹔來東土依檀越誰道西方得美人淨妙總因圓覺相莊嚴元是法華身君看一傳瑯琊後大覺從教萬古論自宋世譌大士為婦人王長公始闢其妄余有考詳莊岳委談夀汪㕘軍六秩紫氣遥占白岳傍青鸞長駐白雲鄉張筵鄴下三千客照坐揚州十萬粧觀裡瓊花初破萼庭前珠樹欲成行他時倘問㕘軍句一笑掀髯向畫堂贈汪元清肇元二太學寳鐙銀鞍白馬調烏衣羣從盡蘭苕同攜賔客探璚樹並載嬋娟㺯玉簫别墅風流安石共中林才思阿咸饒秋風騎鶴能相過定約揚州第幾橋士能屢遲所懽不至仲淹怒使家衆數輩促之來座中戲作寒雨蕭蕭閉緑苔乍聞環珮下陽臺不因枚叔觀濤至已作王郎挂雪迴國色名花雙爛漫是日初見牡丹高山流水共徘徊腰肢沈約偏能瘦狂倚東風唱落梅方景真邀遊幔亭同司馬公賦有序山本名烏石突主人張繡幄為幔笙歌粉黛周列其傍觀者屬路余因謂司馬公昔李白張謂泛湖郎官之名迄今不朽兹山勝絶而不佞幸從公後傍觀者闐訝咸以為武夷君請遂以幔亭名之司馬擊節曰善同集者謝少連汪士能潘南仲吳太寜諸子詳司馬公記中窈窕肩輿度白雲幔亭霞色轉氤氲千山夕照羅峰外一線春流練水濆冠葢盡攜文苑客笙歌如下武夷君名花滿座天孫外何忝𤣥光百代聞武夷山道書稱白馬𤣥光之天方于魯以墨譜乞詩卒業賦贈粲爛雙螺出魏臺奚潘遺法儼重裁𤣥雲蔽月非烟下武公業妾名非烟紫霧寥天太乙來九錫漫誇龍獻兆七香寧假麝為媒何因飽嚥金莖露一吐王郎萬斛才非烟寥天一七香金莖露方氏墨名王勃作文磨墨水數斗飲之萬言一揮見唐小說少室山房集巻五十五
