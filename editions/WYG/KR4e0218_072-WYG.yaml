body:
  text: 少室山房集巻七十二明胡應麟撰五言絶句三十九首自淮上挂帆便風一夕遂抵梁下淮水何湯湯布帆疾于矢一夜東南風吹船七百里吕梁阻風百尺牽大河一步一囘首懊惱石尤風多于故人酒題于生蘆雁四圖落日燕山道寒風漢水波碧空秋萬里錦字數行過右飛不斷征人淚全消旅客魂一天疎雨過燈影暗長門右鳴漠漠秋清月蕭蕭野岸風寒蘆休揀盡全樹上林東右宿乍可餐菱荇那能豢稻梁數羣烟雨外恍忽似瀟湘右食寄居榖元池亭陳生為除室張榻酬以二絶雪阻燕山道風寒易水塵獨憐陳仲子掃榻待幽人一家猶道路十日寄并州幸借元龍榻安眠百尺樓送祥光還白門四首為愛三山色金焦問法幢一酌中泠水浮杯夜渡江布衲披雲去蒲團向月裁故園芳草色應遍雨花臺片錫長安去珠林照紫霞横經高座寺講席半天花四百南朝寺青鞋處處遊何方駐瓢笠古刹寄牛頭為盛生明元贈淑卿二首嘹嚦鶯初囀輕盈燕欲飛應知杜陵老日日典春衣遠山睂綽約秋水睫瀠洄好覔張郎畫無煩魏帝催九日同荘靜父俞羨長登寶所塔時歌者顧生戴黄花侑酒突兀龍山色登高豁旅愁黄花亦無賴偏逐少年頭河梁話舊十絶句送左轄吳公之山西有序憶壬午計偕晤莆田吳公於白下僅京兆府一交臂耳其明年吳公遂以上第敭翥列籓飛沉異途垂二十禩庚子秋羇寓武林吳公以右轄破例存枉屈指舊遊杳若陳夢而吳公氣誼綣篤不啻久要未幾而公有晉中左轄之拜河梁斜日揮袂黯然漫述短歌以代驪唱通計前後都得十篇興集神流亡論工拙吳公别號霞城粲爛朝霞色峰頭幔作亭長城一萬里天接太行青太行何崔巍千崖界空紫異日吳使君功名亦如此使君本人傑挾策遊蓬萊朱顔映緑鬢片諾雨花臺雨花臺上遊黄金館頭别一鳴空驥羣排雲叩閶闔閶闔皇皇開青袍脫䝉茸􅂱如太阿劍白晝飛神鋒神鋒入腕飛青㝠掣雷電上考書吳公第一明光殿明光寄陜服朱旛滄海頭東方簇千騎出入偕軒輶高軒惠然來光照寒士寓笑揖大將軍爭誇汲長孺亡論汲生戅祗益衛侯賢何限飛沉事黄梁二十年分攜二十霜騰踔九萬里高咏河梁篇涕淚盡知己再送左轄吳公十絶句有序公將以便道還七閩却赴晉轄之擢余詞有弗盡寫者後十絶所繇續也一代絲綸寄千秋保障名高牙擁大斾西入晉陽城白頭徒自新傾蓋儼如故蔽芾越東西棠隂十萬户飛鴻遊碧漢尺鮒泳滄浪脉脉窮交意相看大海旁當年京兆府一面覩荆州詎意飛騰速鱗符覲玉旒百吏咸趨風千官競迴席人生得意年天門騁八翼旬宣既南國保釐復西土著繡還故鄉朱節震華鼓靈泉滙九漈澒洞浮蒼雲飛書乞佳夢為報九何君左淬莫耶鋒右淬干將鍔宇宙兩神龍延津當晝躍樓船濟汾河中流渺雲霧耐可鮮荔枝不到桑乾渡􅂱􅂱承明廬上考書第一白首洛陽才呻吟卧蓬蓽原闕少室山房集巻七十二
