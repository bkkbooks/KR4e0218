body:
  text: 少室山房集巻六十二明胡應麟撰七言律詩八十首御史大夫豫章徐公過訪有序徐公方督大工而破冗過存兼以貺贈勤渥殊非所安賦謝二律萬户千門闢草萊甘泉馳道拂雲開梯航絶塞中丞績柱石明堂大匠材鄴郡風流齊七子豐城虹色射三台寧辭病骨鹽車下矯首長嗚郭隗臺天都翹首碧雲重粲爛軒車此日逢廷尉髙門容駟馬司空神劒合雙龍丹扉夜闢乾坤靜絳闕晨披雨露濃最憶登壇清興逺千篇晴色照芙蓉唐㕘軍相國趙公客也以需次居積燕中戲贈兹什三尺芙蓉照鸊鵜居然大隠帝城西懐中片玉仍依趙槖裡千金欲擅齊紫殿衣裳雲色近青樓絃管月華低何來短簿輕相笑計日斜封下紫泥潞河僑居逾月媵人于首夏朢前舉一女逾旬復舉一男黄燮卿王至卿胡靜父胡穀元茅厚之過集齋頭戲作拂曙懸弧向草萊經旬㺯瓦坐莓苔雄雌敢謂雙龍出絡奕偏勞駟馬來栁絮何時吟院落芝蘭遙夜發庭臺無嫌婚嫁催頭白九域名山候賦才相國趙公命館人除舎授餐以待余適産二雛未及趨赴先此寄懐二首設帨懸弧僅隔旬翩翩遊屐阻風塵加餐乍慰江湖客吐哺重勞社稷臣五岳尚平先繫念三峨逸少晚留神他年嫁娶酬生事萬里相隨叩玉宸長鋏歸來嘆夜眠黄金臺色正蒼然髙懸一榻平津上驟啟千門碣石前風雨未教淩白苧乾坤何意問朱絃無勞大厦歌寒素柱石明堂四海傳王貞伯總戎曹能始計部偕僚屬並遊胡氏園亭昏黑言旋二君更衣拉余痛飲申旦時張中貴為主人急管繁絃興入雲新歌妙舞送斜曛花間乍别鴛鸞序竹裡重呼鸛鶴羣飛盖陳思元結客抽毫王粲舊従軍無論夙昔司空珮永夜雙龍合斗文飲王茂才園亭戲作碧天翹首暮雲流笑揖雙龍問斗牛賦就轉深司馬渴詩成不散杜陵愁千春海岱留髙迹萬事乾坤託逺遊大白滿斟花滿座姮娥今夜宿南樓夀相國趙公二首突兀平津見老臣天容黄髮佐金輪八荒夀域開𤣥圃三殿祥光接紫宸操管異時符鸑鷟懸弧當日兆麒麟亦知竹素流千載一頌聊同四海人綺閣晨開玳瑁筵東華金醴百壺懸周流花甲仍三五迢遞椿齡尚八千紫氣正留函谷外丹心猶照渭濵前他年無棣分封廣玉舄虚勞大海傳長安逢吳允兆賦贈布襪芒鞋易水遊相逢頻典鷫鸘裘論交宇宙誰青眼握手河山共白頭上座飛譚迴九列後車傳食遍諸侯他時叱石金華頂遲汝同登十二樓同允兆夜譚作殘燈遙夜話飛蓬慷慨燕歌照白虹青海未停東伐騎黄河猶滯北歸鴻毫端秀色三都並筑畔雄心萬古同一笑鍾期絃絶後髙山重拭舊絲桐過王中翰奕棋作清簟疎簾照綠莎匡床曲儿對維摩庭中白晝銷碁局席上青山爛斧柯賭郡宣城知得否連營淝水定如何無愁晚色催歸騎大有銀蟾絳闕過答東阿張明府肅仲時肅仲逺命書貺物色余長安風塵中不遇㡬返胡孟弢特為致之感而賦答并似孟弢屐齒蒼茫破綠苔飛緘雲色滿蓬萊應憐疋馬齊東駐敢望雙鴻代北來遙夜石函干斗氣異時金鏡補天才何當一别荆髙筑抵掌華陽百尺臺送章行父之景州五載𤣥亭憶問竒秋風晨起出闗時天涯客況誰青眼海岱人倫見白睂一水移舟燕月墮千峰搖筆岱雲馳銅駝陌上花如錦大有山公醉接䍦贈翁少府新様春衫白苧裁翩翩遊騎近蓬萊桃花尚狎潘郎貌蓮幕曽傾庾尉才豈為鱸魚還越郡仍驅駟馬入燕臺當壚漫奏文君曲夾座紅桃映緑苔訪李汝藩獄中作貫日長虹暮色凝淋漓杯酒頌如澠含悽小吏呵周勃雪涕中郎和李陵書就圜扉腸拂鬱劍埋深獄氣翀騰文皇每飯思飛将荏苒金雞下玉繩王行父授官上林賦柬有序行父乆需次不調忽以是月拜上林喜而賦此五載緇衣徧洛塵明光晴日拜絲綸唐宫全樹依官舎漢苑飛花接帝宸玉陛含香春縹緲金門持㦸夜沈淪八川向背分流處能憶當時奏賦人送徐大司空還豫章時俞羨長挈家附公樓船南返掛冠神武思飛揚揮手浮雲八座傍劍擁霜華辭碣石帆飛風色過潯陽天髙自鑒葵心赤地近初逢菊蕋黄漫逐羨門瀛海去宗臣勞勣在明堂寄李長史脩竹㕘差映夾池十年歸夢阻江蘺曳裾漢殿春風蚤飛盖梁園夜月遲七發盛傳才子調四愁偏失美人期唾壺歌曲英雄老憔悴青衫易水湄送宋少府之南康一葉秋風度薊臺爭傳飛檄下蓬萊雲收函谷青牛去霧擁匡山白鹿來帝惜揚雄甘吏隠人占梅福是仙才香爐紫氣三千仞為掃題名舊緑苔送范㕘軍之白下藉甚㕘軍鮑照賢攜書遙赴秣陵船清江桃葉懐人夜渌水蓮花作吏年大府旌旗朝讌合髙門袍笏晝遊旋崢嶸鳷鵲金波麗賦就先従洛下傳中秋同允兆諸子集趙相國第玩月二首靜夜胡床拂斗牛天街涼月湧青虬銀窺帝釋三千界玉倚仙人十二樓墜露迥霑長樂夢飛雲旋逐廣陵遊淋漓桂醑黄封在一洗都門萬斛愁吐握平津近帝閽鹽梅佳節許同論蒲萄漢殿馳中使薏苡燕臺出上尊玉笛飛霜連四野金莖零露滿千門霓裳陣陣天風落猶記嫦娥一笑温林冏卿過訪作一别錢塘夢未迴朱明雲色幾含杯旌移合浦風前葉傳擁羅浮雪後梅建禮含香清蹕近甘泉司僕紫泥催三千騋牝馳金埒倘許飛黄託乗陪查少㕘入賀賦贈獻賦當時共洛陽翩翩裘馬少年塲追思文考朱顏麗轉愧安仁白髮長暮雨軒車留碣石秋風船舫隔錢塘金銀四百湖堤寺悵望遙天菊蕋黄送斯惟武之塞上惟武余郡人負竒氣逸才與李允達善以尺牘千言謁余河東裁就筆生花聊逐秋風問漢查身著短衣隨屬國手提長㦸事輕車千言謁帝心逾壮一賦従軍髩已華竒績賀蘭峯頂望萬山明月照龍沙贈鄧㕘軍明府逺遊尊人蚤嵗棄官隠匡岳手板那能謁路傍扁舟歸興逐潯陽㕘軍不戀芙蓉幕仙尉偏宜薜荔裳釣倚宮亭明月近樵穿廬岳亂雲長誰言玉樹階除畔百尺嵳峩在廟廊送鄭明府之山東百里絃歌遍訟堂銅符墨綬正飛揚橋迎駟馬過平樂舄化雙鳬到上陽汶水星芒流劍匣齊山雲色墮琴床看君異日循良宴第一雄飛漢殿傍送鄧逺遊令浦江九月西風木葉黄才人初釋芰荷裳無論白雪誇金馬聊為丹砂問石羊縹緲孤查淩大澤聨翩雙舄度長楊江城咫尺絃歌起桃李新陰匝訟堂送鄧逺遊之浦陽時将以便道歸匡廬為太公夀黄金臺下驟驊騮又見栽花大海頭洞倚匡廬新白鹿闗停函谷舊青牛三都賦在驚𤣥晏八咏篇成和隠侯溪上秋蘭吾舊宅一觴行為瀫紋留送張博士賦就河東絳闕傳一官行李尚寒氊青衫乍脱燕城下彩筆仍飛越嶠前去日雲霄偕雁序到時星斗動龍泉摳趨咫尺南宫近莫滯侯生問字船送張仲蔚之慶源河橋尊酒醉還醒惆悵離歌薄暮聴五夜芙蓉雙劍紫萬山桃李一氊青何人帝里酬春雪有客仙都問嵗星計日子虚天尺五生徒猶誦太𤣥經送陳座師之嶺右除書初下玉宸班詔遣詞臣諭百蠻一棹鬱林先訪石雙旌梨嶺盡穿山風雲絶域聊乗障雨露明堂欲賜環花底刺桐春萬樹七星巖洞並誰攀輓吳别駕藉藉賢聲動草萊翩翩半刺未塵埃三臺總擅功曹績八郡同推别駕才易水佩刀殘月墮天都歸櫬斷雲哀無嗟司法吳郎逝鉅筆曽煩杜甫裁題管建初紫宸宣對冊五彩毫揮白練裙紫宸前殿召偏勤百篇留宴唐供奉三絶親題鄭廣文斗色已看龍劍耀家聲重詫鳳毛聞長安多少擔簦客咫尺何人覲五雲送萬伯修中丞之朝鮮四首鵲印朝従漢殿懸歡聲雲擁薊門前休戈隴坂屯田日伐鼓漁陽出塞年結客威名馳豹尾封侯消息到龍泉胡床不厭王猷傲爛漫梅花笛裏傳甘泉初錫紫貂裘劍色飛揚射斗牛定逺侯封天北極受降城築海東頭連營甲胄分丹轂擁道旌旗照碧油道是征西唫興劇月華遙夜滿南樓萬斛餘皇照叵羅清江鴨緑笑顔酡山西上将能横槊塞北名王盡倒戈露布夜除𤣥菟壘霜笳晴擁白狼河金閨漫作遼陽夢一戰燕然石已磨輝煌珠履将壇従奕葉金貂帝眷濃座上短衣容薜荔尊前長鋏叩芙蓉扶桑日出消千蜃細栁天迴駐六龍可念茂林詞賦客當壚憔悴謁臨卭答張孝廉貂裘垂敝尚遊梁欲挽鹽車上太行劍擁石函龍闕下毫揮金鏡鳳池傍中山麯米澆愁盡大庾梅花入夢長道是妝臺饒錦瑟佳期晨夕按霓裳與黄山人舜夫别三十年絶不相聞問忽道遇于長安青燈話舊不勝今昔之感即席賦此把袂風前各愴神青燈明滅潞河濵三生恍覩前朝客萬死驚逢絶域人寂寞未妨龍劍老飛揚猶喜鳳毛新同聲咫尺荆髙在散髮狂歌傍紫宸少林浮屠秋溟行脚都下以姑布術持巻乞題賦贈代麻衣道者術親傳石室瑤編豈偶然一缽舊攜中岳頂雙燈今續大溈前封侯定逺寧無骨入相剛成且問年愧我黄扉頭白早丹青行辟四門賢寄王新建世叔并詢黄山人小隊尋花易水傍元戎旌節乍徜徉千檣楚塞飛葭菼萬斛吳都下稻粱赤管頻年貽上國𤣥圭他日告明堂翩翩門客饒朱履喜怒惟應共郄郎夜過鄧逺遊劇談申旦先是逺遊賦五言八律見贈屬余病冗未報兹當握别援筆近體四章付逺遊小史歌之落木蕭蕭夜過従青燈明滅照芙蓉櫜鞬驟覺中原盡旗鼔俄驚上國逢霧擁雙龍懸碣石風馳駟馬到臨卭他時廣樂鈞天奏莫忘齋頭舊雨濃乍釋青衫賦逺遊翩翩文彩跨登樓躊躇易水新交定濩落夷門故老留寸管乾坤才欲盡雙燈湖海話難酬無論一盖傾如故已訂詞盟到白頭面壁傳衣事已陳孤雲寥落傍風塵青萍萬里長為客彩筆三朝未授人把臂壚頭傾海岱持螯天末動星辰何辭大白終宵醉話入如澠對愴神擁坐黄花照别筵西風無賴木蘭船千人楚國迴髙倡一士成都抱太𤣥叔度經旬貪晤語淵源少日慰周旋那能驟割新知興極目河橋思惘然寄贈項觀察二首幕擁青油坐緑苔髙牙三輔近蓬萊函闗吏識終軍貌宣室神占大傅才雪地呼鷹迴樂堡霜天馳馬赫連臺誰言帥府多袁伏露布千篇屬手裁片語雞林百鎰傳何人不慕項斯賢飛揚北府談兵夜磊落南宮謁帝年絶塞雄風迴白羽長空明月墮朱絃髙門倘記登龍客一借胡床玳瑁筵夀李翁蓬矢桑弧繡闥懸桃花開落又千年流沙欲度函闗外弱水聊乗漢闕前拂曙霞光三鳥使横秋霜色二龍泉無論寶籙方平授窈窕麻姑出玳筵夜同張轉運葉觀察秦孝廉集淩比部宅坐中王大理孫太史曹計部皆同年友也秉炬髙堂話昔遊升沈離合遞生愁江東閥閲三才聚洛邑軒車四貴留下榻共青今夜眼驅車全白異時頭朝來一劍仍岐路相望郵亭各斗牛答吳觀察文仲時文仲以長歌寄余彩筆翩翩漢史才黄金持賜出蓬萊長驅五馬過秦望逺寄雙魚下越來大海雲霓晨仗鉞孤城雨雪暮登臺名山萬仞金華色屈指題名到緑苔錦字千行墜北平飛書天末故人情揮毫白雪流三洞露冕青霞接四明水國蒹葭寒入夢山堂蘿薜夜尋盟瓊珠滿握慚相報慘淡長途一劍鳴章納言宗理有事諸陵拉余同謁歸賦七言四章壺中何處問三山輦路蒼茫弱水環霧擁六龍迴地軸雲扶雙鳳出天闗雕梁甃玉丹臺淨畫栱鋪金絳闕閒五夜靈旟清蹕近蕭森風雨落人間百二河山望未涯飛流環玉潄雲芽宫懸劍舄長春近殿擁旌旗太乙遐古洞藤蘿時墜雪仙源桃李亂飛霞鈞天忽聴簫韶度七日那能記暮笳中天晴色敞𤣥扉秣馬平明度翠㣲碧嶂巧分千鷲立蒼泉寒擘九龍飛雲霞散彩鋪瑤闕象緯飄光動玉旂舊識上清童子在應門猶著五銖衣突兀𤣥宮䕶翠苔金銀隨處現蓬萊乾坤南北崑崙峙日月東西泰華來永夜旌旗環帝蹕清秋絃管逐仙臺鼎湖一望龍髯近欲起軒皇馭世才題趙比部崧髙巻六洞三山締夙緣崧髙雲色正蒼然金身百丈飛龍日寶籙千秋記鳳年杖錫乍移吳苑外香燈長䕶越臺前菩提一缽開甘露猶憶中林靜夜傳投贈沈相國八首金鼎調元賛玉宸羣公環立讓經綸華夷一代瞻王佐社稷三朝仗帝臣絳闕頻年迴雨露彤墀遙夜接星辰異時伯仲標鴻業肯向伊周躡後塵萬丈花光筆似椽明時蚤嵗奪青錢垂紳迥立烟霄上振珮長趨日月前白髮樞衡調鼎夜丹心帷幄運籌年平津漫詫封侯貴赤舄勤勞四海傳屈指蒲輪魏闕徵蒼生翹首屬騫騰文章八代占重起禮樂千年待中興西極雲沙馳象馬南溟濤浪浴鯤鵬亦知賜杖堪扶老未許東山日暮登飛書遙度玉門闗鴨緑江清燧火閒萬甲驟空𤣥菟壘雙旌遙奪賀蘭山紛紜虎帳咨良䇿磊落麟臺畫壯顔漫説平陽饒汗馬中天一柱定誰攀十年調鼎繫遐思霖雨親承玉陛詞八士夜登元愷族千官晨謁帝王師逶迤樹色長春殿縹緲藜光太乙祠慚愧鈞天韶濩在入将流水奏朱絲冠代詞華八詠儔中天霞色四明流黄冠未許歸賢相彩筆聊将和隠矦環珮西園晴赫奕圖書東壁暮優游無論消渴須盤露百尺金莖望斗牛廿載貂裘客路難青𠖇長日望鵷鸞華軒肯挾三公貴大厦寧忘一士寒日月䕫龍新政府風雲揚馬舊詞壇𤣥亭不厭侯芭學掃葉頻過十二欄十年懐璧臥山堂老逐鹽車上太行矯首乾坤空駿骨闗心岐路半羊腸星河暗蝕芙蓉珮雨雪全凋薜荔裳道是姬公勤吐握将因詞筆獻長楊感事九折曽聞蜀道難綈袍誰戀故人寒長鑱杜甫朝朝斸短鋏馮驩夜夜彈垂首乾坤皮骨盡側身湖海髩毛殘天風習習扶搖近會向南溟刷羽翰送李㕘軍使秦中朱節朝持下紫宸北風揚斾潞河濵飛槎渭水星為使授簡梁園雪照人去路正逢葭菼夕歸期先趂棣棠春遙遙草色西池畔何限新詩入夢頻贈孫太宰二首代名世中原間出年三朝人望屬材賢氷壺獨抱青雲上水鏡髙懸白日前珂色蔥蘢分建禮履聲搖曳動甘泉千秋啟事傳緗帙肻讓山公筆似椽徵書晨下建章宮赫奕蒲輪眷注同黜陟千官周太宰安危一代晉司空尊罍尚憶東山勝柱石遙瞻北斗崇咫尺黄金飛兔滿驪黄聊為辨追風章納言得雄過是将益燕山之數賀以七言一章梅花南陌正毿毿蘭萼東風瑞氣含四鳳桓生重遘一八龍荀氏僅餘三充閭此夕傳歌頌跨竈他年入笑譚屈指瑯琊符勝事珠璣林立待分甘陳冏卿過訪二首危樓百尺暮雲孤象緯寒飄玉鹿盧校士當年曽越郡空羣此日更燕都天閑盡獲龍媒否海甸仍求駿骨無最憶牙檣蘭水畔滄浪一曲和潛夫髙天雲霧玉宸班咫尺龍鱗近聖顔靜夜鳴珂朝北極清秋拄笏望西山風馳騕裊三千隊電擁驊騮十二閑慙愧方皋談滅沒鹽車憔悴太行間惟寅病榻對譚作大厦華軒接上林閒窗孤榻類山陰朱顔我向愁中擲白髮君隨病後深櫪下驥心時慘淡杯中蛇影任浮沈蒲團兀坐黄粱熟萬户燕臺急暮砧徐文明館中聴歌清歌一曲暮雲長秉燭呼盧萬事忘朱履三千迴别院金釵十二照華堂誰言工部生來瘦漫説司空見後狂妬殺盧家雙乳燕春風聨翼向雕梁夜飲徐文明邸即席作二首相逢湖海盡詞才車馬蒼茫踏翠苔萬里鄉心同越嶠新年春色到燕臺筵前栢葉風初動庭際梅花月漸來遮莫河梁成逺别黄金新詔出蓬萊散髮狂歌動紫宸天街良夜月如銀朱顔暫借逢春客白髮偏驚受嵗人宇宙風期迴擊筑江湖消息報垂綸髙陽是處名流集痛飲何辭大白頻胡穀元招同茅陳諸生夜集余適留滯都門不及赴折簡招邀玳瑁筵那知春色負華年才人並集春明外倦客孤吟建禮前易水乍聞新擊筑稽山殊愧舊移船􅂸成十日平原醉栢葉椒花次第傳寄何轉運代嚴城平楚正蒼然突兀髙牙大海懸三輔雲霞雙闕底九河氷雪萬家前公車竹箭同登日宦邸梅花獨賦年漫説魚鹽留滯乆家聲八座在甘泉少室山房集巻六十二
