body:
  text: 少室山房集巻八十六明胡應麟撰序七首藝葵園草序萬厯癸未春余北上公車時黎惟敬歐楨伯並在燕而張助父陳玉叔諸君以奏計至胡孟弢區用孺諸君以射䇿至余咸以舊好過從甚洽也而獨大來未識面心竊竊傾鄕焉一日大㑹于吳山人館亡慮三十餘曹轟飲夜分應門報大來至時同人以疲薾幾散去什之九余獨留晤大來覩其狀頽然穆然汪汪然千頃波也已促膝共語則又泠泠然入于耳㑹于心間發一難析一疑若庖丁之解牛而老吏之折獄迺作而嘆曰豪傑士故有真哉彼中亡所有而色取于聲音咲貌之間若河伯未離龍門曷與言海乎未幾余兩人各以下第去後十年余株卧一壑大來亦數困春官丁亥之秋葉明府子木來余邑首出大來札授余迺知明府大來婣家而大來屬余于明府也尋大來再入試都下則嵬然掇上第以甲次出宰西昌矣湛盧大阿之鍔精光乆閟函石之中一旦拭華陰而試盤錯將上干牛斗中裂犀駁下斮蛟龍奚往弗得而有于百里之邑也大來下車西昌甫期月政聲四馳刑清訟簡覩公署傍隙地蕪穢輙葺而藝葵其中春夏之交華葉芬敷日手一編獨坐吟諷長謠短章積成巨軸邑之士民争乞梓焉因自命草曰藝葵而屬序不佞竊惟葵之為卉一也公儀拔而傳記播于前大來藝而賦頌傳于後豈所謂道不同不相為謀者哉公儀相也相師表百僚閭閻之計吾何暇親焉故公儀之拔利民也拔而民獲其勞也大來宰也宰父母百姓塲圃之工吾何敢忽焉故大來之藝亦利民也藝而民享其逸也藉令大來居相職拔一葵而利天下詎曰弗為公儀子而宰一邑乎西昌之葵有加藝而亡加拔審矣第公儀以拔葵達相體而魯削滋甚來賢者無益之譏身當戰國中處曾孟立言之際其文詞不少槩見豈其果有餘于識不足于材乎迺大來之為西昌曾不閱歲倉廩實戸口增敎浹化淪百廢具舉且也案牘紛如文詞爛發飛觚縱筆馳大厯而驟元封葢識固兼人才尤絶世洸洋渟滙畜極而流故能超然獨往追百代而上之眎晚近尺寸形骸奚翅千里故欲知大來之製作卽大來之藝葵而居可繹也余孱且陋於大來亡能為役惟是三都之附竊艷于中輙綴數言篇首行且燔筆研以俟大來矣盛母雙節序婺之東十里而遙有巨浸焉曰葛湖渟泓瀰淼都一郡之勝堤上下舊族盛氏環居之其少而雋者世魁有客癖賢豪車轍踵户外而羣從世𢎞四昆季雅同志倡酬湖之名遂駸駸聞于越云世魁貴介翩翩世𢎞弟兄咸奮自農畝屬者余汎舟湖上卽其廬止焉飛甍若鱗危棟若翼迴軒曲榭靡不有致以為厥先遺搆也而丹堊塗赭爛然而若新詫問焉世𢎞顰蹙曰先君子甫壯棄諸孤不腆敝廬皆拮据二母氏手孤弟兄受成事而已繄豈惟敝廬卽不肖孤黽勉成立以庶幾先人堂搆絲毫二母氏力也當是時嫡母曹下世已十載余欽其風素大書其冊曰賦鵠丸熊越明年友人屠長卿系至復為文歴序二母賢而謬薦余言實之余竊愧未有當也未幾祝母亦乘軿仙去于是世𢎞伯仲介門人祝華父持冊詣余廬請曰當先君子卒棄藐諸孤二母氏稱未亡持門户其劌心蒿目有人子咋舌不忍言者賴天之靈不肖孤弟兄奉慈訓獲有今日迺禍延曹母溘亡猶冀祝母健匕箸酬烏鳥寸衷而竟無幸矣惟是錫大造于二母有文章鉅公在屠先生業命之惟長者無靳片言二母氏死不朽余悲其意請輙援筆序長卿後曰節之稱難于宇宙也詎弗彰彰哉塞兩儀橫六合亘萬祀而垂千秋皆是物也故大塊之賦材他無所獨靳而獨靳于節而儒者之藻鏡人倫百行備而節少虧其餘槩無足觀已迺士君子涵貫古今學術融而操趣定臨大節而不可奪者子輿氏猶孑孑焉而矧乎闈帷之習婉娩之姿矯焉而以節特聞此其難不尤倍蓰亡算也劉向氏列傳所稱蹈白刃而赴黃泉偉矣第或深于情或激于義或顛連而訣或迫切而捐較諸抱影窮年荼苦九折而靡悔憾者其乆暫猶逕庭也且或驟見一鄉或間見一國甚或僅見于一代葢節之難于宇宙而大塊之弗輕畀可知已若乃一時並見而震耀一門者惟盛氏二母然矣始曹母室盛翁四旬未育母日夜懷宗祧憂一旦束裝趣翁客金陵吳㑹間廣覓宜子者翁入武林館祝氏覩室女賢挈以歸逾歳而駢舉思達弟兄曹子之已出不啻祝母亦卑卑自牧嫡曹母而奉之俄翁抱微恙捐館舍二母佹各殉以身顧兩孤子未立也于是閫以外曹任之閫以内祝任之門戸斬然釁侮不作人以盛翁弗亡矣已兩孤子稍長立成童則罄資給延明師誨以義方課以藝業二子感淬奮勵卒能以遐陬僻壤來海内諸賢豪而登壇匠哲如吾長卿者操如椽而侈述之母之行籍揚大廷登良史傳百千萬禩而未艾而奚以余言重輕惟節之難言希遘古昔迺今顧並耀一門豈婺女之墟元精孕毓磅礴藴隆大塊特縱之而靡靳耶噫此固余所為沾沾齒頰而諸盛弟兄之賢且藉是蟬連聞海内不僅止越焉已也若二母節而且才以㷀㷀未亡葺前人之緒而大貽厥後有巴婦清望而恧焉者則屠先生之言備矣黃堯衢詩文序古今人之材果弗相及乎哉古之世之稱材者詞章問學出于一而今之世之稱材者詞章問學出于二夫詩而枚曹也杜李也古之人有不必文兼也者迺其詩藻繪蕃葩故未嘗廢問學也自南渡嚴氏之說興而詩自三唐外汰百家矣文而左馬也揚韓也古之人有不必詩兼也者迺其文淵綜富碩故未嘗廢問學也自北郡李氏之說興而文自兩漢外屏百代矣夫汰百家而一于唐以為詩似也顧百家汰而後世之詩卒無能登枚曹杜李之壇而奪其幟屏百代而一于漢以為文似也顧百代屏而後世之文卒亡能馳左馬揚韓之壘而角其鋒而徒俾詞章問學判為兩途而愸愸乎其弗相入是何古之立言者為術之工而今之立言其為計若是左也余不敏結髮操觚輙秉斯談以諗諸同志而二氏之指舉世靡然卽有喙三尺鳴將疇和葢自丙子之夏晤瑯琊長公而入可知也迺今于閩而得黃子堯衢若而人者豈亦所謂旦暮遇之者耶堯衢故文獻世家弱冠雕龍英英汗血當世所稱賢豪匠哲靡不控櫜鞬輟鞭弭逡巡退舍以避前茆而堯衢雅不以自足益虚懷勵往追逐古初詩則禘枚曹禰杜李如洛陽少年漢濱遊女風流格致婉約靡加望而知其詩唐也而詩匪足以竟堯衢也文則享左馬配揚韓如幽燕老將河朔名流氣韻襟靈逸宕自恣望而知其文漢也而文匪足以竟堯衢也迺至蒐羅二酉紬繹五車大而天地日月之不廢不墜逺而元㑹運世之無始無終顯而皇王帝霸之衰盛廢興幽而神鬼僊釋之推遷變互微而昆蟲卉木之蠕動發生靡不總統其要歸而是正其龐謬今勒成黃氏之言區分畛列亡慮百􅗡藉非其才軼人其識曠世竭乙夜而殫三餘胡以萃體製之全窮淹貫之實之若是也葢堯衢所為詩若文法唐非不猶嚴氏而未始競焉若嚴氏之于唐法漢非不猶李氏而未始局焉若李氏之于漢故諸所結撰馳百家驟百代卽以追曩時名世鉅公吾見其進而未止厥今所詣固已起弇州之廊廡而直闖其堂皇矣以彼其才究竟業成而論定身後夫孰謂古之人果弗可及而今也詞章問學之並擅者或是之亡也堯衢都盛年負盛氣顧獨以三都前導謬屬于余亦越五載而余未有以應邇復悉索篋中浮雙魚東海上曰履康生不幸稟賦孱弱且方罹幽憂一旦卒然冒霜露君雖恨于臣將若之何噫余之髮已種種矣經國大業不朽盛事皆堯衢所自有余何能為堯衢役堯衢勉矣格有所必程法有所必比辭有所必鍊思有所必抽入之九淵而毋墮于魔放之八極而毋蕩于幻舉之千仞而毋激于峭按之萬鈞而毋滯于麤博而核之精而瑩之俾異日為子雲氏者後之視今亦猶今之視古也此余所謂古今人材未嘗果不相及者也亦堯衢之所為屬序與余序堯衢意也觀風錄序代昭代之文至于今而極盛矣而於越以東南大藩翹然冠羣省而出其上其文之發為時義以演繹聖真宣洩儒術者稱極盛中之尤盛焉葢自大禹塗山之盟玉帛萬國實開闢以來文明所繇肇歴漢唐宋氏藝士代興至勝國而鵲起聯翩佹割天下十之七以為明前導迨我高皇帝統一區㝢宋文憲劉文成旗鼓並建若王若方諸君子羽翼而先後之而經世大業遂咸萃于越之一方迺今時義之工特其餘事顧二百年來三試而皆首列者僅越商文毅為然而他方不一覩卽其故可推已余故嘗艷稱越中文物之盛客有盱衡而詰恒為之神動色飛兹猥以官守攬轡而東單車疾馳不閱月而抵禦兒之境其山則天目秦望穹窿崒嵂盤鬱而造天水則錢塘富春浩漾滉洋澒洞而浮地其外環以渤澥峙以赭龕洪濤巨汐之震蕩激春為觀之卓詭有獨擅于六合之内者固宜鍾為穎秀纈為英華光藻舄奕與三吳分道互馳卽諸方之矯矯者亡論也余旣以職事巡行兹土復自幸得以巡行餘隙縱觀越諸士之文每奉璽書臨郡邑彰癉激揚之暇輙檄所部青衿程其藝業而殿最之而間錄其文之一二尤雅者大都以譚道則肆而昌以析理則縝而邃以雜物則該而洽以敘述則贍而典以論辯則覈而衷彬彬哉質有其文卽未必家連城人歴塊要以䇿賢良應舉選居然有游刃而亡乏材則是編也其鼎中之一臠矣雖然吾尚有諗于越諸士文詞之極盛莫逾於今日而文體之變衰亦莫有甚于今日者始也程朱之不足則抗之而左史以為高旣也左史之不足則放之而莊列以為奇終也莊列之不足則遁之而貝經竺典惝恍窈㝠昬惑不可知之域兹三者非必越一方為然而越諸士故其嚆矢頃大宗伯數上言至布章程申令甲而弊也迄于今而未巳彼其思愈深工愈篤詞愈修而聖賢之旨趣愈益乖經傳之面目愈益遠究且為牛鬼為蛇神司世道者有隠憂焉爾越故亟稱天下鉅藩將以首善率先諸省㑹若之何任其溺而莫之返也余兹一與諸士約寧以平毋寧以詖寧以樸毋寧以纎寧以顯毋寧以幽寧以實毋寧以幻諸所結撰務約諸先民之軌凡邇來佔􅖶流弊汛掃而一空之異日者繇時義進之古文詞又進之而功而德繇文毅上之而文憲文成又上之而伊傅而姬孔庶幾爾今日之肄習為亡忝而余他日所厚望為弗孤哉於是越諸士亟以為然而乞余次第書之以冠諸篇首忠清里林氏族譜序錢塘之有林氏也其先世葢徙自大梁云徙當宋渡南時譜系綿邈弗可考勝國初提領公首以仕聞提領生士民士民生居義居義三子仲曰榮入皇朝以孫章貴贈通議大夫太常寺卿榮子三才文森才隠德弗耀文永樂庚子舉于鄉歴柱下史森亦以子貴贈官如父榮才子秀性至孝博通三敎書爰自吳山大井巷徙今里中森子章幼敏工八法景泰中有司以神童薦歴官太常寺卿從一品貤封三世子二長應祥以蔭官太僕主簿次應禧亦用有司薦入中書為人强直自遂武宗朝不肯阿逆瑾挂冠去瑾敗復召歴官尚寶卿順天府丞父子毖飭好修相繼綰簪組登九列立朝餘七十年負郭廬亡寸溢州里偉其為人至方諸胡威子父秀子二曰巒曰岡岡生寵及奇奇生梓梓進士起家至雲南按察副使岡負氣任俠業賈賓客傾四方以同事中傷圽縲絏識者悼其非辜扼腕天道當有後俄五子舜愛受孚爵咸克世其業以高貲雄里中旣而受嗣絶從子遜嗣愛子念絕繼功嗣受孫孟春絶之蕃嗣世代數更子姓岌岌如綫林氏此時號中衰而舜子思思子文明始皆用儒術自奮恩年十一孤弱冠入太學負塲屋聲弗售賫志殁文明十二亦孤再試太學不利絶意進取屏居一室以經籍自娛讀史博綜古今成敗得失利害至端木計然諸傳喟然曰大丈夫當身名俱泰岩處長貧賤誠足羞史遷因是至欲後之人諱談仁義則惑滋甚也陶朱氏三致千金而散之吾師法葢不遠始大肆其力于治生身與童僕嘗甘苦視百貨緩急而時操其奇贏旣饒智慮多億中亦㑹數有天幸不詘乏歲入滋稔益規恢其已成之緒不數十年而武林田園廬舍腴上者相率歸太學家一時里中素封靡敢差甲乙迺其好施予利澤人尤天性比閭族黨空乏以情告人人厭其意去數捐已貲佐大興當宁重嘉其誼為棹楔樹閭間太學子曰之盛之芬之芳之盛少卓犖不凡雖寢處膏粱而下帷焚膏與寒素士競佔􅖶聲藉甚冠諸生丙子與余同計偕再上公車報罷慨然躡屫登岱宗拜闕里周歴大河淮泗已浮扁舟入石頭吊古秦淮北固間歸而學殖彌邃諸儕輩争俛下之方淬勵盛年攄夙抱以建樹當世而㑹太學嬰疾亡母安人張偕逝之盛執二喪傷功名未逮怙恃相繼溘焉卽異時萬一適逢而終天之恨殆不可復于是乘幽憂餘隙捃摭先世積累之自為林氏家乘傳之諸子若孫謂不佞年家子宜有序序簡端輙因之盛所自述而稍次第之以俟後之紬金匱石室者且以徵林之所繇碩大繁昌非一朝一夕故云石羊生曰余讀司馬氏書至貨殖諸列傳未嘗不竊陋遷之無識也彼所沾沾卓王孫程鄭烏倮輩皆賈人之雄耳身旣薄仁義弗為其先世靡有功德之素子若孫又斬然蔑聞卽傾國都亘阡陌君子唾去弗暇而侈諸載籍其奚以稱焉余觀林自崇善公迄太學父子積操絫行葢世世然矣致奕葉擅富饒以義聲奔走一郡非僥倖至也孝㢘齒力富强且益擴太學公所未究以潤澤當代諸仲繽紛蔚起多材能林之稱甲族于㝢内將駸駸與隴西太原諸族伯仲競爽而有弗可一方限者余不佞計日望之矣祝生草序詩能窮人甚矣東陽李生能茂以振世之姿遑遑佔􅖶顧不能博一第與白面經生伍又不能存如綫之脈以慰若敖氏之幽䰟而賫志之年曾未逮乎四十迺暴戾恣睢之夫黃耉遐齡至生平一善亡稱者孫枝繞膝日升川盈而未巳豈其人誠賢于顏淵冉牛而才于王勃李賀哉余固日問諸天而未得其解矣吾郡劉駱兩君子首揭文學兩君子以窮著前代後有作者固宜窮李生則余交臂而失之者今祝生樹勳之窮殆又甚焉祝生家亡擔石僅一婦供饘粥復終歲病床蓐間而其激昻邁往之氣雖鶉衣百結而不少衰每舉觴白眼旁睨一世亡足少當其意獨時時過余𤣥亭揚扢風雅其英識宏辨若懸河放海而無所底止間出其詩歌讀之輙殷殷留金石聲余每顧其人奇之而耳目其窮又未嘗不為之三嘆也嗟嗟古今所艷稱世禄世家大者十餘傳其極三數百載耳矣驟而執途之簪紳之子而叩其祖翁卽賢且好學蔑能對其行履之悉他懵然莫知字與名者比比而文人騷客特以片詞隻語永天壤同敝之令名欲彼蒼之中泰然靡争而不困阨其躬而齟齬其後得乎生旣落落于時而好為詩歌彌甚鋤屋旁隙地為園園中空無所有第種竹數千竿汪司馬為題曰瀟湘坐而余亦屢贈以詩生日俛仰葱蒨間或竟午突靡炊烟意恒蘧蘧然適也一日持其草若干篇乞余塗抹評定之且曰幸胡先生同世惟賜之一言卽􅀈軏終身亡憾噫若不佞者􅋂崎歴落舉世之所訕笑而生乃沾沾蘄得余言得亡愈益其窮乎哉昌黎氏為文送窮卒燒車與舩延之上坐而令名迄今不磨藉第令生身弗窮才弗豐窮弗甚詩弗工窮日益甚詩且日益工而名且日益逺窮于生亦何負也生齒方盛强異日者子虚達于承明天子欣然召見殿上未可知余獨悲李生之卒窮以圽也因其請序謾及之唐長公詩集序古今稱文獻則首三吳矣而吳之才至國朝而猶盛國朝詩凡四變而吳凡四踞上游初則太史導其源盛則迪功探其委中則皇甫揚其瀾迨弇州而地負海涵古今之詩幾于盡廢一時吳㑹彬彬迹弇州伯仲而起者亡慮十數皆不佞願為執鞭者也然而全盛之極芽蘖潛萌外道出于菰蘆而與二乘角忮心侈于調達幻術大于登伽其尖纎浮艷揚袂市門之態亡論壯夫忸怩卽唐餘元末諸人有囁嚅㗋吻者而揚睂瞬目意且籠一世而趨之嘻毋亦已甚乎哉往余游歴吳閶每與周公瑕氏縱談斯道未嘗不嘆太音之寥落而末法之淩遲也迺今而得雲間長公詩余讀之至為之三擊節云長公髫丱卽鋭意千秋大業弱冠屈首青衿汛掃博士陳言而一緣飾以西京戰國同事諸人咸誚夫夫也衣狐貉而當暑長公置若弗聞也者俄而聲實崇隆沸起黌校葢身未離逢掖而譽藉寰中矣卒之上公車掇巍第因以大肆其力于文章釋褐莅官出宰百里鳴琴之暇篇什輙形其才無所弗懸解而學無所弗究極古風樂府鎔裁于漢庀材于魏而旁茹晉宋諸名家近體歌行範格于杜擥調于唐而近遡𢎞嘉諸前輩氣之雄而厚也幽燕老將之行兵也骨之沈而深也河朔酒人之任俠也體之大而莊閎而栗也入清廟覽明堂而百辟裳衣雍雍而濟濟也聲之鬯而和色之豐而麗也秦青之振袂而玉環靚粧也思之穎而發韻之逸而𤣥也供奉之沈酣而步兵長嘯也時乎而朗月繁星時乎而凄風急雨時乎而高江巨濤時乎而疊嶂危峰讀之使人神動天怡心驚􅅎軼而一軌之正始之門大方之家藉匪其姿絶人其識曠世則方彼鄭聲合奏之時豪傑雋流且將傾聽忘倦胡以澡濯潢汙皭然氛翳而力障狂瀾于旣倒哉曩者瑯琊次公嘗謂不佞少遊中原力追大雅而不為柔曼兒女子之習不佞恒愧斯言迺今當之長公允無慙色矣余與長公素昧平生第目擊江河而不能無扼腕于世道輙因三都脱藁而僭序其端如此葢聲氣傳合隨叩輙鳴卽小挺巨鐘靡當魯衛亡暇辭遜也長公文奇偉瑰邁直闖東西二京尤足以砭尖纎浮艷之聾瞶豐碑巨碣業已盛行當世余不復具論論其詩少室山房集巻八十六
