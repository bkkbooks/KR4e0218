body:
  text: 少室山房集卷三明胡應麟撰樂府三十首擬漢郊祀歌十九首練時日練時日候陰陽郊圓丘祀明堂焄哉蒿薦上帝靈來思思弗替靈之駕六飛龍天門開詄九重靈之旟翼神魚乗罡風載行㕑靈之裳曳三光爛虹霓象𤣥黄靈之珮建蒼玉鏘太虛答窮谷靈之下赴閶闔洋洋如走六合靈之歆稷用登告特牲報維馨靈之留駐蒼虬紛萬舞結綢繆靈之往遺肹蠁儼若思企餘想奏咸池舞韶箾繽紛哉靈之樂臣八荒馭九夷嵗千億靈之貽帝臨帝臨中央以運四方苞孕萬彚協和三光厥服載黄厥數載五克配上帝維我后土皇皇后土徳周遍咸百穀告成大有斯年青陽青陽載臨萬物敷榮勾萌甲坼惷動含靈雷乃發聲雲行雨施大造之仁品彚華滋跂行喙息繄以疇息東皇太乙莫匪爾徳朱明朱明􅂱􅂱品彚嘉悦鮮潔齊均以莫不達祝融司造薰風維時皇人法天南面象離萬物相見茂昭大夏昭告昊穹百神來下西顥西顥金方蓐收是秉卉木變衰霜露凄𦂳既蓘既穮我稼我苗實穎告成碩彼東郊爰馨黍稷殷薦上帝于億千年永矢弗替𤣥㝠𤣥㝠水伯載司寒沍殞霜殺草昆蟲閉户北風宵厲飛霰晝零木脱水涸雷蟄無聲嵗運既徂陽和在候萬寳既成敢告明后維泰元於維泰元象帝之先綱紀三才遍周八埏皇皇天地疇闔疇闢於維泰元潛運無極風雨雷露維日月星咸若其時克順克成胎卵濕化生育孳遂滅除灾兇增長福艾四序既宜八表既安孰司其柄於維泰元嘉牲􅂱􅂱陶匏涓潔聿來駿奔靈爽斯達以莫不䖍以莫不馨元化絪緼泰階底平天地維天維地協尊竝巨嘏余一人六合和豫皇皇齋宫穆與神通臣隣景從肅肅雍雍報圜丘兮祀后土千童羅列謳且舞曳擊笙鏞鳴琳球神如有知儼來遊大小諸秩咸敬厥職整齊服章駿奔翼翼羣公秉徳毋怠毋忽大君恭黙式於列辟降天神兮下地祗朱雀為駕蒼龍旗勾陳前導屏翳馳長劒幼艾紛陸離流商刻羽歌咸池神飈擊轂河宿移簫韶九成鳯來儀皇人萬壽登維祺日出入日出入暘谷扶桑間一何迅且疾百年若電光四序如風飄祝融驅火輪蓐收乗斗杓羲和掣神鞭𤣥冥扇狂飈安得駕六龍遊遨遍八極長生不復死永永天地畢天馬天馬徠自渥洼度月支逕流沙天馬徠以蹀躞骨權竒汗維血天馬來驥為友喪驪黄牝與牡天馬來躡浮雲日千里空而羣天馬來服帝閑從法駕鳴和鸞天馬來兆有徳瑞萬方景四國天門天門開闢九重上帝居百靈從瑶為臺璇為室樞紫貝牖金碧吐望舒宅曜靈建雷鼓樹霓旌左蒼龍右白虎守飛廉衛𤣥武靈光被六合周燭萬景洞九幽勵精誠薦嘉藻永如期錫難老靈爛爛兮載揚光清飈激雲下羽􅓚牽牛織女行七襄蛾眉稚齒紛君堂靈目成兮悦而康合柷敔兮陳笙簧天門呀然豁扶桑雙翼乗風朝紫皇揖西王母攜東方食蟠桃實乗乗黄周歴八紘度九域吐納真精戲無極景星景星見祠神鼎載出煌煌赤文以播有徳經緯虹霓屈蟠蛟螭魑魅魍魎莫能逢之我鼎爰獲我號爰建以祀汾陰光我大漢巍巍夏后錫此實勞閲歴商周肇見我郊敢告上穹肆逮下土作樂象成百獸率舞享帝享親以莫弗歆甘露是凝昭我萬齡后皇后皇降休介我景福以𤣥以黄黼黻章服靡邇弗洽靡逺弗䝉億萬兆庶視此成功齋房齋房三秀柯葉九莖煜煜皇皇太和是蒸亭雲爛霞噓日月精句曲之天金液玉英羽駕罡風八翼上征春曲靈苗維王國禎於鑠我皇禩億萬徵華􅂱􅂱華􅂱􅂱黍載馨延庶旄駐翠旌神之來七聖俱虹為馬蜺為車神之來百靈萃風為裳水為佩神之來薦嘉豆八珍輻衆芳輳神之來肆長筵雷大鼓鳴鈞天何以休神之留赤鳯至黄麟游何以豫神將遇慶雲見甘雨澍蹻鹿盧綦星辰佐昊穹佑下民酌斗杓和沆瀣揄長蛾擁幼艾日馳精月揚光爛昭昭樂未央崑崙墟瀛海澨以余歸浩無際五神維五神五岳精徳盛大包羣靈佐東皇賛太乙報圭璋達琮璧奠桂醑以椒漿牲肥腯袚斯皇女巫進姹以麗迴雲旓駐霞幟神偃仰以徘徊歴明堂昇帝臺維光華嘏大漢年嵗登永嘉薦朝隴首朝隴首遊白麟顯光華字説麐之來也光華不可正視從鹿從文輔一人靈昭昭慶萬國肇皇仁祗帝徳八蠻共四夷王毋怠荒納嘉祥嬉余藪服余輅浴和風沐廿露左蒼龍右紫鸞文貍後赤豹前圖爾形輯爾瑞五千厯視兹嵗象載瑜象載瑜粲六牙至萬里自流沙入天閑服輿皁扈法駕彰大造翩翩哉赤鴻來超虞羅翔玉臺翮五文麗以鮮銜靈芝嚥醴泉兆嘉祥禔景福八荒來四夷服赤蛟赤蛟下蒼龍遊靈已醉不可留赤蛟翔彩虹馭靈欲歸不可駐靈之逝觀玉臺戲閬風宴蓬萊靈之昇上無極挾宇宙傍日月靈般般亦享余下神雀降天㕑靈殷殷肆余佑億萬祀永以壽蒲梢歌天馬來兮涉玉門服天閑兮朝至尊駕余車兮上崑崙閲萬國兮超乾坤太乙歌貢驊騮兮自太乙若滅没兮亡其一以龍為駒麟為匹歴塊萬里昭帝徳靈芝歌孕三秀兮毓靈芽承月精兮映日華爛輝光兮發雲霞服紫莖兮嚥胡麻乗赤霄兮上無涯琴操十一首龜山操龜之峻嶒兮望魯之疆龜之憑陵兮蔽魯之邦遲遲余行兮載贄於筐余懷以怦怦兮胡為去父母之郷猗蘭操汎汎崇蘭在彼空谷以芬以芳達於平陸達於平陸大國之香薄言掇之以遺明王以遺明王疇適逢世嵗月行暮芬芳將逝芬芳爰逝羌不可留忡忡我心曷維其憂履霜操嗟嗟皇考放余於野兮凛凛嚴霜雨雪交下兮雨雪交下夐弗可留兮念欲自明我維君憂兮我維君憂逝將安適兮世豈有兹無父之域兮無父之域余曷以居兮㷀㷀上天罪實在子兮殘形操夢之憧憧兮厥形維貍形之蛩蛩兮胡首則遺茫茫吉凶兮疇尅我期皇皇昊穹兮庸豁我疑雉朝飛雉雊於田􅀆維雌則隨暮而無妃兮入而安歸憂心怦怦兮將以告誰援琴而歌兮以寫我悲采芝操煌煌紫芝三秀五莖鬱鬱崇岡巃嵸眇㝠爰卧其巔爰掇其英顔色麗鮮以敷以榮身輕翼舒遊六合外駟馬高蓋翳以疇賴巢哉由哉寤言弗猜唐哉虞哉亦已焉哉秦女操縠之襜䄡兮可裂而朽兮屏之巖巖兮可越而走兮劒之巉巉兮可捍匕首兮八公操煌煌八公下帝庭兮貽我大藥登遐齡兮嬰兒姹女相和鳴兮飛翔九垓羽翼成兮金支翠旂夾路迎兮萬年不死居曾城兮俯視六合徒營營兮朝生夕枯如蠓螟兮思歸引維鹿有由兮維鳩有仇兮爾徒余囚余寧爾留兮别鶴操羽翼雙飛兮中道當乖汝翔安適兮余居曷諧彼忮則害兮為家庭灾汝淑則慧兮曷明余懷牝晨操維牝無晨兮爾胡以鳴兮維爾之鳴兮家胡以寧兮牝兮鳴兮鳴兮晨兮家兮庭兮怦兮營兮雷兮霆兮少室山房集卷三
