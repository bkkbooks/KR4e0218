body:
  text: 少室山房集巻八十三明胡應麟撰序十首范浚先生集序婺自劉駱兩才人肇興其後迄以文獻甲㝢内惟吾邑據甌閩楚粤水陸之衝山川之秀發林麓之窅眇巖壑之瑰麗風氣之淑清迥出諸邑上而上下數千餘載僅貫休氏以浮屠稱詩唐末五代間而著述遂亡一顯者其以著述顯而遺集迄今傳于世實始自范浚先生先生生宋南渡及考亭朱氏游考亭嘗過先生而㑹先生出顧案上得所撰心箴讀之大擊節賞嘆手錄以歸今附載孟氏書中是也是時郡人陳同父以氣豪一代而尤尊事考亭考亭與同父論學往復劄動盈巻軸縷縷不啻數萬言皆抨駁不少假同時橫浦張九成金谿陸九淵輩並負海内聲高位置持其說不相下考亭一切攘斥為異端距之弗遺餘力而獨先生迺虚懷茹納若此葢自伯恭敬夫二大儒外夐弗再覩者卽先生學術醇然度越餘子可弗問知也先生生平所著述甚多多散軼今存者尚二十巻余讀之其于道德天人之際深博矣其詩文不甚概于古其持論甚破窽而才藻辭令奕奕足以發之非齷齪守章句椎樸俚儒比尤慷慨好縱譚天下事所上皇帝諸書及李富兩柄臣啓抵掌萬言率引喻古今洞達彼己鑿鑿可見施行至傳翟義說李孝逸志徐徽猷雄辨瑰略百折弗窮而忠義激烈浩然之氣誦之猶若浡鬱于簡編而飛動于翰墨是又足覘先生肩抱之奇偉匪槁首山澤鋭于忘世者也俾南渡君臣一聽其言而委之以國必載造式微之宋而起之而徒以空文托諸異代可悲巳乃先生所陳䇿雖廢弗售而遺集流傳自宋迄今行且與劉駱兩公後先不朽則造物之庇于先生固逺且大其亦無足悲者矣胡應麟曰余蓋于范浚先生為後學云余嘗及過其故居卽今集所繇名香谿者范先生聚族居谿上兄弟同氣凡十人九人皆登制科躋膴仕獨范先生以布衣終其身而獨以著述顯今去宋南渡紹興僅數十世而九人者之名卒而問諸范氏之子孫莫能一對而范先生集爛焉為吾邑寶玉大弓而九人猶得以科名自列于後復于兹集乎賴焉於戲輓近世夸毗之子往往挾腐鼠以嚇鵷鶵其弗思亦甚矣夫吾邑自范先生前歴數千百載未始有以著述顯者而有之實自兹集始而余猥以後死而得與於兹也則夫兹集之序非余序之而誰也吳中往哲圖贊序大司宼弇州王公圖吳中往哲遺像自先世兩司馬外起高太史季迪韓襄毅永熙葉文莊與中吳文定原博王文恪濟之至祝京兆希哲沈處士啓南唐解元伯虎徐迪功昌穀王太學履吉李太僕貞伯劉參政欽謨楊禮部君謙都少卿𤣥敬陸太常浚明桑博士民懌黃孝㢘勉之文待詔徵仲陸少卿子傳王吏部禄之蔡孔目九逵俞山人允文皇甫司直子安司勲子循凡若干人人為傳傳為贊而虚首簡俾不佞應麟序之吳之為國粤自商泰伯至德建邦逺矣春秋之世闔閭以功札以言皆皭然懸炳竹帛若伍行人之忠孝義烈言吳公之文學精華厥功厥言尤非末世人材所及漢唐而下雖才代不乏律以商周或少降焉至于國朝而吳中人才之盛斯極槩觀司宼所繪兹圖瑚璉豫章人龍天驥可歴指數也不佞髫歲讀太史迪功遺集則私衷勃鬱恨弗一當其人執櫜鞬鞭弭之末至襄毅文莊之勲名希哲啓南原博伯虎履吉濟之徵仲諸君子之才藝烜赫乎旂常而縱橫於毫素流風稔澤百世而下尚猶使人矍然興奮然起獨其體貌之瓌奇神明之煒􅂱儀觀容止之肅穆而恬愉散朗而逸邁者業已俯腐草木化為塵埃矣夫以不佞之生去諸君子僅數十百載一旦而過吳物色其里閭而推求其屬𦙍尚有弗盡獲者而矧乎其與人偕逝石火而電光者也迺今入弇園拜司宼揭兹圖而諦翫之曾弗崇朝而三吳先哲鉅公偉人俊士一目而在吾睂睫恍乎聚首乎丈室之中而儼乎交臂乎一堂之上所謂瑰奇煒􅂱肅穆恬愉散朗逸邁者往往並其人得之使人羮牆寤寐之念勃焉飛動于尋縑丈素顧戀徘徊而弗能自已司宼之所為顯暴前修而發揚潛懿者心甚盛哉雖然兹圖于吳中先達備矣而揆之太上不佞猶以非其至者司宼起諸君子後鴻德駿猷懸揭海㝢而文章之盛絶出古今遂舉明一代製作而商周之葢東南千古大觀至是而後極非可以吳中一方槩也異旹江左名流有若曹不興顧虎頭輩以冠世之筆寫先生兹圖之末以附列兩司馬後後學泰山北辰之仰將于是乎在太史迪功諸君子且側席避矣鄙劣弗文公命為序謹識所窺測一斑而并發明斯義于末簡葢當今己有定論無俟議之百世也司宼祖父兩司馬皆列圖增校酉陽雜俎序志怪之書自神異洞㝠下亡慮數十百家而獨唐段氏酉陽雜俎最為迥出其事實譎宕亡根馳騁于六合九幽之外文亦健急瑰邁稱之其眎諸志怪小說允謂奇之又奇者也唐㑹昌而後文章衰颯弗振極矣成式與溫李輩同時其才力豪勁特與杜紫薇類而學術逺過之惜其亡所用心而託好于是殆滑稽俳笑之雄耳然非是亡以抵後人之好而永傳不廢至今夫世固有享大名顯當代製作盛行身殁而其言繼之泯焉偕草木腐而小說志恠之書卽筆力逺出雜俎下迺遺籍什九爛然而其人之才氣豪勁素奇於文而製作末繇考見者尚因小說之傳而獲覩一斑則段氏之託好是書要未可以盡訾也昔杜征南勒文于石率一置山上一沈水中以豫防陵谷之遷毁其苦心為身後謀可謂備極至于石有時以泐而征南之術于是遂窮然則欲為不朽計誠亡若著述之足恃而著述傳與弗傳又未足以盡憑則亡若大肆其力於逺且難而小見其能於近且易則好之彌衆而其傳可必于後則雜俎之流是也故大丈夫志於立言固當以删詩書制禮樂為首務六朝張融語見本傳而業成之後間一染指于斯俾吾之不朽于來世可以萬全亦豈非征南勒石遺意哉段氏書近多雕本而魯亥殊衆師儒老宿弗易徵又軼漏㡬過半余谷居孔暇稍稍據廣記校定之并錄其所謂續編通三十巻藏篋笥中吊詭士旦暮遇將羣起互傳之若其為說致詭誕不可盡信則余業蔽以滑稽俳笑之雄君子毋求備焉可也羲蒼漫語序自仲尼出而六籍傳自六籍湮而諸子作不佞幼則沈酣四部博考古今竊謂子書之變大槩有三春秋戰國文不在經而在子子不在儒術而在百家漢晉而下文不在子而在史子不在百家而在二氏唐宋而下文不在子而在集子不在二氏而在諸儒故夫戰國而上之為子者子以文唐宋而下之為子者子以理葢文與世汚隆而理弗以代為升降故也明興而子以文著則劉青田之郁離崔相臺之士翼以理顯則薛河汾之日錄羅豫章之困知自餘彬彬未易指屈慶歴以還談文者盛紀述談理者眇見聞著作旣詘焉迺今讀羲蒼先生之為漫語也庶幾乎劑文與理有之矣先生英質絶人弱冠穎脫舉乙丑上第出宰吾蘭治平之績為一時最中颺歴清顯車轍所輳頌聲塞途一旦移疾山中却掃閉關盈十餘載旣以朝命强起分部嶺南署面挹羅浮背枕大庾烟雲萬變吞吐胷中黙照静觀神動天解凡宇宙之窮際元㑹之運行陰陽之屈伸以及聖真賢喆之訏謨皇王帝霸之經略極而草木昆蟲勾萌蠕動之微瑣鬼神僊釋之怪迂亡弗洞極其要歸而燭鑑其情狀隨所得而筆之書而未嘗以示人也葢先生中歲好道絶去一切騖名之念淵通綜練不沾沾為博閎深瑰傑不岳岳為高故其為漫語也文不必戰國諸子而有今之人所難及者理不必趙宋諸子而有昔之人所難言者其傳而之于後世也斷乎其亡惑也是書業已為倪司理强而出諸帳中屬之剞氏矣郭生時騰復謂余髫丱時先生所識拔士亡一言跋諸末簡弗可也輙因其請而以鄙說敬質之先生百家異苑序自漢人駕名東方朔作神異經而魏文列異傳繼之六朝唐宋凡小說以異名者甚衆考太平御覽廣記及曾氏陶氏諸編有述異記二巻甄異録三巻廣異記一巻旌異記十五巻古異傳三巻近異録二巻獨異志十巻纂異記三巻靈異記十巻乗異記三巻祥異記一巻續異記一巻集異記三巻博異志三巻括異志一巻紀異錄一巻祖異記一巻采異記一巻摭異記一巻賢異錄一巻他如異苑異聞異述異誡諸集大槩近六十家而李翺卓異記陶穀清異錄之類弗與焉今世有刻本者僅神異述異數家餘俱弗行迺其事大半具諸類書鄭漁仲所謂名亡實存者也第分門互列得一遺二雖存若亡余屏居丘壑却掃杜門無鼎臣野處之賔以遣餘日輙命穎生以類鈔合循名入事各完本書不惟前哲流風藉以不泯而遺編故帙亦因槩見大都遂綂命之曰百家異苑作勞經史之暇輙一披閱當抵掌捫蝨之懽昔蘇子瞻好語怪客不能則使妄言之莊周曰余姑以妄言之而汝姑妄聽之知莊氏之旨則知蘇氏之㫖知蘇氏之㫖則知余類次之㫖矣赤松藁序今名華陽赤松子者神仙傳所稱黄初平叱石成羊事舊矣迺劉氏山棲志則以赤松為雨師何也夫雨師本列仙傳炎帝時赤松非黄氏弟兄明甚第孝標博極群書其說或有所受神仙傳出葛稚川列仙傳出劉中壘晉與梁世代相去不遠其時書無刻本稚川所録孝標未必見之列仙籍曰中壘而文匪兩漢要亦晉人偽稱咸不足據惟留侯辟穀從赤松一語可徵葢二傳皆因是附㑹而孝標流寓紫薇遂與兹山共敝天壤則人間世所謂長生誠在此不在彼其有無無足辨也第兹山穹窿延袤雄峙東南朝真氷壺雙龍三洞天幽深窅絶往往人迹罔到固宜有仙靈宅之余束髮慕孝標比年病困枕席翛然有輕舉逺投蜉蝣蟬蛻之想因自呼曰石羊生將棄室家負瓢笠遍行金華窮谷中物色其人賴天之靈間有遇合卽留侯所從中壘稚川所傳第居一焉亡弗可者否則蹤迹孝標托棲遺宅異時獲以片言並峙兹山例諸不朽安知三氏者所云赤松不偕僕而四乎因首綴兹篇假以名集而略陳其意如此云養痾藁序不佞客歳之秋奉命家嚴治裝北上朝辭瀫水夕次武林角弓遘疑寒疾􅈝作始於腠理旋中膏肓二豎恣其憑陵三彭逓相侵擾驚風同乎宋鷁喘月甚于吳牛延及孟冬舟抵𤓰步饔飱并廢非赤松而辟穀五旬藥餌遍嘗類秦穆之復甦七日猶以簡書載至黽勉前發抵淮臘盡入沛春初適大司空有事河渠築堤濟上舟航阻絶行旅不通車馬紛紜咸從陸道而余蒲栁之姿不任霜露蘿薛之性屢夢林泉昔人興盡剡溪尚言何必見戴況以三折之肱扶再臏之足涉大行之險蘄定逺之封哉夫孝大於顯親顯非必於三事行隆於養志養有出於萬鍾且也惟疾之憂逺遊之戒諄諄尼父詎曰空言畊於寛閒畋於廣莫萊彩用代貂蟬菽水是充牲醴奉大椿而偕樂樹萱草以忘憂取義達生喻言卒歲斯亦可矣爰尋初服言返故棲感遇述懷咸綴兹集雕蟲小道貽誚大方筆研未燔聊復爾耳唐詩名氏補亡序唐詩之盛無慮千家流傳至宋半已亡逸度南而後諸家所畜僅三百餘葢五百之中又逸其半矣今世傳百家唐詩十二大家二十六名家益以單行别刻纔百數十而已余夙嗜藝文至于拮据唐業頗極苦心購募殘編鈔謄秘錄之外凡散見諸書附載羣集稍堪巻軸靡不窮蒐摠之不盈三百之數間閱宋人書目有製作至繁而字里行藏邈無可考者嗟夫昔之文人學士平生精力咸萃兹途當其馳驟名塲飛揚藝苑隻辭之懿半簡之工咸以紙貴雞林價傾洛下孰不懸衷結念宇宙自期詎意零落異時遽同草木鴻函鉅櫝散若晨星充棟盈車鞠為黃壤此太史所以蹲躅於名山元凱所以欷歔於片石者也夫一綫尚延千秋如在義存後死忍没前規因據三史藝文五家經籍以及列傳野記之中凡遇編名輙加捃拾芟除複襍融㑹有無具列兼收以貽同好夫載籍云亡姓氏昭灼後之君子披覽斯文興言曩哲倘可以慰作者于九原遡遺風于百代如曰踳駁淆亂速朽為宜則杜李以還例應焚擲余固亡所容余喙矣青芝稿序芝之靈于羣卉也則古以瑞稱矣三秀之柯􅂱􅂱煌煌陳於合宫薦於清廟肖其形摹其事而侈諸四方卽五尺童子有弗徵其瑞者乎而吾以芝之靈也匪僅瑞于一世已也厥有大於是者焉增城閬風𤣥圃羣玉諸洞天福地絶㝠之巔無底之壑日晶月英磅礴輪囷勃然而芽蓊然而茁如道家者流亟稱五芝之屬樵靑牧豎所不能窺達官貴人所不能逢而明王喆后所不能必致惟列仙羣聖時得茹之壽至與元化相畢此其瑞固以百千萬世計者也而匪僅僅焉瑞於一世已也厥今之業儒者起佔􅖶奮賢科往往績三載之勤乘一戰之捷大者君剛成侯平津次亦序鵷鴻驂驥騄經綸際九域而黼黻橫八荒非芝之陳合宫薦清廟而五尺之童共徵其瑞者乎周之雅魯之頌楚之騷漢魏晉宋之樂府五言唐之歌行近體絶句作者人與代偕逝並遐而姓名族里亘于今而為烈彼其帶礪湮鐘鼎蝕而片言隻字之懸於大造愈乆而愈無窮若是者將無列仙羣聖所茹之芝百千萬世以為瑞者也噫瑞而計諸百千萬世幾於無何有之鄉廣莫之埜驟語之乎少年鋭進之夫彼執以為詼彼執以為幻將羣然而譁而誚而侮而孰從信之葢余讀余郡張生詩而異焉張生用善于宋太史公為同里瑰葩逸藻挺出于輩流甫弱冠緝詩成帙而命以青芝是固弗沾沾一世而蘄瑞于百千萬世者也匪直惟弗譁且誚且侮而已余讀生詩一再過光黯然而幽色黝然而蒼味泠然而沖雋然而旨厥有當于芝允矣輙因其請之力也而序以復之二酉山房書目序自羲皇畫卦書契肇與周衰仲尼轍環列國退而定六經程百代說者以為墳籍之始余考緯書古文開闢以至獲麟葢三十七萬餘歲云諸史如合雒禪通之屬絡繹繁夥至帝皇封禪文字萬有餘家仲尼觀之不能盡識則上古之書其數不可勝紀後世迺謂三代以前無書可讀者不深考之過也秦不師古燒燔詩書項氏繼之咸陽三月先王典籍實始蕩然漢興除挾書律武帝表章六經諸子往往出於破壁壞冢不數十年而劉向氏七略遂至三萬五千餘巻非古人述作素盛故掇拾煨燼存者尚如此哉王莽之厄至於東京班氏藝文視前僅三之一厥後魏晉六朝兵革劻勷􅥐燬􅥐收不盈七略之數元嘉中謝靈運摠萃書目六萬餘巻齊王儉所録萬五千七百巻梁任昉二萬三千一百六巻昉儉並稱博洽與靈運時代相次不應多寡殊絶葢靈運總萃一時所藏而昉儉芟除重複故也隋嘉則殿藏書之富至三十七萬餘巻其正本亦止三萬七千惟開元帝累葉承平異書間出一時纂集及唐學者自著八萬餘巻古今藏書此為極盛趙宋諸帝雅意文墨慶厯間崇文總目所載三萬餘巻累朝增益巻不盈萬宣和北狩散亡畧盡至淳熙四年書目成乃得四萬餘巻葢歴代帝王圖籍興廢聚散之由大都具矣夫以萬乗南面之尊石渠東觀之富通都大邑之購求故家野老之獻納而累朝著録不過如此葢後人述作日益繁興則前代流傳浸微浸滅增減乗除適得此數理勢自然匪力所强也至薦紳先生博物君子收藏遺書若張華之三十乘任昉之四萬巻鄴侯之三萬軸宋公垂葉夢得尤延之代稱宏富大略相當若漁仲氏之志略端臨氏之通考則又槩録前人不必代之所有家之所藏也余嘗總覽歴代藝文以及諸家所録而參之當代經則十三家註疏外丁孟夏侯傳授僅著空名其餘六代以還流傳絶少惟宋儒諸說盛行海内大槩存者十三史則二十一代類梓於太學單行於各州編年自荀恱袁宏至司馬朱氏不過數家而諸起居註實錄野史之類傳不能半大槩存者十五子則老莊列氏外宋鈃關尹淮南吕覽盛行星厯䜟緯間多湮没而漢唐宋諸小說紛然畢出傳者殆十之八惟詩文諸集六代以前甚寡唐宋至今迺始大盛而最不易傳卽唐詩八百餘家宋人有得五百家者余方極意搜訪手抄集録僅得二百餘家文集則唐以前存者不過數十家而宋元諸名公不必能文之士皆有集行世迨今尚數百家而國朝尤盛葢世代逺近然也余自蚤歲營心載籍累銖積寸至四萬有餘巻雖今人所自為書居三之一倘有以釋道二藏來售者盡鬻負郭之產以當之則余家所藏幾可與前代等不可謂非布衣之幸也第凡物盛必有衰聚必有散卽前代帝王名公鉅儒竭天下之力畜之而一旦且散軼而不能保則余今所得庸詎可據為已物因略敘其意錄四部書為二酉山房書目藏於家少室山房集巻八十三
