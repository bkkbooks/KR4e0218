body:
  text: 少室山房集巻一百眀胡應麟撰策一首問士稱文章學問尚矣顧前代以文章稱者其途有二以問學稱者其途有四其目可悉陳與其人之專門名家者可悉數與三代而下有能總括而薈萃之者與眀養士二百餘載理學事功無論亦有文與學名者與亦有能兼此二端者與近世有詆文章學問為枝葉而託之乎空虛性命者以覈於周公仲尼之道然與否與諸士懐才待試有槩于中夙矣即昌言劇論主司固樂聞之毋諱才之難于天下也匪贗才之難也而真才者之為難匪偏才之難也而全才者之為難夫隋侯之珠代不一遇而蚌胎盈目和氏之璧世不一覩而碔砆塞塗萬物盡然也而矧于人乎此贗才衆而真才所以難也輕清之形靡不覆幬而或虧西北重濁之軆靡不持載而恒缺東南造物且然也而矧于人乎此偏才盛而全才所以難也夫真才之難一代不累人而全才之難尤累代不一人無惑乎文章學問士弗多見于天下而空疎謬悠竊性命以自文其陋也愚請厯陳其槩並擷其人而折衷于周公仲尼可乎夫士也艶稱于世非以其椎朴無文執鋤犁䂓什一下同于畊農坐賈也又非以其浮夸無實絶文采屏見聞竄迹于黄冠梵流也蓋古今言士自道徳事功外其途轍槩有二焉執事所課文章所謂學問是已文章者上而皇帝王覇之謨下而神聖賢喆之撰逺之而彌綸宇宙幽之而感格鬼神亡弗賴焉其功用若是大也士亡貴乎文即六經咸虛說矣問學者上下古今之迹百家衆技之方禮樂聲明事物之煩鳥獸昆䖝草木之細無弗貫焉其統括若是備也士無貴于學即六藝咸虛文矣夫文以闡乎學學以博乎文二者未始不交相用顧天之生才有限士各以其性質所近而專門名家于是工撰述者以文章名務淹貫者以學問名而其途始分而文章之體非一為之者徃徃極于力之所到而時之弗及乗于是或剽意詩歌或殫精紀述而文章之途復析而為二學問之道非一為之者往往困于資之難兼而日之弗暇給于是或以經學名或以史學名或以典章經制名或以百家小說名而學問之途復析而為四以文章之士言之春秋則檀楊左史公榖荀卿韓非屈原宋玉漢則賈誼董仲舒司馬遷相如揚班枚李六朝則曹劉阮陸潘左陶謝唐則王勃李白杜甫韓愈陳子昻栁宗元宋則歐陽修王安石曾鞏蘇洵軾轍黄庭堅陳師道是皆卓乎以文章師百代者也然或長于敘事而短于持論或工于古選而詘于聲詩或富于大篇而艱于小絶即文章一體尚不能㑹其全而各極其趣况兼二者而時出之也而欲以其餘而究極乎學又可知矣以學問之士言之春秋則公孫僑萇𢎞倚相漢則東方朔劉向歆馬融鄭𤣥六代則張華束晳郭璞皇甫謐王肅陸澄劉炫劉峻唐則孔頴達虞世南歐陽詢顔師古李善杜佑宋則徐鉉徐鍇劉敞沈括鄭樵馬端臨王應麟皆赫然以學問著一時者也然或優于經術而典故未詳或核于史書而幽隱未洽或博于徴事而名理未精即學問一道且不能該其二以及其三兼四者而悉備之也而欲以其餘而肆力于文又可知矣即其中若史遷之紬繹金匱劉向之直諒多聞揚雄之究心竒字韓愈之博極羣書非不羅百氏于文辭也而吟咏則非長若陳思之綜核天人景純之注釋蟲魚子安之辭邃五雲杜公之書破萬巻非不蒐羣彚于詩賦也而紀綴則未極是數君子者上下千秋最為傑出其得其失且較然若此而况乎其下此者也眀興聖化作新人才蔚朗醇備于國初優游于宣化勃興于𢎞正博大于嘉隆若伯溫季迪仲黙昌榖子業于鱗敬美助父眀卿之于詩子允希直平仲賔之克勤仲鳬徳涵允寧道思伯玉之于文以絜古作者之途亦既纚纚乎可觀矣若介夫仲深元眀應徳才伯窒甫之于經于史子淵用修子元子衡非言叔心之于子于集以較諸古學者之途亦既琅琅乎可述矣顧其所就猶之乎各擅一長自名一家未有能緫括前人超軼往代者也至于浦陽之文稱博洽矣而勝國餘風纎艶未掃尚慊于詩北地詩文稱並媺矣而六代以還典籍未覩何有于學瑯琊崛起呉㑹文則根極漢史而出入貞元詩則風骨建安而鎔情大厯以至邃古之遐踪昭代之經制蟲魚之瑣屑科斗之瑰竒無弗肆而覈曲而通焉庻幾乎齊驅左馬杜韓追美僑𢎞向朔矣惜其于文則尚缺于史于學則未暇于經也夫獨造而不能兼該固前人之所短自開一堂奥自立一門户亦眀代之所闕也蓋前人當特起之運天肇其機人殫其力故偏至非難而兼長並茂為難眀文承累代之餘蹊徑無餘矩矱偹極故總統非難而特出創造為難時也勢也亦莫非才也然此特論于三代之下也等而上之不有元聖如周公其人乎材美冠天下而驕吝不形藝能髙一代而吐握不暇多士無逸諸篇委縟而真至七月東山諸什典厚而沉深周禮一書四方百物之具陳何其肆而隱也爾雅諸訓草木昆蟲之備舉何其賾而該也不有大聖如孔子其人乎經天緯地以為文致知格物以為學風雅之陳爻象之係詞人皓首弗能窺書禮之刪春秋之作文士一詞弗能贊而問禮問官學琴習射對商羊辯萍實讀泰岱之竒文識防風之巨骨神遊六藝之精而統括之無外心通萬物之表而周晰之無遺是二聖人者誠命世之真才萬古之全才文章學問之極而士所亟當誦法者也迺漢唐以後諸君子亦豈可遽少哉精凝于一而志于必傳神運于先而矢于必達網羅百氏以為業羽翼羣聖以為功其自信于中有俟之百世之後而不惑其自得于已有投之千乘之重而弗顧其造詣雖有淺深其成就雖有鉅小均之無負真才之名永肩不朽之寄誠桀紂之威武不能屈祖龍之烈熖不能焚者也柰何近日冐士之名者畏惡其能而且自揣其弗能至乃欲以虛名髙之逺宗主静之禪機近述良知之骫說以詞章為雕餙以文字為浮華詩書名物問之茫然曰六經皆注脚也秦漢君臣詰之莫對曰諸史皆陳編也其意若甚𤣥而可喜其言若甚簡而易循其自處若髙于子貢有若而究其指歸探其藴奥曾不足以焚香洗鉢于小乗之門伐薪汲泉于外道之側而方且居之不疑岸然左氏所謂太上欲羣天下之豪傑而下之嘻其亦甚矣其亦悖于周公仲尼之道矣吾意二聖人多材多藝多能多識當不若是之墻而靣膚而立也藉使二聖者詩書易雅之無傳禮樂春秋之無作而吾且信其能為而能弗為也何也彼其天聰眀之盡决非椎朴無文𤣥虛無實者倫也謂二聖之道盡于文與學乎固不可謂文與學而無與于二聖人之道乎則尤不可繇今之道則大易所謂往行前言顔之所謂博文曾之所傳格物思之所稱問學孟之所推詳說皆一舉廢矣下而子貢游夏之文學况雄通愈之著述其於聖門堂廡無復歩武之望矣為之說者求其故而不得于是陸氏楊氏以周公仲尼其過不可枚舉王氏輩以文王孔子逺出堯舜之下其說愈新其詞愈誕使天下之人敢怒而不敢言大駭而不敢致詰甘為之下而習聞其論者狂易反走飛揚跋扈而莫知底極有志之士太息流涕痛哭欲究正其故而往往阻于其道之不相入嗚呼彼誠惡夫周公仲尼開文學之端文王之諡而為文孔子之大而能博不若堯舜之精一執中也吾不知堯舜之精一于庖羲氏之畫卦庖羲氏之有畫于天皇氏之無言而上而盤古而混沌其等可一一差别耶若是則秦始之焚書功烈當首乎三皇漢髙之不學道術上崇乎五帝梁武之餓臺城逺勝放勲之殂落蕭繹之談老子迥邁杏壇之設教而即其羣剽而隂習者老氏何以有道徳五千之文釋氏何以有大藏五千之富也吾聞老聃氏之史柱下藏書溢于九丘吾聞瞿曇氏與外道角各習其道而勝之而後出其上而大弟子阿難以多聞為苐一彼其說則誠異端其才亦必有過絶于人者未聞有所弗能有所弗知而後謂之上乘絶詣也吾聞老􅅨莊周列禦冦之文簡奥而宏深洸洋而竒肆吾聞法華華嚴楞嚴圓覺維摩氏之書博大而要𦕈周遍而精㣲彼其中亾意于文然而曷嘗不文也其道弗專于博然而曷嘗不博也今之儒者自佔􅖶世資外茫乎昧乎含哺鼓腹太平之世則亦已矣何至視筆札為仇讐以載籍為疣贅摽同伐異造作名字㝠心閉目樹徒扇黨其流相引而不已其禍循環而無端不至于楊墨之横議代厲之縱横弗止也此雖東晉清談諸君子且未能揖讓其間而况江都河汾之閫域伯淳元晦之緒餘哉若是則為今之士宜何若而可曰周公仲尼其道大其徳備其才全士之極也漢唐而下諸君子其業精其見確其才真士之次也近世之髙談性命以自文而中無所有者士之贗也才之蠧也士也以贗者為戒以真者為師以全者為極文章則發攄道術學問則翊衛聖經不用則寄之立言而道統眀用世則飭之吏治而功業起庻幾乎周公仲尼之徒在是彼空談性命者將自愧自艾之不暇而詖滛邪遁不得以說為天下禍矣此余鄉貢嵗塲屋時義也當時命題者意有所屬風簷下漫爾信筆偶座師直指呉公閲及大賞之錄程式中自後余浮游江海原巻棄擲久矣辛卯東歸檢拾故篋覩程錄此篇在焉其詞間有泰甚皆呉公筆削之餘所存余語不過十之五六余巻既無從校覈重以呉公筆不忍舎旃輙據錄梓巻終匪以存余語實以存呉公筆也䇿問二首兵機問兵非盛世所諱譚也迺古今稱善用兵往往不可以一端泥嘗試與諸士商之違令者誅師律也穰苴行之莊賈矣迺鄧羌于王猛顧以邀賞而策勲將違令者有不必誅與梗法者戮軍政也魏絳行之楊干矣迺許厯于趙奢顧以請刑而奏績將梗法者有不必戮與穆公之釋孟眀非以使功不如使過耶而狄青破南蠻以僨軍之必罸也安在于過之使也武侯之縱孟獲非以攻城下于攻心耶而叚熲平西羌以窮冦之必追也奚昧于心之攻也君命弗受漢文所以勞細栁偉矣而髙帝單符直馳廣武之壁謂淮隂將略而出亞夫下吾弗信也敵虛必乗宋武所以克廣固竒矣而文皇大衆竟扼髙麗之墟謂任城將畧而出太宗上吾弗知也陸戰用車一也衛青以武剛走老上馬隆以偏箱討樹機一以攻一以守而皆破敵胡後世弗能遵歟水戰用舟一也關羽以艨􅀈虜龎徳岳飛以舴艋殄楊么一以巨一以小而皆獲俘胡後人弗皆濟歟此其轉移呼吸違行若氷炭而明效捷鼓桴豈運用之妙存乎一心成法有不必泥與將事機夐異非紀載所能悉歟爾諸士夙諳韜鈐當必有燭照于衷者時務問昔人亟稱識時務則存乎俊傑矣夫俊傑未易言而時務未易識也聖朝建都西北與邊境隣東南實維財賦之域頃關白訌于海楊酋横于川國家竭東南民力從事二方幸天子威命爽靈服斃其處顧識者以關酋雖殄餘黨尚存彼其不得志于朝鮮將無益導吾之無備而出吾之不意吾所為飭勵于東南者何可後也楊酋殪矣而安氏諸姓恃功耽耽不乗此時講永賴之策踵楊酋者㨿其巢窟復爾横行東南將士何時而息肩耶越故稱君子六千肅皇帝末訓練張皇摧鋒㝢内曩二三狂狡脫巾潢池賴當事諸臣厥辜咸伏兹東戍解嚴南旅旋撤何以使之帖然閭井亾復隱憂歟天下方金甌全盛而人情洶洶造孽興妖靡有寜日大都東南不逞之徒而越諸無賴為之嚆矢所為逆折姦萌而濳銷釁罅將何道而後善凡此數端皆時務至亟誠不可不逆計于前而預圖于後爾越故東南首藩諸士必有以俊傑自期待者其詳著于篇少室山房集巻一百
