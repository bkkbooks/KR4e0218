body:
  text: 少室山房集巻六十一明胡應麟撰七言律詩七十首暮秋舟次南皮故人太末趙宗魯以别駕經略河渠邀集行館話舊并命小奚撥阮放歌酣暢達曙即席賦贈二章長夜髙齋坐緑苔扶風名郡近蓬萊中丞海岱傳髙節太史河渠録異才月影似窺桃葉下風聲如和竹枝來誰言百里淹騏驥滿眼黄金碣石臺促膝談心宛故廬雕欄香閣夜躊躇千家海色堯封近九派河流禹鑿餘嘯引雄風來大陸歌延明月下前除腰間漫詫䖍刀在咫尺甘泉攬珮魚留别宗魯别駕二章河橋霜落片帆遲握手平原佐郡時共道賔遊新北海那知名蹟舊南皮毫揮五色霞飛動劒擁雙鈎霧陸離一笑主人情不淺蘭橈先訂隔年期宗魯署在泊頭驛東偏河西南皮皆漢魏故蹟蕭蕭寒雨菊花晨握别那堪衛水濵愧我尚為浮海客知君元是濟川人滹沱雪淨千門曉渤澥霞明萬樹春廿載羊裘仍大澤東風愁色話垂綸重九前一夕宗魯攜具泛舟中流月光澄徹千里如練命北部樂人合絲竹二奚童以南音佐之丙夜改席登臺暢飲主客咸潦倒濡首復泛舟奏樂而歸二首縹緲滄波浸緑苔仙槎搖曳見蓬萊登髙不為重陽住送逺仍攜片月來夾岸旌旗縈舸艦飛空鐃吹動樓臺驚心後夜河橋别彩筆頻将麗句裁古樹寒花夾細莎玳筵銀燭照清歌城臨大陸飛霜蚤舟放中流得月多鼓瑟似逢湘女下抽毫如覩洛神過不緣别馬風期逺誰解沙棠泛綠波九日舟次吳橋過顧生樓船夜酌即席賦古道垂楊映緑莎中流横吹咽清波黄花九日淩霜發白苧三秋並雪歌朔氣乍傳金柝冷秋光遙墜玉繩多朱門豈必非同調大有才人挾瑟過寄周文學懋修余客嵗過吳門宿其齋頭聴懋修歌自製吳歌甚適二首郭外尋君繫短篷蘆花深映夕陽紅江東似爾真公瑾吳下何人更阿䝉淅􅅹商風迴錦樹飛揚春雪和絲桐紙窗竹屋青熒處苦憶疎燈夜半同沙棠遙下越江濆握别垂虹幾暮雲胡廣自慙東漢譽周顒寧負北山文風前郢曲陽春度雪後吳歌子夜聞三畆太湖容客住荷衣行赴白鷗羣與狄明叔别十載邇来舟過清源凡三繫纜俱不及晤特紆道訪之南郊黄河南下半飛沙一别旗亭髩已華𤣥閣千秋揚氏草青門五色邵侯瓜頻年罷擊霜天筑幾度空浮雪夜槎聞説玳筵歌吹滿春衫行醉碧桃花狄明叔後房姬侍甚都而新畜小鬟十餘合奏南劇尤為賔客艷慕先是余未及覩特此訊之十斛明珠燕子樓白櫻桃下最風流爭誇靜婉腰圍細每憶嬌嬈態度柔買處赤繩頻繫足歌來紅錦半纏頭龍鍾定逺龜兹外底事當年筆浪投戲柬張刺史仲立咫尺刀州近帝都為官何事執金吾青袍懶逐唐先輩墨綬爭迎漢大夫越賈三千饒泛宅齊姜十萬盡當壚騷人一借循良傳莫訝南皮舊興孤張時為清源守送林貞耀擢嶺南大㕘慷慨芙蓉拭劒鋒飛揚雲色射雙龍留題竺國三千界倚嘯羅浮四百峰驛路梅花春浩渺郊原棠樹暮従容那堪大纛錢塘外把袂河梁急暮鐘張孝亷話舊作濟上相逢話獨長燕山迴首廿年强聴鶯日醉鞦韆陌走馬時穿蹴踘場厯落雄心摧倚劒蹉跎華髮付沾裳前驅為謝諸年少曽是新豐白面郎為曾人倩題風木樓日慘天垂大庾陰樓居人去白雲深千秋尚記靈椿祝百折常懸寸草心砌裊餘花増悵望窗搖殘葉助悲吟枝頭夜夜啼烏宿腸斷西陵月下砧寄歐太史用孺曽内史明吾雙飛龍劒隔天涯五夜干将映莫邪客自西清傳起草人誰東閣代宣麻㕘差玉珮聨清漢突兀金莖駐彩霞囘首長安猶尺五不堪魂夢到霜笳任城待閘再柬龔觀察子勤二首髙牙猶矗岱雲間松色徂徠墮翠鬟北望燕幽饒大陸東迴齊魯半名山中流鼓吹洪濤靜逺岸樓臺碧海閒一代循良寧乆借春風明月向朝班繡斧霜天羨獨持百城民吏候朱旗宫牆曲阜摳趨日郡郭瑯琊眺望時李杜詩篇千古並唐虞文字萬家遺風流漫詫銅鞮絶幾度南池岸接䍦太白樓杜陵南池並在濟上岱宗亦僅百里餘寄懐徐㕘知二律時君尚駐淮沛問十載元龍興未頽使君髙誼重徘徊爭傳大纛臺端借不道孤帆闕下囘千仞吕梁雲縹緲萬山芒碭日縈洄浮家莫話鴟夷事愁絶鄉書限大雷時余以家君乆不得問故暫歸一舸晨移越海濆邊淮林葉正紛紜飛揚使節持滄水憔悴親闈望白雲世業乆傳中論就家聲猶借太𤣥聞由來國士身堪許夜夜湛盧刷斗文桑園晚泊民家籬菊盛開因寄宋通侯忠父苦憶東京宋子侯嬌嬈歌曲擅風流金花燦爛縈金谷玉樹玲瓏照玉樓西第壺觴頻嘯傲東園車馬盛淹留一尊何日長安市醉揷霜華任滿頭夏鎮得家君手書寄謝相國趙公一律客舎何因戀采薇親闈長日夢魂飛猶欣太白陪明月漫訝中台隔少㣲龍衮乍開新鳯闕羊裘聊問舊漁磯春風咫尺長安道拂曙蘭橈度海圻王通侯世叔與余訂約同舟余以諸故人挽留未發世叔解纜先行特駐濟上為岱宗之遊以相待寄謝此章突兀徂徠控斗躔如雲車騎去飄然行窺紫氣天門上坐倚紅輪日觀前吳越封疆千壘盡云亭壇壝萬家傳蒼松百尺遙相迓一笑秦皇避雨年舟抵留城追世叔説仲聞已達淮上矣十日侯門醉玉壺西山晴色滿燕都蹉跎上國停車盖縹緲秦淮下舳艫調合雙龍詩思逺愁牽獨雁旅魂孤遙知王粲従軍樂繞夜霜華照鹿盧登鄒觀察彦吉鬯閣望九龍諸山古檜新篁浥霧濃芳池晴色照芙蓉雕欄紫翠飛千雉畫棟丹青列九龍搦管登壇春雪麗銜盃開閣暮雲重何因結社精廬畔杖履名山日過従彦吉構新居甚華整晉陵勝概咸在目中七夕張汝元諸君醵金見過命樂工奏南劇申旦乃别令節過従正女牛天河斜挂越城頭髙賢總逐雙星聚大火初當七月流玉樹階庭懐乍遣金蘭湖海興難酬清歌爛漫紅妝出秉燭風林盡夜遊輓吳鴻臚年政八秩彩筆淩雲帝座知投簮旋赴鹿門期三朝宦迹疎𤣥靖一代人倫重紫芝鶴駕乍飛緱嶺日魚竿纔棄渭濵時佳城鬱鬱黄山畔淚盡階庭玉樹枝後重九舟過姑蘇再泊葑門訪周文學懋修夜集坐有善歌者即令歌懋修所製新詞余醉憩齋頭達旦登舟為别喬木吳閶帶淺莎子雲亭下即烟波那知九日黄花艷重聴千秋白雪歌霜色乍侵羅袂冷月光偏向玳筵多亦知古寺寒山近愁絶鐘聲夜半過武林夜泊雪大作晨起柬陸履素使君蕭蕭風色晚来嚴淅􅅹天花照畫檐粉署亂飄雲母屑雕盤斜拂水晶鹽歌成宋玉才情麗論就桓寬政績廉咫尺段橋春思近蚤梅何處吐幽巖履素時司鹽鐵入武林再柬陸轉運千騎東方皁盖從雲間才望舊人龍金銀佛寺遊三竺鹽鐵官衙寄萬松送客湖頭青嶂逺懐人天際碧雲重桃花樹樹長堤上憶醉精藍靜夜鐘汪明府行春阡陌寄柬行春車騎寂無譁人識仙郎上漢槎谿澗芝蘭初綻萼郊原桃李競開花飄颻玉舄攜雲氣縹緲瑤琴弄月華却笑當年勾漏令賜金何以問丹砂夏日同諸君訪黄元樞于禹鈞刺史邸得中字蹤跡頻年悵轉蓬披襟聊此坐雄風平原十日心期在河朔千秋意氣同南郭几凭朝雨後西堂簾巻夕陽中無論異日黄香譽明月雙懸射彩虹夜同詹東圖邵道卿過禹鈞元樞邸即席作妙舞清歌出玳筵一尊攜手醉花前藜然劉向談經夜草定揚雄作賦年話舊總深天竺雨烹新重醉惠山泉不堪明夜河橋别憔悴雙龍劒色懸詹癖茗事有醉茶軒賀曽方伯遷左二首燦爛除書絳闕來㕘差紅日近蓬萊河山十二分齊甸浙中凡十一郡一州城郭三千控越臺大樹帝思馮異績甘棠人憶召公才那知鼓吹西泠畔剰有閑情賦緑苔􅂱􅂱雙旌瑞氣濃湖天晴色半芙蓉楓宸黼黻三孤近薇省衣冠百吏従瀔水當年符借虎豐城遙夜劒成龍誰言陜服棠陰舊突兀黄金近九重曽君舊守吾郡而家豫章王中叔擢北部歸省天台以尺素相聞賦此代餞時永叔乞假里中二首除書遙逐夏雲來希白齋空賦浪裁突兀螭頭還漢殿飛騰驥足上燕臺桃花滿路迎仙客棣萼分庭對上材爛漫瑤池金醴熟早攜青雀赴蓬萊仲叔倅潤顔其署中軒曰希白有賦傳於時三山迴望暮雲平巖石嬴鐫傲吏名玉漏乍趨新建禮金波猶戀舊承明帆拖霧色臨滄海斾擁霞標向赤城一笑季方重握手夜床風雨二龍鳴中叔先任南曹今擢北部故頷聨云云王水部招集署中熒煌銀燭照窗紗握手新知鬢未華忽向西園吹桂樹渾疑東閣玩梅花崢嶸四岳排青漢突兀孤峰逗紫霞署傍有四古石甚竒中一峯特髙秀錦瑟沈沈春滿座何須蓬島問仙家伶人奏劇適歌陸浚明珠記戲成此章呈水部朱門何事濫吹竽玳瑁筵開繫白駒是處雲霞聨趙璧頻年風雨泣隋珠華名第一歸仙客髙價無雙得麗姝美酒十千􅂸盡醉共将行樂賦山樞仙客無雙俱劇中語無題戲為義山體兀兀匡床旅夢遐銀屏珠箔思無涯陽臺作客千峯雨漢苑懐人九陌霞舊恨經年迷錦瑟新愁頻夜泣悲笳桂堂東畔天如水空結同心咏上邪唐明府長公以詩札見貽賦答二律浪迹山川信短笻塵埃十載笑疎慵聲華郢上推唐勒詞賦雲間識士龍囊草雲霞飛薜荔劍花星斗濕芙蓉無論咫尺神交易不忝鍾期異代逢繡虎經年識姓名飛鳬遙夜入承明詩篇六代誇彭澤文學千秋擅武城突兀山河留間氣躊躇天地話同盟看君赤羽登壇日粲爛雙龍匣底鳴林貞耀觀察以先集新草見貽賦謝飛書遙羨筆如椽滿握驪珠破夜眠三世青藜千載業一時𤣥草萬人傳星辰劍色延江外山水琴聲越署前尚記阿咸林下醉風篁搖曳夢魂懸再入武林柬王水部并懐蔡南宮瑯琊門閥擅三吳攜手燕城醉玉壺尚記南宫鄰北􅇅那知東閣傍西湖簾櫳夜月飛吟嘯船舫春風入畫圖誰道宦遊鄉信隔長洲咫尺在菰蘆曩在燕水部與南宫寓所僅隔牆頭右方伯曾公過訪賦贈二首十二岩城坐嘯中湖天晴色畫船空薇垣鎮靜周方伯棘寺飛騰漢上公環珮乍看燕闕底旌旗曽閃越臺東猶憐竹馬爭迎日屈指黄金召次公突兀髙牙大海傍分符猶憶舊黄堂兒童是處誇騎竹父老經時識種棠北闕絲綸催曉露西泠絃管競斜陽雙龍總屬司空珮幾夜寒花拂劒鋩讀唐明府竒樟公傳作亭亭蒼盖立莓苔彩筆偏宜太史裁四海競傳枯樹賦千林重覩大椿材低枝乍挾虬龍動老幹遙驚鸑鷟來見説三珠瀛島上可辭飛舄向蓬萊送趙鈞父之都下黄金臺下暮雲平首躡騊駼問去程帝里聲華馳孝穆相門經術重𤣥成秋風大壑潛虬化春水長天畫鷁明莫道平津猶臥閣三台遙夜映吳城方仲闇招同袁履善張汝元黄元樞陳忠父遊湖上髙梧飛葉菡萏盛開舟行樂甚即席賦背郭名園一徑幽佳人同載大堤頭千花别浦猶呈艷萬葉平湖盡報秋夾岸軒車紅霧裊飛空絃管白雲流沙棠後夜仍堪共方外無勞問十洲袁履善過訪余報謁秋湘館則先一日避暑入虎跑矣泚筆題此章芭蕉莖上毋以為嵇生之鳳也野外𤣥亭翳白茒朱門猶帶夕陽敲尋僧何處開龍藏避客經旬住虎跑掩徑寒松飛雨集當簷脩竹亂雲交従知叔夜疎狂甚片刺無勞續解嘲贈王秀才有序秋夕遵考冬官招飲署中坐命嗣君出迓文恪公四世孫也握手階庭意氣懸雙瞳秋水照華筵熒煌玉樹三朝後奕葉瑤華四世前江左烏衣元上座山陰鴻筆舊如椽髙臺百尺雲霄近翹首飛黄入薊年陸使君邀集淨慈作湖天晴色照樓船酩酊桃花又隔年皁盖徧留三竺頂青鞋時曳萬松前塵埃司馬裘空敝海岱元龍榻尚懸莫向鹽車談吏隠黄金臺色正蒼然過任侍御池亭留奕達旦菰蘆何處一留連握手任安意氣懸八郡風稜持斧日三山霞色爛柯年梅花慣覔湖頭寺桃葉頻呼渡口船莫訝秋宵銀漏促分行雲髻簇華筵寄周懋修文學并懐殷無美職方飛書遙下楚江濆錦字横題白練裙作客瀟湘頻望月懐人閶闔幾停雲紅顔總擅當壚曲黑髮先傳吿墓文最是滄浪亭下約不堪魂夢繞鷗羣懋修訂余卜居吳中與詹東圖别十載餘邂逅武林邸中乞余所著詩藪余拉其繪事為報戲贈此章廿載都門醉濁醪重逢岐路興偏豪攜書笑我非麟角落紙看君盡鳳毛君名景鳯中岳亂雲秋夢逺少林深雪夜禪勞殷勤且趂吳山色對握如椽望海濤詹别號中岳余以邑有嵩髙嘗自稱少室山人追和黄侍御滇遊詩冊有序夏日過友人黄禹鈞第仲氏元樞出示先大父滇遊詩一帙李于鱗徐子與謝茂秦皇甫子循方君九敘施君峻諸名流遺墨咸在焉瑯琊長公一篇盖其弱冠時作風骨已自錚錚吾邑章黄門适七言律亦整緻不後諸君而今集似不載且章集中餘詩備出此下豈文字之傳真有幸不幸耶然此篇大類李于鱗或一時同社稍為櫽括也元樞力丐余追和余于諸君惟元美子與石交餘率未面而臭味風期不啻蘭艾且黄君先大父夙與家大人同朝余雖晚未及把臂即一時文士麏契若斯趣尚固可概見因課一章并占綴數語巻末而蜀州散帙之感不能不悵惘于暮雲斜照中矣朱旗搖曳度丹梯白筆輝煌下紫泥宇宙忽看銅柱外山川遙問鐵橋西猿聲九驛催龍劍象迹千崖送馬蹏咫尺風流庭樹在緗縑吟眺夕陽低秋夜遵水部招同錢山人蔡文學集署中其前庭古桂數株皆合抱芬馥襲人時遵考瓜代将及矣握手青袍戀舊綈華堂風霧酒頻攜梅花東閣傳新賦桂樹南山憶舊題古樂府南山一桂樹萬壑天香靈隠近中峯月色廣寒齊淹留莫唱王孫曲赫奕徵書到紫泥薛㕘知過訪奉贈蓬門千騎寂無譁肯向鹽車問渥洼海上雙龍新氣色河東三鳳舊聲華旌旂日閃錢塘樹鹵簿霞明瀔水花咫尺寒光牛斗近支機何用望仙槎黄貞父過訪寓中余報謁已計偕北上矣握手蓬門話太𤣥如雲車騎去飄然長鳴騄駬燕臺上淡掃蛾睂漢闕前是處名山藏彩筆何人流水和朱絃花枝爛漫平康下好趂春風十日眠俞聲父餉書萬言推挹深至殊愧過情搦管附酬并期見過破浪雙魚下越來何人攜擲向蒼苔開函尺璧飄虹氣伏􅌴千金滯駿才流水胡麻尋玉洞俞君有玉石岩志名山靈藥問瑤臺莫嫌元禮門風峻五夜𤣥亭闢草萊三楚盧使君過訪時以考績抵武林五馬風行治蜀年歡聲馳頌使君賢重飛八咏雙溪上舊事三閭七澤前畫鷁髙秋停霧雨蒼龍遙夜揭奎躔明光上考親題後爛漫黄金漢闕懸盧文學以寧親來婺中賦贈祁陽郡公子也意氣翩翩接雁行遙従朗潤識盧郎軒車此夕留河内閥閲先朝重范陽貫日干将虹慘淡淩空毛穎雪飛揚神交未極班荆思目斷錢塘一水長送王思延還洛中兼詢陳别駕耀文崧髙雲色正嵳峩拂袖言歸故綠蘿三箭流星傳紫塞片帆飛雪渡黄河従余結襪心猶素羨爾投簮髮未皤問訊潁川癡别駕君苗焚筆近如何贈楊不棄山人楊工書畫篆刻風致甚髙二首淨几明窗照緑蘿鍾王遺迹自摩挲雙鈎忽覩唐貞觀八法爭傳晉永和碣石譚天新塵尾嚴陵披月舊漁蓑彈歌漫作馮生歎剰有黄庭換白鵝畫史曽聞顧虎頭詩情重覩鄭台州揮毫白練霜風起研濯紅絲霧雨流篋底靈文傳趙璧尊前竒氣問吳鈎羊裘莫漫披燕邸昨夜星芒動斗牛賀趙仲子擢秋官作圖書東壁正逶迤環珮西清更陸離六翮驟飛鵷鷺省一毛曽占鳳凰池香含太乙雲霞擁漏聴長楊日月遲奕葉𤣥成門第逺併将經術報彤墀賀李廉訪本寧初度二首紫氣朝看越海屯加餐消息徧乾坤文章一代靈光殿閥閲三朝建禮門北斗轉依南極耀長庚偏傍太㣲尊方城漢水看如昨大業桓文次第論北斗用泰山北斗語東方千騎擁華筵金粟如來下降年黄菊盛開重九後丹桃長熟小春前明堂共倚材如棟藝苑爭誇筆似椽為駕青牛還漢闕書成函谷已流傳時重九後十日王冏伯至武林以彚輯武矦全書見貽卒業賦梁父當年澤畔吟千秋魚水坐談深成湯聘後聞三顧大禹征來見七擒渭水飛揚平寇畧祁山憔悴出師心風期奕世朱絃在史筆煩君次第尋鄭太初明府過訪賦贈先是明府大父光禄君與惟敬惟寅及余輩結社長安今三十餘載故人寥寥獨光禄巍然晚境并此寄懐聲名藉藉重璠璵賜履飛騰上玉除文舉通家三世後仲宣驚座萬言餘花香檇李連公廨栁色柴桑近故廬咫尺髙堂人健在新篇光禄定何如少室山房集巻六十一
