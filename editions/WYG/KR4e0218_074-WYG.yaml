body:
  text: 少室山房集巻七十四明胡應麟撰七言絶句八十二首再送茂卿還晉陵四絶句同童山人子鳴作草色蕭條六代宫故園囘首嘆飛蓬秦淮一夜西風急落盡芙蓉細雨中客裡黄花别季鷹清秋殘葉洒孤燈歸帆憶爾江城下半夜潮聲泊廣陵楚塞吳關望裡賖遙遙雲水接蒹葭秋山何處幽期近縹緲峯頭一片霞揚子汀洲起暮潮片帆南下雨蕭蕭他年共訪蘇臺月攜手垂虹百尺橋寄陳稚冲一絶緑髮青袍易水涯東風頻過酒人家為言上苑三春雪何似長干二月花唁陸茂才二首謝家庭樹正蘢葱莫擬探環向别藂白玉樓中題記罷他時來作顧非熊潦倒青氊氣未除莫將流淚洒長裾聊堪剰取雙眸在老向西河學著書别惟寅入燕四絶星散交游二十年兩人相對白門前西風無賴長干栁吹送千條上别筵白鷺洲前白浪高飛帆晨發廣陵濤浮雲萬里燕臺上擊筑何人伴彩毫十載酬知淚未忘攜來爛漫洒河梁愁人最是秦淮曲月落霜飛上去航片席遙分大海流寶刀持贈若為酬黄金臺舘三千尺截取長虹寄石頭黎秘書劉觀察劉金吾丘計部李環衛周明府康茅朱三山人出餞即席賦駿骨黄金且未哀飄然裘馬賦歸來河梁日暮驪歌發囘首高天郭隗臺滿坐青山照客装風塵憔悴舊荷裳吳鈎莫問尊前色白日長虹墮太行四海論交碣石宫一時攜手向西風惟應别後嚴陵釣千尺重懸大海東高天擊筑暮雲屯大陸飛霜滿薊門莫向塵埃慚浪迹十年詞賦在乾坤寂寞妖姬舊酒樓南歸金盡鷫鸘裘隂符匣底猶堪讀可怕機前少婦愁潞河舟中再别惟寅裕卿汝修絶句五首時余将由越適楚雨色荆門樹樹哀武昌黄鶴暫徘徊西風玉笛危樓上萬片梅花落酒杯亂山臺殿楚江頭極浦蒹葭夾岸流二十五絃湘水瑟月明何處不堪愁神女祠前落日低祝融峯外亂雲迷那堪重作高堂夢萬樹清猿岳頂啼一望巴陵楚嶠分木蘭舟上雨紛紛中流無限瀟湘色日落君山起暮雲衡岳千峰霧裡看洞庭波色照䦨干揚帆自為青山去漫擬當時白雪寒華陽雜咏八首垂虹嶺萬仞危巖古木低翠屏迴合上丹梯桃花流水無人問一路猿聲夕照西小石梁雲際飛梁壓水開翠巖丹壑自縈迴捫蘿欲記天台路片片青霞屐底來水雲洞積雪蒼茫澗道分空林麋鹿自成羣夜來洞口飛泉過流出西巖幾片雲武陵洞雲壓重崕午不開石門烟雨䕶莓苔分明記得秦時路曾到仙源採藥迴涵碧池池上藤蘿歲月深半空寒影動青岑攜琴欲冩瀟湘意夜夜蛟龍水面吟浴雲潭絶壑東迴鳥道微隔山流翠轉依依西風落日空潭上滿地寒雲濕不飛飛來石片石巑岏倚怪松清秋寒雨滴虬龍苔深不記飛來處疑是崆峒第一峯步虚臺縹緲天都十二樓銀河遙望不勝愁何因醉逐飛瓊語謫向人間五百秋西湖竹枝歌四首四山樓殿鎖清秋一水縈洄島嶼幽咫尺蓬瀛休道遠畫船簫鼓在中流聽樂魚龍出渼陂學飛鳬雁繞昆池青林半鎖瑤臺暮緑浪平鋪畫舸移倚棹汀洲草色齊迴船濤浪滿蘇堤萬家楊栁青門外一片芙蓉緑水西雙鶴徘徊幾夕陽孤山雲水似瀟湘重遊好探東風信萬樹梅花艤雪航送胡文父還匡廬五首爾去匡廬第一峯翠屏千疊紫烟重何時共拾金光草對倚青㝠跨白龍秀出香爐萬嶺西遠公精舍夕陽低憐君我欲逃禪去相逐寒雲住虎溪棲隱峰頭樹色分傳書遙寄紫陽君一聲鐵笛千林晚片片桃花落彩雲聞説年來李夢陽青鞋曽遍踏蒼茫扶笻何處天池近指㸃銀河百尺長九疊雲屏霧雨餘海風江月望來虚攜書倘逐青蓮興乞取匡君舊結廬挽陸文學一絶廿載青衫閲歲華殯宫遙映夕陽斜春風何處山陽笛落盡棠梨萬樹花湖上即事二首一派笙歌擁大堤春風攜酒畫橋西囘鑣競挽青絲騎蘇小門前栁色齊垂栁朱門十萬家青帘紅斾各年華蘇小墓前寒食近碧桃無主亂飛花渡錢塘七首一夜天風挂海濤雪山零亂舞江臯輕舟忽渡錢塘水萬仞扶桑日色高赭龕迴望兩山屯天削銀屏障海門白浪晝看三百里不知誰喚伍胥魂濁浪東排萬里天平分吳越海雲前憑誰為乞支機石坐擁浮槎到日邊十二樓臺倚碧空安期亦在紫雲東璚車笑指相逢處摘取蟠桃萬樹紅江色浮空四望遙青山斜倚木蘭橈何人共擊中流楫散髮迴看大海潮十載長安祇浪遊揚帆東蹴海天流含毫秋鬭思光賦萬壑魚龍起暮愁坐擁輕橈入亂山蓬萊東望彩雲閒麻姑是處堪攜手重疊秋江倚翠鬟夜發錢塘以風濤迅甚次日遂抵桐廬暮雲飛盡海門開越客扁舟萬里迴一片青山濤浪裡不知帆過子陵臺裕卿業與余為錢塘之約余以歸計迫不及待輙畱一絶飛流如雪洒篷窻一夜離心擁去艭囘首不堪相憶處千山明月滿桐江登釣臺四絶重疊嵐光倚翠屏天風吹客上危亭持竿試著羊裘坐何處長安有客星挾策初從帝座囘繫舟重上子陵臺峰頭日暮狂歌發萬里浮雲海色來欲向桐君話隱淪千峯寒色對嶙峋青袍可是遊燕客不染𤣥都半樹塵百尺綸竿俯碧流危䦨天半夕陽愁山靈似識攜家意十里魚龍送客舟邦相遊爛柯不遂戲為四絶詢之底事雙鳬向碧空洞天重疊鎖芙蓉虚疑王質雲中去仍見王喬縣裡逢乘風百級上莓苔樵者峯頭喚不迴何似歸尋胡伯子石屏霞譜為君開當年仙訣妙通神下子蟠桃十度春一自移居蘭水上爛柯巖畔更無人一局纔從石上看人間千日已闌珊何如共載溪頭酒剰作平原百遍懽問喻邦相病四首閉閣經旬卧起遲青山長日對支頤吏人莫訝休文瘦政是初成八詠時名姓曾聞在赤城衙齋一卧萬縁輕惟應剰取清羸骨白日飛鳬上太清十年歸卧茂陵居長日惟删舊著書最是漢庭憐汲黯病來猶得伴相如爾閉高齋送夕陽余愁肺病卧空床何縁對挾飛龍去萬仞青天坐石梁題方山人聽秋軒宻甃疎欞翠篠中碧天遙挂二梧桐何時自挾蒲團至坐領堦前萬葉風齋中繪五岳為圖稱卧遊焉各系以詩泰山玉殿瓊樓起太空扳藤遙上碧雲中中宵不辨星河色萬丈天門海日紅衡山拄杖飛蘿上百盤狂吹玉笛和青鸞囘看月色千巖吐不道峰頭日是廣寒嵩山遠下崑崙度玉華黄河九曲照三花空明洞底無人住散髮中天弄紫霞華山太華三峰削不成巨靈高掌矗咸京相攜玉女朝天去朶朶蓮花足下生恒山絳節迴看上帝臺金莖雲霧接蓬萊不知碣石青何處萬里氷天雪色來秋日南軒櫛髮忽數莖斑斑焉漫題二絶志感未到潘年已二毛胡床箕踞白雲高猶勝寓直秋風裡寂寂寒更賦騎曹緑鬢全抛舊日容一菴秋色照䝉茸憑誰試摘三千丈挽取羲和駕六龍七月十五夜小亭翫月尊酒憑䦨客思孤萬家明月對氷壺不知簷外秋多少一夜飛霜下井梧謝章儀父惠家釀二絶玉碗香飛琥珀明自呼南斗吸長鯨河清莫道今難俟已換王家月旦評一飲揮毫一百篇何人真是酒中仙應知他日來民舍不飲麻姑石上泉送人之㑹稽問水看山興未涯十年瓢笠寄烟霞青鞋夜宿雲門寺好趂千峰向若耶秋日寄友人山中白雁丹楓盡作行霜天何處問重陽東鄰老衲歸來晚靜夜猿聲到竹房寄洛中友人濁酒青絲照玉壺信陵公子對呼盧狂歌莫問燕臺客零落秋風傍狗屠寄張鍊師搆得茅齋傍玉華芙蓉伏火鍊丹砂清秋絶頂朝元夜白露千巖溼桂花韓逸人西遊二華持扇索題戲為書一絶句時韓寓余城東豆蔓松花䕶客居半床雲色半床書西遊何處燒金液太乙峰前舊結廬送人入蜀遠下荆門客思濃清秋落木遍千峯猿聲一夜孤舟雨愁殺巫山十二重送何生遊邊翩翩書記向龍堆白草黄雲大漠開落日固原飛檄少題詩頻上赫連臺寄黔中劉從事崔嵬銅柱亂峯前迢遞鄉書隔歲傳醉卧桄榔明月底不知人在夜郎天秋日送人之䕫州黄牛峽口暮雲愁白帝城前江水流落日片帆秋色裡千山行盡見䕫州少室山房集巻七十四
