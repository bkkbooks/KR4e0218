body:
  text: 少室山房集巻九十九眀胡應麟撰辯十二首五霸辯學者多譚五覇而不得其說于桓文之外于是取昆吾乎夏取豕韋取大彭乎商以合乎周之齊晉而五之自遷史夏商本紀既絶弗載而春秋秦漢雜傳子書又往往掇拾其一而軼其二三是以後世之惑滋甚盖余讀汲冡紀年而始得其說焉夫覇之取稱其大㫖二諸侯而有勞王室錫之茅土俾專征伐而人服之若文王之為西伯是其伯伯以功也諸侯而弗共王室恃其强大自專征伐而人畏之若共工之伯九州是其伯伯以力也自徐偃宋襄攘竊仁義卒以削亾為天下笑而戰國之君盛以甲兵土地相凌于是乎孟軻氏大明王道以辟之而覇之云者衹以為尚力之事槩之三代盛時之所謂伯迥不侔矣考竹書所紀三氏其始之伯也要皆得之于功而其末之亾皆失之于力者也夏仲康六年錫昆吾命作伯帝芬三十三年封昆吾氏子于有蘇帝厪元年昆吾氏出居許帝癸二十八年昆吾氏伐商三十年商師征昆吾三十一年商克昆吾此昆吾氏之始末紀于竹書者也夏孔甲元年廢豕韋氏使劉累豢龍帝昊元年使豕韋氏復國商外壬四年邳人侁人叛河亶甲元年彭伯克邳五年侁人入于班方彭伯韋伯伐班方侁人來賔祖乙元年王即位自相遷于耿命彭伯韋伯武丁四十三年王師滅大彭五十年征豕韋克之此豕韋氏大彭氏之始末紀于竹書者也合前後而較之昆吾也豕韋也大彭也其詳不可得聞其興滅之大都槩以具矣夫昆吾氏之覇覇于仲康之代而亾于桀豕韋大彭之覇覇于亶甲祖乙之代而亾于武丁夫昆吾氏其興弗可考自彭伯韋伯之命于商而昆吾氏可知也大彭豕韋其滅弗可考自昆吾氏之黨于商而豕韋大彭可知也然則世之談五覇者以其始之以功覇而合之桓文乎則可以其末之以力覇而合之桓文乎則弗可夫桓文固尚力而厥功實弗容掩也迹三氏于始則類迹三氏于末弗類也是昆吾大彭豕韋齊桓晉文之說也伯翳辯三代而上史書名氏之譌衆矣其最大而可疑可疑而弗可弗辯者亡若伯翳之與伯益自史以伯益佐禹以伯翳先秦司馬貞張守節等並疑其謬而莫能援眀証以折衷之故厯世紛紛迄于今伯翳伯益為二也夫使伯翳伯益若共工倉頡栗陸容成鴻蒙雲將齧缺之屬荒忽茫昧而不足有無則可誠禹之佐舜之輔而秦之先則其人所係世道何如者而可弗定于一也史遷秦本紀云大業娶女華女華生大費大費佐禹平水土輔舜馴鳥獸舜妻以姚之玉女是曰栢翳為秦之先夫禹作司空天下之大任佐禹濬川天下之大功藉令非伯益而别一人則尚書載之當參咎陶伍稷卨矣今考虞廷臣庻四岳九官十二牧輩靡不具載于書而伯翳之文獨不經見以史所稱平水土者質之乎書則偕奏鮮食益事也以史所謂馴鳥獸者質之乎書則掌火作虞益官也然則尚書所云伯益非伯翳而誰耶秦紀所云伯翳非伯益之誤耶蓋伯與栢其音同秦本紀作栢翳益與翳其聲近故史記誤以一人析而為二猶幸乎其人雖二而其事則一也然而大費之云又胡以稱也則吾嘗讀汲冡紀年而得之竹書紀啓即位之二年費侯伯益出就國夫史記先稱大費復稱伯翳伯翳為人名則大費為國封矣大費為國名則伯翳為伯益矣即竹書一簡而伯翳伯益大費舉不待辯而眀而司馬貞張守節皆置弗道彼索隱者惡在其為索而正義者惡在其為正也少康中興辯春秋戰國之世文士之好竒不已甚哉自古中興之烈亡大于夏少康者粤自襁褓之中已蒙大難流離竄匿四十餘載迄以一成一旅復夏舊物而光大之彼其﨑嶇有虞仍鬲之間所為布徳兆謀蓋將靡所不極而史遷本紀盡逸其文後人求之弗得遂舉離騷天問荒忽謬悠之說以實之夫夏自太康距于夷羿寒浞簒于有窮中間喪亂因仍世已三易而浞與過澆狡力相資滅斟弑相跨據都邑視王莽桓𤣥之禍弗啻十倍豈一刺客一虞人之任哉少康履厯僅見左氏而首末弗詳惟汲冡紀年差備復夏之事苐言伯靡自鬲帥斟鄩斟灌之師以伐浞世子少康使汝艾伐過殺澆伯子杼帥師滅戈少康自綸歸于夏邑其事雖不可詳考要皆王者正正之師至如離騷所謂襲女岐縱田犬則絶不見于簡編也離騷所問蓋齊東里社鬼巫虛墓之談屈子放逐無聊感而筆之以問後世世儒不能辯斥而好竒如沈約者义引之以釋紀年遂使少康靡艾萬古中興之績下仝孟嘗郭觧之儔余不得不辯之文丁殺季歴辯劉知㡬史通云汲冡瑣語稱舜放堯於平陽而書云某地有城以囚堯為號識者馮斯異說頗以禪受為疑又云汲冡書稱舜放堯于平陽益為啓所誅又太甲殺伊尹文王殺季厯凡此數事語異正經其書近出世人多不信也按舜之放堯文之殺季無事别說足驗其情已于此篇前後言之詳矣夫惟益與伊尹受戮並于正書猶無其證㩁而論之如啓之誅益仍可覈也右皆劉語按汲冡書目云瑣語十一篇諸國夢卜妖恠相書也則璅語之書大抵如後世夷堅齊諧之類非雜記商周逸事者也其書自隋唐志外諸家書目咸所不載盖自汲冡既出之後旋就湮沒可知惟紀年載太甲殺伊尹沈約固疑為後人所增至文王殺季歴乃商君文丁非文王也考劉史通前後議論一以春秋亂臣賊子䂓度賢聖故妄意文王得位亦如商臣許止之為而弗詳考本書恣其毁衊真所謂言偽而辯記醜而愽者其能免仲尼之誅乎夫即劉引紀年鹵莽舛譌若此則所謂璅語云云尚足信哉西伯辯自文王釋羑里之囚紂錫之弓矢得專征伐世遂以文王為西伯至戡黎一事咸曰文王是舉將以震紂而萌其悔心也噫文王三分有二以服事殷仲尼至徳之嘆蓋惓惓焉一旦甫釋囚繫而輙有戡黎之舉若句踐以美女豢呉而兵隨其後者孰謂文王之德顧為是耶且紂當文王之時三仁未亾天命未絶諸侯八百未㑹而文王遽稱兵以獵其郊視後世亂臣賊子舉晉陽以清君側者復奚異哉元儒金吉甫氏獨引膠革之言直以戡黎繫之于武而文之心始暴白于天下萬世然膠革之言足以証西伯之為武而不足以証戡黎之為武也余考汲冡竹書帝辛四十一年西伯昌薨四十二年西伯發受丹書于呂尚四十四年西伯發伐黎自武王之立以至殷亾始終西伯之外無别稱焉于是始信戡黎之舉灼然出于武王而文之以服事殷没齒皦無纎芥可以刷百代之疑矣金氏前編多引竹書獨兹事關涉非𦕈而紀年所載彰眀較著特為愉快人心而偶未之引豈考覈有所末至耶夷齊叩馬辯甚哉三代而上史氏之說之不足憑也司馬遷列傳七十而首伯夷而其傳伯夷也始之以逃堯之文卒之以伐紂之諫蓋厯數百千年未有核其實者也夫讓王之謬有識槩能辯之獨叩馬一事其所關涉甚鉅宜其所紀載特詳乃遷所取証茫無一焉而世之儒者萬喙一詞即愽渉自信如宋羅泌之流亦僅啓其端而其說迄靡竟也夫三代之書遷所取証者六經孔孟之外國語短長莊列韓呂數子已爾孔子于夷則賢之矣孟子于夷則聖之矣而未嘗概叩馬之事也孔子于夷稱其餓矣孟子于夷述其清矣而未嘗概叩馬之言也采薇一歌足發眀武未盡善而孔則刪之食粟之恥有大于弗聽惡聲而孟則置之揆之事理胡刺謬也先秦之文詳于識文武者宜莫踰左氏勇于非湯武者宜莫踰莊周而左國諸書談者弗引莊列諸書引而弗言書出于漢之後而足以証周之前者汲冡而汲冡諸篇又始終無一語及也然則叩馬之諫大史所采據果何書也夫三代之書其傳于後世常寡而三代之迹其軼于上古常多至聖賢大節未有不具載于六經而互見于子史者若之何合六經諸子諸史而茫亾一証也故吾斷以為夷齊無叩馬之說也然斯語非遷創之蓋戰國遊談之口而遷信之大果也夫戰國之談其起于見夷齊之遜位而遂疑武王之有爭聞夷齊之居周而遂疑伐紂之當沮因委曲傅㑹而為是與夫叩馬一節在夷齊誠優為而君臣父子一言足以樹天地古今之大戒顧以之垂訓則偉而以之紀實則疎也則君子之讀斯傳者尚亦取其言而姑畧其事也哉仲尼曰伯夷叔齊餓于首陽之下餓之云者蓋以夷齊遜國而貧弗若景公之擅國而富曷嘗謂餓而死也夫孔子餓于陳蔡靈輙餓於翳桑而皆未嘗死胡首陽之下夷齊獨死于餓也食粟采薇其因餓之一言而附㑹歟夫武王非愎諌者二子之難難遜國弗難叩馬難無怨弗難采薇莊周稱夷齊之成陽見武伐殷曰天下亂周徳衰不若避之遂至于首陽之山因餓而死此太史之說所從出然莊生滑稽口也而亦愈可証其無叩馬而諫之事矣東遷辯蘓子瞻論周之失計莫甚東遷而以靈王神聖諸侯服享為証此但據子朝之書而弗及詳論其世也靈王之世孫􅑔出君而莫能討崔慶弑君而莫能誅陳生伯輿争政而莫能斷至假列國大夫以聽訟于王庭其紀綱名分幾于蕩無一存矣榖洛之鬭王欲壅之太子晉之誎可謂切深而王卒弗能用也終其身政事可見者聘后致命于齊而已神聖服享惡乎在哉善乎唐李翺之言也神堯以一旅取天下後世不能以天下取河北夫唐之弗振豈亦東遷之罪也夫太子晉一言晉人遽欲舉侵地而返之俾弗蚤死而君天下即成宣之治可驟復衰周之末胡以蔽失東遷哉鄉先達范茂眀作東遷辯眀周失計弗繫此亹亹數百言其説大備即子瞻復起莫能奪矣獨所謂髭王神聖諸侯服享二言蘇氏引以証東遷之失者未有說以破之余恐後學于史傳弗深考尚為眩惑故詳覈其世以補浚眀之遺夫靈劣諡也春秋諸侯諡靈若陳若晉若楚其君皆不道之甚迺鬚王神聖服享而獲諡為靈何也即二語不足徴而以周之弗振委東遷謬矣餘說皆范已得之吾是以弗及麾蓋䇿馬辯呉眀卿肥城縣重修關侯廟記云侯嘗麾蓋䇿馬刺顔良萬衆中語誤甚按陳壽三國志於闗侯本傳云望見良麾蓋䇿馬刺良于萬衆之中斬其首而還其句讀當以麾蓋為句屬上而策馬刺良文屬下句麾蓋者如韓信與趙戰汦水建大將旗鼔之類東魏髙敖曹攻宇文泰建旗蓋以臨陣魏人盡銳攻之一軍皆没蓋大將行兵率戴兠鍪被鎧甲混卒伍中庻不至為敵餌若建旗蓋履前茒一為敵人所識叢而射之萃而攻之無弗立斃矢刃者如劉宋殷孝祖自負誠節嘗履行陣中軍中謂之死將卒殪流矢張廵欲射尹子竒而不識乃以荻為矢敵得之馳白子竒隨而射之喪其左目齊神武再攻宇文有識神武所在者以白泰泰因亟選壯士十人配賀拔勝以攻神武幾獲之唐李晟錦裘繡帽以奪敵心李懐光銷其餌賊即大將行兵可見當時良不建麾葢則萬衆中何繇别而刺之凡熟史學者此等入眼瞭然呉第習聲詩而未暢今古誤則宜也張飛字益徳辯世說劉孝標注引蜀志張飛字翼徳今志不爾亦傳寫之訛也陳壽三國志關盪㓂表字雲長一字長生張車騎飛字益徳而無别字元末市井演義訛益為翼世人童孺習觀而正史反髙閣束之遂不復知演義之謬據關侯本傳孔眀荅雲長書論馬超云當與益徳並驅爭先又飛傳據水斷橋云身是張益徳也可來决死司馬公通鑑所載並同元好問唐詩鼓吹李商隱詩云益徳寃魂終報主阿童髙義鎮横秋其本集亦然自唐人未嘗以益為翼也宋洪景盧夷堅壬志第七巻論張益徳廟云蜀車騎將軍張益徳廟元在遂寧之涪江又引王景文夷堅别志云雲安夢張益徳甚白亦見夷堅七巻此條之下是宋人未嘗以益為翼也近王長公關忠義論乃有孔眀翼徳之文此蓋錄者依傍演義反以益字為誤而私易之長公斷不知也緣翼義于飛稍軋故舉世雷同不知古人字義類有不可解者即如蜀諸臣黄忠漢升徐庻元直字皆不𨽻于名詎容億逆余嘗戲謂必欲名與字協曷若以翼徳字闗以雲長字張耶談者為一大噱河伯辯馮夷之為河伯其說逺矣好竒之士讀張眩惑紀載實繁即特立自信君子亦但斥言其妄而未嘗不以河伯為水神也乃余讀竹書紀年而得其說焉紀年載帝芬十六年洛伯用與河伯馮夷鬭夫洛與河國名也伯爵也用與馮夷人名也謂河伯河神則洛伯洛神耶夫洛伯能與河伯鬭矣胡用之為神寥寥後世而馮夷獨稱耶觀泄十六年殷侯以河伯之師伐易則河伯為諸侯而馮夷非神鬼昭昭矣穆天子傳河宗栢夭為穆王乗副車導之極於西土而後返則當時栢夭亦造父賁戎之屬扈從穆王者藉如後世所謂魚身人首何以周旋天子之側哉夫九歌屈氏之寓言而秋水莊生之幻說本未嘗謂實有且絶不道馮夷之名而茂先愽物成式酉陽從而為說以實之吾不可以不辯亦幸而得之竹書也西王母辯山海經稱西王母豹尾虎齒當與人類殊别考穆天子傳云天子賔于西王母觴于瑶池之上西王母為天子謡天子執白圭𤣥璧及獻錦組百純組三百西王母再拜受之則西王母服食語言絶與常人無異並無所謂豹尾虎齒之象也山海經偏好語恠所記人物率禽獸其形以駭庸俗獨王母幸免深文然猶異之以虎齒益之以豹尾甚矣其無稽也竹書紀虞舜九年西王母來朝獻白玉環玦則西王母不始見於周時莊列俱言西王母亦不言其詭形惟司馬相如大人賦有豹尾虎齒之說蓋據山海經耳乃山海經則何所據哉因讀穆天子傳漫識此為西華解嘲倘大荒之外果有其人當命三鳥使邀不佞閬風之頂浮大白三百賞余知言也二女辯山海經云洞庭之山帝之二女居之是在九江之間出入必以飄風暴雨按二女之辨厯世紛紛景純獨謂天帝之女似為有見苐云湘川不及四瀆堯女既為舜妻安得下降小水而為夫人此又首尾衡决之論夫堯女舜妻不當下降小水迺天帝之女不尤貴乎總之荒唐悠謬無事致詳也考二首唐天策十八學士考世傳天策府十八學士以唐一代人才盡此然當時隱太子及齊王元吉各延攬相傾秦邸不能兼得也按史武徳初太子建成與秦齊二主勢位相軋爭致名流以自助太子則詹事李綱竇軌庻子裴矩鄭善果友賀徳仁洗馬魏徴中舎人王珪舎人徐師模率更令歐陽詢典膳監伍璨直典書坊唐臨隴西公府祭酒常挺記室叅軍事庾抱左領大都督府長史唐憲秦王有友于志寧記室叅軍事房𤣥齡虞世南顔思魯諮議叅軍事竇綸蕭景兵曹杜如晦鎧曹褚遂良士曹戴胄閻立徳叅軍事薛元敬蔡允恭主簿薛收李道𤣥典籖蘇幹文學姚思㢘褚亮燉煌公府文學顔師古右元帥府司馬蕭瑀行軍元帥府長史屈突通司馬竇誕天策府長史唐儉司馬封倫軍諮祭酒蘇世長兵曹叅軍事杜淹倉曹李守素叅軍事顔相時齊王有記室叅軍事榮九思戸曹武士逸典籖裴宣儼文學袁朗及從弟承宗然則秦邸幾有雲臺之數亦不止十八也内顔思魯師古相時父子兄弟褚亮遂良父子薛收元超淹如晦叔姪一時同與盛矣唐十八學士像贊考天策十八學士像閻立本寫今藏兵科中舊在大内相傳永樂中收付兵科每詹翰諸臣供事廷試者必留飲科中索一玩以為故事萬厯初周公瑕游燕中得摹本知巻為沈存中家物而跋尾書迹頗不逮因補錄之瑯琊兩王公俱有跋大學士淮南李公介弟子毓刻之石嘗以一本遺家君余及見之存中跋謂圖中名字官秩與史多不合如姚柬字思㢘史作姚思廉柬之蘇壹陸元朗薛莊史皆以字為名李𤣥道蓋文逹于志寧許敬宗蔡允恭史皆不字房𤣥齡字喬年史以房喬字𤣥齡孔頴達字仲達史以為字頴達蓋唐書成于後人之手此乃當時紀實者也右皆存中跋語然以余所見圖中最可疑者莫如顔相時圖載相時字師古按史師古相時兄弟也師古字籕相時字睿師古亦為秦王府文學聲實出相時上而天策之選不與相時傳新舊唐書皆云武徳中與𤣥齡等為秦府學士舊唐書瀛洲事未復言相時有兄師古紀載甚眀當時在選决相時無疑而以師古為字存中博極羣書諸學士官名仝異悉考列跋中此其大矛盾者胡絶口不及嘗意摹本非存中之舊後人因筆談所載按其名字與史異者贗作斯圖而不知相時何人以為即師古也苐存中所考史傳亦自多互異唐書薛收傳以為圖像而思收存中以為思收而圖像按收四年入館至七年卒以劉孝孫補之未圖象之先孝孫已召入為學士不因思收始以孝孫補也新舊唐書褚亮傳俱以贊亮作杜如晦傳亦云而存中以為于志寧考志寧傳不言此然亮及志寧各有贊其語殊不類自為藉如傳及存中言則二人必居其一並可疑也存中引蘇世長召對𤣥武門上譏其名長意短以蘇為學士日改名按史世長入唐髙祖責為屯監尋引見𤣥武門與語平生因調之曰何名之長而意之短此時世長未嘗入秦邸存中蓋誤以髙祖為太宗唐書孔頴達元字仲達不云字頴達也存中素名淹洽而所取証咸抵牾若是蓋全憑記憶不檢􅉺書考之前輩往往病此眀楊用修亦然余恐後人取信存中將史傳漫不復徴是又與齊楚得失無以異轍叅訂是非而並存之俟異時學士定焉少室山房集巻九十九
