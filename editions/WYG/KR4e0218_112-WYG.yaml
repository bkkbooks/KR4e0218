body:
  text: 少室山房集巻一百十二明胡應麟撰書牘二十三首報王中丞先生客従婁江持雙赤鯉至剖之素書在腹封識宛然知葛仙翁以是月朢日寄我者也新詩字字欲飛函闗紫氣閬風朝霞自不當以漢唐凡格論嘗夷考古昔才人列名謫籍若李供奉之長庚杜拾遺之文星典吏白舍人之海山使者皆烜赫可徵迺其仙去之後間有篇章往往不逮存日豈詩必窮而後工一躋通顯涉要津無論欲界清都鈞有才盡之厄耶以今觀于執事而知二三子之才不盡于人間而盡于世外猶之乎非才之極也否則傳記所稱二三子之得仙有未必盡然者即如執事一旦奉上帝御書為五城十二樓長將製作遂侔化工異時續成四部于鈞天之臺萼緑吮毫蘭香和墨智瓊捧研騰楮價于七襄耀文光于八極庸詎若長吉小兒受帝命賦白瑤宫迄無片語隻詞流傳人代耶聞次公小需次作闗西夫子便欲挂冠聚首之期逆計不逺東方生所記聚窟鳳麟洲儒家者流每謂謔浪究竟得之耳目間漢武皇而在今當無不與同時之恨矣晨起值三青鳥海上旋敬附尺箋于五雲閣下再報元美中丞不聞笙鶴之音又閲月矣瑤池大羅咫尺人世東南中山弇遂與海上三神無異顧安得如費長房持葛陂九節杖乘風馭雲飛入壺公白玉樓也厯稽古今才彦往往見忌造物小兒羇旅窮愁疾病夭折悉是其常無足嗟怪甚而戮辱不免其身何以故取精泰多取名泰劇消息盈虚更倚互伏昊穹定數孰能踰之且秦漢以還證道之士非童年屣脱室家遺外一切則壯嵗萍棲草澤屏息萬緣彼其于世味毛髪染指便無復登真之望固未有優㳺百順極紛華鉅麗之享于人間而又㕘峙兩儀握悠久靈長之柄于物外者惟是執事江東望族髫鬌青雲父子弟兄奕奕蟬冕重以文章之妙姬孔千秋學問之宏威文六合兹又接引上元印心大道永漏岱宗之籍長居建徳之鄉竊恐司命之君將愈益不勝其忌雖然天以古今全盛之材縦執事矣則亦安能不以古今全盛之算畀執事今而後即㝠㝠之中欲有所簸弄顛倒知小兒伎倆不足當王先生一吷矣迺若一時艷慕之儔稍覩末光頗聆緒論而人人自謂大丹可得黄金立成端簡朝元刻期拔宅至以東南仙聖洊至八百之多者應麟竊又以為未然夫升洙泗之堂不必皆顔冉比唐虞之屋不必盡巢由故耼老著書惟吐舌于闗尹牟尼設敎僅灌頂于文殊固知學者牛毛成者鱗角百代接踵一士比肩不然胡喬松而後冲舉之證寥寥楊許以還宗派之傳落落也臣之少也亦嘗妄意兹途鋭情往籍既而屠龍愒日畫虎彌年荑稗未登蒲栁先撥神明耗竭齒髪變衰深惟根株鈍弱運數涼蹇馳驅不朽之場已為溢分覬覦長生之業切慮無階每攬觀九命所陳時復三嘆自失何敢以蟣蝨規圖園綺蟪蛄等夀昆騫哉伏惟執事丹臺之上屢賜手援竊計髙真紫府之前或垂齒錄而度徳量力徘徊中宵實所未厭故寧求觀于小道無使見笑于大方執事者將亟賞其自知之明為復亟哀其自畫之陋也信筆縷縷不任主臣青雀西来尚毋金玉弇州書来云僕已辦兩青鞋作西歸津梁計不意中道為易遷宫所邀然𤣥闗一竅大較非異足下仙才也有意捐夙障従我㳺乎與少司馬王公夏五附小狀水曹属車駕北征竟以原札返舍卧病衡茆海内交知聞問闊絶燕鴻吴鯉河山邈如尺一之訊久蔵笥箧乍者驟聞留都大司馬之命中夜躍然如執事曠刼人豪即九州之長奚當一吷然而斯舉也生色詞林吐氣文士即不為一身一家慶能無為盛世得人慶也應麟仰藉寵靈株伏以来體氣漸平飲啄無害惟世念益灰冷將移家金華窮谷中為石羊君供伐薪汲泉之役惟是二親斑白下寡弱息旁無幼弟徘徊顧戀未即飄然邇以丹元子告疲并聲韻蹔束髙閣竊懼一旦溘焉為門牆羞因稍稍檢拾故所論著十數家災之于木庶㡬楊氏之𤣥中間抉幽摘遐剔訛糾繆頗以一斑自信即古人閎鉅之業未敢覬心較近日用修之鹵莽差謂愈之属剞劂未完新嵗之春當持以奉獻也間嘗竊謂文章學問本非二途無論左馬杜韓人皆淵洽即六代唐初風軌具存自宋熈豐趣尚浸異迺一時博雅尚有其徒𢎞正諸賢號稱復古操觚雲湧而咸以讀書為戒至有晉魏以還茫然心目者噫是詎可聞于鄰國也故不肖妄謂國朝文章之盛㡬軼古先而學問之衰無逾晩季至于嘉隆𤣥談日沸即豪特之士崛起其間而属辭者虞譏于堆垜多識者取誚于支離不有執事出而挽之將恐兩家者言浸淫無極天不生仲尼萬古如長夜虚語乎哉不肖夙抱此懐以時多枘鑿未敢誦言今惟一吐于執事之前且巻而懐之以俟異世矣六詩過䝉奨飾彌匪所安仲黙于鱗千秋一出即代興迭王明徳方隆奚小子之敢覬覦惟執事不靳深教庶㡬竭蹶趨之不一謝司馬王公石羊生傳書卧疴京口兩辱手書厚徳榮施迥逾骨肉而鄙劣姓名濫叨鴻鉅千秋百代快覩身前今而後所不以九死餘生奮蹶竭趨圖國士于萬一非夫也南中閒局即本兵重寄未足展命世才旦夕璽書趣召大拜樞衡稍出緒餘膏澤㝢内俟三千八百功滿行圓然後拔宅紫霄乗風玉清即仙籍中且將列銜無上區區人間世駒隙蠅頭詎足㸃之眉睫也與大司寇王公伏中褦襶名園留連浹日邃閣崇臺雕闌畫楣金碧熒皇炫耀心目而荷颸蘭馥侵裾襲履松聲竹色盈觴夹坐皆非復人間世往籍所志洞天福地類以浮艷過實等之寓言迺今耳目覩記殆軼所聞矣六月之杪僅抵故廬二親在堂兩孩繞膝青緗萬軸薄用自娱間有呻吟大都倦逰所得加以藥物之餘意氣澌盡知大方壇坫不足當一笑也伏惟晉秩南都崇遷八座國朝文人學士度越宋唐獨名位逺却執事者實始兼之暇日登鳳皇之臺揮如椽而引大白千秋著作將遂併廢一朝不肖足疾稍瘳秋杪扶藜躡屫􅍷蹩髙牙快覩羽儀之盛不知珠履末行肻一厠㑹稽狂客否也與王司寇論丹鉊諸録客嵗三狀起居俱未獲垂報殊極悵悚豈鴻鯉浮沈將大教奪冗未發耶自我公晉陟崇班蒼生拭目門牆末士踴躍昌勝想像留都燕間建朱節震華鼓釃酒大江弔古雨花鳳臺畔無論六代諸君即李供奉久擅金陵王氣今且却步三舍區區孫仲謀劉寄奴輩徒豪舉一時胡足道也新春伏惟台候萬福靈光一柱南極一星撐拄照臨大千世界盖九州之内華封之祝有同心焉詎直鄙人私慶而已麟自客夏病歸沈痼就平慈顔奄背創深痛巨㡬不欲生深惟千秋不朽之權有海内鉅公在冬杪倘能扶曳當擔簦負笈候命閽人計執事不靳餘輝榮賁幽壤也病中檢摭稗官十數種生平佔􅖶概見大都其半剞劂麤完尚多未備急于教削先此上呈中間數􅗡稍稍舉正丹鉊諸録曩讀用修書絶嘆以為國朝不可無比讀晦伯書則又絶嘆以為用修不可無惜繩糾所得僅十之三因取厥義例増而廣之得失是非方册具列不敢俾用修之誤復誤後人竊惟當世子雲無逾執事故敢悉効其愚不知千慮之餘時得一否雖然執事今方深入無諍㳺心太初談堯舜于戴晉人譬猶一吷而况乎區區齊魏之爭奚異乎蝸之左角也雜啓長公小牘九通臘盡以家嚴命强起涉淮属徐沛運艘旁午鷁首復東中途改嵗將觀燈于廣陵雨阻弗克仲春抵𤓰步晨渡大江遙望金陵宫闕神爽翼翼㡬欲奮飛迺賤軀瀕死之餘步履趻踔加以僮僕流移一水盈盈邈如天塹惟是清宵魂夢恍忽髙牙大纛間比聞憑軾趨南中者日以千計龍門之盛絶古今益嘆鄙人之瓠落也二某於詩歌即結髪従軍大小百戰而僻處海邦進寸退尺曽不足稱王夜郎擁衆扶餘而敢妄希壇坫之盛惟近所著詩藪内外四編頗竊自信管中之豹盖生平精力畢殫此矣昔楊中散著書以俟後世属當世無子雲耳世有仲尼子淵殆庶㡬且附驥顯矧師友淵源未及㳺夏者耶數朝計已卒業知齒牙餘論匪所惜也三執事之于文章也前無昔賢後無来哲内苞函夏外徹裔夷聲譽之隆尡耀存日亘賢刦中當無二矣迺天之所為獨縦執事與執事所為迥異諸人者叩之所以或莫能知也告以所知或莫能信也嗟嗟執事少陵氏之在唐厄窮卒世當時齷齪餘子吾無暇責君如開元帥如嚴武友如李白亦概棄且忽焉至元相國韓昌黎而後始論定豈杜猶有待哉要以自信確然弗為時沮則屈宋曹劉甫也業先自任矣四𢎞正諸賢律詩寡合而古作時自可觀嘉隆諸子近體偏工而古風㡬復絶響兼集其盛者執事外李何二氏國初若髙太史亦庶㡬焉次公足稱具體此外非無名世總之一技之長顧未易為學人道也五徂春結夏往来燕吴閩越間得書經史子集一萬二千五百八十四巻詩藥府歌行律絶一百四十二章名山川岩洞瓌瑋絶特處足迹所厯又無慮十餘生平之㳺弗壯于此執事得無樂聞之敢悉以布于左右六来云蘭谿新酒碧于泉一斗真堪價十干自明公之月旦行金華遂無處生活然尚據麻姑上㳺將無繇皇氏伯仲故耶朝来驟得新評覺壚頭光焰頓爾萬丈急呼竹林舊㳺浮大白三百澆之不知鼻端之出火也七金華三洞天朝真冰壺雙龍皆幽靚窅絶洞前産嘉荈殊不下陽羨建溪已買田其麓刻私印珮之曰金華洞牧羊君何時仙蹻乘罡風過此呼萬石羊起立攜手一大笑青雲中也八秋杪褁糧挈同志登金華山絕頂夜宿孝標紫薇岩慨然念其人上軋忮君下刼悍婦終身戚戚無一日歡而此山此岩遂千古為其有至國朝遇先生而名益爛焉彼華林之黻冕惡乎在因以鉄如意擊岩石大呼劉生姓名酹鸚鵡十餘觥林谷之間恍若有嚮而答者九昌黎氏云揚子雲著書以待異世之為子雲者迄今千年未嘗有兩子雲也僕未嘗不大笑其言士患不著書或著書不能千年耳夫世有昌黎矣而尚為無子雲哉與王次公仙舟過瀫不佞獲以年家子側侍笑言蘭隂之下淹留竟日山靈動色白雲晝飛子猷返棹昔為雅談方之執事殊有慚恧所乏者戴安道為地主耳吴使嗣還伏荷手教麗藻素絲光照蓬室重以覆瓿之業仰託大篇匪侯芭之素而過辱子雲之知蔑左思之才而濫冒士安之賞即千載而下持以不朽寧獨一時知已感哉于時輒成二律錄寄扇頭新春亟擬挟笈褁糧候公于匡廬絶頂則復以舍事倥偬就道中輟俄聞副臬之拜側身西望愈益神馳伏惟明公以命世偉才當右文鴻運翺翔華省厯有嵗年日且大究其用于天下令異時屈指我明豪傑有臯夔屈馬合而為一者非古今文人快覩事耶豫章竒秀不啻九江雖蓮峰瀑布蹔逺旌麾而西山爽氣日候几席暇日登滕王之閣揮如椽而引大白昌黎子安有靈當局促三舍矣賦成見寄引領来鴻無任惓切奉次公敬美自去冬邦相丈来邑即懸企台旌過瀫為平原十日懽中間抗疏乞休悵望彌日暨豫章迎吏至知疏上留中輒又慶幸久之迴仙舟辱臨敝邑不佞曽不能奉宿昔教也則何以稱北道主哉憶乍艤棹蘭隂登髙握手迫晩言别情況種種神思欲飛執事念及斯時得無一為悵然否尊使還吴逺辱手教恵貺駢蕃殊出望外酷熱中展大篇讀之清風穆然襲我肺腑蘭隂瀫水再經品題異時遂為勝地非特鄙人幸也感佩何可言何可言車駕已至豫章江右諸公當復有倡酬之什伏計内遷旦夕舟過敝邦更得于髙牙大纛中望見顔色尤私衷所切計也喻使歸里敬附短章珠玉在前令人辟易無論形穢伏惟削而教之與王太常敬美婁江一棹載覿清光浹旬華館授簡飛觥窮日落月以二先生為北道主而兩司馬為坐上客無論金谷蘭亭不知郢中鄴下能専此盛否而應麟以世講之末濫辱提攜渥聆𤣥教迄今追憶猶神動色飛于澹圃之間春和伏惟道候萬福執事千秋大匠一代儒宗而永退盛年棲心禪寂豈特名世僅見求之前代邈難等倫第神龍威鳳終非藪澤中物昔右軍一憤逺引後世往往有未竟之嘆妄意執事焚修之暇暫出𤣥闗俾㝢内蒼生稍霑福澤旋復拂衣稷契巢由參合為一足稱古今詞場一大愉快豈執事無意乎名園清適大篇竒句日益繁富曩面乞諸題計俱脱稿萬希揮擲以慰渇饑新正病卧未能走候輶軒専人代叩暮雲春樹神與俱馳報王敬美先生客嵗束書北上摳衣龍門瞻望山斗十年寤寐傾倒一朝至愉快也落羽南歸風塵眯目辱明公載啓𤣥闗進之晤語中宵揚扢萬古若新第于時玉體違和未竟請益西天阿閦隨見輒隠延平雙劍乍合復飛不無悵悵耳行日承惓惓盛心勗以大業應麟自髫丱誦法古昔窺豹有年比来屢奉教言彌復領悟于古則樂選歌行近則五七律絶叩源推委具得體裁搆思吮毫時出蹊逕當意所獨得神情飛動身世並忘南面王樂無以為喻第犬馬邇来益苦多病竊恐力不従心遵道中廢為門牆累非復淺鮮所冀執事終始造之乍漫與友人評覈當代竊以𢎞正之才博于嘉隆而精詣未極嘉隆之才密于𢎞正而統括未全𢎞正材饒于古即朱顧孫鄭歌行時自可觀律則以獻吉為之而猶未暢嘉隆材殫于律若吴徐宗梁近體各臻其妙古則以濟南出之而猶未超故規雅道于儒門則廣陵才近體顓孫長興徳隣卜氏昌榖子業古選夷清于鱗明卿近體尹恵仲黙具體猶顔氏之一間獻吉聖域類湯武之未優必求神化無方古今悉備詞人周孔藝苑唐虞長公一人而已至如精詣則厯下武昌兼體則信陽北地而且絶出羣蹊自建旗皷如迦文之後少林西来獨啓禪宗别開甘露者執事一人而已同調犁然頗稱確論計門下燕閒省及噴飯案頭也還山大序暨北上長歌統惟揮發側身東望神爽奮飛雜柬次公四通王穉欽不死可名才子吴明卿雖老祇作詩人二語于兩君可謂千秋㫁案大抵穉欽才具過吴即詩文逕庭作者而天授處勃勃不可掩吴才情藻繪皆匪王敵而近體卓然名家由工力深至故也若吴自近體外諸古風樂絶種種非長而王之五言律雖長公擊節稱善格終出吴下則天授難以盡憑而人工不可不力審矣鄙見夙爾乍聞執事兹評不覺犂然心醉以為王吴復生亦當欵服而晩進深味兹言受益非眇輒援筆退紀之并綴一轉語以聞執事將無莞爾而笑也二乍齋頭覩鄧氏函史属辭聨類足逺繼扶風而近驂檇李亦文獻之一徵也嗣讀其上編迺潦倒無所發明盖下編先就且史才不易志特其一端故耶陳晦伯博洽自居所著述自正楊外若經典稽疑數種皆淺隘不足觀天中記尤僕所未解者類書之體有二匪博則精此書既極挂漏又所輯皆凡近庸冗事以擬宋人海録彼猶有意而天中何也三李于鱗以詩鳴而唐詩選一書去取乖方靡闗軌筏陳晦伯以學稱而天中記一書采掇蕪陋㒺裨見聞李序説大自矜持陳篇名髙自標目良可作對往嘗疑詩刪匪出于鱗乍始得之執事將英雄欺人或才識異軌耶第李序雖持論過髙獨造之見尚足千古陳故一書簏耳詩文意義多所未諳矧操筆自運而可責之然天中類書捃摭故典本子見存亦何難辨而疎淺若是唐宋迄今類書存者十數家得失短長大都等埒明無類書而是編之輯殊為可笑蘇子瞻以五臣注文選俚儒荒陋詎曰增足于蛇已耶四劉義慶世説一書誠古今絶唱所謂三嘆有遺音者然至執事伯仲始大顯長公序中四語得其神綮即令世説自評無極此妙顧學人未易㸃頭執事復巻為之標句為之繹遺恨無毫髪矣第前史藝文志臨川所纂尚不下數種今一二存廣記中較世説霄壤不侔也豈精力固盡此耶少室山房集巻一百十二
