body:
  text: 少室山房集巻六十五明胡應麟撰七言律詩五十二首直指葉公以髙堂大耋累疏陳情爰自孟冬移節苕上不佞分忝州民遇隆國士分庭抗席迥出形骸睽攜在兹睠戀彌劇河梁握别情見乎詞二首突兀髙牙鎮海濤衡門猶戀舊綈袍千秋烈日扶肝膽五夜飛霜襲鬂毛報主共知心計竭思親誰識夢魂勞他年大節標良史一代名臣付彩毫萱花遙望北堂懸一疏陳情四海傳繡斧聲名紅日下斑衣魂夢白雲前埋輪未促燕中駕鼓柁聊移霅上船屈指瑤池華宴近蟠桃消息報新年憩唐生汚父舟中作羊裘白眼天䝉茸獨占蘆花鷗鷺叢月底科頭弄雙楫日中坦腹眠孤篷江湖散人陸魯望烟波釣徒張子同底事陶朱鬢毛白西施竊負驕兒童方伯吳公過訪話舊先是吳公北上余邂逅於金陵至是垂廿載矣青春攜䇿赴甘泉邂逅金陵北上船傑觀並遊鳷鵲底髙臺同宿鳳凰前飛身碧漢三千仞散髪滄浪二十年慙愧操觚成白首紫薇黄閣共周旋賀吳方伯擢晉中左轄赫奕除書下帝庭六橋離思繞烟汀旌旂匝地過陽曲鼔吹中天出井陘望重三垣頭轉黑論交一代眼長青太行絶頂凝眸處海上紅霞接幔亭鄧逺遊以浦陽改劇檇李孟秋有事棘垣不佞邂逅湖上二律志喜黄金臺下賦河梁兩見栽花越嶠傍舄化雙鳬離瀫水琴攜一鶴度錢塘雄談自許千秋合痛飲那能十日忘莫詫重垣霜色裏繽紛桃李候門牆片月燕臺萬户懸芳尊何地不留連飛揚碣石論交夜潦倒臨卭作客年大邑桐陰流廨宇重湖花色媚樓船遙憐客嵗青燈下達曙狂歌玳瑁筵蚤春寄宣律師風範支公昔未頽龍池曽辯刦前灰竹齋疎雨焚香坐花徑閒雲乞食迴地勝東林時卓錫天長南海一浮杯金銀四百湖堤畔得句能無贈蚤梅湖上同喻邦相泛舟離淨慈入玉泉觀魚池上徐茂吳以家釀至余迫暮同吳生德符先歸抗手河梁二十年談心湖上一潸然乗風泛鷁離金界冒雨觀魚向玉泉葉墜丹楓孤刹底花餘黄菊斷橋前餘杭麯米堪同醉不奈秋空咽暮蟬㕘知洪公得雄寄賀扶桑晴望海雲開蓬矢新看射越臺玉樹正従文苑出公方以學使擢任金莖元傍武夷栽洪公家七閩奕葉貴顯鵷鶵燦爛淩霄翮龍種飛揚厯塊材信是髙門蕃七葉祥光頻夜繞珠胎秋日集汝申使君喜雨作時潘生對奕乆之淅瀝寒聲繞畫牆髙梧飛葉半銀床珠簾乍巻三秋色玉局徐生五夜涼南國蕙蘭應被野西郊禾黍漸登場酣歌不是耽行樂二頃城頭有汶陽寄鳴皋邂逅京華得向禽攀花攜酒日長吟聴鶯上苑雲連陌並馬西山雪滿林一夜征塵迷寳劍三年流水隔瑤琴傷心碣石論文地零落寒烟夢裏尋劉觀察仲修席上言别抗手河梁思不窮髙天遙望楚王宫吹簫幾夜騎黄鶴解劍經時斷白虹潞水霜華猶拂坐湘潭雲葉已浮空風塵别後頻相憶錦字千行墜北鴻同惟敬諸丈邀劉觀察集李園有序時李惟寅朱在明安茂卿康裕卿梁思伯咸在坐凡一十六人余得寒韻樓閣淒淒雲霧殘幽盟河朔此盤桓庭催黄葉風交響席倚青萍月共寒一徑秋光搖碣石千門晴色繞長安題詩剰有鄒枚侣並拂朱絲興未闌題劉觀察日涉園錦石清沙動畫闌深居贏得近長安晴窗霧壓亭臺濕夜榻雲移枕簟寒逕掩杉松迴白鶴池分梧竹下青鸞門前俗轍虚勞問十載焦桐已罷彈送左轄趙公入覲兼便道還晉中雙帆晨掠大河飛􅂱􅂱星辰動紫薇上黨風光停繡鉞太行雲色候緋衣流傳竹素盈江表蔽芾棠陰盡海圻青史趙張元藉藉燕金馳賜出皇畿皁盖飛揚白日前汾河秋色半樓船輝煌白璧掄文夜時公甫畢試事爛漫黄金奏績年握裏驟誇雙劍合囊中爭覩一琴懸匆匆錦里停車日盡折梅花玳瑁筵題唐山人蓮葉舟二首有序蓮葉舟輕自學操唐人句也山人輕舠湖上悉屏長年青笠緑蓑悠然獨往余為載賦二詩芙蓉花壓大堤前六尺沙棠任晏眠南楚舊聞唐勒賦西泠重覩白公船吹簫極浦淩風去把釣前灘抱月還三十六陂新水漲行吟何地不堪憐琴書一榻任夷猶畫槳朱簾蕩碧油夕趂蒹葭移逺岸晨搴荷芰入中流飄飄舴艋風前戯汎汎蜻蜓日下遊莫笑米顛今載見孤山雙鶴在湖頭答睿父㕘知四首有序余自遘室人之變侍家大人于里中楗闗蓬莽幾與世絶辱㕘知張公札詢拳至奉謝鄙律四章雙魚晨下瀫江瀍字字瑤華握裏懸倦客已歸青嶂底佳人猶望碧雲前千秋宇宙供揮麈五夜風霜入斷絃莫詫婺光長佇倚大㣲清切照龍泉廿載江天逐塞鴻歸來華髪嘆飛蓬三墳左氏窺難遍六事張卿問易窮伎倆乆嗟鼯鼠薄心期猶詫蠧魚雄胡床夜夜雙溪月咫尺元規悵未同半壑東南寄草堂牽蘿捫虱且行藏風前漫自歌招隠月底那堪賦悼亡海岱飄零馮叟鋏湖天搖落米家航従知上客饒珠履愧殺淮陰願未償寂寞清溪罷釣綸跫然窮谷問遺民明堂政爾思方岳宣室能無叩鬼神玉笈㕘差羅二酉金章搖曳動三辰支機總為浮查出底事重尋賣卜人答郭方伯舜舉有序郭方伯舜舉屢致手書慰問惓切感愧之餘賦答二章先朝名徳重長楊拂袖言歸大海傍南浦輕烟流畫鷁東山明月候胡床風期肻逐紅顔盡意氣偏従白首長莫詫林宗巾角折蒼生頻夜卜行藏雙魚晨下越江潯厯厯加餐問向禽代國聲華餘賦草汾陽勲績擅詞林名山是處藏瑤笈流水何年和玉琴屈指梅花春萬樹西泠橋畔雪堪尋答世叔通侯見訊并懐説仲詞盟尺素雙傳瀫水鱗江天翹首一傷神緋袍紫綬雲霄客羽扇綸巾社稷臣藻翰千秋鳴鸑鷟勛庸三世勒麒麟相思幕下偏惆悵不見黄生又幾旬費孝廉過訪投贈新詩将由錢塘入廣陵買麗姝長干而返即席戲贈伏枕衡門萬事忘為君顛倒著衣裳紅絲欲繫朱顔客彩筆偏攜白面郎一榻星辰吟處墮半軒風雨話來長臨安咫尺堪攜醉千樹桃花拂短航送張大㕘知睿父擢江右廉訪四律有序自杪嵗與張公晤語溪上疎曠迄今聞擢西江别悰鬱憏走筆成賦四章萬户歡聲徹海圻喧傳除目下皇畿當年石室紬中祕此夕天垣動太㣲玉匣靈文雙劍啟銀河寒影一槎飛誰言鹵簿江州貴小隊時能問蕨薇朝看綸綍下宸旒千騎傳呼簇上游帝命西江移斧鉞人従南國望軒輶能無麗賦誇滕閣剰有雄章壓沈樓惆悵雙溪溪上月胡床遙夕夢風流突兀匡廬霧裏來登髙詞賦並堪裁留題欲占青霞色倚和誰當白雪才九派寒光彭蠡澤萬家晴色豫章臺遺踪謝監俱零落一為名流問草萊望裏襜帷大國懸一時名勝摠堪憐藍輿數載徵君過木榻長偕孺子眠賦憶寒雲三洞底書酬明月九江前何緣並擷香爐秀徙倚東林話白蓮贈汪中丞四首鵲印朝馳下九重雙飛長劍拂芙蓉詩書異域傳方虎禮樂中朝待臥龍勒石燕然雲縹緲登壇淝水日従容紛紛坐客饒朱履吐握能無問短笻一疏埋輪四海傳三臺推轂借豪賢飛狐倒馬當闗日鉅鹿盧龍出塞年燧火北亭殘帳幕波濤南粤淨樓船淩烟異日論功最十八鐃歌被管絃尺羽纔飛萬竈收先聲何藉冠軍侯風馳細栁三千壁電掃扶桑六十洲玳瑁筵開晨北府琉璃屏敞夜南樓遙憐月底桓伊笛吹徹梅花興未休三輔旌旗控月寒九河臺殿壓風湍元戎舊建征東節上将新登鎮北壇列校任驅鵝鸛陣髙流容脱鵕䴊冠懸知王粲思鄉切一賦従軍為路難直沽逢丁元父夜談作余與元父别十年餘而邂逅中野真萬里不期之遇也邂逅天涯總白頭雙㠶偕發潞河流孤臣海嶽猶生色獨客乾坤已倦遊舊疏間闗遼水舶新詩迢遞岳陽樓黄金何限干霄色落日荒臺起暮愁一疏千言動紫宸三臺九列望經綸猶聞絶島追窮冦未擬清時放直臣日月並懸新折檻風雲長逐舊埋輪更闌秉燭真如夢把袂狂歌各愴神送鄧汝髙督學滇中燕臺春色照龍泉藉甚王褒奉使年竒字舊従千古識遺經重向百蠻傳髙峯越嶲停征斾大海昆明息戰船萬仞㸃蒼題賦日抽毫何似帝京前鄧舊草名帝京篇曹能始改官南都題詩遙向鳳凰臺人識青蓮冠世才宦薄南曹寧薏苡官閒西寺亦蓬萊蒼山建業排雲上淥水長干漾月來為報鬱金堂畔女流黄重織候新裁夀吳太學母七秩紫色朝臨玳瑁筵斑衣垂手畫堂前雙金突兀髙燕市片玉熒煌映婺躔青鳥未歸天外使蒼虬長逐地行仙簾前認我東方朔一摘蟠桃又幾年贈盛徵君不學文園賦倦遊髙風遙夜攬貂裘櫪傍驥尚思千里廚下鯖長合五侯桂樹叢生淮海岸桃花深發武陵丘鬱金何日延州道玉盌相攜醉莫愁集惟寅第同顧朗生王行父作嵯峨西第接蓬萊窈窕閒窗臥緑苔倦已攜書還越嶠狂猶擊筑上燕臺宫雲五色迷花駐苑月千枝映樹來何事觀濤溟海上當筵枚發正堪裁詹山人伯虎以玉印贈余乞詩奕奕昆吾詫有神雙魚遙憶附書晨千秋玉璽傳丞相十襲瑤華贈美人錯落蛟鼉吹霧雨熒煌科斗拂星辰江潭何事占雞鶩白岳黄山會結鄰過汝元太學話别作同仁夫孝廉河橋寒日㺯新晴唱徹驪駒恨逺行慘淡黄金辭上國蒼茫白璧抱連城舟移片鷁時時望劍拆雙龍夜夜鳴揮手不堪梁月色亂山猶傍客途明同趙汝元集陳仁父痛飲狂歌亹亹申旦離别之臆備見乎詞把酒疎星傍玉除相逢猶是舊公車髙堂秉燭三更後故國浮查萬里餘海岳未妨攜短劍風雲那復戀長裾他時兩地遙相望尺素能無問鯉魚即席再别仁父汝元征馬蕭蕭倦客遊天涯憔悴鷫鸘裘雄才尚抱千金璧豪氣難忘百尺樓野戍孤雲頻入夢闗山明月正添愁猶餘舊日荆髙筑徹夜狂歌易水頭是夕劇談漏盡相對黯然余與二君邂逅湖海訂盟金石者廿載於兹拂袖故山且楗闗為終老計來晤未卜仍賦此章列炬華堂夜不眠驪駒歌徹最堪憐浮雲未信君門隔明月偏隨客棹懸四海正逢多事日三生猶結並遊緣乗時何限雄飛思努力加餐玳瑁筵乆不得趙汝元問鄉人乍至自都下云墓木拱矣少日風霜墮彩毫中年日月厭青袍紅顔意氣消雞肋白髮心期付蠏螯作賦中山酬薏苡飛書西域問蒲萄天津橋北糟丘近試覓青蓮望海濤米仲詔書畫船巻即席題汎汎風光易水瀕沙棠晴照白綸巾中流荷芰藏仙客極浦蒹葭望美人經巻香爐晨獨倚筆床茶竈午相親懸知舟楫商巖待漫向鴟夷話卜鄰憶燕中仁甫汝元余三人晨夕縦飲垂十載餘頃挈家南旋話别仁甫齋頭縷縷申旦歸後聞問杳絶今汝元告逝仁甫竟客何方載賦此什志感擊筑層臺夜放歌十年燈火寄婆娑天空潁水荀陳隔日落咸陽趙李過閣上舊藏𤣥草富齋頭新種白楊多悲涼廿載談天客不見三星聚釣蓑同王行父顧朗生胡孟􅋶俞羨長集惟寅白雪齋分得人字南北驅馳道路頻一尊攜手話沈淪驚看鄴下抽毫客漸少華陽擊筑人四野雄風迴白雪六街飛雨淨紅塵應憐獄底干将在繞夜寒芒射北辰時汝藩在獄中再送座師陳公一賦驪駒共黯然春明迴首夕陽懸綈袍邂逅三千里絳帳分攜二十年祇見中朝傳鳳德誰従幽谷辨龍泉蒼生萬室瞻依乆闕下行看太傅旋少室山房集巻六十五
