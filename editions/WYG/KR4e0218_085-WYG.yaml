body:
  text: 少室山房集巻八十五明胡應麟撰序十首送張參知睿父擢江右憲長序代高皇帝稽古設官上律三代其於外藩衆建分部之秩所以樹屏翰而寄旬宣葢卽成周召伯分陜保釐之遺意焉厥為任至崇鉅也惟我三郡都全越上游而婺自高皇帝撫運應天率先歸化故聖心繫屬尤厪特為置大參知行省于郡城以控制東國非德望穹窿才猷烺爀者例不輕授至滿秩奏遷輙有非常之命所為報稱勞伐甚殷若今擢大觀察吳郡張公尤其卓卓者也始公由高第列木天博學宏詞中秘無兩上識公稠人以為古之遺直亟遴諸史局俾長掖垣公夙夜矢心言無弗契㑹憸人挾私搆訐蜚語蔓延天子赫斯玉石咸坐公飄然一葦泝越入閩徜徉七臺九曲放於瑯琊所在以文事飾吏治公餘篹述充棟汗牛代醉一編傳播㝢内乆之公論益明遂以大參知分部東浙是時三郡並以水陸之衝丁疲薾之候壤瘠民劬財殫力竭游閒掉舌武健操矛猾黠舞文頑嚚聚訟豪强影射孱懦流莩公下車周覽四境喟然嘆曰是庸詎可以多事擾也于是建之以惇大馭之以寛柔觸之以真誠鼔之以信義作之以禮讓期月之間喁喁向風旣而敎洽化流仁孚恥格暴戢而馴狡創而愿貪激而㢘懦振而立庫藏實户口增狴犴空萑苻絶甘棠之陰蔽芾萬家故老遺黎咸以寧謐和平之福數十年所未覩也余待罪輦轂凡奏最都門者交頌公之為政不繩而聯不約而劑不斤斤而辦不察察而明且也崇祀前修𢎞奬後學式林泉之耉賓山澤之癯盛節高標名言莫罄兹豫章命下臺疏競留白叟黃童攀轅屬路葢允矣上對帝衷下厭群望無論庖丁之解全越有餘卽由此躋九列宰百司皆恢恢游刃其于公又奚難焉公治裝在卽惟是居婺日乆故婺人德公彌深是行也薦紳逢掖争致命猶子鳳城徵不佞片言以祖公前道余聞公先君子佐理三衢肹蠁名宦仲兄明父氏籲天代母精貫穹㝠公後先濟美忠孝比肩固宜其政績之瑰異不凡也余歲比乞休誤恩未遂目睹公譽命騰踔行且用成周召伯故事入禁廷筦樞軸棠陰之蔽芾三郡者益推而大厦四方余雖耄且憊猶能操天禄之管計日為公頌之姑勒言以當左劵云信州土𤓰詩序信州土𤓰奇産也生深林土窟中形質菌蠢類山蕷而色香味絶與梨同至醒酒之功卽李太尉平泉石弗過也余九齡行脚燕市與四方賢豪長者游頗歴噉殊珍獨是物未登牙頰仲冬客三衢適李司理以文藝定交夜燕出此驟嘗殊不能辯載詢迺知因嘆物固有抱靈孕秀而沈伏草莽埋没于山嵓者卽以兹𤓰之奇上之曾不得偕吳柑閩荔貢御府薦寢筵下之復不能如冬薯春菘交布田畦婦人童子咸識其形食其力非好奇如司理則終吾世且無繇覩之嗟夫士之遇弗遇亦猶是矣雖然老氏曰知我者希則我貴而物之貴于天下亦往往希有焉然則𤓰之弗遇政其所以為貴也夫𤓰也司理識之余食之旣弗為弗遇矣而俾其名竟没没于後則雖遇猶弗遇乎夜歸倚酒輙賦五言律二章以呈正於司理焉更定九流序詳九流緒論中余所更定九流一曰儒二曰雜總名法諸家為一故曰雜古雜家亦附焉三曰兵四曰農五曰術六曰藝七曰說八曰道九曰釋儒主傳統翼敎而碩士名賢之訓附之雜主飾治捄偏而旁蹊末學之談附之兵主法制權略而縱橫占候之籍附之農主稼穡蠶桑而飲饌藥餌之方附之術主蓍龜厯算而禽星宅相諸技附之藝主書計射御而博奕繪畫諸工附之說主風刺箴䂓而浮誕怪迂之錄附之道主沖退恬愉而房中爐火符籙章醮附之釋主經典禪觀而論宗戒律梵唄機緣附之夫上聖哲王之治亡尚六經故首之以儒崇大道也異端衰世之觀咸徇一典故次之以雜覈支流也國所重在戎故次兵以審大機民所天在食故次農以植大命術雖淺數神智工巧之規寓焉故次術藝雖末流弛張游息之務存焉故次藝說出稗官其言滛詭而失實至時用以洽見聞有足采也故次說道本柱下其言放蕩而難遵至齊物我達死生不可易也故次道釋本西方其言荒忽而亡據至明心性破塵幻不可誣也故次釋而九流之事終焉羅氏路史序三皇而上若存若亡矣史遷紬繹舊聞肇基五帝葢暴秦烈焰載籍焚如祖述尼經用當前導云爾六代凌夷史才中絶馬貞補傳劉恕外紀語焉弗詳羅氏此編最稱後出迺獨窮蒐眇邈劇探幽微圖書河洛之文封禪云亭之蹟旁逮大隧荒林之竊伏下兼頽垣敗壁之深藏片款隻詞一章半策有關前乘具網周羅遂俾辰放以還燧人而往遐蹤絶軌逸事奇聞綴屬森然粲如指掌斯其輟羮謝饋之勞閉戸然膏之力固已至矣迺若靈篇秘笈散見羣書乆缺傳流向湮紀錄者率賴是編提攜弗墜後世亦因綜核大都良哉學圃之鄧林詞塲之寶筏也特其才高意廣見戾識偏異說放言縱橫亡忌且矜靡炫博鮮所折衷揆厥研摩僅當草創有能整齊筆削勒成不刋上翼麟經下恢馬史則明諸君子有木天金匱之責者當亟為究心云賀張侯考績榮封序海陽張侯之蒞吾邑也下車之始播揚仁風宣導德意朞之歲紀綱飭令甲新越明年大稔農有餘粟夜戸弗扃又明年化洽敎淪禮樂具興頌聲沄沄徹于大廷于是大冢宰以考績報侯課上上天子旣錄侯姓名于御屏復追念侯篤生所自贈侯父瀛峰先生如侯秩而侯母某太夫人封孺人命下之日士驩騰于庠農踴躍于野商若旅播布于塗薦紳先生摩肩接轂于侯堂皇之上咸上贊聖天子之明而下慶侯與二尊人之遇博士莊君陳君孫君邑佐桂君唐君樂觀盛典相率詣不佞乞一言紀之不佞鄙曷足以知侯顧竊視侯政之大而諗侯獲福揚休之未艾也今之仕者釋褐而當一命孰不曰大丈夫當樹無前之烈成踔厲之勳使事功暴一時聲名揭㝢内迺愉快人心耳不佞竊以為非然論治道莫辯于六經載治効莫良於諸史詩稱子民必先豈弟史傳賢吏輙首循良彼庸不知威儀徼察多赫赫之光葆大舒徐為悶悶之政哉葢令長之秩于民最邇于下最親故其稱則曰父母其事則曰拊循故恫瘝疾痛咸切厥躬㷀瘁顛連若蒿而目生之殖之化之誨之斯父母之任已卽養有難遂困之勞之敎有弗率楚之撻之亦父母之任已世代波流吏不師古恃督責為精明襲鞭箠為敎化彼其當時建竪詎不斐然顧黎元氣脈日鏟削而月枯稿亡論三代豈弟之風兩漢循良邈不復覩於天下矣若張侯之于吾邑豈非所謂豈弟循良民之父母者哉蘭踞兩浙上游甌閩楚粤之所綰轂聲名文物之所㑹同舟車廩餼輻輳傳郵案牘簿書旁午道路科徭稅斂獄訟鬭争紛紜轇轕堂署之間葢東南最岩邑也頃者大役頻仍戸口流移歲比弗登敎尼弗行侯始下車嘆曰是胡可以峻法繩而多事擾也視篆之明日大戒于郊與民更始一切煩苛悉宥悉除于是挈綱總維開誠布公集思廣益建之以惇大畜之以寛和鎮之以静謐作之以勤敏舟車廩餼先事而儲案牘簿書當機而發征徭稅斂絜力而科獄訟鬭争平情而聽行之朞歲賓旅如歸氓庶復業訟簡刑清政且有成侯曰未也閭閻未實孰愈流離則躬儉節以先四郊絶苞苴以風羣下潔粢盛以召天和觀樹藝以罄地力精誠布假㴻雨應期百穀咸登道靡拾遺侯曰猶未也禮讓弗興曷取飽煖則又申約束以導鄉閭播聲歌以鎔俗習敦賢達以示範型一彰癉以昭懲勸德義薰蒸敎化大明薄漬而敦戾革而仁葢侯之令蘭至是僅三載而吾邑之民始勃然蘇繼盎然足終陶然化卽詩稱豈弟史傳循良繇昔揆今孰侯愈者固宜大冢宰徵之民風受之監郡以上考録侯而聖天子崇褒寵命上逮二親備存殁之榮極顯揚之願也夫為民者戴吾父母而遡念吾父母所自生則覩侯二親沐崇褒膺寵命而歡騰踴躍播告相賀尤其情所必至藉第令侯以威嚴飭下皎察馳聲卽與古趙張衡烈邑之黎民有革面戒心而已欣欣喜色弗謀自集胡為乎然哉雖然兹特侯始事耳侯博大閎深肩鉅克勝納繁不亂固屹然台鉉器也異時循吏往往由郡縣而入三公聖天子方大蒐牧保之良以風厲海内旦夕用故事擢侯心膂之任侯之政將自一邑而四方而二尊人之封將自一命而九命庸詎止自今已哉于是莊君桂君等咸聳然曰善乎胡先生之頌侯也敬書文綺為異日徵賀嚴封翁洎孺人錫命序余讀太史氏書至天道無親常與善人輙擊節其言達于天人之際迺其究歸之閭巷之人必附青雲以施於後則未嘗不私竊陋之夫士也砥節礪行甘困窮亡悔要以弗欺其意詎寧有尺寸希冀于天哉卒之天乆而定鬱遏其始而厚植其終隠約其躬而崛興其裔身不出閭巷之下而望隆乎冕黻之上是之謂無用而用挫名而名太史氏所稱天之報施善人匪虚語也而鰓鰓焉挾一長矜一善苟依託顯重以蘄没世之稱語于狹小丈夫可耳胡以謂善人胡以謂天道耶以余所覩記嘉定嚴翁洎談太孺人益信嚴翁者婺邑侯浦陽君尊人也以厥考南臯翁故自稱曰夢臯南臯翁蚤卽世翁甫壯起當戸盡推故殖三孤弟而淬勵其仲以儒顯與人豁達大度把臂洞肺肝至慈愍惠利好周人緩急尤天性親故迫患難以情告翁輙罄所有輸之坐是家旁落幾廢箸翁亡毫髮介顏面獨與太孺人勤壠畝自給日夕屢空晏如也而太孺人尤能以德義相翁姑葛病躬湯藥視寢溲十歲所遇臧獲絶訶誶聲妯娌逺近風其德咸相率為孝謹太孺人之好周人緩急一如翁翁平居鋭施予比窮折弗自振猶欣然有以相樂皆太孺人為之内也而是時明府君甫髫丱已穎脫羣兒日誦讀數千萬言矣翁顧謂太孺人是兒昻昻千里先大人遺命經術敎子孫其何敢失墜亟節饘粥館明師課迪之稍不給太孺人簪釧隨其後明府君用是感奮甫踰冠業成以周易試南省試南宫連首掇旣對大廷授政百里賀者牛酒填里門翁與太孺人顧相對不釋然曰兒幼未習吏倉卒負任使柰何趣為敎賜明府君勉以㢘平字䘏凡當官務甚悉太孺人亦數寄聲兒為縣第視而翁居家狀毋浮慕赫赫稱明府君敬奉敎治青溪治改而治東陽東陽復大治今皇帝戊子明府君報政成大冢宰署君考上上而後翁洎大孺人喜可知也曰審爾吾夫婦高枕亡慮矣天子旣内嘉明府君政績詔推其爵爵二尊人命下吳鄕族姻婭慶于閭婺父老吏氓慶于邑咸嘖嘖嚴翁有子而明府君以大孝揚其親于是一時同官吏方君輩幣而詣不佞若翁年家子詎容無一言紀之夫夢臯翁用布衣起閭巷皇皇仁義如弗及豈其騖奇吊詭苟附託靑雲以要來世哉要以獨行其意自愉快于心其惓惓課督明府君亦以先君遺命當爾卒明府君用經術奮推二尊人澤灌漑一方而翁洎太孺人爛焉沐恩綸襲冠帔聲實際乎九重景曜燭乎當代非所謂無用而用挫名而名者耶所謂天之報施善人非耶方翁力行善致困窮八口饉千年百楹燼于火律以天人際宜不能無少動翁顧力行善自如其識量誠過絶尋常萬萬宜迄能待天之定而遹觀明府君之碩大其後也雖然不佞言尚有進于是明府君方以循良最天下異日者柄樞衡筦喉舌將益推二尊人澤布海内而二尊人食報將益與明府君展布之澤相為無窮萬鍾之養九命之錫翁一切眎之漢然無加損迺不佞固與諸君子執左券俟矣賀葉母趙孺人七袠詩序太孺人邑明府葉侯母也桃葉宜家柏舟當戸清水矢志匪石為心訓賢𦙍以一經卜芳鄰于三徙精誠所格維帝若臨福佑所鍾維侯克大花封馴洽雲霞迴百里之春葉縣飛鳬雨露藉九重之賜維孟秋之朔日為設帨之嘉辰金風乍起于庭除玉宇初澄于院落四郊赤子讙呼禾稻之登塲萬室黎元快覩蓬萊之錫命紫鳳銜書北極虹光挾婺彩以齊飛蒼龍傳詔東華奎畫跨金垣而並耀地控蘭陰之麓如阜斯登天懸瀫水之流猶川甫至蟠桃洊熟祝王母者三千年寸草長春頌神君者八百載七言偕賦十韻俱成登趙鴻臚溪雲閣詩序趙君文鎮新居北浦别搆西泠縹緲飛樓高插星河之上嵳峩傑閣俯臨雲漢之中左顧則蘭陰橫峙聳翠壁于千尋右瞻則瀫水斜來濯清漪于萬丈胡子元瑞登而樂之輙抒彩毫爰賦四韻落霞秋水匪云逺附才情芳草晴川抑或同舒興象云爾大參知張公二難雙美詩序二難雙美者大參知長洲張公喬梓昆玉也先是參知太孺人呻吟霜露淹歴歲年叔子明父氏匍匐庭闈周旋床笫神祗上下無禱弗䖍巫醫近逺亡技弗奏痛蔑施于人力竟籲代于天曹真宰鑒觀神明有赫太夫人旣康寧宿障明父氏亦委順初心俄參知繇明經奮巍第讀書秘省都諫掖垣象服龍章褒崇備極而叔子精誠之行卓絶之蹤遂益以艷耀三吳流聞四海時人咸謂季公之孝匪叔也莫為前而叔子之孝匪季也莫為後卽陳氏二方蔑能尚已迺兹者大參知分轄之境實曩昔太封翁逰宦之鄕去思未遐故老猶在沐保釐之新澤者咸追愷弟于風聞淪撫字之深仁者彌快旬宣于世及君子以張氏一門衆善畢輳葢不惟佑啓感通肇家聲于莫二而顯揚繼述𢎞世業于無雙于是邑諸生鄭雲鵬輩目擊躬逢踴躍盛際蒐羅篇什垂賁千秋以不佞應麟受知國士被化州民屬賦短章俾同輿頌通家子弟誼弗容辭輙用秕糠前導金石云爾松茂蘭芳集序今皇帝萬厯庚子清源蔡景明先生七秩加四矣懸弧之旦為仲夏朔三日而嗣君適以前三日舉先生冢孫於是姻友之暱先生者咸共傳詫繪松若蘭為圖而詩歌以侈大之不佞伏讀卒業作而嘆曰天道之報施善人抑何婉而彰曲而中也當江陵相之擅國炎炎之勢上蒸乎朝署而下鑠乎鄉邦一時巧宦之士蘄旦夕速化其門卽社稷生靈彼且竊而中柄臣之欲而矧乎一名第之微也而癸酉之歲先生以棘事蒞楚闈同官目案頭巻亟稱奇貨不可失先生心知為權相子自念以名器納交貴倖臣節之謂何卒擯之孫山外用此大拂當事心投劾罷而當是時他藩臬以衡文自媚者往往雄飛直上推而餘膏剰馥漑子若孫而先生秩不過下大夫禄不過二千石懸車之日行道之人亡弗以志業未售為先生憤而宗嗣未立為先生憂先生夷然穆然無幾微介顏色第掩關卻掃時取故所藏法書名畫三代尊罍彞鼎卣鬲之屬摩娑撫翫之間用詩酒琴奕取適里中者十餘載一日輕裝小舠度錢塘歴吳㑹訪古秦淮石頭東行越齊兖青冀魯衛間窮竟諸方之勝者又十餘載而後歸歸而嗣君候門則已昻昻汗血居然千里之駕先生為一掀髯笑蓋至于懸弧之旦冢孫併誕于一朝而先生喜可知也世方以大材蚤售為先生惜先生顧得以葆真茹和巻其未試者還之造化以倍易喬松之遐算且得以望八之齡覩蘭芬于奕世而以身所未竟屬之而彼一時也市寵乞榮之徒不旋踵而褫奪澌盡并其子若孫之忝竊亦緣手化為子虚而先生方逍遙乎上皇以坐照其成虧而付之乎一吷彼蒼之捷于報施抑何其婉而彰曲而中之若是也昔陶元亮以折腰束帶故去彭澤就孤松其勁幹挺節誠磊砢相肖迺五男之咏弗能亡悵憾箕裘謝太傅欲芝蘭玉樹並生庭階于時子姓羣從亦曰彬彬而文靖之年曾未及登乎太上是松也蘭也兩者並躋其盛固難而交遘其盛不尤難之難也先生穎邁天植十四卽以異數燕賓興距今政一甲子而冢孫適誕于初度彼其歧嶷夙成行步武先生之故躅而造物所為娛先生于晚暮者且繩繩乎日升而川盈兹集也特其嚆矢云耳輙為弁其端以俟之少室山房集巻八十五
