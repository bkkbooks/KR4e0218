body:
  text: 少室山房集巻七十六明胡應麟撰七言絶句八十首鄧遠遊貤書遠訊纚纚千言副以絶句十章如龍泉太阿不可迫視間頗為余致前新之憤不知余比為浮名所累無地自藏知我者希我且貴矣四絶寥寥用謝良友珍重雙魚到草堂暮雲春樹話偏長仙山咫尺攜家近滿把青芻飯石羊昌黎漫詫蚍蜉横中散休嗔蝘蜓豪濩落乾坤元我輩紛紜月旦任兒曹散髮垂竿大海東羊裘無計擲西風雌黄政爾須賢輩一掃浮名萬累空十斛明珠顆顆圓驪龍光射草堂前論心不為鍾期在廿載震旦抱絶絃金華山雜咏八首朝真洞徙倚明霞上百盤石門天際敞高寒峰頭生讀黄庭罷遍禮羣仙白玉壇氷壺洞一線懸崕鳥道通石床鍾乳鬭玲瓏飛流萬尺無人到誰縮廬山此洞中雙龍洞洞底雙龍挂碧流蜿蜒十里暮雲愁朝來拂拭仙人蹻攜爾同登十二樓二仙祠臺殿崔嵬鎖玉京白雲遙按步虚聲他時辟榖堪尋汝絳節雙飛繞太清芙蓉峯萬仞嵯峨霧色重青天誰削紫芙蓉扶笻恍憶西遊日玉女盆邊第一峯赤松澗鹿田西下接魚磯千頃寒流照客衣薄暮亂山風雨過不知潭底玉龍飛紫薇岩文采曾驚六代豪紫薇深鎖白雲高何人為啟藏書穴搖落青山伴彩毫石羊峯絶頂寒雲挂玉清三山何處有蓬瀛乘風自叱羣羊起不向黄冠道姓名調安茂卿時安攜妓湖上一舫朝移入畫圖亭前蘇小鬭摴蒱徘徊十里春湖色忘却吳松舊釣鱸寄祝鳴臯落魄長安舊酒徒五陵花色勸提壺别來肝膽憑誰問一片霜華照轆轤湖上寓目獵獵輕風試碧蹄羣兒相逐段橋西不知何處雙鴛度十數金丸落大堤過吳門不及入訪喻邦相寄懷四絶錦纜牙檣出太湖樓船簫鼔入皇都那堪此夜吳閶外斷雨凄風問客途越國山川處處畱吳門花月更優游何人不道神仙吏四百樓臺任意遊燕寝凝香畫㦸開雲間太守舊憐才蕭然一榻黄堂畔飛騎時迎二陸來玉尺銀條照座明鱸魚乍夜到江城秋風斜日長亭畔更向何方作步兵河渠歌十首為大司空潘公作并奉懷前大司空朱公大海波濤靜不流長堤雲霧似龍游千秋玉帛朝仙苑萬國車書㑹帝州鼓吹連天發棹歌旌旗耀日午風和波搖栁色通淮甸水泛桃花入潞河寶應堤成不避風高郵湖遠若行空由來餉事今年蚤四月樓船盡過洪大聖曽聞出泗州司空重起鎮淮流河開砥柱三千丈殿鎖琅璫億萬秋鐵騎雲屯漢武年翻愁瓠子變桑田何如此日新梁就南控長淮北控燕六月邊頭未請糧河西已到萬餘皇懽聲欲沸三關士滿載嘉禾出太倉錦纜牙檣照碧天黄旗十道晚風前山櫻未入吳姬口乍日中官已進鮮朝行齊魯暮淮徐沐雨棲風志屹如業就恥方徐内翰功高不數宋尚書三十年來治水勞白頭猶自駕輕舠河邊莫漫誇千騎海上曽聞釣六鰲隨山刋木兩司空萬古勤勞夏后同試聽河堤行客語朱公一去有潘公抵淮上友人邀飲狹斜迫歸不能艤棹新水黄河没釣磯一帆高挂暮雲飛紅粧十萬無顔色笑殺當年杜紫薇别蘇别駕南歸四首邂逅相逢興獨豪平原十日醉葡萄風前忽奏陽關曲别淚千行墮寶刀紅粉清源十萬粧亭亭高髻緑羅裳那能不滯狂夫興滿目飛雲是太行桃花新水木蘭橈揮手離人出畫橋何處相思偏入夢嶓江飛雪越江潮才大君猶困執鞭書成余亦倦遊年惟應匣底湛盧色夜夜雙飛北斗前送黄季玉還楚四首一棹依然入五湖數聲長笛楚山孤岳陽樓上高迴首何處長安舊酒徒神如秋水玉如顔贏得殷郎喚阿環若向黄陵祠畔過莫教風雨妬湘山電影霜蹄八駿材鹽車猶自困蒿萊亦知龍種元西極不向黄金戀故臺布帽壚頭撲舊塵貂裘愁殺薊門春洞庭湖上南歸雁莫忘芙蓉寄遠人憩白牛精舍夢遊湖上聽歌作并寄郭鴻臚翛然文室卧楞伽一枕江南興未涯三十六陂春水色畫船簫鼓載吳娃食河豚鼠肝蟲臂任乾坤修短茫茫一氣論絶粒五旬身尚在何妨殘喘食河豚河豚味在諸魚之下僅腹中腴可賞昔人目以西施乳亦稍誇矣余驟食此魚頗有聲過其實之嘆戲題一絶以俟定論物固有遇不遇也掩映銀盤白玉壺質如雞卵味如酥若將西子胸前較未必鴟夷泛五湖記十八九時章二宅中食江鱭狂飲劇醉豪興欲飛迄今二十餘年再過瓜洲食此此物風味不減疇昔乃余髮則種種不復能作少年態矣玉盤金縷按霓裳曽倚瓜洲作酒狂二十餘年重下筯一生江鱭幾囘嘗鱭魚水族中佳品也江淮惟二月有之故亦謂時魚昔人恨鰣魚多骨此物鱗刺尤多余酷重其風味每食必盡數盤座中戲題此絶最愛鮮鱗出素波金盤玉筯薦銀梭人生事事元堪恨豈獨鰣魚骨太多渡江一絶一片歸心付倦遊碧桃花盡大堤頭滄洲不借凌風舸二月春江似箭流過晉陵欲訪朱在明安二茂卿云在明以先一日徃京口矣十載之期竟左成約殊悵悵也蕭蕭風雨一帆開恨殺篙師捩柁囘不信習家池上飲十年長是夢魂來再寄文仲一絶千峯迴合碧雲遲想像吳閶日暮時何日雙柑尋舊約一尊湖上聽黄鸝夜過長安酒樓作壚頭飛雪萬家寒琥珀香吹白玉盤歌罷落梅天漸曉不知門外是長安夜讀獻吉仲黙廷實昌穀于鱗詩漫興五首囘首開元八百秋莫將蹊徑細追求巨靈自有移山力手擘黄河萬里流自得西方最上詮蓮花千仞撲青天由來騕褭鳴鑾足可作風螭步驟傳北地申陽各儁流中原名譽本鴻溝當時誤作攀鱗客王後盧前特地愁肝膽平生獻吉聞金丹煉就肯離羣時人浪自開門户㸃染高流入墓文七字高華一代知若為諸體遍稱竒猶龍莫訝宣尼賛自是難忘問禮時采菱曲十二章有序采菱者髫丱事緯真今長矣余乃遇於三衢屠謂余是子知詩冀一言附集末追數其舊為采菱曲十二章風情老去似徐娘猶逐王孫負錦囊莫駕輕車殘雪裡人間無處覔蕭郎碧衣長袖伴瑤琴欲擬方囘更自矜學得新詩明月底含羞不肯向人吟十院名花院院開高懸明鏡在瑤臺碧空萬里天如洗飛挾娉婷夜半來紅顔二八定誰如三十專房寵未除頭白楚宫看似舊登車何用泣前魚風神秋水照華筵怪得王孫掌上憐惆悵後庭花底月凭闌迴憶破瓜年綉帽羅衫恰稱身緑絲布褲最撩人愁中開府看如掃夢裡司空認未真那曽調笑問當壚慣向書齋直唾壺驀地閒行尋不得畫廊東角鬭摴蒱焚香懶著鵕䴊冠長日東君帶笑看好是緑窻明月夜濳身行傍曲闌干舊識花卿在錦城相逢高唱少年行那堪囘首東風惡吹送青帆入四明玉雪肌膚姑射仙天涯揮手劇堪憐明年定挂山隂雪人在陽明赤水天玉樹相輝照畫屏朱陳遺事最堪憑含啼却笑文君拙不遣相如聘茂陵是子姓陳又朱生年差少同事十年聲動大長秋一笑如花越水頭為有薛家紅線在何須重上木蘭舟送董大之㑹稽風雪離人下灞橋長歌不斷董嬌嬈梅花兩岸清溪色船到西興正落潮再别惟效觀察一絶陽臺題罷復琴臺夙昔風流擅楚才君到川南相憶處海棠煩寄一株來寄觀察陳座師千騎西南最上頭雪山晴色照吳鈎高牙大纛行春暇滿酌郫筒酹武侯入晉陵復不及訪朱在明悵然復寄此詩廿載飛書醉白沙亂山寒色限孤查南園一夜西風急無數江蘺盡落花楓橋夜泊夢與房仲諸君懽飲達旦覺而悵然寄此玉立紅粧照畫船終朝寒夢不成眠風流何處王公子落盡蓮花玳瑁筵湖上酒樓聽歌王檢討敬夫汪司馬伯玉二樂府及張伯起傳竒戲作光隂百歲迅流霞一曲東籬擅馬家何似翰林新水令秋風遷客走天涯水雲深處木蘭航白雪紛飛大雅堂莫向五湖尋舊迹于今司馬在鄖陽掩徑頻年侣博徒陽春堂上白雲孤才聞北里歌紅拂又見東園演竊符贈棃園邵生艶舞嬌歌向月明金􅁫羅襪鬭輕盈何縁飽聽花卿曲今日錢塘是錦城幼識歌者何生一别廿載相對憮然為題一絶囘首高陽二十年何戡重對各澘然渭城是處殷勤唱遮莫明朝送畫船俗傳有渭河邊倚畫船一曲憶以修挐舟餞别至魏灣執手戀戀聞某直指垂至乃發迄今令人悵然偶値清源鴻便輙題二絶寄蘇并訊易惟效蔡景明脉脉盈盈一水頭何須七夕笑牽牛秋來兩地如相望夜色天街萬里愁四倍平原飲酒期牽衣猶自恨臨岐遙知送客河梁後不向襄陽倒接䍦余曩在清源三君旦夕談燕今易擢關市蔡歸閩中矣寄亭四絶為邑文學祝宗旦題從其子樹勲請也縹緲千峯列翠屏八窻雲氣透疎櫺遽然一枕南華夢别有乾坤在草亭科頭箕坐一亭空白眼青天送斷鴻幾許豪華駒隙内何人先覺大槐宫高峯攢翠落精廬五斗頺然不願餘舉白持螯應自快著朱騎馬定何如風潭百頃和滄浪坦腹遽廬萬事忘睡起秋山捫虱坐不知斜照墮胡床少室山房集巻七十六
