body:
  text: 少室山房集巻五十明胡應麟撰七言律詩七十九首余為五岳之懷舊矣丙子冬將以計偕北上適少參王公自秦中過訪為余劇談蓮花玉女之勝且出諸登覽作見示恍然如曳杖從公遊憩太華絶頂者不勝飛動之思輒賦七言律四章縹緲青天華岳西萬峰雲色繞丹梯行窺日月中華盡坐倚星辰太白低陰洞古壇猶積雪斷崕飛瀑幾留題知君苦覓驚人句不奈清猿絶頂啼五夜扳蘿到絶顛俯看城郭帶秦川攜將太華峰頭月獨聴終南樹杪泉千里河山朝白帝九霄雲霧失青蓮探奇漫倚孤笻嘯咫尺瑤臺是列仙片片青霞屐底移半空岩壑轉逶迤悲風萬里來三蜀落日遙天斷九疑渭水秋光猶殿閣昆池寒影自旌旗狂來健翮飛揚甚翹首寧論謁帝遲歴盡飛泉到上頭白雲迴望滿皇州千峰不斷秦闗色萬壑長懸漢樹秋赤日陰森􅆐語亂蒼烟明滅鳥飛愁何因瓢笠相從去醉踏蓮花問斗牛初至都下康裕卿李惟寅胡文父何仁仲朱汝修過訪翩翩裘馬又長安握手風期尚未闌白雪舊知心賞在青山猶作夢魂看燕臺日落星應聚函谷雲生氣自寒却笑五年江海上飛鴻何處不憑闌夜同黎惟敬康裕卿胡文父何仁仲朱汝修集李惟寅宅得寒字握手論心盡鶡冠相逢何意復長安衣裁薜荔元同色劒合芙蓉好並看明月萬家閶闔曉青山十載路岐寒憑陵欲望燕臺氣一片星河繞畫闌贈沈比部純父八詠風流自古聞一時江左更休文朝端玉珮趨明月署裡金珂冷白雲入夜驪珠真射斗髙秋龍種欲空羣孤㠶忽漫雙溪去千里那能不憶君同殷無美胡文父魏茂權集歐楨伯博士得情字才子初尋碣石盟一尊遙望五雲平當軒似落梅花色入座俱含桂樹情四壁春陰迴禁苑萬家殘雪擁髙城翻憐舊日羅浮客不向詞壇識姓名送裕卿二首貰酒都亭旅思長相看那忍别離觴單車客去華陽社萬里人歸越嶠霜岐路東西空哽咽乾坤南北共行藏丹霞樹樹秦源底尺地還堪寄草堂一夜驪歌繞薊門青山何處不銷魂懐鄉杜甫心元壯去國張儀舌尚存夢斷河梁燕雪阻星移嚴瀨海雲昏他時倘問蘭陵宅風雨猶堪共一樽南歸留别無美文父茂權二首落日長安涕泗流飛揚誰信五陵逰中原彩筆猶天地故國寒槎自斗牛抱璞已甘和氏刖凌雲無奈長卿愁南歸是處山堪臥敧枕嚴陵萬疊秋撃筑長歌且未哀紛紛詞藻栢梁臺人因李郃登龍挫客自昭王市駿迴孤劒霜飄南斗近萬舠雲擁北風来碧山幸有藏書穴誰遣潛夫出草萊夜同裕卿諸子集惟寅宅得中字一夜心期握手中吳鈎寒色照長空新愁紫氣重闗外舊宅青山大海東摧落世應疑斥鷃翻飛人豈后㝠鴻髙歌蹔向淮王席千載休論桂樹叢留别惟寅汝修攜手都門話息機筑傍愁見和人稀千山積雪盧溝斷萬里寒雲碣石飛紫禁未前明主席青門頻把侍臣衣尺書何處堪相望天地東南一少微别祝鳴臯砍地哀歌氣尚雄十年詞賦與君同琴聲一奏風塵下劒色雙懸宇宙中已信君平堪市隠何来阮籍尚途窮心期不道天南北對握驪珠望彩虹潞河舟中同裕卿文父作羸馬風塵鬂色愁一㠶同下海門秋星辰自合雷張劍岐路真逢李郭舟青嶂五湖寒並倚白雲三楚暮爭流支機滿袖瓊瑶在不信銀河祇獨逰寄大司空朱公萬峰晴䕶草堂寛帝許司空蹔挂冠兩鬂自懸滄海白寸心猶傍紫宸丹垂天翼駐風雲繞挾日鱗藏洞壑寒不信渭濵能久臥東南佳氣滿長安寄何内翰彩筆翩翩奉紫宸鬱葱佳氣滿平津金門露映然藜客玉座雲隨視草臣司馬大名懸日月賈生愁色轉風塵清尊萬里論心夜腸斷梅花驛路春寄朱在明鴻臚神武秋風萬木殘扁舟回首隔長安飄零敢挾齊門瑟潦倒誰論魏闕冠白紵總邀逰伎舞青萍長向酒人寒傷心碣石談天處寂寞浮雲夢裡看登天津閣望海同康裕卿胡文父作二首畫檻横空海色開一尊攜客上崔嵬扶桑日傍千㠶落碣石雲浮萬島迴採藥未應徐市老乗風聊擬羨門来仙居咫尺蓬壺近指㸃憑誰出草莱百尺闌干望未涯寒烟遙䕶海門斜羣峰亂吐崑崙日叠浪瀕翻渤澥霞薄暮機絲鮫客館中天樓殿羽人家攜来並有𤣥虛賦為寄銀河八月槎為文父題匡山讀書處面面烟霞䕶草堂千峰遙墮子雲牀琅函盡敞三墳色玉軸新開二酉藏藜火夜寒迴太乙桂叢秋逺夢淮王東林剰有迯名地不奈聲華滿栢梁薜蘿館為裕卿題縹緲烟蘿䕶石扉幽軒十尺逈忘機吟窺彩筆青雲墮坐擁瑶琴白雪飛洞口經春詞客興山阿薄暮楚臣衣深居莫訝時人識夜夜寒光動少微竹在亭為王孫貞吉題清風何處洒琴書面面琳琅雪雨餘千畝晝圍中散宅萬竿晴拂子猷居聲搖淇澳来中坐翠擁瀟湘䕶碧渠尊酒欲尋長嘯客美人空谷正踟蹰同詹東圖康裕卿胡文父集胡上舎館有贈大隠何妨卜市㕓華裀長日擁嬋娟吟餘河朔堪消暑住久臨卭不記年千里壯心慙驥櫪九霄寒色舞龍泉長安此夜占星斗半入荀陳座裡懸送黄孔昭還七閩匹馬何来自薊城蘭臯攜手白雲平長裾尚曳三峰色短劒初回五岳行夾㟁㠶檣漳水夜中天臺觀武夷晴離尊咫尺空相望愁絶華陽社裏盟艾都閫見過不值飛花長日掩柴闗小隊俄来曲巷間上客已驚題鳳去元戎誰共射鵰還青天畫甲嚴城逈明月牙旗大海閒聞道漠南諸将在㡬人名姓動陰山寄胡文父潦倒公車記昔逰青絲白馬並皇州霜華夜拂髙離筑雪片朝寒杜甫裘一代風期誰獨往百年肝膽自名流相思倘逐飛鴻翼綵筆同攜八詠樓送王先輩還二華匹馬言歸太華顛五陵行色暮飄然逰吳衛玠名偏重入越中郎賦已傳白閣雲霞孤劒底黄河星斗一尊前無嗟片語天南北屈指看花漢殿年寄徐子與車騎輝煌列上㳺㡬年方岳擅風流西山萬樹浮官閣南浦千花入郡樓授簡客知王勃在據床人憶庾公留毋誇石匣豐城畔振珮遙看接斗牛寄李惟寅兼訊朱山人汝修朝懸鵲印坐長楊鋒鏑平銷一劒霜射虎乍聞過㶚㟁飛龍猶憶賦河梁丹心自照論兵地青眼頻輸結客場獨有夷門舊賔從偏從長揖問容光聞安茂卿逰臨安作此問訊飛揚裘馬各逰秦拂袖俄驚海上春三洞稍酬新日月五陵猶記昔風塵紛紜白眼空調世濩落紅顔已讓人聞道如花仍共載若耶溪色定誰親喜滕公擢任浙中方伯二首叱馭遙看五嶺来雙旌薇省蹔徘徊三朝驟起吹嘘色十道誰先撫字才赤日扶桑過露冕青山鄞海傍登臺謳歌豈獨東南借繞夜寒光接上台南来海色傍旌旗猶似横經越嶠時華省坐開新氣象青衿傳迓舊威儀籌輸九塞軍儲集珮壓三曹帝寵移屈指侯芭曽問字十年長鋏未酬知送喻邦相之都下臥掩衡門病色侵相逢詞客重開襟孤尊蹔詫梁園集萬里仍趨魏闕深風雨大江隨撃楫雲霄赤縣待横琴殷勤片諾他年事北望鴻書瀫水潯送張明府移任江右擁轍千家泣道旁飛書誰為轉循良清霜乍徙朝歌署白雪俄深單父堂栁色映簷江浦近梅花入夢海天長極知百里非重借曳履晨看到尚方中秋夜同諸君鎮海樓玩月縹緲銀蟾落庾樓憑髙一望海雲收千林露色天如洗萬井河光地欲流大漠旌旗誰倚嘯長門環珮逈添愁追陪正憶羣公語莫訝胡床竟夕留寄邊上友人早聞詞賦擅西京更羨終軍獨請纓萬里旌旗分漢壁十年刁斗隔燕城雲沈瀚海風沙起雪滿交河道路平堪笑故人猶短褐欲將孤劒事長征送人入蜀離思翩翩把濁醪錦城西去不辭勞星辰夜拂張華劒風雨寒生范叔袍三峽啼猿青嶂逺九疑迴雁碧天高蜀中形勝堪憐汝定把新詩吊薛濤送徐明府之瓊州春花繚繞鳳凰樓襆被憐君賦逺逰風俗自分天外郡山川愁問海南舟珠崕雲氣經秋斷瓊島波光入夜浮惆悵一尊芳草畔不堪離恨對吳鈎秋日送人之洛中挾䇿憐君出漢闗驅車晴色滿山川浮雲半落漳河水寒日斜分博望烟龍劒獨攜星斗外鴻書遙寄雪霜前綈袍對拂雙蓬鬢猶是京華旅食年送中丞曽公之成都使者新傳諭蜀章朱衣晴日下明光揚旌欲挂峨嵋雪拂劒遙生灧澦霜幕府夜談賔滿坐山郵朝發吏成行共誇僕射詩情在小隊時能過草堂花朝思伯邀同諸子集李氏園亭緑野晴開一徑斜夕陽聫騎到山家綈袍乍擁梁園雪綵筆先飄漢殿霞大麓春陰迴逺樹髙城霜色墮清笳看花剩有劉郎興十載長安鬂欲華清源道中别裕卿二首十日平原飲未闌更攜離色上征鞍浮雲萬里幽期隔明月千峰旅夢寒片諾久知肝膽盡深交那問鬂毛殘孤㠶嵗暮能相過風雪桐江有釣竿㡬夜風雲入倡酬一朝岐路攬吳鈎天懸大陸雙龍語霧擁寒山疋馬愁憶戴未闌王子興登仙猶滯李膺舟秋期倘問垂綸客散髪同看大海流齊東道中羸馬經行日草莱齊東遙望海雲開春光莒父層城合曙色瑯琊萬井迴織屨自高陳仲隠飛書誰問魯連才遺踪九合俱零落滿目晴花度野臺懷史元秉李惟寅朱汝修浩渺春光接漢闗金莖遙望五陵間詩成碣石人猶聚賦罷長楊客已還碧漢鵷鴻堪並起青門鸞鶴㡬同閒芒鞋莫問天台色萬樹桃花照玉顔同文父登泰山四首百轉丹梯上翠屏天門遙望海㝠㝠幽燕北護諸陵紫齊魯東迴萬壑青松色自揺秦帝輦芝封猶駐武皇靈殘碑七十俱塵土千載憑誰問勒銘縹緲飛雲十八盤高臨迴首盡長安青天萬仞樓臺立白日千重杖履寒若木煙光浮帝闕扶桑霞影落仙壇相攜並倚孤鸞嘯不向遙空問羽翰獨夜行吟到斗牛闌干遙倚碧天愁千峰日抱秦臺上萬嶺雲爭漢碣流絳節光生羣帝語玉扉寒啟衆靈逰吹笙不淺王喬興杖履何年更十洲面面芙蓉立紫烟石門丹壑逈相連遙峰霧擁星河出絶頂天迴日月懸玉碣尚傳司馬後蒼松誰問祖龍年相看十載沈㝠意梁父吟成共黯然送文父還匡廬涕淚江湖范叔袍相看愁色轉蓬蒿人歸廬岳千峰雨夢阻潯陽八月濤酒畔蓮花傳般若窓前桂樹詠離騷臨岐漫脱干將珮斗氣雙懸日月髙再寄朱大司空𤣥圭曽告萬年功歸去堂開緑野中聖主自尊前尚父蕃人来問大司空吟邊駕引新調鶴臥裡車懸舊賜熊愧殺酬知長劒士白雲無路到崆峒别李季宣萬里澄江片月虚故人相望轉踟蹰寒星欲墮張華劒逺道仍驅孟博車獨夜魚龍京口夢高秋鴻雁廣陵書花時好訂吳天約題偏樓臺四百餘同茅平仲登甘露寺絶頂作天畔危亭綉拱扶並逰詞客摠江湖千山雪浪吹樓殿萬里雲㠶下舳艫秋色平分𤓰步逺暮烟斜合景陽孤興亡六代俱陳迹對倚西風盡玉壺重逰金山四首海色迢迢四望齊孤峰突兀聳招提亭嘘大壑千㠶盡寺繞寒空萬堞低天地對懸南北影雲霞不斷古今題憑髙一片真堪畫縹緲樓臺鐵甕西百尺危闌坐振衣白雲蒼霧滿禪扉天空一柱中流出日午層濤四面飛秋色㠶檣淮甸逺暮鐘樓殿廣陵微重来為搆焦君宅對狎青山住海沂曳履千盤到上頭蒼烟寒梵滿清秋闌干曲抱孤雲色殿閣飛懸大海流日落黿鼉時自語風髙鴻鵠晚仍留蓬莱咫尺堪乗興坐倚芙蓉望十洲一峰塵外聳巉岏屹立青螺鏡裡看萬古乾坤誰卓錫三山濤浪此憑闌秋空蜃氣連江暝夜久龍宫上日寒何處玉笙吹不斷五雲樓殿滿長安江右嵬父佳父二王孫以書翰見貽賦此寄贈紫氣豐城望不窮雌雄龍劒拂長空持觴並入蓮花社卜築同依桂樹叢天際碧雲迴錦字石邊流水傍絲桐青㠶咫尺堪乗興為借潯陽一夜風寄曹山人子念大雅曽聞郢客操蒹葭何處夢魂勞青萍夜嘯吳門月白舫晴飛震澤濤海岳壯心藜杖逺乾坤秋色草堂髙西風是處堪乗興相對蘭陵把濁醪寄朱可大進士曽共長楊謁聖君一鳴龍種獨空羣彤墀未捧千年日紫殿先傳五色雲花氣上林春浩渺酒香韋曲晚氤氲酬知莫問馮驩鋏片片霜華落斗文登臨安鎮海樓郡閣㝠㝠霧雨開蓬瀛遙望氣雄哉千檣晝挾潮聲下萬樹晴飄海色来䇿石舊傳秦帝輦還鄉初見越王臺髙歌且遂乗桴客莫問安期早晚迴蘇君禹觀察抵武林以手札詩扇附李參知見寄且勸駕北上意甚惓惓感事賦答二首論文曽駐木蘭舠按部長懷使者勞豈謂青衿還絳帳尚從黄綬問綈袍書傳大禹千秋穴賦湧靈胥八月濤不是輶軒頻顧盼桐君山色為誰髙雙鴻迢逓問柴荆片鷁猶思下婺城祗媿烟霄勤物色能從湖海擅時名遺音空谷聞三嘆大樂明堂重九成莫向雲泥論出處乾坤何地不堪盟仲秋北上次武林謁大中丞滕師招飲賦謝錦瑟沈沈夜未闌胡床明月坐来寒抽毫久媿門人籍伏劒重登國士壇一壑龍門懷豹隠千山燕闕話鵬摶青㠶咫尺臨安路躑躅河橋去住難中丞滕公遣人舟傳送渡江賦謝一律十年雲水斷風塵一為酬知謝隠淪擊楫豈容髙卧士飛檣聊作浪逰人長康破冢應無恙逸少臨池合有神無奈夢魂秋色裡白蘋紅蓼喚垂綸王右軍有借船帖别蘇觀察君禹作曲檻迴廊玉署開髙雲斜日共徘徊縱横大筆生徒候慘淡長裾客子来狂擬持竿眠漢闕老堪攜筞傍秦臺飛查蹔乞銀河去拾取支機萬顆回君禹病瘧二月餘余過訪不能數語情殊戀戀途中追憶再成二律奉寄一舸蘆花正夕陽題詩秋色照河梁風驚宋玉三秋鬂露浥相如萬古腸劒色飛揚閩海外琴心憔悴越溪傍途逢伯樂應相笑㡬度鹽車扼太行隻字風雲逐彩毫雙緘雨雪問綈袍朱顔摠為懷人瘦緑髩能無課士勞歌徹四愁神已王篇成七發興逾豪何當一喚枚乗至萬叠吳山望海濤周元孚過訪見贈奉答時元孚方有南都司馬之擢翩翩詞客氣凌虛朗潤周郎玉不如佐郡蚤持三尺劒安邊頻著萬言書霞飄雞舌黄金殿霧擁螭頭白玉除四百樓臺春雨後看花何處不停車為周元孚悼亡百琲明珠照畫樓閨中林下並難儔新詞盡壓周公瑾絶唱先傳宋子侯落月素琴千里夢西風團扇十年愁亦知王母遙相憶肻放雙成到白頭古樂府宋子侯有董嬌嬈曲十幅鸞箋麗彩雲雙飛龍劒惜離羣哀傷奉倩傾城語慟絶安仁祭墓文夜雨乍堪琴瑟斷春風長憶珮環聞天台咫尺誰攜手落盡桃花越水濆送喻邦相移任雲間剖竹新分大郡符朱軒華轂照行途雲驅五馬朝辭越霧擁雙龍夜入吳重遣遺民歌麥穗盡搜奇士出菰蘆雙旌遍閲閭閻後釃酒能過二陸無夜登鎮海樓月色瑩然萬里如晝因憶王長公元美時方以司馬應召南都登壇初卸黑貂裘玉宇無聲夜色流十萬貔貅環漢幟三千熊虎抱吳鈎歌傳桃葉清江上曲奏梅花大海頭徙倚胡床豪興發不知明月墮南樓寄周元孚含香猶是舊蓬莱躍馬長干定㡬迴搦管客留鳷鵲殿吹簫人去鳯凰臺黄陵異日傳仙夢赤壁今時擅將材見説秦淮春滿座新詞何限篋中裁元孚方失偶而主駕部事故有鳳臺赤壁之句寄懷少宰趙公衣冠何地不蓬莱大府晨趨百吏来拄笏雲霞流十廟浮查河漢接三台牛頭寺古尋僧去燕子磯寒送客回屈指鹽梅飛詔下調羮人在鳳凰臺大司空潘公寄示河渠諸刻卒業賦此奉贈巨軸髙懸照紫霞平成功就世誰加渠通上國三千里堰䕶長淮十萬家匝地甘棠偏捧露參天垂栁不霑沙傍觀漫自工萋菲白髪臣心盡海涯寄答劉君東孝亷時新刻乃族祖子髙職方集成邂逅長安握别年清源一望路三千雙龍豫野偏藏匣片鷁潯陽未放船𤣥草閣深天寂寞赤松亭古地蔥芊當筵朗潤真如玉為憶氷清夢寐懸少室山房集巻五十
