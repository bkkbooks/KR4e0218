body:
  text: 少室山房集巻二十一明胡應麟撰七言古八首昔遊篇錢塘舟中作贈董觀察秋風肅肅鴻雁鳴南斗參差北斗横孤客迢遙過越水舊遊憔悴隔燕城燕城越水三千里憶昔聲華滿人耳藉草曾留太液旁看花誤入明光裏明光太液連西苑徃徃遊人駐雕輦楊栁春風七貴門梧桐夜月諸王館王家貴里不相親聯裾握手盡詞人鳯凰原上題詩處鳷鵲宫前草賦晨紛紛冠蓋爭馳逐載酒籠燈過輦轂緩轡同看白玉京揚鞭醉入黃金屋秦箏趙管春不休歌聲繚繞碧雲愁香塵百里昌平道飛雪千門易水流五夜論心傳彩翰珠璣滿把皆堪羨衣袂揚揚逼九霄劔鋒耿耿流雙電誰言潘陸是才人肯與王楊作後塵格調逈追天寳上風期直與建安隣鑾坡鳯閣多相值鐵券金貂總歡暱羣中忽覩三楚豪坐使瓊瑤驚四席豸冠繡服光陸離片語如金山可移暮攜奏草歸青瑣曉對封章下赤墀赤墀青𤨏生風彩手握芙蓉珮蘭􅉅元禮聲華動闕庭陳登意氣傾湖海匆匆識面比南金慚愧論文契未深欲攜短刺通華舘忽棹扁舟出漢隂荷衣蕙帶還鄉國回首交游成太息落日長歌玉樹詞浮雲遠蔽金臺色落日浮雲夢轉長却乗烟水下錢塘徘徊殿閣迷仙署寂寞川原望帝鄉帝鄉仙署空遼絶何意輶軒到吳越欲向西湖訪畫圖蹔辭北斗離閶闔雙峯緲緲揷烟霄三竺蒼蒼引畫橋清風暗拂蘇堤栁壮氣平吞浙海潮朅來問訊蓬蒿士遠思幽情何楚楚短褐長裾謁上官麻鞋布襪從泥滓屈指并州幾故人嗟咨徃事轉傷神虛傳異日山隂棹無復當時洛水春山隂洛水俱陳迹㑹見飛騰返京邑乍經薇省布陽和更上楓宸扶赤日幾年騏驥阨鹽車矯首長鳴氣不舒孫陽造父俱垂盼肯使竒才卧草廬崑崙行送大司空朱公馳驛還豫章並呈唐太常萬直指君不見黄河之水來崑崙濁流萬里經龍門環嵩絶華不少息吞吐日月排乾坤天吳揚瀾九河溢大澤龍蛇起原隰洪荒不解堯舜憂平成却藉司空力自從大禹作司空百川四瀆俱朝宗鎖壓支祈鎮淮甸至今玉策垂神功國家定鼎幽燕北財賦實仰東南域河渠一線厪帝衷維時首頼平江伯二百年來飛輓停肅皇之末何邅迍千艘莫進餉道阻臨朝南顧嗟羣臣我公崛起江之右列星顯化神明胄匡廬彭蠡毓精華西山南浦鍾竒秀早年通籍謁承明中歲翺翔漢兩京一朝起任虞庭事九官四岳咸推能沛渠已淤徐方塞巨浪滔天勢難遏兩岸洪波逈莫分百年故道誰能識神功實始南陽口夏村旣道留城走報國難将寵辱驚乗時大展經綸手櫛風沐雨卧不寧追逐魍魎驅𤣥㝠八年胼胝勲績就青天不動黄流平東連揚子息江濤北望天津散海潮車書萬國看王㑹玉帛羣方賀聖朝隆慶之中河再决帝謂元臣有遺烈一麾蹔駐淮泗清風雷寂靜波濤絶飛亷導車屏翳從馮夷海若應濳蹤金書鳥篆迹靈秘異時彷彿岣嶁峰大禹功髙古來少姬旦才多心轉小門下爭看桃李榮車前肯使驊騮老紛紛制作懸丹霄馳驅阮陸追風騷元和文譽斗山重天寳才名今古豪三朝出入方垂注投簪忽擁南歸騎蒼生常恐謝公閒黄閣難留疏廣去樓船簫鼔出皇州錦纜牙檣作勝遊羣公祖帳㶚陵晩萬姓環看渭水秋迢遞關城望鄉邑浮雲漸送匡山色蹔􅋈蘭舟水驛濱故老相逢話胷臆酒䦨倚劔心飛揚語及前朝俱感傷丈夫報國志猶在星辰錯落雙干将旌旗明發川原阻著繡晝行誰與伍滕王閣上幾留賓孺子亭前頻弔古卽今廊廟求賢急肯使元勲卧黄石緑野堂開祗蹔留終須勉為蒼生出五老東南勢轉尊三台佳氣正氤氲鸞箋倘逐蒲輪到極目燕臺五色雲時公與太常唐公燕瀫水舟中卽席命余賦此凡六百八十言送朱可大還萬安自從戰國更王風屈原師弟俱稱雄西京蘇李復繼作遺篇十九真宗工黄初七子各有得勃興杜李文章伯此道凌遲大厯還世代紛紛轉荆棘千年大雅幾茫然信陽北地何翩翩力剪榛蕪繼唐漢恍揭日月懸髙天眼中作者難盡數戞玉敲金事竒古相逢海内俱賢豪奮迹前茅追歩武看君意氣何昻藏十九謁帝趨明光胷蟠萬巻破幽眇手鍊五色囘天章藉甚聲華滿京洛咫尺雲霄見孤鶴司馬仍傳太史書拾遺頗負襄陽學飄然遇我燕市中河梁邂逅雙飛龍髙歌擊筑白虹斷劔花欲墮青芙蓉莽蒼風塵遽相别美人迢遞音容絶五年空覩芳草生萬里長看碧雲合雲泥自分隨升沉豈料重逢瀫水濱咄嗟徃事如夢寐解衣共拂京華塵五夜論文思逾壮濁酒淋漓對惆悵天地遲迴秉燭間星河磊落孤舟上眼看世變隨江河憫時憤事憂彌多百川砥柱賴公等異時詎肯揚其波伯樂張華古難得時乖蹔斂圖南翼燕雀寧爭世上名蛟龍豈是池中物一朝變幻乗風霆磅礴六合摩崑崙卞和之玊詎三刖季子金多安足論髙天黄葉連鄉國大艑乗風度秋色短歌送汝不成聲握手臨岐淚沾臆千秋傑閣倚清沙百尺珠簾挂晚霞兹行定擬滕王賦一寄蘭州孺子家幔亭雲氣歌為督學滕公作君不見武夷之峯髙揷天幔亭玉女騰蒼烟層巒列嶂三十六相傳秦代巢真仙狂風怒號滄海立海水蹴日日欲没峯頭雲霧長晦㝠青虬赤鯉當晝集蓬萊東望若可招貝闕珠宫浮巨鰲紛紛群帝持綘節揚雷激電朝丹霄兹山形勢實竒絶紫氣迢迢亘吳越扶桑萬丈渤澥低齊州九㸃乾坤狹溪流屈曲環清沙緋桃夾岸蒸紅霞鸞鶴翺翔度空谷猿猱寂厯啼山家危岩絶磴倚石壁去天冉冉不盈尺仰視列星河漢垂下窺飛鳥松蘿黑藥爐經窟多遐蹤蘇門髙步隨韓終霞光半落錦繡座日色返射金銀宫仙居縹緲隔人世環珮飄䬙落雲際半夜天鷄絶頂鳴清秋石馬凌空繫雜花幽草何芊綿松枝柏葉皆堪餐洞前三女不相待彷彿麻姑留翠鬟祝融梁父空鬱律太乙終南自騰擲遍觀豈若兹山竒寥泬清虚閟靈迹真人度世三千秋俯看人代如浮漚朅來欲濟生民困拂衣長嘯離丹丘金書玉檢秘空麓鶴馭鸞駢罷馳逐一朝乗蹻來東南手挽江河障平陸眼中軒冕如埃塵葛洪王遠時相聞清夢常隨岩際月幽懷每逐洞中雲即今宇宙須真宰拭目經綸横四海漫勞黄帝訪空同蹔借庚桑居畏壘武夷山何蒼蒼真人下閶闔草木無輝光他時簪笏升岩廊致君堯舜追虞唐却駕白鹿還仙鄉天齊地久長無疆題鐵幹回春圖山隂劉世儒工畫梅以巨幅贄余乞詩為賦吳綃七尺鋪寒玉幻出名花照幽獨微霜淡月春朦朧何處佳人卧空谷畫梅自昔傳華光擅竒更有王元章千秋絹素漸零落古色黯黯留虚堂邇來劉生最殊絶十載含毫走燕越一榻常棲剡水雲雙帆忽下桐廬月看君落墨如有神解衣盤礴隨天真淋漓數筆生意動隂崖頃刻囘陽春林危逕仄飛鳥絶偃蹇虬龍鎖深穴彷彿羅浮萬丈峯孤根倒挂千年雪大枝詰屈粘莓苔小枝蜿蜒花亂開虢國蛾睂逞疎淡壽陽粧額矜徘徊風臺月觀遙相望園林更染孤山樣絶艶驚從漢苑來氷肌更出唐昌上吁嗟劉生畫己仙坐令鐵幹摩蒼烟髙屏巨障欲飛動素册單條絶可憐長安五侯招不得王家珍重走書乞何縁好博胡生詩亂灑琳瑯向蓬蓽隂鏗不作何遜亡人間佳句何茫茫暗香疎影亦長語後來誰復傳篇章嗟余潦倒筆力弱細嚼瓊朶搜枯腸劉生劉生勿悽蹙自古髙流混凡俗卽今且作瀟湘遊坐觀瀑布匡山麓他時問訊子猷船倘寄鵞溪三百幅舟次錢塘謁滕公值風雨夜作解所珮為寳劔歌江潮十月如山丘北風轗江江倒流星河一片落寒鐵暗中擎出蛟龍愁君不見豐城獄裡百鍊鋼精靈埋没三千霜當時不遇雷與張至今神物終濳藏又不見曹沬手中三尺水却制桓侯輕管子一朝壇上行竒謀百代聲華耀青史胡生寳劍人不識十千買自邯郸邑朅來持贈歸滕公繞座虹光流四壁憶昔干将初鑄時睥睨歐冶麾風胡低迴天地鍊精氣噴薄宇宙烹洪鑪泰山為鐔渤海鋏神鋒指石石欲裂緑柄猶沾苔蘚文赤花半墮芙蓉匣有時夜嘯風雨聲千夫辟易萬馬驚山中魍魎晝摧絶水底鯨螭寒不鳴湛盧飛景亦凡俗純鉤巨闕皆碌碌取次横裁麗水金紛紜碎割昆吾玉一揮四國如建瓴挽囘日月轟雷霆朝攜赤堇鬼神伏暮宿蒼梧濤浪青荆軻孺子本無術匕首蒼皇挑強敵片言枉殺樊将軍易水悲風轉烏邑項王智力何豪雄廢書苦學仍無功垓下誰知萬人敵時哉不利嗟重瞳豈若胡生磨此劒寸心耿耿橫孤電十年坎坷意不平提與滕公肝膽見滕公豪氣凌穹蒼一朝覩此神飛揚願持此物登朝堂時時拂拭生秋霜蚩尤遁迹魑魅藏周遊八極還大荒虔州歌送大中丞江公之南贑東南海色何蒼蒼旌旗夾岸澄清光迢迢斧鉞自天下帝遣中丞巡朔方銅符玉帳分千里畫甲雕鞍圍綉綺三軍鼙鼓寂無聲萬竈風烟晴不起中丞自是河宿精乍窺人世辭蓬瀛流沙咫尺不可越怒鞭海若驅長鯨停車忽傍黄山麓笑揖浮丘跨䨥鹿曉逐霞光度赤城暮餐雲氣離天目胸中遠思凌泬㵳却來湖海稱人豪單詞隻語露肝膽白日不動蒼旻高猿韜豹畧多竒跡早握兵符窮戰術八陣常翻魚復圖千言自獻龍門策策名飛步登皇州紛紛簪筆皆儒流斗邊夜嘯䨥龍劒天上春開五鳯樓賈生意氣本英發終軍才調何穎脫兵鋒直欲欵匈奴尺組恒思縶南粤華袞朱軒出未央竹馬壺漿迓道傍已見褰裳臨薊野還㸔賜服下南陽再歲超遷左馮翊鳯凰神雀咸來集聲名從此播寰區二省三臺勞涉厯東南財賦日徬徨一麾承詔來餘杭唐代征輸屬劉晏漢家平準羞𢎞羊政成績奏多清燕越水吳山自游翫酹酒初登武穆祠飛書忽下明光殿匆匆督府推賢臣九重煥爛傳絲綸隴西黎庻望充國河内軍民嗟寇恂䖍州形勢本四塞渺渺川原開郡邑波濤半蹴閩海青瘴癘斜連惠潮黑汀漳諸府列犬牙紆縈四省藏千家窮鄉絶峒鏁魑魅深岩大澤盤龍蛇廟堂撫髀思經濟時來崛起風塵際三苗方畧從便宜九姓羌渾隨節制軒車雜遝送離觴十月江城滿路霜大将樓船横浙水元戎隊伍出錢塘錢塘浙水俱秋色囘首嚴陵瞻故國白岳崚嶒帶雨寒蒼巖兀突齊雲立雲岩白岳望不停番陽彭蠡江溟溟千年滕閣迷丹嶂萬仞匡廬削翠屏厯厯關河度章浦緩轡停驂問風土送客應過孺子亭提兵却入中丞府中丞號令何雄哉指揮叱咤行風雷将軍列戍秦城遠壮士長歌漢壁開建牙吹角觀游獵士氣軍聲騰百粤鐵馬驕嘶海月寒琱戈乍舉岩雲裂海月岩雲壮品題登壇横槊思清凄慷慨寧論班定遠風流不減庾征西緩帶時時臨絶域綸巾羽扇何閒寂驃騎空馳大漠烟詞人枉勒燕然石崔巍銅柱鎮封提縹緲珠崖接五溪分耕坐使陽春布講武俄㸔太白低講武分耕嚴紀律瀘夷永靖先零輯主恩時賜鷫鸘袍兵氣濳消狐兔窟津亭黄葉轉紛紛腸斷驪駒不可聞晚思蒼茫盈落日愁心悽切駐寒雲男兒意態元磊落抗手何須怨離索指日威名虎豹關他時事業麒麟閣雨露沾濡大海濱谿山隨處淨烟塵更令文字流荒服行見衣冠入紫宸題黄初平叱石圖古木蒼藤挂風雨白石峨峨洞門倚黄家兒曹不解事叱作羣羊遍空起胡生較汝差長年俯窺五岳石五拳他時一叱五羊起白雲飛盡羅浮巔少室山房集巻二十一
