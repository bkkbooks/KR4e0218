body:
  text: 少室山房集巻八十九明胡應麟撰傳三首補傳一首補唐書駱侍御傳駱賓王越東陽郡人也父為博昌令見本集與博昌父老書中賔王生七歲能詩嘗嬉戲池上客指鵞群令賦焉應聲曰白毛浮淥水紅掌撥清波客嘆詫呼神童比長天才逸發與王勃楊炯盧照鄰並以藻繪擅一時號垂拱四傑云先是唐起梁陳衰運後詩文纎弱委靡體日益下賔王首與勃等一振之雖未能驟革六朝餘習而詩律精嚴文辭雄放滔滔混混橫絶無前唐三百年風雅之盛以四人者為之前導也永徽中歴官侍御史時高宗孱不君后瞾擅國賔王覩唐運且密移數上書言天下大計后瞾怒誣以法逮係獄中作螢火賦以自廣乆之謫臨海丞高宗崩后瞾廢廬陵改唐物賓王恥食周粟卽日棄官歸賦寶劒思存楚金鎚許報韓之句㑹英公徐敬業起兵誅后曌賓王仗䇿從之敬業雅慕賓王名得之大悅引至戎幕中羽書文告之屬一切諮焉旣而義師大集將直指長安賓王援筆慷慨為檄文以諭海内詔云偽臨朝武氏者人非溫潤地實寒微密隠先帝之私陰圖後房之暱踐元后於翬翟䧟至尊於聚麀猶復包藏禍心窺竊神器君之愛子幽之于别宫賊之宗盟委之以重任嗚呼霍子孟之不作朱虚侯之已亡燕啄皇孫知漢祚之將盡龍漦帝后識夏庭之遽衰敬業皇唐舊臣公侯冢子因天下之失望順宇内之推心爰舉義旗以清妖孽南連百越北盡三河喑嗚則山岳崩頽叱咤則風雲變色以此制敵何敵不摧以此圖功何功不克公等或居漢地或叶周親或膺重寄于大廷或受顧命于宣室言猶在耳忠豈忘心一抔之土未乾六尺之孤何在云云檄傳四方振動瞾讀之至一抔六尺語凜然曰如此材而流落不偶宰相之過也敬業進兵拔潤州敗偽周將雷仁智與李孝逸遇下阿擊其前鋒大破之敵垂遁適星墜營中魏元忠縱火圍逼敬業軍遂潰黨與悉禽獨賓王變姓名逸去削髮為浮屠居天竺靈隠間十餘載考功郎宋之問謫官嶺表宿寺中賦詩得鷲嶺龍宫之句思不屬方苦吟一老僧卧禪榻問故遽續云樓觀滄海日門聽浙江潮之問大駭質明趣訪之逝矣識者云此駱賓王也以是知敬業之敗有司慮曌以檄故必蘄得其人因斬貌類者以獻云始賓王父早亡奉母竭力裴行儉再辟幕下皆陳啓峻辭意致委篤人以方李密陳情表世傳士先器識之云殆匪實錄至奮身為國舉宗百口棄置若遺其忠孝天性然也賔王旣以起義亡無敢裒其製作者廬陵復辟累詔訪求魯國郗雲卿始集傳之天寶以還唐風載變後生輕薄齮齕前薪杜甫氏以淩跨百代之才特推轂賓王至擬之江河不廢李夢陽王世貞本朝稱大匠咸歸甫論篤而斥行儉為腐談新都汪道昆尤重賔王檄洎帝京疇昔二歌方諸秦漢間作者當孽曌革運滔天刳剝生靈毒痡九野葢開闢未聞之變一時唐之臣子宋璟姚崇婁師德輩俯首北面蒲伏裙裾殆不知廬陵何物獨賓王仗義執言大聲其惡瞾雖漏網逆狀纍纍千載讀之轘磔靡過視行儉目擊惽滛苟全汚濁者器識先後何如哉自唐世因仍周厯目以叛臣剌戾相沿郡乘邑志咸屏弗錄明萬厯丙子滕觀察伯輪董浙學事于是門下士胡應麟婺人也首上事訟賓王云竊見故唐臨海縣丞駱賓王大節高風瑰材卓行詞華冠代學業超群至孝篤于平生孤忠竭于始仕微官奉母任武功簿而不辭直道事人謫臨海丞而靡悔屬牝晨之篡國𤣥樞撼而八極搖奮雄略以登壇赤羽呼而萬衆集慟一抔于故主問六尺于元兇歴數屠兄殺子之姦鯨鯢褫􅅎亟發酖母弑君之惡䝟貐寒心旣首建義旗將裂渠魁于七廟旋身膏逆刃尚飛靈爽于千秋偉哉器量無雙詎曰文章寡二迺史氏頽靡弗昌言于紀述而州民謭陋迄罷享于蒸嘗誠亘古不白之沈寃實闔郡當先之鉅典伏惟闡發幽光播揚茂烈聿修廢墜廣勵風猷俾乾坤壯氣恢𢎞于崇正之朝海甸英魂鼓舞于右文之日書上事垂下所司適擢去不果已蘇督學濬至亟申前議列祠郡城已洪督學啓睿至復采夙聞專祀邑里三觀察使皆閩人雅尚風節而後先繼至故自賓王舉事歴宋迄今八百餘載而公論始定于一殆若有天意存焉於戲賔王不死矣顧新書文苑闊略未詳而劉昫舊唐論述尤謬因稍據臨海丞集掇其忠孝大都曁埜乘稗官之足徵信者為駱侍御補傳以傳胡應麟曰吾越之言詩文率繇賔王始非直婺一方耳也迺余產婺中于賓王實晚進云賔王檄后瞾大惡數十義炳日星而史臣以怨誹􅀈之偽周羣鼠倒置君臣大倫以媚瞾可也而亘千百載而下而皆周之史何也大明御㝢覆盆洞鑒勾萌蠕動有濫必伸而矧于賔王於虖歴世乆而公論明葢記之古昔矣家傳一首家大人歴履迹家君諱僖字伯安一字子祥厥先安定先生瑗安定先生仕宋敎授吳子姓留吳興遂世世家其地勝國兵起徙蘭谿五傳而為贈奉政大夫禮部儀制司郎中富是曰先大父先大父質而愿與兄弟同業賈獨重然諾安義命用是賈日困而家君總角則已悉讀素問靈樞金匱等窮其說忽翻然悟曰大丈夫生明世當用仲尼周公道沛澤萬里胡株守一技亟棄去業儒補邑弟子員試輙高等是時太宰唐公龍方請告偶讀家君文大奇之立召見家君甫弱冠衣弊衫草屨進而神彩秀徹風度朗朗玉立一坐客盡傾太宰顧謂諸君是寧獨藝文卽器識亡兩幾欲以女女家君中奪母命止然自是遇家君特厚歲問遺無虚日巳酉當省試督學豐城雷公行校士得家君巻快甚為私識其處適萬安朱公以督閩學至訊雷公諸生義雷公雜取家君巻授之朱公閱未竟擊節曰此空羣足毋失也雷公徐摘示所識處為撫掌一大笑兩公皆當代文辭宗牙頰奔走天下士顧交重家君若此是秋赴省以名高謀僻寓習静得潘氏園夜束書至則羣蟻坌集室中無隙地一僕夫請縱火焚之家君顰蹙曰若以是蠕蠕非生類耶一舉火數萬命立盡胡忍也遽踉蹌還寓越數日入試精思首義至日晡竟三義闔闈燭矣復屬四義草忽蟻集筆端如蝟閣筆稍稍去再舉筆再如前時漏且二鼔家君顧事急則不復屬草而録三書義甫竟夜過半旋縱筆書四義文思輙溢出如泉湧而蟻亦絶不來輟巻申旦矣已中式謁座主方祥先生謝方先生迎謂吾讀子四經似非人間物也始信為羣蟻報云巳未第進士迎大父母入都歲歉甚家君罄俸入市白粲大父母而身脫粟俄鄭太宜人病匍匐籲天竟不起奉喪還瘵瘁骨立闔郡嗟咨其孝癸亥服除以郎中公春秋高欲終養郎中公趣之乃行授禮部儀制司主事乙丑提調塲屋爬搔宿垢百廢具振竣役條陳便宜十事將上之㑹聞郎中公訃奔歸毁瘠如喪太宜人禮而貧愈益甚聚徒自給靡寸牘入有司戊辰再謁選太宰蒲州楊公夙習家君名卽出他精膳郎以家君補其處踰歲遷祠祭員外逾歲遷主客郎時諳達以孫巴罕故乞款塞舉朝叵測宗伯潘公咨主客郎家君謂敵一小入殺傷鹵掠不可以億計今納款歲費不過十萬緡而於朝廷體甚尊許之便諸大臣議以克合凡宴錫賚予悉委所司家君擘畫處置鑿鑿中􅑆政府大以為材驟遷秩儀制郎亡何穆皇帝上賔一時登極改元覃恩肆赦詔書宣布中外踴躍咸以數十年所未覩也於是當以大典勞遷九卿銓曹虚秩待而㑹有陜諸王襲封事高皇帝制諸親王庶子封郡王親王絶而將軍中尉繼者仍故封不在例而王某故由中尉入其次子亦欲得郡王封家君持不可而某覬覦王爵甚行萬金大璫恫愒扇謗旁午家君弗為動曰吾不過罷儀制郎耳姦高皇帝三尺卽幸漏網謂臣節何事迫權璫迺授旨吏部出家君湖廣右參議葢不踰月襲封典行矣楚歲比大水荆襄二郡彌望魚鼈而大司農方日夜持尺籍責委輸家君下車太息卽日請行郡身暴草野中三月盡得虚税蠲額十之四民大悦頌生我而二郡故江陵相里也江陵相新得柄威福甚諸奉檄楚者伏謁視家臣而家君過其門僅一刺江陵父治第宅四方餽餉幣山積家君公覿外毫不私江陵子若弟赴省試諸司率毁堦級降禮貌家君曰吾天子藩臬也不復能折腰事權貴由是江陵積怒而當事者遂上章按家君督餉亡狀例運艘渡江三月淮五月後期責所司而是歲楚艘皆先月度道路扼腕而江陵從中主竟奪級調雲南按察僉事家君被命去楚吏民遮道留以千數已乘扁舟浮洞庭度沅湘吊九疑益西南行夜郎貴竹萬山中攬觀夷夏大防天地日月所窮際出没凡百日抵滇蒞政愈益以恩信逮下不為時尚阻訟牒鬭争輙賜粟帛解散之境用大治所轄地鄰緬甸緬以大理饒涎沫乆而属夷刁氏父死兄弟争立其兄尤虣猾自分庶孽不得請則操戈為緬前當道旰食下其事家君家君飛檄緬諭以禍福大旨謂若不過中國一郡縣當若盛時悉若衆窺我我沐將軍以偏師殄若亡遺類今皇帝神聖橫如倭强如夏悉心委命若乃無故入奸人言若朝啓天朝大兵夕至鞠若地為茂草若熟計利害毋悔緬得書震怖謝家君則身馳至刁氏立二人庭下責大義令疾自新兩人讋且泣誓世世不復倍因為中割其地還報撫臣大喜與臺使交推轂家君仁而有勇遂以僉事晉藩參不越歲超臬副家君前後敭歴滇四載所至桁楊罷陳囹圄若洗深山窮谷耳胡使君名輙頂禮呼佛子然家君為人持大體捐小苛樂拊循惡迎合屬僚自守令椽丞感刺骨靡二而同列文深與直指貴倨者往往枘鑿癸未大計卒從不及論疏有滿腔赤子等語家君慨然曰陽城心勞撫字吾豈以鷹鸇易鸞鳳哉且吾行年六十間關萬里博一官一級何異味雞肋今者吾得我卽日拂衣還里中大召親族故舊日燕飲相勞苦窮乏不能婚者損貲授以室喪暴露者畀吉壤毋令後時宗人數百指日夕待家君以舉火間有陽請乞而陰背訾者家君如弗聞他日更以窮歸益復厚遇之其樂為人所難率此類也家君博大慈祥忠信坦厚皆天授宿植幼卽慕司馬文正公為人三尺童子不加一謾語無疾聲無厲色無城府無町畦絶口不談人過人以橫逆來恒樂受至鄉鄰有鬭則引咎自辜不能安寢食尤好捄患卹灾老弱病躬調藥飼饘粥下逮丏徒賤役靡不然賴以全活甚衆生平祭祀外未嘗殺牲而於小物微命逾謹嘗大㑹燕中貴賓賓垂集顧簷前一蠅戢蛛網惻然取置掌理其結結纒糾十數重家君竭心目力自己至申卒活蠅而後舉㑹龜鼈螺蚌之屬必重購投深淵日以千萬數卽蜂蠆亦不令人傷第謹避而已家君外和而内介與居終日挹畏不自勝一遇大節臨大義則賁育莫能奪故一扼于中貂再扼于權相又再扼于臺使者皆坐此也始用布衣奮閭巷中間空乏隠憂險阻毁折靡不備而意常豁如視宇宙百物一亡足嬰其内自以少時抱羸疾數勤大父母稍壯卽斷一切嗜欲今年踰耳順形神甚茂鬢鬒黑而貌敷腴驟而望之四十許人也雅好讀書諸子百家靡不究業以擴見聞不蘄為博長吟短章援筆立就業以暢情素不蘄為名居常不談性命而被服仁義聞望偉然自嘉隆來薦紳先生童孺走卒無問識不識以為鞠躬君子大學士李公春芳都御史何公遷天下稱儒碩咸忘分傾葢延至家塾命諸子拜床下善人倫者僉謂家君孝謹類萬石平恕類劉寛剛操類嚴挺之雅量類婁師德樂善好施類白樂天范堯夫至仁䘏懇至昆蟲草木靡不周遍則于古罕見其比葢實錄云家君他媺不可更僕盡不肖麟自束髮服膺庭訓迄今靡尺寸樹且身抱狗馬病大懼一旦溘而令家君淳德冺冺于當世用是不量謹掇拾大都如右以俟當世大人君子之秉椽筆者自敘一首石羊生小傳石羊生者金華山中人金華山道書曰三十六洞天故黄初平牧羊處也生少迂戅好談長生輕舉術又所居鄰上真于是里人咸謂孺子不習當世務而遊方之外豈曩昔牧羊兒耶生聞輙大喜自呼石羊生云生父憲使公母宋宜人生五歲憲使公令出侍客客占對必屬九齡受書里中師業已厭薄章句日從憲使公篋中竊取古周易尚書十五國風檀弓左氏及莊周屈原司馬遷相如曹植杜甫諸家言恣讀之憲使公奇其意弗禁也十三四為歌詩稍稍聞里社中十六補邑弟子員已挾書從憲使公北下錢塘浮震澤並吳㑹金陵擊楫大江益東走青徐齊魯境踰趙入燕乞食長安市悲歌薊門易水間所至興㑹感觸一發于詩時莊皇帝御㝢八荒敉寧萬里重譯薦紳先生際㑹綦隆紬述古始吳則王司宼太常歙則汪司馬楚則吳參知蜀則張司馬洛則張中丞皆龍奮虎蔚為世宗匠生每慕悦其人顧諸君子或敭歴四方或退居一壑亡從識面俄黎惟敬自南海來從友人邸讀生閒居十詠咄嗟何物寧馨詩四壁冠也而徐子與周公瑕戚希仲歐楨伯陳玉叔何啓圖康裕卿沈純父祝鳴臯先後至咸交口譽生盱眙李環衛惟寅方盛與海内諸賢豪談天碣石一日耳生名亟虚左席以上客迎之由是生歌詩頗傳播長安中諸長安貴人往往愿交生亡何憲使公以襲封忤大璫指補外藩生侍宋宜人還越宋宜人患頭風生日夜治湯藥遂感羸疾跳匿金華山而㑹大司空萬安朱公馳驛過瀫水始朱公從長安覩生詩數物色至是發使要生山中艤舟待載移日生心感朱公知愧亡以報則述公治水顛末賦長歌七百言以為獻朱公擊節示督學滕先生曰奈何當吾世而失此人滕公讀大奇之亟移文博士廩生并檄生入武林時侍御蕭公萬公合試越東西士千人再拔生文冠次年丙子以經義薦于鄕生始願從赤松兄弟牧羊窮谷間中屈意當路恒勿勿每攝衣冠則攬鏡自笑是楚人猴而沐者然用二尊人故未敢遽絶去丁丑夏北還杜門谿上適王太常先生自吳中來顧謂憲使公阿戎安在吾願就與語浹談竟兩晨夕瀕行王公握生手曰不佞縱橫藝苑自于麟外鮮所畏差强人意獨生耳則又曰生幸及家司宼胡可弗一遊其門先是生讀弇州四部集謂古今文章咸總萃是幸太常紹介劇懽輙以尺一通司寇司寇業聞生得生恨晚首為生序少室山房詩挈衣鉢授焉生自揣亡能萬一弗敢承也司宼數期生海上坐宋宜人未能赴葢自是不上春官者六載邑明府喻邦相嫺于詩意不可一世獨善生游覽倡和亡虚日壬午宋宜人病稍瘳而憲使公屢自滇發使督生偕計生顧長公知闕假北上亡從面因努力治裝過吳謁司宼弇山堂叩曇陽太師恬澹觀恍如躡閬風升兠率揖金母而拜木公其明年癸未與張中丞遇都下張中丞者新蔡張助父也生素不相聞邂逅朱山人汝修館片語投合肝膽形骸幾欲為一卽傳稱傾葢如故不足喻也俄再下第還里則張大司馬前此弭節過訪生且屬憲使公必致生幕下生則復入武林報張公而少司馬新都汪公至自歙生則復謁汪公湖上汪公持生刺倒屣出于坐間脱匕首視生此戚大將軍贈也生能吐奇語賦此乎生夙慕汪公甚卽援筆綴長歌千言旣戚大將軍至嘆曰名下無虚士生果然汪公旋挾生過弇州伯仲于中路序生詩所寓寄彌篤至洎抵婁江張大司馬亦取華亭道來㑹諸君子合并樂甚劇飲沈酣生以一年少翩翩盛集諸君子咸國士屬之人人意得也生結髮從事詞塲于當世名文章士僅呉明卿未識面目餘鴻碩俊髦交游莫逆徧海内然于時尚益枘鑿丙戌入都復不第葢自是三北禮闈矣人或咎生背今趨古生聞輙逌然笑若欲以萬鍾不朽我乎生性喜静寂惡紛華于世味聲色狗馬軒冕玉帛泊然獨偏嗜古書籍所購經史子集其世自洪荒以至昭代其梓自吳越以至燕閩插架幾四萬巻治屋三楹貯之黎惟敬大書其楣曰二酉山房而司寇為記生日坐卧其中毋論里中兒雖同室罕覩其面又少慕尚子平為人而稟賦孱弱乏濟勝具因繪圖齋壁綴詩其上曰卧遊室以自遣性尤好纂述所著書有寓燕還越計偕岩棲卧游抱膝三洞兩都華陽蘭陰畸園邯鄲養痾婁江白榆湖上等集六十餘巻詩藪内外雜編二十巻筆樷三十六巻丹鉛新録八巻藝林學山八巻弇州律選六巻他未行世者六經疑義二巻諸子折衷四巻史蕞十巻婺獻十巻皇明詩統三十巻皇明律範十二巻明世説十巻古韻考一巻二酉山房書目六巻交遊紀略二巻兠𤣥國志十巻酉陽續俎十巻全姓名考十巻蒐輯諸書有群祖心印十巻方外遐音十巻兩司馬録二巻考槃集十巻談劒編二巻采真游二巻㑹心語二巻類萃諸書有經籍㑹通四十巻圖書博考十二巻諸子彚編六十巻虞初綂集五百巻以婺先達無若劉孝標駱賓王二子孝標博洽冠古今當梁武忮君不少殉而賓王武氏一檄為唐三百年忠義倡世率以文人亡行視之于是合傳二子而輯其遺文為一編㑹閩蘇君禹來督學讀生文稱善相屬卽日檄賓王入郡祠千載鬱閼之疑暴濯一旦生亦頗自厭意云生疎睂秀目長身望之癯然野鶴姿長經月不梳櫛科頭松下夏則袒裼裸裎爇沈水據槁梧翛然莫窺其際隆冬盛寒于雪中戴席帽著高足屐行危峰絶壑折梅花滿把嚥之當其為詩歌㝠搜極索抉腎嘔心宇宙都忘耳目咸廢片詞之合神王色飛手舞足蹈了不自禁以故人相率曰狂生至性孤峭寡諧慕雅士若渴惡俗子若熱又相率病生狷惟生亦莫能自名姑隨俗牛馬應而已始生齒髮盛强寤寐古人櫜鞬當代鋭欲敝帚一家追隨百氏之末迺今疾病殷憂年踰三十顛毛種種自顧項頷腰肢匪塵世物亡論一切有為視同夢幻卽文字結習且一洗空之旦夕將從赤松兄弟採藥金華石室間呼吸靈和永絶世緣參乎大業遊乎混元斯生所夙負然哉惟是生平歴履大都不亡足述者懼久益泯泯因稍掇拾為石羊生小傳以自考焉吊詭士曰士誠各有志哉夫當綦隆豫大之運疇不欲自奮以取世資石羊生獨厭薄一切為澹泊亡媒之業此其志可知也左丘氏亟稱三事言若匪所先者他日之論魯大夫臧文仲也獨曰身没其言立是之謂不朽此其說奚以徵焉要之德與功非言弗樹若孟列達尊輕重各有攸當必以上次論溺其指矣夫劉駱兩生是非旁午歴千餘載至生而始定生業今方覆瓿百年之後或盛以靑黃文之惜當世子雲不得與異日為子雲者一交臂語悲夫少室山房集巻八十九
