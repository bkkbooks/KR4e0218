body:
  text: 少室山房集巻六十六明胡應麟撰七言律詩五十一首唐明府長公新搆園亭三泖之上書來徴詩賦荅二首翛然十畝占菰蘆净室名香饌埜蒲賦就園亭聞拙宦書成闤闠識潜夫青山有夢飛盤谷渌水無心乞鑑湖漫道岩居堪獨樂蒼生能識謝公無亭子蕭疎隔水開聞君十尺卧蒼苔芝從甪里先生乞术倩茅山道士栽簷際數峰如斵就檻中羣石盡飛来清沙蕩漾鳬鷗集永晝相過暮不猜寄鄧逺逰逺逰書來云新搆書樓髙矗雲漢索余一律紀之聞爾為樓近鬱藍晴川厯厯豫章南當檐河漢三千尺繞架雲霞八百函徑壓蓬蒿同蒋詡堦蔵蘭菊類羅􅍭書成白馬深相憶不得南皮竟夜談春日張明府過訪賦贈二首明府閩清源人而為烏傷宰駱侍御舉邑賢祠明府力也熒煌車盖集檐牙握手孤城送暮笳紫氣乍浮蒼嶺月清光時墜赤城霞雙飛玉舄髙天外獨奏瑤琴大海涯聞説河陽春爛漫一笻能許叩官衙空齋一榻臥莓苔上國雙旌叩草萊拂劎星光延浦合飛觴雲色幔亭来詩傳勵志驚髙唱賦倚思𤣥識異才莫訝絃歌猶下吏黄金千尺步燕臺閩中黄孝亷過訪作花底何來抱玉琴一燈聨袂夜堂深舟移九曲多雲霧笠戴雙溪半雨霖射虎愧余終落􅅎雕龍憐爾驟同心胡床欲起征西讌百尺危樓望水潯晉安林計部以翰貺見存賦謝并寄懐仲兄貞曜先生時計部在淮揚經旬寒色倚綈袍窮谷跫然墮彩毫五夜書傳淮海月千秋詞壓廣陵濤中朝劎舄聲華逺故國塤箎夢寐勞二十四橋花滿目吹笙彈瑟擁持螯分曹何處最風流燈火維揚近石頭蕭鼓萬家隨畫㦸舳艫千里遇牙籌東園棠樹經春别西嶺梅花厯嵗逰計日候公䢴水上月明重卧舊青樓揚州有梅花嶺題天恩四諡冊有序晉安林氏自文安厯康懿文僖文恪四公竝翺翔八座賜謚易名一門之盛古所未有廼文恪二仲奮翼熙朝子姓繩繩彌益顯大将來異數未可量也覽誦欽懼輙綴塵草奕葉恩光道路頻一門華衮動星辰三傳鳯徳依清廟自文安至文恪三世八座皆以正直忤時不及大拜四拜龍章出紫宸金匱易名蔵太史玉堦銜命發行人君看琬琰新成録百代何方殿後塵讀林氏文僖文恪二公集有序家君登己未第文恪公知貢舉而不佞受知貞曜仲季盖兩世通家云金莖雲色近蓬萊禮樂文章寄上才三世聲華懸魏闕一時詞藻擅梁臺蓮燈後夜中官集藜杖先春太乙來羨殺庭階雙玉樹聨翩花蕚照鴻裁屠緯真訪睿父㕘知厯朝真諸洞壑暫憇葛陂寄聲盛氏兄弟渴欲不佞一過從廼余自臨安歸緯真發逾月矣賦此寄訊且期再至同入天台雁宕為汗漫之㳺洞口君攜赤玉虬湖堤余躍紫驊騮四愁明月歌平子八咏寥天問隠侯上苑雕龍羣彦絶中原逐鹿幾人留桃花萬樹仙娥近為報屠郎續舊㳺憶在臨安舜舉觀察數過從旅中自庚午迄丙申嵗致手書益以嘉貺屈指嘉隆詞客幾盡靈光一柱僅觀察存而余以晩進忝竊深知殊感且作園居多暇賦此寄懐嘉隆詞客草半􅇗指㸃靈光一柱懸紫電蒼龍浮大壑朱霞白鶴麗髙天晨飛杖屐東山墅夕縱壺觴北海筵溪雪滿空狂興在聨舟何日話登仙世叔通侯以選詩新刻見貽賦謝因訊説仲文學二首材官十萬浄蛟涎賦客三千侍草𤣥劍拂蒼龍淮海上帆飛青雀潞河前中郎論豈當年秘太史書寧百代傳妒殺南樓絃管夜胡床相對月華圓天吳河伯静無譁獨坐平乗似漢查客子抽毫題桂樹将軍横笛弄梅花蔵山業在神偏王治水功成鬢未華莫上燕臺頻倡和風傳雙嘯入龍沙㕘知洪公舉駱侍御吳中丞朱比部同入賢祠喜而有作先是蘇君禹督學按部余為駱舉呈入郡祠迄今始祠于邑廟祀新裁日月懸千秋輿論協名賢髙風慘淡三君列大典熒煌八邑傳俎豆竝陳丹雘底旌旗同曳翠屏前鄉閭不盡摳衣思倚和猶能筆似椽題張明府子環考績榮封册百里歌聲奏管絃三臺馳疏達甘泉椿萱日永髙堂上桃李雲蒸大邑前燦爛冠裳龍闕下飛揚綸綍鳯池傳中朝屈指思良驥極目黄金照海瀍送汪山人還四明驪歌一曲亂雲馳白帢黄冠照路岐八咏樓中人臥久四明城外客歸遲髙天暮雪帆飛動大埜春星劎陸離極目河梁慙握手壚頭霜色對凄其送徐太常之白下驪駒又唱瀫城西龍劍尊前惜解攜旭日葵榴争吐艷春風桃李自成蹊千秋大業傳鄒魯六代繁音陋宋齊屈指鳯臺吟嘯暇可無雄筆到幽棲吳允兆過訪同趙太學夜集坐中驟雨如注申旦迺别望斷雙魚霅水濆深居長日念離羣詞人躡屫來今雨病子支笻出亂雲縹緲蘭膏延度曲繽紛梧葉墜論文相逢垂老堪留戀莫厭蕭蕭徹夜聞同吳允兆登趙文學環翠亭時梅雨大作談棋竟暮危亭髙峙越江湄城郭千家暮靄移北海聲華聞異代西京才藻見同時雄風却暑離山逕驟雨催凉到石池最是辟疆豪興發一枰花影度敲棋送吳允兆還霅中戴笠披緇問隠淪平原相值未經旬湘山蘿薜懸髙士越水蘭苕限美人㳺覽謾誇雙屐慣分攜長恨一舟頻浮家咫尺非難事為覓𤣥真舊釣綸張志和婺人徙霅中夀葉母趙太孺人詩有序邑明府涇上葉侯宰我三稔民用大和監司奏厥績天官得貤恩所生母孺人命垂下而母適以是秋屆七秩翟冠霞帔玉醴瑤漿一時並集竒斯甚矣不佞沐侯知逾越覩兹大慶喜溢乎辭紫氣滄溟日夜懸玉冠瓊帔照華筵誰将黄鵠歌中事盡入青鸞詔裏傳南岳霞光雕輦外東陵雲色畫堂前桃花萬樹瑤池熟好是仙郎作令年王㕘知過訪賦謝風雨衡門一逕寒青雲何事問魚竿輝煌鹵簿留丹壑搖曳旌旗度翠巒永夜薇花千吏肅深春棠樹萬人懽酬知不盡書生意慷慨魚腸抱月彈葉明府創浮梁新成往來利涉二律以紀樂觀并寄師相趙公夾岸津亭架彩斿艨􅀈不斷大堤頭長虹盡壓雙溪浪畫鷁横分萬里流幾處尊罍浮白坐誰家環珮踏青㳺甘棠滿植沙洲上荏苒仙鳬近玉旒三百欄干照畫檣澄波如黛壓飛梁天浮烏鵲長河畔地接黿鼉大海傍㳺女東西矜拾翠行人南北罷褰裳乗輿最笑公孫拙何限恩波瀫水陽竹書架黿鼉以為梁春日侍家君過祝太學留宿别館夜出羣少侑觴豪飲申旦醉夢中拈韻得此詩題壁示太學并示山人無殊十日髙陽興未闌一樽雲霧繞朱欄光搖銀燭春偏麗焰吐金爐夜不寒舊業中郎仍閉户新詩常侍已登壇清歌妙舞桃花下痛飲何辭玉漏殘飲酒漫成寄李允達擊節長歌興轉豪浮名何事讀離騷飛揚跋扈元吾輩放逐飄零更汝曹白日騎羊三洞逺青天捫虱萬峰髙先秋已訂浮槎約散髮扶桑弄海濤輓劉仲修觀察斗酒逢君白接䍦談天長醉習家池猶聞碣石千人廢不見靈光一老遺蕙畹蘭臯斜日外竹枝桃葉暮雲時他年渤海詞名盛十五寧論作賦遲秀上人自永嘉過謁乞余言紹介汪司馬公将以是秋駐錫黄山白岳間賦贈贈我新詩瀫水前天台霞色案頭懸來徴𤣥晏先生序去結青蓮大士縁白岳何方重示迹黄山隨地足安禪莫言垂老才情竭和汝猶能筆似椽江淹嘗擬惠休詩聴雨齋十尺幽軒静者棲碧梧蒼竹亂雲齊初驚滕閣珠簾暮漸訝陽臺玉珮低翠色西山寒並倚秋容南浦浄堪題美人正有芳尊約目斷芙蓉萬頃西朱山人卜居廣陵持巻遍乞名公題贈余賦二章武夷山色最堪憐何事維揚覓畫船乗興剡溪春雪後卜居䢴水暮雲前枚乗麗賦經時和杜牧新詩異代傳二十四橋人似玉明粧十萬勝腰纒廻首髙齋翳緑苔大江晴望海雲開言将徳耀居吳苑不學靈均放楚臺一葉乍從蘭浦過四松先傍草堂栽抽毫試覓平原叟曾寄雙魚到越來毉張生世業瘍余病卧半載生以鍼砭起之持巻索詩為賦病裡過從問獨醒何來年少解忘形三彭逓守庚申籙五運重蒐甲乙經碧洞騎羊原有術青城化鶴豈無靈相逢拚作平原醉何限名山入座青新春魯總戎招同李都閫夜集署中座上得笳字作尊酒孤城急暮笳玉壺金縷興無涯茶烹雁宕千峰雪酒醸龍山十日霞幕府春光廻大纛轅門晴色護髙牙相逢況是河梁客握手何妨片月斜喻邦相過瀫上余以病瘍牀褥不能出晤寄訊此章一病衡門罷草𤣥歸鴻長盼瀫江瀍那知叔夜風前駕真作王猷雪後船五畆蒿萊元獨樂雙溪桃李尚争妍飛龍自古多乖隔悵望河梁白日懸同趙使君雨中登大雲絶頂夜飲見一樓題縹緲危梯望目縈微茫秋色半江城蒼龍掣電千禾立白鳥棲烟萬樹明北浦魚竿誇舊漲西郊農鍤快新成攜壺不盡追逰思剪燭虚堂聴夜鳴聶水部招集署中賦謝兼送聶公北行握手翩翩興未窮芳尊何意武林同不堪坐倚瓊枝畔飽聴歌翻玉樹藂越海地偏雲氣紫燕臺天近日華紅春風爛漫甘泉側賦就能無望北鴻鄧逺逰過訪溪上握手移日别去無何太公訃聞促歸小詩奉唁春花攜手瀫溪傍滿目飛雲望太行念我驥心猶伏􅌴悲君雞骨驟支床孤航不柰蒹葭逺一枕偏憐薜荔長蚤晚尋君豐獄畔星河頻夜合魚腸夀張母八秩詩母冢子元春瑯琊兩王皆盛推其繪事蚤跨青鸞下玉宸寧馨争羨膝前人斑爛張仲詩傳孝彩翰僧繇畫入神鵲渚夜寒星炫彩蟾衢秋半月重輪方平莫哂姑年少少駐塵寰又八旬虞鴻臚以精舍借居竟不克往賦謝典盡鸘裘易水潯髙臺何處問黄金一枝吾自安幽谷全樹君猶借上林廡下伯鸞逃世念壚頭司馬倦㳺心亦知大厦堪棲寄百遍寧辭抱素琴懐管秘書浪迹燕山嘆滯留一朝名姓動宸旒金門執㦸推龍尾玉陛抽毫羨虎頭草色杜陵供眺望花香韋曲伺遨逰從知遇合堪青史莫笑馮唐未拜侯答顧叔時吏部二首余與叔時相慕積有嵗年兹屬安茂卿以手札投寄託契良深報謝二律憶賦河東紫極傍娉婷搖曳動明光千金函谷髙懸市片玉崑丘蚤擅塲直諫世傳韓吏部清脩人識顧長康盈盈一水吳楓外愁絶菰蘆引夢長藉甚雄才北斗懸緘書何意茂陵傳屠龍技絶三朝後射虎心雄百代前㑹見名山蔵彩筆聊從流水和朱絃延陵一棹堪相傍信宿揚亭話太𤣥再叠前韻寄叔時吏部二首拂曙魚緘溯草堂美人題寄自涇陽雙鈎匣底星辰動一刺懐中道路長緑水蒹葭浮夢寐青山薜荔伴行蔵相思㑹發蘭隂興爛醉青蓮玉盌傍一徑蓬蒿任晏眠東南雲壑乍㽜連浮踪宇宙三生合片語江湖萬古懸越水魚竿忘嵗月吳天龍鍔射星躔陽春落落猶堪和敢向鍾期話絶絃睿父丈既有西江之擢復聞臺疏挽留将以大觀察移節㑹稽三郡興文愴别更賦六詩異時一棹溪頭絕倒子猷之興盡也明發雙帆大海濱璽書遙夜出楓宸闗中乍擬徴黄霸河内重看借寇恂君子六千初仗鉞生徒四百競攀輪猶聞僕射花溪上竟日茒堂話隠淪分陜頻年召伯棠千家巍碣頌琳瑯纔聞大纛移江右忽覩髙牙駐海傍月下登樓懐婺女風前開閣謝滕王山隂咫尺堪攜興雪夜能無棹短航江城秋半促驪歌醉解魚腸柰别何紫翠林巒三洞隔丹青城闕四明多仙人絕徼尋方丈大士髙空謁浦陀漫詫越裳重譯至十年鯨海静烟波褰帷霞色候朱衣縹緲稽山入翠微千騎乍環秦碣轉六龍長抱夏陵飛公餘卧閣紬𤣥草吏散行臺憶紫薇遮莫山隂乗興訪若耶溪上醉芳菲皁盖翩褼越海頭當年椽筆照龍樓瑯琊山水詞臣醉天姥雲霞賦客逰黄絹色絲時想像青鞋布襪暫淹留靈篇禹穴探行遍何似緗縑詫鄴侯張公先任南滁有瑯琊代醉等編大府征西接上材參差飛詔出蓬萊金華石室雙仙去玉洞天台二女來月色微茫方廣寺日光浮動妙髙臺無論擲地興公價彩筆縱横鉅賦裁少室山房集巻六十六
