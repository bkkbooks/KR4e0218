body:
  text: 少室山房集别集類五明提要臣等謹案少室山房集一百二十巻明胡應麟撰應麟字元瑞更字明瑞蘭溪人萬厯丙子舉人嘗與李攀龍王世貞輩游其所作詩藪類皆附合世貞藝苑巵言後之詆七子者遂并應麟而斥之然其詩文筆力鴻鬯又佐以雄博之才亦頗縱横變化而不盡為風氣所囿當嘉隆之季學者惟以模仿剽竊為事而空疎弇陋皆所不免應麟獨能根柢羣籍發為文章雖頗傷冗雜而記誦淹博實亦一時之翹楚矣是編前有王世貞所撰石羊生傳稱應麟有寓燕還越計偕巖栖臥游抱勝三洞兩都蘭隂畸園諸集凡二十餘巻朱彞尊明詩綜内别載邯鄲華陽養疴婁江白榆湖上青霞等集而無三洞畸園之名蓋應麟在日諸集皆随作随刻别本單行世貞彞尊各據所見故名有異同此集為萬厯戊午歙人江湛然通判金華時所刋乃其合編之本也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀少室山房集原序明興以帖括俳偶之文籠士士不復知有古文詞正嘉以来搢紳先生始名古學葢濫觴於北地而婁江新都始暢其流焉當二子角峙海内如唐昌黎栁州士闖其閾涉其階墀即可以傲睨當世況其服膺避席而不敢與齒於當世又何如哉蘭溪胡明端以殆庶之姿䇿勲竹素於文無不工而尤工於韻語自漢魏流開元大厯以還皆字摹句擬如循枝攬葉以探厥本根意得之餘泯然與之合轍其致辯成都鰓鰓不倦余季幼清以為忠告其然乎又何恠當世方聞博雅之士聞聲而色飛望㬌響而股弁矣嘗一登婁江之堂婁江曰吾不能諱獻吉昌穀軰之玼也融而超之于鱗庻㡬焉後我而作其在此子矣交新都新都曰成都博而不核也江左核而未精博而核核而精宜莫如明瑞夫濟南之秀句婁江之東野也江左之賅練新都之退之也若曰吾終身所服膺在是餘子録録不復置齒牙矣一旦得明瑞而遽躋之二君之上此寧可虛詞浮説相假借哉苞稸之富位置之髙騁騖之𢎞放誠有以服其心折其喙如尹望邢而泣季咸見壺子而却走固不自知其如此也夫當明瑞罷公車脱塵鞅髙卧蓉山靈洞之間目視雲漢非其人即貴倨弗友傲然以千古自命莊生有云談二子於戴晉人之前猶一吷也豈不然哉昔喻君邦相尹蘭江慕交明瑞相従於山顛水涯唱詠連日夕余心實向往之適視瑑兹土而明瑞已騎雲煙去我而㳺寥廓㢙購其遺文讀之而板復漶漫紛錯囙以公事之餘稍為銓次又得蘭溪令君盧爾騰以襄其役鴻臚趙君文鎮以董其成孝㢘徐伯陽章無逸軰以校其似皆閎覽博物君子也巻計為詩八十文半之臚分部列犂然可觀矣余嘗讀弇山羊石生傳時明瑞年纔三十有八耳而所著詩已二十巻他所撰述計二十四種共為巻二百三十有三制作之富逾於古人後其年復不少也計所論著當有所散軼伏匿而不出者購成全書将在来喆嗟乎蘭隂之間瀫水之上髙門華閥上第元僚指不勝僂矣其間道徳功業昭垂於日月者殊不乏人而明瑞裹敝幘弄三寸柔翰直與争不朽於穹壤天嗇之於彼而昌之此於世正得失半也乃世或為明瑞扼腕一第夫唐以詩賦取士猶失之李杜況夫俳偶帖括之習又烏足籠吾明瑞哉史氏傳文苑要當置是子婁江新都間耳萬厯戊午中秋日新安江湛然書于金華郡齋少室山房集石羊生傳王世貞胡元瑞者名應麟一字明瑞嘗自號少室山人已慕其鄉人皇初平叱石成羊事更號曰石羊生人亦曰元瑞殆非人間人也仙而謫者也遂呼之石羊生元瑞父曰按察公僖母宋宜人按察公為行絶類萬石君而文藻過之所至好行隂徳名位不甚稱以雲南按察副使歸今尚壯無恙元瑞為兒時肌體玉雪睂目郎秀五嵗按察公口授之書輙成誦見客客使屬對輙工九齡従里社師日估􅖶習經生業而心厭之俄悉胠按察公篋得古文尚書周易國風雅頌檀弓左氏莊列屈原兩司馬杜甫諸家言讀之按察公竒其意弗禁也稍長遂能為歌詩藉藉傳里中而于經生業亦不廢十五補博士弟子員非其好也㑹按察公拜尚書禮部郎挟與俱渡錢塘過呉閶汎楊子北厯齊魯趙魏之墟至燕市而止所經繇吊古即事往往於詩歌發之而是時南海黎惟敬歐楨伯呉郡周公瑕呉興徐子與嘉禾戚希仲沈純父永嘉康裕卿先後抵燕發元瑞藏詩覽之咸嘖嘖折行請交至扵琳宫梵宇髙㑹雅集元瑞以齒坐未坐片語一出無不恍然披靡自失也曰使用昔賢𨽻事奪席例吾曹無坐所矣臨淮小侯李惟寅慕元瑞甚使客簒而致之為上賓旬日不聴出惟寅用是亦以詩名而周宗正灌甫雅自負風雅有人倫之鑒貽元瑞三十韻首以北地信陽相屬元瑞益自信尋以按察公外除元瑞歸従母里中母患頭風甚劇元瑞委身醫藥間日夜扶侍不休母頭風良愈而身過勞得清羸疾矣因跳匿金華山中而㑹大司空萬安朱公衡還過蘭谿朱公故従燕見元瑞詩而驚賞者至是發使山中蹤跡得元瑞以書要之而泊舟待三日元瑞感其意為長歌七百言以贈朱公公袖示督學使者滕君伯輪曰天下竒才也滕君輙超格檄受餼學宫且趣入試兩御史再試再為諸生千人􅃣已薦鄉書上公車報罷元瑞意殊不在一第其所㳺從皆天下賢豪長者然所當心獨余兄弟與李觀察于鱗汪司馬伯玉呉􅄁政明卿㑹于鱗死餘皆散䖏不相及久之意邑邑不自得而余弟敬美與觀察公同年過蘭谿謂觀察吾欲就阿戎談當勝卿遂即元瑞劇語二夕皆申旦臨别眷眷不忍釋曰吾扵詩獨畏于鱗耳已矣今庶㡬得足下又曰幸與家中丞同世胡不一及門即卒然抱于鱗恨若何時余方謝客曇陽觀聞元瑞来喜不自勝力疾啟闗與為十日飲間出所著少室山房詩余得而序焉所以屬元瑞甚重而用是頗有齗齗者余二人俱弗顧元瑞乃髙卧山中不復就公車而蘭谿令喻邦相豪於詩與元瑞意合忘形爾汝嘗偕過趙學士山房倡和連日夕元瑞之卧山中凡六載而始上公車至都下遇張觀察助甫助甫余兄弟友也讀元瑞詩擊節曰二十年亾此調矣元瑞亦竒助父詩契密無間且各自悵相遇晩試復罷歸時大司馬張公肖甫靖浙難過元瑞里元瑞避弗見張公謂按察公公兒佳甚故知之今難我得非以使者恵文嶽嶽耶為我致之錢塘請得具賓主禮元瑞乃強為錢塘謁張公果以上客客之㑹伯玉来湖上大將軍戚元敬系至伯玉數與元瑞相聞問把臂劇驩出元敬七絶句詫之曰大將軍健兒也乃能作文語不下沈太尉曹竟陵生亦能賦贈我乎元瑞援筆干餘言立就竒思滚滚既大將軍集相向嘆賞不置伯玉因曰我欲之海上訪王元美兄弟生復能従我乎元瑞曰吾心也遂同過弇州園伯玉道為少室山房集序其重不下余時偕元瑞至者伯玉弟仲淹仲嘉而張大司馬亦以内召跡伯玉而来尋先别去余兄弟與伯玉元瑞諸君積日㳺弇中甚樂也元瑞性孤介時時苦吟沉思不甚與客相當至其揮麈尾扢藝文持論侃然尤慎于許可有莫生者躁而貪以品不登上中側目元瑞甚屬伯玉元敬㳺西湖故遍詈坐客為閧端元瑞夷然弗屑也及在弇仲淹被酒狎元瑞元瑞拒弗受客謂元瑞曩湖上之役胡以異兹元瑞徐曰莫生者庸詎足校也仲淹司馬公介弟吾儕當愛之以徳獨奈何成人過耶客乃服元瑞自髫鬐厭薄榮利餘子女玉帛聲色狗馬服玩諸好一切泊然而獨其嗜書籍自天性身先後所購經史子集四萬餘巻手鈔集録㡬十之三分别部類大都如劉氏七畧而加詳密築室三楹貯之黎惟敬大書其􅎝曰二酉山房而屬予為記旦夕坐卧其間意翛如也恒自笑蠧魚去人意不逺又謂我故識古人恨古人乃不識我其托尚如此好稱説前軰風節嘗怪其郡若梁劉孝標之介唐駱賔王之忠而世僅僅以文士目之當由作史者盲於心故且史第知有狄梁公宋廣平賢皆頫首而従周祼將以視賔王何徑庭也上之采風使者蘇君禹君禹雅敬信元瑞趣下其事賔王得以鄉賢祀郡城而孝標亦暴顯元瑞所著詩有寓燕還越計偕巖棲卧游抱膝三洞兩都蘭隂畸園等集二十餘巻詩藪内編外編十二巻他撰述未行世者有六經疑義二巻諸子折衷四巻史蕞十巻筆叢十巻皇明詩統三十巻皇明律範十二巻古樂府二巻古韻考一巻二酉山房書目六巻交㳺紀畧二巻兠𤣥國志十巻酉陽續俎十巻隆萬新聞二巻隆萬襍聞四巻駱侍御忠孝辨一巻補劉氏山棲志十二巻蒐輯諸書有羣祖心印十巻方外遐音十卷考槃集十巻談劍編二巻采真㳺二巻㑹心語二巻類萃諸書有經籍㑹通四十卷圖書博攷十二巻諸子彚編六十巻虞初綂集五百巻蓋生平於筆硯未嘗斯須廢去元瑞壯未有子邇始舉二子戊子冬復以按察公命赴公車至瓜洲而病病積久不愈慨然曰吾其殆乎謂余知應麟者唯子幸及吾之身而傳我使我有後世後世有我也王子曰元瑞年三十有八耳神清而意甚舒即偶犯霜露何恙不已而慮至此也夫以元瑞之生僅三十年而著作充斥乃爾過此以往所就當又何如耶元瑞扵他文無所不工績學稱是顧不以自多而所沾沾獨詩彼固有所深造也元瑞才髙而氣雄其詩鴻鬯瓌麗迥絶無前稍假以年將與日而化矣至勒成一家之言若所謂詩藪者則不啻遷史之上下千載而周密無漏勝之其刻精則董狐氏韓非子也吾長於元瑞二紀餘姑為傳以慰之且謂元瑞子後當竟傳我
