body:
  text: 少室山房集卷七明胡應麟撰樂府五十五首長安道長安開大道佳麗壯秦京帝座懸雙闕皇居控百城重關函谷氣夾岸渭川聲冠蓋凌雲度軒車耀日行新豐花簇騎上苑樹巢鶯鼔吹元僚第旌旗大將營狹斜何處是北里近西清黄鵠何處雙黄鵠飛來自大荒聲傳北塞逺影落漢宫長嚥露過平樂銜雲入建章誰同二千石萬壽獻君王雨雪雨雪霏霏下遥知行路難將軍金甲重戰士鐵衣寒落葉邊淮盡飛花度隴殘城南有思婦擁被獨更闌出塞隴首雪花飄征人出渭橋長城屯萬騎大磧下雙鵰閃月朱旗靜穿雲畫角遥横行榆塞外一戰靜氛妖梅花落何處邊聲切迢迢逐暮笳天山飛雪暗萬樹落梅花度漠邊雲斷飄空漢月斜那能遼左客此夜不思家隴首九月被氊裘征人上隴頭黄龍懸塞色白馬赴邊愁隴坂高無極寒泉咽不流梅花何處折腸斷在朱樓入塞九塞燧烟銷將軍罷度遼前軍嚴陣壘大漢靜氛囂玉勒飛黄靜金戈太白遥塞門歌舞入紅斾暮飄飄十五盧家女十五盧家女盈盈勝莫愁氷心持跳脱玉腕撥箜篌拾翠游川上流黄寄隴頭生憎雙語燕比翼在青樓折楊栁送客灞陵橋娼樓雪未消當壚年少女十五正嬌嬈栁葉如垂手楊枝似舞腰相㸔不忍别折贈最長條小垂手錦帳出紅綃佳人鬭步揺纏頭矜稚齒入掌妬纎腰帝子迴鸞輅天孫度鵲橋莫嫌銀漏短甲煎徹明燒征婦怨去年征鉅鹿今嵗入盧龍玉塞鶯聲斷銀河雁影重裁衣猶憶體臨鏡懶窺容秋風起昨夜牀下又聞蛩班婕妤長門秋已到昭陽懽未終綠苔積永巷黄葉閉深宫啼紅祗自惜擣素為誰工惟將舊團扇寂寂對西風劉生劉生何慷慨任俠冠東平五侯前筯借千乗下階迎季布匿來久陶朱名已成誰言一劇孟能重亞夫營明妃曲驄馬載蛾眉明粧出帝畿含顰辭玉闕結恨向金微月疑秦地鏡雲憶漢宫衣傳書寄鴻雁一為報龍旂後明妃曲出塞涕沾襟遥望陰山陰舊寵漢宫薄新恩邉地深紫騮涉長道黄鵠寄哀音千載琵琶曲誰明去住心董嬌嬈素手撥箜篌盈盈在畫樓玉􅁫翹紫燕金盒貯紅虬楚臺行雨過漢殿乗風遊期門諸俠少無處繫驊騮紅虬脯見唐小説同昌公主傳中洛陽道迢迢洛陽道日暮正飛花公子青絲榼王孫白鼻騧騎吹金張宅歌鍾趙李家遥傳麗人至偷眼七香車秦王卷衣春色醉秦樓秦玉夜宴遊鑾輿迴鹵簿鳯管叶箜篌七寳流蘇帳千金集翠裘何人最承幸卷贈龍陽侯銅雀伎松栢西陵路君王不復遊高臺銅雀暮故苑石麟秋舞將羅袖歇歌倚繐帷愁浮雲渺天末漳水共悠悠賦得盈盈樓上女盈盈樓上女十五正嬋娟照膽秦宫鏡含情蜀國絃踏青迴綺陌拾翠傍晴川輕薄金吾子無勞問少年少年行翩翩遊俠客結束自名邦過趙黄金百遊秦白璧雙鳴鞭中貴避揷羽右賢降日暮名姬肆飛花撲玉缸紫驊騮蹀躞天閑騎曾從大宛來懸金當駿市歕玉過龍堆伏櫪心元壯鳴鞭氣不迴何辭萬里道逐北向輪臺關山月絶塞生秋早空閨入夜愁光飛銀闕上影抱玉門流露氣漙絲管霜華拂錦裘征夫猶北戍目斷大刀頭劍俠行少年學劍術飛身遊泬寥鹿盧雲氣擁龍匣電光揺醉呵魯句踐怒罵霍嫖姚夜來風雪猛拂袖灞陵橋驄馬驅驄馬千金裝日夕過平康寸心重衡岱片諾迴滄桑白屋笑原季青雲輕趙張明朝砍文吏竟夜赤丸光公子行新開平樂第紅粧簇畫樓驊騮金作埒鸚鵡玉為鞲漢宫鳴珮入梁園挾彈遊海棠花正發選伎合梁州俠少曲鳴鞭白門道新栁正藏鴉七寳裝緐弱千金散狹斜飛揚孟公坐調笑季倫家夜夜雙龍氣腰間挂赤霞邯鄲曲夜宿邯鄲花朝扳灞陵栁五侯競獻鯖七貴爭持酒巨先膠漆契翁伯金石友縱死咸陽宫何負將軍首夜夜曲褥隱芙蓉麗筵開玳瑁頻繡屏朝選伎羅幌夜留賓豔曲梁間度纎腰座裡陳漸㸔銀漏促舄履雜華裀采蓮曲桂楫漾沙棠向暮出横塘羅裙嬌緑水玉腕映紅粧搴花憐蓋弱折藕愛絲長迴橈弄斜影驚起雙鴛鴦仙人篇為李逸人題飛身下七襄驂駕六龍翔負局行中夏攜壺出大荒蓬萊千日酒沆瀣萬年漿勾漏砂如石藍橋玉作霜愛妾換馬行雨蛾眉去追風駿足來金羈沙苑秣寳屧畫廊苔太息專房豔長鳴伏櫪材何當效周穆騄耳上瑶臺邯鄲才人嫁為厮養卒婦二首乍辭鸞輅出迴望鳯墀高幸脱君王難寧忘厮養勞生輕慚比葉命薄嘆同蒿尚異烏孫貴窮氊配二毛新恩偕伉儷舊寵易纍囚飲恨辭金屋含悽下玉樓鳩巢元鵲憩魚服暫龍遊不見平陽壻次且擇衛侯巫山高陽臺出天半高壓大江湄暮雨連三峽朝雲合九疑猿啼青嶂急鳥度翠屏遲莫作峰頭夢魂迷十二時芳樹年年舊桃李爛漫帝城陰結實當前殿開花滿上林香飛金谷早影墜玉池深一曲山香罷芳菲何處尋蜀國絃春風杜宇國千載寄哀音水激巫娥珮山鳴卓女琴銅梁朝日豔玉壘暮雲深浣花谿上宅詞人可重尋邯鄲行狹斜連錦里垂栁夾香堤綠綺千條潤青絲萬樹齊玉鞭騎過馬金距鬭回雞朝日紅粧坐流鶯拂戸啼豔曲十首青樓開大道翠館接平陽栁拂葳㽔鎖花明玳瑁梁合懽年少客新鏤鬱金牀畫閣青門外朱簾碧水潯繡衾描比翼羅帶結同心夜夜求凰意無勞聽玉琴北陸歌鍾起東郊騎吹旋花香長樂外草色未央前十萬章臺栁玲瓏拂翠鈿春光平樂近勝事曲江留帝子聨鑣語王孫挾彈遊共邀金犢至藉草大堤頭金羈連綺陌玉珮照晴沙北極元僚第南陽貴主家樓臺七十二日暮亂飛花神女雲為色妖姬雪作歌三千迴粉面二八擁青蛾咸陽遊冶客趙李日經過粉黛徵歌伎腰肢鬭舞人綠珠金谷豔碧玉玳筵春珊瑚十萬樹一一破𤓰辰明眸驕綺繡皓齒粲瓊瑰挾瑟燕姬肆吹簫鳯女臺巫山何處是指㸃片雲來寳帳連金屋瓊筵弄玉簫嬌嬈花作髻靜宛栁為腰當歌小垂手爛漫雪花飄淥水蕩漣漪江南日暮時吳姬木蘭棹越女竹枝詞惱殺横塘下紛紛輕薄兒又六首金埒貯驊騮銀粧絡馬頭相逢狹斜道並倚大長秋何用知名姓聨翩入畫樓博山銀縷細沈水玉壺香後院通韋曲前除接建章名姝三百輩月底誦靈光瑪瑙粧為砌珊瑚聚作林萬錢編馬埒一臠試牛心向夕香風動連車爇水沈乳燕穿朱屋流鶯啄畫簷霧消雲母帳風動水晶簾遮莫嫦娥下千花拂彩蟾朝朝呈翠黛夜夜鬭纎腰枕上偷金合屏前弄玉簫羅衣三十院無處覓紅綃綺樓藏盼盼羅幙貯盈盈霧袂空中舉霓裳月下行相㸔時一笑若箇不傾城少室山房集卷七
