body:
  text: 少室山房集巻一百十三明胡應麟撰書牘一十三首報左司馬汪公應麟生長于越材質庸下行年三十落落于時顧聞海内文章鉅公有身任千秋萬世之責者必摳衣引領冀一趨其下風盖自燥髪迄于今兹猶一日也曩嵗浪逰燕中每従一二兄弟捧誦執事諸大篇輒擊節服膺以為丘明太史並見當代惟時執事方馳驅四方折衝萬里㦸門大纛之下草茅禮絶不敢以姓名通既執事拂衣東歸黄山紫氣咫尺相望日夜褁糧負笈庶㡬一登龍門坐家母沈疴厯年日尋藥物盈盈一水奮飛無従竊意大人君子棄置牙頬間久矣邇者喻明府坐中伏辱瑤緘下訊慰誨拳拳且勗以青雲期以大業五内鏤刻如不欲生古人薄感恩而死知已曰知己不易遇也如應麟者謭才末學無異醯雞即有呻吟何足當名世鉅公一吷迺執事以喉舌之尊山斗之重不遺葑菲采掇芻蕘即握沐吐哺之風奚以過此此應麟所為徘徊中夜神爽飛越于大匠之門者也應麟自少日厭棄舉子繫心聲韻乾沒嵗月迄無所成頃因王次公聞問長公獲當眄睐俯仰宇宙亟欲求知者明公門下耳迺今賤姓名濫竽毫翰即未敢遽従國士之後生平寤寐之思慰矣明府使便敬布腹心俚刻十種奉塵𤣥覽伏惟俯賜鐻削終始大恵不宣奉汪司馬伯玉自秋風起嚴瀨日候仙查既則嵗行盡矣知執事遲遲其行以愛弟故也因束芻漬酒東下婁江哭司寇公于弇園哭奉常公于澹圃瑯琊二墅風物宛然觸目劌心靡匪河山之慼追惟曩嵗縹緲樓豪飲仲淹跋扈飛揚而執事丰度頽如恬如穆如廣厦百間澄波千頃混茫空洞了無垠際兩王公塤篪二美并合一朝明月並懸髙霞雙映迺不佞嶔﨑可笑亦令㸃綴其間十日華陽縦譚今古真宰上訴萬象欲新乃至改席良宵張鐙乙夜名花異荈左右錯陳俊味芳羞先後層出子夜數闋清商半部軟語冷謔時時間之神動機流阿平絶倒真如大雪行山隂道應接不遑迄今眷戀舊懽庸可復再衰草斜陽寒蟬荒笛一慟而外他非所云伏計執事俯同斯念異日者青牛望氣白馬踐盟弇園澹圃真是不堪重過也王氏諸郎君朗朗玉立瓌姿異質咸自絶人渥洼丹穴之産故非凡翮下轅所能彷彿嘗試竊窺其志慮庶㡬克紹前芳不僅僅朝暘天廏而已長公身後属籍大篇以存者任歿者是在執事攬觀古昔文人類多抗厲即國朝𢎞嘉二李雖開創之勲迨今為烈興起之效邈乎未聞至同好相凌同名相戾尤藝苑之中膏肓之疾復有生食其力死食其言者紛紛輕薄殆不忍譚惟我汪王兩公偉度沖襟囊括海㝢如南岳青原並收法嗣維摩師利互闡教宗一時善信稽首皈依就之如雲望之如日且瑯琊才具之于濟上不啻諸葛之視魏文而推賢竭誠無所容口執事年輩之于長公大類青蓮之于工部而和衷合徳無復二心迴視李何往復紛爭㡬以詞場化為敵國良可慨嘆夫于鱗身後長公業任之矣長公身後匪執事疇任也曩長公存辱命為傳兹集序仍玷姓名一么麽鄙生厠五六鉅公之末執筆忸怩㒺知所措稍一搆思愧汗淫淫繼之雨泪簌簌矣顧幽㝠之寄終不敢忘所冀大匠宗工不吝教我俾仰藉寵靈下報知已萬一不勝大愿春寒苦雨日髙卧太函中竒句新篇動盈箧笥幸毋金玉以慰遐心仲淹比来安否仲嘉㳺道若何士能竒興勃勃晝持牙籌入都邑作豪估夕擁燕趙卧狭斜鬚髯如㦸丈夫態殊可念第黄四娘家滿蹊花木頗聞易主不虞冀北羣空耶想像執事疇昔風流倐忽又如隔世矣中年後一作書訊知舊傾逝離仳之感百端交集宛然衞洗馬度江時狀曹子建所謂保玉體享黄髪良獲我心屈指當代賢豪喪頽㡬盡伏惟執事為世靈光為時大老當今氣運盛衰中國輕重詞場有無盖以一身係之萬惟加餐自愛以上膺穹眷也中秋湖上飲歸柬伯玉司馬並元敬大將軍東南之最勝者錢塘也錢塘之最勝者西湖也西湖之最勝者湖心亭而湖心亭之最勝者中秋月色也以湖心亭而當中秋月色而得司馬公暨大將軍為北道主而又得海内名流十五六為之客而又益之以不佞胡生之狂謬亦濫竽其間焉兹㳺也兹集也可謂才兼乎文武而美盡乎東南事絶于湖山而聲光乎宇宙得非千百年最勝中之尤勝耶夫泰甚者衰之候也盛滿者缺之徵也惟尤勝于千百年之最勝也而造物者弗能無忌矣而酗酒者弗能無譁矣而古人最勝之集屈指于千百年而弗足者于是乎折足乎一夫而有餘矣夫詩文書畫其體殊其用一藝則鈞藝道則鈞道不朽則鈞不朽不足為則鈞不足為然而鈞之未有非其才而至其域者也古之同學書者弗勝則去而為畫同學畫者弗勝則去而為塑藉令同學塑而弗勝也下于塑而可至其域者彼且樂為之何也彼誠樂于至其域而無所取于蹈其名也夫詩文㕘天地闗盛衰書畫亦合神明符造化東漢諸賢伯英子玉輩不以文易書東晉諸賢逸少世將輩不以詩易書三目翁不以書貶帝虬髯公不以書貶王曹孟徳不以書貶霸虞永興不以書貶忠歐率更不以書貶孝褚河南不以書貶諍顔平原不以書貶殉蘇子瞻不以書貶才黄魯直不以書貶節朱元晦不以書貶道趙吴興不以書貶藝虞伯玉不以書貶學王介甫不以書貶抝張思光不以書貶狂米南宫不以書貶顛厯證古能書之名書于人果何負也而稱彼能書又實匪不肖意也藉令不肖意而所稱又實匪其人也湖山盛集觸目琳瑯家享黄初户饜大厯其孰非詩而且文者至于書則不必人人能不肖所為舉公瑕而獨賛之也猶之乎頌明公之武功而美戚大將軍之文事也夫公瑕之詩不肖固賛之不啻口出者而彼以為譏則僕于公瑕亦有所譏耶盖不佞有是言誠為公瑕而未嘗為彼而彼以沈湎之餘乘鬨詈之後修睚眦之隙報疇昔之故跳梁于湖光山色之間呶叫于朗月清風之下使其林慚無盡澗愧不歇王衍無暇于清譚賈誼屢為之太息盖自有中秋有西湖以至今日未有若斯㑹之竒亦未有若斯㑹之厄者也雖然其人醉矣甚矣而與較是非計得失是不肖亦醉也而亦甚也况其始而怒號旋即創艾長跪乞盟者再指天畫地而自誓者三皆金觀察沈侍御所目擊當其時不肖第付之一粲而已而何所復芥耶以執事方酬酢衆賓事之顛末或未曉暢其詳且使問之惓惓也故敢布腹心于左右者與汪司馬嵗杪戚大將軍過溪上肅狀起居計入尊覽首夏北歸抵京口友人拉逰浮玉徜徉大江雲濤雪浪間遙望焦先先生宅隠見鼇背猛欲移舟一登而風雷陡作竟為同行所尼比至吴門問訊則聞翁避暑吸江之亭且匝月矣一水盈盈坐失良晤悵恨不可言已附小刺景升且冀仙槎迴日胥命嚴瀨迺闗門紫氣迄今杳然將取道餘杭更如曩嵗耶朱博士以堪輿赴歙敬附八行俟明春賤恙稍瘉躡蹻龍門用慰十年饑渴也前寄扇頭詩極草草兹更賦七言一律薄展候衷伏希大匠鐻削不宣報伯玉司馬自餘杭别仙駕再宿遂抵金閶周公瑕健飯猶昔獨兩耳聵聵甚已於嵗首辭謝一切謁者以先宜人誌出執事大手筆也而不肖復通家累世誼萬萬不得辭因强為書石適刻工沈幼文偶暇旬日鐫成神采斐然精華奪目自詫暮年最得意書也新春方擬貢上搨成者百幅適鄉人齎大教至云仲淹已即世矣十載同盟一朝電露私衷悼惻何可勝言執事天篤友于際此故難自遣第瑯琊洊沒宇宙寥寥砥柱詞場靈光藝圃萬古文柄執事一身繫之即手足之恩勉為少割且仲淹學成名立第五之稱亶足以豪而其遺文在箧孤子藐然微執事而孰為經紀之此不可不蚤為計也僕比来舊殖益荒間取樂府諸題一二擬議之六旬之中遂得十巻已刻成并誌銘貢上此道蕪沒千年瑯琊一振今又厭厭長夜矣不肖間得其意耳于古人無能為役也白榆百八十章啓之旬月固霍嫖姚天幸實徼執事寵靈惜不獲長公見之雖然日月逝矣後人螢爝微光藉有所明不過容隙執事濫賞至以吴匪越班此非鄙人所敢聞命嗟嗟夫豈直今兹千百世而下事已定决矣世儒狺狺詈亞父鴻門之役謂沛公死天下寧無沛公迺自漢距今未覩有兩沛公也千百世而後之于長公可知也不肖近為長公續稿序讀者頗有阿私所好之疑夫古今作者方册具存試厯舉不肖所列諸家㕘以弇州四部二稿虚心易氣互見短長然後知不佞之語為不慚而弇州之造為不易計當今㝢内惟執事首肯斯言他非所敢必也若騷不埒楚賦不逮漢古詩不敵東西二京則自唐以迄今日皆然不肖夙持此論當長公存日屢發其意于詩藪中長公弗以為忤且非獨自唐厯明而已建安黄初去東西京㡬何曹劉諸人製作已大逕庭昔人論禹入聖域而不優謂堯舜之後復有堯舜且猶難之噫此未易為耳食道也若夫體多總雜而間涉豪麄格務兼該而時流輓近語必瑰竒而或傷浮巧事惟竅密而小逺性情此弇州之大亦弇州之病弇州之病亦弇州之大惟是初學讀之則茫無入手習之則率虞捧心故不肖嘗謂唐之老杜今之弇州皆學人末後一著非入門發軔所先政若汰其離而標其合則唐人何渠能越老杜今人何渠能望弇州譬則崑崙為天地之心九州之脊欲升髙極逺五岳三峨足矣始發足而問崑崙鮮不僵仆中道者然惡可以衡岱廢崑崙也况五岳三峨既陟其顛崑崙或可循級而至耶自弇州伯仲之沒不肖每一吐詞捫舌輒止顧今日所以道弇州即異時所以道執事抱區區之臆而不一驤首長鳴于伯樂之前非夫也蘇文忠公謂言有大而非誇達者信之衆人疑焉當今之世所稱達者舍明公誰耶近讀老杜存沒詩悲嘆陡集因作八哀篇首瑯琊以識歿者五君咏首執事以識存者雄飛北地前獨步弇州後自謂庶㡬實錄竊以明公與長公一時並起無論文章殊絶即人品度越古今要皆亘賢刦中一二創見匪可以世代論也弇州抔土未乾而生前所素卵翼駸駸叛而之他薄俗紛紜殊可鄙畏天幸明公以厚徳偉度鎮定其間第恐更二十年前輩風流邈不復覩矣言念及兹令人太息伏惟强飯自愛努力景光以對𤣥祜不宣奉少司馬汪公客秋天幸瞻竚台斗于湖光山色間辱公倒屐龍門齒諸國士而大篇日揭錫以千秋尤末學後生沒世之感豈直鏤銘心骨而已婁江之行獲侍杖履遂得載晤兩王公張司馬暢飲劇談皆非人間世所有函闗紫氣髙陽徳星平原豪舉古今三盛事不旬月間咸躬遘之抑天幸中又有天幸矣旋舟日小駐中途遂致相左武林握手倉卒臨岐言念河梁悵惘欲絶不肖返舍後困卧衡茆日尋湯藥馬齒浸長樹立茫然未審將来能以寸尺慰藉盛心否公碩徳偉望大業鴻猷社稷華夷繫籍輕重兹尊服告除海内蒼生喁喁綠埜寧終靳一出以酬名世之責耶璽書旦夕南下麟雖病且憊猶能持雙柑斗酒遲彩鷁于嚴陵歌大厦之章以壯行色也雜柬汪公談藝五通何主臣將至慧月天人傳讀之神爽飛馳真使人有乘查犯斗之興自昌黎毛穎兆派西来祖襲紛然至于獨成一史總之不離子長故躅執事兹文躍出則前人撰述併廢一朝不知後有作者従何措手耳二辱垂示鴻篇古風蒼勁閒逺多得黄初意象視東西漢温夷稍遜然無一語入梁唐諸人歌行步趨王岑㡬于十肖五六五言律整而健實而沈絶句雅而沖新而峭至七言律髙華儷密雄大精深千鍊為格萬鈞為字厯下武昌真可鼎立為三而排律之愈出愈竒益多益善又非吴李等班當議之王氏伯仲耳今五尺童子能知公文而白首藝林者于明公之詩或未能悉窺壼奥明公不鄙而令不肖評定之不肖不敢有所隠亦不敢有所私謹粗據管窺以復惟大方萬一采焉三大雅堂四劇雖文彩翩翩而精嚴密麗工極人間自當為南音絶唱元人第長本色耳稍入紛華即闗鄭王髙不無冗複之累視明公才情奕奕而峻潔清泠一塵靡染者竟代寥寥何時更叶北音集長勝國使崔蔡三家不得専門前世亦藝苑之賞心也近作十巻漫呈知執事朝来且噴飯盈案矣四近讀山隂徐文長氏四聲猿惟壓巻禰正平罵曹氏一章佳耳中饒本色雋語矯矯不入南音細檢之字意亦多複雜且用韻時有重者此勝國名家通病益以見執事之超然非良工苦心故未易識也梁辰魚紅線足稱本朝雜劇鼻祖豐而潔麗而清繁而不亂第本色頗為彩繪所勝若浣紗則終篇無一佳語往往鄉社老人動止供笑矣且執事水雲深處南北詞寫夷光少伯心事委篤如訴而文極雅緻即元人煙波釣叟三舍不遑彼不知遵用而自出諢語結案去為蛇足者㡬希徐四劇自首章外木蘭差可誦餘亦庸庸門下皆已覩否五白岳海内名區而舊志篇章遂無復致佳者當以執事四律為開山祖也惟文亦然不肖十二章分咏諸勝概頗為不惡方之盛賦恐不能馳躡後塵耳人旋附去須大手鐻削之自歙歸再報汪公奉違几杖炎沍載更矣追惟曩嵗棹孤航浮夜雪泝四百灘伏謁太函之下執事倒屣而進之把臂談天扢揚今古上窮羲昊中覈漢唐下綜昭代製作汚隆體格髙下􅂱如懸鏡茅塞洞開爾乃升安昌之堂入髙平之幕卧汝南之榻傾北海之尊無晝不㳺無夕不燕登山臨水窮日落月誠生平之豪舉㝢外之極觀也瀕行辱長者髙車餞别浦漵順流東下疾于乘飈迴望三天子都不啻霄漢西風翹首黯爾魂銷惟是鴻筆大篇奎聨璧耀衡茅之下日奉周旋九鼎萬鍾概無論矣仲淹溘沒痛悼不勝㡬欲持生芻絮酒奮飛谷中且以其間摳挹末光重修社事而病冗交妒行或尼之新春伏惟尊候萬福盛徳大業富有日新𤣥貺特綏無庸賛祝慨惟嘉隆先達喪頺略盡瑯琊墓木行且翳然獨執事崔嵬靈光師表一代穹苞壤負岳聚川蔵文軌所通無思不服盖皇王之烈匪霸伯之勲葵丘城濮咸在下風軻氏所稱以善養人中心誠悦于今覩之桃花源紅霞千樹絶勝武陵幔亭雲氣五色亭亭如車盖執事當兹春和景明之候乘肩輿出郊遂挟二三門下尋厯舊逰簫皷競前絲竹沸後寳釵旁列珠履錯陳西方南面曾無越是座中太寧雅歌少㢘雄辯士能狂興故應靡減昔時第桃葉渡江蘭隂隔水二仲翩翩又弱一個恐銜杯念及時為憮然耳長君久客廣陵比復何似次君汗血異常行且厯塊空羣蜚聲天廏矣大集剞氏迄工方掲日月而懸宇宙奈何令鄙人一朗誦之偶值便翔起居記室惟葆攝天和以膺遐算不宣報汪氏二仲洎獻于肇元諸昆司馬公以文章命海内所謂五百年而一覩者迺二足下以同氣懿親左提右挈更倡迭酬不出家庭而聲走㝢縣豈三天子都清淑之氣蓄之千古而未洩而一旦盡洩之峪中耶自二足下以字顯而求羊兩生措足無地行且削迹避二足下詎惟驃騎之名第五不减即司馬公命世大業安得如隆凖所云孰與仲多哉獻于肇元兄弟並復佳否異時躡屫峪中觸目見琳琅珠玉也少室山房集巻一百十三
