body:
  text: 少室山房集巻一百三明胡應麟撰讀十一首讀鬼谷子二則鬼谷縱横之書也余讀之淺而陋矣即儀秦之師其術宜不至猥下如是栁宗元謂劉氏七略所無蓋後世偽為之者學者宜其不道而髙似孫輩輒取而尊信之近世之耽好之者又往往而是也甚矣邪説之易于入人也宋景濂氏曰鬼谷所言捭闔鈎箝揣摩等術皆小夫蛇䑕之智家用之則家亡國用之則國僨天下用之則失天下其中雖有知性寡累等語亦庸言耳學士大夫悉宜唾去而宋人愛且慕之何也其論甚卓足破千古之偽又鬼谷子漢志絶無其書文體亦不類戰國晉皇甫謐序傳之按隋志縱横家有蘇秦三十一篇張儀十篇隋經籍志已亡葢東漢人本二書之言薈萃附益為此即或𤣥晏手裁而託名鬼谷若子虚亡是云耳讀越絶書二則越絶書䟦云維子胥之述吳越也因事類以曉後世著善為誠譏惡為誠句踐以友更始之元五百餘年吳越相攻復見于今百歳一賢猶為比肩記陳厥説略有其人以去為姓得衣乃成厥名有米覆之以庚禹來東征死塟其疆不直自斥託類自明寫精露愚略以事類俟告後人文屬辭定自于邦賢邦賢以口為姓承之以天楚相屈原與之同名明于古今德配顔淵時莫能與伏竄自容年加申酉懐道而終友臣不施猶夫子得麟覽覩厥意嗟嘆其文於乎哀哉温故知新述暢子胥以喻來今云云以上俱本書䟦語按漢書藝文志雜家有伍子胥八篇今詳越絶一書于子胥始末特詳且稱賛其賢者不容口而子胥之列雜家者本書竟不復傳觀此䟦首言子胥之述吳越終言述暢子胥以諭來今豈東漢越中文士因子胥雜家之舊而附益以句踐種蠡行事㑹為此編易名越絶乎不然此書所載吳越事相半何得獨云述暢子胥且首言子胥之述吳越又何也用修據以去為姓等語而得袁康吳平名姓可謂異代賞音至子胥撰述之繇明記始末而不復詳詧亦得其一而不得其二者與又此書以為子貢作者絶不經又一無左騐苐據亂齊存魯一章爾用修以為罔説是也詳味此䟦子胥之述吳越因事類以曉後世著善為誠譏惡為誠洎後温故知新述暢子胥以諭來今等語則子胥舊有是書述吳越雜事而後人温其故典而暢叙之以傳于世意㫖甚明其云更始之元當是西京之末而此書文氣絶不類其時盖袁康者先述此書于東漢初而吳平者復為之屬文定辭于東漢之季故云百歳一賢猶為比肩也其云禹來東征死塟其疆末又云覆之以庚兵絶之也豈袁非越人更始間為亂兵戕于越地因而塟與吳平則自是越人成此書者故云文屬辭定自于邦賢也此書閲世數千年至用修始發作者姓名而未及究其顛末之悉余不敏實首竊窺豈書之顯晦自有時與庸録諸此俟異時博綜之士讀三墳元經出阮逸世以即阮逸也孔叢出宋咸人以即宋咸也朱紫陽以麻衣出戴師愈黄東發以文子出徐靈府宋景濂以闗尹子出孫定王元美以元命包出張昇獨三墳亡謂出毛漸者余知其漸出無疑也漸所作三墳序其詞實淺陋與書合故覈偽書者覈所出之人思過半矣或曰若子言世得論衡將益為中郎之秘獨奈何令人好古也噫尚書出孔壁世以偽詆安國乎竹書出汲冢世以偽姍束晳乎列子過江始傳世以為張湛偽乎惟其是而已讀闗尹子闗尹子九篇以即老耼弟子而莊周稱之者按七略道家有其目自隋志絶不載則是書之亡久矣今所傳云徐藏子禮得于永嘉孫定者陳振孫疑定所受不知何人宋景濂以即定撰皆有理余則以藏定二子尚非如阮逸宋咸輩實有其人或俱子虚烏有未可知也篇首劉向序稱渾質崖戾汪洋大肆然有式則使人泠泠輕輕不使人狂等語葢晩唐人學昌黎聲口亡論西京即東漢至開元無有也至篇中字句體法全倣釋典成文如若人有超生死心厭生死心等語無論莊列即鶡冠至亢倉無有也且隋志既不載新舊唐志亦夐無聞而特顯于宋又頗與齊丘化書有相似處故吾嘗疑五代間方外士掇拾柱下之餘文傅㑹竺乾之章旨以成此書雖中有絶到之談似非淺近所辦第以闗尹則萬無斯理彼藏耶定耶真耶贗耶吾何暇辨之哉讀淮南子漢世記事之博莫過太史公立言之博無出淮南子故揚雄以淮南太史並論又以為淮南之用弗如太史公知言哉淮南葢效吕覽而作者其文詞竒麗宏放瑰目璨心謂挾風霜之氣良自不誣而詭辭衺説坌溢篇中自戰國莊列二鄒縱譚宇宙茅靡瀾倒舉世若狂漢興董賈諸人漸趨淳朴一代文章垂復古始淮南又羣集浮華網羅淫僻淵渟澤滙萃為此編自以極天下之觀而不知好大喜夸之弊不亡國殺身有不已者余讀淮南既竒其才悲其遇又重惜其未聞君子之大道也因題簡末云讀中説王仲淹之著中説也唐宋以還知之者十而三罪之者十而七疑之者十而九甚至以河汾有穢行史削之夫仲淹生隋季世遯迹閭岩一時與游董常數子而外無論房李魏王若風馬牛絶不相及即薛収杜淹識者疑焉而隋史成于武德貞觀之間計中説當時潤飾于王氏諸子者尚未行世未必知隋有若人史置弗録胡怪也余讀仲淹書獨慨夫士之生于三代之下者一靡于管晏載蕩于孫吳三溺于申韓四淪于楊墨五淫于莊列六徇于曇摩下逮六朝南北即瑰偉絶特葢世之英亦將望是數者趨焉息焉其于周公仲尼之道盖邈不知其何物矣仲淹勃興衰運直欲懸掲而日月之今繹其遺言源流洞如規模廓如詞義秩如温如􅂱如即性命天人之極彼或未窺是非大謬聖人者固已鮮矣藉令靣命杏壇詎出端木顓孫之下若之何後世之知之者弗勝夫罪之者之衆也至刻畫顔曽步趨鄒魯福郊福畤之為固無事辨特其肩任太𢎞論建太廣志意太驟稍似有以啓其端者紫陽所為三嘆而致惜歟讀鬻子鬻子章次篇名前人論者咸以殘缺不可曉余初讀尤漫然載閲之覺其詞頗質奥雖非真出熊手要為秦漢前書及反覆紬繹之迺知此書之存眎舊纔十之一而篇名章次錯亂混淆之甚宜宋以來諸家未有得其要領者也葢古鬻子本書篇名章次與莊列不同而絶與今傳闗尹子類所謂撰吏道符等目即闗尹之一宇二柱等篇也撰吏下有五帝等目道符下有三王等目即一柱篇之盆沼等章二柱篇之盌于等章也闗尹九篇而每篇章次少者六七多者十餘更互闡發以竟一篇之義故每章之語雖極寥寥而不覺其簡鬻子二十一篇律以闗尹則今傳短章總之當不下百數十而東京之後兵火殘逸至唐所存僅此一十四條當時注者鹵莽苟欲庶幾前代全書遂以每章當其一篇而僅以為缺其八故今讀之寥寥枯寂若本末略無足觀者又其篇章既混而先後復淆後人因益厭棄弗省余既幸得其説輒稍為更定之雖缺者不可復完而章次篇名咸中舊解亦謂旦暮遇之者也讀論衡王充氏論衡八十四篇其文猥冗薾沓世所共輕而東漢晉唐之間特為貴重蔡邕秘諸帳中葛洪懸諸座右劉子𤣥搥提班馬不遺餘力而獨尊信是書三子皆鴻生碩彦目無今古迺昌歜羊棗異代同心何哉秦漢以還聖道陸沈淫詞日熾莊周列禦鄒衍劉安之屬􅑃怪興妖不可勝紀充生茅靡瀾倒之辰而獨岌然自信攘臂其間剗虛黜増訂譌斮偽詖淫之旨遏截弗行俾後世人人咸得藉為口實不可謂非特立之士也故伯喈尚其新竒稚川大其宏洽子𤣥髙其辯才特其偏愎自是放言不倫稍不當心上聖大賢咸在訶斥至于問孔刺孟等篇而闢邪之功不足以贖其横議之罪矣近世誚充太甚若何氏沈氏諸説或未足以大服其衷故余稍為次其功罪以折衷後之君子讀齊丘子化書六巻稱宋齊丘撰宋景濂曰齊丘子六巻言道術德仁食儉六化為甚悉世傳為偽唐宋齊丘子嵩作噫是書之作非齊丘也終南山隱者譚峭景升也齊丘竊之耳其文高簡固微有見于道德者非淺機小數比也按此書張文潜黄東發俱以為齊丘撰而景濂歸之譚峭因考諸仙傳得其人錄于後峭字景升唐國子司業洙之子師嵩山道士十餘年得辟穀養氣之術周遊無所不之夏則服烏裘冬則綠布袍或臥于風雪霜中經日人謂已斃視之氣悚悚然因遊三茅經建康見宋齊丘有仙風道骨雖溺機智而異乎黄埃稠人遂出所注化書授齊丘曰是書之化其道無窮願子序之流于後世齊丘因奪為已有而傳之厥後不得其死宜哉景濂之言蓋出于此然齊丘仕南唐而南唐又有金陵羽客譚紫霄者能劾召鬼神四方道流從學百餘人于三教書皆所洞曉嘗教其徒講莊列深以為合于釋氏則于今傳化書意旨尤若相類二譚並與齊丘同時一人耶二人耶吾不得而知也因景濂語并及之少室山房集巻一百三
