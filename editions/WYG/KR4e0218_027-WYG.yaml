body:
  text: 少室山房集巻二十七明胡應麟撰七言古詩一十一首金壇鄧孺孝以易詮見寄賦答時舟過京口垂髫夢入華陽洞耳割乖龍興飛動茅家兄弟騎赤虬握手胡生喚珍重金壇壇上鄧伯羔謫籍何年離大茅三山長嘯俯六合濯足瀛海霜空高㸃易研朱閉蓬户塵世浮榮瞥朝露韋編幾絶不肯休恍惚羲文案頭晤成書寄我十萬言言言盡抉參同詮丹霄擇日待冲舉何物黄金稱大還還山高拄九節杖一見初成訝神王傳語山中白衣相屈指相逢大羅上洛陽春色圖題陳道復水墨牡丹乃黎惟敬出都日持贈者二百年來畫花卉吳中沈周稱第一頡頏並數陳生淳不事丹青祗水墨天機一派掌上流盡掃鉛華露風骨家雞曩昔厭餘子邇歲聲名陡籍籍吾家此巻尤絶竒不向長安市中得南海黎君夙遺我把袂河梁示親暱牙籖錦軸題八分四字猶存故人迹憶生袒裸盤礴時頤指羣工若𨽻役中山大管操如椽半醉掀髯見真率桑皮丈八横高堂元氣茫茫墮儿席姚黃魏紫信手拈瞥眼千花萬花出須臾四座廻春風媚李穠桃總辟易青油翠幙張層階十二雕闌䕶傾國天然富貴壓塵土底事珊瑚鬭玉石盤行瑪瑙夜色殷屏敞琉璃曙光濕瓊樓特起明朱霞玉佩低垂映紅日女英嬀汭偕娥皇飛燕昭陽倚合德廊開響屧西子遊亭俯沉香阿環立霏烟綰霧態不禁握雨攜雲状難悉枯枝斷榦若草草嫩蕋䌓英轉奕奕芳菲恍度洛水頭爛漫如棲上林側咄嗟陳生何太竒十指參差幻帝力含毫肯避造物嗔落楮翻令化工泣經時顧凱筆欲飛曠代徐熙品推逸趙昌形似真兒曹黄監精工詎倫匹爲拈老句題册終跋扈飛揚逈相敵連城十五差足償美錦三千復何惜卧觀旬月仍巻還笑殺明誠録金石丹圖以直重巻還趙明誠得徐熙牡丹于生歌贈鳯鳴齊東于生太竒絶草就征西纔十八萬言落筆風雨驚白眼青天對明滅憶生年少歌遠遊興到扁舟夜中發嬌妻稚女了不顧一葦蒼茫汎吳越㑹稽秦望攀嶕嶢迴首山隂正飛雪四百八十金銀宫湖上烟波若塗抹移舟却向姑蘇臺揚子濤聲暮填咽石城城南訪莫愁畫棟雕甍管絃列平康巷陌人如花散盡黄金等塵屑萬金散盡歸故鄉斑爛菽水娛高堂三冬文史業頗富驊騮騄駬爭騰驤一經恥逐蠧魚老摩挲石鼓臨鍾王解衣盤礴得畫理朱欄澒洞浮瀟湘禽魚小景各生動飛鳴宿食交林塘明窻淨儿拂縑素虎丘細酌焚清香名流滿座揮大白百觚一飲雄高陽酣來如意舞精鐵雙龍錯落迴精光一朝遇我荘岳底飄然挾刺來茅堂念年魂夢走瀫水龍門渺邈如天閶先生牙頰肯終惠蟭蟯努力追飛黄嗟余濩落拙且蹇江淮一旅徒披猖中原屈指故老盡卽今二仲誰求羊邂逅逢生竹林下有如阮籍偕嵇康淋漓麯糵豈無意仰天大笑神飛揚男兒事業在十指述功紀德皆文章高冠大蓋等澌沫電光石火徒張皇生今二十甫逾八聲華􅂱􅂱懸鄉邦歌處呻吟總金石賦成咳唾俱琳瑯山東英妙孰卿比長纓直欲蒐窮荒他時掉臂走雙闕天人三策攄岩廊名成彈指竟大業肯将肉食移青緗春風乍夜變楊栁娟娟别思盈河梁念子殷勤若膠漆紛披大雪攜壺漿男兒抗手詎足論新秋計日來餘皇芒鞋布襪吾共爾翩翩結束窮齊方雲霞萬仞躡梁父七十二帝驂翺翔磨崖絶頂勒名姓卧看海日生扶桑讀漢壽亭侯廟志歌有序關忠義侯廟祀遍海内獨履歴自陳壽本傳外槩亡足徵壽書體存簡質賴裴注贍縟差足證明而是傳參伍殊寡迨勝國明初雜劇傳竒與市井之演義出而忠義生平事迹混淆極矣左轄蒲州趙公産侯同里因㨿元人所修漢壽亭侯志詳加訂覈擴為兹編余諷誦興懷輒綴長歌巻末百世而下得亡以為知言也芒碭天開九州牧白水中興符赤伏炎精四百運數終海㝢𤓰分魏吳蜀巍巍忠義起解良精忠大義扶三光南權北操兩巨猾侯也睥睨如蜩螗憶破袁軍訪昭烈十萬貔貅俱膽裂飛身立取上将頭擲向曹瞞血猶熱荆州坐鎮推元戎恢圖漢室除姦雄舉襄圍樊勢破竹七軍電掃如秋蓬禁俘德梟兩雉兔大澤艨莽廻互天崩地坼華夏驚六合幾完漢時故自許以南遙受盟壺漿簞食傒湯征笑殺曹瞞挾漢帝中原無穴逃長鯨苦恨東吳衆蟊賊割㨿河山騁詐力隂謀秘計日夜萌舉國昬昬效鬼蜮賊䝉詭避遜嗣興甘言宻餌藏戈兵侯也胸懷豁雲夢那知故穴濳分崩樊圍不没僅三版赤手荆州竟徒返麥城困守臨沮悲今古英雄遞扼腕侯亡逾月䝉亦亡流芳遺臭垂青緗漢統興衰實侯繫䝉身百斬寧堪償權本狼貪遜狐媚㓙德於時偶參㑹皇天有意灰炎精詎曰羣姦志能遂玉泉之山紫氣屯侯今世世為明神童孩走卒競瞻拜萬年廟食昭君臣皇皇左伯亦蒲産異代同心帝猷展執鞭想像迴英風欲起侯躬訴悽惋九原不作空踟蹰拮据徃事垂璠璵青緗觸目覩顔面侯也恍惚來前除雲旗飄空互明滅鐵馬金戈儼騰踏紛紛成敗論後人矇瞽何由覩雙睫東陽腐儒史筆流褒誅隻字嚴陽秋為侯作歌侯俯讀掀髯一笑諸吳牛逍遙篇爲袁履善八秩賦有序袁丈履善行年政八十矣而色若孺子且步履矯輕筋骨强悍神明之用老而逾王至𤣥譚眇論儼叩巨鐘河懸海翻亹亹不竭飲酒奕棋賦詩染翰浹辰傾宵即壯夫未易追也是秋聞余匏繫湖上挐舟千里屬賦長歌為壽昔盧照隣抱疾幽憂一旦遇孫思邈慨然作賦以自况迺余年垂半百齒髮變衰而袁丈方霞舉軒軒泠然天際今之所遇得亡猶昔乎夫上古有大椿者八千歲以為春秋而袁丈年甫八十夫荘生之㫖此特其兆端耳因稍次其厯履為逍遙之篇國初詞人袁海叟白燕篇章膾人口風流文藻二百年載覩當今沔陽守沔陽刺史真人豪弱冠雄心蟠巨鰲射策曾同弇州榜三山彩筆飛寒濤白㲲青衫走燕市杜曲東風綰游騎黄金臺舘千尺強擊筑狂歌五侯避長楊執㦸甘沉㝠一麾出守辭神京朱旛皂蓋列先後峨㞹大舳浮江城江城八月天茫茫九疑七澤連高唐岳陽樓頭喚杜甫乾坤萬古留詩狂吏事紛紜苦拘束迴首家林夢松菊拜迎官長折腰領鞭撻黔黎碎肝腹文人拙宦自古然丈夫詎乞兒曹憐區區五斗若毛髮肯将一飽酬如椽步兵江東興飛越兩屐秋光路明滅爲園半割三泖雲築室全邀九峯月九峯三泖長逍遙飄然越海來輕橈金銀梵宇四百八烟霞石屋攀岹嶢疇昔逢余大堤上拂拭楸枰互神王持杯恍締竹林友醉眼朦朧豁霄壤四腮鱸熟歸興濃河梁對拆雙飛龍重來握手瓦棺寺燭花夜半流殘紅聞道今年政八十步履康荘㨗蚊翼家家拂席延林宗處處攜觴候安石嗟余落魄雅好游夙生藥物攢睂頭看君耄耋若孺子香山洛社同優游玳瑁筵開虎丘畔矍鑠亷頗老能飯芝蘭玉樹森庭階舞綵含飴劇堪羨何來初度地藏符孟秋晦日懸桑弧今年七月月小盡安期一夜來蓬壺太白浮公爲公壽塵世浮華孰先後靈光一柱海岱間屈指君王問耆舊㝠靈瑣瑣未足誇瑤池幾見飛桃花春秋載閱大椿厯青牛相逐還流沙布帆行寄徐使君有序先是惟得使君以青雀見假自淮達燕至是晤余彭城復輟所御艨載我十口兩入帝都行人亡恙秋毫使君力也爰賦長歌屬之榜枻凡八百八十言吾家大羅上絶頂増城樓醒逐東方生竊桃瀛海頭罡風起八極吹墮蒼精虬支機隔銀漢織女忘牽牛男兒意氣凌千秋如椽十丈輕王侯蘭陵美酒三萬斛百觚一飲眠糟丘吳娃越童兩綽約粧成累月彈箜篌參差狂態發中座不告妻子乗扁舟山隂夜半六花綻雪片紛紛墮高㟁戴家慵夫喚不應載得西施若耶畔五湖汎宅天茫茫九疑合沓連高唐巫娥握手呼宋玉朝雲暮雨啼英皇北望宸居建章起西笑長安興難已大江東下飛寒濤南顧洪河疾流矢亂山芒碭尋真龍咄咄新豐亭長公甘言鼎鑊紿父老彎弧反躬如逄䝉榖城酹留侯緬懷遊赤松胡顔教隆準背約追重瞳侵尋楚事去垓下貪天功時無軒轅帝䜿子皆英雄迺知疇昔廣武嘆步兵衡鑑懸秋空丈夫白眼甘慟哭忍将涸轍行途窮彭城困阨古來有躑躅徐卿望余久尊前片諾肝胆傾苦憶忘年竹林友樓船一借張孝亷勃窣猶堪事奔走齊滕魯衛遵遺墟極目黄河薊門栁蹇驢蹩躠窺蓬萊華陽碣石俱塵霾道傍叱咤魯句踐白虹怒吼昭王臺左掣雕龍右屠狗乾坤嚄唶雙青鞋俗流驚怪頗欲殺先生玩弄如庸孩故園松菊渺何處拂衣長嘯吟歸來親舍夷猶太行麓抱膝躬耕事樵牧長鑱谷口時逍遙㸃綴魚蝦伴麋鹿石羊成隊閑金華丹崖翠壁流胡麻支機却訪鵲橋畔尋源直駕崑崙槎長洲宫闕閉荒苑潮打空城秣陵晚壚頭誰問太白星六代殘碑弔蒼蘚夕陽竚桃葉雙槳沿前溪莫愁盧家婦邀我長干西臨春結綺蔓狐兔白門禾黍空高低笑殺當時景陽井三人貫索如連雞𤓰步旌旗逈迴合燈火䢴溝互明滅珠簾十里歌吹濃一派簫聲廣陵月青樓宿紫薇繡幕圍羅衣征夫念長路明發臨淮圻使君彈指詫歴歲大纛高牙坐相慰布帆不厭長康癡安穩行人出徐沛嗟余畏路頻遠遊羨汝急流真勇退挂冠神武殊匆匆黯淡鄉心入鱸鱠砍鱸鱠勻秋霜張錦席浮滄浪大姑迓客來南康小姑送客過潯陽武昌黄鶴爲君下闌干百尺摩青蒼買得秦人避秦地夾堤紅樹迴漁郎拂衣偃息武陵洞白雲如絮縈軒窻人生俯仰貴適意築宫冲漠朝羲皇危亭四顧象緯列九𤣥瓊笈羅縹緗噫吁使君卧豈得緑野平泉漫營室蒼生四海唇嗷嗷翹首經綸帝三錫司空治水魍魎愁太尉登壇鬼神泣降生名世詎偶然突兀麒麟候顔色廟堂計日諏雄圖掃除日本平海隅天吳􅇡迹海若徙雞林重譯來長途勲庸奕奕樹彛鼎飄然一葦還菰蘆三千行圓八百就刀圭入口升蓬壺此際胡生滿謫籍香案仍居玉皇側大鵬希有行相逢浩蕩扶搖騁八翼營營下土同蜉蝣天上寧知總舊識蟠桃盡摘𤣥圃霞爛漫瑤池醉千日寄俞聲父廣文俞君六十而意氣壮甚投余萬言之書愧無以報報以短歌俞翁六十形貌蒼胷中壮氣何昻藏唾壺擊碎鐵如意獨夜悲歌神慷慨素書雙鯉乍遺我剖之字字皆琳瑯豐城雙劒久埋獄誰從石匣提干将載讀名山兩游記雄詞直上追班揚琴聲四壁響空翠雲霞萬疊流青緗興來便欲遠尋汝青鞋布襪雙翺翔叢霄絶頂跨鵬背側身南斗呼瓊漿晨風不假子安便滕王髙閣天蒼茫珠簾畫棟永寂寞何人百代垂文章參差念汝袖中刺片帆計日來潯陽琵琶亭下遇商婦荻花楓葉吟秋江洞天攜手三十六醉鞭亂石成羣羊王門鼓瑟讓兒輩沾沾白雪彈清霜誰云燭武非少日即今聖主開明堂魏尚雲中阨羣吏樓船十丈横扶桑一朝談笑生羽翼至尊投袂呼馮唐君不見公孫片言合武帝千秋爵位髙明光余君寄余雜文甚夥度遼行再送萬中丞山西萬侯真丈夫豪名七世聞匈奴虎頭燕頷鐡作膚弱齡猛氣吞於菟擔簦挾策遊天都赤手欲把蒼生扶九重含笑留操觚一麾重鎮分銅符念年大白揮酡酥雄心日夜馳伊吾漁陽鼙鼓動地呼至尊輟飯思良謨倉皇頗牧勤朝晡璽書十道飛平盧紫貂三錫來屠蘇清酒黄封傳玉壺酒酣耳熱聲嗚嗚擲盃慷慨登長途貔貅十萬聽援枹鵝鸛三千隨渡瀘八百家丁操僕姑甲光耀日天糢糊朝鮮簞食歌來蘇王京一掃空萑苻樓船鴨緑江平鋪長驅海若縻侏儒釡山對馬風摧枯西飛清政魂先徂六十六島追逃逋行長骨碎行頭顱生擒關白如螻蛄金人夾道陳休屠至尊前殿臨賜餔子孫奕奕封金吾河山帶礪名公孤一編黄石垂孫吳山西萬侯真丈夫昌世孝亷有子記誦絶人十二遊泮傾動儕輩爲作阿咸行阿咸七歲工臨池眼如㸃漆膚凝脂九齡大書掃秋葉墨花徃徃堆漣漪十二青衫走黌校十五胸腹蟠珠璣千言一揮河漢溢萬巻一目風雲馳矯若金莖擢雲際亭亭百尺無傍枝君不見楊收十三擅文藻乞言盡日窺籓籬男兒墮地山岳動豈與氓庶同蚩蚩又不見子安十四序滕閣落霞秋水標神竒低昻造化在掌握寸管立洩𤣥元機區區富貴果何物百代聲華逈難匹古今名士多少成大業終須汝曹立况復而翁字彦國載世文光炯奎壁他時稅駕詎可量汗漫扶搖待風翼嗟余潦倒病且愁倐忽流年近髙適王家玉樹空寤寐一子呱呱尚袵席蒼茫覩汝思欲飛那得寧馨在蓬蓽後生可畏亦可虞電火人身詎金石少時我亦王楊徒此際何由髮重黑含毫爲汝聊作歌努力韶光莫虚擲䌓弱行王世叔通侯圃中觀射作王侯腰懸鐡裲襠雕弧手挽五石强竦身注目㨗風電左射右射逈莫當大斾高牙矗雲際戈鋋甲胄紛飄揚觀者如山盡辟易九兕却走千夫僵巖呼谷應地洶湧砂奔礫舞天蒼茫羲和慘沮白日匿飛星十道流扶桑一發旄頭落再發連雙鶬三發定天山築城連受降連珠四五六七八紛相将九發九日墜百發百穿楊巧若甘蠅教飛衛勇如養叔攜潘尫雀兒隻目詎足擬牛心片胾差堪甞丈夫夙昔四方志桑弧蓬矢懸髙堂登壇仗鉞挂金印英風八面馳戎羌稜稜霜氣輳羽筈秋空俊鶻爭翺翔吁嗟君侯絶技有如此厯數古來名将疇能雙憶昔文成挽宗社元勲茂烈標旂常河山帶礪國同永丹書奕葉傳貂璫侯也登朝在髫丱朱顔緑髮驕琳瑯晝攝衣冠扈鑾輅夜鳴刁斗驅龍驤臨淮座上倐相值軒軒霞舉明朝陽驊騮騄駬詎凡骨聲華藉甚蜚天閶帝謂河漕實司命九重特詔來淮陽艨巨艦載芻粟旌旄絡繹浮長江黄流徐沛忽中斷一麾立度千餘皇干城獨坐鎮寰宇巍峩天塹雄金湯八年貢篚輸上國天子設燕開明堂安危華夏賴公等張公神物真干将寳弓玉欛帝三錫雅稱大白呈中黄太平無事罷征戰緑蕪生㦸苔沉槍酒酣耳熱壮心發唾壺擊碎敧胡床矢鋒貫虱總浮誕弓弦落鳥徒誇張縱觀侯射果殊絶飲羽穿札誰低昻吁嗟侯技詎止此弱齡海内傳篇章詞鋒筆陣兩揮霍将壇文苑俱輝煌即今侯年但强仕威稜􅂱􅂱傳遐荒他時累葉事明聖二十四考追汾陽麒麟第一鐫姓氏萬年䌓弱流芬芳南都留贈榖元厚之并寄别文明玉吕靜父長方至卿燕孺七子君不見燕昭王高車大帛招賢良黄金臺舘矗天際樂生掉臂來華陽又不見漸離子白眼酣歌競睚眦囊無擔石那復論手拉荆卿誓生死豪華極目俱荒丘蕭蕭易水長東流何人築宫舘材傑何人擊筑追名流先生濩落滄海上䝉茸七尺披羊裘虹霓為竿月為餌六鰲夜掣珊瑚鈎飱霞嬾逐赤松卧馭風屢學青蓮遊長鯨鱗鬛差快意揮斥八極同浮漚狂來拍手驚帝座失足偶墮天南頭天南臺殿四百八金銀觀闕連神州一遊一月不知返勝槩欲盡仍淹留浮槎遡溟渤泊宅凌滄洲名娃擁駿騎調笑輕王侯遙遙去揚越望望來燕幽長安富兒不解事如山酒肉供俳優長裾不曳朝貴第却來易水聊優游翩翩二仲巧相值片言頓覺平生投雄心總向劇孟吐俠節肯使朱家羞名園爽塏背北郭粲爛珠簾䕶油幕軒窻屈曲縈莓苔户牖周遭藝蘭若爐烟澹宕逐揮洒茗椀清泠恣斟酌緑尊翠杓春茫茫指㸃明星月西落青絲挈盒游南郊王蔡追隨恣歡謔紫髯静父雅好文風雅塲中主畫諾蹇驢夜入長安城一粲徐卿手重握徐卿意氣天下無蚤排閶闔嬉皇都鐵冠豸繡等長物玩世蹔逐金門徒陳生元方美冠玉雕蟲刻鶩酬操觚倉皇七貴招不得為我日寫秋山圖錢塘散僧尚留髮孤山舊社追林逋灤州黄生年最少擔簦共入黄公壚一時衣袂把羣彦仰天被髮歌嗚嗚起舞那知夕陽落飛談直遏行雲徂呼盧覆局興逾銳淋漓身世隨屠沽更長漏永列紅燭十千醪醴窮清壺人事紛紜百憂集哀樂相乗豈終極别離忽動陽關愁栁色青青遍畿邑丈夫恥學兒女顔萬里比隣叶金石吁嗟兩生良好仇爲我分攜泪沾臆君不見昭王臺舘屹天際衰草寒烟幕荒埭豈若胡生五畝宫鄴苑梁臺遘明世又不見漸離擊筑徒悲號匣中一擲空鉛刀豈若茒生把柔翰崢嶸碣石攀吾曹卽今塵霾暗四野吾曹豈是蠅營者卧龍管樂疇賢愚屠狗荆髙並瀟洒大河氷澌竹箭流燕姬送客臨髙樓驪駒唱徹渭城畔悲風萬壑晨颼飀人生㑹晤邈河漢功名何物真蜉蝣作歌鄭重别二子為我厯訊諸同遊時兩生送余舟中申旦解維迺别少室山房集巻二十七
