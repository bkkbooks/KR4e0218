body:
  text: 少室山房集卷八十八明胡應麟撰傳二首長安酒人傳長安酒人者吾里祝鳴臯也父璋軀幹絶偉修八尺有餘而好勇負氣比鄰王謝子酗酒狎璋廣座中璋躍起奮拳拳其齒幾折坐客大驚已睚眦一市魁袖鐵椎狙伺得諸巷叱令匍匐呼乃公偃蹇者立椎殺之魁不意皇駴乞命抱頭去自是璋勇氣聞一鄉鄉逺近相戒莫敢犯其父及弟兄慮仇家報復為患害且連坐有司號泣禁沮之璋意不自得脫身走長安更折節為謹厚以鼓琴遊公卿公卿善璋者為授室納燕媛逾年而娠鳴臯先一日母夢大鳥縞衣𤣥裳聳翮而唳于九霄卜史占之曰吉是惟男子之祥當以文彩知名于當世乃其性樂雲漢惡虞羅終亦非世途所紲馽矣占既而鳴臯生鳴臯生慧甚日晶晶數行俱下總角占對數有奇稍長讀三唐兩都七國諸漢魏詩家言心勃勃慕效之父璋抑而徇時藝始治易春秋補京兆弟子員試高等以連最餼學宫非其好也而慕效古文辭愈益甚時發其意于篇章一撰出一咏成傳録長安城殆遍諸木天貴人爭願事鳴臯而鳴臯雅自負下視一世又􅘆􅕟蔑禮法弗耐籧篨貴人前而諸貴人之願事鳴臯徒陽浮慕冀為代言地而已實亡能推轂祝生者鳴臯覘其微凡高蓋大冠呵殿持刺來輒謝病弗迓即迓無所報里中兒或白眼視之以是暴得簡倨聲而獨好飲酒其天性一舉白淋漓數斗弗酲終用此困始父璋垂槖留長安一蒯􅚆外悉倚辦五陵豪家其殁也豪家子羣起資殯之鳴臯藉是得遍遊豪家子長安俗豪家少年子相率危帽繡衫挾金丸騁名馬擊毬擘阮蒱博聯翩狹斜為聲容太上攻奕道書畫闢園墅春明旁以意氣結要聚族效河朔平原飲鳴臯故洪飲出羣少年上又辨口滑稽弗窮至則盡傾四座衆群少年大歡謂飲非祝先生弗樂競推為祭酒鳴臯顧世方落落而群少年所尚得我心慨然有東方氏玩世想因遂浮湛麴糵中為簿書期㑹以次發夙日告治具届期賔至毋得後月宵花晨鼇吸鯨吞散髮披襟左手持蟹螯右執如意擊唾壺嗚嗚誦杜陵贈李謫仙痛飲狂歌空度日之句時而大呼時而慟哭群少年拊掌竊笑政以酒態當爾爾趣御者亟進觴叵測其寄寓指也醉甚則以頭搶地竹林諸狂夫安在哉夜臺沽酒客無祝生爾胡以豪也一日過羣少年飲所觀案頭慶卿傳亟取讀終篇攘袂曰惜哉荆高二庸豎操劒筑靡秋毫嬴氏子遇我者虀粉矣其喜為大言類如此非狎習而驟睹靡弗驚而鳴臯意自若益發舒問其姓名睨而弗答迫之則漫應長安酒人乎其後謁刺達官長者亦自署長安酒人某歙何生以篆刻受知今皇帝特為鳴臯鐫印章珮之一時名公卿李惟寅沈純父輩挾日與沈飲繇是酒人名噪長安而是時石羊生業已從按察公至與鳴臯遇華陽碣石間愸愸然莫相知己問知為酒人則躍然已就酒人語則灑然已遂把臂為劇談已遂促膝為劇飲迄三晝夜弗忍舍去咸自恨相值晚也間以其私臆語生舉世汶汶莫知余乃今于里中獲元瑞天乎吾其真酒人乎哉自是稍謝去群少年而從石羊生遊減異時酒中故態什六七鳴臯為人嗜古文辭放蕩不羈矜意氣重然諾厭薄俗子浮榮皆與石羊生合尤偏嗜讀書三墳五典八索九丘下逮百家亡弗窺家故貧鬻文所得錢罄持授書賈妻子凍餓啼號為弗聞也者而四壁琳琅縑素炫心目石羊生固有書癖兩人緣此彌交親昕夕過從揚扢古始大而宇宙細而昆蟲明而聖王幽而老佛河懸澥翻電掣雲蒸機鋒所諧麈尾盡秃語小極呼茗飲澆之長安麴米春繼進飲己復談談已復飲至雌黃藝苑月旦人羣有好必投有惡必斥兩人恆自詫形骸為二肝膽維一也蓋鳴臯短而肥石羊生頎而瘦云善謔者或舉沈昭略王微事為絶倒隆慶戊辰春兩人徒步入西山置瓢笠廢禪房周覽金銀宫闕四百所長湖巨岑裊地浴天沒日更決䇿褁糧窮極人迹弗到處所至橫盡筆端彌月歸倡和篇章盈篋好事家多剞劂以行鳴臯既自放酒中又修古與時尚悖博士少俊者據高座嚄唶臨之鳴臯天憤悶奈何以雞肋檻而翁裂衣冠翻然去其籍羣豪家子覩鳴臯數蹭蹬場屋今且并博士籍去之中厭而狎相侮了無曩時罄折風而石羊生以按察公外除復將返溪上鳴臯愈不樂處京師㑹所善邢直指為買田濟漯遂先發妻子赴之而身留長安酒樓與石羊生十日飲飲己為别泣數行下曰平生不解作兒女悲今别知己誠不知涕何從也又曰足下方以盛年勉荷不朽大業余不幸自放麯糵中今己矣長為農夫以沒世矣千百世後齊東野人之語或有稱述者吾其識之鳴臯别余之齊東居五載以歲儉入長安詢所知適故人邢直指來報命㑹晤甚歡牛飲過丙夜甫就榻痰涎泥膈間欲路弗得時吃吃有聲童子以鳴臯醉夢囈語耳逮明直指就呼之死矣直指為經紀其喪卒返之齊東直指名侗字子願故齊東産也始鳴臯居長安以酒人自呼既去之而復入一以是終竟符其䜟野史氏曰傷哉鳴臯之困于酒也昔唐李杜兩布衣偕死於客而偕厄于酒鳴臯亦爾爾豈其苗裔耶古之湛于酒者文士弗經見竹林而下浸有聞彼肩瑰負奇而所如弗合或顧人間世一無足事事始假以遺外俗棼誠不得己而託之酒第其狂易自恣若晉劉阮氏之屬嘗疑史泰甚其辭乃今以余所覩記鳴臯否耶然耶鳴臯以酒人自命而竟死于酒至今愚夫傖父姗笑之里中兒維甚嗟嗟彼未覩劉阮氏耳千百世後頌頌酒咏咏懷者能復以酒人名之耶且非酒人而能若是耶雖然里中兒則奈何使之解也趙先生傳大庭而降風㑹茆然靡矣士尚論咸以古今人弗相及然而孟軻氏稱豪傑輒曰雖無文王猶興何也得非苞靈孕和裒然挺出者代有其人耶余束髮走四方恆思一當孟氏所稱而未獲顧得之里中趙先生砥行褆躬里中五尺童能抵掌道乃四方或未習聞也作東華趙先生傳東華趙先生者名祐卿字汝申東華其别號也厥先宋清獻公抃居三衢元末少府君挈家徙瀫上十一傳而為趙先生父處士公以獨行著母童夫人感異夢娠趙先生先生幼有至性常跏趺危坐識者詫非凡兒弱冠補邑弟子員歷試高等歲丙午舉于鄉是時趙先生于書槩已無弗窺嘗讀左丘明三不朽語慷慨擊節曰士生天地間駒過隙耳不及時蚤努力樹大業三公五等朝菌奚殊耶始發憤下帷潜心太上自洙泗洛閩以及荀況董仲舒揚雄韓愈昭代薛吳王諸家言咸洞晰㫖歸而發揚其所未及作悟思等録前後萬餘言間以暇日講竟皇帝王霸之略度方今天下可施行者竟有所觸發為詩若文根極性情置漢唐名流靡愧色矣趙先生業既日益進名亦日益高顧每試春官輒不利居恆自嘆一第足以當不朽即十上吾甘焉不爾者吾從吾好可也乙丑謁選得高安教授倡明師道為黌校先隆冬沍寒大雪壓廬集諸生談藝其中矻矻丙夜俄就黔中衡文聘取士得人為多學使群江右秀彥于㑹城念教事非趙先生莫任者趙先生則奉檄往晨起據經坐上坐青襟環侍千餘人質疑發覆人人自以意得去銓曹雅知趙先生儒者負經濟材毋令久間局擢知縣事建平建平故水鄉也墟田歲久汚壞什七八民顧賦靡所出相率流殍他州趙先生至至捐俸募役夫板築并請倉粟助其成墟迄亡害逃亡歸倭寇四起當道令悉城屬邑無城者而建平次當城趙先生曰大役也若疲邑何顧城不可已則多方斥浮濫抑送迎得奇羡若干先城邑四門餘樓櫓塹堞以時就民大悅爭勒石頌成功當道幾用上考薦而州以議馬直積與縣不相能趙先生復爭諸刺史前甚力刺史恚掎托浮言中之印馬使竟用此調任之保康民雨泣遮道挽留請得抱牘訴闕下趙先生揮手謝曰良苦諸父老第此王命也單車疾馳不挾日抵保康邑踞鄖萬山中姦民目無長吏白晝殺令尸堂上稱最岩趙先生下車則大召四境氓諭以禍福而剪艾其一二敗羣者以漸飭壕隍繕器具稽什伍扢逋逃而開誠布公𢎞以更始之路巨猾惴惴告自新無何蘭谷公訃至趙先生徒跣奔歸治喪事骨立苫塊間闔邑咨嗟其孝服闋補龍溪邑屢中倭瘡痍之家十室而九撫摩其疾苦而噢咻之歲暮念窮民無告呼入出已鏹置坐隅寒者衣饑者食病者療不資公帑寸錢民德趙先生若怙恃以入覲便過省太夫人冀偕往太夫人苦瘴霧憚行趙先生泣曰母不行而吾行溫生絶裾哉亟移文乞終老當道報可俄太夫人遘危疾夜叩天刲股肉以進疾良己太夫人竟享遐壽不及耄者三服闋再入都補乳源令擢别駕雷州地密邇珠池亡賴子僉衣重鎧出沒海島以盜珠為業吏追捕往往殺傷相當趙先生察知不勝憤甫入境日夜勵士衆以待賊葉宗權等餘皇數百趨博里我兵奮勇擊之馘斬鹵獲百數餘黨駭散入諸洋同事叩趙先生計安出趙先生曰賊尚衆未易一舉殱遲之除夜彼揣兵莫至方樂飲吾出不意縱火焚可使無遺類議克合而督府馳檄撫之趙先生以單騎入賊壘至則諸營各羅拜請命惟賊首十數懷狐疑因具以狀聞督府命便宜從事趙先生密偵賊所在遣兩吏賈人裝躡其後而鋭士數十持兵仗繼之賊果不設備悉就禽是役也凡招賊舶二百三十二禽賊首一十九瀕海氛翳一空趙先生力也當道方倚重為長城而趙先生以年老堅上事乞骸骨臺使察其誠不忍拒行之日餉遺慰勉有加趙先生既以完節歸慕司馬君實范希文故事與從弟今大學士趙公太僕卿徐公洎家君躬服古道化鄉閭風俗為一變以淸獻名德蓋宋代而焚香告天事尤偉則建議舉宗創祠廟而獨捐金數百臺其上曰告天並輯處士公而上水部公而下積功纍仁事為一編命之曰傳香録自餘鄉先達偉人劉孝標駱賓王輩皆著論暴其忠節當世韙之性淡泊惡紛華獨寄好山水時時挾名勝探幽奇長吟短謡翛然自適方秋作感懷十咏騰播一時他篇什工者尤衆蓋趙先生自罷别駕還里中及余輩相唱酬十年所如一日也始趙先生業以不朽奮晚年顧事功僅小試而詞章又小道無足為且德成名立思有以進是者遂殫精性命築禮斗臺鍵關據梧取參同悟真讀之行其術有奇驗既益讀楞嚴圓覺金剛諸書乃大悟曰噫嘻道至此乎夫儒以淑世仙以度世梵以出世函三者而一之丈夫事盡矣因著書曰三逃記作佛宫奉大士日跏趺相對宛如髫歲時識者知其宿根所植云趙先生年且大耋矣而色若孺子修睂方瞳步履輕越望而知其稚川𢎞景輩流至與談竺乾內典則真覺妙明圓機朗照令人身世并忘又鮮不以為維摩詰龎居士也趙先生于余為丈人行余少趙先生二紀餘然里中稱習趙先生莫余若者趙先生命為傳余不得辭輒稍次其行事傳四方焉石羊生曰孟軻氏所稱豪傑舍趙先生疇屬哉世沾沾徇耳目七尺之軀浮沈于聲利之途而舉世莫能拔最上侯平津班定遠極矣彼其視不朽為何物趙先生獨蚤用三大業自期佹得之而暮途棄去益逃諸無何有之域務解脫死生而後已此其人寧有待而興者夫孟軻氏所稱豪傑舍趙先生疇屬哉少室山房集卷八十八
