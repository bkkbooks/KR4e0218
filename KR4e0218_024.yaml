body:
  text: 少室山房集卷二十四明胡應麟撰七言古詩二十六首閻蓬頭歌代滕中丞作閻先生羽客流髮蓬蓬不褁頭身騎兩白鹿手掣䨥青虬前生七聖相追遊飛翔八極橫九州朝升大羅頂暮宿崑崙丘木公授寶籙王母發清謳飛瓊弄玉衆仙女行厨上食羅珍饈桃花萬樹核如甕東方小兒不敢求何來醉闖拘翼座脫巾露頂眠瓊樓雷公轟轟上帝怒謫向下土稱蓬頭長身大腹狀殊絶赤顴紅頰驚庸流方瞳射空碧電炯紫髯拂地蒼虹流終朝一食氣逾王終夜不寢神長遊嚴冬雪片大於席寒氷十丈風颼飀先生此時赤雙足單衣不御青貂裘道旁觀者色沮喪真仙出世誰能儔和光頗類柱下史玩俗或比蒙莊周仰天大笑暮雲碧茫茫下土皆蜉蝣朅來偶過勾曲洞乘鸞跨鶴三峯頭乖龍左耳割不得飄然一葦來南州衆中遇我心莫逆片言立使千金投微辭奧旨發中夜變化恍惚難先籌時時詫我骨毛異青城仙伯行相求三生石上事非遠努力繕性窮熏修愧我中年薄聞道塵埃碌碌隨軒輶神明凋謝鬢髮改豈將七尺圖封侯感君便欲逐君去乾坤萬事同浮漚三公七貴竟何物五隂四大俱懸疣何如長嘯出寥廓霍然盡豁平生愁閻先生且莫行為我留謫期未滿堪夷猶吾家别業武夷上鐵船丹竈懸高丘幔亭之君日來下三山九曲隨冥搜他年挾爾棹歌去坐看大海天咫尺巨鰲贔屭浮中流珠宫貝殿耀金碧清都綘闕喧琳球鵾鵬一卧九萬里鴻鵠一舉三千秋玉皇香案倘相憶羽翰白日飛神州賦得靈隱寺飛來峰贈盧祠部靈隱門前千歲松夾堤九里來青蔥何年突兀金芙蓉削成四面摩蒼穹恍疑夸父移空同一拳擲向滄溟東日月東西懸混濛雲霞上下披蒙茸周遭刻畫非人功象王鶴駕行虛空投身直入蓬萊宫丹樓雪乳垂玲瓏流泉百道聲琤琮有如仙樂嗚笙鏞金書玉簡潛竒蹤䆗窱恍與銀河通靈威丈人不得窮古來傳是飛來峯萬古壁立青霄中何人散髮攜孤笻捫蘿直上乘天風金華有客真豪雄孤高大節將無同少年挾策遊新豐五花蹀躞長安驄出宰百里花為封鳴珂入候甘泉鐘握蘭典禮稱儒宗素飱恥學凡夫容織成雲錦蟠心胸要將琬琰垂勳庸直排閶闔陳孤忠曳裾折檻驚天聰轟轟天鼓鳴雷公覆盆不照微臣悰精誠貫日飛長虹挂冠神武何匆匆回頭却望丹宸楓血淚亂灑征衫紅歸帆正值錢塘風六橋三竺春溶溶不學留侯師赤松且邀白傅尋蘇公振衣千仞聊從容朝飱沆瀣追冥鴻暮拾海月鞭虬龍六丁撝呵玉女從俯視六合俱螟蠓朅來遇我東陽東竹林把臂心神融仰天大笑橫雙瞳欲騎箕尾還長空盧君勸汝滿釂黃金鍾且為拂拭朱絲桐萬事人間如轉蓬古來直道多難容即今吾道寧終窮絲綸竹帛行遭逢一朝前席明光宫誰其穩卧飛來峯醉中放歌贈祝生并寄司馬汪公祝生家無擔石儲短衣掩肘不願餘生年三十走牛馬世人攘臂爭揶揄胸中壯氣何磊落眼看俗子如蘧篨欲從翰墨樹勳績恥結黃綬懸金魚自言太古重三立文章功德原無殊朅來叩我草玄宅殷勤片刺通前除先生崛起劉駱後華名嶽嶽天南隅泰山寧擇土壤細滄海詎惜涓流瀦蘭臺高揭並二酉龍門咫尺懸桑榆階前尺地倘少假令我一臠嘗天厨伊余謝客事焚掃閉關長日扶潘輿親知宇內半凋落豁然見汝心神愈憶汝新都謁司馬太函突兀開雲衢無殊字汝豈無謂樹勳努力操長殳汝兄汝姪並瀟灑問竒往往來吾廬古今詞賦厄陽九先生身試不汝愚怪汝胡為蹈前轍甘心趙瑟忘齊竽腰纒萬貫亦不惡三槐九棘垂騊駼沾沾五字作何狀黃金不逐貧相如生乎大笑掩余口先生戲我猶羣兒天生七尺當不朽大千世界皆蘧廬倘來富貴寧足論電光石火同須臾一朝腐骨委草莽醉生夢死隨溝渠秦宫漢闕走狐兔公卿未必贏樵漁男兒大業在金石要令天壤留迂儒先生兩耳濯清渭十年不受凡人諛終朝隱几吾喪我一聽汝言良起豫雄談五夜劒花落緑尊翠杓行茱萸高歌贈汝兔毫秃唾壺擊碎青氍毺長風吹雲入廣座欲躡象緯淩蟾蜍生乎生乎汝勿疑古今不朽真無殊好讀離騷飲美酒便作名士追三閭莫將狂簡訝年少仲尼大聖思歸歟即今名姓已不朽先生筆底開璠璵他時藉手見司馬為我捧腹當軒渠祝生樹勳遊新安司馬公字之曰無殊謂所立維三不朽一也石羊生胡元瑞聞而韙之而作是歌瀟湘座為祝無殊題我築瀟湘島斗室懸竹中汝搆瀟湘座千竿舞秋風我島舟可沿汝座車難通一朝乘興來子猷直造竹所聊優遊主人莫作辟疆態仰天大笑風颼飀送郭汝沖遊吳中郭生有父鴻臚君自言東野之後身飱風卧月三十載至今詞筆留長春生也學書仍學劒抱玉無媒羞自獻延賓雅有郎罷風典盡鸘裘不咨怨時時問字來門牆先生為汝開玄堂五月南風稻苗熟扁舟一葉飛錢塘生平不識琅琊里特向婁江弔蘭芷中原萬里失麟鳯宇宙文章孰盟主江隂亦有朱鴻臚結交四海雄菰蘆沙頭把袂詢父友孤帆八月來三吳憶章雲去年送子城之北北風怒號天慘戚濃霜密雪灑岐路若箇綈袍話相識今年憶子城之東落花爛漫飛春紅人生好遊遊亦得五見社燕迎歸鴻嶽陽樓頭秋萬頃醉殺杜陵呼不醒何時挾汝荆門濤狂歌痛飲賡離騷哭祝鳴臯鳴臯既避地齊東復客長安而死同里友人胡應麟聞而悲之作歌弔焉吁嗟祝生誰謂而年僅止此爾胡以生胡以死文章獨抱掩夜臺寂寞寒山餓妻子憶生束髮負竒尚壯氣凌雲薄金紫繩樞甕牖窮徹骨恥向豪門謁涓涘世人妬生狂欲殺白眼縱橫半睚眥青衫一領不得消擲向齊東營耒耜胡為復作長安遊瞰􅍷芒鞋汚泥滓嗚呼大塊亦忘才玉折蘭摧繄誰使昔余與生初結交邂逅塵埃雙國士拂衣初上西山巔萬岫回青八陵紫崢嶸高論駭俗流磊落雄心付良史生今已矣寧再得泪目淋漓傍桑梓酸風落日華陽宫素旐翩翩潞河涘孤墳三尺暮雲白白馬生芻者誰子我歌薤露生莫悲自昔賢豪並如此寄張伯起去年我病維揚邸日望琴高騎赤鯉一朝起色乘江潮朔風狂雪吹綈袍吳門邂逅張伯起萬卷縱橫列湘几蓬蒿夾徑春不開焚香永晝眠蒼苔翩然為我倒屣出握手論心稱莫逆烹熊炮鱉出豐膳繡虎雕龍指金石男兒七尺當自強巢由豈必攀虞唐千秋大業在竹素胡為燕雀譏鸞凰抽毫日纂文選注恍入梁臺試精騎倘來富貴詎足論避世墻東有深意陽春堂上橫朱絃子夜歌成興杳然他時倘慕蘭陵宅日候山隂訪戴船登大雲山望瀫水寄李允達憶昨曽攜李仲子釃酒遙登瀫江渚美人一去秋水寒望望蒹葭隔煙浦朝真洞口饒白雲尺書天際時相聞山棲倘續孝標志與爾同棲麋鹿羣祝太學遜之五十始為詩戲作短歌贈之君不見天寶詞人高達夫行年五十執金吾一朝作詩遇杜老聲華奕奕留吾徒君不見成均胄子視懋學五十無聞甘寂寞一朝壇上逢胡君奮臂詞林問前矱沉吟二事迹頗竒千載何當復遇之汝為常侍理或有我説杜甫人爭嗤丈夫有志未可輕古人詎必皆無成杜陵四十始獻賦當時頗遭俗子淩脫身錦里拾橡栗長鑱短褐徒悲鳴達夫青雲本自致高牙大纛懸長城嗚呼後世兩寂寞惟有隻字留其名我今四旬汝五十二子之年巧相值焉知異代無子雲未信東山少安石男兒致身苦不蚤髮短心長恨何及我歌杜陵念已灰汝效達夫志當立不見􅑔越師諸侯努力餘年莫輕擲琵琶行李將軍虬髯戟列橫秋冥當關壁立萬夫勇掃空大漠無王庭一朝謝事東海上皓首華顛氣逾王醉歸叱吒灞陵尉長揖嫖姚不相讓欲將雄劒賣黃金却把琵琶彈素心凄清激烈風雨過高樓五月如山隂君不見賀懷智石槽鐵撥雲雷氣唐家供奉推第一青史流傳誇絶藝君不見康崑崙指下鏦錚捷有神玉盤驪珠千百轉春氷拆裂河流渾將軍嶽嶽起當代手挈二子成三人即今狼居盡欵塞九邊鐵騎間黃雲明妃奉帚長信殿娥睂不踏燕山塵山西老將亦無用金甲苔生土花重笳聲寂靜刁斗寒但把琵琶學三弄華堂秋空月滿楹朱絃翠幕流明星觴行樂奏豪興發快劒長戟紛爭鳴為君慷慨彈入塞莫作琵琶亭下聽寄鄴中王孫灌父時約余為嵩少之遊昔我年少思遠遊飛行八極尋浮丘夢寐三花映絶壁崑崙倒挂黃河流主人况有淮南術要我峯頭鍊金液石林萬仞掃空翠念載無人白雲濕亭亭孤鶴來緱山王喬有約豫當還今年曳杖定偕汝三十六峯秋月圓嶺南祁羡仲以詩見貽賦答并問惟敬祕書南海祁生何卓犖題書遠寄吳天鶴開緘恍對四百峯片片羅浮白雲落年來嶺表多詞人黎歐以後誰其倫丈夫寸心在萬古那能齷齪隨風塵聞汝好吟兼好酒一釂千鍾世希有黎生夙昔稱酒狂對汝還能劇飲否高陽酒徒氣若虹有興倘過蘭陵東不信今時酒殊絶試問琅琊王長公長公近一書云酒味殊絶足洗數十年月旦余在婁江日孫齊之徐孟孺同日先後過訪余以行迫不及報謝追憶二君輒成短歌孫郎已老徐郎少一日婁江逢二妙趙家白壁總連城海上明珠雙照耀孫郎髮短垂六旬徐郎三刖仍干秦余亦狂歌稱隱淪虎溪相别成大笑滿眼人間失意人兩得歐楨伯書及致西署秣陵二集走筆寄謝詢其蒼頭李英王生手持雙鯉魚剖之中有明月珠鮫人夜泣魑魅走珊瑚十萬羅前除美人吏隱金陵畔金馬銅龍誰不羡緩轡晨過莫愁里鳴珂夜入明光殿秦淮千里心悠哉瀫水蘭橈那得開君家摩勒有佳句祗今何似郗方回題瀟湘煙雨圖桂樹叢生石嵓側萬仞寒雲挂蒼壁窮隂大澤龍蛇走緑蘿蒙蘢楚天黑行吟澤畔者誰子日暮欲歸歸不得黃陵美人把瑤瑟杜宇啼煙鷓鴣泣詹東圖有茶癖即所居為醉茶軒自言一飲輒可數百杯書來索詩戲成短歌寄贈吾聞盧同有茶癖七碗清風生兩腋吾聞陸羽稱茶仙銅瓶細酌中泠泉古來知味但如此咄咄新安詹仲子胸吞雲夢蟠瀟湘一飲百碗消枯腸虎丘之産茶僅斗盡采遺君不盈口蒙山石上青槎牙咀嚼那能煩齒牙斟酌建溪三百餅巨杓長瓢堪酩酊風爐竹几羅庭除大鐺貯月來中厨松風才過魚眼發玉乳盈缸噴香雪鯨吞鰲吸如有神淋漓醉墨馳風雲一飲一揮三百首若箇能詩復能酒胡生十載戒飲茶金莖日夜烹黃芽天瓢一滴欲沖舉刺刺文君未相許羡君豪興為汝歌歌成擲遡桐江波明年倘憶吾鄉茗穀雨前朝赴龍井夜集郭鴻臚館偶聞鄰室有使酒相虐者余為解紛竟戲作短歌示鴻臚古人飲酒戒沉湎一石蕭然神不亂今人飲酒如沐猴脫巾狂叫無時休雙眼茫茫向天白知交側目成愆尤清音軟謔有何意白波平地如山丘君不見張旭滿引揮雲煙李白一斗詩百篇遇汝那得開心顔又不見劉阮朝朝竹林醉當日髙談遇此輩大白流離玉缸碎謝文度年八十餘而步履輕健如少新秋棹小舟千里過訪且拉余往閩中曰武夷君遲子久矣余大壯其矍鑠于其行也賦短歌以訂後期謝君束髮湖海狂飛騰若木窺扶桑只今九十健于虎白睂紅頰雙瞳方伯陽我師吕公友玉笈雲章佩星斗人間獨好胡生詩千里拏舟瀫江口自知名姓在瑤京塵世蜉蝣那得聞朝來共跨赤虬去玉笙吹向武夷君夜同方吳兩生集汪士能宅留宿作新都豪士歌君不見新都俠客汪士能意氣磊落形骸真鬚髯如戟鬢如蝟泰山一擲輕千鈞大腹便便亦何有半生但貯宜城酒日倒青蓮三百杯家藏白墮五千斗暮春三月日頗長杏花半落梅子黃先生白眼空四海却來岩市登君堂堂上吳生宛如玉座右方生逈超俗博山爐中沉水香玳瑁玻璃照􅌬醁相看一笑輕王侯長鯨跋浪風雲愁主人尚醒客已醉熒熒華燭開朱樓繡縟紗茵逈竒麗一卧明窗不知曙感君意氣為汝歌贈汝狂名在天地吁嗟乎世途局促難為容賣漿隱博甘途窮身後榮華竟誰是眼前尺蠖嘲蛟龍生家伯兄文且武驃騎才名駕千古二兄三兄咸楚楚生也第六之名詎減五伯兄司馬二兄仲淹三兄仲嘉士能行適第六故云城東紅粧十萬家朱唇翠袖爭朝霞相逢不飲漫成别參差笑殺千桃花君不見杜陵布衣老且拙典盡春衣興逾發黃四娘家花滿蹊大白攜生醉明月翌日同集方羽仲宅則王生為大力者負之而趨戲作短歌題汪氏壁并示汪吳二子豐干里畔方干宅喬木森森向人立高堂淨掃無纎塵片片明霞傍簷入主人古貌仍古心市隱蓬蒿甘陸沉片言遇我心欲醉鷫鸘立解千黃金春日春盤薦春韭白粲鮮鱗無不有乍可朝眠杜曲花那能夜欠新豐酒溪南兩岸煙樹深美人不見愁人心用盧同語暮雨朝雲杳何處明月香車返岩市夏日同吳叔思東陂觀蓮若耶之溪五十頃緑暈紅酣畫船暝吳王宫中十萬粧明霞為珮風為裳簫鼓參差棹歌發隔岸清波照羅襪年少誰家雙紫騮坐看玉腕明中流日暮香風四天起惱殺金陵謫仙子題山房梅花帳剡藤為簟湘為簾十幅吳綃更竒絶羅浮狂客劉世儒一掃贈我千峯雪主人清夜眠其中羽衣恍惚來相從參橫斗落不知曙一枝醉抱春朦朧送張英甫歸永嘉因詢康山人裕卿兩年不見張山人阮公眼白誰相親草堂何來下孤鶴青山歲暮回嶙峋長揖辭余復行邁指點龍湫白雲外語汝山中康裕卿萬尺飛流好相待題宣和帝御製楚江秋晚圖當年曽挂瀟湘席厯厯雲山似相識長憶江頭紅樹村千林落照催行色隔岸人家草屋深憑闌浩嘯舒塵襟長天茫茫鳥飛絶潮落汀洲龍夜吟隱見漁舟泊沙阜莎徑寒煙莽回互羣仙可望不可招虛閣凌空挂煙霧兩翁矍鑠巢許儔崇岡之北茅堂幽登登回顧蹇驢客撩亂瀑花天際流何人筆底開層巘貌此江南秋一片瘦金書法了可驗恍惚似入宣和殿嚴陵晚泊嚴公昔未遇耕釣日沉冥一朝動人主始識少微星余亦任公子垂竿三十齡被髮上高臺浮雲空翠屏雙磯拳石那可坐却望三山遊四溟袖裡虹霓一千尺手掣鰲魚歸帝庭少室山房集卷二十四
