body:
  text: 少室山房集巻一百十五明胡應麟撰書牘十五首與大學士趙公書長君至自燕中甫解装則大教發焉盥誦載三泠然金石之音従天而墜而二錄緗縹互暎又恍然紬石渠之秘而披芸閣之編也以相公執事端居廟堂密勿之中萬方待命而不遺草莽軫念衡茅至于斯極即古上臣休休吐握一饋而七十起者奚殊哉伏惟執事躬聖賢之學負豪傑之才自蜚聲玉堂正氣直節已岳岳動海内兹起昌辰握鼎鉉調元化運斗樞登庸以来三光順序百神受職黄童白叟霑溉雨霖此大人正已物正感格帝衷之明驗也頃窮邊小醜戕賊主帥負固重城奮螳臂以觸天朝而日本兇渠陸梁島嶼襲奪我藩邦狙伺我甸服東西二方亦孔亟矣執事聲色不動簡命元戎授以方略不逾旬月叛黨肅清父子纍纍組繫闕下若刲羊豕迺比者又聞平壤大尅羣倭䑕奔封豕長蛇旦夕殄戮即公旦徂征山甫薄伐僅此繼見裴中令之平淮范㕘知之懾夏皆下風矣不佞以通家世誼竊覩末光隂受太平之賜慶幸曷勝自惟迂謬狂疎生彌寸樹惟是佔俾呻吟贏二十載于古鐃歌鼓吹等曲竊覩一班將追倣韓愈氏作為詩詞以鋪張武功揚詡聖徳且俾天下後世采録民風參稽野乘者備知執事垂紳正笏措天下于太山若此雖然芹曝之衷竊有獻于左右夫統萬之平也固繇社稷之效靈廟堂之定策與夫邉將之戮力逆黨之天亡亦以西倕諸冦玩弄我掌上出入我彀中無復英雄之度故也今大衆解嚴人心懈弛反側得亡有未安乎瘡痍得無有未復乎萬一䑕穴餘兇規圖前事勾引羣冦中之饕餮者乘我無備出我不意夤緣復入竊據為姦海内英雄藉之而起其憂更有大于曩日此不可不為蚤計也夫平壤之尅也功則偉矣顧巨寇方張詭變叵測懸軍絶塞主客勢殊樵采易撓飛輓難繼情見勢屈何以自拔昔魏太武禽赫連昌于統萬旋即罷歸定以殘孽招合燼餘更據邉陲㡬為勍敵竭國之力而取之唐文皇以古今善將將天下精兵頓安市堅城之下竟不能一抵平壤亡功而還至宇文述滻水之事足為永戒雖繼絶存亡除兇伐叛堂堂天朝王者之師非前代驕卒貪帥兵出無名者比而二方故轍昭灼簡書草茅書生良不能無漆室之憂杞人之戚執事方博詢㝢内石畫以興太平豈遂以不肖為狂為迂也竊以當今之䇿西事已寧者宜速諭指邉臣一切澡濯其前非而更張其敝轍行寛大之政養和平之福開生息之源柔詿誤之徒收桀黠之效而明斥􅕤于外詰戎兵于内俾士懐其安民㤀其敗庶瘡痍漸復反側自安十年之後葆大藩滋更為雄鎮雖有狂冦息其狡心東事之未殫者示以便宜戒之深入毋貪功毋玩敵毋養冦而俾我大兵之戍遼左者多為之形援四張其聲勢務令吾一身血脈呼吸闗通即有緩急辰發已應使朝鮮之君徇行境上招徕其攜貳傾誘其散亡彼腹臣心旅貴戚遺氓聞故主尚存而天朝為之規復將掲竿斬木以剚仇讐簞食壺漿以逆戎陳然後出吾兵之據平壤者樁其心發吾兵之戍遼左者擣其腹彼欲去弗能欲戰弗角欲守弗固不半載而醜類之胾懸于槀街可也吾誠若是則振古之功成善後之策備執事所為上報主知下厭衆望者烜赫炳耀竹帛旂常髙掲大書詎惟我百里光即垂諸千禩永永不朽矣以執事之明燁如衡鑑而不肖一書生謬談天下大計至此可為捧腹然古今載籍事有類此無慮數端則皆厯覩其利病而不敢以無實之空言進也惟執事者熟詧而審計焉倘萬一以為可采則國家幸甚桑梓幸甚報少宰趙公企瞻垣斗載厯嵗時屬賤疾膏肓即長干嚴瀨一水盈盈莫能鼓枻而東以庶㡬旬日之誨迺尊者之賜儼然辱先臨之盛藻華緘煥逾九鼎感私謝臆殆將奉以終身竊惟執事剛方之氣崒嵂萬仭鴻偉之度周暨八埏㝢内蒼生若近若逺拭目繫心久矣兹留都蹔借天假晝逰旦夕徵拜大廷舟楫函夏身係中國安危俾宇宙東南千古生色詎惟婺人一方私祝私慶而已承弇州晨暮聚首文殊摩詰二大士互説妙詮將遂令大地山河六種震動若何令須菩提舍利弗輩與聞之首夏清和南中多暇雨花牛首髙座諸勝日嵯峨尊俎間倡和篇章動盈巻軸願一一致歸勒飛雲片石之傍為異時靈洞山房増一卧逰公案也奉大司空朱公鄭商行肅狀起居尋挾書北上日踆踆牛馬走中首夏南還晤長公知福履方来不任私慶翁累朝宿徳一代元老雖逍遙緑埜怡神太虚而鴻烈駿猷屹然與匡廬南斗參峙大江昔人所稱身係中國安危殆非虚語應麟忝收國士亦越十年碌碌塵埃亡一善狀属者稍欲以雕蟲自見而幽憂疾疢日尋湯藥文園病軀青蓮傲骨長康憨態孟郊窮愁兼兹四子合為一身無昔人之寸長有古者之衆疾當今棄物自揣其尤落羽遄歸勞苦徹骨叨竊洪庇遂煖桑榆圖書萬軸金石千巻蝸涎䑕壤差用自娱且遁迹廣川長谷遂其幽深間以畊釣之餘成一家之業庶㡬上酬教毓盛心生成大徳而二親在堂旁無庶弟下寡弱息顧戀徘徊未便長往惟我師相始終造之家君比歸自滇父子晨昏頂戴髙厚非言所既明府使西附致犬馬新霜乍寒珍攝道躬為宗社為生靈自愛不宣奉滕中丞先生春暮蘭隂一瞻道範属樓船迅發悵惘迨今師碩望駿猷昭揭寰宇宏才絶學振起東南兹偶以萋菲莠言飄然岩穴青鞋布襪徜徉幔亭九曲間即考亭無能擅媺前代何論東山謝公第海内蒼生喁喁旦夕恐神龍威鳳終須一出以副霖澤羽儀之望非岩穴能久佇也應麟於於越諸生最辱空羣之顧迄今幽憂枕席尺寸無聞追惟曩昔國士殊恩慚汗浹背迺嬰疾以来烟霞泉石愈結膏肓究竟未知面目何似或藉師靈寵得少以著述自係千秋庶不負教育生成億萬分一耳春深藥餌稍讐將負笈舂粮介武夷君伏謁函几于三十六峰之下櫂歌漁唱昕夕周旋知龍門之不見拒也與王世叔通侯曠覿風儀載厯嵗矣伏惟節旄金印坐鎮長淮芻粟如山鯨鯢屏息社稷重臣當代無兩而偏工餘事漁獵詩騷又且騁曹劉而軼韋孟豈昔人所謂天授非人力者耶何全智獨稟也至虚懐樂道忘分下賢若禹周之據饋吐哺則原嘗四子不足齒牙矣不肖猥以庸樗謬䝉采拾中懐耿耿每遇西風何嘗不振袂長吟冀追逐三千珠履晤對笑言于清油幕下至夜雪谿頭輒思浮輕舠入剡曲一問安道故居惟是病廢以来班白在堂孩提在抱加之賤荆淪喪半壑之外步武惟艱所冀明公亮其疎節不以人間世禮法督過之幸之幸也説仲使旋附訊起居主臣無任又辱諭皇明詩統舊輯古近體僅六十巻稿垂脱而奔走江湖以巻帙浩繁扃置子舍第五七言律自隨易惟效使君偶覩稍命增入𢎞正前名下諸公什之四三凡耳目所及概不敢錄慮或漏遺故也蜀中業已梓行君侯下問惓切謹仍錄首巻以上惟俯為蔵拙焉報郭舜舉觀察曩客武林一奉末光于湖上即單辭片語而古心古誼令人如醉醇醪尋復晤對郎君喬梓風華交暎眉睫羈懐旅況淘遣一空新秋拜命華緘副以鉅刻于時披誦踴躍擬趨叩行館以罄宿衷則文駕前發闗外念之悵然闕行恍晤顔色丘山之恵既感且慚胡長者昌歜鄙人至于斯極也不佞樗櫟散材志無廊廟謬知當路跬步靦顔頃復自放丘園奄冉廿載而數膺家難載涉風塵兹馬齒日衰倦逰彌劇加以髙堂八旬弱息三禩病荆床蓐瘦骨伶俜而欲以青裙白髪塗抹于五陵年少之前寧不滋其捧腹也長者垂神委篤漫爾及之二詩少致仰懐并希鐻削蘇堤岳墓花事漸饒軒車至止更圖握手以悉愿言再報舜舉明公一代人倫千秋匠哲頃嘉隆諸老相繼喪頽詞場尊宿指無多屈靈光一柱行且頏頡大椿以覆庇海内寒士胡来諭之謙謙也名篇華什麗爾清新大厯黄初縦横信手揭之座右日奉周旋附復不既與楊使君憶二三君子結社都門時也執事實以大雅主盟其間而不肖之獲従諸君子後則執事以通家子進之朝夕坐隅揚𣙜古今摘剔瑕謬執事所為功徳不肖甚盛也俄執事有滇中之命二三同志次第星散不肖亦以隨侍還越每追念舊逰側身南望萬里之外神爽欲飛方日夜以淮陽之召為執事祝迺聞執事竟拂衣歸矣瀫雖孔道不肖故多病謝客無従通尺素以候起居曩者稚修来邑私竊自幸可縁是一奉大教俄而此兄物化竟爾中輟媿之媿之邦相丈至詢知道履萬福裕卿繼来稱述近況竹林風致宛然猶昨江右山川比之京洛故自不減第曩時坐中小阮竟属何人含杯之暇故未能無念不肖耶執事偉望碩才上之當握管大廷黼黻皇度下之亦當秉鐸一方鎔鑄羣品迺以盛年屏迹田里豈造物者忌才抑固將用是成執事千古也執事無苦丘明氏所稱不朽豈獨區區功名際哉後世知揚子雲固百倍于當時知者奚以解嘲為也小詩一章聊當奉憶并属邦相使致之報大司寇李公子安於越鄙人跧伏草茅於當代鉅公鮮所知識顧自髫鬌往来京洛間則伏聞執事髙風冀一摳衣門下盖匡廬南斗之仰十禩于兹矣頃者邦相明府以舊知来邑朝夕聚首揚扢藝文每屈指當今匠哲輒推轂明公不啻口出因間請大集閲之恍然若入清廟明堂觸目皆天球彝鼎誠希世之偉觀而藝林之竒搆也于時附驥之思寸衷飛動妄冀一厠名簡末自係千秋而邦相遽以校讐見委且盛稱執事廣心偉度靡擇芻蕘遂輒因明府之言濫加次第自顧菲才陋識管窺一二無異醯雞旦夕兢兢獲諐大君子是愳迺重辱使者逺將筆札副以腆儀慰誨勤惓賜予逾越感恩沐徳鏤蝕肺肝伏承嚴諭盛欲以俚語弁之巻端尤非眇薄所敢聞命夫文逾左氏而徵序士安賦越隠侯而邀賞元禮執事固撝謙亡已迺賤子之弗量其何假以自文涼秋具草印正大方或仰藉寵靈獲以塗抹之餘玷名山之籍豈直惟萬鍾五鼎榮莫並之不腆脞詞且日月偕永矣来鴻促發草勒謝悰緯羅一襲絲布一端附使者西以竊比于越裳之貢報陳京兆玉叔陸司成攜大集至盥沐誦之如清廟朱絃華堂白紵沖夷粹雅三歎而有餘音文則周鼎商彝隋珠卞璧古色黯然精理瑩然亾絲微可瑕摘也古所稱和順積中英華發外有徳者必有言亮哉乎不誣矣尺牘纚纚數百言靡非肝腹至詩藪筆樷二序快哉公以千秋恵我也公名篇鉅製流布遐邇雞林之徼捐金購募或終嵗不能得片言鄙人顧未及請而兩得之公之溺愛鄙人迺至于斯極而鄙人之庇藉寵靈懸諸日月不將與二序無窮耶天尺樓詩草綴上二酉園遂得五言古一章并心逺堂萬綠軒冡君所命皆成之一日者不佞之索居而離羣也久矣惟大匠斧削焉與玉叔僕嘗謂公雅量足以鎮一世髙誼足以驅千秋廣心足以容萬夫虚懐足以傾四海無論當代賢豪聲氣輻輳即韋布山林晩進末學片長寸善葑菲不遺達公之志匹夫匹婦有弗與被吐握之澤者且引為已辜焉雖謂公藝苑中伊周可矣洎公之晉而留都海内同聲莫不舉手加額冀公立躋三事髙峙岩廊為文章吐氣而寒素之流尤汲汲焉所望于大厦之庇可知也迺公則竟以留都歸也豈道大莫容自昔固然耶將公取精造物者衆而不能毋小阨于位耶將造物者故小阨公之位行且大昌公之樹以永賴于千秋耶維是謝公不起蒼生之望惡能釋然逮今雙鬂未蒼二屐猶健優㳺東山花月間小適嵗時一旦蒲輪入楚終當出建掃除天下之業而以其緒餘雨澤東南半壁俾人人以太丘庇我庶明公素志為允愜而當代瞻仰為不孤哉夫雨花靈谷之勝不佞往来方寸十載矣計且因公一縦其逰目方束裝而驟聞公之促駕歸也夫安能無望于公之復出也與吴大㕘座師急足過蘭辱師俯念門牆將致大恵感戀之深淪浹心髓亟欲叩謝薇垣属家慈宿疾未平每嵗之中暑候尤劇坐是未克裹粮東下罪狀何言師名世偉才藩㕘之擢越在疆場寧足為久借寇公地然臨安一郡遺愛萬家兹者建髙牙擁大纛坐嘯其間湖山列庭雲霞属路徵輸之暇時一巡行使錢塘士民嘖嘖稱羨此前使君吴公也豈不亦快心壯逰哉雁蕩烟嵐六橋花栁數嵗之中兼撮其勝師殆玉皇香案吏暫謫塵寰非復世人也嘯歌成帙愿發郵筒涼風伊邇倘許以青鞋布襪唐突干旌當買孤槎犯雪浪奉候于龕赭二峰之側江潮千丈絶勝廣陵門下生老矣猶能従師賦焉報羅觀察俞生至自豫章首出華緘副之麗箑蠅頭蠶繭清風穆如公海㝢達尊震旦老宿俯視不佞辟諸一蚤一蚊勞于何有迺不棄芻蕘先施草莽多方汲引慰誨拳拳即有胸無心寧不寤寐奮飛冀執鞭弭于門牆之末惟是小子狂簡不知所以裁之政恐太上之途非凡質鈍根單刀可入耳鴻歸草勒陳謝新秋涼適擔簦躡屫候公廬岳之巔雲屏九疊瀑布萬尋勝概大觀惟長者指示以洞開茅塞幸毋曰㳺夏弗能賛一詞也報劉君東頃嵗偕吾丈握手清源碣石間一别便如夢寐迄今十載餘矣接大教迺知丈已髙尚不赴公車者久矣僕邇嵗以賤荆淪逝株守一丘無復計偕之念意丈飛騰雲漢摶扶搖而上九萬不謂亦同此懐也人世浮榮電光石火區區蝸角雞肋何足論哉職方公集夙所嚮慕而往時收録僅得數巻今大編勒成殊快仰止之私怡園佳勝種種暇當如命作一記奉贈不敢負諾也令壻英英玉潤足為後進中領袖而忻慕不朽之業尤為難事亦吾丈翁壻之間意氣所注致足欽也詩藪一部中間持論頗為藝林所許其國朝一帙首論國初諸公便以職方公為領袖其時談藝之士未暇及尋也今俱為友人攜去僅一部留杭者存而紙素漶滅以兄所必欲見者輒附請教幸笑存之伏枕口占一律聊致鄙懐外新刻一部詩扇二握方墨四函奉上病痬不見賓客者兩月餘以公手札勉起與令壻相接粗糲匆匆不能留為平原之飲異時丈或乘興完溪上之盟當傾倒十日以竟此懐耳十指憒憒不復能作蠅頭書亦計丈髙雅不復以世法相束縛耳鴻迫萬不一申既惟照亮少室山房集巻一百十五
