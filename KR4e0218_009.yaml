body:
  text: 少室山房集卷九明胡應麟撰樂府八十首讀曲歌四首忩前安石榴花開正見汝百舌枝上啼含情不得語園中櫻桃熟朝暮倩人守昨宵摘遺歡纍纍不盈簍懊惱枇杷實核多而肉少不療腹中飢那禁眼中飽郎遺佛手柑馨香動彌月報郎紅豆子相思永無歇秋閨曲二首八月秋風起揄關正雪花何因吹妾夢萬里到龍沙日把金錢卜征人尚未還龍城五千里目斷望夫山子夜歌四首開門得歡書有魚長尺一不知溪頭鯉認作潭中鯽子度饒芳香子都好容鬢觸目俱可憐身今阿誰近懊恨負情儂薄于下秋葉持刀截亂絲肝腸中半裂燈前驟相見含情不敢道乍可要郎眠那能就郎抱丁都護徙倚木蘭花流光莫虛度人命無百年聽唱丁都護明下童誰家少兒郎緑絲作單袴白馬紫遊韁蹀躞長干路歡聞變歌二首青梅繞樹頭若箇不作酸君行有兩意莫戀故所歡十月芙蓉花九月楊栁樹那得男兒心長若初相遇楊叛兒可憐白門栁依依二三月一曲楊叛兒飛花亂如雪江南樂舉頭見歡來回橈蔽蓮葉不知湖心娘濕透雙羅襪幽州馬行客歌惱殺燕臺騧發足千里逺只解馱郎行不解送郎轉阿子歌阿子住東鄰自矜好顔色春風動羅帷半夜邀歡入湖就姑大姑住湖口便風渡潯陽小姑住湖心月明就彭郎上聲歌春蠶空有絲不解雙雙眠垂楊空有絲不綰别離船折楊栁恨殺城南栁絲絲管離别殷勤折贈君記取豔陽月越城曲磯頭日浣紗春波瀉明玉指點苧羅村儂家在山麓春江行一夜春江漲江頭浪拍天中流便風起持底挽郎船雙行纏繡作雙行纏步步嬌春陽那知羅襪中兩足如秋霜隴頭歌五首塵起玉門關雕弓馬上彎身隨漢飛將乘月奪天山番人吹篳􅓋漢女撥琵琶征人三十萬若箇不思家絶塞少人行蕭蕭過雁鳴征衣猶未寄大雪滿龍城欲寄征人信難禁玉筯啼惟應紙上淚點滴到遼西空閨一枕夢杳杳邊頭去雙彎不出門也到黃花戍從軍五更轉五首一更邊月上流影照長城營門擊刁斗萬隊寂無聲二更邊月高戰士攬征袍何時封定逺霜露濕弓刀三更邊月斜戍客夜思家瓜期殊未及腸斷聽悲笳四更邊月隱征人夢初醒恨殺城南婦流光伴孤枕五更邊月落晨起清油幕飛騎奪天山王庭空大漠長安四時辭四首攜手七香車春風向狹斜燕姬年二八爛醉碧桃花太液池邊路輕舟蕩緑荷三千漢宫女齊唱采蓮歌寂寂霜天下寒砧搗月明長安十萬户一夜盡秋聲紅袖炙瑶笙夜醉平原館拂曙共鳴珂天街雪花滿燕京曲綽約兩青娥一笑遙相遇何處問儂家玉河雙栁樹古意玉帳結流蘇金鞭照春色二八艷名姝尊前乍相識俠少行二首白馬躍金環揚鞭大道間五陵春草色日暮臂鷹還呼盧夜來家醉眠不知曙忽憶灞陵遊拔刀衝雪去夜來用周皓事夜渡娘翩翩桃葉舟昏黑向江夏那怕狂風吹佳期在梁下江陵曲惱歡青絲笮凌晨只欲開狂風趂心起四面石尤來石尤非打頭風余有辨見丹鉛新録映江曲夾岸千桃花紅暈雙蛾緑惱殺冶遊兒絲鞭映江曲青陽度金犢遊東郊玉驄返西路相逢無一言脈脈青陽度長樂佳深宫鬭百草嬉遊共春日蝴蝶雙飛來故上搔頭立白符鳩以我雙碧桃係歡雙紫騮相逢那得去聽唱白符鳩同生曲妾貌嬌如花郎顔粲於玉妾年方二八郎年正十六來羅池上雙鴛鴦叉頭孤鳯凰雙飛太無賴孤宿鬭誰強拔蒲拔蒲復拔蒲六月湖水中纎纎十春筍不肯露青䓤孟珠誇他孟珠富却笑陶朱貧西施老歸越空作苧羅顰黃淡思今生作女郎萬恨攢眉頭來生作兒郎飢餓亦自由白頭吟四首巴江九曲流不似兒郎心蜀魄千年啼是儂白頭吟大車乘駟馬揚揚漢天使不記當壚日辛苦臨邛肆箱中犢鼻裩碎破不堪著回身擲向郎將心自摸索當日臨卭妻今朝茂陵妾金莖半勺露那能救消渴長史變二首懊惱爺娘痂貪他門戶熱措大作官人兒命薄于葉寧作中人婦莫作上官妻風波起平地山嶽移東西捉搦歌四首爺娘養女兒但教學針線許嫁前溪郎十五不相見采桑南陌頭田間日來往傍人指笑儂夫壻漸成長阿母教女兒殷勤候姑眠女兒問阿母若為得歡憐十四嫁官人抱衾作小妻終朝大婦罵眼淚洗面啼采桑渡二首不采陌上桑蠶在筐中飢欲采陌上桑使君道傍嬉采桑作羅綺總為他人忙不見長干娼一曲衣盈箱雀勞利二首禾傍雀啄啄日暮不得飽人生無百年别家太草草丈夫各有志不作籠中雞朝歌猛虎吟暮從野雀棲白銅鞮郭郎巾折角孟嘉帽頻落底似山翁醉接㒿翻轉著烏夜啼二首期歡中夜來月光滿庭柱展轉天欲明烏啼石城樹匆匆金犢車上路正天曉不恨歡來遲但恨歡去早趙瑟曲輕盈窕窈邯鄲姬挾琴鳴弦聲乍希梁塵拂空霜霰飛霜霰飛雲霧集月西沈日東出秦笙曲呼盧一擲百萬強妖姬如花出咸陽箏聲嘹嚦夜何長夜何長管絃列遏流雲弄華月江南弄秋江日暮天無雲蘭舟桂楫何紛紛美人如花簇羅裙簇羅裙鬭玉腕歌采菱歸去晚龍笛曲楚山修竹雲團欒伶倫截管飛青鸞美人一曲憑雕闌憑雕闌弄纎手落梅花折楊栁鳯笙曲紅爐熾炭玉管驕誰其吹者王子喬羽衣玉氅行逍遙行逍遙聽仙樂萬桃花兩玄鶴烏棲曲五首步障華燈光照屋質如輕雲色如玉白馬金環遊狹斜楊栁啼烏來妾家鬱金為堂玳瑁梁牀上流蘇百合香同心寶帶合歡結攜手邀郎拜明月錦幔銀屏張五采華堂宿霧籠香靄此時心意兩相憐含嬌顧影不自前疊股叉橫金鳯凰連環交結雙鴛鴦啼烏啞啞楚天曙荏苒容華逐郎去玳筵張燭三星低羅襟繡褥怯分攜郎騎白馬去關西鳯凰臺前烏夜啼少室山房集卷九
