body:
  text: 少室山房集巻八十明胡應麟撰七言絶句八十一首題徐惟得冲漠齋十二絶有序徐惟得使君人貌天行超然物表築茅齋數椽於楚水之上而以冲漠名厥㫖邃矣海内諸名流競賦新詩爛然巻軸顧獨於名館之義濶焉余乃竊取古今達人微言奥㫖與冲漠相發明者始壺丘太冲終曇陽恬淡凡十有二氏而各繫七言一章義取循名館中山川景物略而弗具使君有讀當仍舉桑落十餘觥頺然捧腹于北窻之下也壺丘示觀寂寂𤣥關閉萬縁頺然一榻抱枯禪天游未許時人識正是壺丘入觀年姑射凝神肌膚綽約瑩秋霜絶頂凝神眺八荒得喪窅然天地外不知身世住何鄉鄭圃御風羊角鵬程快羽毛罡風八極送飛濤窅然天際真人度始信長沙蹋翼勞南郭隱几靜坐焚香一畝宫灰心槁念夕陽中那能濫作吹竽客凭几蕭然萬慮空化人躡景振袂翩翩到北辰中天城闕跨金銀誰言半畝差容膝十二瑶臺屬化人華胥夢游勇退何人犯急流分司猶攝醉鄉侯朝來夢入華胥界一榻軒皇盡意游摩詰散花擲㦸歸來理釣竿不将零露望金盤飛花散盡三千界丈室分明有大觀少林面壁勇猛精修萬刼離窮年枯坐更何疑為言一葦浮江日可似三花面壁時雪山空寂戰勝歸來巖穴間空花落盡閉禪關大千世勢㝠心處恍惚當時坐雪山五臺清涼古寺清涼闢草萊三湘門巷半莓苔翻然杖錫騰空去閒看飛雲落五臺漆圃逍遙一枝殊自慰鷦鷯身世千年付泬㵳北海南溟俱莫問長空何處不逍遙曇陽恬澹空山寂寂午聞雞一路桃花照舊蹊漫說婁江恬淡觀真仙今在武陵西使君居去武陵甚邇故云又題八絶藂青閣疊搆危梯入窈㝠長空不斷暮天青松隂竹色憑欄處次第千山入畫屏白雲洞石洞蒼茫閉水簾碧窻雲冷玉龍濳不妨行雨邀巫峽猶記為霖出傅岩水竹居嫋娜千竿翠欲沉一區烟雨坐來深君恩乞與瀟湘地閒聽蒼龍日夜吟習家池峴首穹碑百尺遺襄陽仍覩習家池如泥不學山公醉自唱銅鞮㟁接䍦九𤣥室畫棟雕甍挾斗牛瑤箱瓊笈鎖層樓五千何代傳周史三萬當今跨鄴侯適意軒九列三孤亦偶然能將簪紱誤流年歸期趂得西風蚤何限鱸魚七澤前四顧亭萬壑千巖照眼明中天蒼翠撲檐楹憑欄四顧皆秋色疑是山隂道上行偃息居水擊天飛快羽翰巢林聊借一枝安參差已熟邯鄲道枕上從他萬刼殘即席刺史蘇州欲斷腸腰圍尺六舞霓裳若為並作盧家燕雙宿雙飛玳瑁梁萬伯修中丞東巡歌十首大纛高牙拂絳霄青袍白馬似風飈千帆掣海鯨波靜萬礟摶空蜃市消三千門客報晨雞八百家丁耀水犀何處精兵逾代北由來飛將出山西平倭望海説劉江閩越新傳戚繼光底似中丞文武畧彎弧飛檄到扶桑平壤王京鐵騎屯西飛青政盡游魂笑他定遠空投筆華髮蕭蕭望玉門對馬洲前積甲懸黑雲東起霧連天轅門夜縛平行長露布星飛北極前關白頭梟太白旗白狼河上羽書馳樓船却笑文皇帝百萬琱戈困不支麾下俱封萬户侯金戈淨洗薩摩洲山城肥後諸酋長叩顙遙天拜玉旒詩才舊壓丁都䕶將畧平欺霍冠軍一代雞林傳麗句千秋麟閣畫元勲爛漫黄金百尺臺將軍飛騎入蓬萊何須更奏征東曲十八鐃歌盡手裁萬甲憑陵大海東清江鴨緑亂流紅元戎奏凱歸來日天子晨開碣石宫送安頭陀還蘭隂作同少傅公四首野鶴孤雲去路長袈娑隨處謁空王楞伽一巻焚香坐先到裴公緑野堂百丈金身照緑苔青蓮瓔珞䕶瑤臺天龍一指猶堪䜿莫詫西方大士來十年湖海話禪機歸問雲山舊衲衣後夜月明金錫冷遙空笙鶴不停飛六洞三山次第看白雲迴望滿長安何須更覔蓮花藏一代金輪屬宰官東園四時詞尺書何處候青鸞吟遍東風十二欄金谷樓臺春尚蚤海棠憔悴不禁寒春薰風長日度簾鈎河朔園林總勝遊珠箔銀屏清吹滿石橊花底按梁州夏朝來簷樹著新霜小玉銀箏抱雁行紅蓼碧蘆秋十里不知亭榭在瀟湘秋雪片高天墜草廬瑶臺鸞鶴望清虚梅花萬樹孤山下何似橋頭策蹇驢冬王太學至卿一子四歲未能言嘗兩遇大厄夢異僧獲存或夙生有縁習也一絶紀之似夢如痴畫閣前前身誰為問梯仙三生我亦瓊樓客一墮風塵四十年王生庭中二雛鶴見余甚狎即席贈詩二章尺八翩􅗁鳯鳥文雌雄追逐氣凌雲怪來花下如相識曽是當年鸛鶴羣凌風相逐下瑤池雪羽霞標燦陸離自是主人多逸興庭前雙鶴解看碁題浮屠秋溟巻時以姑布術遊都下扶餘國小漫稱王定遠封來白髮長自是青蓮多傲骨錯將竒句恨昭陽射虎年來漸白頭南山風雪夜悠悠他時太史傳飛將肯信平陽第一籌萬伯修東巡歌八首麟閣由來畫虎頭轅門此日拜貂裘金泥玉璽從天下御筆親題定遠侯聞道將軍武畧饒頻年横槊絶臨洮酡酥一醉樓船上十萬雄師已渡遼親提精甲到平襄汛掃鯨鯢百丈强莫詫伏波年尚少大標銅柱在扶桑征馬翩翩度北風干將曽授白猿公胡床靜夜梅花落萬騎長驅一嘯中鐵甲三千照大幢金戈百萬洗長江前茅壯士謳歌發一箭天山夜請降無定河邊息鼓笳受降城下聽琵琶何勞更問燕然碣萬丈穹碑勒海涯山西諸將定誰賢烈烈營平四海傳盡掃先零何足道千秋勲業付屯田露布千言盡手裁霜笳奏凱入蓬萊西京枉貌麒麟閣文武何人吉甫才王行父惠簟賦謝二絶伏天無處避斜曛氷簟何由借鶴羣漫作巫娥雲雨夢月明環珮下湘君珠簾十二照華堂一巻湘雲白日長已悉王恭無長物莫教殘夜踞胡床再送遠遊明府二絶一葉晴飛大海傍東南雲色滿錢塘誰言薊闕三千里夜夜雙鳬入上陽千秋重覩豫章材五夜狂歌雪色來莫向斗牛占紫氣雌雄龍劍合燕臺玉城十景為侍御涇邑葉公賦石門鎖翠峭壁危崕暮靄屯桃花開落自乾坤中天積翠無人到萬岫飛霞鎖石門天柱凌空一柱凌空不記年嵯峨秋色敬亭前虚疑玉筍排雲上自是金莖浥露懸鷲嶺迎暉千仞岡迴倚石梁扶桑霞色對蒼茫長鳴獨向朝陽下人識清時有鳯凰豸峰吐霧古岫飛霜日月寒動搖山岳惠文彈誰言絳闕仙人屩恰是烏臺柱史冠蘭津望月種竹聊依宛水頭栽花仍記瀫川遊萬家明月懸秋浦千尺飛虹鎖暮流柏塢飛霜翠蓋亭亭繡作衣虬髯龍甲互相依風稜恍惚臺端見霜色參差柱後飛考水涵珠噴雪鳴環斷世塵胡床誰識洞中春花浮片玉來青澗樹列三珠對紫宸桓城映玉萬堞嵯峨照水明紛紛鸞鶴下瑤京狂來欲趂罡風起十二樓臺望五城五老排雲晴巒一望紫烟重玉洞桃花處處逢蚤晚排雲閶闔畔天門遙揷五芙蓉三台輔斗鼎立蒼峰峙翠苔遙看銀漢列三台誰言拔地三千丈斗色平連上帝臺余家藏道復水墨牡丹紛披老筆而扇頭折枝淺絳豐肌曼色嫣然襲人更題一絶于便面右誰冩天真第一枝盈盈霞色照軒墀多情錯認楊妃醉亭倚沉香日暮時永叔挾小友鄭生入都生年甫十六美秀工奕酒中持素册進余乞詩戲成四絶石梁天際夢魂勞雙别仙姝渡海濤綺閣紗厨春書永一枰閒對鄭櫻桃清簟疏簾奕未停楚江雲雨正㝠㝠莫教夜半成虚約辜負燈花落小亭杜楚江巫峽半雲雨清簟疎簾看奕棋緑髮朱顔羨子都楸枰拂拭倩華襦摧鋒謾自誇年少一著還須讓老夫宋人送徐師川語長鋏翩翩海上遊明光謁帝暫依劉無勞更賭宣城郡一局龍陽已拜侯題趙太常山居四絶眠雲洞疊嶺層崕落照懸桃花萬朶浴飛泉𤣥關盡日封雲氣一任羣羊化石眠凌翠樓傑搆中天翠欲流罡風迴合亂雲愁何當八翼凌空去長嘯三山十二樓薜荔園流水柴門白兔宫一區晴鎖萬山中成功㑹著荷衣返入夢休猜蕙帳空緑䕃池千緑蕭森映夾池此君長日對支頤泠然詩思清神骨何似山隂夜汎時寄祝華父郭汝冲盛明元夾岸晴波潄緑苔青帆遙遡大江來相逢問訊蘭隂客蚤趂桃花上越臺一夜帆飛瀫水潯南屏山色望來深燈花落盡棋敲罷兩屐春風到武林春日過皦生齋頭米仲詔倪迂擴本在焉披閱數過吳楓秋色照人睂睫恨不攜緑蓑青笠容與其間作竟日主人也野渡無人盡日閒茅亭斜揷亂雲間不知簷外秋多少一片關仝畫裡山題壁千觴欲盡尊前酒七盌曽傾月下茶莫笑盧同憐赤脚當時曽醉美人家趙相國以絲布衣材見貽霧展霞舒簟色勻清風兩腋度綸巾從知黄閣絲綸在不是塵中褦襶人謝趙相國借湘竹榻落魄宗郎愛卧遊十年湖海夢魂愁朝來一榻平津至何事陳登百尺樓少室山房集巻八十
