body:
  text: 少室山房集卷九十四明胡應麟撰碑銘一首唐令君新建信陽願豐隄碑常山邑全浙上遊其地界七閩三楚舟車之所綰轂富商巨賈萬貨之所走趨錢塘之水實濫觴焉源發縣東北郊逶迤百里抱城瓴建厯衢婺以達于江嵗月滋久洲東港堙水折而西去郭紆繞閭閻之溉汲行旅之灌輸咸病之又形家者言率以水逺弗宜於黌序諸青襟士蚤夜皇皇冀得良有司以紓宿患先是𢎞治中令劉君擬築堤捍水使毋西而合流港東旋以憂去弗克嘉靖初張倅尋劉故迹亦罔迄工今上改元甲午雲間唐侯以進士綰符來邑甫下車揖諸父老問一切政所宜先合詞稱築堤為第一義侯周行境上喟然曰是誠不可旦夕緩顧大興匪可倚辦頃刻間越明年惠政四孚頌聲沸起邑茂才徐仕升輩復請之侯曰嘻微諸士余豈其一飯忘爰白當路發贖鍰鳩衆工相物宜時農隙侯躬率僚屬即勒指麾靡遺餘力始秋中迄冬末為旬僅十有五而版築告成衡為丈若干有竒廣為武若干有竒高為尺若干有竒凡舊堤之材朽者易而良弊者撤而新頽者封而固隙者繕而完庳者增而隆隘者闢而曠又環視港之壅者決之激者排之溢者疏之膠者浚之沙者瀹之磑者夷之飛流如虹襟帶城下縈洄顧盻亦拱亦留百年之利暴興一旦士胥慶于庠民謳歌于野旅相率加額於途侯鑱石于隄而命之曰願豐逝將以地利人和而必天祐於是徐生介祝生樹勳輩羣詣不佞碑侯伐以志不忘不佞槩觀載籍洪荒以降水之利害所關于家國天下甚巨而治水之任最為盤錯亘古今不易其人勛華二帝如日中天懷襄之厄四嶽九官舉遜避而推鯀微大禹幾無唐虞漢武席纍代之雄驅山鞭石勢無弗行瓠子之決殷憂作歌至沉璧馬而後濟太史八書河渠列于禮樂班椽十志紀溝洫以配天文誠重之也唐侯以明經上第初命而宰一方稍飾撫字振傕科掉臂而躋省闥固匪以隄之成否為殿最而隄之成否又未嘗顓責之侯若他政事弗容已而侯則奮然任之鞭笞罔施聲色匪大而數千百載無窮之利執劵而收之掌上非夫誠結于中仁昵于外抱絶類離倫之識而負規天條地之材其胡以及此抑余嘗聞之文人無用則舉世以為然惟是唐之白宋之蘇兩使君者咸以築堤垂永賴之烈彼其時寧無揚眉瞬目自詡任事之臣而以隄特聞宇內者胡寥寥希遘見也侯方以文學追馬班即兩使君猶將需之左席乃今願豐告成文人之用彰彰耳目有明效焉傳諸異代庸詎知其不與蘇白二堤同弊穹壤也不佞無能為侯役特以臭味忝一日之知樂覩是隄之成不直為一時良吏快且為百代文人快輒援筆碑其事而系以銘銘曰姑蔑之淵錢塘之源如何崑崙發軔萬川沙墠中流既分既合胡然而盈胡然而竭居人抱甕行旅挈囊皇皇青襟旦夕望洋偉哉唐侯先憂後樂綰符下車首訊痌瘼竒樟斯得桃李並栽偃室告成聿來淡臺僉曰河渠利病孔亟侯聞矍然隄此朝食爰戒于邑爰次于郊沐雨戴星以先庶僚蒼赤纍纍奔走赴義譬彼嬰孩飢渴怙恃經始仲秋迄于嚴冬我隄告成燁如長虹十旬非遙五月何速真宰上訴衆靈匍匐一水抱城蜿蜒若留鵬躍鯤飛龍門上遊禾黍盈阡是灌是溉我昔何勞夫負妻戴閭閻踴躍道路歡呼寶筏金繩廣濟迷途巨川舟航明堂梁棟詎曰文人亡實亡用曰白曰蘇洎侯而三堤垂宇宙伯仲之間峩峩曾城閬風玄圃欲駕靈槎泛彼銀浦隄石窿穹鑱碑大東百世永豐自唐長公銘二十九首古玉方鼎銘有序得古玉文王鼎方腹圓趾以周尺度之髙九寸八分衡廣四之三縱四之二腹四周卧蠶鏤刻精工而內外折旋纎悉中矩四足空中抵上鬲皆近代玉工竭力不能為者信齋閣中竒玩也惜一足蝕土變蒼下稜微挫絲忽中損連城耳然亦非窮措大宜有物是月以歲凶將鬻諸歙賈因稍述其形製而系以銘米元章所謂吾齋秀氣從此不復泯矣戊寅秋半識于羣玉山房奕奕陽精至自于闐厯漢逮明千五百年法象乾坤腹方趾圎入矩應規天工折旋昆吾鍊鋼篆刻糾纏蠶卧螭遊神物蜿蜒石匣祕藏虹霓在田太隧崇陵繡蝕隱然天發靈光燁煜市㕓抱璞以歸陵陽素緣白板精廬蕭條太玄棐几銅尊沉水晝然拂拭焦桐泠泠五絃五鼎萬鍾浮雲邈綿嵗薦苦飢豐玉詎憐爰飾明妃以媾呼延懷寶迷邦誚彼聖賢我獨何人韞櫝自妍鸜鵒澄心勒銘如椽秀氣吾齋千秋並傳白玉如意銘有序燕市張燈從二三好事遊俠斜得白玉如意長尺有四寸首琢靈芝身作子母螭上下相向蜿蜒若生古云玉徑尺為寶此雖長尺餘非徑也然亦竒矣昔人以玉柄麈尾為王謝子弟物余之畜此聊取適一時而已因銘以識之誰剖長虹自西極上座談天絳宫闢白晝干人走碣石齋頭小彌勒博山爐銘有序歙人斫壤得萬歲藤根二為彌勒像一軀博山爐一座精巧瑰特儼出天成余兩逰燕市得之嘗合置齋頭諸好事雅相慕玩暇日因命名像三曰聖菩提曰木上座曰龍樹尊爐之名五萬年芝仙人掌小崆洞旃檀座香象龕蓋像惟取義爐則四旁上下各從其形且為之贊若銘頌十餘大都穎傳餘瀝存其半以諗滑稽丈六金身示現寸草靈根不昧孰曰枯稿相彼伽文八十二好冡嫡在兹永世為寶又而躬頽然而腹坦然而口莞然問疾維摩胡以欿然補處大雄胡以偃然吾弗知其所以然而然又超大千界入不二門於未來劫為無量尊不知者曰菩薩之幻相知之者曰菩提之上根右像又木上有火鼎君子以凝香晏寢又六鰲蟠五龍蟄吐玄雲潤八極又三秀草萬年芝斫靈根樹鼎彛又萬嵗仙藤九曲靈根玉靄蘭芬永裕後昆右彝螺觥銘東海波臣南山木客象彼犧尊為大白鴟夷觥銘營糟丘鑿酒池載西施浮子皮腹如壺號鴟夷又翩翩者鳬中流一壺拍浮菰蘆高陽酒徒又鸕鷀杓鸚鵡杯玉山倒非人推又木兮癭兮酒兮觥兮酌兮斟兮濁兮清兮醉兮醒兮又長生木瓢示真率浣花野老醉爭席海山琪樹銘太華峰頭十丈蓮少室三花凌紫煙玉塵尾銘白馬酣蒼虬駕辟華陽空稷下九節笻銘九華仙人九節笻飛行五嶽如遊龍西朝白帝上芙蓉玉女洗頭下相逢爽鳩氏為靈壽丈人銘壺公壺銘須彌山納一芥一壺中貯三界大鴟夷觥銘鴟夷公腹如壺挾西施泛五湖又南有箕北有斗千金一壺中流為友湘竹如意銘逍遙七百名理秩如維摩默如文殊懌如水沉如意銘龍樹斯雕虬枝若亞畫地隆中談天稷下長生瓢銘承露天中俯八極飲泉丘中隘九域拍浮缸中醉千日又挂之高林由曰煩居之陋巷回曰賢慮為大樽周曰然帝錫長庚為酒船又維地有泉星在天飲如長鯨吸百川有能盡此詩百篇青田核銘爾腹枵然乎而背騷然乎而口坳然乎而飲飄然乎而醉嘐嘐然乎旃檀如意銘以擊珊瑚汝先折以擊唾壺汝先缺旃檀之座玄理徹爛熳天花墜春雪何物粗豪逞鋒鐡趙文鎮一蟠木兒置齋頭若翔鸞舞螭形甚怪偉乞豫為銘余為銘銘其足靈根萬祀蟠蛟螭鳯舞鸞翔紛陸離晏寢凝香國華胥我欲嗒然從子綦頌一首乾清宫落成頌大明御宇奄宅四荒華夏再造日月重光神聖相繩餘二百祀德化郅隆遐格廣被維皇嗣服克長克君薄海外內悉主悉臣高拱穆清幽隱畢達霜露所墜洞燭我闥府宫一體臺省肅雍仁裕卉木澤彌昆蟲巍巍合宫靡潤靡飾上法唐虞土階茆蓽端居高拱二十六年除舊布新象魏式懸天心弗違申命熒惑袚除故基示我物力帝其明命夙夜咎躬攬一宏綱車書來同潢池既安疆宇旋定海外獻琛從好從令大工伊曠建樹孔時公輸效長將作請期皇帝曰嘻豫罔敢逸仁愛自天惟毖惟飭庶司衆職旁午九關僉曰神居宇宙具瞻乃命工師乃庀林木選匠荆揚伐材庸蜀靈臺經始蒼赤景從西山文石北苑椅桐帝念其咨經始勿亟父事子來堂構如翼業業言言兩宫告成三光在簷七曜在楹罘罳切雲飛甍綰霧蒼龍九斿鸞鶴屬路乾一以清坤一以寧維皇得一天下以貞明堂既開清廟既闢撫馭萬方永示皇極贊二首李惟寅太保像贊晬乎其容坦乎其躬廓乎其度藹乎其𠂻朗朗若萬間之厦峩峩若干丈之松開國岐陽元勛上公龍門之下虎帳之中解推盡海宇而不名其德安危繫華夏而罔居其功湧若耶于毫端流河漢于心胸禰供奉兮鳴臯禘都尉兮晨風髫鬌蜚聲詞林國工壯嵗登壇馳驅四封晚途學道兩朝之業八代之文浮雲之點太空容與乎青蓮之閣逍遙乎貝葉之宫孰貌兹圖角巾蒲團穆然太沖吾誠不知為地文為天壤其殆壺丘之未始出吾宗也耶李允逹像贊而形偉然而容岸然而心胸廓然洞然苞千古而籠八埏食牛三朝倚馬萬言賦頌西京聲詩開元跋扈飛揚作者亡前荆玉雙刖蓬蒿蔽園矻矻揚亭以守太玄嵗值龍蛇命也弗延騎氣乘風遊于混元嗟嗟仲子疇豐而材疇嗇而年疇厄而遭疇縱而傳嗚呼仲子孰令汝賢造物小兒維汝實忌匪汝實憐豫之胡昌奪之胡遄嗚呼仲子余弗知其所以然而然少室山房集卷九十四
