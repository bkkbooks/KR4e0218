body:
  text: 少室山房集卷九十八眀胡應麟撰史論五首陳壽上甚矣哉史氏之言不可不詳其顛末也陳夀之志三國繼躅馬班而世率以夀父子見法武鄉故諸葛傳贊有將略非長之訾此皆不詳核傳文之顛末且不知夀之所處何時而托托片言以藉口者也夫壽之志三國也天下統于晉矣司馬昭者懿之子而炎為武帝則懿之孫也炎以懿孫混一海宇臣六合而奔走之夀于斯時雖蜀之遺民而實晉之編戶也壽能抗節首陽不食晉粟作蜀漢先朝之史以彰直筆而死生利害一置無心其于晉氏之先即毫無諱忌世孰得而議之乃蜀亡之後壽固已身為晉臣久食其祿矣所纂國志雖非被命纂修書成之後張華杜預輩一時朝士咏嘆播傳其不得私之家孰而藏之名山審也若是而顧于晉之先世兵爭仇敵之人據事直書臨文無隱大者將為崔浩之暴揚國惡湛七族于一朝次亦且如蔡中郎輩嬰縲絏於狴犴而望書之行于世而傳于後乎此壽子武鄉行陳之際戰勝攻克不得不紆回其筆以少致其北面之私者而其意于武鄉實未嘗有所軒輊也夫壽之成書列傳百數吾悉取而讀之矣體存簡質辭絶浮蔓即昭烈魏吳寥寥紀述獨武鄉一傳紆徐鬱茂備極敷揚僅大捷鹵城一諱宣王之敗至渭南之卒按行營壘天下竒才之嘆且揭篇終噫彼司馬懿者百代姦雄之最迹其生平曷嘗有所輸服獨斯言也觸于目而發于衷蓋古今之公是而壽直書之而不沒所為揚詡武鄉之將略固已至矣而謂父見髠鉗已遭箠辱畜憾于武鄉而報之于史筆否乎然乎且武鄉之在當時雖管樂自居實伊周之匹也廖立抆涕李平捐生彼其馭下一操以直道誠心獨于壽之父子行法參商致憾身後壽不足言武鄉之治理固已疏矣是後人之扼腕武鄉適以啓武鄉之疵纇也矧本傳之文彰眀較著其大如彼不詳核而毛托片言足以服壽之心于千古之上哉陳壽下或曰尋壽之傳武鄉信無風刺世人之疑均為未逹矣第武鄉一集壽所纂修篇末眀言亮于治戎為長竒謀為短理民之幹優于將略此例數言詎得悉為壽諱也是又不然諸葛氏集雖壽所纂修實奉命晉君者也首稱毗佐危國負固不賔蓋亦遵時遣詞不容直遂中厯敘其逸羣之才英霸之器立法施度工械技巧物究其極惡無不懲善無不顯吏不容姦人懷自勵道不拾遺強不凌弱則幾于王者之事矣且以武鄉素志進思龍驤虎視苞括四海退欲凌厲邊疆震蕩宇宙然則亮之將略壽以為長乎為短乎若夫應變數言其下亟稱所與對敵或值人傑加衆寡不侔攻守異體連年動衆未能有克蓋天命有在不可力爭其抑揚微旨眀寄宣王壽之本意灼然自暴豈得以為譏亮所短耶申言梁益之民追思不置咏甘棠于召公又以周公之誥丁寧煩悉擬武鄉之文告則壽固尊亮以為周召品流匪但匹蕭亞管而已乃至篇終佚道使民雖勞不怨生道殺民雖死不忿四語也唐虞皥皥大公之化三代之下惟孟軻氏能道之諸葛氏能行之而壽也顧亦能徴之能贊之則古今之知武鄉壽居其最焉可也俾當時壽之父子毫有未盡于孔眀胡以敘致纚纚聯篇纍牘極其揄揚而弗能自己哉惟是後人捃拾此言而上下全文漠然不考又往往不省其著作之時諱避之體而譏彈一轍不惟上負前人敘述之素心而且貽纍武鄉之盛德故詳為辨析俟尚論君子衷焉表文又云昔管子舉城父蕭何舉韓信皆忖已之長未能兼有故也亮之器能政理抑亦管蕭之匹亞也而時之名將無韓信城父其人故大功迄于未建云云數言頗近似而實未然夫蜀之將率時誠乏才而魏以九州之七武士千羣其于將材固不可勝用也而自街亭一戰之後武鄉載出之餘王雙覆亡郭淮竄遁魏平賈詡圍困於祁山戴淩黃曜敗衄於上邽凡魏兵遇蜀如破竹壞茆迎刃摧裂至鹵城之戰木門之追今古笑端迄今未巳懿每覩武鄉綸巾羽扇蕭然戎陳而軍政嚴眀竒變莫測輒極口嘆羡擬之天人余嘗笑宋儒以子房孔眀並稱而本朝維楨氏拔鄼侯武鄉之上夫子房鄼侯籌帷幄治國家可也使之統大衆臨大敵彼能然乎故時無韓信城父益足以顯亮之才而不足為憾也本朝王維楨氏著論以何屈羣策亮恃已長為兩公優劣之辨甚矣其憒憒于史也余以亮與何所值之世所處之國所事之主皆迥絶不倫何所值開創之初賢能輳集而亮季世也何所處紛拏之際豪傑周流而亮偏國也何所事豁達之君風聲感召而亮庸主也以垂亡之漢當積衰之蜀奉庸劣之主即一餽十起而才生有限惡得而用之考亮于巴土名流纎長寸善搜録靡遺而廖立痛哭李平捐生皆以亮既亡無能拔已史楨之妄不辨自眀矣范曄典午以降無文矣乃范曄後漢一書彬彬贍縟軌轍馬班無論六代諸人蓋厯唐宋以迄勝朝宗工巨匠名世迭興而史筆寥寥自若也曄自謂體大思精天下竒作以今較之良謂不誣李獻吉答人論史雖稍致不滿律以馬班故耳至謂三國以迄金元逺不及曄致公論也而宋史曄傅則有大不可曉者曄雖世家近臣而文章之士其於軍旅非所夙習又未嘗聚徒結俠覬覦非常孔熙先者曷故而深相援結務推之俾為戎首且世之營圖不軌必若王敦桓玄輩氣勢威力彈壓一時庶幾偽定否亦當如臧質鄧琬憑依喪亂藉口宗支而時則宋主勵精國儲武戾無論萬無一幸即事成倉卒詰旦皆虀粉矣兹下愚極陋類能辨之以熙先之狡獪而顧出此余有以知曄之逆狀未足盡憑也嗟乎左丘失眀馬班狴犴而曄至身首懸殊豈文章之美抉奪化工造物小兒真不無悉忌耶不然胡自曄而後之作史者皆顯達而亡弗令終也歐陽修歐陽氏之史五代也當時尊之謂出太史公上厯宋至元無弗以上接班書餘子弗論也乃本朝楊用修列之司馬家奴王元美擬之下里學究胡毁譽懸殊至于斯極哉余嘗以西京而下史有别才運會所鍾時有獨造故文之髙下雖以世殊而作者遞興主盟不乏自春秋以迄勝國槩一代而置之無文弗可也若夫漢之史晉之書唐之詩宋之詞元之曲則皆代專其至運會所鍾無論後人踵作不過緒餘即以馬班而造史于唐李杜而掞詩于宋吾知有竭力而亡全能矣乃至陳壽范曄之才不過三國六朝中人之上者其于昌黎河東廬陵眉山兄弟不同日語審也乃昌黎中書一傳真足頡頏司馬而意欲自開堂奧盡削陳言故太史之文不以馳驟于順宗而以戲劇于毛頴他可推已河東假氏逸事體法孟堅餘率已調眉山家世序論表䇿其所偏精而紀傳之文寥寥絶響獨歐陽究心史學摹勒馬班五代一書差存勸戒而以曄書壽志較之猶將瞪乎塵後是固時代所壓未易超然要亦史有别才難于兼美也不然謂數君子之才而出陳范二子下可乎司馬君實嘗謂唐三百年巨公間出遂無一人足與陳壽范曄伍而寧知厯宋逮眀而二書之懸揭自若也吾故以西京而下史有别才而運會所鍾時有獨造也善乎李獻吉之言史曰古史筆形神湧出覽者躍如五代雖成一家言而無是也此歐史之定品也司馬光偉哉司馬氏之為通鑑也迄宋而亡此書則編年之體絶而春秋之迹熄矣而評者不先其大往往以義例精粗褒誅出入而議之是徒知筆削者之易工而不知創締者之難合也夫綱目之與通鑑雖制作相因而紫陽法春秋者也涑水法左氏者也春秋以辭為褒誅故一字榮于華衮片語嚴于鈇鉞而左氏則直書其事臧否自形即是非曲直大綱所係公論時參而于春秋之書法則敻乎其不侔者也而安得以綱目而例之惟是曹魏系統意重中原而武侯入寇之文世所同惜乃紫陽未作之先三分順逆固未盡眀涑水苐因仍舊史非用情于排蜀也夫通鑑之作無俟綱目之修而綱目之修斷不能無待于通鑑之作有春秋不可無綱目則涑水之啓紫陽其功斷斷乎有不容軒輕者矣説一首松溪説壽李隱君盈天地間之物節最髙而年最永宜莫有松若者陶濳氏之逸也盤桓栗里之孤松杜甫氏之放也眷戀草堂之四松祖龍氏之威推倒百皇鞭撻萬彚顧獨託蔭于梁父之五松至尊之大夫而靡敢斥焉上古仙家者流或餌其花或飯其葉或飽其脂飫其膏究至通弗眀列丹籍沖舉霄漢者往往而是故千嵗之松雲氣覆之乳苓鍾之霜露降氷雪沍厲風之震蕩摧折雜芳羣卉漶滅澌盡嘗試攬衣策馬登髙丘而一寓目焉荒林敗葉厭厭惙惙若無復毫髮生意而亭亭一蓋鬱蔥千丈特立於中條太華祝融王屋之顛藉令樵人弗知匠石弗採則厯塵劫敝元會而不朽不腐即大椿冥靈胡以加故余嘗謂天地間之物節最髙而年最永宜莫有松若者也龍丘李君别業清溪之上長松數百株環精舍而周焉故君少輒以松溪自命今年登五秩矣懸弧之旦親婭謀所以薦一觴者相率而丏言于余余不識李君何如人第即松之為物而卜君之算日升川盈繩繩乎其未艾也或曰吾子之所云松節最髙而年最永彼托根于岩穴委幹于泱莽生寬間之野長寂寞之鄉老無何有之境其得算也固宜李君腰巨鏹客燕吳錢塘廣陵營丘碣石當世所謂天府陸海豐亨盛麗區也李君以大賈冠危衣繡烹肥擊鮮夷衍其中芳辛旨醴之所炙蝕妖冶娥曼之所蕩淫竒邪詭特之所播㺯吾見其精日益以搖神日益以騷而形且日益以凋若之何與彼清溪之上蒼然鬱然者而計其久近也是不然子獨不聞之大隱市朝小隱林藪之説乎有熊帝而仙者也周穆王而仙者也柱下史而仙者也關尹令而仙者也夫其據九五之尊肩朝命之重猶之乎蟬蛻塵埃羽化霄極而矧乎李君者韜靈茹和濳耀斂鍔爵祿靡人簪珥弗攖精外嗇而神內完彼其所為自葆者充矣碩矣堅且固矣其獲算之永也微松之為物其孰與之上下其論也且也祖龍氏以殺伐蘄長生以嗜欲蘄羽化其于松殊趣無論若陶之逸杜之放臭味埒之乎松若無間然乃取稱太宏流譽太逺犯造物之所夙忌故兩君子之季不可以夭折論而要以耄耋期頥逺矣李君者不惟不風波于富貴抑且遊心于混元抱朴于兜玄淡乎其無名穆乎其忘言之人也之算也將邁陶駕杜而與赤松諸真揖讓于清都絳闕者區區人間世夫胡足以既之于是或人聳然避席載拜曰旨哉夫子之所為説松也請揭之文錦播之鄉閭以永為松溪君夀少室山房集卷九十八
