body:
  text: 少室山房集卷八十一明胡應麟撰序九首弇州先生四部藁序原闕今稱集大成焉學者往往謂六經匪可以文章言而仲尼之集大成庸詎槩以文章之一節姑亡論巳語文章於三代之下則在百氏矣軻以儒周以道非以法不韋以雜短長以縱橫丘明高赤以編年向固曄壽以紀傳斯以書誼以論江左六朝以偶儷唐宋而下諸子以雜文原玉以騷卿雲以賦唐山子樂以樂府乘陵操植以古風勃照鄰賓王太白以歌行佺期之問維皓頎昌齡參以律絶皆傑然各名所長乃上下數千年間未有總攝㑹萃而統于一者談藝之士不得巳則判途為二而取漢之遷唐之甫以當之咸曰集厥大成矣夫遷吾亡論其聲詩即一史外若騷若賦若子胡以弗少槩見也甫吾亡論其紀述即諸律外若樂若選若絶胡以弗皆中程也曰遷曰甫誠哉數千年間出而較彼一偏之技猶然陷缺若斯矧乎搴百氏之長極二途之趣洋洋纚纚以自𣗳一代之言之人也姬周而降可易得其仿佛哉蓋至明而東海之上有弇州先生出焉高皇帝手闢洪荒載造區㝢文軌所訖悉主悉臣擬諸漢唐功德遼邈而二百餘祀綦隆之化蒸薰灝澒洽為泰和於是乎造物者始盡發天地之材全畀名世之士而弇州王先生巍然崛起東海之上以一人奄古今制作而有之先生靈異夙根神穎天發瓌質絶抱八斗五車眇不足言弱冠登朝橫行壇坫首建旗鼓華夏耳目固己一新中罹家艱載揚臺省暨乎晚歲籍仙苑覲帝宸中間動息起居詘信榮蹇造次顛沛一發攄於文章雖咳唾呻吟嬉笑怒罵世咸傳誦以為法則當嘉隆萬厯際亡論藝士鴻流薄海內外無思不服即嬰兒走卒里婦擔夫西南裔夷江淮草木靡弗知有弇州先生也者遂使金石之藏延亘六合珠璣之散充斥八表至四部二藁出而古今著述盡廢於我明矣其為卷也四百有奇其為言也兆億靡量合宫衢室軒豁其規模大吕雲門雍和其音調火齊木難絢揚其色彩湛盧飛景震耀其光鋩祥麟瑞鸑容與其威儀天驥神龍跌宕其步驟夸父巨靈堅强其骨力皇娥趙燕綽約其丰神赤明龍漢渺邈其津梁兜率須彌惝恍其境界何體弗備何格弗苞何意弗規何法弗典何辭弗鑄何理弗融何今弗離何古弗合九騷則屈宋之閎深也十賦則馬揚之巨麗也逸篇則左國之瑰瑋也劄記則公穀之嵳峩也序說則孟莊韓吕之雄高也志傳則班劉陳范之瞻密也書牘之淩厲縱橫其比蹤上蔡乎論著之豐溢渾厚其合轍長沙乎四六之整而流艷而發其含吐江左蹈藉唐初乎性碩之文俶以奧韓之力去陳言乎山水之文卓以詭柳之大放厥辭乎廊廟之文達以昌軾之源泉混混乎而雅頌祖述商周鐃歌憲章漢魏樂府慿陵八代古風馳驟兩都歌行出鬼入神勝擲乎駱盧崔李律絶超凡入聖奔走乎沈宋岑王總先生諸所撰造周視乎古昔宗工不必執甫以難遷第即遷所長與遷角而遷弗勝也而遷之短于所長者先生饒為之不必執遷以難甫第即甫所長與甫角而甫弗勝也而甫之短於所長者先生饒為之不必合遷甫以難諸作者第即諸作者所長以角諸作者而諸作者弗勝也而其凡有所短先生又各饒為之大哉先生之於文章乎猶崑崙峻極中天而五嶽其佐命猶渤澥渟泓大地而四瀆其支流猶清寧奠冒羣生而象形靡弗該猶化育范型庶彚而氣韻靡弗肖庶幾哉混合大千深入不二兼收廣蓄亡所成名戰國以來一人而已乃先生學術尤有不易言者巵言宛委筆記諸編核元㑹運世之始終酌皇王帝霸之高下洞仙釋怪神之窅眇抉昆蟲卉木之幽微以逮一技一長之淺深工拙王仲任祕其論衡張司空删其博物劉參軍謝其類苑虞少監失其祕書梁太子隘其選裁鍾記室陋其品藻是又疇昔文人蔑能儷得先生顧網羅囊括恢恢有餘嗟乎先生之於斯術也可謂至矣極矣美善盡矣蔑以加矣三代六經既𤣥既邈不有先生孰與集文章之大成哉不有先生孰與集文章之大成哉即以宣父門庭而差文學之科標詞命之軌先生非升堂之素相則入室之上賓司馬汪公有言宇宙文章維先生􅍦維先生亦自謂前亡昔人後亡來者諒哉言乎不我欺也應麟束髮操觚服膺大業次公紹介獲附忘年猥擇芻蕘面命兹序倘曰阿私所好古今方册具存昔翰林屬撰於陽氷吏侍申盟于皇甫千百世下當以不佞為知言巳兩嶽遊序方可大謫官汝南亡弗以吏事難可大者即知可大能吏事又亡弗以冗秩難可大者乃可大聞命無幾微怏怏色也顧大喜自得曰吾夢寐嵩岱兩嶽十年矣今謫官汝嵩三十六峯在吾几席間而道出齊魯岱宗梁父復當吾車轍庸詎非造物者以一官私余遊哉于是亟命駕而東要友人于太史可遠相與躡天門日觀恣攬封禪萬家遺蹟秦皇漢武所駐驆處夜半觀日出大海扶桑方丈雲霧燁煜蕩胸決眥洋洋乎宇宙大觀也已乃飄然一葦浮河入洛下車􅊩政民用太和公事之暇屏去騶從扶杖曳屐登太少二室絶頂俯首中原千里一色空同王屋浮丘廣成若可左右望而招者神情飛動逸思橫發長謠短歌寓目輒書合前與太史同賦得雜體若干首而總目之曰兩嶽遊而走書瀫水之上曰兾吾子一言序之夫域內名山大川無慮百千十而瑰瑋絶特以嶽稱者僅五五嶽相望奚啻百千里而岱宗為羣望首嵩高當天地中尤世所爭先快覩者史稱尚子平遊五嶽至屏家纍絶人事而嚴君平氏終身遊僅得其四天于畸人逸士猶或靳之可大特以一謫官不閲歲而兩陟其顛遍窮其勝且歷以詩篇紀之為篋笥中物胡造物之獨私于可大也可大尊人大司空宏勳茂烈震耀今古以身為斯文盟主四十年而余猥以童子當國士之盼曩者南還之夕定交可大稱觴秉燭窮日達旦語語開元皇初上事乃今三復兹編氣骨高華聲調閎爽真若與泰岱嵩高爭雄萬仞之表者非其才橫絶一世能然乎哉昔屈原賈生皆以忤時貴見擯斥比余讀其文詞誠極才人之致而悽愴憤鬱識者病之可大少年材美無謝兩生顧所為諸詩特悠然曠適過長沙三閭逺甚固宜隨試輒效當盤錯位卑冗而卓然穎脫無難也雖然今可大且踵大司空故武膺內召入承明勒著作于石渠金馬即欲復為兹遊不可得而余幽憂疾病自放塵世之外方圖以雕蟲敝帚託之名山大川可大行矣兩嶽之遊造物且以私不佞矣素軒吟稿序素軒先生詩一卷古體若干首五七言律絶若干首洎詩餘若干首邦相明府既以屬不佞校之矣則復命不佞為之敘素軒先生者邦相尊人封繕部公也先生少習舉子業稍不售輒棄去築文室龍沙上命曰素軒朝夕卧其中取古今名能詩家語恣讀之凡境有所㑹情有所鍾遇有所觸以至牢騷愁怨燕遊賞適寄憶酬贈一一而鳴之于詩既邦相成進士先生沐貤封膺寵命顯重矣而其好為吟顧愈益甚時時出遊西山南浦間分樵青牧子半席驟而遇之一翁蒼顔野服跨蹇驢執鞭䇿作推敲狀童子操几杖其後大類深山窮谷有道者不知其貴人父也先生質力材具于詩故足躋上乘方極軌而其大旨要在陶寫性靈標舉興象以自愈快不欲以矯峻刻厲自見故其為詩沖和恬泊優游雅適宛然太古康衢甪里之遺即偉詞奇句時出間發而卒歸之用意忠厚其於詩家者流蓋粹乎根極情性之正非世稱述文人墨客可比迹上下也明詩之盛盛于𢎞正李何一倡諸君子從而和之聲調未舒異者輒議其後嘉靖中李于鱗氏出而獻吉復尊至王長公勃興江左遂操百代風雅柄次公繼起齊驅競爽一時周旋中原肩荷大業者亡慮數家而嘉隆之際幾軼唐漢若邦相其最著者也邦相雅善兩王先生顧以其餘謬推轂不佞不佞既素習邦相而於其來令吾邑也益相與提挈為不朽計恆意其文辭得於天挺獨詣乃今而得之素軒先生夫江出岷嶺其始濫觴河流之發崑崙涉者可褰裳渡及其排砥柱絶吕梁滙為洞庭彭蠡雲夢之澤浩溔澒洞滔滔日夜以赴之乎尾閭之壑而後江河之大觀斯極乃以窮其源則謂非出岷嶺崑崙不可故夫讀詩者讀素軒先生而邦相槩可見矣先生於詞尤工是歲以邦相迎養來蘭不佞獲以通家子謁庭下不閲月輒促駕曰吾以返初服也詎以吾一人故旦夕曠子百里任吾得歸卧故素軒中足矣既抵家則以一奚囊貯詩若詞謂邦相善為而翁論次付之梓庶幾俟他日揚子雲者毋令而翁今世藉而爵位重而後世復藉而文辭以重也蓋先生所為自期待者如此方外吟序鹿城雁蕩之區奇秀甲天下故生長其間者率清遠夷曠皭然埃壒之表至發為詩歌亦往往與其人類蓋山川之助云余所知者布衣康裕卿裕卿以詩名家隆萬間余與交最久且善裕卿下世余亦謝病溪上杜門高枕不復通一客壬午之歲忽有投刺稱永嘉林山人者余倒屣揖進與語覩其狀翩翩野鶴然居數日輒别去是歲山人再過溪上手一編謁余余亟取讀之則山人近游武夷洎關中諸作也山人于詩偏好王維孟浩然故不為刻酷雄深莽宕語而興象蕭疏神情𤣥暢如藉茂草蔭長松臨水登山嗒然竟日每一誦之輒使人有輕世遺纍蜉蝣方外意即亡論其格極其才窮其致摩詰襄陽門户無難入也談者以為山人家雁宕而客武夷奄有二方之勝宜所為詩宛類其人若此今秋山人益謀泛舟下錢塘並四明遍走吳閶白下贄其詩以謁海內作者因固請一言為臨歧之贈余辭弗獲則進山人謂曰子游方之外者也吾何以贈子雖然子今槖中裝亦僅一武夷耳夫㑹稽秦望天目之山大禹之穴洞庭七十有二之峰金陵石城龍盤虎踞之氣浸以具區滙以長江控以大海其勝不知視武夷何如其巨麗瑰瑋什伯武夷不啻然皆余曩昔杖履間物也今於子之行盡輟以贈子異時再過溪上手一編以示我更有進于是者庶子之游為不負而吾之贈為不虛哉山人曰諾敬奉胡先生之教以行吳生德符詩序新都詩派肇自許宣平李供奉讀其靜夜明月穿雲翠微二咏至以為神仙歷千餘載而汪伯玉以閎深傑異之才壁立嘉隆諸子之際風骨稜然典刑大雅重以兼收廣納流壤靡遺一時彬彬家隋珠而人和璞蓋司馬之勛于是為烈而詞場接踵有指不勝屈者矣乃余獨以吳生德符為難能吳生溪南巨族也少從父祖業鹺客武林歙人占籍武林亡慮十三四率富商名賈以資力泉貨自雄子弟遊閒鮮裘馬飾輿𨽻挾毛嬙子都張吹六橋三竺間據湖山為湯沐最上畜書畫鼎彝然香煮茗容與太平之世而生顧翹然自奮于詩歌凡衆所競趨裘馬輿𨽻毛嬙子都亡一足芥其中而滑其好即書畫鼎彜指一間染焉而有未嘗數數者僦居委巷􅚃一室青苔黃葉中撚髭擁褐朝呻夕吟夢寐所游從羮牆所揖遜亡非漢魏盛唐也者其口呐若不能言而縱談古今則懸河注海而酌之莫窮其際其容瘁若不勝衣而揚扢千秋之上則撫劒顧盼而追逐作者于九原其意矯矯舉一世鮮當其衷而獨以昌陽棗芰之嗜偏注于不佞其為詩掃去一切巧曼浮詭尖纎之敝習而力追大雅之上乘醇乎太羮𤣥酒之遺味沖乎高山流水之遺音邈乎土鉶瓦缶之遺軌沈而深之擴而大之其必傳于后世斷斷乎其亡惑也嗟乎詩至嘉隆聲律之途斯為極盛而薰蕕禾稗並蔓叢生間者二三遺老相繼喪頽子夜繁音淪浹心髓即豪傑俊流時溺其說生也獨崛起紛華靡麗之交正色抗詞推而遠之匪其勇兼人其才軼俗其識曠世足萬一語此乎此余所為戛戛嘆其難能而每讀其詩輒為之擊節而三倒也俾司馬公在且把臂入林延之上坐惜乎其弗可復作徒使生以昌陽棗芰之嗜日偏注于不佞不佞于是倀倀乎有餘慨矣醫括序醫肇迹軒農長沙發其獨智首揭羣方津筏千載繼之稚川之肘後思邈之千金洎近代劉張四氏備矣顧載籍浩如伏習者類不無望洋之嘆而晚近世病情紛拏百變刻舟緣木又往往以陳言束之此易水張元素氏所以有古方今疾之嘆也新都張君柏弱冠客遊吾土輒以醫知名浙中今年垂七秩矣生平湯劑全活自通都大邑以及下里窮鄉殆不可數計乃君恆不自滿足復慮一人之仁蔑能遍咸㝢內則以間日類集試驗諸方括為短歌數十百首至病情稍涉疑似反掌死生者又緒為諸論以剖析之其取效若符左券其闡微若燭秋毫且俾世之學流一披閲間旬月之功可人人抱其術以仁壽天下噫是何其慮之精而識之邃也明興才諝輩出自學問詞章以至百家衆技類能駕軼前古獨醫門眇覩其人王綸氏之雜著徑捷旁通最為方家尸祝而推之近日稍扞格而難行蓋陽有餘陰不足固彥修不易之定論而寒涼膠膩鋭情尅削或反以伐其天和楚失而齊庸得乎此余身以疾嘗而洞徹其脈理者知李朱二氏世靡得而偏重明也君治醫一以補中為槖鑰而旁擷諸名家佐之故病者獲其診視雖未心奏奇旦暮而算計見效往往迄於萬全其賢于剽輕詭遇之夫不待明知而後策也是編行君之仁且遍咸㝢內即長沙諸公不得顓耀其美而余之言亦且與之俱遠故不辭而序以復之印譜序印章所從來遠矣自李斯以昆吾刀刻秦璽兩漢而下官私傳流博雅之士代有編集若王順伯吳孟思宋元諸模譜迄今雲間印藪㑹萃古今參伍載籍斯以勤矣乃余自髫丱客長安三十年來耳目覩記亡慮千百顧氏所録什九未遑蓋承平奕葉陵谷遞遷蟲魚科斗之迹雜出于荒林大隧沈沙斷甓壞礎間固非一人聞見能盡搜括也鐫印入國朝亡出長洲文氏父子世濟逮今後禘禰二家大抵待詔之工法為政博士之妙意為師法勝者往往局于法之內而精意時詘而意勝者又往往溢於意之外而成法時乖劑二者而酌其中俾法不泥意而意能無骩法斯上蔡之真源而長洲之哲𦙍矣四明張大木年少才高以篆刻遊燕中余邂逅于黃生六治館軒軒然霞舉埃壒人也已視余所鐫諸印淳質典藻俊而弗冶宕而弗流一展玩間古色蒼然隱映睂睫蓋庶幾哉能劑量於法與意而獨擅其解者異時繇文氏而努力前規以馳騁於六代漢秦之列余固未知其稅駕所也大木將歸越持譜詣不佞頓首曰入長安遘逢胡先生大幸遇胡先生而蔑能隻字等之乎亡遇耳願得數語勒簡端梁也終身奉之噫子雲老不解事僕僕長安市即奇字多識其何以語侯芭生生歸矣宿㫪糧曳芒蹻長嘯入四明洞天讀靈文於上清石室回視人間世六書得無復躋一格耶審爾其更鐫一石曰石羊生後身以寄我兩都游草序此張孟孺兩都游草也先是尊人佐虞以詩名鵲起介胄司寇王公蓋嘗上客客之而淪躓中道余每讀伐檀諸集輒恨與若人並世而不獲把臂于東西雙弇間比入都晤俞羡長亟稱佐虞伯子孟孺其材詣亡謝乃翁余私衷愈益嚮往焉顧一水盈盈即奇偉菰蘆亡從物色是秋始遘伯子湖上未及問姓名别去去明日而羡長以八行來謂乍所邂逅即孟孺其人今且持所業謁門下矣余倒屣出迓視其狀孤雲野鶴翩翩然亟拂席命坐坐定命酒酒至命酌微醺抵掌揚扢古今語語埃壒之表余傾耳側聽不自知膝之前於席而席之前於賓也巳孟孺袖中出一編長跽進余曰惟先君子之臭味門下也敢介俞君而以蠅附請余展卷疾讀之韻高而曠思沈而淡調逸而新如片石孤峰清池皓月興象泠泠標揭人外即驟見似坦易無奇也者而微詞雋致引之彌長而繹之彌遠達其材竟其詣亡論跨竈異時以較孫仲謀氏之于破虜堅庸詎難于步伐也嗟乎詩自三百下逮𢎞嘉漢唐以還于斯為盛頃者儀璘匿景燐爝當空邪詭尖纎之態沁人心目孟孺方考業兹時而亭亭獨上一舉而盡前之非誠所謂穎脫于塵坌而軒舉于闤闠者哉憶琅琊次公疏世說謂𤣥晏文匪三都亡傳理余絶嘆為名通兹孟孺兩都雖寸臠片胾居然有振衣千仞意而余言謬以糠核抗顏前導而弗辭者知孟孺之必傳于是編而不佞且並傳于孟孺也李仲子集序吾郡李仲子能茂天才瑰邁奔逸無前自束髮為詩歌已駸駸有吞虎食牛氣里中先達或以年少易之覩其落筆吐語驚人句相屬咸逡巡却避其鋒仲子顧弗以自足也益肆力劌心友千古士於漢則兩司馬於魏則三曹於唐則杜甫明則李夢陽李攀龍弱冠補邑弟子員為督學使者蘇君禹識拔巳縱遊秣陵吳㑹間卒業弇州四部乃擊節大嘆咤曰起八代之衰者其斯人乎亟陳啓自通纚纚數千言弇州大奇其材數寄聲不佞子國有李子子其知之余唯唯庚辰之夏有持刺叩門者自稱東陽李生余方飲投箸踉蹡出屣不遑倒既執手晤言扢揚上下逺自昊穹近迄昭代亡弗懸契則又起大嘆咤曰與子同里閈三十年而毋相值微今日者幾失之余非夫哉今而後所不以不朽謝子有如日余欣然而笑莫逆於心遂定盟焉自是仲子歸彌月輒有所撰述輒走尺一命蒼頭三百里持詣余凡仲子所為文大都陶冶秦漢偏長獨造則記問啓札為尤每一援筆大者河決瀾倒雷厲飈馳即寥寥隻詞亦委篤雋永妙思橫流采絢溢發總之神動天隨非斤斤研墨畦徑者詩歌則其生平精力萃焉七言律之高朗鴻麗五言律之嚴雅清新高者揖讓開元平者馳驟元和諸子歌行絶句時有離合淺不逗俗深不墮魔至五言古則幾逼建安吾婺中千餘年所僅有也總之仲子天才絶出而又能師古匠今焚舟舍筏厝力篇章故克以少壯之齡驟臻此域過此以往余弗知其所稅駕矣仲子素蔑視一第以青紫可芥拾既數困諸生默默也又以好吟故嘔血久憊卧床蓐間一旦籍其生平製作洎雜文若干篇緘奚囊授余曰以不朽纍吾子茂曩昔所息壤於吾子者在耳而僅僅若兹命也吾子其謂何噫仲子休矣千秋之業旦暮且而屬矣而且務攝藥餌抑思慮專精神而乂年甫壯業甫就名甫走宇內而未克彰造物者忍以彼其材畀子而竟天䦪子中道乎吾為子序焉為異日先驅計可也仲子字允達父靑州公亦能詩饒著述有集行于時少室山房集卷八十一
