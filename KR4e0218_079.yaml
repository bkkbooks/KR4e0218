body:
  text: 少室山房集巻七十九明胡應麟撰七言絶句八十首再題大雅堂七首為東陽盧生十尺荆榛峽口濤千年遺搆蜀雲高堂成莫話幽憂事列座王楊盡彩毫半壁天南八詠樓陽春今在瀫溪頭華堂肯借抽毫客五夜如椽拂斗牛千樹桃花送夕陽莫愁家住石城傍從今再覩清商調絶勝當年白玉堂李義山詩又入盧家妬玉堂靈隱高僧卧佛廬參軍亦傍紫薇居丹梯莫話盧敖杖三百篇成奏玉除清川如玉抱前村處士當年舊蓽門破屋數間君莫笑千秋大厦有雲孫韓贈盧仝詩破屋數間而已矣珠箔銀屏賦浪裁美人何處問瑤臺鬱金堂上雙棲燕妬殺君家少婦才沈盧家少婦鬱金堂又玉川有當時我醉美人家詩屈指河山罷酒徒華陽重見李生無知交尚有盧鴻在如意狂敲碎玉壺盧嘗及李能茂游蓋其仝邑人汪明府以校文來武林旬日别去追送四章乍擁軒車到六橋不堪江浦繫蘭橈飛檣百尺西風裡萬壑千巖送暮潮堤上明霞躍紫驑接天絃管帶瓊樓漫將桃李誇梁國采盡芳蘭瀫水頭迢遞朱絃百里鳴朱衣仍傍棘闈行新栽何限淮南桂滿路飄香入帝城星斗崑崙一柱懸文光千丈燭龍泉渾忘鹵簿江州貴寂寂衡盧問太𤣥同黄生過方生仲闇適沙棠入湖曲因寄聲畱棹子夜同醉狹斜中天際樓臺掛碧空芙蓉十里褪殘紅岳王祠畔狂歌發何限湖山夕照中縹緲寒光石磴幽佳人無賴木蘭舟青帆莫便乗風去子夜錢塘載莫愁祝遜之訂約新秋過湖上不至湖畔秋風日夜過東來舴艋定如何蒹葭滿目澄江上不分蘭隂墜露多秋晚再寄祝遜之老去馮唐不解愁南山秋色暮悠悠歌殘白石無人和荒草斜陽獨飯牛聞弇州續集殺青寄懷王冏伯昆季四首四部重開詫汗牛千金懸市定誰讐風霜字字遙天外悵望如椽白玉樓副在名山更殺青茫茫元氣走羣靈從知百氏毫端廢可道傳家但一經百尺危欄跨紫虚青藜遙夜燭前除莫言中壘慵疎甚閣上曽讐太乙書萬顆驪龍抱月圓江河不廢異時傳琳瑯何限堦庭下次第三株拂斗躔新秋再寄冏伯栁色金閶半夕陽鱸魚雖好未堪嘗莫言方外狂司馬多少樓船鴨緑傍夢弇園懷逸季茂才極目婁江大海潯弇園秋色夢中尋興懷莫話蘭亭序玉樹瑯琊正滿林黄生九斗攜所業千里過訪于其别也贈以絶句六章萬仞潮頭濺客衣布帆無恙雪中飛推篷面面青山色已到嚴陵白石磯千里遙遙問字船海天長嘯白虹懸還家莫話相如璧攜得成都舊太𤣥衮衮青雲結駟遊沾沾白雪斷鴻愁何來意氣縱横甚昨日龍門御李侯時諸士以賓興至縹緲仙都挂碧空石門飛瀑亂雲中他時倘為名山出雙屐巖前候謝公秋風秋葉亂山蒼踏盡秋山到遂昌問訊故園樵牧侣只今誰住鄭公鄉鄭遂昌元祐在勝國有文名掃石題詩坐緑苔黄家羣從最多才無雙漫自誇江夏次第三珠照玉臺題册贈凌别駕二首絃歌百里畫簾深桃李千家接上林試問珮刀臨瀫水何如飛舄向蘭隂凌時署篆邑中仙吏仍浮剡水槎天都縹緲接金華官衙盡說囊如水攜得芙蓉幾片霞題林孝亷園池四絶百頃風潭照玉壺清鱗白石擁菰蒲沙棠獨抱夷光卧何事風濤汎五湖右浣花池八面疎櫺挂夕陽樓頭雲色尚飛揚屋梁咫尺親顔在不用褰帷望太行右飛雲榭古檜崚崚映夾池虚亭十尺鎖漣漪朝來載酒誰相過正値揚雲賦就時右清漣館縹緲精廬入望遐芙蓉秋水舊生涯如椽莫笑書生筆十丈亭亭照暮霞右振秀軒題祝山人樹勲棲雲軒四首掩徑蕭蕭木葉聞干將明滅動星文青山獨據胡床坐閒看中條石上雲木末飛軒面水流終南遙挂萬峯秋𤣥關白日重重閉不放飛雲去嶺頭一徑莓苔盡日封匡床雲色卧雙龍羅浮四百青天外不認飛來第幾峯十二巫峰挂楚臺高唐新賦定誰裁莫言神女朝行倦夜夜閒雲卧榻來送祝如華二首抗手𤣥亭話别離青衫憔悴越江湄那堪獨宿孤舟上潮落錢塘夜雨時十載高山託素琴朱絃無處覔知音飛霜落月河橋畔惆悵行人發武陵履素使君邀集衙齋中嗣君出迓僅五齡風儀韶潤而衣裳楚楚如老成人賦贈二絶三尺龍淵掌上持亭亭寒玉照風儀機雲漫自誇年少又覩雲間小陸竒徑寸驪珠夜色懸衣裳楚楚畫堂前抽毫異日蘭臺坐㑹學盈川賦渾天呉德符損餉宣德茶盂二枚因瀹天池新焙賦二絶以賞之柴汝官哥各浪傳摩娑秋色到龍泉筵中宣德新磁在笑殺何郎食萬錢把贈雙珍破寂寥龍團翻雪亂雲飄瑯琊舊著煎茶賦已説宣窰勝定窰卧病經旬呉生持所業新詩來謁訝其精進賦贈二章何人不羨濟川功策石虚傳大海東莫笑老為題柱客當年曽住玉華宫獨綰金繩繫法輪重施寶筏架迷津亦知黄蘗前身是肯作恒河自渡人蘭江竹枝詞十二首夜飲浮梁懷大學士趙公兩岸清溪中有洲山花紅白遍溪頭聞說西門好風景大家同上木蘭舟蘭隂蒼蒼北固遙中洲水面似金焦欲把湖頭比溪上若個三山在六橋飲水白虹千丈强來來去去罷褰裳中流不碍蚤行客隔水休呼夜渡娘渡口狂風掀白蘋驚波猛浪不愁人乍宵西崦踏青罷明到蘭隂賽水神苧蘿村中花滿蹊廬江亦有仲卿妻銀釧金釵照溪水徃徃來來唱大堤嚴陵東頭七里灘家家門户釣魚竿良人乍夜趂潮去將船賣酒入臨安四柱凌雲排六鰲鐵絙高繫最堅牢水母難興泗洲浪蛟精不作九江濤溪上浮梁春漲平濛濛烟霧懶囘程風秋潭上踏歌去水遠山高無限情鄭村渡口風浪多魚船來去疾如梭相邀女伴到梁下一時同唱采菱歌三百闌干浮碧空笙歌繚繞暮雲中天香夜半廣寒落錯認銀橋在月宫金臺尖高高揷天俯江樓俯夕陽邊當年板築遁荒野今日舟梁濟大川城南迴望告天臺衢婺悠悠二水來清獻前身為時出蕭然琴鶴在蓬萊贈霓裳十二首響遏行雲未足多陽春流水定如何夜來小玉飛銀漢傳得開元第一歌一枝明艶照窻紗曽事仙人萼緑華唱徹山香蓬島上瑤池千樹盡飛花玉面朱唇陌上逢香車油壁乍從容莫教行雨峯頭去尋遍巫山十二重睡足紗窻晝漏遲白櫻桃下畫蛾睂珠簾百尺重門閉沉水香銷月上時金屋何曽盼阿嬌臨春歌吹總寥寥遙空一片飛雲駐人倚危䦨弄玉簫月底朱絲競管絃風前紅袖趂鞦韆爭誇靜婉腰圍細不解湖頭唱采蓮樂府有張靜婉采蓮曲紫燕雙飛掠畫樓黄鶯百囀和箜篌妖姬十五顔如玉底事長干喚莫愁女伴相攜鬭晚粧風鬟雲鬢若耶傍乍宵湖上歸來晩阿姊同遊字蕙芳振袂飛霜襲彩毫新聲頻奏鬱輪袍十千長恨真堪買三百靈光漫詫豪瘦妻羸女各傷神紫鳯天呉拆洗頻笑殺杜陵溪水畔雲鬟香霧是何人七香霞珮午珊珊駿馬金羈照玉顔跋扈飛揚湖海上前身莫是李東山園桃巷桞色紛紛素口蠻腰並出羣不信寒酸饒下駟西京誰並卓文君藝苑卮言云退之桃栁樂天蠻素皆寒酸所得題藝苑五游册有序新都程太學文東博雅多藝能摛詞染翰外琴奕丹青咸躋其妙余為題册曰藝苑五游玉軫閒揮望太空目隨中散送征鴻無勞郢國千人和白雪晴飛大海東右琴杖底雙龍跨夕陽荒村仙嫗坐更長枯碁三百無人共零亂青霞滿石床右碁八法縱横晉永和鸞箋十幅照春羅科頭獨抱蘭亭帖散步臨池看白鵞右書沉水香焚白玉壺洞門深鎖碧雲孤窻明几淨人聲絶閒冩初平叱石圖右畫獨坐匡床枕半敧山堂寒雨漲秋池夜闌松子前堦落吟得襄陽五字詩右詩曳杖村西閒步見壁間二語甚佳而不知名字漫為易數字足成之紅白花開籬豆齊野人茅屋亂雲西庭前桑樹老無葉日午鄰雞飛上啼少室山房集巻七十九
