body:
  text: 少室山房集卷二明胡應麟撰樂府三十首漢鐃歌十八首朱鷺朱鷺下漢道昌一雙羽翮雲中合沓而飛翔合沓而飛翔在我庭户以建華鼓導大輅魚魚雅雅詫彼行路朝食沆瀣夜濯風以露應期出世所慕五帝三皇巍巍福我祚艾如張艾如張張四維擊高鉦懸大旗戈鋋甲胄光陸離千靈從七校移虞人雜沓冠以皮臂蒼走黃當路岐南山有虎豹北山鹿麋狐免若丘山縮足不敢馳我欲上天天門九重我欲入淵血肉餧蛟魚龍王者合三驅百獸一一歸我樊籠不見青冥冥冥者鴻聳六翮乘長風遊赤霄入無窮雖有矰繳羅網將安庸思悲翁思悲翁氣結不能言兒長翁為娶婦思得奉晨昏白頭以團欒婦惡如豺狼入門作災患牝翼鳴前庭舉室愴以煩知交各各縮舌親戚斷往還我有壺漿翁饑不得餐我有裳衣翁體不得完思悲翁氣結不能言我欲訴上帝天門九重入以難我欲訴司命司命徘徊以盤桓念欲以高飛無羽翰以負翁去體毛何摧殘不若城上烏反哺翁殘年思悲翁氣結不能言安得天雨雹霹靂震長夏雷霆半空下永永戒來者翁離舊辭缺今據補之翁離趾中可築室何用葺之桂若蘭翁離趾中可築宫何用塗之椒以檀修竹夾廣除一何檀欒千乘萬騎繽紛哉往以還左長楊右甘泉汾陰後泰畤前黃鵠高飛極雲天詞臣獻賦陛下之壽三千年上之回上之回祀甘泉金支揚翠旄旋雨師後風伯前鼓鐘管吹聲何填駢東達扶桑南逮于闐西徑流沙北訖祈連天出景星地産醴泉報慶成致精䖍肅雍哉愴以嚴五帝三皇享億萬斯年戰城南戰城南日無色壯士長征死願作烏鳶食請謂烏與鳶壯士死國家委身喪其元汝食其肉一胡忍且殘世有大豪元惡巨奸殺公吏探赤丸暴戾恣睢膾人肝一旦禍機發橫尸道旁血如流泉腐肉如丘山汝胡不食甘此忍且殘請為烏與鳶答君子言世有大豪元惡巨奸司命不敢録司敗不敢拘司𨽻不敢糾彈十九老死牖下子孫貴盛冢墓象祈連彼雖有肉血我安得餐壯士不自惜委身徇國家喪其元我固當得食彼復何言巫山高巫山高高望不可極日月蔽虧雲雨出入有美一人曰維神女朝為行雲暮為行雨泠然入余夢貽我以翠羽鬱陶乎余心將以疇語將舍余國都以往從女朝朝暮暮為雲為雨上陵上陵一何崔嵬宫殿若雲屯觀者為徘徊門有車馬客駕言上陵回千乘萬騎宵行烈風雷我欲遐征憩望金銀臺封泰山禪梁父登日觀觀蓬萊蓬萊東見朝旭芝草藂生醴泉滿谷七十二家著編録將進酒將進酒乘乘黃列鼓吹嗚笙簧齊姜楚姬列兩傍衛女秦娥左右以成行挾安陵戲龍陽擁長劍珮琳琅繽哉紛盈高堂烹大彘炙肥羊五音和八珍良天瓢甘露臣以嘗千秋百嵗逍遙以徜徉有所思有所思思美人美人渺何許大海天東南曷不往從彼游路途險且艱弱水不容舟三山鬱㠝岏宫闕冠巨鰲遙遙極青天美人在其上三山高以寒我為釣巨鰲截竹為長竿持竿坐滄海大水何漫漫巨鰲牽不動但見一雙鯉魚遙墮青雲端呼童剖此鯉中有美人尺素翰前有長相思後有勸加餐徘徊感此意躑躅不能言雉子斑雉子斑雉子斑一雄一雌抱子田野邊雄飛摩天去不還孤雌養雛寄草間養雛寄草間乳哺一何艱夜不遑寢晝不及餐毛羽既長成五色麗且鮮一鳴舉世驚一飛上沖天回頭顧視我母六翮何闌珊老病倐已至懨懨向重淵有子不得養慟哭摧心肝有子不得養慟哭摧心肝君馬黃君馬黃臣馬蒼飛軒蹀躞大道旁旁人顧見臣馬以莫不謂良一朝中涓下明堂君馬入天間意氣何揚揚臣馬老伏櫪伶俜瘦骨朝逐水草暮逐斜陽背負鹽車以西上太行路逢伯樂造父王良停車振䇿為我倣徨念欲剪拂我以登明堂嗟筋力已盡莫能騰驤長鳴短號斷絶中腸芳樹芳樹芳樹揚春華結秋實東風歷亂而飛揚容色在朝夕美人坐高堂兀兀愁蛾眉君心為他人冶豔能幾時春華詎能久秋實那可期普天之下悠悠疇非輕薄兒班姬與陳后解事一何遲黃金買詞賦徒為世主疑不見芳樹枝榮瘁各有時端居任大化何用戚戚顰蛾眉聖人出聖人出明光宫萬乘千騎升回中望祀天地禋於六宗百神來享以莫不肅雍肅肅雍雍四方同風唐虞之世比屋皆可封浩浩大化與天地無終上邪上邪我與君輸肝委膈他人那得聞急難各相護救決絶妻子如浮雲中心耿耿金石百年以為鄰巢由撫六合堯舜下閶闔山崩石爛河枮海水竭十日竝出天地裂我與君好永不絶臨高臺臨高臺望長安飛甍畫楝嵯峨峭崒而㠝岏蒼龍九斿限重關我欲謁天閽一覲上帝顔手持長生藥以奉心所歡上帝肯聽臣億萬千斯年蒼龍九斿限重關限重關使我欲進心茫然臨高臺望長安撫膺三嘆行路難逺如期逺如期遊四方北碣石南瀟湘西太華東扶桑鑿混沌竅燕中央飲則食兮樂而康以尋列仙拾金光飛翔八極行七襄馳驅絶冥觀大荒千秋萬祀壽未央男兒墮地桑弧蓬矢射四方安得老死一丘局促若轅下駒守故鄉石流石流南山有石北澗有流石何齒齒流何湯湯石以枕我流以潄我腸幽蘭哉夾岸芬以芳芬以芳順風揚彼美人兮天一方安得寄此永永長相望補蜀漢鐃歌十二首有序炎精既缺海㝢三分昭烈以漢室宗親親任武鄉君臣一德託孤寄命比隆伊周自兩漢以還大統故當以蜀為正王通氏抗言武鄉不死禮樂可興識者咸謂不誣顧漢氏而下魏吳晉各有鐃歌以播揚功德蜀反缺焉蓋武鄉身任復漢之責魏吳未滅夙夜皇皇惟誓師鞠旅東鄉是圖舍是而播告聲歌彰明得意此天下既平之事非枕戈待旦之日所暇為也又蜀之文人時尤不競譙周郤正等輩槩之詞賦咸匪所長亡論武鄉未暇即欲有事焉未有可以肩草創之能洪潤色之寄者也惟是魏吳製作流傳迄今才流藝士簧鼓筆端動以昭烈武鄉夷諸僭竊順逆邪正鬱而勿彰余甚憾之昔陳夀三國帝魏先晉紫陽一正其謬稱快千秋不佞占畢詞場餘二十載于樂府雜調頗覩一斑每讀鼓吹鐃歌至繆襲韋昭傅𤣥諸作不勝扼腕至欲鼓而攻之噫彼各自尊其主勢則宜然百世之後是非大明而操管握觚之儔從事樂府惟齊梁月露冶豔相沿迄未能一厝意於此余則何敢以謙讓未遑也爰效繆韋諸體為蜀漢鐃歌曲一十二章上以著昭烈間關戡定之績下以明武鄉夾輔盡瘁之忠即藻繪方之諸家未當魯衛而理直義形據事陳詞羣嗥自廢忠臣志士之憤或賴此其一雪矣夫宋無鐃歌宋景濂嘗追補之惟後漢獨缺云帝車見昭烈甫髫舍東南産竒樹五丈餘童童若羽蓋望氣者咸屬心焉為帝車見第一帝車見涿鹿墟童童立五丈餘千靈衛七聖趨揚金支翼翠旟雨師道風伯驅氣如龍殷里閭真人起握斗樞奠漢鼎撫皇輿炎精曜火德噓億萬載帝方隅顧隆中先主屯新野三顧諸葛亮於隆中明良之盛敻絶千古為顧隆中第二顧隆中一顧再顧三顧何從容千秋載覩明揚風君臣契合魚水同莘野幣交湯匪躬渭川一見羅非熊何如三顧勤隆中惜哉炎燼噓殘虹創業未半中道終三分鼎足寧稱雄克老瞞曹操取荆師百萬而東先主命諸葛亮諭權發兵大破操於赤壁為克老暪第三克老瞞厥功不可量瞞挾天子令四方以暴如虎貪如狼既定荆州下長江併兵八十三萬强凶威所指橫以張所觸者碎當者亡遣軍師亮諭孫權權奉命發兵助我屯江干桓桓烈炬戰艦轟將士大呼衝敵堅賊兵百萬尸如山操走烏林四海安權進妹既破操屯荆權懾大威詭媒締好為權進妹第四權進妹託同仇外戚內疏諧孫劉包藏禍心蓄愆尤牀帷甲第圖淹留戈鋋矛㦸紛相求帝握大機與神游與神游衆叵測劉郎歡孫郎泣周郎脣乾口燥呼不得以頭搶地長太息千秋齒冷笑吳國史稱瑜令權離間關張等臨殁復以為言云定兩川成都底定遂圖漢中馘淵驅郃魏操鼠奔爰建大號即帝位為定兩川第五定兩川皇圖赫赫帝業安成都破竹萬姓歡壺漿夾道食以簞西指定軍奪前山夏侯來爭馘斬淵馘斬淵衆大崩郃也棄馬亡心魂操懾首鼠抱頭奔抱頭奔兩川一順天應人即皇帝位新萬國討漢賊關侯破襄圍樊風動華夏操震怖欲奔權帥賊黨䝉遜襲荆州漢事遂壞先主親征權軍於猇亭為討漢賊第六討漢賊屯猇亭屯猇亭皇赫斯怒以親征嗟關侯率衆圍樊城七軍夜淹師徒崩操懾大威如雷霆賊權惴惴怖且驚怖且驚謀吕䝉逞虐熖乘奸凶為鬼為蜮蠛與蠓遂亡荆州喪大功踰月䝉死尸流蟲皇赫斯怒離巴中離巴中以親征破秭歸震夷陵䝉賊既死遜賊復興嗟嗟昊穹漢事壞垂成渡瀘丞相亮受遺輔政五月渡瀘羣夷格心式歸大化為渡瀘第七渡瀘師徒一何勞五月盛暑深入不毛託孤寄命豫惟伊咎陶勞實在豫豫曷敢逃五月盛暑深入不毛獲彼大酋以令羣豪七縱七擒俾返其巢衆懾天威永戴大朝振旅而還徒御弗號雍雍斾旌肅肅羽旄文德誕敷爰格有苗千秋兩階載覩唐堯祁山丞相亮將圖中原上表出師三郡響應魏人震恐舉國奔命為祁山第八祁山出漢賊驚創業未半先帝崩丞相匪躬夜弗寧上表師師東鄉征卒徒十萬如風霆潛張箕谷為疑兵身率大衆屯街亭三郡響答如流星惜哉馬謖毁垂成毁垂成載出軍王雙梟郭淮遁拔武都隂平魏大震馘張郃司馬懿帥衆來攻命魏延等逆擊大破之馘其將張郃於陳魏人喪氣不復出為馘張郃第九馘張郃在鹵城蜀人歡欣魏震驚魏兵百萬乘蜀營司馬披甲仍先登我師一出殱長鯨卒徒賈勇懿大奔積甲三千若丘陵司馬匍匐亡旄旌賊徒郃追木門萬弩射郃褫郃魂馘之不異雞與豚桓桓八陳孰敢嬰所當者破擊者平如湯如武天下無敵十一征蜀如虎賊堅壁不戰使以巾幗遺之懿顰蹙受焉魏衆咸曰公畏蜀如虎奈人笑何為蜀如虎第十蜀如虎師甚武熊羆十萬下天府仁義禮樂為盾櫓奸雄閉穴氣銷沮甘受巾幗呼老姥嗟嗟懿如鼠亮如龍蜀如虎五丈原師上五丈原耕者雜於渭濱三代節制之師至是再覩為五丈原第十一五丈原駐三師三代以還僅覩兹濱渭雜耕軍無私芻糧百萬饒餘資中原克復功須斯功須斯定關洛滅魏斬睿梟懿殛權混一四海興禮樂餘威懾大星殞亮卒師魏衆來追我兵反斾擊之懿魄奪反走為餘威懾第十二餘威懾走仲達胡天弗弔喪諸葛大星煌煌殞天末我師反斾喪不發魏人歡呼夜來躡鳴金展幟雷電掣懿也狼奔膽欲裂千秋壯士贊諸葛死諸葛走生仲達少室山房集卷二
