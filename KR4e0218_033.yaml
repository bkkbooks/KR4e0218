body:
  text: 少室山房集卷三十三明胡應麟撰五言律詩七十八首句曲道中奉懷王司馬先生寄訊八首帝夢思良弼天書問老臣彤弓分雨露赤舄上星辰虎豹千營合熊羆百衛陳何妨文武略第一畫麒麟夙世元戎業明時上將材大開貔虎幕長嘯鳯凰臺記室班揚聚胡床陸謝陪昨宵江上笛飛盡帝城梅鳯德元千仞熊飛自一時河山分玉帳日月繞牙旗錯落霜毫動熒煌露布馳共知莘野出寧畏草堂移暫辭三教主聊作萬夫雄橫槊長江上揮毫大海東隂徐非賦侣鮑庾豈文工晉宋齊梁業何人不下風談天曽帝問縮地舊仙才未論青牛出真成彩鳯來毫端窮宇宙匣底閟風雷戲作梁陳句猶堪長玉臺寂寞千秋事踟蹰六代間新亭新日月舊館舊河山柳色停車騎花香雜珮環吳姬年尚少勸客亦酡顔豪華非昔日羅綺尚前朝俠少黃金勒名姝赤玉簫花明新院髻柳學故宫腰今夜揚州月平分十二橋石頭城外路光色度青驄説法尋支遁參禪叩懶融塔花晴日映潭影暮天空擬逐三車去西方問大雄渡江有懷秣陵舊遊八首再寄王長公六代風流地豪吟興未涯層臺花宿鳯故堞柳藏鴉海日籠丹霧江天照綺霞春光何太蚤先到莫愁家投間滄海上閲勝大江濆老樹齊梁雪飛蓬楚蜀雲帝城雙鳯下官路八騶分悵望前朝事含杯幾夕曛金波憐舊句玉樹待新題夜宿尋髙座春遊出大堤殘僧留晉宋古佛辨隋齊明日樓船上誰同教水犀由來佳麗地本是帝王州緑浪邀盧女青山抱蔣侯桃花雙闕路柳色萬家樓總道官如屣那知宦是遊幕府三千客轅門十萬兵登龍環海岱候騎半江城畫甲飄雲氣珠簾上月明夜來清嘯發雙鶴下瑤京玉洞留仙棹金陵問帝都野花朱桁雀霜樹白門烏晏寢團牙戟宵吟擊唾壺能教竒偉客白首卧菰蘆青鞋曽碧落彩仗乍丹霄大雅追三代雄風掃六朝帆檣揚子驛鹵簿秣陵橋但作文章客寧知武略饒柱下書堪著壺中術已傳三花留野寺一葦渡江天浪息滄溟外塵消大漠前何須片石上辛苦勒燕然病卧原口長公以詩見存遂有起色賦謝四章骨立乾坤外呻吟嵗月過片言回大造孤榻起沈疴驟覺頭風愈寧論肺病多觀濤定何日飛棹廣陵波病卧空搔首文成劇賞心乍回燕客夢初理越人吟白雪流空館青陽動絶琴片言千古在底事論飛沈一札長干里悠然病目開詎知垂燼燭猶作復然灰趙璧初還邸燕金任築臺朝來滄海上咫尺見蓬萊無媒寧逐鹿有路任亡羊朗誦陳琳檄髙懸杜甫章神明開混沌鬼魅失膏肓濩落餘生在猶堪王夜郎渡淮拂曙淮堤上垂楊漸可攀霧濃孤客舫雲淺八公山不作投珠去真成抱玉還十年牛馬走端合鬢毛斑自嚴灘至新安途中紀興十首呈司馬汪公四百灘頭路峯巒面面青路疑行絶棧灘似泊空舲平地飛千瀑髙天突萬星不因司馬在吾豈别玄亭一灘髙一丈灘盡到天都疊嶂雲飛動隂崖日有無辛夷殘紫落躑躅亂紅敷獨少行雲廟分明入峽途明發寒逾甚羊裘當錦袍爭風帆力猛破雪櫓聲豪暗谷迷紅樹懸崖露碧桃居然丘壑底不用武陵逃懸水三千仞奔流落大川片帆危欲墮羣纜急爭先石險時棲鶻峯髙欲跕鳶兹遊信竒絶點筆漫成篇樹色逶迤合山光次第來岸疑夸父坼崖似巨靈開蜀客迷三峽閩人話七臺移舟傍鷗鷺此夕漫驚猜嵯峨探虎穴䆗窱入龍宫百丈飛湍下雙篙巨石中地危真破冢天近欲乘風恰稱詩懷壯長歌萬慮空密纜紛如織髙檣望若攢怒濤翻絶壑飛浪疊層巒不雨青天潤無風白日寒蒼松植何代百尺架巑岏片石俱飛動千山競送迎地真遊黯淡天似入蓬瀛纜東髙崖度檣穿絶壁行誰呼謫仙至白日跨長鯨白嶽新遊快青溪舊迹存亂山衝虎過竒石象獅蹲賈舶環楓社漁梁護蓽門飛鴻渺天末消息信乾坤十年懷命駕千里棹孤航大壑行嚴瀨飛流涉吕梁猿猱晨作伴豺虎夜成行咫尺龍門在無勞嘆望洋驚猿峽不見啼猿樹孤峰劃翠屏峭逾捫太華危欲墮中泠鳥道懸空濶龍潭伏杳冥笑他韓吏部勒石向山靈伏虎岩何年飛灔澦百尺挂崔嵬絶壁盤飛電髙梁劃迅雷檣危三老懼纜急萬人摧日暮雄心發狂歌興未回古意鳴鞭白門道新柳正藏鴉七寶裝繁弱千金散狹斜飛揚孟公座調笑季倫家夜夜雙龍氣腰間挂赤霞柬汪仲淹時以足疾居肇林去太函三十里方丈維摩室翛然物外蹤花餘天女散果剩法王供白日流禪榻青天落梵鐘何當問神足白眼對長松贈片雲片雲者司馬公所命王姬名也窈窕尊前態娉婷畫裡顔客疑遊洛水神似降巫山夜月輝眉黛朝霞動髻鬟不應撩宋玉名字落人間仲嘉攜酌過箕臺四首末篇懷汪獻于信步南岡上寒松一徑斜浮杯當柳色促席坐桃花古殿明丹壑方塘漾彩霞紅糚晚成隊拾翠傍晴沙步步春原色尋芳意自間石枰疏竹裡金鐸亂松間一壑停蒼佩千峯峙翠鬟平生雙屐在天濶任躋攀逺天橫霽色箕踞坐莓苔竹露晨猶滴松風午漸來翠微懸絶壑蒼靄覆平臺十日猶能客將無典緑醅潦倒悲華髮追隨暫少年暖風抽麥日微雨拗花天遊女矜環珮居民競管絃維揚好春色何地著絲鞭士能齋頭阻雨仲淹輿疾來會一律遲之風雨催寒食殘花閉小樓丁香空結恨紅豆故生愁夢隔青綾被春遲緑綺裘觀濤今起色遲汝萬峯頭同盛山人壚頭話舊作一騎吳關外悲歌脫畏途殘生餘海嶠萬死得江湖盆底寃誰燭壚頭興未徂十年攜手泪相對濕菰蘆春日司馬公同攜王姬入紫霞洞觀桃花時少連太寧仲嘉仲淹並集司馬以桃花源美人家為韻分得桃字爛漫西郊外肩輿度碧桃春生武陵洞病起曲江濤時仲淹輿疾來會日彩搖紈扇天香襲錦袍絶崖仍獨上誰似謝公豪得花字代王姬作十里春山色芳菲亂水涯瑤池迷故迹玉洞鬭新葩野豁千林霧川明萬樹霞不知劉阮輩何事到仙家題老蚌生珠圖幾夜驪龍頷偷攜徑寸遊蕪城雙月上合浦一星流影似懸鮫室光疑發蜃樓未須慚老蚌照乘詫諸侯汪參軍邀飲作畫拱搖丹日雕闌駐彩雲榻延徐孺子吟接鮑參軍午饌行山蕨春羹薦野芹醉歸渾不解蘿月漸紛紛休寧道中四首百里休寧道肩輿度夕陽川原明翠黛闤闠鬭紅糚玉珮時相亞金叉盡作行何方犢車至夾路爛生光拂曙征人起蒼雲抱郭流落紅依小徑深緑漲平洲竹色偏縈輦松隂直過樓天然對圖畫底事喚營丘白墮家家釀黃梁處處舂飛泉懸薜荔逺岫削芙蓉晚日前村斾春煙隔寺鐘玄天看咫尺紫氣欲成龍望望山疑近行行路轉遙依岡梅子熟夾路豆香飄翠幕縈朱户紅糚簇畫橋百錢猶挂杖爛醉在今宵同汪士能入豐干路逢仲淹寄詩輿中口授用原韻泠然遺俗纍曳杖到仙家布帽扳名嶽荷衣㺯太霞吾寧驅白石君已飯丹砂縱有天台遇能如萼緑華阿四既留溪南士能命更呼劉生佐酒亦以事羈賦此嘲之咫尺玄英宅朱絃試一彈中原留上駟蓬島隔飛鸞劉生名鸞酒壓荼䕷甕春遲苜蓿盤美人期不至惆悵月華殘宜男堂為汪氏題階前植瑤草芳色暮離離艷入三姬座香飛百子池氷桃偕獻實玉樹並生枝旦夕佳男兆華堂事事宜槃樓何年碩人住結搆傍蒹葭睨柱千山月推窗萬壑霞青藜中壘閣緑綺少文家好著元龍卧翛然世慮遐贈髙深甫二首最憶髙常侍生平樂事饒千金求騄駬十院貯紅綃古迹留三代新聲和六朝湖頭明月滿無夜不吹簫自愜逍遙理誰同汗漫遊異書中祕得名墨太清留夜月漁陽鼓春山燕子樓六橋楊柳色無處避驊騮夜集劉將軍即席作示孫徐兩生聊同珠履客共此嵗華徂潦倒青絲盒淹留白玉壺寒風回擊築驟雨促呼盧不道嫖姚貴猶能事博徒讀季孝亷匡廬詩卷題彭蠡揚帆近匡廬縱目長髙峯懸紫翠亂瀑灑青蒼竹隱文殊座蓮空慧逺堂攢眉何處客不逺是柴桑挽趙别駕汝申四首神武門前路何人復挂冠華陽間鶴馭瀫水罷漁竿冷日黃金竈寥天白玉棺君看雞犬去已到赤城端頻年嗟伏櫪此日嘆藏舟世閥傳中壘鄉閭問太丘朱絃俄入夜素翣正逢秋好在蓬池頂題詩遍十洲玉局留丹界琳宫寄碧霞漸荒陶令菊難覔邵侯瓜霧裡三天舄雲中八月槎椒漿聊一奠隴樹亂棲鴉蘧然孤蝶寢忽到夜臺傍别墅藂青桂空齋翳白楊星沈南極杳天入大羅長一尉何須恨修文正拜郎蕭含譽自楚中來訪留集二首下榻仍松檜移尊更薜蘿星當雄劒聚雲傍彩毫多客計留天目鄉書問汨羅五遊他日遂相逐老岩阿狂歌青桂下醉舞緑筠前越絶書猶著湘纍賦已傳風葭雲夢笛雪葦洞庭船歸路甔甀近能無問太玄訪張伯起暖閣小集夜同過幼于園伐木懷同調連枝愜共吟圍爐冬閣暖秉燭夜堂深月倚孤城棹風交萬户砧龍唇絃絶久拂拭為知音幼于園中聽歌一徑蓬蒿入層臺面緑波客攜桑落酒人倚柘枝歌夕露更衣墮晨星襆被過五湖花照眼蚤晚著漁蓑贈錢將軍屬國儒風逺輕車將略長侍童青玉案前隊緑沈槍北府晨開席南樓夜據床邵陵遊獵處白馬映絲韁題吳肇成清波碧玉圖亭亭開素面裊裊出朱唇水畔疑西子波心似洛神浣紗猶倚石移襪乍生塵那得相攜去馨香贈逺人聞王問伯領解南都喜而有作此夕庭階樹真成奕葉光賦曽標五子名欲擅三王客禮龍門下神交雁塔傍百年兄弟好同日奏長楊舟次檇李寄王承父山人邂逅蘭溪約秋風望未涯地違青雀舫天靳白鷗沙虎阜看茶近烏程問酒遐春來定尋汝酩酊萬桃花承父約余過溪上余道出檇李遂不及往寄此以訂後期泊姑蘇寄吳文仲寂寞寒山寺鐘聲只自聽髙雲隨去舄夜雪到空舲竹色誰分座花香獨扣扄太湖峯七十歷歷傍愁青訪曹子念戲贈幽居仍薜荔雅興舊菰蘆一榻懸東海孤航領太湖鬚髯疑大俠骨相異潛夫何事吳閶底頻年侣博徒長干道中書事時太學同人邀飲金波鳷鵲下玉管鳯凰調晉帳延雙隗吳糚出二喬柘枝頻度曲桃葉舊傳謠欲認相尋處城南十五橋紫霧藏金屋丹霞間玉樓那能佳麗地不作狹斜遊江女名無畏盧家字莫愁徐娘雖老去象管不停謳過淮上讀貞烈沈氏實編作沈為侍御吳公妾余丙子吳公所取士也匪石心難轉如山諾竟酬餘生寧九地一死為千秋壯節長淮逺貞魂大海留預看彤史筆燦爛照松楸憶昔吳公賞真同賈傅看凄涼神武闕早挂惠文冠舊事悲桃李髙風想蕙蘭酬知萬行泪愧汝大江干渡黃河九曲黃河水奔流下夕陽蘆根漁網集樹杪客帆張巨石撑淮浦髙洪壓吕梁黃姑頻嵗約擊楫上扶桑宿良鄉小市良鄉驛征人暫解鞍空林萬木落孤館一燈殘旅色逢秋暮鄉心入夜闌那知百里外明日是長安少室山房集卷三十三
