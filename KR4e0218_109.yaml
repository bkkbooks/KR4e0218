body:
  text: 少室山房集卷一百九明胡應麟撰題跋三十九首跋唐人長林疊嶂圖右長林疊嶂圖濃郁逺深大類王右丞而精工密緻又似小李昭道筆或以渲染鮮明略無追蝕唐畫不宜爾爾疑為趙千里者近之而山石全用勾法不甚合宋人鑒賞紛拏至今未決也其絹素縝厚之極非南渡勝朝所辦且單條衡僅盈尺許而縱乃四之於小閣疏窗位置殊愜每焚香棐几縱目其間不覺身入萬山與鹿麋逰衍豐草矣跋黃筌栁塘禽鳥圖右卷鑒者率以為黃筌而末無欵識絹素堅厚無損而渲染粉墨往往有剝蝕處長可二丈所摹鳬雁鸚鵡山雀以及林塘蓮芡之屬種種入妙吳中諸名流文休承張伯起周公瑕輩十餘人咸有跋以非筌不能也第今人遇唐宋畫無欵者山水則曰王維人物則云吳生金碧則云小李花鳥則云黃筌殆成套語恐其時尚自有人即如此畫真出五代筌之諸子固亦能辦此矣况趙昌王友之屬之花鳥知名不一而足欲斷以此畫為筌余未能決也跋李龍眠佛祖圖右李伯時二十七祖圖念載前當為完卷頃落一賈師管生手因割為三取諸跋真贋雜置之一以鬻萬中尉嘗出示余凡十四幀一鬻吳用卿即此卷以六十緡售余者凡九幀一鬻李大將軍其卷當為十三幀方謀一借觀適李奉命備邊以七千人深入敵境盡沒卷遂不知何所噫古人遺墨一覩亦有緣耶畫法絹素灼然南宋前無疑或尚以非李所辦而疑為唐宋五季者總之神品無上不必求實其人也余見伯時蓮社圖巨幅其筆墨氣韻妙絶不可言下為文太史書李元中記文精工之極且略無絲毫損蝕殊可寶玩亦為吳用卿得以八十千歸劉金吾矣跋伯時西園雅集圖右西園雅集圖扇景也徑可盈尺許而人物泉石花木器具種種備生動相或以非伯時不能余所見此卷甚衆一豫章薦紳所藏人物稍大與佛祖圖等筆法亦蒼古而缺一姬人且注意獨人物而水石花竹等不具余鄉徐先輩復得一卷絹素破裂甚人物視前差肩卷甚髙大具池島峰巒而筆類元人疑勝國所臨者也此圖卷末虞伯生書特佳絶余數見虞公他書字形頗長而文弱遒緩此則方古端徑而字形殊匾視子昂頗蒼較敬仲尤雅蓋其最合作書也或以此跋故謂圖亦元名手臨余未能決俟精鑒定之跋趙千里後赤壁圖三則右全寫蘇長公後赤壁圖卷末意態皆完而題欵為裝師割去蓋此卷絹素自首至尾分寸斷裂裝者罄工纍月僅克成卷山水樹石多剝蝕而人物面貌無損秋毫亦絶竒事也畫法之工張元春詹東圖楊不棄咸以神品無上余鄉吳少君瞥覩以頭搶地呼老師拜百數不已即無欵望而知為千里生也人物長劣盈指氣韻矯矯欲生而長公夫人持斗酒出送郊外縞衣綽約有傾國之態未審爾時措大家室果此殊尤否耶又或疑此圖當有前赤壁者余謂未必然前赤壁自白露橫江數語外皆議論無可摹寫後赤壁文簡于前而實景實情不啻十倍畫師欲紆徐盈軸自不能舍後而前也此圖尋丈之間有江山萬里之勢其人物之精工水石之竒古類非勝國後所辦即出趙千里亦其生平合作之最也前輩風流韻度壒逐塵土賴此少存其概每良天佳月一展玩之以當神逰自以為不減長公兹夕也又此卷于赤壁後賦語無一不具愈玩愈見其工長公嘗謂涼天佳月即中秋兹逰豈其口實耶二客不審何人蓋無是子虛之類當時蘇公謫黃門下士無一在坐非黃秦朝張等也長公夫人亦殊有林下風嘗謂春月使人歡欲令長公呼趙德麟輩飲花下者其能畜斗酒以待不時固宜至圖長公登髙岡履危石扁舟皓月放乎中流一派天機蕩漾楮墨非神匠不能惜余不及同事兹逰少沾溉餘􅅹也跋閻次平江潮圖江潮圖一卷宋蜀錦裝首寫吾鄉錢塘江潮絹素筆墨絲毫完善獨卷末無欵識其品格非前宋斷不能也董太史定為閻次平余未及詳勘宣和諸譜當亦近之或以此卷之工品第神妙恐次平未易至也卷首圖江干秋色蕭寺浮圖闤闠鱗集觀潮民庶紛沓往來而雪山一派如白龍千仞卷海而東噴薄震蕩宇宙晦冥漁橈客棹飄飄數敗葉揚舞虛空出沒濤浪一展玩次心悸魂消恍忽几格間十萬軍聲矣又跋卷首觀潮圖三篆字李文正題末書長歌似未至吾越者余謂枚叔以揚子為錢塘亦未至吾越之故或太子吳人厯轆欺以其方耳而至今談者紛紛謂曲江即具區而廣陵揚州揚則越分野屬焉胡紆繞不情至于兹極為枚生計者患文筆未工耳豈以地分逺近為瑕疵耶此詩詞三昧故屢為揭之是卷也而遇枚生操筆再賦一通當令吳太子氣雄萬夫豈直霍然起色已哉題秋江百雁圖右秋江百雁卷無題欵卷末詩一卷皆浮屠題畫語當是南渡勝國間某生手筆俞䇿公臨以為北宋夢英恐未然也元名士張憲馮海粟亦有詩所圖羣雁飛鳴宿食之態備極天工而枯枿橫江葭蘆夾岸長洲逺渚殘霞落日恍忽瀟湘彭蠡置吾齊頭或以趙大年有此圖當是同時或勝國浮屠摹本余未及見大年卷俟他日定之題宋人雪山逰騎圖右雪山逰騎圖絹素縝細之極而行筆秀潤精工絶出蹊徑之外鑒者咸以為李唐或當爾也寒林逺岫磴道蕭索二士䇿蹇驢入山崦一操几杖者隨之豈鄭五相公所艷稱灞橋風雪衛子上者耶黃子久縹眇仙居跋黃子久縹眇仙居圖層峰疊嶂矗起千仞橋道樹石朝嵐夕霞雜沓相間絹素不越尺餘而天機一派流衍毫墨真所謂桃花流水天地杳然者若其行筆之秀潤蒼逺逼董李而超錢盛諸人固老癡能事也題黃子久西泠烟靄圖平林逺洲水天一色危峰突起白雲晴嵐橫亘其中一翁䇿蹇驢出垂楊映修竹蒼頭抱焦尾䠥􅍷而前楊鐵史題筆所謂今日抱琴何處去美人秖在段橋東當是西泠三剎風致不知何以能盡闢逰人専此岑寂也此幀黃子久筆尤為媚潤清新至其氣運之生動真足為湖山傳神者非久居武林天竺間未易領略也黃公望秋江漁笛圖秋江漁笛圖題大癡老人筆意蒼然望之可識第絹素破裂之甚丙戌春入都裝潢僅能成軸雖漶滅不完其氣韻尤足傾倒餘子篷底二簑翁撫掌樂甚興到便欲浮舴艋瀟湘夢澤間惜無從喚老癡寫之題趙承㫖春江晚棹圖蕭子雲待渡圖趙吳興筆也纎濃秀潤凝睇一盼百態橫生如苧蘿夷光無問識與不識掩袂心折要之楮墨間片語未足罄其形容也吳興筆向與子久叔明狎相雄長爾時吳人酷重黃王氣韻念年來吳興倐忽增價大癡黃鶴又小挫矣此亦一時好尚未足盡憑乃其偏正絶詣咸自有不可掩者也題王叔明松溪書屋圖右王叔明松溪書屋圖用筆布景迥出畦徑之外危峰特起矗峙九霄飛流濺瀑滙為深潭二士解衣促膝濯足其間一精舍隱見懸蘿喬木中幽人持卷默照靜觀若揚子之草太𤣥長安中數賞鑒家咸稱卓絶攜至江南議論頓爾不侔蓋此畫筆意過竒故好者以黃鶴生平妙境而不合者以為外道野狐余特舉似張元春張曰筆誠竒第以必出阿䝉手則未易定也題沈啓南重溪秋色圖沈啓南重溪秋色圖吳文定題識其上真蹟也而啓南自題小詩筆意緩弱不甚類或以啓南中年筆率此類而張復元春驟見輒咋指驚愕謂為啓南得意之尤者此君最慎許可不妄也圖惟枯枿二陂陀數行而涼風颯然素練飄舉非啓南故未易辦輒跋而藏之沈啓南山水大軸跋右啓南山水巨軸桑皮可四丈許跋以最晚年筆也樹石橋道澗瀑陂陀無一不備而蒼徑𤣥淡老筆淋漓後人罄嵗月為之未易及也文待詔春山喬木圖文待詔春山喬木圖為李貞伯後人題者古松老檜黛色參天精舍數椽隱見木末幽人抱膝袒裸濯足于懸流飛瀑間上有待詔二詩以貞伯藏書甚富不知邇來異書迭出幾倍成𢎞二酉山房六萬卷琅琊長公為記以宛委石簣禹穴洞庭見擬惜不令待詔一摹寫似後人也文太史虎丘虎溪二圖跋虎丘圖秀潤蒼古太史真蹟無疑而詩筆遒媚過甚或以詩非系圖後者賈師强之耳又蓮社圖記文精工之極當是太史生平小楷第一而圖極潦倒不足存蓋亦原圖失去贋者强模舊草以愚𨽻家不意二卷皆入余手真北山愚公也聊跋此每閲卷自發一大噱文徴仲雪山圖二則文太史雪山蕭寺圖危峰沓嶂特起萬尋同雲冒空四壁之間不寒而栗噫豈大峨峰顛下臨夔峽悲臺巄嵷哀壑嵯峨意耶何時浮一棹訪周益州登頓沿洄窮其獨往歸懸此幅枕席之左以當卧逰也又此幅待詔筆無疑而止徴明小印或以為摹本未必爾也上文夀承真蹟鑒定以為太史晚年得意筆朱子朗次題舟移野渡寒風逺門掩空山夜雪深景界吻合周公瑕評意大同而文氏一子姓絶嘆非太史傑思不能到聊并識之題陳道復竹林精舍圖陳道復竹林精舍圖上書五言絶一用筆草草不經意而天真爛漫若楊凝式神仙起居法世以為散僧入聖不誣也跋仇英漢宫春曉卷右仇實父漢宫春曉圖文夀承𨽻其末以臨宋李伯時筆其于宫中景物纎悉具備第所圖嬪御皆豐妍而寡綽約蓋自唐周昉諸人傳流體法大槩爾爾余嘗于童子鳴處見戲嬰圖王敬美處見撥阮圖文夀承處見搗練圖皆題昉作其美人態度咸爾蓋婦人以綽約聞者古今一趙飛燕耳然成帝幸之不久遂為女弟所奪唐自太真擅寵一代風靡習尚所趨豈盡畫工傅合哉題唐子畏夏山琴趣圖唐伯虎夏山琴趣圖甚秀潤妍美而或以為摹本余未能辨也第伯虎跌宕不羈而于繪事往往精工縝密法度森然是亦唐人四倒之一也余嘗于弇山堂見伯虎像青袍布笠風骨癯然自是四海九州一窮措大面目與繪事尤不類云題文伯仁雪山行旅圖文伯仁雪山行旅圖同雲四郊天地一色孤亭木末幽人擁褐靜觀千岩萬壑樵采斷絶而蹇驢數騎驎鱗涉峻坂而越危峰噫是非鄭綮相公自灞橋尋詩得句迤邐未歸耶此圖意氣飛動而墨瀋淋漓幾欲與待詔爭長鼠穴中故非餘子所辦也跋周昉育嬰圖右圖周昉作昉嘗與韓幹俱貌趙郎而昉得性情韓得狀貌世以定二畫師優劣余謂得性情者尚未離狀貌也必如顧虎頭圖裴叔則頰上加三毛乃為得其神韻而性情狀貌不足言矣昉幹之優劣世所共知而虎頭之所為異于昉則畫家所未究余覩夫近世談詩之士咸致力狀貌間以為親切至情性之說往往置之而何有于神韻輒因昉畫漫及之又跋圖名育嬰寫唐人宫中景物酷類絹素破裂而設色如新尾有晏元獻跋幾七百言文既雅馴書亦嚴飭乃晏公在宋自詩名外他不復傳微此世幾無知者信古人才未易測也此圖昉筆真贋難遽定斷然非五代後物矣跋米元章拜石圖右米元章拜石圖孤峰巉巖雖庭中尋丈而有摩霄挾日之勢老顛以宫袍象笏蒲伏蹣跚其下想見其眉睫稜稜視海內空無一物獨片石可當吾拜一展玩間桀驁不恭之狀溢毫素可窺也徐孝穆自中原還謂惟寒山一片石堪語老顛之拜指不同而意同乃同時蘇子瞻亦有此好至以仇池石假王晉卿往復紛爭幾成聚訟使老顛見之不知更作何景狀耶又跋米老愛石之癖至此豈其胸中磊塊固吻契耶米以研山易與薛紹彭後紹彭祕不復出米嘆息圖之屏間大以彭為忍人此其故後世無知者余獨悉之蓋米多伎倆薛恐墮其術中不得不爾宋人小說記米瞥見故家竒物洎書畫之屬必百計取之不入手者不已如御屏前端研舞蹈奉之以歸亦拜石之一驗薛之終祕不出固宜哉偶憶得兹事漫題卷後老顛有靈將為余發一大噱也跋陳道復水墨牡丹真蹟右水墨牡丹白陽山人陳道復真蹟也戊辰之嵗黎惟敬偶得于長安西市愛之甚恆置齊頭辛未春余將侍家大人入楚惟敬戀戀不忍舍既賦贈長歌復輟此卷首以大篆題洛陽春色四字納余行槖中余曰此公所耽玩奈何奪之惟敬曰惟吾所耽玩故以貽子子日一展即與吾面晤奚殊矣余重違其意受以歸珍襲山房視他卷有加卷後皇甫子循題字謂此筆似不從人間來周公瑕跋以陳畫筆自林藻深慰帖悟入蓋書畫理本互通也余以斯卷雖草草㸃綴若不經意者而天真爛漫妙奪化工老格縱橫絶出毫素閲之恍忽洛陽姚魏移植吾廬昔趙明誠得徐熙牡丹圖賈人索值二十萬不能致卷還之夫婦惋恨彌日余山房積書四萬卷不減明誠獨趙氏所藏金石法書名畫余無一焉僅此卷又故人贐行不假寸錢而得視明誠所遇何啻天壤然明誠有才婦朝夕晤語揚摧校讐即頃刻之間足以樂死而余際敬通之厄戚戚無歡是明誠所遇視余又不啻天壤矣又跋五代時寫生徐熙獨步以其全用水墨不假丹青驟閲間粗枝老枿極似潦倒熟玩之神韻飛動天真爛然猶李成關同山水迫視幾不類逺觀則雲烟蒼翠恍坐千岩萬壑中皆前古所未有也同時黃筌父子稱亞熙然工在形似下熙格固已數等而熙當年為筌所扼至困瘁以死未久而聲價燁如即南渡一卷之需贏二十萬噫是時筌復能扼之否耶熙畫今彌不易得窮措大得此卷不啻得熙矣跋所藏黎惟敬隸書慶厯間吾友黎惟敬八分獨步當代歿後其書尤重海內爭購之布衣李自竒者素儇獪偶從惟敬乞得大書十數行祕巾笥中逮惟敬歿摹勒作百餘幅散鬻閩楚間時海內驟貴其書黎又驟沒皆不暇辨其真僞相率重價酬之此人遂致金數百後蹤迹敗凡交遊咸為愧恥李更揚揚然得意也余因嘆惟敬生存日每與人作書不能博半鐶身後事乃頓爾迥異如此物固有遇不遇而盜鬻其書者又不中與啖羊羔人作僕矣題何長卿文夀承墨竹圖國朝文太史父子風流照映㝢內而夀承篆刻特為一代宗師長卿自弱冠執業夀承之門蟲書鳥迹不脛而走六合之外者越三十祀即兒童走卒靡不知有何氏印章者以較夀承不啻髙師一著矣乃文氏丹青世獨以休承繼徴仲而此圖老筆縱橫直闖湖州之室信前輩未易材也長卿寶藏真迹摹拓有年文氏篔簹一派行且復落新都手不獨以印章雄一代矣跋周公瑕畫蘭卷公瑕雖出文待詔門而生平未嘗作繪事晚嵗忽吳中盛以蘭畹歸之歙人重購書筆幾為減價此卷清絶楚楚真足爭勝吳興第作此時年已望八越數載逰岱矣其披拂散落人間不過百餘本恐異時無復知者聊識卷中因憶曩嵗宿公瑕天池方為一粵客圖扇余迫欲得書小楷遂無暇近兹今其書畫尚可得乃其人不可得矣弛筆三嘆題于鳳鳴畫册唐人于良史詩風兼殘雪起河帶斷冰流古今絶唱也今人酷尚標格步趨盛唐此等句絶不復覩然此句雖極精工而風神遒朗氣骨雄厚不失開元晚唐間有此精工而神氣委弱往往墮纎靡窟中初唐風骨崚嶒而餖飣華靡模寫生肖殊寡即盛唐一二見耳因憶于生家故事適此句此景竅合天然不覺為三擊節輒援筆紀卷終生其深味余言努力先業異時扁舟載過知毋作吳下䝉也清源舟中雪後題于生扇頭舟次清源于鳳鳴文學過從旬月遊處甚歡蚤春北首鳳鳴載酒舟中為賦此章時初旭乍升流澌交下斷冰殘雪照映兩崖鳳鳴著單夾素綃趺坐榜枻儼若相對畫圖中何日同醉都門躍馬燕臺堤柳作三竺六橋想也再題文夀承墨竹圖右文夀承墨竹老幹紛披足為篔簹冡嫡乃世之耳食者往往以書法掩之長卿師夀承篆刻印章流播幾遍海內而潛心繪事備得文氏風神亦世所未悉也因載是卷末俟異代子雲賞焉跋王中叔希白軒賦南州之勝無若潯陽吳㑹之勝無若京口潯陽則匡廬五老干霄矗雲京口則北固三山吞天吐日皆宇宙竒偉觀也自昔建髙牙擁大纛逰宦其地者不知凡幾而其勝往往為羈人遷客擅之樂天氏之在江州一郡司馬耳而匡廬五老迄今藉其篇咏以雄視東南昔人亟稱地以人勝殆非虛語若北固三山寥寥千載地主未逢蓋至明王中叔而後顯君于白公瑰才同直節同遷謫同地勝同其築室衙齊而以希白自命豈所謂有其實而名弗得辭者耶余嘗讀白公琵琶諸行誠極才人之致而憂憤鬱憏哀傷不無泰過故白公雖不久召還而媒糵偕生卒未獲究其底藴乃中叔所為希白軒賦齊得喪置順逆冰融霧釋于物我之交其詞無論其識且超白公而上之異日者一息而摶扶搖大究厥施于海內俾北固三山與匡廬五老東南並峙吾固于兹賦窺一班已少室山房集卷一百九
