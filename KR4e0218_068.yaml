body:
  text: 少室山房集卷六十八明胡應麟撰五言絶句八十五首自桐盧至新安雜咏十六首原闕石壁天風吹客衣削壁逺如墮何人掃石來獨抱蒼雲臥辛夷館愛此幽人居春風滿庭戶指㸃辛夷花忘却來時路瀑布亭亭瀑布泉風吹一千尺朝來海上帆挂斷長虹色方干宅萬山圍欲合一水去仍遙不識方干宅桃花滿路飄謝翺墳西巖謝翺冢一徑惟莓苔相對鹿麋坐秋風時自來新安江蒼郊四無人輕橈蕩空碧春江不斷流滿柁蘼蕪色仙桃巖絶壁聳精藍孤懸五千丈何代武陵人移家此峰上胥口落月溪水寒漾舟時未己西泠何處村望望茶烟起北髙峰言尋王子喬吹笙跨鸞鶴髙峰不見人日暮藤花落南髙峰維舟北嶺下搖蕩青芙蓉欲向南峰去夕陽千萬重烏石磯瞥見雙白鷗飛來似相識翩翩欲近人復濺苔花濕桃花硤移舟信江風沿洄不知暮前村路轉遙繫纜桃花渡題翠虛亭草絶有序亭在劉氏園四圍皆竹萬緑森然余嘗避暑其中因酬以草絶逸三首雨色凝書案秋隂拂畫牆萬竿雲霧裏知宿幾鸞凰上枝凝翠柏下葉染蒼苔莫使王家見清吟不肯回昨夜凉風起笙簧滿坐幽何當裁萬玉吹盡楚天秋霜朝庭聳玉雨夕院敲金一自淇園後詩人幾廢吟棲禽藏密篠鬬雀墮髙枝老幹空千尺何人寫楚辭鏤就雲門玉吹成嶰谷音晝日過滄海蛟龍不敢吟鳥雀下前除幽篁百尺餘昨宵風雨過寒灑杜陵書野色琴書裏江聲枕簟傍恰稱幽人卧湘雲晝滿床參差臨渌水嫋娜拂秋霜忽記文同畫生綃六尺强涓涓薄暮霜嫋嫋經秋雨深院寂無人叢篁自相語晉代諸名流清談自相詫何如阮嗣宗長嘯深林下倚闌無俗事解帶自清吟一雨朝來霽千竿翠欲沉萎㽔紫翠間珍禽自逰戲何當覓羽人共跨青鸞去閒來晚翠亭四壁皆清玩傳聲王丈人更致蘄州簟縹眇碧琅玕森沉下彩鸞佳人翠袖薄日暮不勝寒截作簫君管攜來弄玉家一吟雙鳯舉白日赴青霞迢遙風雨夜臥此一窗幽恰似揚舲日瀟湘兩岸秋宫怨二首羅幌寂無人玉階秋草緑永夜不成眠飛螢照華屋學得琵琶曲深宫不忍彈水晶簾幕下寂寂倚闌干夏日齊居雜咏八首陽春館一雨過修篁微風動清夏萬籟晝蕭然援琴北窗下緑筠軒獨坐清風裏流雲濕畫欄空齊無長物十萬紫琅玕潄芳池明月照芳池倒景浴層嶂文魚不畏人競出滄波上馭風亭五嶽非我鄉九州非我宅泠然起太空忽見蓬萊日西園閒持一杯酒獨向西園醉想像鄴中人青雲動飛蓋東園西園復東園焚香送餘日微風掃落花忽墮幽人席嘯臺鏗若鸞鳯音隨風落天半空令阮籍聞未許嵇康見臥遊室泠冷七絃琴飛聲白雲上三十六洞天不假盧敖杖小齊宴起偶題午日照柴扄先生宿酒醒科頭了無事散步讀黃庭題神逰八極卷為金華髙生青天騎大鵬汗漫遊八極笑殺牧羊兒空山弄拳石題畫僧寺四景青鞋趂桃花杳杳前山暮霞標起赤城漸入天台路赤雲遍長空何處清涼國遙望五臺山中天挂金碧一鉢復一鉼相隨不知老蒼蒼太白峰落葉秋多少剪月作蒲團紉雲為破衲嵗晚入峩睂千山萬山雪緑筠軒夜深作岸幘坐微涼荷池雨新足永夜寂無人流螢度深竹長日抱疴掩關謝一切客朝夕相酬往者惟齊中十六君焉興文托好各贈以詩嵗寒之誼要諸白首矣石屏竒峰置案頭恍憶包山麓萬朵洞天雲鞭龍入林屋琴一鶴復一琴翛然成太古朝來嶽麓僧寄我瀟湘譜劎鹿盧祕空匣十載無精光昨夜飛空去龍吟大海傍書笥三萬六千卷一卷供一朝百年雙白眼不向世人驕玉磬誰將一片雲置此禪床側相對寂無聲南山下秋色五嶽圗援琴對五嶽流響入青雲猶勝四壁立獨擁卓文君碁一枰秋色裏時翻古人局飛霜擊畫廊鄧艾收西蜀膽瓶折取三花歸琉璃貯春碧三十六峰雲晝繞維摩室笛手挽鐵龍君登樓喚黃鶴萬頃碧天空梅花何處落茶竈水記桐廬第十九夜涼起南軒然藜煮雀舌山童荷擔歸滿瓮嚴陵月杖青藜攜作杖霞色照人明偶過劉中壘翻疑太乙精琴石何年空林中置此太古石嵗逺莓苔深片雲無處覓博山罏月影下蒼苔閉門無剝啄白雲一縷髙幽人臥初覺麈尾玉柄蟠蛟螭隱見前朝字逍遙七百言花照瓦棺寺羽扇羽扇白綸巾寥寥坐清宴千秋廣武軍誰知阮公嘆芒屫足下兩青鞋他時作何狀白日五龍飛崑崙三萬丈臥室四詠芙蓉帳夢寐青蓮詩千篇謝雕飾却笑江文通花生景純筆湘竹簟攜來六尺雲恰稱衡門夜一枕洞庭秋萬山明月下胡床散髮踞胡床徐看白雲過時有鹿麋來胡床相對坐石枕至人本無夢何者蕉中鹿松風滿石䦨任意黃梁熟逰囊雜咏五首蠟屐長物不隨身周遊信雙屐中天泰華雲絶頂蓬萊日席帽秋風飯顆巔吟成一登眺日暮謫仙來相逢應大笑如意摩挲三尺鋒虬龍掛寒鐵萬古英雄心歌成唾壺缺布裘清晨偶出山一衲挂枯樹向晚白雲深䝉茸不知處藥壺五城十二樓髙懸煉金液朝來費長房誤入神仙宅秋日獨逰蘭隂山五絶句蘭隂山午風吹芒鞋獨往忘日夕指㸃山阿人衡門在蘿薜西樵嶺落景留空山無人自來往一片白雲中時聞樵語響聖羅菴一鉢坐禪床清齊自朝暮經年不出門忘却前峰路顯教寺探竒興不盡秋思滿林薄祇園掩夕陽小坐曇花落龍湫波光滿沙際夜景湛林樾山僧抱甕來搖動潭中月杪秋再逰蘭隂過精舍見前壁間題悵然復書一絶謝客訪石門杜公懷峴首萬古一傷心無言對樵叟漫興四絶斟酌千秋事何人一瓣香婁江宵夢斷月色滿空梁一代汪司馬憐才海內聞乍日傳書至殷勤問白雲十載吳明卿相聞不相識遙夜武昌樓梅花飛鐵笛可怪滇南老雌黃信筆成那知陳晦伯剖擊更無情少室山房集卷六十八
