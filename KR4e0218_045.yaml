body:
  text: 少室山房集卷四十五明胡應麟撰五言排律三十三首參知張公睿父博極羣書侈于三篋而不佞猥以臭味國士龍門執手晤言兼旬欵洽輒因揚扢寫寄詩歌凡六十四韻六洞神仙吏三天侍從臣宣猷元借召布德重生申卓犖傾流輩飛揚邁等倫宏才川浩蕩偉度嶽嶙峋令譽收南服英聲動北辰丰標凝衛玠局量峙王珣調自中原合文從上國掄衣冠逰太液舄履步長春黼座瞻皇極綸扉謁帝宸金門勞執戟玉殿伺垂紳徑節先排漢昌言或借秦輪埋躬愈直檻折道彌伸李嶠針規切陽城獻納頻幼安懷並席長孺慕聫茵貝錦初騰越牛刀試割閩蒼茫辭薊闕濩落度延津九鯉披雲夕雙龍躡霧晨干旌停枳棘鹵簿却荆榛吐握加寒賤吹噓及隱淪襟期青眼洽意氣白頭真絶代誇殊色登壇屬俊人含毫千藻發灑墨萬花新宛委羣編列琅琊巨軸陳玄談回夏棘廣譬狹莊椿竹素隋宫繕菁華鄴架論牙籖攜丙乙甲帳坐庚申掩映階前雪紛紜閾外塵昆池方朔祕曲水摯虞擯二負歸漁獵撑犁入嘯嚬懸標搜異粟輟箸驗勞薪肄兔優成式徴貍劣鼎臣爰居恆獨悟弗述詎同詢地戒遙通貉天文上接鶉七車寧後裔三篋定前身藝圃宗師匠文園臥逸民頽垣庸築傅廢隴漫耕莘谷口霜沾笠灘頭月挂綸違時腸拂鬱避世足邅屯骯髒虞卿匹顛狂賀監鄰傭書疑闞澤講易類嚴遵孝緒行藏僻君山積貯貧編摩淫束晢訓誨溺劉臻擁被嗟捫虱摳衣笑獲麟酸吟鼯鼠狎苦蝕蠧魚嗔徑菊荒仍咽臯蘭裂故紉桂叢居索莫蘿蔓屋艱辛璧乍完衰趙珠徒綴大秦踟蹰愁炫璞宛轉惜藏珍下里容賡曲東施屬效顰分庭延墨翟倒屣接莊辛混俗東方朔逰仙郭景純神明交孔鮒宦業締崔駰厚誼偏敦薄沖懷劇飲醇敲碁俄潰敵投轄剩留賓河朔差酬嵗平原漸隔旬蒼虬聊海甸彩鷁復溪濱汗漫煙霄翼峥嶸渤澥鱗宫行開碣石邸會葺平津敢竊丘樊賁貪隨巷陌淳孤城留保障率土藉陶甄叱處羊難臥耕餘鹿易馴八詩猶並耀一志未全湮曳杖將投華擔簦欲憩岷惟應挈四部絶頂對朝真題關忠義侯像二十韻代間氣鍾材傑蒲東迹未塵千秋聞將帥一旅見君臣喪亂情偏洽間關力愈陳飛揚辭操日突兀剌良晨大義伸三國雄風敵萬人單刀回魯肅巨舫困曹仁顧盼吳儂匿追奔魏卒淪七軍全解甲九域漸同輪雀鼠張牙角蛟龍挫羽鱗章丘虞暴猾臨沮厄囂嚚縛禁差踰月誅蒙僅隔旬精靈蟠上國肹蠁徹髙旻白髮心摧寇蒼髯貌絶倫名猶懸宇宙魄已化星辰婦孺瞻依切生儒嘆息頻珠旗來恍惚鐵胄下逡巡紫霧排􅋖闕丹霄扈帝宸玉泉遺像在今古頌明神送吳允兆歸霅川十韻十年京邸客龍劒並懸腰鮓饜諸侯饋羮分上相調紅顔輕漢綬白首曳秦貂劇孟聲華壯朱家意氣饒片言籠宇宙孤諾動雲霄擊築聞三殿回船就六橋離亭殘月墜祖席斷虹飄揚子行春樹錢塘落暮潮川長歸夢怯道逈客魂消珍重浮家約無嫌霅上遙同允兆諸子夜集趙相國齋中得山字間氣鍾名嶽頽齡覩盛顔青霞流碣石紫霧照函關贈棗安期狎偷桃曼倩間調羮當北極置酒傍南山後院羅絲竹中亭集珮環百僚趨館閣九列候朝班省問皇情渥謳歌相業嫺飛鸞馴竹下舞鶴嘯花間賜履來中禁懸壺得大還煌煌海籌屋遐算邈難攀少傅趙公遍出宋元及近時名畫俱少傅手題縱觀移日如行道山陰應接不暇紀以排律百六十言宿霧雕欄霽輕煙畫榻流圖書分太液翰墨寫瀛洲玉軸標雲漢金函控斗牛階篁俄蔽夏簷樹逈生秋疊障斜窺院飛泉曲抱樓虹霓懸佛剎日月拱皇州野老騎蒼鹿天人駕赤虬遙空盤野鶴別嶼點沙鷗翠幄藏青杏朱房綴紫榴洞庭霜後熟陽羡雨前抽五嶽紓行步千峰夾卧遊撩吟松徑僻逐望草亭幽意態張吳幻風神顧衛遒名髙黃祕監藝絶李營丘妙迹三車聚清芬四座留諦觀殊未厭花色墮簾鈎俞羡長留集齋中畢出新稿索觀卒業賦贈憶罷葵丘會誰操碣石盟中原無獨步上國有同聲草莽元仙籍山林即帝城玄亭窺老宿白社領時英賦擷潘張譽詩參鮑謝評凌風吳咏擅和雪楚才驚飲石千鈞鋭披沙百鍊明虹霓流巨軸雲霧擁高旌嵗儉擔簦出時違躡屫行迷花居北院乞米傍西京郭泰聫舟思陳登臥榻情天遙頻伐木地僻祗班荆緑蟻窮途泛蒼龍大澤鳴踟蹰悲老驥寂寞語流鶯舊業慚玄晏新知狎正平皇皇魯中蓋一為美人傾代贈滎陽新郎君閥閲滎陽郡簪紳碣石筵春波明太液彩日駐甘泉白屋書連棟彤庭筆似椽千言橫赤幟萬選奪青錢舊策龍門避新詩雁塔傳螭頭攜雨露豹尾握星躔玉珮縈仙仗金叉簇畫船花香韋曲度樹色灞陵懸意氣慚吳質襟期洽鄭玄通家兄弟誼好憶下帷年夢登彭城諸山騁望大河因懷景陵徐惟得使君新渠迄工徐君勞績最懋涉險愁逋客憑髙快旅人谷深疑子午河決念庚辰城郭圍千雉樓臺簇萬鱗飛龍餘霸壘戲馬息征塵夢隔山陵使勳留社稷臣桃花武陵澗春水正垂綸壽沈夫人十二韻錦石支機夜華堂設帨時婺輝流北極河影接西池趙璧邯鄲映隋珠合浦移玉麟雙抱送金馬半驅馳內殿繅龍黻中閨濯鳯匜丸熊昭燕翼冠翟耀蛾睂舉業依黃閣吹簫近赤墀氷桃來曼倩神棗下安期院落花香細簾櫳樹影遲萱齡春冉冉桂實暮離離煥爛溫綸錫熒煌命服馳漫論滄海陸庭日正逶迤賀章宗理拜納言六韻拜命銀臺重承恩玉陛長舊焚司諫草新綰納言章左掖鄰宫禁西清近苑牆鳴珂趨建禮待漏入明光雨露沾堯厯風雲挹舜裳歸來雙袖底不斷御罏香夜窗急雨迅雷簡章生行父六韻入夜天威動羇人賦式微疾雷穿瓦落驚電掣垣飛鸛鶴摶空迅魚蝦掠岸肥涼生青竹簟暑淨緑蘿扉積潦盈川谷愁霖漲海圻將因湖水畔對濯芰荷衣贈徐司空十七韻何來星斗色永晝駐干將意氣髙元直聲華擅偉長新宫營北極故郡憶南昌帝胄滕王閣宗支孺子堂垂天誇矯厲絶地快騰驤冕露昆池外帷褰粵嶲傍赤墀傳鳯吹丹闕覲龍光萬户停芝蓋千門跨柏梁緡錢搜海岱材木下荆襄樽節蘇黎獻憂勤翼聖王朱衣晨煥爛彩筆暮芬芳並探圖書域先登翰墨場雄篇馳月露隻字鬬風霜麗藻芙蓉幕幽情薜荔裳疏狂容孟浩貧賤揖田方市駿帷寧敝歌魚鋏詎忘欣傳賜履近無棣錫封疆相國趙公損餉酒脯及鰣魚餺飥各賦排律八韻異饌金華出甘漿玉髓流黃封螭陛底彩翰鳳池頭東海無勞牧中山不待求清香浮緑蟻麗色映紅虬鼎鼐分朝食杯盤愜夜逰投醪情繾綣輟饋思綢繆劇飲邀名勝加飱豁旅愁欣然聊一飽何羡醉鄉侯耒耜莘郊畔綸竿渭水涯羮分元相座鮓合五侯家入鼎猶生霧堆盤欲照霞刈雲連隴阪釣月倚汀沙玉粒逾紅稻金鱗錯紫茄杜鑱知有託馮鋏豈重嗟緑野懸情劇清溪入夢遐窮年勞稼穡未暇咏蕪葭詰旦用孺太史亦以賦茄古體至余讀之清思道發更賦排律二章章十二韻茄為物最賤吾兩人盛為品題若此士固有遇不遇也弱植慳詞賦微名昧典墳岩廊新蔽芾隴畝舊耕耘灌溉人工洽栽培帝眷勤先春芽甲拆首夏葉紛紜色借青綾被光欺白練裙甘漿籠紫電嘉實抱玄雲下箸迷山蕨登盤勝野芹蹲鴟寧比芋辟蠧謾同藝杏酪何年共梅鹽異代聞石渠根暢茂金鼎味氤氲􅌲蠢聊諧俗離披會出羣遙憐百子殿花照越羅紋植處非金谷移來是玉堂玄亭潛借色紫闥爛生光密葉團芝蓋疏花發米囊雞頭形倣佛馬齒味參商萬子綿瓜瓞三漿沃荔房隨波萍實麗入火芋魁香樹擬蒲盧速枝慙苜蓿長朝蘭偕飲露晚菊互披霜祭敢勞先聖齋惟狎太常斷虀聞學士蒸瓠憶平章傅鼎調和熟郇厨餖飣良憑將遐賤質浣滌助嘉芳挽侯中丞六韻寂寞青萍化蒼茫素旐昏才華新漢殿俠氣舊夷門仗鉞三軍鋭登壇百吏尊胡床邊月墮油幕陳雲屯馬革悲王事龍章荷帝恩異時瞻大樹奕奕象賢存秋日過用孺太史館中看菊作九日移庭砌三秋列苑牆吳綃紛浥露蜀錦碎勻霜幄借青綾被簪宜白苧裳林塘寒鬬色籬落靜生香戲蝶渾迷素遊蜂欲讓黃朝飱期笠澤夕采問柴桑汾水佳人興成都倦客腸龍山風日在歸理舊壺觴衆木凋零後羣芳爛漫時移從新上苑采憶舊東籬玉琫交璀璨金鈿鬬陸離色披羅幔蚤香度繡屏遲綴席千霞艷浮觴片月宜含霜晨縹眇冒雨夕淋漓隱士岩邊植騷人澤畔持何如酌甘谷萬壽獻彤墀咏黃葉同區孝亷純玄太史用孺作合浦飄仍逺長安落未終千林俄失翠一水間流紅寂寞經秋雨倣徨後夜風迷蜂當觀閣伴蝶戲簾櫳命薄侔隋苑身輕異漢宫騷人悲葺芰賦客嘆飛蓬桃杏凋元蚤芙蓉發漸空妬他籬下菊增艷向梧桐弱質全凋露繁陰半墜霜紛紛飛玉砌冉冉覆銀床色豈經秋淡聲偏入夜長翠銷蘭芷珮青浥芰荷裳蒲柳俄更緑蕪葭盡變蒼隨風吟野寺伴雨積山堂奉帚悲長信含毫泣未央故園遙極目天濶洞庭傍曾祕書招同區純玄用孺汪公翰登顯靈宫閣帝畤浮丘肅仙壇太乙崇飛甍凌廣莫傑觀峙窿穹百級懸蒼霧雙扉闢彩虹憑髙千地入望逺八天空目杳吳門騎毫披碣石鴻蓬壺迷上下泰華辨西東樹色新豐近花香太液同慈恩何代剎紫極異時宫綘節朝金相銖衣侍玉童長陵懷左纛太隗問遺弓不死標靈藥浮生劇轉蓬升沈飛鳥外聚散隙駒中氣色睂山秀才華粵嶠雄踏歌鄣郡客獻賦杜陵翁藉草逰寧倦捫蘿興未窮吾將趁昏黑絶頂御罡風壽茅母八韻爛漫青霞色晨飛玳瑁筵庚寅初降日甲子乍周年鳳翮秦樓下鸞書漢闕傳芝停句曲蓋芰擁若耶船酌醴春光媚含飴樂事綿雙珠呈碣石片玉照藍田躍鯉看純孝烹雞識象賢瑶池八萬里振佩白雲前載別靜父瀫元二宗人并懷徐陳茒王四子吾宗神秀裔二仲最翩翩桂樹燕山並棠花易水聫名園鄰北郭别墅帶南阡曙聽鈎輈去昏馳叱撥旋妖童攜篳篥冶女競鞦韆逺寺投清磬長堤簇畫船清風貽賦頌白雪和詩篇徐幹才名著陳遵翰墨傳茒容腸鬱結王粲思飛騫屢入華陽社俄空碣石筵河梁愁緒促海國夢魂牽意氣長虹拆襟期片月懸放懷丹壑近回首碧雲偏灞岸重登日陽關乍出年吳田初放鶴越岫正啼鵑日夜相思切瑶琴抱絶絃侍御葉公資送樓船抵杭賦謝五百字伏柱辭燕闕褰帷向虎林花驄千里道竹馬萬家心白筆含霜動朱旗曳霧臨埋輪神鬼避折檻帝王欽捧日聲華著回天意氣任斜封先罷敕直指載題針鼓吹錢塘岸樓船震澤潯浮江消癘疫煮海蕩氛祲豸繡威祛蜮魚鹽弊剔蟫三吳豪右懾兩浙吏氓愔縣栁標前植溪蘭拂舊絍河陽霞粲爛秋浦月蕭森紫霧催王舄丹霄麗宓琴名賢遺惠愛茂宰播芳馨鹵簿江州却橋梁瀫水尋兒童羣接袂父老競披襟合浦光搖電函關氣屬雲淡臺徵往昔石户詢當今僕射憐才切司空拜善諶衡茅搜野逸草莽薦﨑􅋂末契申盧駱孤悰託向禽公車時序換客邸嵗華侵絶域傷流寓荒塗惜滯淫一身餘杖屨十口互衣衾驟得鸞翔漢真憐鮒涸涔銀缸寒乍照玉斝醉頻斟董相虛陳策莊生實廢吟乘槎騫並適捧檄義同歆足刖寧愁卞頭風欲愈琳誼高雙白璧賜溢萬黃金敝篋離并塞輕裝發薊岑嚴城宵擊柝古戍暮傳砧野店黃茒簇山郵緑樹沈沿淮程冉冉入越路駸駸蕙圃欣逢鴂楓亭快食鱘孤帆移霅上敝宅認山陰猿狖迎空谷鷦鷯集故林陳情慙李密養志愜曾參午憩甜仍黑晨炊突漸黔蘇機聊下軸竇錦趣停針草閣喈雙燕椿庭戲五禽蓬蒿行處合蘋藻薦來歆白鳳騰書帙蒼龍掣劒鐔銜恩腸易結飲惠舌難喑八表瞻星象三韓待雨霖羮牆峕自劇翼卵定誰深灑墨紬丹匱濡毫綻緑沈惟應感知什百代為知音再送包觀察稚升之閩中已奏淮陽績仍浮渭北船飛霜隨憲節明月挂離筵郡邑崤函外城闉灞滻前重關行紫氣别業問藍田六傳排雲日雙旌拂漢年袖中龍劒色燁燁射星躔贈別區太史用孺三十韻屈指登壇業如公更幾人英詞摛晉宋大雅擷周秦粵海三珠耀昆岡片玉掄紅顔攀桂闕白面上楓宸棣蕚燕山下梅花易水濱珮紆新鸑鷟袍奪舊麒麟祕閣然藜夜香亭屬草晨橫身飛日月舉足步星辰意氣深流輩風期絶等倫湘臺盟景屈鄴郡締徐陳契為論文篤交緣作賦神舟聫吳苑雪笠共漢京塵馬走提攜渥牛驅顧盼頻空林移皂蓋委巷曳朱輪握麈酬玄度濡翰接景純留連時達旦臥起或經旬嶽立千秋廢冥搜萬象陳高標凌泰岱厚誼薄峨岷劒妬芙蓉合衣便薜荔紉駿才寧易屈龍性故難馴濩落商岩畫棲遲渭渚緡揚雄玄寂寞宗炳卧逡巡别恨催紅葉歸期趂緑蘋一丘容寄傲九域藉經綸石户偏懷璧天墀憶賜銀孤騫憐大翼獨處笑窮鱗徙倚三垣切參差一德鄰乾坤留哲匠社稷待詞臣努力時餐飯關心數飲醇金閨墜梁月投夢瀫溪垠夜集萬中丞齋中二郎君出侍翩翩玉立且風致卓爾不羣追賦八韻寄懷并似中丞以當尺一識面雙投刺舒懷一抱琴雲中鴻雁翼原上鶺鴒心並宿桃花岸聫飛桂樹林風華喬梓茂意氣棣棠深翰墨眉山下箕裘洛水潯藍田誇合璧麗浦重兼金文武家聲擅詩書世業任西堂春色蚤爛漫憶披襟謁關忠義祠十八韻代凛烈貞元氣時危屬異人河山留壯節海嶽降髙真北陸扶皇胄南陽協帝臣從龍噓赤伏躍馬踐黃巾夏口單刀駐荆門萬甲巡精忠餘報效大義絶連姻畫界獰權忌遷都猾操顰吳師魂半逝魏卒陳全湮斧鑕威屠德艨􅟘勢蹙仁風馳秦塞外電掃洛川濵域內俱徯后江東實震鄰神明炎祚厄鬼蜮詐謀伸麥邑悲逢蠆章丘痛獲麟陰靈遺百代肹蠁亘千春隧道紆松柏宫牆飾藻蘋斷雲回悵望斜日助酸辛古壁蛇蟲字空梁燕雀塵惟應玉泉剎永劫鎮長新李本寧亷訪以武侯廟八律見貽倚賦排律四首有序世之善頌孔明者三代而下一人止矣乃余意猶以未盡往往發之雜論著間謂詩篇束聲偶欲效工部古柏行為長歌而未暇是春本寧使君自蜀至手書武侯祠廟八章見貽余受讀躍然因取陳志洎諸野記小説凡武侯嘉謨偉節韻為四章章每百字即瑣語逸事亦間附焉蓋區區仰止可概見已隴上耕耘日隆中嘯傲時分荆存霸迹入蜀定皇基建業元將命先是當陽之敗孔明請奉命求救于江東成都迄受遺交鄰吳壤服討賊魏廷知舊鼎三垂叶新圖八陳移七擒降孟獲十倍勝曹丕大將嗤巾幗魏平追兵怯鼓旗楊儀反旗鳴鼓懿不敢逼伏龍人羡艷如虎敵紛披絶棧巴山曲叢祠漢水湄炎精垂燼夕泪盡杜陵詩時務真誰識﨑嶇見武侯勤勞同稷契正大協伊周鹿任姦雄逐龍占俊傑留相才元獨擅將略定誰優治世休從惠交鄰或用柔南荒窮絶域少陸蕩神州取善規忠益開誠布逺猷俱武侯語仇家偕飲泣李平廖立敵國競含羞紀法森鵝鸛八陳機神運馬牛木牛流馬巍巍三代下王佐嗣先憂抱膝南陽下乾坤入嘯吟犁鉏莘野重畚插傅岩深大澤皇圖創孔明隆中之議先主荆州中原帝胄臨萬年扶漢誼五月渡瀘心羽扇驅風電蒲輪挾雨霖遺書穹峽外川中有諸葛兵書峽藏甲故崕陰滇南有藏甲崕部伍歸寧輯酋豪入縱擒南人慙數叛孟獲云南人不復反北孽戒重侵昭烈初卒爽懿來侵六出先聲壯三言後慮諶告李福語錦官祠柏在黛色尚森森吞吳情拂鬱杜詩滅魏思飛騫管樂寧同座蕭曹定隔藩南征韜劒戟北伐誓旌幡萬事三分策千秋二表言庸禪知盡瘁桀懿詢加餐即食少事煩語日慘祁山戍天昏渭水原五丈原在渭北金牛炎社促鐵馬夜臺喧古柏籠祠砌見杜詩枯桑抱屋垣成都桑八百株江空殘月墮峽逈斷雲翻白帝留營陳傷心亂石繁少室山房集卷四十五
