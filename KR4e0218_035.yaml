body:
  text: 少室山房集巻三十五明胡應麟撰五言律詩八十七首題野鶴孤雲巻贈閆道人有序始為大中丞作歌贈閆尚未識面是冬北上過小祇園適閆自茆山至袒膊科頭雙顴玉赤行步若飛信異人也而風度甚爽朗真率絶不為詭秘狀自云與某道者訂期蓮花峯下十年矣將以嵗杪往踐兹約特就長公乞言因出冊子皆一時名士題贈余曩賦長歌亦在焉長公援筆書四大字曰野鶴孤雲而屬余更綴一詩即席四十字并紀其人科頭無一事松下日盤桓骨相堪鵬背生年異鶡冠月輪天柱頂雲色洞庭干薄暮揚舲去相攜問大丹秋日溪南晩眺適趙生攜酒共酌村店中行行隨杖履徙倚夕陽斜野寺明楓葉山籬著豆花飛鷗過淺瀨浴鷺上浮查之子期方到悠然問酒家寄大司空朱公六首有序公屢以手書見招屬家慈病未能赴踐宿約懐仰之暇集成六章聊代起居云耳徳望三朝舊勲名八座餘廟堂周太保劒履漢尚書翼矯丹霄鳯鱗潛碧海魚惟應並南斗萬古照匡廬賜履優前代乗桴記昔年龍蛇驅大陸蛟鱷奠長川宦績崑崙外神功碣石前試看淮瀆廟禹碣至今傳社稷憂仍在中華問轉頻帝能優大老史已傳名臣紫氣偏南極青雲自北辰無論漢宫逺玉樹正嶙峋里閈知司馬乾坤識卧龍為園名獨樂抱膝寄孤悰瀑布簷前水香爐坐右峰大江西望處愁絶暮雲重長日東林下看花自閉闗緑偏裴相野青占謝公山嘯傲藜床静登臨竹杖閒獨餘憂國夢時到紫宸班李詩宅近青山同謝眺尚憶風塵際能髙物色情吹噓慙國士吐握為儒生山水孤琴合虹霓一劒鳴含珠十年夢無路報投瓊公常賞識余詩於童子時余故每有國士之感王孫貞吉以手鐫印章寄恵走筆奉謝遙遙雙玉佩贈我意何勤石鼓周王篆金泥漢帝文蛟螭寒壓霧科斗暗蔵雲萬古岣嶁碣何時一對君雪夜邦相過齋中小集四首寂寞幽人卧追尋茂宰賢飛觴臨夜雪把袂坐髙天剡曲三更棹梁臺萬古筵異時吾黨事蘭水定誰傳不謂山齋雪能來侍従臣談詩雙郢客和曲㡬巴人玉笛生春早金尊促夜頻曉來飛舄處瑞氣滿楓宸彩筆寒相對朱絃晩故留飛仙誰鶴氅野客自鸘裘擁坐城雲立窺筵海月流預愁新賦出人擬兔園遊此夜平原醉人間更有無乾坤懸玉闕日月坐氷壺磊落新詞社蕭條舊酒壚灞橋回首處凄絶㫁雲孤與惟寅一别淹冉五載消息不復相聞春來忽得手書新刻見寄賦懐五首賜履傳周室分符衞漢京白虹懸結客紫電照論兵四百西山寺三千大内營㡬因飛檄暇出郭遍題名帶礪中朝望詩書上將才珮刀初制閫横槊自登臺萬騎長城合孤鴻大漠迴河梁人漸老吟望獨徘徊長嘯青油幕雄談白㲲巾射鵰新驃騎圖象舊麒麟雪照梁園夜風髙瀚海晨遙遙雙鯉下猶憶尚𤣥人憶昔長安騎相逢狹路間乾坤雙彩筆吾汝各紅顔萬感歸來集千秋病後閒惟應别時夢繞夜向燕闗一代華陽社平生碣石遊坐攜鵷鷺侣吟傍鳯凰樓夢寐猶青眼形容漸白頭尺書聊寫寄涕泪盡南州寄朱在明光禄夙昔長安社朱家興獨豪深杯傳竹葉艷曲度櫻桃宦拙従雞肋身閑付蟹螯近來偏憶汝愁望大江濤寄丘謙之底事丘靈鞠年來復罷官驚心吾道左落魄世途難月過衡峯近星離益部寒九歌何日就洒泣傍南冠寄朱汝脩山人有序汝脩業醫而余好談長生迺京華日朱生最稱善病余頃復嬰疾彌年兩病軀南北相望良可笑也因詩訊之掌露偏誰得秋風各未蘇骨仍滄海立魂傍碧山孤白帢名先後青嚢術有無㡬時攜竹杖燕市問懸壺再寄在明在明家有聲伎之奉近聞其方再納寵因寄見說休官後鄉園樂更饒屏開張静婉坐列董嬌嬈紫電黄金勒紅霞白玉簫興來應載酒時醉廣陵橋膝汝載先生卜築武夷邀余過訪余以家慈臥床褥尚孤此約感念今昔不勝悵惘敬賦小詩奉寄凡八章北極聲華久東山氣象新乍辭文苑秩初乞武夷身闢地連三島看天臥七閩惟應幔亭月時傍紫綸巾九曲移家近三山入望遥樓臺臨碧漢户牖逼青霄坐叩梅仙訣行逢木客謠袛疑塵世隔無路問漁樵遊神近何所三十六峯前鳥下談經榻猿窺問字船飛蘿懸白日古樹拂蒼烟彷彿秦人住桃花隔澗泉勝許龎公擅名應善卷逃挂瓢滄海濶倚杖碧山髙萬事留青髩孤忠藉彩毫無嗟塞翁意天地一鴻毛柳色呉天夢梅花粤嶠情吏才髙漢代儒術重周京霧澤南山豹雲寒北海鯨無言帝閽隔咫尺是蓬瀛黼黻真王佐絲綸蹔釣徒中天儀鳯杳大海蟄龍孤入夢猶金鑰翻歌自玉壺向來門下士桃李遍三呉作賦慙鸚鵡空羣辨鷫鸘千人摧稷下一士擅襄陽色借青雲迥心懸白日長惟應夢中路惚忽到滄浪滕公督學浙中於諸生中獨以異等見遇九折王陽道千秋大隠廬雲山容負笈宇宙礙驅車業豈門人盡名猶國士餘憑將一掬泪徧洒越山隅得安仲子書却寄嘆息延陵客清才獨後時三都全入賦五岳半題詩壯節摧青髩雄心狎翠眉呉天花欲盡好訂白雲期懐祝鳴臯南歸書札㫁北望舊遊孤一鎩悲鸞翮三年問狗屠汝才寧巷陌吾道實江湖㡬夜狂歌發寒雲碎玉壺奉寄司成許公二首一代崇周學諸生侍魯儒田何慚受易伏勝早傳書八座飛騰外三垣悵望餘猶思問竒日大雪滿庭除載籍窮金馬論思坐玉堂洪鈞迴稷契大典翊成康日近尚書履霞明學士裳生徒愧原憲十載夢長楊上元觀燈有懐京華舊游時集邦相署山城逢令節燈火蹔同遊月映千花上星従萬樹流遺簪連紫陌委珮出朱樓不是金吾地無妨徹夜留逺憶長安道華燈正陸離雲霞千蜃結山嶂六鼇移玉珮邀春早銅壺聴夜遲即今天禄畔太乙傍誰嬉周公瑕書來索余贈言為賦二首作賦元驚坐臨池更擅場真行王大令篆𨽻蔡中郎巨榜髙天揭窮碑絶域蔵太湖花滿目斟酌欠書航景聫韋誕歐陽詢事周素怖水故尾句云詩名人自老墨妙世誰如瘞鶴髙風在籠鵞逸興餘藜然中壘坐花浣少陵居最憶長安日垂髫問子虛顧朗生山人以四詩見貽賦答萬感紅顔盡孤蹤白眼餘何堪梁苑客遙寄茂陵書雪色晴偏照星芒晝不除太湖蓑艇畔誰共覔鱸魚意氣塵埃外心期夢寐間一尊違白社十口共青山桂樹幽人賦蓮花國士顔倘懐天姥雪拂石候柴闗極目皋橋客長歌扣玉壺天蔵林屋逺雲壓洞庭孤卜築仍三徑浮家任五湖試探呉市女能識姓名無不謂菰蘆畔頻年見偉人髙天容荷鍤大海傍垂綸一壑心長戀千秋業未貧異時雙劒合誰謂白頭新寄謝宗伯何公四首時得寄恵燕中書并新刻大復全集十載瞻台座三春佐秩宗文章空左馬禮樂擅䕫龍鄴下才偏盛河南譽日崇殷勤大𤣥草猶記昔相従燦爛遺編在峥嶸大雅留黄河龍馬出紫閣鳯凰遊李薛年誰少徐邊譽豈儔不辭扳逸駕世業在瀛洲少日遊金馬平生近玉宸中天迴雨露絶域望星辰咳唾千秋迥吹噓萬象春慚無杜陵句池上賛絲綸尚憶梅花下飛觴醉玉堂先春大庾月達曙廣陵霜鬢惜年來短情偏别後長綈袍今古泪寂寞洒滄浪曩寓燕日何公招余飲梅花館中聫句達旦者再寒食夜集邦相署中分韻得吟字荏苒逢佳節招攜見苦吟乾坤雙劒色湖海一麾心柳宻陶公署花閒宓子琴蘭陵今夜月百里為誰深又得巵字萬古山城畔風流見此時署元方朔隠亭更子雲竒片月窺簾下疎星抱席移袛應雙白眼兀坐把深巵題大司空潘公芝林二首燁燁鍾靈草青蔥發澗阿九光呈玉葉三秀挺瑶柯滴露滋苔蘚蒸雲映薜蘿蚤知王佐出寝殿有興歌丹崖蔵淑氣白日湧靈葩百本俱擎露千林競照霞瑶池仙母住勾曲羽人誇寧似商山客成功翌漢家聞裕卿卧病有懐茆屋何年借柴扉盡日扄已無人和雪誰問客為星病骨留東海雄心付北溟暮雲回首處寂寂萬山青得何仁仲書舊事燕臺下看花汝亦狂雙鴻俄越嶠匹馬竟瀟湘賦就人千里書來泪八行向來神女約早晩到髙唐題元旦早朝卷玉殿春風起金門曙色通珮聲千柳外旗影萬花中鳯厯頒羣后鵷行列上公陽春纔一曲擬獻大明宫題大閱巻劒珮中天出旌旂大漠開風傳青海戍霧捲白登臺列陳盧龍動翻營涿鹿迴九邊銷燧色横吹莫興哀秋夜諸子過集豈是談𤣥宅偏令問字過客當蓮社滿人比竹林多霽月流丹嶂飛星度絳河毋悲秋夕永散髮向藤蘿寄劉子大金吾玉禁康侯寵金吾上將榮潛消三輔俠坐偃百蠻兵夜月雕弓滿秋霄畫㦸明共誇遊獵暇時入建安盟懐劉觀察仲脩㡬夜懐髙適當年賦上林髙虹流擊筑朗月墮鳴琴客散誰燕社人歸自越吟西山暮樓殿極目薊雲深寄宫詹陳公二首執㦸元中秘鳴珂更上公雲霞流紫殿日月扈青宫磊落燕臺駿飄零越嶠鴻台垣何處切五夜望寒空建禮摳趨近延英進讀勞露漙金掌重雲斂玉繩髙苑樹縈朱紱宫花落彩毫尚思燕市夕濁酒坐持螯哭康裕卿五首有序始余年十六逰長安邂逅裕卿於友人席上裕卿得余詩讀之即狂叫擊節曰子珍重必有聞於世自是定交無間者十數載迺今裕卿不可作矣聞訃哽咽情見于詩搖落龍蛇嵗天南墜客星寒灯孤月白遺塜萬山青永閉髙人宅誰題處士銘傷心舊朋輩十載逓凋零宿草孀妻奠遺編稚子留山陽愁聴笛剡曲恨迴舟九死還初服三生記舊遊踟蹰季札劒日夜夢東甌忽跨遼東鶴誰瞻薊北鴻雲山藜杖在天地草堂空隴樹經時碧原花著處紅終令石門谷千古號愚公漂泊南遊日峥嶸北上年狂名懸楚越俠氣動幽燕大雪行歌外長虹擊筑前向來攜手客老泪盡江天垂髫游洛邑識面記燕城問賦驚文考投詩謁正平大鵬猶宿契老驥忽悲鳴地下梁鴻在應酬碣石盟裕卿與思伯契分殊厚今先後入岱矣秋日送人之彭城柴門喬木下送汝一含杯大澤秋聲早長河曙色開隂風韓信廟紫霧漢王臺后夜芒山氣誰尋吊古才為邦相題蕉石圖圖出元人張伯雨貞吉所臨寒蕉依怪石仙液貯銅缾日夜孤根老冬春片葉青風疑搖鳯尾雨欲化龍形恍對張勾曲星冠坐草亭王長公寄恵集序賦謝四首字字風霜色緘題向草廬百年雙涕泪萬古一吹噓附驥名難盡屠龍業未虛異時歌九辨寧敢忘三閭漶滅書生刺迢遙國士恩片言猶海嶠三賦已乾坤道豈中原喪交寧異代論尚拚雙髩在垂白子雲門家學三王上時名二李前江河趨大壑日月並髙天業已迴長夜名猶借少年代興聊一鉢黙黙少林傳刻鵠紛難辨鳴蛩獨見知左遷元命世揚馬快同時一字人堪老千秋客自遲㑹攜孤劒色東海傍要離送金大參入滇除目下楓宸飛旌動去塵共看金馬客遙問碧雞神草色窮南服花香夢北辰到時薇省宴猶記六橋春寄董太史二首作賦俱青髩攜書共赤墀我懐三秀草君奪萬年枝鸞鶴甘泉殿魚龍太液池當年六橋柳能記共含巵世事甘余拙時才羨爾長讀書同左史執㦸異東方霧擁金門色天迴玉陛香深慙潞河鯉萬里到滄浪送人之黔中匹馬衝寒霧孤城問瘴烟花深羅鬼地箐宻夜郎天野戍傳諸葛藂祠賽謫仙五谿相望處白日墜飛鳶送人遊邊嚴冬武林驛一騎問京華大野霜飄樹長城雪作花櫜鞬迎屬國劒珮逐輕車早奪天山地銘功入漢家題東臯園亭巻近卜東臯墅推窻面面山榻懸雙樹底亭鎖萬花間白鶴迴孤嘯蒼龍問大還異時藂桂發尊酒定同攀送張山人楚遊岩穴憑誰問飄然賦逺遊風髙雲夢笛月滿洞庭舟短刺攜孤客長裾狎五侯蛾眉亭下泊飽看荻花秋南屏逢沈李二生談道因約余遊天台口號戲贈越國竒男子呉中偉丈夫游心出蓬艾把臂入菰蘆龍虎蟠金鼎鴛鴦語玉壺天台八萬丈指㸃向虛無夜集李景穎出土𤓰佐酒成賦二章有序見文集雲霞蒸上瑞氷雪薦華筵醒酒功侔石烹茶味勝泉梨非張氏谷𤓰豈邵侯田好比金莖液分攜漢闕前司理耽竒甚甘𤓰薦味長飛霜勻玉質重露浥瓊漿碧茘唐宫重丹桃漢殿祥何煩方朔盜袍袖溢芬芳贈孫國梁談𤣥吾不厭問字爾相尋興逸飛流賦情髙潄石吟春郊聫玉勒夜閣擁瑶琴二仲翩翩在何煩覔向禽時金生數同過飛流潄石皆孫氏事也題性天真孝巻有序惟孝使君族子某七嵗而刲股救其親竒節也聞者咸為詩歌以美之使君因雥集成冊云焚香星月下一臠冀親延詎意揮刀日纔同扇枕年孤誠迴大造至性徹重泉莫以昌黎論雌黄孺子賢潘翁九秩詩為望之茂才作玉醴汎蓬池瓊枝煥陸離𤣥纁遲伏勝帶索異榮期種橘盈千頃栽花但一籬不知柯㡬爛猶閱洞中棋題中丞滕公武夷精舎圖有序先生自癸未拂衣卜築武夷之上日與二三同志講業其中放舟曳履之暇時寓意棋奕間此圖磐石方廣數丈上設楸枰坐而手談者先生洎里社楊君李君皆生平莫逆友也圖于先生貌酷肖仲子萬里北上出示索題瞻玩再三不勝國士之慟謹賦五言律一章精廬聊十尺坐嘯建溪湄蹔挂中丞笏閒揮太傅碁野花蒼鹿獻林果白猿持惆悵流風逝徒瞻大樹遺送李内翰入都一騎衝寒發梅花照客顔亂雲揚子渡殘雪皖公山舊直青綾被新恩白玉環夜來前席夢光到紫宸班寄李允達二首底事翩翩客長懐落落愁驥心猶五夜雞肋已三秋犢敝相如袴貂殘季子裘長門售何日少婦繞機愁失意真憐汝沾衣向薜蘿屠龍人未識買駿客頻過投筆徒為爾焚舟竟若何千秋吾道在異日較誰多少室山房集巻三十五
