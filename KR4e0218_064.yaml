body:
  text: 少室山房集巻六十四明胡應麟撰七言律詩七十四首李本寧廉訪入武林以手書新厯餉余谿堂却寄七言八律白面登壇寸管馳縦横九域讓蛾睂神龍大海雙飛日老驥中原獨步時麗賦梁園春雪滿長歌蜀道暮雲遲誰言越客朱絲斷極目遙天候子期八代文章覩典型雞林重譯購題銘無勞大澤誇雲夢乆識鈞天奏洞庭禹廟冠裳迴百吏胥臺檣櫓壓千靈精廬四百湖堤上爛漫新詩勒翠屏翹首湘潭半夕陽誰傳詞藻賦髙唐宗盟一代聞三李伯仲千秋見二王北極雲霞迴指顧東山日月謝行藏新篇漫惜南遊寡海外流傳徧越裳中弇名山迹已淪太函髙座定何人傳衣兩地歸南岳賜履三天上北辰大厦紛紜羅國士孤查浮没問波臣中興咫尺葵丘畔寓目江淮一旅陳一麾環珮下甘泉雙管横操百代權燦爛圖書遊洛日飛揚文字入秦年風雲八座長秋近象緯三臺太乙懸不是觀濤瀛海上西泠那駐木蘭船入剡名山思轉遐雲嵐晨夕候髙牙寧無逸興歌天姥大有閒情賦若耶萬岫分青懸梵刹千巖飛翠落官衙香風夾岸驊騮倚隊隊明妝越水涯珮玉含香事冕旒横金馳傳出龍樓遊窮八極飛仙在望重三朝宿老留白帝城探新雨色黄公壚續舊風流無誇海上干将合昨夜精芒射斗牛邂逅金緋照石渠盧溝橋畔暮踟蹰同盟敢托先朝後並軌猶慚易世餘轉自慵疎憐叔夜寧因消渴慢相如無由共賦南鵬翮大斾摶風上玉除送徐惟得還楚中嵗晚蓴鱸樂事饒淒然風雨發征軺𢎞文館闢雙龍近神武門深一騎遙夢渚寒雲飛獵斾湘江晴雪候漁橈憑君漫卜東山墅三錫𤣥圭下聖朝王别駕過訪賦贈當年詞賦滿林皋閥閲瑯琊擅俊髦驥足暫紆龎統駕雞羣聊試吕䖍刀齊封魯甸驅馳急郢雪秦雲眺望勞咫尺風期同調在碧天河上首重搔送張仲立上計二首龍劍雙飛入薊城一尊揮手暮笳鳴分符帝問淮陽績授簡人推鄴下盟萬樹未央春雪煖千花長樂曙霞明亡誇爛漫黄金錫前殿如椽勒姓名飛旌千里問神州驛路梅花照錦裘上計詞臣新渤海稱詩才子舊長洲風烟御苑迴金埒雨露明堂下玉旒惆悵河橋深雪裡盡將離恨入齊謳朱吳于三生攜酒同遊城南觀音禪院皁帽青鞋霽雪前叢林遙望七燈懸乾坤萬古空王刼水月三生大士緣下界風旛搖貝闕上方雲磬落金田踟蹰未辦西歸衲杖錫香林對惘然張博士以壺觴過訪余病不能起迓賦謝此章野外孤篷繫白茅齋頭長鋏倚青郊壺傾博士蓮花釀盤載先生苜蓿殽海岱雲霞驅别夢天涯氷雪綰窮交亦知凡鳥堪題字浪逐揚雄賦解嘲張别駕過訪舟中以新刻餉惠旹聘修郡志将成燦爛詞林見白睂挂冠偏趂黑頭時安仁宦就花盈郭元亮歸來菊繞籬作賦髙唐巫雨過飛書東嶽岱雲馳十年流水希凡調試拂氷絃和子期張君先任新安尹狄明叔邀集新居命女伎奏劇凡玉簮浣紗紅拂三本即席成七言律四章名花十院盡蛾睂美酒金樽照陸離霧裏雙鸞騰玉闕雲中八駿下瑤池參差趙瑟傳情逺縹緲秦笙度曲遲後夜屋梁頻悵望河橋孤館月明時伎十人二尤善謳痛飲狂歌白日酣何人同住百花潭明妝陳女開金屋妙舞羊姬㺯玉簮滿架荼蘼風乍入當庭楊栁月初含追歡拚竭良宵興滿眼闗河繫别驂繡柱雕欄夾畫圖幽棲河上擅菰蘆壺觴元亮開三徑舟楫陶朱泛五湖草色共悲吳苑廢花枝猶傍越臺無干将對舞東風夜燦爛明星墜轆轤畫檻㕘差照緑苔三山何處問蓬萊朱顔驟向新春合紅拂偏宜靜夜來風裊梅香縈玉砌月穿蘿影度瑤臺髙唐總入襄王夢未擬重憐宋玉才于生髙岡以早春九日初度賦贈二章時生年二十東來紫氣繞華筵玉舄飄颻大海田耎九葉蓂舒元旦後千秋桃熟早春前馳心髙宻談兵夜屈指重華謁帝年試問嘉名懸錫處桑弧晴色廣陵懸玳瑁堂開霽雪凝百壺春酒照如澠斷氷竒句推良史明月新篇和武陵鴻雁渚寒勞夢寐鳳凰池逺待鶱騰追歡況值梅花早倚嘯晴空望玉繩夜同朱吳李徐諸生集于茂才宅聴歌南陌朱樓並馬尋一尊塵外共披襟齊姜乆擅髙唐曲越客同操下里吟燭映紗厨春色淺香飛羅袂夜寒深雲門寂寞當年調慚愧鍾期抱玉琴送趙太學之北雍束書迢遞赴皇畿岩壑何言戰勝肥緑綺正攜春雪過青帆俄逐夏雲飛雄材世許攀槐棘古調時能問蕨薇到日含飴窮燕樂千花晴色映荷衣送黄上仲歸赤城時以伯兄説仲書至翩翩戎服傍髙牙長揖歸來興未涯别夢乍懸淮海月鄉心遙引越城霞毫端秀色舒毛穎匣底寒光照莫耶最憶元方油幕臥獨将清嘯和悲笳朱太學元長以新刻過訪卒業賦贈余與元長大父司空尊人廷尉通家再世覿其韶令喜溢于辭靜掩衡茒覺地偏輝煌詞筆照臨川通家政自推文舉倒屣能無屬仲宣殿聳甘泉晨賦雪宫深碣石夜談天春風一騎長安邸何限飛花墜玉鞭彩筆翩翩驟過従居然文藻挹芙蓉門留廷尉甘羅雀劍授司空欲化龍謁帝明光春浩渺論交平樂暮従容當年國士雙垂眄握别銜知思萬重夀胡隠君九秩為玉呂茂才題杖履飄然鸛鶴羣函闗靈氣暮絪緼三生夙擅榮期樂二典新傳伏氏文大海亭窺秦望日清溪船㺯越來雲毋誇經術承家舊屈指鸞章帝座聞送趙汝信奉常入都挂席南風錦樹重頻年溪上濯芙蓉尋仙玉洞雲長滿謁帝金莖露正濃午夜素琴偕一鶴商秋神劍合雙龍台垣咫尺黄扉啟燦爛棠花拂過従奉常于少傅為昆仲送吳文仲觀察入賀四首鼔吹江城落日懸牙旗明發使君船青牛一望函闗外黄鵠雙飛漢殿前北極衣冠晨拜舞西池環珮夜㽜連壚頭夙昔荆髙輩極目燕山共惘然燦爛明星墜轆轤懸腰雙鍔並昆吾千秋録就呈金鏡萬夀筵開送玉壺飛盖西園涼月滿垂鞭南陌夏雲徂加餐何處頻相望嘹嚦征鴻下太湖斧鉞中吳羨晝遊闔閭城下暮淹留安期舄捧遙天外博望查飛大海頭北斗文章新氣象南皮談謔舊風流黄金臺殿三千尺擊筑憑誰共酒籌椽筆翩翩賦頌裁誕章晨捧入蓬萊花前彩鷁飛吳甸栁外青驪繫越臺長樂露華金掌下建章雲氣玉繩來天顔尺五稱觴地尚記吳公第一才寄區用孺一棹棲遲大海濵桐江雲色繞垂綸青山乍飽閒中目白石猶飢病後身别去龍門無國士歸來鮒轍有波臣故人藉甚甘泉畔日醉𤣥都萬樹春汪明府邀集衙齋陶駕部懋中適至同賦秉燭髙堂燕笑頻歌喉搖曳玳筵新琴中白雪飛仙吏坐上清風挹故人剡曲蒹葭千里夢河陽桃李萬家春凭欄無限青雲色欲喚雙鳬到紫宸入郡城訪睿父㕘知適文仲觀察以公事至同集西園髙宴月華濃咫尺台垣並過從座上儒冠容一鶡尊前神劍合雙龍陰森棠樹春光滿燦爛薇花夜色重最是胡床清興劇羊裘何惜醉䝉茸是夕二丈以直指葉公招中席輟赴畢燕仍過戚園轟飲達曙乃罷皁盖㕘差越水頭千山寥廓暮雲収風前並遡王猷棹月底重登庾亮樓彩袖翩􅝆傳楚舞朱絃嘹嚦和吳謳梅花漸吐新春色秉燭何妨盡夜遊直指葉公枉顧賦謝四章攬轡千山入畫圖偏従巖穴問潜夫臺端此日冠峨豸闕下當年舄化鳬把臂蓬蒿新白社闗心桃李舊𤣥都天門六翮雄飛近一盼鹽車在暮途燦爛西臺白玉珂頻年直指向闗河豐城劍抱雙龍出瀫水橋乗駟馬過作賦風雲迴縹緲飛章山嶽動嵯峨寧知一代蒼生寄幾向清溪問緑蓑余邑浮梁數百年靡修復者葉公一旦談笑新之諸遺愛霑渥婺中童孺咸悉焉大纛髙牙控斗躔豸袍驄馬出甘泉雲霞驟劃雙溪上雨露偏濃八邑前秋浦棠陰懸節鉞河陽花色映樓船無勞汲孺誇長揖竟日茅亭話太𤣥又擁朱旗入婺城清江寒色暮雲平霜飛竹馬兒童集日照花驄父老迎繡服三天傳疏草綈袍一代見交情由來國士非凡遇匣底干将夜夜鳴夜集王仲升新第即席同盛氏諸仲分韻得寒字畫檻雕楹十二欄一時尊酒盛詞壇風人把袂遊平樂月姊更衣下廣寒臺接丹山翔彩鳳簫横碧落度青鸞従知子敬多豪興桃葉歌成宴未闌王仲升以五言長律見貽賦此答贈尺組長纓奮草萊清香畫㦸臥莓苔北門鍞鑰歸雄鎮東觀圖書集上才疊嶂分青横几簟雙流飛翠入池臺知君未厭従軍樂大纛髙牙帝座來入三衢訪文仲觀察邀同睿父㕘知酣集丙夜期以詰朝方舟下瀫水即席賦玳瑁筵飛白苧新鶯喉搖曳舞梁塵金尊竹葉銷長夜玉笛梅花綻蚤春雪照吳門雙彩筆星環越署兩朱輪朝來共有鳴榔約一棹能無繫水濵同張吳二丈方舟東下沈飲三晝夜四之日始達瀫濵即席賦仍飛寶瑟佐清酣豪興飄飄瀫水南河朔千秋今見二平原十日已過三含毫鸚鵡催詞賦倚席魚龍狎笑談信是青雲留白帢一丘誰訝管寧憨遇張孟孺于湖上未及問姓名别去詰旦以羨長書洎新作來謁賦答此篇相逢今雨大堤頭梵刹丹青暮靄流赫奕家聲曽御李飛揚門閥舊封留何須鐵騎桑乾戰暫解金魚杜曲遊昨夜淨慈秋色裏霜華寒透鷫鸘裘陳明府書來賦答尚憶登仙共李膺風摶水擊羨鯤鵬天長片鷁飛淮甸地近雙魚出廣陵桃李城頭春色滿蒹葭堤畔暮愁凝髙樓百尺堪同臥把袂何時第一層時陳君令廣陵旁邑登趙太學文鎮谿雲閣懐睿父文仲二公簾櫳十二挂髙寒突兀樓臺峙翠巒六洞烟嵐長繞座雙溪雲月半慿欄丁丁樵斧飛春暮杳杳漁舟泊夜闌此日平原堪盡興深杯何惜醉詞壇寄陸使君使君舊治河濟上同龔觀察及余名姓余弗知也挂笏黄堂坐晏然雙旌猶記北來船時名赫奕機雲後世業巍峩遜凱前六洞晴雲江郭繞雙溪明月郡樓懸甘泉咫尺徵良吏突兀龍章漢殿傳上元同睿父㕘知文仲觀察夜集谿堂看燈作千騎聨翩集水涯上元燈燭興偏遐憑欄火樹千枝月照坐金蓮百本霞織就鮫綃珠有暈妝成鸞鏡玉無瑕深宵拚醉平原席遮莫蘭陰送曙笳詰旦兩公各以詩來走筆和答聨飛鴻翼度天涯並握鸞箋思轉遐季重詞名元海岱孟陽詩筆半雲霞提攜頓覺燕金重顧盼寧愁趙璧瑕宛轉雙珠呈夜色不知庭月墜春笳時歌者趙璧在筵寄張睿父㕘知時以新賦三律見示風前何處覔新裁目斷仙槎繫翠苔畫㦸東方千騎繞朱旂南國片鴻來桃花爛漫飄吳岫棠樹陰森蔽越臺莫道干将長射斗司空袍笏近蓬萊陳太學過訪為借沈材叔園亭以頓行李賦此謝之意氣翩翩越水頭居然名士擅風流獨将仲舉千秋榻懸向休文八咏樓几席平原堪縱飲杯盤河朔競追遊亦知廡下梁鴻寄一為窮途破旅愁侍御葉公疏陳鹺事得請賦東二章諤諤千言奏彩毫英聲直氣冠仙曹批來豈憚龍鱗逆觸處真憐豸角勞日揭虞淵消霧雨雲収溟海息波濤惟應報國丹誠竭五夜霜華襲髩毛一疏迴天四海聞懽聲馳頌越江濆臣心總為埋輪切帝眷偏従折檻勤十道乗驄爭吐氣三朝鳴鳳欲空羣西京底事蒐鹽鐵為報桓寬正屬文鄧逺遊以書貺見貽賦答二律飛蓬何處遂幽棲咫尺雲萍悵解攜吏隠欲兼山大小客居難定瀼東西鳴琴海國雙鴻度鎖印江城獨鳥啼是處休文饒八咏危樓曽否共攀躋病肺經時息茂園淋漓書札到丘樊花栽檇李三千樹草賦長楊十萬言爾自飛鳬臨大邑人誰逐鹿向中原盈盈一水相思切極目湖頭暮雨繁觀察林公過訪賦贈才名藉藉冠青錢執憲欣逢入越年起草夜停雙闕下看花晨憩六橋前飛揚白馬笳聲動縹緲蒼龍劍色懸四百樓臺題咏處登臨誰不羨如椽夀陳隠君瑞日暄風滿畫堂東來紫氣近錢塘千春大海籌増屋十里平湖樹夾航盛世謳歌情正洽明時耕鑿興偏長何當醉挾元龍去百尺樓頭話對床贈仁和劉明府曩有事計偕邂逅君于濟上同舟驩聚者月餘識面長淮記苦吟黄金臺館獨登臨當年飛舄過嚴瀨此日鳴琴坐武林南斗夜光雄劍合西湖春色畫檣深懸知漢殿循良詔屈指晨催大海潯侍御葉公既按部吳會復以鹺政倥偬馳返臨安諭檄通逵衆以大定輒綴七言四律代柬行麾東來紫氣又臨安拭目蒼生望未闌一劍乍過千壘靜單車纔入萬家歡霞光北極飄清禁斗色西臺照畫欄信是批鱗頭易白霜毫時拂惠文冠比屋香燈越水濆霜天晨夕望氤氳中朝獨占乗驄步大海爭傳諭鱷文柱後峩冠心捧日臺端搖筆氣淩雲栽花漫憶河陽事燦爛芙蓉拭劍紋吳山晴翠拂髙車隻字風霜繞玉除驄馬近傳鹽鐵論雞林遙誦治安書三臺色動迴天後十郡歡騰煮海餘最是憐才勤吐握登龍時曳舊長裾繡斧朝持越郡前花驄行部筆如椽風雲西北飛揚候海岳東南鎮定年秋思芙蕖明玉斚春光桃李媚瓊筵寧知鹵簿江州貴日向蓬茒話太𤣥夀龍使君六秩旭日扶桑繞畫欄安期雙舄對盤桓紅霞一曲秦源近白雪千家楚水寒小逕壺觴移竹樹前庭袍笏映芝蘭山香莫問羣花落一喚飛瓊舞翠巒送章宗理納言使楚中輝煌丹詔出蓬萊窈窕𤣥闗閉緑苔劍珮青雲辭玉闕衣冠紅日下銀臺河橋薄暮蟬聲起驛路深秋雁陣來漫憶觀棋淝水上蒼生元屬謝公材送王永叔入都四首大斾翩翩越水濵朝天白馬向楓宸飛揚䟦扈千秋思磊砢崢嶸八尺身興裏平原寧計日歡來河朔動經旬誰言綵筆偏詞賦已卜螭頭氣象新壚頭促膝又吾曹斫地王郎思獨豪九陌霞光迎劍珮千山雲色度旌旄中朝奏疏闗辰極故國音書問海濤尚憶春明門外事紅牙催拍鬭持螯吳山晴色墮髙牙歌闋驪駒興未涯錦綬乍抛滄海月緋袍猶綰赤城霞垣扉燭影宵分直禁闥棋聲午放衙明發武林闗外路盡将離恨入征笳把袂錢塘又别筵升沈往事一潸然公車賈傅仝遊日帝里班生獨上年握麈何天非碣石抽毫無地不甘泉亦知疏草焚難盡諫獵書成太史傳睿父㕘知入武林余過署中適以公讌湖上不遇留柬寂寞𤣥亭臥草萊登臨長憶謝公才猶疑斧鉞清溪駐不謂帆檣大海來繡服定過吳子國珠簾同望越王臺金銀萬寺湖堤畔椽筆能無麗賦裁時文仲文将達吳門闗忠義侯廟作二首絳節緋袍氣凜然巍巍遺像識忠賢河山萬古精靈在宇宙三分壮節懸燦爛黄金辭操日飛揚白刃刺良年莫言遺恨章丘下五夜英魂照玉泉巨顙長髯貌絶倫當年馳騎破黄巾崢嶸正氣鍾三國慘淡英風敵萬人縛禁已酬吞魏志誅䝉猶現伐吳身雙旌異代鹽池上想像鐃歌入帝宸送右轄吳公擢左山西并門遙望思如何縹緲棠陰十郡多鹵簿北風辭粤嶠樓船西日渡汾河青萍謁帝龍光近彩筆懐人雁字過上考吳公元第一題詩能到舊烟蘿季秋同李鄧二明府俞山人尋靈隠故址作有序樓觀滄海日門對浙江潮駱義烏靈隠詩也今寺在山麓於二語殊不合山之腰最幽絶處有弢光閣登其上則跨重湖攬江海十字真境儼在目中其下石梁亘絶考之終篇皆符迺知今靈隠建自宋時非考功覔句地也疊磴危梯萬仞懸嵯峨飛閣架蒼烟天浮海色雕楹外日蕩江流畫栱前𤣥鶴並攜珠履客青鳬雙下玉臺仙誰言康樂題詩舊婺女猶聞筆似椽少室山房集巻六十四
