body:
  text: 少室山房集卷九十七眀胡應麟撰論八首諸葛亮武侯人品信軼漢唐而班三代矣乃其人才又絶出于三代之下者夫三代而下稱才之盛莫如漢漢髙之目三傑也其才猶千古一遘也然良能運籌而未必能臨陳何能治國而未必能運籌信能行兵而未必能治國髙能用三子之長以取天下而弗能以身兼三子之長武侯之才則三子之長以身兼之而且能取天下能取天下而且能弗取者也夫武侯之治國人能悉之其運籌之大者隆中以一言定鼎江東以片語致師祁山之出龎統圽法正亡間一二僅存無益勝負之數審也而曹氏謀臣策士布列後先武侯惟綸巾羽扇談笑道之而司馬諸人一籌罔措即曲逆剛成紛綸帷幄而庸詎加焉乃其時蜀將之堪大敵者關張黃馬久殁行間苐魏延足使而狼戾矜髙尤難獨任故自街亭失事之後前茆後徑皆身當之斬王雙圍賈詡破費耀走郭淮敗宣王馘張郃迄于斜谷之運渭南之耕未嘗别遣一軍獨任一校而八陳一圖同流宇宙為萬世法則武侯行兵克敵亷李遜心居可見矣夫相可與治天下而已夫將可與平天下而已鈞之匪所以取天下也取天下必其中有帝王之度混一之規乃能得之故蕭張淮隂不遇漢髙將相之才終無以自顯而矧于天下武侯則可以將可以相可以取天下而無所藉于昭烈之錙銖也夫懿之神姦籠絡一世蓋亦庶幾有取天下之慮者而兩雄相當智窮力屈巾幗之受借曰老師而蜀方屯田持久上下一心天假嵗餘魏眀夭折曹爽紛爭國難四起揚旌以入秦隴關洛悉無人之境矣吳之甲兵孰與中原吳之閫帥孰愈仲逹魏滅吳孤舉九州之八以壓一隅于取天下興禮樂又何難焉而武侯則未嘗有意于天下之取要以答先主之知眀老臣之節竭盡瘁之忠而已吾故曰武侯者無論其人物品流軼漢唐而班三代其人才亦絶出于三代之下而不可載覩者也張郃上余以為張郃街亭之戰蓋古今天幸之尤者非可以兵家得失論也夫郃之在魏稱宿將知名然不過一校之任趙雲魏延等埒耳當武鄉出師關張黃馬悉喪亡矣而趙雲尚在不以督街亭而以軍箕谷何也雲年力暮衰陷陳先登慮非壯日而箕谷濳師張皇一靣非雲之老成持重故未易勝也則蜀將可使當其時宜莫如魏延而武鄉復置之不用曷以故哉延始出巴中即欲分道與亮會于長安尋武鄉用兵一皈紀律以延之負勇好竒使當前隊或任情輕敵以致他虞此武鄉之慎也舍二將而將之良無幾矣其以大衆付之馬謖之手固由謖計畫辨才見知夙日蓋亦大不獲已存焉乃其遣謖也行師制勝當事有畫一之規而孰意謖之敢于方命也夀史眀言違亮節度舍水上山舉措繁擾郃因絶其汲道大破之俾謖也率履周行毫無矯越乘初出之鋒併三郡之力拔王平以當旗鼓而援桴擁鋭奮命而前武鄉親率魏延吳懿等長驅以蹴之郃將授首伏尸之不暇而暇待木門之役乎哉嗟夫明如武鄉違衆而舉謖受知如謖違亮以覆師而郃逢其適而徼其功吾故以街亭之勝為天幸之尤者也蓋自是武鄉出師遂身為前鋒不復命將矣即武鄉垂歿遺教楊儀反斾鳴金魏衆却走死生仲達之謠遺笑無極夫以殞逝之武鄉按其章程足以摧懿于後日矧以生存之諸葛循其節度不足以破郃于當年哉然則街亭之勝信古今天幸之尤無論乎兵家之得失也張郃下難曰郃之成功若吾子言信天幸匪人謀矣乃魏書本傳盛稱郃久鎮邉陲長于應變昭烈武鄉咸深憚之其聲實懋著奔走敵人豈悉徼天幸無預人謀也噫郃之籌略器能槩之壽史終身可考矣自去袁氏歸曹公雖平魯破超時奏勞伐皆一戟之任非仗鉞登壇自建旗鼓也逮曹公還自陽平留拒昭烈始擢之衆將俾督諸軍然而守疆場則漢中陷沒佐統帥則夏侯喪亡至進兵宕渠一遇益德萬衆盡殱棄馬緣山為世辱戮尋曹公身至巴中精甲被野郃為上將亡能規恢尺寸鼠竄故邦此其才略器能固近出羽飛之下而敢望諸葛之萬分哉暨郃因天幸䟤跋街亭魏宜顓委西方永杜敵患乃武鄉載出舉朝惴惴惟蜀是虞選將罄兵空國而戰主之司馬佐之郭淮費耀戴索魏平賈詡之屬國無留良而郃也受命宣王僅同一校胡街亭制勝于前者大勳陡滅而祁山因敗于後者鋭氣嘗伸哉則郃之為郃昭然可見魏眀帝諭司馬以西方事重非君莫可固洞悉餘子之才艱于禦侮矣非馬謖庸夫自投死地即王平之守郃且兩攻之而莫能克而矧乎其他也吾故曰郃之成功古今天幸之尤不可以兵家得失論也夫自昭烈既崩魏疆弛備武鄉始出蜀勢方張使天祚炎精木門之殱早遂兹日則咸陽以西一舉底定長驅河洛兖冀風靡不半載而中原復可也惟漢祚告終而街亭一戰實大運興亡之候故冥冥之中若使若尼智無所運巧無所規蓋渭南之卒師不待大星宵殞而後決矣夫然則街亭之役天實為之而謂亮為之或謖為之哉郃為之哉魏延始武鄉之出祁山也前鋒將魏延欲假竒兵五千道子午襲咸陽謂長安以西一舉可定武鄉以計危不用議者至今惜之是徒知街亭喪師貽討賊之憾而不詳核事勢之當否籌畫之是非也古之伐國而以竒兵勝者衆矣然必其國之削弱主之惛庸與臣之憸邪與將之携二而後可故梁元帝之講道陳後主之賦詩皆敵兵咫尺蒙蔽罔聞以致天塹為墟宗社淪覆乃三軍之帥非得于謹楊素賀若韓禽輩尚未易言也鄧艾道隂平以滅蜀允謂不賞之勳陳同父氏猶以徼幸行險折之百代之下若延之請竒兵以襲函谷其事勢可同日議哉魏何國也全盛之國也睿何主也敏達之主也大臣則曹真蔣濟矢心于其內諸將則張郃郭淮效力于其外而司馬懿之窮姦極宄馳驟疆場其握算若神眀發機若鬼蜮而謂子午之途若隂平之道長驅以入無人之境乎即延能以一旅奄至咸陽蜀援未交魏救四集窮城獨守究竟奚之無論長安以西寸壤難拓五千精甲且盡沒虜廷矣武鄉身統六師關中震動平取隴右規出萬全而舍彼康莊希此詭遇乎是其事勢之艱毫亡克理而延者猜狠之雄傾危之黨又匪可寄之重任屬以深謀者也考延委質武鄉推鋒司馬搴旗陷敵勇略足稱乃發縱指示靡非戎幕竟亮出師未嘗委之别部豫以一軍彼其人才固可槩見及武鄉之卒遺令殿師兹何時也大喪在前大敵在後全軍返國尚慮不支而延奮欲部曲先還身留擊賊卒以中途叛亂三族誅夷此其才識器能庸人之下而妄希五千組練一舉足而定咸陽其籌畫是非武鄉所謂臣之未解莫斯為甚矣於戲始出祁山三郡響合街亭一戰士氣焚如要以天促炎精堂堂之陳蹉跌意外而矧乎行險徼幸覬獲大功然則延策之不行益以覘武鄉之逺識而不足為憾也考武鄉傳出師祁山不載延議延本傳但言延每欲與亮異道會于潼關亦不載此謀僅見裴注所引通鑑因之恐未足深信總之街亭失事羣議紛拏使當時一戰而克多口寂然矣惜哉劉裕英雄之士崛起紛爭戰伐之際必先有濟世安民之大志而後可與成撥亂反正之大功志不先定而汲汲焉據髙墉竊神器苟以傳其子孫此盜賊之靡而胡足議于英雄之萬一也秦之將亡也項羽劉季所謂時之英雄也覩始皇車服儀衛之盛一則曰大丈夫當如此一則欲取而代之吾以為兩人者皆富貴之徒而匪所以議于英雄之大業然而羽誅宋義破章邯以五載恢霸迹季降子嬰報義帝以三傑定丕基彼皆卓然自立而未始竊秦之名擅秦之勢拊其背扼其吭而敓之位則列之英雄之等而亦宜也蓋至于光武文皇而英雄大業庶幾近之矣光武以神眀之胄芟夷新莽合德成宣文皇以髫鬌之齡掃蕩隋煬比蹤湯武故三代而下得國之正必曰漢而唐而宋弗與焉以宋之得國匪正也非吾所謂英雄也乃六代之君劉宋之裕則大異于是矣裕奮臂草茅不階寸尺覆孫恩殪盧循夷桓玄滅譙縱縛姚泓虜慕容超百戰百勝幾一四海不可謂非英雄之主也令裕外寇首取燕次取粵次取蜀又次取秦秦之亡也魏人重足河洛震驚裕能翻然改圖置晉度外乘關中之勝摧吳越之鋒猛將鋭師長驅北向魏雖全盛以拓跋嗣之庸庸而當裕之神武以長孫嵩之憒憒而當王鎮惡檀道濟之威名其折而宋也必矣彼屈丏者犬鼠之媒裕一天下將稽首剺靣匍匐逺塞之不暇而敢窺函谷之泥丸哉乃裕也一篡皇皇無復他慮聞劉穆之死即日南歸以稚子憸夫鎮遏巨寇三秦故土緣手失之蓋裕之肝腹崔浩王買德之徒洞燭之矣有削平底定之績而徒區區博圖篡之名豈非安民濟世之志未嘗素定于其中故撥亂反正之功不得幸成于其後哉夫曹馬誠權姦而廢立之舉彼猶然有所待也而裕無所待而躬廢之師昭誠悖戾而弒逆之舉彼猶然有所諉也而裕無所諉而躬弒之自是而齊梁而陳隋無弗躬廢矣躬弒矣究其端皆裕作之俑也而矧乎其屠戮已降睚眥舊怨猜忍刻虐豺虎同羣于人君之度何如也吾故曰若裕者春秋之大憝聖筆之首誅古今盜賊之靡而胡足議于英雄之萬一也髙歡君臣之義自曹氏攘敓朝綱辱戮主后踵接以師昭劉裕諸人滅絶凌夷于天地之內久矣當其時君其上者徒竊空名寄頓廊廟社屋祚夷非鴆則縊乃強臣悍帥劒履入朝睥睨其君殆如無物五朝因襲謂為當然而孰意元魏之衰爾朱之亂又有北齊之髙歡氏也歡始出秀容麾下滅兆殪隆位大丞相其舉兵晉陽致孝武出奔律以人臣之誼罪亡所逃苐自榮穆殞身人戒前轍歡執言討賊有社稷功而魏主偏聽回邪致生携二則播遷之罪固難盡蔽于歡也至嗣君繼立大創前愆引分輸誠靡所不極噫典午以還冠裳倒置君之生殺懸命一人首領獲全已為至幸而歡也曲拳擎跽恭順自將敬事至尊終身毋越即道非粹白不謂難乎夫歡在當時割據中原兵精士衆垂旒而王孰能禦者彼草昧之雄富疆是急區區名義不啻贅疣寧假是以塗民耳目哉大都激發真心兾追曩失較諸六代諸臣遂非文過𨽻視其君而卒弒之非徒倍蓰而什百也夫前歡而司馬以迄爾朱後歡而宇文以逮普六其位皆歡之位而其勢皆歡之勢也有能為歡之為者誰乎而世以晉陽之甲蔽罪于歡必夷諸司馬宇文而後已吾恐自新之路絶而人無為善之望司馬宇文輩且相率揶揄于地下矣髙敖曹慕容紹宗拓跋氏衰齊神武以英雄之度鵲起中原善任知人流譽海內乃余考其將帥之良勇莫若髙敖曹而智無出慕容紹宗右者而神武用之皆弗能盡其才也夫敖曹之勇當時已配楚項籍其歿于行陳神武如喪肝膽宇文泰賞追者布帛迄數世莫能盡償其威名震懾若此而首領不保何哉敖曹能勇而不能怯者也而神武直任其勇而不思佐之以謀至建旗鼓以攻黑獺則其視宇文為何物其輕敵可謂至矣輕敵者亡兵家炯戒而敖曹臨大敵而犯之能亡及也紹宗智略自爾朱兄弟皆違戾其策以底敗亡至歸神武宜若韓信之遇左車乃齊之驍鋭竇泰彭樂侯景諸人神武纎悉委寄凡周齊後先大戰數十河橋邙山沙苑之役連兵百萬震動宇宙迄未聞紹宗運一籌借一箸于神武之幕豈神武之不用紹宗耶將紹宗自諱其能不以薦之神武耶逮神武垂歿子澄憂侯景之亂始特舉紹宗以命之且云我故不貴之貽為汝德於呼使景也前斃于歡則以紹宗才歡終不及一用而偕腐草木矣何以異于爾朱之世哉卒紹宗決水潁川淪溺塹下破景之外未奏一勳則以兩將之智且勇而用之咸不盡其才皆神武之失也嗟夫六代之雄言知人善任者若神武亦庶幾矣駕馭少疏以二將之才而莫能竟其用而皆致之不得其死至唐文皇效之于尉遲恭李世績幾帝武曌而眇任城術之不可不慎如是夫爾朱榮余讀史至元氏之末未嘗不竒羡爾朱榮之雄武而重惜其無成也夫自三代以迄六朝能以身一四海定中原者漢髙魏武而已乃兩君初起草昧攻城略地兵家利鈍皆互有之及其鋤大敵戡大艱往往顛沛流離幾敗而克而榮獨不然始自秀容夷帥一旅入朝遂沉母后易長君通國之人毋敢衡抗尋誅那果滅韓樓逐陳慶之平拓跋皓縳蕭寶寅万俟醜奴兵鋒所加靡擊不碎至以七千之衆禽葛榮百萬之師頃刻之間放散立盡其摧陷廓清之略豈戰國以來所常覩哉當是時宇內人豪若賀六渾賀拔嶽侯景髙敖曹慕容紹宗之屬咸出麾下蒲伏指揮猗與盛矣以較昔之開創無論江左諸君因仍剽竊即漢髙魏武雖所遭人傑非羣盜靡遘逢榮世其功烈當不過此王元美氏至以為振古之豪項籍流亞匪虛語也顧江左諸君道成霸先輩攘敓一時策無不遂而榮之末路身首分張天壤懸絶何以故哉志大而慮疏謀深而術淺輕天下之人謂無足一虞而不知禍機之伏驟發于肘腋之下此正漢髙魏武之所為兢兢而榮視之漠然者也俾榮也輸忠委赤內絶異圖假以數年取三吳定百越始終臣節光輔魏君伊周管霍流芳奚逺即功非混合不失為王景略陶士行而始念不臧身名俱滅惜哉信古之英雄惟諸葛孔眀為不可及矣少室山房集卷九十七
