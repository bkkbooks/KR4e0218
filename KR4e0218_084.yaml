body:
  text: 少室山房集卷八十四明胡應麟撰序六首大中丞劉公奏疏序代臬長梅公萬厯乙未春河間劉公奉上命以大中丞來填越公至則周視境內而條畫其便宜凡先後數十百疏先後數十萬言詔一一報可越三載威惠誕敷環海以東鯨鯢之屬竦息待命于是藩臬庶僚某等咸請公頒刻所上封事揭四裔而垂千秋不佞得以次伏讀卒業嘆曰猗歟盛哉文章之用其最巨者宜莫如經世之文其最巨者宜莫如奏章唐虞三代都俞一堂亡論漢則賈太傅之治安偉矣顧其言弗效于用甚且弗能一日安其位于朝廷説者謂長沙通達國體王者之佐而立談太息則自用其才者非也唐宋以還其人之傑然名世而疏草之燁然名家者亡若忠宣陸公文正范公乃陸公生唐季運身際庸猜晚輯方書以避讒搆君子弗能亡憾於其君范公當宋用兵西夷跳梁先憂後樂卒爽成言君子弗能無憾於其國兩公而外卑卑載籍古今名實罕覩其人若夫肩皇王帝霸之猷事神聖英毅之主際鴻龐熙皥之會而樹倜儻無前之烈者舍劉公奚適焉不佞某謭劣無似無能為公役萬一第讀公封事而知公有大造于越者六事曰核吏治也曰振民窮也曰練師徒也曰肅戎政也曰汰冗濫也曰恤災傷也嘉隆以降吏不迹古窺瞷成俗偷惰相師戶口為增薰蕕錯列公於是有核吏治之疏錢塘具區海宇樂土歲比大祲重以疫癘流莩枕籍蒼赤嗷嗷公於是有振民窮之疏會稽甲楯觸鬭成風綦隆日久縱弛濳滋卒弗服習將且豫敵公于是有練師徒之疏勾踐遺教君子六千一二狂狡脫巾潢池首惡就金餘孽觀望公於是有肅戎政之疏承平極際姦蠧藂生費出無經吏緣為市詭竄名籍坐縻縣官公于是有汰冗濫之疏全浙居氓枕江抱湖洪水時行灌溢川澤黿鼉雜處人不聊生公於是有恤災傷之疏加以大庭之上萬機旁午時務孔殷朝鮮亟則公有排難之疏日本張則公有戡暴之疏戍兵發則公有善後之疏礦使臨則公有豫防之疏自公之開府兩越章亡慮數十百上上亡慮數十萬言大都纒綿于憂國激發于愛君普訊博諏長慮卻顧務鑿鑿可見設施而弗為迂逺矯伉之談以詭衆昵俗故上于公之誠亡弗格而議亡弗行亡論洛陽少年即陸范兩公未覩其弗二弗疑若公被遇於今日也距兹三載大浙東西吏職民懷師武戎戢冗餉畢空天災潛弭風聲震乎遐貊而窺伺絶乎近郊匪所謂仁人之言其利甚溥社稷之臣以安為悅者哉且賈生少年鋭氣一蹶弗伸兩公陳力富強弗獲久于其道致厥就寥寥簡編公以三十之齡建旄秉鉞而老成持重絶無沾沾喜事之心即方今勳業爛然異時達公之年而竟公之緒寧詎弗逺軼西京近軋唐宋而與周之吉甫同為憲於萬邦也不佞某寤寐三代之英久矣顧濶焉未覩何幸于昭代一遘逢之而于公一親炙之敬綴不腆之詞當左劵于琬琰之末送大中丞山西萬公經理朝鮮序代今天下稱極隆盛際矣四荒九域玉帛來王蠕動含靈咸若大造獨倭奴負固窮島包藏禍心比者徂伺鴟張躪我藩服上赫然震怒特簡重臣以經理為名提十萬衆張皇境上閫以外若巨若細聽便宜凡諸罪人務在必得戊戌秋銓曹以員缺上聞上博綜羣議僉謂今大中丞山西萬公威望夙著宜往詔報可公受命趣裝刻期明發某不佞忝公屬僚快覩公被遇上知樹壯猷絶徼外則於啓行之次作而言曰聖天子之以東伐畀萬公也豈不誠為社稷得人哉夫才不虛生變不虛兆故非常之才生必有賴非常之變兆必有繇故瓌瑋鴻碩冠世之勛非紛紜盤錯亡繇以自致摧陷廓清救世之略非橫決潰崩亡繇以自顯斯兩者其人其事始恆互相需而卒未始不巧相值也不佞恆竊志三代之英而下上其世若成周吉甫為憲萬方尚矣春秋而降郤縠氏之詩書諸葛氏之禮樂蓋彬彬焉彼其人皆絶類離倫文武兼濟出而將入而相定傾弭變業亦如之明德郅隆人才盛極以不佞耳目覩記當今之世躬非常之才遘非常之變偉然以七尺軀負天下望如古所稱社稷臣者舍萬公而疇屬焉公生長西陲服習介胄髫鬌即以儒自奮高步詞垣器度巍峩望之若岱宗溟渤莫知顛岸而下士若渴蹄涔蟻蛭具網畢羅先是上雅知公才拔自曹郎專制一面垂十餘祀狡夷狂噬用觀察舊使超大中丞履任未期海波澄徹兹東藩移鎮節旄所指長蛇封豕亡穴自藏不佞奚容緩頰第以非常之數窺測天人而知公之樹壯猷威絶徼者匪偶然也倭奴古不經見陸梁元初蒙古驅混合之鋒乘全盛之勢曾不能折其半鏃高皇帝肇造函夏沿海諸衛遍置重兵慮深遠矣俄而望海堝之捷屠磔靡遺嘉隆以來實始滋蔓吳越七閩戰亡虛日邇復掩襲我藩邦蹂踐我邊域六師萃止猶揚鬐鼓鬛拒死岩城之中自北邊受盟未有暴戾獰頑劇于斯寇者揆諸世變允謂非常而公適以非常之材遘兹運造執言問罪奉行天誅是役也庸詎直撫靖遐方掃除逋孽已哉樓船十萬飛度重溟生縛酋豪俘獻闕下列扶桑為郡縣編窮髮于版圖復千八百國之封疆蕩六十四洲之氛祲較諸城濮創荆瀘水禽獲彌有光焉凱旋之晨勒石大荒紀頌聖天子功德文焰武烈震耀簡編所謂萬邦為憲吉甫其人非耶所謂才不虛生變不虛兆否耶然耶乃公以七尺之軀係中國安危先宇內憂樂當寧恃為長城蒼生庇為大廈孟軻氏亟稱社稷之臣匪公之攸屬而繄誰屬耶不佞幸以臬僚朝夕接見奉公教甚久而狎公愛最深是役也既為聖天子社稷得人慶又為公奠安社稷以上報聖天子知遇慶敬於馬首之東布斯言高牙大纛下以壯公行色送鍾天育歸苧羅序余自丙戌罷歸不上春官者凡十祀甲午奉大人命靑衫蹇衛蹩躠入長安中則曩時髫鬌交遊悲歌屠狗之倫什九物化間一二存者李大將軍輩僅僅如魯靈光每曳屐黃金故臺盱衡四望陰風颯然萬里北至若相對欷歔于華陽碣石間嗟夫犬馬齒既日益增而前輩風流浸微浸滅若為得盛年好學瓌邁不羣之士提衡揚扢以庶幾疇昔之談天即繇此終身吾以為遇之旦暮已乃今而邂逅鍾君天育蓋庶幾其人焉天育故貴介公子尊人觀察公歷仕通顯聲實彪炳一時天育少厭芻梁凡世所艷趨狗馬子女玉帛諸好意所嚮宜亡所弗極顧一切掃去而獨沾沾以不朽自期弱冠身所師友既已盡越之雋豪而猶以未足居恆念大丈夫生明盛操七寸管樹百代稱必遊道盡一世而後亡遺憾惟是皇都四方之極而太學又四方賢士所走趨吾方欲盡交一世獨奈何局促轅下以不資奉妻子耶亟長跪請觀察公從二奚奴束書擔簦下金陵渡揚子擊楫長淮大河馳騎東北走青徐齊魯衛趙之墟所至發為篇章盈篋盈笥既抵燕市入成均公卿而下列署之英六館五陵之彥嚮慕之如飢渴就之而發其櫝藏靡弗恍然自失曰鍾君信盛年好學瓌邁不群士也君既度爽神清尤敏妙饒能事行草珮鐫聲歌琴奕多所嫻習而賞鑒其精高辛顓頊夏后之鼎彝柯亭之材赤堇之冶漢碑唐碣五代宋元鍾張顧陸吳李米趙楮墨絹素之遺一望而核其真贋緣是士益嚮附之出其下乃君雅不以自多日鰓鰓然以弗獲盡交當世為憾一日與余把臂通侯宋君座而喜可知也詰旦踉蹌攝衣冠伏謁余寓曰英不敏越中豪俊無所不締交顧獨弗能得之胡先生賴天之靈長安中望見先生顏色先生幸卒賜一言既英垂槖以覲觀察公於生平無遺憾嗟嗟天育不佞故嶔崎歷落魁也世所稱狂而可笑宜莫余若者子獨惡所見而樂聞其言而驟欲得之自余三上春官而髮幾種種燕市悲歌屠狗之倫什九物化亟思獲一盛年好學瓌邁不群士與遊乃吾鄉有天育其人而又雅好余若是余則惡能以默默也天育行矣都人士業皆有言為天育壯行色不啻和璧夜光惟是鄙人之言靦焉以粳核先之觀察公驟而讀之其能無掀髯噱耶雖然余與天育家相去僅五百里而遙異日者操扁舟負瓢笠訪天育苧蘿之下彼姝之子翩翩然出而迓焉即曩時擊築屠狗之倫群起要余余弗與易矣余且從天育老矣壽郡伯張公五秩序代陸太史萬厯十有二年甲申六月實維大郡伯桂林張公五帙初度之辰諸邑屬吏汪君可受輩謀祝公遐籌躋於大椿冥靈以仁壽當世則相率問序於余余不文不能稱公壽顧竊從諸大夫後窺公所為治婺與婺人所為祝公而卜公獲算于天未艾也夫今之太守非虞廷所稱牧伯周諸侯漢二千石哉坐黃堂駕五馬裂千里而為封疆秩貴倨至亡二也顧守之秩于民若甚尊而守之職于民則甚親晨興坐堂皇閲簿書發號令午而聽訟獄一政失環一郡氓庶怨咨之一政得環一郡氓庶愛戴之愛戴之弗已則羣起咏歌之又弗已則羣起祝頌之故夫仁逮一鄉者頌止于一鄉一邑者頌止于一邑守之仁則一郡之民千萬姓之口同祝而蘄其壽者也以千萬人蘄一人之壽則壽雖諸福之首造物者亦靡得而靳其算矣太史氏曰以余所覩記于今良二千石張公厥其人哉張公用經術起嶺右服官南昌治平為天下第一入拜臺御史所在捐小苛崇大體務矜惻廣惠懷至解剝忠邪振飭紀法則風裁稜然山立嶽峙弗可奪卒用此失當事心謝病去天下望公為祥麟威鳯而公終不忍抱其仁民之具小試而藏于一壑一旦竟歡然出上方念婺越東巖郡非公莫可輒以婺八邑畀公公始下車趣行郡覩學舍庳陋嘆曰婺為文獻藪窟自沈隱侯以風流倡唐宋勝朝代有其人國初文士雄跨海內而胡近寥寥也則黌校之地非耶爰相厥宜建鳩工庀材新之不日且為會城中羅一郡之秀而月課其殿最士自是喁喁嚮風矣則又以為紀綱之淪斁繇胥𨽻之作姦也于是汛狴犴肅科條畢慮殫精旁睨却顧爬搔蠧穴遏絶幸門大猾巨狡奉法惟謹則又以為左右之售欺繇賓旅之壅遏也于是繕輿梁飭郵傳一命而上通刺請謁握髮倒屣發膽露肝八荒洞如蔀隱畢達而又以其間勸農桑行賦稅訪耆碩恤孤嫠挫豪強格鈔竊蓋張公之為婺曾不再歲而士奮于庠氓飽於野旅優遊於途貪暴革盜賊屏縉紳作氣諸執事師以成風太和之象旁皇四境樂惠之聲浸淫九野公之仁無所冀于婺而婺人沐公之仁不能不頌公而快覩其壽而造物者亦不能不為婺人而陰以上壽畀公天子旦夕用潁川故事徵公入禁庭管樞軸公之仁一郡者且將擴而仁天下而公之壽亦且將由五帙而六而七而期頤而五百八千歲為春秋而綿綿未艾也諸大夫仁壽一世之祝意在兹乎抑余有進于是金華之山突兀巉岩穹然造天夫非皇初平叱石沖舉地耶公始稱壽而適守兹土其偶然耶抑造物者有意耶有如公由此極人臣備五福一且念婺舊遊曳杖而尋所謂金華赤松子者余雖老尚能候公朝真諸洞間以快覩大還之為公有當不啻如大椿冥靈已也於是諸君起再拜曰偉哉太史公之言壽也敬載斯文觴公郡庭為八邑大夫士倡送大參李公擢楚中廉訪序代萬厯丙戌冬十月大冢宰以湖廣按察使員缺聞皇帝曰楚幅員遼巨冠宇內厥民剽輕厥俗獷悍洞庭雲夢大澤間姦宄伏匿竊發責咸委按察使非他方比其慎擇大藩之良以往于是吏部上浙大參李公名詔報可時李公職分守越以東三郡婺實公首治地八邑令長方君輩驟聞公行戀戀如奪怙恃相率走書幣太史氏乞一言太史氏辭弗獲則進幣揚言曰夫諸君亦知聖天子與大冢宰庸李公意乎國家昉古建官外藩自郡縣而諸司無慮十數而獨按察稱外臺外臺吏自清戎督學而諸道亡慮十數而獨按察使稱臺長按察使之職上之則奉行紀法昭聖天子威命爽靈下之則佐兩臺核羣吏禁非剪暴鋤惡刓弊剔蠧環一省之中數什百萬之衆俯首聽命于三尺之牘其權至崇峻亡抗而其任亦至叢巨不易勝也世儒斤斤論治體非寬則嚴按察司獄訟視刑書勢不得越嚴而任寬然咎陶理官也重華之命一則曰惟刑之恤一則曰刑期無刑此曷以稱焉夫務姑息溺長厚其弊也選懦無當或靡稱國家任使而工督責習文深武健暴伉任法寡恩即貪夫墨吏望風解綬大憝元慝屏息于潢池之畔謂培植國家元氣何故夫按察之職寬者體也而嚴者其用也仁以恤矜義以剖鉶內奉無私外秉至明聲色弗動而訟簡刑清百度以貞豈直惟按察一方執此提衡天下易易耳則李公其人哉李公繇名進士起家江右始以御史按楚楚人業家頌而戶祝之既出守吳興備兵海上所歷治行無弗稱天下第一者比分部東越下車之始三郡士民喁喁回視易聽公日坐堂皇夕引賓客糾劾靡事而汙灠鐬心鈎巨弗施而暴猾屏迹耳目罔寄而隴畝隱憂閭閻疾苦洞達于函几之上蓋李公之為治不為小惠而為大德不務小察而務大綱寬而有制嚴而不迫默養寧靜和平之福布于令甲播于謳歌以故聖天子燭照萬里大冢宰衡鑑百執咸以臬事非李公弗勝也夫全楚之任非浙東西比而按察使之重加於藩參顧李公視之曾不足當小鮮何論盤錯李公第行矣躬其化導何逺弗平勵其風猷何氓弗率彼剽輕者將革而歸厚獷悍者將淬而好禮洞庭雲夢湯湯王澤詎惟永絶萑苻之警寧靜和平之福昔被于越之一方今且洽楚之四境矣雖然兹不佞抵掌楚事耳有如聖天子軫念海內晨下尺一書以臯陶舉公以社稷纍公上佐當寧格心之化俾國家刑措不用如成周公之澤庶幾盡究哉則是行也楚實始基之矣賀張明府子環考績敘蓋嘗聞之太上有立德次厥有立功次厥有立言夫三者則德也始基之矣匪託之乎言亡以垂百世永千秋德矣言矣功弗效于行事將德為徒善將言為徒文夫庸詎可以輕重後先論也要以其二在人其一在天適逢而交搆古昔難之以余所覩記若今華川張侯蓋獨操其盛者哉矦家世溫陵溫陵才諝藪窟賢科自奮往往數十百曹而侯尤名能邃于其業戊戌掄魁制義亡弗人人誦者侯自視彌益欿然以趙宋度南幅員僅三之一而大儒崛起閩遂以荒服配魯鄒明德郅隆追蹤三代胡紫陽而後繼作寥寥也則苦行湛思枕籍其遺編而摳趨其故躅凡域中雅言名理者亡論舂糧躡蹻必虛往而集其長復以當今之世士持學術則擯詞章掞詞章亦絀學術是二人者所為皆過也蚤夜皇皇程古匠哲上遡秦中歷漢下訖唐而一稟之乎風雅之優柔謨誥之渾噩蓋侯以眇然一身交負並荷曰德曰言咸足乎已矣乃侯之器亡弗苞材亡弗繕厥功之首試吾得諸華川士民又有更僕未能盡者焉華川婺東岩邑其風朴其俗獷其訟獄繁當嘉隆末造數與島夷角壯者負戈老羸轉徙戶口凋閭閻匱壕隍亭傳曠弛弗營侯下車周覽愴焉而會上所遣中貴人適以采礦至礦議所繇起者婺諸山皆洞空獨華川南麓傳有金銀氣覆其上浙以東俠徒亡賴甘心奇貨久而中貴人銜上命來衆益洶洶將復釀戊午之變侯推几勃然曰何哉彼所謂礦者是倡亂之囮也矧邑瘵若斯默弗言焉用令趣上書當道極陳礦不可啓當罷狀即罷礦有他令以七尺軀當之當道韙侯議力爭之中貴人役中輟四境大歡侯既沮止中貴人則晨起坐堂皇朝吏役而示之政曰訟之繁也匪民之訐也繇聽之失其平也于是開誠布公屏姦燭幽醳滯囹圄一空前此邑中有大獄株連千家侯訊得其情立破械縱之而以反坐坐誣者民志大畏無情之詞噤弗敢吐矣侯則曰未也民之獷也吾且以仁讓師之于是享儒先肅耆舊比邑諸黔首而勞以鄉方朔有期望有會歲有稽不逾時而郊圻之內揖遜藹如侯又曰未也民之朴也吾且以禮樂文之于是隆師傅攬俊髦羅邑諸青矜而劌以藝業日有程月有課季有録不逾時而里社之間絃誦彬如于是諏農隙視公餘發贖鍰振廢墜弊者更之庳者拓之高者培之下者浚之茀者除之溱洧之間久病厲揭大捐俸入鳩工庀材梁成其上萬衆賴焉蓋侯之試邑甫三載而訟息刑清化洽政成百廢具興頌聲沸騰監司徵侯績茂異考上上報銓曹當寧紀侯名姓于御屏之上計日下龍章貤象服顯揚之孝光於四方君子謂侯德立而弗為徒善言立而弗為徒文功立而弗為徒效握三事之全胥不朽之盛垂百世而永千秋若侯者誠瑰邁倜儻振古傑出之士匪有待而興者也不佞跧伏草茆凡郡邑大夫靡敢冒昧通一刺獨于侯欣慕為執鞭而纂述其行事實于中有深締焉敬因二太學之請而首揭其大如此若夫牛刀之割發硎百里而上之而九列而極之而三公皆侯異日所必至惟是侯生平所任之重者與道之逺者弗與存焉即沾沾為華川士民祀要不足以當侯一吷也少室山房集卷八十四
