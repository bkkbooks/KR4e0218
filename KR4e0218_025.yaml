body:
  text: 少室山房集卷二十五明胡應麟撰七言古詩一十五首白紵歌二首葡萄之酒琥珀缸金罍玉斚春茫茫博山爐焚沉水香翠屏朱户羅笙簧援琴鼓瑟流清商洞簫遏雲聲飛揚珠簾不捲凝夜霜千花萬花夾華堂明星爛爛出東方左挾安陵右龍陽美人翠袖嬌紅粧秦城衛女紛成行願君一盼生輝光清歌盈盈繞畫梁夜如何其夜未央黃金為堂白玉椽翠屏珠户羅嬋娟流蘇帳暖春茫然鴛鴦錦被裁合歡明眸皓齒嬌相憐三星煌煌月在天燈長燭明興未闌都梁甲煎焚華軒茱茰蘇合紛纒綿非烟非霧非人間引宫刻羽鳴幽蘭崑崙之觴斗十千美人垂手臨風前回身雜佩何珊珊珊瑚火齊間木難腰圍尺六芙渠鮮驚鴻宛轉飄瓊筵雙成弄玉俱神仙夜如何其夜漫漫行路難六首感事作君不見竿頭鳶乘風浩蕩遊九天君不見棟頭雀百尺憑虛俯寥廓君子雌伏安蓬茒小人雄飛勢揮霍乞哀中夜如鵂鶹志意滿極驚庸流時移事改惡聲播遺臭墦間萬夫唾君不見公孫張儀稱丈夫至今行乞羞庸奴君不見盤中蠅變幻黑白如丹青君不見市中虎利口紛紜捷桴鼓君子推誠洞腹肝小人柴棘橫肺腑讒言交搆四國譁貝錦百匹張雲霞邦家覆敗手足露絶臏刳腸示行路君不見江充舉族無極殱有北陳詩盈簡編君不見帳前蚊侵肌喋肉無時停君不見襟前虱飲血噆膏罔休息君子守道甘困窮小人聚斂恣胸臆溪壑之欲浩無涯狼貪蠶食肥私家禍盈孽滿罹刑辟崑岡火延灰玉石君不見梁冀籍資元載誅黃金滿谷成丘墟君不見波間蜃吞吐樓臺倐千仞君不見巖間蛛四張羅網迷空虛君子行善苦不足小人濟惡才有餘沉機伏弩絆飛走變幻譸張何不有術窮數盡來天刑青冥白晝飛雷霆君不見林甫剖棺檜醜繆千秋永劫昭大戮君不見牆畔蝎猛刺如山蝕金鐵君不見澤畔蛇惡氛湧霧張獰牙君子乘時沛膏澤小人併日行凶邪一朝無處肆鴆毒餘憤憑陵螫草木噬人既盡隂禍延刀鋸鼎鑊快意飱君不見陽由棄市俊臣族天道好還如轉轂君不見海中鱷利齒如山逞凶虐君不見穴中狼巨口如城當道傍君子好生戒苛慝小人毒害盈剛腸積尸纍纍血成塹意氣揚揚了不變神人共憤罪惡盈百骸分裂宇宙腥君不見董卓然臍侯景滅萬古元凶戒車轍圍棋歌贈黃生應魁嘉隆奕者師鮑髯敵手燕臺惟小顔琅琊門下角程李斧柯欲爛天東南四明岑乾出稍後自說髫齡遇神授一時諸子皆偏師何能突過顔鮑右邇來國手歸維揚方生日新最擅場天馬行空絶蹊徑喧啾百鳥鳴鸞凰㑹稽黃生名較晚負局攜家傍天苑蹇驢破帽春明門落落乾坤孰青眼當時奕道頗有聲十年賈勇爭時名一朝神理洞仙著驊騮獨步長安城落子濳思動移日夢入巴卭四仙窟有時大敵交中原往往一枰竟秋夕兵鋒所指無羣雄錚錚劒㦸摩蒼空虛堂棐几對剝啄晴天雨色交長虹猛若重瞳戰巨鹿竒如鄧艾收西蜀槎山通道捷有神斬壁開關恣騰逐即當死地偏用竒背水援桴號令馳俄看赤幟樹高壘股弄強敵如嬰兒倐忽長驅走雷電太白經天助鏖戰全齊陡下七十城雄趙一坑四十萬長安五侯不乏材連雲甲第朱門開高軒駟馬競延致爭先結襪黃金臺黃葉盈庭僕夫卧風雨蕭蕭燭花墮斧柯幾爛局未終不覺晨鐘徹高座唐時供奉誇積薪生豈冢嫡繄後身荒丘仙嫗姑若婦九枰口訣留千春丈人耽奕自蚤歲飛將詞林絶無對茂𢎞五品輸江郎遇爾那能不心醉嗟嗟黃生意氣豪豈徒覆局兼含毫上書無路謁明主狂吟易水風悲號世人沾沾事酒肉高蓋峨冠耀流俗生徒工奕仍工詩老向金華走碌碌黃生黃生歌莫哀三公九列俱塵埃不見東南八萬仞寥天石室青霞開奕罷兩奩收白黑局上虧成總虛擲乘雲且逐胡先生跨鶴鞭龍訪太乙後圍棋歌再贈黃山人隆萬以來攻奕者歙有小吕閩小蔡黃生崛起禹穴中倐忽時名共當代丈人丱角遊長安國手何人不針芥鮑顔二李盧及岑次第攜枰入東岱中原豪傑屈指空晚得方生最稱快方生巧思凌古今游戲神通了無礙永嘉方生並時出名姓俱同劇堪怪少年復有六合王浸浸澠池欲興代黃生善戰尤自負夙昔疆場構吕蔡方生之下三子優叱咤登壇勇莫逮有如孟德肩孫劉鼎足三分建旗蓋碁雖小道實可觀生也精進迥不懈并吞割據𢎞霸圖劫殺侵漁盡變態楸枰落子大勢分先著紛紛布要害吾觀此道與兵合一一為子陳梗槩攻城略地創都邑背水依山列營寨發縱元勛首帷幄指畫竒謀洞蓍蔡援桴擊鼓事征討躍馬橫戈奮驕怠湘東一目寧久長大舜重瞳迄推戴三千牧野行造基百萬昆陽坐奔潰大軍涿鹿平蚩尤孤卒鴻門闖樊噲混一區夏秦有權表裏河山晉無害成臯堅壁控土宇函谷封泥距關隘含枚定陶襲項梁卷甲隂平走鄧艾七縱七擒啓荒服八戰八克定邊塞歲時吳魏爭長江日夜梁唐鬭夾寨乘風帥衆下井陘冒雪濳師抵淮蔡晉陽三版浸難沒即墨殘都守無奈闔閭貪欲甚蛇豕勾踐隂謀桀蜂蠆推鋒白起徑若飛持重亷頗老能耐盧狻李密王世充鷸蚌高歡宇文泰東西並舉騁全力南北中分各兩大氣盈量滿隳成功忿削貪亡示明戒入神入聖窮幽微為虜為王決成敗棋與兵合種種然始作何人世沾溉相傳放勳教丹朱上聖無緣發機械或言戰國尚雄略餘習縱橫此流派丈人髫歲負棋癖錚錚鐵中號亡賴一枰懸榻晝夜攻寢食俱忘減腰帶回光返照念載餘四大部洲任成壞胡來遇爾重作歌見獵渾忘喜心汰下車搏虎衆欣悅拍手其如士林訾尚憶斐旻舞劒時道子揮毫攝千界崔家延伯每臨陳亦藉僧超鼓豪邁雄才絶藝兩間值憐汝求言日瞻拜虛堂灑墨元氣流萬壑寒風度天籟君不見休仁中正蚤已沒待詔師言近誰再仲甫四篇差足存伯祥三路逝安在由來一局塵世空底事妻兒溺貪愛君不見巴卭仙橘大於斗商山四翁樂相待九枰輸我願未酬㑹擘龍肝了餘債他時負局尋先生洞壑金華亂峯外㑹稽黃生奕為過江第一流而詩亦佼佼一日邂逅黃金臺上持卷乞余贈言嗣是亟見亟請今且逾十八載矣顧余卒卒亡寸晷之暇仲冬扁舟北歸楸枰塵積不勝技癢因抽筆為長歌食頃便成餘興勃勃復托拾古今與兵家合者數十百事餖飣兹篇勉之黃生努力精進異日者荒郊仙嫗可亡請益於九枰外矣武林大雪程太學仲凱邀同張總戎黃刺史徐司理錢文學吕山人泛棹湖中泊南岸放歌徒步入龍井汲泉瀹茗延賞至暮乃歸雪花夜半飛三竺萬壑千巖恍如玉新都程生太好事曳杖清晨叩茒屋手持三百青銅錢要我湖頭豁塵目茂先叔度錢及吕斗笠芒鞋恣追逐偉長詩思亦橫發首御肩輿入窮谷觴行到手不暫停鸚鵡鸕鷀互相屬人比竹林差有餘客方蓮社寧不足階前竒石疊層巘洞底流泉吐深麓山僧瀹茗作清供色香味美迥可掬蒲團棐几媚優鉢竹院明窗照薝蔔幽深若與塵世辭昏黑將求上方宿或言獰虎山下過吾意神龍井中伏諸君先發余少留為語平頭免刺促四百八十金銀臺㑹策黎睂入天目錢象先過訪深雪中往報不克短歌柬之武林夜半北風疾雪片垂天大于翼孤山老梅僵欲死跨蹇呼舟漫尋覔東吳錢生住昭慶擁褐高眠送長日吟成字字敵瓊瑤皎若天花墮禪席憶生三月來武林嘯傲西泠事琴奕憐才總稱陸士衡好士亦有徐元直窮愁骨相自古然典盡鸘裘壁徒立沾沾訪我空巷中把贈明璫示親昵風塵勃窣倦奔走咫尺錢塘夢瓢笠朝來策杖擬尋汝泥濘階除沒雙屐美人娟娟隔湖水一望雲山思無極登壇大老儼欲盡藝苑今誰占名籍羡君咳唾饒珠璣下里千夫走辟易文通老朽嘆才盡形穢那能不趨匿醉拈秃管書短章小刺聊當正平擲他年把臂姑蘇臺倘許忘年訂金石仙橘行贈吕生吕生好奕良有年口如懸河決百川憑陵負氣雙眼白强項肯伏公卿前自言勍敵止方蔡三人海內季孟間楚中近有朱氏子黃王以下知無前朅來武林四閲月室中薪盡晨無烟臨安富兒不好事日夜空囊捫酒錢一朝遇我湖水曲脫巾大叫狂呼天先生名姓久嶽立願得片語垂人寰憶乍持刺遠謁我蹇驢薄暮西長安塵埃碌碌不稱意雲萍此地仍周旋試生伎倆果精絶疾風飛雨鳴華軒唐時待詔宋供奉齊梁中正俱流傳胡為終世僅布素江湖老大垂華顛吕生吕生勿復言才高自古多迍邅煌煌國匠抉天巧造物小兒寧汝憐不見先生坐詩癖百憂萬恨攢睂端荒丘姑婦兩竒絶橘中四叟吾忘年他時芒屫㑹挈汝一枰柯爛青霞天湯隂王翁年百八十矣而肌膚綽約若處子且豪飲數斗不酲座間出諸名流贈章邀余繼作王仙翁髮如孤鶴顔如虹大腹便便貯河漢鯨吞鼇吸三千鍾龜紋蹙起隱胸後玉璜炯炯橫雙瞳睂毫耳毫燦霜雪時人不識呼社公步輕履坦疾于箭周行五嶽攜孤笻自言今年百八十九朝舊事盤心胸高談𢎞正儼目睫信陽北地俱兒童大還曾受柱下老素書亦從河上公王母瑤池燕周穆仙源幾度桃花紅崑崙閬風不肯住脫身混迹遊寰中朅來瓢笠武林逍湖光山色聊從容飄然遇我雲水窟謫仙大叫呼人龍初平騎羊去不返子豈有意仍前蹤金盆玉壺亦咫尺翩翩竒骨寧凡庸感君意氣為君歌參差兩腋乘長風却憶玉皇香案側丹臺恍惚曾相逢塵埃墮落經幾劫欲騎鯨背飛寒空大鵬希有儼相值遨遊八極追鴻䝉他時再赴易遷約仰天大笑扶桑東少室山房集卷二十五
