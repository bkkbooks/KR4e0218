body:
  text: 少室山房集卷八十七明胡應麟撰傳三首中丞滕先生傳中丞滕先生者名伯輪字載道閩之建安人也六世祖禮部郎中員殉難土木祀學宫員生𢎞恩𢎞恩生彝彝生海州别駕澍是為先生王父澍生贈禮部主事鶴齡即先生父也娶封安人陳氏以嘉靖丙戌冬季誕先生先一夕陳太安人夢日輪浮海起幔亭亭亭如車蓋一金紫偉丈夫拱立睨其傍厥明先生誕維肖贈公悅爰命以今名先生警穎殊絶髫鬌受經目常數行下弱冠補邑弟子員時贈公已前貢鄉書凡五與計偕始謁選得南安倅蒞任殁于官先生匍匐奔赴號慟感路人贈公吏潔廉先生扶櫬歸家壁立瓶粟弗繼先生恆晏如益發憤下帷濳心神聖大業自洙泗洛閩下逮新會新建諸家言無所不洞極而期于彌綸康濟沛澤黔黎當是時先生身未離黌序已隱然負天下望矣會大司空萬安朱公來督學朱公倫鑒高一代得先生制義大奇之曰是將為異日儒宗亟拔多士右乙卯秋試果掄魁壬戌第進士以甲次出宰番禺適潢池㺯兵勢張甚先生橫身排決築外城以捍寇縮浮費三萬餘緡盜野無所資羣就縛于是兩臺使交疏褒薦以上考遷秩禮部郎番禺故南海劇地明珠文犀充斤先生束裝度嶺行槖僅梅花數枝宰司廉知狀趣超改先生文選先生持公壁立苞苴肅淸久之政府權貴人多不悅者乘先生移疾歸即家拜貴州按察副使先生奮然曰昔尼父欲居九夷矧今貴竹匪唐漢三苗夜郎彼耽耽奚能難我立就道俄今皇帝御極榱棟一新冀得耆宿鴻儒挽文風以回世道僉謂微先生莫可遂仍故秩督學校浙東西浙人才炳烺霸天下頃年奇邪溢濫有識隱憂先生下車申約束樹章程叛道離經雖才必黜自餘纎長曲善藻鏡靡遺是秋鄉貢士畢出先生門亡一闌入者明年大合浙東西不及貢髦士三百有奇捐俸入餼之會城而躬謁臺使者蕭公萬公示以天人性命之奧時時課其藝業殿最之間拔文之尤雅者為録若陸太史可教鍾太常化民朱省元用光蔡茂才大節悉矯矯著稱場屋後先馳驟宦籍亡慮百餘曹談者以先生振勵陶鎔師模冠絶明興二百年所未覩也先生聲動大廷旦夕翺翔九卿列屬臺使某欲賈人子補諸生檄先生按令甲先生申報幸門久塞不宜啓某恚揭蜚語中先生僅敘遷浙藩右參政先生雖職司會計而浙諸髦士競從之如雲先生提攜誨諭視督學時無少倦謗俄白擢嶺南按察使番禺老稚襁負拜瞻壅閼道路先生至則以政暇登羅浮絶顛觀日出方丈扶桑探勾漏良常朱明所在窮其勝紀以詩歌羅旁凱旋先生贊畫機宜功第一幕府奏聞優詔錫金帛遷右布政浙中故事右轄第雍容間局先生勵精任職蚤夜弗遑鎮巡見以為越俎庚辰入計言官遂希旨齮齕先生先生慷慨投牒歸􅚃關謝絶一切例豫告卿士大夫有司歲月給輿皂先生願言麾去幅巾杖履徜徉七臺九曲間里中歸宗巖林莽翳鬱先生廬其下默照靜觀飄飄有塵芥六合想守相達官屏干旄踵戶閾先生為弗聞也者亡論姻婭乞援即親子弟郡邑試未嘗寸牘入公門鄉鄰為不善聞先生風素相率化人以司馬端明在洛不啻也先生屏居岩穴僅六載七閩以南童孺走卒亡弗寤寐先生而冀其大用監司推轂章十數上先生卧益堅既而朝命敦迫其使者冠蓋屬道途先生強起補粵中右布政河工訖超南都察院右僉都御史閲江防先生殫心擘畫條便宜八事上之上嘉納趣命以右副都御史填浙中先生之吏浙凡三政教而且富氓庶帡冒若二天兹復秉鉞一方山川草木色飛相慶先生亦惓惓過化視官維家嚴冬颶風起瀕海堤堰衝決極望無人煙先生多方賑恤民倚賴全活無算諸惡少白晝剽善良法其尤不逞者而反覆示羣黨豫以維新悉解散浙自辛壬間載被兵居人岌岌先生軒輶蒞止萬衆帖然黃門章君尚學特疏方諸古社稷重臣人謂無愧色上方且大用先生而先生胎稚苦痰疾歲壯漸增比填浙復當多故日夜拊循其民人以事煩食少屢陳疏乞骸骨上溫旨勉留有謀猷宏博志慮忠純等諭先生彌感勵蘄盡瘁答主恩因犯顏力疏改折漕綱停減織造等六事上一一報可巳丑春先生督材官防汛海上渡錢塘疾大作忽夜偵島夷盛集餘皇犯內地先生投袂起部勒諸將奮擊大破之馘首虜數百計餘醜魄奪絶流遁而先生神慮耗竭疾深入腠理不可為矣凱旋省僚屬迓于郊覩先生顏色異常日先生猶疇咨民事刺刺不休時暮春望後十日也越五日集諸藩臬諸司拱手逝片語不及私事聞上嗟悼贈先生兵部右侍郎無何科臣以海洋功上特旨賜祭及葬既撫臣復以海塘功上事下大司空曾公同亨曾公具疏先生勛伐勤勞宜加恤朝廷是其議豫一子入成均制三品未滿考無乞恩請廕例即祭葬僅半給惟先生全得之異數也先生修七尺有餘而軀幹魁岸長髯拂膺望而知為巨公長者自丱歲研精太上嘉隆儒碩羅公汝芳陸公光祖許公孚逺孫公應鼇洎家大人輩盛推轂先生為任道之器其在北觀工部政則豐城雷公禮主吏部事則蒲坂楊公博並以纍朝勳舊折輩行諏時務于先生至開府留都海忠介公瑞尤稱莫逆人以兩公剛方毅重其意氣實相契云先生故以立德立功為上節而兼收互畜時逮詞章大司寇弇州王公左司馬新都汪公文名震曜慶厯間先生恆樂道其長未嘗蓋之以學業即不佞應麟雕蟲末技無足厠先生下走先生一見遽賓之上座授以前茒既而忘分忘形所為卵翼撫摩不遺餘力蓋應麟之辱知先生埒于生成怙恃古所稱國士無雙風斯為下矣維是應麟忝竊門牆餘三十載而碌碌塵埃靡尺寸仰酬大造敬掎托先生行履之槩俟異日傳名臣者萬一考焉林茂才傳林茂才者名巽字健伯錢塘忠清里人也父曰林仲公受母劉先仲公卒繼潘孺人仲公繇積著起家鏹萬計中年未有嗣夫婦以為憂吉月輒禱祠高禖嘉靖庚戌秋仲公夢神人介而金胄坐堂皇呼曰而知而之季婦娠且佹育乎所育非季子而子也仲公寤持潘臂流涕果爾者吾其鄧攸氏矣潘力贊神言聽之吉因趣仲公往視則季公婦已前卧卒聞叩戶聲心動遂以厥明生茂才茂才生有奇表仲公耳其啼曰英物也林氏宗非是莫亢立取金錢繡褓數事授季公疇昔之夜神人者業以而子命余矣季唯仲氏欲之即微神人敢辭命明年仲公寢疾且亟遍召宗人申前諾見茂才于先廟而命之名罄籍所藏鏹二萬七千屬季公牛羊倉廩室廬稱是期他日嗣子壯則按籍以歸又為教貽茂才屬以母潘洎媵人愛女甚悉季公奉茂才拜受教櫝而藏之仲公目遂瞑茂才幼警穎異凡兒五齡授章句孰中占對多奇捷九齡習經書義篝燈丙夜大寒暑風雪以為常二十補邑諸生試高等尋受餼學宫凡後先黌序十餘年校藝自監司下逮廣文亡不褎然冠同列然至大期率不利茂才喟然曰以吾下帷之勤即三事可翹足待而邅蹶一第乃爾天乎詎可以人力爭也因稍稍罷占俾以菽水娛二親先是季公緣茂才受仲産徒手一朝賫槖巨萬數中不能無侈心既子女彌益衆嫁娶繁殷方士羽流競從所好為姦利駸駸漏初籍過半會歸槖且及期季公熟計無所出則呼茂才謂曰余年邁而往矣爾方壯任産顧而父遺籍在罄兄弟資弗能償奈何茂才泣數行下曰大人休矣兒一身毛髮皆稟之大人金于奚有大人第以輕資畀兒往母即推遺籍兒以不肖身任之季公大悅悉索餘鏹五千緡畀茂才歸母潘得茂才果歡甚既而亟訊故父遺安在茂才謝有之己長跪前説曰先大人之以厚資遺兒也亡他上而蒸嘗下而甘毳世世毋失墜也兒誠不肖仰藉先大人寵靈厠姓名多士末行博一命用冠帔榮二親蒸嘗甘毳固餘事矧金帛倘來物庸暇較多寡有無母潘異其言而未能驟信欲試以諸艱因屏居一室諸仲公所存器物錙銖加扃鑰而獨以門戶委茂才茂才謂室人沈曰吾母之為是也厄我耶嘗我耶玉而成我耶吾聞之龍泉太阿非盤錯固無以自見即踴躍前受事凡經費委輸徭役倚辦宗戚問餽亡弗砉然中肻窽人以仲公且不亡而仰事母潘於子職尤兢兢及仲公所遺諸眷屬多方體恤無使有纎芥後言蓋母潘久之遂忘茂才之非已出曩季公所乾沒置之恬然矣茂才雖以身後仲公而愛慕所生怙恃不少替弱冠母沈病癎茂才晨夕親湯藥娶婦僅再宿即率之左右病姑殁痛服緣禮降為心喪三載季公晚而瘵寄息帷床茂才扶飲膳掖寢溲委身巫祝亡虛日病革哀毁逾篤至竟以一慟弗能興未屬纊前一日猶自力拜母潘曰兒不孝事吾母弗獲始終惟吾母一委之天命遺令室人沈以婉嫟承姑歡子際春以端慤成父志遂卒得年僅三十八云茂才內行固甚修其外與人交尤慷慨尚義俠始餼學宫念受業師某貧推廩食之終身不奉一鐶入他姻族多賴以舉火婚者周以財居者授以室葬者給以地應接不暇中閨簪珥脫繼之其卒也里中亡問識不識咸咨嗟扼腕或號慟至失聲當茂才齒盛氣盈視青紫不翅槖中物既屢試弗效恆邑邑寡娛中陳力母潘屬季公槖垂之候拮據匍匐艱阻備嘗幸家庭亡間謫而會所生怙恃相繼湮迄捐驅以成孝雖天年蚤終志業鬱而未暢于為人後之誼兩無負矣世鋭言古今人弗相及以茂才躬所蹈槩之傳記所艷稱庸多讓也茂才娶婦沈先後事二姑具閫德子際春俊朗嗜學以儒術世其家胡先生曰當健伯周旋二尊間戛戛乎難哉潘母躬抱撫無異屬毛季公托孤矣令按籍索遺資當潘母心謂窘季公何即不難傾槖奉所生而潘也堅持成命季公其奚詞解焉陽委順以適潘而陰輸悃以遂季遺資旁落庭亡譴訶卒之令潘也忘其贏而季也忘其詘媺哉孝思之格彼神人之預啓仲公弗虛也至捐廩廩師然諾緩急此其人詎晚近世偃有哉身雖困閭門弗彰所為貽穀後昆者繩繩乎未艾矣貞慧唐母傳貞慧唐母者祝氏邑太平里人也世為望族王父比部公以制科顯父光祿君修頽然長者而特善居積起家巨萬稱素封母生而令淑端穎異凡孩始笄字唐太學廷倬即宫保文襄公諸孫而宫諭思濟先生冢嗣也為人豁達無城府町畦母年十八嬪于唐筐篚資送千計太學一不問悉閫以內政授之族中率易母年少驟而當盤錯非任母受事綜理擘畫咸井井中規晨昏服勞大者姑嫜儕者妯娌微者娣姪亡弗厭其意人人以宫諭公有賢冢婦云而太學亦用是佳公子稱藉藉太學雖生長膏粱然恬于世味獨雅好與歡伯遊而量故洪甚既得母亡復內顧念益發舒高會平原河朔間一飲濡首旬月母大以為憂恆多方譬諫至涕泣下沾襟太學心善之而未能用竟坐是得沈痼疾母躬視湯藥掖寢興衣帶不解百晝夜卒不起母號慟籲天佹以身殉地下顧遺孩宗本呱呱彌月也翻然曰是藐焉者唐氏宗百代攸係吾奈何輕一死因稍稍進饘粥為撫育後人計杜門蓬垢絶膏沐稱未亡一切人間世紛華靡麗屏去耳目寒燈夜霜形影相抱起居寤寐惟唐氏一線是圖唐自文襄登八座宫諭大魁禁庭閥閲高華冠宇縣已太學早世未幾宫諭繼之未幾兩姑又繼之胤嗣單危僮奴背叛園田室廬蕪穢弗治姻黨比鄰之豪黠者往往持兩端觀望成敗當是時即健男子未易支乃母以煢煢一嫠含辛茹荼介以禔躬強以勵志勤以率下儉以治生爬搔拮據四十餘載若史遷所記丹穴婦清自衛以財人莫敢犯間推其餘潤以霑溉困窮俾太宰太常之緒已僨復興垂斬復續秋毫皆母力也今母行年六十而宗本服膺慈訓踵躅前修祖父家聲浸假光大且育丈夫子二人矣于是邑黌士李生惟聰等羣上事督學使者曰竊見故太學生唐廷倬妻祝氏逾笄而嫁閲歲而孀弱息露珠高堂風燭而祝柏舟自誓之死靡他共子職于婦儀抗師模于姆教逮今年逾五紀行矢一貞里閭觀刑鄉邦慕頌願亟加崇奬以勵風猷使者下其事郡邑人無間言因棹楔閭左且具列始終將以次上聞當寧乃是月七日適屆母懸帨之辰宗本率其婦子戲彩稱觴羅拜膝下母含飴弄孫意蘧蘧適也已潸然大息曰鄉者而父之殁吾業已蓬垢稱未亡所不從遊地下徒以而未立故賴天之靈而既室既後而父逝不復返吾胡以獨樂為宗本默默不自得則紹介郭生來謁九頓首請曰不肖孤匪母亡以有今日繄豈惟不肖孤先太宰太常之脈胥賴母以延以母含辛茹荼勞苦百倍本也卒亡能報稱萬一惟是徼惠大君子片言庶幾當華衮之錫先生幸卒寵施之余時方逃謝筆研乃余廬去母居僅僅數十武母生平行誼皆余所夙習見聞且也家大人國士文襄而余及宫諭門忝忘年小友之目于太學固奕葉通家也以母之大節凜然不欺其意即微宗本力請之且揭其高節以風示海內矧郭生之代請尤力也余安能以筆研辭作貞慧唐母傳少室山房集卷八十七
