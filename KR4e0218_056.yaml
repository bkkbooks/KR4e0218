body:
  text: 少室山房集卷五十六明胡應麟撰七言律詩七十四首夀貞吉王孫太夫人七秩并寄芾斯孔暘婺女寒芒接豫章天孫雲錦落持觴金芝百本來西極玉樹三株耀北堂紫鳯夜含靈笈舞蒼虬晨逐素書翔窺簾敢作偷桃客願借天厨一臠嘗題希夷髙臥圖奉夀郭泰和封翁大參知相奎尊人也時年七秩躡蹻罡風度十洲一笻長嘯華山頭神遊欲盡三千界夢斷俄驚八百秋絳闕徴書回紫鳯圖南表文丹臺靈笈駐青牛函谷華山密邇龍光忽照匡廬下重遣蒲輪出帝州夀舒封翁七秩二首夀域晴開傍海隅安期雙舄漸凌虛秋明南極三天上夜燕西池萬里餘鶴算定知同綺皓扁舟寧假問陶朱虛疑卓氏臨邛盛次第黃封照里閭青雀西來瑞氣濃方塘秋色照芙蓉華陽是處傳丹籙渭水何人敵素封桂樹階庭巢六鶴棣華天闕近雙龍翩翩叔寶今華髮尚記東床臥日容題趙汝元白雲莊岧嶤飛磴入林丘天際遙看瀫水流青壁秪疑人世斷白雲何羡帝鄉遊茆簷上月千花瞑草閣吟風萬樹秋聞道生徒多受業蓼莪篇廢定誰酬顔廷愈過訪有贈時廷愈將之都下因寄諸友片帆風雨泊孤城一刺龍門曳履迎閥閲平原推世德詩篇光祿擅才名風期乍擁衰顔壯雪色頻扶病眼明多謝酒人燕市上竹林吾已負生平贈宋化卿草載錢塘悵獨遊風塵何意片言酬嚴城畫角雙鴻下客舍清燈駟馬留賦就幾人春雪和篇成何處夜珠投明朝爛漫湖頭約十里桃花照畫樓送蘇君禹觀察之嶺右八首握手衡門思欲狂相逢如夢在河梁三年素札咸陽斷十日青尊瀫水長絶塞風雲懸馬首大荒岐路出羊腸因君一問龍標尉明月梅花遍夜郎青蓮詩我寄愁心與明月隨風直到夜郎西嶺右與接壤故云極目遐荒共黯然蒼梧何處問樓船天窮象郡千峰外地隱龍城六洞前飛詔金門頻計日傳書銅柱易經年無勞更閲河東記海色黃溪晝夜懸桂林隱山有六洞見吳武陵記黃溪詳子厚文萬里襜帷涉瘴氛炎州風物向來聞羅池翠羽多充賦林邑鮫珠競購文豆蔲飛花園似雪桄榔垂葉路如雲伏波祠廟經行處一奠椒漿桂水濵腰下雙懸玉鹿盧拂天雄劒倚昆吾褰帷霧洗三苗窟露冕霜飛百粵途荔子尚祠遷客否蕉花能憶美人無七星岩畔題詩過羡殺朱幡在畫圖韓詩荔子丹兮蕉黃見羅池廟碑閩中有美人蕉故頸聨云錦席孤飛散曙鴉如椽雙筆氣凌霞遐荒詞賦傳中國絶徼文章配大家灕水瘴雲行駐節鬱林竒石坐當衙紅潮醉頰檳榔熟努力朝餐望裡加文章謂栁州也萬山行盡見牂牁處處椰漿酌叵羅赤日猩鼯啼古洞青天龍蜃出層波風生羽節炎威靜露洗牙旗瘴色和好作刺桐花下客細吹蘆笛聽夷歌雙旌行色暮蕭蕭天地西南問泬寥姓字始興懸竹帛功名新息樹銅標藤江水溢青蘿近荔峪嵐深翠障遙珍重大廷思綵筆看君六翮上層霄昌黎送人之嶺右云江作青羅帶山如碧玉簮煥爛新除下玉宸聊從殊域試經綸傳書己見回周史諭檄能無待漢臣夜月三花流皂蓋朝霞八桂上朱輪玄亭咫尺堪誰守一盼東陽問字人君禹自關中返登嵩嶽賦詩寄余尾句謂李生允達嘗受知也戊子之秋與君禹督學晤武林時方病瘧僅僅數語别去己丑春余自夏村歸適君禹擢關中前發閲月矣秦越茫然邈不聞問比余居先宜人憂夜分車騎過從則君禹再擢嶺右中途不通一刺特為余艤棹蘭隂感舊論心達旦忘寐申言餞别成詩八章嶺右山川秀甲宇內君禹兹行神與俱往矣夜泊金閶寄奠王敬美先生八首有序不佞丱歲遊燕則次公以年家見知凡竿牘下詢家君齒及不佞亡慮十數顧不佞未嘗識面也丙子秋次公以參知赴江右過訪蘭隂邂逅蓬茆片語投合杯酒揚扢形骸頓忘爾後不佞拏舟閶闔者四次公停車瀫水者三每一把臂輒潦倒淋漓濡首乃别比次公入南都不聞問幾半載詢諸吳中則報次公逝矣是秋北上極意酹酒婁江少致國士之感適病中憒憒不及遄赴爰賦七言八律以代奠章明時何客並登壇宇宙文章屬二難大海雲霞麟鳯出鳯麟洲在海中中途風雨鶺鴒寒三天謁帝更容鬢八極遊神快羽翰不逺桃花瑶水上飛書無路問青鸞白面含香上紫宸前身曾是石麒麟天容作賦遊關洛公有洛紀遊諸稿帝遣傳經到越閩次公嘗督學二方飛蓋西園饒和客曳裾南國盡才人重來欲話當年事落日山陽笛滿鄰飛詔頻年下赤霄故園薇蕨興偏饒高風突兀回三代大業熒煌擅九朝禮樂夔龍元事舜敬美為禮官有蘭省等集耕耘巢許亦逃堯所居草堂名淡圃有田可耕莫言遺冢臯橋畔千古人傳玉樹標仙遊何處白雲鄉絳節飄颻上帝傍五葉世傳中令貴三朝誰識次公狂丹青永夜悲前席絲竹頻年醉後堂茗碗酒鎗渾似昨不堪重過緑蘿莊環珮當年碣石臺一時才子盛追陪鐙懸太乙人初聚漏盡長楊客未回楚澤悲風迷屈宋梁園殘雪散鄒枚龍門咫尺無窮恨誰共登樓賦七哀年才四十五遊成昏嫁何須畢尚平泰華兩登天地小嵩衡齊躡斗牛驚九疑峰憶帆前墮三疊泉猶杖底鳴瓢笠王郎今在否朝騎鸞鶴上瑶京次公於名山惟北嶽未登餘四嶽外太和匡廬武夷皆杖履所歷具名山遊記中抗手吳門歲月除三年秋色斷鱸魚清江一曲題詩外大海千峰入夢餘紫氣尚懸朱雀桁丹霞長擁白牛車何因一問梯仙道並捧金璫拜玉除短褐長安記昔遊忘年傾蓋見君侯淮隂敢竊無雙譽江左元推第一流吟盡白雲鳷鵲觀坐殘紅日鳯皇樓蕭條往事空華髮落木凄風遍海頭賦八詩後鄙懷不能己巳伏枕呻吟再成八律共前什計十六章輒命使者焚之几筵次公有靈當為我擊節三神之頂浮一大白也中年真訣至人傳晚歲仍參佛祖禪夜雪尚疑中嶽頂朝霞俄赴大羅前黃金闕近雙龍駐白玉樓高萬象懸為問仙都題記者幾家詞筆並如椽才名伯仲世爭竒並握隋和照海湄大野正看儀鳯日荒郊俄遇泣麟時惟應翰墨留千載盛有文章落四夷燁燁雞林傳賞遍懸金寧俟國門知作賦東南見大夫平將彩筆擅菰蘆青襟問字環三省白幘傳詩盡五湖遼海客歸應化鶴緱山人去定飛鳬天瓢萬斛金莖滿肯憶黃公舊酒罏綽約仙山大海東神人何事暫乘風裁花已見潘安似擲果將無衛玠同入座朝霞明逺岫披襟寒月挂長空屋梁此夜看顔色猶作當時夢寐中紫綬金章白玉珂風流誰奈使君何文雄剩欲誇天寶句好寧甘壓永和大斗十千傾緑蟻崇臺二八貯青蛾名園一别空回首滿眼霜稜折芰荷宿世含毫自右軍池頭秋色照鵝羣吳中驟貴烏絲紙海內爭傳白練裙片石嵳峩枯樹賦次公家有禇河南枯樹賦刻石千金零落送梨文次公入覲都下有以大今送梨帖來售即傾五十金易之才七字云空餘太極臺前榜大筆高懸駐彩雲三年移疾住吳閶不改清齋舊太常豈謂龍蛇能作讖坐令鴻雁不成行遊同兜率非天姥秩主遮須勝夜郎猶憶向來尊酒興亂山風雪灞橋傍總角攜書到上林華筵何處不招尋淮南桂樹枝枝賦薊北梅花片片吟斜日劒鋒雙黯淡暮年書札半浮沉鍾期一去絃堪絶碎折床頭叔夜琴張仲立過訪舟中邀集新居奉贈二律修竹千竿蔽草廬蓬蒿一徑共躊躇囊傾記室三都外張景陽注左三都賦架插司空萬卷餘茂苑祥光回鸑鷟吳門秋色到鱸魚他年孝友知侯在底用尋源上玉除其二是日適與仲立棊故用張玄事青錢并鸑鷟並文成事浮家志和事青錢萬選世誰倫金鏡千秋動紫宸三篋當年窮宇宙七車遙夜辨星辰枰空淝水知無敵劒合延津自有神倘許孝廉船上約浮家何惜去來頻仲立博核羣書二詩每篇八句用一張氏事存之以備此體贈幼文幼文丁氏逸季侍童也常置帳中余從諸客徂伺得之賞其丰神瑩徹為賦二首入幕何來傅粉郎居然容色似龍陽書裙是日逢王令大令為羊欣書白練時欣方幼斷袖當年憶漢皇曲裡含桃歌韎韐車前名果擲琳琅異時開府能相過莫遣才人坐别床庚信事見北史秋水為神隔絳紗何年捧劒入王家床頭夢有金莖露庭後春生玉樹花才比郤郎偏有意色同彌子更無瑕他時倩汝汾陽宅飛挾紅綃上太霞捧劒見唐小説為房仲贈姬人時齋素獨居一室盡拋鉛粉著袈裟長日焚香誦法華不學楊枝辭白傅暫同桃葉住王家臺深㺯玉鸞簫斷殿鎖飛瓊鶴馭遐自是蓮花離火宅子猷狂興為誰賖答贈戚山人不磷不磷工繪事及詩寓逸季所飄然孤鶴下玄關十日高陽共破顔白苧霜華婁子國青繒雲色敬亭山囊中毛遂人爭識廡下梁鴻客未還慙愧五君勞入頌風塵吾已鬢毛斑戚投余詩有見説五君無爾敵之句贈王孟嘉弇州公從孫也弇山堂下一逢君玉樹翩翩自不羣馬埒謾呼狂武子龍山寧學醉參軍朱絃暫習南風操玉劒行衝北斗文最憶竹林深夜語亂星􅋊月坐宵分夀王公詹七秩琅琊門第舊稱雄握手翩翩大令風函谷雲霞新紫氣燕臺日月舊青宫竹枝賦就徴才子桃葉歌成教短童聞道瑶池開燕日萬花如繡簇簾櫳再挽王長公二十首有序余既為長公挽章二百四十韻矣顧鄙懷猶有未釋然者憶曩哭次公賦七言律十六章長公讀之數過因戲謂古今哀挽之什至子多乎哉第辭竭思枯即異時吾不諱何以措手余亦戲答方公為魯靈光砥柱百世僕以朝菌觀大椿雖欲有言得乎長公目余一笑耳音泠泠誠不意鸞驂鶴馭倐忽升於大羅也追惟宿諾勉爾含毫呻吟一夕成二十章於乎伯牙絃絶江淹才盡余此後亦永謝筆研矣絳節初升上帝朝清都何處問岧嶤龍歸大壑乾坤暮鳯返高岡日月遙文字八荒傳衮冕詩篇六合誦簫韶莫言名世期終在永劫人才付寂寥遙夜青鸞帝闕來驟看黃鶴向蓬萊三車詎載平生業八斗難名間世才心折班揚愁搦管汗流枚馬避登臺風流咫尺人寰盡慟絶琅琊玉樹摧萬象文光燭海湄蚤聞名姓動華夷雄飛宇宙三千劫獨應貞元五百期龍去南陽高士逺麟歸東路哲人遲生芻泣奠婁江下不為楊朱感路岐一謫長庚茂苑前紅光白日照奎躔詞華盡挈三唐調文管兼操十代權夷貊盡傳鸚鵡賦兒童能誦鷓鴣篇亦知上帝頻前席白玉樓中萬景懸長公有鸚鵡賦鷓鴣詩並見集中故借禰衡鄭谷事四部書成興未窮名山隨處勒崆洞開函再覩三墳出列架渾疑二藏同大業龍門卑馬史竒文虎觀陋揚雄平生謬作談玄客寂莫侯芭鬢已蓬三十年來上將壇平將赤幟樹狂瀾山頺泰岱千峰失海涸崑崙萬谷殘素旐翩躚來大鳥丹臺遊戲挾飛鸞便應瓢笠相尋去靈藥何由借羽翰躡履頻年到海涯青童環珮結飛霞毫端巨壑翻雲夢研底春濤漲若耶庚子日斜驚鵩鳥戊辰年逺怪龍蛇慿誰更發山隂興腸斷王猷一棹遐公有戊辰三郡稿弱冠中原結駟行朝陽爭覩鳯皇鳴朱絃萬古回長夜彩筆三朝擅大名座上雪花凌楚澤壚頭虹色貫秦城為知兜率迎新帝不向遮須問舊盟粲爛雙鉤倚鹿盧人倫一代擅風胡刪詩秩繼周司寇作賦名高楚大夫閥閲五朝傳父老門墻四海見生徒尋仙政有青蓮癖日候長鯨返太湖三篋曽誇暗誦能七車今代幾同乘金泥籙辨神仙窟玉鑑文窺帝子陵海上專車無巨骨山中著械有竒形干將一夜飛雷煥服匿何年問陸沉讀巵言附録作用張寬安世嵇康江淹防風二負等八事十載玄關閉緑蘿一朝禪榻蛻維摩金棺掣電飛西竺玉舄摶風上大羅丹闕授書偕素女絳臺摛藻侍皇娥青天度索山頭望試問桃花發幾何皇娥歌見拾遺記七雋翩翩聚紫宸陳思才調擬誰倫華陽館內飛談日碣石宫前鬪賦晨白璧千秋無大楚黃金一字有先秦參差王氣東南歇悵望遙天絶後塵奕葉瓊枝照錦袍何人不羡二王豪爭傳一帖辭中令忽報孤琴逝馬曹大地驊騮紛蹀躞中天麟鳯並遊遨雲漿萬斛西池上好憶金華濺露桃雙旌曽駐白公堤夾岸桃花送馬蹄大筆今懸婁水上高門元峙越臺西兩高岩壑爭竒句三竺雲嵐護舊題陳迹諸王何處問亂山嚴瀨夕陽低婁江之王實吾越睦州分水自國初徙吳今尚同譜系云棘闈綿上舊躊躇彩筆寧論晉問如汾水真儒羅上第晉陽精甲候前除千峰曙日褰帷外百谷晴嵐眺望餘翹首太行雲霧色幾回梁國為停輿長公庚午校士山西程式咸出其手尋以內艱歸一疏東南臥草亭自將遊屐臥沉冥丹霞蔽日攀林屋白露橫天泛洞庭甪里攜家迷故迹靈威入穴辨遺銘泠然一夢乘風去悵望吳峰立翠屏長公有陽羡洞庭諸遊稿尚思斧鉞駐鄖關開府中丞節制間萬馬不嘶雲夢澤孤鴻時達洞庭灣用栁毅事長公嘗開府鄖陽云朱絃夜和湘靈瑟白苧秋紉漢女環極目招魂勞楚夢三閭能復戀人寰白門花月漫撩吟可奈蒲輪歷歲尋一曲五湖頻入夢三生八座詎縈心風摧玉軫高山絶露掩金刀大壑沉信有騎曹清癖在仇池新竹漸成林臺殿金銀挂夕陽婁江百畝暫徜徉全收五嶽壺天內别起三山陸海旁堂上涼風生緑野亭前竒石護滄浪弇園有涼風堂蘇子美滄浪亭在吳門僅百里祗今誰主花溪宅萬朵芙蕖泣露房短髮飄蕭大海頭登龍曾是昔年遊長裾晚曳三千隊彩袖朝傾十二樓字挾風雲心未老名懸日月望難酬無勞動色真長問已盡人間第一流長公舊贈余詩云一字風雲爭吐氣千秋日月破藏名又云代興天地有詞壇國士誰能不讓韓俱非余所敢任云抵新安訪汪司馬伯玉八首疊浪奔流大壑摧龍門咫尺擬蓬萊三千界逈乘風入四百灘長挂雪來隘地黃山無俗轍中天白嶽有仙臺躋攀一快平生目肯作咸陽十日回匣底青萍煥陸離酬知今日愧前期三朝詞賦羣公盡一代文章大老遺宇內高名譁北斗壚頭陳迹悵南皮關情最是婁江色萬樹桃花落海湄紫氣新都間白雲關前晴色望絪緼誰家片碣無題字到處名山候勒文亭倚太玄空八代囊攜副墨象三墳何言吉甫偏能頌手繫樓蘭粵水濆當年橫槊氣如虹戰血猶殷大海紅七澤戈鋋移小隊三河鐃吹候元戎營中賦客袁宏俊幕下詩流杜甫雄拂袖麒麟成往事亂山雲色臥空同十載東山挂夢魂歸從西竺問乾坤孤悰自寄函三室大法遙探不二門香積飯僧忘歲月菩提參佛悟晨昏猶餘慧業差縈念尺寸毫端萬古論藝苑宗盟四十年暮途真契少林禪雲扶砥柱千秋壯日揭靈光萬古懸虎帳韜鈐聊偃息雞林詞筆競流傳無論片諾登龍易大雅堂深列管絃司馬有傳竒四卷名大雅堂集世方盛行當年懷刺出菰蘆傾蓋錢塘月滿途綺席衣冠連北海畫船簫鼓出西湖熒皇麗句懸金剎爛漫清歌送玉壺雙劍只今猶賦草擅場能憶禰生無五子當年迹已陳竹林攜手重傷神齊驅碣石無先輩學步邯鄲愧後塵海內誰當司馬客山中今見牧羊人惟應乞取朝元訣坐嘯天都望玉宸抵太函適汪司馬赴許將軍泛舟余遂為不速之客座中分賦暖日暄風照畫船茂林修竹聚羣賢雙旌乍識元戎隊片刺欣同上客筵邂逅洪都無彩筆賡酬郢國盡朱絃歸來更下函中榻千樹梅花伴獨眠司馬公邀同謝少亷吳太寧集函中萬山回合太玄亭五夜雄談入杳冥繞座春風凌白苧當筵牛斗落青萍抽毫客似登梁苑張樂人疑在洞庭醉擁如花明月下路岐何用嘆飄零是夕遂宿太函金碧簷楹護翠嵐鬱蔥雲霧繞東南頻年司馬懸高榻此夕元龍臥太函古檜飛霜盤絶壑踈梅翹雪點空潭水晶簾外千家月細酌天池佐夜談董使君過訪賦贈二首朱顔攜策赴長楊笑揖花驄大道傍赫燁封章馳紫殿飛揚名譽出黃堂新都日月三天近夢澤雲煙一水長回首竹林成舊迹壚頭猶記阿咸狂天人三策向來傳萬室爭誇太守賢夢繞花驄長樂外風行竹馬大鄣前朱樓畫閣灘聲近紫殿琳宫嶽色懸爛漫黃金雙闕下蚤攜繁露入甘泉送汪象武之南都祖帳天都樹色重懸腰長鋏動芙蓉遊梁上客傳司馬入洛羣英艷士龍五夜桃花朱桁落三春楊栁白門逢飛鴻咫尺平安報奕葉泥金瑞氣濃象武汪先生仲子故有司馬士龍之句少室山房集卷五十六
