body:
  text: 少室山房集卷十明胡應麟撰樂府七十四首塞上曲八首白草連天大漠秋千家鐃吹古梁州飛霜為洗燕然石上客新從定逺侯紫電花驄白玉鞭逺從都護出居延清秋不辨龍城色一片黃雲瀚海前接天烽火照平盧乍夜單于獵上都十萬征人明月裡一時齊挽繡蝥弧絶磧霜飛塞草空燕支晴色亂雲中將軍醉擁吳鈎出萬里霜天照白虹冢上明妃草色青征人立馬問龍庭西風片月秦城下愁絶胡笳幾處聽平沙一望隴雲開玉笛飛聲夜轉哀萬里朔風吹不斷梅花齊落李陵臺戰馬驕騰大漠間遙看敵騎薄陰山橫戈不待嫖姚令靜掃邊塵入漢關邊烽不動邊塵收刁斗無聲夜色流醉殺歌姬油幕底霜天遙按小涼州春宮曲四首昨夜春風拂苑牆三千南內鬭紅粧朝來鳯輦花前過報道君王入上陽殘雪初消太液前御溝晴日栁如煙披香殿上承恩早千縷黃金拂御筵長門花滿月華高雲鎖珠簾護碧桃夜靜南宫歌吹發新聲遙奏鬱輪袍玉階草色上忩紗深鎖葳㽔隔翠華添罷晚粧無一事白櫻桃下試琵琶秋宫詞梧桐飛葉下銀牀腸斷秋聲玉漏長三十六宫明月裏夜聽絃管出朝陽少年行五首匣底雙龍斗色流長安道上紫驊騮燕姬二八彈箏坐千樹垂楊拂酒樓平康歸路欲黃昏下馬青蛾白玉尊一曲菱歌揮袂去月明裝束候期門五陵樓殿雪初消玉勒翩翩意氣驕落日萬家春草外呼鷹遙過灞陵橋甲第新開上苑邊滿堂花色照嬋娟醉攜如意階前舞七尺珊瑚碎畫筵調鞭徐傍夕陽亭繡箙雕弧架雁翎夾路萬人齊指處碧天遙墮海東青劍客行雙丸耳畔雪花明九陌長安任意行片語樓中無處覓夜飛龍蹻入青城遊仙詞十首玉檢金泥柱下藏書成函谷暫徜徉流沙一望三千里遙跨青牛出大荒玄圃明霞望不窮金銀樓殿碧天中春風似識周王面乍夜蟠桃萬樹紅百辟衣冠照鼎湖軒轅臺殿夕陽孤雲間獨跨雙龍背萬頃天風墮鹿盧七步文章煥斗牛遮須聊作御風遊狂揮大筆天河畔題遍瑶京十二樓羽蓋如雲下夕陽俱言浮海謁東皇麻姑夜擘紅虬脯指爪偷看一尺長采石船頭月濺衣長鯨高擘綘霞飛安期一見如相識指點蓬萊萬玉妃洞裏青霞照玉盤飛星羣灑石門寒桃花五報西池發可奈峰頭局未殘縹眇飛梁駕赤城漫勞司馬問初平金泥玉版長生籍同向丹臺列姓名少室峰高接絳河千秋詞客鬭嵯峩誰言不是靈仙骨遙夜天姝出大羅海上朱明碧霧流五仙同跨五羊遊何如野客金華洞卧領羣羊十萬頭雲龍引芒碭秋空映赭袍龍光雲氣與天高五湖何處無明月斫竹南山坐釣鰲後采蓮曲二首畫舫青絲蕩緑油羅裙玉腕坐中流生來菡萏元同蒂若箇芙蓉不並頭湖心濤浪拍天流湖上王孫挾彈遊一派蓮歌何處起大堤齊控紫驊騮明妃曲目斷長安漢使來五雲何處是蓬萊龍沙月色三千里獨抱琵琶上紫臺涼州詞靜夜流雲拂畫簷微風不動水晶簾紅牙拍按瑶臺上古調初翻昔昔鹽伊州曲碧天如水暮雲收明月平鋪翡翠樓樓上美人三十六夜彈瑶瑟唱伊州橫江詞二首結束腰肢賽水神沙棠舟楫往來頻江風日暮連天起愁殺西陵破浪人揚子江頭風色狂白波如山五丈強自是吳姬慣迎客來來去去木蘭航從軍行五首大漠秋風吹鐵衣長城明月滿征旗捷書飛奏明光殿乍夜前軍獲郅支九月邊頭朔氣殘賀蘭山北望長安殷勤去鴈傳消息欲寄征衣趂早寒寥天霜色暮凄凄無定河邊落日低欲問輪臺前去路黃雲白草遍遼西吹笛關山月半痕梅花無數落轅門不知何處旄頭現一夜漁陽萬騎屯白馬將軍慣渡遼笑提金勒掃氛囂五千劍客當前隊盡欵名王入漢朝北院詞八首紫燕雙飛拂畫梁雕甍百尺隱垂楊東華門外諸年少攜手先過白玉堂西第千門簇五侯御溝春水逐人流罘罳爛漫黃金色遙指梳粧近妾樓金水橋邊一百家家家簾幕護桃花青衣日暮濃粧出指點蕭郎白鼻騧珠簾不動控銀鈎內苑春光入畫樓深夜月明絃管沸露桃花下合梁州雙雙羅襪鬭凌波兩兩沙棠泛玉河日暮大堤流水急回橈齊唱采蓮歌别開金屋倚岧嶤白玉河邊第二橋夾岸紫騮三十騎花時齊過董嬌嬈綺陌東頭接上陽娉婷年少舞霓裳怪來香閣時常閉盡日濃粧對海棠靈濟宫前翠幕懸平康門巷百花連西園公子攜賓過十六青娥舞玳筵南院詞八首浮雲樓觀接蓬萊五嶽三山大內開昨夜春風城外過千花齊發鳯凰臺公子連翩挾彈遊垂楊偏拂紫驊騮長干巷裡三千隊若箇新粧是莫愁紫燕銜泥度夕陽雙飛南陌認雕梁高門不用尋王謝盧女新開白玉堂歡作沈香儂博山雙煙一氣紫霞間千門栁色啼鴉暮自喚情人月下攀桃葉年方十五強春波搖蕩木蘭航不知何事歸來晚狂殺王家白面郎萬户千門玉作臺春風何地不徘徊烏衣巷口紅粧亞一路歌聲鬭草回垂楊千樹拂紅塵壓酒吳姬動絳唇日暮狂風連袂起飛花愁殺渡江人城下春江抱石頭秣陵南下是瓜洲相邀女伴尋春去共擲金錢賽蔣侯燕京四時詞四首帝闕皇居北斗間春風長繞玉門關東郊昨夜桃花發一樹先開萬嵗山沈李浮瓜燕玉臺氷山雪谷倚蓬萊珠簾百尺重重下不放人間赤日來千葉從風盡報秋長門團扇迥添愁玉河橋畔東流水幾處題紅出御溝玉宇吹花度柏梁千門飛雪夜茫茫銀笙暗炙紅爐畔一曲陽春漏正長長門怨四首羅幌飛螢玉露漙珠簾不捲坐更闌昭陽月色渾無賴才到長門特地寒鎖閉葳㽔絶履綦宮花猶發萬年枝沈香亭北無窮恨盡在闌干獨倚時鳯吹喧傳隔彩霞龍旗搖曳暮雲斜預知行幸平陽宅不用庭前望翠華金屋粧成盡日間十年紅粉誤朱顔腰肢漫自誇纎細管領華清是玉環青樓曲八首十里秦樓近灞橋簫聲何處起岧嶤珠簾百尺東風裏雙鳯聫翩逐翠翹粉面三千照玉臺期門南去是蓬萊金鞭暮過張公子一騎潛呼萬乘來兩漿頻催過石城沙棠搖曳畫船明莫愁湖上千株栁腸斷王孫作隊行一樹含桃鎖曲房金籠鸚鵡喚斜陽霍家娘子新粧罷擁髻來迎李十郎蘇小粧樓隔畫橋湧金門外半蘭橈相攜女伴巫山去昨夜錢塘正上潮指點平康宿暮鴉粧臺紅粉簇明霞曲江筵上諸先輩躍馬爭尋阿潤家二八青衣彩袖懸相逢如夢畫堂前無端錦瑟撩春思歷亂東風五十絃銀牀梧葉墮高秋良夜吹簫憶舊遊二十四橋天似水畫船乘月下揚州少室山房集卷十
