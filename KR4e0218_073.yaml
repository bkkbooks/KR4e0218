body:
  text: 少室山房集卷七十三明胡應麟撰六言絶句三十三首長夏閉關散髮高卧吟誦之暇時或焚香鼓琴殊有羲皇之適信筆六首開卷小酬歲月出門便畏風塵十洲三島遊客萬壑千峯主人誰言名教樂地懶著沐猴衣冠午睡不知日落晏起欲廢朝餐科頭不出城郭散步或傍簷楹前身灌園處士今代閉户先生尼父六經日誦鄴侯四部時開領取千秋萬世從他九棘三槐小草自甘慚忸大椿終古逍遙不夢有莘五鼎高挂箕山一瓢東郭飛花晏坐北堂芳杜晨興回馭王陽自得絶裾溫嶠何能題畫四首桃花夾水千樹栁色垂堤萬重何處數聲雞犬人家只在前峰南澗新篁雨過西嶺長松日斜散髮孤亭相對忘言一卷南華窗北寒光露滿籬東暮色雲低地僻黃花自採天空白酒誰攜千嶺槎牙古樹萬峯搖落孤梅試問長安高卧何如剡曲空回端居述懷六首千劫總歸眼底萬緣不入胸中散髮狂歌宇宙側身高卧崆峒朝見許由行遜暮看虞舜明揚黃屋翻成重纍不如枯坐禪床千古登壇大帥一時出塞諸侯試較兩家得失莫將毛穎輕投户外時時獰狗床頭日日晨雞可道敬通戚戚須知𤣥靖栖栖爛漫圖書自惜蕭條門户誰持莫笑枚乘年老遊梁剩見佳兒二女九男有底三公七貴無由架上乾坤萬卷毫端日月千秋園中四時歌春北郭尋芳冉冉西園載酒遲遲曉日含花紫燕春風繞樹黃鸝夏午日隂隂枕簟凉風習習窗紗緑染芭蕉一丈紅舒菡萏千家秋偶約南鄰二客扁舟湖上從容不省停橈何處秋光萬頃芙蓉冬白帢孤吟蹇衛紅裙低唱羔羊何似陶家學士龍團煮雪溪堂客歲病留瓜步且三月今年春仲復過此值江魚大上每至友人家玉尺銀條咄嗟便具殊厭饞口余越中不能爾也夜夜三更瀫水年年三月揚州飽食河豚江鱭何論越鳥吳牛富貴曲十二首翠靨霞生玉鏡紅粧日耀金鈿後院花開百合前庭栁學三眠妙舞誰同靜婉清歌莫辨嬌嬈綺閣珠簾半捲畫堂銀燭高燒膩玉搓成素頸鬆雲綰就烏絲乍夜靈光賦就人人高唱新詞灼灼朱唇澄霧亭亭素面迎風夜合花梢月上王昌近在牆東西北浮雲隱隱簾垂百尺高樓羅袖風前試卷玉叉斜撥箜篌寶屧參差步障銀缸爛漫窗紗一掃如椽萬字酣歌笑擁如花杳杳笙歌院落煌煌燈火樓臺十二金叉對舞三千玉蝶齊開縹眇湘裾曳地翩􅝆洛襪凌波院院紅綃國色莫將磨勒來過趙媛燕姬作隊秦娥衛女成行盡日綸巾羽扇絃歌豆蔲花傍驟見爭如易别相思入骨難禁南陌花開並蒂西陵草結同心鳯輦晨遊綺陌羊車夕叩紗窗長信宫中第一昭陽殿裡無雙日暮木蘭舟上羅裙玉腕從容北浦遙通菡萏西洲競採芙蓉少室山房集卷七十三
