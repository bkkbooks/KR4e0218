body:
  text: 少室山房集巻三十八明胡應麟撰五言律詩八十三首永叔方舟豪飲即事十首時行次齊魯衛間彩服榮新命綈袍戀舊知河梁晨艤棹水國夜銜巵渡逺攜桃葉灘長和竹枝疎燈解娛客花艷樸談詩錦席時先後清尊日過從荒城嚴夜柝逺寺咽昏鐘意氣紅顔盛心期白首濃即今元禮棹誰復共林宗鼓吹中流發圖書四壁陳髙談迴丙夜大雅和陽春水驛馳關吏津亭候榜人雄飛吾黨事一快倦游身海月維仙纜天風度客檣賦題新赤壁吟和舊滄浪汎汎俱西子依依但北堂江魚如玉雪滿載大家嘗雲霄慙比翼湖海豁遐心一駐青絲窄同攜白玉琴清吟霞色爛劇語露華侵快意篷忩下天池酌水沈大有乗桴興能無汎宅游垂天雙翼左縮地寸心投鹵簿黄河岸帆檣碧海流支機懐袖滿昨夜到牽牛攜來雙彩華寒夜互生花雪擁山隂棹星偕博望槎鴈聲流古塞螢火亂平沙幾憶春明外長燈對棣華恒叔冏卿南改河朔當年事平原異代盟登仙班景倩為客孟雲卿捩柁晨霜滑維梢宿雨晴如澠政堪賦篷底百壺傾擊楫神俱王垂竿興未徂飛談凌海若長嘯挾天吳玉珮仍三殿金尊暫五湖寧知奇偉客唱和在菰蘆汎鷁垂冬半呼盧過夜分燭花深對酒囊草細論文湖欲名髙士灘應號使君千秋吾道逺未遣世人聞舟中即景十首再呈永叔并寄李惟寅宋忠父二君漸喜雲天豁猶憐道路長大河風烈烈平野日荒荒疊浪蘆根黑飛沙木末黄翻思載圖籍片楫漾瀟湘寒蘆沙淅􅅹逺樹岸瀠洄挂席天疑近揚舲地欲迴登仙偕李郭望氣合張雷咫尺扶揺思無嗟六翮摧曉色南風正狂歌岸接䍦魚龍浮大澤鴈鶩掠荒陂貫月槎飛動衝星劍陸離深知五湖客不為載西施静夜銜杯坐天風襲錦袍推篷霜半入鼓柁月全髙宇宙捐雞肋河山劃蟹螯何慙古名士痛飲讀離騷天末歸人興臨流賦式微長風簫鼓發細雨舳艫飛入饌黄雞嫩傾篘緑蟹肥沙鷗似相識檣底日忘機劇飲嗤投轄長歌樂扣舷推敲殘月下欸乃亂風前塹黑驚鴻墜沙明宿鷺拳将因苕霅去老占孝㢘船土俗經行異風烟逐望遐獵人争雉兔罟客售魚蝦水柵平連市山城曲抱衙夜闌渾不寐秉燭對棲鴉此日逍遥興平生汗漫遊客星寧帝座卿月且仙舟巨鎮臨關出洪河抱驛流人烟十萬户問是古營丘代北游真懶齊東俗未訛荒郊環棗柿古壁蔓藤蘿宿霧氷生井微霜月度河搴舟王子興将奈越人何一代交游盛豪華冠洛中有天皆碣石無地不新豐浮海憐孤客登壇憶上公并州何處望老淚盡寒空送李掾之南康好去尋詩客聊同捧檄人雲屏髙嶺外雪瀑大江濵水驛魚成市山衙虎作鄰琵琶亭畔月一曲夜誰親南歸倉卒宋忠父邀餞齋頭不及赴寄别四章飄零辭越日留滯客梁年憶過西寧宅頻開北海筵觀棋晴雪後秉燭曙霜前長夜真堪樂誰令縱酒船午夜攜燕妓當年賦洛神草縈青玉案花亞白綸巾上國三千騎華堂十九人最憐傾蓋日局促侍車裀横槊風流甚登壇意氣饒上官留絶唱神女戀清標巫峽雲來去昆明石動揺永懐雙玉樹花下醉深宵上官昭容評沈宋昆明詩見唐襍説賦頌元推楚才華夙擅唐九歌傳正則十字叩賔王釀秫開霞館烹茶搆雪房東籬攜手别夢寐菊花黄寄李惟寅兼懐王朱兩生四首咫尺憐分手徘徊各斷腸離心揺海國淚目限河梁珮我雙龍紫驅君獨馬黄廿年彈指恨頭白少年塲落魄長安市抽豪興遏雲醉呼嚴僕射狂揖衛将軍玉饌遺鯖渥金羈簇馬勤别來知己夢愁絶亂絲紛披褐寧髙隠攜書異昔遊一身投蜀國十口寄并州幕借桓温府床移庾亮樓即今離合事萬感碧雲秋意氣聨三俊聲華軋四豪章徒騰薏苡貢已入蒲萄王粲從軍樂仲宣有從軍樂朱家結客勞濠梁倐千里飛騎贈綈袍仲冬朔舟次南旺閨中暮夜得雄鐙下發書報家大人信筆志喜四律庭樹先春發堦蘭入夜茸帝心憐敝族天意繫衰宗甓社明孤蚌髙陽兆一龍桑弧挂篷牖差快浪遊踪圖籍曾先世弓裘盼後人芝蘭聊慰念梨栗漫生嗔謝氏庭階茂陶公户牖貧尺書連夜發先報白頭親但説充閭慶都忘立壁愁百年今始慰五岳暮仍遊入掌珠先媚看肌玉並柔茆廬三萬軸累汝瀫江頭作賦長安邸談詩大海湄千秋吾自得再世爾何遲貴敢希龍種痴從笑虎兒蹉跎罔極恨無計起萱墀是夕寒燈結花甚艷蕾蓓若叢珠更賦二律一夜寒燈色飛揚照客槎乍看叢綺樹誰為擷瑶華繡幙籠丹霧紗忩暈紫霞支機寧待卜天意茁蘭芽燈花寒更結喜色炫歸槎金粟呈雙穗瑶芝發九華光輝流素月彩艷燭明霞一慰東山望庭階玉樹芽夜半篝燈寒甚余推篷出則雪深尺餘花艷若晝明晨兩崕玉樹璀璨成行永叔賦詩以謝庭見况和畣二首璨璨奇花發亭亭玉樹陳吾寧湘水客爾亦剡溪人鶴展瑶臺翅龍拖貝闕鱗故園三畆在歸思起垂綸莽莽乾坤内悠悠一腐儒乍忻蘭吐玉敢詫樹呈珠八駿休黄竹雙龍儼白榆時新得家弟含飴嵗除日好慰謝庭趨稚升席上再與永叔言别永叔先還天台節序驚殘漏暌攜悵此晨平原曾十日河朔更三旬積雨留淮騎飛霞度海人書傳二仙媛為掃石牀塵中叔衙齋小集郡郭全披霧衙齋半住山狂吟修竹下沈飲落花間别夢将雲到新詩問月刪萬峰京口勝厯厯待躋攀暮登金山同永叔憩閔山人軒中一龕聊避世絶頂見髙秋舸艦維青雀軒忩借白鷗江風傳磬逺山月照幢幽瓢笠吾将去相攜問十洲郭叅知過訪旅中賦贈南粤文章吏東曹禮樂臣生花景純筆折角介休巾鹿豕親遊屐魚龍駭釣綸百年傾蓋誼偏向白頭親香雪齋為郭張虚茂才賦茆齋餘十尺香雪綻雕欄獨樹孤山老千花大庾寒髙樓吹漸落古驛寄仍殘欲喚娉婷語師雄夢未闌送趙太學尚寶傳新命飛航悵别筵恩光龍闕下春色鳳池前緑草燕山斾紅蕖越水船相門經術在奕世重韋賢次髙唐旅邸戲題旅跡真無定踟躕舊驛堂朱榴晴綴火緑樹午生凉岡勢蟠堤曲河聲囓岸長将無夢神女地入古髙唐過王世叔舟中留飲同説仲君倩作時王世叔方出獵歸二首亦知金甲貴頻許布衣遊短劍攜孤客長纓問五侯碁酣紅日墜箭駛白虹流快意平原獵髙天控紫騮説劍樓船上霜華照轆轤将軍長揖重處士少微孤日杳青油幕風酣白玉壺誰同霍驃騎横槊賦三都是日世叔座中出八帶魚供饌余夙聞未覩即席復成此章異族來東海鮮鱗出上都一身同水荇八足擬天吳玉筯餐偏美金盤薦未孤當年五侯客飽飫此君無舟中觀漁人舉網再賦寧知濠濮思咫尺在樓船水鏡氷鱗躍霜刀玉鱠傳鼇磯東海上鱸網太湖前後夜披裘去寒星帝座懸贈徐生皞民豈是荆髙輩沾沾易水潯屠龍先世業射虎壯年心斗室長懸劍匡床獨貯琴長門新賦就未肯博黄金同厚之過瀫元池上觀魚翠幙清風逺雕欄赤日微熒煌朱鬛動撥剌紫鱗飛南國鱸應美西山鱖漸肥長竿一千尺歸釣子陵磯夜集王将軍園亭留宿齋頭二首劇飲連朝暮狂歌動斗牛樽纔空北海榻已下南州繡褥明霞綻紗廚霽月流佳期近三五重訂庾公樓邂逅青油幕觀碁興未徂為園當薜茘鑿沼近菰蒲雨砌黄金甲風忩白玉壺不知韋杜曲三過拾遺無秋日同顯卿瀫元厚之過城南禪院小憩作名香聊一炷山色滿繩床初地談真諦空門對坐忘維摩身是幻梵志爪偏長擲杖吾将去西林下夕陽同茅徐兩生過瀫元太學園中時秋海棠盛發劇飲暢歌遂至丙夜曲榭延秋色名園傍午橋晨霜山果熟宿霧海棠嬌緑水銜堤近青林抱郭遥參差發狂興醉墨滿芭蕉相國趙公以犀斚文綃見貽各賦一律為謝製作商觚並珍奇漢斚留來從蛟室底頒自鳳池頭入水驅魑魅通天象斗牛何煩百觥舉一飲媿難酬右斚錦帳非金谷絲綸借玉堂青綾遥動色緑綺暗生光萬縷含風細雙緘襯雪凉寥寥解衣事凝望碧天長右綃懐梅客生二首授䇿紛紜際成功顧盼間虬髯銅柱塞燕頷玉門關選士迎黄石陳兵上黑山凌烟三百仞圖畫定誰攀油幕羣趨夜胡床獨坐時濃霜花墜笛殘月茗收碁獸錦中朝錫貂裘上谷馳呼韓今絶塞憶共請纓時徐象先訂約同發而榜人留滯余待之不至殊悵然望望幽并隔行行汴泗來城荒頽枳棘殿古蝕莓苔尺水憐魚服長途滯駿才夜看雙劍氣能復射燕臺同吳叔嘉黄説仲憩開寶禪林浮屠雪山設伊蒲供并出紙索書即席賦得雲字别二山人梵刹斜陽裏孤舟繫水濆竹林幽把袂蘭若浄論文古碣横蒼靄疎鐘出亂雲寧知虎溪上一笑是離羣雨過茅生賦贈二首茅自云初成後一室長安市蕭然静者踪途逢茅季偉夜飯郭林宗細雨花臺奕寒飈竹院鐘華陽何日返白眼臥千松易水才容棹君垂百尺綸巨先原任俠方朔豈長貧坐有含毫客門多擊筑人懐中雙刺在肯逐五陵塵夜泊彭城夢家君作二首九月南徐路椿顔入夢頻太行雲喚客東海月迎人桃葉新歌扇蘆花舊釣綸篋中萊子服先拂上陽塵乍輟三更枕初迴萬里航眼青猶上國頭白正髙堂厯厯瞻鴻羽呱呱憶雁行應知海籌屋遐算八千長甓社湖作行行南服近望望北辰孤巨浸浮三峽驚濤入五湖蛟龍晴自鬭鸛鶴夜相呼明日江東客相逢鱠玉鱸界首晩泊繫纜依髙樹推忩坐短篷地偏秋積潦湖近夜生風鱠縷銀條白粳炊玉粒紅飄飄苧蘿夢漸過越臺東惠山泉上小憩薄暮入僧房觀王孟端竹壚玉井甃銀床山泉噴石梁江寧擅揚子谷豈後康王石鼎流雲潤銅瓶貯月凉竹壚煨苦茗彷彿孟端狂盧使君追步隠侯作後八咏詩不佞次題倚和倚檻思民力碧檻抱朱樓髙憑動斗牛桑麻深逺墅禾黍匝平疇渤海仁風逺宣城惠績流踟躕念民力漫擬仲宣遊瞻斗望京華静夜胡床坐遥瞻萬里還清光流北極爽氣動西山鶴羽思仙蹟龍鱗憶聖顔異時香案吏翹首玉宸班芳圃傷啼鳥複道春風起黄鸝晝滿林間關流葉底睍睆出花隂綺陌傳金縷紗忩和玉琴願偕韶濩響一奏未央深名園惜落花把酒髙城望春光正暮天落紅深小逕新緑漲平田粉翅迷蝴蝶芳心泣杜鵑誰憐隠侯病憔悴百花前署府聞秋笛何處拈長笛飛聲㺯月明梅花千萬樹一夜落江城隔座桓伊思登樓越石情洞庭秋水濶嘹嚦雁鴻鳴江城暮聽笳幕府秋笳起隨風度海濆哀音揺落日逸響度寒雲斷續邊鴻羽飛揚塞馬羣萬方烽燧熄無擬玉關聞倦遊懐畎畝豈為東方㦸沾沾舊草堂風流傳蜀郡政績重淮陽海岳閒情逺雲天健翮翔故園聊寤寐前席待龔黄髙嘯隠烟霞逸興黄堂上髙情碧海涯勛庸留社稷寤寐落烟霞八邑聲同著三朝望正遐陽春誰倚和萬古誦瑶華贈狄将軍鼓琴雙鬟有序黄河遇狄明叔沙棠聯下雄飲達旦凌晨策騎同登彭城子房山南望雲龍放鶴諸阜狄生連釂巨觥余命小奚吹鐵笛振袖絶顛超然遐想昏黑還舟明叔盛為具呼小鬟鼓琴侑觴余醉而復醒數四榜人告東方白久迺罷許為狄作長歌先賦此贈侍者追歡連日夕小隊出霓裳入指朱絃媚含情緑綺長新聲傳舞鶴舊曲和求凰何似歌桃葉盈盈在畫堂輓楊明府遇二首夙昔俱童稚親情四十年尋詩燕雪底作吏海雲前草闢依山墓蓬侵負郭田豐城墜牛斗誰掘兩龍泉一病歸何早空齋種白楊尚期中散出不謂太𤣥亡舊宅扄南院新阡樹北邙乍宵鄰笛過涕淚盡山陽送郭廣文之南康射䇿時方棄明經路未窮衙齋飛瀑底驛路亂山中赤葉明楓樹黄花綻菊叢琵琶亭上雨秋色正連空送王中叔比部北上二首乍擁三秋楫言乗八月濤日華仙掌近雲色帝城髙獄底占龍氣池頭憶鳳毛羨他詞賦客强半在西曹大斾飛紅葉閑門閉緑苔雙蛾辭玉洞獨馬赴金臺甕挈中泠去藜招太乙來君王受釐夕刺刺嘆雄才中叔以潤州倅遷送陳廣文自上海遷池州乍奪唐宫錦仍浮漢使槎岸楓霜染葉籬菊雨催花地坼行三泖天窮望九華異時窺絳帳問字幾侯芭寄王伯固明府劉百世茂才尚憶南皮飲圍爐夜唱酬仲宣才冠世公幹氣凌秋藜閣新編啓蘭亭巨軸留重逢定何日氷雪倍離愁少室山房集巻三十八
