body:
  text: 少室山房集巻二十二明胡應麟撰七言古詩九首題何仁仲甘露園有序何氏之先繇開創勲世襲金紫至司寇公遷詞章學術重宇内仁仲其仲子也幼受業家君弱冠名家詩賦兹繪其所搆林亭千里索和余弗獲辭園林舊說何將軍應門稚子俱能文即今盛世寧好武登壇載覩鴻臚君别起樓臺眺三楚冠蓋章華總非伍九疑七澤天茫茫千秋屈宋垂文章何日𤣥亭借高卧乘風㑹鼓瀟湘柁梅窻歌壽何處士作吾聞羅浮之山四萬八千丈絶頂仙葩隔塵壤鐵幹斜撐大海濱霜梢亂揷遙天上江南十月寒信來雪花如席飛瑤臺千枝萬枝凍欲折凌風一樹何竒哉清標雅質真絶俗為誰移向孤山麓東閣曽聞杜陵句西湖更入林逋目道人自是姑射仙幾年采藥羅浮巔參差老態看不足却窺春色來湖邊滿屋琳瑯坐相對五夜虚窻月光碎夜永寧知素影單酣歌絶勝紅粧醉縞衣鶴氅何翩翩况有逸思凌開元有時興到起濡墨隂鏗何遜皆陳言只今尚作梅花主甲子一周還二紀山房乍夜春意囘彷彿枝頭聞翠羽綉屏朱户羅嬋娟孫枝遶膝才且賢折花浸酒為翁壽清香習習來華筵王母安期世誰識玉桃丹棗空陳迹豈若氷肌耐歲寒破臈含春映朝日梅窻叟且莫吟䌓苞落羌笛國豔傳幽琴遙望羅浮隔南粤玉宇雕梁逈清絶聳身欲去重徘徊冉冉雲軿下天末且揮白鶴留人寰幾畨渤海成桑田更卧梅花三百年一笻長嘯凌蒼烟褒忠祠祀禮成代直指蕭公作一夜并州赤龍起浩蕩風塵播疆宇捲甲朝降十萬師懸烽夕照三千里真主初還建業東儲君却下金陵宫羣臣駢首甘就戮至今正氣吞長虹憶昔齊黄在帷幄首縶親王入京洛書生坐失應變機遂使貔貅暗沙漠同時抗節練與陳壮懷凜凜雄三軍偉哉正學十族死精貫日月開浮雲全師僅見南陽鐵獨守危城破堅甲暴昭姚善兩激昻視死如歸狥鈇鉞皇皇周子百鍊鋼題詩自縊太學堂景清枉効漸離術勢孤不得抽魚腸紛紛義士難悉數力挽頺波示今古投河直欲拒成湯扣馬寧辭諫周武大厦難将一木支江城白晝飛旌旗鄗南正位大統集劒閣巡行天命移沉吟徃事空憤切耿耿英魂豈終滅四海同悲東市刑曠代猶瞻首陽烈百年祀典何寥寥明良繼起登熙朝首録忠誠建祠宇天書五色垂丹霄峨峨遺像表忠赤報禮殷勤慰悽惻西日含窻鳥自過北風吹樹聲猶急隂蟲夜促霜露零群公恍惚來精靈九原遺恨豈堪說天空月落秋㝠㝠我行覩此重太息後世誰傳董狐筆海濱義士何足論洛邑頑民真再出英英壮氣摩乾坤流光竹帛垂丹青千秋萬代鑒徃轍君臣大義如日星於戯君臣大義如日星河洛篇督學滕公夜邀齋中談道命賦茫茫太始誰開闢耿耿元精貫三極自從河洛生圖書中華首肇文明迹羲皇手抉天地心羅列八卦標乾坤軒農堯舜復繼出垂衣萬古開人文夏商體格多渾噩遺風未散鴻䝉樸成周一代首尚文緯地經天傳制作紛紛侯國隳王綱宣尼崛起稱素王七十二表擅靈異驂逐五帝馳三皇神遊岱宗憇梁父下瞰日月相吞吐三千弟子咸摳趨從此儒冠盛東魯窮年贊易評羲周詩書禮樂勤删脩至今大盜屏不發凜凜鈇鉞嚴春秋淵輿資稟實𤣥奥獨冠諸生聞至道惟時游夏得精華散入南方布文教遊梁崛起孟氏賢乘車列鼎何翩翩公孫萬章不足數岩岩氣象誰其傳荀卿議論本該博時乖廢死蘭陵郭後來蜀國空草𤣥白首蒼黄墜高閣河汾自是王佐才曳裾獻策窺蓬萊昌黎夙負斗山望路途二鳥重低徊千年至道轉寥落重見周程起濓洛紫陽之巔異人出一掃蓁蕪繼絶學我明設教崇成均十三學政分儒臣七經訓詁行海宇彷彿雲漢垂星辰關中江右兩督學景明獻吉真間作才名氣節天下傳渺渺斯文未有託武夷之山何嶙峋丹梯百尺連高旻我師篤生任斯道挽囘一髮伸千鈞周情孔思實天縱玉質金相本梁棟年少親承明主知時來却為蒼生用三吳才士集如雲帝遣真儒下漢庭伏生晁錯豈知道丁寛孟喜空談經一麾暫駐吳山麓已見清風走南服坐席江聲走具區褰帷海色明天目魯國生徒遍品題當筵彩筆飄虹霓漫擬真人過函谷共看夫子在關西王良造父本精識雷煥張華渺難及臺上俄看萬馬空獄中解使雙龍出麟符綉鉞行高秋追步琬琰披琳球縱横禮樂三千士縹緲絃歌十二州絃歌禮樂連薇省片善微長勞接引百川齊赴滄海流抔土同登太行嶺泗水尼山迹未湮升堂入室多竒珍西施尚作浣紗女和氐猶為抱璞人馬卿自昔工鉛槧終軍意氣空凌亂照乘連城世所希夜光明月誰能辨葱葱紫氣繞三臺遙見徴書落上台更聞黄閣收桃李㑹看青衿出草萊董生行贈中秘董體仁逺遊昔登梁父巔天門突兀摩蒼烟秦碑漢碣半寥落萬家封禪俱茫然憶從蒼頡制文字六書燦爛星辰懸八百年來陽氷死邕斯體製誰其傳董生今年政三十曳裾笑指長安日論心遇我遊俠場意氣翩翩指金石自言家住滄海東曽入禹穴探竒蹤門外寒山掛蒼玉青天削出䨥芙蓉朅來挾瑟齊門老客子形容半枯槁黃金臺舘天茫茫繫筑悲歌和窮鳥興到長鐫石鼔文快劍長㦸秋森森突兀虬龍起幽壑翺翔鸞鵠迴高林金薤琳瑯徧筐篋螺畫蟲書互驚絶白石烟銷苔蘚凝寒雲海凍珊瑚裂年來徴仲數八分長沙小篆稱通神生也雕蟲不自惜徃徃制作追前人偏傍頗肖韓擇木風格時兼蔡有鄰十載都門困旅食短衣匹馬隨風塵吁嗟董生何僕僕歸去猶堪友麋鹿攜尊傍我吳山麓飽看秋潮落天目霞林樵隱歌為梁太學賦七閩孕竒秀秀出壺公山壺公懸壺住絶頂雲霞萬叠供朝飱玉宇瓊樓架天末翠葆丹旂互明滅高寒可望不可親一片晴光墮林樾林中大隱梁伯鸞飛身直上凌嶄岩蒼精之龍不肯佩却從杜甫歌長鑱長鑱朝持柄白木伐木丁丁向空谷竦身乍可親猿猱跂足時堪友麋鹿峰迴岫轉興不窮壺公絶頂尋壺公高霞萬疊餐不盡擔頭五色紛葱蘢荷擔歸來石床畔兩腋風生體輕健金莖底事月底尋石髓無勞洞中翫君不見赤城之下吾所廬霞標突兀千仞餘興公麗賦久埋没桃花流水空踟蹰又不見武夷之蹊君咫尺霞幔為亭駐征蹕天孫懶織雲錦裳邂逅梯仙竟誰識願君大隱留人間長林築室三千年春來倘挾汝南費一笻厯探壺中天七閩之秀實惟壺公丹霞如樓逈出天半梁太學維築室其下将終身馬屠長卿為題曰霞林樵隱而陳季相乞余長歌以紀之余不獲辭賦焉夜飲喻邦相署中酒酣邦相諸郎君出見咸朗朗玉立可念也因戲成短歌一章為贈自從管鮑交游不再見世人結交徒結面南昌喻侯青雲客邂逅逢余偏戀戀丈夫意氣凌青㝠契合寧論越與秦弟兄異姓古來有一呼盡出諸郎君大兒今年纔十二霜毫日掃五千字差肩兩郎亦其匹八法淋漓照湘帙抱中小者尤絶竒玉為肌骨雲為睂毛詩三百不離口氣槩似欲吞虹霓看君四子並英物朗朗寒空挂奎壁徐卿兩兒那得比王氏三珠總非敵人生有兒百不憂况復滿眼俱驊騮喬當及卿髦詎減湛旣難兄紀更優君不見胡生今年政三十日夜明珠探驪窟大兒文舉小德祖徒爾相親不相識此時盡閱君諸郎使我臨風重悽惻謂生好飲勿復言且盡三百青銅錢生兒蚤晚㑹有命何用蹙蹙愁心顔君不見喻侯膝下四男子行年三十初得此至今玉樹森庭廡鍾室行題淮隂侯傳後有序淮隂侯不反明矣而史遷附㑹獄辭致千載之下徒惜其功大而不克終且歸罪於吕氏吕氐固漢祖所託而甘心者也漢於當時所畏惟籍與信籍滅而信繼之時事必至無可言者彼陳兵之搆舍人之訴皆漢之為也信亡即庸庸如越猶以故智除之誅越以速布之死而漢之謀無不效矣於是以戅如陵椎如勃者而以後事付之然且曰陳平智有餘難獨任也嗚呼漢之心可識矣黄河倒流日東轉地坼天摧鍾室晚志士千秋空扼腕誰為淮隂明不反憶提利劒追重瞳邂逅關前隆準公登壇片語定劉項豈須垓下知雌雄井陘戰血飛長虹齊城七十如飄風當時楚漢在掌握磊落千言辭蒯通固陵長驅三十萬手挈神器歸真龍泰山為礪河為帶欲齊伊吕稱元功寧知隆準猜忌主畏信雄圖如畏羽旌旗夜入定陶壁警蹕朝行雲夢渚朝行雲夢夕出迎天日可照微臣情縱虎誠難縛虎易青㝠咫尺飛雷霆列侯朝請亦奚忌隱若大澤居長鯨陳豨相過理則有舍人上變誰當明遂令身首異都市九族併命咸陽城嗟嗟吕姥豈辦此固知漢主行叮嚀卽豨不反信亦族欲加以罪寧無名嗚呼季也實凉德萬古愁雲弔鍾室史臣徒賛寛大辭百代梟雄定誰匹君不見三雄死三吕立厠中愛姬人作彘掌上佳兒血盈席天道好還如一日長信宫深辟陽入愧殺長陵一抔土冢中强魄無顔色君不見亞父當年賜骸骨虞姬効死隂陵側壮士至今猶悼惜千秋為季寧為籍嗟乎千秋為季寧為籍吳章兩門士後先以新作至咸精進逈出余讀之朂之以歌吳充遠示林屋詩讀之使我興飛越沾沾欲度驊騮前不減觀潮誦枚發章生近投詩百篇敏而好學吾所憐昌齡我師花蕋婦肯與王建論媸妍何哉世謂兩生魯中夜聞雞解起舞異日英雄起儔伍不用登臨嘆廣武少室山房集巻二十二
