body:
  text: 少室山房集卷一百十七明胡應麟撰書牘三十三首報梅客生别吾丈不三載丈遂披青雲入紫闥以循良最一方又不五載丈遂建髙牙擁大纛以勳名揭四海奇矣奇矣大丈夫不當如是耶疇昔邂逅劉金吾座上竊窺丈虎頭燕頷類班定逺其人而鬚髯磔張虬鸞飛動又與李衛國所遇海客張公絶類乃今統十萬背嵬縱橫鴨緑平壤餘威震乎殊俗將令日本豪酋如扶餘國中自相戕賊而坐收一鼓之效異日者旋師玉門丹青麟閣定逺之封特緒餘矣世人譏薄文士往往謂鉛刀亡取一割自近日汪張兩司馬稍稍破屈之苐彼非夙昔預期要亦時適逄世未足大建詞場旗鼓若吾客生擢一第曾幾何時而奮身投足委命不測之淵卒之算計見效言無不讐舉宇宙至難之事運量掌上此其忠肝赤腸雄算偉略寧全軀保妻子巽懦齷齪庸流可同日語惟是公仗鉞登壇材官突騎雲集待命意且應接不遑乃蓬蒿故人落落如胡元瑞尚往來方寸間何足下軫念舊知久而彌篤也孟韜留滯齊東尚無來耗惟寅忠父旦夕聚首差足為歡敝邑方生其人誠有致苐僕尚索米侯門倘攜來燕市將竝懸枯魚肆矣拙刻寄頓中途數種先上胥後令異日致之與錢將軍湖光山色間稔飫髙情秋暮出關回首故人邈如河漢每相思興會神爽欲飛縮地無從彌增悵戀計彼此共之也明公雄爽傑魁之氣不啻樊舞陽長驅十萬衆橫行丐奴而興寄沖𤣥標韻神令又逺出祭征虜雅歌投壺表所謂文武兼才世不一覩奈何令東南閒局久絆旌旄間者度遼新命儼然重借將無益以胡生詩為左劵也公虎頭燕頷自墮地業當封侯乃今建髙牙擁大纛坐鎮右北平丈夫得志以殊伐報王家今代麒麟閣何人苐一功努力努力胡生潦倒一經竟爾作東華門落第舉子自是蹇驢上業債未酬長安米貴居大不易嚴僕射憐才下士名滿天下豈不能營燕山尺寸地為少陵野老作瀼西居耶又山童偶過麾蓋敬致八行何時乘興一叩公青油幕下呼盧較奕度此岑寂杏花朝也與宋忠父新都汪太學象先司馬公胄子也髙才逸韻翩翩闕中白眉邇乞令先公贈諡偕季方入長安楗關謝客獨雅慕君侯髙誼冀一望顔色龍門惟明公賜之清燕此君伯仲皆奇雋尤癖游觀蓋渥水之胎去凡櫪不翅千里新秋計軒車只役陵寢夙期僕紹介前茅偶病目旬餘不克顓櫝奉聞倘獲殿輜軿得於金城玉扉中遍閲羽衛典章之盛歸談之不佞以當廣陵濤色即病軀潦倒將霍然東走髙齊悉索大官餘饌為長夜飲矣報鄧逺遊公方張樂洞庭之野而僕以瓦缶前鳴得無貽形穢之誚於大方耶惟是木桃不投瓊報無自願足下振以同聲𢎞以大雅𢎞嘉而後竟在兹乎如曰吾為魏公藏拙匪所望於蕭傅也報林貞耀樓船晤語歡極生平惜公冗方殷而不肖復為六橋花事所驅放舟東下顧逺勤使者賫賜八行奬諭綢繆餽贈豐渥而鴻篇名集罄發巨公纍世之藏不啻寶玉大弓下賁蓬牖鄙人寡見謏聞即結髮詞場所得僅如雞肋乃執事撝謙已甚至欲舉千秋之業授以雌黃即有胸無心逾切蚊負之愧頃復瑤緘嚴督慮以方命而蹈不恭謹罄其愚衷卒業貢上間以管中之測跽請髙明執事亮之教之報唐長公不佞海濵豎儒也束髮操觚輒妄意䇿名藝苑之末而技劣才疏無聞四十自嘉隆諸老淪謝以來無論二三同仇邈如秦越即㝢內賢豪擅古今述作之場如執事者亦未能擔簦鄰邑聆謦咳於大方誠不自意金玉之音一旦跫然下於窮谷露盥披讀語語肺肝益以華衮繡衾情文備極而且大篇把贈明月投懷妙墨逺貽清風拂坐吁嗟長公僕何以得此於左右哉不佞自挾䇿京華遭逢琅琊伯仲定契忘年既而伯玉司馬晚收榆社當時亦謬擬鵠刻一家蟬連百氏而殷憂疾病展轉泥塗迄今齒髮變衰萬緣灰冷自分區區噪抹付之子虛而况欲馳驟中原分途上駟如虞淵之逐日王屋之移山自非夸父愚公疇不嗤其狂昧也明公光嶽效靈震旦應化人倫麟鳳藝圃騏騮當今壇坫桓文孰為二廣而乃下掇芻蕘窮搜林麓即聶生􅀈􅀈尚在鼓刀此身六尺已允為嚴君有矣滄桑可變盟好不渝白首之期矢於今日固鄙人之靡量亦知執事之罔遺也招遊宇下神爽奮飛家纍寓杭末繇遄發尊駕不日垂扺此間净慈天竺諸峰日望彩毫發攄奇秀不佞黑貂久敝尚能解付酒家當北道主人萬一執事念之與王參戎聞麾蓋將臨掃苔瀹茗以聆𤣥箸而風雨陡作令人悵然旦日必期髙軒再過川原朗霽飛埃不揚大將軍前茒所指即清道滌塵固屏翳飛亷職也園中緑牡丹盛放若沉香亭美人見者心折車騎到日滿酌劉荆州巨雅浮之與徐惟得使君明公勇退急流不啻鳳凰千仭苐時事紛紛恐捉鼻謝公至竟東山一出異時凱歌淝水勛勒旗常武陵洞中桃花千樹皆門下優游日也不肖於明公稚齒通家而中道雲泥聞問疏闊不意漂流江海獲奉晤言竊窺明公如萬斛餘皇破浪乘風靡重弗勝靡逺弗到而綜理周密經略縱橫又如庖丁之刃肻窽洞中砉然犁然真可謂曠世全材吉甫流亞至棲心溟涬吻合道初即留侯赤松瞪乎後矣僕僕僕塵埃倦遊彌劇將擔簦鼓柁訪明公於三湘七澤間獻嵗秋髙幸宿戒閽人毋閉關以謝越客北帆漸逺臨楮神馳與萬伯修中丞一代龍門之仰飛動寸衷二十載矣何意髙牙大纛間獲奉言教幕府容其長揖胡床拉以嘯歌撥軍旅之勞規長夜之飲略王公之貴結韋布之歡目炙清輝神怡妙論八珍溢齒六律爽心即平原河朔未及兼旬而桓府庾樓足當千祀瀕行腆惠優渥濡及榜人荒塗大河石尤四面塵沙夕起飄空障日妻孥對面杳隔異境行路之難古昔嘆之回望干旄益深戀戀計明公仗鉞含毫之暇持觴北望亦不能無慷慨於臨風也舟達潞津二三舊俠擊筑悲歌留連晨夕未及䇿蹇驢一入春明門宗人行便粗致八行臨楮馳溯不盡與萬伯修留滯都門索米為日晝夜思歸而十口纍纍故鄉天末惟是明公仗鉞雄邉專制萬里驛騎車徒槩得以便宜徴發乃不肖夙膺眄睞忝當國士下陳不揣敢冒假餘皇自燕扺越俾窮途倦客髙枕而達故鄉即明公大造鄙人銜戴沒齒矣戒裝晨夕敢布腹心柬吳生德符昨足下所云壇盞及俞仲蔚集借過剎那頃即返上鵲橋之夜幸無他駕當拉天孫擊河鼓行酒終宴贈之雙彩筆以當纒頭耳報唐長公曩謁武林適公軒車見枉竟阻道途自門下養髙岩壑僕亦旅食江湖即飛夢相尋而山川間之眇不可即杪嵗梓人過雲間始克附八行於左右辱公報以赫踶字猶未滅而蘇君嗣致大教娓娓數百言何門下注念鄙人委篤真至至於斯極也明公經世大業經國大猷上之當參峙木天黼黻皇度次亦當褰帷秉鐸陶鑄一方乃區區小邑竟厄牛刀才髙見忌造物者隂實為之臧氏之子惡能使公不遇也至百代之傳在彼在此必有能辨無論耳目浮榮彼云亭封禪七十二家今皆淪沒澌盡吾黨視之奚異蝸之左角耶華居新搆如曽城閬風回出塵壒令人恍然作天際真人想恨兩腋圉圉奮飛莫能向夕扁舟挂雪造膝𤣥廬以平原十日之歡翻鄴侯四部之蓄亦古今至快極愈也藏山之製月盛嵗增雙鯉錢塘幸毋金玉蓬萍六載僅得詩二千什書二萬卷差足自喜計門下亦樂聞之蘇君鐫刻之妙夙所傾嚮顧片刺輒行如西天阿閦奈何已拈一律寄之併上博笑報張大參知睿父斯生還婺城伏謁仁臺業附賤姓名一致犬馬尋挾書北上至吳中而得室人之耗竊計老親在堂菽水晨昏靡可寄者匍匐東歸扺舍而家嚴疾作不肖委身藥物奔命巫醫二六時中寢飯俱奪坐是薇垣之下聞問闊焉即十旬之遙百里之近無能削寸牘一候閽人知明公地負海涵不深加督過也頃黃口病痬倉卒赴省歸而三復至教九頓腆儀鏤結肺肝罔知報塞伏惟髙牙大纛坐鎮一方比屋黔黎頂戴𢎞造苐恐司空龍劍紫氣燭霄寇公之借徒厪河內萬一賴天之靈建節敝土異日者元戎小隊載過婺中得從州民之後一望見上公顔色則生平莫大幸也文仲纍瓦編購之未獲所云董彥逺蓋宋人董逌廣川書畫二跋見馬氏通考近代具存畫跋不肖嘗一載讀之蓋亦博雅之士考宋史文苑儒林並無逌傳啓中六事意若評隲六書恐不皆關係故典明公該洽冠世必洞悉其指歸鄙劣管窺胡能隻辭為贊役旋附報並希指示原籍庶千慮之一嗣就正於大方焉報睿父參知並柬文仲觀察杪嵗平原之飲濡首渥肝窮日落月無論竹林諸賢即朝穆之酲酣中山之暢洽殆無以過乃二先生並握驪珠同紀勝㑹言言刮目字字賞心每把玩扇頭彩雲白雪擊節呼盧等句令人兩腋習習乘罡風而上扶搖何髙華奇麗一至此乎上元之夕載辱提攜遂為蘭隂瀫水間無前勝事計兩公必盛有篇章垂之不朽楗關索居慨焉艮覿側身天末神爽飛馳報李本寧觀察梁舍人座中周旋大雅迄今三十載矣兩司馬相繼修文嘉隆遺老靡孑遺者惟執事靈光獨峙砥柱江河一代千秋大統攸集茫茫震旦不遂淪為長夜以明公在也不肖疢病羅躬百念灰冷頃德星臨照亟擬趣奉笑言不意逺辱手書重之新厯古昔王侯先施草莾乃今何幸驟於明公見之春分拿一葉東下謁軒輶萬松三竺間馬齒雖長尚思努力鞭箠以追隨六驥之末惟大教之無吝焉又軒車垂訪屬館舍􅑶臲未遑謁謝臺端夜來歸自湖中適明公手教飛墜遂使窮旅生春清厨改色感飫不可言雄篇妙墨當代無兩鄙人何幸一旦獲兩奇珍當與觀自在真言同揭座右終身盥沐誦之又公政務殷冗且四方之憑軾者紛然坐是不敢晉謁乃惓惓方寸則靡瞬息而不在龍門也炎令方乘日袒跣科頭匡坐丈室想像明臺雖霜威肅然或不無褦襶之困適平頭持大教下臨重以佳箑文履恍然乘雲御風晤真人於天際即伶俜瘦骨不自知兩腋之奮飛矣伻旋附致犬馬容日躬叩領剎那之誨不宣報吳文仲郡城邂逅旌麾旋有三衢之謁辱門下軫念故交客之首座以一布衣介兩上公之側晝而華筵綺席窮十日之歡夕而艷舞清歌竟百刻之漏髙陽河朔亟稱豪舉槩之今兹胡足論也塵冗紛紜忽忽嵗暮得參知公下示三什穆如清風方翹首來鴻而瑶緘飛墜捧誦佳律髙華縝切如對開元大厯諸君良哉此會突兀千古矣承軒車湖上之約適本寧亷訪手書同至春初買棹遲車從於南北兩髙暢飲酣歌作生平快愈事也報鄧逺遊扁舟晚泊禦兒辱公物色津門客之上座樓船盛集華燈列前清吹夾路論心促膝旅况盡銷重以平湖朗月千里若規逺岸長空萬頃一碧丙夜沉酣狂態逸發杯斚縱橫纓舄顛倒誠生人之劇歡詞苑之盛集也詰朝解纜黯然魂銷執手故人時入夢寐既歸溪上一卧六旬絶粒枵腸僅存喘息淋漓藥物展轉床笫秋深閉户奄忽初冬二豎見寬稍稍起色老親弱弟聚首殘年仲春買舟扶掖東下擬館舍小定馳遣一介聞問琴堂則大教儼然先於窮谷長箋誨慰縷覼千言誼激肺肝情紬金石令人馳望毛骨奮飛咄咄逺遊逸氣干雲雄才絶世若足下者謂宜髙峙木天端居藜閣乃俯同羣倅出宰一方拜迎官長鞭撻黔黎期會簿書拮据錢榖罄折賢勞良哉獨苦苐尼父執鞭子弓問政古聖昔賢咸親民事以足下碩抱駿猷何施弗合異時張皇循吏標揭名臣毋使輕薄中庸交口亟稱騷人無用文士寡效其亦可乎僕年垂知命蒲栁蚤衰即著述一念尚攖方寸而晷短途長憚於驅䇿加之二三朋舊日益喪頽將鼓缶而歌鼓腹而遊為吳越閒人宇宙一蠧足下春秋鼎盛努力前規砥柱狂瀾挽回鴻造葵丘城濮狎主齊盟是則不佞惓惓私衷匪敢佞也俸餘損餉即付酒家重以口腹為亷吏纍奈何報俞羡長足下體中尚未佳耶久客逺歸加餐故應努力苐驕陽作祟養盛以候涼秋何如素馨損惠即配天池取郭婆新汲烹之作凌晨清供如足下云云以脂粉涴其淡粧不可也一笑又夜來素馨至今芳意未歇凌晨蒼頭趣郭婆汲新供上當瀹羅岕擁少君啜之異時夢得樂天茗飵相回易倡酬之什播誦詞林吾與足下苐各賦一章何必減昔賢風味也與俞羡長雜柬五通詰朝煮茗摘蔬客何長卿張元春雕繪皆江東獨步須足下攜大手筆來成小齊三絶也二湖頭邂逅燕姞遂令桃花千樹片片欲飛樂事賞心得之意外僕往在長安許為薛素素作歌今迄未就足下賈勇先登僕狂興陡發當繼作二百言許并一了都下宿逋政恐造物小兒見嗔無賴耳三郭外登髙即片石可觴亦為游人所據足下捫蘿絶壁舉觴白眼呼吸帝座古今豪舉無越兹辰雲門天闕二語尤崛奇入唐人座中當令元白動色四小樓匡坐觸目琳琅令人浹日留連竟暮忘去頃詞場百六江左風流零落澌盡一朝遇足下頓還舊觀五𢎞正以還膚立成風古今學問之途靡復一線昨過足下髙齊圖書四壁皆手自校讐覺雙曈頓爾開豁須異日買田陽羡朝夕過從足下作三萬卷中老蠧魚也報鄧逺遊極浦層堤挈芳攬秀髙峰逺寺涉險攀竒加以天時朗徹人境清真燕樂嘉辰牛飲長夜無論平原布衣即金谷蘭亭詎當全盛哉湖頭把袂悵戀風流音徽泠泠恍在耳睫伏想旌麾蒞邑簿書旁午轉盻舊遊倐成塵迹能無夢寐飛越河山耶北上之期茫然未卜倘蹇驢業債若戀寒酸執䇿追隨軒蓋之末並驅徐沛逹於蘆溝亦震旦國中豪舉極樂事也與陸使君濟上遘龔使君沾溉下風一二賴天之靈德星巍巍照臨東國應麟方旅食淮甸弗獲以青鞋布襪從州民伏謁道旁杪嵗歸廬始遂荆識大懼龍門峻絶草茒一介無地自容乃執事頽然屈千乘之尊隆三接之遇披襟欵狎歡若平生即孟軻氏稱樂善忘勢古今賢豪殆同一轍矣扁舟入省濡滯及朞春風載和專使馳候不腆敝帚索笑大方惟明公之寓目焉報王恆叔讀五嶽游草覺撫琴動操之餘山谷皆響足下信奇人然造物小兒亦何意獨縱杖頭若是僕犬馬四旬僅岱宗一入眉目客嵗挈家逺遊將永别金華諸洞壑因發憤走芙蓉紫薇厯探朝真氷壺雙龍窮極幽峭而後返尚未暇寫之筆端閲足下遊記快哉十得八九矣何時同蠟雙屐登金盆玉壺絶頂大呼石羊君也與王永叔足下移疾還赤城桃花萬樹爛如蒸霞二仙娥出迓胡麻澗旁攜手入天台洞中樂否見司馬子微為致聲僕久厭塵囂何日謫期垂滿相與逍遙鵬背作八極遊也與蔡稚含一别足下歸溪上聞問便自杳然追憶齊河邂逅不數語揮袂真若西天阿閦國隨現輒隱乃人生夢幻泡影亦何處不然足下髙嘯石梁鴻篇巨製當令興公舊賦無復金石聲春深謀一相過飽餐赤城霞色也報黃說仲武林邂逅遂不獲以雞黍享故人今猶悵悵足下扺淮大將軍有揖客顯重可知青油幕下觀棋往事恍忽如夢苐小山叢桂無復遺踪跨馬郊原得無躑躅於西風殘照也少室山房集卷一百十七
