body:
  text: 少室山房集巻四十九明胡應麟撰七言律詩八十一首送王敬美先生入賀萬壽二首並寄徐子與右參黎惟敬秘書馬首寒雲碣石開逺從青雀建章臺霓裳自獻千秋曲露掌頻分萬壽杯把袂應徐天咫尺抽毫枚馬日徘徊山陰亦是旋舟地雪夜能忘駐草萊暮擁軒車入帝州曉排閶闔問龍樓西山紫氣飄環珮北極寒光照冕旒天際薇花聊獨倚日邊藜火定誰酬荆髙舊侣能相過已拚華陽十日留懷大司空朱公華髮歸來臥洛京三山晴望紫霞平遙傳大陸思神禹不見孤峰下廣成日冷金縢猶泰畤春回玉樹已承明夷門咫尺酬知晚慘淡吳鈎匣底鳴江右王孫貞吉以書併畫見貽賦此寄謝浩渺涼風嵗色徂遙傳尺素到江湖誰誇特進鸞凰筆自冩滕王蛺蝶圖明月萬家愁外滿碧雲千里望来孤攜琴會入東林社徙倚蓮花醉玉壺寄荅同伯王孫屹立廬峯挂紫烟中林有客坐談𤣥高軒蚤識王孫句畫閣重開帝子筵秋逺北風隨雁字夜深南斗動龍泉何縁一借天池榻攜手銀河百尺懸送梁持伯蹔還南海翩翩輿馬駐江干蹔輟含香漢殿官雲氣乍看隨玉節露華猶憶對金盤尊前葉送羅浮暝笛裡花飄大庾寒極目故園瓊海上好攜春雪向長安觀察吳先生分署東甌與余期為雁蕩之逰久不獲赴小詩奉寄行車何處不風流名岳能將漢使留萬頃白雲迴雁蕩千峯寒瀑掛龍湫深春薦福亭中醉竟日能仁寺裡逰咫尺山靈定相笑苦將瓢笠望丹丘病中王山人過訪有贈年来消渴未全除曲巷時時長者車寳籙自探俞跗訣金函長秘葛洪書茅飛白晝龍隨杖杏發青山虎守廬試事長桑三十日上池仙液定何如聞商侍御按部山西有寄攬轡飛霜滿冀丘豸冠何客伴風流千山坐擁堯都日九派行疏禹鑿流瀚海烽清長息甲漁陽塵起一登樓雙鴻是處南来色愁憶長安把臂逰望雲遙祝為興化徐别駕題千花晴日滿林臯鶴髮鸞箋照錦袍紫氣乍占函谷逈白雲遙望武夷髙天瓢露染三春樹海屋霞明萬嵗桃不道偉長詩興淺畫筵留客幾揮毫寄趙太史紫霄遙憶漢官儀誰似夔龍集鳳池雲色並攜三殿草日華長繞萬年枝趨蹡玉珮觀祠夜徙倚金莖伴直時無賴問竒亭下客秋風猶占五湖湄雪中同王少參集彭廣文齋閣飛雪千門照彩毫登臺寒色滿林臯論心敢訝青氊薄倚曲偏驚白苧髙冶艷正隨仙客氅輕盈旋拂侍臣袍亦知郢國春難和且傍天花醉濁醪薄暮同二君過集張明府署中綺席華筵擁上賔飛花寒夜逈生春無論漢水千株發轉覺河陽萬樹新艷色並看瓊作圃清光遙映玉為人天涯二仲過逢日可道王猷引興頻明晨邀三君集舟中是日雪大作竟暮黯淡同雲際碧天溪山遙望轉清妍誰將剡曲風前棹並載梁臺雪裡筵玉樹乍驚瑤瑟倚氷花時傍彩毫傳飛觴總是瓊樓客肻借陽春和昔年彭穉修以病乞假蹔還匡廬詩送之憔悴青氊越水頭一尊長嘯攬吳鈎髙齋暮輟康成講名岳朝看太史㳺五老雲霞天並入九江濤浪雪爭流春花正逐離筵滿忍聽陽闗上客舟王次公敬美寄惠計偕集叙走筆二律奉謝字字青雲拂斗躔蓬蒿何意彩毫傳雙龍並出豐城夜萬騎遙空朔野前當代自尊𤣥晏語異時誰問子雲𤣥亦知流水千年在敢向人間話絶絃浩渺吳闗落雁羣飛椷遙自九江濆山川忽借濳夫色宇宙長懸太史文潦倒十年慙賦雪吹嘘一夜有凌雲無勞更覔青藜杖不忝瑤華異代聞蚤春雪後攜尊小樓獨坐因憶客嵗同三君子舟中飲樂甚也輒賦四韻寄麟洲公并柬張彭二丈百尺晴光繞畫闌一尊池館坐髙寒璚樓四照天花合玉笛孤吹隴樹殘郢客陽春元寡和兔園詞藻盡登壇亦知剡曲堪乗興十載袁安啟户難夏日攜尊大雲山晚眺并尋白蓮池諸蹟落日壺觴興未迴飄然藍轝問崔嵬飛檣夾漢雙流下畫檻浮空萬堞開㟁草似留湘客怨池蓮能識謝公来翩翩白帢俱年少搦管誰當作賦才秋日登八詠樓讀休文諸詩有感突兀飛樓霧裡看當年詞客此盤桓窓中二水浮天入檻外千峰插地寒海嶠心情饒伏枕台垣消息㡬彈冠朱絃萬古重相對轉覺他時属和難杪秋逰金華芙蓉峰憇劉孝標讀書處叠嶺危梯挂碧天支笻遙踏亂雲前芙蓉萬朶煙中出檜栢千林洞口懸采藥壇空猶晉代讀書臺古自梁年移家我亦尋仙客試伴羣羊絶頂眠題管建初山人逰𤣥岳巻龍嶠千盤霧色開中天何處躡崔嵬遙峰恍入飛仙户列岫高懸上帝臺倚杖祝融雲自起題詩天柱月頻来風前絳節如相問為拾瑶華寄草萊送管山人逰吳束書迴首問滄溟何處逢人話客星三竺暮雲藜杖紫五湖春日布㠶青闗心雁陣愁邉落拂面驪歌醉裡聽歸去萬峯林屋底好攜鸞鶴報山靈秋日同郭鴻臚集趙明府宅對菊得寒字緑野晴開一逕寛清尊攜客此盤桓千枝的皪明秋序萬朶娉婷立暮寒露色總深陶令采霜華誰問楚臣餐西風拂面饒相笑得似龍山座裡看讀弇州山人集二首十襲琅函散紫氛碧窓遙夜擁蘭芬羣編盡廢中郎篋隻字堪藏太史文萬古江河誰白日千秋閭巷有青雲𤣥亭肻着侯芭卧不向名山乞典墳錦帙牙籖次第開披襟山色滿蘭臺初成漢苑然藜業盡壓梁園授簡才一字霜風猶縹緲千章河漢轉徘徊相思㡬夜瑤華切肻惜如椽借草莱柬彭穉脩有序先是穉脩與余會都門未㡬别去至是復來為吾邑廣文云帝城風雪苦飄零何意南天到客星埋没乍看雙劒紫浮沈猶傍一氊青桃梅拂坐春相麗苜蓿行杯午未停莫戀横經函丈底碧山時過子雲亭送沈純父之嶺南一封誰遣上天闗垂死行蹤瘴癘間萬里獨懸羇客泪九重曾問逐臣顔天迴北極龍樓逈日湧南溟象郡閒絶塞梅花題咏夜可無魂夢到朝班康裕卿挈家臨安僅一子復䘮為詩唁之白髮攜家傍五湖紅顔何意杳先徂一抔泪向延陵盡十口心懸伯道孤種玉尚看迴暮景投珠那忍憶長途西風獨夜猿啼切可道東門恨有無送習太史還江右草奏曾將動紫宸一麾河上有垂綸千年赤日懸明主萬里青山度逐臣玉筍琴尊餘嵗月金門環珮老風塵珠簾百尺滕王館囘首能無望北辰得弇州公書並見寄諸作賦荅四首玉樹雙裁照錦囊鴻書誰擬問滄浪頻年紫氣髙函谷一日青雲徧首陽門客有詩傳大雅老臣無賦上長楊烟花繞座秦淮月愁絶春城夢去長環珮當年七子流何人詞藻擅登樓筵開碣石青天盡社冷華陽白日愁八座尚看裴相起三山聊擬謝公逰離心咫尺雙龍暮醉拂芙蓉望斗牛迢逓雙緘到海涯美人何處把瑶華吳天不斷雲千里瀫水長飛雪萬家㡬夜幽情懸薜茘十年愁色老蒹葭追陪逺愧龍門客目送寒空雁影斜極目中原感慨同百年湖海嘆飛蓬臺空薊北無名馬筑散長安有斷鴻爾雅故應窮郭璞子虚寧得誤揚雄相思總傍湛盧色夜夜寒光吐白虹送潘少丞還嶺南把袂都門别思濃河梁寒色照雙龍官閒蹔乞文園病宦拙那能騎省容鶴夢西樵雲慘淡羊裘南海月䝉茸莫誇賀監當年賜不盡梅花四百峰同諸公夜餞楊使君於梁中翰宅得低字五馬長馳朔雪低衣冠握手重含悽驚心北闕辭丹鳳愁色南雲望碧雞銅柱千年標障塞鐡橋萬里界封提亦知上國懸金在咫尺炎荒到紫泥秋夜同陳太史康山人集李環衛園亭薄暮朱門並騎來相看詞客共徘徊孤亭逈對芙蓉出一逕深從薜荔開夜靜飛霜流玉斚天空明月上瑤臺風塵是處應劉合肻讓當年鄴下才夜同童子鳴康裕卿宿香山禪寺限韻分賦絶壁蒼茫霧裡看振衣蘿薜上千盤軒窓盡鎖西山色樓殿平分北斗寒雨過松聲隨錫杖風迴花影動瑶壇相看不盡憑高興欲向蓬萊借羽翰冬日黎員外招同思伯諸丈夜集不赴寄得雲字一尊華館動星文客夢飄飄擬對君𤣥草舊從金馬識青藜遙自石渠分春生大漠飛燕雪曲奏高天散楚雲零落梅花鄉國逺風塵誰不念離羣送太史趙公封楚藩惆悵驪駒易水傍西風愁色賦河梁金函夜捧辭金闕玉節朝攜下玉堂七澤星辰浮去棹九疑雲霧濕征裳丹梯絶頂岣嶁外幾送吟眸入帝鄉穀日同黎惟敬秘書梁思伯中翰丘汝謙計部童子鳴康裕卿二山人安茂卿文學集朱在明宅得宫字佳節西園燕賞同相將才子集芳藂簾前霽雪飄仙掌席上春星繞漢宫萬里清愁懸别鶴千門寒色動歸鴻梅花㡬度孤山下心折闗河尚轉蓬時二山人将南歸送陳穉冲還晉陵元龍何事獨棲遲散髮狂歌返翠㣲白石未忘松桂隠青山遙待薜蘿衣春寒雨雪連𤓰步夜色星河傍海沂時憶燕城攜手客登樓迴望五雲飛送胡計部督餉儀真旌斾遙遙海色開燕城春雪照離杯分畊乍息秦兵戰轉餉仍勞漢使才京口雲山圍省署廣陵花月傍樓臺烟濤極目淮流阻絶塞誰傳錦字迴送劉别駕之漳南一尊清夜此留懽離思蕭蕭雨雪殘萬里秋風還故國幾年春草客長安煙開郡郭漳流逈日落闗門海氣寒惆悵天南相憶處飛鴻遙望五雲端同童山人安茂卿夜集何太史宅觀梅得春字檻外幽芳欲照人相看瓊朶淨無塵南枝未送江頭色東閣先傳雪裡春明月寒林書共逺亂山孤驛夢難親不縁水部詩情在那得花前索笑頻夜同子鳴茂卿攜酒重集何太史宅觀梅兼送吕山人忠父南歸得湖字清夜尋花雪滿途何因東閣坐狂夫瑶臺影落霜天淨玉笛聲殘隴月孤醉拂莓苔驚庾嶺夢驂鸞鶴到西湖一枝欲贈南歸客囘首春山隔畫圖送梁思伯内史蹔還南海綵筆經年侍赤墀離旌初下鳳凰池停車欲度梅花嶺望闕頻扳桂樹枝萬里歸心殘雪後千山行色暮雲時薊門囘首生芳草莫使衣冠憶問竒席上送童子鳴逰衡山得蹤字躡蹻初尋七十峰亂山秋色傍行蹤中天翠削芙蓉秀絶障青含薜荔重金檢自探神禹䇿丹臺誰辨祝融封登臨憶爾層雲上杖底千岩落暮鐘送楊祠部出守滇南露冕西南瘴癘清十年𤣥草擅才名秋風劍珮辭天出落日旌旗傍海行賦就客非金馬署書來人臥碧雞城昆明萬頃浮槎夜愁絶魚龍異漢京送朱在明使長沙西風遙夜起長楊使節翩翩下建章淮海㠶檣飛夢澤楚天城郭出瀟湘心搖桂樹筵中月夢繞梅花笛裡霜宋玉臺邊芳草盡幾從秋色吊襄王錦纜朝霞出潞河雙旌南去意如何泥金漢使傳書下玉珮湘妃作賦過萬嶺秋光天柱月千秋寒影洞庭波清尊莫滯王門燕握手蕐陽待和歌送沈僉憲入越幾年尊俎淨狼烟獨下青霄雨露偏三殿清霜隨憲節五陵斜日照離筵梅花夜繞江城發棠樹春從海國懸此去湖山堪極目湧金門外半樓船送涂明府之龍丘黄金臺下共留懽獨向青㝠奮羽翰雁塔乍題唐進士鵷行仍别漢郎官江雲縹緲雙鳬下海日蒼茫一騎寒白晝琴堂歌咏暇看花還憶在長安秋夜同惟敬諸子集劉觀察園亭分得髙字一尊三徑掩蓬蒿詞客相看盡綵毫華館乍停鸚鵡曲青藜遙識鳳凰毛天垂閶闔繁星轉霜滿樓臺夜月髙十載梁園幽興在不妨寒色上綈袍送伍明府景周之永嘉逺塞寒聲起暮笳離亭歸思逐黄花雙鳬欲化郎官舄片鷁先開使者槎旌斾夜懸滄海月樓臺春繞赤城霞乗閒擬著西征賦為報安仁髩未華哭梁思伯中翰四首華髮才名滿玉樓思鄊仍作嶺南逰三秋鴻雁音書絶一夕龍蛇䜟緯愁易水飛霜閒别館海天斜日下荒丘西風獨把延陵劒不是詞人亦淚流五夜簫聲逐鳳凰碧桃枝下幾傳觴雲開郭隗黄金館花滿盧家白玉堂尚擬故人来漢闕不堪遊子去濠梁相思欲吊天南塚落盡梅花大海傍憔悴孤城此哭君闗河萬里見浮雲空齋寂寞青綾被遺藻凄凉白練裙醉客尚餘山簡夢招魂誰續景差文松風忽傍遙天起猶擬精靈下夕曛奇絶當年顧虎頭停杯為我畫滄洲毫端雲霧三湘色堂上煙霞七澤流漁艇依微臨野㟁人家搖落帶沙鷗只今粉墨空惆悵一片青山起暮愁送安茂卿賦得富春山釣臺同諸子分題作百尺危梯上翠㣲空臺長日亂雲飛山寒麋鹿歸樵徑水落魚龍傍釣磯越渚㠶過蘭杜逺漢庭書到薜蘿稀披裘莫道垂綸客夜夜雙星動帝畿將之武昌留别社中諸丈時家君出參楚藩黎秘書惟敬萬壘西風接暮秋楚天城郭蹔淹留樓臺寂寞僊人去環珮凄凉帝子愁過雁定傳衡岳字啼猿初繫洞庭舟佳期南國無由共獨對青藜悵逺遊劉憲副仲修十載青衫傍帝都鄊心遙夜憶蓴鱸林間賦客閒三徑天外歸人問五湖秋雨㠶檣連白帝碧雲原廟鎖蒼梧江城玉笛休迴首零落梅花客夢孤康山人裕卿握手孤雲爾共論不堪岐路倒芳尊經年暮雪棲燕市一片春霞阻石門江上鴻書誰賦别天涯龍劒早酬恩蘆花夜夜扁舟色愁絶青山繞夢魂丘計部汝謙蕭蕭殘葉攬吳鈎才子臨風憶舊遊客路逺過湘水宅離心獨上武昌樓黄陵日落千花暮赤壁雲生萬葦秋㟁㟁啼猿江色裡不堪重繫木蘭舟李環衛惟寅京洛逄君解珮刀翩翩人識鳳凰毛歌殘白雪瑶華在夢倚青雲玉樹髙故國深秋淮甸雨歸心寒月海門濤江魚塞雁能相憶莫滯西堂五色毫安文學茂卿野竹江花繞㟁迴長沙晴望漢陽開浮雲曉色襄王夢寒雨秋聲宋玉臺白苧早飛三楚調青袍誰識五陵才南歸好逐征鴻翼一為湘娥解珮來易侍御蘇别駕蔡亷訪攜酒清源大雄閣餞别得才字碧瓦雕甍玉作臺真從人世躡蓬萊盤空日月三天近抱郭南山萬井開冠盖乍逢梁苑集㠶檣初望越城迴亦知信美非吾境魂斷登樓賦客才荅徐仁仲二首有序返次清源阻水者㡬載月豫章徐仁仲逺移舟見就日夕晤語甚懽將别賦贈相逢豪氣自翩翩早覩靈光第一傳李郭仙舟同此夕張雷神劒合當年眠雲欲借匡廬頂望日聊依泰岱前七十二君君試問㡬家遺碣到桑田仁仲賦排律四十韻見貽推寄殊篤余别有報章朱絃無分奏彤庭濁酒猶堪話獨醒歴落雄心懸老驥蹉跎愁鬢擲流螢江頭地逺滕王閣湖上天開孺子亭縱是河東能邂逅千秋能似太𤣥經渡江聞汪司馬避暑焦山有寄隨縁瓢笠又東林玉觀瑶臺望欲沈長憶鳳翔千仞上不知龍臥大江心名將日月題丹洞賦擁雲霞列翠岑倘覔戴逵溪畔宅秋風迴棹是蘭隂淮徐歸興六首一棹乗秋出五湖西風愁色動蓴鱸金門帝許排閶闔寳劒人誰問鹿盧千尺尚懸東海釣百年休踐太行途平生烈士心長在碎撃王郎白玉壺夾岸㠶檣衛水濵蒼茫雲霧入垂綸三生不戴如花面九尺長餘食粟身杜宇慣嘲多病客辛夷頻喚欲歸人滄溟萬斛吾家在好逐漁郎問去津一望龍門興已闌漫將陳䇿射金鑾生來驃騎封侯易老去馮唐謁帝難栗里乍看三徑在桐江猶剰一峰寒秋風咫尺天池上未向榆枋刷羽翰短褐猶聞卧海湄長裾曽否曳天池蒼茫八翼飄雲漢慘淡雙肱折路岐玉洞豈無千嵗水金門寧乏萬年枝從教少婦機頭坐賦裡黄金尚陸離一㠶春雨下淮陽栁色偏嘲薜荔裳病後風塵堪躍馬歸来陵谷任騎羊髙山自奏三千牘上苑誰矜十八行莫嘆盧生魂夢裡㡬人窮達在黄梁白面題詩碣石臺紅顔擲盡重徘徊虛疑駿足曽雙刖不信羊腸易九迴縮地將隨徐甲去談天毋擬劇辛来飛揚摠属羣公事一壑猶能擅草萊司空潘公行水徐泗間訂余晤語淮上適黄河阻風不及赴約輒因使者報謝四章側席天書降紫泥東山寧得遂幽棲琅函晝捧千靈集玉珮晨參百吏齊碧樹交陰籠大道蒼松垂葉䕶長堤龍蛇滿壁郵亭下一認當年夏后題一舸南征嵗月遐老臣馳驟日天涯平驅邵伯湖頭雪盡築髙公堰口霞稍喜故堤添栁色從教新漲没桃花軍儲絡繹三邊外底事屯田説漢家􅏭嵲穹碑頌姓名輝煌巨軸紀平成縁堤彩鷁千羣度掠水黄龍萬隊行轉粟東南無大澤飛芻西北有長城異時河洛看遺跡何限秋風璧馬情燁燁龍章下鳳樓漢庭何羨富民侯中天日月低環珮大陸風雲近冕旒蚤闢西園延上客行開東閣貯名流不縁石匣司空問誰識干將在斗牛過觀察金公故居有感有序公名應照宰吾邑者逾六年亷介逈絶歴官山東觀察使一日無疾終余素辱知國士爰詩吊焉六載氷壺異政傳琴堂晴色弄朱絃邴原乍肻懐千石劉寵猶憎受一錢桃李春風繁越嶠松楸寒日吊吳田門庭寂寞登龍後慟絶當時問太𤣥少室山房集巻四十九
