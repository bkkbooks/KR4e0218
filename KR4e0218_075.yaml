body:
  text: 少室山房集巻七十五明胡應麟撰七言絶句八十三首秋夕紀夢十絶有序夜夢至一處萬山嵯峨白雲載之其上有金銀宫闕麗甚榜曰碧落洞天余徘徊其外良久不得入而寤因戲作十絶紀之芙蓉一枕自徘徊恍惚鈞天帝子臺長嘯八公攜手去萬峯雲色駕蓬萊足躡安期兩赤虬飛行忽到海西頭青山一片崑崙頂亂落星河滿蒯緱曉入瑤池殿裡行珠簾斜捲月華明天姝十萬花如綺不省何人是智瓊十五神鰲戴白雲三山長揖魏元君不須遠問靈飛籙玉佩金璫盡秘文永夜銀河送客槎吹笙遙赴阿環家狂抛織女支機石攜手扶桑萬尺霞龍蹻泠泠踏紫烟罡風吹向大羅天白雲滿地秋如水十二瓊樓獨自眠一局王喬對未殘飛書何處到青鸞騎龍夜赴西池㑹三百明星亂玉盤玉榜瓊樓次第開梯仙靈境乍徘徊花前舞罷山香曲萬朶紅英落絳臺樹樹桃花玉洞前成都賣藥已千年秋來跨鶴騰空去月滿仇池第一天縹緲羣仙列上清天都齊送珮環聲歸來莫道無人見兩袖霞光罩赤城夜登金華絶頂慨然有懷作步虚詞五章兩袖明星拂絳河天風吹客上嵯峨無勞更覔梯仙界半夜鞭龍入大羅長揖元君向紫宸中天樓殿矗金銀如花座上三千女攜手先過第一人禮斗壇邊下夕陽焚香絶頂奏虚皇不知誰喚羣仙到零亂星河白玉床洞中有仙人石床瑩如白玉一謫仙班下海涯夢魂長繞阿環家西華舊業荒蕪甚老却瑤池萬樹霞左揖龜臺右木公仙壇瑤草暮茸茸金華自有騎羊客漫許畱侯事赤松新秋郭鴻臚吳文學過訪畱飲小齋至暮一自華陽罷和歌頻年白眼卧山阿𤣥亭莫怪秋來啟剛為侯芭到緑蘿嘲小杜舟泊廣陵憶杜紫薇青樓薄倖之句戲成此絶花壓虹橋水壓城玉簫吹月到天明當時自少揮毫客可道青樓横得名喻邦相即署中建樓題曰信美索詩為賦四絶胡床明月坐高秋碧瓦朱甍大海頭十二危闌賓從滿一時傳作庾公樓畫檻雕闌瞰越城平湖十里最分明公餘半捲珠簾坐四百樓臺弄晚晴嬋娟一片起簷牙影落臨安十萬家絲竹管絃清夜滿何如遷客在長沙不道青衫客異邦錢塘江外是潯陽扁舟若趂滕王宴一夜南風到豫章戲贈貞吉中尉兼柬唐惟良來鵬姓僻人希覩司馬名成帝未聞獨有故人先識面豫章前殿舊將軍靈洞山房雜咏為趙太史題五首古洞棲霞石磴岧嶤挂紫烟芙蓉萬朶石羊眠尋仙不用盧敖杖雙跨虬龍入洞天洞名雙龍中巘干霄鳥道千盤壓翠微中峯突兀鎖烟霏天風兩袖捫蘿上不道金丹白日飛三山環壁十尺幽軒鎖碧桃三山羅列畫屏高登臨忽憶吾家近萬仞扶桑壓巨鰲片石飛雲蕭然行槖賦歸農琴鶴齋前但故蹤莫道嶺南無長物羅浮攜得最高峯山亭樵語萬籟無聲晝寂寥小亭徐坐看花飄前山何處來人語一片歸雲下晚樵讀方僑山人集二絶有序方僑山人太古從子也學五言律有清韻如霜清漁艇集雨暗客帆收野水通泉脈山雲露石根藤交山寺僻溪截野橋横細草幽縁徑新篁宻蔽簷曉樹籠雲暗寒山帶雪竒溼含鳩雨細香賺蝶風輕等句率晚唐餘味視從父可謂青氷第才具不多耳堯治又僑之猶子既從汪王兩司馬乞太古傳與銘復裒僑遺草刻之而懼其傳之弗永也索余題二絶其後云廿載寒溪曳短笻何人攜酒日相從林中偶遇飛觴客把臂無勞覔仲容尚記蟬聲過别枝韶卿亦與謝翺期方干有句云蟬曳殘聲過别枝方鳯宋末婺人字韶卿流風莫嘆諸方盡五字重吟鐵馬詩山人有題鐵馬詩頗可觀再送吳師入洛四絶句翩翩行斾逐西風十郡材官指顧中屈指大廷推第一河南寧羨漢吳公珠履三千各賦才向來門客盡鄒枚高牙大纛鳴鞭去白日遙登古吹臺二室東西並拂天中天樓閣擬雲烟抽毫絶頂嵩峯上一線黄河墜檻前七聖襄城駕不遙三花紫氣拂輕霄遙知問道崆峒後鹵簿相催入聖朝客有至自吳門者傳周公瑕媵人將就館喜而為詩詢之臺深銅雀鎖斜陽高唱將雛待鳯凰筵上不須重顧曲吳門今是老周郎葉明府校士錢塘五絶余邑方大有秋故末首并及焉曙色蘭隂照錦袍飛檣遙下越門濤高秋棘院掄文夜萬樹天香入彩毫明遠高樓百尺懸寒光遙夜動龍泉由來寶劍司空識紫氣行看北斗連紫綬緋袍煥陸離畫堂燈火徹簾時湖頭十里秋風色兩袖天葩上玉墀􅏭嶫雙高上紫氛迢遙三竺架青雲雄飛好趂仙鳬翼一顧能空萬馬羣處處黄雲足稻粱家家秋色賀登場東南竹箭三千尺更逐伶倫到上陽日暮風起仲嘉戴一布帽復落賦此嘲之兼呈汪司馬谷口天風起暮笳笙歌催客嚥流霞亦知閫内非宣武布帽何須落仲嘉訪汪士能不値吳生畱飲狹斜席中漫興二絶潭水桃花閉緑蘿一尊其奈片雲何何時更發青蓮興飽聽汪郎白雪歌滿蹊花色繡平沙自在嬌鶯喚落霞莫笑杜陵衣盡典曲江還醉四娘家又戲作寄汪六漫詫蓮花似六郎鬚髯如㦸太昻藏若為騎鶴揚州去十萬朱提照畫堂汪適以㑹計入郡晨發題壁春風一笑引流霞占盡揚州十萬家惆悵碧桃何處落銀屏珠箔寄天涯為沈生題扇沈生善歌余使習司馬大雅堂四劇詩以朂之清夜琵琶搊落梅香山司馬玉山頺若為長恨歌成誦一曲千金意未迴夜同汪六吳三過城西酒樓巨觥飛白墮數十巡旋取余所攜金華更酌小奚撥阮二䜿子歌弋陽潦倒申旦迺别俳語一絶紀之潦倒壚頭作酒狂青衫重入少年場那堪醉憶瑯琊語滿酌金華聽弋陽楊孝亷邀遊河西酒樓歌者持扇乞書垂栁垂楊千萬條春風畱客董嬌嬈他時怕唱清江曲二十年前舊板橋戲用唐人原句即事蕭蕭風雨坐莓苔百罰深杯未擬囘莫怪桃花閉春澗劉郎今度是重來歌者屢召不至汪生狂發據高座劇談水滸傳奚童彈箏佐之四席並傾余賦一絶賞之琥珀蒲桃白玉缸巫山紅袖隔紗窻不知誰發汪倫興象板牙籌說宋江贈吳美成崇蘭滿室坐飛香十二樓頭白玉堂自是宣和詞賦手莫將年少詫周郎睡起作綉衾霞褥卧徘徊啼盡天雞喚不迴無限悲歡十年事一宵齊向夢中來巖鎮遇雨宿汪士能齋頭櫽括唐人絶句作續惆悵詩十二章止成二首而止騎鶴吹簫空月明亂山風雨閉荒城那曾一覺揚州夢贏得青樓薄倖名仙源何處覔瓊漿萬朶飛紅亂夕陽莫怪桃花貪結子芳菲元不為劉郎答汪仲淹寒雨巫山閉楚臺七香俄載阿香來不因宋玉能相撓日日行雲未肯迴又分得花字代歌者答胡麻何處問仙家忽有明粧出亂霞自是劉郎重到晩莫將風雨怨桃花司馬公既命片雲矣更謂余命一字憶公高唐記神女小字瑤姬請遂輟以字之公笑曰可并為賦一絶句仙姬環珮下瑤臺戲借用傳竒語握手桃花萬樹開日暮巫山行雨去莫教人擬片雲來翌日吳肇成招同司馬洎諸君浮筏遇雨泊梁下有挈歌姬趙某至左手三指爪皆長六寸餘司馬記中所謂邯鄲才人者也方平遙駐五雲車勾引麻姑出絳霞莫向蔡郎矜指爪夜深畱取撥琵琶席中方演琵琶伎適趙姓亦竒緑髮紅顔照舞衣門前車馬未全稀若為湖上參禪去長爪錚錚法雨飛别汪仲淹二首痛飲狂歌夜不休華堂風雨促離愁相思何處偏惆悵三月桃花病倚樓籃筍扶攜出釣磯河梁别淚亂吹衣不堪重執汪倫手潭水桃花撲面飛别汪士能二首野店相逢匹馬黄畫樓紅燭照霓裳虬髯自是前生貌莫向扶餘作國王是夕適奏張伯起紅拂傳竒緑酒銀燈露未晞紅粧深夜舞明妃無論車笠他年事已共咸陽作布衣邦相卧病金華寄訊二絶時余亦伏枕山荘八咏樓空月色饒青衫憔悴沈郎腰西風露白金盤冷咫尺恩波下絳霄挾策歸來似轉蓬卧彈長鋏送飛鴻金華舊是尋仙地可道雙旌駐葛洪同祝遜父葉叔明諸子登大雲山萬井樓臺夕照間青烟明滅鎖林巒憑誰冩寄中原客一片關仝畫裡山是夕趙汝元祝無殊同游市中觀燈熒煌燈燭照山城攜手春風入畫行歌罷落梅清吹合恍疑笙鶴在蓬瀛祝太學昆季過雙樹園不值三徑蓬蒿晝不開落花長日鎖蒼苔何因看竹西鄰去忽報羊求二仲來雪中二祝生攜酒過訪四山晴雪照疎櫺片片蘭隂入座青試問成都攜酒客幾人能過太𤣥亭將遊新安葉明府傳送人舟即席賦謝二絶竹箭春江二月流桃花紅映木蘭舟聊因葉縣神明宰一借仙鳬瀫水頭寧國新都一水間朝遊白岳暮黄山乘風坐嘯天門上遙指雙鳬入漢關張元春為余作書齋四圖各系以詩金華三洞萬仞朝真天際頭雙龍飛瀑望堪愁何如坐對王維畫四壁青山盡意遊少室三花三花晴色際天開尚憶當年二李才李渤李荃莫笑書生長寂寞碧油車引上元來封陟事見廣記二酉山房海外徒聞二酉山崑崙𤣥圃隔人寰生綃拂拭高堂上彷彿曾驅八駿還蘭隂精舍溪上秋蘭帶暮春萬峯晴色照嶙峋他年莫使閻侯見認作僧繇第二身春日送高生楚遊雲漲平湖緑滿堤片帆朝掛武陵西春山盡日無人見萬壑飛花杜宇啼方山人章葉二太學過集龍門何客曳長裾年少翩翩各起予不是元龍豪氣盡十年湖海斷來書同胡孟弢王永叔李季宣遊曲中戲為二絶十年沽酒共持螯淪落長安氣尚豪銀燭綉簾春似海夜深重奏鬰輪袍蒲萄新緑照人明急管䌓絃四坐傾莫道春明能久住朝來仍别潤娘行同房仲過雲間舟中聽趙五叔遠夜歌作樓船明月夜如霜一曲清歌趙五郎貪聽陽關第三疊不知行色在吳閶潘張兩生小飲舟中時童子阿四侍側衆以黄四娘呼之余賦一絶騎曹公子各翩翩黄四娘嬌壓玳筵狂殺杜陵歌扇底爛燒銀燭坐霜天趙生以歌者范三至再乞余詩淋漓尊酒醉還醒嘹喨歌聲出錦屏最愛趙郎情性好雙眸時為萬山青再贈小范歌玉簪欲解綈袍換緑衫梅花明月夜毶毶不因趙氏連城在那得尊前聽玉簪幼于所懽王姬攜酒餞别戲酬以小詩最愛風流黄四娘偏能問字浣花堂他年細檢成都札猶恐才人是洛陽少室山房集巻七十五
