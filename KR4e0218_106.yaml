body:
  text: 少室山房集巻一百六明胡應麟撰題䟦二十六首題方氏䟦益藩賜宋懌書國初吾郡宋太史文舍人書父子並起一時而皆為當代冠又太史書舍人文亦卓然稱名家盖古今創覩也方氏為景濂門下士而極口贊仲珩至品之威鳯翀霄祥雲捧日噫若正學寧䛕人者哉其言當時乞文太史者必謁舍人書之令人想像其父子間一吮毫而空四海而海内奔走其門者亦樂得二絶于其父子間以為快未幾仲珩没景濂徙造物乗除之數可畏哉仲珩子懌復能書益藩嘗舉魯公多寶塔碑賜之䟦見方集可考宋氏箕裘之盛迺爾今懌書絶不傳即仲珩書亦寥寥什一存世嗟夫三世為將道家所忌乃自昔患之矣又題方䟦宋仲珩書寄自作詩希直最不輕許可此䟦于勝國趙康二承旨意若弗盡予獨謂仲珩兼撮其勝而俊放有加豐人翁目曠古今迺其贊仲珩秀逸雄麗之中具冠冕珮玉之象而皆盛以本朝第一歸之其品格可想見藉令稍引以年駸駸軼宋唐躋魏晉矣而夭閼中道豈造物者必欲典午諸賢長技千載耶余性拙于書至仲珩亦望而知其美若其詩國初髙楊輩無以過也惜仲珩書及詩今率鮮存者大塊忌才蘭摧玉折余尤不忿于斯人云題駱賓王起義檄武曌以淫牝穢亂唐室實曠刼所無之變而一代瑰才傑士擎跽曲拳無敢聲其罪者獨駱賓王廣陵一檄詞義凜如足寒猾賊之膽盖唐初第一流人物也而生懐淺躁之譏死罹怨望之訕史氏因循列于文苑并其字失之遂令邑井祀典千載寥寥往余籍弟子員日嘗以白督學建安滕公滕公急材甚業舉行㑹擢任去弗果蘇觀察君禹繼至大快余論即移文祀駱于鄉此舉不特為當時節士伸寃亦為萬古詞塲吐氣也題駱賓王集後二則賓王起義世所共知而不知其奉母至孝集中三與上官啓皆以捧檄負米為言至裴行儉辟為記室力辭以母老不堪逺行情致酸楚意旨真篤言言涕淚即李令伯表弗過也道王命以自陳則抗詞不答半千諭以干進則守道不迴槩賓王操履類出唐文士上遺集班班學者徒泥裴語何哉又史稱駱賓王失職鞅鞅遂與徐敬業起兵夫孽后臨朝羅織萬態即狄仁傑輩尚誣以反况賓王倡義殺身欲加以罪寧足據乎且文人失意憤誹其常屈平懷沙賈誼賦鵩後世咸悼其忠賓王首倡大義庸可以此訾之駱集十巻今存自疇昔書憤三章外無一鞅鞅語至忠孝氣誼浡鬱諸製作間有足異者余别傳之題駱賓王帝京疇昔篇後汪司馬伯玉嘗謂余三代而下有才子有文人有學士有作者才子文人學士代有之作者非屈之騷司馬之文賦杜李之五言白甫之律絶莫能當唐以後無作者矣惟秦栁之詞王闗之曲耳因及吾郡駱生曰若賓王二長歌前無古人後無來哲盖亦庶幾作者也余有味其言而志之題范茂明淮隂先生辯陳同父酌古論方茂明為此文年僅二十一同父作論纔十八九耳英氣已勃勃迺爾二君皆老壽終顧其後撰述卒無能有加于此豈其筆力弱冠時固已定耶茂明辯説縱横大有秦漢風一掃宋人頽習而他作不盡爾同父論體勢實步驟蘇氏兄弟時時錯稚語其間而竒偉絶人之識即前代豪傑身當其事者且心折九地下惜乎其登第遽没當南渡劻勷戎馬而未展一籌也其論淮隂筴李左車足盡刷史遷胷臆之陋但所設破趙策未為中窾至論薛公策黥布孔明扼司馬鄧艾取蜀可謂深識天下之大勢切中行陳之機宜非振世之才莫能與矣茂明亦好談兵事屢進䇿紹興間弗用同父上皇帝四書卒為姦人所中幾殺身宋柄國者類爾弗滅于金固幸尚望以恢復計乎但兩君生同世又並及紫陽朱氏游而絶不相聞問何也豈同父數走四方而茂明老居一壑故耶噫嘻若兩君者吾郡二百年無此人物矣題陳同父集後同父當靖康建炎間以氣雄一代其説以漢唐創業之君即商周之始無以異故朱紫陽亟詆為功利而外之而同父亦自有堂堂之陳一日差長等語世以為譏切紫陽也余讀其集迺不然同父之尊事紫陽至矣每紫陽誕日輒走使千里寓書損餉備極情文其終身弗能相合者僅前一説而同父之尊事紫陽凡可以致其推挹無所弗備迄未嘗因是而少替也二君子書尺往還不啻十數二家遺集班班學者弗知詳考徒據史傳舊文俾同父之虛懐夷于子静之拗崛余弗得弗辯之題陳同父水龍吟後二則陳同父絶不能詩今集存者僅二絶一長歌知其未嘗事聲律也集末載詩餘數十闋而草堂所選水龍吟詞特佳甚而集不存古今製作佳者不必傳傳者不必佳大都有幸不幸耶又此懐所懽作者殊足情致與同父他詞不類周公謹野語載陳嘗狎一妓欲娶之蘄落籍于唐與正唐以言間妓好遂弗終陳因是大憾搆唐朱元晦卒起嚴蘃之獄此詞之作豈即其時耶所狎妓或即蘃故與正不肯為落籍耶今紫陽集載論劾與正封事幾萬言所謂行首嚴蘃稍以色稱紫陽筆也蘃亦能詞見野語甚詳以一婦人色致諸名士紛紛聚訟為千古口舌端令人噴飯不已題泊宅編後泊宅編十巻金華方勺仁聲撰勺當靖康建炎際隱居不仕後終于霅上與唐張𤣥真操行略同𤣥真所著大易等不傳而子書今尚行世吾郡南渡而後吕太史一倡何王四氏繼之所為發明經術不啻數十百種世傳僅什二三而是編以脞辭𤨏録至于今而完袠不廢而其間亦往往有可訂史乗之所弗及者世以隱君子亡裨于時而小説家靡足論于著述然乎題庚溪詩話後詩話為南渡陳嵓肖子象作子象吾郡金華人父德固當靖康時為汴京守備官嘗獻制敵䇿朝廷弗能用俄都城陷率衆赴敵死之子象以任子中詞科仕至兵部侍郎見吳正傳敬鄉錄近詩話彚刻百川學海中不題作者姓氏余參訂本書前後得之喜甚綴詩藪尚未知其郡人也乍閲吳公所録始悉其家世履歴因亟識之詩話最盛于宋當未渡南日不啻數十家而知詩者曽弗一二至南渡末而劉㑹孟嚴羽卿出遂以譚藝雄古今此書成于紹興適南渡之始其綴述見聞網羅散軼良有足多不僅僅談藝而已又吾鄉先達忠義世家固不得而泯也輒并及之題困學紀聞後趙宋自渡南後詩文書畫率厭厭不振絶與其國勢相侔豈錢塘孤僻海隅又非建康比故爾時人才無一可軫接漢唐耶而獨該洽士天挺其間紫陽氏之致廣大盡精微固不可時代論至如鄭漁仲馬貴與撰次類書其討覈之勤綜理之密皆卓然自名一家横行濶視于著述之塲而不為無補于世顧反有唐漢所不及者而王伯厚生平製作迺至七百餘巻噫嘻一何盛也玉海一書今存大都幾希馬鄭之間困學紀聞二十巻中尤多發明讀書得一義如獲一珍珠船雋哉斯旨非真有志學問未易咀嚼其間也余之生也家大人命名適與伯厚同而生平術業乃逺出伯厚下若所謂困而能學雖伯厚以自謙而余實不敏有之因志巻末以致余仰云題吳禮部敬鄉録詩話雜記後吾邑自范浚先生始用著述顯金吉父氏系興于經典發攄無遺力而他固未遑也禮部吳公師道生視吉父稍後而于著述尤殫心補註戰國䇿大行于時考覈之精深辯析之窾當嘗鼎一臠足例其餘其全集余嘗得其鈔本詩歌盖多佳句余摘録詩藪中至敬鄉二録及詩話等編舉郡邑凡有聞者緝其製作履歴粲若指掌下逮畸流逸客片語隻詞亦博采旁證竟其隱伏耳目所及㸃綴弗遺噫其為力至勤而用意良獨厚矣今去吳公僅二百載而文獻之詳遂邈弗得而覩而南渡而上人才篇什史乘軼而未収者尚倚藉諸編稍獲綜其崖略盖吳先生功于是為烈而余于禮部固異世子雲也因筆余懐于末簡以俟異世之為余子雲者諗之題劉青田集後戰國後無子書矣東西京文賦特盛而子書逺非先秦埒異哉青田之子郁離也竒氣瑰藻絶唐宋越兩都翩翩然周末抗衡焉殆天授非人力也髙皇帝載造區宇同文八荒郁離哉彼符赤伏者陋甚矣迺青田之為他文體格卑卑元末無纎殊故曰殆天授非人力也而嘉隆之際短長復出于明明之盛至此乎噫題方希古遜志齋集後三則余往述諸子辯雜取唐宋文人遺論訖本朝宋太史景濂王長公元美凡數十家而竊以鄙意折衷之弗能秘而行諸世世之治諸子者頗韙余言當是時獨方氏遜志齋集未覩也癸酉春客武林邂逅是集龍丘賈人處亟取閲之中辯論諸子凡二巻其為説亡弗犁然當余心即太史長公所論有弗若是脗合者中間稍稍矛盾僅百之二三餘合者幾不啻什八九矣希直精忠大節爛焉日月爭光諸所為説一原本六經軌諸至道余願為執鞭弗可得顧時時有合于余余寡昧索居自放人外而私衷謬臆亦時時有合希直者此何以故也後之君子欲以狂誕罪余余且得藉口若人以自逭亦因以考見余之困而能學雖髙賢大良垂世之訓而千慮所得時或中焉庸詎非吾生平至快極愉哉因泚筆題諸簡末又弇州文評云方希古源出眉山氏才髙特少波瀾耳余讀之其詞氣俊爽英發特類大蘇志傳簡勁有法過之而奏疏之屬不逮表啓則逺矣詩學太白歌行時有近者葢亦眉山前轍而不能如蘇之自得也總之子瞻才較大希古才較偏至學術之髙明識趣之閎粹矢口成言皭然一秉于正如堂堂之陳王者之師直之無前舉之無上無論眉山父子盖三代而下文章之士所未覩矣又王長公謂國初之業潜溪為冠烏傷稱輔次及蘇平仲胡仲申皆吾郡産也又李獻吉送徐昌穀歸吳門詩云金華數子真絶倫意亦爾爾然數君子皆産元末且受業其人之門浦陽閎才絶學足盡掩虞楊諸氏而意調不甚相逺忠文持論中窾而南渡儒元語時時錯之眉山染説瞽説卓有秦漢風他文率仍爾時舊習仲申抑又靡焉獨希古年視諸君子最少與勝國文人夐弗相及故其文一掃元調追逼盛宋大家惜其知名稍晩旋殉節革除志業鬱而未竟篤而論之國初自潜溪外當首推也題唐伯虎書牘後二則余三復此書而悲之大塊忌才固自昔亦何忍荼毒之至此然伯虎非身罹此境亦無以有此書今當時之竊髙第享榮名者什九腐草木伯虎此書爛焉竹帛千秋永垂視商文毅輩所得孰多不待智者而決矣又此書視六朝所擬李少卿作可謂合曲同工舒冩淋漓濃至處殆不忍讀然伯虎此書外他文遂無復傳即傳者一二亦弗能工何也豈其才固盡于此將一躓而不復奮耶計伯虎之卒僅得年四十許盖亦不久喪矣昔武曌讀駱賓王檄曰人有如是才而使之流落不偶當時之擠伯虎者殆曌之弗如也哉題二王書牘後右兩瑯琊書牘四巻為長公者十之六為次公十之四次公生平與交游書牘自三數達尊外凡等輩率手書至與余還往者尤無一非真迹行押之妙在有意無意間姿態溢發而行間鬱茂望而知其晉唐人物也長公書牘大篇多侍者代錄亦蕭散無掾史氣侍書者二人皆長公家僮郗方回奴故自不俗余至小袛園每見之他短章則亦手書為多雖不規規曩轍當其合作竒逸縱横不啻蘇黄入室賓也余自交兩王公片楮隻字咸所珍惜積之念載以成此巻今兩王公相繼作白瑤宫客即欲更求一㸃畫震旦中不可得矣敬題末簡以識余慨若其文章之美亘宇宙而長新者在處自當有神物䕶持固無俟後人贊嘆也題康裕卿詩冊後余初識裕卿于今大學士趙公座上余尚未冠也裕卿讀余春日閒居十詩中句若曳杖青山逺推窻綠水來風雲欺病骨天地與閒身之類輒狂呌擊節期他日必有聞于世自是裕卿凡製作寄余無慮數十百洎他篇什得意者必手錄貽余重其人恒秘諸篋笥久而慮其散軼則命家僮裝潢成帙每臨風對酒興㑹相思輒時展閲恍若裕卿之在目焉今裕卿已入岱所恃以寄想像獨賴是巻之存而余童子日所為詩囊草率已漶滅僅前數聮以裕卿賞識故尚存胷臆因泚筆紀之河山之慼臨楮懣眩裕卿有靈得無欷戱地下耶題李達甫投贈古風後二則婺中詩𣲖肇于駱賓王適唐初沿襲陳隋五言古詩與近體無以異孝標二作稍超故未脱六代聲格宋元後益卑卑或謂吾郡舊無五言古余殆無以難之達甫生數千載後迺奮臂嘔心直探魏晉之壘掣其符而珮之此六詩其投贈不佞者令具眼諦觀庸待其詞畢也今而後有能復舉前説以謂余者乎噫達甫尚益竭而才建安黄初規矱弗逺婺之詩駸駸上乗矣又盧藏用謂李泰和子如干將莫邪鍔不可犯但虞缺折耳余每舉斯言風達甫以其才高急名又體氣劣弱慮年壽非所長不三載竟赴白瑤宫召矣英雄大業未半中殂徒使存者抱知人之嘆于地上噫題李仲子詩草後余嘗摘鈔仲子集中佳句無慮數十餘寄余如寸心懸宇宙片語劃江河雄名枚叔後絶技杜陵前毫端雕混沌篋底遡洪荒天姥雲堆案嚴陵雪照篷薜茘封囊草芙蓉澁劒花駿骨時名重羊腸世路艱䇿抱龍門下詩裁兎苑旁斑衣正逺慈親夢彩筆先傳幼婦詞謁帝星辰天北畔懷人風雪海西頭𤣥晏為傳諸賦出中郎還秘論衡無海岳心懸孤劒迥乾坤業就彩毫多已上俱寄余詩中語他作則路通秦望北山㫁禹陵西急峽魚龍鬪深林鸛鶴呼樓臺句踐國玉帛夏王宫綺羅縈萬陌鐃吹競千家别溆藂青荇平泉綴綠苔勝事蘭亭墨幽期剡水艫擊劍長虹流碣石呼盧明月滿咸陽秦淮鷁首春烟合建業驄前暮雨殘攬轡風霜迴百吏飛章河岳走千靈畫棟飛雲滕子閣胡床明月庾公樓青天片鷁岷江去白晝雙鳬賀嶺來千花南浦吳娃醉獨樹西陵越客過皆整麗可觀惜汗血中道未竟飛黄之馭又題余陽春館十六咏金華山十絶句並佳作也暇日曝書得允達草于散帙中不勝河山之感因援筆志巻末異世有揚子雲出余將俟而質之書二王評李于鱗文語庚辰夏過小祗園長公譚藝次偶及李于鱗文長公曰余初年亦步驟其作後周覽戰國西京諸家迺翩然改轍于鱗初極不喜久之余持論益堅李遂止弗復更言余請初年所作觀之長公曰當時意不愜即棄置其稿今不復憶何語矣是冬次公訪余溪上夜評隲當代諸名家至歴下曰李文辭多繳繞紆曲固其體欲艱深亦繇才短故不能詞達其意猶口吃人終日諄諄聽之者苐覺難解今之憙為此體者大都才具所趨也兩王公筆札間推轂濟南不容口其靣論不同迺爾盖兩公于李交厚董狐之評不無少曲而其指往往寄寓他文中初學不盡叅其集未易悟也偶讀于鱗文輒識簡末俟精月旦者定之少室山房集巻一百六
