body:
  text: 少室山房集卷三十九明胡應麟撰五言律詩七十一首吕梁阻風呈徐使君彭城遙騁望突兀見黃樓驟雨悲泥滑狂風畏石尤千山攢地出一水抱天流羡殺徐車騎干旄控上遊寄李景穎一騎長干去千花簇珮環尋仙句曲洞作吏秣陵關鳳吹金門寂龍旟玉座間寧知鬭棋夕夢入爛柯山贈王生不假茒為杖偏宜杏作林五龍扶蹻逺一虎住菴深古洞探瑶笈名山㺯玉琴丹砂勾漏滿計日化黃金夜集王太僕聽歌列炬明粧出寒宵興未涯翠翹偏束鳳青鬢儼塗鴉艷艷珠搖月亭亭玉照霞細聽桃葉曲身在騎曹家寄王山人役役浮生老誰同戰勝肥生涯南畝秫世事北山薇短笛吟蒼靄長鑱斸翠微異時眠帝座星斗動龍旗送黃生六治還灤州翩翩江夏客才望世無羣旅興殘春雪歸心促夏雲吳歌新白紵楚黛舊紅裙惆悵平康陌芙容折劍文佛日少傅趙公設供齋頭兼抱新誕兩郎君出拜紀以小詩綺閣仙雲曙黃扉佛日晴隋珠雙照夜趙璧互連城學語翻多態回眸欲寄情異時符抱送花萼照蓬瀛胡靜父邀集齋頭賦拚作扶笻過誰言病未能長吟飛緑醑劇語墜青燈射䇿空三殿傭書遍五陵十年湖海夢行腳愧孤僧野寺古槐奇絶亭亭如車蓋四望皆同樹身屹立丈許其顛折為五枝折處寬平可四人箕踞坐余挈胡茅兩生散髮豪飲其中日暮乃下古樹空王宅重來一抱琴清隂浮廣殿黛色挂遙岑薄暮涼風動先秋皓魄臨南柯塵夢斷千劫護叢林落落蒼鱗皺亭亭翠幄懸百圍全蔽日千尺競參天老幹巢孤鶴踈枝咽亂蟬漫誇丞相宅瓔珞梵臺前過吳生夜飲作方徐茅王諸少同集落日襄陽道間來醉叵羅狂夫能劇飲稚子亦清歌卷幔當紅藥移燈就緑蘿平生雙白眼花底暫婆娑偶挾荆髙伴過從趂晚涼飛觴臨廣陌秉燭坐虛堂萬事消詩癖孤蹤劇酒狂興來頻散髮宇宙入髙陽題黃隱君靜軒册青山鹿門宅大隱自何年密竹披三徑長松羃四筵鯤雕秋偃息魚鳥暮留連曳杖南鄰客時時問太玄夜集黃燮卿言别時余將暫入都門紫陌居相亞玄亭路不遙攜琴斜照落擊築斷虹飄逸興舒河朔離心怯灞橋拚成千日醉徒御發深宵寄李逸人自得丘中樂間居鬢欲皤青精鄰叟共白墮野人過緩步依松竹長吟向薜蘿漫愁歸路濕湖上有漁蓑贈月仙為蔡茂才問竹來朱户如花出玳筵飛觴霞外客鳴珮月中仙艷色蟬光墮佳期兔魄圓相攜廣寒榭長夜奏鈞天贈陳生即席咄咄陳生在相逢尚黑頭風傳中散弄月照廣寒遊織屨長楗户擔簦不卧樓醉來雙眼白未懾武安侯贈支山人早挾長桑術青囊不記年懸壺居小市擊築問髙天逸興燕臺上狂歌漢闕前將因被裘客歸釣洞庭鯿贈楊生叔嘉宛爾清揚客翩翩玉不如看花晴曳屩擲果暮回車意氣紅顔外聲華緑鬢餘即今逢逸少白練為誰書座中有名蓮萼者持扇乞題即席賦爛漫芙蓉色居然似六郎朝雲團翠蓋夜月舞紅裳景奪前溪麗香飛太液長空令李供奉極目紫騮傍鄧逺遊以八章見贈推挹過當奉報二詩有美青雲客才華蔚鄧林中原馳捷足上國締同心磊落千言賦飛揚七步吟寥寥燕市築一擊為知音屈指詞場彥翩翩意未降過江原第一華國定無雙稍結名流襪終搴上將􅓚生花寧夢寐五夜筆如杠送胡將軍之遼左片雨都門霽飛花照别筵舊持橫海節新隸伏波船鼓吹漁陽外旌旄鴨緑前歸來歌杕杜金印出甘泉乍拂千金劍仍為萬里行長纓紓北望大纛賦東征巨鹿雲連塞盧龍雪照營春風薊城畔獵獵動飛旌胡鴻臚五十舉子詩以賀之書來滄海上喜色耀門闌天闕珠呈樹階庭玉照蘭紗廚回霽色繡褓怯春寒冉冉凌雲翮無憂暮景闌題陳山人畫松二首半壁嵐光潤髙堂露色濃寧同居士隱不受大夫封翠羽疑藏鶴蒼鱗欲化龍何年值韋偃灑墨傍孤峰懸崕一千尺誰寫碧絪縕直幹遙撑雨疏枝亂拂雲天台寒影落靈谷夜濤聞恍惚蕭郎管狂揮白練裙蕭子雲書如孤松一枝王至卿乘輿見假賦謝并期試事入長安燁燁青油幰平分片諾中乘輿勞鄭相藍輿狎陶公未擬驅金犢寧須跨玉驄燕臺百里近六翮趂天風寄李長史一為珠履客十載滯邯鄲此夜叢臺月應同易水寒壯心猶躡屩華髮漸盈冠幾度黃梁熟盧生夢未闌王生母六秩乞詩燦爛支機色華筵瑞靄籠星橋寧駕鵲雪案祇丸熊玉洞三芝紫瑶池萬樹紅劇憐雙彩袖膝下舞黃童送易山人老作平津客囊金出塞多千花離紫陌一葦度黃河釡泣歸時夢盆傷醉後歌東籬秋咫尺掃榻向藤蘿題郭金吾册金吾行樂地瀟灑接蓬萊玉樹雙莖長瓊花四座開晴光搖院落春色遍樓臺一夢羲皇杳池鷗莫浪猜王至卿借騎入長安賦謝未遘中涓訪猶勤上駟來壯心懸伏櫪逸足借登臺䟤跋看龍種飛騰羡駿才天間雲五色矯首見蓬萊題韓節婦卷蚤遂殞身願都忘剔目愁結褵才六月懸帛已千秋大節氷霜擅貞心鐵石留祇應連理樹一夕冢前抽賀人得雌并慰之春色畫簾中衾裯瑞靄籠蘭肌初浴雪蕙質乍含風夢豈熊羆異苞應鸑鷟同連翩燕姞夢孔釋下遙空同王行父管建初汪公幹謝彥雲集區太史館即景分賦余得盆中紫茄寧知草莽質邂逅入金門湛露晨披葉仙霖夜沃根桃緋殊度索瓜紫羡崑崙却笑於陵客攜鋤傍帝閽何來天祿畔繞砌列嘉蔬玄圃刪雲種青門抱月鋤含苞花爛漫綴實樹扶踈一飽堪晨夕那能賦衆狙送郭尉之河南即席賦瀲灧芙蓉幕君權一尉行官衙漳水岸帝苑洛陽城寶劍衝星發銀筝抱月鳴黃花薊門市滿掬照離情挽陳太夫人孝廉仁夫母也一夜青鸞札流黃罷錦文去逢瑶水使歸伴玉華君楚珮俄捐月秦簫暗拂雲那堪北堂畔風木驟紛紛挽胡太夫人為太學瀫元賦丸熊聞淑媛跨鳳逐仙娥晚日凋蘭蕙寒風廢蓼莪珮環新玉闕機杼舊銀河躑躅春暉恨霓裳隔大羅送趙參軍矯矯平津客林間識仲容傳家留一鶴入幕佩雙龍樹色遼城近花香漢殿重尚期明月下憶汝泛芙蓉寄黃説仲屢入參軍幕頻依上將幢華名今第五雋譽舊無雙倚馬才仍捷歌魚意未降經旬會偕汝千頃濯長江夀趙隱君茒廬仍負郭户外緑隂重幾夜裁玄草頻年事赤松雙溪雲墜笠四洞雪沾笻却笑龍門史低眉傳素封夀畢中翰太夫人瀲灧西池酒笙歌擁百壺三珠呈海國片玉耀天都札付青鸞否簫迎彩鳳無丹砂滿庭砌昨夜到麻姑送沈廣文之侯官日暮河梁畔歸帆趂北風一氊初就日雙劍舊如虹驛路蒹葭外齋頭苜蓿中飄飄幔亭宴霞色近人紅送章博士之崑山共作燕臺客君歸思欲狂雙鴻馳海岸獨馬倦河梁故國蘭苕近新齋苜蓿長崑岡偕片玉獻嵗到明堂送張生還四明一樽殘嵗别揮手各凄然野凍層氷外山明積雪前貂裘秦苑敝鳥迹漢京傳到日尋安道應維入剡船感事二首五畝荒猶客倣徨素髮侵年華趨老大詩思入沈深絶域舟車夢危途劍戟心飄飄灞陵雪無賴入衣襟濫逐齊門好真逢蜀道難百憂攢鬢底孤憤疊眉端布被翻霜薄綈袍綻雪寒蒼筤富春渚老盡釣魚竿題楊母册為其子舍人綸綍飛青瑣恩光下紫宸龍章雙闕耀象服九原新寶籙傳金母珠襦映玉人惟應寸草念百結繞三春期曹能始登岱二首一尊髙館暮下榻意偏勤旅興窮燕雪歸裝促岱雲簫傳雙鳳吹劍合二龍文何限賡酬事無令洛下聞夙訂金蘭社聊辭玉筍班片帆同挂海雙屐互登山梅栁爭春發松蘿結夏攀天門和梁甫聲振白雲間送曹能始遊盤山勝欲窮三輔幽仍問五盤輕裝凌曙色短褐耐春寒壑窅雲全卧峯明雪半殘帝京樓殿近百里見朱欄過楊不棄索其丹青適大雪盈尺即席題怪底春城雪從君筆下飄飛花藏逺寺古樹折平橋驢背吟方劇龍團興未銷倪迂倘留客清閟日相邀再賦飄然逐朋好來過百花潭雪照藍田畫風生碣石談落梅俄塞北飛絮詎江南極目招提上同雲遍鬱藍題夢竹卷為吳孝父山人亭午華胥國翛然萬玉長吹簫疑嶰谷捩柁即瀟湘霧色偏籠座風聲半入廊何當挈劉阮斗酒日相將江村卷為吳太學題新安江色近一曲抱村幽日暖蘼蕪岸風恬杜若洲亭臺通鶴徑籬落繫漁舟四百灘頭路將因到子猷題張文仲母孀節卷截髮甘扄户同心悵結褵百年蒿里夢五夜柏舟詩熊膽含辛日鴛衾入夢時斑衣張仲在好為賦瑶池過皎生齋中即席題蕭然一憑几兀坐萬緣空舊茗猶含緑新梅半著紅山疑摹北苑石擬贈南宫好覔金波句清尊後夜同别章敏學青絲綰朱榼追送潞河潯寂寞窮途淚支離故國心晨炊投古戍晚宿寄荒林何限浮雲色雙龍入夢深同徐文明六客集竹里館時余太學為主人屈指春光半尋芳興未窮竹溪偕六逸花墅挾雙童劇飲妨歸騎清歌落斷鴻遙看燕市月冉冉入簾櫳入長安路逢徐文明蒼頭持新作見貽和答輕寒策羸馬蹩􅍷向風塵築問燕山社帆留潞水津浮沈金騕裊飛動石麒麟縱目春明外花朝萬樹新過徐文明邸適陳長芳在坐作欵段春風裏頻逰興獨狂抽毫尋孝穆卧榻對元方雲似飛天姥霞疑挂石梁芙蓉雙燦爛乍夜夢干將載過曹能始時能始入長安余暮留齋頭翌日題詩壁上夜掃陳蕃室春雲繡褥溫敢言龍卧榻無復鳳題門西笑非吾事南遷亦主恩長門會題賦漢武欲消魂胡靜父攜盒過大槐寺作拂曙青絲榼提攜潞水東為尋芳草色重到大槐宫老幹排丹壑疏枝礙碧空黃梁炊漸熟千劫夢魂中野寺别于鳳鳴李惟朴兩生尋幽來古寺霽色傍禪棲劍豈雙龍隔門難一鳳題夕陽髙枕外新月亂帆西共惜天涯别何妨醉似泥贈汪生暫卸東山屐言乘泛海航遺書觀魯甸古樂問齊方白㲲敧髙座紅粧醉曲房踏歌潭水畔人識姓為汪夀吳隱君希學七秩君平曾寄蜀尹喜尚留秦杏植三千畝桃偷七十春壺中長宇宙屐底半星辰白日飛雞犬無勞頌大椿再遊大慈岩三首前卷遺去遂補入仄徑攀蘿薜明霞挂石梁危崖常墮虎怪石盡成羊緑篠千林合青松半壑藏雲房遺象古恍惚見齊梁不倦探奇足名山到處尋筍輿回谷口蘿殿出雲心絶壁千松挂髙空萬籟沈不知傅大士何代布黃金徑草重重緑岩花處處紅猿聲山寺合鳥道石房通峭峽行無際平疇望不窮世緣吾欲斷聳翮上天風少室山房集卷三十九
