body:
  text: 少室山房集卷四十六明胡應麟撰五言排律二十首效陰鏗安樂宫體十首有序梁陰鏗安樂宫新成詩云新宫實壯哉雲裏望蓬萊迢遞翔鵾仰聫翩賀燕來重檐寒霧宿丹井夏蓮開甃石披新錦雕梁畫早梅欲知安樂盛歌管雜塵埃右五言律十句為篇者齊梁以還時有此體獨是作格調精嚴音節圓鬯古今五言律鼻祖也前而鮑謝諸子律既未純後而江徐以迄盧駱尚多四聲八病之犯律家正始無出是篇暇日輒取漢魏六朝唐宋宫苑之瑰艷者倣安樂體成賦十章聊用自娛匪求多于曩哲也甘泉宫見漢武故事史漢等書紺殿明丹壑朱欄麗碧空金芝藂紫翠玉樹翳青葱閶闔千門度罘罳萬户通魚龍吟太液雞犬咽新豐後乘雙飛燕蹁躚豹尾中趙飛燕從幸甘泉引晉志語疑漢有兩人也銅雀臺見魏志樂府等書千秋遺片瓦萬仞憶崇臺繡柱星河落雕欄日月開歌聲回白苧舞影拂蒼苔舊寵羅衣歇新粧繐帳哀當時笑公瑾不載二喬來清暑殿見晉書本紀及通鑑綱目等書曲榭生風蚤層窗漏日遲氷山圍􅏭嵲雪巘架逶迤石甃長秋井泉疏太液池御舟三翼泛宫扇七輪馳莫漫酣吳酒輕言狎翠眉景陽樓見宋書及詩紀等書紫氣重關外飛樓上屬雲回梯盤月窟復道駕星文列聖金支現諸真玉珮聞爐香晨雜沓燭靄暮絪緼不分銀床下他時狎翠裙閲武堂見齊書東昏紀南史等書萬栁何年植枝枝淨隔塵堂猶名閲武苑欲借宜春滌器非寒士當壚亦麗人金丸穿葉巧寶屧墜花新屈指西師入能舒翠黛顰同泰寺見梁書南史通鑑等書園林標帝闕水石麗神州入座慈雲動登壇法雨流三乘歸獨詣二酉入窮搜彩筆詞人聚緗縑學士留逡巡成要略寒賤失雕鎪臨春閣見隋遺録及南史陳書瑣閣披香砌風光照麗華腰縈前殿栁臉奪後庭花暗牖通秦蹕明窗泊漢查流蘇懸重錦步障夾輕紗正爾呼江令隋兵集似麻朝霞院見隋煬海山記南部烟花等録宿霧懸珠檻朝雲動玉扉樓心窺帝座閣道隱仙機八水清相觀三山翠欲飛萬籹圍錦帳百媚擁羅衣一曲菱歌罷蕪城事已非沈香亭見唐人本事詩及紀事等書十二雕欄外名花照玉壺翰林方醉卧中使遍傳呼行樂詞先奏清平唱未徂春山雲作黛秋水月為膚妬殺紅絲畔纎纎入畫圖紅絲研出唐彥猷神運峰見宋人艮嶽記及宋史本紀飛來自何處突兀挂雕牆帝命徵千邑神功運八荒摩霄孤鸑下駕海巨鼇藏五嶽真形在三峨故域長惟愁絶顛眺燧火燭天狼結夏西山諸佛剎效初盛體為排律十首寶樹雲霞出珠林日月懸豐碑鑱晉代巨榜揭梁年繡柱排雙闕雕甍控八埏塔光摩宇宙􅓚影矗星躔海蹙浮杯浪江縈卓錫泉中峨羣岫列上竺亂峰連鹿苑全鋪桂龍池盡植蓮曇花青鳥駐忍草白牛眠兜率髙天外昆崙大地前神功香積運聖諦法輪傳萬劫空王座千燈釋祖筵焚身銷衆業斷臂伏諸緣入室聞師利登壇見普賢曹溪存一悟臨濟徹三𤣥有漏先除障無生欲問禪行行負瓢笠曳杖到金田玉鏡懸髙座金輪壓大荒國疑逰淨樂山似踏清涼殿吐祥雲色窗含慧日光虹霓行畫壁牛女宿雕梁一鉢攜千界孤燈現十方袈裟晨燦爛􅓚蓋暮飛揚夾户杉松麗捎簷桂柏香靈花芬别院苦竹翳回廊馬為䭾經白龍因聽法蒼足三禽是使牙六象稱王那叱獰牙動修羅恚目張腰疑天女細爪憶梵流長幾夜眠風穴經年事石霜曇摩聊示寂普化舊徉狂浩瀚遊秦論圓通入洛章津梁如可涉拂袖上慈航杖履遵山麓欄杆列澗阿飛梁攢泰岱畫拱壓岷峨實閣慈恩近雕宫淨飯多天台浮海嶠嶽麓控江沱振錫啼猿下登堂法雁過焚香馴怖鴿乞食叩靈鼉曲徑穿黃葉回廊步緑莎崕亭交竹樹石室掛藤蘿萬億先明藏三千窣堵波雙林開覺路八水渡恆河白足依龍樹緇衣住鳥窠禪燈圍帝釋梵樂奏仙城雪竇偏宜頌雲門不厭訶大悲觀自在上首阿難陀幻夢清圓覺真如會密多將紉居士服一榻伴維摩半嶺金銀出中天杖錫留門庭炎漢闢棟宇大唐修一水浮精舍千峰插梵樓憑髙雙檻豁望逺七燈幽舍利神光躍兜羅佛臂柔閻浮窮上國贍部盡南州削壁雲霞動飛簷象緯逰􅓚髙寒月墜磬斷夕陽收麓勝前飛鶴山深近伏牛象王迎法駕龍伯護靈湫芥吐須彌色蓮垂阿耨流旃檀長照夜祗樹不驚秋大士居岩際髙僧坐石頭機深頻掣棒偈苦欲沈舟溪岸聞三乘雲門見四愁謾論生老病千劫盡浮漚殿起凌三竺臺孤望四𬈑遙空呈紺碧絶頂挂丹青巘崿橫香案峰巒列畫屏剎高全礙日池逈半披星古砌流雲積陰廊凍雪扃泉當秋徑濯瀑向夜窗聽影落吟邊雁光飛定後螢鐘疏聞鶴唳鉢冷帶龍腥薜荔蒼凝壁藤蘿翠壓庭齊厨菱芡熟講席芰荷馨忉利旌幡合潮音杖錫停三車迎海嶠一葦渡江汀覺路超千界𤣥關護百靈圓明童子偈定慧法王經夢幻清禪鐸機鋒徹梵鈴鰲山欲成道會待奯公醒薦福崇新搆能仁拓舊基殿疑身毒割宫似竺乾移法力金容耀毫光玉髻披恆沙登覺岸阿耨渡香池五藴空羅剎三摩駕辟支千身菩薩現九劫梵王離幻化天魔伏靈通地藏知運開龍漢後年紀赤明時鹿女銜花獻猿孫拾橡嬉楗關馴虎豹伏砌斷蛟魑古樹撑崕出寒花抱石敧飛蘿懸絶磴夾篠蔽清漪生老偏愁病貪嗔獨戀癡道存無盡藏劫滿阿僧祗舍宅王珣癖過門杜甫饑芒鞋萬峰雪嵗晚入蛾睂梵宇千靈集禪堂萬法森雕楹浮絶巘畫檻卓遙岑枕簟霞光入竿􅓚霧色侵懸崕冬雪墜背嶺夕嵐沈鶴去天飛錫龍來地布金持齊馴鴿下施食斷猿吟樹老僧忘臘花空佛印心菩提清欲界簷蔔淨祗林經卷流泉側香龕巨石隂普陀懸海嶠靈隱矗江潯教自磨磚徹禪因面壁深迷津航易度彼岸筏難尋四品中軍好三乘吏部欽王丞情汗漫許椽思沈淫大夢銷塵劫高談暢古今明朝瓦棺閣乘勝更登臨寺古傳回向園空認給孤飛軒臨廣莫疊閣到虛無白玉中天甃黃金大地鋪千僧翻般若七佛證毗盧默坐超人境高憑豁帝都東西凌泰華南北控燕吳阿閦靈光現婆娑聖教敷幽明窮六道神鬼徹三途嶺欲騰丹鷲碑疑下赤烏香林獅子伏法駕象王扶淨業依蘭桂空心會苾芻沈檀霏貝葉茗荈浥雕胡板屋雙扉靜繩床一袖枯𤣥談披沆瀣妙義發醍醐支遁神偏王周顒興未孤無煩畏昏黑絶頂上浮圖傑搆臨丹地飛梁瞰碧峰臺高蒼野盡殿古白雲重峭峽虹斜度危崕雪半封佛疑維衛至僧似落伽逢舞鶴參朝座饑烏集暮鐘緣深頻伏象定久忽聞蛬暗牖閒生竹虛檐密種松持經迷菡蓞說偈墜芙蓉異荈分泉瀹香粳激浪舂蒲團藏閴寂木榻寄䝉茸八識空塵纍三禪别梵宗九州遙挂衲十嶽遍扶笻瓔珞天人餽玻瓈釋帝供文殊行處腳迦葉笑時容東域摩騰化西江道一蹤將辭氻潭去闡法號黃龍佛日千岩靜人天萬壑遙珠宫浮碧落貝闕抱丹霄玉碗霞明滅金燈月動搖旌幡朝霧結鈴鐸夜風飄袒膊眠山洞飛身渡海潮香看塵外續火辨劫前燒阿育誠心化登伽幻術調波旬回憤恚戈利失矜驕塑壁環雙樹鑱碑記六朝梵僧家姓竺梁帝寺名蕭北固凌虛曠東林跨泬㵳池開龍母窟塔湧雁王標翠柏禪機契青蓮釋證饒揮鋤除障業破竈絶喧囂五嶽攜孤杖三田寄一瓢流沙歸路近柱史乍相邀唐五言排律沈宋肇端盛唐則供奉右丞大都不過十韻上下繇簡故精而千言數百匪冗則糅故也明楊用修選杜發明斯義大有抑揚雖其意左袒青蓮要非亡謂乃杜諸短章亡若吳生畫壁十韻楊特舍旃而沱水臨中坐亟稱絶到則其舛也夫詩近體五七言八句至矣盡矣既曰排律矣惡用以長短限之況篇短而精由隆凖公將才止堪十萬衆過此非長韓淮陰悉蕃漢以成躪楚之大勛亂于何有則杜陵固其鵠已惟是才賦所趨人難強合且用韻多取材博得與失參互其間則用修之論政自有不可廢者唐人藻繪十九攄之僧寺佛宫結夏西山諸招提永晝如嵗漫取十二家讀之至四君排律燁然心會輒步其體格積成十章章十六韻誠知時代所壓靡足以馳騁前規要以紀興一時備忘他日至于競傳之句已著之篇亡復因襲則近時流弊余不佞知免矣夫少室山房集卷四十六
