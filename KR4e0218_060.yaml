body:
  text: 少室山房集巻六十明胡應麟撰七言律詩七十九首沈侍御楊茂才同邀太虛樓燕集余適留滯湖上以薄暮過則賔主偕行矣戲柬一律蕭蕭寒雨隔孤篷慙愧平原十日同是處新詩懷沈約何人𤣥草敵揚雄地偏雲際留雙鶴天濶湖頭滯片鴻握手後期堪永夜暫將離恨託絲桐送程仲凱之兩都五夜山隂興獨乘海天遥望白雲凝囊攜劒色過燕市船載簫聲出廣陵何處新詩酬北雁當年竒氣羨南鵬高臺倘遇荆丹輩好上黃金第一層黃禹鈞邀同張總戎汎舟湖上作飄然飛鷁下澄波千頃其如叔度何郭外雲嵐芳草合湖頭風雨落花多參差碧殿浮丹鷲曲折朱欄竚翠蛾握手茂先雄劒在夜來星斗共摩娑送趙符卿之燕中夾道衣冠瀫水傍欣看承詔入長楊龍池乍逐抽毫客鳳闕新超尚璽郎斾擁飛霞行碣石船隨疎雨出錢塘中朝相業誰堪並竹帛行占太史揚夢王行父並寄薛素卿二首水殿雲廊卧碧紗長風吹夢入東華高梧帝苑猶飛葉藂菊仙臺盡試花江上數峰湘女瑟河邊孤月漢臣槎牆東是處新粧麗莫戀青門舊種𤓰天街何處問平康不捲珠簾見畫堂粉面三千迴薛媛朱顔十五侍王昌名駒蹀躞黃金勒乳燕呢喃白玉梁斟酌章臺人在否羅巾猶䕶百花香同茅山人過胡上舍園亭作面面珠簾䕶緑蘿平湖十里漾清波長風廣榭飄梧竹細雨孤亭拆芰荷愁緒頓隨秋色逺賞心殊為暮涼多相逢大有高陽興不駐征驂奈爾何趙中丞以督學檄祠鄉賢中丞宗魯别駕尊人也歸來三徑抱雲眠片石江郎大隠年五畝盡忘中令貴一鄉誰並太丘賢青門舊吏懷風素紫閣名卿問草𤣥共識珮刀龍種在翩翩才望達甘泉熒煌飛檄到鄉閭猶憶中丞舊上書九列勲勞存琬琰三朝名姓重璠璵納言司近雙龍闕廷尉門容駟馬車咫尺遺風勞夢想高槐留䕃在前除送趙宗魯之河間别駕二首雙旌揺曳薊門東易水飛花撲亂紅國憲久傳中執法家聲重覩右扶風交河壁壘巡行近渤海樓船控制雄屈指循良推第一徴書晨出未央宫十載明經擅草萊青雲揺曳珮刀來名家舊識中丞後佐郡仍推别駕才擁葢日華流漢殿抽毫霞色動燕臺應徐咫尺南皮近彩筆雄章次第裁大學士趙公手書促駕賦謝二首十年臺館布甘霖迴首高山悵玉琴身傍紅雲扶日月夢隨黃石到家林天邊八駿堪誰馭海上羣羊漫獨尋慙媿草𤣥門下士大揮椽筆到江潯蒼蒼雲霧繞漁磯漫説商顔戰勝肥丈室擬從三島借尺書仍傍九天飛肩攜瓢笠來青瑣夢掩琴尊出翠微清切上台連紫極不煩河畔訪支機淮甸張公舊守吾州將繇上考擢行省參知聞余僦居武林夙駕見枉且邀飲署中並命舟資送京口感其厚遇賦謝此章曽是司空舊莫耶精光揺曳傍高牙胡床正落南樓月大斾仍飛北府霞蔽芾甘棠懷海嶠青熒藜火夢天涯銜知未愜如澠報心折江城奏暮笳流河驛遇蔡儀部稚含話别作併訂約晤于武林握手雙龍去住懸河橋晴色對潸然中林驟報亡猿日北塞真同失馬年曳杖天窮蒼嶺外抽毫霞湧赤城前戴家精舍谿頭近乘興能飛雪夜船送人還㑹稽夕陽行色悵孤蓬大海家林挂樹樷芳草不堪呉塞緑飛花猶戀越臺紅相看遊子悲春盡何限才人泣路窮明到錢塘潮落後書郵頻寄北來鴻登檇李烟雨樓寄沈純父侍郎夾㟁春波漾緑蘋千家晴色照埀綸獨為烟雨樓中客遥憶昆明殿裏臣九塞兵車閒仗鉞五陵冠葢避埋輪應知屠狗風塵下大有華陽擊筑人淮上遇景陵徐丈以參知督開新渠余目擊其胼胝之苦兹工將告成先賦二律柬之四載功成翊帝堯驅山鞭石夢䰟揺蔥蘢紫氣騰天闕燦爛𤣥圭錫聖朝白浪南排千谷迴黃流東注萬川遥當年璧馬俱陳迹何藉宣房漢殿謡海㟁清秋奠六鼇空濛元氣䕶臨濠平成載睹唐堯世疏鑿寧知夏后勞大野寒風迴濁浪長淮晴雪下飛濤他年太史河渠傳錯落金泥映彩毫徐參知總角與余游中間顯晦殊途不相聞問者廿載兹邂逅淮甸特邀余為具署中清燈話舊不勝今昔之感即席載賦二律時參知以青雀見假由此竟達燕中矣蹤迹雲萍半杳然相逢岐路剩留連慚稱魯國通家後好是豐城拭劒年錦席易中賢聖酒牙檣難認孝亷船銜恩不盡窮途思極目長淮大斾懸濩落長途賦逺遊青帆馳載出河洲雙龍吐霧蓮花合片鷁乘風竹箭流搦管東南空大澤飛旌西北近神州酬知一寸將何事日夜薇垣望斗牛稚升水部余同甲子而艱於嗣育亦略同兹抵淮聞諸姬有將就館者余為喜而不寐先賦一律柬之舟航長日寄菰蘆紫氣淮陽照客途蹀躞共誇騏驥種飛鳴今見鳯凰雛芳蘭九畹移金屋君侍姬美且都樷桂千山照玉壺用淮南小山事為愛謝家庭樹好三珠林立報懸弧彭城晩泊蔡别駕載酒驛庭話舊蔡以前西安令遷淮上署篆于徐一尊何處慰窮愁清夜前除問蔡侯露冕中原新政績鳴琴南國舊風流波聲淮海環公署山色徐方照郡樓明發可堪揮手恨青帆遥遡大河流龔觀察子勤舊分部越東于不佞大有國士之遇兹舟過濟上奉寄二詩朱旂曽閃越城頭渤海重看政績留南國雙龍飛電彩東方千騎擅風流嵯峨傑搆靈光殿縹緲危梯太白樓後夜胡床明月滿可容詞客並追遊江風無賴木蘭橈濟上逢君興獨饒一代循良垂琬琰千秋詞賦勒瓊瑶參天松色秦封近際海棠隂越甸遥莫笑征途頻繫纜孤雲隨處是河橋濟上遇王世叔通侯時龔觀察邀王同集太白樓以督運迫簡書不能待輒此寄訊并柬黃說仲山人玳瑁筵開半寂寥青帆無賴木蘭橈波濤水國雙鴻度星斗天門一鶚遥閥閲累朝傳帶礪詩篇頻夜夢瓊瑶何人共賦從軍樂咫尺長安近灞橋觀察晉陵龔公招飲城南太白樓二首百折危梯上翠臺飛樓雲際劃蓬萊客疑供奉乘風到人似征西玩月來宇宙並懸終古蹟山川重遘異時才當筵何限清秋色欲挽羣仙步玉臺五夜騎鯨八極遊千秋陳迹尚高樓窓中齊魯青如畫檻外徂徠翠欲流呼吸舊知通帝座飛騰今見近宸旒酣歌敢作長庚態清切寒光射斗牛呼吸帝座太白舊話翌日載集杜陵南池二首有序杜舊有五言律見集中後人因為亭館植荷芰池上嵗久頽廢龔公子勤至改葺塗繕煥然復新且以濟寥寥一水迺兩拾遺並有藻翰揭之千秋因建祠城東合奠太白少陵實詞塲一盛舉也余以行迫不及賦詩輙并紀此序中濟水東迴衆壑馳才人名蹟尚清漪高樓百尺曽供奉旅館千秋更拾遺白苧飛揚春雪後青萍離合暮雲時浣花溪上愁無限得似修篁䕃夾池萬瓦鱗鋪霽色分滄波長日下鷗羣當年海岱留詞客此日河山共使君大業庭中𤣥草在孤芳池上白蓮聞風流咫尺饒相望搦管長天對夕曛王新建邀集樓船賦謝二首幕擁清油近玉除筵開紅拂薦郇厨侯門是處容彈鋏相府何勞話曳裾天外欲歸遼海鶴霜前頻膾潞河魚珠簾十二饒清燕一枕棋聲夢寐餘古樹疎花照緑苔樓船開讌客頻來營門禮數寛長揖記室詩篇媿上材大斾生風鳴朔野飛旌揺月動燕臺寧知一代元侯重彩筆華箋次第裁秋日過茒厚之同胡勞徐三子小飲作徑裊松蘿半榻懸圖書四壁倍蕭然揮毫是處慚先達伏櫪能無笑暮年旅興蒼茫斜日底雄心寥廓斷虹前千金抵售長門賦誰解成都覓太𤣥贈南吏部吏部聲華四海聞山公才望世無羣南金並奪中朝譽東壁兼傳太史文水鏡清光懸白日氷壺寒色駐青雲從知意氣風塵外幾夜長歌拭劒紋吏部為太史從子送南太史歸關中省覲西風晨起木蘭橈垂栁千絲拂畫橋夢倚日華中秘近心飛雲色太行遥翩􅝆彩服娯春讌奕葉青綾話蚤朝一笑下機秦媛在簫聲頻夜合瓊瑶尊人亦讀書中秘同徐皞明茅厚之過胡上舍園亭聽閔生琴作夾道修篁帶茂林一尊攜手暮登臨咸陽趙李頻相過易水荆高不待尋花榭雲霞流秉燭蘿軒風雨入鳴琴亦知湖海原兄弟暫借衡門話陸沈贈孫水部用純用純工文賦學無不窺至弧矢之精儕輩尤罕及者縹緲黃金薊北臺高天虹色異人來雕弧七札穿楊技綵筆三都視草才秦望山川盤禹穴昆明池水夾蓬萊談詩東閣饒清興莫遣斜陽墮翠苔用純㑹稽人藉六詔過孫水部談兵一劒虚堂共眼明談天捫虱異時情曽聞潄石臨滄海幾為餐霞賦赤城燕俠未荒屠狗事邊庭偏畏射鵰名長纓莫漫誇樽俎逺懾匈奴避漢營孫用純署中觀射作金僕姑懸鐵裲襠紫髯豪俠舊孫郎曽攜短劒過平樂欲請長纓出未央東閣梅花聊入咏南州竹箭共稱良何當手勒燕然碣白馬横飛向大荒用純官水部而原籍越中送人入蜀龍劒光揺大海濆河梁斜日賦離羣三千蜀棧長飛雪十二巫峰半出雲迴雁祗從親舍落啼鵑偏向客途聞新詩一寄臨卭肆投夢先過卓女墳寄徐方伯二首惆悵驪駒繫緑楊一燈聊為故人長朱絲永日閑清廟白紵深宵出畫堂耒耜風雲莘野畔舟航霖雨傅岩傍碧天呉越相望近對倚青萍拭劒鋩長嘯歸來話陸沈草堂新築近東林南州尚憶朱旛度西洛爭傳絳帳臨匣底星辰蟠玉劒床頭山水拂瑶琴探竒莫戀登高屐飛動蒲輪越水潯贈黃山人說仲二首時居王新建幕中短髮飄蕭話轉蓬𤣥心寥廓送飛鴻樓依庾亮窺明月劒倚荆卿擊斷虹古洞天台桃自發小山淮海桂偏叢燕然絶頂題名處可羨班生制作雄幕府翩翩舊孟嘉居然長揖傍高牙攜將江夏波千頃共汎山隂雪萬家記室雄詞飛彩翰營門高嘯和清笳荒臺百尺斜陽裏慘淡黃金宿暮鴉寄區用孺太史兼柬高正甫秋官四百竒峰取次遊飛帆重遡潞河流純鈎乍合雙龍劒彩筆偏修五鳯樓日轉薇花連帝座星分藜火近宸旒翩翩常侍同盟在風雪華陽幾唱酬參知淮甸張公以崇正書院志屬余校定且命賦詩寄以七言一律畫棟雕甍越嶺前摳趨名蹟儼羣賢宫牆百尺星辰聚俎豆千齡日月懸絶學龜鳬留正統婺中舊有鄒魯之稱遺經龍馬識真傳衣冠夾路甘棠化絶勝文翁治蜀年聞惟寅謝事寄慰四章銅柱勲名日月傍誰將薏苡溷行藏袖椎無客同朱亥彈鋏何人過孟嘗動色燕臺傳市虎關心遼海問岐羊他年首事金城策老為先零出廟堂燁燁聲名駕四豪邊烽十載罷臨洮藏弓敢抱孤臣恨授鉞寧知上將勞篋裏千章饒賦雪床頭七發快觀濤赤松黃石俱相待底用留侯辟穀逃明滅烽烟大海頭可堪投杼入龍樓降王尚自驚飛將醉尉能無阨故侯馬革塲中心未老鴟夷湖上興難留河山帶礪先朝事遮莫功成賦逺遊十萬良家劒氣騰天威南北倚憑凌虚疑都尉降沙漠不遣元戎駐灞陵宇宙論功誰白馬江湖流謗幾青蠅寧知廿載東山夢一到𤓰田恨未能無題二首行盡春風白鼻騧傾城傾國漫同誇纎腰欲姤三眠栁笑靨長欺百合花紫陌鳴鞭朝映水青門挾彈午飛沙高唐頗憶襄王否獨向詞林説景差窈窕珠簾䕶緑苔平康三曲近蓬萊黃鸝百囀金鈿盒紫燕雙棲玉鏡臺北苑丹青元絶世東隣紅粉最憐才傳聲為問章華客尚許劉郎隔嵗來曲中有善丹青而好遊丈士者榜人自潞河歸再寄徐觀察時徐丈以河工奏計晉階雪花長日墜干將何限酬恩國士腸揮翰敢期王逸少飛帆重借顧長康河流百折蛟鼉靜海㟁千秋蜃鱷藏是處平成誇帝力𤣥圭三錫下明光秋夜長安邸中同葉叔明燈下酣飲至醉作時葉以閩中公務至木葉紛紛墮翠苔西山秋色半蓬萊青燈載下陳蕃榻濁酒頻呼郭隗臺雲暝帝城雙鳯宿月殘仙掌片鴻來無嗟宦轍風塵下歴塊行占上駟才贈傅吏部代同人屈指蘭陵校藝年飛揚環珮入甘泉氷壺獨抱風塵際水鏡高懸日月前價踊層臺收駿骨光浮深獄辨龍泉吹嘘倘借東風力旦夕河東上御筵夜集相國趙公府中話别作銜恩龍劒色凄凄何限霜華照鸊鵜紅日已看中秘近白雲猶傍太行低親闈菽水飛魂夢相府藜燈惜解攜莫悵燕呉成逺别春帆先到潞河堤相國趙公邸中夜談因留宿齋頭作劇語深杯興未闌平章西第傍金鑾高齋敢謂青綾薄煖閣渾忘白苧寒密篠飛霜流藻井疎桐移月下雕欄無勞夜望三台色萬仞晴光燭翠巒送沈司馬請告還越西易水寒風遡畫橈歸裝行值廣陵潮休文老去腰圍痩昭略狂來意興饒白日鴻心猶慘淡清㝠鵬翼轉逍遥看君司馬書成後藉藉埋輪在聖朝相國趙公屢疏乞休未得請見寄二章奉和啓事頻年叩玉宸飛書遙夕降絲綸東山是處催賢佐北極能無仗老臣三殿風雷馳豹尾九重天日耀龍鱗他時太史如椽筆肯放平陽躡後塵江天何處問蒹葭六洞三山照紫霞朱草欲尋仙梵宅赤松猶駐帝王家經綸魏闕憂難竟黼黻虞廷望未涯十載飛熊仍夢寐滄浪能復戀魚鰕潞河夜泊同黃說仲過陶懋中舟中二首白舫青簾半畫圖金尊銀燭夜呼盧投簪元亮開三逕汎宅朱公住五湖太液新霜流菡萏長安明月墜菰蘆荆高眼底看誰在目斷燕城舊酒壚跋扈飛揚縱叵羅一尊攜手暮涼多江湖意氣關蘿薜說仲時居世叔通侯幕海岱行藏狎芰荷片月新秋蟾闕吐雙星明夜鵲橋過西風玉笛胡床上無限梅花落絳河時七夕前一日閔山人逸之工琴奕丹青而賣藥長安市秋日過訪即席賦贈短褐翩翩向暮過居然名勝對藤蘿燕京舊識懸壺技易水重聞擊筑歌杏苑春光頻爛漫橘林秋事近如何西風漸起枚生色同步長安太液波送李太史使秦中乍捧龍章上玉墀飛旌遥别鳯凰池雲開乍識蓮花掌月滿頻攀桂樹枝赤社琴尊操管夜黃河簫鼓落帆時朝元閣上春風繞為賦河山百二詩送區用孺之楚中便道還粤吟盡長安白鼻騧一函晴捧下金華青圭夜剪唐藩葉彩筆晨飛漢殿花星動斗牛人倚劒天垂河漢客停槎飛雲絶頂重攀處莫戀羅浮葛令砂送錢將軍之北平斧鉞朝移右北平東方千騎去還鳴霜飛大纛盧龍塞霧擁高牙涿鹿城將苑揚班新授策詞場韓白舊知名梅花一曲胡床暇草檄時過細栁營與張仲立顧靖父别且十年餘忽晤于顧山人齋中喜而賦此憶别西崑二十年陵陽雙璞尚依然聲音未變論心後髩髪頻驚握手前風雨差池河朔社乾坤寥廓汶陽田高齋此夜長虹色何羨黃金帝闕懸熊茂初蔡伯華袁景從招集劉仲修園亭掩袂風沙赤日昏長安西曲亂雲屯花前一駐黃金勒樹裏頻呼白玉尊漢柱文章高八斗燕臺絃管落千門竹林嵇阮俱陳迹突兀靈光尚帝閽題李大將軍鄭大司馬閱武諸營冊精甲橫陳大野傍上公文武並鷹揚貔貅萬隊連營出魚鳥千羣列陣翔劒拂天山紅日近旌懸遼海白虹長功成羽獵仍題賦不道詞人是姓揚送崔子玉之川中細雨行裝發潞河都亭握手聽驪歌傾殘竹葉能留否飛盡桃花奈别何郢里雪深詞客到陽臺雲滿逐臣過鸞箋十樣饒春色蚤寄西征向緑蘿送謝友可還臨川斗酒都亭落日懸清霜紅葉舞離筵長驅駿足燕臺上少别螭頭漢殿前秋事轉深陶令菊歸期曽約逺公蓮東風韋曲花千樹早發潯陽下瀨船秋日高正父邀同汪公幹蘇叔大遊天寧禪寺玉栱璇題照畫廊珠扉銀鑰䕶禪堂青獅躡霧遊天帝白象拏雲坐法王樹老菩提雙刹在花殘優鉢一燈長前身我亦龎居士倘許先登七佛航登天寧寺浮圖送高正父南歸得霜字天豁西郊半大荒高秋雲日散微茫三千界湧招提色四十門開舍利光易水荒臺傳市駿羅浮歸路問騎羊孤航拂曙河橋别月滿長堤萬樹霜壽李太夫人太夫人為本建孝亷母昆季五人紫氣秦臺上碧紗支機何處問仙槎庭前瑞鳯啼孤竹太公觀察先逝堦下名駒列五花南岳金璫揺彩日東陵玉舄步明霞當筵可認偷桃客一笑重來阿母家送胡昌世還嶺南漫道虹光燭斗躔塵埃猶蝕舊龍泉不禁徐幹成中論誰識揚雄抱太𤣥桂樹霜林孤渚外昌世有別業在桂州梅花鄉國亂峰前羅浮翠羽人如玉絶勝長安杜曲眠送汪明府之蘭谿二首雙鳬迢逓出楓宸駟馬喧闐擁畫輪邑宰成都衣錦客關逢函谷授繻人春風水驛栽花遍夕照山衙掃葉頻囘首御屏書第一循良何事問州民河梁初日照棲鴉玉舄高凌大海霞射策中朝新上第傳經南國舊名家香飛桃李盈山郭秀擷蘭苕傍水涯屈指黄金徵漢殿漫將離色賦蒹葭暮秋望日同潘少逸蔡稚含夜集王水部宅過從良夜拂朱絃上客相攜玳瑁筵工部詩名三世後司徒文望四朝前梅花尚憶揚州署桃葉頻呼白下船莫悵秋光重九暮月華仍向鳯城圓是夕月色如晝水部改席庭中酣暢丁夜再賦萬頃蟾光浸碧空千門雁陣巻西風高天霜露金莖外大地山河玉鏡中團扇欲辭清暑殿胡床如坐廣寒宫夜深誰唱霓裳曲極目飛鸞大海東少室山房集巻六十
