body:
  text: 少室山房集卷一明胡應麟撰樂府十八首擬大明鐃歌曲十八首有序夫鼓吹鐃歌之作肇自有熊所以象成功昭盛美凡聖王受天明命摧陷廓清之烈非此亡以被諸聲容粵自商周以征伐定天下一時播告之章勿可覩已漢鐃歌十八曲其辭迄今尚存雖文義訛脫難以盡諧歌中之辭亦匪専為武功而設至味其音節隱然發揚蹈厲之風視漢諸古詩優柔馴厚者迥絶不倫則鐃歌所由作可知已兩漢而下魏繆襲吳韋昭晉傅𤣥宋何承天唐栁宗元代相擬襲趙宋無聞則皇明宋濂氏嘗追述之尋諸家制作即風格詞藻未能抵掌西京一時可頌之績固咸取以被諸樂章矣髙皇帝提三尺起淮甸掃邉塵而遏絶之大荒之外此其勳德巍巍亡論湯武即軒轅氏不無遜心獨鐃歌之作諸文章家往往缺焉間一二僅見而辭義寂寥音節迂緩未足以揄揚大造垂示無窮夫魏吳偏閏唐宋下衰繆韋何傳於騷壇未槩作者彼且黽勉步趨以自侈一時殊際焉明臣子目擊髙皇帝震古無前之偉樹以安享二百祀之太平即草莽山林疇匪帝力而默默終身不能效一辭之贊甚非所以效康衢擊壤野老細人之義也應麟不敏呻吟占畢餘二十年蠡海管天頗測毫末謹按我聖祖發軔之初以迄於四方底定之日敘次其事為大明鐃歌曲一十八章誠知謏聞謭識上不足以鳴昭代之鴻庥下不足以騖西京之遐軌以較唐宋諸家庶幾近之綴屬既成不忍焚擲爰録笥中附諸康衢擊壤之末異時鴻生碩彥製作迭興盛演歌辭登諸鼓吹俾聖神勳德永揭千秋此或為之嚆矢云爾鐃歌本二十二曲其四曲亡魏吳所擬僅十二曲說者咸以十曲仍用舊名然其辭亦不復傳何也今止據存者十八曲擬之考諸家詞惟繆韋傅常被施用承天宗元輩率私作之以備異時采擇者而憑依名義流播迄今故敢竊取其例焉黃河清元至正末黃河清大聖啓運協符載闢宇宙為黃河清第一黃河清聖人出應昌期誕至德著戎衣奮三尺靖四方建都邑干戈偃弧矢戢統九有主社稷神與鬼咸受職烽烟掃爝火熄維大明照中國萬千祀與天一右黃河清二十句句三字鳳之翔髙皇帝起濠上追王迹肇今名為鳳之翔第二鳳之翔在濠梁義師起帝網張二十四將驅天狼兵鋒所指定四方薄海內外以莫不來王威加六合返舊疆徵歌悉發諸兒郎復彼人民世世無有所與為我沐與湯擊筑大風雲飛揚千秋萬嵗樂未央右鳯之翔十一句四句三字六句七字一句九字一句十五字攬羣雄龍飛淮甸豪傑景從得大將達遇春等二十四人以一海內為攬羣雄第三攬羣雄盜如蝟大聖握符起淮汭與神為謀蓄鋒鋭提三尺劍驅海內驅海內攬羣雄真人出天下同四方六合咸景從如風從虎雲從龍汛掃大漠如飛蓬扶桑曈曈朝日紅驅海內攬羣雄右攬羣雄十五句八句三字七句七字克建業師濟采石長驅金陵定皇畿繫萬國為克建業第四克建業定皇畿皇畿定舉義旗天兵百萬任所之東吳南漢西蜀七閩六詔從風靡天下大定一戎衣右克建業六句四句三字二句七字一句十三字婺歸德大駕東征首下寧越婺女之郊聖蹕駐焉為婺歸德第五天兵十萬下東國婺以先寧駐皇蹕景星熒熒耀城邑我戰則勝攻則克四海從風靡弗一勢如破竹烽燧息天命曷歸歸有德右婺歸德七句句七字四友兵入浙聘劉基宋濂等四人置帷幄中為四友第六於維文王是親四友疏附後先以翼元首峩峩高蹤異代曷有天威是臨匍匐奔走猗與聖祖廣延羣雄如天如海為萬物宗王師所向六合景從爰率車徒以定浙東浙東底平大統未集蚤作暮思思布文德曰基曰濂曰琛曰溢𤣥纁奕奕交布東國曰四先生論道經邦坐而弗名匡朕弗遑嗚呼盛節慶流無疆德六五帝功百三王右四友三十二句句四字戰鄱陽僞漢陳友諒率徒數十萬來抗高皇帝躬督大將達遇春等鏖戰湖口滅之為戰鄱陽第七明日大戰戰鄱陽簡師料徒百萬强烈風吹沙湖水揚煙焰漲天焚大航三十六將死康郎再戰湖口殱餘皇我舟膠沙敵尚强疾呼奮臂來衝撞鯨鯢蔽空雲日黃拍江巨浪何茫茫如血巨鹿尸昆陽維天命我明車輪碎螳螂百矢定邊背若芒一矢貫睛諒死亡諒死亡理出降威加四海莫不來王右戰鄱陽十九句二句三字二句四字二句五字十三句七字盤門入張士誠據姑蘇命將覆其巢兵不血刃為盤門入第八盤門入士誠泣前歌後舞大師集兵不血刃下城邑誰其帥者公魏國歸市弗止廛弗易萬姓歡呼頌皇德二敵既殱皇之土東極滄溟南亘楚長驅入中原孰敢余阻右盤門入十句二句三字七句七字一句九字降谷珍島夷首亂元末懾我大威束縛待命海口為降谷珍第九方谷珍起盜藪乘元之亂竊據一方地如斗耗金幣大官酒海上時時飛且走如鬼如蜮雞與狗大明當空燭九有舉宗乞命竄海口帝憫其愚印加肘以較羣雄最小醜右降谷珍十一句四句三字六句七字一句十一字七閩陳友定保閩粵師縛之為七閩第十七閩保岩阻連亘皆山梁友定據其巢負固如金湯我皇命將諭諭以開茅疆自謂故元臣負義不肯降王師十萬下戈船逐長江兵入如破竹如虎吞羣羊委身繫尺組支體磔分張自謂故元臣守節甘喪亡大都以淪覆誰為招國殤右七閩十八句句五字維中國大將統六師北鄉儒臣濂諭檄中土華夏擴清為維中國第十一維中國帝王所自立欃槍遍郊原天地黯無色天重開地重闢扶桑熒熒日月出照八荒爛九域芟夷禍難四海一神龍夾助正統集帝愍邊塵擾中國詔下大將軍達副將軍遇春提兵九十六萬戈鋋甲胄如浮雲命詞臣濂草檄諭彼中華民長驅入河洛壺漿簞食來成羣右維中國十六句五句三字三句五字四句七字二句十一字一句十二字一句十三字大都走天兵入大都故元主棄社稷奔為大都走第十二元都平四海清神鬼受職萬方庭列大藩置神京汛掃烽烟混一區寓再造華夏開文明右大都走六句四句三字一句七字一句十五字庫庫元規復故都師搗之大戰於定西古城夷其部落王保保絶塞遁為庫庫第十三察罕起元末舉代推鷹揚天命去勝國剚刃爭戰場維庫庫察罕子復良下益都伐洮陽驅兵出沒觀以望帝三諭彌陸梁執囚我行人怒臂如螳螂命大將統武驍北征隴右一戰搗其巢搗其巢萬騎突至如風飈賴傅潁公却前茅兩軍就舍不得交夜分劫營足納一靴身騎騸馬逃騸馬逃絶大漠我軍四十萬勝負互相角巨網漏吞舟竟死蕃部落帝稱好男子維庫庫右庫庫二十六句七句三字十句五字一句六字四句七字二句八字一句九字一句十三字升面縛蜀阻聲教璟諭不從大兵入成都虜明氏母子歸為升面縛第十四升面縛出成都母子啞啞啼路途父旻玉珍一目枯貪叨亂亡起雄圖不久身殉留遺孤大明區寓至化敷屢使遣諭如追逋獷兵悍將驕相扶驕相扶守瞿塘帝命潁國公東甌王伐山通道開戰場直搗階文潰腹心腹心潰肝膽亡母子輿櫬大道旁升也肉袒仍牽羊侯以歸義戒殺降高皇帝德洪虞唐唐高宋武如豺狼右升面縛二十一句六句三字十四句七字一句八字北征中夏略平分命諸上將耀兵沙漠朔庭一空為北征第十五明受命海宇一前元餘屬負固北庭保其宅團結黨類以俟我釁隙為我子孫慝皇帝遐思勿姑息乃眷西顧以北征桓桓大將統兵億萬犁其庭犁其庭心膽落單于遁絶大漠右北征十一句六句三字二句七字二句十一字一句十四字納噶楚宋國公出塞俘降元將悉收其衆二十萬餘人為納噶楚第十六納噶楚居金山二十餘萬衆虎視一何耽耽帝命上公馮統兵出全燕天威所震懾敵騎不敢馳敵弓不敢彎二十餘萬衆一時赴長安摐金伐鼓壯士歡築三受降玉門關右納噶楚十三句二句三字八句五字一句六字二句七字六詔元孽負固滇中命沐英等督兵平之永鎮其地為六詔第十七六詔天西南惟滇號最巨殘元厯數盡遺孽猶虎踞帝愍絶塞民使命馳風塵彼昏不奉詔䖍劉我信臣皇赫斯怒命黔寧艨艟巨舶浮昆明昆明水涸殱長鯨碧雞金馬入我版圖四海平右六詔十二句八句五字三句七字一句十一字受天命四方底平九域以寧百千萬祀統我皇明為受天命第十八受天命定四方干戈偃鈇鉞藏軼大武駕成湯嫓軒轅儷虞唐擴地萬里居中央整齊萬國開明堂漢唐宋晉隋諸邦潔功比德如蜩螳萬八千嵗永無疆右受天命十三句八句三字五句七字少室山房集卷一
