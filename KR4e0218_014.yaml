body:
  text: 少室山房集卷十四明胡應麟撰五言古詩二十首始出西直門策蹇行堤上四十里暮抵碧雲禪寺宿顒上人方丈中塵氛翳京洛客子悲途窮芒鞋出西郊陡覺萬慮空垂楊四十里長堤跨遊龍蹇驢負破帽泠然若乘風平湖漾明鏡匝岸紛芙蓉源窮見大陸平野羅千松環青障冥漠積翠摩穹窿嵳峩衆山頂忽覩金銀宫碧雲際天出氣勢何其雄欄杆冒白日棟宇凌秋空飛泉繞重砌潄玉聲玲瓏浮雲出深澗映樹明遙峰山厨積古雪石梁卧長虹始知五濁界咫尺蓬萊通吾將結茅屋一杖時過從徘徊不成夢靜夜聞微鐘早飯罷由碧雲入香山山麓及顛俱有亭諸宫殿最古是勝國時遺搆仄徑緣藤蘿逶迤入深谷重隂夾磴道彌望皆古木長松數百年夭矯雲際矗飛泉挂峰頂蜿蜒出平陸石門森隧道孤亭峙山足四天劃然開空洞豁塵目千崖布黃金萬仞嵌蒼玉梵室緣危杉禪關蔭修竹聖果森菩提曇花吐薝蔔琳宫是何代相傳至元築兹山迹最古創始見身毒悠然念人代纍劫如轉燭夜分息塵囂重展法華讀何日歸流沙吾家舊天竺來青館夜分獨坐題昏黑登上方遂抵兹軒宿遙峰過疏雨衆山若新沐晚涼憑闌坐流螢出深竹明月東方生依微隱喬木泠泠發孤嘯空響答巖谷山僧供伊蒲飽飯禪堂浴微鐘歇清夜星斗爛可掬終南饒白雲暫此憩幽獨山左側小徑捫蘿入紅光寺寺僧盡出獨坐贊公房題十韻壁間西山四百寺金銀爛蓬島紅光據絶顛迥出千岫杪香山既窮望石磴上深杳奇峰刺天出勢欲截飛鳥憑髙豁雙眸頓覺宇宙小危龕貯金粟像也億萬恣圍繞禪堂閴無人黃葉淨於掃曇花吐優鉢香氣達蘿蔦悠然悟塵世解脫何不早會當攜瓢笠一息萬緣了將登西山絶頂昏黑法華寺廢址小憩捫蘿上層顛石門嵌空立千嵓吹烈風遺棟裊絶壁古佛頽蒼藤禪關尚雙闢我行窮登頓假此暫棲息殘僧一二輩破榻置瓢笠山魈供夜談木客伴朝汲嵐光壞竈起磷火斷垣出虛牖號寒蟬隂廊走伏翼梵天亦銷歇塵世幾更易愀然發長嘯感此獨悽惻桑田復滄海浩浩無終極踟蹰白日暮拂袖下昏黑凌晨起梯鳥道抵玉巖寺望長安宫闕題清晨饌伊蒲飽飯捫石壁天風拍兩袖樵路尚昏黑微月耿嵓際殘星墮山脊明霞挂石梁漸起赤城色仰攀猿鳥巢俯瞰麋鹿窟山椒見臺殿經嵗斷人迹危梯霧半隱古砌雪長積聳身上絶顛河漢僅咫尺震旦隘目睫宇宙轉呼吸天門九重啓棟宇爛金碧仙姝十萬輩一一似相識胡為墮人世甘此下方謫勞生四十年營營若蟣虱長謡歸去來香案玉皇側西山絶頂縱目誦供奉呼吸通帝座及拾遺焉能辨皇州二語臨風咽桑落十數觥沈醉憩大磐石上昏黑乃下燕山八萬仞樓臺夾層嶂緬懷窮絶顛攬此大千狀時維九月暮決䇿浣塵况蹇驢華嚴宿凌晨䇿孤杖捫蘿翠微半亭午思挾纊石門排空入猿鳥捷下上兩岸夾霜楓燁若錦步障憑髙宇宙隔陟險身世忘疊磴何岧嶤遙峰漸超曠披襟豁雲霧把袂狎星象皇都但一氣帝座屹相向九點分齊州一一羅眺望頽然步空虛嗒爾齊得喪吾將御風遊乘化入無量翠岩寺在碧雲左障蔽髙崖層巘中最為幽絶余每過必留浹旬碧雲既巨麗香山亦宏敞翠岩蔽層巘車馬或希往曰余負奇癖一一恣探賞羣峰障谷口彌望悉林莽谽谺一線入仄徑若指掌危梯屢攀躡喬木時偃仰隂崖伏空洞陽嶠入宏敞俯窺地欲窮上陟天轉朗樓臺互回合金碧時惝恍虛簷織蛸蠨畫壁森罔兩繩床敗葉積禪堂壞苔長悠悠石火身兀兀挂世網向暮聊獨吟徘徊發深想維摩菴又翠岩最幽絶處科頭獨坐萬籟澄寂殆不復知有人間世因與山靈約異日者畢婚嫁願攜一鉢安息此中萬峰人聲絶蘿磴恣攀陟樓臺跨深崦盡納衆山色大地紛金銀遙天挂丹碧禪關面重壑窈窕開丈室科頭挾書坐如面達摩壁五藴窮真如六根斷情識將因抱華嚴住此阿閦國他年號居士説法嗣摩詰山麓遊卧佛寺寺極宏煥金銀奪目畫廊數百千尺圖大雄氏顯化顛末備詳僧寮花木彌靚幽支枕敧卧不覺日晏琳宫萬山麓勢欲翔遙天金扉燁宏敞玉棟紛鈎連飛蘿映禪室古木藏玄關奇花及靈果布列森祇園偉哉化人居傑搆凌飛鳶金身丈六強證果示涅槃修廊耀丹碧粉墨流雲煙始疑張僧繇或詫吳道元窮源遡流派一一圖真詮天魔亦俯伏外道紛纒綿感此三嘆息臨風涕如澘猥以無涯智逐兹有盡年何當蠟雙屐西入清涼山杳然絶人纍乘化歸竺乾出山投華嚴寺夜宿晨起遊吕公洞曩同惟敬題名老衲炊黃梁作供憶邯鄲枕上事憮然久之夜宿華嚴堂晨探吕公洞懸梯噴飛雪流泉伏螮蝀星流墜幽壑俯視勢若動僧房雲作關禪宇石為棟雷轟蒼崖裂霧壓翠巒重老衲炊黃梁停午具清供毋疑邯鄲生至人久無夢望湖亭亭午小酌空水明媚四山金碧倒浸澄波中芙蓉菡萏流芳吐艷杳然身在六橋孤嶼間惜乏兩沙棠艇子載吳娃十雙耳衆山合長堤空水相映帶平湖漾明鏡秋色照眉黛中流赤欄起亭亭列車蓋琉璃十萬頃倒浸畫簷外憑虛望寥廓心賞劇堪快菡萏餘汀洲芙蓉匝灘瀨蛟龍伏空洞鸛鶴摩逺塞魚遊迥自得鷗行豁無礙美人期不至豈乏沙棠載吾將返若耶夷光久相待玄貞觀髙峙山顛孤峭突兀望之真中天積翠由飛梯左右數百級上有石壇宏敞可坐千人四山抱若垣蒼翠照林樾中天峙棟宇大地聳雙闕穹階百級上左右互森列石欄層空立瑶草紛可掇平臺坐軒敞髙棟表􅏭嶪振䇿登翠微朝元叩丹訣玉洞翻靈篇人迹往來絶暗谷埋寒雲隂崖墜古雪明河漾花際新月吐木末逝將遺世紛永謝俗士轍三大士殿普賢肇峨眉示迹惟西方文殊現五臺臺殿俱清涼猗與觀世音普陀實吾鄉胡為三大士鼎足偕兹堂吾聞維摩室方丈羅八荒須彌眇一芥諸佛同行藏况兹三如來功德侔三光秉心佐迦文並起懸津梁青獅負瓔珞白象銜珠璫千億昭化身大悲浩難量區區南贍洲勺水軍持將楊枝灑甘露涓滴回枯腸我來重瞻拜感嘆殊未央善才一童子百十參慈航峩峩兜率天不改帝釋疆胡為滯五濁塵土紛倣徨逝將去人世謝此浮名韁他時會解脫説法酬空王大佛寺觀釋迦文佛金像題峩峩薊城西飛觀聳百級金身五千丈照耀天北極畫棟糜丹青雕甍爛朱碧琪花燁如散瑶草紛可拾耨水清六塵雪山炯四壁廣座陳香燈長廊繪粉墨優鉢梵筵啓伊蒲僧供出俗染汰欲空淨因了可覔香象來醫王天龍護帝釋茫然小宇宙一愴大雄力寺後磊土山為十洞曲屈邃幽余嘗納涼其中杳若别有天地者西山實佳麗步步金銀宫四百八十寺窮極土木功或云寡岩穴未若天南東異哉此叢林製作侔鬼工塊然一培塿其下皆虛空十洞列左右恍惚蓬萊峰地肺鑿委羽天忩移張公不假杖藜入無俟乘舟通猗與造化力播㺯指掌中何因遘二女劉阮追遐蹤千秋餌靈藥緑髮稱仙翁桃花閉流水絶勝丸泥封髙涼橋晚憩望新月作入山路不迷出岫興彌逺平橋帶流水喬木數家晚湖頭雨初歇沙際塵尚軟彩雲籠大堤新月吐層巘金銀耀梵剎珠翠競雕輦馥馥紅蕖開靡靡緑萍斂改席臨菰蒲攜壺就葭菼吳歌起難遏越調和仍緩把臂無求羊同懷有嵇阮厯落摧雄心憑陵豁醉眼朱顔稍淪謝白髮且荏苒人生貴適志對景聊引滿湖上菡萏盛開遊人如織抵暮皆入郭余獨往坐堤畔命小奚撥阮為吳歌仲秋出湖隂衆芳亦未歇嫋嫋垂楊疏翳翳浮萍合紅蕖遞芳馥緑蒲可攬結遊子飾金羈美人競羅襪笙歌夾岸起簫鼓臨流發日入息羣囂長謡待新月歸途過真覺寺五招提突兀雲際與帝城諸宫闕參差相望寺中車馬旁午蓋漸近國門云真覺依帝城參差僅十里削成五招提如薄太清起憑髙盡胡越眺逈入箕尾七層際空遙千級去天咫青霞濕衣袂紫霧飄杖履羲和馭金輪拘翼憑玉几俯身視塵闉局促類螻蟻何當八翼成昏黑猶徙倚謁觀世音大士禪院院在髙涼橋側自漢唐下未嘗稱大士婦人蓋宋元始訛謬王長公近作大士本紀辨析詳至余復厯據六朝及五代諸野史小説證驗甚明後人當無詞費矣吾聞觀世音顯化肇天竺發心救魔難千億現手目功德如丘山聖願肯自足遍觀閻浮界衆生苦煢獨噓呵儼一氣陽春布窮谷凡人發善願一一遂所欲至仁形影彰明效桴鼓速遂令南贍洲夫婦蕃孳育我來載瞻拜頂禮大悲足妙相呈十方天人麗冠服胡為晚近代姑嫗謬稱祝良哉弇州氏雄辨破流俗中年窘嗣息晚境冀多福願言普慈施世世事身毒少室山房集卷十四
