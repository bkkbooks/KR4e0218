body:
  text: 少室山房集卷九十一明胡應麟撰行狀二首先宜人狀先宜人宋氏宋余邑中最著閥也聚族居尤埠食指無慮數百千即𨽻博士籍恆以十計而外大父最有聲外大父字道亨震其諱為人倜儻負奇芥視一第甚既屢試不售中棄去攝古衣冠築别墅曰雪溪堂聚書萬軸卧其中經史子集環向恣讀之間發為詩歌盈帙晚尤好方術家言自長生黃白星厯緯候針石六甲五行無弗治而獨形家得其宗所著風水井見輿地指蒙多行世達官巨室延至恐後外大父亦雅好遊而體便登陟每出恆旬日一歸歸而宜人持槖鑰飾籩簋謹候閫閾間外大父受成事而已始外大母首舉長母姨女于黃次舅氏旦以疾廢季乃誕宜人而外大母殁故外大父出游獨宜人持門户外大父覩其經畫斬然嘆曰是女也仁孝莊淑則天賦乃其材矯有女丈夫風非賢如伯鸞吾弗與壻也時家大人以制義傾邑中未室外大父一見輒語門士施令喻㫖委禽焉俄而家大人名曰益起己酉薦于鄉歸迎宜人蓋十年長矣贈奉政公洎鄭太宜人咸在堂得婦宜人歡甚奉政公家故饒既而燼于火家大人奮中微藉脯修以給甘毳是時江南諸從學就之如雲宜人孑然一軀內奉姑嫜外奉賔客庀牢醴括米鹽周旋中饋諸勞苦若固有之間以篝燈餘隙刺繡辟纑佐家大人乏舉宗藉藉詫其賢己未家大人第進士宜人侍奉政公太宜人就餼京邸以外大父春秋高固請偕值嵗大蝗厯齊魯趙衛至燕中千里地盡赤宜人躬飰脫粟而多方張具奉二尊洎外大父歡俸入不足簪珥脫繼之務各厭其意乃已明年鄭太宜人病宜人扶掖視寢溲衣帶糾結十旬竟不起宜人柴毁骨立從家大人扶櫬歸中途視膳奉政公尤曲至間密語家大人舅齡迫崦嵫邇鰥居恆鬱鬱而􅉏御亡足司巾櫛者脫昏夜驟有緩急吾兩人曷從知家大人矍然起曰乍吾夢爾爾微子吾告幾忘之立召命諸媒妁得天津陳氏女媵奉政公踰年生子佐奉政公撫而謝宜人吾賴若以有今日尋奉政公下世宜人匍匐苫塊一如昔喪太宜人丁卯夏家大人襄大事于瀫水源宜人主工役饋餉一切辦兆以協吉尋奉政公媵陳相繼亡稚子佐呱呱袵席宜人躬保抱鞠養之是時家大人以不肖獨子納二室唐舉弟鵬齒相若宜人懷佐而膝鵬兩忘其非已出也又以舅氏旦痿外大父繼體岌岌因力從臾娶于徐得子浩甫髫而外大父殁宜人劈踊呼天慟幾絶捐囊篋以治喪仍悉索餘資畀弟浩浩感奮卒納婦世其家識者謂宜人一身匪直胡氏宗賴以葆大宋之宗垂絶而續疇力也奉政公服闋從家大人入燕補禮部儀制郎自是周厯四司凡五載適邊人欵闕下今皇帝撫運應天凡登極改元錫封通市諸大議悉下家大人宜人握家秉槩以便宜從事家大人得精心展布品式典章朝野傾動佹以勞勩擢九卿亡何持慶王襲封議忤大璫出為湖廣右參議挈宜人便道還里中宜人顧從宦日久田園蕪又不肖體素羸倣徨不忍割因請留處守而家大人入楚督漕糧江陵相諸子試㑹城家大人靡溢禮其家盛鳩工治府第諸司奔命匠石家大人如弗聞也者江陵相積怒漕使遂希旨齕家大人鐫一官移六詔稍遷至副觀察凡三政不離滇中屬弟鵬復殤而不肖艱嗣育故家大人自楚而滇越十載諸媵畢從宜人亡纎忽介懷抱每信使旋聞家大人健匕箸則喜動顏色居恆謂不肖吾無他冀第得而父康於官而體康于室南面之榮吾弗與易矣其恬于世分類如此不肖自丁丑一赴公車旋絶進取念亦以奉宜人慈訓不忍暫離也舍傍闢隙地為小園雜蒔桑苧葵榴時時御板輿挾子婦及諸雛翛然花木間竟日念同氣惟一姊一兄姊寄迹窮鄉而兄廢髫鬌絶人道因嵗時推負郭問遺長姨母而掃丈室延舅氏出居之躬撫摩存恤以為常舅氏徐于一榻凡九易寒暑大期至揮手告旁觀吾以喘息腐餘竊生人之樂晷刻皆宜人賜也人以為宜人孝友惠慈悉備衆善槩之往籍眇覩等倫劉中壘所傳古今哲媛彼其義激所形白刃易蹈至安常履順無可釣之奇顧人情所難有特甚者乃宜人聲色不動而尊親之道事育之節纎悉理解女德之盛邈能其繼矣既而家大人請老歸自滇宜人以女弟殤感疾猶强起洗沐出迓豸袍翟冠金紫暉映白首晤言殊樂也諸側庶羅拜侍席前無所問一笑頷之而已宜人自歸家大人苐舉丈夫子一即不肖麟次女弟鳯年十四殤宜人以夙鍾念也慘怛甚卒湛思中痰久而痼不肖晝夜翻經方問醫術聚羣兒雜奏宋元諸劇宜人覩不肖每强食自寬如是者亦越十載己丑仲冬朔晨起語不肖夜夢觀世音大士導而往西方鼓吹音樂從者以百數何祥也豈所稱極樂界耶不肖唯唯然喜不勝憂七之日忽風昡作于脾亭午正襟趺坐奄然逝傷哉彼蒼者胡奪余聖善之遽也距生嘉靖辛卯夏去古希僅一間云宜人警穎殊絶雖不諳筆硯而諸史百家稗官小說下逮傳奇詞曲屬于耳終身不忘諸妯娌雜坐亹亹談說不去口家大人列方面不肖忝冠紳而寒素自將與人處油然亡少驕貴色片語間肝腹洞見絶不為城府町畦至普濟博施尤慧根夙植稚齒即護覆衆生昆蟲草木不忍踐其命既歸家大人日給不遑而務行其意聞人患難痌瘝切于身匱乏以情告必宛轉周其急一日之間饑者食渴者飲寒者衣病者藥喪者柩若山陰道中行應接不暇恆言吾樂此不為疲也逝之夕鄉鄰哭于邑族黨哭于宗姻婭哭于堂娣姒哭于寢臧獲輿𨽻丏者哭于途以宜人存日沾溉遍咸無物弗被故也宜人少蔬素禮三元北斗而于觀自在如來敬事彌篤至朔望度誠焚掃有疾輒夢大士以楊枝展拂之輒差鼓吹音樂之導蓋往生西方時至云於乎人孰無母母孰無愛乃宜人之母不肖則愛絶常情一念精誠結于腑肺起居憂樂喘息貫通蓋舉世界大千無一足入吾母之衷而少奪不肖者至不肖依依膝下自少及强四十年猶一日無論妻孥燕婉棄置若忘即五鼎三公蔑知何物誠謂母子二人更相為命一旦溘然先朝露而不肖復以家大人遲暮不敢捐孱軀下從罔極昊天之慕曷能以瞬息已也惟是先宜人百行在躬宜得命世鴻裁以傳示來葉敬用幽憂餘晷掇狀萬分伏惟大人君子躬當道立言之寄者采托而賜之銘不肖幸甚先宜人幸甚别駕吳君行狀代君姓吳氏諱某字某歙之海陽人先世自唐少微公迄宗漢公源流最逺詳載家乘中至君父鳯英而客死于楚君時方三齡兄禪亦在襁褓遺資竟為某子甲匿弗豫母劉孺人旦暮拮据鞠君及兄禪君甫有知問父狀輒劈踊弗食後十年劉孺人亦謝世君號慟骨立服除猶毁瘵不勝衣君既失怙恃獨依伯兄禪以湖陰江左饒沃地謀僦居為治生計㑹女兄從令俞君之大田君徒步上謁俞君執君手與語大竒之何物寧馨匪碌碌轅下駒也亟命修贄就外傅力學居無何俞君逝欲卒業槖垂無寸錢喟然曰儒者業不諱治生顧今衣食靡所資而株守一褐奚為者遂與兄禪改業賈以信義著稱交游資用藉藉起則又翻然曰吾大者既不能業儒其次尚可以刀筆自奮幸藉二先人寵靈獲挂一命樹尺寸功可無負七尺能役役老闤闠間耶始循例補郡功曹潔廉自持吏名儒行前後羣有司交口嘖嘖賢公以文無害授永平衛幕衛古漁陽境與邊畨犬牙錯故事嵗時發金幣賜諸豪酋吏緣為姦往往飾濫惡乾沒奇羡公受事毫忽無所犯賞勞繒帛皆令人持鏹致之吳越都㑹間精好什倍諸豪酋大喜過望世世奉約束稱外臣督府以是材君舉盤錯政咸諉焉君被知益淬勵自效凡徵衛課督邊儲給營餉所至寢私杜謁釐弊剔垢振頽頌聲四溢永平邊郡雉堞圯君親操畚鍤不數日奏功昌黎遷安令遞缺君再署二嵓邑民上書求得君為真令者纍千人東事迫將越常格録用君直指行部薦章旁午總之無慮數十上時銓曹以左輔重地非吳公莫可卒擢君判通州余方待罪州將簿書鞅掌奪寢飰既得君歡甚內外諸劇務一切畀君職其羣州當孔道君所轄漕糧商稅最艱巨又監司大農僉以君有異能符檄倚辦載道君恪共厥職一如官永平時獄訟繁興君據案片言立決率以為神明富民妾以罪縊父母訟于官當道下訟鞫審君問狀情得趣破械遣之富民懷百金頓首庭下君怒曰折獄辨寃余分也奈何持阿堵衊乃公其人惶駭逸去大豪蠶蝕堤坼壩頽毁幾不支君履畝悉復故經界貂璫縮手奉行其不畏强禦類如此州土瘠嵗侵逋負萬計窮民展轉枮槁什九囹圄君悉心撫字民賴以全活甚夥至家奉香火尸祝君君平居繩趨矩步恂恂雅飭即儒者自以弗如一臨利害山立嶽峙雖賁育莫能奪恆以少不獲竭力二親盛年操末業辨髦遺書為終身陷缺事既服官躬儉約饔飱草具蒸嘗享祀必備物致精捐俸入延明師誨諸子弟皆嵓嶄見頭角事兄禪克盡弟道白首無間言至處閨闈馭臧僕嗃嗃如也不佞頃被內召治裝旦夕發顧徘徊不忍去君君亦戀戀河梁莫能别余為黯然登車未幾君疾聞又未幾訃音至矣吏民被君德者環泣四境咸以吳公不啻吾怙恃胡彼蒼奪之暴也君柩將以秋初行孤起龍具行實衰絰踵門請曰知吾父者莫如公言足以信今傳後者莫如公不肖孤匣遺骨歸首丘敢丏狀垂不朽余交君最久且深即不文義無容默默敬據諸孤所稱述而筆其尤大較著彰顯者如右公生年為丙午九月草五日殁萬厯戊戌正月初九日娶汪孺人次娶某再娶某丈夫子二長起龍某孺人出配某人女繼配某人次起鳯某孺人出聘某氏女一女出適某孫男某孫女某俱幼未聘字公之柩行矣余束官守不能執紼泥途而素辱君同官為狀皆耳目所覩記不敢謾浮借以㸃君生平惟當世立言大君子擇馬少室山房集卷九十一
