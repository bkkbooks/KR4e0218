body:
  text: 少室山房集卷九十明胡應麟撰記五首二酉山房記二酉山房余所搆藏書室也書以經類者三千七百餘卷以史類者再倍之子三倍集四倍凡三萬六千卷有奇友人黎惟敬過而樂之題二酉山房云始余受性顓蒙于世事百無一解亦百無一嗜獨偏嗜古書籍七齡侍家大人側聞諸先生談說墳典則已心慕艷之時時竊取翻閲十一二從家大人宦遊燕燕中四方都㑹故鬻書藪也而家大人亦雅負兹好每退食諸賈人以籍來余輒從㬰其旁市得輒乞取盡讀而是時肅皇帝末年旱蝗迭見大父母復就養京師俸入不足恆乞貸鄉里以故帙繁而價重者率不能致間值異書顧非力所辦則相對太息久之巳家大人再丁內外艱余再從還越戊辰復上京師時余年十七始娶亦㑹家大人官禮部俸入稍優于是極意購訪凡寓燕五載而家大人出參楚束裝日宦槖亡錙銖而余婦簪珥亦罄盡獨載所得書數十篋纍纍出長安自是余奉母宋宜人里居十載中間以試事入杭者三入燕者再身所涉歷金陵吳㑹錢塘皆通都大邑文獻所聚必停舟緩轍搜獵其間小則旬餘大或經月視家所無有務盡一方乃已市中精綾巨軸坐索高價往往視其乙本收之世所由貴重宋梓直至與古遺墨法帖並吳中好事懸資購訪余則以書之為用枕籍攬觀今得宋梓而束之高閣經歲而手弗敢觸其完好者不數􅗡而中人一家産立盡亡論余弗好即好之胡暇及也至不經見異書倒庋傾囊必為己物親戚交游上世之藏帳中之祕假歸手録卷軸繁多以授侍書每耳目所值有當于心顧戀徘徊寢食偕廢一旦持歸亟披亟閲手足蹈舞驟遇者率以為狂而家人習見弗怪也自余為童子至今年日益壯而嗜日益篤書日益富家日益貧家大人成進士揚歷中外滋久乃敝廬僅僅蔽風雨而余所藏書越中諸世家顧無能逾過者蓋節縮于朝晡展轉于稱貸反側于寤寐旁午于校讐者二十年于此矣山房三楹中雙闢為門前施簾幕自餘四壁周列庋二十四度尺度皆齊一縱橫輻輳分寸聯合中遍實四部書下委于礎上屬于椽劃然而條岌然而整入余室者梁柱榱桷牆壁皆無所見湘竹榻一不設帷帳一琴一几一博山一蒲團日夕坐卧其中性既畏客客亦畏我門屏之間剝啄都絶亭午深夜焚香鼓琴明燭隱兒經史子集環繞相向大而皇王帝霸之事功顯而賢哲聖神之謨訓曲而稗官野史之紀録葩而墨卿文士之撰述奧而竺乾柱下之宗㫖亡弗涉其波流咀其雋水意所獨得神與天遊陶然羲皇萬慮曠絶即南面之榮梵天之樂弗願易也昔人謂醯雞處甕中蔑知六合之大而終日飽食沒世無聞為天地間一蠧余自束髮受書即妄意掇拾一家追隨百代乃今甫壯而衰亡能萬一自見而徒以七尺之軀沈痼于遺編敝簡而弗能出則當今為二物靡宜莫余過者顧余父子纍積之勤嗜好之篤與諸書之聚余室皆非偶然于是歷敘梗槩所由志之山房為一公案非海內同好不敢以出示也關忠義侯祠記漢代關忠義侯義烈英靈炳蔚萬古而祀典之盛極于本朝慶厯間今香火蒸嘗薄海內外孩提走卒靡不知有侯者獨侯生平終始大節陳壽寥寥數簡缺略未詳且筆削之正肇造紫陽自朱氏前即名世巨儒猶繫統于曹魏則侯之效命先主談者大都以盡心所事而已其于翊衛炎精恢復漢室之誼槩乎未之有明也乃至東吳諸人名魏仇讐實漢蟊賊自孫策周瑜輩皆不過欲乘時寇敓跨割江表傳之子孫曷嘗有纎忽為劉之念權既破操鼎足形成纘圖父兄志滿意得烏林之役昭烈奮身矢石以啓全荆而權百計忿爭必瓜分而後已此其肝膈底裏固可洞見侯睥睨其人曾斗筲弗若而肯俯與㛰乎蓋侯之絶㛰孫吳即其辭爵曹魏方寸昭昭揭于天日乃後人聾瞶動以侯躁忽寡謀過也若荆州之失王公元美以先主不當委侯闕旁援後徑曾亡一旅之師其失當蔽之昭烈余則以孫氏三世江東士暇卒練赤壁長驅中原岌岌而周瑜敝全吳之甲曾不能乘鋒席鋭鏟江北之彈丸比權親率大衆窺伺合肥張遼以偏師一擊隻輪靡返則侯之舉襄圍樊淹七軍而震華夏允謂百代之殊勛三分之上略其難其易未可以淺薄窺也當其時魯肅未亡法正猶在吳軍徐沛蜀軍秦川努力同心掎角大業則中原之復即侯一人負荷有餘昭烈武鄉高枕而議禮樂矣天不祚漢仁竄則留操遷則止若權若遜為鬼為蜮蓋世之伐毁于垂成漢事至是遂無復更可為者蓋冥冥之中陰若尼之不待武鄉淪喪而後決矣然則侯之存亡匪侯一身漢四百載存亡實侯焉係而判于蒙也長江全據之一言此余所為掩卷咨嗟太息痛恨于吳寇者也今侯之精爽巍巍赫赫宇宙亡窮回視東吳君臣奚啻犬鼠獨世人習論成敗槩侯生平往往若有遺憾焉者而絶吳摧魏浩然之正氣穹然之偉績習矣弗察鬱而未彰余甚憤之輒因蒲東趙公命記侯廟而詳著其說如右若堂構之崇隆侍衛之華煥與興作之歲月日時前人紀載己悉而余方為侯鳴不平于千載之上固亡庸于贅録也白嶽遊記白嶽東南一奧區也雖勝槩不越尋丈間而天造神工炫心駴目游人往往詫為絶奇余夙有少文之癖嘗得齊雲圖揭之齊中每撫琴動操山靈響答久矣尚以未及攀陟為恨仲春過新都去兹山百里而近既復過汪司馬肇林則兹山僅咫尺間㑹坐中有談及者余豪興勃勃欲飛司馬及諸仲仍從㬰之適暮春三日當𤣥君覽揆之辰爰覓笋輿發峪口薄暮抵休寧宿旅舍中傾白墮十餘巡數浮屠自九華至舉似白嶽問孰優曰九華外拓白嶽中擫其勝故未易甲乙也詰朝蚤起行休寧郭西游女方浣紗堤上平波漲空草色迤邐肩輿過之袍袖皆緑屬舁者為緩行亭午達岩下曳屐上東天門飯樃梅庵次日齊服謁𤣥天太素宫香爐千仞突兀霞際折而東曰紫霄岩行小倦取磴道百級而下憩無量壽宫宫司馬新建極華靚可觀千山環拱黟水一線橫拖其前背負三峰矗天而起曰紫玉屏即女媧鍊石巨靈削成宜不及此而舊志絶不齒之又稍東穹碑屹立勒文其陽曰三楚升中頌藉第令以鳥迹鑱之末不署司馬姓名幾以為漢秦遺碣矣又次日攜酒登文昌閣望五老峰旁三石離立曰三姑余謂弗善易三娥取峨睂音近也通諸勝得詩十二章白嶽遊人足迹所常至故世所共徵者弗列列勝之後出者如右自餘槩于詩中見之溪雲閣記渡瀫江並崕行五里而近有山嶪然橫峙曰蘭陰俯控城闉仰屬霄漢邑西南最勝地也山之背重岡沓嶺延袤而下若凰騫若鷲躍抵洲上而稍就平是為蘭陰之麓大雲對聳闤闠萬家飛梁界空舳艫千丈又兹山最勝地也乃趙君文鎮即其地為書齊遊息焉堂五楹顏其楣曰草𤣥室朱簾翠幕位置甚都堂之後為軒曰嘉色取柴桑公采菊語也傍隙地藝叢菊數百本枝幹窿穹飽霜露率逾丈羣木既脫幽芳錯呈爛然庭除組繡奪目凡邑中言花事者咸出趙君下軒之下甃方池池淥淨不容唾金鱗尺餘撥剌藻荇間陽琢石為平臺中散植牡丹芍藥山茶葵榴之屬右為燠室牖戶蒙密亡纎隙受風以冬貯蘭蕙素馨左為便房設木榻棐几桐琴四壁圖繪多名手古銅觚彝鼎官􅀢泉定諸窰焚妙香瀹嘉荈雜貯江梅岩桂菖蒲而閩中盆卉若牙松若拳柏亦列置其次焉循曲房稍東為仄徑徑窈窕穿重壁穴旁為天忩以受明計其衡尺有咫而縱亘五丈折而北又旋折而東升石磴垂二尋磴窮得方檻小憩平疇沃野彌望皆緑憩者為跂足弗忍前舍磴緣檻歷飛梯二十四級梯凡三折每折級如之迤邐絶頂而至所謂溪雲閣者雕甍翼然金碧焜耀如費長房夜入壺公壺朝而聳翮閬風之杪舉閻浮提界在我目睫弗啻也閣四周施畫楯楯之內為風忩三十六皆洞開河漢縱橫象緯出沒雙溪如帶合流跨其前九峰若屏離立峙其後振袂而歌赤松則朝真芙蓉紫薇諸嵓岫飛動于檐隙已曼聲長嘯騁望于嚴瀨富春之際羊裘翁持釣竿曳草屫貿貿然來矣蓋蘭陰之勝據吾邑最山麓之勝據蘭陰最而趙君齊閣籠一邑之瑰麗而盡收之又山與麓之勝之最也胡先生既用趙君請數止宿齊頭時縱目乎溪雲之上乃喟然而嘆曰觀之不可以已如是夫夫蛙之羣居于坎井也仰而窺夫蒼蒼正色者甕然焉耳矣釜然焉耳矣夫若是匪蒼蒼者之眇也地之卑勢固宜爾也一旦而登杜甫氏慈恩之剎而吾之呼吸且泠泠通帝座焉彼浮屠雖高矗霞外而崷然一柱豈誠什百于坎井乎哉乃厥覩相萬萬其地勢高下殊也趙君斯築崇不逾十仞而廣僅足數筵大都孟軻氏所稱五畝之宅也而能籠一邑之勝而收之即其人磊砢扶疏亭亭獨上超然廣莫之表匪齷齪裩中流審矣異日者余將拉鴻䝉氏遲趙君化人之宫相與陟叢霄叩大羅歷忍利兜率諸天而後返其觀也當必有倍進于是姑為記以塞趙君而使之俟之聚順堂記丁巳冬琅琊次公有豫章之役過家大人即索阿戎見見即抵掌語徹丙夜不休洎行送至蘭陰山下攜白墮躡笈登巔南望九峰蒼翠插天若青蓮然蜿蜒下亘數十里而遙至風秋潭上止焉斯地也華山枕其後漁塘滙其前紆曲回旋于堪輿家言甚符次公指曰鬱蔥哉佳氣此必有順德君子若隱鹿門者流居其間哉余識之然遷延數祀未涉其境問其人也乃余宿有元亮之癖聞漁塘余君善蒔菊因同二三友人造焉門以外灌木交加藝菊數百本爛焉奪目漁塘君出迓則貌穆然則色溫然則言呐呐若不出口然豫私念曰此次公所云順德君子若隱鹿門者流也逮入而其堂壯以峻其軒翔以朗其回廊曲欄秩秩而噦噦朱簾高捲花香入座而子若孫胥彬彬然儒衣冠侍余謂友人曰堂以聚順顏厥有旨也漁塘君即九頓首請曰古自棟宇來肯堂構者多矣獨晝錦三槐兩堂迄於今若新則惟永叔子瞻之記是藉猥兹野人之居願先生不惜片言記之異日得與兩堂俱永先生之賜其在萬世乎余曰唯唯夫順之義大矣以毫靡乖忤言若導山泉而注之東也順之聚難矣以毫靡缺漏言若㑹百川而歸之海也聞君庭闈承顔則薛包遜孝順以克諧焉而聚棠棣燕樂則姜肱讓友順以克念焉而聚琴瑟敦好則梁伯鸞輸敬順以克正焉而聚且也以其順德迪子若孫若萬石君之不言而躬行他日子若孫奉君教遞登膴仕為聖天子將順之臣則綸音下錫必曰此三代遺民為朕釀大順之風者德足褒也此堂不更色飛乎哉君謝曰余不識聚順之奧義不謂當耆年而幸聞先生教余曰君髮鬒已耳順乎此天之所助而聚之所致也立成五言近體一章壽之因與君約共葆兹順德握手入金華山中為皇生石羊牧倘皇生乞余作赤松宫記當必有進於是者今日且醉黃花間毋為元亮所笑少室山房集卷九十
