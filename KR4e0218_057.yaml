body:
  text: 少室山房集巻五十七明胡應麟撰七言律詩七十六首聶水部報命北上訂余握手谿頭賦此為别河梁揮袂惜追遊五夜雙龍拆斗牛皂葢欲飛燕闕底青帆仍遡越溪頭熒煌御氣瞻華衮慷慨窮交惜敝裘明月梅花春事蚤為公懸榻在南樓憶蘇别駕以修有序憶在清源日與惟效使君以修别駕沈飲十旬極人生聚首之樂一别五載使君出守三衢尚獲談謔朝暮以修歸卧巴蜀遂絶無鱗羽相聞惟是使君擢任觀察以修實其州民焉豈龍劍有靈天作之合乎余既悲使君之行而又竊幸以修之遇感懷戀别情溢乎詞笑憶清源市上年沈酣長伴酒家眠空傳剡曲三冬棹竟阻咸陽十日筵犢鼻正窮司馬賦貂璫誰達子雲𤣥花驄此際堪攜興極目雙鱗灔汿頁前題徐納言具慶貤封冊壽域雙開越水頭金章赫奕下龍樓星飛南極晴光爛月湧西池瑞氣流八百年方騎紫鳯五千文欲駐青牛承家況是仙郎在戲彩翩翩近玉旒登鹿鳴山絶頂憩小蓬萊觀易使君留題作有序山與郡城相望超然亭孤峙其顛四面無際俯瞰衢闉萬瓦鱗次飛流百尺環抱其前呉雲楚樹映帶左右近郭一大觀也舊止𤣥武一祠葺而新之為游覽所寔始使君云絶頂仙風面面來中天何異到蓬萊江流噴雪飛呉甸石磴盤雲上越臺覽勝欲窮遊子目留題誰並使君才含毫驟發登高興莫訝銀鈎破緑苔次日復攜酒酌山堂晴眺再題壁之左方徙倚危峰散鹿羣尊前呉楚望絪緼亭臺四壁全披霧城郭千家半入雲薄暮飛檣環浦下中宵寒磬隔谿聞青霞忽記觀棋約曳杖行探玉笈文贈李司理二首有序司理楚嘉魚人曽祖承箕舉于鄉棄弗上南宫與陳公甫倡和嶺表即白沙集所稱李世卿者也從弟承勛復以戰功列名臣文詞勲德棣萼相望司理寔世其門閥尊人孝亷亦有集行於時環珮翩翩下玉除漢庭司法定誰如才名供奉騎鯨後家世將軍射虎餘座裏雄風迴七澤嚢中春雪照三衢探竒不獨青霞興物色時能到草廬識面荆州更有無頻將意氣傍菰蘆青春紫殿誇陳策緑鬂黃堂佐剖符三尺清風懸水鏡萬家明月浸氷壺銅鞮況是山公在把臂何妨學酒徒壽喻封翁七秩三生曽授大還丹七紀長看住翠巒座上雙龍隨舞隺亭前五馬候驂鸞西江水接東溟近南極星朝北斗寒莫道授書年尚少蒲輪行見出長安張成叔過訪以尺牘詩草見投頗深推挹賦答四章意氣翩翩入洛才衡門游屐破蒼苔朱絃慘淡佳人絶彩筆崢嶸大將來宇宙漸開新兔苑風雲重上舊燕臺從知國士深難遇片諾何妨共草萊十年塵迹嘆飄蓬傾葢何由道路同一顧驥羣空牝牡雙飛龍劒隔雌雄名流上國交垂盡才子中原業未窮悵望四明雲霧滿獨將離目送高鴻片席乗風下海頭屋梁明月夢難酬尚虚文舉三年刺誰共元龍百尺樓大業乾坤孤鳯起長途雨雪片鴻愁京華舊識如相問老盡桐江釣客裘粲爛鮫珠海色傍飛光遙夕遍茅堂千金易水看過市片玉崑山總擅場白日鴻心游浩渺青天鵬翼破蒼茫為君一誦如澠句齊晉他年可蹔忘歐楨伯八旬矣而神逾王千里餉書頗寓前薪之憤寄答二章老大登壇興轉豪懸書雨雪問綈袍文章得失寧兒輩意氣縱橫尚我曹壯節轉深題柱感雄心曽怯據鞍勞期君一在天風上信宿羅浮望海濤十載西風嘆路岐菰蘆長卧越江湄宫殘碣石才人盡殿聳靈光賦客遺斗酒乾坤迴骯髒尺書湖海問支離竒峰四百飛雲外題遍梅花夜雪時夜同孫金潘葉四生集文如美人館繫馬高樓興未迴銅瓶春色照寒梅人同師利觀空坐客似維摩抱病來雪後何妨尋剡曲雲深無處問陽臺相逢肯下高唐榻總為當年作賦才張大來至泰和以翰貺見貽賦謝鴻書遥下白綸巾聞說題橋氣象新賜履乍聞中禁側鳴琴獨坐大江濵蒹葭瀔水孤蓬夜桃李河陽萬室春莫向龍頭嗟晩暮翩翩八翼上平津丁觀察以兩臺疏薦留住四明賦懷二律千騎縱橫夾上游飛章推轂動宸旒干旄舊識長城寄斧鉞重因大海留玉局閑敲風滿座金尊長嘯月當樓春晴試弄桓伊笛何限梅花越水頭咫尺樓船號令新欣從帷幄覩詞人關中久自推馮異河内今誰屬寇恂溪擁越來清霧雨山橫秦望絶風塵大揮椽筆成功暇修禊蘭亭正暮春送易惟效觀察之蜀中同李司理作八首粲爛除書漢闕來蜀天何處望蓬萊黄堂久擅分符績烏府新推仗鉞才霧擁雙龍行劍閣雲隨一寉度琴臺百花潭上題詩暇幾喚詞人共緑醅熒煌簫鼔夾離筵處處棠隂拂畫船叱馭重看行棧日觀棋猶憶爛柯年瞿塘急峽高牙外䕫府孤城大纛前滿目匡山雲霧色好憑遺碣問青蓮憲節朝巡白帝宫千山行色望難窮城懸灔澦飛濤上署湧岷峨積雪中社稷關心龍劍紫鄉閭游目錦袍紅極知河内追思切伏闕何由借寇公彩筆西南見吏情風流何似在承明花香匝地文君肆樹色浮天望帝城攬轡岷山千騎肅飛書瀘水百夷平莫言玉壘堪長借翹首雙珂漢闕鳴楚水巴山别思重經遊何地不竒踪黃金作客憐司馬白羽談兵羨卧龍絶棧三千行蜀道危闌十二望巫峰高唐賦罷堪攜手咫尺雲華夢裏逢巫山神女號雲華夫人見太平廣記江城晴色照蒹葭彩鷁鳴榔散曙鴉鼓吹乗風還七澤旌旗揺月上三巴揚雄閣畔題𤣥草杜甫堂前覓浣花到日海棠開欲遍可能移植到山家緑酒紅顔悵和歌金罏銀燭奈愁何青羊肆逺孤旌駐白馬寒江大舶過錦里春風啼蜀魄陽臺暮雨狎湘娥雙魚是處能相憶極目遥天劍水波歌罷驪駒散夕氛天涯何處悵離羣猿啼駱谷千峰雨馬踏蠶叢萬岫雲大樹尚留嚴武碣小桃偏䕶薛濤墳眉山伯仲銜知久唱和能令越客聞謂蘇以修伯仲也題琴鶴重鳴巻代送易使君繡斧輝煌下越城江天晴色耀飛旌當年舄化雙鳬去此日琴偕一鶴行巫峽彩雲晨送客巴山明月夜談兵何煩更就成都卜囘首花驄向北平春日送趙均甫敬甫二文學一之北庠一之南雍秋試并寄懷大學士汝邁先生畫船簫鼓發江潯猶為離鴻一抱琴彩日燕呉雙鳯下青雲南北二龍吟輝皇棣萼聨高闕爛漫荆花簇上林何事中朝論閥閲萬方翹首祝商霖題陳玉叔天尺樓宸章爛漫燭奎躔呼吸真看帝座懸閥閱九朝韋曲後聲華三世杜陵前風雲仲舉方高步湖海元龍漫獨眠翹首珮環紅日近好開東閣待如椽李允達過訪賦贈十年塵迹愧疎慵一刺何來倒屣逢文彩乍斑難隠豹髩毛垂白為屠龍尊前片語江河盡筆底千秋海岱從何限朝真諸洞色暮天凝望白雲重早春汪司馬伯玉抵嚴陵以手札見招先此奉柬期司馬過小園時仲淹同至踏盡名山興未迴一笻春首問崔嵬東華紫氣真人駐西竺青蓮大士來絶壑魚龍迎繫纜中天鸞隺候登臺千門雪色澄江上咫尺能無過草萊雪中寄司馬汪公洎方山人劉文學千峰寒色坐霏霏極目瑶華倚石扉八座蹔囘司馬駕孤亭遥問釣魚磯同雲匝地江華暝宻雪連空海樹微莫道剡溪仍返棹子猷狂興正橫飛汪司馬偕龍博士登嚴陵賦雪寄訊蕭森寒色照菰蘆縹緲青山入畫圖不為文星移海甸能令春色遍江湖千花桐瀨飛瑶瑟萬樹蘭陵照玉壺況是郢中才子集賦成題寄茂園無同徐茂呉集唐惟良蘭隂館蘭隂攜手白雲平湖海重追舊日盟魏典乍傳中論在楚詞曽賦大言成用唐勒事千崖薜荔誰同往五畝蓬蒿任獨行莫負習家池上燕爛燒銀燭照山城王長公二郎君同補邑庠寄賀六朝門第盛瑯琊五葉儒紳冠海涯片玉蚤曽誇郄氏三珠仍見屬王家雌雄出匣俱生霧伯仲當尊並瀉霞屈指天閑掄上駟大蒐龍種向流沙伯仲句用三雅事梁持伯内史過谿上夜談燕市舊遊感而有贈握手無言意已消江干晴色此停橈千年紫閣幽期在萬里青門别夢遥掩逕有心酬鹿豕巢林何事擬鷦鷯塵埃漫憶東華日濁酒長歌劍影揺寄喻邦相二首時擢觀察山東輝皇除目下蓬萊繡斧麟符擁上材攬轡東方千騎合口褰帷南國片鴻來摳趨日月宣尼廟叱咤風雲管仲臺莫道臨淄能久住太微寒色正崔嵬雙飛龍劍出天涯燁燁寒光射彩霞碧海樓臺環碣石青山城郭抱瑯琊齊都按節民風變魯壁探書世代遐底事徂徠看日上扶桑晴旭正當衙張幼于悼亡作十載青閨戒婦儀一朝環珮赴瑶池傷心孔雀孤鳴夜照影文禽獨立時霜薄騎曹愁裏髩月殘京兆畫時眉自從巫峽雲歸後不向人間怨别離壽王轉運八秩二首代長公作轉運元美從子也紫綬金章照暮天斑衣玉樹間華筵八旬正值飛熊候九折能忘駐馬年屫躡仙風陽羡頂船邀明月洞庭前東山咫尺過從易嵗嵗看花共阿𤣥南北驅馳髩未皤一身鹽鐵寄婆娑烏衣坐處官仍達黃綬歸來客競過桃葉興將中令逺竹林年較仲容多明朝倘赴安期約雙舄同凌大海波易計部過訪賦贈輝皇鹵簿到蘭舟認是栽花舊易侯岸幘已更新氣象彈冠猶問昔交游攜來梁父中天日望入江郎大海流美酒頓澆愁頓釋不知行李駐山郵答李允達秀才四首風霜遥墜筆如椽有客論文自綺年八咏漫愁人代隔千秋重覩帝京傳來詩及隠侯八咏賔王帝京諸篇事乾坤寂寞華陽社雨雪蹉跎瀫水船莫訝中郎貪割炙于今國士定誰憐濁酒蘭陵悵望頻如澠今覩代興人居然鵬賦追仙客誰解麟經作素臣允逹業春秋雷雨延津誇合劍星河嚴瀨照垂綸無論白首侯芭業八翼看君近紫宸青眼橫承百尺樓尊前何物慰離愁丹山月老寒棲鳯白石雲荒夜飯牛屬國才名猶奉使輕車勲業漫封侯期君對挾飛鯨去小作人間汗漫游消渴頻年寄茂園何人詞賦競中原花生曼倩三千牘草就䝉莊十萬言梁父雲霞期望日崑崙星斗待窮源蟭螟一室猶堪共莫使清風隔晤言史記稱莊周著書十萬餘言壽王司寇元美六秩四首長公之初度也實前丙戌之嵗今甲子一周矣𡨕靈大椿以五百八千為春秋區區人間世駒隙眇不足論矧長公身居赤城名首仙籍即𡨕靈大椿亦小年耳而何有于一甲子耶第遐齡億算此實兆基詎容無祝以虚大慶輒賦四律代頌嘉辰海内蒼生當同此願云爾玉珮曽聞下帝都金丹此日兆懸弧千秋事業周司寇六秩行藏衛大夫伯仲塤箎麟是友孫枝蘭桂鳯為雛呉門乍夜麻姑到仙釀何妨醉百觚紅顔紆玉上彤墀秇苑縱橫大將旗萬古文章尊泰岱三朝名譽葢華夷靈光突兀雲霞擁兠率髙寒日月遲七十二峯元宅畔從教鸞隺醉中騎安車迢逓出楓宸側席明光問老臣獨步詩名齊大雅髙懸文價重先秦追隨隺馭三天客出入龍門四海人漫詫蓬萊雲色裏西園臺殿盡金銀曽從彌勒問三禪更逐方平煉九還寄迹乾坤中土外飛身雲霧大羅前桑弧想像庚寅日花甲週迴乙酉年莫笑騎羊人老去摳衣常侍玉華筵送王次公入賀萬壽屐底山川遍七閩仍將金鏡入楓宸三為大國掄文吏兩作中朝獻壽臣拄笏露華流紫殿稱觴霞色動青旻為知燕錫承明後首問華陽擊筑人祝山人將過白岳訪汪司馬即席賦并寄汪公四海蒼生卜謝安誰同司馬話登壇新安水似龍門出白岳山將泰岱看明月乍淹蘿徑曉西風遥灑薜衣寒亦知幸舍堪彈鋏曽否中林問鶡冠沈明府二親貤封寄賀八咏當年詫妙才鳴琴南國暫徘徊循良政績飛三殿撫字聲名動兩臺單父雲當公廨入河陽春傍訟庭迴危樓百尺東陽近肯握如椽到草萊新正懷喻邦相方余過雲間恍忽不及往晤擬至都下握手復以病歸漫此奉寄孰是攜書問帝都聊同捧檄向江湖愁多總入三秋髩病久那遵百折途赤日虹光龍劒杳青霄雲色鳯城孤春風逺憶朝元客滿錫黃金醉玉壺清源訪蘇别駕以修邀同蔡景明夜集扶疎雙樹似禪堂緑酒銀瓶喚客嘗麗藻世傳蘇屬國高名人識蔡中郎三峨雲霧揮毫落九曲溪山入話長已􅍆平原留十日漫將離色賦河梁同蔡觀察蘇别駕集張文學園亭分賦䦨干百尺暮雲流八面疎櫺瞰斗牛彩筆詞人紛入坐青衫遊子獨登樓無論河朔千秋勝已過平原十日留一笑驪駒魂自斷不堪明夜木蘭舟應麟自髫丱即辱大司空朱公賞識兹公將南歸不勝戀戀謹再賦七言二章刋木當年夏后才乞歸優詔下蓬萊黃河萬里崑崙靜紫氣雙帆碣石來北海琴尊初寄傲東山杖屨蹔徘徊莫言五老雲松近斗色崢嶸照上台十載謳歌扈聖君三朝出入冠人羣華夷並切姬公望河洛長思大禹勤賜履燕臺晨動色懸車廬岳暮生雲猶憐越客干將在拂拭寒光射斗文同趙明府郭鴻臚遊洞岩山石壁高盤澗道分夕陽鐘磬坐來聞雲堆絶壑嘘龍氣霧擁危峰下鹿羣曳杖乍招叢桂侣吹笙遥問大茅君移家咫尺堪忘世那得鐘山更勒文大司馬張公秋日過訪溪上余時留武林不值抵舍後再往謁謝二首熊車遥度越王臺駿骨仍慙漢殿迴廿載登龍頻入夢當時題鳯亦憐才三峨雲氣飄蘿薜五岳風期動草萊翹首未央天咫尺秪今東閣定誰開交游七子氣凌雲出入三朝帝眷勤文武並傳周吉甫詩書長誦郤中軍風高秦望雙旌入潮落錢塘萬弩聞突兀南樓秋色裏胡床能許坐宵分送戚都督之嶺南二首大府新移鎮粤臺辭天白馬下蓬萊三邊帳幕霜華淨五嶺櫜鞬雪色來説劎荆高多俠士抽毫袁伏是竒材征南漢將曽飛檄寧似元戎出手裁絶徼重飛上將星揚旌伐鼔度滄溟長驅吏士過南粤逺播聲威到北庭杕杜含杯千堠肅梅花吹笛亂山青羅浮銅柱燕然石萬古何人並勒銘秋日湖上奉訪汪司馬伯玉時仲淹仲嘉同至十載龍門夢寐長披襟何意共錢塘軒車驟擁西湖畔劍珮遥占北斗傍業就千秋陵左馬家攜二仲勝求羊漫誇四百臨安寺遍勒新題向草堂湖上逢王承父溪上秋風罷舉盃湖頭白眼重登臺乘槎汝自崑崙至躡履余仍少室迴三尺劍花凌宇宙十年囊草秘風雷惟應爛醉烏程下盡解鸘裘付緑醅送唐别駕之䖍州蕪城初别鳯凰簫水國重過駟馬橋共惜士元居小郡何如長孺在中朝千林大庾含芳近萬蕋唐昌入夢遥便覺佩刀干氣象驛亭風雨夜來饒送大司馬張公還朝四首赤羽初銷萬竈烟朱旌重閃入朝年鯨鯢觀築三呉外虎豹關清百越前西北風雲馳劍履東南日月䕶樓船莫誇定逺封時事一代殊勲太史傳中天名岳降崔嵬望裏三娥雪色開父老競傳司馬諭君王遥借卧龍才長城乍起當周甸大海初澄傍越臺縱是抽毫難和客幕中猶許孟堅來氛祲天南逼大荒獨持雙斧到錢塘三年幕府蟠蛟蜃一夜轅門縛虎狼淮蔡櫜鞬爭伏謁朔方旗幟盡飛揚賔僚漫擬從軍樂手定鐃歌十八章大纛生風入帝城雙龍遥夜雪花鳴餘皇十萬清呉塞練組三千肅漢營淝水蒼生偏聽捷潢池赤子競輸誠何人第一麒麟上彩筆詞埸更主盟王山人世周以長歌及七言二律見貽賦答二首旅食經秋傍越臺王郎瓢笠為誰來平收南國雙金價自老崑岡片玉才俠氣爾仍摽海岳詩名吾亦困塵埃尋仙倘覓金華洞雙跨虬龍出草萊王崑山人客館逢君思欲狂呉山握手望錢塘寒光驟吐青萍匣秋色先凋白苧裳老去雲霞忘世態窮來天地問詞場漫將七子推同調不盡雄心驥櫪傍中秋夜司馬汪公招同呉越諸名士湖上玩月得秋字縹緲晴烟一望收樓船明月大堤頭芙蓉花發重湖夜桂樹香飄萬壑秋彩筆乾坤誰大雅青衫呉越盡名流何當醉逐羣公去十二瑶臺次第遊十六夜喻别駕邀同汪公重集俞園得池字滿坐青山照習池上公攜客共含巵中天月色重圓夜大海潮痕乍落時杖擲廣寒銀闕近盃傾河漢玉輪遲當筵觸目俱名勝爛醉高陽白接䍦是夕邦相以公事先行余同司馬移舟六橋布席堤上澄湖月色萬頃如晝簫管間作諸君劇懽丙夜迺返十里長橋跨水涯狂呼明月醉流霞平湖影落虹千丈逺岫光飛雪萬家映席楓杉俱錦樹迴船葭菼半瑶華洞庭秋色饒相似莫把雲門異代誇陳觀察留飲賦贈豪氣曽聞百尺樓重看下榻自南州雙懸斧鉞名山色獨坐樓船大海流絶頂雲霞藏雁宕中天雷電挂龍湫探竒不淺王郎興瓢笠能容次第遊少室山房集巻五十七
