body:
  text: 少室山房集卷五十一明胡應麟撰七言律詩八十三首余君房招同劉子𤣥胡孟韜盛太父李季宣夜集言别攜取靈光下玉墀敝裘無賴出關時那堪水部梅花燕却訂王孫桂樹期青瑣珮環紅日近翠微車馬白雲遲惟應入夢君房筆永夜同過越水湄將出都丁元父過訪數四且貽詩餞别意甚惓切賦此奉酬片語都門醉濁醪黃金臺上共持螯毫端並吐千秋色筑畔誰當一世豪紫陌天回中祕逺青山雲淨少微髙花期首探驪龍窟肻著東方賜後袍南歸留别胡孟韜區用孺李季宣王冏伯王永叔黃季主馮咸父金伯韶八子陌上東風御栁黃胡姬相對一傳觴空傳八駿來燕市未許雙蛾擅洛陽握手虹霓猶意氣關心岐路獨文章提攜競著南征賦萬叠春山萬里航贈莫廷韓時名籍籍尚風塵索米長安嵗未貧囊草欲飛三殿色墨花長灑萬家春茶烹陽羡過名士酒釀臨卭醉玉人莫怪相逢談太劇洛中詞客舊為荀送陳玉叔大參之蜀握手華陽别思濃驪駒一曲暫相從雄風七澤登臺近積雪三峨問寺重上客題詩留錦里佳人攜手醉臨卭亦知蜀道行偏易惆悵河橋落暮鐘同諸子集吳山人叔嘉館二首一星隨客住長安折柬能開大將壇自許含毫新賦就誰論擊筑舊盟寒千門北極雲中出萬寺西山雪裡看落落乾坤公等在春明吾豈恨彈冠春光何地不徘徊緑酒銀燈别墅開絲竹東南傳勝事冠裳西北盛詞才吟呼片月甘泉下坐引羣星太液來拚取深杯酬令節莫教行屐破蒼苔湯義少過訪賦贈看花吾汝又蓬萊彩筆翩翩氣不回二酉再誇藏穴富五丁重起伐山才輝騰白璧過秦殿色借黃金上薊臺蚤晚河東題賦就春明門外共徘徊懷吳大參使車何處倚星躔回首錢唐握别年海國蒹葭停鼓吹江城粳稻滿樓船千倉轉運飛京邑十郡催科息市㕓極目後堂絲管在獨慙經術老彭宣聞張助甫擢寧夏中丞喜而有作四首燦爛除書出帝京詞壇飛將舊知名三河擁傳過秦塞六郡吹笳入漢營露布夜馳平樂館風旗朝獵受降城不須更問祈連道谷蠡昆邪到處迎金甲光搖獬豸冠玉門西度舊長安黃河曲抱中丞府絶漠孤懸上將壇鏑控流星摧冒頓旗搴大雪定呼韓千烽夜靜天如水一曲梅花上賀蘭用桓伊事匣底霞飛玉轆轤壇前月出繡蝥弧中郎再問西凉俗助父舊任甘州博望先開大夏途令出材官齊候馬吟成詞客競呼盧亦知記室多袁伏能奏儂家出塞無草載登壇識蒯緱欣傳持節到凉州風髙漢壁初行塞月滿胡床獨上樓驃騎三千呈角抵蛾眉二八奏箜篌青油豈少觀碁興目斷關山是隴頭集劉金吾子大第作耀馬春光上苑來華堂絲竹玳筵開含杯四海俱同調授簡千秋各異才縹眇長虹懸帝闕熒煌太白動仙臺共誇此夕金吾宴肻信花前玉漏催同黃季主金伯韶兩生過伯符宅時傅明府先在坐殘雪初回萬井春一尊官舍暮留賔抽毫太液多名士擊筑長安盡酒人慘淡驥心逢處老飛揚龍劒合來神盤中苜蓿猶堪飽莫放仙鳬去紫宸是夕明府先行送盛山人泰父奉母南歸風色蕭蕭散酒徒一蓑隨處占菰蘆將親南下非潘嶽逐子東還是大姑殘月夜投瓜步逺斷霞朝擁石城孤飛流百尺蘭陰下倘覓𤣥真舊釣艫天津訪趙夢白邀同林登卿夜集並遲陶别駕不至玳瑁筵開集彩毫侍臣相對此持螯雙星碣石盟初聚十日平原氣並豪畫省白雲三輔色牙檣明月九江濤論心是處堪長夜悵望王祥隔珮刀夢白業留余為三日飲余迫歸解維辱遣人追送百里并出槖裝為贈賦謝此章追歡能復少年場意氣偏君重太行脫劒青天明海岱抽毫白日動河梁窮途欲慣虞卿屫絶塞翻疑陸賈裝歸去故園蓬鬢在下機寧似出咸陽暮登太白樓望岱宗題闌干十二挂城頭百尺飛甍暮靄收醉客千秋曽上坐詞人萬里一登樓天門月並長庚出日觀雲吞大海流屈指蟠桃歸曼倩騎鯨八極問離愁再過婁江訪二王先生二首百里婁江路未遐丹砂重問葛洪家飛花似識尋源棹古木如停上漢槎織女機頭長日月秦人洞裡遍雲霞相逢莫話河東賦一出春明鬢已華拂曙吳門一棹開尋真何啻入蓬萊蒼虬欲傍遙天下黃鵠仍看大海來玉樹雙莖懸帝坐瓊花萬里落仙臺亦知樵斧千齡易敢道平原十日回長公偶以小恙為余強起卧榻間隱几對談閲二晨夕迫歸告别意殊戀戀再賦此落日長松半榻懸科頭相對欲忘眠無勞香積千人供默㑹維摩萬古禪跨鶴共觀滄海上驅雞遙赴白雲前由來肺病文園事贏得清虛是大還舟泊檇李沈純父邀同陳茂才登烟雨樓泠然清興逐菰蒲萬頃玻璃浸畫圖水泛瀛州環叠島山懸方丈插平湖傳聲簫管時聞越倒影樓臺盡入吳昏黑更須臨絶頂蚤知能賦屬吾徒寄趙夢白計部秋夜夢與夢白論文久之因寄落月梁間夢寐懸風神猶憶對床年官仍大隱金門後帝問長庚玉座前白馬看花孤閣霧黃龍飛粟萬家烟他時倘躡虞卿屫醉舞平原十日筵佩玉初辭漢苑春鳴榔十月下天津由來辨馬無先達誰道騎鯨不後身雙闕雲霞髙隱吏五湖天地獨歸人江東渭北論文夜愁絶邯鄲夢未真寄余君房中朝詞賦舊名家握手都亭興未遐北極衣冠頻視草西陵環珮日看花聽雞長樂千門月立馬新豐萬樹霞却望四明雲霧裡少微星色傍誰賒過崇德訪朱可大留飲呂明府園亭二首握手天涯話舉杯河陽花色照徘徊當年擊筑豪燕市此夜鳴琴坐越臺龍劒千秋牛斗合羊裘萬里雪風回雙鳬莫問王喬舄爛漫恩光漢闕來寒雲一徑入烟蘿斗酒相逢意若何捧日乍看威鳳舉垂天誰問大鵬過千門樹色深桃李十里花香散芰荷經國文章吾汝在肻緣華髮嘆蹉跎送趙太史之留都錦纜錢塘霽色開題詩先寄鳳凰臺投簪未許文園渴前席仍看漢殿回瓜步月明滄海近石城雲起大江來青藜豈獨仙曹借咫尺寒光到上台同喻邦相别駕話舊作髙秋帆挂大江東屈指清尊碣石同一去鴻書迷逺近重來龍劒合雌雄錢塘雪捲千家白石屋霞生萬岫紅何限勝逰天竺頂與君攜屐待秋風重來河朔問風流握手天涯各倦逰匹馬乍堪題柱返雙鳬曽是佩刀留平分水月眠官舍獨占湖山坐郡樓簫鼓畫船君但飲至今人羡白杭州楊思悅茂才招同沈侍御金觀察李山人集湖上得長字蔭竹穿蘿一徑長誰専别墅在錢塘尊攜北海千秋色座納西湖萬頃凉上客風流元賈馬中林詞藻盡求羊棲遲十載談𤣥意白髮雲天卧草堂子念承父過訪同集喻邦相署中斗酒山城薄暮開蘭陰攜手一登臺白雲漢殿鳬雙下紫氣吳天鶴並來席上雄心時慘淡尊前狂態各徘徊桃花滿路看明發遮莫青藜洞口回承父將逰天台顧觀察維舟瀫水招集斧鉞輝煌漢使才曽同作賦上燕臺昆明萬里浮槎到瀫水千山列座回潮起魚龍窺鼓瑟月明烏鵲傍含杯瓊筵不是征西興肻許名流達曙陪夏日郭方伯沈侍御李祠部金大參招集祐聖道館四首其二補六卷尾駿骨燕臺事有無看花重入舊𤣥都談詩客豈唐供奉作賦人俱漢大夫筑畔虹飛滄海近毫端霞起赤城孤何須逺締平原約到處黃公是酒壚玉殿瓊樓坐太清追隨仙侶到蓬瀛天垂越國星文聚地擁吳山雪色明嘯傲琴尊仍北海招攜環珮盡西京狂歌不信雙龍合匣底芙蓉夜夜鳴飄零華髮塞門回結社錢塘闢草萊江左才情饒陸謝梁園賔客擅鄒枚含杯象緯中天出握麈虹霓大澤來好為湖山留勝事抽毫同上越王臺贈顧不疑山人癡絶曽聞顧虎頭諸孫文苑尚琳球書飛白鴿霞光動劒舞蒼龍雪色流獨訪秦封過泰岱遙探禹碣上岣嶁𤣥亭寂寞歸來事乍許侯芭一校讐答卓澄父相逢裘馬自飛揚握手湖山興欲狂俠比王孫居蜀郡人如宋玉在髙唐澄父美風儀而一姓宋千金再散名逾重百石才沾意已忘不爽芙蓉凉夜約月明簫管到橫塘小飲楊思悅館裘馬飄零漢殿回為君重上越王臺草年蘿薜𤣥亭老一畝篔簹白社開共醉不妨中聖酒先登誰是大夫才揚雲世業猶堪守莫羡平津到上台題齊中五嶽圖有序余髫丱即有五嶽之懷頃嵗疾病糾纏尚平之興鬱焉莫遂因築室曰臥逰而繪五嶽壁間每撫琴動操則衆山泠泠響答岩谷几席之上白雲蓊然而生不知此身匏繫于塵世也爰各綴七言一章俾同余所好者歌之絶嶠橫空礙斗牛孤松百尺挂蒼虬中峰萬仞雲霞合巨壑千盤霧雨流玉節恍疑青帝下金泥誰侍素王逰飛龍為訂扶桑約獨探紅輪大海頭右岱玉殿瑶臺跨紫氛雲璈霞色半空聞龍遊尚憶重華駕鳥迹長留大禹文翠岫隂森巫峽雨蒼崖明滅洞庭雲誰同躡屫尋仙去天柱南頭喚鶴羣右衡杖底明霞照玉杯黃河清洛互縈回乾坤四望鴻荒盡日月中懸混沌開大雪恍留初祖卧飛雲如扈上元來三花爛漫吾將去為憶當年絶頂栽右嵩峭壁崚嶒霧雨愁明霞天畔削瓊樓金仙示跡猶存掌玉女含顰未洗頭大壑風生羣虎過飛崖雲滑斷猿愁何當盡掬黃河水濯足蓮峰話壯逰右華絳宇琳宫跨絶顛大荒亭堠正蒼然懸崕盡壓秦城外峭峽平分漢壁前雷電九霄摧裂石虹霓百道挂飛泉狂來欲趂摶鵬翼倚杖徐看北斗懸右恆蘇君禹觀察過訪奉贈四首魯國諸生望後塵爭傳環佩上星辰那知紫極攀龍客來訪青山抱犢人日射蓬萊雙闕曉霞蒸桃李萬家春長裾不厭他年曳自棹孤航向七閩大纛頻年别武夷髙牙仍為白雲遲乾坤驟向論交合日月旋從握手移一代文章明主問三朝蹤迹世人疑狂來漸作襄陽態髙唱銅鞮岸接䍦翛然一曲住岩阿十畝橫塘半芰荷隙地祗容凡鳥占垂天曽是大鵬過傷心萬事歸𤣥草把臂千秋在緑蘿東望扶桑豪興發欲飛椽筆鬬銀河賦日初從漢殿回談天重上越王臺雌雄乍合雙龍氣牝牡那分八駿材曳杖虹霓東海出披襟雲霧北辰來亦知傾蓋元如故可道浮蹤隔草萊送司馬蕭公入都奏凱千官夾道迎欣傳司馬入承明嚴兵立偃三千甲謁帝初回十二營丞相經綸懸玉壘老臣方略擅金城丹青細數凌烟上橫槊誰兼大雅名徐茂吳過訪賦贈十載形容夢寐看江天雪色對盤桓貧如厭次長為客渴比臨卭自罷官日湧虹霓雙劒聚天垂星斗一枰寒春風爛漫湖頭約萬樹桃花覓翠巒王司寇還自金陵寄訊四首百辟衣冠餞道傍琅琊雲色倚徜徉千秋職位符司寇一代文章擅子長乘興已回婁水棹遂初聊記弇山堂鱸魚正熟金閶外斜日秋風盡意嘗長公先任南司馬繼以司寇歸故頷聮云云日夜丹青問草萊老臣銜命一徘徊三天澤降龍仍臥八極祥呈鳳已回劒佩諸真朝絳闕笙鏞羣帝集瑶臺從知六翮扶搖上倘許初平叱馭陪長干一葦破江烟瓜步千花照别筵祖席衣冠髙座寺歸裝環珮大羅天白牛馴擾金田下𤣥鶴翺翔玉洞前極目五城樓十二不知何路向梯仙咫尺行藏見大機婁閶晴色正熹微千身水月尋常現八翼雲天自在飛核種西池桃已熟苗長東海蕨初肥太湖萬頃家林外為報君王已拂衣天恩敕賜為楊明府題三策當年動草萊鳴琴百里暫徘徊園開五栁雙鳬駐户植三槐駟馬來慘淡髙風神武闕熒煌新命建章臺承家宓子飛揚甚屈指龍光到上台答陳司理汝立誰人得似陳公子散帙髙齊坐晚衙白馬風流初佐郡金門詞賦舊承家雲霞明滅看天姥島嶼縈回泛若耶若問胡郎婚嫁事赤松原上近移家贈楊明府楊為中丞滕公內弟十載通家問草𤣥龍門愁望大江懸棲遲廷尉辭賔日藉甚仙郎作令年越渚蘋香回岸幘吳城花色照鳴絃由來百里非賢路屈指雙鳬帝座前喻邦相將還括蒼寄此咫尺飛鴻墮草堂盈盈秋色限河梁神交不道千峰隔病卧翻憎一水長玉樹遏雲天縹眇金莖承露月微茫西風未下觀濤興七發行傳大海傍時以病留郡城得善洞簫者月夜聽之遂漸有起色云朱在明過訪作草載重逢各鬢皤追歡寧問夜如何華陽社逐浮雲散瀫水船將片月過竹徑談棋雙鶴下蘿軒明燭亂蛩多那辭醉作他鄉客百斛蘭陵任嘯歌寄問喻邦相病時中秋前二日咫尺牙旗越水頭招尋猶滯木蘭舟羊裘萬里歸風雪龍劒三旬隔斗牛沈約病餘偏瘦損虞卿書就任窮愁生憎後夜雙溪月獨照胡床八詠樓陳玉叔書來賦答驚人曽覩孟公狂作吏咸推仲舉良劒合飛龍延浦外書傳回雁洞庭傍薇垣夜醉三千客荔圃晴深十八娘莫詫宦遊専勝絶將因題賦入長楊吳文仲與余訂約淨慈昭慶間届期往晤則文仲尚未至也余迫歸不能待意甚悵悵走筆寄吳春風晨駕木蘭橈十里平湖正落潮萬壑霞光靈隱近千峰晴色淨慈遙參差玉珮縈朱陌錯落金鈿照畫橋惆悵美人期未得一笻何處問岧嶤舟中寄别祝文學鳴臯薊門秋色近何如憶汝倉皇賦索居千里寒風晨挂席萬山殘雪暮驅車形容漸老歸時鬢意氣偏懸别後書為報武陵花滿目青鞋吾欲伴樵漁過晉陵哭陳生稚冲握手京華意氣投風塵馳驟兩驊騮人間未識青藜杖雲際先歸白玉樓溟海煙濤橫赤鯉亂山寒霧擁蒼虬吞聲欲挂留徐劒蔓草何因識故丘寄姚安楊使君匹馬天南客夢孤一麾迢遞問蒼梧魚龍夜度昆明水虎豹朝行貴竺途草檄共看司馬後題詩曽吊謫仙無燕山越嶠空回首愁絶都門舊酒徒舟過吳門奉懷王太僕元美祠部敬美兩先生時俱在燕中玉樹雙瞻漢苑才分曹清切侍蓬萊何年海嶽鍾元氣幾夜星辰接上台草夢春生鴻雁渚花香晴憶鳳凰臺遙憐作賦登髙處萬里浮雲大漠開聫珮翩翩碣石宫陸家兄弟總稱雄雲霄忽訝雙龍合朔塞平看萬馬空東觀圖書霞色裡西園車蓋月明中塵蹤十載虛相憶寂寞孤舟自轉蓬夜同俞蔡二子集楊茂才館一尊岐路暫追扳詞客相逢鬢已斑海內詩名誰白雪人間愁色共青山浮雲西北孤帆逈明月東南萬壘閒道是子雲幽興在不妨頻夜扣𤣥關寄燕中友人六首有序諸子皆燕市舊交自余南還音問疏逖離索之懷日形夢寐爰詩寄焉誰向風塵問謫仙相逢賀監自飄然青春畫省追逰地白首金門侍從年栁色乍分燕塞底梅花長憶嶺雲前佳期慘淡瓊瑶隔愁對孤城落日懸右嶺南黎惟敬江左曽聞第一流攜書京洛幾同逰風塵杜甫三秋鬢湖海元龍百尺樓染翰白雲飄薊野看山明月冷吳鈎狂歌寂寞當年事何處逢人賦四愁右吳門周公瑕慷慨京華憶舊蹤交逰南楚得元龍新豐市裡三春酒長樂宫前萬户鐘野客心情懸薜荔故人肝膽托芙蓉長安極目征鴻阻愁向衡陽第一峰右麻城丘汝謙長嘯秋風問解攜黃金臺上幾扳躋霜飄鼓角中原靜霧捲旌旗太白低伴直每趨三殿曉看花時出五陵西相思共拂張華劒莫使寒光暗鸊鵜右秣陵李惟寅天末寒風起暮秋碧雲翹首倍添愁都門俠客空彈劒日下歸人已倦遊十里鶯花桃葉渡半帆烟雨木蘭舟攜家早赴青山約寥落羊何阻唱酬右永嘉康裕卿把袂都亭木葉稀陽關一曲轉依依天邊劒拂長虹斷海上帆侵暮雪飛蘭杜欲紉湘女珮芰荷新製楚人衣相思何處偏惆悵獨夜寒空望少微右濠梁朱汝修送謝中丞入都劒履輝煌入漢關蒼生遙指謝公還千營夜發鯨鯢靜萬㦸晴開虎豹閒紫電朱旗分野色赤霄華衮近天顔承明幾度看花暇飛夢猶過海上山不佞𨽻博士籍五載餘逈逰京師不為當道所知今歸業且謝去乃辱督學滕公物色風塵擢之異等而且脫略師生罔間形迹青襟之遇近代所無感德酬知輒復賦謝二首落魄風塵幾嵗年凌雲豪氣自翩翩持竿欲挂珊瑚樹挾瑟重登玳瑁筵吏部聲華唐闕裡長卿詞藻茂陵前無論國士今難遇萬古夷門白日懸極目孤雲大海平夕陽千里共含情關前一雁凌秋起匣底雙龍繞夜鳴中散形骸元傲世婕妤容色豈傾城酬恩亦是書生事愁絶江淹賦未成寄李環衛惟寅時鄉人以惟寅燕中書至十載長安道路分傳書重覩信陵君千行淚盡吳天雪一字神飛越海雲夜帳梅花孤鶴逺秋齊梧葉片鴻聞狼煙淨掃居胥外好乞班生石上文黎惟敬得告還南海過余草堂話舊信宿别去著繡看君海上逰白雲攜手問丹丘中郎舊業藏金馬內史新書滿玉樓山水十年桃竹杖關河千里木蘭舟題詩莫向羅浮頂片片梅花引客愁春日韓使君過訪韓名邦憲亦曩燕中社人十二樓臺擁帝京一時才子最關情分符已奏淮陽績授簡仍追鄴下盟袖拂驪珠江月逺光生龍劒海雲平狂逰轉憶當年態萬井烟花宿鳳城同諸友分賦臨安十景二首萬松嶺峭壁層崕萬仞開離離松色隱崔嵬雲排鐵幹蒼龍舞月滿瑶枝白鶴來幾夜秋濤翻客枕半林寒影挂仙臺虛疑日觀烟霞古寂寞秦封半草萊玉蓮亭瀲灧晴光一鏡寬漢宫羅綺畫中看風搖翠蓋凌波出霧洗紅粧映日寒太液池邊香自繞若耶溪上采應殘莫教腸斷金陵客載酒重過白玉欄少室山房集卷五十一
