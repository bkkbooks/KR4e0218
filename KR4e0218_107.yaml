body:
  text: 少室山房集卷一百七明胡應麟撰題跋十二首遺墨上跋王大令送梨帖右大令送梨帖云今送梨三百顆晚雪殊不能佳凡十二字五字紙素破蝕筆踪大半不存無恙者七字而已庚辰夏王次公以計吏入燕竣役瀕發賈人持是卷索十萬錢顧囊空直無所出偶朝士寄贈所知金五十在焉輒罄舉償之一時盛傳為竒絶事信次公之癖于書也晉自典午渡江距今不啻千載二王真蹟流落人間如天球河圖舉世不能三四此帖雖漶滅不全而筆勢之瀠洄縹眇飛動于薄蹄之上即寥寥數字如目擊其超逸絶羣之氣致足觀也或猶以五字殘缺為憾余戲謂今世購定武蘭亭者必五字損本為真送梨亦五字不全異時將復為書家公案得非山隂父子翰墨間例有斯厄耶同閲是卷者是日聞余言皆失笑噴飯滿案次公亦捧腹而起再跋永師書一字五萬錢即今中金五十也然則大令身後一帖僅足當永師存日一字耳而次公是舉世便詫為異聞即此徵古人好事倍于今今嗜利百于古矣乃次公方以書名天下寸楮片箑舉世共珍傳諸異代知不有以五萬錢易其一帖者耶跋鍾元常季直表王長公義聲振一世其豁達大度詞場中漢髙帝也其氣宇籠罩今古故製作亦如之為大厦庇天下士殆三十年又園林水石之盛為一時冠故世莫不以其富侔于三吳巨室而實弗然也丙戌秋余嘗偕汪司馬過弇中玩諸古帖司馬乞鍾太傅季直表觀之長公默然良久曰是月以催科不辦持質諸檇李項氏矣余舟回詣項氏假其所藏彜鼎及遺墨遍閲則此帖儼然在云於戲即此一事而長公之為德于當時寒士者其難易可知矣題蕭翼賺蘭亭圖世以蕭翼誘取蘭亭事誣不可信其說以文皇威加九域一尫殘老僧敢固匿之非也人主之威固有不能勝匹夫者文皇于蘭亭誠弗欲必得則已欲必得而弗緩圖之而徒脅以威彼潜藏伏匿為計甚深極而恨且投諸水火人主之威不過殺其身而已如藺相如懷中璧嬴昭王耽耽虎視在秦廷而莫能奪之而况于兵燹亂離之後若存若亡之一帖耶且一夫之癖愛亦有甚于人主寧殺其身而以毋失所寶為快者此其勢視人主之物為尤難即明知其處而匪威脅之可得而文皇于蘭亭又其意所欲必得欲必得則所以詳為之慮而緩為之圖將亡所弗至而何有于發一使以欺之然則蕭翼之謀雖曰文皇與知焉可也又跋當貞觀末年文皇之大漸也語太子治曰吾從汝乞一物為殉可乎叩之則蘭亭也夫太宗誠欲殉蘭亭遺令顧命大臣昭示百辟即嗣君弗欲惡得而違况萬萬無此理而文皇直巽詞宛轉于彌留之際豈其智顧弗知出此哉嗚呼彼其以誠動其子即其以詐使其臣之道同一癖愛而必欲得之心故勢所得行而有弗用也嗟乎俾太宗執是心為天下雖堯舜之治有弗成于貞觀耶而徒使後世以一帖窺之惜也跋褚河南哀冊文褚河南哀冊文真蹟藏王司寇元美伯仲俱有跋次公行草得法此帖為多卷後宋米元暉元陳寧極二跋此書老筆縱橫而姿態逸發絶得典午風流唐人書可裝二王屏腳者無踰此武家子舍之而取枯樹賦何耶又跋二則方希直遜志齊集亦有此帖跋知是書國初嘗入越矣希直跋不見此卷中兩王公論復不及蓋革除際人諱其文因毁裂俾泯其迹耶方所跋論河南及顔栁書法髙下最為精識又其集評書甚衆且夙游宋氏父子間必深于此道而今隻字無復存者當亦坐革除故若其精忠大節與河南異世相符合固非人力所能存亡也輒并志之邇弇州續稿出乃知此跋長公亦論及之豈勒石之時偶未考及集耶然則希直手書信亡久矣石勒于長公家跋米顛自薦啓米元章顚事甚衆散見宋人小說雜記無慮數十百條余嘗欲彚輯為一編以資藝林中謔浪是啓亦其一也米又有長箋訂某公閲所藏墨蹟彌可笑憶宋人送米詩落句有名滿天下之稱或疑太過米不足當答曰二十年來何處不知有米顛子耶雖戲言可謂實録因題卷後俾讀斯啓者相向發一大噱云又跋觀老顛此劄乃欲中立蘇黃間亦其戅也余嘗上下史籍得類米者一人曰張融思光其才具類也詩文類也伎倆類也南史稱融衣履言動意制甚多芾每一出小兒羣噪隨之至呼為活卦影融海賦精麗瑰崛芾潮詩閎大沈雄融書謂二王無臣法芾畫謂不使一筆入吳生噫其相類何其酷也融嘗自言大丈夫當刪詩書制禮樂何至碌碌寄人籬下可謂有志芾自負自古及今余不敏實得之乃沾沾不出翰墨間然融集今不傳而芾之筆踪滿世得失大都相等也南齊人目融不可無一不可有二余于米老亦云跋吳德基千文勝國末吾邑吳履德基以書名婺中而宇內無知者由元世臨池特衆故耳今吳書吾邑故家多有之余所見不下百幅而他方絶迹並書家無咳唾其姓名者近文氏停雲館帖元人書甚夥乃德基亦泯泯焉豈徵仲太史尚未及覩吳書耶此卷全録千文缺二六字用筆徑峭遒拔處深入右軍間有一二不甚合作者蘇人摹勒攙用文氏筆耳以吳之臨池工苦爾爾而絶不遇賞音士之埋沒可勝道哉跋周公瑕書朱司空河工叙天韜居士周公瑕髫歲遊文太史門小楷稍變尖纎益以濃厚其用筆法子昻而結搆則徵仲矩矱也嘉隆之際獨步江左垂三十年遇合作處真如陳思洛神賦穠纎得中修短合度淩波微步羅襪生塵者苐驚鴻游龍之態微所短耳兹序乃甲子歲為朱大司空衡撰者朱公創鑿漕渠為慶厯間名臣冠而此書最公瑕平生合作神采奕奕良足相當豈其感恩刻意致然或瓠子功成偶一時有神助耶褉日可大出真蹟縱觀移日題少室山房集卷一百七
