body:
  text: 少室山房集卷十二明胡應麟撰五言古詩四十七首入新都訪汪司馬伯玉八首有序余以癸未之秋識司馬汪公于武林片語定交誼逾傾蓋於時公即訂余把臂黃山白嶽間旋以病冗侵尋匍匐風塵滯淫湯藥奄忽十祀竟爽成言客嵗之春公至嚴陵復申前約期余仲秋入新安行有日矣會聞王長公病亟踉蹡走弇山園一問之後取餘杭陸道入歙而長公晨夕挽留余亦惓惓瀕發復止卧公故所居來玉樓中再閲月長公竟爾傾逝余抵舍則嵗行盡矣今春鄉人至自函中傳公將入吊弇山拉余同發爰特買舟西上謁公太函修社白榆之末因追隨杖履偕過婁江念宇宙間遞主文柄惟公二人而余皆濫叨國士存亡倏異感愴何言孤航逆流中夜不寐撫今追昔成賦八章稍次後先亡論工拙知公讀之感愴有大于不佞也芳時忽不樂悵然思美人美人天都上宫闕何嶙峋手把瑶華草逺寄越江濆念欲往從之弱水不可親愧無晨風翼寤寐懷苦辛軒車何皇皇東下武林驛冠蓋羅長衢嘉賔四面集伊余實駑蹇喟焉傷伏櫪一顧天間空髙座傾四席眷眷忘年交惓惓在兹夕歡言奉尊酒既登君子堂不惜羅衣襦為君充下裳寧辭入宫妬亭亭理紅粧常恐朝露晞歡愛不能長中宵起房室引領情內傷峩峩弇山堂美人在其下脂車婁江涘聊用息余駕燁燁雙飛龍連城詎論價咨嗟良宴會朋舊半凋謝三星爛河漢鈞天在廣厦歡日苦不足愁日苦有餘談笑未及終執手河山如蒹葭阻長道渺邈天一隅殷憂見華髮嵗暮空踟蹰焉得摶風翮送我來枌榆百年迅朝霜奄忽越與楚鬱鬱琅琊墳瞬息已千古河清邈難俟中夜頻起舞歧路安足論暌離熱肺腑明發戒沙棠維梢瀫江浦西上新安江危灘峻浮雲太函何巍巍逈與上界鄰蒼龍守重關鵷雛日為羣美人坐金堂一笑情內親悲來話親故氣結不能陳往事去莫追來歡倘可續金石誠匪堅富貴焉所欲平原十日飲嵗月苦不足旨酒羅髙堂新聲動絲肉令名敝天壤何事傷局促别司馬汪公八首有鳥巢天都自名為鳳凰文章被六翮五色河輝煌飲啄梧桐枝矯翼臨朝陽一鳴舉世驚清音雜琳琅云是王者瑞千仞方髙翔髙翔欲何為浮雲渺天末言欲攬德輝翩翩下閶闔東海有鵷雛孤鳴蔽林樾羽翼苦未長天路逈難涉延頸望霄漢邈若秦與越丈夫重意氣焉論越與秦千里行相求岡陵若雲屯輕舟涉廣漢夾岸垂芳蓀巨石何崔嵬日夜飛流奔天都在咫尺舉頭見龍門龍門造中天片刺亦何有清風惠然來長揖把余手肝膽儼欲披豐庖出旨酒廣樂羅前庭鈞天在戶牖一别已九春相顧驚老醜老醜詎足嗟百年迅飛霞念彼弇山堂緬邈天一涯佳人逝安適相望徒蒹葭悵焉念長别中腸結如麻今我不為樂日月忽已遐行樂當及時百嵗難為期鉛華若流水日夜東南馳夜長日苦短秉燭遊芳池明月出西園衆星何陸離顧視兩天孫冉冉雲中嬉嬉遊亦何常髙談蔚霞爛絲竹羅前庭新聲一何艷娥娥紅粉粧妖姬列如粲登彼幔亭峰酣飲日方晏詰朝泛浮槎遙遙上河漢河漢杳無極仙槎逝難留明發還舊疆何以寫我愁依依丈人行傾蓋為九州天都望威鳳八翼凌空遊誓將振弱羽嵗嵗行相求東陽李茂才允達以古風六章雜詩一卷見投斗酒定交留連浹夕答贈四首首夏維清和朱光何熠爝衆木紛扶疏朝陽翳林薄鳥雀羅前庭飛鳴自相樂伊余懷一丘索居卧層閣誦彼伐木章喟焉傷寂寞寂寞不可居起坐彈鳴琴清風穆然至之子貽好音自言長東郭夙昔懷同衾丈夫重意氣焉論尺與尋飄然命余駕信宿來蘭隂蘭隂屹岧嶤雙溪紆且鬱蓬蒿蔽行徑倒屣為君出中厨呼斗酒申盟指金石願為雙飛龍霄漢長比翼良哉如澠燕生平在今夕今夕復何夕燕婉難具陳三星爛東壁皎月懸髙旻朱絃從風發四坐回陽春但言戒明德努力希良辰千秋樹大業皓首以為鄰寄李惟寅歐禎伯四首迢迢牽牛星乃在河漢旁織女處其東脈脈徒相望鴛鴦失羽翼烏鵲難為梁采采芙蓉花道逺不得將逺道亦何思美人在京洛白日麗中天流雲飄阿閣煌煌五侯宅冠帶日相索寧知甕牖士終嵗長寂寞寂寞寧復陳嗟此明盛年矯矯黃鵠姿孤飛鎩其翰山川鬱以紆道路長苦難顧視雙遊龍嘆息浮雲端浮雲不終朝嵗月忽復易豈伊岩廊慕大業在金石緬懷同心侣沈思無終極安得西飛鴻假我雙羽翼寄邦相四首涼風倏以厲日短夜苦長大火西南流蟋蟀鳴我牀徘徊起中夜攬衣不及裳念彼同懷友投袂忽如傷弱冠京華遊衣冠九衢列鞍馬如浮雲與子獨相狎灼灼桃李花光華自怡悅飛沈一朝異忽若吳與越與子别三載中懷日熬煎豈不念同心悵彼河與山趙璧有時合隋珠有時遷安得晨風翼送我置子前心悲亦何為各願加餐飯子遊青雲途豫守藜藿賤百代同音徽何論異鄉縣黃髮會有期兹盟庶當踐送朱水部可大入都四首蒼龍守阿閣赤驥鳴天間彼美承家子被服都且妍飛飛振六翮遊戲青雲端出入承明廬行者夾道觀朱絃順風揚四坐靡不歡矯矯孤飛鴻明時策髙步亮節難為容浮雲起中路層隂蔽白日圓景忽將暮轉蓬隨長風行行踐霜露驅車大河涘瀍洛莽回互王屋一何髙嶔岑蔽層雲登髙望宛洛車馬如遊塵萬象列毫端抽思戾髙旻仙人王子喬轉盼迹已陳三花滿懷袖寄我忽若新百里詎足棲長途復當踐帝優循良吏召對明光殿羌子與我親綈袍長戀戀雙鳬一朝去臨風涕沾面努力崇千秋慰此金石願别汪仲淹二首仲淹病卧三載矣兹以余之抵新都也為我一至桃溪再至岩市三至太函聞余告歸意殊戀戀别之古詩二章噭噭雲間雁飛鳴各有適翩翩水中鳬中道乖羽翼我當還故棲子病卧蓬室明發從此辭遙遙望鄉國東顧臨大江波濤無終極大江豈不遐一葦朝可航我友一為别倏若逾三霜踟蹰念子病送我濠之梁遲遲白日暮車馬為倣徨人命匪金石暌離熱中腸長當保玉體百嵗遙相望娟娟苧蘿女二首寄李生時秋試罷歸娟娟苧蘿女艷色明朝霞珊瑚被玉體瓔珞相交加綺疏傍阿閣髙居臨狹斜朝披越臺錦夕浣吳門紗一為白雪言清音浩無涯哀思激雲漢行路咸咨嗟寧知中腸怨愁結紛如麻芳春倏已盡白露漙蒹葭娟娟苧蘿女婉婉矜弱步浣紗越溪上西施屢回顧羅襪揚輕塵徘徊感行路但持雙明璫贈君比紈素灼灼桃李華嘗恐瘁霜露羞為倚門笑寧為入宫妬亭亭處空閨冉冉白日暮己卯仲秋復當計偕北上以家母病不赴與諸友言别四首荏苒嵗時邁蟪蛄鳴前庭大火倏西流白露中夜零公車有程期僕夫戒我行州郡忝招邀閭里相送迎肅肅同袍侣命駕來林坰各言休明世努力事遐征夕當辭室家明當赴神京神京豈不遙閶闔造中天金莖夾廣陌玉陛搜羣賢幸生唐虞代况逢強盛年徘徊髙堂病一卧垂十年既無稚子娛亦寡羣從援椿庭渺何許萬里越南滇感此去住懷戚戚摧心顔戚戚徒爾為興文各踟蹰夙昔慕巢由散髮箕潁隅矧兹烏鳥情能不懷倚閭令伯惟承歡王陽實回車亦知軒蓋榮方寸寡所愈願言青雲客矯翼升天衢君子遊岩廊小人安敝廬敝廬亦何有有稼復有萱旭日麗遙岑清風濯林園問寢趣庭幃進膳列芳鮮雖無黻冕貴彩服歡慈顔板輿厯髙臺絲竹羅長筵踟蹰禽鳥聲映蔭林木繁俯仰中所欲百嵗聊自全寓懷三韻七首泛泛海上鷗機忘意自適嗟嗟塞翁馬何失亦何得七日混沌死哀哉倏與忽膏以明自煎香以熏自燔葆光茹其和乃可全天年巍巍廣成公千嵗空同顛西方大聖人國土名極樂萬法同虛空一塵安所著嗟嗟蠻觸民智勇困蝸角向長志五嶽宗炳卧一丘濟勝苟無具澄懷亦天遊鳴琴一室內萬象同蜉蝣飛蛾赴明燭徇利忘其身蒼蠅集鼻端髙峻為禍因石戶有遺民古今稱達人齊王本好瑟東郭仍濫竽與世苦枘鑿獨處恆嗟吁九州不足居何况五畝廬世人競巧知逐逐如飛蠅井蛙亦詫海夏蟲曷語氷俟彼千秋人陳迹異代論少室山房集卷十二
