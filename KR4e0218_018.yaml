body:
  text: 少室山房集巻十八明胡應麟撰五言古詩一十九首六公篇有序六公者髙太史季迪李觀察獻吉何觀察仲黙徐博士昌穀髙參知子業李㢘訪于鱗也其三洛下其二江左其一濟南總之上距國初下迄𢎞靖詩家者流正宗巨擘盡矣余束髮寤寐諸君子讀其遺集恨不獲一當其人是秋舟過吳門欲入訪季迪昌穀故居而州民遂無識者蓋頽沒榛莽久矣嗟夫彼其盛名朗朗懸諸日月世代非逺河山邈如由後視今維今視昔俯仰宇宙能無悵然爰並李何四子為六公之篇後之同志或将有感於斯咏云爾四傑起江左太史何琅琅一鳴駭萬鳥百中連雙鶬朱絃奏上國白紵歌明堂遂令十葉後率土歸吳閶謂嘉隆間也右髙太史季迪河洛鍾人龍圖書倏輝映文起八代衰詩還四始盛坎壈雖當時靈光獨晩境突兀空同顛猶懐廣成問獻吉年視何徐輩獨髙一時並起薛鄭熊髙等皆無年云右李觀察獻吉嵩岳降英靈生申維仲黙威鳳摶紫霄祥雲捧丹日得嵗劣陳思齊年過王勃今古三少成惜哉同六極嘗謂古今早慧而能大成者三君居最又不夀畧同右何觀察仲黙斯人江左秀朗若披雲岑清風振玉珮白雪鳴瑶琴應劉失前步陸謝無遺音太息談藝録良工誠苦心右徐博士昌穀李何峙中原顧盼失後輩髙生稍晩出如澠倏興代清廟列尊彛中天落空翠咄嗟有盡年驟與飄風會右髙叅知子業嘉隆建大業濟南實前茅含毫有八極聳翼無九霄遐心自皇古傲骨寧中朝至今蛾眉雪千仞留孤標右李㢘訪于鱗五君咏有序丙戌嵗王長公作重紀五子篇今復逝其二矣叅以余所知歐趙兩公為五君咏兩公亦司冦舊稱五子之二也桓桓司馬公文武實天授大筆攄雲雷穹碑揭宇宙横飛北地前獨步弇山後偉哉詞人場百代歸領袖右汪司馬伯玉明卿起南服束髮嫺聲詩一麾守嶺海三黜行羅施飛書問供奉鍊句追拾遺誰能竭大海盡出珊瑚枝吳官夜郎嘗有詩懐李供奉右吳叅知明卿張公江海客丱角遊天朝霜蹄躪千里風翮摶九霄彩毫建安席赤幟開元標遇我華陽館片諾成久要右張中丞助父嶺南維歐君儼若飲醇酒拙宦三十年工詩五千首黑髮遊中原白頭卧林藪惆悵蘭隂臺落日共揮手右歐水部楨伯矯矯趙司成風槩自天植胸腹羅星辰肺肝秉鐵石輪埋御史亭座首司冦席蔚為文士光寧彼九鼎力右趙太史汝師八哀詩有序八哀皆當世鉅公名流也昔杜陵咏八哀以李北海蘇司業之文學張相國嚴鄭公之政事李司空李大尉之勛勞李汝陽鄭司户之才藝為次蓋通舉當代之烜赫者不必受知也若國朝名臣輩出嘉隆之際倍蓰開元文學則有琅琊二王公政事則有若萬安朱公建寧滕公勳勞則有若銅梁張公定逺戚公材藝則有若茂苑文公嶺表黎公不必曰通舉一代揆厥攸造視少陵所稱述無弗逮者或逺過焉有之余生也賤且年地懸絶諸公顧並當伯樂之盼即交有淺深受知一也爰效杜體為八哀之篇其文辭則瞠乎昔人後矣大司冦東吳王公世貞洪荒忽中闢宇宙鍾人豪間氣五百年一旦開皇朝天挺瑯琊公河漢騎斗杓題詩惱玉帝謫籍遊塵囂肝腸錯錦繡咳唾垂蘭苕胷吞太湖水筆湧耶溪濤九嵗咏鳳凰十齡題寶刀十三作文賦十九摶青霄髙才聚東井散秩同西曹廣心出皇古奮臂追前茅嗚呼薊門事大纛摧鳴梟倉黄别上國惕息還蓬蒿歸來卧窮巷削迹甘漁樵雄文鑿混沌大樂鳴英韶東瀛極滄海南紀逾銅標北冥亘沙漠西域窮荒要八埏走琬琰九域飛瓊瑶千金買隻字百鎰酬揮毫瑰辭匹墳典麗句駢風騷多聞失劉向捷給凌枚皋帝心亦簡在日夜馳干旄東山乍一出被髮仍由巢竺乾叩真詮漆園明逍遥香雲拂几席甘露流天瓢金棺下閶闔玉樹埋山坳中華折天柱下界聞鸞簫雙虬去廣漢八駿升岧嶤𤣥丘見王母白雲和長謡乾坤失盟主海岳頽髙標安得跨大鵬萬里隨神飈太常東吳王公世懋清河維哲昆潁川實難弟太常何英英二十誇謁帝雋聲走上國唾手拾巍第居然棣花萼燁並芙蓉蒂翩翻擅綺藻韶瑩絶塵泥皎月懸春空朝霞豁晴霽朗朗屋百間虚舟了無繫振珮遊春曹詩篇驟名世標新見𤣥理汰俗起凡例縱横信陽筏磊落濟南契憐才貫金石握手忘荼薺伊余實庸駑公也口不啻扢揚亘古今寄託深禰禘太息身後名孤憤千載計神遊貫八極江海窮鼓枻飛泉潄三疊大澤浮九漈徘徊華峰蓮厭飫閩嶺荔一紆太常綬清齋問真諦紫府繙丹經絳宫候飛履洪崖拍右肩金母拜左髻雲軿下五濁笙鶴遽迢遞龍虵發丹竈雞犬入霞際虚疑老成喪坐惜典刑逝三嘆杜陵詩髙才日凌替大司空江右朱公衡猗與大司空突兀起江右燁如匡廬顛羅列千萬岫弱冠登岩廊老宿推領袖功名迄自致建樹必髙厚厯敭亘二紀盤錯靡不就嘉皇四十禩八荒慶在宥河流倏奔突淮泗若懸霤生靈困魚鼈巢窟雜猿狖大庭推司空僉曰惟夏后一麾出飛雲百神互馳驟鐵鎖纏支祈金書勒史籕大澤疏洪濤長堤障罅竇三時督工匠百里並延袤留城距濟谷一一置封堠白馬沈宣房𤣥圭錫華胄平成在天地吐納偕宇宙擇言到芻蕘采納及蕪陋垂髫詫國士煦燠若懐袖深知大海量涓滴務兼受緬懐西山芝願紀南極夀胡為跨鶴羽羣真畢相候褒榮亘泉壤雨泣遍耆舊尚憶驅龍蛇至今貢橘柚明明大禹徳夐夐絶前後御史中丞閩中滕公伯輪維三十六峰秀甲東南服篤生大中丞如海王百谷夙偕武夷君並主赤城籙沆瀣餐七臺明霞卧九曲一朝念黎元曳杖下雲陸孩提見異質儀羽何郁郁虎頭燕頷姿萬里飛食肉龍泉太阿鍔見者詎敢觸意氣干層霄襟次苞岳瀆皇王及帝霸一一悟正鵠居鄰紫陽宅先覺竊自淑剛嚴繼子厚方雅表正叔三十登熙朝厯塊徵驥騄嶺海行花封羅浮翫朝旭含香入銓省造請絶苴牘當門忌蘭􅉅故里蓺松菊明主念舊勳飛詔起林麓朅來柄文衡越士罄程督樓船汎滄海藍筍厯天目浩蕩窺人文豪英聴約束夜課三千徒朝薦十六族泰山納寸壤渤澥收一掬伊余實駑蹇鹽車困馳逐顧盼超驪黄立貢千里足世輕園令金公擬卞和玉提攜洞底裡邂逅吐肝腹峩峩翠虛亭清燕幾迴矚禮數捐苛煩杯斚絶邊幅潢池忽中擾帝命馳大纛强弩横錢塘朱旂鎮三竺威嚴控豪右字䘏逮樵牧閭閻絶冦警倉厫發餘粟遂令全越氓比户䕃膏沐仰父仍俯子左餐更右粥鑿鑿元戎疏宰司罄采録方酬大賢績永顯儒效速胡為跨青鸞倏爾䜟妖鵩劇知勳庸盛翻訝日月促譬彼南陽龍盡瘁事興復一朝殞大星精爽尚肅肅緬懐澗中藻已拱墓傍木吞聲受恩士血泪盡痛哭先民失懿範遺統竟誰屬惟應聖門業永永耀斑竹大司馬西蜀張公佳𦙍張公産岷峨夙抱文武畧偉哉沈深度宛若未雕璞通籍遊皇都浩氣貫碧落出宰河陽縣解褐遘盤錯姦萌起肘腋萬衆互駭愕一顧摧兇渠勢若反掌握及乎任西曹亟闖五子幕大敵逢李王奮勇與之角遂登作者壇文譽不落莫功名浸鼎盛嵗月曠著作三關樹髙牙敵膽懾沙漠嗚呼壬午事大手覩揮霍潢池舞鰍鱔白日走蜃鱷明廷廑南顧大吏咸塞縮維公奮臂出長虹耀千莫首刷閭閻憂六街静鳴柝淵謀秘胸腹逺智運龍蠖聲色了不動從容卧帷幄一朝令轅門羣小悉面縛纍纍九青兕一一就脯臛人懐顧復惠士有更生樂武功既蕩平文事稍恢拓飛檄凌扶桑露布入平樂長裾曳曹丘敝屣接東郭帝嘉定邊勛飛詔下京洛本兵屬運籌九塞遵東約胡為殞長城驟失北門鑰迴思瀫江涘單騎訪岩壑迓我錢塘郊恍忽共濠濮詫我雍然音一代恣騰攫張公手書今存手迹宛若新足音遽寂寞矯首銅梁里大樹日蕭索少保山東戚公繼光嘉皇三十載薄海飛長鯨波濤蹴宇宙勢欲東南傾定逺起列校巍然任彭黥鳴梟樹大纛束馬懸髙旌轉戰日千里刁斗竟夜鳴天山破强敵白水殱驕兵三吳蹙徐海五嶺摧吳平初聞燧火息再覩潢池清七閩共尸祝儼若居神明武功固日揭文藝時潛精婁江謁廷尉蜀國遊中丞翩翩左司馬金石偕同聲飛揚将壇略趺宕詞苑盟隨車盡貔虎入幕俱豪英强敵躪西鄙髙牙馳北平雙鞬絶大漠横槊歌長征天山十月雪一劍無留行奪彼賀蘭山築我受降城勛髙薄上賞業就遺浮榮飄然策羸駟投袂辭神京參差武林驛遇我如生平恂恂見儒雅詎曰曼胡纓惜哉赤松逺丹砂邈難成悲來誦雙劍海岳迴光晶余嘗為二公賦雙劍之篇謂汪戚也博士長洲文公彭江左𢎞風流吳中盛才傑文章固挺出翰藻彌不乏長洲一散吏勢乃傾六合畫工啓南理書嗣京兆業餘工及篆隸一一皆卓絶新詩亦韶潤舊典多博涉蕭然卧窮巷不減原憲俠徵求或匪人絹素劃中裂愧余生後時未及覩先達京華遇伯子忘年共頏頡真行嗣父風隸草變家閥雙鈎幻唐晉片楮貴燕粤尤工古印記珉玉浩森列龜螭兩京後科斗三代末澹宕杯酒間真致表疏越顧我何殷勤十指不停跋雲霞煥楣棟星斗爛筐篋龎年及上夀彭􅔶冀相埒倏爾乗化終飄然返六合遺蹟儼若新天路渺難越緬懐父子風老泪墮閶闔前半敘徵仲太史余未及晤此公故因夀承及焉秘書南海黎公民表嶪嶪羅浮顛上有瑶石臺秘書起嶺表恍若登峩嵬古心亦古貌多藝仍多材悠然葛天氏醇朴逾嬰孩青衫困一第十上仍徘徊龍門實有策狗監嗟無媒匏𤓰詎足係一命沾蓬萊拙宦三十年羽毛日摧頽風騷炳一念壯志浩不回髙歌掩陸謝麗賦酬鄒枚梁歐日倡和王李時沿洄餘工入翰墨落紙皆瓊瑰龍章剪薤葉鳥迹行莓苔八分走夷貊四體攄雲雷邕斯有絶詣鍇鉉無兼裁緬思穆皇世京華盛游陪杯盂洞肝腹土木餘形骸横當賀老盼謂我青蓮才三留瀫水棹十寄羅浮梅老成倏凋謝涕泗横蒿萊少室山房集巻十八
