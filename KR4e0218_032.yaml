body:
  text: 少室山房集卷三十二明胡應麟撰五言律詩七十七首徐銓部過訪不值二首何因藂桂下駟馬值仙郎日駐金珂影星流玉劒光登龍餘顧盼題鳯愧行藏佇聽東山起含香入建章傳呼鸞掖吏來訪鹿門樵曲徑俄雙屐空山祗一瓢白雲寒自倚紫氣暮誰招好去蓬萊殿千花待漢軺遊橫山菴白馬何年到名山敞梵筵壇空諸佛下洞古一僧禪鉢與龍俱卧燈將虎並傳真如祗自得誰為問青蓮寄陸太史敬承二首濩落吾能返飛騰爾故頻自為三館客誰共五陵春白日流金掌紅雲護玉宸故園芳草外曽否念垂綸爾作承明客吾歸已判年花香鸞掖底柳色鳯池前醉任眠中祕閒仍草太𤣥燕姬無限好猶記琵琶絃哭唐太常二首乍輟金華講長投海岸簪中涓誰冀北太史竟周南襚道黃泉啓關門紫氣含平生攜手客泪盡百花潭袛謂焚魚卧真成跨鶴遊千秋誰掛劒萬事已藏舟夜壑星辰逺重泉日月愁獨將知已淚慟哭灑西州送王大行使嶺外迢遞雙旌色朝行大海東天垂鵬翼盡日照蜃樓空玉節諸番衛金函萬國同歸來銅柱畔題賦尉陀宫答汪茂才尺素天俱逺芳尊日暫同自懷和氏璧誰問楚王弓晝卧蒼龍偃宵談白馬雄青雲太史在寧復念途窮夏日同諸子登望衢亭作呈趙明府劇興真飛動層臺半斗牛天空疑不夏地迥欲生秋峽色雙龍抱山形萬馬留異時懷賦客吾豈仲宣儔李生西遊久不得問因寄西遊去何日念爾獨離羣履綻秦山雪笻飛蜀嶺雲鄉心寒狖落客思夜鴻聞記取岷中事南歸報右軍送趙太史之嶺南五首一麾辭禁闕萬里赴長沙地入蠻王壘天浮漢使槎亂山梅嶺樹絶徼夜郎花永夜羅浮頂誰同眺日華賈傅章才上王褒命已傳飛霜隨劒舄大海傍樓船客夢梅花裡鄉謠桂酒前坐看公府暇白雪滿南天獻納紆青瑣驅馳戀紫宸珠崖百蠻路銅柱九夷春郡邑橫天起旌旗截海陳祗應宣室夜萬里召孤臣豸服層霄下麟符夾道光萬峯行瘴色獨馬度炎荒暮雪秦關擁春城粵海長轉將金掌露移灑向扶桑暫輟蘭臺講言乘桂水橈牙旌馳絶域繡斧出中朝瘴壓髙凉晚山通大宛遙莫嫌文字癖干羽遍三苗送何山人遊邊悠然尊酒别秣馬問漁陽漢磧連天紫邊沙擁日黃列營隨驃騎分險駐龍驤㑹挾金城策長纓請建章送人還桐廬不逺桐江路歸帆候月牽赤霞晨際海青壁午連天鳥道從人問猿聲傍客懸釣臺千尺倚誰伴子陵眠送人入蜀客畏蠶藂路君仍駟馬過白波三峽滿青嶂九疑多絶棧移旌節層臺夢綺羅海棠花在眼爛漫倚髙歌秋晚靈隱寺小憩咫尺東林寺欄干不厭憑萬山回卓錫一水護傳燈梵室偕龍樹經壇接惠能上方鐘磬發晚傍白雲登送李逸人西遊一騎西遊逺雙鴻北望饒雪深眠太白雲起問中條漢磧名偏古秦碑字半銷已無婚嫁纍何地不漁樵方伯滕公由嶺南過訪不值二首翩翩岩穴畔千騎逺從東劒履周方伯軒輶漢上公花看薇省近竹訝草堂空萬古夷門道誰論意氣雄小隊行春日華鑣問俗時孤亭留皂蓋萬户擁朱旗氣色函關繞星辰漢殿移未應題鳯字曽受子雲竒壬午秋以家君命北上舟過嚴光先生祠戲作不向長安去何人奏客星物情違偃蹇吾道寄飄零大澤寒收釣髙天暮放舲羊裘謁明主歸卧萬峯青舟次檇李寄王承父山人癡絶王摩詰何時出輞川迷花孤洞裡採藥亂峰前劇飲留真態長齊斷俗緣虎頭新使者曽乞賣文錢再遊焦山尺地開龍象遙江浸畫圖排雲千寺立湧霧一亭孤叠嶺藏鐘磬中峰過舳艫憑誰買山色把釣作潛夫夜宿金山作叠浪天浮玉中流地布金寺圍孤島面亭插萬波心日候晨鐘出潮將夜梵沈妙髙寒獨上風雨過龍吟金陵雜詩二十首宛洛飛龍地岐豐下鳯年河山西控蜀象緯北朝燕玉殿淩霄出金城截海懸嵯峨帝京色萬古鎮江天寶鼎成周奠靈符大夏開日當濠水上雲傍孝陵來百辟瞻黃屋千靈扈絳臺時看青瑣客鳴玉鳯池回虎豹天都近魚龍地軸閒穿壕瓜步水鎖岸秣陵山上苑明冠蓋新亭集珮環徘徊承露掌百尺暮雲間帝闕三秋到人烟四望平城闉盤海氣市井雜江聲翠管吳謳發牙檣越舶行未央宫萬户恍忽見蓬瀛禁苑花如織離宫樹作行虹橋懸太液鳯管集昭陽日麗雕甍動雲穿碧檻藏翠華雙掩映猶記六龍翔畫㦸三千隊雕戈十二營貔貅嚴左翼熊虎列前旌草木環滁動蒹葭到海平越裳重譯至何事問長纓樹色東華逺鐘聲大內開紅雲長樂觀紫霧柏梁臺帝座罘罳擁仙城睥睨回蔣山青不斷百里掛崔嵬畫檻排空立飛甍逐望低觀危鳷鵲度臺古鳯凰棲海日千門上江雲萬堞齊大堤楊柳色倣佛舊烏啼巷陌連松桂園亭翳薜蘿人家王謝舊佛寺晉梁多北固晨鍾斷西陵夜舶過紫騮渾欲住無奈客愁何大道開平樂名姝傍狹斜黃鸝交坐柳白馬競穿花翠箔通雲氣珠簾上月華畫梁雙燕子遙認莫愁家𤣥武湖邊路西風載酒行中流藏灔澦叠島象昆明落日喧沙雁回風動石鯨樓船三十萬猶記漢皇營勝絶南朝地淹留北上程石城看虎踞蕭寺聽雞鳴岫鎖吳雲暗江飛蜀雪明詰朝關外路真作棄繻行寂寞空三殿豪華記六朝齊梁頻禪代支許競招要隻字神飛動千言思泬寥昔人吾倘遇玉塵向誰驕傑閣憑虛上回瞻帝闕西城開千巷陌剎湧萬招提靈谷青松合鍾山碧樹齊朝來渡江去擊楫為聞雞落日長干道青絲照玉壺碧桃雙繫馬緑柳半藏烏濩落堪詞客飛揚問酒徒縱邀金谷侣長夜鬭摴蒱衮衮牛頭路青山極望同天開吳楚地寺鎖晉隋宫宿霧縈窗白朝霞出户紅異時飛錫到闡化大江東句曲山中樹華陽洞口雲玉樓千地湧金鐸四天聞老鶴傳丹訣乖龍護赤文五芝容客采長揖大茅君結綺誇前代臨春憶大家清歌傳寶瑟麗藻擲瑤華殿倚千門月樓飄萬井霞即今商女恨悽絶後庭花屈指前朝事悲凉舊跡存金甌長日月玉殿自朝昏野雀棲朱桁啼烏過白門柳花香滿店愁絶送王孫獻賦趨鸞掖題詩寄鳯臺自呼狂客飲誰問謫仙才步憶金蓮下歌聽玉樹回三山吾欲去萬仞卧蓬萊歐水部招同張太學劉大理顧司勳夜集徐園遲李臨淮不至同用心字二首華館夜沈沈追隨愜素心珮環三署合燈火萬家深白苧翻吳曲青萍動越吟征西期不至愁絶露華侵名園仍北郭小徑入東林地憶先皇賜天回上客吟當尊荷芰色滿座薜蘿心冉冉長安月飛光下翠岑區用孺以端研見貽索余一詩為報邂逅羅浮客論心衛水傍紅絲勞把贈青玉爛生光偃月窺藝案涵星動草堂輸他阿環麗捧立在昭陽哭黎惟敬祕書四首此日朱明洞誰同對濁醪宦途窮執㦸人代絶抽毫雞犬聞天路魚龍泣海濤傳家大令在忍覩鳯凰毛驟得天涯訃真成地下遊羅浮殘月墮碣石斷虹留慘淡青黎閣嵯峨白玉樓梅花一萬樹何處挂吳鈎石室瑤華閟泉臺玉樹遙神遊今八極宦蹟舊三朝客競傳中論人誰賦大招那堪潞河望風色暮蕭蕭邂逅為𤣥日踟蹰射䇿年飛觥桃葉下授簡竹林前調已中華絶名應大海傳亂山銅柱外若箇是新阡寄觀察金公按部雙旌逺行邊一劒雄圖書觀魯殿謠頌采齊風泰岱浮空紫蓬萊上日紅登臨時極目作賦許誰同秋日湖莊八首幽棲只數椽野水十家連靜室長生白閒亭獨草𤣥蒹葭湖北路禾黍郭西田理就滄浪曲吳歌日扣舷湖濶疑青草原荒近赤松微名藏一壑大業寄千峰户牖嵐光滿階除露氣濃樓髙才十尺莫擬卧元龍素髮垂垂近青陽去去多霜簷飄橡栗雨壁上藤蘿越女紅蓮棹吳儂白苧歌翛然車馬絶曳杖步山阿野色看逾近秋光淡欲無凄風回大壑驟雨入平湖碧樹通樵徑丹楓繫釣艫江東步兵後瀟灑見吾徒六尺鴟夷舫蕭然繫短籬亂山明隔垞積雨暗空陂身世鸕鷀老行藏雁鶩知五湖秋萬斛㸃綴著西施大野黃雲熟平湖白露凉菰蘆環笠澤薜荔翳柴桑落雁啼沙汭流螢度石房寒花綴籬落作意近重陽窮巷回車轍柴門盡日幽杜陵歌大厦𤣥德卧髙樓地許鳬鷖占天容鹿豕遊虞卿懶成癖㸃筆為春秋此日遊仙夢當時結客情玉繩鳷鵲觀金鑰鳯凰城白眼長安卧紅顔上國行十年湖海氣踈濶傍柴荆送蕭司空之南都四首劒履新南國旌旗舊朔方一麾移細柳萬舸靜扶桑虎豹軍容肅麒麟帝眷長異時書太史寧復論平陽燦爛熊車度逶迤鳯闕來戈鋋千堠列鹵簿百城開日近司空座星移上將臺大廷推相國誰並鄼侯才組練過吳㑹衣冠入漢宫日光搖畫㦸霞色射彤弓渤海三秋靜潢池四望空未應勞夢卜天意屬非熊鼓吹出江臯前驅意氣豪射潮收萬弩橫海列千舠日月瞻黃屋雲霞護錦袍秣陵花似綺爛漫待抽毫贈趙茂才言開緑蘿徑却訪赤松遊枕簟依山僻琴書入洞幽姓名文苑客身世醉鄉侯莫羡侯芭業𤣥亭易白頭李逸人西遊寄訊一壑容髙卧頻年賦逺遊卜居秦望頂長嘯越臺秋海日低龍屫山風綻鹿裘錢塘潮漸長乍夜放扁舟秋日題唐惟良山房二首郭外千峯色翛然墮草堂挂冠三徑蚤髙枕一丘長夕露團幽砌朝霞宿畫廊門添五楊柳何異在柴桑結宇雙松下為園萬竹中壯年歌老驥長日送飛鴻露浥琴絲潤星搖劒色雄看余五游畢絶頂卧空同寄灌父悵望西亭客沈吟北海筵玉笙王屋頂珠履鄴臺前桂樹先秋發藜燈入夜懸異時雙鶴語歸問大羅天懷鄧孺孝兼訊周山人憶汝龍門過蒼茫鶴馭分暮歸句曲洞晨謁大茆君把釣吳江雪傳書越海雲草堂人獨卧誰勒稚圭文吳叔通以四詩見貽賦答寂寞乾坤事歸來一敝裘雲山成獨卧海岱見名流璧已三年抱珠仍萬里投白蘋洲上路曽試木蘭舟何處懷同調飛書問獨醒乍回雙眼白猶阻萬峰青慘淡垂綸石棲遲載酒亭異時新論就能賞太𤣥經病肺荒園外潛身大海傍青陽馳翰墨白雪照行藏一水蘭苕近千岩薜荔長夜來星斗色明滅傍干將夢寐延陵客風流故不羣千秋曽和雪片語欲凌雲柳隔青絲笮花生白練裙浮家何日事來往霅溪雲少室山房集卷三十二
