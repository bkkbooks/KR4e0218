body:
  text: 少室山房集卷三十六明胡應麟撰五言律詩六十八首吳郡金公應照令吾邑凡後先六載清風卓操絶代無倫黌士慕其遺愛將舉祀名宦不佞恭竊門下敬賦二章當年武城令故國近三吳睿識懸氷鑑清標瑩玉壺琴遺何處鶴舄化異時鳬磊落循良傳千秋更有無素絲傳苦節彩筆擅瑤華彭澤門藏柳河陽縣帶花雲霄餘宦轍江漢逝仙查寂寂談玄者空悲隔絳紗夜宿黃季主對奕決賭金伯韶為點籌酣飲達曙題壁間念汝能懸榻令余忘憶家香凝燕邸霧燭裊漢宫霞仄徑眠孤鶴虛簷集亂鴉今宵橘中卧極樂在天涯送僧還赤城春遊秦苑外夏返越臺傍片石幽期逺千峯别夢長危杉飢鶻墮古柏病猿藏問訊寒山子題詩遍佛堂宿狄明叔園亭二首間來種瓜墅門巷半垂藤石室藏金匱星臺控玉繩茶招陽羡客飯供雪山僧下榻余將卧清宵話大乘自是詞人社虛疑上將壇清香浮畫戟異味薦雕盤五色瓜縈砌千株橘繞闌黃梁炊漸熟飽飯話邯鄲再過狄明叔園咫尺將軍第重來日未衙徑添何氏竹畦蔓邵侯瓜曲榭微生月層樓半納霞一枰堪度世何地更吾家送徐亷訪之虔州為羡虔州路依然借寇行關西羣吏送嶺北大僚迎日擁雕戈艷霞飄畫轂明五羊天咫尺髙眺粵王城破山寺老衲夜談作一徑入蒼翠飛雲裊裊屯危亭標木末古剎翳松根海月時窺牖山風日掃門憑呼野衲至信宿共芳樽過張伯起幼于園中二君各出小影索余題即席賦二首乾坤長嘯客林壑自由身蚤闢東山墅間垂北海綸新聲傳子夜麗管握陽春我亦思逃世貂裘再敝秦右伯起何年醉玉京謫籍下蓬瀛方外唐徵士江東晉步兵鶡冠雲氣入龍劒雪花明異日投竿去毋令帝座驚右幼于次瓜步張别駕留酌署中欄杆明月下蘿薜暮紛紛翠杓調甘露香厨供彩雲含毫春半入剪燭夜平分更喜朝來約三山跨鶴羣擬次日遊金焦余病甚遂不果往秋日遊大慈岩作薄暮肩輿到歸樵處處逢萬尋開峭壁千級上危峯樹杪禪關出蘿隂梵剎重何當専一壑絶頂卧長松姬人有從行岩上者蹻捷之甚戲贈此詩岩名大慈偶逐天台客桃花照玉顔繡裙時綰霧羅襪慣登山嶺月生眉黛峯雲動髻鬟不因劉阮至那得共追攀題祝無殊棲雲軒小築蘭陰下幽居瀫水濆八窗全受月一榻袛棲雲竹杖占龍氣蒲團臥鹿羣何人日攜酒相對草玄文挽吳封翁四章文仲觀察尊人行誼髙卓潛耀弗彰為時楷則閥閲崇三世絲綸賁九重行髙黃叔度名重郭林宗茂苑新楓落蘇臺宿草茸異時雙廡下誰問伯鸞舂髙蹤懸石戶古行鬱泉臺海月長鯨去天風大鳥來河南傳治行鄴下紹詞才世澤今何限無煩嘆草萊劒色豐城閟書香茂苑長題銘符季子樹碣副中郎閣翳新玄草齋繁舊白楊明珠遺集逺光照玉涵堂封翁厥考純叔先生以行名嘉靖間有明珠玉涵二集緑野承先世蒼生付象賢恩波填越海涕泪咽吳天薤露丹旌外松風素旐前袛應門下客長廢蓼莪篇送僧遊越東窮年持戒律行腳遍蒿萊碧海浮杯度青山躡屫來天台方廣寺雪竇妙髙臺匣底蘭亭帖相傳自辨才劉廣文擢北司馬詩送之漢殿移官入燕臺謁帝行敦詩元郤縠議禮舊荀卿海國朝霞麗江城霽雪明題書頻寄憶翹首北鴻征越嶺瞻喬卷為易使君仲子題公子舊翩翩寧親羡汝賢瞻喬離楚服懷橘向吳天柯爛青霞斧帆飛赤壁船太行他日望重賦白雲篇次日葉孝亷復邀集館中賦水亭門外望朱户萬花間逸興饒金谷豐肌倍玉環紫騮雲雜遝黃鳥雪間關肻學山隂棹空成興盡還妓有貌甚豐偉而歌舞殊佳寄李左轄皂蓋江都舊朱衣漢殿新雲霄回北望山嶽動西巡薇省千花夕棠郊萬樹春何人學徐稚今古接芳塵劒泉當年歐冶鑄蓮鍔夜生花赤電飛延浦青虹照若耶風期絃上得意氣築傍賖會挈樓蘭首銘功瀚海涯衛河阻風同張陳兩生小飲作何限蕭條色相看一坐中乍收霞腳雨仍起石尤風逆浪衝飛鷺驚沙沒斷鴻移文岩際滿獨此滯征蓬登陸行齊魯趙間二首望望鄉猶隔行行路轉難村醪過曲阜野飯駐邯鄲白墮誰爭醉黃粱任飽飱憑招吕翁至一問大還丹乍騁思鄉目聊舒逆旅魂牛羊遙隔岸雞犬自成村隴麥侵齊甸山花照魯門岱峯雲咫尺如迓丈人尊余從陸至安平鎮聞傅伯俊明府先一夕過此悵然有寄一夜長洲令雙鳬跨碧虛徒飛秦觀夢未達魯連書計吏黃金詔郎官白玉除鱸鄉亭下路歸客倘踟蹰伯俊别號秦觀聊城人贈謝山人一榻衡門下蕭然共白頭長林中散卧古木謝敷留石室藏孤憤金庭夢五遊剡溪前夜雪曽否下扁舟項山人季輿過訪賦贈二首柴門朝雨霽鳥鵲噪簷牙車馬何方客新來自永嘉去偕滄海月歸指赤城霞遲汝秋風夕同扳桂樹華總為尋詩過難將問字留萬峯陽羡色雙艇石湖秋霧擁王孫珮星隨客子裘歸來定何日長倚碧雲樓繫航閣為紀旭仁題嵯峨揚子閣百尺大江邊竹繞談玄座花藏問字船捲簾羣壑入敧枕萬峯懸夜雪如相過那能興盡還中泠館為楚宗侯仲和作勝迹中泠畔名亭大海頭石欄三楚色金錫九江流谷有康王卧泉堪陸羽留春芽陽羡熟一鉢許同遊集郭鴻臚聽歌赤欄橋子畔來過百花叢一徑延新緑孤亭坐落紅歌聲全度雪舞態半隨風向夕瑶臺望真疑鳯下空林山人逸民自閩中來訪賦贈野鶴間雲輩何因獨扣關為尋天竺寺來話武夷山客路松華熟禪房桂樹間那能待婚嫁五嶽早躋扳過林生啜茗作七閩山水盡仍艤瀫川航一室空林下長齋葉滿床畫圖傳蛺蝶書札動鸞凰為客烹陽羡雙松正夕陽送黃廷評東陽仙隱吏八詠萬家傳政就花連郭秋成秫滿田龍扳新絳闕鶴舞舊朱絃藉甚王廷尉君看結襪年客有自金華諸洞返者窮幽歷險所覩甚異余偉其事而賦之以訂再遊洞天三十六竒絶擅金華雪壁盤空上氷壺抱月斜玉桃千嵗實瑤草四時花瓢笠吾當去驅羊臥赤霞燕臺驤首為方元素題赤驥畫桃花長鳴逐暮笳霜蹄穿大漠電影涉流沙伏櫪心期壯登臺意氣遐秋風間十二早晚向天家毛文學招集命幼子慶郎出見座上賦何處來英物娟然玉雪同春山聫寸黛秋水浸雙瞳異日徵飛兔當年憶夢熊看君懷橘去誰不羡黃童王孝亷邀集城西張氏館即席作結束問東家聫翩到狹斜緑楊初擁絮紅杏半飛花繡榻籠輕霧珠簾罩落霞坐來庭樹色冉冉欲棲鴉贈謝少亷舊閥知王謝竒情識魯連世傳如練句人誦搗衣篇冠鶡餘生事屠龍入暮年白門桃杏色次第理吟鞭送王使君之滇中六首樓船秋水平汝向碧雞城絳殿分符别黃堂視篆行萬山藏貴竹孤島闢昆明爛漫東方騎遙知夾路迎詔書來日下行色動江臯鹵簿專城貴旌旗列郡豪檄傳巴俗逺詩到夜郎髙何處看銅柱飛揚勒彩毫銅魚分絶塞金馬問長途地入三苗險天懸六詔孤中華傳製作異域上輿圖新釀椰陰滿何妨醉百觚不堪垂老態仍對欲分襟杖擬攜卭竹船應載鬱林夷歌傳白璧漢詔錫黃金何似長安吏窮年問陸沈西南天欲盡剖竹問羅夷想像千村外驅馳九驛時山行忘蜀道水戰息昆池臥閣桄榔下能無咏别離迢遙丹鳳詔燦爛白狼篇弭蓋朝行僰飛槎夜入滇長途山作地大澤海為天絶域陽春布無勞話瘴煙聞司馬張公蕭公訃二首草載甘棠愛千秋大樹名斷虹燕北路斜日渭南營部曲清笳送官僚素旐迎東南天半壁誰為築長城北里丹旌度西江素翣回千秋申甫業一代管鮑才象緯中台坼風雲太華摧袛應廬阜色名姓共崔嵬哭大中丞滕公八首間代鍾豪傑嵬然嶽降神三朝傳政績萬國待經綸賦就悲題鵩書成嘆獲麟何須論夙夜盡瘁見王臣絶學傳鄒魯洪都陋漢唐君王悲大樹父老泣甘棠百萬清油底三千絳帳傍尚思龍起日風雨動南陽羽節吳山駐貂裘漢殿來詩書三代佐文武萬邦才日慘中丞幕雲寒上將臺袛因秦望石勳業並崔嵬漸覺三台近俄驚八座空髙牙懸落日大斾颯悲風部曲謳吟外賔僚悵望中佳城猶鬱鬱誰為問滕公甲胄重關靜樓船大海間勳名韓范後籌略管蕭間月擁丹旌度雲拖素旐還異時靈爽在長鎮武夷山七臺初返斾九曲罷揚舲琬琰留中祕輼輬出大廷山川摧間氣海宇泣英靈萬古真儒業重看配考亭尚記掄才日雞羣識鳳毛塵埃援錦瑟雨雪贈綈袍德並生成大情兼怙恃勞百年知已泪遍灑越門濤念載門人籍千秋國士期長鑱驚老大短褐愧支離宿草孤帆近生芻一劒遲殊恩何日報慟絶大江湄挽馬都閫二首矍鑠聞飛將蒼茫失故侯金章新息在銅柱伏波留已逐沙場逝寧懷下澤遊至今靈爽在猶自懾壺頭韜略知名舊封侯泣數窮前茆沈落日大樹颯悲風馬革當今羡鴟夷自古同雲臺政圖畫忍沒漢庭功先宜人不幸棄背泣血苫次志哀四章一夜西風色俄然到北堂千秋黃壤逺萬感白雲長寂寞幽蘭思遲回寸草腸夜臺無日返何處報春陽忍憶丸熊事空餘戒獵言北風頻撼木西日故摧萱玉匣埋孤隧珠襦閟九原間居曽一賦慟哭望髙軒刀尺遺中閫輜軿向大羅夢回衣線杳寒入繐帷多夜月沈蘭茝秋風瘁蓼莪流黃疊空篚觸目動悲歌驟得西華信雲軿去不疑星冠朝玉闕霧幄返瑤池白日蘭陵暗清霜薤里遲惟餘嗣宗恨血淚灑殘棋贈管茂才坤管子南州傑飄然此地逢風塵隨燕雀雲霧隱蛟龍堂上湘妃曲溪頭越女容一尊何日對相傍采芙蓉贈趙長吉中舍何來中祕客巨筆迥如椽鳥迹羲皇後螺書大禹前硬黃貞觀帖飛白永和篇竒字吾猶識能來話草玄郭生燒一鵝食余甚香美詩以賞之西園新燕集東郭舊鵝羣炙處逢劉毅燖時笑右軍金盤疑噴霧玉盞競傾雲更有渾羊設竒方欲贈君宋人以蒸鵝為湯燖右軍見筆談少室山房集卷三十六
