body:
  text: 少室山房集卷三十一明胡應麟撰五言律詩八十一首西山十詠同陳沈二太史黎祕書楊祠部丘計部李環衛朱光祿安茂才童康鄧朱四山人作晚至碧雲寺梵剎金銀布花香繞碧欄斷崖交檜柏飛瀑灑琅玕霞起天台暮雲生嶽麓寒鍾聲似迎客時出逺林端香山寺飯初上人禪院梵閣千尋起雕壇一徑斜僧歸迷翠巘客至掃青霞竹裡分香積松間轉法華遙看層砌上縹眇墮天花玉泉飛流望不極縹眇挂長川天際銀河落峰頭玉井蓮波光迥太液雲氣引甘泉更上遺宫頂千林起夕煙功德寺望景陵宣皇遊幸日千騎轉晴沙殿繞驪山樹窗開繡嶺花星辰留御輦雲霧鎖仙槎北望龍蟠氣飄飄想翠華登碧霞宫閣檻立孤峰上窗開萬嶺西霞光流紫極日影抱丹梯綺樹三春長金芝五色齊蓬萊宫殿裡笙鶴舊曽攜玄貞觀萬山蒼翠合流水晚瀟瀟霧裡瑤臺出雲中綘節朝桃花開絶澗松影落層霄時聽羣仙度天風引玉簫秋日同諸子登望湖亭殿隱芙蓉外亭開薜荔中山光寒帶雨湖色淨連空作賦攜詞客行歌伴釣翁夕陽沙浦逺北雁起秋風小憩圓通寺題説法聞初地題名到上方砌幽松子落林逺葉聲長夜雪飄山磬秋雲灑石牀坐來千嶂裡嵐翠滿衣裳洪光寺聽真上人誦經作地入空王宇山藏釋子筵白雲流五嶽青壁俯諸天象外煙花麗空中色界懸為將忘世念一誦法華篇宿翠岩寺晨風遙䇿杖夕露幾沾衣禮佛青山塔逢僧白石扉懸蘿山鳥集亞竹水螢飛為愛西窗宿泉聲出翠微仲秋同祝鳴臯諸文學再遊西山得詩四首天壽山謁諸陵紫殿衣冠肅玄宫劍璽遙天回羣后集地迥百靈朝文字垂羲畫聲歌咽帝韶萬年沾灑處寒雨動青霄湖上積水湖天合泠泠帝闕西逶迤雲色淨掩映日華低鳯吹臨髙岸龍舟出大堤桃花源咫尺洞口夕聞雞遊玄真觀積翠三天迥飛梁百尺橫星河浮玉砌雲霧攬金莖羽客青泥飯仙人赤石英何年生羽翼塵外訪蓬瀛攜尊翠微閣晚坐振錫千林暮移尊片月秋不辭青嶂逺聊共白雲遊洗鉢花臺靜懸燈竹徑幽朝來挈小朗乞食向牛頭答李惟寅病中見寄豈是趨朝懶風塵損壯顔閉門芳草合髙枕白雲間柳色溪南棹鶯聲郭外山遙憐作賦客魂夢屢躋扳題朱山人汝修卷石磴煙雲起仙源費獨尋碧山玄晏宅滄海尚平心嵗月留斑管陽春抱玉琴幾年嵩洛思倏爾一開襟丘謙之招遊崇善寺分得雲字竹院名香起花臺積翠分雙松寒挂雪一榻晚生雲畫想滄洲迹經傳白馬文平生許玄度何事戀人羣康裕卿山人移居燃桂生涯盡飛蓬旅迹多地偏餘水石鄉逺隔關河夜帳悲猿鶴春山怨薜蘿蕭條剡溪宅風雪近誰過送人還秣陵獻書辭北闕伏劍出西京落日滄江逺孤帆萬里征煙霞淮口寺風雨石頭城别後相思處關山候雁鳴春日送人之劒南二首大澤氷初解長途雪正晴孤帆送爾去千里獨含情竹翳湘妃館花明蜀帝城當壚人好在不淺舊逢迎蜀道難猶乍湘潭去若何青天浮灔澦白雪湧岷峨宅問揚雄隱堂攜杜甫過錦官城外路翠柏幾婆娑送吳廣文之嶺南寂寞青氊地何當事逺遊問人還劒浦尋雪上羅浮海岸飛花盡蠻天落木愁粵臺時眺覽萬里見髙秋渡江望金陵宫闕四首望望吳天迥遙遙越客來萬山京口立孤舶海門開蜃吸風雷起龍吟日月回鳯城回首處佳氣滿蓬萊上國堪萍梗長江動旅愁天浮揚子樹日照廣陵舟駕浪黿鼉語飛空蜃鱷遊五雲看咫尺臺殿擁神州紺宇三山近皇畿萬堞遙雲藏佳麗國地拱聖明朝玉輦扶雙鳯金甌奠六鼇秦淮今夜月愁倚木蘭橈搖落江天上秋風度李膺來槎真汗漫擊楫豈飛騰紫氣扶天闕明霞拱孝陵鍾山舊遊地夢繞白雲層金山兀立江心寺芙蓉萬古看孤峰留杖錫絶嶠鎖闌干碧湧髙天浪青浮大海瀾妙髙臺上客日暮轉盤桓焦山何年雲霧裡卧此少微星地擁幽人宅天藏處士靈一峰齊北固雙井象中泠向暮風濤起誰尋瘞鶴銘夜同裕卿話舊萬里相逢日那能不黯然移家當暮雪行乞傍寒煙賦豈三都後心猶五嶽前向來溪水曲頻繫子猷船答文父見懷之作不見江西客相望鬢欲絲十年滄海夢千里碧雲思寥廓南華論飛揚左尉辭但令龍劒合那復問雄雌紅雲塢幾夜瑶臺上移來十畝春籠煙千樹密照水萬花新環珮堪留阮衣冠不避秦扁舟如可再長此謝迷津病中文父過訪兼攜近作見示二首豈謂伊人至能令倦客狂千秋誰陸謝一徑且求羊夜色青藜短秋聲白苧長朝來還奏賦不擬步長楊遙遙風雪裡對語欲忘眠爾擅遊梁賦余慙入洛年天浮鳷鵲影城繞鳯凰煙何限金莖色相期漢苑前聞大參滕公擢任嶺南有寄二首鼓角炎荒外旌旗大海傍九霄懸寵渥萬里倚翺翔郡古羅浮雪天空粵嶠霜祗因將雨露沾灑盡扶桑五嶺看乘傳千峯引佩刀春隨南極迥雲擁太微髙霧鱷先移瘴溟鯨已息濤獨憐吳越士泪滿别時袍送劉從事之成都翩翩遊客斾去指蜀門斜夜宿巫山雨朝行劒閣霞古碑丞相廟蔓草拾遺家馹路留題滿頻將寄海涯寄沈山人嘉則二首異代看黃綺明時更許巢乾坤長作客湖海半論交卧憶鯤鵬起吟從蝘蜒嘲玄亭竒字遍吾夢亦衡茅四海聞髙適中林得阮咸嶽雲依短屐山雪灑長鑱夢斷真千里書空漫百函何當明月夜一試剡溪帆嚮計偕聞嘉則以詩寄余未獲寄李本寧督學二首自失華陽社長懷渭水濵傳聞秦博士猶借漢詞臣絃誦千花色襜帷萬柳塵若過中壘宅藜火定誰親聞道三秦使煙花夾道看天髙捫太華日近倚長安散吏趨經幄諸生侍講壇上林應有賦時寄五雲端寄汪仲淹伯仲二仲何為者翩翩鄴下流白雲裁楚服明月攬吳鈎並握揚雄草長陪謝傅遊碧山空咫尺魂夢使人愁寄汪獻于自返金陵客何方定卜居七哀應著咏孤憤蚤成書卧榻芙蓉在衡門薜荔餘碧雲懷望久一悵剡溪魚過吳門不及訪弇州王公寄懷十首屈指中原業誰登大將臺千秋王粲起一代子長來日逺龍樓夢天留兔苑才吳閶雲霧裡相望首重回逸駕開元上雄風正始鄰雲霄誰北斗天地此陽春作賦三都客傳詩四海人未應雙劒老雷電起延津諭蜀傳司馬還吳憶士龍萬峯吟薜荔一徑把芙蓉月落干將倚雲飄太乙從異時成握手白眼坐髙舂渺邈違芝宇風流憶草堂藍田聊卜築緑野暫浮觴日避長庚色天回大酉藏十年翹首地葭菼倍蒼蒼虎觀才俱屈雞林望轉髙千言無彩筆片諾有綈袍夢隔蓬丘樹吟殘閬苑桃何年攜手遂相對咏離騷曳杖辭三島投簪傍五湖九丘窮倚相片語失潛夫鶴唳天門逺鵬摶海色孤近來秋興劇散髮卧菰蘆日月回真想乾坤入夢遊曉風吳苑屐寒雨石湖舟匣底雙龍卧毫端萬象愁亦知三徑好咫尺負羊求貝錦看如昨牛衣卧轉深洞庭寒濯足林屋逺論心落日天邊氣浮雲海上吟吳王臺北望作者自如林此日雲門笠平生漢殿冠一時誰把袂萬古獨登壇嶽色崆洞曉河流砥柱寒尚思燕北社風雨動長安帝惜懸車蚤人看杖鉞雄青山鄖子國白雪楚王宫杜甫名差著靈均曲未工峴臺遺迹在千古擅流風寄張茂才聞道安仁鬢秋風半欲華青囊猶隱市白帢屢移家竺色三天雨湖光萬岫霞絶憐揮袂日相對武林花贈顒上人幾嵗遊天姥經秋住越臺萬山靈隱錫斜日海門杯出定逢花雨傳燈悟劫灰何因偕爾去結宇卧飛來送周少參督餉還楚萬舸通淮泗雙旌傍海涯籌邊王相國經世賈長沙霧擁春臯珮雲停野廟花遙看下車日題詠遍章華哭童山人子鳴二首海嶽誰髙蹈丘園有獨醒下帷頭自白避俗眼長青日慘延州碣風寒鄭圃靈夜臺人近逺徙倚少微星石户真髙隱雲卿此後先一家猶紫閣萬恨已黃泉禪嶽無遺草藏山有太玄向來攜手地悽絶子期絃寄戚總戎聞道嫖姚將提兵大漠間旌旗行漢壁鼓吹出秦關白日雙雕下黃雲萬騎間時同投筆吏乘勝過天山懷歐楨伯博士藉甚中原譽浮沈異代蹤青襟聊宦轍絳帳自儒宗冷日華陽築髙天漢殿鐘祗園春草外猶記昔相逢送王山人遊秦中斗酒山城暮東風悵别離天青遊華日地紫入關時博望千年苑昆明萬古池平生飛動興合遣杖藜知送張茂才北上燁燁張公子乘軺意氣新萬言看謁帝千里獨寧親柳折長安暮花吟太液春寄言關外吏能識棄繻人夏日同諸子宴郭鴻臚池亭分韻得涼字背日山堂午含風石徑涼間來松桂下各把芰荷觴地稱南州隱天容北海狂坐深漁唱發白眼對滄浪寄徐大參西署初迥轍南天復擁符飛芻傳九塞轉餉出三吳海色搖冠珮江雲照舳艫不堪攜手夢明月洞庭孤秋日送陳山人還江右賦得廬山瀑布水萬丈廬山瀑經行照客衣晝看銀海立晴望玉虹飛激浪回丹壑分流出翠微憑誰喚匡續一酌共忘機寄方山人憶爾辭家久秋髙客況增帆當鄱水挂屐遍楚山登夜宿隨沙鳥朝吟伴嶽僧九疑風雪外何處吊黃陵送艾都閫督餉淮上九邊芻挽急飛將豈辭勞獨坐黃龍舸長驅白鷺濤江花明繡箙海日擁征袍橫槊風流在遙天佇彩毫贈𢎞上人昔事崔羅什今逢帛道猷存思馴象下潄齒毒龍愁衲綻三天雪杯懸萬里流吳中四百寺煙雨遍曽遊送天台二僧還西域挂錫同霞嶠歸帆並海涯雲侵秦磧逺路轉蜀臺斜翠竹空中相青蓮定裏花誰知雙大士持鉢渡流沙奉寄王江州六首絶勝匡廬郡分曺暫嵗年髙牙三楚外巨舳九江前日抱香爐上天齊瀑布懸東林秋咫尺一問逺公禪棨戟開雄鎮旌旗列上遊猿聲千嶂色雁影萬峰秋散怢聊公事褰帷即勝遊祗應明月夜長嘯庾公樓豈為干城駐能將一壑專郡僚攜白傅地主借青蓮嶽色含杯墮江流卧榻懸轉看牛斗近雙照莫耶前極目登髙處淹留漢大夫萬家南斗近千里北辰孤虎豹分流徙魚龍夾岸呼可容王勃賦今古擅洪都但覺官曹勝寧知吏牘饒白雲匡嶺樹紅日海門潮酒送陶公醉詩酬謝客招那能望鄉日不過虎溪橋飛動征西節分違薊北盟詞人空碣石才子暫江城綵筆千秋價綈袍一代情向來揮手地忍憶去帆平寄華亭吳少府伊昔回車日囊空但一錢乞身三泖地垂泪五湖天養鶴重開徑烹鱸獨扣舷茂陵余亦病憶爾思茫然題松離離搖碧澗落落俯蒼郊拔地虬龍偃中天鸛鶴巢濤聲寒月上野色亂雲交寂寞徂徠頂秦封只浪嘲徐方伯子與將之江右過訪有贈二首豈謂看山地能令結駟來人非中散卧客是偉長才把袂淹蘿薜行觴藉草萊夜中占紫氣雲擁豫章臺弭節過嚴瀨褰帷問楚臯北風千騎發南斗片鴻髙撫字聲先著登臨思獨豪萬年滕閣賦行矣待抽毫送夀山人飄然滄海客曽事紫陽君袖裡黃庭字囊中赤伏文放舲三泖月攜杖九峯雲後夜華亭夢應同鶴唳聞寄李季宣二首蓋憶曽傾地檣移逺别年千花淮浦浪獨樹海門煙白苧吳郎曲青娥楚客筵廣陵橋上月相望幾嬋娟最憶真州夜臨岐解鷫鸘江風停去鷁海月伴離裝柳謝君平曲花饒杜牧狂吳姬三百輩若箇擅平康少室山房集卷三十一
