body:
  text: 少室山房集卷九十六眀胡應麟撰論十首晏嬰夫春秋之世之亂也而忍言哉蓋君臣之義絶矣晉欒書中行偃執厲公召韓厥厥曰二三子不能事君焉用厥也齊崔杼弒莊公人謂晏嬰死乎曰君死社稷則死之若為已死非親昵誰敢任之韓厥晏嬰夫非春秋所謂賢者哉君父之仇義不共天臣弒君子弒父殺無赦無論其職大小也二子身為大夫驟聞君父之難當率先有衆奉大義而赴之誅元惡以靖國家上也苟不能則死之又不能則去之舍是亡可言者方厲公之執而書偃之召也厥橫身力爭庶幾萬一挽回必不得已猶當致命畢力于嗣主之世而始焉則為克之中立以觀其變繼焉則為盾之比周以怙其終晉尚為有人乎蓋厥也弗臣而悼也弗子矣夫人臣之義食焉弗避其難嬰之食誰之食也莊弒而弗從猶之可也方莊之未弒弗當諫與逮莊之既弒弗當討與諫而弗行與討而弗獲弗俱當去與四者之義嬰亡一焉生食其祿死而置之臣焉用哉夫春秋之世君臣道絶矣以二子之事如彼而世以為賢後世亦卒無有聲其罪以責之者甚矣大義之難眀也豫讓豫讓漆身吞炭以愧人臣之懷二心者讓蓋以義士自許也當其時通國義之迄于今萬世義之乃宋儒蘇氏胡氏直以為聖賢大學之道甚矣其識之陋也余以為讓特刺客之好名者非惟弗知義殆近于弗知耻所持論正以導人臣之懷二心而胡以愧也夫君臣父子一也父有弗子子無弗父君有弗臣臣無弗君孟軻氏論手足腹心報施之道至矣而其言可以訓天下之為君不可以訓天下之為臣可以陳于唐虞桀紂之朝不可以陳于春秋戰國之世以故言出于孟氏而豪傑猶或非之然而曰犬馬曰土芥曰國人曰寇讐其輕重之等較若也夫范氏荀氏滅于知氏知氏滅于趙氏則知氏于范氏荀氏正趙氏之于知氏也讓以衆人報范氏荀氏則二氏之亡仕他姓可矣曷在乎仕其故主之仇之後而且為之盡力也不幾于寇讐之報犬馬之視乎夫瑶之未敗果知之讓擇而事之惡取其知瑶之將敗希爭之讓默而成之惡取其賢瑶亡也可以死矣弗死襄執也可以死矣弗死至再刺而再執也猶不死惡取其勇俾襄子而再釋焉將以刺終乎將以弗刺終乎刺而中胡以見襄子于身後刺而弗中胡以見襄子于生前終止而弗刺胡以自立于天下萬世故吾直以讓非惟弗知義而近于弗知恥也其厪厪焉惜其一死務以苟成其一刺之名而已于人臣於二心奚有也即人臣二心將以讓藉口自逭而又奚愧也然則為讓計宜何如曰死范氏荀氏上也死知伯之亡次也死襄子之執又次也以刺而報其主則已卑卑再刺而再弗行而卒弗死而徒欲以漆身吞炭愧人臣之懷二心者難矣哉樂毅上樂毅不拔二城夏侯𤣥以為庶幾湯武何其陋哉河汾氏從而㬰之眉山氏又從而駁之是皆有疑于毅之不取而未嘗熟察古今攻守之大勢也以吾論之即墨之守不必智如田單而後全而二城之拔非特毅有所不能即力與材倍蓰於毅者未可必也胡不以戰國推之燕視秦鬭士孰鋭毅視武安君起將略孰優下齊七十餘城坑趙四十餘萬震讋孰甚燕之圖即墨視秦之圖邯鄲孰急平原安平之應變孰短孰長智者所了也然起以百戰之威挾秦國之衆乘長平之勢蹙垂亡之趙一圍而不能舉再命而不肻行三迫而甘伏杜郵之劒觀其力拒應侯之請即未必盡然而邯鄲之不易克固昭昭矣獨于毅焉疑之可乎夫齊之與燕勢相軋也單之與毅略相等也然而主客異勢怠奮異心重以嗣主狐疑鄰國反間亡臣合力戰士思歸騎劫之代蓋毅有天幸焉不然其能成師返哉故吾謂即墨之守非單亦全二城之拔非毅所及而論事者必灼見古今攻守之大勢而後可也樂毅下甚矣攻守之勢之相懸絶也故守者將有不必才兵有不必衆而攻者將之才有無所用而兵之衆有無所施夫王莾以百萬圍昆陽也而殱隋煬以百十三萬圍平壤也而潰此其兵莫衆矣則曰將非才也孔眀以十萬圍陳倉而不拔孫權以十萬圍合肥而幾擒此其將莫才矣則曰兵非衆也光武悉漢將之良以圍天水而折北神武悉齊兵之鋭以圍金墉而殞身此將非弗才兵非弗衆矣則猶曰敵堅也拓拔英楊大眼以四十萬圍鍾離而隻輪不返郭子儀李光弼以六十萬圍相州而九帥盡奔此將非不才兵非不衆敵非不脆矣則猶曰救至也至魏太武屯百萬于宋唐太宗聚天下于遼則不惟將之才絶古今而且帝矣不惟兵之衆極海宇而且精矣王莾隋煬兵未必精加以盱眙小城安市夷帥敵非勍也義隆膽破延夀望風救已絶也然而卒自解者何以故也故曰攻守之勢懸絶甚也有善守則無善攻也而况乎樂毅之將燕昭之兵而攻乎田單之守若之何二城之可拔也而夏侯氏以庶幾湯武然乎否哉趙奢自山東遭秦禍諸侯之得志者三而蘇氏之合從弗與焉孟嘗之臨函谷也信陵之存大梁也趙奢之救閼與也孟嘗信陵俱貴公子率列國以攻秦獨奢起小吏提孤軍大破秦師其事甚偉功甚竒而讀史者忽焉第知奢之勝而已而所以勝弗知也當秦之圍閼與也惠文以問亷頗以為難救何哉閼與之地秦韓趙三國之交秦攻韓而移兵閼與蓋出趙之不意也而趙始發兵救之令秦也據險以拒趙若魏太祖之屯柴壁則趙師阻令秦也扼險以要趙若唐太宗之襲美良則趙師殱二者皆曉兵所忌而頗位趙上將氣聞諸侯固不肻輕用其名鬭成敗于鼠穴也奢則未嘗有戰伐之勳一旦欲翹然自樹勢不容不出死力以見其竒而奢方拔自細微又易以愚秦耳目于是頓兵邯鄲增壘以示吾弱而弛敵之防堅壁以蓄吾威而俟敵之間至于二十八日之久彼師已老而我師方壯然後乘秦之無備而卷甲以趨之彼欲拒吾於險之外而吾已入欲邀吾於險之內而吾已出比秦人悉甲來攻而吾壁壘已成士有必死之志以久蓄之鋒乘初至之鋭勵必死之勇以馳乎疲勞暴露之師此其廟勝之勢在趙在秦不待智者而决矣或曰奢之勝厯之謀也厯所謂厚集其陳先據北山皆兵家之常偶合于奢而奢用之蓋奢之勝而非所以勝也奢受命出師勝秦固燭鑑焉而俟厯乎哉然則亷頗之議失與頗秦所忌奢秦所易也奢將則敵信而弗疑頗將則敵疑而弗信故奢之事頗雖勇有弗能行頗之言奢雖勝有弗能奪也夫道逺險狹頗之言誠未為失而括也長平大衄亦父奢閼與事狃之悲夫趙括上白起坑長平四十萬古今以罪趙括輕躁寡謀可罪也而長平之事則大有難言者世襲故常類以括為妄庸豎子則弗考之甚也何者四十餘萬之衆匪易御之師也四十餘日之圍匪易支之困也使括也而果妄庸豎子若宋義劉秩李元平輩將鋒交即潰曷能以其衆戰耶將伏發即殱曷能以其衆守耶以四十萬之兵陷必死之地壁四十餘日之久而無一叛者至括死而後降則括之為括可知也括當時所與援桴對壘何人哉秦兵之强天下靡敵焉白起所擊天下靡堅焉彼且因失地之忿勵用壯之師非閼與之戰兵無名將無勇者比也當起未將而頗之禦齕已惴矣洎乎武安既出秦掃境以濳屬之而其王又親至河內發稚弱以趣之蓋不啻宋人所謂空國而戰者噫嘻當其時事勢之亟何如也吾以即信平弗代而馬服復生未易云也夫括也果若李元平輩則一王齕舉之矣而胡以必起以寡擊之以正擊之亡不可者而胡以用衆而胡以用竒且一朝食滅之矣而胡以若是久也惟將而必起而必用衆而必用竒而括之不得為妄庸豎子也審矣趙括下秦之縱反間也苐欲將括趙卒將之而括卒覆其軍胡秦之巧趙之拙而括之愚也當孝成之受上黨也議之平原以亷頗當起其策之亦審矣及頗失亡堅壁孝成讓之而秦間之入直以頗為易與且降頗也將四十萬之衆外創于敵而內迫于君是章邯巨鹿之勢也縱頗之才足以堅守趙之君臣而聞斯語其能無矍然動哉而當其時孰可以代頗者馬服死安平亡李牧方保塞未知名蓋六國之將舉亡任此不獨趙也獨括素喜兵時亦以能將歸之而先是父奢又嘗代頗却秦故孝成平原驟舉之而不惑也夫秦之利在去頗不在任括趙之失不在任括在廢頗頗代而四十餘萬之命已懸于白起之手矣方是時趙之夙將頗外樂乘龎暖二子而已趙不將括而將二子未必不為芒卯扈輒之續而其敗或速于括未可知也括堅守四旬而救弗至而卒以身死敵雖不足以贖其僨軍之罪較之誤國而降者猶有間也而世之罪括甚于趙葱騎劫而孝成平原夷于王遷郭開余是以悲之韓信神矣哉漢髙之智也其智之神蓋不惟顛倒一世且籠絡萬世而愚之夫韓淮隂之反不反于武涉蒯通之說而反于擊狶豈人情哉自史遷文致獄詞世遂徒惜其功大而弗克終至稍名能扼腕者又率以髙自將而蔽罪于后雉此淮隂之寃所以亘古不白而天下萬世咸籠絡于漢之術中而莫悟也髙于當時所深惡而劇畏者籍耳信耳自臨淄之乞封與固陵之割地髙之亟欲取信曷嘗一日忘之乃至垓下之戰蹴百勝之楚于掌股之上而立致其亡髙之所畏而惡且不在籍而在信而信方孑孑然抱其微誠今日却武涉眀日辭蒯通以漢終不忍奪我不知楚旦亡而已且暮及矣夫奪信齊而徙之雲夢猶置蛟龍于大澤而日虞其騰也奪信楚而居之咸陽猶柙虎兕于髙堂而日虞其攫也蓋漢之縛信不待陳兵之釁信破籍而陳平之謀已策矣漢之戮信不待家衆之誣髙擊豨而蕭相之禍已成矣夫豨匪布越伍也所將固徑兵而翺翔趙代為漢疾埒諸疥癬而信則漢以腹心虞之命將擊豨周勃灌嬰輩比比足任髙也其胡以舍信于近而事豨于逺也信功大而材髙廢不以罪海內功臣已人人臲卼而髙之積慮必戮信始安戮之復不以罪則功臣愈危而髙亦亡以自解于天下萬世即聲罪戮之猶或慮夫世之投喙于我也則無若自將以擊豨而推后以戮信夫然後罪信者咸以失職怏怏罹禍致疑間有矜信苐以雉一婦人不當顓戮而髙也竟遁之乎是非衮鉞之外於戲此淮隂之寃所為亘古不白而天下萬世咸籠絡于漢之術中而莫之悟者也夫淮隂之愚于漢吾不暇惜而天下萬世咸愚于漢而莫之能悟則吾之論有不容祕之終身者矣關忠義余讀陳夀書至關忠義之走麥城未嘗不掩卷三嘆也蓋漢事至斯遂無復可為者矣王長公謂荆州之失昭烈與有責焉當忠義破襄宜遣孔眀益德帥精甲數萬控扼江陵遙相首尾庶乘魏之衄而伐吳之謀其論甚卓而夷考時勢則有不遑及而且有不必然者先是劉封孟達屯戍上庸侯始圍樊纍趣發兵而二人銜其矜髙堅閉不出以致徑路斷絶迄墮吳寇之奸當南郡既失麥城孤危二人罄兵風發赴難即亡救荆亡何至忠義父子駢首淪胥致古今一大扼腕哉若昭烈之不預遣孔眀益德非委侯也三蜀甫定驚擾不常如魏衆所傳日斬數人而莫能靖孔眀固未可旦夕離益德破張郃鎮閬中移軍逺出郃必乘虛來冦亦非所以敉輯巴徼總之時勢未遑然俾昭烈逆計侯之安危則寧舍巴蜀而援荆之師有不俟終日者要以侯方乘勝而南郡匪旦夕可下或小有利鈍上庸密邇足相應援詎意封達外訌芳仁內叛瓦解土崩至于斯極也耶夫漢事可為僅僅侯威振華夏之頃而一跌至斯此吾所為三嘆流涕欲磔呂蒙之尸于千載之上者也龎德古人云死有輕于鴻毛者其龎德謂哉德之于蜀以故誼則主超在焉以天倫則兄柔在焉何親于魏而必附之况德既食張魯之食矣魯滅于操則操者魯仇而德委質于操以終其身其視忠義守邳見執曹氏間關萬死故主是求至竟立效報曹而後去者其人何如也且也中山帝室之胄海㝢所知德豈有胸無心者流顧捨正統之昭烈大節之雲長而奮臂螳螂致命篡竊方其就戮雲長親諭之降而惡言抵觸自蹈天誅據德所云魏王帶甲百萬等語徒以操凶威虐熖雄視四方詎復知所謂順逆邪正哉操一天下德且為上佐為元勛彼區區一死未足償其助桀之罪也而矧乎其為助操也少室山房集卷九十六
