body:
  text: 少室山房集卷十七明胡應麟撰五言古詩二十八首婺中三子詩有序三子者劉參軍峻沈僕射約駱侍御賔王也孝標以流寓休文以宦遊賔王以起義出奔他郡迹三子始終無論隱侯即劉駱二君未可以婺槩者第吾邦文學三子實首倡之則婺雖一日之過猶其湯沐矧其生于斯仕于斯沒于斯也夫休文達矣孝標賔王則窮乃其風節矯矯咸足重婺余既為白諸學使蘇公則復櫽括其槩並隱侯為三子之篇亦以余之窮有相類者匪曰氣味之合已也嵯峩婺女郡星斗垂寒芒寥寥曠千載氣運開齊梁劉生實天啓乳哺隨髙堂翩然自北來燁若孤鳳凰讀書紫薇岫一目逾十行山棲表逺志絶交廑中腸千言走珠貝七録披琳琅含毫䇿錦被倏忽驚岩廊遂令世主忌坎壈終詞場龍蛇諒斯在鴻鵠詎可量矯矯七尺軀恥為萬乘降胡然際悍室妖牝啼朝陽潛身嘆孤犢跛足追亡羊太息敬通論今古為倣徨劉困于悍室轗軻終身常著論擬馮敬通見史余每太息云右劉參軍孝標仙李方二葉九廟摧妖狐刳剝盡生靈宇內無完膚嶽嶽臨海公奮袂起菰蘆義旗舉大澤百萬當一呼虹霓切雲漢雨澤滂泥塗操我七寸管問彼六尺孤片言嚇淫牝一戰梟羣奴惜哉下阿戰倒甲如摧枯奇功固罔立大義差足扶披緇入靈隱覔句酬跏趺金鎚隱博浪巨軸流江湖固知藝文傑詎曰器識疏一辭道王辟無忝令伯徒至今讀遺草激懦開頑夫駱沒後詩文散逸郗雲卿搜録餘剩梓之余别輯駱氏忠孝傳詳載右駱侍御賔王六代更廢興文士故不乏奮迹驚才賢乘時見髦傑猗歟沈隱侯文章何燁燁騁望遊中台違情守東越珮玉辭岩廊鳴金下閶闔沿泳雙溪流遲徊三洞穴會圃臨春風登臺望秋月引沈原句旌斾俄飛揚劍履倏騰踏一代懷龍門千秋仰驥秣四聲啓後流八病表先達盡剖洪荒祕卓為藝林筏儒生互雌黃志士競鈇鉞寥寥數千載風流竟誰越豈伊腐草流塵土共澌滅八咏綺習本非絶塵然四聲之傳足俟百世右沈僕射休文二懷詩有序二懷者張進士子同姜禪師德隱也一遁于仙一遁于釋固薦紳先生所不道然唐婺中詩流自駱丞而下必次及焉即調或卑卑固時代使然矣夫志和浮家霅上而休公駐錫川中蓋二君亦非老于婺者豈賢者避地自昔共然將詞人多窮迄今尚爾耶夫余亦有逺遊之思而未得其挫名之術也故于二君咸沾沾有遐慕焉有唐迄元和畸流尚不之翩翩𤣥真子百代恣漁獵雅志游松喬奇蹤軌莊列嗒爾柱下言超然謝津筏富貴輕鴻毛軒冕等澌沫一辭世主聘浮家老苕霅右𤣥真子張志和唐末緇流空休公崛然起卑卑局晚調兀兀吐𤣥㫖冥心師楚圓苦思叶齊已禪啓天竺詮畫妙應真理片言忤大帥脫身錢塘汜一鉢游岷峨逍遙入無始緇流談禪盛極唐术然文彩頓乏矣休公畫理入妙應真今傳右禪月大師貫休婺七賢詩有序七賢皆婺中先達宋元以來文學士也吕太史雖一代儒宗顧其實有不可盡泯者屈就兹列焉於越稱上游婺實文獻域唐末何式微宋南復中闢太史雖儒宗詞華蔚天植惜哉掩藝成端居聖門籍右吕太史伯恭同甫真人豪矯矯謝拘局寧為躍冶金肯作瓦全玉四上阜陵書十返紫陽牘至今華川陽英氣貫嶽瀆右陳狀元同父與正頗負奇翩翩孝皇代作吏𢎞風流經國紀鄉遂世尊考亭疏迄掩干城鋭細行誠足矜大德豈終纍右唐刺史與正侍講起勝國舉代推詞場髙蹤峙虞揭遺躅開宋王遂令婺女顛光焰萬丈長韓語惜哉駱劉緒緬邈空梁唐侍講元倡宋王繼之然風雅一途猶三舍也右黃侍講晉卿文肅興閭閻揮毫走當代文事既渟泓儒宗亦映帶毫濡瀫川涘研滌浦陽瀨一傳太史公粘天決千派右栁文肅道傳金華本學藪淵穎彌鏘鏘潛心事大業奮志遊羲皇一命詎足榮千秋在文章鴟鳶亦奚事腐鼠矜鸞凰右吳山長立夫元季多奇人出語必驚衆山川縱吞吐造物時簸㺯魂夢遊玉樓敲推入醋甕嗟彼龍豹姿甘為鬼才用右陳隱居君采邑三賢詩有序余邑當宋元得賢者三人皆深於經術不可以文藝盡之乃其著述班班足考鏡也作三賢詩俾毋以質掩其文焉濯濯香溪流汀洲雜蘭芷之子懷清芬南渡勃然起大隱𢎞髙風真修味𤣥㫖遺文詎必多一臠見嚆矢邑有文集自茂明始今香溪舊刻尚傳右范隱君茂明吉父英雄姿夙負濟時略不受帝王知遂工賢聖學著述逾三車卧遊厯五嶽至今尚典刑遺像儼丹雘右金文安吉父煌煌禮部公執㦸隱金馬憐才若饑渴片善必揮灑餘日酬詩歌居然振大雅世無揚子雲誰為好𤣥者正傳著敬鄉前後録禮部詩話等編采掇故實勤至亡比右吳禮部正傳讀國初四君遺集有序文章國初越最盛越中婺最盛浦陽義烏金華三數君子者雖風調沿襲宋元而淳龎敦大蔚然開一代先李獻吉云金華數子真絶倫非溢語也詩歌稍左次當行亦往往有足觀者余讀四君遺集慨然其人人為四韻以識余臆猗與太史公振代見才傑百氏勤雕鎪二典恣漁獵雄章發天造大手揚帝烈至今藝士林冠世推閥閲右宋學士景濂忠文起草昧弱冠宣王猷雄才動宸寧大節揚蠻陬肝腸凜鐵石毛髮如懸疣巍巍文士烈燁燁垂千秋右王忠文子充奕奕空同生名家出華右雕龍擅制作繡虎威百獸才啓北地先裔屬潁濵後遂令赤松頂峨眉鬱同秀平仲潁濵九世孫亦號空同子在獻吉前右蘇內翰平仲才賢萃吾婺仲子維吾宗雙溪濯蘅杜三洞捫芙蓉霜蹄縶百里天門恨九重寥寥信安集一臠窺良工仲申所傳信安集甚寥寥讀者不無遺恨云右胡教授仲申宋王二雋篇有序宋文獻有子曰璲王忠父有子曰紳各以少穎知名璲書法為國朝第一惜夭折中道而紳以孝行蔚然光紹先人皆匪可文藝一端盡者并識數語為二雋之篇浦陽既龍躍華川亦鷟起有雛必九苞為駒日千里飛翰灑玉樓重繭厯金齒太息承家風寥寥墜蘭芷仲珩書絶少詩僅數篇王氏繼志集亦罕傳者右宋璲王紳存沒篇四首有序粵黎梁歐三子洎吾鄉子與方伯皆余忘年交也都門一别梁徐相繼下世僅黎歐存爰敘四子為存沒之篇黎公産嶺表宛若荆山璞沉湎偕步兵滑稽類方朔一官寄長安十載卧𤣥閣悠然太古民相對忘寥廓右黎祕書惟敬嘉隆振雅道徐君實天縱翺翔五子間燁如九霄鳳維昔平原館如澠為余頌倏為岱嶽遊能無山陽慟右徐方伯子與燁燁歐楨伯人倫挺奇邁宦遊三十年囊惟一氊在大隱留金門遐悰寄塵外把臂慚後時論心乃前代右歐博士楨伯太息平生交梁鴻遂長夜憶昔長安遊屢命千里駕遺冢鄰要離修文佐卜夏羅浮四百峰望爾涕交下右梁內史思伯寄吳門四子詩有序王承父屢訂余入訪烏鎮至則葭菼茫然無復問津處過金閶適周公瑕與客遊天池泊崑山覔王世周寓婁江覔曹子念皆出謁所知矣遂各為一章寄焉公瑕布衣俠夙習游鍾王珠璣耀千裔琬琰被八荒詩篇匪細事一一追三唐希聲豈諧俗太息雲門章右周文學公瑕東吳菰蘆中乃有如此人形骸若象罔富貴輕浮雲含毫役萬彚混迹游風塵笑我何太拙白首攻𤣥文右王山人承父曹生滑稽雄自稱子建後鬚髯河朔豪翰墨江左秀康伯惟令甥楊惲實賢舅為憶兩琅琊哀涕泫清晝右曹山人子念藝士工浮儇末俗寡淳質自與王郎遊恍入華胥國錦里餘角巾臨邛有立壁一誦次公言千秋白虹泣右王茂才世周少室山房集卷十七
