body:
  text: 少室山房集卷四十三明胡應麟撰五言排律一十七首留别胡茅兩生十八韻有序僦居易水邂逅胡生瀫元茅生厚之遊處甚洽胡生家有臺榭池館余時時攜書帙坐臥其中門庭蕭然俗賔都絶茅生一室不盈斗而長者車轍紛紜道傍余屢入都門駐易水問黃金臺故迹僅僅荒丘蔓草以為擊築狗屠當不復覩今代何意兩生者伉爽俠烈儼其遺風兩生亦嚴事余朝平原而夕河朔或時挈粉白黛緑縱遊西郊東郭間至精廬佛閣一二浮屠善名理者暇日相與煮淡麵談真空生平壯心賴以耗磨銷釋且將卜居其畔挾二仲為終老計焉亡何余以家大人微恙室人趣駕南歸兩生送余河梁之上誦賈長江却望并州及王中允陽關西出二詠泫然哀涕集於衣袂因稍次第一時過從陳迹為百八十言寄之異日者舴艋山隂道上訪兩生舊宅于剡溪風雪中即不見安道主人當毋訾子猷之興盡也兩生皆會稽人相逢燕塞晚共指越山隂問姓知花萼忘年是竹林踟蹰談異域舒豁快同心樓觀飛青藹軒忩護碧岑關遙停紫氣臺逈貯黃金海上來三鳥池頭戲五禽雜芳羣爛漫喬木半隂森大業堪霞舉雄圖尚陸沈含毫霜色墜秉燭露華侵日日平康燕時時笠澤吟荒郊雲共逺野寺月同深愛客呼珠勒尋僧抱玉琴茶當流水瀹酒傍亂峯斟劍合延津畔帆催潞水潯凄凄臨去袂惻惻乍分襟爾自耽玄寂吾寧嘆滯淫驪歌南去路鴈遲北來音何處懸青夢空階臥緑沈胡尊人任北平參戎而茅君父為之記室故結語云云四明沈孝廉士安甫弱冠詞筆翩翩而丹青音律咸入妙解邂逅武林甚契賦贈此章桂籍誇年少蘭心託漫遊霜蹄寒照夜風翮健凌秋意氣狂昭略腰圍瘦隱侯筆搖鸚武座簫引鳳凰樓白練書屏腳青繒畫扇頭應知鵲橋畔計日待牽牛秋杪渡江望金陵有懷惟寅少保并寄訊小侯汝藩八十韻乍喜風期洽那知道路長倉皇馳海國躑躅問河梁興盡燕山下魂銷碣石旁肝腸縈聚散涕泪逐行藏此日旋車地當年擊築場陸生元入洛枚叟舊遊梁挾䇿逢王翰論交得孟嘗金蘭投管鮑膠漆重求羊俗詫相如慢公憐叔夜狂髙歌神踴躍劇語興飛揚爾汝頻相喚形骸欲對忘聯鑣遊太液襆被卧長楊玉麈晨南陌珠簾夜北堂西園偕嘯傲東郭並徜徉傑觀捫鳷鵲層城躡鳳凰登山題翠巘臨水和滄浪藝圃千秋擷詞林一代翔希聲傳魏晉麗句薄隋梁屈宋交凌厲曹劉互頡頏光芒騰李杜藻繪飾岑王冶女青絲盒奚童赤錦囊金尊筵燦爛銀燭座熒煌浩思凌先哲玄心揖上皇雙鈎聯拱璧寸楮擲琳琅露砌行紅藥風簷坐緑篁霜華蘭桂楫月影芰荷裳夏驛馳山荔春郊綻海棠池餐菱芡碧籬咽菊花黃痛飲誇司户清齋詈太常百觚豪未厭五斗劇難量潦倒投車轄淋漓拭劍鋩行廚羅鼓吹步障夾笙簧宴樂前期盛升沈末路詳碧霄看起鳳丹璧笑騎羊志業乖鵬鷃頭顱狎虎狼賔朋違杜曲黨與析華陽故里嗟囊藥修途問褁糧韶光同代謝土俗異炎涼楚越天迢遞燕吳地渺茫丹青求傅説圖畫失王嬙嵗月蓬蒿度朝晡橡栗嘗登壇名嶽嶽飲泌樂洋洋僻巷開蘿徑深居搆藥房簞瓢懸絶壑蓑笠憩橫塘厯落悲鴻漸翻飛覔鴈行攀龍時剌謬捫虱事尋常雨雪紅顔瘁風塵緑鬢戕乘輿留夜白伏櫪夢飛黃邂逅逢髙座參差集上陽披襟逾慘淡把臂各倣徨動色談傾蓋關心念對床山陽全喪逝鄴下半存亡社冷餘春雪臺荒翳夕陽七哀盈大宅萬感熱中腸道直躬如髮勛髙背若芒孤誠疑博陸百戰忌平陽息壤閽誰叩中山袂易攘辱曾虞醉尉名尚怖降王是處囚安國何人雪冶長少卿寧負漢太白詎逃唐璞會明和氏珠應合孟嘗前孟嘗乃戰國四君封號此孟嘗人姓名合浦令也餘生饒舌在九折鬬身強鐵騎間沙漠金雞放廟廊逡巡生馬角指顧脫魚腸燕頷封仍在鴟夷泛未遑言歸衷戚戚惜别恨茫茫落景浮清渭飛雲動太行上書回令伯陳啓急賔王羽翼分岐路風標限屋梁瓜田情鬱鬱菽水思皇皇野岸氷澌結關城露色瀼重來期阮肇再入待劉郎短䇿朝馳驟長謡暮激昂愁惟傾白墮夢幾熟黃梁廣漢懷捐佩清溪戀釣璜杏花源上客桃葉渡頭娘漫説幽期誤終知勝會償三山停鹵簿一水下帆檣養鶴新禪院啼烏舊女牆盈盈白門月萬里共相望惟寅所居地近杏花村在白下淮清溪北送沈純甫司馬還就李十八韻祖帳燕城外仙查潞水濵挂冠辭日月投袂出風塵節槩虞翻亮心期賀監真五湖深買宅三輔劇埋輪磊落千言疏嵯峨萬折身羅浮雲喚客大庾雪迎人絶徼孤行戍長途數問津鴻冥初返越鷟舉更遊秦劍氣雙鈎躍爐香八座親才髙元誨忌道直嘆無鄰勇退占賢達遐思悟屈伸金臺馳駿骨玉陛盼龍鱗黃菊浮村艷丹楓抱驛新暮嵐藏嶺樹秋色露江蓴北斗名逾重東山望未湮列營屯虎豹飛閣耀麒麟赤舄應無棣玄纁自有莘沉沉合宫夜前席候經綸花燭詩十四韻蜃脂仙音妖燭三事俱散見唐人小説中春色照房櫳迎親夜正中杯光才泛緑燭影驟搖紅絳蠟傳唐陛青煙出漢宫開花疑蒂並結蕊驗心同滑膩頻消雪輕盈半受風流輝呈瑞露吐焰發晴虹玉樹前階並金蓮後院通紗廚螢燦爛綺閣蜃玲瓏引鳳來丹穴乘龍下碧空蘭膏焚易徹桂燼落難窮巫峽雲飄蕩藍橋霧鬱蔥昭陽明舞燕洛浦炫驚鴻妖魄藏逾媚仙音奏未終良宵恣歡洽朝旭漸曈曨龔使君合祀供奉拾遺於任城紀事三十韻有序濟上故有太白樓及杜陵南池云兩拾遺常客其間嵗久皆頽沒荒草乙未之春晉陵龔觀察子勤來蒞兹土不逾月修葺繕治翼然更新仍别為祠合酹李杜其中余既幸兩公以羇旅遭逢異代且快睹觀察斯舉有大造于詞場也輒賦其事為五言三十韻以並致髙山之仰云齊東浮大澤濟北滙飛泉亭古淹詞客樓髙卧謫仙聲名偕宇宙藻繪劃星躔奕葉流風謝沉冥厯數遷芳塵誰想像故迹重留連有美延陵季神交百代先韶顔舒彩翮綺嵗奪青錢磊落王褒頌洸洋曼倩箋金羈遊太液玉珮侍甘泉絳闕恩光動黃堂惠澤宣吳峯翔省署越水襯樓船謗牘初辭魏除書驟發燕虹霓流鹵簿雪霰耀戈鋋意氣中原盡心期大厯偏行春懷勝躅吊古惜名賢嗟咄崇祠樹熒煌巨碣鐫丹青塗傑搆俎豆飾長筵衛竹縈忩徑秦松夾座鮮緑蘿垂蒨峭紅芰浴淪漣西陸回真氣太白自稱隴西南池薦舊篇延津龍劍合海嶽鳳毛聯白鶴云亭上蒼虬泰岱巔並懷和氏璧齊奏伯牙絃是處憐方駕何人快著鞭蹉跎投賈賦寂莫問揚玄未授楞嚴記空留道德編壯心斜日外愁色斷雲前慘淡論交臂蒼茫失並肩沙棠停畫鷁隴樹咽寒蟬萬古如澠思長歌酹碧天齋頭春草和相國趙公徑草積如裀蕭疏斷俗塵不隨金谷艷長占玉堂春繞砌青疑滴當忩緑漸勻霏霏煙色麗燁燁露華新細雨留征斾斜陽逐畫輪西堂偕夢弟南陌伴攜賔靜對談玄客幽逢覔句人榮枯憑樂育生發荷陶甄太液皇仁布平津相澤淪為將庭卉意九域播洪鈞寄景陵徐使君三十韻有序徐初以宰邑異才最天下後數更盤錯所至有非常稱近又鑿淮上新渠底績云七澤浮真氣三湘兆異人虹霓流藻繪海岱入經綸洛下名先著河東賦蚤陳朱衣馳棘院赤舄上楓宸碧漢摶雙翮潢池沸萬鱗笑談清宇縣顧盼出風塵楚璧騰輝舊燕金動色頻花封移愷悌蘭署贊清寅枚叔聲華艷文翁治化循分符勞漢吏約法諭齊民皂蓋明雕轂朱翻結畫輪黃山遊汗漫白嶽駐逡巡里閈蒲鞭洽郊原竹馬馴孤懷吟嶽麓逺思逐峨岷綬解防消渴簪投習隱淪春眠髙隴樹秋擷大江蘋帝夢徴良弼朝思問鬼神榮光浮紫極厚幣出青旻淮甸褰帷入徐方列戟巡滔天勤哲后敷土急賢臣雨雪偏乘橇風濤日算緡決排羣議劑疏鑿衆材掄逺利超三䇿殊功羡十旬忘家心匪石憂國鬢如銀白馬初沈日玄熊創覩晨休禎符鸑鷟異相卜麒麟南郭竽真濫東方篋轉貧窮愁嗟阮籍厯落誚桓倫鶡敝仍居魏貂殘重入秦防身雄劍在夜夜拂星辰題陸履素使君兩朝八命册二十四韻黼黻開金殿絲綸下玉除蒼龍雙御極紫鳳八銜書睿藻飛岩穴天恩湛里閭虹霓懸巨軸駟馬集髙車五世環投雀三朝珮映魚機雲人望切遜抗吏才舒試縣催鳬舄専城列隼旟朱絃鳴淅􅅹黃綬曳清虛鹽鐵初裁論緡錢乍榷儲桓寬文彩耀劉晏䇿籌攄煮海心聊繫看山興自如登壇攜大筆倒屣納長裾雪夜船移戴風晨榻挂徐名流饒吐握寒士極吹噓西竺時參梵南屏或叩漁蛟宫鑱錦貝鷲嶺簇璚琚河內賢勞劇淮陽嵗月除達人齊久近明主惜居諸雲霧披丹闕奎躔煥石渠殊榮喬梓並逺思蓼莪舒棘寺騫騰外槐堂盼望餘千秋未央詔永永賁幽墟大參維揚張公過訪武林旅邸中賦贈十六韻淮海生人傑翩翩第一流氷壺寒照夜霜鉞淨含秋大樹榮東國甘棠匝上遊苕溪頻駐節蘭水半維舟五馬追風電雙龍射斗牛新裁玄草社舊詠白蘋洲器宇司空並聲華博望儔星芒朝帝闕日彩扈神州下士輸青睫論交異黑頭懷珠玄俗傲抱璧卞和羞潦倒親長鋏殷勤拂敝裘湖光芒履盡江色布帆收肱在餘三折腸回劇四愁孤誠懸海岱片諾重山丘指顧排閶闔參差侍冕旒黃金未央詔行見出燕幽題寄亭十四韻祝山人别號也寂寞談玄第何人重起豫雲霞雙草屩宇宙一蘧廬供奉神遊外蒙莊物化餘踰垣時學段懸榻間留徐緑綺孤琴奏青緗四壁儲那知金是谷寧羡石為渠白雪流湘瀨清飈扇舞雩雙林來梵釋六洞過樵漁芳草從滋蔓飛花斷掃除尋丘縈薜荔尺水漾芙蕖甲子初周白春秋正及蘧曲肱聊寤寐容膝暫踟蹰大隱依泉石中行在里閭吾將戒行轍蚤晚賦歸歟問歐楨伯訃八韻有序楨伯以是嵗大耋余方圖寄一詩而訃至交遊垂盡衰涕泫然尚憶黃冠嵗扁舟向若耶青牛埋紫氣白鶴隱朱霞劍合延津畔楨伯最善惟敬今俱岱遊竿留渭水涯年政八秩翻飛神武闕寂寞廣文衙逸駕開元逝鴻裁正始遐髙原騰雉兔大澤返龍蛇庾嶺梅空折羅浮桂漫芽惟應蒿里月夜夜慘霜笳柬相國趙公二十四韻有序相國趙公乞休章十數上而聖眷愈殷凡其投夢林泉寄情澗壑者具悉懷山諸咏中不佞既倚韻遞酬邇復示我歸興十絶翩翩然神遊八極想因竊取其意為長律二百四十言八極黃扉上三台絳闕前夔龍扶舜日稷契在堯天磊落熙朝佐飛騰命世賢經綸侔董相學術邁彭宣虎觀無雙對龍墀第一傳直聲朝野震徑節廟廊騫吏隱羅浮僻春生大庾妍朱明留巨碣勾漏覔真詮六洞深回轍雙溪獨扣舷桃花人代隔栁色嵗時遷雷電驚千域風雲動八埏敷文毗夏后奮武翊周宣絶島憑陵日雄邊覆沒年謨謀羣䇿聚籌略萬夫先撻伐過平壤芟夷遍赫連吳綾貂帽渥蜀錦獸袍鮮賜屢馳中極心長繫太玄赤松遙入夢黃石驟忘筌浩蕩皇情注優遊聖澤綿謗寧傷薏苡名轉重蘭荃雅量乾坤小孤忠社稷懸鳴岐仍鸑鷟釣渭正鷹鸇海晏知難俟河清詎偶然轉將良弼夢移告北山巔題瀛海長春册代大中丞河間劉公家門貴盛冠冕一代乃二親偕登大耋尤近代希有者敬賦長律二百八十言南極呈輝夜西池設宴辰遐齡曾覩伏間氣重生申大府俱三事髙堂並八旬棠枝聨竇桂萱萼競莊椿淑問馳邦媛英材降嶽神懷中金紫客掌上玉堂賔彩日鳴雙鳳丹霄躡二麟機雲慚末駕尾雅鬬前身學士羣工艷中丞百吏寅絲綸懸宇內節鉞樹江濵苦縣藏書富華陽授籙頻蟾蜍流月窟烏鵲渡天津象服彤墀下龍章絳闕陳岩廊交黼黻里閈集簪紳賦擷梁臺彥謳騰越部民歡聲羅甸服喜色動城闉黃鵠屏間戲蒼虬户外馴尊罍浮竹葉絃管沸花茵霧隱偷桃孺霞明種杏人圍棋邀謝傅投轄駐陳遵將相庭階植師儒禁闥掄十州環撫御八表俟陶鈞雨足耕莘耜雲間釣渭緡優遊黃髮皓容與白頭親握算躋恆華添籌邁劫塵劉樊偕混俗孫馬互全真解珮虛臨漢吹簫謾入秦綿綿瀛海上寶厯慶長春夀何太史啓圖六秩二十韻時尊人亦以是嵗八旬間氣生申日靈圖出洛年春秋曾五百甲子又三千閥閲聞當代弓裘嗣昔賢凌雲懷舊賦却月和新篇弱冠遊中祕清朝臥太玄帝遴金匱客人艷玉堂仙夜被吳綾薄春袍蜀錦妍蓮燈移大內藜火揭髙天玉座星辰綴瑶臺日月聯參差朱綬下次第白麻宣鳳起垂雙闕鴻冥驟八埏振衣王屋霧飛蓋鄴城煙墅卜藍田下堂標緑野前琴樽芳草靜枕簟落花鮮蘭桂階庭合桑蓬户牖懸寰中呈上瑞象外得真詮黃鶴峰頭駐青牛洞口旋浮丘晴旭近函谷暮雲偏突兀珊瑚樹輝煌玳瑁筵西池流寶液東壁煥琅編白石圖空兆蒼生頌久傳車輪馳上國舟楫濟長川姓字旗常耀勳庸竹帛綿還將大椿夀一代庇凌煙送王水部之錢塘乍捧周王檄言乘漢使槎賦掄新竹箭吟戀舊梅花海曙占霞色江明逗日華樓臺籠紫氣城郭護青沙故國吳都稻春山越井茶應知苧蘿艷十載抱溪紗詰朝雪不解再柬永叔黃門二十四韻并邀同賦密霰三冬集玄雲四望同迷漫屯巨壑浩蕩布長空拂曙光交映連宵勢倍雄廉纎時雜霧淅􅅹暗隨風漠漠緣堤厚霏霏入塹融重隂浮海岱積素暈河嵩擬絮情殊愜探梅思未窮凍埋深浦竹寒折大江楓逺渚拳飢鷺荒陂匿斷鴻貂殘秦塞上鷁返越溪東沾濕全妨舵傾敧半壓篷羣呼憐榜豎獨釣羡漁翁爨擁孤煙白爐煨宿火紅衾裯屏障外几簟畫圖中翠管徐聞笛氷絃驟拂桐褰簾珠錯落振珮玉籠蔥石鼎龍涎泛瓷甌雀舌鎔錦袍狂太白彩筆粲文通飛動昭陽燕翩􅝆洛水鴻輕盈團粉頰綽約膩酥胸握麈神先王持螯興愈洪登仙寧有道中聖自無功流徴傳詞客清商奏樂童君看白雪賦萬古孝王宫少室山房集卷四十三
