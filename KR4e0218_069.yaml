body:
  text: 少室山房集巻六十九明胡應麟撰五言絶句八十五首題李惟寅山房三十八咏清嘯園為園學步兵築臺五千丈清夜嘯聲流冷然萬峰上松闗愛此松風吹柴闗抱麋鹿白眼四無人濤聲滿空谷陽春臺髙堂揮彩筆字字濯雲霞錦帳三千女齊歌玉樹花芙蓉閣傑閣起千尋芙蓉不盈丈為有謫仙人含毫坐其上清風館一徑入深篁翛然碧雲墮涼飈四面來吾将北忩卧先月臺中天白玉臺髙挂九千尺薄暮海東雲先送嫦娥入涵虚閣平湖千丈寛中有涵虚閣静夜時推忩星辰四簷落度雲橋青鞵趂桃花杳杳赤城路石梁千仞横自躡飛雲度浣花池方池六尺强風吹衆芳墮時有杜陵翁扶藜石欄坐拱辰閣危欄跨長空星辰俯手拾獨有紫薇垣可望不可即蔵真洞藤蘿垂洞口空谷四無人恍惚天台路難尋兩玉真白雲峰移來十丈峰虬鸞舞虚牖面面白雲生終南亦何有翠微亭荷鍤入中條雲霞導雙屐山腰翠漸微冉冉孤亭出凝秀軒軒窗洞然開正對西山碧十日忘朝飡飽此蓮花色來雲洞去家十里遥結茒在深樹白雲洞口來忽與幽人遇虬峰蒼鱗剥苔蘚千尺自成趣朝來雲霧生緲縹欲飛去釣磯八十曽無恙蒼顔出渭濵寧知漢飛将黑髮畫麒麟鰲嶼海上釣鰲客曾聞太白翁何如置孤嶼圎嶠在庭中琅玕亭十萬琅玕枝箇箇青欲墮不分王徽之借我亭中坐芳草齋幽齋只數椽科頭抱書讀經旬不出門芳草上堦緑青霞館朝吟白雪齋暮憇青霞館羲皇以上人脚赤髮仍散松室危闌繫鐵絙髙懸四松上千尺凌雲臺晉人何足尚青蓮閣虛閣倚青蓮恍入荘嚴界悠然清浄身萬古長不壊貝葉齋一出恒沙河彈指幾千劫金剛在舌根何許貝多葉㑹心處聚書三十冬插架三萬軸開巻時忻然三公豈吾欲蒼玉館簾内延湘妃簾外種湘竹秋風何泠然淅淅動蒼玉製芰軒湖上秋風生推忩緑無數不製三閭裳但製三閭賦疑舫齋虚齋窅千尺恍忽阿融留何須疑陸處天地一虛舟浮白齋左手鸕鷀杓右手鸚鵡杯拍浮酒缸中萬事何有哉草𤣥居翩翩白鳯凰夜吐青藜館何人坐吮毫莫是揚中散梅花亭孤亭十尺蔵梅花萬株列中有姑射仙肌膚若氷雪澹然閣事業等唐虞浮雲過太虚何如髙閣上支卧一床書如如境蘭若何翛然焚香擁孤衲兀坐萬縁空繩床下黄葉滋蘭室移将九畹芬散植雕楹畔悠然丈室中如坐瀟湘岸緑雨樓飛樓瞰平津空翠散遐矚山雨暮欲來蕭蕭入窗緑留客處十畆辟彊園寒風灑亭榭何須問主人日坐琅玕下延春亭南園紅藥盡西塢緑隂重别有蔵春處胡床未易逢沙上晩泊即事葉落楓如撼花攲桂若崩白頭溪上叟閒坐結魚􅊻月下船忩獨坐寄内是夜繫纜東昌憔悴鷫鸘裘飛霜正暮秋亦知粧閣上頻夜望刀頭席上戲為崔孝亷贈所歡妖姬年二八艷色妬名花莫問張君瑞崔鶯是婿家王恒叔山居雜咏十首紫芝山房何物東園翁老作儲皇翼後夜呼茆君乘風起八極松潯飛樓跨四松杳杳拂雲漢白日廣陵濤飄蕭起天半蓮社西來有别傳自得碧筒趣肯使柴桑公攅眉獨歸去嘉樹臺千尺摩雲霄百圍蔽林莽逍遙雙樹根不作大槐想釣亭玉璜釣姬公羊裘釣漢祖竒哉清静君𤣥成釣萬古忘歸石雙磯漬莓苔赤脚此閒坐偶逢隣叟談不知夕陽墮芙蓉城層城粲朱華彩艷照林薄新篇露下吟一一謝康樂曲水瀨玉匣閟昭陵聚訟欲成藪千載真蘭亭復落王郎手雲碓李詩水舂雲母碓風掃石楠花林鐘踈北嶺茶杵急西家湖風亭子外掃盡石楠花龍蔵前身阿難陀種此青蓮舌何事五千函虚谷盡貝葉春日同葉唐趙郭朱包諸生逰蘭隂作百雉雲中午雙虹水面晴曲江春事蚤隨處麗人行為趙宗魯别駕題屏菊四絶玉蘃迎風粲金英浥露開東籬遙悵望拊掌白衣來直榦經時雨緐英乍夜霜靈均餐不盡艷色滿瀟湘簮來盈宿露插處炫明霞布帽須頻落何煩笑孟嘉裊裊依危石亭亭照暮山羨他甘谷水千載駐紅顔胡穀元池亭雜咏十二首深雪菴襆被蠒雲窩清虚四天照門前乗興來或有王郎棹凝香寢斗室羅尊彛名香坐中發何處佳人過援琴鼔白雪薝蔔齋虚齋植薝蔔香氣何繚繞一路聞碁聲琤琮出花杪水竹居千頃竟何為萬竿復何處居然五畆園獨領浣花趣清華榭朗吟池上篇搆此數椽屋禽魚互親人恍惚見濠濮浣花池方池六尺脩為深劣加丈㳺魚不畏人潑剌清波上懸蘿逕何年卜此居恍入子真谷一徑懸飛蘿孤亭吐喬木叢春館堂上三千賔堂中六一叟無日不開花無時不攜酒不染亭周植芙蕖萬本翠幰何亭亭朱霞亦濯濯周遭十二䦨飛香透簾幙秉燭軒敲碁坐明燭微風動清夜遲我同心人落花滿亭榭飛嘯臺髙臺四無人嘯聲墮林樾彷彿羅浮仙空山弄明月竹素園亭亭風霧中琳瑯自成圃何言對此君大業在千古沈氏園異竹數竿儼如紅玉客話於余乞一絶紀之淇園暈紫霞恍作赤城色為問石家郎珊瑚幾千尺題寺壁二首青林帶平楚雜坐惟漁樵廻看萬峰裏一逕入中條樓臺出林杪入望杳難分半夜投龍去千山盡白雲黄河大風商舶阻絶姜計部仲文遣人覓舟載余一夕遂抵淮上因得口號六首却寄茫茫大河水一葉向江南不遇姜公子何人借布帆揚帆度吕梁囬首見蕭縣桃源何處村千家寄髙岸四月桃花水歸帆處處看南風薄暮起停棹向新安黄河九驛路驛驛旅人懐飛流六百里一夜到長淮渾如白帝峽千里一朝還獨少陽臺女雙蛾碧霧問長風破巨浪一葦下三吳那羨揚州鶴腰纒上帝都園中即景庭樹清隂滿園林翠色交數竿春雪重搖折紫雲梢題畫水緑紅衣浄沙翹白羽幽塵中騎馬客誰見五湖秋題祝生無殊瀟湘坐同司馬汪公二首萬緑圍軒忩蒲團弄秋色時聴湘夫人雲中鼓瑤瑟兀兀幽篁裏槁梧同嗒然科頭抱雙膝目盡九疑天徐象先以薛生素巾花卉五圗乞題各系一絶不作倚門粧尚假傾城色何似薛家娘巧心懸素質右山茶飄然姑射仙亭亭出林藪宛似薛家娘霜天濯素手右梅瑤琴月下彈羅帶風前解大似薛家娘幽香勻素彩右蘭霜飄金奏沉風動玉聲碎可似薛家娘秋閨鳴素珮右竹泠泠氷玉姿獨立瀟湘岸恍似薛家娘寒濤披素練右水仙少室山房集巻六十九
