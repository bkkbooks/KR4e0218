body:
  text: 少室山房集巻一百十四明胡應麟撰書牘十四首報皇甫司勳憶髫嵗過吴閶伏謁龍門之下冀瞻望顔色一奉教言適明公卧病精廬掃絶塵軌即片刺無繇自達訊諸閽人知河魚作楚旬月矣嗣是菰蘆之間率扁舟夜度盈盈尺水夐若明河每長嘯臨風未嘗不竊嘆御李之無自也客嵗遇周公瑕于燕市極口稱明公注問雅情方圖謁姓名于左右而子鳴持大教繼至則司勳全集爛然辱長者之垂施焉僻壤鄙生胡洊膺殊寵至于斯極豈明公過聴二君子以不佞甕天蠡海而窺于雅道之萬分耶不佞嘗僭謂五季以迄勝朝六代三唐流風掃地𢎞正諸公鋭情復古要以振起當今可耳揆諸曩昔恐叔敖優孟後世不無異同何者弟子髙師一著僅及其師北地信陽之才不能越馬班李杜而詩文製作復壹稟陳規則奔走步趨固已逡巡塵後矧時代所壓有未能盡超者耶故不佞嘗以當今之世不可無何李而尤不可無明公非苟為佞也明公菁英天授視三唐六代殊自錚錚而業以功深境由𤣥詣語文則縦横自得變幻従心語詩則色相盡空神情獨㑹試以司勳一集上律齊梁諸子大厯十才髙者逾軼沈謝錢劉平者不失隂徐郎耿即前人羣然復起有能增損隻字者耶生平骯髒獨于明公傾嚮渴饑北鴻遄發敬附八行未竟緒言胥之面晤再報子循司勳王次公云千秋而下信陽北地容有廢興觀察迪功必無絶響僕三嘆其知言若執事六代之文含沈吐任鑠顔凌謝五言之律苞元孕起驟冉馳曾詎惟十得八九㡬于毫髪亾恨且超乘而前矣故嘗謂何李除髙西漢盛唐而不足者也執事江左大厯而有餘者也絶長補短政爾相當今之為劉為吕不佞以為皆非也即散體之文長句之律勢所難兼然所謂同能不如獨勝也報徐子與元美蹈海黄金臺館閴其無人頃天幸明公上計明堂一時諸子雲合景従華陽碣石間復為雋國第迴眎往日西曹不無逕庭所謂極盛難繼耶不佞䠥躠蹇驢風塵眯目三千里入長安僅明公日夜周旋差無憾耳惟敬座中載奉談笑穆生醍醐周郎醇酎依依心醉寤寐念之辱諭鄙言奬提泰過嘉隆𢎞正邈矣前修何敢以邾莒之賦妄意代興惟長者不棄成言所謂蒼蠅絶塵政自無妨騏驥南皮之㑹面叩不宣報張肖父司馬車騎過婺城辱枉訊家君下逮小子属萍梗江湖不獲従瀫水羣兒竹馬之後抵舍讀諭教拳拳彌感且愧明公材兼文武任隆將相古今詞客力屈事功至明公迺一洗之㝢内抽毫孰不仰沫壇坫之下願惓惓以雍然一代謬借芻蕘豈過聴瑯琊愛忘其醜耶青衫上謁遂承破冗過存大貺丘山逾切蚊負之懼偶司馬公訂期三弇蹔别髙牙春深旋越晉謁不宣與吴明卿不佞束髪習詩歌則聞㝢内有明公矣于時直以明公齊驅五子狎主葵丘耳既稍稍習見諸君子製作集衡而篇角之迺知明公材力固伯仲濟南而沈著森嚴雄深渾麗句百鍊而字千鈞盖上自開元下迄嘉靖直接杜陵五七言律者明公一人而已不佞少逰京師於當代名家靡不接席至心所獨醉弇州而外惟是明公每誦蔵甲諸編輒神明爽然為國朝詞場一大快第楚越蒹葭美人千里無由縮地少奉晤言中常怏怏竊謂明公亦同此懐當今左袒濟南十夫而九不佞時抗論焉惟王次公所見略同自餘鮮首肻者計惟明公能自信之百年而後公論迄定不佞其嚆矢耶詩藪三編近頗行世辱長公驟許以為千慮之得汪司馬公亦以公心獨見濫推摠之私衷謬臆廿載以還逢人囁嚅不輕吐者比嵗沈疴枕席竊恐溘先朝露不得已出之中間數則僭及明公聊用附諸隋和之末然非縁是以求知下執事也黄孔昭過瀫水極稱注問雅情敝邑章生者頗習詩景慕髙風鋭于饑渴且夙聞邑之方子嘗䝉顧拂輒躡屩負笈逺謁門牆惟明公與進之報灌父宗侯讀中州人物志洋洋乎鉅麗之觀也無論文章典縟班范而下邈焉寡儔至采掇之勤揚扢之當真宗國之蓍龜昭代之良史矣李何王髙等傳尤見執事精神所注昔司馬子長纂史記而竒文特發於㳺俠刺客間至今儒家者流恒誹其腹庸詎若執事極意表章皆學術才華羽儀盛世之士也此書成而諸君子不相與愉快九京以執事為地上知己者僕請任之不佞下里顓䝉甫學聲韻管窺蠡測曽不足當楊氏之烏寜敢自附公家之駿迺大教過情推挹至並舉中原豪傑責望將來公所以𢎞奨氣類庶㡬追配古人藉第令一么麽海上鄙生胡以肩荷也嵩髙二室不佞夢寐之中日夜覩之乃今獲以童子當國士之知入洛之懐何能復已冬初䇿羸馬曳長裾追逐羽盖於三十六峰之上俟孝王之園雲花十丈登臺染翰與執事同賦之與黎惟敬三通四千里入長安門冀得荆州一面耳乍傳車騎抵潞陽瞻望踴躍亟擬策蹇衞馳叩行軒則連朝風雨妬之惟寅見枉以長者邇讀鄙言謬相擊節有欲避三舍之稱令人惶怍無地齒牙餘論一旦奨借至斯顧異時國士厚知胡繇報塞孫陽氏佇足冀野馬羣遂空要以騄駬渥洼無難厯塊迺不佞之駑劣豈其人哉裕卿往敬布腹心縷覼願言需之異日二西園盛集公豪興遄發浮白玉舟百餘醉中作二酉山房四古𨽻咸稱竒絶僕楸枰藉公靈爽亦屢占上㳺同座以裕卿大北為耽耽不平然莫能一籌難我也三詰旦惟寅載酒肴拉公洎思伯裕卿在明同登顯靈宫閣晴雪萬家縦目昆明太液間何異曾城絶頂二小羽士風度迺致佳且善謳霓裳三疊公當蚤一振衣也報歐楨伯片語壚頭遂成宿契髙陽十日逾越千秋而鉅筆鴻章懸掲海岱即無賴南征未嘗不爽然自適也衡陽巫峽之間魚沈鳥浮迺病子株卧一丘足音屏絶騶従自楚而蜀蜀而復閩與武夷君酬酢厯嵗無繇致一耗于門下至先拜大教之辱媿罪何言陸生行附致懸耿涼秋躡兩青鞋訪公白下當令燕磯牛首山川色飛耳再報歐楨伯諸集髙華秀朗世所共欽迺使事之工聨類之富綺而不繁大而能化則自老杜外惟弇州伯仲洎歐先生三耳仲黙于鱗名髙一代要以風格興象抵掌開元至綜貫百家下上千古非其所務亦非其所長良工苦心同調濶疎知我罪我斯言不易承秋深言返初服公赤幟藝林方為海内所急胡能一旦飄然即欲南歸何哉近舍西泠逺尋南岳大江風濤舟楫不易輕艑浙上無異康逵僕病且憊猶能攜斗酒相遲溪頭為布衣十日飲息壤在彼惟門下毋他圖焉與黄淳父少讀五岳山人集私衷竊勃勃鄉往焉顧墓木已拱無繇一把臂吴楓秋色中已復従子鳴諸君讀足下句曲諸篇嘆曰勉之不死矣過金閶亟擬懐片刺卧齋頭縦談千古属家君北行期迫無寸晷之暇頃嵗因緣裕卿始獲通聞問下執事旋辱手札報以璚瑤古調清聲隠映眉睫不惟恍覩足下且恍覩足下先君子矣中原何李勃興詞流雲集而載籍極博未覩其人爰自尊君超乘而出蟲魚科斗精研極索詩文縟贍雅亦稱之迺足下天挺才情諸所結撰形迹不傍色相都空盖尊君鏤金雕玉而足下初發芙蓉猶之光禄臨川各擅其美本朝藝苑相承聲華奕葉者江夏之外耳目無雙矣裕卿翩翩豪舉布衣之俠意氣難干獨推轂足下不容口酒中輒稱足下往客金陵攜漢玉巨觥入長干東南諸曲潦倒酣暢美人持箋索詩及書者數十輩足下手不停揮俄頃成集逾令人寤寐髙雅垂虹亭月色萬頃何夕維蜻蜓小艇放歌散髪同載而南也與周公瑕憶従家大人謁刺門下不佞僅十齡耳于時瞻望顔色竊以門下非今之人也古貌古心夐出塵壒當求之幼安叔度間方今江左第一流宜無過者北抵燕中華陽碣石豪雋如雲不佞猥以微詞為惟敬諸君賞識獨恨無従接門下一談戊辰南返輟棹吴閶適門下受聘東諸侯𤣥纁蒲輪為黄金臺上客秋杪載抵燕中亟訪寓舍則風馭泠然出長安旬有五日矣竊嘆名流契合古昔惟艱胡不佞于門下載世通家而齟齬道途若斯之巧也已物色一二酒人咸以門下讀鄙作于管秘書席上撃節咏嘆有可冠四壁之稱令人既感且怍門下三十年藝苑名家迺不佞蚓竅微吟庸詎足當晉人一吷而不惜齒牙輓推至此益信門下古之人而匪今之人也自今以往僕固奮蹶竭趨期無負九方之盼而銜策馳驅以終竟大恵所望于門下豈淺鮮哉吴使再南率爾陳謝子循淳父計旦夕操觚聚首幸晤間一為寄聲秋色吴楓臨楮瞻企再報公瑕鄭文學以誌事及門牆漫枉側理數畨索書仲長統樂志嵇叔夜養生二論垂省入矣憶與足下晤金閶迄今淹冉六載吴越相距一葦非遙而音問濶疎茫如異域乍冬計偕而北屈指過姑蘇首詣足下信宿天池登蓮華峰絶頂歸拉幼于伯仲痛飲俠香亭却假吴娃雙槳載足下虎丘啜茗千頃雲為别亦大快心事而春期迫甚竟為二三仝人所尼踉蹌解維亾論勝縁抹殺即數字不及相聞想像夜泊寒山江楓漁火一段旅人況味今猶懣懣胸臆間瑯琊公歸卧祗園主盟斯道而足下以古心𤣥覽左挈右提一代風流于斯為盛觴咏之暇曽否齒及胡生耶彭廣文来知足下健態猶昔七十老人篝燈夜坐作蠅頭細書終篇無一潦倒大似㢘將軍飯斗粟據鞍上馬時何修致此矍鑠艶羨艶羨僕年甫不惑老境已種種迫人聞足下内好尚未衰諸姬玉立當御美哉周郎南面之樂胡以過也承春深㳺目湖上桃花栁色念之令人奮飛計三吴奥區足下皆㡬殫厯迺嚴陵仙都赤城二雁宕併不腆金華三洞天咸僅僅咫尺胡乃靳此數百武令大川名岳不一漬周郎筆跡髙秋涼爽作十日布帆計便足了此足下果有意乎青鞋皁帽恵然南来則蘭隂之下尚有挈長生瓢負九節杖以殿逰屐者毋若子猷之興盡也穉修才猷揮霍而局促一氊唐人雜纂所謂窮波斯病醫人不識字措大殊邈不相稱可笑第此君伶俜瘦骨日擁如花卧床第尤似非宜天女維摩故自病中有宿分人匪羅什吞針實難不見許旌陽炭婦耶渠極傾倒足下不惜齒牙一為破除此障恒河沙界功徳也華陽碣石間諸酒伴比来一一相聞否新墳宿草觸目友生惟敬夀承思伯子鳴裕卿謙之先後作白玉樓客天留足下為吾黨中碩果何時面孔相向臨風悵然少室山房集巻一百十四
