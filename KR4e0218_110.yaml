body:
  text: 少室山房集卷一百十明胡應麟撰題跋二十一首周公瑕書王司冦石羊生傳跋戊子冬余卧痾京口不食者載閲月長公屢使過存余因丐作小傳長公慨然屬草信宿文成淋漓萬言咸謂極筆余攬誦沈痾頓減已稍進匕箸己丑春還溪上舟過吳門周處士公瑕來訪語次及長公新作讀之大詫子何幸以一疢致千秋吾兹且樂附驥尾余亟請公瑕以蠅頭録之公瑕曰子能輟棹三日則可余唯易舴艋入葑門訪張伯起兄弟復乘月過周文學懋修暢飲兩晨夕比返金閶則公瑕攜册遲舟中久矣精工縝密固此老境界而其書是傳飄飄自得妙入山隂真有飛天仙人揮斥八極之勢蓋公瑕弇州石交而此文又弇州絶詣竭其能事為之傳神信筆所投花豔爛發如右軍曼倩大令宓妃弇州文故不啻夏侯陳思公瑕書亦不失二王哲胤獨不佞才忝東方詩慚甄媛耳然生平之願足矣跋周公瑕書王司冦詩卷癸未過公瑕炊筍齋頭甚暇因出素卷索書長公前後見贈詩七言律二絶四初通問酬答者又七言律二邀余過弇山又五言律二讀余全集代跋又五言古一送余北上又五言古一末五子詩又五言絶二十陽春館雜題和余凡三十二章諸體略備惟丙戌許一長歌今不可得矣第止此亦震旦第一瑰麗也况重以公瑕書乎敬跋而藏之周公瑕書二酉山房記跋公瑕年已望八猶自力為余書此記其精工密緻有壯嵗不如者由弇州生平知已意氣所發故自超然耳此記乃長公閉關修玄日謝絶一切文債獨為余破例成者書來謂僕已息慮葆和非復曩時元美拙記皆按足下原草信筆點染不足塵大雅青緗也記文之末大概與書旨略同繇當時刻日引接上直閻略提君一切舍置矧復餘者比出關後稍稍掇拾前業如弇山别集之類意况頓自不侔余丙戌入都談及神王意取前記點綴之則後半盡易矣因笑曰昔嘲揚子雲雕蟲小技壯夫不為語顧晚為足下作此得無益甚後來之誚乎亟毁前草勿示人可也余以公瑕書弗忍且前草亦自有深致因並存之跋二王詩卷長公詩率題扇頭惟此二十絶和余陽春館者録荆箋筆勢翩翩有蘇文忠餘韻當時嘉隆五子無一工書者濟南之拙于筆與其工于詩政可頡頏吳明卿之學山谷亦鄉社老人動供一笑耳徐子與題扇册嘗門下士代之廣陵文札未嘗稍近翰墨恐南海亦略同究竟長公其佼佼者自評眼中有神腕中有鬼知人自知固灼灼矣近以書非所長并其評掩之彼亦知古今評書張懷瓘黃長睿之倫果皆書名一世者乎而書名一世者鍾張皇索之倫有片詞月旦流布今代否乎次公書釣臺短歌一雪中七言律二端陽七言律二其書自是名家亡事擬議也跋羣公手簡右卷俱慶厯名公與家君往還書尺王司寇元美三王奉常敬美二王學士元馭一汪司馬伯玉一吳參知明卿一外元美與余長箋三又小牘四敬美與余長箋一又小牘三皆以附家君書來并置卷末其言言肝膽也每案頭值此輒縮朒不忍展讀情輒脈脈久之兩司馬書牘跋王汪兩司馬並千秋文章伯也王公既自云腕中有鬼汪公于翰墨尤若謙讓未遑者每長箋巨牘必使家僮代書王公二僕一名瑤一名璉書皆雅飭而意度翩翩時有吳興風致汪公門下士二皆工顔平原體汪公雖小牘數行亦屬草令書之今兩公啓札具存齋頭皆裝潢大軸光焰萬丈開卷閲之雖望而知其代書細玩則全無一筆入掾史門閾者固知郗家蒼頭詎特小有意已哉跋張伯起詩卷癸未過吳門訪伯起曲水園出素卷索書得此乃洞山十絶句書端縝溫厚鋒穎內藏詩亦穩妥清適雅與書稱當是伯起合作此君四十即輟試禮闈鑿壞蓬蓽真古之遺隱無奈翰墨為纍又傳竒數本俊語灼灼人口耳視龔家老友不覺輸一籌耳漫書卷末伯起當一笑喟然也跋楚遊餞别卷右癸酉余歸越中一時社中諸賢餞送之作陳思育太史二五言律黎民表祕書一長歌康從理山人八七言絶潘光統鴻臚一七言律安紹芳太學六七言絶又康山人洎丘齊雲户部朱正初光祿各七言律一外李言恭太保四五言律安太學一七言律茅溱山人周柱明府各七言律共作一册今失去而此卷嵬然獨存其人則什九岱録矣輟筆泫然跋李逹父書牘吾郡李達父氏目無古人惟弇州濟南兩公在牙頰不知何以謬濫及余豈以同郡故小紆月旦耶其書尺皆信筆起草而花艷爛發天機自流即手札千言大都爾爾豈其天授偏屬此中耶不然胡他文之鐻削泰過者往往不逮耶前後書尺幾百篇余悉為存録今裝潢二軸時一閲之以當達父半面然山陽之感愈久愈深宗廣陵所謂一言一泪者彼其人皆存世漫為致語耳若余于達父二牘真實景實情矣扇頭跋一右篋皆嘉隆前輩陳道復淺絳牡丹一背題湖上看花七言律陳子兼二一書金山詩一書春遊詩筆勢翩翩雄逸其背余近乞楊不棄作燕磯京口二畫殊勝楊名明時歙人亦近日佳手也文夀承行草共六彭孔嘉行書一文休承行草九俞仲蔚黃淳父各四諸君惟道復不相及餘率莊皇世尚存然余僅二文識面他聞問而已扇頭跋二右篋二王書之上長公一書七言律二一書七言絶四即余初通訊日答書所謂二律四絶少酬來美者也又一小行書七言律二則邀余過晤弇園之作又一書末五子古詩又一書七言律貽家君楚藩同事場屋尋長公擢廷尉賦別後癸未寓書家君憶癸酉之嵗奉接徽音于黃鶴大别間今復覩癸矣數語指此也一書五言古送余北上頃嵗失去每念及倣徨久之扇頭跋三右篋二王書之下次公小楷一書周公瑕天池精舍七言律行楷一書癸未過余齋頭五言律行草二書丙子贈余計偕詩小草一書聞余得雄及過蘭隂詩行草一書罷官歸寄余詩皆七言律也餘行草二十雜書贈送諸詩通次公生平為余書扇頭暨餉惠後先無慮數十並友人持乞以往或紙敝墨渝所存不能三之一矣扇頭跋四右篋皆慶厯間名公書贈朱大司空一書寄贈余詩又二書園居漫興皆行草七言律贈余詩如春天攀樹雙鴻度秋夜懷人片月來此日漢廷方貴少非君誰是洛陽材無愧大厯諸子汪司馬伯玉一小楷書贈余同過婁江四七言律沈雄整栗為生平諸作冠二王亦津津色動而世率以文掩之非論篤也又一小楷書中秋湖上二詩亦佳又二書招余入社詩俱行草其一失之張中丞助父一書文殊菴訪余詩又三皆章草書山行及過梅客生七言律此公章法工甚與肖父司馬行草在嘉隆足繼次公詩不必言矣扇頭跋五右篋朱宗正灌父小楷排律一即贈余北郡詞林冠申陽藝苑英斯人誰繼美之子獨成名十韻者時余年十七今一讀一汗矣戚希仲行草一戚名元佐檇李人弇州分部三郡屢與倡酬青藜閣集其序也此公古貌古心同家君官禮部日覩余詩稍有未合咸為痛削苦針余因是積漸悟入蓋生平受益之最者次則周公瑕康裕卿耳是三人余至今每飯如覩也羅觀察汝芳小楷一觀察談理有盛名其年位趣尚余皆眇不相及不審何以見知此其七旬外書蠅頭徑分殊不易得余感其意至今什襲珍之黎惟敬行草三余得惟敬扇頭最夥小楷一書謝端陽綵扇五言律行草二書金山京口二七言律𨽻書二書顯靈宫雪望二七言律皆及余酬唱者餘行草二十餘雜書諸體詩今率為人持去及展拂渝敝僅此三存故事耳歐楨伯行草一書邀余及魏茂權胡孟韜集齋頭詩又一書秣陵秋夕同惟寅諸子分韻詩諸公惟敬以八法名餘不盡爾然其書皆可貴也扇頭跋六右二篋皆周公瑕書余十齡即識面此君當時輒書二箑贈余爾後屢有寄餉及余過吳閶輟棹訪公瑕必索書十數乃别又公瑕晚再逰燕余日夕過從故為余揮灑獨多即扇頭不下百數十大都漶滅懷袖及散失攜去之餘完者尚四十許柄當時以其人存世不甚珍惜今復覓寸翰不能矣因録為二篋而藏之扇頭跋七右文夀承小楷書倪雲林江南春二詩時年已九十矣周公瑕小楷一書毗盧閣觀象臺四七言律皆雄麗宏整亦其平生合作也警語如邊聲乍息漁陽警風色全催易水寒晚色千門雙杵動寥天萬里片鴻分此例不可勝舉而吳中無論長幼皆以周為不能詩今當久論定矣又一小楷書句曲道中二七言律于武林失之又二一書七言律四一書五言律二字皆徑分是偕余過訪長公書于弇山堂者又一書天池二律時年已八十而字僅若蠅結法精悍亡毫忽疏慢意致足寶也又一楷而差大書七言律贈余者繼莫廷韓七言律共一箑又一小楷五言律同黃淳父錢叔寶張伯起彭孔嘉五君共一箑書各精美翩翩逼晉唐而休承圖其一面尤得黃鶴大癡三昧當時金閶名士畢集成此不過頃刻間今求一握于吳中恐窮嵗不易得矣扇頭跋八右張伯起小行一書贈余長歌又行楷一書送余北上及哭王長公二律又行草四雜書他作莫雲卿行草四又行草二康裕卿行草一書送余楚遊七言律又行草五言律二又行草七言律三裕卿髫嵗遇余燕中即有小楷書送余八絶句爾時未有書畫之癖緣手失之自後纍書贈余不啻數十以其嵗月過從不甚珍祕此君入岱後所存僅此髙常侍開篋泪沾臆見君前日書政可借用也詹東圖行草二又一書同余山行詩亦失之曹子念行草一書贈余七言律梁思伯行草一諸君交遊中工翰墨者今相率修文白瑤宫幸伯起健飯耳扇頭跋九右李惟寅小楷四又行草六屠長卿小楷一王世周小楷一蘇君禹小楷二行草十喻邦相胡孟韜區用孺朱可大小楷各一張睿父吳文仲小楷各一俞公臨小楷一吳叔通楷書四李允達小楷三行草七諸君皆遊從深厚且名能書者詩多贈余之什惟公臨作五言餘率七言律也扇頭跋十右沈純父行草二郭美命行草一王永叔小行二行草六鄒彥吉行草四安茂卿行草一朱在明小行一又小楷一顧朗生代書者失之錢象先小草一黃貞父楷書一陳玉叔行草二陳從訓行草二董述夫行草一鍾敬之行草一林貞耀行草一宋忠父行草一朱宗良行草一鄧逺逰小楷四黃公補行草一朱孔暘行草一張仲立行草一王中叔行草一顧道行行草一蔡稚含行草一崔子玉行草一右俱交遊中書贈亦有八法非長而其人尤不可失者並留以當一面云扇頭畫跋上右篋皆嘉隆以還名手陳道復牡丹一玫瑰一文休承茂林修竹一錢叔寶荼䕷一梅花一張元春江南春一湖上居一顧仲芳水亭一顧道行山水一鄒産吉山寺一詹東圖蘭一竹一又枯枿一又淺色蘭竹各一楊不棄金山圖一燕磯圖一倣倪一又煙籠萬玉圖一管建初梅花二宋晉之逺山一嘗得謝時臣山窗讀易圖一戴文進雪山行旅圖一皆失之可憾也自休承而下率交遊工渲染者今半不存矣扇頭畫跋下右李郡山寺鳴鐘圖一沈仕古木寒鴉圖一孫枝野渡漁舟圖一朱朗紅梅折枝一錢序重岡疊嶂一劉爵古松流水一董良史梅蘭竹石一周之冕栁港啼鶯一其人皆近代渲染有聲然余皆未識面故別而存之少室山房集卷一百十
