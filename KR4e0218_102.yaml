body:
  text: 少室山房集巻一百二明胡應麟撰讀十二首讀汲冢三書春秋戰國之書亡于秦漢而出于晉之汲冢而傳于後者厥有三焉魏紀年也逸周書也穆天子傳也紀年合乎魯史逸周合乎尚書穆天子合乎山海經迺吾所謂合云者匪其事之合已也其文其義其體其合者往往如一手而粹者往往足以破千古之疑世以伊尹季歴而置紀年以世俘王㑹而置逸周以西王母崑崙𤣥圃而置穆天子是謂舉一而廢其百夫周書迄于太子晉紀年迄于慎靚王皆春秋之末戰國之衰也浮誇之議其峕即左氏且弗免乃史遷之採上古其淫誕怪詼葢不可勝道也以二書較之乎丘明司馬吾以為駁者猶未若彼之衆而其粹者可與暴聖賢之心迹覈皇王之軌度昭昭乎弗可掩矣穆天子雖非二書比而其敘簡而法其謠雅而風其事侈而核視山海經之語怪霄壤也錄之以資閎洽無寧愈于神異洞㝠之陋哉故余為詳次其可信者而稍白其可疑者讀者將亦以余為好竒也讀莊莊周南華其文辭瑰崛横放固獨行天地間至掊擊聖神淩侮賢哲亦生民以來未有之變也眉山氏癖其文辭而謂盜跖讓王四篇非周作尋其旨趣或近之至以天下篇不叙仲尼為陽擠隂助則無謂之大者夫楚公子被難出奔其僕操箠𨽻之匪得已也𨽻之而足免於厄以為得事主之權固宜若戰國之時仲尼雖没六經之道燦如日星周能大聲疾呼以暴其教于天下若孟軻氏之著七篇即舉世莫宗俟之後聖足以不惑夫奚厄于已而又奚厄于仲尼者而奚取于陽擠之而隂助之也周方槌仁提義廢禮絶樂欲以一人私臆掃百代名教而空之爰自神農氏下至堯舜禹湯文武亡弗詆訶而仲尼當時特巍然為仁義禮樂之宗故尤極意訕譏恣其脣脗盖文固弗予夷考其實則尤甚矣真所謂小人之無忌憚者求諸眉山氏所云竟南華一編邈未之覩也後之讀是書若孟旃抵掌驪施騁姿揮之一笑而已藉以為陽擠隂助吾恐後世之人將遂以其文并既其實其為禍也必不尠矣讀山海經古人著書即幻設必有所本山海經之稱禹也名山大川遐方絶域固本治水作貢之文至異禽詭獸鬼蜮之狀充斥簡編雖戰國浮誇之習乃禹貢則無一焉而胡以傅㑹也偶讀左傳王孫滿之對楚子曰昔夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林魑魅魍魎莫能逢之不覺洒然擊節曰此山海經所由作乎盖是書也其用意一根于怪所載人物靈祇非一而其形則皆魑魅魍魎之屬也考王孫之對雖一時辨給之談若其所稱圖象百物之説必有所本至于周末離騷莊列輩其流遂不可底極而一時能文之士因假穆天子傳之體縱横附㑹勒成此書以傅于圖象百物之説意將以禹益欺天下後世而適以誣之也自此書之行古今學士但謂非出大禹而已而未有覈其自于穆滿之文者尤未有詧其自于王孫之對者區區名義之末誠非大體所闗然亦可見古今事理苐殫精索之即千載以上無弗可窮也作者有靈其將為余絶倒于九京也哉讀墨諸子百家並出于春秋之世所以誣衊帝王聖喆者無所不至然于吾仲尼未嘗不知所尊事也特其學術偏陋雖間引仲尼以自文而踳駁不中誕幻無稽適所以誣衊之然而未敢有昌言以排之極論以毁之者有之盖自墨翟始翟書十五巻今存余嘗讀其非儒明鬼公孟諸篇所為囑授其徒簧鼓其衆者一以指摘仲尼為事莊周逺出翟後葢聞其風而興起焉耳周之為書蕩乎禮法之外自神農以至湯武靡不在其戯侮之列其敢于非聖葢無足怪而翟者固是堯舜非桀紂摩頂放踵以為天下而獨甘心置喙于吾聖人何哉盖其意欲與吾儒角立竝驅以上接二帝三王之統故肆言以震驚一世而冀其從而又苦行以先之聚徒以倡之馴致儒墨之稱雜然並立于衰周之世正仲尼所謂言偽而辨行堅而僻者聖王有作其無逃于横議之刑必矣孟軻氏距楊墨考楊之言論指歸要以自為不至如墨之恣無忌憚也貽禍之烈唐儒如韓愈者亦從而尊信之彼未深考其言耳窺其一二則所以誅之絶之者庸詎在二子後哉讀呂覽吕氏春秋史遷以為遷蜀後所作乃一時信筆之詞傳固明稱不韋相秦慕平原信陵諸公子貿致游俠人撰所聞其説是也高似孫子略謂始皇不好士不韋招英茂聚俊豪始皇甚惡書不韋極簡冊攻筆墨且舉是書所指摘近似始皇者以始皇能不怒而容之數語本播弄詞鋒罔稽情實而後人或規倣其意以秦法若猶寛者余以不韋自計脱異人俾莊襄之國亡而為有秦戴之不啻父母讋之不啻神明盤錯氷霜固非一日而政也弱齡甫立端拱深居一國之柄咸其所操招徠賓客陳説古今特其藐者彼其于始皇何有而始皇亦曷由禁之耶且始皇之初非不好士喜書者讀斯之逐客則亟毁其令開闗以納之讀非之説難則撫髀其人伐國以求之其勤于下士溺于好文如是即尉繚氏所為致詞逺遁者固足覘其大都矣洎海宇平志意極規為萬世不㧞之業而弗由其道于是坑儒生焚經籍以愚黔首築長城絶大漠以遏四裔觀髙氏所稱西服北懐等語是固非數齡之始皇所有事也詎得以不韋為譏而秦不怒哉讀戰國諸子竺乾之教漢明始入中國其徒往往主鄭圃西方之説以爭之識者以後人攙入之文不足據也余嘗讀戰國諸子書竊謂西方之説大略已具斯時世苐知老氏之致虚墨氏之博愛為佛所自出皆得其一而未得其二者夫為老氏之説有三虚静也恬愉也濡弱也佛之所云寂滅非虚静乎安樂非恬愉乎慈忍非濡弱乎為墨氏之説亦三兼愛也明鬼也尚仝也佛之所云化度非兼愛乎輪迴非明鬼乎普遍非尚仝乎鄒氏之言曰九州曰瀛海則佛之大千微塵也須彌阿耨也列氏之言曰周穆曰華胥則佛之神通游戲也變幻空花也莊氏之言曰大椿㝠靈曰蜉蝣朝菌則萬刼億塵之旨曰䑕肝蟲臂曰生馬生人則三塗六道之因至其生死之談真際之論機鋒迅發于後世禪學門風尤為脗合盖釋氏未至中國而其立教之規大都已具于戰國數子矣至六朝南北盛演諸經一時能文之士盡取諸家之説以潤色而張大之而世外閎深傑異之觀遂盡入于瞿曇之門戸而猶以為未足又取釋氏之説而竄合之毋亦泰甚矣哉讀世説新語劉義慶世説十巻讀其語言晉人面目氣韻恍忽生動而簡約𤣥淡真致不窮古今絶唱也孝標之注博贍精覈客主映發並絶古今考隋唐志義慶又有小説十巻孝標又有續世説十巻今皆不傳悵望江左風流令人扼腕云讀蜀志譙周傳當塗為魏典午為晉世所知者而意義出處或未洞然按代漢者當塗髙春秋䜟也自西京末兹語盛傳世祖與公孫述書嘗一稱而竟亡驗及曹操建號譙周以問杜瓊曰魏闕名也當塗而髙䜟驗矣然安知非老瞞擅國日假封號以應謠言耶典司也午馬也見周所為䜟文後果驗史謂周有他術數寄辭于䜟䜟之不足信也如是夫讀吳志魯肅傳按肅深不欲取闗侯詳傳中史稱肅軍旅間手不釋巻談論文詞思度𢎞逺三國將帥有儒者風諸葛外一人而已而世罕知之肅在闗侯不亡乗襄樊之鋭與蜀併功中原復矣肅死䝉代與權遜定計襲侯蜀失荆大事遂去炎燼坐灰若䝉古今亂賊之最不足與張承業為奴者遜以姦濟權以惡濟操皆春秋所必討史軼弗誅致羣賊漏網數千載余説出而無逃天地間矣讀杜甫咏懷古蹟詩莘埜躬畊南陽抱膝處仝也成湯三聘豫州三顧出仝也伐桀弔民出師復漢心仝也德感嗣王誠格庸主道仝也尹奮乎百世之上故人亡異詞亮崛起三代之後故家肆臆喙杜工部云伯仲之間見伊吕葢千載論孔明者至是始定孰謂文士筆端迂逺情事亡足重輕哉讀葛稚川魏武逸事葛稚川抱朴子云魏武姦雄簒竊迺心欲用乎孔明孔明自陳不樂出仕魏武謝云義不使髙世之士立于汚君之朝也按此事他無紀録僅見洪書操之不强武鄉與不追忠義大類皆庶幾五伯之風又昭烈在魏日久操不加忮害反資給兵仗遣之雖昭烈能自晦匿迺魏武容賢之量亦差有足稱者不得以人廢也讀空同子李獻吉空同子云闗張死而蜀事去矣王元美孔明論云以闗張之鷙悍而死孔明安得不親戎陣其用魏延馬謖輩非得已也兩公語皆卓識初昭烈入川忠義忠武同鎮荆州洎龎統卒而孔明赴蜀蜀甫定而取漢中時事劻勷日不暇給其委忠義與魏角者以侯鎮兩郡威信大行即樊城不㧞魏未能卒取荆也詎意吳宼之肘腋哉俾士元弗夭孔明弗西漢事寧當至此大㮣炎精垂燼匪人力所能嘘也王允寧諸葛蕭何論尤陋不足辯少室山房集巻一百二
