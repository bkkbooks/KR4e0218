body:
  text: 少室山房集卷五十三明胡應麟撰七言律詩七十三首夜同祝鳴臯話舊玄亭遙夜一尊開握手青衫氣未回擊築幽燕人漸老看花韋杜客重來千秋彩筆雙驚座萬里黃金獨上臺笑殺公車成偃蹇仍將詞賦入蓬萊答何仁仲見寄曩與晤于都下白眼雙攜向濁醪平原十日興偏豪千金客邸新龍劒五色王家舊鳯毛赤壁簫橫雲夢月黃陵帆落洞庭濤持螯一醉堪名士何用床頭著楚騷贈張觀察助甫四首有序不佞與張公助甫相慕有年矣長安邸中邂逅識面宛如生平旋出素業揚扢指歸語語契合肝膽形骸幾欲為一昔人亟稱忘年交蓋未足多也爰賦四詩用志鄙懷夢寐中原問執鞭櫜鞬此夕快周旋星窺碣石談天座月擁梁臺賦雪筵造父馭來俱駿骨風胡攜處總龍泉無誇片諾乾坤易屈指詞場二十年羸馬西尋易水來和歌無客自徘徊翻疑地逺荆高俠豈謂天留屈宋才八郡河山開氣象七陵風雨動崔嵬從他令尹關門候縱飲黃金百尺臺時將有寧夏之命臨風何處不支頥邂逅平原即故知紫氣坐間中嶽近白雲停處太行遲先登獨著三朝望後起猶攀七子時醉解吳鈎君莫笑十年虹色伴要離助父汝南人以山西觀察入覲一尊岐路去仍留唱徹驪駒下酒樓西日萬山懸晉冀北風千里度燕幽詞臣欲傍褰帷老壯士難禁擊築愁最憶故人關右句牙旗金印坐邊頭敬美曩送助父有金印牙旗君好住之句别殷無美桃花紅照白綸巾去住陽關各慘神杜宇競催題賦客伯勞如送和歌人何慚駿骨還青海獨探驪珠上紫宸四十成名君豈暮九重開閣在平津王季孺過訪寓中值余偶出詰旦往報季孺已得第遷居矣十里名山一抱琴那知車馬到同心徘徊凡鳥題空谷悵望遷鶯隔上林太乙爐香三殿逈平康絃管萬家深木天咫尺羣公聚獨有莊生尚越吟湯義仍過余適余命工櫛髮欲起義仍亟止余對談竟櫛因相顧大笑曰竹林風致何必晉人俄余鼓枻南歸興會相思輒有此寄散髮逢君易水頭紅塵紫陌並追遊狂呼楚客青絲騎醉擁吳姬白玉樓三館地堪容執戟五湖天欲問歸舟江聲月色能相望九月鴻書到敝裘别章陳二進士龍樓春色暫徜徉滿袖桃花越客裝望裡黃金高碣石行邊白璧照咸陽雲沙西北雙芒屫象緯東南一草堂君自乘車吾戴笠暮天長揖下河梁别劉仲清盧龍寒色暮蕭蕭指點黃金半寂寥草載聲華傳嶽牧宿生緣業在漁樵塵埃擊築千山動宇宙藏書一壑遙無限渭城杯酒思行人車馬出河橋别朱汝修祝鳴臯一蓑重問舊漁磯回首桐君賦式微客路千山明月老覩闈萬里白雲飛幽燕姓氏窮先輩吳越行藏舊少微莫怪荆高攜送逺春明門外和人稀贈濟上張公子飛霜匣底轆轤寒玳瑁堂開白玉盤豪士扶風新閥閲儒風曲阜舊衣冠當門鳯尾俱成竹後院蛾睂欲夢蘭肻許四明狂客醉一尊河斗任闌干贈薑計部仲文蚤向龍樓奪錦袍含香暫輟下仙曺牙檣十道催燕餉畫戟千山醉楚醪芒碭龍蛇間大澤吕梁魚鱉靜飛濤莫誇戲馬前朝句今日登臺屬俊髦懷大中丞滕公二首雨露經時竭海壖東南民力兩茫然潢池驟喜驚波息沃野重看化日懸氣象三垣元拱極勳名八柱已擎天丹宸蚤夜思良弼肻放歸耕下澤田時公方上疏乞休不允浙中頻歲飢饉復當多故兵民帖然公之力也十年塵土快遭逢碌碌慙為國士容業在祇應捫薜荔恩深何處效芙蓉寒風海甸驅千鱷曉日天門扈六龍獨有夢魂長戀戀夜隨征雁過吳峰與朱在明訂期江上十年矣是秋北上余復病不能赴約走筆寄此并詢諸郎彩筆翩翩照畫橈青春曾賦廣陵潮誰言魯國風流盡自許夷門俠氣饒白髮懷人猶四海紅顔結客已三朝成行玉樹階庭下可記當年抱阿瑶在明初得子日余與黎惟敬諸君咸集坐中惟敬以阿瑶名之復作此戲柬在明二首馬馱沙長一棹遊朱家十六最風流屏前小小初勻額畫裡真真欲點頭客到玉臺花似綺人歌金縷月如鈎參差已盡浮生樂獨欠銀河問女牛象枕牙牀白雪驕畫樓朱閣暮雲飄能將鸑鷟排高髻肻惜驊騮換細腰桃葉盛誇三婦艷蓮花差比六郎嬌在明行第十六貌不甚揚而風度致佳何因驟發觀濤興來聽揚州月下簫夜泊京口懷李惟寅金叉十二逈成行彩筆三千照畫堂座裡新霜流漢闕尊前明月滿胡床簫橫赤玉元戎醉拍按紅牙上客狂一片秋光渾似畫爛燒銀燭理霓裳時大江明月如晝因憶燕中舊遊寄此夢遊白下遇朱十六鴻臚一枕黃梁白日懸西風遙上木蘭船江光翠落千門底山色青浮十廟前酒壓吳姬春似海香消盧女夜如年何因喚取朱家俠盡出紅粧玳瑁筵病中張别駕以薪粟見餉賦謝昨日江風大放顛六花成陳月明前三漿錯擬天人供一飯真逢地主賢郢里寒光飛白苧河陽春色㺯朱絃殷勤為訊文園客可是登臺作賦年贈余明復水部時枉過舟中青雀黃龍駐彩旄牙檣錦纜照宫袍當今學士誰山斗自昔文人擅水曺象緯中天流説劒雲霞絶壁墮揮毫他年勝迹留孤艇肻讓登仙郭李豪大司空潘公馳驛夏村時不佞臥病舟中公特使相存且為覓舟南返感謝二律崛起東南見偉人行藏咫尺動星辰丹心自許乾坤業白首誰稱社稷臣擁傳百川勞灌注持籌萬國待經綸遙知夏后功成日燦爛玄圭出紫宸華夏勳名二十秋大臣風節逈難儔扶天厯捧三朝日鑿地頻安四海流九塞飛芻停帝闕八方輪粟湧神州他時名姓麒麟上肻讓平陽第一籌夏村病劇不能北上而返有懷大中丞滕師國士知從最少年飛揚騰踏擬無前何難虎觀名三百總為龍門路八千太白東南孤配月長虹西北逺連天無慙老作揚亭客白髮猶堪侍草玄再疊前韻懷滕先生十二樓中二十年一身渾擬當三千虛疑駿骨圖中問不信蛾睂畫裡傳酒肆欲尋西蜀底鹽車長厄太行前從教老被嬋娟誤肻抱琵琶向别船司空潘公濬渠迄工紀事突兀高牙駐海湄峨岢大艦接淮沂千山鑿就魚龍囿百水輸成雁鶩池渠中水自濟上來泉源凡七十二道赤日燃燈窮魍魎碧天橫鎖鎮支祈何辭盡白潘公鬢一代君臣際遇時柬余明復乞舟臺上黃金半草萊追風躡電且徘徊窮當岐路千愁集老向風塵百病摧上國寒梅從報雪故園新籜已聞雷殷勤為問余工部幾日青帆泗上來寄王敬美太常時新赴白下任一官誰道太常間六代名山任意攀句曲洞前捫峭蒨石頭城下㺯潺湲青天跨鳯高臺去白日飛騶大桁還若問季真狂態盡風流何客伴酡顔陳玉叔方伯以書扇見貽寄答并與索鮮荔子飛緘頻到瀫江濵意氣寧知嶽牧臣帝謂旬宣勞大吏天將形勝屬才人棠隂護處連三蜀荔子嘗來遍七閩道是楓亭神韻絶可能籠寄隔州民題張大宗伯間雲館十二闌干照碧梧鬱蔥臺館傍洪都間將太乙青藜杖暫憩東方白玉壺大澤未應龍臥穩高岡寧許鳯鳴孤蓬萊五色天光近屈指黃麻到畫圖張大來過訪適余至自新安大來以詩見貽賦答兼柬明府葉公蕭然行李發清笳握手江城思獨遐一去白榆干象緯千秋玄草贈雲霞津頭乍合司空劒海上仍飛博望槎滿目河陽桃李色不堪離恨對瑶華贈俞山人杖屨千峰度夕嵐青鞋蹤迹遍江南風輪獨悟恆沙劫水運重飛碣石談望裡牛眠占自合封來馬鬛氣長含騎羊獨有金華客不向公明問石函題白雲遐思卷鬱鬱名山瑞氣藏青囊聞説受曾楊三秋落日懸高隴一片飛雲墮太行松柏望中愁並逺蓼莪吟處夢偏長終天我亦同遺恨颯沓寒風到北堂再寄汪司馬先生時司馬避暑焦山未返蒹葭晴望逈蒼蒼白露漙空盡作霜倦客已辭天北極佳人猶在水中央江霞萬疊晨飱麗海月千帆夜坐長咫尺羣真蓬島近大將椽筆灑扶桑贈武林章太學百里錢塘路未分幽棲誰狎鷺鷗羣扶風豪士能題賦蜀郡王孫舊好文白苧飛觴時墮月青萍懸榻夜生雲涼秋莫負樓船約爛漫芙蓉越水濆寄吳憲使先生太微重照越江南何似薇花對夜談雪色雙龍頻掩映風稜千騎並驂驔平湖西去浮青黛大海東回望鬱藍十里芙蕖公事盡可辭椽筆寄雲嵐聞汪伯玉至自京口暫寓武林僧舍走筆代柬并以奉期錢塘此日停絲笮鐡甕經秋臥錦袍虎豹有時驚仗鉞魚龍無處避揮毫湖頭寺擁三天竺海上樓觀八月濤百里蘭陵歸路近西風那不醉葡萄滕中丞行泛海上奉寄秋色轅門照大旗千山玄甲度熊羆頻年河內謳歌借此日淮隂號令馳大海潮生強弩合平湖波簇畫船移何人為草征西檄得似袁宏幕下時黃公補過訪話舊寄訊喻邦相胡孟韜雙樹蕭蕭對不眠狂歌痛飲竹林前何來把臂華陽夕宛似論心碣石年北極寒星隨舄履西山踈雨待樓船江州舊識如相問寂寞揚亭抱太玄公補弟公紹時在南昌奉寄中丞滕師倚天雄劒切雲冠山嶽猶驚柱後彈虎豹留都環仗鉞鯨鯢淮海避登壇牙旗挂月千艘靜玉笛飛霜萬燧寒最是青油碁興劇不將藜杖到長干題葉明府兩臺交奬卷動地歡聲徹紫宸偏從盤錯覩經綸芝蘭萬室圍仙吏桃李千山照玉人舄下青雲鳬欲化簾前白日雉偏馴極知姓字懸當寧百里那能借鳯麟送大中丞吳公之洛中二首吳公初擢南都雨花臺畔乍停車重覩青鸞下玉除大府賔僚迎獨坐中原豪傑避前驅雲飛雒邑朝巡外雪滿梁園夜燕餘屈指內廷徵異績門人誰薦治安書余吳公所舉士也幾年方嶽借雄才奕葉龍章漢殿來帝寵驟移中執法軍容初建大行臺戈鋋掩映崤陵日鼓吹喧傳洛水雷小隊雲中尋二室何人詞筆競鄒枚送少宰趙公入都五夜丹青出九重千秋廊廟慶遭逢兒童夙昔傳司馬元老當今屬臥龍館近𢎞文天咫尺宫深平樂暮從容三台望處偏清切不盡東南瑞氣濃喻封翁八旬寄賀八公曽否下淮陽五老真看出豫章夢逐非熊遊絳闕身將雛鳯住黃堂氷桃坐上初留核玉樹庭中儼作行翹首仙都雲氣合夜來笙鶴正徜徉中丞滕公移鎮越中寄訊鐡騎牙旌控上遊飛書馳檄羡風流誰言夾谷偏文事共識南陽借武侯大吏百城環繡斧材官十郡扈清油千山月色胡床夜獨奏梅花坐海樓蘇觀察君禹校士吳興回省余入訪留飲署中作一榻蕭蕭萬籟澄闌干十二暮同憑當時虎觀誰先達此日龍門詫獨登著就新書逾越絶攜來名酒自吳興極知顧盼王陽在不羡輕肥遍五陵張孝廉大來以詩翰從葉明府見貽賦答稷下論心興未遐風塵回首隔天涯迷花有客棲三洞采藥何人臥九華篋祕龍韜光射斗書傳鳬舄氣凌霞同聲咫尺仙郎在一棹能無向若耶允達臥病山中寓書拉余過訪先此寄答并促拏舟榻上寒山擁夕陽西風憔悴芰荷裳豐城自昔多龍氣鄴下于今少雁行渴露相如情獨苦觀濤枚叔興偏長何時定作東籬客白酒黃花盡意嘗易使君還三衢寄訊黃金輝赫下龍樓竹馬爭迎郭細矦渤海盛傳新政績河陽猶詫昔風流山中白石經時臥洞裏青霞隔歲遊莫戀桃花樵斧畔含香仍見入螭頭送郭觀察之秦中大斾晨飛下越臺咸陽宫闕正崔嵬三秦紫氣懸書出二華青雲作賦來海畔棠隂猶蔽芾天邉藜火獨徘徊亦知太史留遺宅重向龍門闢草萊送區太史使江藩便道暫還南海寄訊程孔信山人玉册搖光下帝畿春明霞色上朱衣不妨閉閣停玄草猶記聽鐘直紫薇海月夜迎仙蓋滿江雲晨逐使槎飛丹梯萬丈羅浮頂幾折梅花問少微送熊茂初之閩中才子成都第一流含香遙下鳯凰樓詞場蚤壓三千客酒户偏宜十萬侯金鑰夜懸青瑣夢玉簫晴引赤城遊新詩九曲留題遍莫忘飛鴻瀫水頭茂初訂余為赤城之遊贈馮觀察二首識面馮君最少年何來雙翮並蒼然黔陽萬壑褰帷後潞水千家擊築前大雪當杯停馬首清氷盈匣贈龍泉殷勤遍踏吳山色肻許文園卒歲眠把袂秋風白苧涼壚頭猶記舊清揚談兵武略雄三署校士文名擅八荒得句乍逢天姥客飛書曽懾夜郎王那堪後夜河橋别落月啼烏上客航壽方翁為門士祝華父作拂座桃花映壽觴清歌一曲和霓裳真人忽駐青牛駕處士新開白鶴莊酒送芳筵林月滿籌增華屋海天長經年彩筆玄亭閉一為侯芭薦頌章壽何宗伯啓圖六秩宗伯為仲默先生冢孫時尊人亦以是年八秩紫氣東溟日夜懸安期飛舄畫堂前圖書再覩生申地甲子初回降嶽年虎觀千秋藜作杖龍門三世筆如椽靈椿更入飛熊夢盡壓人間玳瑁筵送丁文統少府之龍溪百里浮沈上駟才一官袍笏下蓬萊寧辭海畔哦松去總為山中抱檄來孤劒星辰延水躍尺書雲霧幔亭裁薰風荔子衙齋熟好寄筠籠到越臺送范使君之壽州驂驔五馬盡驊騮燦爛雙龍拂斗牛圜土西曺推執法專城南國借名流徐方樹色侵官道濠上花香撲郡樓為探霍林天逺近秋風行拉巨卿遊寄題王明府湘山别墅拙宦頻年鬢色侵歸來松菊漸成林河陽小試栽花技彭澤寧忘愛秫心賜履尚方曽易識挂冠神武定難尋名駒正接天間步可戀湘山入處深奉東師相趙公二首北蕩東征盡敵巢指揮廊廟失蕭曹功高已見玄圭錫道大翻憐赤舄勞謾説南郊饒薏苡終看西域醉蒲萄時甫有事西方他時四海平成後盛集詞人賦彩毫華夏安危屬上臣折衝尊俎冠羣倫雲霞夢屢飛黃閣天日忠偏繫紫宸祇見龍裳增黼黻寧容貝錦玷絲綸中宵試望長安氣爛漫台垣扈北辰送何仁仲之白下又整行裝向石頭春雲無賴紫驊騮千門樹色開長樂雙槳桃花過莫愁罷賦上林吾偃蹇吟詩東閣汝風流深秋儻下金陵鷁為掃城南太白樓賀陳玉叔六秩二首百尺樓頭臥正長東來紫氣繞扶桑三湘雪色流花徑五嶽霞蹤寄草堂經世文章唐宿老登壇詞賦魯靈光無論伏櫪雄心在奕葉天池鳯羽翔草載馳驅嶽牧勞懸車蹤迹且漁樵家傳楚客青雲舊洞訝秦人白日遙伯玉詩名元四海孔璋文譽已三朝猶聞昨夜麻姑信書到潯陽正落潮玉叔家近武陵寄張觀察時駐節婺中以翰貺見訊雙虹何處伴吳鈎按節遙當大海流染翰雲霞千嶺色褰帷城郭萬家秋時同仲舉開陳榻日伴休文臥沈樓莫訝駱生頻獻賦州民誰不頌行騶送蘇叔大還嶺南並遊白下江都買妾一枝南海見琅玕詞賦翩翩刷羽翰彩筆半傾鸚鵡座青衣羣著鵕鸃冠言尋桃葉江都去不待梅花碣石殘我亦南中行買宅春風藜杖到長干蘇生美風韻多安陵之好故云題盧思美大雅堂大厦新成燕雀留高軒長日坐夷猶圖書四壁窺河漢枕簟雙扉宿女牛尼父刪垂洙水畔杜陵題寄蜀江頭他時八咏標名勝底事東陽説沈樓黃魯直題杜陵所居大雅堂送張仲立之清源花簇紅亭悵解攜敝袍猶戀故人綈雙龍劒豈當年合駟馬車仍舊日題彩筆雄風橫泰岱銅符名郡控青齊飛書蚤報循良績旦夕黃金下紫泥送葉起元入都飛揚三䇿射蓬萊龍劒翩翩度越臺蜀國盛傳中散賦河汾誰似仲淹才旌旗太液春風繞鼓吹平康夜月來到日彩毫干氣象泥金先向洛陽裁少室山房集卷五十三
