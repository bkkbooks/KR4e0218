body:
  text: 少室山房集巻一百四明胡應麟撰讀二十首讀太平御覽三書宋初輯三大類書御覽之龐賾英華之蕪冗廣記之怪誕皆藝林所厭薄而不知其功于載籍者不眇也非御覽西京以迄六代諸史乗煨燼矣非英華典午以迄三唐諸文賦烟埃矣非廣記汲冢以迄五朝諸小説烏有矣余每薄太宗之涼德至讀三書則斧聲燭影之疑輒姑舉而置之迺廣記之臚列詳明紀例精密灼然必傳又當議于二典之外者也讀冊府元龜景德間冊府元龜輯自楊大年陳彭年手其書今鈔本具存顧無大足省發者反不若廣記三書何也元龜所輯皆擷之正史而正史家傳人誦無賴于元龜也至類例參差體裁割裂乙夜之觀徒成溢美蓋是時通鑑通攷二書未出諸史浩如烟埃無從措手小加類次以便九重耳嗟夫吾于是知涑水番陽兩馬氏之功于史學真億世不磨今家蓄二書遂侔飲食而不知未出之先艱于考索有百倍者後學無易視哉讀通志略鄭漁仲通志略謂其十五略皆漢唐諸儒不得聞者番陽馬氏駁之審矣大都鄭之學術深于探索而短于㑹通密于典章而疎于故實知得而不知有失知已而不知有人其以博且雅不足為太史公惜似也而劇罵孟堅使之容足無地馬班一體不知孟堅能知太史乎至謂編年紀傳書生皆足辦之而表志非鉅儒不能然則太史左丘見重百世者果以編年耶紀傳耶表志耶此皆鄉社老人動止供笑之論也若其殫心畢慮欲度前人獨到之思偏精之識往往有不可泯没者要自宇宙間必傳之書讀者取舍焉可也讀文獻通考鄱陽此書于古今典章䂓制囊括網羅無鉅弗該無細弗綜研摩之力勤亦至矣迺其持論衷操見確按證精又昔人之難于兼美者余嘗謂洓水馬氏通鑑出而歴代經綸治理明鄱陽馬氏通考成而歴代典章規制備通鑑紀傳之全體而通考表志之大成宇宙間不可一日而無史則不可一日而無二書雖洓水主格君鄱陽主格物用不同而功則一也讀類説曽慥類説今尚全余在長安得鈔本精甚每獨置案頭經史作勞暇時一寓目以蘇疲薾頃年攜家逺出不復記存辛夘北歸掃除敝簏則此書亡去什九僅一帙襍蠧囓中拂拭之猶無恙可讀也因識而藏之以比于吉光之羽唐人詩得劒乍如添健僕亡書久似憶良朋信然讀説郛陶九成説郛百巻蓋信手鈔録成編非廣記等書比也陶所録本書今什九不存間存者往往賴此而完帙僅半餘恍忽覩其名耳宋人雜説單行本朝垂百數種舍此遂無可别稽故是編雖蕪冗世莫得而廢也書素無雕本鈔録譌脱之甚即深于經史是正為難當得沉湎是中者閉闗旬月耳讀古今説海雲間邇輯説海余稚歳從人借讀大詫為竒書即該洽亦往往見欺纂人以家藏秘本也比長博考諸説家乃知此書就日瀟湘等録多出説郛靈應洛神等傳多出廣記僅巻首北征半夏諸編襍彚本朝故實又皆人所常見家有之書也蓋是時廣記未行説郛罕蓄一時老宿訂証無從如前此陸氏小説三十家後此顧氏小説四十家皆廣記鈔出襍他書不過什一二耳惟百川學海當是宋人遺書近海鹽王文禄擬而為學山割裂亡當大可笑也讀鶴林玉露山静日長數百語幽事楚楚有味乎言哉而友人善謔者云如此乃忙了一日何閒静之有余不覺噴飯滿案細繹之雖滑稽語實自有深致可尋時暇一猛省可也讀桯史南渡諸將武穆功最大禍最酷古今所共扼腕而張韓劉三氏子姓悉無聞吳氏遂以逆赤其族僅武穆孫珂仕顯且文學矯矯為一時宗亦好還一證也余嘗讀金陀等編知當時議論誣枉滔天似閻浮東南界人理永絶者迺今精忠大烈宇宙並存檜能以十指掩萬世共覩乎此書襍記當時聞見持論衷叙事核當是南渡諸説家第一編閲之不但藝苑賞心且時為武穆吐氣也讀西溪叢語西溪叢語南渡姚寛令威撰其人與紫陽同時文公論子華子疑寛偽作而又恐非所及輩行當視紫陽稍先也記録雖璅屑時有可觀第文獻通考無其目而有姚氏殘語六巻豈即此書或寛别有殘語今不傳而此書近出鄱陽或未之覩耶其顛末不可詳考漫併識之讀洛陽名園記李文叔格非易安居士之父也所纂洛陽名園記一時全盛風景賴此尚傳枕席間時一展之不啻臥遊金谷也王長公嘗欲彚輯古今記文為名園墅稿已成序而未卒業聞此不覺悵然讀東京夢蕐録東京夢蕐録四巻記汴中風俗時序景物以及祠宇樓觀甚詳信宋人之好事也其辭頗猥俚而開巻見當時全盛風華種種目睫吾嘗欲稍加剪飾合南渡武林舊事刻之便自覺兩都遺習爛熳著人宋雖弱運猶逺勝今之秣陵燕市也讀夢溪筆談沈存中博洽名一時所著夢溪筆談議論多獨造朱元晦亦盛稱之苐其師心自信往往有牴牾史傳處葢此書成于遷謫之所亡載籍可參攷故本朝楊用修蚤戍滇南所著書牴牾史乗處尤夥其病正與存中同要之著述非詞賦比或至貽誤後人疑者缺之信者稽之務出萬全可也讀演繁露程大昌演繁露攷訂多精核可觀據周公謹謂此書初出髙似孫方弱冠即為繁露詰以復之今不傳于世苐高氏他書如子略握竒經注之類率迂詭不振即所謂繁露詰亦此例耳胡以難文簡哉讀齊東野語宋末周密公謹所著齊東野語癸辛雜志武林舊事諸書尚傳宋史中頗采用其説張魏公富平等敗及韓平原被禍始終皆實録今儒生動輒攘臂南渡事盖徒據史家紙上不旁考他書故宋自朱仙鎮後恢復事殆無可言讀史忠惠韓仲止諸疏當時兵勢事機可想見朱元晦似亦有斯意所謂豪傑識時務者明丘文莊崔文敏議論大槩主此余意直以岳武穆亡百年間無一可將者李邵郭田齷齪小子不敢望楊沂中劉光世而命以經略中原譬肉投虎口何異俾外有武穆之將而内李忠定主之即無匪恢復之時也蔡州之勝雪百年恥要以孟珙氏為將故坐収成績不爾金縱垂亡豈宋所能必克耶䝉古滅金勢已壓宋而孟顧能于其間収復襄鄧諸城廬州之圍杜㫤以數千禦八十萬之衆元人傾國不能進跬步余嘗謂國勢無强弱人實為之至守之與攻又絶不類理度世固萬萬無完理苐大江有吕文德髙士璧輩守之亦未必遂淪喪或以諸葛不復中原為疑者乃其所遇曹馬皆勍敵非王莽赤眉輩也讀夷堅志五則洪景盧夷堅志四百二十巻巻以甲乙丙丁為次每百巻周而復始四甲迄四癸通四百巻餘二十巻則洪殁而未盈百也余少讀鄱陽經籍考則遍詢諸方弗獲至物色藏書之家若童子鳴陳晦伯皆云未覩蓋瑯琊長公亦不省有是書矣武林雕本僅五十巻而分門别類紊亂亡章余固知非野處之舊然無從一叅考之癸未入都忽王叅戎思延語及云余某歳憩一民家覩敝簏中是書鈔本存焉前後漶滅亟取補綴裝潢之今尚完帙也余劇喜趣假録之王曰無庸子但再以筆樷餉我可矣余持歸竟夕不能寐篝燈披讀迺知此特四甲中之一周為巻凡百每篇首綴小引其後先次第大都洪氏舊裁餘巻三百二十竟不可得然其梗槩臚列也自漢迄唐書之簡帙重大者什不存一太平廣記五百巻宋世之書今逸其數􅗡茫無要領而此編以荒唐璅綴尚巍然四分之一非藏書家至快極愉哉因亟題其後俟異日校而梓之又武林刻本夷堅志不知始自何時以余所得百巻參之盖亦洪氏之纂非後人偽託也其叙事氣法相類如一意南渡宋亡之後原書散軼剞劂者難于補亡又巻帙繁迄工不易易故摘録其中專志竒詭事自餘冗碎咸汰弗録且臚列門類以便行世其書僅五十巻益余藏鈔本則合夷堅所存尚百五十巻也苐刻本統于四百􅗡摘出則余藏百巻中同者固當什二三今閲之迺無一重見則刻本尚難據為洪書姑識以俟考又余鄉從王叅戎處得鈔本洪志其首撰甲至癸百巻皆亡僅支甲至支癸十帙耳迨其中已辛壬等帙又三甲中書蓋支志亡其三而三志亡其七矣四志百巻竟亡繇物色武林本或從初志摘出或即初志而妄析門類未可知余既幸是書存世猶悵悵欲覩其全真無厭之欲也苐野處文譽噪一時容齋隨筆等筆力錚錚而夷堅猥薾彌甚疾行亡善迹信矣王質景文夷堅别志世不傳而余得夷堅續志四巻葢本朝人録也又談者率以廣記五百巻所輯上自三皇下迄五季宜靈怪充斥簡編而洪以一人耳目一代見聞逐千載而角之其誕曼亡徵固勢所必至也今閲此書紀載不僅止語怪一端凡禨祥夢卜璅襍之譚隨遇輒録以逮詩詞謔浪稍供一笑靡不成書其巻帙易盈而速就職此故也然取數至四百餘亡論靈怪不足徵即樷談傅㑹不啻什之五六惜無從起而質之又宋有國二百年耳野處宦達南渡其時僅僅百載餘而怪力亂神紛然若是去莊列之夷堅幾何哉余生肅皇帝季世濟承平今馬齒半百竒衺詭異事自生平未一覩焉則傳之耳者率誕妄足推矣迺余遇志怪之書輒好之無異于洪氏也豈野處之為是姑假以優游晩歳若蘇長公之談鬼耶余嘗欲取洪書芟其非怪而附録者與往籍已見而並収者洎宋元諸小説及國朝祝希哲陸浚明等編分類以續廣記一書大都亦五百餘巻雖靡闗理亂而或禆見聞猶勝洪之售欺于天下也少室山房集巻一百四
