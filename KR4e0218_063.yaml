body:
  text: 少室山房集卷六十三明胡應麟撰七言律詩七十一首贈戚山人伯堅有序始邂逅戚山人伯堅於弇州園别去十載而山人遊金陵獲少姬麗甚以壁立復出謁所知適馮太史開之倡社湖上遂留館太史家拉余贈章戲成此什併呈太史博一掀髯云爾散髮相逢大海頭弇山堂下即糟丘余歸故里攜通德汝向新亭載莫愁砥事歌魚來越郡誰能騎鶴上揚州皈依合傍蓮花社天女維摩話昔遊時太史拉諸名勝為淨土之會七夕馮太史開之邀同俞羡長潘景升吳泰寧德符喻叔虞傅太學王山人集湖上觀少姬走馬戚不磷洎仲君繼至余夜分返太史以輕舟載羡長不磷宿玉蓮亭折簡秋宵興欲狂東南名勝半沙棠天孫河畔停烏鵲地主池頭宿鳳凰緑樹回風全送暑紅蕖搖月細生涼無勞更覔牽牛信一騎湖頭到謝娘過天津訪萬中丞伯修四首建牙吹角下蓬萊飛檄千章盡手裁晉代詩書元帥業周家文武上公材還搖大纛天驕遁曾繫長纓日逐來漫道平陽曽第一無雙籌䇿照雲臺翩翩白馬氣淩虛老將漁陽盡不如出塞盛傳破敵䇿籌邊頻上護羌書千檣跨海長驅鰐萬弩乘潮各射魚落落元規豪興在南樓明月半長裾威名十載鎮祁連又見登壇仗鉞年列校總驅橫海節偏師遙下伏波船風行蜃鰐扶桑外觀築鯨鯢細栁前屈指鐃歌飛捷夜抽毫何客代如椽玉帳梅花照叵羅南樓吹笛夜如何中丞節鉞行三輔大將樓船出九河赤日桑乾窮兕虎青天蒲類息蛟鼉燕然片碣題銘處萬丈窮崖絶頂磨李萬户過訪舟中作寂寞孤帆滯水濆雙旌俄報李將軍虬髯本自山西出猿臂先從塞北聞異代淩煙誰左席他年冒雪有竒勳燕然絶頂聊相待為掃班生石上文夜集萬伯修中丞署中聽奚童彈琵琶即席賦鼓瑟吹笙夜未闌狂歌醉舞燭花殘清光琥珀浮金斚逸響珠璣墜玉盤細栁生風回綺席叢篁扶月上雕欄真堪十日平原飲莫向參軍話路難行路難始鮑參軍同陳子卿胡瀫元集黃茂才館茅生擊鼓侑觴席上戲題旅鬢蕭然越客蹤故人文酒暫從容風霜驟擊漁陽鼓雲霧深藏碣石鐘春盡短衣殘薜荔夜闌長鋏笑芙蓉朝來曲水堪沈飲何處桃花問舊峰春日黃文學館中送陳子卿南歸訪馬生即席賦行李蕭蕭易水寒不因題賦到長安魂搖薊闕千門樹興入湘臺九畹蘭擊築風雲晨骯髒抽毫星斗夜闌干東歸未值秦淮棹愁絶春風兩鬢殘禊日再送陳生布衣行色又風塵攜手平原未浹旬易水悲歌逢壯士蘭亭修禊屬才人扁舟自許浮東海龍劍猶堪射北辰歸去白門機上女莫言裘敝出三秦黃燮卿王至卿胡靜父瀫元茅厚之過集蕭蕭四壁似禪關縱飲寧辭十日間邂逅江湖成白社參差河朔見青山壚頭乍發幽人興廡下頻開倦客顔臺殿黃金原咫尺朝攜瓢笠共飛攀送包稚升觀察之蜀中握手河橋興未闌春風笳鼓出長安千波已見淮流靜九折寧辭蜀道難酒肆才人原犢鼻花溪詞客尚漁竿岧嶤雪色三峩上何限新詩勒翠巒首夏少傅趙公齋頭縱觀宋元本朝書畫名迹出家藏焦尾命作梅花三㺯飯罷奕棋留連浹日即席賦詩畫檻雕楹白玉堂髙山流水落胡床牆頭樹色分長樂户外花枝接上陽筆札西清懸琬琰圖書東壁散琳琅翛然一枕蓬壺畔臥聽棋聲入夢長少傅趙公齋頭烹供虎丘新茗適侯家以紫牡丹至清香艷色應接不遑即席二首楊花飄落遍天涯十二雕闌散曙鴉玉碗坐邀陽羡月金盤馳送洛城霞清香恍墜幽人席艷色偏歸上相家入夢故園紅紫遍千峯寒瀑潄靈芽樓頭紅日近扶桑乳燕參差入畫梁雪乳乍分盧處士天香元屬魏平章移來上苑非金谷烹處中泠是玉堂莫便清風生兩腋聨翩傾國在明光曹計部訪寓中賦贈詞藻翩翩跨七閩樓船曽宿大堤春輝煌結駟尋燕俠縹眇驚鴻問洛神闕下雲霞飛錦綬湖頭風雨濕綸巾知君暫駐玄亭筆鹽鐵將成獻紫宸詹司理過訪并邀集寺中夜談司理家去余邑百里而近駟馬驂驔碣石東持杯蕭寺問飛蓬無論客思孤航外何限鄉心一座中説劍春雲流綺户抽毫晴雪照絲桐塵埃暫試空羣足荏苒黃金出漢宫王將軍過訪不值次日遣信相聞走筆四韻代東時方拜總戎之擢而余寄居胡氏園芍藥盛開故詩句云云髙空遙望碧雲殘細雨蕭蕭一徑寒小隊朱旗頻出郭元戎金印乍登壇雙龍色照芙蓉匣駟馬光生芍藥欄為報主人林竹在天風晨夕候飛鸞方伯苓徐彥伯胡靜父王孟博吳雲從同集茅生齋頭相逢湖海合吳鈎笑拂青萍上酒樓坐裏風霜流覆局簷前星斗墜藏鬮三生障業輸芒蹻十口生涯問敝裘拚取髙歌酬令節紅牙催拍按梁州王貞伯過訪胡園作時澍雨驟至轟飲幾達旦歸握手髙陽盡賦才參差遊屐點蒼苔虛疑上客尋花過總為元戎看竹來急雨亂飛巫女峽雄風遙度楚王臺誰言定逺先投筆粲爛如椽勒草萊王總戎攜酒同登新城南樓即席賦突兀飛甍潞水頭欄干十二挂朱樓雲拖漢闕雙龍度月擁燕城萬雉流坐裏胡床應盡興登來彩筆暫銷愁山川信美吾鄉異聊伴元戎作壯遊東黃水部孟修并乞其繪事才名江夏世無雙耆舊襄陽接姓龎興裏煙嵐流彩筆吟邊雲日㺯紗窗鴻冥大澤心長逺駟逐中原意已降識面長安吟晚暮爛燒紅燭醉銀缸花朝過劉金吾齋閣小飲即席賦暖日暄風半畫堂金吾西第暮傳觴圖書粲爛偏盈架緑竹參差盡繞梁賦就桃花潛弄色吟餘梅萼亂飛香接㒿顛倒休辭醉能憶通家舊雁行楊不棄吳用卿追送潞河作慘淡塵沙吹别顔都亭楊栁並追攀河梁客趂雙魚下海岸人浮片鷁還白苧淋漓燕雪底青萍搖曳潞雲間誰言岐路分飛近縱飲猶拚十日間曹計部至自盤山極談夜宿招提之勝賦此亂山回合暮雲齊流水桃花漢闕西絶頂雙燈懸舍利中峯一剎現菩提蘿深忽跨猿猱上樹古聊同鸛鶴棲最是夜深鈴鐸畔天雞如傍法輪啼過萬都尉館賦贈萬君虛懷好學風致甚髙坐捲珠簾夏日長主家樓閣鳳城傍金池草色連興慶玉洞花枝映夀陽逸氣千秋回處仲玄談一代擅真長春山寫就難停筆次第蛾睂出後房過區用孺太史適長公繩玄誕日即席賦贈五夜文光切上台三春晴色繞蓬萊桃花漫向秦源覔棣萼先從漢殿開紫氣絪緼紅日駐清歌搖曳彩雲來丹砂勾漏容相問六翮從君跨九垓送吳太學遊邊燕臺秋色乍闌珊少借壚頭十日間説劍風聲流易水彎弓雲色墜天山平沙夜伴孤鴻宿大漠朝馳駟馬還愁絶南樓離恨杳西風吹夢出陽關潞河東郊同胡生踏青即席賦春色三分二已過空門相逐問維摩新紅破萼盈髙樹淺緑回莖上細莎雪裏袈裟留絶域風前杖錫度恆河頽然一飽香厨飯坦腹繩床話貝多時飯維摩菴中送王遵考使君之嶺南鹵簿春風出禁城驂驔五馬向人鳴南州桂樹傳新賦東閣梅花問舊盟銅柱亂雲行處合金門殘月望回明名山莫戀羅浮色前殿長楊識姓名熊中丞出塞詩百萬曽提閫外兵君王西北問長城埋輪疏上豺狼避橫槊詩成虎豹驚川入大非晨按壘河當無定夜移營雕弧白馬翩翩去盡遣降王欵帝京于鳳鳴得雄賦贈窈窕笙歌出畫堂將雛一闋暫徜徉羣珠合浦爭呈艷片玉崑岡乍發祥藪畔青雲麟趾集池頭丹日鳳毛翔無勞骨相占英物已聽啼聲出後房江汝成駕部留集丙夜即席題振䇿西遊半五陵旋車聊待帛書徵三天會見翔孤鳳六月何妨息大鵬欵語涼風生白㲲酣歌明月墜青燈猶聞彩筆多竒句題遍慈恩第一層黃觀察自沛上擢濟南賦柬二首奕世通家問孔融頻年經國倚司空千檣大海羣飛鷁六傳髙天並駕熊雨浥杉松秦帝畤風翻匏竹魯王宫猶能一識荆州面漫向關河問落鴻竹箭南州貢競輸梅花東閣夢頻趨彭城浪息三千仞濟郡泉疏七十區白馬何天沈漢壁蒼龍隨地獻隋珠拾遺池上飛豪翰笑揖長庚下紫樞過濟上昭劉大司空奉贈二律玉匣雙龍挂斗躔金堤千鷁度樓船褰帷大吏羣趨日緩帶中丞獨坐年碧漢雲霞髙鳳羽黃河氷雪淨蛟涎無論四載驅馳急燁燁旗常太史懸寶籙瓊函煥赤文支祈摧伏奏元勳旌旗泰岱瞻紅日節鉞琅琊駐彩雲搜粟漫勞橫海校飛芻何待伏波軍由來據饋深延客倘借胡床坐鶴羣淮上訪王世叔留集署中座出新鰣共飽即席題急管繁絃次第陳歌魚寧嘆暮途貧崢嶸鐵網飛銀鬛粲爛金盤照玉鱗豈為江蓴能喚客祇因岩桂共留人孤亭環碧他年過遮莫羊裘動帝宸東葉侍御初抵武林葉公舊為余邑明府霜威拂面豸袍懸突兀聲華柱後傳鼓吹春風吳苑外樓船秋水越城前芝蘭競發曽遊地桃李偏滋舊植年珍重魚鹽聊駐節摶空鵬翼上甘泉送趙總戎之北平大纛髙牙照彩虹除書遙下建章宫前驅半雜三河少别隊新分六郡雄騕裊登臺呈逸步麒麟開閣待殊功平津突兀鈞天上吐哺能無憶轉蓬張參知睿父過訪賦贈委巷蕭疏臥緑苔髙牙俄報上公來溪頭弭節臨三洞海畔揚舲度七臺此夕星辰垂草莽當年日月扈蓬萊長楊一代推題賦白首能憐問字才寄吳文仲使君八首先是文仲以長歌寄余兹復屢使過問積成八章大纛飛揚駐草萊孤查寂寞坐莓苔花溪乍識元戎過葉縣爭傳令尹來霧湧雙龍呈玉匣雲驅六驥上瑤臺中原匠石凋零盡敢向靈光惜賦才文仲舊為余鄰邑宰百尺清潭理釣緡雙魚何意問沈淪維舟敢道菰蘆客入幕偏容草莽臣海嶠塵沙埋駿骨天都日月覲龍鱗崢嶸八座家聲在香案能無捧玉宸十載青尊悵未同雲天隨處繫孤篷東方號令驅千騎南陌音書墜片鴻洞口觀碁銷永目壚頭擊築動長虹竹林舊眼容青白何事車前泣路窮白羽登壇意氣豪偏從寒谷戀綈袍三年天姥迷清夢十日江郎醉濁醪紫電蒼龍明説劍朱霞白鶴麗揮毫煩君一棹相攜去並賦錢塘八月濤吳公自四明擢三衢輶車晴駐越臺前指點金華叱石年萬井霜飄觀察斾雙溪雲泊孝廉船囊中舊草餘孤憤案上間花落太玄漫道經時流水絶相思長抱伯牙絃縹眇寒霜墜鹿盧江州鹵簿晝頻呼猶疑玉舄飛三洞不道金尊泛五湖徑倚蓬蒿新白社蹊尋桃李舊玄都天門八翼星河近試問長庚謫有無文仲舊宰金華盡日江頭臥白沙長天孤夢隔瑤華田餘元亮曽栽秫縣接安仁舊種花六洞浮雲迎仗鉞雙溪明月候飛查菟裘半畝勝漂泊霜落東陵正熟瓜突兀長歌贈逺遊淋漓霜色墮高秋如聞桂樹招淮上祇為梅花别隴頭晴雪萬山迷欵段夕陽千塢亂鈎輈歸來咫尺堪攜嘯極目雲天下彩斿送包稚升入閩稚升先擢蜀中錦纜初停泛蜀船驪駒仍送入閩筵無誇積雪三峨外盡占飛雲九曲前栁拂襜帷春燕候花迎袍笏晝遊年為君拂拭雙龍去遙夜延津斗色懸黃堯衢屢寄詩札余讀其九漈遊草慨然興懷賦答一律堯衢才髙博雅詩文外雜著幾百臥掩衡門鬢欲皤雙鴻嘹嚦墜巖阿三山傲吏偕三謝九漈飛仙挾九何獻賦柏梁知自許藏書天祿定誰多荒園萬卷堪留客載酒能無問緑蘿時同遊三君宦閩者送李太史之秦中絳節朱幡太史才春風鳴玉下蓬萊雞聲萬井開函谷馬色千山度薊臺授簡明光朝日近飛觴平樂暮雲來含香舊侣深相憶莫遣玄關閉緑苔送江汝成駕部之秦中二首祖席驪駒唱未停河橋寒色晚冥冥髙天六傳飛函谷隘地雙旌出井陘雨雪蒼茫南北路星河明滅短長亭干城豈獨扶風借百鎰黃金下帝庭百壺春酒照華筵曽是荆州識面年問竹敢勞中散駕看花頻繫孝廉船崢嶸斗色雙鈎墮粲爛虹光四壁懸明發旌旄凝望處太行無際白雲前初入葛湖同王仲升章茂德陳惟敬夜集盛明元思達思𢎞思齊思登思遜六昆仲社中賦贈壚頭十日又髙陽年少羣趨作賦場人比竹溪非異姓客方蓮社是同鄉論心海岱千秋合握手乾坤萬事忘貪把深杯華月下不知零露墜衣裳是夕陰霾無月諸子酣飲夜分而唐祝兩生不至命小奚奏樂侑觴拈韻得中字即席賦曳履南樓興未終胡床相對一尊同霜飛玉宇秋將半露濕瑤臺夜正中繞樹參差飛倦鵲銜蘆嘹嚦墜征鴻更闌競奏霓裳曲誰喚嫦娥出海東葛湖草堂四首為盛氏六生題滄波九疊浸芙蓉夾岸千峯與萬峯才子溪頭頻拭劍仙人陂上舊攜笻髙天霧隱前村舶落日風傳古寺鐘莫遣桃花飛一片津門流出世人逢葛溪鐵李益劍名十里澄波鏡面秋雞聲一塢住中流間花半落辛夷岸古樹平連杜若洲晚日亭臺朱户掩微風簫鼓畫船遊紅妝隊隊湖堤上唱徹菱歌興未休湖上茅堂秋可憐浣花流水不知年緣隄藻荇浮仍沒隔浦蒹葭斷復連過雨鳬鷖臨檻外乘風鷗鷺到門前攜家信宿堪忘世底用頻移霅上船衆壑天然敞畫圖牙檣明月坐氷壺雙流近接雙龍洞九曲遙穿九鯉湖野客為園當薜荔竒人結社傍菰蘆他年會挾西施過日占煙波理釣艫同盛明元散步山岡望金華諸洞壑賦示思達思齊思𢎞思登思遜五生五嶽長懷濟勝才三山何事問蓬萊岡頭處士龍仍臥嶺外飛仙鶴並來積翠中天藏洞府空青半壁墮池臺翩翩羣從俱竒雋為掃如椽向緑苔明日泛舟湖上王仲升以公事先行即席再賦牙檣秋霽喜同登極目長天暮靄凝月色正浮三翼舸星芒如徹九微燈汀洲曲折沿芳草島嶼縈洄出亂藤投轄乍堪消永夜雙鳬寧畏簡書徵十三日再同王仲升陳實卿章茂德王仲濟盛明元六昆季宴集祝華父唐汚父適至分韻得前字即席賦鼓瑟吹笙玳瑁筵狂歌醉舞興飄然疏星競向寒更出明月偏宜後夜圓時中秋前一夕氣色熒煌雙劎底心期迢遞一燈前經旬漫詫平原約千日中山任晏眠又明日泛舟東湖湖蜿蜒十里許渟泓靚徹大類輞川時微雨灑空旋即開霽中天皓魄朗然如晝芙蓉一樹亭亭南岸若淩波仙子含情婉約不可名狀余命維舟其下小奚吹笙撥阮歌滄浪明月之章飛白無算賔皆潦倒比歸就枕漏下五鼓矣載酒鳬鷗靜不猜謝家羣從故多才沿隄竹樹參差發隔塢芙蓉爛漫開晚色拖煙籠逺寺秋光含雨濕平臺尋源異日扁舟到夾岸桃花次第栽中秋諸子雨集遲祝生不至賦以示嘲天際輕陰繞畫樓渌波俄漲大堤頭清秋漫憶乘查去盡夜何妨秉燭逰殿閉長生收月影園荒獨樂罷風流無媒一覩嫦娥面正為陽臺雨色留明元所歡淑卿華父數贈以篇什期是夕挈以來而復為所羈又祝生以園地為族人所侵奪故云再疊前韻寄祝生時明元以舟遡之不得悵望幽期越水頭蒹葭白露滿中流空懸仲舉千秋榻苦戀休文八咏樓玉笛關山偏引恨珠簾雲霧迥生愁惟應天柱尋仙客曳履孤峯盡夜遊十六夜雨不絶同唐祝兩生集明元齊頭秉燭劇談四鼓乃罷驟雨淒風斷續聞西堂燒燭話偏勤空勞神女飛三峽不見嫦娥駕五雲葉落仙蓂秋縹眇花殘叢桂夜絪緼朝來一舸乘流去盡擷芙蓉越水濆别明元思齊六昆季時余將卜築葛陂之上詩以訂盟二首短髮江湖抱太玄歸攜羣從興飄然當年溪上聞諸逸此日林中聚七賢卜宅舊尋陽羡口移家新赴陸渾前他時倘遂桑榆策一笑玄真臥釣船十口經年繫短航何如一曲借滄浪天空穩臥揚雄閣地僻粗營杜甫堂西塞鳬鷖迎嘯咏北山猿鶴伴行藏不緣二仲翩翩甚投老那依玉樹行贈喻叔虞邦相明府季子也攜來余邑日僅十許嵗今倏忽草載餘矣時俞羡長吳泰寧同集花縣雛將玉樹叢當年見汝僅成童驚人彩筆飛王粲狎客清樽醉孔融賦草欲追膝閣麗談鋒偏向越臺雄髙陽爛漫名流集莫負渠蓮十丈紅少室山房集卷六十三
