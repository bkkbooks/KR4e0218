body:
  text: 少室山房集巻二十八明胡應麟撰七言古詩十五首宋榻蘭亭趙文敏臨本真蹟歌永和九年歲癸丑典午衣冠盡南走臨池崛起王右軍萬古乾坤落書藪江東勝槩標蘭亭軒窻亂疊羣山青流觴曲水修禊事一樽隨意酣沉冥道服逍遙坐亭子認是當年㑹稽史尋山玩水不解愁屢向人前誇樂死含毫是日如有神飛天厯厯來仙真崢嶸隻字啟八法快劒長㦸劘星辰諸賢詞翰盡壓倒興公虵足徒夭矯垂頭大令甘罰觥奕葉瑯琊傳至寳雲礽智永歴辨才屋梁伏檻叢蒿萊文王百計命蕭翼逡巡玉匣沉泉臺餘子紛紛競摹勒掌指烟煤半狼藉率更棐几撫硬黄來世爭傳定武石勝朝妙蹟仍浮屠北禪老僧秘若無吳興轉乞獨孤本十三跋語題長途窮年兩腕追步伐牝牡驪黄較絲髮雙雕比翼翔太空勢極扶搖貫閶闔此􅗡舊榻真宋前五字未損湍流天奚潘墨瀋儼如漆澄心素札鋪純綿朅來燕市褁敝篋瞥見寰中眼雙熱傾囊購得置案頭不減西方貝多葉龍盤鳯翥何紛披三百餘字字字飛乾坤萬古但一帖含毫落筆皆天機呉興臨本推冢嫡中郎虎賁貌如壹誰哉帖尾聯王羊展巻狂呼勝和璧古今二絶偕遭逢茒齋氣色干長虹将無一夕雷電入六丁下索還鴻濛沉吟却憶永和世舉代清談誤真際虚聞一統儷漢唐大業三途驟凌替猶餘八法懸髙旻墨池滉漾雄千春漢文唐律遂鼎峙至今免誚秦無人腐儒徃徃嗤小技賢刼疇令重晉氏歐虞薛褚匪上乗吳興入室世無異一觴一咏樂奈何醉來故帖重摩挲恍入山隂坐修竹拍浮流水觀群鵞王元琳伯遠帖真蹟歌自從兵入宣和殿晉人真蹟世罕見二王之外尤無聞胡乃此帖傳王珣四十二字鬭竒絶字字精芒射天闕蕭踈逸宕轉姿態牝牡驪黄半明滅當年宣武稱黑頭誰其大筆東亭侯至今江左僅兹帖如椽恍忽存風流錚錚伯遠𨽻書譜妙蹟宣和曠今古右軍大令俱塵埃靈光一柱猶蒿萊九百餘年秘雲笈暗中神鬼互呵斥何論寳玉與大弓茅齋白日飛長虹顔魯公祭姪草歌有序呉興跋禊帖謂右軍書蘭亭是已退筆因其勢而用之無不如志兹其所以神也今蘭亭不可見矣魯公祭季明文其筆鋒退盡者披攬真蹟呉興數語宛然若為兹帖傳神惜當時困學齋中何以不令一覩也漁陽播亂飛黄塵旄頭月黑纒妖氛常清血戰棄全陜二十四郡虚無人平原魯公眦雙裂一麾猛氣雄三軍疾呼河北倡忠義普天率土知君臣帝心未滅安史禍杲卿碎舌投天津巢傾卵覆季明死舉宗三百遭坑焚烏鳶飽食螻蟻妬毒痡四海同酸辛魯公惋憤掩胔骼哭兄哭姪嘘愁雲生平正氣塞宇宙淋漓一帖猶千春乾元元年歲戊戌昊蒼有意開斯文摛章吮筆筆欲舞墨池一派流天真肝腸寸寸委波磔縱横䟤跋超羣倫長風巨浪鼓淜澎泰山喬嶽盤嶙峋夭矯虬龍赴幽壑繽紛鸞鵠翔髙旻十行遒婉尚含怒五行浡鬰逾生嗔卒章沉痛徹心髓恍疑汲塚窺三墳如椽一掃二百六一言一字皆千鈞卽令塗抹逈姿態西施傾國加雙顰當時魯公豈匠意精誠烈烈懸風斤相傳一草厯元宋太空磊落垂星辰二陳跋語差可玩文家待詔彌津津鮮于困學傳累世即今妙蹟來江濆凌晨攬誦䜿毛髮齋頭什襲藏家珍君臣大義貫星日矧兹八法尤通神作歌鄭重寄仰止墨林萬古颺清芬米南宫誤恩帖歌張顛老死米顛出好手中原鬭狂逸南唐寳石作研山三十六峰舞寒碧低頭拜石石不語袍笏􅀈跚笑兒女一朝把換薛公鶴泣向蟾蜍泪如雨興來刷筆掃孤憤十萬材官破堅陣青城俠客揮劒鋒夜义飛天雲霧中宣尼常笑由也喭顛也淋漓逞豪健此帖數字亦怒張兒駒泛駕不可當五百年來米顛子絶倒當年顛長史鍾王節制安事此宋人送南宫有名滿天下之稱或疑米不足當者曰二十年來何處不省有米顛子耶題李龍眠二十七祖圖歌丹青國手吳道𤣥眼空萬古當開元沿流晚季六法盡中興十指傳龍眠何人攜此􅗡佛祖遍羅列馬鳴衆大士歴歴具顛末袈裟挂膝右肩袒妙相人天儼對越二十七祖僅九幀十八應真徒耳聞云是吳儂利厚值輿圖剖析成三分朱門貴戚萬與栁募置齋頭數各九蘭隂措大拚鼎足盡典商彛鬻漢卣瓦棺寺壁畫久亡僧繇衛陸俱渺茫荆關遞得山水趣誰持大筆描空王參差絹素裂強半魚口横紋欲糜爛人言畫理出唐世遠即楞伽近靄瓘即今宋代寜庸工龍眠繪事真人龍諸天帝釋尤冠絶青獅白象行虚空阿難陀下九尊宿一一披圖認睂目或眠樹底修四禪或坐林中斷五欲或拈聖果菴没羅或把靈花給孤獨或看澗壑浮清漣或聽岩巒墜飛瀑或從長爪證縁覺或遇獰牙騐調伏或開甘露廣法門了了根源繪身毒憶昔李侯盤礴時胸中壮氣横須彌大千世界攝毫翰狂墨亂洒天迷離逡巡群祖真相出虎頭金粟爭神竒惜哉賈䜿巧壟斷吉光片羽猶分持復憶龍眠好畫馬筆力曹韓較多寡驪黄注想馬胎入足墮泥犁若飄瓦以兹懴悔寫佛門丹青燁燁留乾坤香燈高閣互供養天龍八部如雲屯乃知古德真善誨隻語單詞係成毀祇今名蹟六百秋夜夜光芒䕶神鬼二十七宗瞥眼過東土祖師來達摩面壁形模竟何以寰中試見龍眠李題趙千里真逸圖歌吳郎示我真逸圖生綃半幅雲霧裂高堂挂之夏六月䬃䬃寒風墮林葉縱横亂瀑墜髙崦千峰萬峰路明滅峰回路轉天欲盡似有孤亭架木末其下巨石盤長松楓丹栗黄秋事濃松間講易三兩翁秦時四皓鬚睂同一翁擊阮一坐嘯其一恍似東園公斟酌兹圖定誰筆神品錚錚世無匹細看樹石用勾法人道王維字摩詰或言近出趙千里徃徃抽毫弄金碧嗚呼王趙不可作縱復天工繄誰識須臾暝色來朱欄耳邊潏潏來飛泉吾将追逐黄與綺坐占孤亭號甪里題李唐雪山遊騎圖歌隂崕凍雪霾亂石誰其畫者李唐筆萬仞寒山挂崒嵂恍見當時大斧劈何人布裘褁竹笠欵段婆娑入高壁後有蒼頭挈雙屐太華路南望咫尺欲陟其巔叩拘翼帝座罘罳儼呼吸十二瓊樓衆仙集鶴氅繽紛互長揖白晝乗風繞八極我欲從之路昬黑未滿丹臺謫來籍策蹇言歸故井邑㶚陵橋頭句堪覓題趙承㫖野岸呼舟圖歌髙堂飛瀑十丈寒青山四面浮朱欄繞砌霜楓墜紅葉恍忽城居在林樾吳興畫手真傑特人巧天工擅開闢細看此水與此石非畫五日即十日紫衣抱膝坐渡頭蒼頭弛擔遙呼舟清溪萬頃隔孤棹隔崦人家落斜照山深樹黑逕險﨑石床天畔雲迷離歸樵谷口冉冉入似有柴門挂蒼壁標題軸尾了可尋集賢學士孟頫臨今古令人嘆三絶惜哉二字遭鼠齧承㫖名爲䑕囓幾半題黄公望西泠烟靄圖歌大痴老人黄子久塗抹丹青號名手名呼大痴畫不痴此圖氣韵尤淋漓危峯突起矗霄漢迤邐横岡折層巘其下澄湖八萬頃金碧樓臺挂天半芙蓉及菡萏艶色何紛披恍如若耶溪並浴千西施飛鷗明滅傍沙際挾雌抱子羣翔飛第六橋南入靈隱此去南屏尚多景岳王墓倚金沙灘竺色三天浮髻鬟隔崦人家夕陽落破帽騎驢出東郭尋詩何處攜絲桐美人遲我飛來峰題黄監桞塘禽鳥圖歌五朝畫筆推黄荃徐熙之後昌友前禽魚花鳥落掌指即今繪事仍流傳十畝方塘浸寒碧髙栁繁隂弄斜日夾堤荷葉青連錢翠蓋亭亭萬粧出蒹葭藻荇翻縞帶隱映清波漾盤石沙頭浴鷺拳八九石上雙鷗儼相識魚蝦潑刺明鏡中迫視渾疑手可拾黄鸝紫燕語深樹㸃綴精神著顔色臨池誰喚王右軍池頭一白俱鵞羣大鵞仰吭鳴向人小鵞數十何紛紛天時淑風清氣媚野鶩家雞各求配一雄前引衆雌後宿食飛鳴宛成隊嗟嗟荃也得妙理意匠經營入無始揮毫衆羽倐生動造化真機在十指爾時徐熙亦化工兩賢相阨悲途窮祗今無論黄監手雜埒趙闕少室山房集巻二十八
