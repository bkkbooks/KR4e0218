body:
  text: 少室山房集卷七十八明胡應麟撰七言絶句八十五首夜飲郭金吾齋頭同韓劉兩生奕達旦歸寓則晨餐久熟矣戲走一絶柬郭君并韓劉二文學談棋説劒更呼盧絳蠟燒殘白玉壺痛飲不須愁禁夜主人曽是舊金吾病目初起汪象先太學以玉簪十二餽我即取小軍持承露分貯几上覺茅齋秋色種種撩人報以口號二雙眼婆娑病色含不禁秋夢繞江南風流最是王公子滿把霜林贈玉簪荏苒秋光遍六街玉妃聨袂到空齋軍持滿插文園露何似華堂十二叉夜飲仁夫館大醉吐頓因借所服緑衣歸詩謝之五斗醒來恣所如幕天席地坐蘧廬酒闌人靜披衣出滿路晨鐘下玉除馬上望天寧寺浮屠作十層珠瓦亂雲齊百丈金身落日低幾許慈恩高剎上千秋惟覩少陵題登玉華峰寺西山絶頂處余夜宿其中題此絶於巖石絶頂秋光萬壑懸青萍搖曳亂雲前峰頭五夜聊伸足莫訝孤星帝座眠湖上風起平林月色低飛香十里禁城西不知人在清涼國萬朵芙蓉夾大堤題董體仁壁間二十年前灞水傍壚頭晨夕縱清狂天南海北凋零盡贏得君家玉樹長柬蘇叔大乞黃花魚徙倚東籬日漸舂南山何處見秋容憑君乞取羅浮膾吟望飛雲四百峰無題五首戲惱李王元三子珠箔銀屏玳瑁梁何人低語合歡床金籠鸚鵡渾多事窗外頻呼李十郎霍小玉事金水橋邊白玉堂人人爭問薛家娘青衣屏後褰簾看不是王郎是李郎文君顔色鬭誰強十樣鸞箋總在唐一片蒹葭秋似水月明何處問元郎相國稹最屬意薛濤紅牙敲徹總尋常指點傾城在末行歌到玉門楊栁句諸君端合拜胡郎見集異記風流千古擅詞場濯錦江頭正夕陽花發小桃寒食夜莫將魂夢惱元郎戲用李昌祺餘話田洙事射所牆東書事門掩湘筠翠色虛將雛語燕入庭除不知金犢何時返間坐櫻桃第四株歌者陳邵兩生别余二十餘載忽與遇長安邸中一曲辭去草載桃花瀫水頭腰肢垂老尚風流相逢一笑畨成别月落參橫下酒樓偶題獨捲紗窗晝漏遲春風含笑畫蛾睂東鄰預訂黃昏約夜合花香月上時春閨曲春衫斜捲越羅輕女伴西園作隊行蕩子不歸三月暮百花深處亂啼鶯秋閨曲沉水香銷白玉壺薰籠斜倚月明孤狂夫尚作瀟湘客夜夜金風落井梧題畢餘興未盡戲用唐宋人元句綴七言二絶末行此題薛生繪事五言絶後者薛嘗以素巾繪雜卉五種為一圖余系以五絶句五色毫揮五彩裙五言詩燦五花文薛家少婦行原五傳玩爭看五朵雲用宋韓維句五圖共繪一巾儼若郇公五雲體云獨步江東杜紫薇橫行塞上薛明妃君看彩筆雙題後萬古長如白練飛用唐徐凝題瀑布詩也以入羊欣事差不惡為象先題畫後薛生偶見特以精綾繪五卉見餉而易山茶松石豈其以歲寒盟余耶漫賦一絶浣却紅綃著翠盤亭亭雲色墮雕欄分明蜀國魚箋樣莫道青樓不耐寒潞河留别王行父袁微之李本建徐象先四絶句瀟湘才子王行父燕趙佳人薛素卿千秋一字神偏王一笑千金目未成懸弧正值中秋夕設帨仍當乞巧筵天孫雲錦千機細月姊霓裳一代傳當年畫識真真面此日綃看素素題南嶽地仙寧再下上元天女會重攜袁宏徐幹各風流李益王維興未酬回首素娥天咫尺片帆無賴出并州潞河南發永叔黃門舟中話舊因讀余少作絶句石梁橫截海天流明滅飛霞挂嶺頭及蒲桃新緑照人明三語則余皆忘之并失其稿矣戲為足成二章石梁橫截海天流明滅飛霞挂嶺頭好去大羅仙子宅碧桃千樹倚蒼虬鬱金沉水未稱豪噴玉飛泉助彩毫北塞邇來饒薏苡西涼何處問蒲萄永叔出都舟空亡一物第載薏苡酒十數瓶黃生石父碁於吾越為第一手而詩思亦翩翩是夕賦一律送余南還酬此一吐瑶華字字竒星芒寒逼丈人詩青萍暫隱吳閭博可道長安似奕棋卧病舟中旬日永叔命郎君過訊走筆賦贈二章半腮迎日鬭鮮紅纍葉睂山賦颶風屈指烏衣三世後新詩重覩薛竒童蘇長公幼子過賦石榴詩半腮迎日鬭鮮紅又颶風賦亦附見坡集霜寒秋色淨枝頭又見王郎白石榴笑殺子安才欲盡風帆猶趂大江流仲君年僅十四王子安序滕王閣正兹歲云憶與永叔丙戌上春官永叔至安平鎮登陸今屈指十載乃余附永叔舟再過兹地追憶曩時王生據鞍上馬狀恍惚在目相與拊掌大笑即席漫成對倚青萍夜不眠雄飛雌伏漫誰憐衰楊古馹安平道回首西風巳十年稚升席上再與永叔言别九馹洪濤晝拍天城隂聊繫孝亷船殷勤淮水東頭月重向河邊照别筵狄明叔新居河上所幸美人十數輩築臺榭以館之余過戲贈此絶秦臺雙鳯太寥寥銅雀徒聞大小喬何似霓裳三十二月中樓殿鬭妖嬈次盂城稚升使者以酒資追至再賦二絶寄之雙鯉迢迢尺素傳飛騶遙問孝亷船江風不為離人住恨殺盂城片月圓敧枕篷窗月色澄屋梁猶記共青燈多情似逐長淮水一夜隨人到廣陵永叔别余入天台四絶送之江上天末飛檣挂海濤江頭晨送木蘭橈當筵忍疊陽關唱斷雨凄風遍客袍玉洞明霞樹樹催青鸞先傍大羅回春光滿酌高堂上拚取胡麻作壽杯洞天曽宿上清扉雙送劉郎出翠微斜日亂山歸路遠桃花千樹赤城飛余嘗夢遊天台二仙子洞中儼如畫圖所遇故屢及之萬里長淮挂北風大江東下雪連空虛疑瓢笠王郎去翹首鳴珂碣石宫出塞曲十六首為周元父題周嘗為大將軍李幕客精騎射兼習琴奕丹青曽隨飛將奪天山橫槊詩成顧盼間萬里玉門沙似雪生還曽未鬢毛斑書生骨相未封侯暫逐荆卿卧酒樓腰下魚腸公莫舞大荒曽挈郅支頭年少江東智略饒長驅日本破天驕不緣羽扇能揮敵銅雀春深閉小喬高宴從軍樂事多白登城上夜如何數聲清嘯迎風發十萬前驅盡倒戈受降城下戰初回無定河邊畫角哀落日沙場秋色滿題詩人在赫連臺磨滅雄心仗翠鈿幽蘭一曲暮雲前從知顧盼仙郎熟不向人前誤拂絃周生多狹邪遊幕擁青油夜漏遲從軍爾亦解觀碁不知淝水風行日可似張玄授策時駿馬雕弧鐵裲襠何人不羡獨孤郎橫戈夜度燉煌戍直取涼州獻未央躍馬隂山白日低拂雲堆上醉如泥彎弓錯擬旄頭落並墜雙雕大磧西八法縱橫擅彩毫何煩拋擲事龍韜聊飛尺檄蕭關外已報單于雪夜逃一笑能空塞北亭寒光閃爍射青萍歌殘杕杜長城下萬仞燕然自勒銘漁陽東望海雲平橫笛偏吹驃騎營繞夜落梅春不斷千山明月滿龍城青海城頭月照沙黑山何處問琵琶長纓盡縛呼韓將重取明妃入漢家短小周郎五尺軀侯門花色照長裾莫言談笑無竒策百雉聊城祇片書君卿脣古詫紛紛筆札兼傳谷子雲怪得五侯鯖滿座鐵椎曽奪信陵軍拂袖行歌入帝都灞陵亭上醉相呼過從賴有任安在使酒何勞挈灌夫渡黃河抵吕梁再寄徐參知即景舒懷共十絶句千頃清淮匹練長使君高誼重餘皇布帆無恙南風正日暮行人到吕梁漫説陳登百尺樓十年湖海浪成遊多情好是徐元直一借仙槎問斗牛星宿黃河濁浪澄長淮飛雪罷奔騰金堤萬國輸王會玉碗千秋鎮茂陵櫛雨梳風事若何古來師克在人和飛芻直接桑乾塞轉粟新成瓠子河花照桃源百里紅班荆曽此聚羣雄虛疑仙子栽靈藥莫認漁郎繫短篷桃源縣俗傳先主聚義處在彭城下龍起曽驚大陸前書生今握萬夫權輕裘沛上分曹處鼓吹牙門白日懸千仞雲龍列翠屏亂山環匝楚天青干旄絶頂行人過遙指元戎放鶴亭芒碭龍飛大澤雲高臺戲馬送斜曛胡床何處邀詞客清夜黃樓萬柝聞豹略熊韜冠世姿雙龍腰下劒雄雌封侯莫訝儒生薄談笑曽紆十萬師亷訪嘗定淮南變為天下治平第一進履橋頭國士蹤榖城山下記相從功成屈指封侯日重向金華問赤松君嘗從家大人遊在總丱時已錚錚播露竒穎瀫元亭上聽歌作花竹周遭十二欄萬家明月滿長安夜深庭院天風起隊隊霓裳出廣寒秋日卧病瀫元顯卿厚之皥民過訪老病秋來話息機滿階梧葉夢魂飛亦知極樂華胥界無奈西風撼竹扉十年消渴夢魂搖驢背風煙又灞橋玉露金莖何處問漢宫秋色正岧嶤再别惟寅十絶句三十年來擊築場白頭相對又河梁雙龍莫訝經離合滿目飛雲是太行亂雲殘葉晚凄凄揮手長安日漸低眼底只今饒醉尉不煩追送灞橋西君向青門話種瓜余歸亦卧武陵花扁舟後夜堪乘興雪滿山隂十萬家千里行歌出薊門何年同住杏花村衰楊古馹盧溝道歌到驪駒各斷魂余擬卜居秣陵與惟寅相晨夕十載青萍賦浪遊蕭蕭羸馬塞門秋那堪茅店雞聲夜落月梁間夢李侯日夜西風起潞津余歸君住總傷神相看脈脈燕臺上地北天南兩病身易水燕山半草萊蕭蕭風色暮偏哀悲歌屠狗凋零盡無賴黃金百尺臺玉河流水暮潺潺行李西風出亂山一路相思秋色裡孤雲何處秣陵關極目天南雁鶩羣荷衣深入五湖雲華陽碣石當年事憔悴西風不可聞十萬貔貅罷枕戈中山無奈謗書多祇今銅柱留遺迹誰見當時馬伏波柬李汝藩四首萬斛鯨波大海頭扶桑東指亂雲愁玉門生入殊堪樂莫羡當年定遠侯憔悴東還泣數竒親闈南國倚閭時誰言敬仲操戈怯剩有交遊鮑叔知歸來無恙舊樓船贏得雞林字字傳不是王陽難九折千山雲色太行前不解征衫客異邦興闌初返木蘭艭東遊可道風波惡題遍新詩鴨緑江巧巧素素皆薛生名也而字特未稱余與行父定議曰瑤英庶於二名不偏亦以古有兹字也翩翩長袖越羅輕玉骨氷肌照眼明莫道元家人已去千秋重覩薛瑤英滕觀察先生招遊湖上藩臬諸公咸集命余賦詩弱水盈盈一望中羣仙環佩起天風青霄盡斂浮雲色紫氣遙臨大海東少室山房集卷七十八
