body:
  text: 少室山房集巻九十二明胡應麟撰墓誌銘三首嘉議大夫都察院右副都御史贈兵部左侍郎建安滕公墓誌銘代司空曾公作莊皇帝初御㝢余承乏文選郎與今大司馬粤西舒公前大中丞閩南滕公交莫逆也余在事彌年獲免諐戾兩公左右力為多是時上勵精當宁中外有司更置略盡一時疏請什倍世皇朝賴天之靈兩公以同舍日夜匡余弗逮迺滕公方抱痾猶為余强起勾稽功令銓次除目迄丙夜余以是徳滕公尤深隆慶己巳春余竣事稍遷奉常請給歸未幾公亦予告嗣是余與公先後忤權貴人數起數廢蓋二十年間出處隠顯之迹略同云頃余拜命冬官公適起塡兩浙方冀公旦夕内召披瀝肝膽共淬晩節以報聖天子則公奄然逝矣余既偕舒公合詞馳奠公居恒念公赤心死王事冀得當以慰地下而未有㑹俄上命覈海塘功余因得備疏公勞勩茂異上聞幸天子嘉納詔予公一子入成均異數也又逾年公仲子萬里匍匐持右叅朱君狀介使函幣載頓首庭下以公塋石泣請銘嗟虖余于公死生患難之交也即銘公非余疇任者按狀公滕姓諱伯輪字汝載别號少松其先周子男國世居洛後扈宋蹕僑㝢閩之甌寧六世祖員郎禮部死難土木祀學宫員生𢎞恩以廕籍知邵陽縣𢎞恩生鏞鏞生海州别駕㴻别駕公二子長古松公鶴齡即公父也嘉靖甲午薦鄉書授通判南安娶于陳以嘉靖丙戌十二月初五誕公公生而岐嶷幼不好㺯始就學日誦數千言塾師駴異弱冠補邑諸生未幾南安公殁于官公奔赴邸中哀毁骨立南安公廉介絶出居官日不私一錢公徒跣扶櫬歸家壁立公怡然不屑也下帷誦讀伊吾聲徹晝夜學使者行部至建安公輙高等名藉藉起諸生嘉靖乙卯舉澤宫壬戌成進士觀政水部大司空豐城雷公試諸進士備邊策獨才公游揚諸薦紳不絶口已授官知廣東番禺縣番禺故嶺海巖邑適潢池㺯兵勢張甚公至緩催科審保甲浚濠隍繕樓艪教技擊至不遑盥櫛兼以鎭巡趣築外城調停節度縮浮費幾三萬緡兩臺交章薦激奬備至丙寅擢禮部主事尋改吏部考功厯主文選事時蒲坂楊公為太宰於諸曹郎愼許可顧特雅重公日有所咨訪公徐條品目無弗犁然當楊公隆慶初以大慶贈南安公如公秩母陳氏配楊氏俱安人尋遷員外郎移疾歸權貴有不便公者即家擢公貴州按察副使公脂車就道絶不以外遷芥胷中今皇帝御極廣厲人文特詔公以故秩移督兩浙學政浙人物聲華甲海内而奇衺弔詭稍稍遜曩時公以身帥之敦本實黜浮華甫閱嵗文體斐然後先僅三載士蜚英通籍名流自奮無慮數十百人尋轉督儲叅政修漕艘謹兊運輸輓如期擢廣東按察使粤諸士民習知畨禺政聞公來戴若慈父母惟公雨露霜雪迭出互施憲度張皇吏民咸飭羅旁之役公監領贊畫功最大幕府言于朝詔予金幣擢浙江右布政使㑹鎭巡爭苛禮不相能而風聞者妄意公搆成間隙庚辰大計言官遂希㫖齮齕公公投牒銓司歸屏跡公府寄傲林泉至不知嚇鼠為何物間以餘隙讀方外書要一二友人登晀里中歸宗巖縱觀瀑布之勝飄飄然有御風騎氣想郡邑守長踵門請質屬道路公輙鍵闗以疾辭權奸敗臺諫羣起推轂公癸未徴補廣東右布政使濬河役興公簡廉勤吏分曹課督所節費不貲尋超擢南京都察院右僉都御史閱江防公念根本重地民匱軍驕漸不可長亟取事闗振刷者條便宜十上之詔報可長江上下竟公任無一葦之警擢都察院右副都御史提督軍務塡浙中公之再蒞浙也雖山川草木莫不習公色飛者公念浙自兵民叢棘旱澇頻仍地若甌脫矣至則延見父老咨訪藩臬大僚度不起凋瘵不已又值嵗凶米價翔踴桴鼔晝驚盜萌磔起公掀髯奮曰迺公奉三尺苐恤饑民詎長亂民耶趣移檄諸郡邑示諭黔黎多方賑濟諸無藉惡少蜂屯豕突槩峻法繩之因力請改折漕綱停減織造以休息困瘵一一取中㫖報可亡何疫癘興死徙相枕藉捐俸槥瘞度二千有竒他如議常平乞赦賚少可舒民瘼者不憚反覆疏陳必得請乃已公自撫浙以來朝夕飲氷寢食俱廢數陳疾乞休不允㑹颶風起揚沙拔木蕩析民居而海鹽防海塘堤震壊公悉心計畫括全省無碍帑金八萬資工費閭閻按堵若不知有大興己丑春以防汛出海上忽島夷盛集余皇將入犯内地公夜召諸將校以方略掩擊大破之殺獲千計餘什九溺水中㨗聞上優詔褒賚有加然公自是疾遂亟凱旋卧床笫者五日竟不起上念公薄伐功特贈兵部左侍郎給祭葬如例邇年三品未滿考予全葬自公始公為人外剛内和獨持敢任生平慕包孝肅為人其介特天性然也讀書恥逐逐章句留心性命之學閎深博大人不可以涯涘窺居官厯通顯絶不為家山庒僅老屋數椽磽田數頃卒之日餘俸百八十金至勇於為義賙恤困窮孜孜若不及人謂百餘年來嶺南人物公與何文裕海忠介為稱首殆確論也公配楊安人出文敏公後多淑徳後公二月卒子四長萬申娶博士張衮女先公卒次萬言殤又次萬里國子生娶觀察陳君烈女繼娶游處士士璉女俱安人出又次防側室高出女二長適庠生陳奎章次范有嚴公卒于己丑三月二十八日距生嘉靖丙戌得年六十四云往公之貴竹弭節訪予山庒再信乃别後十三年赴嶺表又期予出晤留連江介三日餘因極談建安山水勝絶謂數年後解官歸當掃丈室俟予嗟乎孰謂公竟不待耶雖然予後死矣異日者歸而善飯浮一棹武夷之曲拜公墓下以托于延陵之劒固有日也輒因仲子之請援手志公墓而系以銘銘曰猗滕啟宇自姒麟若若纍纍延七閩公繩祖武降庚寅排雲掣霧攀龍鱗絃歌聲徹嶺海氓天曹簡秩超人倫秉鐸三周髦士馴良知高揭越水瀕建藩陳臬懸朱輪吏肅霜威民飲醇帝念三呉灾沴仍簡書特厪控江漘載憂兩浙多呻顰量移節鉞驅頑嚚鯨鯢築觀髙由旬璽書三錫來楓宸凱旋飲至車轔轔鞠躬盡瘁殞星辰帝聞震悼煥絲綸豐碑巨碣鑱髙旻公死不死眎後人太子太保工部尚書食正一品俸萬安朱公墓志銘代大學士許公肅皇帝季年河決華山絶沛趨昭陽漕渠受齧二百餘里餉道阻焉天子南顧太息咨羣卿士疇為我任渠事者僉曰今大司寇朱公其人也於是朱公改司空視河公至則彭城之郊沮洳彌望又地當水衝即濬之必復齧庚齧庚濬費且無巳時亟下令召諸父老徴所見聞對或云城之東十里而近趾隆阜可渠曩胡公世寧創議開鑿後盛公應期經始而罷者故迹尚存河勢紆衝齧所弗及兼道徑易漕復西渠不若穿東渠便疏入詔報可而故渠旁居民多賈人子藉渠為利流言沸騰中朝諸年少持空談和之交難公以勞民殫財幸不可必成之役上意不能無動詔給事中何君勘議焉何君具言舊渠不可復者五而急宜治新渠議乃定新渠穿自南陽折而趨夏村東南距留城百四十二里復疏舊渠起留城南抵境山五十三里渠成而東齊呉楚舳艫五千艘衘尾而至天子大恱為歌詩紀之侍臣屬和厯莊皇帝世渠益修楗石樹隄建閘瀦薛沙諸水於湖徙故留城水部及郵傳于夏村而漕務大集蓋公之䂓畫纎悉委折至今覯若云明興以漕渠顯者及公凡五人工部尚書宋公禮平江侯陳公瑄武功伯徐公有貞兵部尚書劉公大夏皆因勢順導役不踰時未有如公之排衆獨往手縣官金錢米粟鉅萬數劃厚地為長河而功用竟成澤垂永世今徐邳以南濟汶以北頻嵗潰決不恒而公所治渠垂二十年宴然如故此其一費百全暫勞永逸之明效也公家居十年所而寳應役興今上思得練習渠事白首舊臣而任之公乃以其年七月戊寅棄賔客逝矣於乎惜哉訃聞上震悼下禮官議祭葬如令甲封阡造塜示異數而伯子維京倚廬布狀來乞銘不佞嘗幸于公即無暇何敢辭公諱衡字士南薦紳學士稱鎭山先生上世居南康宋東京郡公孺庭徙萬安遂為吉州人孺庭子良臣紹興中以貢補進士良臣子誠之官秘書誠之子子厚子厚子致美當淳祐咸祐先後以伏氏書為解首數傳而至彩者公髙祖也彩蚤世遺腹子祖貴祖貴有隠行二子伯寵仲憲憲任婺源博士以子麟貴贈刑部員外郎憲仲子鵬為伯寵後即公父也鵬及寵憲俱以公貴累贈資徳大夫正治上卿太子少保工部尚書鵬娶贈夫人陳以正徳壬申正月二十日誕公東門慶元里先是有羣鶴盤空下迴翔於舍日者謂公父而不聞當世有劉忠宣乎兒他日是已稍長就外傅穎異絶人日誦數千言目十行下贈公憲甚竒之親授易解年十一補邑弟子員督學使者呉郡周先生得試巻大驚詫每飯輒食公號朱童子賦詩誦于人自後督學試輒首公辛卯公年二十遂以易魁其鄉壬辰第進士授龍溪令踰年改婺源甲午擢刑部主事遷員外郎贈公病請告家居六年强起轉郎中甲辰與大比武士乙巳奉勑録囚江南居子舍七日而贈公卒免喪補禮部主客郎擢福建提學副使久之叅政四川便道省陳太夫人居二月太夫人卒起補河南叅政明年擢山東按察使尋擢右布政遷左明年以都察院右副都御史塡山東亡何晉工部右侍郎董三殿石工以勤辦受知肅皇帝賜飛魚服予一子入胄監改吏部右侍郎滿三嵗贈父鵬及所後王父寵俱如公官復廕一子而本生王父母不得與公因疏請移恩報所生特詔並給公兩王父母尋遷左侍郎擢南京刑部尚書未任㑹河決害漕改工部尚書兼右副都御史總理河漕璽書嚴重山東河南兩直𨽻咸受節度陛辭賜金幣麒麟服隆慶初新渠成晉太子少保食俸正一品仍總漕戊辰召還部壬申科臣交疏薦復兼右都御史出視河賜蟒服經理淮邳等處俄莊皇帝崩山陵事亟復召還癸酉慮囚奉勑主廷議所矜宥三十餘人衆稱允乙亥言路承權貴㫖疏詆公外强直中腹誹無人臣禮請罷公公抗疏乞歸再疏再留衆謂公少濡忍且秉銓公陳引益力于是温詔褒諭加太子太保乗傳歸初公守司空一日有詔遣工曹郎一人偕中使往造胡良河橋公知出大璫馮保意也河故山水四聚勢甚駛轉石下楗勞費百倍工與新漕渠等遂疏言徒杠輿梁有司事無事煩中官抑王政有大體至尊上奉慈寧怙冐宇内如天無窮詎在濟涉今公私方告匱罷之便疏入寢不報王大成獄起詞連新鄭羣情洶洶公急排江陵相闥抗言曰一妄男子闖禁地付尉士足矣乃使蔓引株連此所闗國體不細仍促駕諭金吾帥令速抵罪妄男子以息羣疑時變起倉卒掖廷驟以大獄付帥朱朱𢥠昡蔑知所措鄉聞公言大悟即夕具獄上江陵意公右新鄭内御之方議橋胡良時江陵相要公語宫中建造木抵累朝故事吾所先斡旋者數矣非甚蠧政第順之公正色曰僕乃與公異公職在納誨僕職在守官江陵嘿然蓋言者前所指為腹誹而利公去者以此隆慶中朝廷清宴乗輿六宫所徴服御器用動以億千計公疏奏國計耗竭久願勑中貴人母濫徵言甚惓篤監局將作多無賴子竄姓名籍中冐既禀公奮然請覈之所汰去數什百人時司禮貴人滕祥監内工憾刺骨顧上方尊信公卒莫能難也其他諌張燈者一諫織作者再首劾閹陳洪再劾孟沖再劾李祐趙遷諸大璫耳公名無弗縮首重足者其不畏强禦類若此始司空蔵承凋弊之餘贏金厪厪七八萬公在事六年乃餘八十萬穿漕河衆十萬餘溽暑暴露往往成癘疫公噢休撫摩行視醫藥咸樂為盡力亡怨咨是時公年已及耆每櫛沐風雨乗小舟犯洪濤登降陂陀糧裹時絶左右不任罷餒公益鮮監將作西苑肅皇帝從帷中望見問偉儀度者誰由是嚮意用公開府山東嵗饑人相食嘯聚㺯兵公蠲賦省役以招徠之盜相率解散繼大蝗公令民以斗粟易斗蝗蝗立盡四郊頌生我景藩之國貂璫緹騎屬道路公好語中貴人務為約節事辦而民不騷在臬司一日呼積嵗在官閽把其陰重罪數之曰若當死吾導汝以生吾廉知官中為蠧者種種因投牘于地令疏記實吾且顯用汝一不合立撲殺汝矣閽惴惴無敢隠公按疏拔去蠧甚者椽曹大驚以為神督學閩中所甄士多名臣有魁天下者太宰黙方秉銓公以事法其子弟宰婺源令出必行與寵臣太宰鋐忤所親以禍福爭之公邈然弗為動其彊直自遂矯有古大臣風蓋自少然也生平著述有東撫奏議若干巻河渠奏議若干巻司空奏議若干巻詩文集總若干巻公雅不欲以雕蟲末技名而文渾噩爾雅存大體集史漢韓歐之長弗䂓䂓一氏詩清新麗密汛洗宋元頺習追大厯黄初而上之正嘉慶厯之間獨公當一代稱作者宗工嗣起王元美汪伯玉李于鱗輩交口推轂公以勛徳詞章雅相頏頡云尤喜引拔雋流得一善惓惓齒頰學者宗仰之若泰山北斗非獨以功名盛也方公得請出都門憾者即摭昭陵方中事衊公削宫御以尚書致仕公殁逾年守臣為力請詔復還太子太保享年七十又三元配劉封孺人累贈夫人繼劉累封夫人子二長即維京丁丑進士歴官工部屯田司主事娶鄒氏故祭酒文莊公女也綬京太學生娶劉氏三女長元配出壻劉應宿季繼配出壻劉士遷皆邑諸生其嫁廬陵諸生曾文昌者中女也媵彭出孫二大夏維京子大商綬京子卜以萬厯丙戌月日葬邑之雙龍阡銘曰煌煌大朱始卜萬安自公孺庭代有顯者迄司空世莫之與京休烈赫隆益阜以昌惟天篤生篤生名賢厯事三朝為帝股肱河流湯湯延道弛離懐山襄陵沈璧搴茭旰食宵衣疇咨大廷司空受簡陛辭而往四載是乘徙渠便漕徐兖之間水土以平天葩燦曜侍臣廖和紀厥功成既錫𤣥圭遄歸弼予帝曰汝衡眷倚方懋益輸其藎多所匡正貴戚倖璫側目耽耽萋菲横生請乞骸骨臣老宜罷非敢要名天子慰留引退益力賜傳南征優游林臯返眞于斯便房泉扃礱石堅膩藏閉中羨銘詞可徵不朽者三景鍾汗青萬古全名應文學墓志銘代大學士趙公君諱召字可南古平其别號也先世自天台徙婺永康逮宋有孟明者與邑人陳同父及朱元晦吕伯恭諸大儒㳺厯五傳至君王父惇惇生璋是為君父東白公東白公由佔俾起家蚤嵗擔簦謁同郡章文懿公文懿一見輒避席呼小友鄉先達大司空徐公雅器重之行實具載郡乘君幼警穎寡言笑異羣兒前進士徐君覩其神彩玉立以息女女焉業成試有司督學張公按部竒其文拔高等補邑弟子員孔公天𦙍系至閲諸生巻得君大擊節有深探理窟之評是時東白公亦用諸生高等授新安博士過里挾君與俱適增城湛若水先生談道黄山白岳間君摳衣門下一時海内名士相肩摩聲稱燁燁起㑹母朱遘疾君窮日夜侍湯藥不解帶比終扶櫬還值洪水漲溢柩展轉急流君擗地籲天誓俱没俄厲風倐霽若有神竟舟達岸無害觀者萬人嘖嘖呼孝感尋東白公請老歸君以冡嫡當户晨昏竭力奉顏色頥指悉當東白公心東白公繇此得一意葆攝天和登上壽以無疾終君毁瘵骨立蔬食飲水迄三載毋失容鄉黨推善居喪自君為標的既身代東白公握家秉益修明約束而光大之遇羣從子姓恩禮隆篤弗率務以躬切劘至出入比閭族黨一秉以直道誠心獧薄者竊聞其風多自化環一鄉亡問識不識交口頌古平公篤行君子也君素履雅以和洽稱迺一當大節山立崖峙不可奪靈岩寺廢斥賣縣官有力者羣起睥睨君毅然曰先少師妥靈斯在奈何當吾世失之亟奮身廢箸酬其直且建祠享祀以東白公配他獨行往往稱是中年數以文藝困有司慨然念男子生墮地業當不朽自期待即萬鍾五鼎足加損我乎翩然裂青衿去其籍日取古先王六藝演繹之間以餘力推能事于篇詠所撰述有周易質言道統録靈嵓寺志古平漫稿等書君以萬厯丁丑閏八月卒正寢距生正徳辛未三月享年六十又七配徐氏宋竹齋公女孫即前進士君冡息始笄嬪于君柔嘉娩嬿更禮敬若賔主雖生長閥閱而簡素自下有桓少君風事舅姑饔飱滌􅔱先意曲中諸娣姒怡怡如也以至遇臧獲羣下咸有恩閫以内若大若小師其令淑生正徳辛未五月卒萬厯庚辰九月享年政七袠云君丈夫子三人長昌期殤仲昌㬇邑庠生力學有時望以例貢入太學授兵馬副指揮娶徐氏季昌穆郡庠生娶季氏女二長適貢士周某子次適太學生徐一謙孫男九長處思邑庠生次夢思孝思忠思太學生次明時亦邑庠生次清時進思盛時嘉時孫女一人曩余備員史局適昌㬇偕余弟需次天官因介紹襄大事余諾之未暇也既余南徙則昌㬇以南揮使至未幾余復徙而北今駸駸十禩矣是嵗昌㬇亦以服闋來燕匍匐持徐君師臯狀拜庭下曰願終藉師相寵靈余悲其意且諾責亡他諉迺稍據狀論次之而系以銘銘曰夫鴻婦光履直蹈方爾躬弗彰爾後大昌華山蒼蒼有阡在崗奕世永康是為應長君不朽之鄉少室山房集巻九十二
