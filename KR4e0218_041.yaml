body:
  text: 少室山房集卷四十一明胡應麟撰五言律詩八十九首破山寺偶題髙禪何處尋杖屨入祗林古寺無人到虛堂落葉深溪光經雨滅瀑響過雲沈兀兀繩床客誰明定慧心送王文學還武昌時以陳從訓書至問姓曾驚座藏名類接輿到偕京口雁歸趂武昌魚竹素千秋上藝編萬帙餘相逢不成醉天末意何如瀫溪别業二首茅廬南郭外十畝帶橫塘曳杖青山逺飛槎渌水長花香浮雪壁竹影動雲房五嶽遊堪卧悠然號上皇卷帙桓談富篇章杜甫貧乾坤容傲骨海嶽遂間身坐挾垂綸客行招荷鍤人一癡殊未厭久已絶貪嗔夀范茂才當年聞五范閥閲首吳中咫尺金閶下仍看玉樹藂青鸞翔海日白鶴舞天風謾逐東方去氷桃萬核紅葉太孺人挽章六首懿行標彤管芳聲動紫宸庭前驄馬客膝下豸袍人南嶽金璫返西華玉珮陳惟應萬家淚雨注婺州民鸞章晨北極鳳管暮西池萬室悲慈訓三朝頌母儀修齡逾大耋上夀接耆頤咫尺潘輿在傷心白日馳劬勞初罷誦聖善舊徵歌母德傳中壘仙蹤赴大羅音容吳里隔涕淚越天多寂寂支機杳無由覔絳河慘淡丸熊夕輝煌冠翟年寧知蒿里淚偏灑柏臺前素翣含霜動丹旗抱月懸異時良史筆閫德照重泉令譽中閨擅恩綸上國來青鸞朝玉闕紫鳳集瑶臺落日萱花逝飛霜蕙草摧朝看攜萼緑聨袂上蓬萊何來三鳥使相逐絳臺傍夜月殘西島晨霜浸北堂叢蘭芳獨逺寸草恨空長尚憶飛雲起停車望太行湖頭夕泛十里平湖色芳菲夾大堤山回雲夢澤水出武陵溪渚淨鳬鷖浴籬明鳥鵲棲沙塘何處泊隔港已聞雞送李太史使湘中片帆春草外千里問衡陽劍履金閨色衣冠玉座香攀雲遊嶽麓冒雨宿髙唐蚤就湘娥賦鳴珂入建章宿嚴灘作扁舟富春渚回望瀫溪濆渌水晨生霧青山暮出雲荒村猿嘯侣廢崦鹿成羣會著羊裘在毋令漢殿聞望湖亭雨中作懷祝鳴皋極目危欄外秋光亂夕舂雨聲千澗集雲氣兩湖重翠壓仙壇竹青舒佛院松美人煙水畔何處采芙蓉一夢一夢遙天末羇人萬里心關河秋氣早風雪夜來深擁褐聞征雁褰裳見宿禽誰哉共尊酒燒燭自長吟送劉內翰使嶺西拂曙下征軺鳴鞭出灞橋方輿窮百粵土俗辨三苗樹色桄榔古花香豆蔲饒金門持戟暇魂夢憶瓊瑶彭城雲龍山晚眺憩項王故臺并酹亞父冢有懷題返照長河急浮雲大澤空遙憑孤閣上俯眺萬家中地廢悲王略天亡惜霸功荒墳猶亞父涕淚盡城東送李鴻臚之白下白面紫薇郎承恩出建章啼鵑催别騎舞燕逐征航日抱金珂影星搖玉劍光秣陵佳勝地蚤晚賦長楊送閔孝廉之苕中二首落日抱離旌蕭蕭白雁鳴夕陽孤劍别秋水一帆征粉署寧親思彤扉謁帝情河東新草就珥筆上瑶京野色飄行斾江光照客船長林楓葉路孤館菊花天狗監文初達龍門賦已傳浮家何日事問汝霅溪煙九龍别業何年遺别塢十畝亂雲邊五栁長垂碧雙松對草玄斷崖撑閣逈飛瀑挂亭偏滿目忘機客花時數放船問李惟寅病已似休文瘦還耽叔夜吟夢回芳草逺病起落花深雨濘黃金甲風疏白玉琴蚤知朝謁懶藥餌稱間心夀吳淑人春色重簾外笙歌晝未闌屏開回白鶴席上舞青鸞浥露金芝秀凌雲玉樹寒氷桃漫留核方朔已偷殘吳山人持齋戲贈笑汝清狂客持齋繡佛前周顒元護法何胤舊逃禪嶺砌須彌石池疏阿耨泉翛然攜手去塵外息諸緣白雲世德詩為林孝廉賦誰専巴穴富夙擅渭川封薛氏誇三鷟荀門羡八龍新居蟠翠柏舊壠夾蒼松何限孫枝在林林玉樹茸題林孝廉家慶圖棠棣偕芳日椿萱並茂時金莖懸五葉玉樹綻雙枝海鶴傳書近山鶯度曲遲今來上元宴麟脯擘含巵送陳季相還七閩乍得溪頭信俄欣海上逢雲山偕獨往湖海狎髙蹤坐嘯雙黃鵠歸騎兩赤龍相攜子騫侣十日幔亭峰寄真如上人行乞過三市隨緣住五陵南徐先舍筏北地逺傳燈古洞雲埋柏清池月挂藤門前多寶塔出定幾同登挽鄧太翁兼唁逺遊明府四首此夕仙槎逝當年宦轍回松猶彭澤撫木已豫章頽獻賦名空藉修文業未摧祇應豐獄底劍色謝風雷東華新劍珮南楚舊弓裘世系蕃髙密鄉評重太丘經猶傳馬隊敕已下螭頭藉藉承家譽相望在斗牛政爾生芻隔將無宿草茸孤亭徐孺子大厦郭林宗素旐霜華薄丹旌露色濃異時銘太史不受漢亭封化鶴還丹嶂騎鯨上碧虛一竿遺蠡澤雙屐挂匡廬日朗新題碣雲寒舊著書鹽車何足恨千里屬騊駼歙中謁徽國文公祠作閩粵真人起髙標自不羣丁年窮百氏乙夜攬三墳力障鵝湖水神遊鹿洞雲至今靈爽在長對武夷君清源寺中戲效晚唐人五言近體二十首有序唐律元和後卑卑甚矣韓栁元白振代之才弗能挽頽波而力遡之古而賈簿姚監輩實始以清新奇僻闡别派于五言咸通以降厯世相沿上自宋初下逮元末凡詩家者流律有唐韻者率是物也舍是則又自為宋元本調乃初盛中三唐自沈宋孟王韋栁外大都髙閣束之明𢎞正諸先輩出有事掃除即李唐中葉剔去齒牙晚季奚有乃余絶長潔短篤而論之氣骨雄髙聲調鴻碩當特屬之初盛諸家至抒情難言鑄景難狀形神湧出誦者躍如則晚唐獨造偏長亦間有足采者其格姑舍旃弗論可也余弱冠談藝中原匠心曩哲至于斯義久畜胸中嚴羽卿氏所謂作法于涼懼繇隗始已亥北上卧痾清源禪寺放棄羣典偶目僧房中支枕數軸首尾漶滅皆晚唐諸人詩因戲步其遺韻為五言律三十餘章匪曰亡羊于多岐抑亦求馬于全體云爾寺憶支公住林餘惠逺蹤浮杯來大壑振錫上孤峰徑僻雲埋樹忩明雪照松踟蹰貪佛日歸趂暮天鐘大地懸香剎中天築化城重簷飛嶽色古壁撼河聲法座琪花暗經壇貝葉明異時齋繡佛帝釋下瑶京香積何年啓天風躡屩攀白雲平講座青靄覆禪關斷碣橫髙隴疏鍾出亂山一僧頭白坐兀兀定林間雲霞尋老衲塵土拂征衫鹿叩談經石猿啼説法嵓寒雲封密篠凍雪墮危杉何限宗雷句穹碑百尺鑱杖䇿平堤外輕風拂面柔寒山成獨往老衲話重遊怖鴿蘿龕下飛螢竹徑流將因謝塵鞅丈室住牛頭能仁元海嶠伏毒舊江濆隘地龍藏雨髙天鶴跨雲嵐深秋徑失瀑逺夜堂聞寂寂盂蘭想先題發願文户牖生虛白樓臺上鬱藍談經獅子吼護法象王參檜老斜撑石松枯半壓潭何因挈天女絶頂卧茒菴杖履初辭越菴堂半住吳臘深松樹老禪久桂叢疏五嶽雲髙下三峨雪有無異時騰劫海片笠授潛夫蚤淨三生業真傳二祖衣蓮花叢佛座柏葉護禪扉石為懸燈動泉因卓錫飛居然離捧喝默會洞仙機為叩西方剎因停北上槎金身懸寶樹玉髻湧瑶花夢已清圓覺心將悟法華恆河歸去路雲霧繞三車震旦聊乞食佛座湧金鼇骨瘦知吟苦眉長見臘髙香燈岩洞月杖錫海門濤近失瀟湘譜瑶琴廢不操辭家來北嶽結社向南屏夙擅降龍訣新傳相鶴經推敲臨野燒飲啄閉山亭夜夜康王谷飛泉獨坐聽香爐峰外路雲日晝凄凄飛瀑當樓滿寒山入座低潭心龍女出塔杪雁王棲會逐曇摩履翩翩大磧西一褐閉禪關孤雲盡日間來從身毒國買斷沃洲山白象鳴鑾去青獅護駕還中天彌勒閣未許善財攀十里華嚴界重來雪未消鍾聲寒殿出塔影夜池搖桂樹縈階發藤花拂座飄西來亂峰外有路入中條淨樂傳尊者真如卧法王池幽菱芡熟殿古芰荷香一鉢擎秋雨三衣挂夕陽塔中多寶佛夜吐白毫光萬峰天竺杪丈室寄禪心野鶴經秋卧山猿徹夜吟稻香雲碓逺花影石壇深一衲函髙座相傳自少林為樓依北固舍宅望西江竹逺通金磬杉髙並石幢龍歸雲壓棟蜃起月沈忩孰是髯居士前身合姓龎雙林曾授記百丈近安禪洞古頻棲鶻峰髙欲墜鳶秋燈雲閣外晚磬雪房前乍夜維摩到天花遍佛筵偶入清涼界同探大小乘北宗仍事秀南法已傳能苔逺連深竹花疏墜古藤故山瓢笠夢極目海雲層廢寺十首序意見前寺敞千峰入橋危一徑通白牛遺漢像蒼鼠竄唐宫劫火頽垣外隂磷壞竈中南朝四百八成住盡虛空階基元晉代棟宇自梁年草閣螢潛住繩牀鹿借眠荒碑沈亂石廢沼咽寒泉擬喚廬山衲開山種白蓮雙林遺古佛六代幾殘僧畫壁全封蘚香厨半壓藤池荒螢亂入塔壞蟻頻登一杖圭峰老猶談大小乘浮蹤仍嶽麓舊宅寄岷峨摩詰終年病文殊信宿過池幽霜墜栗洞古雪封蘿一塔危崕上人傳舍利多落落蒲團好遙遙竹杖來寺寒千嶂入門淨兩湖開古砌風鳴葉隂廊露滴苔若為論去住千劫總浮埃松風隨曳杖伏翼走危欄古寺何年廢空門盡日寒流泉交井竈墜雪擁林巒欲叩西來意寥寥竺法蘭翛然天姥外斷絶世人知老檜穿崖長寒松抱石敧鉢殘呼鼠共牀朽倩龜支一衲都忘老雲房自在披疊嶺飛丹鷲殘碑記赤烏山風寒梵逺水月夜禪孤瀑灑林長潤岩傾樹半枯間階蔓蒼蘚恍惚舊金鋪禪堂餘結搆破衲挂林樊宿霧沈荒井秋河沒斷垣杉深時墜鶻果熟乍聞猿寂寂拈花手應悲末法繁寂寞空王座蕭森佛子廬蛛絲縈石屋虎迹印山廚火滅天然後燈殘慧可餘悠然念塵世昏黑重踟蹰夀程隱君瑞日華筵啓明霞彩袖陳玄關懸大藥漆圃現靈椿嶂挹三天子峰攜五丈人白嶽有五老峰君家其麓朝來海籌屋紫氣正嶙峋寄包稚升二首政績飛三殿風流擅六朝歌喉桃葉細舞態柘枝嬌廳事淮山月鄉書越海潮玉皇香案近八翼夢雲霄何由滄水使縮地對仙曹綵誤江淹筆綈慙范叔袍髙牙瀕海戍巨艦夾河濤不分清江月盈盈入夢勞題塢生逍遙遊卷久客金臺雨渾忘鐵甕潮人從嗤汗漫帝許號逍遙五嶽環孤枕三天挂一瓢秋風大鵬背穩坐上扶搖送王令自錢塘博士遷富春祖帳西泠畔驪歌薄暮聞一氊猶挂雪雙舄已乘雲官舍新栽秫黌池舊薦芹知君政成後絃頌繞江濆是夕周元父攜琴命所歡竇姬為猗蘭之曲索余贈詩再賦得街字中秋先此夕露色滿天街桂折黃金蕊蘭垂碧玉叉髙山懸廣座飛瀑繞空階會挈平原侣經旬臥竹齋寄贈廉訪梅公時方校賔興士風裁百僚長繡斧曳朱衣姓氏書長樂光芒徹太微樓臺三竺繞鹵簿六橋飛燁燁黃金下花驄近帝畿矯矯羣龍集掄才作賦場樓船移采石斧鉞駐錢塘宦業三臺重鄉書一水長蚤知門下彥騰踏半飛黃友人分惠秋海棠一本爛漫檻中自綴小詞命雙鬟霓裳歌以送酒醉中賦贈並命玉素和之小徑移紅藥間亭閉緑蘿神飛天姥夢興逐雪兒歌冶色矜眉黛流光惜鬢皤不須賡子夜風露帝城多秋夜過沈純父同王文學汪山人聯句己占青山色仍逢白社人沈仙槎分雨露祖帳出風塵王夢繞三江樹心飛八月蓴汪碧宵誇鸑鷟黃閣笑麒麟好去嚴陵畔星河拂釣緡贈陳鍊師二首草載雲臺觀憑虛謁上皇彌明孤髻短𢎞景一瞳方劃地蛟涎淨摩天鶴羽翔秋來九華枕遊厯遍扶桑羡汝玄都客神情半泬漻黃粱炊處熟紫氣望來飄玉檢移新秩金􅓚問早朝西池桃萬樹幾夜躡神飈友琴册為陸太學題并呈思清孝廉乃翁嘗任單父宰名香蘿薜下一室素琴懸四壁青山響千秋白雪傳廣陵新按譜單父舊鳴絃欲起鍾期聽乾坤對惘然題祝無殊小像一壑堪誰置三毛頰畔長豪吟卑下里狂興劇髙陽緑水芙蓉社青山薜荔裳玄亭吾罷草愧爾及門牆喻邦相束裝入計中途忽有遷杭之命寄懷二首舄已飛王令刀俄佩吕虔移官滄海上候吏大江前栁葉千家笛桃花十里船湖山真勝絶獨少伯牙絃豈謂雙龍劍翻成獨鶴操樓臺三竺近省署萬松髙海色飄行蓋湖光落畫舠不堪靈隱月飛夢對持毫魚竹軒為玉叔大參賦别墅擅林塘開從顧辟疆龍鱗金照日鳳尾玉凌霜翠袖寒猶倚宫袍墮欲翔誰同濠上客散髮臥篔簹憶王山人沈瘦吾偏甚王癡奈汝何萬峰林屋杖孤月洞庭蓑鹿豕親狂態魚龍避醉歌一丘他日遂白眼對雲蘿楊思悅邀集涵碧亭遇雨作良辰饒勝集箕踞百花潭逸調飛金縷新詞度玉簪雷聲髙棟入電影曲臺含河朔元吾黨寧辭十日淹湖上泛舟憩俞祠同趙生汝元聽歌作蕩漾青絲笮淹留白接㒿人歌朝雨後客醉暮雲時隔竹觴頻送穿花席屢移他年懷李白應賦習家池送方伯徐公入梁夾岸桃花水春江照畫船雙旌辭嶺日六傳入梁年草色申侯里棠隂召伯田勿云河內借劍履上甘泉攜郭生汝沖憩山寺偶題信步空王宅談心佛子筵靈花紛寶地忍草覆金田剎影禪關外鍾聲梵閣前一僧頭盡白趺坐不知年閏九月九日集趙汝元髙齋猶菊色名勝競過從月屆三秋閏天令九日重雲林眠獨鶴星斗墮雙龍悵望桓車騎遙聽逺寺鐘送塢生還京口何緣京口客偶逐片雲來五嶽邀遊興三都競賦才新裝淳化帖故里妙髙臺笑殺茅平仲從軍樂未回夀漁塘余翁七秩林塘稱大隱漁釣舊生涯亭下三珠樹簷前五色瓜金樽流紫氣綺席送青霞日暮斑斕袖翩翩舞百花少室山房集卷四十一
