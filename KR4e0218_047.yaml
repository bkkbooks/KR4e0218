body:
  text: 少室山房集卷四十七明胡應麟撰五言排律一首乙未仲冬朔舟次濟南大雪百二十韻有序并呈永叔詩成後雪愈盛六花如翼連三晝夜不解兩崕之間瓊林珠樹璀粲萬行沙棠溯流真如入瑤池泛銀海晉人亟稱山陰道上徒凡境耳余晨起披氅躡屐從兩奚奴登高阜吹玉笙飄飄然有馭風騎氣想恨不攜太白子微輩升五城十二樓望之入舟呼酒豪興逸發信筆縷縷復得千言通前短章凡一百二十韻唐五言百韻昉于杜陵韓白踵作然皆歷陳時事未有咏物而韻百餘者又皆用寬韻四支一先之屬未有兹韻而至百餘者余不佞實始濫觴即搆思荒幻取證雜猥大方之家諒有餘笑顧邯鄲之蹶粗竭于此而用事之變于詞場亦庶幾焉因並前什繁簡互存以敬俟後君子且以為異日者考見顛末淺深之自云密霰三冬集𤣥雲四望同微茫屯巨壑浩蕩布長空入夜光交映連朝勢倍雄紛披遙墜露颯沓近含風漠漠緣堤厚霏霏入塹融凌波來冉冉逐浪去匆匆島嶼縈枮枿汀洲結亂葓水草修途霜淅瀝暗谷霧巃嵸屏翳驅馳疾𤣥冥號令隆山川呈渾沌帝名宇宙簸共工共工自謂水德王介甫稱雪為水種鍊石媧皇瘁填河織女癃衣裳青媛濕環珮素娥璁玉聲月杵舂來細星箕颭處濛元詩雲孫捧出南箕簸月娣舂來北斗量斗牛沈劒色雷電撤車攻王介甫雪詩凍雲深閉阿香車南紀陽和伏東華灝氣籠扶桑霾曙旭析木炫層穹齊魯青如羃岷峨翠若幢重陰浮海岱積素暈河嵩潮湧錢塘濶濤蒸渤漲洚音義俱同洪滹沱流易合勃律颶難通見酉陽雜俎廬阜天連瀑燕臺日貫虹白虹柱凝江館瑟絃折塞門弓弱水氷堪渡遼陽淖未瀜瑶翻藏地軸樊宗師文瑶翻碧斂玉戲笑天工清異録以雪為天工玉戲碎訝昆吾切瑩看匠石礱瀟湘遺是玦宛洛種為珫琮璧唐郊薦圭璋夏廟肜祭名王孫珩粲爛和氏璞蘢葱瑪瑙霏成屑琅玕劌欲鎔水晶鹽味淡火浣布毛冲白也貝錦披文砌鮫綃錯綺櫳玻瓈新步障雲母舊屏風蟾窟俄圓桂鵾絃驟拂桐以白雪言白華懷炯潔黃竹寄憂忡處士牆頽蓽幽人徑翳蓬千林凋橘柚七澤凍杉楓濘隔雙柑侣泥霑百草叢禾苗占上瑞楮葉陋凡工擬絮情殊愜吹葭節漸融和也時近長至吟梅標逸韻泣笋驗深衷庭院饑喧雀軒墀靜撲蟲蘇雪詩隔窗撩亂撲春蟲羅張梁苑兔兔園耒瘞鄴田螽蝗也瀲灧傳羔帳蕭疏放鶴籠狼峰清代北鵲幟讋雲中太白詩梟首髙懸白鵲旗蜃吐樓臺巨鯨封觀壁窿左氏取其鯨鯢以為京觀韓雪詩鯨鯢陸骨死黿鼉愁永蟄鸇鶚快髙翀逺渚拳棲鷺荒陂竄落鴻灞橋驢蹇足藍嶺騎埋鬃汞已凝貞白鉛仍聚葛洪玉京朝柱史銀闕跳壺公棺下喬應耄笙飛晉尚童餐苓延薊訓服乳度茅衷貞白而下仙家八事並以色言慧可禪鋒利用少林斷臂事瞿曇佛行崇雪山苦行散花摩詰幻篩粟惠能侗見壇經首嶂沒須彌嶺池添阿耨谼菩提陳大梵優鉢湛真空菩提優鉢俱以花言冶色凌姑射炎威淨祝融軒塗迷七聖舜麓正羣工烈風雨弗迷事孟氏離宫雪宫樂顔回陋巷窮王介甫詩擁帚尚憐南北巷謂不蔽風雪水精傳孔父緯書云水精子繼周為素王石髓問嵇公秀徹膚明玠玉人瑰妍質粲濛王濛凝脂誇杜姣杜義傅粉詫何工賻亮嗟埋樹埋玉樹著地中事懷忱嘆濯桐王大濯事浩遊賢七貴孟浩然名浩嘗與李白鄭䖍七人逰雪中有七賢過關圖安臥卜三公袁安後至三公介甫雪詩袁安交㦸豈須又用此事竹墅深逃豸茒廬破匿同韓贈盧同詩破屋數間而已矣孫窗藝帙耀蘇窖莧腸充有履穿東郭無衣晒郝隆陶巾敧自漉姜被薄誰烘蝶記元嬰滕王蛺蝶寫鵝忘逸少籠白鵝含寃齊婦孝東海孝婦齊地殉節宋臣忠朱辨祭二帝文魂消雪窖左伯骸將斃全師睫故矇全奯沮雪髙臥鰲山綈分須賈袂褐綻范丹躬雨粟嬴君駭量沙魏卒懵道濟量沙以餘米覆其上程徒傳舊業石帥擅竒功石雄炭化虛疑遜旌陽化炭為婦人美肌如玉雪薪慳孰代崇蠟代薪事長謠逢賈簿唐人贈島詩十二街中春雪遍大獵罷蕭忠見𤣥􅏜録暑檻宜河朔春盤憶射洪杜詩崢嶸驚嵗暮朗潤報年豐蘭舫欣聫鷁桑弧慶得雄余是日適舉子倦逰秦邸外蘇季子黑貂事乘興越溪東剡溪在越余方挾策東歸而與永叔聫舫故用二事濡澀全妨舵飄颻半壓篷羣囂憐榜竪獨釣戀漁翁爨擁孤烟白爐存宿火紅布帆懸蒨峭絲笮繫青葱綽約肌生疹清華目眩瞳衾裯吟嘯裏几簟畫圖中白苧歌游子清商發侍僮逍遙披氅客骯髒被裘公角賦豪吞惠惠連雪賦雕詞捷仆融張融海賦鹽云積雪炎天飛霜暑路船邀狂太白杜贈李天子呼來不上船筆授雋文通用彩筆生花事余與永叔聫舟而旦夕唱和故以上十餘韻俱寫沙棠中風景皓齒紛相藉明籹儼作叢輕盈回曼臉滑膩襯酥胸飛動昭陽燕翩􅝆洛水鴻浣紗西子潔織錦竇姬聰蛾黛呵張敞鶯喉簇馬融登仙慚有道中聖羡無功握塵神先王持螯思並洪余及王君皆攜家故五韻及之百壺攜若下五石醉新豐斝玩商雕㲄觚攜漢鑄銅藏鬮拈勝事橫槊鬬英風潦倒青田核淋漓碧萏筒南皮簪競盍北海座寧空甲煎芬逾嶺天池味勝䝉䝉山棗梨膏野熟薏苡釀泉冲淡也鼎列雲英麵匙抄赤穬穜爛煨樊圃芋細嚼夏畦菘汀鶩肥供案河魴健入􅮵捕魚竹器見韻竒毛搜海雁茂先海鳬毛事取類雪之故亦舉案中品饌言薏苡即今薏酒異味獻家豵王武子事虬脯時刲鹿羊蹯或饌熊烹鮮庖中窽斫膾匠成風登仙以下至此十餘韻大都無與雪典然皆余偕永叔豪飲雪中事故縷縷叙卒章大纛思平蔡高牙誓縛戎李靖雪中求頡利牙帳遂禽之永叔伉爽激烈常有封狼居胥意雪中拉余登髙阜馳射誦唐人欲將輕騎逐大雪滿弓刀之句北望慨然射從飛衛習棋效積薪攻攻治也舟中有善奕者王山人挾日平原暢談天碣石訌鳳池延小謝龍鮓詢司空絶倒元平子清言復阿戎仲子侍坐三墳羅倚相四部繕行冲余與永叔坐中戲放溫李舊習各𨽻雪事遂盈數卷屈宋才無敵鄒枚宴未窮寥寥白雪賦千古孝王宫唐人百韻若子美樂天集中多重出者已悉前人詩話明何仲默壽李文正韻才三十餘而迭見數四尤非後學所當法余此篇凡字義同者絶不復重若字同義異或人名地名則雖屢出實與别韻無殊嚴羽卿胡元任及唐宋諸名流夙嘗論此咸有成說顧其間一二寬韻猶不妨恣意泛瀾至短促韻不盈百中又有絶不可入詩者而欲演繹千餘言非此何以措手足如此篇四空字一實用一虛用一梵語一官名字雖同而義亡一同且其難用尚有甚于字異者故聊存之以備一體兼以就正大方家又前用惠能篩粟事粟即粳稻之屬壇經自明與後用燕丹天雨粟事亦不同自餘率放此少室山房集卷四十七
