body:
  text: 少室山房集卷五十四明胡應麟撰七言律詩八十六首喻明府邦相新至邑適康山人裕卿自虔州還雁宕過訪同集署中分韻得杯字雙鳬新自鳯城來匹馬言尋雁宕回萬里風期仍下榻千秋詞賦共銜杯雲霞倣佛飛燕社星斗依微墮越臺試問移官湘水日曽將賔客並鄒枚冬夜喻水部康山人過集齋中萍蹤十載共相望邂逅重開竹下觴客子驅車還越嶠詞臣飛舄到河陽虹霓色動高天外日月春生大海傍會見桃花連四境先攜賦草過西堂曹子念歲暮過訪夜同集喻邦相署中分得雲字仙槎逼歲下江濆客館張筵傍夜分西北萬星懸對酒東南片月墮論文鳴琴是處棲鸞翮岸幘誰能喚鶴羣不信茂陵愁緒減坐深庭葉漸紛紛寒食喻明府以詩招集署中折簡應憐令節徂琴堂尊酒坐頻呼青雲漸許詞人合白雪偏隨傲吏孤海嶠仙風回玉舄江天明月墮氷壺河陽樹樹催春發一問安仁賦有無題邦相容膝軒一椽容膝搆初成坐挾胡床碧蘚平漫擬柴桑歸日傲暫同梁父抱時情忩臨南浦千花入簾捲西山萬樹明自是太玄耽寂莫可容雙屐問柴荆陶審容膝之易安午日王次公過訪小齋邀同邦相夜集二首幾年詞賦憶登樓錦纜初停節使舟午日正逢花縣賞是日先集邦相署中薰風仍赴竹林遊歌來大澤青天暮語入長安白雪愁漫道匡廬帆色好于今地主是南州千騎輝煌出帝都一尊攜手話長途桃花忽駐吳門鷁栁色重邀漢殿鳬坐裡天回卿月並亭前雲擁客星孤無輕此夕平原醉容易人間覔酒徒明晨邦相為具邀余同次公登蘭隂山逮暮乃别絶磴飛梁杖底回闌干遙望夕陽開天懸萬壑低吳岫地擁雙流抱越臺賦就定應雄屈賈遊成端不負宗雷藂蘭滿目堪攜興一為千秋闢草萊捫蘿日暮到蒼茫絶壁看天興轉狂三洞霞光回蠟屐九峰雲色墮胡床青精欲借仙人箸白練偏題國士裳悵望十旬虛左意片帆簫鼓下潯陽是日次公為明府及余作大書至十餘紙王長公兩寄余書不值乍次公之江右始得之時公雅慕長生將以八月閉關與塵世絶書來云云悵然奉寄二首落落登壇意未降生花長夢筆如杠風霜驟喜來空谷雲霧猶驚隔大江上界仙才元第一中原詞客定無雙三山尚計當年約肯遲寒空白玉幢郢曲徒勞望海天吳絲真愧玉堂傳頻年客夢青綾外一代神交白苧前大藥蚤聞飛姹女靈圖曽否下真仙西行莫謂秋期近紫氣關門日夜懸時公以吳綾及詩扇見貽夀邵使君八秩司成許公命作邵為侍御君父海嶠千花簇綺筵金章遙並繡裳懸趨庭正值乘驄候臥閣猶思下鳯年天姥月明飛夢過若耶雲起探春還垂竿可道偏行樂咫尺蒲輪渭水前寄楊計部暫辭簮筆下蓬萊縹眇風煙越嶠開放鶴夜眠高士墓呼猿晨謁梵王臺平湖絃管千家集大海帆檣十郡來早晚長楊思獻賦豈應岩穴滯仙才時楊寓錢塘放鶴亭呼猿洞俱在湖上胡文父自燕中回同邦相夜過齋中小集故人青眼話從容明府朱絃並過從此夕風煙回薜荔十年星斗散芙蓉神來未覺匡廬逺夢去先愁越嶠重下榻南州今好在漫將離色賦飛龍同胡文父集喻邦相署中射䇿初從漢殿回風流地主重徘徊三年共記看雲别萬里真成挂雪來搖落劒光偏傍斗浮沉書札但含杯無誇席上荀陳聚紫氣中宵遍越臺中秋日同邦相餞孟韜於蘭隂山得詩四首絶頂秋光面面回平分吳楚一登臺尊前白日雙龍下屐底青天萬象開握麈並高詞客興含毫深憶大夫才先是王次公過與邦相及余同登是日出觀所留詩卷銀蟾漸起東南色遮莫驪歌薄暮催漫向名山賦别離芳尊才愜故人期嬋娟萬里猶今夕兄弟中原自一時地擁蘭臯餘氣色天回濲水盡漣漪使君大有襄陽興醉舞何妨並接㒿彩筆曽將擅帝京何來愁病臥高城乾坤漸老文園客湖海猶深魏闕情一代應徐非異域千秋潘陸是同盟相逢此夕雖云易忍挂青帆月下行一時賔主並風流無奈離心傍客舟待月總攜天柱興觀濤俄失廣陵遊凄清畫角同歸暮縹眇寒砧獨去愁笑殺平原期十日不禁盧女望刀頭孟韜以思家亟歸故末句嘲之大司空朱公招余過訪余以病臥不獲赴意甚感焉輒成小詩奉寄領袖三朝嶽降神乞歸江畔有間身雲霄北望猶明主日月中原自老臣青玉乍攜扶骯髒玄圭載錫偃經綸極知一水堪移棹愁絶文園病肺人王孫孔暘以乃翁自號竹隱因作亭曰依隱走册索余賦詩淇水何年卜素封依然丈室寄遐蹤高枝逼漢曽棲鳯新籜連雲更臥龍色照西山青萬疊影搖南浦緑千重清吟不訝王猷傲藍輿何妨日過從送廣文閔先生之檇李二首閔烏程人余嘗及為諸生為羡除書下日邊一官猶抱昔時氊菰蘆舊業行偏近苜蓿新齋坐更偏繡服春回苕水上青襟雲擁濲門前莫誇竒字空千載蚤向揚亭授太玄五載蘭隂宦轍勞移官華髮未蕭騷衙齋地僻占龍氣閶闔雲深憶鳯毛夾道吳民誇絳帳分行越士泣青袍偏憐百里苕溪路竟日能傳若下醪寄答宗良王孫渥窪何處問龍媒共識南州八斗才海嶠未容雙劒合江城俄報尺書來天回滕閣霞生座地近梁園雪滿臺見説鳴鑾多樂事一帆能許傍鄒枚寄答孔暘王孫寒濤寂莫豫章船翹首朱門客思懸片諾未交南斗下千行遙墮北風前亭依孺子堪招隱閣近滕王借草玄咫尺龍沙春信到白梅青栁定誰傳邦相以新正趨府舟中望金華雪色見懷賦答乍喜春風問鶡冠開緘白雪照林巒飛花逈落鄒枚座麗藻先登屈宋壇江浦樓臺晴㺯色海天城闕暮生寒瑶京咫尺三山在乘興能過十二闌人日邦相過訪小齋留集至暮分得尋字並懷燕社曩歲之集飄然雙舄暮相尋佳節頻過意自深掃徑乍當梅栁下飛觴遙坐薜蘿隂中天日月燕臺色萬里江山越嶠吟舉目賜環應有詔大明宫闕翠華臨唐人有人日大明宫應制詩奉賀觀察吳公擢任大參二首除書五夜下青霄共識吳公治行超象緯坐看燕闕近雲霞行憶雁山遙湖心錦纜維春色城上金尊落暮潮倘許侯芭仍叩閣紫薇花下問瓊瑶牙旗又轉越江西荏苒年光惜解攜轉粟暫勞蕭相畫看花猶記白公題雲屯大陸千倉滿雪照長淮萬舸齊回首石門歌嘯地幾從明月望丹梯時吳公職督運寄懷方伯滕師二首時方卜築武夷萬山何處粵王臺半榻寒空寄草萊白社定偕高士臥青門聊學故矦開風塵西北懸車淨宇宙東南曳杖回愧殺草玄亭下客攀雲無路到崔嵬十載頻含帝命馳挂冠偏稱黑頭時風雲一代歸文苑日月千秋弄武夷白傅詩情囊草在謝公幽興杖藜知扁舟九曲誰言逺極目桃花遍路岐送王次公觀察視學關中六首咫尺除書氣象新漸看霄漢問詞臣文章一代初推轂名姓三朝舊斫輪露冕星光遙動鄴褰帷雪色欲飛秦柏梁臺殿抽毫處年少誰當屬和人牙旌初入豫章臺繡鉞俄看灞上開把袂雲霞匡續去飛書河嶽巨靈來公餘雁塔誰高倡客滿龍門孰上才寂莫漢庭遷史宅遺蹤一為問蒿萊絳帳遙趨大國風懸腰雙劒拂長虹旋收駿骨過秦市盡輦蛾睂入漢宫紫閣煙霞晴望裡黃河氷雪醉吟中驚看嶽頂重題後萬古金天色對雄拂袖驪歌共黯然青山孤照越門筵藍田畫好推摩詰灞岸詩成憶仲宣朝日未央千榭起暮鍾長樂萬家懸何愁肺病當年事對倚金莖玉露前鼓吹朝巡百二州五陵花色傍行騶山回菡萏終南出殿鎖芙蓉太液愁異日諸儒傳白虎班氏通德論早時多士識青牛葡萄細酌咸陽夜好是經過舊酒樓西征車騎去翩翩夾道爭迎使者賢執憲盛推何李後雕文重識漢秦先幨帷翠逼長安栁杖屐青攜太華蓮莫以上林秋雁盡緘題憑寄白門船秋日送僧遊天竺遂之五臺寒風挂席下滄溟是處名山適性靈勝地暫依三竺紫高天遙望五臺青中林伏虎雲生座絶澗尋龍月滿瓶若見文殊勞寄語法門何日擬談經吳文仲明府過訪有贈并柬喻水部片語青雲照玉珂驚看結駟傍岩阿河南政績吳公最鄴下風流季重多岸幘晴光三徑滿鳴琴秋色萬峰過同聲咫尺何郎在倘許頻來醉薜蘿秋日邦相署中對菊作篇末兼期枉過仙令裁花自國工幽香競吐曲闌中瑶臺驟立霜千朵玉砌渾攲露一叢摘處杜陵堪歲晚餐來屈子未途窮白衣剩有江州醖莫遣東籬悵望同邦相遊爛柯山值雨不遂以長歌見示賦此奉嘲曽聞樵者説丹丘流水桃花事事幽風雨忽摧飛舄興雲霞如妬爛柯遊千秋且向塵中住十日誰能洞裡留好趂峭帆安道宅青天豪飲瀫江頭易惟效明府過訪有贈蕭條一曲臥煙霞忽有軒車到狹斜天闕九重曽攬轡河陽百里暫栽花寒星婺女隨春棹片石江郎對晚衙回首爛柯仙宅近幾從飛舄問丹砂鄉人有自吳中來者談曇陽仙師坐化事竒甚信筆奉寄王長公元美自是梯仙第一才豈無清夢到蓬萊書飛南嶽夫人下燕罷西池阿母回高浪駕天懸玉闕綘霞扶日近瑤臺三山金記應相授曳杖行看出九垓哭稚修博士斗色俄看散楚墟青袍猶憶上公車十年風雪淹行卷萬死乾坤逐謗書冠挂尚留神武恨壁空誰問茂陵居相思忍誦招魂曲滿目陳編涕淚餘貞吉以秦鏡并短歌見貽賦此奉答誰訝軒轅舊物留美人持贈自南州傳看玉質千秋上不愧氷心萬里投勳業杜陵堪徙倚雲山王績任遨遊莫誇照膽秦宫事一對蛾睂客自愁送易使君之延平驪歌催發向華筵千騎延津去黯然偃蹇金魚辭上國輝煌銅虎出高天三山疊翠流公署九曲分青照畫船何限武夷雲際色時從絶頂候飛仙聞楊懋功闢園城中有寄拂袖匡廬興自濃開成池沼半芙蓉青山九疊窺玄閣緑水千家抱素封燕社琴尊時寂莫龍沙冠蓋日從容傷心直北談天處坐盡雙林雪夜鐘東陂菡萏盛開即事紫騮何處繫垂楊菡萏初分太液長十萬紅粧齊衒色三千彩袖各飛香遊童戴葉翻歌扇稚女穿花出畫航最是夜來添悵絶湖南一路下新霜題吳文仲萬緑軒萬緑沉沉一徑開幽軒十尺淨無苔簾垂吏向花間出印鎖人從竹下來晚色挂雲流渭浦秋隂籠月住湘臺含杯倘借清談客日把琅玕醉不回同邦相攜酒蘭隂送曹子念入閩作平原此日又離筵夾坐青山對惘然丹荔欲餐閩海上紫蘭重擷越溪前船過楊僕行師地劒訪雷生作客年為向武夷看謫籍東歸同赴大羅緣再送子念一首長嘯東遊罷請纓閩天何處一帆征黃鬚自識英雄後白眼誰猜骯髒名杜贈曹將軍途窮反遭俗眼白子念方以貧故客閩故用為戲蕉葉覆溪猿狖下桐花夾路鷓鴣鳴芒鞋試踏三山遍釃酒無諸舊築城奉題毗山草堂二首為中丞潘公讀書處萬卷縑緗百尺臺白蘋風起對銜杯窗中日抱吳山下座裡天浮震澤來秋興賦成聊偃仰河渠書就一徘徊無誇太乙當年事已見寒光屬上台曲榭雕楹霅水傍琅函插架照滄浪丹霄正錫尚書履緑野先題相國堂句就松風間鶴浦夢回蘿月上鵷行憑誰寄問花溪叟稷契何由近廟廊夏夜座主觀察吳公招集行館賦謝畫戟初殘晏寢香遙從閣夜問飛觴登龍舊忝諸生列倚馬新參上客行擁架圖書回秀色當筵絲竹動清商莫將異數誇羣弟誰似彭宣到後堂秋日同邦相明府敬承太史集鄭氏園亭薄暮攜酒登大雲山二首濁酒虛亭共解顔歲星雙伴客星間雲藏翠竹迷深徑日落丹楓照暮山賜履漸回金闕夢鳴珂初散玉堂班由來一壑髙人事縱許羣公只暫攀其二時方仲秋石磴千盤上翠岑回看秋色半蘭隂攜琴共識仙郎過曳杖重占太乙臨病裡河山雙極目狂來天地一論心莫將峴首誇遺迹屈指殘碑異代尋送顒上人遊臨安一肩瓢笠自飄然遙向西湖覔梵天壇上萬僧昭慶剎寺中千佛淨慈筵傳燈共挾西來侣綻衲重尋北去緣便欲辭家同出世秪今摩詰病沉綿昭慶戒壇淨慈羅漢五百俱在西湖上聞王次公自關中回寄關外千言定有無重看紫氣照三吳青牛獨夜驅函谷赤鯉經時候太湖宫栁折餘間薜荔嶽蓮攜得傍菰蘆秋來倘憶乘槎客坐扣雙仙白玉壺金伯韶以春懷小草見詒訝其結交甚盛戲為賦此伯韶與余同舉於鄉時年甚少看花曽共憶明光攜手聲名動洛陽獻賦競誇童子日封書猶記丈人行交論一代饒知已語到千秋孰擅場若問景純雙彩筆好飛魂夢過錢塘丁節推以滕公書過訪夜遂夢遊武夷洞底遙探十六天蒼茫龍蹻踏寒煙瑶臺霧裡三山出金闕雲中萬界懸絶頂笙簫聞上帝隔林機杼見羣仙桃花肯著秦人住長侍丹經碧落前九日丁喻二丈約訪太史趙公山莊值雨不遂夜遂同集署中對菊蕭蕭風雨暗林塘難醉龍山落帽觴白苧懷人當五夜黃花留客過重陽金門恍惚看鵷序玉署參差過雁行滿坐青雲名勝在雄談誰奈孟嘉狂送丁右武入都搖落西風大海涯美人愁色共蒹葭氷壺夜照閩天月玉珮晴飛碣石霞駟馬于公新上計雙龍雷煥舊名家他時鹵簿江州駐倘記柴桑問菊花奉寄中丞蕭公憲節新持下玉宸函關西去息征塵輶軒盡壓三秦吏斧鉞先驅二華神紫塞風雲回夕望黃河雨雪避朝巡青油幕靜含杯處能憶天南授簡人奉寄左司馬汪公四首有序不佞傾慕左司馬汪公久矣向以臥病不獲通姓名左右乍忽致書邦相明府首辱垂詢且勉之出赴公車意蒸蒸溢楮墨焉感知酬德輒賦四章并以代贄功成一疏下蓬萊寂寂平津晝未開九伐尚傳司馬法千秋重覩臥龍才天懸白嶽雲霞駐地擁黃山日月回聞道藏書岩穴遍好飛椽筆到蘭臺垂旒朝日侍明光開府頻年控粵裳幕下詩名收李杜朝端文譽重班揚行藏未許親魚鳥棲處還應是鳳凰最是憐才心更切逺題書札問陵陽紫閣歸來鬢尚玄朱軒遙憶宦遊年毫飛雪色三湘外劒吐霜華百粵前尺地東陵聊寄迹扁舟西子暫隨緣漫從九折誇回馭屈指蒲輪日下傳乾坤何處獨支頥咫尺龍門駕尚遲七步已非年少日四愁偏向倦遊時書傳一雁堪飛動匣隱雙虹漸陸離縱是焦桐慙拂拭會將流水傍鍾期大司寇豫章李公以手書見貽賦謝二首八座歸來鬢未斑三朝舊德逈難攀雲霓尚切中華望宇宙偏容大老間賦罷滕王無彩筆書成匡俗有名山獨餘吐握當年思尺素蓬蒿問閉關斧鉞頻年寄折衝乞身茅屋傍蕭峰霜威大漠猶方虎斗色孤城自臥龍匣底劍花收菡萏囊中詩草泣芙蓉莫誇驟貴東京紙屈指三都未易逢太史趙公於山莊後開二洞并前為六命堂曰六虛齋曰三山同邦相賦二首卜居太史乍江潭攜酒仙郎更夕嵐户列三峰天上下堂開六洞地東南侵階瀑色懸空翠八座雲光散鬱藍十里衙齋山路近儘教明月候歸驂暫解朝紳臥越臺重飛仙舄傍崔嵬寒岩雪噴雙龍下疊嶺雲驅萬鷲回花木平泉春縹眇藤蘿谷口暮徘徊臨池莫詫山隂興今日登高盡賦才曹子念東歸同邦相攜酒蘭隂作紛紛白眼又吾曹睥睨山堂對濁醪白晝星辰羣下榻青天雲霧一揮毫歸途漸喜還江縣起色重因望海濤十日平原堪此地千峰寒月坐來高王長公閉關修玄謝絶一切獨期余過訪禪堂余以母病迄今未赴春日索居讀公所致諸札掩袂太息懷不能已積成七言律八章用攄鄙臆詞之荒陋不暇計也屈指玄關大藥成仙臺咫尺見蓬瀛河山漸隔青霞色宇宙空懸白雪盟避客草深句踐里懷人花滿闔閭城芒鞋儘識臯橋路躑躅遙天去雁鳴夢寐龍門曳客裾浮雲東望獨躊躇乾坤片刺華陽後海嶠孤吟越絶餘千里壯懷懸謝屐百年遊興屬潘輿何如賣藥吳閶外七十雲峰恣所如寂莫千秋大將壇誰標砥柱立狂瀾三墳讀盡神偏王四部成來鬢未殘大澤風雲回雁杳中原日月臥龍寒代興總愧當年約極目遙空十二闌拂袖吟行大海傍關門紫氣正倣徨心懸寸草時千折淚灑孤桐日萬行下榻塵埃慙仲舉驅車岐路畏王陽亦知把臂濠梁近愁絶兼葭尚一方題詩遙向大羅天負笈曽期問草玄信宿未酬中散駕經春長繫孝廉船形骸病後銷孤枕意氣狂來付絶絃彈指歲年三十過幾時林屋剩周旋彈鋏頻年賦逺遊獨將離恨對滄洲魂飛桂樹千山色目斷桃花一水流海內何人偏御李塵中有客尚依劉李令伯祖母劉高秋倘借南溟翼萬里摶風到玉樓病餘天地骨全銷荏苒行藏付寂寥終古神交玄度在異時昏嫁尚平遙紅顔轉自宜丘壑白眼那能對市朝愧殺美人千里顧可從青雀問瓊瑶十載風塵國士知論心深負白雲期遲回五嶽天難問落魄三都世尚疑敢向周王誇駿足聊從越女鬪蛾睂高山久絶人間調試拂氷絃問子期遊仙詩六首再寄王長公弱冠登樓漢大夫中年捨宅傍浮屠青霄忽下緱山鶴白晝頻飛葉縣鳬仙篆可攜中散讀神鞭欲贈蔡經無由來一局千秋易遮莫狂歌醉玉壺偶憶王家故事遂至八句各用漫存以發作者一笑王子喬乃太子晉周漢異時非必葉縣王喬也采藥何時下帝關看花聊復住人寰崑崙日月懸髙臥勾曲雲霞照大還綘節逍遙鸞馭逈丹􅓚縹眇鳯樓間騎羊漫有初平骨未乞靈砂護壯顔曾攜玉杖侍東華一謫頻年臥海涯萬頃太湖堪洗藥千層弱水待浮槎吟窺㺯玉臺邊月醉躡飛瓊座裡霞何事當時勾漏客逺從荒徼問丹砂矯首扶桑帝闕開人間真覩謫仙才青牛未向函關去白馬先從漢殿來下界懸壺聊戲劇中天乘蹻獨徘徊靈圖阿母如親授乞取蟠桃下絳臺五夜玄扉閉薜蘿坐聞仙樂度岩阿雲中劒擲蒼龍起海上車乘白鹿過金闕九重瞻泰岱玉樓千里問岷峨遮須却笑陳思國八斗何緣到大羅咫尺瑶壇上界分自攜真訣傍氲氤龍蛇大陸飛丹竈雞犬全家住白雲種得神芝遺桂父攜將靈藥寄茅君華陽瞬息乘風到一鶴能無洞口聞少室山房集卷五十四
