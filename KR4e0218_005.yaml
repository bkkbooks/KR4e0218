body:
  text: 少室山房集卷五明胡應麟撰樂府三十首短歌行五解日吉時良嘉賓滿堂星河在天蟋蟀在房一解懽娛易終白髮苦蚤金罍玉尊長夜傾倒二解舞袖紛紜蘭膏載焚衞女齊姜左右如雲三解有美一人稚齒倩盼攜手同車光華粲粲四解翩若游龍遨嬉八埏蕩意平心永宅大年五解善哉行七解來日大難腸乾體疲今日不樂嵗月如馳一解訪我親知總角燕好踰陌度阡以贈芳草二解何以延賓清酒百壺何以銷憂五木摴蒱三解美人滿堂巧笑便辟更長燭明今夕何夕四解南箕在楹北斗在簷星河陸離肴醴汎瀾五解忽逢安期餽我靈藥主客再拜洗盞酬酢六解共餌大還身輕翼舒乗雲御龍游戲六虛七解日出東南隅行日出東南隅照我陌上桑峩峩秦氏樓佳麗鬱相望飛甍百餘尺高棟五丈强琉璃為門限桂樹為中堂窈窕樓中女容華世無雙提籃向朝日採桑大道傍腰懸瓊瑜珮耳綴珊瑚璫首戴金雀釵足躡雙鳯凰吳絲作中襦蜀錦充下裳紫綺緣領巾綠羅隨風揚借問汝何名羅敷秦女郎借問汝何居第宅連明光問汝適何人家令殿中郎問汝年幾何十五正相當行者觀羅敷五歩一徬徨居者觀羅敷耒耜相扶將趙王暮登臺挾瑟奏笙簧侍從數百人冠蓋何煌煌舉頭見羅敷顧盼自生光遣吏前致辭可得充后房昔為千乗妻辛苦行採桑今為萬乗后芻豢同匡牀羅敷仰頭答君侯一何狂國主位雖尊二八盈高堂家令位雖卑糟糠亦難忘尊卑各有分貴賤各有雙君非秦王子妾非邯鄲倡名都篇三河聚年少五都盛材雄傾貲灞上水結客咸陽東呼鷹過長樂走馬遊新豐左櫜揷楛矢右箙彎良弓控弦疾流星鳴鏑如追風穿楊競百步蹲甲洞七重仰面落九烏俯身拾雙鴻萬夫為辟易觀者盈道中日暮還城郭華筵撞笙鏞屏間擁稚齒坐右羅妖童烹鮮割翠縷椎牛炙黄熊酣歌酌太白慷慨噓長虹呼盧列明燭良夜未及終酒闌拔劍去斜月猶朣朧美女篇長安出佳麗宛洛多名姝遊戲芳春日踏青岐路隅銀環約素手玉珮飄華裾丹霞錯綺袖惠風揚羅襦懸腰燦火齊充耳大秦珠珊瑚間四體寳釵直萬餘揚音若蕙蘭吹氣勝芙蕖吳姬亮非偶衛女焉得如衆觀共嘆息日暮羅長衢居者為忘飱行者各踟蹰何來少年輩三五乗驪駒傾城覩明豔蕩思欲忘軀豈無千金聘諧此百嵗娛疇為伯鸞匹偃蹇寧獨居寄聲俠遊子相望徒區區白馬篇白馬誰家子揚鞭大道傍銀鞍耀明月寳劒如秋霜十五𨽻金吾二十拜龍驤百千聚遊俠百萬要名娼鬭雞入南内挾彈遊平康京兆不敢呵司𨽻為彷徨征塵際天起邊烽達長楊長揖大將軍慷慨事戎行横行絶大漠虎嘯臨窮荒矯詔襲樓蘭飛書定朔方左射中休屠右盼伏中行兵威懾絶塞奏凱向咸陽獻俘詣平樂賜第連明光歸來顧少婦挾瑟宴華堂升天行九州非我宅五岳不足居乗蹻躡浮雲周覽萬里餘朝遊崑崙頂夕息瀛海隅舉頭見三山城闕正逶紆圓嶠聳巨鰲方壺戴神魚西行謁王母置酒行天㕑靈妃酌金液玉女吹笙竽燕樂未及終飛騰起太虛驂龍叩玉闕駕鳯翔靈旟長揖問軒轅俯身拾帝車明霞為我珮素霓為我裾飄飄謝塵世萬嵗同斯須仙人篇我思忽不懌投袂起行遊擔簦躡芒履去上嵩山丘王屋一何高太行亦阻脩危峰冠浮雲巨石横道周青松數十圍枝葉自相樛上有千嵗禽下有萬尺流矯矯浮丘公吹笙跨靈虬投我不死藥攜我升蓬丘丹霞起素壁紫霧開瓊樓横飛絶四海高舉臨九州顧視世間人局促安可留朝生等舜華夕死同蜉蝣相逢行相逢狹路間騎從一何都借問來者誰中尉執金吾銀鞍耀白日寳劍珮昆吾英聲走劇孟勇氣凌灌夫西征破大宛北顧摧匈奴去年出湟中一戰定邊隅歸來報天子賜第連皇都黄金為門限白玉中堂鋪堂上何所有七尺紅珊瑚十千治晨飱百萬當呼盧樂工高漸離蒼頭馮子都長婦字莫愁中婦名羅敷少婦何名字顧盼日當壚弟兄八九人各各列當塗炙手勢可熱聲焰絶代無行人但引避無事勞追呼門有車馬客行門有車馬客意氣何揚揚千金飾玉鞭百金寳劍裝傳呼動里閭顧盼自生光長婦出迎客問客來何方客言自幽薊乍者發漁陽道逢逺征人寄書來故鄉開緘竟何道細書八九行昔為絲與桐今為參與商參商各異地羽翼安得雙長跪再拜客邀客暫徜徉烹庖出豐膳高宴羅酒漿願為傳語懽努力莫相忘逺遊篇端居厭塵世飛步凌大荒左挾青龍馳右驂赤豹翔西遊翳若木東望窮扶桑竦身崑崙顛息駕𤣥圃傍道逢安期生托手共徜徉攜我黄金臺坐我白玉牀太虛為我宅沆瀣為我漿俯仰竟百世焉能辨彭殤結客少年塲行長安富遊俠騎射出名都飛揚結壯士慷慨聚屠沽百千市駿馬十千裝轆轤朝遊上林苑暮宿賣酒廬赤丸報司𨽻白刃戕金吾笑傲金張第叱咤許史途盛年諒難再壯志不可孤鳴弓向張掖揷羽飛平盧左發摧焉耆右發中休屠死當畫麒麟生當雄萬夫箜篌引良時率已邁蟋蟀鳴我牀眷言召親友㫖酒羅中堂東鄰飾妖女南陌招名娼綃衣隨風舉羅襪自飄揚秦聲被金石楚曲流宫商清談蔚霞爛妙舞若雲翔頽陽倐西落明月出東方飛軒歴層囿改席臨洞房華燈吐芳焰列宿澄清光齊心懷令徳四坐咸盡觴芳辰諒難再嘉會詎可常人命一朝盡奄速如秋霜樂哉今日宴百嵗遥相望從軍行邊塵起西北敵騎日相望仗劍報明主長揖辭故鄉征行渡沙漠慷慨𨽻戎行羽書昨夜至匈奴寇漁陽吏士若雲屯我兵精且强揚旌耀漢月吹角飛邊霜一戰摧月支再戰欵名王彎弓月在手鳴鏑星流光勒功燕然石傳檄瀚海傍歸來拜驃騎恩寵冠長楊置酒篇端居觀大運去日常苦多幸有盈尊酒賓朋各來過佳人出後房被服綺與羅纎腰鬭妙舞皓齒揚清歌輕飈蕩浮雲華星爛明河好鳥鳴高枝文魚翔素波百年若朝露白日馳山阿樂哉今日宴不飲復如何君子行嗚呼大聖人世或見疑猜周公被流言仲尼困桓魋賢材實累身忠信為禍媒蒼蠅㸃白璧蚊蚋噓風雷麒麟匿郊藪朱鳯成摧頽仰天再嘆息沈憂熱中懷擾擾蝸角爭忉怛勞形骸千秋萬世後愚智同塵埃豫章行螣蛇自有翼未若應龍潛蠖屈重淵中潤澤被八埏宣尼浴沂水武仲巢箕山於陵餓仲子通國稱其廉孤兒行步出北郭門荆榛夾路齊悲風起白楊葉落何凄凄道逢孤兒卧肌膚若螬蠐伶俜瘦皮骨却立忘東西對我但長跪氣咽不能啼自陳無罪過父惑後娶妻夙昔千金愛慈母嬌提攜高堂倐背棄妖牝鳴晨雞風波起骨肉咫尺如秦齊終朝拾橡栗薄暮飡黄韲箠笞動盈百卒嵗無領綈棄置田野間冉冉白日低昔為掌上珍今為濁水泥千秋履霜轍永永戒前蹊白頭吟結褵奉明徳精誠􅒙浮雲死生誓同穴富貴安足論一朝事勢異緬邈若越秦風波起對面讒慝來相仍盛衰捷反掌愛憎一何頻昔者寒爐火今為甑下塵還君錦繡段著我苧羅裙念彼求凰曲恨恨不能陳鬭雞曲翩翩五陵少挾彈遊咸陽萬錢飲俠客千鎰招名娼走馬東郊外鬭雞大道傍兩雄昂然出五色麗且光黄金介白羽綠沈鑄𤣥裳雙眸炯相射四距翼而張憑陵壯夫膽激烈猛士腸俱呈慶忌捷競逞黑卵剛獰牙攫豹虎怒臂撑螳螂先聲驟恫喝後舉劇披猖朱冠碎靺鞨彩頰掀琳瑯寧論北宫撓肯避平陽創迴身角伎巧聳翮馳精芒初交氣方盛再合勢彌强捐生赴仇國效命臨戰塲縱横掣驚電䟤跋挐秋霜摧鋒若禦寇逐北如擒王干旄助踴躍鉦鼔隨騰驤天地黯無色塵沙劇飛揚懽呼壓廛市登眺摧山岡中原逐秦鹿大陸豗天狼雄雌久未決轉戰益慨慷遲遲白日墮兩敵為彷徨安得魯陽刃一揮返扶桑三婦豔二首大婦拂花箋中婦理冰絃小婦學彈棋夭桃鬭春妍良人定睛覷誰當最可憐大婦貼花鈿中婦理紅粧小婦畫蛾眉含嬌踏春陽良人試垂盼良夜殊未央廣三婦豔四首大婦出姬姜族望不可加中婦出燕趙容色鮮如花小婦出吳越盈盈嬌浣紗丈人但安坐四海方為家大婦字若蘭深閨理流黄中婦字羅敷陌上行采桑小婦字莫愁盈盈居畫堂丈人但安坐滿目饒春光大婦出迎客二十頗有餘中婦起持觴二九曳羅襦小婦坐鳴箏二八正敷腴丈人但行樂南面安得如大婦年十九高堂坐摴蒱中婦方十七明瓊角呼盧小婦正十五青春獨當壚丈人但行樂何羨執金吾續三婦豔二首大婦處華堂玉貌錦衣裳中婦處高樓玉指撥箜篌小婦處金屋玉簮髻初束白日懽未足良夜更秉燭大婦粧初成一顧傾人城中婦粧乍畢一盼傾人國少婦粧未己一笑傾人主有酒清且㫖交加學連理反三婦豔二首大婦吟白頭溝水東西流中婦歌懊儂紅顔空自紅小婦咏團扇辛苦郎自見莫誇三婦豔丈人涕如霰大婦氣食牛千喚不回頭中婦愁緒縈敢恕不敢嗔小婦訴卑賤終朝淚洗面莫誇三婦豔丈人腸欲斷少室山房集卷五
