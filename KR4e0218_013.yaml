body:
  text: 少室山房集卷十三明胡應麟撰五言古詩二十七首秋日偕諸同志遊金華二首屈子歌逺遊尚平有遐慕顧謝青雲人言尋赤松路厯覽窮幽深冥探愜情素澗壑捫嶔岑林巒陟回互崖傾黃葉積谷轉垂蘿護髙峰散餘靄峭壁屯寒霧娟娟初月升隱隱微陽暮長謡欽昔蹤獨往懷蹇步慮由忘物超道以遺榮悟迹契容成公神交子支父徘徊北山文惻愴淮南賦眷彼丘中人回鑣對岩戶成羊閟昔蹤化鶴神遺迹曰余蹇劣姿緬企靈仙窟時維仲秋暮舂糧負瓢笠落葉紛前林凄霜被長隰躡履行翠微捫蘿上層壁岩巒莽回互雲霞屢興沒蒼蒼猿鼯啼濯濯麏麚集乍聞帝鴻鼎今見初平石芝田翳宿莽玉竈埋金液羽駕何飄遙人寰信超忽胡為七尺軀甘此百年役去去從吾初城東有黃石仲夏至自京師作人生如飛蓬倏忽異鄉縣僕夫趣我遊肅駕向畿甸朝登太行嶺暮宿黃河岸荏苒踰修途遲回陟層巘中林絶煙火塵沙蔽顔面浮雲翳荒壘咫尺行莫辨遙遙至幽并四顧見閭閻中天帝王宅飛甍翼樓殿空懷稷契志未遂夔龍願辭非上林侈賦豈河東擅長嘯起拂衣歸來㺯柔翰寄言達生者驕人有貧賤秋日攜尊城東大寺山作步出東郭門騁望西山麓信足登其顛聊怡白雲目川原何逶迤城邑自相屬飛甍儼鱗次萬戶列平陸髙峰下牛羊斜照散麋鹿蒼蒼瀫川流靡靡蘭皋緑列岫澄塵襟清漣媚遐矚契深浩忘言慮淡信超俗載詠衡門詩軒蓋非所欲九日喻邦相邀司馬汪公洎諸君登髙天竺屬余尚留檇李不及會以遍插茱萸少一人插字為韻霜露維深秋木葉殆盡脫紛披時菊繁憔悴蘭芳歇上客懷登髙羣公欣令節薄暮回輕橈凌晨戒車轍窈窕度城闉逶迤陟岩穴遐覽窮八荒輕舉渺六合三竺凌層霄雙峰表天闕緑野名園開朱宫梵筵列白雲冒岡巒丹霞冠林樾淅淅涼風生隱隱微陽滅修鱗競容與平湖亦澄徹感此嵗序更羽觴共怡悅妙管激清商流音回白雪解珮俱朝賢銜巵並時哲言念同袍子鴻飛渺天末醉把茱萸枝徘徊不能插與衆賔遊城西園亭作二首端居俟時命日暮寡所歡眷言寫憂思散步遊西園西園一何麗薜荔交崇垣飛甍帶層閣曲榭臨回軒丹霞吐岩岫白雲冠林巒灼灼芙蓉披瀼瀼白露漙遊魚躍清波好鳥鳴樹端感兹動植情悟彼節候遷百年亦瞬息金石疇能堅念當命我友肅駕開華筵悠然遲心賞寓目雙飛翰嘉賔既咸集徒御何輝煌逶迤度飛觀置酒臨回塘長渠激芳流曲岸披叢篁齊瑟列前楹秦筝鳴後堂燕姬發皓齒越女呈紅粧清音振林木妙舞協宫商觥籌互交錯四座咸慨慷夜闌更秉燭雕輦隨風翔明月出雲間列宿正縱橫四序忽若馳行樂安可長申章紀良晤無為歌太康卧遊室午睡起題東方談十洲尚子懷五嶽玄覽豈不遐浮蹤竟安泊伊余實蹇劣稟賦孱且弱遲回三十年強半客京洛風沙蔽顔面神明日凋落雖竊文苑聲未覩寰中樂朅來卧一丘晨昏課耕鑿卜居鄰莽蒼築室事恬漠軒窗不盈丈周遭藝蘭若遊目惟圖書怡神匪丹雘時援白雪琴三㺯對猿鶴泠泠衆山響一一度林薄五鼎非我榮萬鍾亦奚樂達哉宗炳言先民有遺矱將負瓢笠入金華從赤松三子遊作有序載别卷中三十六洞天金華亦奇絶古昔羣真棲雲霞閟閶闔赤松乘紫煙皇氏憩丹穴緬邈懷仙靈栖遲表才傑奕奕孝標生漂流寄東越長生本經世不朽惟大業伊余後千載束髮慕賢達逝將辭垢氛尋幽入林樾大藥倘可逢雄詞冀頏頡異日騎雙龍攜手輕六合題陸信卿書屋二首五嶽豈不遐一丘良自適言從谷口居永憩隆中膝結搆凌層霄飛軒控奇石嶔岑帶林巒窈窕羅原隰輕飈回座隅明霞護簷隙之子何逍遙鳴琴坐幽寂列岫披琅函遙峰映緗帙攬挈萬古心俯仰千秋迹白馬窮妙詮青牛探真籍神遊羲禹庭冥棲素王室伊余麋鹿蹤羡爾煙霞癖殷勤勞夢思惻愴務晨夕何當辭世紛相對捫蘿薜散髮翻金書長歌抱瓊笈一笑塵氛空揮手凌八極大鵬摶九萬尺鷃翔榆枋逺近各有適逍遙固其常伊人勵髙躅卜築鄰山岡四壁羅琬琰五車插琳琅冥搜極浩渺幽探窮微芒棲心丈室間寄情八表傍丹霞入我牖白雲為我裳馭風學鄭圃棄瓢懷潁陽豈同渭川釣恥為吳市藏一區足吟嘯萬卷聊徜徉樂哉帷中子嵗年良可忘仲秋十四夜同諸子攜觴登一覽亭玩月作秋髙桂華滿夜靜蘭膏歇素影流長空寒光浸天闕孤城白露下萬户涼飈發置酒臨髙臺長歌對佳節憶别蓬萊宫回首三千劫蹉跎落風塵荏苒見華髮舉杯屬嫦娥乞我長生訣乘雲朝太清飛步還紫闥自按霓裳操重翻羽衣闋愧彼塵世人徘徊望圓缺十五夜對月獨酌有懷燕中諸君佳期三五臨遙望挂圓璧皓魄揚清輝亭亭墮簷隙攬衣步前庭感此長嘆息憶昔京華遊文儒盛東壁中宵薊門燕五夜甘泉集蒼龍玉繩挂露掌金波溢惜哉道路分佳人遂南北寤寐安可憑瑶華詎能即欲從萬里天持贈嬋娟色願言逐飛鴻隨風起雙翮登鹿田日暮捫女蘿亭亭出危磴萬壑來松風飛雲墮樵徑行窺虎豹穴側並猿猱進及登衆山顛始覺天宇峻曾聞赤松子兹域開靈勝丹砂信有術塵慮了可竟傷哉緱山鶴不返瑶池駿惆悵仍獨歌青霄落寒磬家君北上半載不得問述懷朝日照髙臺清風被華池椿庭萬里外北望浮雲飛豈不念行役相攜赴皇畿眷言髙堂病藥石久告疲仰無令昆託俯靡弱弟依以兹謝形役息意掩荆扉朝掇南澗藻夕采西山薇緬懷彈冠客惻惻常抱飢天門九重闢王路正逶迤軒車滿京洛鞍馬如雲馳窮年叫閶闔當道饒狐狸積薪諒難守嵗暮空流離側身起長望涕淚沾裳衣寄懷司馬汪公公與余期是嵗遊金華台雁諸山天遊表龍德水擊知鵬摶矯矯司馬公偉度周八埏先驅既左馬緩步亦揚班伊余慕匠哲邂逅自臨安千秋默相許片諾永不寒追隨武林驛揮袂弇山園黯黯臨别懷欲吐不得宣殷勤戒兹嵗瀫水仍周旋天台訪大藥雁宕窮靈源春和屆炎夏寤寐來華軒願當脫羈馽一杖攜名山雄章闢混沌片碣三千年聞大司空朱公訃志哀十二韻匡廬摧大江天柱折南嶽涕淚盈九原伊人豈重作桓桓大司空束髮仕臺閣小心厯四朝姬旦恆惕若維昔嘉隆嵗河流泛大壑臨軒萬乘送飛馭百靈愕八荒就疆理四海安畫諾晚遂蓴鱸興髙蹈遊廣莫裴公係安危司馬耽獨樂方勤大廷詔忽跨遼東鶴衣裳躡箕尾名姓懸海嶽煌煌億萬載禹功在河洛祝貞婦詩有序貞婦邑茂才祝獬妻也二十夫喪矢志弗二撫其遺孤勗以成立迄今年七十矣厥孤大猷既東走長洲乞御史大夫陳公傳復日夜叩余門頓首庭下曰光生幸惠一言則母氏永以不朽余悲其意援筆為賦兹篇結髮奉君子歡愛兩不疑如何髙堂上一旦生别離驚飈蕩白日去我忽若遺重泉逝將會念此黃口兒皎皎匪石心柏舟以自持績絍度晨昏卒嵗恆抱飢繐帷下重關荆棘盈柴扉冬半多烈風憭栗中我肌顧瞻雙鴛鴦比翼東南飛豈無賢雄匹再適匪所宜亮為南山松安受雪霰欺願當畢餘命不愧死者知我聞再嘆息三嘆懷令儀抽毫賦黃鵠萬古欽蛾眉二酉園為陳玉叔京兆題不佞藏書室黎惟敬題曰二酉山房而玉叔京兆闢園亦曰二酉命余賦詩吾家二酉齋斗室不盈掬何以稱兹名架上書萬軸公家二酉園大厦蔽陵谷何以稱兹名筆底珠萬斛樓臺瞰空起雲霧傍簷宿雕甍挾天柱髙棟擎嶽麓軒窗洞庭葉戶牖雲夢竹蜃鰐遊長川虎兕嘯平陸岸芷紛葳㽔汀蘭互芳馥主人湖海豪瀟灑脫塵俗開襟跨寥廓解帶謝拘束三閭問靈均九辨追宋玉名驚孟公座夢啓傅岩卜誓掃六合塵一榻非所欲蜚聲京兆里張趙三鼎足至尊催賜金上相待橫玉異日休林泉賜第鏡湖曲華堂坐晝錦飽看四野緑煌煌中令墅燁燁魏公築寧當卧二酉卒嵗事耕讀好借胡生居日饜蠧魚腹攜手崙崑丘相將問周穆大隱園為陳司理題大隱園者陳司理立甫讀書處也在沔陽城東名流題咏甚富書來以五言古屬余衡陽七十峰洞庭八百里翛然五畝宅結搆傍江汜仄徑穿藤蘿層軒萟桃李白雲何英英丹霞亦靡靡空翠流重簷林嵐潤湘几主人金閨彥夙昔厭紈綺名家孟公後俠氣元龍侣髙言和陽春清響激流徴縱橫彩毫落燁燁雋聲起朝辭薊門燕夕佐越臺理騄驥遊天間鸞鳳出榛枳一丘寧獨樂十載曠棲止緬懷東方生大隱帝鄉邇聊用名吾園歸夢時徙倚伊余東海民蚤嵗羣鹿豕孤悰託松桂幽夢結蘭芷側聞輞川勝佳興浩難已冉冉攜芳尊悠悠負緑綺攜我初平石適君仲長里青鞋與布襪行邁自兹始心逺堂為陳立父題心逺堂在大隱園之內堂前後有栩栩齋萬緑軒等處堂則總會一園之勝者也陶公住人境心逺地自偏陳侯服官政結廬詎同然吾聞魯仲尼行止非一端寸心若太虛龍蠖偕媸妍華堂搆空起正對衡嶽顛洞庭八百里日夜浮朱欄鯨鯢跋髙浪蜃鰐遊驚湍祝融及天柱雲密紛鈎連回雁遏層霄石廩屯飛煙奇峰七十二一一羅堂前彼美堂中客妙齡夙忘筌氷壺瑩塵表玉笈開琅函攜賔坐堂上四面羅蒼矸鳴琴憩深樹看奕垂疏簾目送雙飛鴻迢迢極雲天心逺室從邇悠悠浩忘言興文念朋好一訂柴桑緣殷勤沔陽約尺素馳江干吾將負瓢笠卜築鄰青山異時陳蕃榻倘為孺子懸送李子赴試錢塘大梁本任俠壁立逾千尋一遇昌穀生握手為斷金申臺振髙步十載囊瑶琴中途遘君采邈焉奏遐音聲諧響必赴異代猶沈吟矧兹百里壤而不懷同心緬余起末學努力搴詞林遐思太古上時俗非所欽栖栖卧一壑委懷甘陸沈李生一何戅物色來蘭隂雙溪入馳溯三洞回登臨清言吐肝肺古色流衣襟吾寧負奇癖爾亦饒書淫揚亭共寂寞原巷偕蕭森子迹尚霄漢余蹤久蹄涔他時樹大業盟言倘在今七夕昔余遊天門白榆正飄颻濯足銀河水驚飛烏鵲橋牽牛與織女欲渡愁無聊相將忤上帝譴謫離青霄騎鯨向東海龍伯頻招邀舉足屆五山投竿連六鰲狂風鼓大壑吹向西南郊青鞋曳布襪濩落不得驕朅來三十載食粟同曹交珠璣一萬斛散亂隨塵坳猰㺄難共居貪狼如蝟毛蒼蠅變白黑鼠璞矜瓊瑶回首望閶闔雙星正岧嶤而我一何悲偃伏同鷦鷯逝將脫塵網天路長逍遙寄言夸毗子役役徒為勞余既不上春官燕中遂有傳余病不起者孟韜方就試輒于院中大慟王次公過瀫水為余言之余聞劇喜命酒索筆賦此寄孟韜漆園喻桑户鄭圃稱楊朱豈無王者樂孰與真人居大鈞播羣象品彚盈寰區偶然值為人稟此七尺軀營營一生內十九嬰憂虞歡愛苦不長勞悴乃有餘冠裳檻沐猴鍾鼎羅爰居三旬亮已多百年亦奚娛風霜遍項頷塵垢盈眉鬚齒髮諒非堅金石猶可渝七十二聖君百千億庸愚參差就黃土轉盼隨丘墟安期信茫昧松子難覬覦何如一宿覺大夢伸蘧廬陶公製哀挽王孫却衣襦偉哉哲人見我心獲所如死生固有命夀夭詎足虞戚戚兒女仁毋乃曲士拘願言勗明德今古流芳譽樂哉白雲丘萬代同斯須夜夢裕卿惟寅覺賦此詩寄懷并呈邦相康生秉俠烈李子𢎞風流塵埃困鴻鵠天廏儲驊騮曰余抱微尚弱冠羈皇州洛中富冠蓋一一俱琳球風塵片言合把臂為千秋夜談促瑶席春燕開雲樓飛蓬一朝散抗袂還林丘道路阻且長尺素安可求眼底孰同聲論心惟喻侯喻侯與康李宿昔伸綢繆雄飛失天路雌伏來山郵伊余實傾蓋契分逾白頭笑談樂新知感激懷故儔中宵夢二子宛若平生遊殷勤十載别不為終夜留覺來但長嘆坐失雙吳鈎乃知豪傑人聚散俱萍浮申章示同好咫尺毋悠悠始入州謁宣尼廟二首猗歟大聖人樹建實髙厚道苞羲農前業擅堯舜右茫茫滄海水涓滴靡不受儼若登岱宗絶頂小宇宙於戲七雄降生民失領袖九流競紛紜百氏互馳驟虛無駕猶龍因果鑿靈鷲駸尋天網缺疇補坤軸漏龍飛歘淮甸六合更造就車書煥一統譜系明授受寰區設黌校家掖仍戶誘詩書被華貊狐兔伏林岫遂令宣尼脈炳耀絶先後偉哉成周基八百衍潢胄厥初水精帝肇迹維山東鄉閭表鳬繹胤胄延龜蒙胡為姑蔑墟亦有文宣宫時維趙宋末兵戈競華戎渡南實孔裔大衍三衢宗精靈動世主錫命傳豐隆沿流洎明代奕葉馳皇封創祠視曲阜貤恩逮無窮清華世世及嶽降齊申嵩兩宗峙南北輝赫羅章縫至今太末里恍忽鄒尼風我來謁遺像三嘆欽遐蹤皇皇六萟軌萬古侔穹窿少室山房集卷十三
