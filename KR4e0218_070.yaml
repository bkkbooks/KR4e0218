body:
  text: 少室山房集巻七十明胡應麟撰五言絶句七十三首别業瀫溪之南平湖逺岫幽谷長林登頓沿泗頗擅獨往之趣暇日效右丞輞川體為五言絶三十章竝拉諸同好作焉春瀫草堂幽居武陵源背城止十里汎汎桃花舟春江瀫紋起谷口縁堤十數家蘿蔓相縈帶亭午聞雞聲翛然白雲外瀼西愛此春風吹持竿坐溪畔粼粼瀼西水浮萍聚復散瀼東桂楫横沙棠沿泗殊未已落日漾中流蓮歌四面起三徑青山在南隣緑水在北牖為問柴桑翁徑中復何有華嚴精舍焚香延衲僧偏袒坐林薄相對談華嚴西巖夕陽落蘭薄采采幽蘭花清香畏零落何處佳人来含情坐林薄談𤣥室𤣥亭落花遍兀兀把壺酒山童懶應門失我同心友桞庄今朝好風日䇿馬東郊行雙柑挈斗酒往聴黄鸝聲薝蔔齋偶結清浄縁幽齋種薝蔔凄迷月色下馨香不忍觸芝坪深林斸黄精冉冉白日暮千巖與萬壑不記来時路嘯閣静夜無人聲微風動梧葉散髮踞胡床忽上南樓月北窗赤脚仍蓬頭焚香坐長夏何處来清風泠然北窗下滄浪亭言從劉伯倫荷鍤載壺酒一醉眠滄浪蟬聲在髙栁梧隂館夜凉起南軒梧風時澹蕩疎雨滴堦除復濺池荷上蘿月軒横琴當緑蘿萬籟夜俱寂凉月何紛紛飛螢暗中入烏石岡信歩不知逺䝉茸入深樹悠然亂石中忽與樵人遇寒林深林四無人秋意滿長薄日暮牛羊歸寒烟出籬落廢寺一榻懸空林寒蟬滿窗户但記入山年不知出山路樵塢曳杖隨寒山遙遙不忍别欲趂斜陽歸亭臯遍黄葉叢桂山房扳援桂樹枝秋色俄已半為報山中人花開正如霰鷺查連山帶返景依約澄潭上白鷺時驚飛銜魚入深巷芙蓉汊何方問竒客扁舟載尊爼欲采芙蓉花悠然向南浦瀟湘島偶作瀟湘逰置此江中嶼萬緑圍軒窗九疑何處是明霞洞尺素隨桃花傳情報仙媛為掃石床霞殷勤待劉阮苾芻園閉户動經旬長齋度晨夕不知園中草蒼翠已盈尺葯房手持長生瓢隨意坐林薄凉風吹古藤時復數花落柴桑里凌晨出東籬采菊動盈手悠然南山色落我杯中酒梅嶼素手何亭亭新粧儼明玉誰憐絶代姿嵗暮倚空谷雪岑清晨䇿蹇驢正見梅花發獨往灞陵橋千峰亂飛雪秋日同郭朱吳鄭四子登大寺山尋東峰亭故蹟亭故有唐人馮宿記掃石坐危顛髙天下雙鶴欲問馮郎碑東峰夕陽落秋日送僧逰五臺山二首挂錫辭吳嶠支笻入晉闗秋風秋葉裏獨向五臺山五臺五百僧日暮鳴鐘待獨有病維摩未赴文殊㑹蚤春同惟敬諸子登顯應宫閣望西山霽色即席賦立馬蓬萊島千門霽色通西山四百寺處處玉華宫即事文杏作雕梁盧家白玉堂武陵雙俠少下馬入垂楊九日李環衛招同諸公登顯應觀閣不赴寂寂東籬下黄花意自真笑殺龍山客空遲落帽人夏日集古堂閲宋元諸名流畫題十絶句短橋留夕照烟樹隔江深過客應廽棹疎鐘出定林前途風色起孤舟暫停泊寒鴉不斷飛殘暉在山閣一巻南華子科頭抱雙膝時有鹿麋来殷勤似相識芒鞋不覺逺目與歸鴻遇萬壑無人聲天風起孤樹醉吟緑蓑底孤舟繫漁梁不知沙頭水夜添三尺强深林四無人徙倚白雲坐山風日暮来吹我鶡冠墮赤脚步青沙斜陽照古查鳬鷗太欺客相趂入蘆花散髮孤峰頂去天不盈尺四顧中原空悠然獨捫虱汀洲黄葉落一望彌蒹葭美人隔秋水相憶空瑶華前村風月好杖藜時不厭一逕荳花明數家松葉暗夏日雙樹園閒居櫽括昔人成語作十絶句悠然濠濮隣㑹心豈在逺魚鳥時親人不覺白日晩乞得真形圗五岳在指掌撫琴一動操欲令衆山響蓬蒿滿宅前中開一行徑髙樹八九株挾書坐餘䕃可人費招呼俗士且廽轍入室惟清風當窗但明月山静無人聲焚香坐朝暮蒼蘚盈堦除落花遍庭戸空齋種白楊悲風時謖謖人生不得意千嵗復何益長嘯臨髙臺白虹貫四野龍泉與太阿汝乃知我者何勞鄴侯書繞架三萬軸痛飲讀離騷居然名士足庭花晝合圍松竹蔽行道淡麵邀緇流相對豁懐抱左持鸚鵡杯右把鸕鷀杓拍浮酒缸中生計長不惡獨酌逍遥館醉中拈筆漫書五絶薄俗難共居紅顔不長好吾将跨大鵬神逰八極表振衣望天漢六翮来長風翩翩佳公子胡為濁世中仰面看屋梁著書閲千古誰為揚子雲作計徒自苦長笑山中醪千日誇酩酊安得逰華胥萬劫時一醒巢由抱箕潁堯舜開虞唐何須論得失臧穀俱亡羊瞻堂十景為大㕘徐公作一環樓底事愛樓居樓居自堪愛千峰翠若環不斷雕欄外翫月堂南峰流素華光彩蕩林樾胡床人未眠翫此瑶臺月碧練湖一鏡涵空明波光倒樓殿錯誦𤣥暉詩澄湖碧如練古柏移来蜀相祠曽息軒皇駕乍宵風雨聲恍惚蒼龍下巖泉何来千仞壑貯此百尺流莫令到人境畏引桃花舟緑野堂禾黍被郊原緑疇自髙下何論十仞堂将築萬間厦咫尺松楸松柏啼烏鳥楸梧下寉羣咫尺親顔在無勞望白雲人境舟車悠然人境中舟車任來去底事論避喧本無喧可避陽峽倒流泠泠清溪水倒流向幽谷任洗髙人耳不濯凡流足峰霽金光突兀金臺尖去天不盈尺中夜五雲飛正見蓬萊日題大隠園芭蕉二首年年學臨池赫蹏苦不足種取緑雲箋窗前三百幅六翮何飛揚含苞翳深樹朝來覓羽人共跨青鸞去少室山房集巻七十
