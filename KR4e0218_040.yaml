body:
  text: 少室山房集卷四十明胡應麟撰五言律詩七十六首侍御葉公初度賦柬四章時中秋後五日白鹿梯仙境青牛柱史臺東華晴旭現南極瑞雲來玉蘂凌蒼柏金莖映緑苔黃封將湛露瀲灧出蓬萊豸繡輝瑶席鸞笙奏玉除紅雲三島近白露九秋餘祝頌填宫觀謳歌沸里閭西泠木蘭棹花色擁芙蕖曙色重關外湖山列夀觴桂圓猶八月菊吐漸重陽紫鳳新辰極青鳬舊上方天風何處落一曲度霓裳繡斧清朝出光生大海涯梅鹽徴相國柏酒送仙家舄履排青漢衣裳逗紫霞錢塘十萬户簫鼓沸蒹葭公時按鹺送吳山人吳時為桃花會豐樂橋邊路相逢鬢未皤形骸長土木夢寐半雲蘿洞口銘題鶴池頭帖換鵝桃花飛欲盡曉發奈愁何題胡京孺三緘齊玉塵揮仍置金人戒不忘談寧空稷下辨已詘華陽塞兑遵𤣥聖冥心對上皇白圭晨起誦三復意何長林孝廉以黃堯衢書至并新詩投贈報以此章席帽戴殘陽翩翩白面郎登龍年尚少繫馬日偏長萬卷窺藜閣雙鈎合草堂寄聲黃叔度夜雪待孤航永叔坐中戲贈奕者鄭童十五侍王郎盈盈坐隱囊雄思馳虎穴險欲控羊腸玉洞青霞麗金庭白日長毋懷陸郎橘髙跨赤龍翔夀陳翁大隱聊城市青霞渥妙顔一壺懸海岱雙屐占湖山繞砌蘭芽茁當樓桂魄閒中宵占紫氣已到穆陵關午日訪吳文仲使君適湖上燕集寄柬二律午日尋芳候千秋祝聖年樓船浮别島簫鼓列長筵紫翠仙城出丹青梵剎懸金閶折垂栁何似越門前騎吹千山外招尋總勝遊蒲觴飛别墅桂楫競中流日湧江心鏡霞增海上籌天顔欣咫尺一望翠雲裘吳公以萬夀入都唐人祝賀用鏡水心鏡以午日鑄唐小說中次日集明府齊頭長君文學侍坐依然五楊栁丈室卧東臯海岱驕鴻翼林塘狎蟹螯飛觴春色淺秉燭夜談髙冉冉凌雲氣池頭著鳳毛狄參戎邀集園亭觀女劇即席賦將軍西第燕奏伎鬱金堂樊素先登席秦青正繞梁巫雲飛繡褥楚雪照羅裳不盡淳于興留髠夜正長飄飄青鳥使晨迓白鷗羣艷舞偏傾國嬌歌盡遏雲江深桃葉度灘逺竹枝聞不分黃花色霜前撲畫裙羅生館中閲伎作是夕奏梁辰魚吳越春秋逆旅愁無賴良宵興若何纖腰呈楚舞稚齒發吳歌院落飄紅霧樓臺駐絳河扁舟拉西子蚤晚若耶過為探傾城色聊停上漢槎興移金谷樹春滿玉臺花益夀懷差壯安仁鬢未華異時雲水約珍重越溪紗同方上舍集施山人二首時立春前一日旅况新年接鄉心故國同吟猶懷洛下語漸識齊東徑草初回緑園桃欲放紅朝攜雙蠟屐南陌鬭春風柏葉孤城蚤梅花絶域遲暫將春雪興同醉暮雲時白練毫飛灑青燈劍陸離吳歌夜闌發星斗墮敲棋王將軍邀集西園賦時大雪初霽將軍西第近曳履暮追遊不夜開瑶圃先春宴玉樓月窺庭樹上雲逐劍花流片石燕然頂嵯峨待紫騮張博士過訪賦贈二首世業明經舊家聲作賦隆四知傳漢代三絶擅唐宫匣劍芙蓉麗盤飱苜蓿窮何人問奇字旬月坐春風蕭然廣文邸半榻擁青氊著述河汾後摳趨泰岱前虛堂時繫馬髙座幾懸鱣咫尺侯芭在花時過酒船送周新之久事元戎幕新辭上客行雪深離瀚海潮落到錢塘射虎矜衣窄歌魚笑鋏長小喬粧閣畔計日望周郎送汪生歸大鄣客邸悵離羣連天木葉聞囊琴凄鶴調匣劍隱龍紋野凍黃河雪山昏白嶽雲嚴陵吾舊宅一訊孔圭文潞河遇陳子卿同飲胡瀫元齊頭即席賦梅花下白社元同調清風忽故人荆髙逢易水干莫照延津謁帝心期壯封侯骨相貧梅花齊閣底沈醉異鄉春陳生出所藏半照及匕首乞詩為離合作五言律惜别佳人意酬知列士腸粧臺分鳳影寶匣現龍光蓮鍔誰同鑄菱花意對藏樂昌何日返見汝合干將送趙别駕參軍曾入幕别駕復移舟渌水蓮花隔清溪杜若留鶯聲吳甸曉騎火粵山秋好作師雄夢羅浮問舊遊春日胡茅兩生訪王至卿攜妓東郊藉草暢飲逮暮泛舟從北郭歸拂曙薊門東尋芳入亂紅園梨嬌墮雪堤栁淨含風逸氣雙鈎並清歌一棹同盈盈美人意悵别夕陽中贈唐山人二律暫輟嚴陵釣懸壺向紫宸仙莖攜沆瀣帝座問星辰白苧新燕客青囊舊越人昆明泉萬斛花裏試垂綸綵筆神飛動青囊術有無看松留泰岱採藥望天都霧引車前鹿雲迎舄下鳬異時滄海色千古屬潛夫和吳茂先悼亡王生馳夢日潘令悼亡年雨滅巫峰外雲沈洛水前笑言孤枕共形影一燈懸好借文成術紗廚望晝眠于鳳鳴攜酒慧覺禪寺作尋幽偕賦客古剎亂雲傍優鉢千花淨菩提一樹芳談天遊淨樂掃地坐清凉欲共寒山衲西歸不二鄉贈真頭陀南州來賦客北苑問髙僧佛土窮三界人天度七陵孤雲晨拓鉢大雪夜傳燈便欲逃禪去風幡證惠能再賦同吳生問法來方丈清齊供野蒲髙禪逢普化古佛現毗盧大悟三乘徹真空一念無那能將寶筏咫尺濟歸途座中贈吳隱君梵剎金銀布人天下夕陽菩提千界淨荷芰六時芳渺漫恆河筏蹉跎劫海航憑君畏壘下一授衛生方贈鄭生卜居仍海嶠門巷一壺懸采藥陶𢎞景迷花孟浩然星垂漳水釣月引衛河船縱目金華頂羣羊正熟眠吳生談魯連臺在遼城東北未有題咏余素髙其節俠即席賦此􅏭嵲髙臺畔猶傳俠客名千秋餘故壘片札下堅城晚日殘花墜寒雲蔓草平誰言蹈東海風馭入蓬瀛吳希學齊頭鸚鵡學語慧甚戲贈此章似汝聰明質誰將閉玉籠鄉心馳隴右野語狎齊東倚竹身全翠餐桃頰倍紅秦宫三十六一一訴春風贈耿中官萍梗淮圻北桑弧碣石東心長懸魏闕疏屢入隋宫色相三途幻因緣四大空侯鯖頻日饜拂袂近春風送倪明府燁燁蘭隂里銅符羡晝遊鳴琴聊寄傲岸幘正風流桂折羅浮頂梅探庾嶺頭黃金臺百尺獨步佇驊騮贈盛明元昆仲時余將卜居葛湖之傍以諸子翩翩雅尚有足依者焉盛世塤篪合翩翩逸興同六龍齊潁上三鳳倍河東玉樹聨花萼瓊枝壓桂叢滄浪分一曲肯著杜陵翁諸盛凡六人髙門懷伯仲上座集賢豪對列三珠樹同揮五色毫披襟憐爾輩結襪愧吾曹老大才名盡惟應把濁醪題湖上方舟四首有序舟下聯三小蜻蜓艇上覆方板衡徑丈許縱倍之欄檻四列頂幕青油中二髹几可坐十人寬平軒爽規製甚適盛明元氏昆仲所創以待賔友之泛湖者余既日以杯酒從事遂賞以五言四章桂楫漾沙棠朱欄十尺强三舟聨錦纜四柱簇牙檣障日青油麗凌風翠黛狂洞簫明月底一曲和滄浪平湖秋色淨一舸繫蒹葭懶搆思光宅堪浮少伯家窺簾鳴鸛鶴掠檻度魚蝦竟夕看明月無勞促曙鴉薄暮方舟集芙蓉次第尋臺驚浮水面亭似壓波心雅稱苕川釣偏宜笠澤吟浮休定何日一壑暢幽襟湖上暮雲稠青絲蕩碧油移舟過巨石浮筏向中流擬作張騫泛真同郭泰遊余將挈佳麗日醉大隄頭盛母孀節詩為思達思𢎞題盛世髙孀節光增婺女奇志堅初矢日年倍未亡時片玉懷中抱雙珠膝下遺桃花三月近戲彩傍瑶池贈雲濤祝生所狎美人也翠袖撥箜篌居鄰八咏樓雲偷巫峽曙濤占曲江秋經卷王姬誦詩箋薛媛留何妨祝融氏同赴爛柯遊思齊夜出楊瓜佐酒稍異常者訊之知楊姥得諸異人即席賦此何代貽嘉實纍纍越水涯稱名同邵圃問姓是楊家五色縈丹洞三漿爛紫霞異時營子母蘿蔓日交加贈李廣文舊國天都近新齊婺女懸彩飛江令筆青挾鄭公氊三洞雲攜屐雙溪雪放船無誇沈侯句苜蓿誦嘉篇送栁使君之南雄五馬趂西風朱幡氣槩中淮陽移長孺蜀郡待文翁梅發新郵使棠飛舊寓公羅浮峰四百躡屐遍秋空送王廷尉還東陽時有鼓盆之變晝遊蘭渚上花色艷簪裾舊翥雙鳬舄新馳駟馬車紅雲燕日近緑水婺星虛藉藉張廷尉髙門葺故居送沈明府之江右五馬晝飛揚雙龍照夜光公庭髙嶽底官廨大湖傍舊宴虛平樂新恩出建章為知良吏傳藉藉贊龔黃暮秋病肺夢中作微霜九月朔一病罷登臺熟睡蟬聲裡柴門午不開茶烟縈翠篠藥褁翳青苔兀兀巢居子塵心且未猜竟日焚香坐丹楓敞畫屏參同原有契道德豈無經白露髙塗屋青山逺抱亭那能世緣縳華髮已星星題趙鴻臚文鎮西園並蒂黃花並蒂秋難老同心暮更嘉金莖雙濯露玉蘂對凌霞色映天隨圃香飛靖節家翩翩白衣過把酒興無涯花朝吳孝父邀集髙深甫湖上園亭名園總宜客春半大堤頭渌水時扄户青山日滿樓攜壺新雨過挾瑟亂雲流漫惜花朝宴拚成列炬遊送吳文仲使君并懷參知睿父二首鼓吹錢塘驛帆檣趂暮潮雙龍初析羽駟馬暫停鑣繡鉞吳門近牙旌越嶺遙異時成握手列炬坐深宵後乘遵吳苑前驅問薊方瞻依猶大樹蔽芾盡甘棠霧躡三天紫雲停六洞蒼提攜更何日爛醉舊髙陽寄吳希學徵士兼懷啓元茂才萬事總長鋏一身餘短笻别三天子障吟五大夫松滄海有時涸丹砂何嵗逢周顒卜居近憶卧定林鐘過俞羡長小飲二首有序羡長寄居吳山之麓四壁蕭然僅圖書盈篋笥余為欵語移日歸寫其風素成詩二章極目函關曉居然異氣停姓名髙逸傳身世太𤣥經獨鶴雲蹤杳雙龍電色靈孤山梅萬樹新著少微星四壁圖書滿藤蘿壓座蒼陸渾新邸僻陽羡舊田荒大業占毛穎雄心托杜康褐衣吾自貴未擬謁金張送汪山人歸四明四首兩鬢懷人短雙瞳作客方文淵神矍鑠叔夜思昂藏薜荔裁衣古蘭荃結珮芳戴顒精舍近歸卧白雲長相逢寧海岱對語即江湖肯抱臨淄瑟聊攜督亢圖官衙吟苜蓿客館寄菰蘆異日山隂興能來白玉壺𤣥亭吾久閉問字不辭勞妙訣青囊古雄談白㲲髙東瀛朝濯髮北海夜持螯極目河梁雨寒光隔珮刀邂逅青山陌飄然思不羣乍歸鄞海月長嘯瀫溪雲劍擁蒼精氣符懸赤伏文東山逢謝傅好作片鴻聞挽祝母飄飄易遷駕凝望白雲長橋逈分烏雀臺髙失鳳凰東陵辭聖母南海謁空王何夕雙溪水重懸婺女芒唁祝遜之傳聞倚廬客布帽碧山阿讀禮依松柏傳詩廢蓼莪熊丸魂夢逺雞骨淚痕多迢遞支機石無由問絳河謁董江都祠二首太息江都相遺風尚宛然帷疑曾下日園憶未窺年大業尼山後真源洛水前天人三策在不廢萬年傳一徑浮雲入千崖落照明廣川新廟貌繁露舊家聲水緑平吞市山青半壓城九原人可作相對話西京寄潘上林二首南海潘上林少丞光祿伯子也嘗共集黎祕書邸雄飲達旦别去草載矣今春余卧疾武林忽逺寄手書新刻盈篋爛然慰藉之餘聊寄兹什草載長安陌君能憶酒狂片鴻來庾嶺雙鯉到錢塘賦草新藜閣詩篇舊柏梁春明退朝晚擲果遍奚囊憶弱冠燕中惟敬少丞朝暮遊往或浹旬不面則咸詫為疏乃今諸儕輩略亡存者即君華吏部喪逝繼之河山之感觸目飛動今覩上林君羽翮翩翩典刑如在重賦此章落魄南皮社壺觴數往來夜眠光祿邸晨叩祕書臺永絶抽毫彥猶餘執㦸才重看潘騎省題賦入蓬萊夀王山人子英初度逢元日華筵正七旬遺經藏甲乙祕籙授庚申庭樹三株發階蓂一葉陳共欣蘭水上比屋頌靈椿宅寄吳山外籌添越海傍玉壺懸大藥金匱謁長桑紫府青牛駐𤣥關白鶴翔東風門第在拂面杏花芳送黃野人二首倦作蘭隂客花期一棹閒真形模五嶽祕籙授三山電掣蒼龍下雲驅白鶴還越王臺漸近先到若耶灣自得茅山祕休糧卧翠屏銖衣朝絳闕玉簡誦黃庭六甲時觀象庚申夕煉形石床雲霧滿懸珮濕青萍題黃上仲大有山房卷吾憐黃叔度一榻抱雲眠早賦中原雪長吟大有天瑶芝榮積石玉乳噴飛泉笑我金華洞羊羣正熟眠少室山房集卷四十
