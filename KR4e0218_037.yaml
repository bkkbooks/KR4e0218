body:
  text: 少室山房集卷三十七明胡應麟撰五言律詩八十二首夀郭金吾閥閲汾陽盛簪紳代國留𤣥關馴獨鶴赤縣駐雙虬覆局青霞爛鳴絃白雪流三珠庭下樹冉冉拂瓊樓早春自西掖過訪宋忠父作言尋中禁路來問列侯家玉座攀雲色金城步日華池烟深鎖樹苑漏曲穿花莫笑綈袍敝長裾半赤霞醉卧趙文學榻上蘧然甚適覺賦此章頽然聊一榻酣卧碧紗長極樂知仙界溫柔羡帝鄉春疑回大庾賦已就髙唐可怪黃粱熟莊生興未央送鍾天育南還二首送汝木蘭橈髙天正泬寥楓行揚子岸栁折灞陵橋麗賦三都擅狂名六館饒東溟聊一息奮翮上扶搖寂寞中涓後何人問駿才藏書還禹穴抱賦出燕臺大漠新霜下長河片月來異時重入洛雲色竚蓬萊贈丁文通太學邂逅咸陽市干將照白虹新詩傳敬禮舊夢識文通業豈吹竽賤心猶擊筑雄寧親暫升斗奮翮待天風臨淮史夫人挽章四首令族姬姜並賢聲孟衛流貴從周太保體敵漢諸侯寶匣飛鸞鏡瓊簫咽鳳樓預知陶氏冢新兆卜眠牛雲軿飛絳闕哀詔下明堂大樹猶撑日芳蘭驟仆霜泉臺春寂寞石室夜蒼凉冉冉靈妃珮乘風度七襄嘆息蘭閨底悲風一夜多星芒沉寶婺日彩斷銀河跨鳳佳期阻丸熊舊事過鍾情潘嶽甚其奈二毛何寵數頒宸極恩光備寢筵珠襦藏大隧玉匣閟重泉懿德絲綸著芳聲竹帛傳談詩憐哲𦙍凄斷蓼莪前題何仁仲園亭二首采采白蘋洲三湘欲盡頭危欄雲夢夕飛閣洞庭秋漁父持竿過靈妃結珮遊武昌新水發遲我木蘭舟别館寄清沙飛甍觸望遐徑移湘浦竹溪浣杜陵花萬岫交明月千林逗彩霞牆東處子麗莫是宋生家甘露園二首為園近茂陵甘露遍垂藤月底寒猶墜風前曙欲凝餐蓮疑太華瀹茗勝中泠試作相如賦誰云渴未能泠然松竹徑㸃綴自何年北固昭明寺中嵩慧可禪寒生金掌外清注玉壺前好傅何郎頰朱衣拭更妍同李惟寅何仁仲集朱汝修觀梅花一尊春興劇花下共傳籌艷質霜先避清香月並流詩憐羣玉句人倚仲言儔恍入西湖道吾家萬玉樓送王伯固之臨漳承恩出尚方躍馬向臨漳身是王喬族官鄰子晉鄉芙蓉周闕紫松柏魏臺蒼預聽鳴琴日陽春滿未央送吳翁升還霅上河梁樽酒暮一騎向飛沙旅服驚霜樹歸裝冒雪花豪遊新北闕艷賦舊東家好去苕溪上羣姬輟浣紗雪中過孟韜不值濩落懷同調經過問索居雪花行剡曲雲樹隔匡廬大業元龍劍微名尚鹿車不知𤣥草外奇字近何如子玉以大計量移賦慰三嘆崔亭伯清風玉不如吏情甘慘淡公府絶吹噓考署陽城拙名成谷口愚祇應宣室夜前席治安書聞王間仲得雋燕中志喜二首閥閲三朝舊弓裘四世新霜蹄金騕􅀈天種石麒麟桂擢燕山夜梅標碣石春平康花似綺結束待車輪金泥初帝闕玉樹舊王家間氣鍾三葉奇葩炫五花追風橫大漠躡景度流沙寧似吳宫外窮年學浣紗大學士趙公招飲小憩章行父館中作尺五瀛洲路頻過户不扄漏長中極殿時趙公尚視事閣中春滿太𤣥亭行父方館穀大學士門下舞鶴花間度飛鸞竹外停最憐調鼎暇吐握共忘形是夕留飲至丙夜詰旦再呈此章紫極方延佇黃扉乍卜歡上公能結襪羇客盡彈冠玉臠移中禁瓊漿出大官夜闌台斗色清切動長安訪蘇君禹城南别墅時郎君新獲雋計偕二首韋杜城南曲經過路不遐重垣千樹棗曲徑四時花楚思融春雪燕歌促暮霞日斜羸騎返睥睨半棲鴉豈是東山墅頻張北海筵帝城雲色近仙掌日華懸舊燕紛窺幕新鶯促和絃坐看池上鳳矯翼向甘泉雲嶺真松卷為崔母楊孺人題朗月懸西極髙風徑北堂雲松千尺秀氷蘖萬年芳跨鳳春情杳丸熊夜漏長惠文看哲𦙍飛詔下明光一醮悲前事三遷訓後賢即今衣繡日猶是斷機年黃鶴瑶池下青鸞玉座傳蚤知驄馬客風化遍淮瀍題楊孝子卷為世叔孝廉當年排帝闕萬死白虹知楚澤長醒夜燕臺困餓時有天號半菽無地獻三芝藉甚遺孤在干將對陸離過蘇生期歌者小謝不至戲作寂寞看花興倣徨伐木歌虛聞鶯出谷未見鵲填河暮雨當忩斷春星入户多明朝攜小謝池草夢如何贈騄兒騄兒才五嵗意氣欲凌霞骨已徵千里書應誦五車神清珠在握體潤玉無瑕莫作雞羣擬終當勝阿爺送塢子逺還京口倦索長安米言尋舊鶴羣傳家中憲業負笈太𤣥文塢生為中憲公孫中憲有詩集客路櫻桃雨歸帆杜若雲卜居何日事攜爾大江漬贈胡孝廉昌世旅食渭橋邊青萍僦舍懸驪珠溟海握駿足薊臺捐謁帝留孤憤逢人話太𤣥憑收嫁時淚會有惜嬋娟贈璚樹為顧朗生艷色真瓊樹豐肌倍玉環紅粧停夜月翠黛壓春山飛鳳秦臺下游龍洛浦還相思幾攀折遮莫鬢毛斑臨淮席上蔡生乞詩作時王山人在坐龍陽君已貴一笑眼能青玉樹標前砌金莖夢後庭聲馳千里驥歌送五侯鯖莫以安期舊揶榆蔡克靈過王山人啜茗作束書來薊北題賦遍江南不慕千鍾粟時分一味甘蒼筠搖午夢黃葉墜清談細酌天池坐何殊繡佛龕鍾天育過訪索詩賦贈沾沾越吟客窮巷又移居舊著參軍品新臨太傅書花香縈短屐栁色傲長裾寂寞黃金館誰今問子虛朱山人以非罪淹獄賦慰泄栁門時閉鄒陽獄未蘇瓜田寧納履藥肆尚懸壺業就肱先折愁深目半枯青天覆盆底見汝出窮途過劉茂才百世讀其𤣥珠諸稿作似汝年猶少投豫賦已工青藜三世後赤幟萬人中朗潤知潘似清揚憶衛同韶顔吾盡擲一愴異時紅送人遊塞上曉發灞陵橋彎弓箭在腰黃沙隨地濶紫塞極天遙玉乳蒲萄熟金羈苜蓿驕賀蘭千百仭飛騎上岧嶤送章秀才從軍白草暮蕭蕭黃榆葉半飄四時風不斷經嵗雪難消大磧逢偵騎平沙見射雕兵鋒隨所指百戰靜氛妖贈楊文學身世一袍青柴關盡日扄鹿門傳舊業𤣥閣抱遺經玉樹祥雲擁金莖湛露零異時飛紫誥何羡客為星和趙相國懷山八咏棲真居士北極恩偏注東山興未窮民猶歌畏壘帝已問空同絳闕星辰麗彤墀日月崇寧知西竺想寤寐化人同六虛主人翠屏羅窈窕丹壑敞嶙峋獨占三山色長棲六洞神雲霞居士夢宇宙宰官身幾夜騎羊客傳書到玉宸二初牧侣煉藥間金竈宣麻上玉除黃庭𢎞景籙碧洞稚川書鶴化翀霄後羊眠叱石餘赤松如待牧前席為誰虛紫霞洞叟巨磴山腰豁流霞洞口平闕疑屯紫氣館憶坐朱明草色金光綻桃脂玉乳瑩為探輕舉候少俟大還成靈溪漁父澤畔吟初就溪頭望未涯坐攜青竹篠行趂碧桃花錦曳千林霧綃疑萬樹霞秦人遺核在一種帝王家白雲樵客古樹白雲含晴光上鬱藍為霖今塞北挾霧舊東南石上凝蒼靄峰頭雜翠嵐萬方膏雨洽出岫詎空談湧雪寒翁一澗蜿蜒出胡麻飯有無雲淙穿石竇雪乳噴氷壺峽峭憑舟探潭深藉杖扶隔凡天咫尺歸夢夕陽徂玉露丹仙石室清虛畔研朱坐泬㵳空濛流月窟㸃滴貯天瓢掌憶金仙近盆憐玉女遙他年把周易騎鶴上岧嶤哭汪司馬伯玉十首太函司馬齊名白榆社名北闕懸車蚤東林曳杖餘神留中土卧帝命太函居五嶽藏𤣥草三天墜白榆庭階雙玉在雪涕茂陵書青萍懸虎穴赤幟樹龍門居後楊寧恥齊名杜轉尊星樞摧軫翼天柱折崑崙白玉樓前侣飛雲限九閽司馬為弇州同年友又齒差長且文望相亞而極意推轂弇州感之甚數自言于余杖鉞平邉塞麾戈逐戰場風霆流武庫河斗燭文昌玉帳三韓外銅標百粵傍祗今吉甫頌猶自播夷方伯玉嘗于白嶽建文昌祠黃山初謁帝𤣥扈舊棲神華夏悲司馬春秋痛獲麟名猶標泰岱魄已化星辰寂寞東南事文章孰後塵一榻中林畔如椽大海頭豐碑騰六合巨榜揭千秋妓狎東山卧賔殘北海遊琅琊雙墓在天意合吳鈎漢閣空劉向揚亭逝子雲中原誰步武上界已修文馬骨驪黃外蛟珠鴨緑濆異時傳汲冢一代有三墳浮生偕電露名理悟幡風濁酒談中聖清齊問大雄淨名居士榻忉利梵王宫此日三車去懸知二業同黃粱殊未熟大夢竟難呼兜率天髙下遮須界有無文成歆上帝草定屬潛夫伏櫪今誰辨長歌碎玉壺公嘗以全集屬余校定龍宫開淨業鷲嶺學枯禪障息三天外神遊萬劫前空花函谷夢祇樹肇林緣誰復偕蘇晉長齊繡佛筵邂逅平原飲飄然夜雪過寸心雄海岱隻語廢江河落日生芻逺悲風大樹多如澠猶夙昔萬恨擲蹉跎香山寺流憩亭小酌逢張鄭應季四文學邀宿華嚴洞余與諸子素昧平生酒酣興發䇿蹇十里從之詰朝復抵碧雲泉上十里華嚴寺重遊不厭頻攜尊三市客擊筑五陵人野篠長封雪池蓮不受塵故園滄海上飛夢繞垂綸送倪明府之桐城河梁尊酒别霜樹半遙空駿市燕臺上鳬飛漢殿中桐花城畔月桃葉渡頭風最羡琴堂色青蒼對皖公送李少府都亭尊酒别秋葉照離筵菊綻燕臺下松哦越嶠前孤航衝雨雪短劍拂星躔咫尺徵賢詔黃金漢殿前送趙進士使太原秋水木蘭橈雙旌出渭橋飛雲行上黨積雪過中條謁帝朱衣近寧親繡服遙向來龍劍影輝赫電光搖過董中翰體仁余草載前舊友也别後始授室燕中今一子已踰冠矣感念今昔為之憮然草年燕市客爾外更誰存逆旅推耆舊他鄉見子孫花香分玉殿藜火直金門笑我青衫敝西風曳帝閽同王行父李叔操徐象先諸子十日飲作懶習干時技聊同玩世人華陽寧異代河朔動經旬旅興先黃菊鄉愁過白蘋莫教龍劍色容易射星辰草載前讀王汝化詩已意其為古人邇晤李本建乃知此公僅百齡尚無恙也因賦一律寄之磊落王宫翰青編入夢頻那知三楚客遍閲五朝人藝圃占靈藥詞林頌大椿前村武陵洞相對幾遺民送汪象先伯仲還新安二首嘆息金蘭逝參差玉樹長多才秦别駕雅量陸平章馬鬛封仍下龍門副永藏河橋相送地抆淚滴干將燁燁名家後翩翩上國來𤣥經司馬業文賦士龍才玉閟豐干社金殘碣石臺喧傳茂陵詔漢使下蓬萊送何仁仲之南都二首去去何公子春風一騎寒含香辭上國傅粉入長干桃葉江帆穩梅花郡閣殘芳洲尋白鷺何似故園看祖帳春明外桃花别路長暫韜題賦筆初綰納言章觀入新鳷鵲臺呼舊鳳凰晝遊歡咫尺一水是瀟湘送崔子玉之逢州春水潞河舟春風拂面柔飛驂臨劍閣别駕問刀州懶卜嚴遵肆頻登杜甫樓巫山行雨暇入夢正髙秋送人還四明悵望春風色河橋落照間酒人三市别狂客四明還再舉看黃鵠孤飛羡白鷴新粧苧蘿下吾夢亦潺湲送區學文還嶺南彩筆吾衰甚驚看白面郎家傳周太史殿賦魯靈光上國啼鵑盡東風結駟長羅浮花事早月夜見明粧集張仲立館中同胡孟韜賦世事真雞肋吾儕日蟹螯撩人偏笋蕨作客又櫻桃業豈窮來擅名應醉裏逃相看聊起色毋擬曲江濤胡昌世張仲立過訪小集何限春風色長安醉碧桃雙攜蒯緱劍一話鬱輪袍射虎心猶劇屠龍思並豪平康花爛漫未肯負持螯哭李能茂五首命豈文章達才偏造物憎霜蹄殘騕裊風翮墜鯤鵬大業愁中廢雄圖悵代興蘭陵川上酒猶憶共如澠肺病呻吟外魂搖棄擲年千秋遲白紵萬恨劇青氈雞鶩爭誰得龍蛇命豈然𤣥亭莽空濶愁絶異時傳世事狂歌外人才太息中篇章亡白賀翰墨逝氷雍弱女啼荒徑孤嫠咽殯宫棠梨最無賴滿樹發東風李生書學王履吉翩翩近之世誰憐薄祿天亦忌雄才落月長鯨去悲風大鳥來遺書殘竹素舊宅翳蒿萊絶頂芙蓉上曾同眺越臺青山曾不厭朱紱定誰强宇宙瑶華歇川原玉樹藏無年嗟太傅有業恨中郎寂寞安昌第堪誰到後堂達父齒僅四旬一女無子蓋生平未嘗廢占畢業垂就而年厄之造物之于材豈其真有所忌耶送沈明府之竹溪二首一騎蘆溝畔西風落葉號那知花縣客猶是竹林豪霧擁雙飛舄霞蒸八咏毫黃金懸漢殿側席待賢勞暫握銅章去花封未寂寥囊琴辭上國岸幘望中朝賦就湘潭竹書傳霅水苕吳娃粧閣畔計日候蘭橈少室山房集卷三十七
