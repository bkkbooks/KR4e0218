body:
  text: 少室山房集卷五十二明胡應麟撰七言律詩八十三首郭方伯以三詩見贈賦此奉答新詩題贈遍瓊瑶握手龍門路未遙姓字三朝傳嶽牧風流一壑伴漁樵芒鞋石室雲隨杖桂楫金沙月滿橋極目錢塘秋漸爽一尊同賦大江潮秋日張使君招飲湖上作緑楊紅蓼半斜曛錦纜牙旗蕩瀫紋水面樓臺千剎繞波心城郭萬家分洞當靈隱偏藏雪峰到飛來盡入雲無限畫船秋色裡歸途風雨濕羅裙送屠長卿北上十日爐頭問酒頻春明回首各風塵朝攜一鶴還青浦夜扣雙龍入紫宸霞色薊門供傲吏雲花天姥臥閒人中朝手定明堂禮莫忘襄陽賦有神中丞蕭公自關中來越喜而有作玉詔輝煌下彩鸞朱旗遙捲出長安天南再擁中丞節渭北初辭大將壇别墅談棋千障肅胡床吹笛萬峰寒西來小隊能多暇山色湖光次第看顧觀察維舟瀫水招同王承父燕集逮暮乃别江天攜手一尊同錦纜牙旗夕照中十日平原今再見千秋河朔定誰雄渾疑白社開薇省共向青山覓桂叢寂寞黃金臺上事西風吹墮北來鴻送唐刺史之洛中分符新命下明光坐擁單車赴洛陽六載風期懸夢寐一時聲價動循良先春苑雪飄行蓋薄暮嵩雲到訟堂絶頂三花尋少室何人相對話胡郎送吳文仲入都片語溪頭問鶡冠驪駒催發向長安金華洞壑神仙吏玉殿星辰侍從官東漢循良傳賜履西曺詞賦接登壇嘉隆數子盟仍在肻放陽春屬和難司馬汪公伯玉拉余過海上訪兩王先生適司馬張公肖父同日至留集弇園者三宿淡圃者再實一時之盛事因成七言四律紀之名園樓閣麗丹霄握手千秋意氣饒日月雙懸婁水近星辰羣下越臺遙探書題柱俱司馬飛舄吹笙並子喬獨有侯芭長寂寞𤣥亭相對髮蕭蕭張公蜀人汪公適由越至王喬一緱嶺周人一葉縣漢人秋光何處一尊同十畝平泉眺望中鶴駕並留孤島上龍泉重合大江東星懸析木三垣紫日擁扶桑萬界紅矯首乾坤才欲盡那知人在闔閭宮飛仙環珮入蓬萊木落霜清萬象開宇宙文章傳四子東南名勝屬三才曺子念汪仲淹仲嘉同集丹成鸞鶴中天下樂奏魚龍大海來七十二峰雲霧裡憑將竒句勒崔嵬屈指詞場大業新輶軒離合並傷神重逢洛下含杯客半是華陽授簡人一代風期留管鮑百年金石聚雷陳相看忍賦河梁曲荏苒垂虹挂月輪贈王瞻美玉樹王家並寡儔翩翩羣從見風流烏衣不愛諸郎坐白帢偏從二美遊婁水秫香晴荷鍤石湖花暖夜維舟怪來雙燕頻相認玳瑁堂深貯莫愁王宗伯督學招同張汪二司馬王長公次公洪山人汪太學同集園亭賦十載𤣥亭夢寐過登龍此日並羊何關前紫氣飄槐棘海內蒼生問蓼莪一代文章諸老盡三朝禮樂二難多亦知元禮門風在總為名流到緑蘿重九舟中懷汪司馬何人同賦仲宣樓爛漫黃花引客愁一片秋光隨越舫萬家寒色到吳鉤波濤震澤神龍過日月天都彩鳯遊依舊六橋荷芰滿不堪明夜大堤頭送徐觀察之嶺北繡斧朝持出漢宫提兵遙赴粵臺東三江雨色雙帆靜五嶺霜華一劒雄虎帳分霄延上客貂裘移日候元戎胡床不淺登樓興萬里遙瞻碣石鴻陳觀察過草堂余適遊金華山中不值西風遙駐越江船竹徑深慚問草𤣥星斗乍看題鳯日雲霞長護牧羊天秋明斧鉞羣山外夢隔旌旗一水前莫詫雁南風景絶平津開閣候登仙送徐方伯之江右飛動襜帷出帝京漢庭才子舊知名驚風蠡澤揚帆下落日匡廬攬轡行鐡柱蛟涎秋盡洗石函龍氣夜雙明為知到日滕王宴四座爭攜彩筆迎閩中謝文度以詩及新集見貽賦答一函飛雪下江魚慚愧同聲驟起豫松菊滿栽彭澤徑蓬蒿深葺杜陵居乾坤萬事懸車外日月雙峰伏枕餘不逺龍門堪汝過幔亭雲色定何如題徐大參瞻雲堂負郭新看一徑成金華山半入簷楹喬松不斷瞻雲色寸草長懸愛日情檻外翔烏餘涕泪樓前馴鵲動悲鳴莫言遺恨終天抱屈指徵書下帝城顧觀察益卿過訪衡宇飛花暮不扄傳呼車馬到林坰何來海嶽稱同調是處乾坤問獨醒一水近拖揚子白千山遙墜夜郎青莫言寂寞揚雄臥旌節分明駐草亭題凌使君别業别業吳山之上用使君韻作五畝青山自結廬欄干十二坐幽虛烟蘿地近揚雄宅水竹天成杜甫居海色千家潮落後湖光萬頃月明初飛花繞徑誰相過一卷黃庭石上書送徐大參入都飛旌長夏問京華紫氣蒼茫越水涯南國芝蘭初映日西秦桃李並成霞三朝吏績推前輩一代儒宗見大家翹首秋風天闕近夜看牛斗落仙槎先是公山房産芝草數十本嶺右張使君闢園城中臺榭池沼皆桂林勝絶處豫聞竊嚮往焉賦得六題露曖長空片月流䦨干十二倚丹丘千山霽色飄銀殿萬頃寒光抱玉樓曳杖迥疑天柱過吹笙長憶廣陵遊當年莫奏開元曲燦爛星河落翠裘右清虛閣曲曲雕䦨面面霞何如蓬島問仙家客來精舍談雙樹人倚名園坐百花翠合暮雲流藻井紅分朝日上簷牙啼鶯滿徑壺觴在長伴羊裘閲歲華右叢芳館叠嶺高盤挂夕霏雲光霧色亂侵衣雙鸞夾漢青疑墜萬鷲摩空翠欲飛北望星辰懸帝座西來水石護禪扉他時倘共商山客日荷長鑱賦采薇右鳯台嶺噴玉千尋望轉竒平開十畝漾漣漪閒花弄色全依砌古木叢隂半入池雲合四山龍起夜露濃三徑鶴來時吹笙自是神仙客暫逐雙鳬到鳯墀右來鶴池淥水微茫漲碧空佳期誰向大堤同氷輪兩岸飛明月玉柱三天駕彩虹殿閣半浮朱舫外笙簫時出畫䦨東宜人最是新秋色十里芙渠一夜風右霽虹橋突兀羣峰倚碧臺如登方丈入蓬萊天垂象緯三辰列日射雲霞五嶽回幾夜漢槎孤泛到何年秦䇿並驅來從知帝夢思良弼莫訝商岩産異才用傳說列星事右三台石送顧觀察之薊中二首白羽初停越水湄彤庭北顧璽書馳清霜八郡飛長㦸積雪三邊照大旗異代勳名麟閣並生平骨相虎頭竒新芻滿甕蒲萄熟誰共襄陽醉接䍦銅柱威名播粵都樓船勳業遍江湖行邊首定周王策出塞新分漢使符倚劒蒼龍鳴涿鹿揚鞭白馬照飛狐從知幕下多詞客彩筆班生定有無寄歐楨伯水部時鄉人以楨伯秣陵書至明時大隱謫仙來紫氣千門建業開幾夜獨吟鳷鵲觀何人同上鳯凰臺楊花拂雪壚頭臥桃葉乘潮渡口來莫問羅浮峰四百一官原合近蓬萊方伯滕公起任嶺南喜而有作十載蒼生望未平雙旌遙赴越王城朱明洞啓霞光待大庾山將雪色迎四嶽輶軒聊海甸三台劒履漸承明新題滿勒飛雲上銅柱誰誇漢將名寄易使君獨把芙蓉越水湄青襟長憶問竒時虛疑剡曲帆來近轉愧延平劒合遲指顧風雲隨八翼踟蹰歲月上雙睂青山萬叠黃堂外柱笏誰同望武夷聞王長公元美再起南都司寇走筆奉寄時有傳長公已出者爭傳霞珮出蓬萊紫氣關前鬱未開金液好探龍虎地玉笙聊試鳯凰臺先秋列叟乘風去後夜王郎挂雪回林屋洞門元咫尺不妨瓢笠暫徘徊憶燕中元夜與朱十六童三安二縱遊長安陌上今倐十載矣山館寂寥再逢兹夕感舊賦此鳯輦鰲山出上京長安宫闕暮雲平千枝火樹宜春苑萬炬金蓮不夜城艷舞嬌歌游客醉靚粧華飾麗人行江樓此夕頻搔首飽看梅花上月明歐楨伯南歸過訪賦贈四十年操藝苑盟秋風遙起挂冠情羅浮絶頂披雲上庾嶺歸途踏雪行海岱名流誰並數嘉隆詞客半同聲朱明洞口攜尊日首探梅花寄越城贈郭隱君為思清孝廉作大隱華陽不避喧謝家庭砌盡芝蘭西池鸞鶴扶雙壽東壁麒麟抱二難紫綬定加萊子服青藜長伴竹皮冠八千歲月靈椿在一誦逍遙興未䦨送朱孺子還豫章兼寄宗良孔暘嵬父佳父四王孫蘭陵新緑乍吹醅指㸃銀瓶為客開雙劒夜持南斗出一帆朝溯大江回鵷雛五色凌霄翅龍種千金歷塊才羣從兔園應汝候彩毫齊拂豫章臺江右來相如過訪同唐惟良夜集分冬字韻嚴陵長日候孤笻底事芒鞋雪後逢結夏西湖眠菡萏髙秋南浦落芙蓉人如司馬名堪借客比梁鴻姓易重把臂舊游肝膽在接䍦那不醉雙龍敬美使君再起督閩中學聞將于歲杪暫出寄訊重飛天詔出彤墀特許看山出武夷雙舄恍疑雲際現片帆剛待雪中移七臺高步穿林逺九曲長吟破浪遲珍重紫陽遺墨在好將椽筆鬪淋漓張使君招飲舟中作五馬喧傳瀫水傍含杯猶記舊高陽自呼南郭幽人至相對西臺御史狂地挾雙流縈畫舸天垂千障落胡床接䍦顛倒休辭醉同是當年白面郎題少𤣥宗矦冊玉檢金泥出太常桐圭花蕚逺相望西園車蓋邀明月南浦樓船泛夕陽兔苑登臺無俗客龍沙開閣有賢王張筵可解呼王勃為聼鳴鑾入豫章孔暘得王中丞所貽西僧自焚灰像因立精舍奉之乞余作詩先是惟敬永叔諸君咸有題咏遂繼七言一律精廬何自布金銀白足西飛事已陳鹿苑乍施焚後像龍池重現劫前身空門色相元無住净土莊嚴合有神欲起丹霞看舍利摩尼長照大江濵送喻邦相吳文仲試士省下畫舸齊飛瀫水頭潮聲八月下杭州懸心兩地桃花色縱目三天桂樹秋日上朱衣晴鎖院虹飄彩筆暮登樓無勞石匣占雙劒並識龍光在斗牛將過婁江奉訪王長公先柬二首西風船下越江湄恍入三天問路岐雲滿大羅朝宴日雪飛中嶽夜來時千秋一鉢勞先贈萬里孤笻愧後期笑殺盧敖遊汗漫丹臺咫尺是蓬池公與余相聞問十載餘數訂期奉訪以病不果今秋北上實以踐此盟云片刺飛揚國士情登龍迢遞闔閭城一身海岱依元禮雙眼雲霄屬正平下里乍堪酬郢曲中原能許問齊盟莫言把臂詞場晚躡蹻天門象緯迎初至曇陽觀訪長公作二首龍篆熒煌列太清鳯簫時落步虛聲千靈劒佩朝拘翼七聖輜軿候廣成王母宴時香霧合上元歸處片霞明騎羊莫問關前客石室初平是姓名絳宇瓊樓壓巨鰲扶桑晴翠落飛濤攀雲頓覺蓬壺近望日猶驚泰岱高面貌諸天曽省識風神八極共遊遨含毫小畢千年事長侍方平醉玉桃次公於曇陽觀傍新搆淡圃落成適余過訪留宿其中敬賦青牛西去定誰從賦就歸來學老農醉白堂成初養鶴草𤣥亭啓一登龍機雲洛下堪同住梁孟臯橋欲借傭深夜曲䦨池上月萬峰林屋浸芙蓉又題淡圃一首築宫猶自傍曇陽空觀惟應侍法王揚子門庭長寂寞文殊臺殿盡清凉鳴鐘震旦紛華過就枕邯鄲障業忘不見西方真樂地玉蓮琪樹遍金堂小飲曇陽觀中呈兩王先生作十年書札滿林臯先後青雲識彩毫海內文章司馬擅洛中才望士龍豪一珠投處開塵榻雙璧聨時坐縕袍餘興正狂那得盡雪花從漲剡溪濤次公攜酒招遊弇園山池登縹眇樓二首縹眇飛樓逼漢開河山四望轉崔嵬石驅瀛海千峰立池劃昆明萬島回曳杖星辰干帝座吹笙雲霧繞仙臺莫言緱嶺堪忘世指㸃遙天鶴馭來層臺飛觀曲相連倣佛丹梯象外懸半壁霞生林屋底八窗雲起洞庭前黿鼉岸坼藏山夜烏鵲橋成叠石年醉望玉樓天尺五帝閽誰召筆如椽再别元美長公乍喜平原十日留征塵俄動鷫鸘裘南宗敢謂傳衣去北塞翻同躡蹻遊婁水三天雲霧擁華陽萬里雪風愁春花定約漁舟入相伴秦源到白頭寄王次公敬美時方辭督學越中之命飛詔東來鬢未皤白雲深護洞庭蓑乍堪霞珮遊高闕肻戴星冠出大羅紫氣昔緣關尹住蒼生今奈謝公何惟應二仲心偏契早訂風期在薜蘿過檇李懷沈純父從軍何處覓封侯落盡梅花倚蒯緱五嶺雪深楊僕戍三苗雲合尉他樓登壇大業窮猶擅伏闕雄心晚定酬一事為君差快意緑衣無恙住儋州登甘露臺望金焦作叠嶺嵯峨到碧天攜壺秋色暮雲前樓高北固三千丈殿鎖南朝八百年雁鶩驚飛吳苑笛魚龍亂語蜀江船乘風恍憶銀河去拾取金焦石二拳鳯凰臺懷李白題百尺危梯上紫烟層臺十二鳯遊年天浮楚蜀千檣下地夾淮滁萬井懸睥睨白雲高闕底䦨干紅日大江前謾誇黃鶴樓中句今古長庚合並傳訪李惟寅話舊作一賦河梁事事慵秣陵闕下見扶笻觀心競作逢時態把臂頻看别後客萬㦸天都環虎豹孤航水國釣魚龍亦知不是封侯骨暫學河汾謁九重同張幼于潘象安集李臨淮即席作二首斗酒平原話各天深杯猶似夢中傳青油獨坐元戎幕皂帽羣趨上客筵五夜歌聲桃葉底十年容鬢菊花前抽毫忍和飛龍曲月瞑長干是去船六載華陽賦别離臨淮此日見旌旗悲凉白髮談兵夜宛轉紅顔任俠時萬户侯真誇燕頷九天人欲問蛾睂桃花爛醉春明畔一騎旋飛到習池惟寅已見二毛余亦安仁之歲獨遊燕子磯作曲檻危欄霧色開慿陵飛閣駕蓬萊江山上下千門入吳楚東南萬舳來吹浪黿鼉銜日起擘雲龍蜃挂天回憑高莫問前朝事巷口烏衣半緑苔奉贈大司馬潘公瓠子功成帝眷馳老臣銜命出彤墀千門月靜留都鑰萬竈霜清白下旗賔客南樓頻擁嘯生徒東閣盡裁詩極知吐握姬公念躑躅河梁問路岐時公屢致意惟寅欲余一見余北上期迫甚遂不及奉謁題留餘堂為潘大司馬朝日堂開霅水濵昆山入坐照嶙峋騎曺官顯非先世駟馬賔多屬後人緑野雲蘿長護色平泉花木盡含春謾將七葉誇門第百代勳庸屬老臣壽陳茂才一經垂老意何如聞道元龍氣未除鹽鐡幾裁文學論金銀遙問武夷居七臺紫霧飄藜杖九曲青霞候草廬莫謂漢庭方貴少蒲輪旦夕有徵車真州逢李季宣短棹東來不厭遊吹簫彈鋏下揚州風塵作客誰青眼海岱論交尚黑頭薊野長虹千驛路秦淮明月萬家樓相逢合在華陽邸大有荆高佐酒籌泊廣陵懷顧益卿秋風騎鶴向天涯路入揚州興轉遐有客登樓懷玉樹何人開觀出瓊花壇前橫槊三千幟橋上吹簫十萬家笑殺紫薇今夜醉布帆無賴宿蒹葭聞沈純父將還有寄南過銅柱絶風塵北望金門戀隱淪豆蔲花前千里客桄榔樹底十年人驂鸞雪擁名山色驅鱷雲開大海春聞道天雞來旦暮可令宣室遲孤臣寶應碧霞宫宏麗甲天下其後玉皇閣高寒特立環以大河東望淮海莽蒼無際余維舟其下登臨竟日恍然馭風遺世之想為賦二首積翠中天勢欲翔分明臺殿到扶桑雲霞上下飛丹壁日月東西抱畫梁座裡黃河千舶聚毫端滄海一杯長祗今誰識宣城句搔首騎龍入大荒斗畔危梯百尺懸岧嶢飛觀矗層煙長淮蜃起朱闌外大澤龍吟碧檻前抱瑟湘靈時自舞吹簫秦女欲誰憐却思香案曽為吏白晝蓬萊絶頂眠明上人居少林三十餘年以遊方淮上說法于通𤣥禪寺余從大衆諦聽異焉造室𤣥談遂至丙夜詰旦留詩為别且訂後期泠然飛錫下西方久住名山侍法王持呪毒龍歸藻碗談經馴象過繩牀諸天日月千花供大地山河一葦航我亦宿生稱大士相隨七佛赴禪堂傳大士金華人崔嵬臺殿入清凉月色天香對坐忘洗鉢師能容姓字留衣吾欲廢文章才參雪竇人天近共指雲門客路長計日靈山攜杖去白牛車畔問慈航沛上懷古寄喻邦相酹酒遙當百戰塵彭城山色大河濵攀龍北極非無客逐鹿中原定幾人雪浪吕梁飛一舸日華芒碭駐雙輪登臺苦憶神仙吏擊筑歌風望紫宸次夏鎮謁朱公新祠􅏭嵲宫牆跨海隅嵬峨廟貌鎖清虛天開雄鎮猶名夏地擁長堤並接徐疏鑿歲深頻想像平城功就幾踟蹰丹青旦暮思良弼倘為蒲輪到玉除寄黎惟敬辭官不聽上陽鐘結社遙當四百峰仙子衣裳餘白鶴詞人環珮隔蒼龍羅浮樹裊雲千色大庾花殘雪萬重縱是寒梅難折寄可無書札慰遐蹤惟敬晚年自稱白鶴山人懷滕方伯先生矯首𤣥亭憶問竒海天愁絶雁來時清宵跨鶴還方丈白晝鞭龍上武夷舟楫尚回明主夢衣裳遙赴大羅期星河未吐吳鈎色十載寒光珮陸離初抵都下馮咸父以詩草見貽賦此奉贈紛紛才子競談天入洛何人最少年賦就三都吾欲老吟成七步世爭傳呼盧雪照咸陽市握塵虹飛碣石筵寂寞焦桐絃絶久為君重拭漢宫前同社諸子招遊顯應觀閣得臺字夾篠千林蔽緑苔飛樓百尺上崔嵬山將華嶽蓮花並嶺學淮南桂樹開隔坐三天懸帝闕憑闌七曜動仙臺君平此夜成都卜應怪乘槎客未回題陳玉叔雪坡草堂二首平坡飛翠立羣巒大隱新開十二䦨秀色逈當銀闕墮清輝疑傍玉樓看歌成郢國千花聚賦就梁園萬竹寒何似一舟乘興去閉門三日臥長安城隅一曲抱滄浪有客新裁薜荔裳檻外漁舟回七澤座中龍笛到三湘松花暮合陶潛里草色春添杜甫堂莫向峰頭歌白雪夜驚神女出高唐答屠長卿風塵攜手各茫然恍惚西湖載畫船六載蒹葭餘舊夢萬家桃李奏氷絃雲驅赤驥燕臺下電繞蒼龍魏闕前莫羡初平能辟穀餐霞曽謁大羅仙再贈長卿明府繽紛詞客盡西京赤幟誰持大將營司馬賦才元絶代文房詩律舊長城霞光若木飛三島雪色扶桑射四明漫向石函占紫氣雙龍齊傍薊臺鳴幔亭雲氣圗壽陳徵君作當年詞筆擅靈光白首青袍厭舊行曳杖少游行下澤吹篪仲舉在長楊庭前玉樹森蘭桂闕下瓊花憶棣棠笑指幔亭歸路近鐡船高繫白雲鄉少室山房集卷五十二
