body:
  text: 少室山房集巻七十七明胡應麟撰七言絶句八十首武林送吳山人北遊雪裡錢塘一棹孤送君寒色滿長途黄金臺館三千尺曽伴荆高作酒徒哭李惟寅太保十二首大將星沉易水頭五陵城闕暮生愁那堪落日臨淮第珠履三千覔故侯笙鶴遙天擁上才何年華表一歸來黄金慘淡名流絶落日隂風滿壞臺秋色轅門照大旗塞垣金柝夜遲遲危樓十丈中天月尚憶司空坐嘯時細栁營中柝夜停衣冠朝野惜精靈無煩更樹中郎碣潮海千山盡勒銘露洗長空散鬱藍無窮秋色庾樓南胡床寂寞珠簾閉不見征西月下談羽扇綸巾白紵袍聲名華貊羨人豪不知累代凌烟上若箇如椽擅彩毫梵宇金銀簇畫梁湖山晴色遍奚囊魚龍寂寞仙槎去四百樓臺挂夕陽十萬貔貅靜不譁青門歸熟故侯𤓰城頭一夜飛霜急落盡桓伊笛裡花百尺層臺近潞河瑯琊二美數經過華陽座上談天客强半追隨入大羅燕子磯頭落葉黄秦淮南去是金閶分襟最憶河橋畔明月千山墮屋梁憶共春宵禁籞東玉鞭馳驟兩花驄六街明月天如水誰喚詞人碣石宫國士提攜最少年青衫聯袂洛城前重來慟哭西州路萬樹棠梨咽暮蟬哭曹子念六首厯落嶔嵜赴九泉伯通椽下最堪憐扶風何處歸妻子慟哭梁鴻廢冢前乘風先到鳯麟洲二舅星冠話昔遊樹樹棠梨婁水上殯宫何處問曹丘一病相如困茂陵玉樓魂夢夜飛騰亦知鶴背難勝汝應逐齊諧跨大鵬三尺鬚髯十尺軀便便大腹定誰如莫言飽食曹交粟七步才華四部書縲絏寧當罪冶長當年書記羨鄒陽只今何處尋遺草無限春風屬野棠避地金閶歲不遙蓽門蘿徑晚蕭條鐘聲送客寒山寺恨泊吳楓第二橋送謝文度還武夷二首長江天際一帆開拂袖離歌下越臺君去幔亭囘首望霞光猶似赤城來凄風殘月大江濆送爾津亭見白雲搖落萬山秋色裡何人同謁武夷君過齊東不及持斗酒酹鳴臯墓二絶寄懷滿眼寒山卧北邙修文人去尚為郎無勞更下楊朱泣曽共齋頭種白楊殯宫遙鎖石門寒淺土齊東寄伯鸞惆悵棠梨飛欲盡亂山無語夕陽殘天香館縹緲孤根立翠巒扶疎晴影拂仙壇瑤臺十二金風起吹送天香出廣寒空翠亭翠葆林林夾畫牆萬株寒玉鎖烟霜閒來此地堪逃暑滿榻清風伴上皇紅蕖沼徙倚清香動曲池赤欄亭榭午風遲紅粧半掩青鸞扇疑是温泉罷浴時來鳯岡百尺亭亭翳紫苔清隂長夏滿樓臺風前漫作琴聲聽白晝天池鳯鳥來斷橋斜照夾㟁輕風上栁條桃花晴逐杏花飄遊人不道春光晩簫鼔樓船入斷橋漳塘霽月明月娟娟漾碧沙銀塘秋水浴蒹葭凉風忽逐雙鳬起零亂中流白藕花天井平原古木寒林四望幽經過麋鹿共淹畱翛然不起紅塵念坐占平原十畝秋鶴阜清風何年孤鶴此徘徊引步僊風拂島來永夜月明秋萬里滿空零露濕瑤臺靈鷲峰懷童子鳴二首行盡天台三十峯春烟重疊鎖芙蓉孤雲不作還家夢卧聽僧堂雨後鐘翠擁千林路不分夕陽囘首一鐘聞天南詞客畱題處惆悵西巖滿寺雲憶同俞羨長張元春何主臣吳德符遊宿湖上彈指隔歲孤坐小園横塘烟雨甚思四君挐木蘭飛白墮共之輙題一絶便面寄吳生傳致三子好風凉月大堤傍何限秋光撲畫牆迴首亂山飛鳥隔一林烟雨滿横塘王山人希曽記室戎行廿載矣歸武林寄止窮巷門庭蕭然余偶過啜茗其中為題此絶老傍東林學種𤓰當年投管事龍沙胡床獨坐秋風裡門巷無聲落荳花憶與王生酣眠小玉館中迄今垂三十載武林邂逅縱談疇昔則同事酒壚者什九岱宗矣把臂澘然輙復賦此三十年前宋子侯名花傾國爛溪頭簫聲斷絶秦樓閉何處重攜弄玉遊送徐茂才竹窻螢火記當年心折蘭陵繫酒船縱是相逢猶有恨西風憔悴菊花前送王生之白狼幕中二首不逐游閒抱隱囊翩翩結束事戎行閨中秋夜長如許莫遣音書斷白狼廿載封狼憶舊籌懸腰霜色粲吳鈎殷勤脫贈秋風裡五夜飛餐日逐頭時方有事日本病卧旬日焚香小齋偶扶杖過牆東則池上芙蓉盡放矣秋色三分倐忽强半捉筆聊賦短章肺病寒窻卧緑紗竹床支枕誦南華不知湖上秋多少簾外芙蓉盡落花王生希曽以文犀琥珀贄余序其滇遊諸稿余諾之未暇也㑹生有事白狼戲成二絶句柬之燦爛文犀粤嶺來竹皮冠小正堪裁異時牛渚休然却畱伴温郎玉鏡臺右犀導一寸寒光萬里心懷中明月夢中尋莫將玉盌移相傍看作蘭陵舊鬰金右琥珀盃少與徐文學同館萬松别去二十四載一時諸子邈如晨星今秋邂逅武林因各舉大白為壽題小絶以紀之一氊猶記共錢塘舉白持螯思未忘二十四年彈指過莫教容易賦河梁祝生如華舊從余學詩溪上一别三載餘是秋余羇寓武林忽棹扁舟來謁投我七言律四章風骨崚嶒殊可喜愕于其行也走筆五絶勉之一枕梧堂亂葉飄新詩何處擲瓊瑤數篇風骨崚嶒甚可道青衫業未消寸管縱横白雪飛夜光前乗簇珠璣從他赤幟收全趙斟酌登壇在布衣盡道寥天跨赤虬那知深獄閉吳鈎自知匣底千秋在無奈寒光逼斗牛騄駬飛黄並絶塵太行高坂骨嶙峋君看異日登臺客可笑于今伏櫪人一棹河梁繫白沙芙蓉江上未開花十年句踐羅傾國投老西施學浣紗再送汪山人兼寄余督學君房六絶句玉舄雙飛大海晴河梁斜日斷雲平凉秋試躡青蓮蹻一問黄冠到四明一曲君王賜鑑湖蒼生能起謝公無雲門寺口青山色憶對金陵舊酒徒懸圃層城碧海頭何煩徐市説瀛洲月明天姥三千仞對挾飛鯨夢裡遊迴首南皮舊蹟存當時詞客半銷魂由來筆札君房妙一柱靈光鎮海門洞壑潮音阿耨前金銀樓閣太空懸三生大士容聽法淨洗軍持供白蓮望氣頻過大禹陵甬東城郭近西興天風萬斛潮聲起人倚浮圖第一層看花湖上人家覩閨中四時障子為題樂府四章繡户重重閉緑苔桃花一樹曉風來羅衫乍試嬌無力淡掃春山上玉臺一枕相思夢未成銀屏珠箔畫樓明石欄杆畔橊花發相對貍奴坐晚晴萬户寒砧接暮笳征夫何處未還家相攜女伴瑤臺上五色金盤弄月華窻外寒風正襲衣流黄那復理殘機鳴箏熾炭圍爐畔高捲珠簾看雪飛栁枝詞二首湖上作湖上春風萬萬條纎枝長學漢宫腰憑君莫奏清江曲無限情人憶板橋嫋娜輕盈拂畫樓佳人金絡控驊驑同心何處真堪結樹樹青絲緑水頭衢陸君七旬矣而嗜奕靡倦過余茒堂竟日索詩為别一絶蚤歲巴卭遇橘仙枯棋三百思通𤣥何當戲叱羣羊去獨占青霞洞裡天楚余生千里過訪乞詩四絶以贈其行握手新知話未央狂歌深夜舞魚腸蘭陵百斛猶堪醉莫指宜城憶故鄉車騎翩翩瀫水頭朱絃彩筆羨風流元龍豪氣今餘幾為汝重登百尺樓零雨蕭騷滴夜眠送君愁上木蘭船征途不為南風惡何限黄鸝碧樹前皓齒明眸照玉臺清帆瀕發更徘徊憑君小適山隂興明日溪頭挂雪迴題扇滿空飛雪墮闌干長信宫中夜不寒自是壽陽粧額蚤錯教人擬落梅看中秋夜小亭對月獨酌四首末首懷邦相明府危闌十二倚長空寂寂樓臺露氣中吹斷碧簫天似水玉盤初上海門東玉露無聲桂宇高小亭孤坐一揮毫百篇斗酒聊今夜斟酌騎鯨欠錦袍萬家秋色武昌樓樓上霜華靜不流好踞胡床成獨坐幾人年少解悲秋樓閣嶕嶢練影開遙知仙令亦含杯不因桂樹飛香滿真作山隂夜雪來戲贈相者吳生痴絶平生顧虎頭衹從丘壑擅風流由來寸管千秋在莫詫當年萬里侯題葉太學㑹心處四面青山䕶草堂芙蓉萬朶浴銀塘黄庭一巻焚香罷散髮胡床坐晚凉送趙明府之同安新捧銅章下瀫川同安百里候朱絃飛鳬慢憶雙龍闕少駐仙家十六天送郭生遊金陵二首瀫水蘭隂不耐遊飛帆遙入帝王州石頭城上花如綺為覔長庚舊酒樓滿載金華百斛春青袍緑鬢紫綸巾珠簾半捲長安道爭喚投壺郭舍人贈章生從龍緑鬢紅顔學楚狂看花攜酒過溪堂生涯莫笑揚雄拙老挾𤣥經不下床小憩長春圃作谷口雲深䕶翠巒科頭長日對盤桓一聲山鳥夕陽墮滿榻長松生夏寒送陸孝亷玉匣豐城劎氣重暮山重疊照芙蓉應知洛下諸詞客彩筆分行待士龍吳之衛過訪迫行不及徃報率爾寄懷邂逅吳郎曲水頭吳天霞色照吳鈎孤航不奈明朝别千樹寒楓盡作愁安二席上重聽輕紅歌作深夜西林棹雪過一尊其奈故人何寧辭大白千鍾醉飽聽輕紅百遍歌少室山房集巻七十七
