body:
  text: 少室山房集卷七十一明胡應麟撰五言絶句五十三首程氏息園三咏繡佛齋蕭然丈室中焚香自朝暮乍夜文殊過窗前遍甘露揮麈堂盱衡長史鋒緩頰中軍筆門外真長來氣壓孫安國卧雲館愁看巫峽雲懶醉羅浮月靜夜楚天遙黃陵秋萬疊題漁樵耕牧圖四首持竿俯碧流莫學蟠溪客白首向岐周拋綸事西伯觀棋坐斧柯四面青山色回首一千年桃花爛春碧時邀石户農耦耕放黃犢翻笑厯山人移情九州牧大隗在何方襄城亦奚有莫言五尺童曽稽軒轅首題畫四山晴送色孤榻午生涼伏枕無餘事幽禽噪緑篁偶題四首上下五千年縱橫三萬軸高憑百尺樓遠送乾坤目不讀昔人書那知當代旨自信阿龍超任將周顗比落落諸年少沾沾問字來莫嫌雙眼白白眼更慵開駱生去靈隱八咏何人識寥寥婺女傍一片寒山石秋日同友人登蘭隂山小憩華嚴精舍作支笻上寒山石磴連雲陟蘭若無人聲禪關墮黃葉寄江雲樓危樓倚太空裊裊一千尺美人期未來江雲四面入寄松齋箕踞長松下一齋大如斗白眼雙飛揚人間復何有寄雪廊虛廊寂無人飽看瓊瑤墮想像釋迦文頺然雪山坐寄江蘺館朝夢江蘺開夜夢江蘺落如何二十年不到江蘺閣右四題俱朱在明園亭余未能往作此寄訊出郭望西山諸寺二首栁色帶平湖桃花拂釣艫斜陽下南垞一片輞川圖西山四百寺寺寺金銀臺莫言去天遠回首見蓬萊題祝生玉華館圖孤亭寄華頂去天僅容尺時有牧羊兒招邀煮白石題花石獅貓圖長日花隂下安眠雪作膚玉人春夢醒何處喚貍奴題朱光祿園中雜景十首江蘺館一夜江蘺花亂吐山房側喚取汨羅人窗間弄秋色江雲樓何年駕飛閣縹眇凌天風朝來五千丈半入江雲中雪廊羽扇白綸巾瑤琴坐來歇山童無處尋一片長廊雪松齋悠然四松頂置此六尺齋事事張功父何論十二叉雨花菴手持淨名經高座揮玉麈長爪何錚錚菴頭遍花雨筠房苦竹數百竿中藏室如斗試窺隔岸人可是王猷否凝香室博山燎沉水鳯巢擁羣娃雙煙結一氣爛漫凌紫霞鶴院感君刺臂恩聊此休六翮夜來警露聲時墮清音柵嘯臺鼓吹出層顛恍奏鈞天樂氣懾阮嗣宗聲從半空落快閣中天搆層臺登臨何快哉披襟一長嘯萬里雄風來題畫四首半畝疏煙合危峰落照含蒼茫白雲裡有路入終南右樵禾黍滿前村桑麻自成邑千古桃花源秦人餘古迹右耕平野何蒼蒼空林動寒影扣角晚歸來斜陽墮西嶺右牧隔岸遠山色蒼茫生暮愁孤舟煙雨際獨占楚江秋右漁題九華精舍册為顒上人五嶽行蹤僻三山去路遐何如北窗外坐卧九蓮花張伯起幼豫邀集别墅觀白公石戲贈崢嶸十尺幽誰辨白公留試喚香山丈時時解點頭伯起園池中鸂鶒數十頭甚馴擾戲贈二首暫去三冬候重來六月中何如隴山翼空憶主人翁為笑支公鶴凌雲杳莫攀羡他池上翼飛去復飛還憩陳從訓湘竹榻戲題大夢全忘日清音半雜雲蘧然修竹裡恍忽下湘君嘲老杜笑殺杜陵狂題詩欲斷腸寧知謫仙子捧研在沉香余既賦瞻堂十景矣而意有未盡復三絶句寫之翠蓋何亭亭蒼虬舞天半恍忽真人遊金支夜璀璨右古柏㶁㶁幽巖泉源流自東魯中有杏樹壇莫認桃花塢右巖泉一柱障中流洪濤渺難越已見回百川何論倒三峽右陽峽題章氏園亭四首偶逐武陵人移家來絶巘日暮碧桃花沿洄出深澗紅雲塢長夏懶著冠經旬閉門睡偶來深院中萬朵紅雲碎絳英臺何年植此君蒼翠壓林杪十畝渭川雲山童寒不掃修筠館綽約孤亭中梅花鬭清絶高天一萬株亂灑羅浮雪萬玉亭題卷二首世事了不聞峰頭數椽屋劚取華山雲長歌下空谷右終南山樵家臨洞庭口門對君山色微風卷釣綸萬頃湘潭碧原闕少室山房集卷七十一
