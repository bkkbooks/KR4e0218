body:
  text: 少室山房集卷一百五明胡應麟撰讀三十首讀諸葛武侯全書石羊生曰武鄉之自擬管樂宣父竊比彭聃耳杜陵氏伯仲伊呂之評觀其深矣余嘗讀王長公夷吾論而知管氏難于太公也則較武鄉之時于管氏不尤難之難耶夫太公所輔聖主仲則中君而武鄉暗君也太公所伐獨夫仲則脆敵而武鄉徑敵也君暗敵勍而輔之而伐之俾君也信其忠敵也信其略極之而仇信其法又極之而夷信其威若人者規模局量漢唐下可萬一再覩耶他如出師二表恍忽典謨開誠四言參伍訓命雜耕于渭水盡瘁于祁山大都外王之事內聖之學也則杜陵二語意尚有未能盡者頃讀王氏武鄉全書偶得十四言云成湯聘後聞三顧大禹征來見七擒殊自忭躍謂粗足槩侯生平且符合天然了無矯强即九京之下武鄉謙讓未遑知夏商二后周攬漢唐不以孺子為狂易也讀諸葛孔明集二則武侯自擬管樂管九合一匡才誠不世而所輔桓公所柄齊國挾天子令諸侯其勢易舉功用易成武侯扶弱主藉偏邦人心去漢迥不侔也至規模局量則檻車三顧寵辱異觀五畝三歸宏隘殊域弗待言矣樂策士之雄耳內襲燕昭之鋭外因齊湣之孱中入蘇代之間即他帥行師臨淄外掌何艱于毅而武鄉匹哉大率孔明為當時言不容太盡否則史壽之訛非事實也又江流石不轉遺恨失吞吳杜蓋以法孝直在二語窺見孔明本意不欲伐吳也乃吳人賊害關侯其為漢賊已均矧昭烈于侯手足腹心關侯死而不為出一旅之師而置之伐魏吳乘勝而助之魏亦詎可旦夕下也惟權懼乞盟而昭烈不答此則天意之圽炎精與紫陽謂孝直輕快能止伐吳此有妙理觀髙帝寄腹心留侯而間亞父賂閼氏等策必曲逆能之孔明語可想見矧魚水之譬生已奪好關張而死沮昭烈之出尤孔明所難言哉讀三國諸葛氏傳漢末諸葛氏分處三國並著功名瑾子恪孫竦亮子瞻孫尚誕子靚孫恢奕葉知名諸葛之才一何盛也恪以忠誕以節俱覆宗族禍害略同至瑾以喬延息于蜀誕以靚嗣續于吳天之弗絶賢者又何其巧相視也瞻則死君尚則死父懿哉武鄉其有後矣恪智辨英英照耀一世伐魏之舉乘瑕蹈隙詎曰佳兵世率以成敗論異哉讀唐駱賓王集用修云孔北海大志直節而與建安七子並稱駱賓王徑辭義舉而與垂拱四傑為列以文章之末技掩其立身之大間可慨也君子當表而出之楊氏此論甚公然謂大間掩于末技恐不應爾妖牝竊唐舉唐臣子頌德恐後自賓王一檄痛摘其姦疾呼其惡曌雖漏網千載下罪孽歷歷即轘磔都市弗過寧曰末技且當時從敬業起事詎止賓王數人今皆名姓無聞而賓王以一檄故烜赫天壤謂文章永氣節乎氣節永文章乎讀昌黎毛穎傳文自唐宋而下昌黎才具當特髙于諸人其意創自為尊不欲𠞰前人一字無論前人隻字即自出體裁亦千億化身靡一律焉故其機軸若生龍活螭不可摹執非才力絶人真足起八代之衰未易語也而近來評者謂韓序記書啓如達摩西來獨啓禪宗惟紀傳志銘未得太史公法噫今天下枕藉史公殆百年矣有能躍出毛穎之上者乎昌黎者能為史公而能弗為者也然又不肻盡沒其伎故假毛穎以泄之若曰吾非尺寸史公聊以文滑稽而已此其微㫖獨寄于千載之上而始發于余者也讀平淮西碑昌黎之有古意者毛穎傳進學解送窮文皆以文為戲示不欲步驟前人也世徒知其滑稽而罔測其微旨所在乃不佞竊獨窺之至如平淮西碑自是唐宋以來第一篇大文字而段文昌敢重作之已極可笑吳興姚鉉復取段作而舍韓碑乃知劉雍嗜痂亦宇宙間宜有事也題樊宗師集後燕市中得一書題曰竒文集亟展讀之乃樊宗師絳守居園記也退之嘗為樊志墓紀其著作甚盛今行于世僅此篇為文而騖竒僻者可以少省矣題皇甫湜集後皇甫持正論文謂虎豹之鞟不得不炳于犬羊鸞鳯之音不得不鏘于烏雀是也然虎豹之鞟鸞鳯之音異于犬羊鳥雀者一稟諸自然匪有意于為異也六經而外孟荀左國莊列短長斯為極軌退之才覺措意便落一塵要以時代所壓而閎深奧衍名理隱中縱橫幻化詞必已出西京而下故當以韓為第一流乃至皇甫諸人出韓門下以竒自負今讀其遺集所謂天心月脅鯨鏗春麗皆摛精匠彩片語之間咀嚼其中毫末無有此其相去庸庸蔑能以寸而曰竒哉而曰竒哉題歐陽詹集李觀歐陽詹皆昌黎所極提奬者觀至與韓並稱今集不傳而詹集寥寥乃爾唐亡子厚昌黎幾獨步一代矣讀白樂天長恨歌樂天長恨歌妙極才人之致格少下耳唐時一女子姿僅中庸而索價十倍以能誦長恨歌故不知徐君蒨姬侍三百悉暗記魯靈光者當何直酬之耶讀劉中山集劉中山全集近始刻于嶺南友人黎惟敬訂定者也楊用修以為元和而後巨擘首當推劉其才格錚錚誠無能逾過者乃其意致時時著議論色相都緣伎倆有餘不肻受束縛樊籠中耳蘇子瞻始一學之便開宋人二百年門户故知流弊浸淫不可不慎也品彚於劉五七言律少選而絶句最多自是獨見乃用修評品又自確然余兩存其說學者竝實見胸中詩過半矣讀杜紫薇集紫薇燕將録縱橫凌厲氣雄一世短長而後可繼先秦者僅覩此篇而世誦其阿房宫賦此賦若郗方回蒼頭小有意耳乃篇末數語村學究面目可憎之甚故不若李華含元殿稍具典刑也題栁河東集後栁州嶺右諸近體靣目愈工神情愈逺何也盛唐之工在神情故愈工愈合晚唐之工在靣目故愈工愈離悟此數言詩道過半矣再題栁州嶺外詩後觀宋人使事持論咏物往往極天下之工而詩道遂為之下裂是其驗也然元和七言律可以工言者夢得子厚而已樂天工而太易以易而沒其工此外雖昌黎之才力於近體固未遑矣題李長吉集唐人以太白為天才絶樂天為人才絶長吉為鬼才絶信乎其各近之也卒之太白應長庚樂天主海山而白玉樓一記天帝特下詔長吉為之豈漢庭貴少兜率大羅之表或以其竒思竒語鑿天巧奪化工召而閉之玉樓中耶世以長吉才稍加以理奴僕命騷不知長吉非附于吊詭無所置才加以理且併長吉俱失之而胡騷之命也題元次山集元次山文故為艱深險澀而無大發明蓋樊宗師皇甫湜之前驅耳高似孫至謂視栁河東英崛過之唐之文惟二公豈不省昌黎何代人耶甚矣髙之無目且無耳也余讀元子文佳者僅世所共傳中興頌乃其文體典雅渾雄非艱澀比而諸艱澀之作無一傳彼藉口盤庚者戒之哉讀李華文華在中唐前與蕭穎士並有盛名今二集皆不傳僅散見英華文粹等書耳含元殿賦命班倕之匠下荆楊之材持斧執斤者萬人涉磧礫而登崔巍誠快語而自以為三都二京則彼所長顧不在是也老杜極苦作無韻語而九天之雲下垂四海之水皆立特竒太白文賦亦往往有佳境蕭士贇謂所能僅詩管中窺豹者哉題李習之集二則李習之孟東野張文昌皇甫持正皆退之門下士也惟東野退之多推奬語至三君或稱之籍湜或以李翺張籍從游並稱則翺之師愈審矣讀翺集凡韓皆名之祭韓文僅呼之為兄何耶又翺又有答韓侍郎書詞甚率易疑非退之然他文于愈皆兄之而此亦然則為愈審也翺答某後進書謂足下齒幼位卑不當名前輩乃其人書中尚云劉君某楊君某而翺每書及昌黎輒以李觀韓愈竝稱何輕于責人重于恕已耶讀翺集斥異端崇聖道詞義凜如在唐人茅靡仙佛中可謂卓然不惑者他文亦典實明健一洗浮華歐陽永叔至韓李並稱而不及子厚以其識也然其文率人所能至竟集中無可與梓人封建及嶺右諸記等列者翺生平得意高愍女楊烈婦傳自以不減孟堅以較段太尉逸事尚避三舍况霍光等傳摹勒如畫者哉唐惟栁差可配韓而歐公去取若是蓋一時論道之語非定評也題白樂天集唐詩文至樂天自别是一畨境界一種風流而世規規以格律掎之胡耳目之隘也倦繡圖詩遼陽春盡無消息夜合花開日又西中唐後第一篇而正聲不收暨品彚亦失之聊識于此又昭君一絶亦可為中唐第一品彚並失收讀李賓之金山四詩二則巵言云文正之先何李猶陳涉之起漢髙余謂此四詩蓋已兆嘉隆門戶不特先鞭𢎞正也同時謝鳴治程克勤俱文正齊名二集余遍讀之程風格雖整而乏天趣謝則元白宋人遺響耳逺非文正比也四詩見餘冬序録以為文正生平所自喜也諸家亡一選及余特揭之又四登覽詩皆宏大雄爽所謂順流直下一氣呵成者非小家凑砌語雖間有不甚合處顧成𢎞間未易語讀顧華玉詩𢎞正七言律李何外集中殊寡佳者往往為杜陵變體所誤氣骨雖勝而韻調殊乖獨顧華玉一稟唐音故視諸家獨多合作此例數篇皆灼灼可傳者也讀華玉風洞詩此首全類嘉隆亦與華玉他作不類總之𢎞正前七言律合篇不越十數合李何百餘止耳嘉隆乃不勝數而五七言古蔑矣讀徐迪功集徐迪功髙觀察皆以沖淡勝者也兩君入唐與王孟絶相類徐五言律不能工有樂府歌行絶句往往可觀髙不能歌行樂絶而五言律清新婉麗出徐上若其安身立命則竝在五言古詩總之迪功才近王觀察才近孟五言古品格髙華似過之而他作咸弗逮也然工此道者于七言律斷非長乃右丞獨以此擅今古古人信未易及耶而兩君匪今人矣讀高子業集二則髙子業嘗言李獻吉評其詩不如文子業詩世所共知其文乃寡述者余讀其集實溫雅古質有崔蔡風惟其意不事竒險又刋落藻麗故讀者忽之品格故非詩下也是時士甫脫宋元習李何崛興為西漢盛唐學然大而未化一時羽翼諸君子反掇拾李何餘瀋自昌穀仲鳬外未有絶自名家者子業後出少年乃能壁立自樹超千載而上之即遺集寥寥求隻字宋元弗可得其視李何大非所及幾于化矣若其才之孱氣之促則其年之所以弗長者又余嘗評李何製作異時曰漢文唐詩可也曰明一代之文之詩可也若髙集斷于古人中求之王次公嘗以昌穀子業並稱謂千載校李何尚有廢興二君必無絶響可名確論苐昌穀集乃獻吉刪定其他翳雜尚多子業諸篇顧一無可去取其尤戛戛耶才則子業似非昌穀比讀王道思集道思于文章目無千古壁立萬仞雖門户不越宋人而規模宏逺曲折紆邃較歐曽二氏不啻過之然其才非八靣受敵者故匪歐曽等輩也其集序記合作處殊絶于人而志傳啓札弗逮至論策諸體一不概見何耶道思嘗謂學班莫如曽學馬莫如歐學歐曽正所以學班馬特與今人所學異耳然則道思固未嘗以班馬弗當學也題皇甫司勳集皇甫子循之詩之于中唐也之文之于六代也至矣詩調本中唐而取材齊梁取韻韋栁故五言律髙華迥出閒逺有餘視大厯諸子情致少乏而品格過之文四六偶儷之中有翩翩自得之妙先是吳中為六代者數家類矜局未暢昌穀伯虎書尺工美諸體蔑聞至子循操筆縱橫靡弗如志幾化于六代矣以較江左諸人雖淵藻不足而神令殊超總之名家本朝而必傳來世者苐詩自五言律外餘率非長而文亦不能為宋人之表啓則才具所限也子循于琅琊先達而兩公後起掩之弗能平晚年多發其意序論中又以濟南刪其詩作諭歙文存于集余生平不識子循顧其能誠有足尚即殊好弗可泯沒也因題卷末云少室山房集卷一百五
