body:
  text: 少室山房集卷九十三明胡應麟撰墓志銘一首明奉政大夫雲南布政司參議東陽王公洎封宜人徐氏墓志銘閼逢困敦之嵗莊皇帝御極改元家大人官儀制而同郡盧公仲佃在部中王公乾章在臺中朝夕過從昵甚也兩公淳德望一鄉而正氣直節咸矯矯與時俗忤以故仕不登九列後先繇藩臬挂冠歸于家大人蓋相類云其後十年盧公伯子祠祭君以抗言杖闕下海內高其風而王公伯子孝廉君亦鷟舉藝林紬千秋經國之業天之懸左劵以報善人胡毫髮不爽也余鄉嘗以童子識兩公今盧公厭棄塵世久乃王公客嵗之杪復以無疾終于是家大人京洛故交垂盡矣是春孝廉君舂糧三百里介斯生匍匐庭下曰世方急吾子片言仰藉尊大人寵靈之末敢以先考妣塋石請惟吾子惠然以不朽施之不孝亮將世世奉明德余悲孝廉君情致委篤抑通家故誼弗獲辭按狀公諱乾章字順卿别號震所自十世祖宋安撫使霆居婺之東陽奕葉為巨族國朝六世祖墀習形家望邑西南青雲里有異氣遂挈家徙其中載傳而為公曾大父志志生公大父廣濟縣教諭垓垓生贈奉政大夫四川按察使寬即公父也先是公母蔡宜人娠公方就蓐夢神人儀觀偉甚鼓吹騎從翼而趨堂皇寤則誕公狀維肖舉族知非常兒既髫丱神穎秀發九嵗能屬文奉政公撫公背嘆曰吾家兩世治毛詩芥一第而均弗售大吾宗者非此兒也耶十四遣就安成受春秋劉某先生公獨從一僕負笈往未期嵗盡得要領手録歸始安成擅春秋相戒毋得傳外境于是公之行也同舍生合謀祖道上而一二無賴胠公篋篡取之抵家奉政公詢録烏有矣公大戚已奮曰彼能胠吾篋庸能胠吾舌也即朗朗誦奉政公前竟篇靡一字訛脫奉政公屬耳大驚亟謂兒休矣奚以録為哉明年補邑弟子員督學劉公按部試崔浩自方子房論公操翰若飛陳漢魏兩朝用兵事纚纚目擊且言浩之運籌帷幄也批窽破的不啻超子房上之乃子房穎脫雄猜而浩湛七族于悍黷之主明哲保身戒胡方相逺也劉公披卷擊節非文場老宿莫能立拔多士右既覩公僅踰冠彌賞艷錫楮幣四倍至委不能勝無何奉政公寢疾公侍湯藥衣帶不解纍十旬卒不起公柴毁骨立懼傷蔡宜人意中夜抆泪令弗聞辛酉服闋薦于鄉壬戌第進士授中書舍人轉山西道監察御史巡視盧溝橋時世廟高拱穆清貂璫用事多不法宛平令強直自遂中以非辜係圜扉御史顏公鯨抗疏極論坐奪官是時上怒甚臺無敢救者公獨疏繼之略曰宛平古所稱赤令非受役中貴人者也夫中貴人行其意宛平令受其法意與法恆相左也陛下不罪中貴人而覆罪宛平令且連及御史若國家紀綱名分何因力請汰羣閹以肅城社還臺諌以作敢言旌縣人以彰奉職疏入留中人洶洶懼公禍叵測公氣益發舒將具疏再上會閣臣列名申救上意解奪公俸三月以鹺政按山東長蘆時例嚴夾帶鹽不以時掣稍稍踰故額輒用其罪罪之羣大賈疑畏不前公晨至夕疏議停罷賈稱便屬道途先時除解額取盈外嵗竒羡往往溢萬緡公秋毫無所問敝衣冗簏竟任不睥睨一錢復命論劾兩藩臬不職事兩人皆籍山西與銓衡相綰結疏入吏部果恚公而給事中某遂希旨盛稱兩人賢而公糾刺不以實公謂臣于僚屬日耳而目之科臣輦轂下何所從悉治狀其承望風旨灼然疏俱寢不報俄命下按楚中甫旬日外遷四川按察司僉事時田蔡亂初平又播州酉陽地犬牙錯其間號難治上特賜璽書兼兵備誥贈公考如公秩而封母蔡氏太宜人蓋天子西顧特典也公入境身先僚屬問民所疾苦而噢咻之川以東土風獷戾訟獄旁午公視事日理爰書數十以為常重慶民有悅鄰人婦而挑之者婦礪錐樁其腹吏以未成姦抵婦罪公曰婦致死而加之辟是為宣淫者幟也立釋之有翁甚憐其子婦嫗疑焉夜竊翁衣履突婦床婦惶急咋嫗舌幾死有司當婦罪大逆公以婦所操者貞所觸者誤置弗問一日登郡城四顧慨然曰郡襟帶二江盤踞巉壁稱天險今彌望頺垣敗堞險安在即出贖鍰繕築迄城就民不知有大興先是參將一控播州中廢格不行而兩臺使欲追設如故公議曰播人心習服楊氏大而參將所號令所鞭笞者皆其爪牙脅腹也犬羊之屬刻木可以傳信而吾以漢法治之如率鷹隼而搏豺狼彼有噬且鬬而已往參將周表在播曰惟高卧杜門蠢首揚烈猶紛紛奏擾今一旦驟復之彼愈不自安從其訴而中止是天朝命將之權反制于蕞爾之狄不得所請恐西事紛紛浸從此始矣為今計莫如以不治治之浚濠隍斥烽堠練兵積粟以備非常彼畏威懷德耦俱無猜又何求焉議上撫按大然公得不置後三十年而播酋楊應龍竟釀亂人嘖嘖頌公逺識云東城隙創書院爽塏宏潔簡青襟慧者程督之所甄拔胥君從化汪君言臣張君似渠蘇君雨毛君蔚相率取高第用是政聲藉藉播都下佹內遷而太宜人訃至公哀毁深墨一如昔喪奉政公瀕行諸父老扳送闐咽仍創祠生祀香火不絶至今萬厯改元以服闋赴部除河南按察司僉事巡睢陽督學使者遷公暫攝朝貴欲縫掖所親意公攝官無拂理公眙愕曰青襟國家名器吾敢輒阿權貴人且吾任外臺専紀法而驟以私牘溷公庭何耶使語答稍不遜杖而繫諸獄彌月甫釋之所拔士逾籍尤衆安君世鳯甫垂髫試諸生苐一癸未偕計果掄魁公蒞河南四閲月遷江西布政司左參議分部九江都昌劇盜何鳯等蟠據湖上恣寇鈔吏督兵往捕鼠竄洪濤中稍解嚴徒黨四出羣不逞揭竿助之殺傷官卒不可以數計公奮髯曰盜在吾四封而衡行若是不滅此何以朝食哉苐古用兵殱厥渠魁今有司欲一切搜獮之宜人自為鬬牢不可破也因下令揭通逵誅止二凶諸脅從槩罔治旬日間衆面縛十之九因趨兵夜襲之逮明兩大酋首畢函致麾下所駐南康負匡廬面潯陽形勝甲宇內公登臨嘯咏以隙日訂五經同異録國朝北地信陽諸名家製作甲乙品題之時時捐月俸購古文竒籍有屬令槖金簏中公發緘大駭召令切責之令惶恐幾無地容滿秩升廣東按察司副使兵備海南兼提督瓊州學政未行坐建邸失印鐫一官先是建昌郡王湎于酒一酲輒旬日盜且即卧內攘之郡邑祕其事日濳索民間公時兼攝吉安敻不相聞知盜就捕建康蹤迹始大暴上震怒諸蒙蔽者悉嚴譴而公以分部抵罰同羣僚愕然請治裝入自明上且無以罪公謝曰宦于朝譬操舟于水諸君乘長風破浪萬里而吾至困石尤天也何言哉竟拂袖歸歸掃軌杜門足迹不一至城市既銓曹廉知江右狀起公福建按察司僉事駐節福寧州時劇盜林道乾郭東山等勾引倭夷猖獗甚而福寧據上遊實汀潮門户舊設守備部千兵鎮海島島卑僅卷石寇舟至末及舉烽已蟻傅城下已公親率所屬抵海上遙見一山隱起巨浪中距州僅四十里許促拏舟登之山外衍而中豐於海氛無所不目攝公以杖擊地曰此所謂天塹非耶吾頓兵其中奚賊敢越此越此吾踵其後彼將亡噍類遺因狀聞兩臺臺報可竟公任果無害江陵握國秉汰藩臬諸司十之三公兼視七道事晨起據公座胥吏抱牘常纍百公雙曈炯炯剖決如電人纎忽不敢欺直指使者雅重公冬月慮通省大辟囚先一日檄公讞狀公翻閲成案並釋諸囚面鞫之所開釋如建寧民丁五郎等三人則盜所仇逮自誣服者也漳州楊氏婦以弒夫置極典訊其年距入狴才十三公大駭詳詰乃知婦夫實贅壻母孀居私惡少慮壻之梗也而害之紿女任其辜且曰若年稚官必汝貰也無何母與姦者相繼死婦遂永閉囹圄中福州民身首殊邸舍盜絶蹤吏縶同宿抵以罪公以亡者亡寸挾邂逅剸以刃非人情夜具疏諸囚誣濫狀御史是公並得生不爾五人者質明磔于市矣福安治環大海一夕颶風發水墳地幾十丈壞城堞漂廬舍溺者數萬人公馳往惻然出帑金置棺殯其骼大發倉粟賑流殍而為文吊其禍讀者感動悽惻以方李華古戰場是時刑部卿洪某忤權相放歸江陵憾不置密旨以大獄寄公公廉知洪枉申啓營救殊力當事切望之會仲秋省試七閩士公入為總裁官御史命試題藩臬諸公環視莫敢詰公越衆請曰題誠美然傳播道路稔矣御史不怡題中易而公亦以是月擢參議雲南布政司癸未春大計考功卒從不及論以二憾故也公聞報欣然曰吾一官萬里視浮榮譬嚼蠟彼其以歸老難余哉抵故鄉懸車謝客斥餘俸創别墅東郊高臺曲池曵杖臨眺無虛日性雅嗜讀書杜門手一編貴交遊罕得覩其面獨寒士投刺匆遽中亦倒屣迎之郡人祝無殊邑人斯惟武李允達數過從揚榷公握杯酒相勞苦若平生間發一談諸後進犁然絶倒咸以為先達未易窺也為文章援筆立就大都不加點尤工詩樂府新詞所著浪遊等集梁太素傳竒並行世嘗題壁弋陽署王次公行部九江讀漁燈燃楚竹人語漸吳楓之句顧同寅郭公孝曰此咄咄逼人可畏公優遊林下以文藝自娛者一十八祀卒萬厯己亥仲冬距生嘉靖丁亥秋暮享年七十又三公貌和平而氣瑰岸兼擅政事文學之長即應接上官不肯少為籧篨態惟通人雅士能諒之蜀則臺使兩陳公楚則大司馬凌公御史大夫喬公直指徐公熊公燕公安公皆交章薦辟恐後晚節宦閩藩伯某集衆僚出示所作詩韻連失讀者唯唯競贊揚公却立微哂某怒形于色酌大白前浮公曰古行酒軍法從事今公犯喧譁禁趣盡觴公遽曰師出以律不以律胡衆之肅也某色愈厲中罷燕公出入談笑自如乃至緩大獄爭大典竟以是遭三黜直道之難容蓋自古嘆之矣公自奉甚約素欵客則人務盡歡與人交由由然惡語不狎及奴𨽻以故爭德公長者尤善以骨相觀人李文學能茂數上詩公稱其翩翩竒雋假年嵗足逐鹿中原而不無太和缺折之慮李果先公咯血卒公素強無疾先一日尚康步良食命應門掃徑灌花木俄有星夜殞里中翌日沐浴正襟坐中堂揮手逝卒應曩神人兆云公娶封宜人姓徐氏敏慧恪共始公為諸生食貧旦夕所需饘粥而瓶粟時告罄宜人躬績絍多方佐公無幾微愠見色公既貴迎養太宜人京師時春秋高多嗃嗃宜人怡聲屛氣必蘄中其歡而後已凡逮事公逾四紀白首相對亡間言外而姻㜕內而妯娌微而臧獲人人厭其意鍾愛孝廉君特甚而弗為姑息嚴督以詩書孝廉自孰歸誦制義公前宜人以意辨高下恆十中五六工治生絶不為孝廉君計曰男子生墮地桑弧蓬矢射四方寧齷齪卧蓬蒿守阿堵物哉居常諭孝廉而父子世受國恩努力鉛刀呈一割之用異日居官受事毋負清白吏子孫可也公殁悼慕深至成痼疾竟以次嵗庚子臘月終距生嘉靖壬辰春春秋凡六十九云子一即孝廉嘉亮娶盧氏參軍洪度女女一適侍郎虞公守愚孫應旗孫女三皆嘉亮出尚幼始公翺翔臺諌及家大人遊余年甫十二公一見以小友呼之比余嬰肺疾雕蟲刻鶩自放一丘而孝廉君顧盛見挽推引而納諸作者之域則余于公固載世通家也不朽之責即言之無文其曷辭爰泚筆志諸石而系以銘銘曰華宗十葉蕃東陽琅琊太原屹相望一經世授沉宫墻三世之後飛岩廊直詞徑氣吞豺狼矯如孤鷟鳴朝陽璽書持斧巡荆揚高牙大纛懸疆場政聲煒燁馳明堂逡巡九列朝天王南金百練瑩剛腸中山謗牘流螟蝗挂冠神武天茫茫初平握手呼羣羊遺編萬軸堆琳琅繽紛製作羅縹囊婉娩中閨同頡頏白頭比翼諧絲簧趨庭汗血神昻昻傳家大業追三唐靈光一柱撑銀潢胡乘白雲歸帝旁鬱鬱佳城蟠北邙貞珉百代垂玄黃遺風山高繄水長少室山房集卷九十三
