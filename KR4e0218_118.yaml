body:
  text: 少室山房集巻一百十八明胡應麟撰書牘十七首報顧叔時吏部昔在丙子得公鄉書制義讀之輙狂呌擊節以為自趙宋以迄當今五百餘載士之殫精塲屋不可為量數而盡削凡蹊超然化境神通游戲於八極之表者門下一人而已載讀涇上諸篇總之髙處在古無上平處頫視唐瞿令制義足傳南華浄名鼎立宇宙矣顧猶以公之業聖於今而未敢必公之邃於古也已則聞公出而仕以正氣直節樹朝紳已則聞公引而歸以清標特操振閭俗至學術之富窮四部而覈九流私心之鄉往愈勃勃焉每欲介茂卿通姓名下執事惟是慵疎玩愒片刺未遑孰意公之過知不佞而儼然先之也毛子貞夫將至大教副以妙墨貺以鴻編恍忽瑶華飛墜天際踴躍披誦病骨欲仙嗟嗟執事僕海濵豎儒耳弱冠狂歌放情丘壑即眇聞謏見罔異醯雞之處甕天迺執事方龍躍鳳鳴奮乎百代而旁蒐草莽博詢芻蕘真至委篤過情乃爾將泰山渤海必茹納涓涘以自成其大耶劄記諸篇超超𤣥詣尤匪近代淺識所窺不佞甞竊謂不朽二途咸勃興於𢎞正之際而得失瑕瑜大都等埒古道問學以尊徳性而今也問學廢於徳性之尊古源實學以著文詞而今也實學䘮於文詞之著流弊逡巡致談理者上不復知有六經而談藝者下不復知有六代此其漸庸可長也執事偉論欲配周朱於大享而續黄陳於正聲規模思度𢎞且逺矣千慮之一幸附髙明砥柱狂瀾惟公自愛呉鯉溯流匆匆勒謝小詩四律小刻百巻惟大方削而教之與顧叔時論宋元二代詩十六通病中毛文學過溪頭首出大教亟伸紙疾讀之清風穆如沁澈五内不啻枚乗之發陳琳之檄矣公偉度沖襟苞舉六合而獨虚懐於鄙人大觀宏識殿最百家而獨注念於宋元諸作者豈其不得中行下思狂狷耶要以芻蕘弗遺流壤靡擇政所以自成其大耳承欲類集古今諸詩自蕭氏之選馮氏之紀以及髙氏之彚李氏之刪悉加訂定而旁擷兩宋勝朝都為一集誠不刋之盛典苐時代邈綿篇章總雜即未易嵗月訖工且竊窺公之用意片長必采衆善畢羅大小各因其才盛衰不沒其世非心公量拓鑒徹裁精詎容輕議僕醯天蠡海學步前流目睫之譏徒貽来哲公言逺矣未敢聞命也迺劉氏詩統寤寐頻年公既索諸蜀中冀可必遇獲覩之後或當參其類例有所建明削鐻大方庶幾萬一何時孤帆夜雪乗興延陵晤對𤣥亭縱譚奥眇以十日之工定千秋之業亦古今至快劇娯也寄至元人諸集格致風尚咸有足觀而若倪若陳之外藝林之中杳無識者以今核之其中寜無一二追逐唐餘者耶此彌足徴公逺見非逐人悲笑者流矣辱委稍加評抹印證宗門宋人詩話數種檢摭如命伏枕岑岑未竟傾吐来鴻迅發嗣致願言二辱諭韓栁元白諸家皆大方材具也昌黎五七言古及東埜倡和諸篇窮竟筆力司空圖謂掀雷掣電撐抉天地之垠信矣而揆之昔人則和平温厚之義缺焉李賔之謂為角音似也至近體卑卑不離中晩寸步氣運所驅即以退之材力蔑克挽回而今人以咎温韋李許舛矣栁州古選自是陶韋正脈正聲亦亟收之其近體精工之極迺所以不如大厯諸人髙氏之不取非無見也樂天信手縱横妙思溢發唐謂人才之絶允矣不誣而淺近膚率詩家所忌什九蹈之微之才不如白力不如韓致不如栁通較中晩人才三大家外劉禹錫為最優惟中山諸律絶元和巨擘首藉此君而自劉之外又僅元差足配白故一時竝稱耳宋大家王蘇黄陳介甫步趨唐人小詩絶句時足亂真而近體劌思求新遂肇坡谷門户長公俊爽瀾翻歌行時覩合作而近體龎雜詼諧雖老境參横至貽誤學人尤有甚於白者涪老一代自居其詩苐得杜之拗澁偏枯而沉雄偉麗無萬一焉不知舉世胡以茅靡若是是時坡既武庫矛㦸不厭衆心而陳無已輩又皆出谷門廡且師法歸之杜氏見以名髙宜海内旁無異吻亦古今變革大限也陳雖出谷而近體邃密精嚴深造自得匪三子流總之以才具言則趙氏之稱大家故當四氏政不必苦校其詩若梅聖俞之學唐陳去非之學杜皆錚錚躍出庸詎可以宋槩耶南渡尤陽范陸時號大家而才逺出蘇黄下詩率唐調寡而宋調多至永嘉四靈雖跬步不離唐人而調益卑卑才具瑣尾無足論矣元之號大家者虞楊范揭而前則趙子昻後則楊亷夫數子而其才咸窘邉幅詩亦粗具膚響若唐之空花水月杜之萬户千蹊槩乎未之有聞迺元調較之於宋則於詩差近而自諸子外傳於今世者類有足觀振起國風之一漸也諸君子集惟延之曼碩未覩自餘僕備有之暇當一一評訂印正大方苐非公鮮不以葛藤誚僕矣三正聲不取垂拱四傑誠為卓識惟排律駱賔王蓬轉俱行役一篇不在二庭歸望下王勃滕王髙閣短歌足為唐七言古壓巻以繫序末不及收耳此外盧駱長歌例不一載自是正聲皭然家數品彚固並收之廷禮非憒憒者後来仲默論出要為另一宗門于鱗和之苐非所以論正聲也四葛常之云太白不取建安七子而少陵亟稱垂拱四傑七子固兆端綺靡而王楊盧駱亦詞人之小巧者耳此正論也而非所以論太白少陵李氣㟁髙拔故持論常輕又篇名古風挾風雅以令曹劉不取固宜杜意度包含故立論多恕又篇名為戲憤輕薄之訕前哲亟稱有故夫李於杜猶然不滿而杜于髙岑蘇李富嘉謨孟雲卿皆什九見於題咏矧王楊盧駱輩耶李邕蘇源明見杜八哀五篤而論之四傑固以巧麗為宗然長歌婉縟上繼四詩近體鏗鏘下開百世其功力匪邈小也自五言律掩於沈宋王岑七言古掩於少陵太白後人展巻忽之不思陳隋極敝之後非四子草創厥初盛唐諸公能遽抵妙境至此耶迺其萬言一揮滔滔混混恐陳思而後賢刦中未有過者總之才情富而氣格卑駢儷工而典則逺故視李杜韓栁四家聲實懸遜要之長處不可盡誣也楊用修以杜韓于王猶地上老驥不能追雲中俊鶻亦偏見未足憑六髙氏正聲一部其評批朱者在不佞未冠之前墨而楷者亦曩時鄙臆也今以較之去取往往異同惟大㫖差不悖一人之見且爾况上下數千載乎憶近某公選集唐詩自序云品彚之博而尚有遺篇正聲之嚴而兼收劣製殊有味乎其言即今正聲所收劣者大都十之一而所遺佳製無慮十之三品彚所收劣者大都十之四而所遺佳製無慮十之二所繇然者唐宋選詩國秀英靈極𤣥間氣皆漫無倫次鼓吹等集尤為可嗤周氏主裁方氏主格率泥一偏僅唐音粗備一代而簡擇未精蒐輯未廣至庭禮二編庶幾十得八九矣而時際國初元風未滌兵燹之後載籍多湮耳目所羇故難盡善也僕異時肺病少蘇或當循門下教㫖取王楊韓白諸百家唐集遍閲之益品彚之遺而大芟其蕪雜損正聲之劣而畢聚其菁英此則工力差易而僕亦自計足辦者書成之後門下更一揚扢之唐諸作者當無遺憾矣顧丘陵川澤因之髙下易耳新寜草創非超世之識未易云也七僕甞欲竊取明公之意倣髙氏所輯為古今詩彚一編以漢郊廟鐃歌洎諸樂府為始音十九首洎蘇李河梁兩京雜詩為正始陳思李杜及明王元美為大家曹劉阮左潘陸陶謝沈宋王孟及明髙李何徐輩為正宗顔鮑庾江錢劉韋栁及宋梅陳明薛王呉張輩為羽翼隂何徐庾及南渡范陸勝國虞揚明皇甫昆季輩為接武王蘇黄陳北宋諸人為正變陳隋晩唐宋季元末諸人為遺響而旁流閨秀代録其人似亦足備詩家一公案苐其工當以歴嵗計巻當以近千計帙當以近百計恐非一舉所能就一人所能任徒付之一胡盧耳以明公之度甚逺思甚公也姑録梗槩以俟異世之同兹志者八汪司馬伯玉嘗屬僕選古今詩以三百為祖分風雅頌三體𨽻之凡題咏感觸諸詩屬之風如太白夢游等作是也紀述倫常諸詩屬之雅如少陵北征等作是也贊揚功徳諸詩屬之頌如退之元和等作是也意亦甚新僕時以肺病不獲就緒今司馬公已不復作言之慨然以其㫖不廢宋元有與公相發者聊為一拈出之且以俟後之君子九讀宋髙僧詩選乃錢塘陳起編輯文獻通攷但有九僧詩集而絶無此編今攷其前集一巻正九僧詩也自希書迄懐古瀛奎律髓名字次苐悉符方氏所選諸篇咸備兹集知律髓所據即陳氏編也惠崇九僧之六佳句致多尚存總龜警䇿一門如露寒金掌重天近玉繩低隂井生秋早明河徹曉遲無慮數十今皆不存惟河分岡勢㫁春入燒痕青數首而方氏所選亦僅此一二篇注云崇有佳句為圖詩殊不止此當續攷補入之自餘律髓所收往往具載即所據是編可見其後集續集數巻宋諸名僧道潜祕演善權惠洪大都無遺漏者苐以惠崇諸警句十不存一而題鷺清字五言律妙絶亦不録其他散軼庸可勝道惜九僧原集之遂亡也十此編必方氏所據選本道潜風林驚墜雪雨澗咽飛湍又祕演諸人所作往往槩見集中僕甞謂僧詩無唐宋欲取六朝道猷等作迄於元止来復宗氻皆元僧也彚作一編力既不勞而傳亦可久暇當印正於公耳十一此編題錢塘陳起宗之稱宋人而通考止載九僧詩集近閲齊東野語十六巻論詩道廢興云某某咸以詩語被禍而刋書陳起亦在禁錮之中迺知其宋末人也此書抄録即印本廢久公何自得之或以畀好古君子并唐僧𢎞秀集合梓之題曰唐宋詩僧集豈不愈於近刻鼔吹草堂等編耶十二倪元鎮詩之於虞揭四家正猶其畫於趙黄王呉四氏清空簡逺纎壒不侵而天趣超然在勝朝殊不易得惜元人繪事特重今時而詩律無稱述者此老復以迂潔蔽之故世徒知其人與其畫而篇章一付之無是子虛非得公此編檢勘即僕且失之久矣王叔明詩亦間有可觀同時潘子素等惜集皆不可得十三王長公云倪元鎮筆如風女兒灕凝長袖晉人所謂張茂先我所不解政此類也世人評書迺稱其逼近黄庭何耶余以元之擅臨池者比屋而詩得孟韋遺韻獨元鎮一人特才具不多渭城而外無復他曲耳今倪畫海内酷尚書亦時時見重鑒家迺其詩既不為當時所予今知者益復寥寥豈迂潔一端取名太過亦造物所忌致其篇什無稱耶漫書此發門下一噴飯十四寄来諸集陳衆仲爽勁鮮華然一誦興象俱徹詩所以貴深婉也周衡之不知名其集殊有佳者管𤣥皞如管中之豹時得一班惟黄氏厯宋至元世有吟咏而無一足發悟之時義大矣哉僕收書凡勝國遺編遇則録之不復較其工拙兹羣集俱迄工附璧幸一一檢歸笥中十五周衡之竟不得其名公别考或得之當録以寄我其詩五言古學陳陶稍具膚響歌行在集中獨為合作奇警飛逸伸縮自由迺近體局促卑陬遂亡一章半簡可備采擇者致足訝也僕甞謂自宋迄元諸名家惟歌行代有篇什絶句次之近體得失相當而古風漢魏永絶徴此君彌益信矣十六詩話玉屑野語僕近得副本頗佳二集童時所閲以巻頭時塗沫漫往印正大方餘南唐近事郡閣雅談諸書悉存總龜集僕已折録之役竣當如命也少室山房集巻一百十八
