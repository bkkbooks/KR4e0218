body:
  text: 少室山房集卷二十六明胡應麟撰七言古詩一十七首李大將軍惟寅得唐吳生觀自在菩薩真迹長裾跣足天男相一洗世人稱謂之謬且莊嚴妙好六法具備非五代宋元諸名家所辦因手勒心經其上而屬余長歌識之畫師崛起開元日萬象毫端鬼神泣前無顧陸曹衛張二李閻韓總非敵胸中六法參羣靈解衣盤礴流風霆斯須宇宙落指掌茫茫大塊愁憑陵曽畫玄元皇帝廟隱見人工奪天造杜陵老子筆扛鼎恣寫篇章豁懷抱金莖碧瓦扶雕梁旌旗冕黻爭飄揚詞鋒繪事兩突兀恍揭日月懸宫墻裴旻將軍號大俠力懇丹青薦冥業干將起舞爛白虹倒擲寒空日星裂爾時逸氣橫鬚睂狂墨亂灑秋淋漓辟支羅剎儼飛動旁觀辟易驚神竒吳生一去八百載後起何人劃真宰徒聞寫照推揚光未信登壇屬王靄脫壁庸庸孫夢卿五朝人物傳虛名宋元能事著山水開元遺迹如晨星此幀大士最殊絶妙好莊嚴種種列珠璣瓔珞被四體咫尺天人共頏頡高堂十仞雲婆娑倣佛朱闌臨普陀俯窺渤澥僅涓滴青蓮一瓣揚洪波劫風萬古吹不動金身丈六天嵯峨大悲顯化遍五濁宰官帝釋隨呼呵有時幻相示閨閣世人眯目談娉娥即今看畫豈待説幅巾長帶垂山阿誰其摹勒事琬琰侯也功德真江河憶侯夙世住靈鷲金粟如來本身後閻浮一念偶下移暫寄貂蟬曳華綬將壇文苑雙張皇八荒九域傳琳琅雞林百金買隻字往往逸調追河梁生平寶此若垂棘樹下楊枝宛曽識焚香手篆般若經照耀叢林炯雙璧朅來示我令作歌欲噓甘露回沉疴才枯思竭腕力弱仰天白眼空摩娑惟余與侯深肺腑意氣鏗鏗邁今古侯能射虎過裴旻余非雕龍愧杜甫吳生千載若有緣三生裴杜重周旋安得再起斯人貌君虎頭燕頷相堂堂九尺玉立麒麟前他年雲臺煙閣第一書姓氏為君大揮十丈之如椽易水壚頭放歌懷慶卿君不見高漸離舉杯擊築天淋漓君不見魯句踐叱吒干將起雷電十載荆卿遊酒人褐衣短後隨風塵一朝匕首刺秦國白虹千丈垂嶙峋貔貅萬億夾廣陛閶闔耽耽虎狼睨羸軀五尺掉臂入勇懾孟賁走慶忌世儒刺促計成敗胡不身履斯人地君不見十三殺人秦舞陽死灰躑躅秦宫傍當時孺子果怯死捧圖胡以來咸陽乃知鼎鑊良可蹈一時感激輕毫芒豆羮簞食色陡變况持白刃遊朝堂天門峩峩九重闢六師七萃紛張皇從容步履若無事俯視政也如蜩螳圖窮督亢刃乃見至今神貌猶揚揚偉哉大勇曠百世共工項籍爭雄強八創嬉笑總餘事沾沾俗士徒稱揚君不見聶政大呼本倉卒専諸進食元潛藏豫生毁形伏橋厠誰哉十目交嵓廊三人視卿孰難易一死雖同蹈死異吁嗟太史傳刺客百代何人奮高義我來易水吟悲風蕭蕭匹馬隨征鴻當時壯士豈復得黃金臺館徒穹窿為卿作歌酹卿酒恍忽精靈下攜手田光鞠傅渺何處獨往城南問屠狗太史傳諸刺客其事惟荆卿至難子長摹寫亦極感發余纍有辨折詳筆叢史蕞等書醉中放歌五章君不見北斗精天瓢湛露浮金莖君不見酒泉域甘醴瀼瀼地中出三漿沆瀣盈帝壺觴泛崑崙盡紅液從知大造亦耽酒不樂人間復何有笑殺移封唐汝陽兩缶能令風伯狂西園公子號無忌一醉瞢騰小天地君不見放勳堯千鍾一飲常逍遙君不見重華舜百觚一舉受天命袗衣鼓琴二女果多壽多男祝神聖誰云至禹衰帝德旨酒千秋肇儀狄鄙哉巢父及許由一瓢不保箕山頭何似攜將貯􅌬醁蕩蕩巍巍九州牧君不見秦祖龍布衣十日咸陽宫君不見漢高帝擊築登臺望天際驅山鞭石魑魅走素媪雲中夜流涕威加四海卷六合匍匐平城命如葉不因大風沛上歌千秋胡顔較仲多博浪沙中副車碎底似平原浹旬醉君不見魯仲尼聖德巍巍穹壤齊君不見姬公旦赤舄忠勤古今擅有孚濡首繫易終惟汝無量不及亂嗚呼周孔兩大聖歡伯時時見親幸胡為屈子遊江潭獨醒反被蛟龍餐諒為名士傳不朽但讀離騷飲美酒君不見東王公金莖瓊醴延青童君不見西王姥高宴瑤池萬粧舞白雲在天丘陵出青雀翻飛報漢武列仙羣聖三百六笑揖天姝美如玉東方小兒下界遊蟠桃三熟仍三偷暫解貂裘換雲液我欲乘風上八極後醉中放歌五章君不見陳孟公席間壯氣噓長虹君不見孔文舉座上賓朋劇風雨金罍玉尊酒滿堂跋扈飛揚恣豪舉才疏志大差足惜投轄楗關政堪語人生倐忽同蜉蝣夜長晝短秉燭遊千秋飲者傳異代漢魏王侯竟誰在君不見阮嗣宗竹林白眼天朦朧君不見陶元亮破帽東籬漉家釀五斗何如歸去來長嘯壚頭興逾王謝公雙屐嵇公琴明哲胡為異霄壤步兵臧否吾所師柴桑三徑嗟無資當時一官不自保百代聲華擅文藻君不見張季鷹放浪江東稱步兵君不見晉吏部醉倒甕頭笑行路衣冠齷齪徒檻猿富貴斯須草頭露姦雄竊國中華亂日月何如醉中度鱸鄉亭下風颼飀高標想像垂千秋不因酣卧遭束縛後世何緣有畢卓君不見太白翁鯨吞鰲吸三千鍾君不見少陵叟蟬腹龜腸三百首狂歌痛飲差快意典盡春衣漫回首身後河山千載名生前宇宙一壺酒人生有錢付酒家十日五日傾流霞今辰何辰夕何夕試問耒陽與采石君不見王長公彩毫萬古稱人龍君不見汪伯玉一醉頺唐倒千斛太常齋日不禁酒歲歲如泥三百六金華邂逅赤松子潦倒乾坤洞肝腹弇園淡園及太函悲風宿草俱茫然當時把臂誰上坐老泪河山夕陽墮平原道中無侣卧卜舟獨為十日飲飲醉日為一短歌前後各五章荒唐謬悠間以詼滑禮法之士咸誚弗根典午林下諸賢顧躍然羣起和我聊復掇而存之長安僧舍邂逅莊山人靜父余初未之識也靜父獨以意契邀余啜茗禪榻中翛然竟日垂别問姓名乃相顧大笑贈以此歌黃金臺下莊靜父嘯弄雲煙天尺五烹葵拉我遠公社錯落芙蓉劍花吐經年作客咸陽東浩歌擊築飛長虹貂裘敝盡歸不得五見黃葉號西風何日相將武夷去桃花九曲流春紅丹青樓殿四百八醉謁上帝金銀宫晉陵夜泊寄懷張總戎黃刺史君不見黃叔度胸次汪汪千頃波君不見張茂先襟懷朗朗百間屋萍蹤邂逅天東南把臂論心洞肝腹張公僦舍宗陽宫生平俠氣摩蒼穹高牙大纛屏一壑十年釣艇橫西風黃君卜築紫陽岫四壁圖書坐清晝雌雄二劍巧相值錯落寒光映袍袖一朝遇我肺肝親青天散髮成三人把杯白眼望晴昊寒冬大壑回陽春圍爐暖閣坐深夜彈碁覆局流星文形骸不將爾汝隔往往一諾懸千鈞邀我湖頭結新社春花秋月長為鄰何意風波起倉卒轉盼交遊異南北脂車秣馬發中路把袂河梁壯夫泣青衫潦倒困一經俯首王門弄齊瑟平津相君差快意吐哺延賓近東壁客星帝座寧久眠夢入桐江釣鰲窟吕梁震澤天茫茫極目飛雲橫太行遙看親舍宅其下霜鬟雪鬢垂高堂功名富貴果何物經時乞米留長楊扁舟便作五湖客重孥十口歌滄浪黃河濁浪浩無際支祁魍魎爭豪強大鯨如山奮鬐鬛參差一葉浮沙棠窮途厯盡抵淮甸南下維揚疾于箭却憶張黃兩故人宿昔河梁涕沾面男兒有身百不憂千秋大業寧公侯三孤九列亦餘事榮華倐忽同蜉蝣君不見張公英雄蓋一世煙閣雲臺了無繫忘却麒麟第一人獨往寒山問真諦君不見黃君意氣橫青霄一麾海上遊逍遙垂天大翼六月息中林往往嗤鷦鷯我今胡為尚泥滓布襪青鞋共吾子四百八十金銀臺割據湖山誓從此聞清源王孝亷得第將歸戲為短歌寄訊王郎再謁甘泉殿一日聲名滿畿甸中天百尺黃金臺走馬看花亦堪羡清源栁色縈啼鴉紅粧十萬嬌明霞若箇新知莫愁女獨倚高樓望宋家燕中日聞文仲使君手書寄余不達而返短歌訊之憶昔仙鳬下東國種露栽雲遍城邑至尊召見明光宫上考吳公書第一含香郎署五載餘大府却擁專城居黃堂赫赫五馬貴翻令尺素來樵漁宛轉雙魚瀫江畔為復浮沉付殷羡美人如花若耶岸遲我同開越王殿蟠桃歌為大學士趙公賦君不見大羅之天天盡頭峨峨五城十二樓金銀臺殿四百八瑤池阿母乘蒼虬上有蟠桃枝下拂崑崙丘托根層城頂倒影弱水流一花三千春一實三千秋一花一實遞開落滄桑億萬增牙籌成周穆滿慕長世飛黃騄驥憑空遊西華設燕坐樹下欲噉此果不敢求元封武帝候青鳥行厨玉女羅天球貪心欲植上林苑詎知人代同蜉蝣東方本是謫仙子三熟三偷混塵滓巨靈一見呼兒曹函谷於今氣長紫池頭又閲三千年幾看渤澥成桑田玉桃偷得不自飽却來東閣登華筵玳瑁筵開近平樂南斗為樽北斗杓中使傳觴太液亭大官行饌甘泉幕五陵冠蓋何絪緼八荒一氣旋洪鈞三年三月十三日河清海宴飛祥雲老人星見紫微側百辟趨鏘酬相君相君世胄本清獻琴鶴風流誰不羡焚香告天天下聽炯炯靈臺絶欺謾龍頭晚達升長楊要將隻手扶綱常觸喉時宰甘播棄一麾南海趨衡陽采藥羅浮巔折梅庾嶺旁朱門鑿䆗窱勾漏捫丹方拂衣却返嚴子瀨六洞三山逈相待背城十里金臺尖買斷寒崕碧霄外嵯峨絶壑懸飛龍白雲紫霞湧雪同流泉百尺清見底噴珠潄玉聲玲瓏灼然靈境果竒絶倣佛藏書神禹穴初平騎羊當晝過大士雙林話禪悅東山一壑寧久扃應圖處處懸丹青南陽抱膝卧豈得玄纁東帛來緇軿乾綱再振寰宇闢左列夔龍右垂益一朝百揆司鹽梅萬姓歡呼荷天力和衷協德居承明正笏垂紳臨大廷帝心默感九重上劃然天地回清寧維時西夏變倉卒奮臂凶渠一呼集包藏禍心結狂狡當寧皇皇食為昃東方島夷彌陸梁篡竊故主圖開疆玉京一鼓平壤破揕胸車轍矜螳螂中原旱魃播災禍十家九家望門餓三方大難叢一時姦豪所在盤蛟螭誰其帷幄運竒策太阿白日飛丹墀天威咫尺強敵下汛掃妖氛出寧夏兩宫賑給十郡全民忘旱魃為豐年總戎經略度鴨緑敵騎倉皇軍盡覆朝鮮故主仍復都稽顙西飛乞臣伏區區鹿蠡左右王糾集萬衆窺遼陽王師一出盡瓦解槖駝千隊俱奔藏南北東西盡安輯偉哉相業不世出驅除咸謂參等勞發縱伊誰匪相國宫府一體忘喧囂皇儲出閣安勤勞一人元良萬邦肅功百房杜追夔陶俯仰天心念良弼五福煌煌厥躬集越裳翡翠日夜輸肅慎波臣到重譯即今壽域開明堂桑弧蓬矢羅圭璋十方翹首望霄漢含哺鼓腹歌陶唐天子傳宣下丹闕尚方親賜渾羊設金錢粲爛內府儲品饌珍羞路填咽維時春暮百卉榮梅李杏奈俱生成牡丹今歲尤蚤發燁如雲錦披仙城獨有蟠桃隔瀛海玄圃蓬丘斷樵採乍宵東走過吉雲偷得持觴獻真宰真宰年才七十強豐頤廣顙形貌康四聰四目明且達儼如威鳯遊岩廊孫枝繞膝百千指蘭玉盈庭照羅綺面前羅拜但點頭樂事世間誰更比願公酌我酒聽我蟠桃歌不為萬間厦奈彼寒士何聽我蟠桃歌願公酌我酒大庇寒士顔還須棟梁手蟠桃歌莫浪嗟願公歲歲傾流霞薑公八十造王室衛公九十勤王家阿衡百歲佐商運雲臺煙閣傳無涯少室山房集卷二十六
