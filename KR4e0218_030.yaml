body:
  text: 少室山房集巻三十明胡應麟撰七言古詩四首白榆歌别司馬汪公歸婺中有序余入新都再閱月一蒯緱置旅店中而時時襆被從諸酒人游于白岳為日五之一于豐干為日三之一餘日則皆寓太函司馬公洎羣從傾倒流連窮極勝賞即平原河朔詎能什一于兹余瀕發復止數四咸以司馬公固要期修禊後同過弇園申絮酒之酹既司馬以仲淹故改訂暮秋余始前發公輕舠餞送百里執手惓惓且撰記送余東歸纎悉如畫固知百世而下有聞風躍然者媿亡以報稱大雅爰厯叙從公讌遊始末為長歌千五百言先是公有詩招余入白榆社余未及答篇首之興遂起白榆古歌行贍縟極於駱氏諸篇今之曼衍殆且倍之要以具載當時詞之冗劣弗暇計也天上何所有厯厯種白榆光輝爛絳闕照灼青雲衢白榆花開銀漢傍千枝萬葉垂琳瑯榦擁西池翳若木根盤東旭凌扶桑何來太乙精騎龍遊八荒折花戲閶闔竦身朝紫皇帝命攜青童下界聊徜徉時維乙酉歲元㑹呈嘉祥長虹百道飛紫陽胃婁奎壁交寒芒巍然名世降空谷九州四海垂文章文園消渇太史腐宇宙何人策髙步千秋再起司馬公鼎足中原共馳騖司馬當年年甫髫食牛吞虎心雄豪試宰烏傷動當宁立驅五馬行春郊蕞爾倭酋躪中國流血膏原胔横隰九重拊髀思長城大開幕府羅羣英餘皇亂蹴滄海上隻手盡補天南傾偉哉司馬文且武左挈䕫龍右方虎瑯琊兄弟中頡頏一字憑陵鬭今古如椽大筆流風霆落落逈與元化并差肩檀孟走公榖揚班十輩無留行餘事為詩歌格力尤矯絶宵馳厯下軍神交大梁俠稜嶒健骨摩蒼霄燁如威鳯升岧嶤有時掉臂浣花宅杜陵野夫不得驕岳岳龍門並真宰却向溪頭問蘭茝憐才意氣貫金石下士聲名亘湖海胡生雙刺懷十年姓名磨滅甘塵烟參差一泛洞庭棹極目練水心茫然山隂乍夜雪三丈立呼舴艋來新安新安山水何竒哉巨石林立髙厓摧奔流濺沫望不極恍若吕梁懸水三十仞廬山之瀑灔澦之流砰訇觸怒爭喧豗長年捩舵不遑息轉入危灘勢逾急窮幽厯阻到梁下翹首天都倚絶壁天都去天不盈尺雲門隱隱雲氣入兩袖乗天風蒼茫踏雲中舉頭見太函疑是軒轅宫軒轅不肯謁却謁司馬公公也倒屣出一笑心神融中厨餖豐膳炰鱉羞黄熊𤣥談叩無始髙論探鴻濛醉中吐豪氣四坐驚元龍不知天河落盞底但見蓬萊旭日荏苒懸城東城東陌上春風來十里五里桃花開飄然藍轝捫崔嵬紅霞紛紛落緑苔明眸皓齒臨髙臺恍如瓢笠行天台吳生曼聲振林木謝生懸河笥充腹美人臨卭得王四豪士扶風見汪六曲江觀濤病色揚龍山落帽饒清狂山公倒著接䍦坐相看一一俱髙陽定甆博山焚妙香蒲萄之釀琥珀光大叫酣眠竹林下下視六合天茫茫大白頻揮不知數斗酒寧論百篇富文章乍可穹壤齊富貴真如草頭露拂衣東望生離愁我欲東歸公苦留為君且解青貂裘山靈入夢幽思發单車竟作齊雲遊齊雲􅏭嶫天盡頭何年赤縣開神州蹊迴谷轉劃然一竅透混沌香爐紫烟繚繞五城十二崑崙丘憇公無量閣宿公文昌樓羽人跨白鹿道士騎青牛五老岩岩立霞際環珮髙翔隔塵世三姑亭亭若可招蕙裳羅帶長飄搖迴瞻巨碣峙寥廓科斗蟲魚籀文剥云是元封封禪碑帝遣神書鎮名岳朝辭白岳下暮宿岩市溪如花六七輩秉燭相招攜華燈熒熒夾明月笳鼓煌煌衆星列忽看紫氣屯關門走卒兒童競懽悅曳杖扶天孫徘徊登幔亭周遭列岩岫綵繪飛銀屏觀者盈道傍嘆息難具陳有如武夷君揮手辭世人幔亭登乍畢還尋上池室浮筏泝空明揚帆弄春碧沙棠為楫繡幕懸金甖玉瓶置我前百壺蕩漾如流泉翠睂蝉鬢紛嬋娟觴行樂奏雷電作迴橈轉向濠梁泊清沙錦石儼可數細雨斜風亦不惡李姬拂袖擁高浪趙女褰裙映林薄漫憶岑郎吟渼陂欲效陳思賦河洛昏黑歸來興逾逸玳瑁芙蓉衆賓集紅牙按拍催鸞笙紫笋攢簫和龍笛痛飲淋漓将至石主人留髠向西席吁嗟乎今晨何晨夕何夕人生快意差已極樂極悲來将奈何登山臨水哀情多倚風老泪雙滂沱公為我楚舞我為公越歌豐城兩神物㑹合長蹉跎眼前歲月東逝波青青栁色明關河明發牽衣强余住咫尺芳洲斷春樹欲行不行行且留未忍匆匆别公去公不見瑯琊布衣十日飲瑯琊之人渺何處當時太白配殘月此日中流僅孤柱何如片鷁飛嚴陵生芻泂酌澆吳城白玉之樓縹緲孤懸大羅上弇州之山五彩之鳥八翼四足仰天矯首而長鳴定知精爽為公下輜軿雜沓來秋㝠旁觀客有騎羊者彷彿生平共杯斚如澠之酒迹已陳此臂寜堪少年把俯仰乾坤但公在磊落肝腸爲公冩已從孔禰申末契底事桓文論興謝願作靈光千萬年白首同公白榆社題趙相國齋頭中天一柱圖老幹凌空舞秋色大澤龍蛇聳千尺何年夸父移崑崙撐拄東南半天碧畫師名姓聞國初郭熙遠裔留荆吳平生畫松三百本此圖卓犖傳皇都丈八桑皮白雲蓊落墨含毫勢生動恍忽秦時大夫五其一飛來挂高棟崚崚皺鬛横崔嵬霜皮何止四十圍絶壁孤懸蔽岩岫太空直上挐雲雷松下爲誰獨箕踞白眼科頭坐深樹迥疑叔夜揮五絃目送飛鴻暮來去畢宏韋偃紛難儔生枝秃枿驚凡流笑殺杜陵褐衣破拮据絹素摹青虬黄扉元老真柱石落落岩廊為時出朝端祇服公旦勤海内渾忘帝堯力念年懷山歸夢長一朝覩此神揚揚縱横麗句洒胸臆如椽巨筆垂琳瑯迴望蘭隂舊松逕幾欲乗風赴清䕃疇當大厦庇寒饑孰向明堂佐神聖踟蹰且閱三萬秋蟠桃歲歲紅丹丘八蠻頓顙九土服剡溪却泛鴟夷舟􅏭嵲芙蓉亂峰紫湧雪餐霞伴周史無勞辟榖追前人自是重來赤松子趙侯汝申以學術興起一方憐才下善闔邑推其長者兹以七賢圖屬余賦之倘亦有王阮忘年之意乎敬題短歌趙侯欵我城南屋堂上高懸畫一幅是時六月凉飈生萬箇琅玕照新築衣冠不類河朔豪船舫曾非剡溪曲細看乃是晉諸賢醉倚長林㺯修竹疎枝的皪横瀟湘密葉瓏蔥巻淇澳珠簾粉閣坐相對盡日明窻看不足彷彿當時六七公持螯白眼横霜空脫巾露頂挂石壁仰天大笑來清風匆匆典午事難說烟塵澒洞盈寰中此時不醉欲何事眼看浮世眞虚空步兵睨樹嘯聲發濬仲清言宛如屑子期鼔鞲仍著書伶也攜壺更荷鍤阮生撥阮嵇生絃目送飛鴻遊太𤣥就中山公最長者百觚在手情頺然南陽趙侯世希有滿腹珠璣貫牛斗偷桃偶墮方朔縁謫向人間卧巖藪生平飲酒但數巡座中賓客長千人何人把贈周昉畫躍然對我融心神胡生晚得酒中趣跋扈飛揚有深意一朝覩此形貌親恍若諸賢把余臂爲君作歌還贈君生綃落筆飛𤣥雲何時買斷篔簹谷共作林中避世人偃卧俞公臨榻上戲題俞郎一榻長安市破衲䝉茸褁布被狂來坦腹呼元龍蹴蹋星辰動天地華胥國小安足遊君家赤舄雙琳球大鵬希有儼相值飛行八極眠瓊樓少室山房集巻三十
